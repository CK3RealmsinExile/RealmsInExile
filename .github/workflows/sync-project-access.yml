name: Sync Repo Collaborators to Project
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Members
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_ACCESS_TOKEN }}
          script: |
            const owner = "CK3RealmsinExile";
            const projectNumber = 1;

            // 1. Get the Project V2 Node ID (user-level project)
            const projectQuery = `
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) { id }
                }
              }`;
            const projectRes = await github.graphql(projectQuery, {
              login: owner,
              number: projectNumber
            });
            const projectId = projectRes.user.projectV2.id;
            console.log(`Found project ID: ${projectId}`);

            // 2. Get all collaborators on this repository
            const collaborators = await github.rest.repos.listCollaborators({
              owner: context.repo.owner,
              repo: context.repo.repo,
              affiliation: 'direct'
            });
            console.log(`Found ${collaborators.data.length} collaborators`);

            // 3. Add each collaborator to the project
            for (const user of collaborators.data) {
              try {
                console.log(`Adding ${user.login} to project...`);
                await github.graphql(`
                  mutation($projectId: ID!, $userId: ID!) {
                    addProjectV2Collaborator(input: {
                      projectId: $projectId,
                      principalId: $userId,
                      role: WRITE
                    }) { clientMutationId }
                  }
                `, {
                  projectId: projectId,
                  userId: user.node_id
                });
                console.log(`Successfully added ${user.login}`);
              } catch (e) {
                console.log(`Could not add ${user.login}: ${e.message}`);
              }
            }