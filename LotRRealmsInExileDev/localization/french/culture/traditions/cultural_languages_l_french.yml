l_french:
 language_generic_label_desc: "La [language|E] dominante d'une [culture|E] englobe un large éventail de dialectes, de parlers vernaculaires, de créoles et d'idiomes mineurs apparentés, souvent (mais pas nécessairement) mutuellement intelligibles ou plus aisés à apprendre."
 
 language_eldarin_name: "Eldarin" # Could also be called Quendian or Primative Quendian

 language_quenya_name: "Quenya"
 language_quenya_desc: "Langue [elven|E] dominante de l'[uttermostwest|E], le [quenya|E] se subdivise en trois dialectes : valinóréen, vanyarin et exilique.\n\nLe quenya valinóréen est le dialecte parlé à l'origine par les [noldorelves|E], préservé après l'Exil par ceux qui demeurèrent en Valinor.\n\nLe quenya vanyarin est le dialecte des Vanyar de Valimar, celui qui porte la plus forte empreinte du valarin.\n\nLe quenya exilique (également nommé quenya ñoldorin) était parlé par les [noldorelvesexiles|E]. Ce dialecte connut les transformations les plus profondes, et c'est celui qu'adoptèrent les [dunedain|E] de [numenor|E], puis des [realms_in_exile|E].\n\nLe telerin, langue des Teleri de Valinor, est parfois considéré comme une branche du quenya."
 
 language_telerin_name: "Telerin"
 
 language_westron_name: "Occidentalien"
 language_westron_desc: "L'occidentalien, ou adûni, est une langue créole née de l'adûnaïque et des langues des Hommes du Milieu de la [middleearth|E]. L'occidentalien se forma dans les colonies septentrionales de [numenor|E], où l'adûnaïque était perçu comme souillé par les [faithful|E] en raison de son association avec les [kingsmen|E]. Par conséquent, peu d'efforts furent consacrés à préserver cette langue, qui évolua d'autant plus rapidement du fait de cette négligence.\n\nAprès la [downfall|E], les exilés de Númenor enrichirent l'occidentalien de nombreux emprunts [elvish|E], principalement issus du sindarin númenóréen. Grâce à l'influence des [dunedain|E], l'occidentalien devint la Langue Commune dans les [westlands|E], [dwarves|E], [orcs|E] et [elves|E] parlant cette langue ou un dialecte étroitement apparenté."
 
 language_dalish_name: "Dalien"

 language_dorwinic_name: "Dorwinique"
 
 language_westron_south_name: "Sudron" # Endonym: Khardûnî?
 language_westron_south_desc: "L'occidentalien méridional, également nommé sudron, est le dialecte d'occidentalien parlé par les descendants métissés des Númenóréens habitant les terres au sud du Poros. Le sudron porte une empreinte significative de l'adûnaïque umbaréen, ce qui confère à son vocabulaire d'origine adûnaïque une coloration d'apysaïque septentrional plutôt que de langues des Hommes du Milieu, comme l'occidentalien du Gondor et des Nordiques. Le sudron naquit après la conquête d'Umbar par Eärnil Iᵉʳ : les nombreux colons gondoriens qui s'établirent dans la nouvelle province apportèrent l'occidentalien, supplantant progressivement l'ancien dialecte adûnaïque umbaréen, tout en lui empruntant maints vocables et prononciations."
 
 language_westron_orc_name: "Occidentalien orque"
 language_westron_orc_desc: "L'occidentalien orque désigne la forme dépravée et brutale d'occidentalien parlée par les [orcs|E], employée pour la communication inter-tribale — les langues orques se fragmentent vite et sans soin, leurs locuteurs ne cherchant guère à embellir leurs paroles, préférant que leurs idiomes soient âpres et tranchants — car ils ne peuvent comprendre les autres parlers orques. Leur discours est souvent émaillé de jurons et d'exclamations orques, tels #italic skai, sha,#! ou #italic garn#!. Bien que disgracieux, ceux qui parlent l'occidentalien peuvent le comprendre dans une certaine mesure... quoique beaucoup souhaiteraient n'en rien entendre."
 
 language_goblin_name: "Gobelin"
 #language_goblin_desc: "" What the hell do Gobbos speak?
 
 language_orcish_name: "Orque"
 language_orcish_desc: "Bien que les [orcs|E] ne possèdent pas de structure linguistique unifiée, ils partagent la pratique de composer leur parler quotidien d'emprunts corrompus aux langues de la [middleearth|E], l'occidentalien et le parler noir étant les sources les plus fréquentes. Les variations entre tribus et types d'Orques étaient si considérables que cette langue s'avérait souvent inutile pour communiquer, chaque tribu s'adaptant aux langues des peuples environnants. Les Orques de l'Ouest, notamment, utilisaient l'occidentalien comme langue véhiculaire inter-tribale."
 
 language_kurr_name: "Kúrr"
 language_kurr_desc: "Le kúrr est un obscur idiome [orcish|E] parlé par quelques tribus isolées des [yellowmountains|E]. Il se compose de sons brefs et claquants, crachés en succession rapide pour former des phrases très rudimentaires. Grâce aux puissants échos des cavernes, signaux et ordres simples peuvent porter sur de vastes distances dans les profondeurs de la terre. En raison de leurs tendances tribales exacerbées, même des groupes d'Orques voisins peinent à se comprendre mutuellement."
 
 language_black_speech_name: "Parler noir"
 language_black_speech_desc: "Le parler noir fut créé par le Seigneur Ténébreux [sauroncharacter|E] durant le [secondage|E] pour servir de langue commune à tous ses serviteurs. Le parler noir est considéré comme une langue sombre et maléfique par les sages de la [middleearth|E], et peu osent le prononcer ; aussi n'est-il guère parlé hors de l'influence de Sauron."
 
 language_taliska_name: "Taliska"
 language_taliska_desc: "Le taliska était la langue ancestrale commune des Maisons de Bëor et de Hador. Durant leur migration vers l'ouest, cette langue fut influencée tant par l'avarin que par le [khuzdul|E] des Nains. Lorsque les deux tribus atteignirent le Beleriand, leurs parlers avaient considérablement divergé, le taliska bëorien intégrant bien plus d'éléments elfiques que le taliska hadorien.\n\nLes Bëoriens abandonnèrent largement leur branche du taliska en s'établissant au Beleriand, adoptant le sindarin. C'est donc le taliska hadorien qui survécut et évolua vers la langue ultérieure de [numenor|E], l'adûnaïque."
 
 language_adunaic_name: "Haut-adûnaïque"
 language_adunaic_desc: "L'adûnaïque, nommé adûnayân par ses locuteurs, est la langue parlée dans les anciennes colonies [numenorean|E] au sud du Harnen, dérivée du taliska, langue des Edain du [firstage|E]. La langue évolua après l'[akallabeth|E], les [realms_in_exile|E] désormais indépendants acceptant des influences étrangères dans leur dialecte, comme en [bellakar|E] et en Anarikê, ou choisissant de maintenir la langue de façon conservatrice, pratique adoptée par les royaumes [adunai|E] des [thanihazad|E]."
 
 language_adunaic_bellakar_name: "Belladûnaïque" # Endonym: Bêllakayân? From Bellak, presumably derived from MBELEK
 language_adunaic_bellakar_desc: "L'adûnaïque bellakari est le dialecte d'adûnaïque parlé dans les anciennes colonies númenóréennes du Bellakar. C'est l'un des dialectes les plus divergents de l'adûnaïque, décrit comme aussi métissé que l'héritage de ses locuteurs. La langue se subdivise en dialectes septentrional et méridional, le premier portant davantage l'empreinte tedjin, le second celle des Bôzishnarûd."
 
 language_kharadunaic_name: "Kharadûnaïque" # Endonym: Kharadûnayân? Maybe the Anbalukkhôrî call it Khêruwayân, or Khôrayân. LOL!
 language_kharadunaic_desc: "Le kharadûnaïque, langue des anciennes colonies méridionales de Númenor telles que les royaumes des Thâni-Hazâd, était considéré comme le dialecte le plus conservateur de l'adûnaïque, en raison de l'abondance de vocabulaire archaïque tombé en désuétude à Númenor vers la fin du Deuxième Âge. Le kharadûnaïque n'a cependant pu échapper à une influence mineure de l'apysaïque méridional, principalement en [anbalkumagan|E]."
 
 language_tanturaki_name: "Tantûraki"
 language_tanturaki_desc: "Le tantûraki, nommé tanâtariyê par ses locuteurs (et plus tard ûsakani), était un dialecte d'adûnaïque parlé dans l'ancienne colonie [numenorean|E] de Tantûrak. La langue de Tantûrak était de nature très singulière, en partie du fait de la négligence et de l'autonomie dont jouissait Tantûrak tout au long de son existence coloniale, mais aussi en raison de l'évolution des idéaux et des mœurs de la colonie elle-même. L'idiome devint très dérivé et corrompu, empruntant abondamment aux langues des Mûmakani.\n\nOn rapporte également que lorsque l'Ombre s'étendit sur Tantûrak, les seigneurs et gouverneurs de cette terre tordirent délibérément leur langue pour la rendre âpre et désagréable aux oreilles des étrangers et des inférieurs, car ils jugeaient ces qualités « fortes ». Ainsi, le tanâtariyê est l'une des formes les plus singulières de l'adûnaïque, difficile à comprendre même pour les [adunai|E] voisins des [thanihazad|E]."
 
 language_adunaic_umbar_name: "Adûnaïque umbaréen" # Originally, I thought Umbadûnayân would be the best endonym, but maybe Adûnayân 'nUmbar?
 language_adunaic_umbar_desc: "L'adûnaïque parlé à [umbar|E] était le plus proche du haut-adûnaïque de Númenor, car c'était la colonie la plus étroitement liée à la métropole, considérée par beaucoup comme plus conservatrice phonétiquement que l'adûnaïque de Númenor vers la fin du Deuxième Âge. La langue développa néanmoins une influence notable de l'apysaïque septentrional — principalement dans le vocabulaire — du fait de la proximité d'Umbar avec les routes commerciales haradriques et le Royaume de Kârna."
 
 language_azulunaic_name: "Azûladûnaïque" # Endonym: Azûladûnayân? Maybe just Azûlayân?
 language_azulunaic_desc: "L'idiome adûnaïque oriental, ou Ancienne Langue des Mers, était la branche de l'adûnaïque parlée par les marins et marchands de [numenor|E] qui occupaient ses avant-postes militaires et commerciaux en Extrême-Orient. Du fait de la suprématie d'Anarikê dans ces contrées lointaines, l'adûnaïque oriental devint communément connu sous le nom de « dialecte anarikéen ».\n\nCe fut d'abord un dialecte conservateur, les Númenóréens d'Extrême-Orient s'établissant rarement en grand nombre, et en raison de la nature transitoire des Adûnâi orientaux à travers la région, aucun emprunt particulier ne fut adopté jusqu'à leur relocalisation en Anarikê après l'Akallabêth, lorsque l'idiome commença à intégrer davantage d'emprunts et de prononciations $language_khyan_name$."
 
 #language_eastern_adunaic_name: "Eastern Adunaic" ### PLACEHOLDER, FOR ANARIKE
 #language_eastern_adunaic_desc: "Eastern Branch: Anarikêan Dialect, spoken only in the urban areas, one of the most diverged dialects of Adûnaic, having a strong $language_khyan_name$ influence." ### PLACEHOLDER, FOR ANARIKE
 
 
 language_halethian_name: "Halethien" # Language of the folk of Haleth
 language_halethian_desc: "Le $language_halethian_name$ était la [language|E] du Peuple de Haleth. Fort peu de choses en sont connues, sinon qu'elle n'avait aucun lien avec les langues des deux autres maisons des Edain. Elle dut se développer bien avant leur entrée en [beleriand|E]."
 language_daenael_name: "Dônael"
 
 language_gwathuirim_name: "Gwathuilach"
 language_dunlendish_name: "Dunlandais"
 
 language_drug_name: "Drûghique"
 language_beffraen_name: "Beffraïque"
 language_honnin_name: "Honnu"
 language_chaialla_name: "Chállu"
 language_yatali_gan_name: "Yatallu"
 
 language_sindarin_name: "Sindarin"
 language_sindarin_desc: "Nommé d'après les [sindarelves|E] du [beleriand|E], le [sindarin|E] était la « langue commune » des Elfes des [westlands|E] de la [middleearth|E].\n\nApparenté au telerin de [valinor|E], le sindarin se développa au [beleriand|E] durant les [yearofthetreesage|E]. Après le retour des [noldorelvesexiles|E] en [middleearth|E], [elu_thingol|E], roi des Sindar, proscrit l'usage du [quenya|E] dans ses domaines. Bien que cette proclamation n'eût guère de pouvoir contraignant sur les Noldor, les Elfes du Beleriand furent également plus lents à apprendre le quenya que les Noldor le sindarin. En conséquence, le quenya tomba progressivement en désuétude pour devenir une langue de savoir, tandis que le sindarin s'imposait comme la langue elfique dominante.\n\nL'établissement de royaumes [sindarelves|E] dans le [greenwoodshort|E] et en [lothlorien|E] conduisit les Elfes Sylvains de la Forêt Noire et les Elfes Nandor de Lórien à adopter le sindarin. Le sindarin de Vertbois intégra de nombreux éléments sylvains, formant un dialecte singulier.\n\nLes Númenóréens de l'Andustar adoptèrent le sindarin comme langue quotidienne, étant descendants des Bëoriens qui avaient abandonné leur propre dialecte taliska. Ainsi naquit le dialecte sindarin [numenorean|E], qui survécut au Gondor et en Arnor après l'Akallabêth."
 
 language_rhovanic_name: "Rhovanien"
 language_rhovanic_desc: "Les idiomes rhovaniens naquirent du groupe septentrional des Edain locuteurs du taliska qui demeurèrent dans le [greenwood|E] en [rhovanion|E] au lieu de franchir les [mistymountains|E]. Les langues rhovaniennes furent également influencées par les tribus baradhrim venues de l'Est au [secondage|E], tels les Igath. Le rhovanien fut reconnu par les Rois du [gondor|E] comme apparenté à l'occidentalien, partageant le taliska comme ancêtre commun ; ainsi les [northmen|E] du Rhovanion furent reconnus comme Hommes du Milieu, amis du Gondor. Les langues rhovaniennes ont également influencé les idiomes de nombreux peuples du Rhovanion, tels les [longbeard|E] [dwarves|E] et les Ioriags."
 
 language_rohirric_name: "Rohirrique"
 language_rohirric_desc: "Le rohirrique est la langue parlée par les Rhovanorim qui suivirent Marhwini dans l'exil vers le [anduinvale|E] et devinrent le peuple des [eothed|E]. La langue rohirrique dérive des idiomes [northmen|E] du Rhovanion et se classe donc parmi les langues des Hommes du Milieu en raison de sa parenté avec l'occidentalien, partageant l'ancêtre commun du taliska. Ces dernières années, la langue a influencé les parlers des terres environnant l'Isen, le peuple adornaen parlant un mélange de rohirrique et de gwathuilach du fait de ses liens avec le [rohan|E]."
 
 language_eriadoric_name: "Eriadorien"
 
 language_ioradya_name: "Ioradya"

 language_tedjin_name: "Tedjij"
 
 language_varadia_name: "Varadia"
 
 language_avarin_name: "Avarin commun"
 #language_avarin_desc: "Avarin is the exonym given to the languages spoken by the [elves|E] that refused to take the Great Journey to [valinor|E] or [beleriand|E] and remained in the lands of [cuivienen|E]. Little is known about the Avarin tongue, yet it is related to the other Elven tongues through the common ancestor of Primitive Quendian. When the Avari split, their language did so as well, with three major branches being formed; North, East and West.\n\nDue to its proximity to the [eldar|E] of [greenwoodshort|E], the West Avarin dialect shared some similarities with the languages of the Silvan Elves, such as loanwords.\n\nThe Eastern Avarin dialect was the most spoken of the dialects, due to the majority of the Avarin migrating East with some of them being the ones that migrated to the far south.\n\nThe Northern Avarin dialect is the most peculiar of the lot, having no initial consonant groups, it is considered the most isolated of the dialects, with some even doubting its existence."
 language_avarin_desc: "L'avarin commun n'est pas véritablement une langue mais plutôt un ensemble de dialectes divergents. Terme générique désignant les parlers variés des [avari|E] après la Séparation, l'avarin commun se fragmenta rapidement au-delà de toute reconnaissance en de multiples idiomes des [avari|E], privant le terme de toute signification au-delà des chroniques anciennes."

 language_penni_name: "Pennia"
 language_penni_desc: "Le pennia est la langue des [penni|E] [avari|E], parlée dans la forêt cachée qu'ils nommèrent Nelorniath. C'est la plus apparentée au [language_group_eldarin|E] de tous les idiomes [language_group_avarin|E], issue d'un dialecte proche à [cuivienen|E] et puisant des influences dans la langue nandorine avant que le contact ne cessât."

 language_cuind_name: "Cuendi"
 language_cuind_desc: "Les [cuind|E] de Drêl nomment leur langue cuendi, « la langue de ceux qui parlent ». Elle est unique parmi les idiomes [language_group_avarin|E] pour l'absence des sons « w » et « y », et possède un système d'écriture fluide à base d'encre sur feuilles."

 language_kinnlai_name: "Kenni-lamm"
 language_kinnlai_desc: "Langue des [kinnlai|E] [avari|E], le kenni-lamm se distingue par son goût des mots composés et son rythme cadencé."

 language_kindi_name: "Kendia"
 language_kindi_desc: "Le kendia fut autrefois parlé à travers les vastes plaines du [rhun|E] et inspira nombre de langues orientaises. Cependant, les Kindi ont décliné et se sont cachés, se retirant du ciel ouvert et des champs d'herbes où jadis résonnait leur langue. Rares sont les [men|E] qui ont désormais la chance de l'entendre, avant qu'elle ne s'éteigne à jamais."

 language_hwneti_name: "Hwentya"
 language_hwenti_desc: "Le hwentya est une langue singulière, très éloignée de tous les autres idiomes [elven|E]. Parlée dans l'extrême nord de la [middleearth|E], elle rappelle à ceux qui connaissent les deux le haut-elfique [quenya|E]."

 language_windan_name: "Windan"
 language_windan_desc: "Le windan est la langue éteinte des Avari Windan, autrefois parlée dans les forêts denses du sud du [beleriand|E]."

# Akanali

 language_akanali_name: "Akanali"
 language_akanali_desc: "L'akanali est l'antique langue de ceux qui s'aventurèrent les premiers dans l'Extrême-Sud. Bien que simple dans sa forme, elle possédait néanmoins une profonde richesse de nuances et de beauté."

 language_mumakani_name: "Mûmakani"
 language_mumakani_desc: "Le mûmakani est la langue des empires d'Amâv et de Jî Indûr, et certains la considèrent comme le vestige le plus authentique de l'antique langue akanali. Quelle que soit la véracité de cette affirmation, cet idiome est rapidement devenu la lingua franca de l'Extrême-Sud, porté par l'hégémonie croissante de l'empire $mumakani$."

 language_inkamaki_name: "Inkamaki"
 language_inkamaki_desc: "Moins une langue unifiée qu'un vaste ensemble de dialectes, $language_inkamaki_name$ désigne le parler des $inkamakil$ de l'est de $e_mumakan$. N'ayant jamais connu la centralisation de sa voisine $language_mumakani_name$, cette langue conserve ainsi son antique diversité, et l'on dit qu'on peut voyager sept jours en $d_inkamakan$ et entendre autant d'idiomes différents."

 language_nafarati_name: "Nâfarati"
 language_nfarati_desc: "À l'origine simple dialecte parmi les nombreuses variantes du $language_mumakani_name$, le $language_nafarati_name$ a divergé durant son séjour dans le nord, intégrant des éléments des langues locales $language_tuktanin_name$ et $langauge_drenin_name$, malgré les protestations contraires des $nafarati$."

 language_batamai_name: "Batamai"
 language_batamai_desc: "L'un des rares vestiges de leur ancienne patrie en $k_mumakan$, la langue des $mulamburil$ est en effet très proche de celle des $mumakanil$. Après leur fuite vers $k_mulambur$, le $language_batamai_name$ commença à ressembler davantage au $language_kirani_name$, bien que certains érudits de $c_korlan$ soutiennent qu'il s'agit plutôt d'un retour à son héritage ancestral, réprimé par leurs suzerains, que de nouveaux emprunts."

 language_kirani_name: "Kîrani"
 language_kirani_desc: "Le kîrani, également connu sous le nom de mûmakani occidental, est l'une des premières langues à s'être séparée de $language_akanali_name$, encore parlée en $k_koronande$. Possédant plus d'emprunts au $language_kinnlai_name$ que tout autre idiome d'$e_mumakan$, elle présente également un riche vocabulaire marchand et nautique ainsi qu'une curieuse aversion pour la lettre « p » qui persiste dans ses langues filles."

 language_hathori_name: "Hathori"
 language_hathori_desc: "À l'origine parler local du $language_kirani_name$ de la péninsule, le $language_hathori_name$ fut adopté par les $hathorim$ à leur arrivée. Ayant évolué avec la nouvelle culture, il conserve le caractère d'une langue $language_akanali_name$, mais emploie une grammaire bien plus simple et un large éventail d'emprunts $language_eriadoric_name$ apportés par les esclaves affranchis, le rendant inintelligible aux autres $mumakani$."

 language_usakani_name: "Usakani"
 language_usakani_desc: "Première à se séparer du $language_kirani_name$, $language_usakani_name$ et sa fille $language_magri_name$ comptent parmi les langues les plus inhabituelles de l'Extrême-Sud, évoquant parfois davantage une famille propre que des descendantes de $language_akanali_desc$. Possédant une large palette de consonnes et de vocabulaire étranger, les premiers érudits la considérèrent d'abord plus proche du $language_amutani_name$ que du $language_kirani_name$."

 language_magri_name: "Magrin"
 language_magri_desc: "Le magrin est la langue des Royaumes Jumeaux de Mag et Tumag, et de leurs peuples. Les érudits ont eu des difficultés à en cerner les origines exactes, car cet idiome semble principalement apparenté à celui des Kîrani à l'est, tout en contenant certains éléments archaïques suggérant un lien avec la famille apysaïque."

 language_geshanin_name: "Geshânîn"
 language_geshanin_desc: "Langue de l'antique civilisation de $d_geshan$, le $language_geshanin_name$ fut l'ancêtre des langues modernes du nord d'$e_mumakan$."
 
 language_tuktanin_name: "Tuktanîn" 

 language_dusheraen_name: "Dûsheraen"

 language_drenin_name: "Drenin"

 language_ganin_name: "Ganin"

 language_ahavan_name: "Ahavan"

 language_lyneri_name: "Lynîr"
 language_lyneri_desc: "Le lynîr est une langue venue du Mûmakan, car les Lyneri sont apparentés au peuple de cette péninsule. Cependant, à travers de nombreuses années de contacts, d'échanges et de mariages avec les autres cultures autour de la Baie d'Ormal, la langue lynîr a adopté de nombreux emprunts au $language_khyan_name$, au nabhâsh, et particulièrement au tazinain, du fait de leur grande proximité."

 language_senga_name: "Senga"

 language_northern_apysaic_name: "Haruzusht"
 language_northern_apysaic_desc: "Lorsque les $apysaic_collective_noun$ sortirent de l'est de l'Est, poursuivant les fils d'[ermon|E] ou fuyant l'Ombre, ils apportèrent avec eux leurs innombrables langues. Ceux qui s'établirent dans le nord furent les $haruze_collective_noun$, ou Peuple Divin, et leur langue fut la Langue Divine, ou $language_northern_apysaic_name$.\n\nLes langues de nombreuses cultures voisines furent grandement influencées par les $haruze_collective_noun$, mais eux-mêmes subirent l'influence des idiomes des [numenoreans|E], $language_adunaic_umbar_name$ et $language_westron_name$. Ainsi, le $language_northern_apysaic_name$ du [secondage|E] est à peine intelligible pour un $haruze$ du [thirdage|E]." #Only one word has survived for six thousand years: Melêkha. See about adapting this
 
 language_karrani_name: "Karrash" # Expand, I need to know more about the Karrani HUKE!
 language_karrani_desc: "Tandis que les $apysaic_collective_noun$ s'aventuraient dans les vastes terres du Harad, leurs tribus commencèrent à diverger — leurs langues également. Ceux qui s'établirent près des collines d'Umbar furent les $karrani$, parents des $sakalai$ et des $haruze$, et leur langue devint le $language_karrani_name$.\n\nLa langue des $karrani$ fut grandement influencée par le $language_northern_apysaic_name$, mais elle influença à son tour la langue des $jelut_collective_noun$ et les idiomes de la Mer de Dunes. Elle a également laissé son empreinte sur $language_adunaic_umbar_name$ et $language_westron_south_name$, de nombreux termes désignant le sable, la roche et autres formations géographiques continentales étant directement empruntés au $language_karrani_name$."

 language_middle_apysaic_name: "Apîshya"
 language_middle_apysaic_desc: "Dès leur arrivée au Harad, les $apysaic_collective_noun$ formaient déjà un groupe diversifié de peuples et de langues — aussi, pour les unir durant leur grande marche, nombre de leurs maisons parlaient une langue commune, peut-être adoptée de la plus puissante de leurs tribus. On dit que les $arani_collective_noun$ ont préservé cette langue, près de six mille ans plus tard.\n\nCe n'est pas l'entière vérité, mais ce n'en est pas trop éloigné. L'$language_middle_apysaic_name$ est possiblement la moins divergente des langues des $apysaic_collective_noun$, ce qui est déconcertant étant donné les diverses tribus, clans et sectes religieuses au sein de la diaspora $arani_collective_noun$ elle-même, sans parler des cultures voisines qui parlent également l'$language_middle_apysaic_name$. Certains érudits pensent que ce sont précisément ces différents cultes qui ont préservé la langue — pour commercer en quantité raisonnable, il faut pouvoir s'exprimer, et ainsi les $harad_priest_male_plural$ enseignent à leur congrégation la langue telle qu'elle doit être parlée, selon l'ordonnance des Dieux."

 language_southern_apysaic_name: "Dalab"
 language_southern_apysaic_desc: "De toutes les langues des peuples $apysaic_collective_noun$, la plus répandue est peut-être le $language_southern_apysaic_name$, signifiant littéralement « La Langue ». Grâce à l'influence stabilisatrice du Conseil des Régents, au nom de l'$emperor_bozisha_miraz_male$, le $language_southern_apysaic_name$ des $bozishnarud_collective_noun$ et de leurs voisins $narudbriyig_collective_noun$ n'a guère changé en six mille ans.\n\nLe $language_southern_apysaic_name$ s'est cependant diversifié dans d'autres régions de la [middleearth|E], les $gusar_collective_noun$, $gai_collective_noun$ et $bellanarud_collective_noun$ parlant tous des dialectes très différents, ou des langues apparentées. Il a également prêté de nombreux mots au $language_adunaic_bellakar_name$ voisin, et sert de langue commerciale dans tout le Sud."
 
 language_jelut_name: "Jeludrin"
 language_jelut_desc: "Le $language_jelut_name$ est la langue des peuples $jelut_collective_noun$, un idiome principalement apparenté à l'$language_middle_apysaic_name$. Il ne manque pas d'emprunts au $language_karrani_name$ et à l'$language_adunaic_umbar_name$, mais demeure par ailleurs un exemple de langue divergente et quelque peu isolée dans la famille faríyienne.\n\nCependant, le $language_jelut_name$ possède un autre ancêtre linguistique, totalement incongru au Harad — le [sindarin|E]. Lorsque « $nick_the_hand_of_gurzil$ » pénétra en Umbar et subjugua les [dunedain|E], la langue $language_jelut_name$ adopta certains mots et coutumes des $umbaredain_collective_noun$, qui perdurent à ce jour."

 language_arysan_name: "Arysan"
 language_arysan_desc: "L'arysan est la langue parlée par les [haradrim|E] de l'est. Bien que ce soit un idiome haradrique, sa structure et son vocabulaire empruntent abondamment à la langue $language_khyan_name$. C'est une conséquence naturelle de la forte influence khyane sur les peuples de la région."
 
 language_pust_name: "Pûst"
 language_pust_desc: "Lorsque les peuples $old_pust_collective_noun$ sortirent jadis de la Mer de Dunes et errèrent vers le Miroir de Feu, ils apportèrent l'un des innombrables idiomes des $apysaic_collective_noun$. Nommé d'après le peuple qui le parlait, le $language_pust_name$ est une langue expansive, avec une forte concentration de groupes consonantiques.\n\nOn dit que l'eau salée dessèche la langue, ce qui pourrait expliquer pourquoi le $language_pust_name$ est si difficile à comprendre et à parler. Cependant, il a été considérablement influencé par l'$language_middle_apysaic_name$, bien que cela concerne surtout les $darsalai_collective_noun$ — les $lushek_pust_collective_noun$ des montagnes possèdent des dialectes bien moins intelligibles pour un locuteur de l'$language_middle_apysaic_name$."
 
 language_gai_name: "Gái"
 language_gai_desc: "Cachés dans leur demeure forestière du même nom, les $gai_collective_noun$ sont un peuple isolé, et bien que leur langue soit apparentée au $language_southern_apysaic_name$, elle a grandement divergé, rendant l'intercompréhension quasi impossible. De plus, les $gai_collective_noun$ sont des gens secrets, peu enclins à partager leurs secrets aisément. Ainsi, lorsqu'ils doivent traiter avec les $bozishnarud_collective_noun$, ils daignent apprendre et utiliser le $language_southern_apysaic_name$ plutôt que de révéler leur langue secrète au monde extérieur."
 
 language_ansith_name: "Ansith"
 language_ansith_desc: "Presque la plus éloignée de toutes les langues descendant de l'$apysaic_collective_noun$, l'$language_ansith_name$ est la langue des peuples $heritage_tulwangi_collective_noun$, mais elle a grandement évolué au fil du temps dans toutes les cultures de ce groupe varié.\n\nEn $k_tulwang$ et en [anbalkumagan|E], le $language_kharadunaic_name$ a fortement influencé les $tuladen_collective_noun$, $tandi_collective_noun$ et $banadunai_collective_noun$ qui y vivent, les plus serviles des $heritage_tulwangi_collective_noun$ tentant d'imiter les accents des $anbalukkhori_collective_noun$ pour se faire bien voir de leurs maîtres. Les $tuloriyan_collective_noun$ sont encore plus influencés, leurs dialectes portant l'empreinte du $language_tedjin_name$ et du $language_adunaic_bellakar_name$. Pendant ce temps, en $k_zajantak$, les $fariyin_collective_noun$ ont conservé une forme plus « pure » de la langue, pour ce qui est des influences non-apysaïques, bien que nombre de mots soient empruntés au $language_southern_apysaic_name$."

 language_amutani_name: "Amutanin"
 language_amutani_desc: "L'amutanin est quelque peu atypique au sein de la famille apysaïque, en raison de sa longue séparation et de son isolement — la seule autre langue apysaïque avec laquelle il est en contact est l'$language_ansith_name$, et de façon très limitée. Parlé dans l'extrême sud-ouest de la [middleearth|E], il combine le noyau apysaïque fondamental avec des strates d'emprunts au $language_magri_name$, au $language_kharadunaic_name$, et même au $language_cuind_name$. Au premier regard, certains pourraient le croire unique, né des pierres mêmes des [thanihazad|E], auxquelles il convient si bien."
 
 language_khuzdul_name: "Khuzdul"
 
 language_ulgathig_name: "Ulgathig"
 
 language_wastelands_name: "Parler de Tom"
 language_wastelands_desc: "#TOLKIENQUOTE Holà hé ! joyeux gars ! sonne le dong dillon !\nSonne un dong ! saute un bond ! fal lal le saule !\nTom Bom, gai Tom, Tom Bombadillon !#!"
 
 language_arhuneri_name: "Arhûneri"
 
 language_hobbitish_name: "Hobbitique"
 language_hobbitish_desc: "L'hobbitique est le dialecte d'occidentalien parlé par les [halflings|E] de la [shire|E]. Cette langue fut adoptée après la fin des Jours de l'Errance, lorsque leur migration en [arnor|E] les mit en contact avec l'occidentalien, la Langue Commune, qu'ils se mirent à parler avec des emprunts à leur ancienne langue, elle-même influencée par les idiomes rhovaniens ; ainsi le parler hobbitique partage-t-il de nombreuses similitudes linguistiques avec les langues septentrionales."
 
 language_hillmen_name: "Munentaen"
 
 language_khyan_name: "Khyan"

 language_anarikean_name: "Anarikéen"
 language_anarikean_desc: "La langue anarikéenne est un vernaculaire de l'adûnaïque, mieux connu localement sous le nom d'Ancienne Langue des Mers, et du $language_khyan_name$, bien qu'elle soit davantage apparentée à ce dernier. Elle est principalement parlée dans les zones urbaines et côtières d'Anarikê, où l'héritage de Númenor demeure fort dans le parler, avec des emprunts et des prononciations issus de l'adûnaïque. Cependant, aucun locuteur d'adûnaïque ne reconnaîtrait la langue anarikéenne comme telle, car elle est devenue un dialecte propre, unique et fascinant."

 language_new_sirayni_name: "Nabhâsh"
 language_new_sirayni_desc: "La langue nabhâsh, ou Nouveau-Parler, est la langue du Sîrayn au Troisième Âge. Influencée par l'$language_middle_apysaic_name$ et le $language_pust_name$, avec des touches de $language_southern_apysaic_name$ et de $language_muranian_name$, le nabhâsh est la lingua franca sur le pourtour occidental de la Baie d'Ormal, avec de nombreux dialectes régionaux et particularités linguistiques propres à chaque tribu et culture. Mais la langue n'a pas tant évolué — un Bulgan peut s'entretenir avec un Aytan et chacun comprendra l'autre, ne serait-ce que laborieusement."

 language_old_sirayni_name: "Âkabhâsha"
 language_old_sirayni_desc: "L'âkabhâsha, ou Premier-Parler, est la langue des ancêtres des Sîraynê, les Sîreshni, lorsqu'ils pénétrèrent pour la première fois dans la Baie d'Ormal, s'exprimant en de nombreux idiomes variés, nommant les choses nouvelles à mesure qu'ils s'aventuraient toujours plus au sud. Aux jours florissants des Sîreshni, chaque cité-État possédait son propre dialecte et sa tradition linguistique. Mais avec l'assaut de Khôrahîl et l'intégration subséquente aux Arani, les nombreux idiomes de l'âkabhâsha furent oubliés ou transformés, ne survivant plus que dans des tomes poussiéreux de savoir ancien et oublié."

 language_muranian_name: "Muranien"

 language_elinse_name: "Elinse"
 language_elinse_desc: "L'elinse, langue du peuple du même nom, est un idiome apysaïque — mais fort éloigné de toutes les autres langues de ce groupe, car seuls parmi les Haradrim ils ne s'aventurèrent pas vers le sud-ouest du Harad, préférant aller vers l'est, près de la Baie d'Ormal. Ainsi, bien que nominalement apysaïque, la langue des Elinse est quasi incompréhensible pour leurs frères haradrim séparés."


 language_tazinain_name: "Tazinain"
 language_tazinain_desc: "Le tazinain est la lingua franca des régions côtières du Sîrayn. À l'origine dialecte talathrim du [khy|E], apparenté à ceux parlés parmi le peuple des Bulchaydes, il se répandit par le commerce et la conquête durant l'Âge d'Or du Khy. Bien que l'influence $language_khyan_name$ déclinât, la langue supplanta progressivement les idiomes indigènes du Sîryan oriental, devenant le principal moyen de communication le long du fleuve Sîresha, tant dans les cours que sur les quais. Elle fut abondamment enrichie et élargie par le vocabulaire local, et possède désormais presque autant d'origines sîrayniques que khyanes."

 language_drakespeech_name: "Soelâsi"
 language_drakespeech_desc: "Le soelâsi, ou Parler-des-Dracs, est la langue de [womawas_drus|E], des $womaw$, et de leurs descendants au Vulmaw et au Lokhas Drus. Elle fut fortement influencée par la dragonne Utumkôdur, d'où son nom.\n\nElle a historiquement servi de langue commerciale commune à travers les Mers Orientales, et de nombreuses autres langues de la région comportent des emprunts au soelâsi.\n\nLe soelâsi a évolué au fil des ères, au point que les Womaw du Troisième Âge désignent la langue du Deuxième Âge comme soelâsi bu, ou « Vieux-Womarin ». Les langues du Lokhas et du Vulmaw sont fondées sur ce dialecte plus ancien."