# Mumakan
 culture_in_nafarati_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('custom_nafarati').GetName]"
 tradition_nafarati_belligerence_name: "Bellicosité Nâfarati"
 tradition_nafarati_belligerence_desc: "Façonnés par leur origine violente et leurs longues campagnes au service de [GetTitleByKey('e_mumakan').GetNameNoTier], les Nâfarati sont devenus une société belliqueuse et agressive. Ils se querellent souvent avec leurs voisins — et entre eux."

 tradition_harbourworks_name: "Ouvrages Portuaires"
 tradition_harbourworks_desc: "Cette culture s'est adaptée au littoral changeant, érigeant de grands ouvrages de quais et d'appontements pour canaliser le flux des eaux et gagner des terres pour leurs cités."
 not_communal_bureaucratic_or_egalitarian_desc: "La [culture|El] ne possède pas l'[ethos|E] $ethos_communal_name$, $ethos_bureaucratic_name$ ou $ethos_egalitarian_name$"

 tradition_hathorim_councils_name: "Conseils Hathorim"
 tradition_hathorim_councils_desc: "Cette culture tire la légitimité de ses dirigeants d'un conseil d'anciens tribaux, réuni pour prendre toutes les décisions majeures — y compris le remplacement de ses chefs."

 tradition_safe_havens_name: "Havres Sûrs"
 tradition_safe_havens_desc: "Cette culture s'est adaptée à la menace constante des pirates et pillards, développant des défenses portuaires sophistiquées pour s'assurer que tous les marchands de passage puissent trouver refuge contre les intempéries et les guerriers."
 culture_parameter_lotr_lower_raid_capture_chance: "Les [raids|E] et [sieges|E] contre les [counties|El] de cette [culture|El] ont bien moins de chances de faire des [prisoners|El]"
 culture_parameter_city_fort_level_bonus: "Les [city_holdings|E] côtières dans les [counties|El] de cette [culture|El] gagnent un [fort_level|E] supplémentaire."
 culture_parameter_fortifications_in_cities: "Les #high Bâtiments de Fortification#! peuvent être construits dans les [city_holdings|E] des [counties|El] de cette [culture|El]"
 culture_parameter_can_build_protected_harbours: "Débloque une [decision|El] pour construire des [GetBuilding('wonder_protected_harbour').GetName]"

