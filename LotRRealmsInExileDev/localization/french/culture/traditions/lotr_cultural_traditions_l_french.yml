 tradition_whaler_culture_name: "Culture Baleinière"
 tradition_whaler_culture_desc: "Les pêcheurs de cette culture s'aventurent souvent sur l'océan pour chasser de plus grandes créatures marines, notamment d'immenses baleines. Les navires sont construits pour permettre de traîner les carcasses de baleines jusqu'au rivage et sont équipés de harpons afin de terrasser les proies des baleiniers avec une plus grande précision."

 # Thani Hazad
 tradition_intricate_plotters_name: "Maîtres de l'Intrigue"
 tradition_intricate_plotters_desc: "Experts en manœuvres subtiles et intrigues de cour, cette culture préfère utiliser sa ruse et ses tractations en coulisses pour parvenir à ses fins."
