l_french:

 tradition_hadorim_forest_wardens_name: "Gardiens de la Forêt"
 tradition_hadorim_forest_wardens_desc: "Cette culture excelle dans l'art des bois, formant ses enfants à parcourir les sombres forêts sans être vus et à traquer toutes sortes de créatures malfaisantes."
 culture_parameter_unlock_maa_hadorim_forest_wardens: "Peut recruter des [GetMaA('hadorim_forest_wardens').GetName] comme [men_at_arms|El]"

 unlock_maa_eorlingas_warriors: "Peut recruter des [GetMaA('eorlingas_warriors').GetName] comme [men_at_arms|El]"

 tradition_abrakhan_magic_cities_name: "Cités Enchantées d'Abrakhân"
 tradition_abrakhan_magic_cities_desc: "Qualifiées de magiques, les cités pûstic des déserts rouges du Dârsalan extraient l'eau des profondeurs souterraines à une échelle industrielle."

 tradition_protectors_of_the_deep_name: "Protecteurs des Profondeurs"
 tradition_protectors_of_the_deep_desc: "Défenseurs des antiques profondeurs du [GetTitleByKey('c_helmsdeep').GetNameNoTier], cette culture est aussi inébranlable que les montagnes qui encerclent leur forteresse."
 culture_in_westfold_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('custom_westmark').GetName]"
 unlock_maa_westfolders: "Peut recruter des [GetMaA('westfolders').GetName] comme [men_at_arms|El]"

 culture_parameter_unlock_maa_guard_of_abrakhan: "Peut recruter des [GetMaA('guard_of_abrakhan').GetName] comme [men_at_arms|El]"
 culture_parameter_unlock_maa_risen_carrion: "Peut recruter des [GetMaA('risen_carrion').GetName] comme [men_at_arms|El]"
 culture_parameter_city_holding_fort_level_in_red_desert_bonus: "[fort_level|E] pour les [cities|E] en [terrain|El] de Collines désertiques : [fort_level_i]#P +[EmptyScope.ScriptValue('castle_holding_fort_level_in_jungle_bonus_value')|0]#!"
 culture_parameter_castle_holding_fort_level_in_red_desert_bonus: "[fort_level|E] pour les [castles|E] en [terrain|El] de Collines désertiques : [fort_level_i]#P +[EmptyScope.ScriptValue('castle_holding_fort_level_in_jungle_bonus_value')|0]#!"
 #tradition_dune_sea_warfare_name: "Dune Sea Warfare"
 #tradition_dune_sea_warfare_desc: "The people of the Dune Sea have adapted to the pressures of the inhospitable desert and blazing sun, fielding small and nimble units who know how to use the terrain to their advantage, striking and then fading away..."
 #culture_parameter_unlock_maa_hasharin: "Can recruit [GetMaA('hasharin').GetName] as [men_at_arms|E]"
 #culture_parameter_unlock_maa_desert_screamers: "Can recruit [GetMaA('desert_screamers').GetName] as [men_at_arms|E]"
 #culture_parameter_unlock_maa_giant_scorpions: "Can recruit [GetMaA('giant_scorpions').GetName] as [men_at_arms|E]"

 appoint_oligarch_interaction: "Nommer un Intendant Oligarchique"
 appoint_oligarch_desc: "Désigner [recipient.GetShortUINameNoTooltip] pour superviser la cité florissante de [recipient.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], faisant de cette personne un vassal Oligarque."

 tradition_legendary_artisans_name: "Artisans Légendaires"
 tradition_legendary_artisans_desc: "Les artisans de cette culture sont d'une habileté sans égale, capables de produire des artefacts rares et merveilleux."
 culture_parameter_legendary_inspiration: "Les Artisans et Forgerons sont d'un talent extraordinaire"

 tradition_conservative_name: "Culture Conservatrice"
 tradition_conservative_desc: "Cette culture s'accroche fermement à ses traditions, demeurant constante tandis que tout change autour d'elle."

 ## Hobbits ##
 tradition_hobbit_feasts_name: "Festins Hobbits"
 tradition_hobbit_feasts_desc: "Peuple simple et honnête, les [hobbits|E] consacrent une bonne part de leur temps libre aux festins et aux fêtes, savourant les fruits de leurs abondantes récoltes. Leur existence paisible leur laisse tout le loisir de profiter du labeur de leurs mains."
 tradition_hobbit_feasts_inspiration: "Les Hobbits mangent beaucoup et sont indolents"
 culture_parameter_lazy_trait_more_common: "Le [trait|E] [GetTrait('lazy').GetName( GetNullCharacter )] est plus répandu"
 culture_parameter_gluttonous_trait_more_common: "Le [trait|E] [GetTrait('gluttonous').GetName( GetNullCharacter )] est plus répandu"
 tradition_hobbit_parochialism_name: "Particularisme Hobbit"
 tradition_hobbit_parochialism_desc: "Peuple aux opinions bien arrêtées, gouverné autant par les usages que par la loi écrite, les [hobbits|E] laissent volontiers la gestion quotidienne aux notables locaux. Leur philosophie est de ne point faire de vagues ni troubler l'ordre établi, mais plutôt de veiller à ce que la société demeure stable et paisible."
 tradition_hobbit_parochialism_inspiration: "Les Hobbits n'aiment guère écouter leurs suzerains"

 ## Hobbit MAA ##
 hobbit_bounders: "Garde-frontières"
 hobbit_bounders_flavor: "Les confins sauvages de [shire|E] sont surveillés par ces distingués [hobbits|E]. Les Garde-frontières préfèrent un solide bâton de marche, une cape bien chaude, un chien ou deux, de l'herbe à pipe et une tranche de gâteau pour la route plutôt que de véritables armes. Lorsque les ténèbres s'amassent aux frontières et que d'étranges gens rôdent, leurs rangs grossissent car les braves habitants de [shire|E] veillent au maintien de l'ordre."
 hobbit_muster: "Levée"
 hobbit_muster_flavor: "Tirés des champs labourés et des jardins tranquilles de la contrée, ces [hobbits|E] ne sont point soldats de métier, mais fermiers et jardiniers qui brandissent houes, bêches et fourches en guise de lances improvisées quand le danger approche. Peu entraînés mais nullement dépourvus de résolution, ils défendent leurs villages avec le même soin obstiné qu'ils accordent à leurs champs."
 hobbit_hunters: "Chasseurs"
 hobbit_hunters_flavor: "Bien exercés au maniement de l'arc, ces [hobbits|E], lorsqu'ils ne garnissent pas la table de leurs parents affamés, œuvrent avec les Garde-frontières pour empêcher les bêtes dangereuses et les malfaiteurs de pénétrer dans les Quartiers."

 ## Hobbit MAA Decision ##
 hobbit_first_bounders_troop: "Première Troupe des Garde-frontières"
 hobbit_first_bounders_troop_flavor: "La Première Troupe des Garde-frontières est un corps discipliné et mieux équipé, composé des guetteurs [hobbits|E] les plus expérimentés de [shire|E]. Vêtus de solides justaucorps de cuir et armés de gourdins et de petits boucliers, ces Garde-frontières constituent désormais une première ligne de défense professionnelle contre toute menace rampant vers la contrée."
 #hobbit_first_bounders_troop_flavor: "The First Bounders Troop are a disciplined and better-equipped corps drawn from the [shire|E]'s most experienced [hobbit|E] watchers. Outfitted with sturdy leather jerkins, clubs, and small shields, they patrol the borders in organized companies. Though they still prize vigilance, courtesy, and local knowledge, these Bounders now stand as a professional first line of defense against any threat creeping into the region."
 hobbit_hedgewardens: "Gardiens des Haies"
 hobbit_hedgewardens_flavor: "Les Gardiens des Haies sont une petite milice recrutée principalement parmi les [hobbits|E] tenanciers de [shire|E]. Modestement mais solidement équipés, ces Gardiens des Haies sont les défenseurs constants et autochtones des villages et des récoltes."
 #hobbit_hedgewardens_flavor: "The Hedgewardens are a small militia drawn mostly from the [shire|E]'s smallholding [hobbit|E] farmers. Clad in plain, durable garments and armed with short spears and simple shields, they patrol hedgerows and lanes. Modestly but soundly equipped, the Hedgewardens are the steady, homegrown defenders of village and harvest."
 hobbit_pony_riders: "Cavaliers à Poney"
 hobbit_pony_riders_flavor: "Un petit corps de [hobbit|E] monté sur un poney, habile tant à la fronde qu'à l'arc court. Ils préfèrent un équipement de cuir léger, des poneys endurants élevés pour leur résistance, et des tactiques leur permettant de se fondre aussi vite que possible dans les haies et les vergers."
 #hobbit_pony_riders_flavor: "A small corps of [hobbits|E] mounted on ponies, skilled in both sling and shortbow. Unobtrusive by nature, they serve as the [shire|E]'s quiet guardians: scouting lanes, warning villages of strangers, and harrying any would-be raiders with swift, precise skirmishes rather than open battle. They favour light leather gear, steady ponies bred for stamina, and tactics that let them melt back into hedgerows and orchards as quickly as possible."

 ## Bree MAA ##
 merchant_heavy_infantry: "Milice Marchande"
 merchant_heavy_infantry_flavor: "Allant de ruffians endurcis et mercenaires à des fermiers et journaliers enrôlés de force. Leur compétence en pâtit, certes, mais leur armure et leur solde plus que généreuse leur permettent de tenir la ligne mieux que beaucoup ne l'attendraient."

 ### Cultural Traditions ###
 tradition_slave_society_name: "Société Esclavagiste"
 tradition_slave_society_desc: "Cette culture ne voit rien de mal dans la pratique de l'esclavage et, de fait, commerce et guerroie pour en acquérir. Les raids sur les voisins sont monnaie courante, en quête de sang neuf pour travailler aux ouvrages publics et dans les champs."
 culture_parameter_can_launch_slave_expeditions: "Donne accès au CB [slave_expedition|E]"
 culture_bellicose: "Cette [culture|El] ne possède pas l'[ethos|E] $ethos_bellicose_name$"

 tradition_elf_friends_name: "Amis des Elfes"
 tradition_elf_friends_desc: "Cette culture possède une longue histoire de relations amicales avec les [elves|E]."

 tradition_orcish_society_name: "Société Orque"
 tradition_orcish_society_desc: "Brutale, grossière et éphémère — voilà qui résume bien la « civilisation » que bâtissent les [orcs|E]. Ils se font la guerre entre eux aussi souvent qu'aux autres, pillant et poignardant les leurs aussi librement que les étrangers. Si les Orques sont brutaux et rusés à parts égales, ils sont aussi irrationnels, à courte vue et cupides. Il est rare de les voir s'unir pour quelque dessein supérieur, et quand cela arrive, ce n'est jamais pour longtemps."

 ### Regional Traditions ###
 tradition_riders_of_the_mark_name: "Cavaliers de la Marche"
 tradition_riders_of_the_mark_desc: "Les Seigneurs des Chevaux de l'Éothéod et les Rohirrim portent un héritage sans égal dans les Terres de l'Ouest en tant qu'éleveurs et dompteurs de chevaux. Leur cavalerie est sans pareille sur le champ de bataille, et leurs commandants ne connaissent guère de rivaux dans les plaines ouvertes."

 tradition_a_people_reunited_name: "Un Peuple Réunifié"
 tradition_a_people_reunited_desc: "Jadis séparés, désormais réunifiés, les Seigneurs des Chevaux de l'Éothéod portent un long héritage sans égal dans les Terres de l'Ouest en tant qu'éleveurs et dompteurs de chevaux. Leur cavalerie est sans pareille sur le champ de bataille, et leurs commandants ne connaissent guère de rivaux dans les plaines ouvertes."
 culture_parameter_unlock_maa_eotheod_vanguard: "Peut recruter des [GetMaA('eotheod_vanguard').GetName] comme [men_at_arms|El]"

 tradition_a_scattered_people_name: "Un Peuple Dispersé"
 tradition_a_scattered_people_desc: "Depuis la chute du [rhovanion_kingdom|E], ce peuple a été dispersé et privé de véritable guide. Désormais divisé en de nombreux petits clans et repoussé aux confins des Terres Sauvages, il faudra un effort considérable pour les réunir à nouveau."
 culture_parameter_unlock_maa_rhovanion_freemen: "Peut recruter des [GetMaA('rhovanion_freemen').GetName] comme [men_at_arms|El]"
 rhovanion_freemen: "Hommes Libres du Rhovanion"
 rhovanion_freemen_flavor: "Les rudes hommes libres du [rhovanion|E] ont lutté pendant d'innombrables générations contre ceux qui pillent les vastes plaines qu'ils appellent leur foyer, et se battent avec une férocité redoutable."

 tradition_a_people_reforged_name: "Un Peuple Reforgé"
 tradition_a_people_reforged_desc: "Sous une direction vaillante, ce peuple jadis divisé fut réunifié sous les auspices d'un [rhovanion_kingdom|E] renouvelé. Désormais à nouveau liés par les liens du sang et de la fraternité, ils cherchent à forger leur destin à neuf."
 culture_parameter_unlock_maa_rhovanion_light_cavalry: "Peut recruter des [GetMaA('rhovanion_light_cavalry').GetName] comme [men_at_arms|El]"
 rhovanion_light_cavalry: "Cavaliers du Rhovanion"
 rhovanion_light_cavalry_flavor: "Dans les plaines du [rhovanion|E], monter à cheval est rarement un choix. C'est souvent une nécessité, et en temps de troubles, cela peut mener à la levée de grandes armées de cavaliers."

 tradition_the_people_of_the_plains_name: "Peuple des Plaines"
 tradition_the_people_of_the_plains_desc: "Ne faisant qu'un avec les plaines sauvages et balayées par les vents du [rhovanion|E], cette culture est aussi nombreuse que les brins d'herbe, fière et libre, déterminée à ne plus jamais subir les terribles chutes du passé."
 culture_parameter_unlock_maa_rhovanion_heavy_cavalry: "Peut recruter des [GetMaA('rhovanion_heavy_cavalry').GetName] comme [men_at_arms|El]"
 rhovanion_heavy_cavalry: "Cavalerie Aivathuida"
 rhovanion_heavy_cavalry_flavor: "Le clan Aivathuida a toujours compté les plus grands cavaliers parmi les [northmen|E] du [rhovanion|E], et l'on dit de leurs montures qu'elles sont rapides comme le vent, ne faisant qu'un avec leur cavalier."
 rhovanion_royal_guard: "Garde Royale du Rhovanion"
 rhovanion_royal_guard_flavor: "Boucliers loyaux des Rois du [rhovanion|E], la Garde Royale porte armures et armes forgées par des forgerons [dwarven|E], formant l'élite de l'infanterie du royaume."

 tradition_the_people_of_the_plains_old_name: "Peuple des Plaines"
 tradition_the_people_of_the_plains_old_desc: "Ne faisant qu'un avec les plaines sauvages et balayées par les vents du [rhovanion|E], cette culture est aussi nombreuse que les brins d'herbe, fière et libre. Nés pour chevaucher, ses membres ne font qu'un avec leurs nobles montures, parcourant les vastes plaines ouvertes."
 culture_in_rhovanion_desc: "Au moins #V 60 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('custom_plains_rhovanion').GetName]"

 tradition_defended_enclosures_name: "Enclos Fortifiés"
 tradition_defended_enclosures_desc: "Les Hommes du Val, également connus sous le nom d'Hommes de l'[anduin|E], vivent dans des enclos dispersés mais bien défendus tout le long du fleuve Anduin, près des bois ou sur les contreforts des [mistymountains|E]."
 culture_in_anduin_desc: "Au moins #V 60 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_west_rhovanion_anduin').GetName]"

 tradition_dale_bow_culture_name: "Peuple de l'Arc"
 tradition_dale_bow_culture_desc: "Bien avant que Bard ne brandit la Flèche Noire, les [northmen|E] du haut Celduin étaient avant tout des archers. D'abord pour chasser afin de subsister, puis pour se défendre, la maîtrise de l'arc et de la chasse est considérée comme une tradition de haut honneur parmi les habitants du Val."
 culture_in_dalelands_desc: "Au moins #V 60 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_west_rhovanion_dalelands').GetName]"

 tradition_warriors_of_fame_and_field_name: "Guerriers de Renom et de Labeur"
 tradition_warriors_of_fame_and_field_desc: "Les troupes des Dorwinrim reflètent la nature diverse de leur société, mobilisant le meilleur de leur richesse, de leur noblesse et du peuple contre leurs ennemis."
 culture_in_dorwinion_desc: "Au moins #V 60 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_west_rhovanion_dorwinion').GetName]"

 culture_parameter_unlock_maa_vintner_court_knights: "Peut recruter des [GetMaA('vintner_court_knights').GetName] comme [men_at_arms|El]"
 culture_parameter_unlock_maa_thorn_guard: "Peut recruter des [GetMaA('thorn_guard').GetName] comme [men_at_arms|El]"
 culture_parameter_unlock_maa_vineyard_bowmen: "Peut recruter des [GetMaA('vineyard_bowmen').GetName] comme [men_at_arms|El]"

 tradition_hidden_refuges_name: "Refuges Secrets"
 tradition_hidden_refuges_desc: "Les Hommes des Bois bâtissent leurs bourgs sur de grandes plates-formes dans les arbres. Cette innovation architecturale leur offre une certaine protection contre les périls de [mirkwood|E]."
 culture_in_forest_more_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent avoir un terrain de Forêt, Forêt Profonde, Forêt de Mallornes ou Taïga"

 tradition_prized_perfection_name: "Perfection Vénérée"
 tradition_prized_perfection_desc: "Dans cette culture, la forme physique est considérée comme un symbole de sa propre culture, de sa lignée et de sa bonne naissance. Ceux qui ont été défigurés ou autrement malformés physiquement ne sont pas éligibles à hériter de hauts rangs, lesquels reviennent de droit aux seuls exemplaires de leur race."

 tradition_tales_of_great_deeds_name: "Récits des Hauts Faits"
 tradition_tales_of_great_deeds_desc: "Cette culture se souvient et célèbre les actes vaillants de héros tels que Beren Erchamion, Túrin Turambar et Tuor le Béni, les grands héros des [men|E] qui résistèrent à l'Ombre de toutes leurs forces. Ils demeurent un exemple éclatant de vaillance face à des obstacles insurmontables."

 tradition_greatswords_name: "Grandes Épées"
 tradition_greatswords_desc: "Cette culture possède une tradition de maniement de grandes épées capables de pourfendre un homme — ou un cheval — en deux. L'art de les porter se transmet souvent de père en fils, les lames devenant de précieux héritages familiaux dont l'histoire est aussi riche que celle de leurs porteurs."

 tradition_mountain_ruralism_name: "Ruralité Montagnarde"
 tradition_mountain_ruralism_desc: "Depuis les jours où les [daen|E] pénétrèrent dans les terres du futur [gondor|E] et du Harondor, la plupart des membres de cette culture savent non seulement parcourir les terres rocailleuses, mais aussi vivre aisément en montagne."

 tradition_dune_sea_nomads_name: "Nomades de la Mer de Dunes"
 tradition_dune_sea_nomads_desc: "Traverser les sables brûlants de la Mer de Dunes n'est point tâche aisée, mais cette culture s'est depuis longtemps adaptée à l'épreuve du soleil implacable, et sait arracher un semblant de prospérité à ce milieu impitoyable."

 tradition_trans_haradric_traders_name: "Or, Sel et Épices"
 tradition_trans_haradric_traders_desc: "Les membres de cette culture sont profondément impliqués dans le réseau du [trans_haradric_trade|E] de l'intérieur du [harad|E]. Quel que soit leur rôle dans ce commerce, ils sont des acteurs majeurs des réseaux commerciaux, politiques et culturels qui entourent [GetGeographicalRegion('middleearth_harad_dunesea').GetName], et sont réputés pour négocier l'or, les épices, le sel, les esclaves et d'autres denrées."
 culture_parameter_unlock_trans_haradric_travel_option: "Débloque l'[travel_option|E] [GetTravelOption('trans_haradric_merchants_option').GetName]"
 culture_parameter_unlock_trans_haradric_merchant_decision: "$innovation_unlock_trans_haradric_networking_tt$"
 culture_parameter_unlock_trans_haradric_merchant_better_chances: "$lotr_haradrim_legacy_1_effect_1$"

 tradition_masters_of_the_nuar_name: "Maîtres du Núar"
 tradition_masters_of_the_nuar_desc: "La civilisation de cette culture a toujours été étroitement liée au fleuve Núar et à ses affluents, qu'ils naviguent et pêchent. De ce fait, ils possèdent une compréhension naturelle de son comportement et de ses « humeurs ». Cette connexion est si profonde que les mariniers s'adressent couramment au Núar directement, comme à un vieil ami, lui confiant leur vie quotidienne et les récents événements."
 culture_in_harshandatt_trigger_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans [GetGeographicalRegion('special_region_nuar_river_valley').GetName]"

 tradition_mud_masons_name: "Maçonnerie de Terre"
 tradition_mud_masons_desc: "Les [mud_masons|E] de cette culture sont renommés pour construire une architecture élaborée à partir de terre. Ils sont organisés en guildes à la structure hiérarchique complexe, qui veillent au respect des rituels religieux traditionnels associés à leur travail et s'assurent que leurs antiques techniques de maçonnerie se transmettent de génération en génération selon les règles de l'art."
 culture_parameter_unlock_mud_mason_decision: "Débloque la [decision|El] #V Employer des [mud_masons|E] Sîrayni#! pour réduire davantage le coût et le temps de construction des [buildings|El], pour ceux qui appartiennent à cette [culture|El] ou règnent sur des [counties|El] de cette [culture|El]"

 culture_in_central_fiefs_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_west_gondor_centralfiefdoms').GetName]"
 tradition_belfalathrim_chivalry_name: "Chevalerie des Belfalathrim"
 tradition_belfalathrim_chivalry_desc: "Depuis des temps anciens, les [men|E] de Belfalas se distinguent par leur tradition et leur courtoisie parmi les [dunedain|E] du Sud. Honneur, noblesse, devoir — et grande habileté à cheval."

 ### Dunedain Traditions ###
 culture_in_gondor_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_west_gondor').GetName]"
 tradition_gondorian_legacy_name: "Héritage du Sud-Royaume"
 tradition_gondorian_legacy_desc: "Cette culture est imprégnée des traditions du [gondor|E], royaume méridional d'[elendil|E]. On disait jadis que telle était la prospérité du Gondor que les pierres précieuses n'étaient que jouets pour ses enfants."

 culture_in_ithilien_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_west_gondor_ithilien').GetName]"
 tradition_ithilien_subterfuge_name: "Subterfuge d'Ithilien"
 tradition_ithilien_subterfuge_desc: "L'Ithilien est une terre ravagée et pillée par les raids incessants des [orc|E] et les guerres venues du [mordor|E]. De ce fait, ceux qui y sont demeurés ont appris à se défendre farouchement dans les bois, attendant le jour où leur patrie pourra être pleinement reconquise."

 culture_in_middleearth_west_gondor_highlands_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_west_gondor_highlands').GetName]"
 tradition_gondor_clans_name: "Clans du Gondor"
 tradition_gondor_clans_desc: "Les membres des clans du [gondor|E] reçurent le droit de lever leurs propres troupes au lieu de servir dans l'armée du Royaume. En vertu de cette coutume, chaque clan entraîne et équipe ses propres guerriers, qui rejoignent les forces du Gondor en temps de besoin."

 culture_in_harondor_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_harad_near_harondor').GetName]"
 tradition_harondorim_resilience_name: "Résilience du Harondor"
 tradition_harondorim_resilience_desc: "Le Harondor a été disputé pendant d'innombrables générations entre les [haradrim|E], les Corsaires et les [dunedain|E]. Ceux des Dúnedain qui habitent encore cette terre rocailleuse sont devenus endurcis et farouchement indépendants, car ils doivent souvent tenir seuls sans aide du [gondor|E]. Que ce soit dans les collines ou sur la côte, ils tiendront et défendront leurs foyers jusqu'au dernier souffle."

 culture_in_arnor_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_west_arnor').GetName]"
 tradition_arnorian_legacy_name: "Héritage du Nord-Royaume"
 tradition_arnorian_legacy_desc: "Cette culture est imprégnée des traditions de l'[arnor|E], royaume septentrional d'[elendil|E]. Les [dunedainarnor|E] étaient de haute lignée et noblesse, amis des [eldar|E], quoique moins nombreux."

 tradition_arnorian_law_name: "Héritage Juridique Arnorien"
 tradition_arnorian_law_desc: "Cette culture a hérité du code juridique [arnorian|E]. Bien qu'elle ne l'utilise peut-être pas exclusivement, ou l'ait combiné avec d'autres traditions légales, il demeure une pierre angulaire de ses traditions et systèmes juridiques."

 tradition_wanderers_of_the_wild_name: "Errants des Terres Sauvages"
 tradition_wanderers_of_the_wild_desc: "Cette culture est habituée à parcourir les terres sauvages impitoyables pendant de longues périodes. Ses membres sont à la fois pisteurs experts et insaisissables comme des ombres."

 culture_in_umbar_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_harad_near_umbar').GetName]"
 tradition_dunedain_of_umbar_name: "Dúnedain d'Umbar"
 tradition_dunedain_of_umbar_desc: "Les [dunedain|E] d'[umbar|E], également appelés Umbaredain, sont un mélange singulier de traditions et croyances [adunaic|E] et [dunedain|E], alliant l'arrogance et la fierté des premières à la sagesse et la foi des secondes."

### Harad Traditions ###
 culture_in_bellakar_desc: "Au moins #V 40 %#! des [counties|El] de cette [culture|El] doivent se trouver dans la [region|E] [GetGeographicalRegion('middleearth_harad_far_bellakar').GetName]"
 tradition_bellakarean_cities_name: "Cités Bellakaréennes"
 tradition_bellakarean_cities_desc: "Les cités du [bellakar|E] sont nombreuses, chacune portant sa propre histoire et son propre héritage. De l'Ûrêzâyan dorée à la fière Korlea, du Joyau d'Argent de Nîlûlondê à la pieuse Hazaj Tollin, chaque cité possède son caractère et ses lois remontant au [secondage|E], et chacune garde jalousement ses intérêts. Une forte tradition d'autonomie juridique, culturelle et politique est profondément tissée dans la trame même de l'ethos bellakaréen."
 culture_parameter_capital_castles_more_like_cities: "Les [castle_holdings|El] de cette culture ont un [fort_level|E] réduit, mais génèrent plus de [taxes|E] et de [levies|E] en [terrain|El] de Terres arables et Plaines inondables"

 tradition_bellakar_succession_name: "Loi d'Êrukhôr"
 tradition_bellakar_succession_desc: "Avant sa mort prématurée, [GetScriptedCharacterByHistoryID( 'lineoftumakveh68' ).GetFirstNameNicknamed] modifia fondamentalement et irrévocablement les lois du [bellakar|E]. Désirant que sa sœur hérite du trône plutôt qu'un prétendant de l'[anbalkumagan|E], il défendit sa cause en invoquant l'antique droit [numenorean|E], le précédent établi par [GetScriptedCharacterByHistoryID( 'lineofelros6' ).GetNameNicknamed], et les traditions matriarcales des [haradrim|E]. De ces exemples, il argumenta que les femmes devaient être autorisées à hériter de la couronne.\n\nÀ travers une série de conseils avec les seigneurs du [bellakar|E], [GetScriptedCharacterByHistoryID( 'lineoftumakveh68' ).GetFirstName] réussit à promulguer des réformes radicales du droit successoral [bellakari|E]. Les femmes furent non seulement autorisées à revendiquer le trône, mais également déclarées égales en droit à leurs homologues masculins. Cette décision stupéfia le royaume et le plongea dans une crise de succession.\n\nPourtant, au fil des siècles, ce qui devint la Loi d'Êrukhôr fut largement accepté tant par les nobles que par le peuple. Si de nombreux titres mineurs du royaume s'accrochent encore aux traditions de préférence masculine, la couronne du [bellakar|E] se conforme désormais pleinement à sa réforme."

 tradition_bellakarean_soldiers_name: "Réformes de Zimrêbal"
 tradition_bellakarean_soldiers_desc: "[zimrebal_long|E], premier Roi du [bellakar|E] et fondateur des Tumakveh, remodela fondamentalement l'appareil militaire du Royaume. Durant la crise de la Première Invasion Tedjin, il introduisit une série de réformes radicales touchant à l'administration et à la levée de l'ost [bellakari|E], mesures qui restèrent collectivement dans les mémoires sous le nom de Réformes de Zimrêbal.\n\nCes réformes centralisèrent l'autorité sur les forces disparates de l'ancienne colonie [numenorean|E], retirant le pouvoir aux cités individuelles pour le placer entre les mains du Roi et de la bureaucratie de Nîlûlondê. Zimrêbal investit également massivement dans l'industrie de l'armement, établit des divisions professionnelles et conçut de nouvelles méthodes de recrutement, cherchant à forger une force disciplinée, standardisée et adaptable.\n\nLes réformes se révélèrent largement couronnées de succès. Elles permirent au [bellakar|E] de remporter la victoire lors de la Première Invasion Tedjin et demeurent, pour l'essentiel, le fondement de l'armée du [bellakar|E] à ce jour. Grâce à elles, le Royaume jouit d'une capacité de combat bien supérieure et peut mobiliser ses provinces avec une facilité accrue."

 tradition_corsairs_of_umbar_name: "Corsaires de la Grande Mer"
 tradition_corsairs_of_umbar_desc: "Depuis d'innombrables générations, ce peuple harcèle le commerce de la [greatsea|E] et lance des expéditions qui ont pillé et incendié maintes belles villes et ports. Ils sont ainsi connus à travers le nord de la [middleearth|E] sous le simple nom de « les Corsaires »."
 culture_parameter_can_traverse_major_river: "Débloque la capacité de naviguer sur les grands fleuves"

 tradition_laws_of_umbar_name: "Lois d'Umbar"
 tradition_laws_of_umbar_desc: "Le peuple d'[umbar|E] a été gouverné par bien des seigneurs et royaumes au fil du temps, et de chacun il a appris et s'est adapté. Ainsi, les lois d'Umbar sont un mélange byzantin d'antiques traditions [haradrim|E], de codes [gondorian|E] et de statuts [adunaic|E], déconcertant tout étranger qui cherche à les comprendre. Cependant, elles servent bien cette culture, et les habitants d'Umbar continueront de chérir leurs traditions juridiques uniques."
 culture_parameter_internal_wars_always_allowed: "Les [vassals|El] de cette [culture|El] peuvent toujours déclarer la [war|El], quelle que soit l'[crown_authority|El] ou les [laws|El] de leur [liege|El]."
 culture_parameter_can_always_convert_to_feudal: "Les [rulers|E] de cette [culture|El] ont toujours accès à une [decision|El] pour adopter le [government|El] [feudal|E]."
 culture_parameter_can_unlock_single_heir_succession_law: "Peut promulguer la [law|El] $single_heir_succession_law$."


 tradition_warriors_of_rhun_name: "Culture Mercenaire Orientale"
 tradition_warriors_of_rhun_desc: "Souvent divisés, les Orientaux de la [seaofrhun|E] intérieure et des plaines de la [middleearth|E] ont développé une culture qui fait proliférer les compagnies de mercenaires. L'or rapporté par ces guerriers contribue à faire vivre de nombreuses communautés et a fait pencher la balance dans maintes guerres. Mais ces mêmes mercenaires ne sont pas dénués de fierté, et combattront plus volontiers pour leur propre peuple que pour un autre, même à moindre solde."
 culture_parameter_unlock_maa_easterling_kataphrakt: "Peut recruter des [GetMaA('easterling_kataphrakt').GetName] comme [men_at_arms|El]"
 culture_parameter_unlock_maa_easterling_swordsmen: "Peut recruter des [GetMaA('easterling_swordsmen').GetName] comme [men_at_arms|El]"
 culture_parameter_unlock_maa_easterling_pikemen: "Peut recruter des [GetMaA('easterling_pikemen').GetName] comme [men_at_arms|El]"

 tradition_gorgoroth_plain_dwellers_name: "Habitants des Plaines de Gorgoroth"
 tradition_gorgoroth_plain_dwellers_desc: "Ce plateau sec, volcanique et désolé forme le tiers nord-ouest du [mordor|E] et est bordé par les chaînes de l'Ered Lithui et de l'Ephel Dúath. Le paysage de Gorgoroth pourrait aussi bien être un monde entièrement différent de ses terres voisines, comme l'Ithilien. Son terrain n'est hospitalier qu'aux [orcs|E] qui peuplent ses plaines."

 tradition_mende_anduya_name: "Mendë Andúna"
 tradition_mende_anduya_desc: "« Qu'est-ce qu'un [dunedain|E] ? Qu'est-ce qui fait un [numenorean|E] ? »\n\nCette question a souvent consumé les [realms_in_exile|E]. Est-ce quelque chose de culturel ? Est-ce transmis par le sang ? La réponse a varié selon les époques et les lieux, mais il demeure que le désir de préserver intactes les anciennes voies de [numenor|E] est profondément ancré dans cette culture. Ils ne se marient guère en dehors de leur propre culture, préférant renforcer et perpétuer leur antique héritage."
 culture_parameter_dislikes_marrying_outside_of_cultural_heritage: "Modificateur d'acceptation de [marriage|E] envers tout autre [heritage|E] [cultural|E] : #N -75#!"
 culture_parameter_ai_doesnt_marry_outside_cultural_heritage: "Très peu enclin à arranger des [marriages|E] en dehors de son propre [heritage|E] [cultural|E]"
 TRADITION_PENALTY_DUNEDAIN: "[heritage|E] [cultural|E] différent : $VALUE|+=0$"

 tradition_blacknumenorean_legacy_name: "Héritage Númenóréen Noir"
 tradition_blacknumenorean_legacy_desc: "Les [black_numenoreans|E], initialement simplement appelés les [kingsmen|E], étaient un groupe déchu de [numenoreans|E] descendant de ceux qui étaient loyaux au Sceptre Númenóréen mais s'opposaient aux [valargods|E] et aux relations avec les [elves|E]. Ils se répandirent dans leurs colonies sur le continent de la [middleearth|E] et devinrent de cruels oppresseurs et suzerains des peuples conquis, qu'ils considéraient comme primitifs. Certains de ces Hommes du Roi d'antan qui, en colonisant le continent, survécurent à la [downfallofnumenor|E] seraient désormais appelés Númenóréens Noirs."

 tradition_anbalukkhori_name: "Suprématie Anbalûkkhorî"
 tradition_anbalukkhori_desc: "Les Anbalûkkhorî sont destinés à régner tant sur les [adunai|E] que sur les [Glossary('Mîyanâi','miyanai_gloss')], et régner ils feront, quel qu'en soit le prix."

 tradition_kharadunai_name: "Suprématie Kharadûnaïque"
 tradition_kharadunai_desc: "Cette culture estime que chaque homme a sa place. Il est simplement dans la nature des choses que la place des [adunai|E] soit au sommet."

 tradition_bellakarani_sophistication_name: "Raffinement Bellakarani"
 tradition_bellakarani_sophistication_desc: "Aux premiers temps du [bellakar|E], la Colonie Dorée se dressait comme le cœur de la colonisation [numenorean|E] et de la vie de cour sur le continent. Bien que moins densément peuplé que les terres de la Ligue de Pelargir au nord, le [bellakar|E], grâce à sa position centrale en [middleearth|E], s'éleva rapidement en importance, opulence et prestige. Les traditions de cour et les rivalités complexes fleurirent bientôt, et les palais d'Ûrêzâyan et de Korlea devinrent les centres par excellence de richesse et de grandeur parmi les colonies [numenorean|E]. Les terres Bellakarani acquirent la renommée de lieux où l'on dressait les festins les plus somptueux et versait les vins les plus fins, privilèges réservés aux seuls personnages du plus haut rang.\n\nCette culture du raffinement et de la haute condition survécut à l'[akallabeth|E], bien que grandement diminuée, perdurant dans maintes grandes cités du Royaume, surtout à Korlea. Ceux qui survécurent à la [downfall|E] travaillèrent sans relâche pour préserver la façade de force et de dignité [numenorean|E]. Pourtant, au fil des longues années du [thirdage|E], cette façade s'effrita morceau par morceau."
 culture_parameter_dislikes_marrying_outside_of_cultural_heritage_lesser: "Modificateur d'acceptation de [marriage|E] envers tout autre [heritage|E] [cultural|E] : #N -25#!"
 TRADITION_PENALTY_BELLAKARANI: "[heritage|E] [cultural|E] différent : $VALUE|+=0$"

 tradition_azralai_name: "Héritage de la Flotte de l'Est"
 tradition_azralai_desc: "La Flotte de l'Est mouillait jadis ici en Anarikê, ses fiers navires ayant ces rivages pour port d'attache. Pour beaucoup, la vie se passait sur les flots ; pour d'autres, elle s'écoulait dans les cales sèches, à entretenir les havres ou à travailler les champs pour satisfaire l'appétit incessant de la Flotte en provisions et marchandises. Bien que les grandes voiles de la Flotte aient depuis longtemps disparu par-delà l'horizon, leur héritage perdure. La Mer façonne encore l'âme d'Anarikê, ses rythmes, ses labeurs et ses rêves. L'exploration, la navigation et le commerce demeurent le sang vital des [adunai|E] de l'Est, écho des jours où la marée elle-même portait la volonté de [numenor|E]."

 tradition_variag_horse_lords_name: "Seigneurs des Chevaux Variags"
 tradition_variag_horse_lords_desc: "Dans le centre de la [middleearth|E], nul ne peut contester les Variags en matière de cheval et de bride. Près et loin, ils mènent des guerres de pillage et de conquête, rapportant richesses au pays."
 culture_parameter_unlock_maa_variag_horse_archers: "Peut recruter des [GetMaA('variag_horse_archers').GetName] comme [men_at_arms|El]"
 culture_parameter_unlock_maa_windriders_of_khand: "Peut recruter des [GetMaA('windriders_of_khand').GetName] comme [men_at_arms|El]"
 culture_parameter_unlock_maa_variag_axemen: "Peut recruter des [GetMaA('variag_axemen').GetName] comme [men_at_arms|El]"
 culture_parameter_unlock_maa_variag_pikemen: "Peut recruter des [GetMaA('variag_pikemen').GetName] comme [men_at_arms|El]"

 tradition_variag_succession_name: "Succession Variag"
 tradition_variag_succession_desc: "Chez les Variags du [khand|E], les serments sont prêtés aux individus, non aux [dynasties|El]. Ce qui est juré au père n'est pas transféré inconditionnellement au fils, mais doit être mérité à nouveau par lui. De ce fait, il est rare qu'un fils hérite du royaume entier de son père. Parallèlement, les Variags respectent la force, quel que soit l'âge, et une fois gagnés, sont de loyaux [vassals|El]... bien qu'ils puissent intriguer dans le dos de leur [liege|El]."
 culture_parameter_realms_shatter_on_succession: "À la [succession|El], tout [vassal|El] ayant une [opinion|El] #N Négative#! de votre [player_heir|El] deviendra un [independent_ruler|El]."
 culture_parameter_realms_destroyed_on_succession: "Après la [succession|El], si tout [title|El] de [kingdom|E] ou d'[empire|E] détenu contient #V moins de 50 %#! de ses [counties|El] [de_jure|El], il sera détruit."
 culture_parameter_can_designate_heir: "Les souverains peuvent désigner leur [heir|E]"
 culture_parameter_cannot_convert_to_local_culture: "Ne peut pas se convertir à une [culture|El] locale"
 culture_parameter_cannot_hybridize: "Cette [culture|El] ne peut pas s'[hybridize|E]"
 culture_parameter_cannot_diverge: "Cette [culture|El] ne peut pas [diverge|E]"
 culture_parameter_cannot_adopt_admin_gov: "Les souverains ne peuvent pas adopter le [administrative_government|E]."
 cant_have_variag_succession: "Votre [culture|El] ne possède pas la [culture_tradition|El] [GetCultureTradition('tradition_variag_succession').GetName]."


 tradition_dorwinion_vineyards_name: "Vignerons Accomplis"
 tradition_dorwinion_vineyards_desc: "Cette culture a perfectionné l'art de la vinification. Leurs vins de haute qualité sont exportés aux quatre coins de la [middleearth|E] comme un luxe très recherché. On dit souvent des enfants qu'ils ont été « élevés dans les vignes », et les cultivateurs de cette culture sont réputés pour avoir la main verte, capables de faire prospérer n'importe quoi. Parmi l'aristocratie, produire le vin de la plus haute qualité est considéré comme extrêmement prestigieux et primordial pour une bonne réputation."
 culture_parameter_unlock_wine_tasting_activity: "Débloque les [activities|El] #V Organiser des Dégustations de Vin#! et #V Visiter vos Vignobles#!"
 culture_parameter_unlock_wine_tasting_activity_cost: "Réduit les coûts des dégustations de vin et des visites de vignobles"
 culture_parameter_unlock_wine_tasting_activity_private_variety: "Débloque les [activity_options|El] #V $lotr_visit_vineyard_type_agriculture$#! et #V $lotr_visit_vineyard_type_botany$#! pour l'[activity|El] [GetActivityType( 'activity_lotr_visit_vineyard' ).GetName]"
 culture_parameter_unlock_wine_tasting_activity_group_variety: "Débloque les [activity_options|El] #V $lotr_wine_tasting_type_gardens$#! et #V $lotr_wine_tasting_type_poetry$#! pour l'[activity|El] [GetActivityType( 'activity_lotr_wine_tasting' ).GetName]"
 culture_parameter_unlock_vineyards: "Débloque le bâtiment #V Vignobles#!"


### Elven Traditions ###
 tradition_heryvellyn_name: "Heryvellyn"
 tradition_heryvellyn_desc: "Parmi certains des [eldar|E], l'appréciation du vin fin s'élève au rang d'art. Ces [Glossary('Heryvellyn','heryvellyn_gloss')] ne sont pas des vignerons mais de dévoués dégustateurs, gardiens de crus rares venus de terres lointaines. Goûter, savourer et préserver le souvenir de chaque rasade est une marque de raffinement, et recevoir en offrant les vins les plus choisis est considéré comme un acte de profonde courtoisie et d'honneur."
 can_import_wine_tt: "Il existe un [culture_head|El] dans votre [diplomatic_range|El] possédant la [tradition|E] [GetCultureTradition('tradition_dorwinion_vineyards').GetName]."
 culture_parameter_unlock_wine_tasting_activity_elf: "Débloque l'[activity|El] #V Organiser des Dégustations de Vin#!"

 tradition_sirgalan_exiles_name: "Exilés de Sîrgala"
 tradition_sirgalan_exiles_desc: "À l'aube du [thirdage|E], les Sîrrandrai furent lentement chassés de leurs terres par la puissance croissante des [dunedain|E], cédant leurs territoires lentement d'abord avant de finir par se retirer presque entièrement dans le [lindon|E]. Avec la chute du [northernkingdom|E], les anciennes terres de Sîrgala demeurent abandonnées, hormis quelques fermiers et voyageurs intrépides."

 tradition_sirgala_renewed_name: "Sîrgala Renouvelée"
 tradition_sirgala_renewed_desc: "Après de longues années, les Sîrrandrai survivants sont revenus sur leurs terres ancestrales, arrachant leurs halls jadis grandioses à la nature sauvage et proclamant à nouveau le Royaume de Sîrgala. L'héritier de Bornmîr reprend son siège antique, pour régner à nouveau sur ses domaines quelque peu diminués."

 tradition_avarin_solidarity_name: "Solidarité Avarine"
 tradition_avarin_solidarity_desc: "Ayant choisi de demeurer à Cuiviénen, les diverses cultures [avarin|E] ont longtemps considéré avec méfiance les Elfes partis lors du [thegreatjourney|E], préférant fréquenter ceux qui étaient restés."

 tradition_ancient_wanderers_name: "Antiques Errants"
 tradition_ancient_wanderers_desc: "Les [cuind|E] ont toujours été un peuple sans repos, voyageant au loin à travers la [middleearth|E]. Ces voyages, bien que semés de périls, ont apporté aux Cuind une grande expérience de toutes les terres et de tous les peuples du monde."

 tradition_annammonnil_name: "Annammônnil"
 tradition_annammonnil_desc: "Les [kinnlai|E] vivent dans les terres de l'Extrême-Sud depuis avant le lever du soleil. Au fil de ces innombrables années, ils ont noué un lien étroit avec la jungle et les créatures qui l'habitent, tout particulièrement les grands Annammôn-lai."

### Easterling Traditions ###
 #tradition_lotr_battle_arena_name: "Battle Arena"
 #tradition_lotr_battle_arena_desc: "This culture has a standing tradition of having their warriors prove themselves in contests held in great arenas."

 tradition_variag_succession_stable_name: "Succession Variag Stabilisée"
 tradition_variag_succession_stable_desc: "Cette branche particulière des Variags a abandonné ses antiques coutumes successorales pour une voie plus stable, afin de s'assurer que leur royaume ne soit pas aussi facilement fragmenté et puisse résister aux attaques ennemies."

# Evil Immortals

 tradition_rule_of_the_shadows_name: "Règne des Ombres"
 tradition_rule_of_the_shadows_desc: "Les anciens maux d'antan règnent sur bien des peuples d'une main ferme et d'un poing de fer."
 culture_parameter_evil_peasant_and_populist_factions_unlikely: "Les [peasant_factions|E] et [popular_factions|E] de [culture|El] différente sont très peu susceptibles de se former si leur foi est une foi d'État Sauronique ou Tyrannique."

# Orc traditions
 tradition_legions_of_gundabad_name: "Légions de Gundabad"
 tradition_legions_of_gundabad_desc: "Les Légions de [gundabad|E] étaient les tribus [orcish|E] qui prirent possession de l'antique cité [dwarven|E] de Gundabad. Elles passèrent sous la domination de l'[angmar|E] vers 1300 3.A. Sous le règne d'Angmar, elles développèrent une structure militaire plus organisée. Bien que l'Angmar dût inévitablement chuter, les [orcs|E] de Gundabad conservèrent leurs traditions militaristes et cherchèrent à soumettre les Orques des Montagnes du nord sous le talon de leurs sombres légions."
 culture_parameter_unlock_maa_hunter_orcs_on_fell_wargs: "Peut recruter des [GetMaA('hunter_orcs_on_fell_wargs').GetName] comme [men_at_arms|El]"
 #culture_parameter_unlock_maa_gundabad_blackshields: "Can recruit [GetMaA('gundabad_blackshields').GetName] as [men_at_arms|E]"
 #culture_parameter_unlock_maa_gundabad_war_troll: "Can recruit [GetMaA('gundabad_war_troll').GetName] as [men_at_arms|E]"
 recruit_halls_specialist_decision_tooltip: "Un [commander|E] à haute [martial|El] possédant le [trait|E] [GetTrait('cavern_commander').GetName( GetNullCharacter )] rejoint votre [court|El]"

 tradition_dush_hai_cabal_name: "Cabale des Dush-Hai"
 tradition_dush_hai_cabal_desc: "Praticiens [orcish|E] des arts sombres, les Dush-hai étaient rares dans la société orque. Dans les cas peu fréquents où leurs services n'étaient pas donnés aux seigneurs de guerre, ils se rassemblaient parfois pour former des cabales. Ces cabales tendaient à être recluses et secrètes, gardant jalousement même les moindres avancées dans leur compréhension des arts profanes, mais exerçaient un grand pouvoir depuis les ombres partout où elles se formaient."

 tradition_roving_bands_name: "Bandes Errantes"
 tradition_roving_bands_desc: "Cette culture parcourt au loin en quête d'aventure et de butin, ses membres se rassemblant souvent en petites bandes de pillards pour traverser les terres avec aisance."

 tradition_beast_masters_name: "Maîtres des Bêtes"
 tradition_beast_masters_desc: "Ces [orcs|E] ont maîtrisé l'art de capturer et de dresser les [trolls|E], les Wargs et autres bêtes féroces, pour les utiliser à la guerre et comme bêtes de somme."

 # Dwarven traditions
 tradition_mining_fervour_name: "Ferveur Minière"
 tradition_mining_fervour_desc: "L'enthousiasme de cette culture pour l'extraction minière coule dans son sang même. De grandes traditions minières se sont transmises de génération en génération, une large part de la société étant consacrée à la recherche et au traitement des richesses des profondeurs."
 culture_parameter_more_frequent_mining_expeditions: "Délai entre les [activities|El] [GetActivityType('activity_mining').GetName] : #P -50 % #!"
 culture_parameter_mining_traits_more_valued: "Le [trait|E] [GetTrait('lifestyle_miner').GetName( GetNullCharacter )] est considéré comme [prestige_i][prestigious|E]"
 culture_parameter_mining_traits_more_common: "Les [characters|E] acquièrent plus souvent le [trait|E] [GetTrait('lifestyle_miner').GetName( GetNullCharacter )]"
 tradition_surface_dweller_name: "Habitants de la Surface"
 tradition_surface_dweller_desc: "Malgré l'aptitude naturelle des [dwarves|E] à bâtir leurs demeures dans les montagnes et les lieux sombres du monde, ces Nains se sont accoutumés à vivre sous la lumière du soleil, à la surface."
 cannot_have_mountain_homes_and_surface_dweller: "La [tradition|E] #high $tradition_mountain_homes_name$#! ne peut pas être combinée avec #high $tradition_surface_dweller_name$#!"

 tradition_miners_name: "Mineurs"
 tradition_miners_desc: "Cette culture possède une riche tradition minière, faisant preuve d'une habileté remarquable à extraire les minerais et minéraux précieux de leur environnement, contribuant significativement à la prospérité de leur société."
 culture_surface_dweller_desc: "Cette culture est soit trop adaptée à la vie souterraine, soit présente sur un terrain montagneux."

 tradition_jewel_dwarves_name: "Nains-Joailliers"
 tradition_jewel_dwarves_desc: "Parmi les [dwarves|E], l'habileté et l'artisanat sont tenus en la plus haute estime, les maîtres-artisans créant des œuvres qui unissent fonction et beauté."
