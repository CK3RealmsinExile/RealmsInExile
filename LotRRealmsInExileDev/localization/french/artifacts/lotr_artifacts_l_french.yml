 ivory_box_small_1_description: "Un petit coffre façonné dans l'ivoire de Mûmakil, créé pour [ROOT.Char.GetName], portant des sculptures minutieusement conçues de fleurs exotiques du Sud."
 ivory_box_small_2_description: "Un petit coffre taillé dans l'ivoire de Mûmakil, créé pour [ROOT.Char.GetName], orné de sculptures complexes aux motifs naturels entrelacés."

