 no_orcish_special_building: "Cette [province|El] n'a #bold pas#! été purifiée de la souillure des [orcs|E]"
 great_project_type_dwarven_capital_01: "Capitale Naine"
 great_project_type_dwarven_capital_02: "Agrandissement — $great_project_type_dwarven_capital_01$"
 great_project_type_dwarven_capital_02_desc: "Nous avons désormais les moyens d'étendre notre puissante capitale ! Forgeons une merveille digne de notre illustre clan !"
 great_project_type_dwarven_capital_02_possessive: "de la $great_project_type_dwarven_capital_01$"
 lotr_great_project_type_dwarven_capital_has_t1_building: "Cette province ne possède #bold pas#! le [great_building|El] Capitale Naine au premier échelon."
 great_project_type_dwarven_capital_construct_building.tt: "Le [great_building|El] de la Capitale Naine sera amélioré au palier suivant"
 balrog_is_slumbering: "Le [balrog_struggle|E] est achevé, ou en phase [struggle_balrog_phase_slumbering|E]"
 
 great_project_type_dwarven_capital_02_contribution_brick: "Briques"
 great_project_type_dwarven_capital_02_contribution_brick_desc: "Nul édifice ne surgit du néant. Nous fournirons au [great_project|El] toutes les briques nécessaires à l'achèvement de la capitale."

 great_project_type_dwarven_capital_02_contribution_tiles: "Lots de Tuiles"
 great_project_type_dwarven_capital_02_contribution_tiles_desc: "Un bon toit est un toit de tuiles. Nous enverrons nos meilleures tuiles au [great_project|El] et le protégerons de l'humidité !"
 
 great_project_type_dwarven_capital_02_contribution_shallow_pools: "Vasques de Pierre"
 great_project_type_dwarven_capital_02_contribution_shallow_pools_desc: "Les jeux d'eau sont essentiels — ils dispensent fraîcheur et charment le regard."
 dwarven_shallow_pools_defense_modifier: "$great_project_type_mandala_capital_02_contribution_shallow_pools$"
 dwarven_shallow_pools_defense_modifier_desc: "Les bassins peu profonds de la capitale naine locale élèvent l'âme tout en freinant les ennemis."
 dwarven_contributor_shallow_pools_reward_province_effect_tt: "La propriété de [province.GetName] gagne [GetModifier('dwarven_shallow_pools_defense_modifier').GetNameWithTooltip]"
 dwarven_contributor_shallow_pools_reward_effect_tt: "La propriété de [owner.GetCapitalLocation.GetName] gagne [GetModifier('dwarven_shallow_pools_defense_modifier').GetNameWithTooltip]"

 great_project_type_dwarven_capital_02_contribution_decorative_tiles: "Dalles Ornementales"
 great_project_type_dwarven_capital_02_contribution_decorative_tiles_desc: "Accordons-nous quelque magnificence : des dalles ornementales sur les toits. Arêtes saillantes. Ciselures profondes. Toujours plus de splendeur pour réjouir l'œil."
 
 great_project_type_dwarven_capital_02_contribution_work_force: "Main-d'Œuvre"
 great_project_type_dwarven_capital_02_contribution_work_force_desc: "Les grands exploits exigent un grand labeur ! Nous devons fournir davantage de bras au [great_project|El] pour achever les travaux sur ce [great_project|El]."
 dwarven_strong_workers_modifier: "Ouvriers robustes"
 dwarven_strong_workers_modifier_desc: "Ce personnage dispose d'ouvriers ayant récemment gagné en force en travaillant à un grand projet."

 great_project_type_dwarven_capital_02_contribution_rite_of_mahal: "Rite de Mahal"
 great_project_type_dwarven_capital_02_contribution_rite_of_mahal_desc: "Nous prouverons notre valeur pour mériter d'agrandir notre [GetBuilding('dwarven_capital_01').GetTypeName], en nous disputant la dévotion des habitants de ce [kingdom|E] [de_jure|El] !"

 great_project_type_dwarven_capital_02_contribution_decorated_ceilings: "Plafonds Ciselés"
 great_project_type_dwarven_capital_02_contribution_decorated_ceilings_desc: "Tout plafond qui se respecte est un plafond gravé. Runes et motifs d'exception y seront taillés sans délai."

 great_project_type_dwarven_capital_02_contribution_throne_room: "Salle du Trône"
 great_project_type_dwarven_capital_02_contribution_throne_room_desc: "Notre souverain disposera d'une salle du trône digne de sa grandeur, pour y siéger et rendre justice à son peuple."

 great_project_type_dwarven_capital_03: "$great_project_type_dwarven_capital_02$"
 great_project_type_dwarven_capital_03_desc: "$great_project_type_dwarven_capital_02_desc$"
 great_project_type_dwarven_capital_03_possessive: "de la $great_project_type_dwarven_capital_01$"
 lotr_great_project_type_dwarven_capital_has_t2_building: "Cette province ne possède #bold pas#! de bâtiment Capitale Naine au deuxième échelon."

 great_project_type_dwarven_capital_03_contribution_rite_of_mahal: "Rite de Mahal"
 great_project_type_dwarven_capital_03_contribution_rite_of_mahal_desc: "Nous prouverons notre valeur pour mériter d'agrandir notre [GetBuilding('dwarven_capital_01').GetTypeName], gravant ainsi notre nom dans les annales de notre peuple !"

 great_project_type_dwarven_capital_03_contribution_marble_stone: "Pierre de Marbre"
 great_project_type_dwarven_capital_03_contribution_marble_stone_desc: "Les ambitions les plus hautes exigent les fondations les plus solides. Nous fournirons au [great_project|El] le marbre nécessaire pour asseoir des bases qui traverseront les âges."

 great_project_type_dwarven_capital_03_contribution_arched_gateways: "Portails Arqués"
 great_project_type_dwarven_capital_03_contribution_arched_gateways_desc: "À mesure que la cité s'étend, il lui faut de dignes arches pour porter la construction. Ces portails guideront ceux qui arpentent ses rues."

 great_project_type_dwarven_capital_03_contribution_divine_statues: "$great_project_type_mandala_capital_03_contribution_divine_statues$"
 great_project_type_dwarven_capital_03_contribution_divine_statues_desc: "L'effigie de Mahal, taillée dans la roche vive, bénit nos salles de son regard bienveillant."
 dwarven_contributor_divine_statues_reward_province_effect_tt: "La propriété de [province.GetName] gagne [GetModifier('dwarven_divine_statues_province_modifier').GetNameWithTooltip]"
 dwarven_contributor_divine_statues_reward_effect_tt: "La propriété de [owner.GetCapitalLocation.GetName] gagne [GetModifier('dwarven_divine_statues_province_modifier').GetNameWithTooltip]"
 dwarven_divine_statues_province_modifier: "$great_project_type_mandala_capital_03_contribution_divine_statues$"
 dwarven_divine_statues_province_modifier_desc: "Les statues divines de la capitale locale attirent de nombreux fidèles."

 great_project_type_dwarven_capital_03_contribution_work_force: "$great_project_type_dwarven_capital_02_contribution_work_force$"
 great_project_type_dwarven_capital_03_contribution_work_force_desc: "Pour atteindre la perfection, il faut peiner sans relâche. D'autres bras sont nécessaires à la construction de la capitale, et notre contribution sera richement récompensée."

 great_project_type_dwarven_capital_03_contribution_dynastic_statues: "Statues Dynastiques"
 great_project_type_dwarven_capital_03_contribution_dynastic_statues_desc: "Ces têtes colossales scrutent l'horizon, graves et pensives — veillant sur la vie de notre grande cité. Elles portent une ressemblance saisissante avec notre souverain."
 great_project_dwarven_capital_has_dynasty_prestige_tt: "Le [dynasty_prestige_level|E] de votre [dynasty|El] est inférieur à $dynasty_level_2_c$ (#V 2#!)"

 great_project_type_dwarven_capital_03_contribution_gilded_ceilings: "Plafonds Dorés"
 great_project_type_dwarven_capital_03_contribution_gilded_ceilings_desc: "Pour irradier toute sa splendeur, les plafonds de la capitale doivent être recouverts du plus bel or qu'il soit possible d'offrir."

 great_project_type_dwarven_capital_03_contribution_palatial_compound: "Domaine Palatial"
 great_project_type_dwarven_capital_03_contribution_palatial_compound_desc: "Un vaste domaine palatial pour loger notre grand souverain et sa cour avec la dignité qui leur est due."

 great_project_type_dwarven_capital_04: "$great_project_type_dwarven_capital_02$"
 great_project_type_dwarven_capital_04_desc: "$great_project_type_dwarven_capital_02_desc$"
 great_project_type_dwarven_capital_04_possessive: "de la $great_project_type_dwarven_capital_01$"
 lotr_great_project_type_dwarven_capital_has_t3_building: "Cette province ne possède #bold pas#! de bâtiment de Capitale Naine au troisième échelon."

 great_project_type_dwarven_capital_04_contribution_rite_of_mahal: "Rite de Mahal"
 great_project_type_dwarven_capital_04_contribution_rite_of_mahal_desc: "Nous prouverons notre valeur incontestable pour mériter d'agrandir encore notre capitale, et d'inscrire notre marque sur le monde !"

 great_project_type_dwarven_capital_04_contribution_slabs_of_porphyry: "Dalles de Porphyre"
 great_project_type_dwarven_capital_04_contribution_slabs_of_porphyry_desc: "Seule l'image taillée dans la pierre est immortelle. Nous offrirons les meilleures roches pour créer des œuvres d'art qui résisteront à l'éternité."

 great_project_type_dwarven_capital_04_contribution_light_shafts: "Puits de Lumière"
 great_project_type_dwarven_capital_04_contribution_light_shafts_desc: "Les puits de lumière laissent filtrer la clarté du Soleil et de la Lune jusqu'au cœur de la montagne, éclairant cultures et marchés à parts égales."

 great_project_type_dwarven_capital_04_contribution_great_mirrors: "Grands Miroirs"
 great_project_type_dwarven_capital_04_contribution_great_mirrors_desc: "Les grands miroirs conduiront la lumière du dehors jusqu'aux recoins les plus secrets, permettant de tirer le meilleur parti des richesses de la montagne."

 great_project_type_dwarven_capital_04_contribution_work_force: "$great_project_type_dwarven_capital_02_contribution_work_force$"
 great_project_type_dwarven_capital_04_contribution_work_force_desc: "$great_project_type_mandala_capital_04_contribution_work_force_desc$"

 great_project_type_dwarven_capital_04_contribution_carven_pillars: "Piliers Sculptés"
 great_project_type_dwarven_capital_04_contribution_carven_pillars_desc: "Les meilleurs tailleurs de pierre œuvreront dans les grandes salles, afin que leurs voûtes reposent sur les plus élégants des piliers."

 great_project_type_dwarven_capital_04_contribution_bejeweled_ceilings: "Plafonds Incrustés de Gemmes"
 great_project_type_dwarven_capital_04_contribution_bejeweled_ceilings_desc: "Les cieux doivent briller sur cette cité. Nous fournirons au [great_project|El] les joyaux nécessaires pour que les étoiles elles-mêmes semblent reposer entre les piliers de ces grandes salles."

 great_project_type_dwarven_capital_04_contribution_palatial_complex: "Complexe Palatial"
 great_project_type_dwarven_capital_04_contribution_palatial_complex_desc: "Un roi nain mérite un palais grandiose, propre à inspirer la crainte aux vassaux comme aux visiteurs. Nous élèverons un palais qui éblouira tous les sens."

 great_project_type_dwarven_capital_05: "$great_project_type_dwarven_capital_02$"
 great_project_type_dwarven_capital_05_desc: "$great_project_type_dwarven_capital_02_desc$"
 great_project_type_dwarven_capital_05_possessive: "de la $great_project_type_dwarven_capital_01$"
 lotr_great_project_type_dwarven_capital_has_t4_building: "Cette province ne possède #bold pas#! de bâtiment de Capitale Naine au quatrième échelon."

 great_project_type_dwarven_capital_05_contribution_rite_of_mahal: "Rite de Mahal"
 great_project_type_dwarven_capital_05_contribution_rite_of_mahal_desc: "Nous prouverons notre valeur incontestable pour mériter d'agrandir encore notre capitale, la hissant au rang de joyau resplendissant au cœur des montagnes !"

 great_project_type_dwarven_capital_05_contribution_marble_foundation: "Fondations de Marbre"
 great_project_type_dwarven_capital_05_contribution_marble_foundation_desc: "Le plus beau marbre sera offert à la capitale, qu'elle puisse reposer sur les plus nobles des fondations."

 great_project_type_dwarven_capital_05_contribution_work_force: "$great_project_type_dwarven_capital_02_contribution_work_force$"
 great_project_type_dwarven_capital_05_contribution_work_force_desc: "Nous fournirons des artisans de toutes conditions, du plus humble manœuvre au plus érudit des maîtres, rassemblés des quatre coins du royaume, pour contribuer à la construction de la grande cité."

 great_project_type_dwarven_capital_05_contribution_bejeweled_reliefs: "Reliefs Incrustés de Gemmes"
 great_project_type_dwarven_capital_05_contribution_bejeweled_reliefs_desc: "[dwarffathers|E] orneront nos murs, projetant sagesse et majesté dans leur marche, parés de leurs splendides atours incrustés de joyaux."

 great_project_type_dwarven_capital_05_contribution_waterways: "Voies d'Eau"
 great_project_type_dwarven_capital_05_contribution_waterways_desc: "Notre cité sera traversée de grands canaux, qui nous protégeront des ennemis autant qu'ils relieront les différents quartiers."

 great_project_type_dwarven_capital_05_contribution_pillar_forest: "Forêt de Piliers"
 great_project_type_dwarven_capital_05_contribution_pillar_forest_desc: "Nous doterons les grandes salles d'une forêt de piliers, comme si l'on cheminait sous un vaste dais de pierre, façonnés avec art par les meilleurs artisans."

 great_project_type_dwarven_capital_05_contribution_dwarf_father_palace: "Palais du Père-des-Nains"
 great_project_type_dwarven_capital_05_contribution_dwarf_father_palace_desc: "Un palais digne des pères de notre peuple, dont la magnificence n'est surpassée que par l'œuvre de Mahal lui-même."

 second_tier_dwarven_capital_building_ongoing: "$great_project_type_dwarven_capital_02$ en cours"
 third_tier_dwarven_capital_building_ongoing: "$second_tier_dwarven_capital_building_ongoing$"
 fourth_tier_dwarven_capital_building_ongoing: "$second_tier_dwarven_capital_building_ongoing$"
 final_tier_dwarven_capital_building_ongoing: "$second_tier_dwarven_capital_building_ongoing$"

 ### Great Fleet ###
 great_project_type_construct_great_fleet_01: "Construire une Grande Flotte"
 great_project_type_construct_great_fleet_01_desc: "Les côtes de mon [realm|El] doivent être protégées — et quel meilleur moyen d'en assurer la sécurité et de projeter notre puissance par-delà les mers que d'armer une grande flotte ?"
 great_project_type_construct_great_fleet_01_coastal_county: "Doit être un comté côtier"

 great_project_type_construct_great_fleet_02: "Étendre la Grande Flotte"
 great_project_type_construct_great_fleet_02_desc: "Ayant armé une grande flotte pour défendre le [domain|El], nous avons compris qu'elle pouvait encore grandir. Quoi de mieux pour témoigner d'une éclatante prospérité que d'étendre notre flotte ?"
 great_project_type_construct_great_fleet_02_coastal_county: "Doit être un comté côtier et posséder un Fleetport"

 great_project_type_construct_great_fleet_03: "Forger un Grand Armement"
 great_project_type_construct_great_fleet_03_desc: "Maintenant que la grande flotte a été étendue, elle brille comme le flambeau de notre puissance sur mon [domain|El]. Mais cette grandeur appelle une défense à sa mesure. Nous devons rassembler un armement digne de garder les eaux de mon [realm|El] !"
 great_project_type_construct_great_fleet_03_coastal_county: "Doit être un comté côtier et posséder un Grand Fleetport"

 great_project_type_construct_great_fleet_01_contribution_materials: "Matériaux"
 great_project_type_construct_great_fleet_01_contribution_materials_desc: "Nul édifice ne surgit du néant. Nous fournirons au [great_project|El] tous les matériaux nécessaires à l'achèvement de la flotte."

 great_project_type_construct_great_fleet_01_contribution_workforce: "Main-d'Œuvre"
 great_project_type_construct_great_fleet_01_contribution_workforce_desc: "Nul vaisseau ne se forge sans labeur ! Nous apporterons au [great_project|El] la force de travail nécessaire pour mener à bien cette grande entreprise."

 great_project_type_construct_great_fleet_01_contribution_engineers: "Ingénieurs Navals"
 great_project_type_construct_great_fleet_01_contribution_engineers_desc: "Des charpentiers de marine chevronnés adjoints à ce [great_project|El] apporteraient une précieuse expertise à la construction de la flotte."

 great_project_type_construct_great_fleet_01_contribution_military_wharf: "Chantier Naval Militaire"
 great_project_type_construct_great_fleet_01_contribution_military_wharf_desc: "Doter le [great_project|El] d'un mouillage dédié et d'une cale sèche accroîtra la solidité et la longévité de la flotte."

 great_project_type_construct_great_fleet_01_contribution_merchant_quays: "Quais Marchands"
 great_project_type_construct_great_fleet_01_contribution_merchant_quays_desc: "L'ajout d'un quartier marchand au [great_project|El] augmentera les revenus et le commerce transitant par le Fleetport."

