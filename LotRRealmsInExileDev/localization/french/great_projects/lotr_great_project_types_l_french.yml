 ### Mend the Realm ###
 great_project_type_mend_the_realm: "Raviver le Royaume"
 great_project_type_mend_the_realm_fallback: "le Royaume"
 great_project_type_mend_the_realm_desc: "Les [elves|E] du [realm|El] sont devenus las. Beaucoup parlent de cingler vers [valinor|E] et d'abandonner [middleearth|E] pour toujours. Pour raviver l'[hope|E] en leurs cœurs et ranimer leur ardeur, un [great_project|El] pourrait être entrepris — portant l'encouragement jusqu'aux derniers et rallumant en eux la flamme de la détermination."
 great_project_type_mend_the_realm_contribution_provisions: "Provisions"
 great_project_type_mend_the_realm_contribution_provisions_desc: "Provisions"
 great_project_type_mend_the_realm_contribution_messengers: "Messagers"
 great_project_type_mend_the_realm_contribution_messengers_desc: "Messagers"
 great_project_type_mend_the_realm_contribution_encouragement: "Provisions"
 great_project_type_mend_the_realm_contribution_encouragement_desc: "Encouragement"
