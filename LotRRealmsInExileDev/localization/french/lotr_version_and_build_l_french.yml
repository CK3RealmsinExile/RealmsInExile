l_french:
### INCLUDES STUFF TAKEN FROM AGOT ###
 LOTR_VERSION_BUILD: "\nVersion LOTR : #color_yellow;bold $LOTR_BUILD$#!\nNuméro de version : #color_yellow;bold $LOTR_VERSION$#!"
#  LOTR_BUILD:0 "Dev Build"
#  LOTR_BUILD:0 "Release Build" #For main release
 LOTR_BUILD: "Bêta ouverte" #For Beta release
 LOTR_VERSION: "Mûmakan v4.3.0"
 LOTR_REQUIRED_VERSION: "Crane (1.18.4)"
 VERSION_MISMATCH_DESCRIPTION: "Cher #clickable [SelectLocalization(Or(Not(POPSStatusIsLoggedIn), POPStatusIsUserNameEmpty), 'NULL_USERNAME', 'FULL_USERNAME')]#!,\n\nVotre version de CK3 est #negative_value [GetGameVersionInfoShort]#! alors que LOTR: Royaumes en Exil requiert #positive_value $LOTR_REQUIRED_VERSION$#!. Si vous choisissez de poursuivre, vos sauvegardes existantes pourraient être corrompues ou vos nouvelles parties se comporter de manière imprévisible.\n\nCliquer sur #high Confirmer#! signifie que vous comprenez cet avertissement et que vous n'essaierez pas de signaler les bugs qui en résulteraient.\n\nSinon, nous vous conseillons de quitter le jeu afin de revenir à la version #positive_value $LOTR_REQUIRED_VERSION$#!."
 VERSION_MISMATCH_CONFIRM: "Confirmer"
 VERSION_MISMATCH_CONFIRM_TOOLTIP: "#high;bold Vous confirmez avoir compris les risques liés à l'utilisation d'une version non prise en charge#!"
 VERSION_MISMATCH_EXIT_TOOLTIP: "@warning_icon! #warning Vous allez quitter le jeu#!"
 FULL_USERNAME: "[POPStatusGetUserName]"
 NULL_USERNAME: "Passionné des Royaumes en Exil"