 tradition_nubian_warrior_queens_name: "Reines Guerrières"
 tradition_nubian_warrior_queens_desc: "Ceux qui vivent en $e_shayn$ se souviennent bien des grandes Reines Guerrières qui jadis tinrent tête aux monstres et forgèrent notre royaume. Nos voisins peuvent bien clamer la supériorité des mâles, mais nous traçons nos lignées par nos mères, et le cri de guerre des puissantes femmes $ambason$ fait détaler ces « hommes » étrangers jusqu'à leurs foyers."

 tradition_mountaineer_ruralism_desc: "Depuis l'époque où les [daen|E] pénétrèrent dans les terres du futur [gondor|E] et du Harondor, la plupart des membres de cette culture savent non seulement parcourir les terres rocailleuses, mais aussi mener une vie montagnarde avec aisance."

 culture_parameter_elephant_pens_building_bonuses: "Les lignées de [buildings|El] #V $building_type_elephant_pens_01$#! et #V $building_type_mumakil_pen_01$#! bénéficient de bonus supplémentaires dans les [counties|El] de cette [culture|El]."

 unlock_voluntary_laampdom_name: "[GetCultureTradition('tradition_swords_for_hire').GetName], [GetCultureTradition('tradition_horse_lords').GetName], [GetCultureTradition('tradition_ep3_audacious_cadets').GetName], [GetCultureTradition('tradition_caravaneers').GetName], [GetCultureTradition('tradition_diasporic').GetName], [GetCultureTradition('tradition_devoted_horsemanship').GetName], [GetCultureTradition('tradition_variag_horse_lords').GetName], [GetCultureTradition('tradition_dune_sea_nomads').GetName], [GetCultureTradition('tradition_warriors_of_rhun').GetName], [GetCultureTradition('tradition_roving_bands').GetName], [GetCultureTradition('tradition_wanderers_of_the_wild').GetName], [GetCultureTradition('tradition_ancient_wanderers').GetName] ou [GetCultureTradition('tradition_fp1_coastal_warriors').GetName] ; ou [GetCulturePillar('heritage_orc').GetName] ou [GetCulturePillar('heritage_goblin').GetName]"