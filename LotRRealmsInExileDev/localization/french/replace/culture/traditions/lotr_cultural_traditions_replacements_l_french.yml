 culture_parameter_forest_hunt_success_chance: "[hunt_success_chance|E] accrue en [GetTerrain( 'forest' ).GetName], [GetTerrain( 'deep_forest' ).GetName], [GetTerrain( 'mallorn_forest' ).GetName] et [GetTerrain( 'taiga' ).GetName]"
