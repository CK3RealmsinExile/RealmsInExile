l_french:
 innovation_wierdijks: "Maîtrise des Crues"
 innovation_wierdijks_desc: "Bâtir des digues solides et fiables est une tâche essentielle si nous souhaitons vivre et prospérer dans les vallées fluviales. De nouvelles techniques de renforcement des levées de terre avec des nattes d'algues en accroîtront la résistance et la durabilité."

 innovation_condottieri: "Kindilârud" # LOTR - Named after the Kindilar
 innovation_condottieri_desc: "À la fois prospère et idéalement située, Bôzisha-Dâr est devenue un haut lieu où affluent les compagnies de mercenaires entre deux campagnes. Puisqu'ils sont déjà là, nous devrions pouvoir négocier des tarifs plus avantageux que ceux qu'ils pratiquent d'ordinaire." # LOTR
 
 innovation_cranes_desc: "Merveille d'ingénierie tombée dans l'oubli, les [numenoreans|E] employèrent les grues à tambour avec une grande efficacité lors de l'édification de leur empire, et nous ferons de même."

 innovation_gunpowder: "Grands Engins de Siège" # LOTR
 innovation_gunpowder_desc: "À mesure que l'envergure des fortifications s'est accrue, les engins de siège ont dû évoluer. Ces armes de siège colossales peuvent abattre les murailles ennemies avec une puissance et une efficacité dont nos ancêtres n'auraient pu que rêver." # LOTR
 culture_parameter_unlock_late_medieval_gunpowder_units: "$unlock_maa_bombard$" #LOTR
 
 innovation_muladi: "Droit d'Asile" #Find a better name

 innovation_seigneurialism: "Domaines Autonomes" # LOTR - Dwarven Seigneurialism

 innovation_development_03_desc: "Les grandes cités de Minas Tirith, Annúminas et Nîlûlondê se sont longtemps distinguées comme les reliques d'un héritage grandiose et inégalé. À mesure que nos infrastructures et notre population croissent, nous disposons enfin des moyens de fonder de nouvelles colonies rivalisant avec ces antiques centres urbains."
 
 unlock_wind_furnaces: "Débloque la lignée de [buildings|El] $building_type_wind_furnace_01$" # LOTR

 innovation_longboats: "Nefs-Dragons" # Lotr
 innovation_longboats_desc: "Nos Nefs-Dragons sont de redoutables vaisseaux hauturiers capables de naviguer presque partout et d'affronter les tempêtes, nous conférant une mobilité exceptionnelle sur les mers." # LOTR

 innovation_wootz_steel: "Acier Poing-de-Fer" #LOTR
 innovation_wootz_steel_desc: "Également connu sous le nom d'acier d'Orocarni ou de Rhûn, ce métal riche en carbone est excellent pour la forge d'armes. L'acier Poing-de-Fer est largement commercé et réputé le plus fin au monde. Au fil des âges, il a attiré l'attention des marchands [khyan|E]s, Igath, $womaw$, et même [gondorian|E]s."
 
 innovation_african_canoes: "Pirogues Mûmakani" # LOTR
 innovation_african_canoes_desc: "Les grandes pirogues du Mûmakan sont excellentes pour naviguer sur les fleuves et nous permettent d'acheminer rapidement nos troupes là où le besoin s'en fait sentir."
 
 innovation_table_of_princes: "Code Éphystien"
 innovation_table_of_princes_desc: "Le Code Éphystien relève davantage de la coutume que du droit écrit, mais il n'en est pas moins observé parmi les $muranian_collective_noun$. Prétendument instauré par le premier $emperor_harshandatt$ en personne, il stipule que les titres reviennent au membre vivant le plus âgé de la dynastie régnante."

 innovation_champa_rice: "Riz de Gan"
 innovation_champa_rice_desc: "Le riz exige une abondance de temps et d'eau — sauf celui de Gan. Cette variété croît plus vite, résiste mieux aux sécheresses et offre un rendement plus généreux que pratiquement tout autre riz connu. Dans certains cas, elle peut même être moissonnée deux fois l'an. Bien géré, ce riz peut enrichir les fermes et nourrir un essor démographique."