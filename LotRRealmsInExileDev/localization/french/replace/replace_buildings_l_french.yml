 building_curtain_walls_05: "Fortifications Closes"
 building_curtain_walls_05_desc: "Lorsqu'une armée ennemie parvient à percer les murailles extérieures, elle se trouve inconsciemment canalisée vers ces #emphasis champs de mort#! soigneusement aménagés. Diaboliquement ingénieux !"
 building_curtain_walls_07: "Fort-Bastion"
 building_curtain_walls_07_desc: "Ce bastion constitue un type de structure défensive capable de résister même aux assauts les plus implacables des armes les plus meurtrières. Certes, pas très longtemps, mais suffisamment pour permettre une fuite sûre par les tunnels secrets aménagés à cet effet."

 #Duchy Buildings 
 building_type_blacksmiths_01: "Grandes Forges"
 building_type_blacksmiths_01_desc: "Des forgerons émérites, souvent versés dans des savoirs transmis depuis les [elderdays|E], sont mandés par les autorités locales pour forger armes et armures à l'intention de la garnison, garantissant un approvisionnement constant en armements fiables."
 building_blacksmiths_01: "Maîtres Forgerons"
 building_blacksmiths_01_desc: "Les forgerons les plus habiles et les plus renommés — certains formés selon des traditions qui rappellent l'art des [dwarves|E] d'antan — sont mandés par les autorités de la cité pour forger épées, cottes de mailles et lances destinées aux défenseurs."
 building_blacksmiths_02: "Guildes des Forgerons"
 building_blacksmiths_02_desc: "En s'associant aux guildes et ateliers, où résonnent encore les savoirs forgés dans les salles antiques, de grandes quantités d'équipements peuvent être produites rapidement et à moindre coût."
 building_blacksmiths_03: "Forges Monumentales"
 building_blacksmiths_03_desc: "De vastes forges sont érigées pour approvisionner un royaume, un clan ou une armée en armes ; seuls les forgerons les plus accomplis, dont l'art peut rivaliser avec celui de [khazaddum|E] ou d'[eregion|E], sont admis à y travailler."

 building_type_royal_armory_01: "Arsenaux Seigneuriaux"
 building_type_royal_armory_01_desc: "Des armureries financées par la communauté, qui font écho aux arsenaux jadis tenus dans les grandes cités d'antan, assurent un approvisionnement régulier en armes en état de servir pour la garnison."
 building_royal_armory_01: "Dépôts d'Armes"
 building_royal_armory_01_desc: "En temps de guerre, les levées peuvent être pourvues d'armes tirées du dépôt — essentiellement des haches rouillées, des lances à demi brisées et des lames émoussées. Pourtant, avec quelques soins, elles demeurent supérieures aux outils des champs qu'empoignaient jadis les milices convoquées à la hâte."
 building_royal_armory_02: "Armureries de Garnison"
 building_royal_armory_02_desc: "Ces armureries, gérées par les autorités de la cité, rassemblent armes et armures pour les conflits à venir. De tels arsenaux font écho aux dépôts d'armes des [numenoreans|E] d'antan, donnant même aux plus jeunes recrues des airs de soldats chevronnés — si ce n'est la valeur qui va avec."
 building_royal_armory_03: "Grand Arsenal"
 building_royal_armory_03_desc: "Le Grand Arsenal conserve et entretient d'immenses quantités d'armes — suffisamment pour équiper d'innombrables levées en un temps record et pour attirer les mercenaires les plus renommés."

 building_type_jousting_lists_01: "Champs d'Entraînement Monté"
 building_type_jousting_lists_01_desc: "Des terrains dédiés aux exercices montés encouragent cavaliers et guerriers à s'entraîner et à rejoindre les troupes locales, rappelant les champs d'équitation jadis entretenus par les seigneurs cavaliers du Nord."
 building_jousting_lists_01: "Lices Équestres"
 building_jousting_lists_01_desc: "Une clairière entretenue tout au long de l'année pour permettre l'entraînement des cavaliers et de leurs montures en matière de vitesse, de formations et de techniques de combat à cheval, à l'image des plaines herbeuses où se rassemblaient jadis les armées des âges révolus."
 building_jousting_lists_02: "Lices de Combat"
 building_jousting_lists_02_desc: "Équipées de zones d'exercice et de simples gradins pour les observateurs, ces lices accueillent des manœuvres d'envergure, des épreuves de valeur et des entraînements coordonnés, à l'image des champs de rassemblement des royaumes d'antan en temps de guerre."
 building_jousting_lists_03: "Grandes Lices"
 building_jousting_lists_03_desc: "Agrandies de tribunes pour les hôtes de marque et de terrains élargis pour les manœuvres, ces lices servent de site principal pour l'entraînement des armées et leur préparation aux grandes offensives — un lieu où cavaliers et guerriers de maintes lignées se rassemblent avant les campagnes."

 building_archery_ranges_02: "Maîtres de l'Arc"
 building_archery_ranges_02_desc: "Les plus habiles facteurs d'arcs sont mandés par les autorités de l'établissement pour façonner des arcs de premier ordre dans des ateliers expressément construits pour cet art."
 building_archery_ranges_03: "Champs de Tir à Longue Portée"
 building_archery_ranges_03_desc: "Ces champs de tir spécialisés sont aménagés pour entraîner les archers au tir à longue distance, offrant des portées étendues et des cibles exigeantes afin d'affiner leur précision."

 building_type_tax_assessor_01: "Recette des Levées"
 building_type_tax_assessor_01_desc: "Des bureaux où des officiers administrent la collecte des levées et contributions, tiennent les registres et s'assurent que les obligations de l'établissement sont honorées."
 building_tax_assessor_01: "Percepteurs"
 building_tax_assessor_01_desc: "Les percepteurs évaluent les impôts et redevances dus en monnaie ou en nature, veillant à ce que les contributions soient mesurées, consignées et redistribuées selon la loi locale."
 building_tax_assessor_02: "Bureau de Recouvrement"
 building_tax_assessor_02_desc: "Les officiers ici présents effectuent les évaluations, gèrent les recouvrements et règlent les litiges ; leur autorité contribue au respect des obligations à travers toute la juridiction."
 building_tax_assessor_03: "Tribunal des Magistrats"
 building_tax_assessor_03_desc: "Un tribunal administratif structuré, composé de magistrats et de clercs, traite les audits complexes, les appels et les affaires juridiques afin de garantir que les levées et obligations soient appliquées équitablement aux grands propriétaires terriens et aux institutions."

 building_leisure_palace_01: "Havre de Repos"
 building_leisure_palace_01_desc: "Lorsque le poids des responsabilités devient trop lourd — ou que les troubles menacent les portes —, nulle demeure n'offre meilleur refuge qu'une retraite champêtre isolée pour quelque repos bien mérité."
 building_leisure_palace_03: "Refuge Hivernal"
 building_leisure_palace_03_desc: "Ce refuge hivernal est conçu pour accueillir les dirigeants et leurs maisonnées durant les mois les plus rigoureux. Doté d'un garde-manger bien garni et d'une position défendable, il offre chaleur et abri à l'écart des tourments du dehors."

 building_type_royal_forest_01: "Terres Réservées"
 building_type_royal_forest_01_desc: "Une forêt réservée constitue une précieuse source de richesses, permettant aux autorités locales de restreindre les droits, de gérer l'accès et de vendre des permis. Il va sans dire que la chasse y est également excellente."
 building_royal_forest_01: "Forêts Protégées"
 building_royal_forest_01_desc: "De vastes étendues forestières de ce territoire sont réservées à un usage contrôlé. Les gens du commun n'ont pas le droit d'y résider, d'y chasser le gibier ni d'y abattre des arbres pour l'agriculture sans autorisation."
 building_royal_forest_02: "Vastes Forêts Réservées"
 building_royal_forest_02_desc: "Des établissements entiers se trouvent désormais englobés par ces forêts protégées, et les villages alentour découvrent souvent que des officiers ont 'trouvé' des cartes situant leurs habitations bien à l'intérieur des terres réservées."
 building_royal_forest_03: "Tribunaux Forestiers"
 building_royal_forest_03_desc: "La loi ne vaut que par le système qui la fait respecter. Cette forêt réservée possède désormais son propre réseau de tribunaux, de gardes forestiers et de clercs, épaulés par des magistrats formés pour administrer et faire appliquer les règlements."

 building_type_royal_garden_01: "Jardins Seigneuriaux"
 building_type_royal_garden_01_desc: "Rares sont les lieux où l'on se détend et se retrouve aussi aisément que dans un beau jardin. Si un modeste jardin privé peut suffire à la plupart, seul l'ouvrage le plus grandiose sied aux puissants de ce monde."
 building_royal_garden_01: "Jardin Clos"
 building_royal_garden_01_desc: "Un petit jardin clos de murs de pierre. Il offre un havre de paix et de quiétude en tenant le monde agité du dehors à distance."
 building_royal_garden_02: "Domaine des Jardins"
 building_royal_garden_02_desc: "Un jardin vaste et magnifique, abritant fleurs, plantes médicinales, arbres fruitiers et bien d'autres merveilles. Entretenu par une foule de jardiniers, le domaine est sous soin constant."
 building_royal_garden_03: "Grand Parc"
 building_royal_garden_03_desc: "Ce paysage vaste et saisissant est soigneusement intégré au terrain et à l'architecture environnants. Ouvert à tous, il suscite l'émerveillement des visiteurs venus de contrées lointaines."

 building_burial_site_02_desc: "Un grand mausolée a été érigé, garni d'emplacements pour des sépultures communes, et abritant quelques tombeaux réservés aux figures vénérées des âges passés."
 building_burial_site_03_desc: "Le mausolée a été agrandi en un monument imposant dédié aux défunts. L'intérieur regorge de sépultures à la mémoire de ceux qui ne sont plus."