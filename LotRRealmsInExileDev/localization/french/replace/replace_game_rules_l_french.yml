l_french:

 setting_1453_end_date: "4000 T.Â."
 setting_1453_end_date_desc: "La partie prendra fin à l'aube du quatrième millénaire du Troisième Âge, en l'an 4000 T.Â."

 setting_default_regional_heresy_desc: "Les foyers d'hérésie dans certaines régions ont davantage de chances d'être des hérésies historiques, telle l'Ulmonduri dans le Gondor occidental."

 rule_dlc_fp1_scandinavian_adventurers: "Aventuriers Étrangers"

 setting_fp1_scandi_adventurers_rare_desc: "Des aventuriers étrangers tenteront de cibler divers royaumes tous les 15 ans."
 setting_fp1_scandi_adventurers_occasional_desc: "Des aventuriers étrangers tenteront de cibler divers royaumes tous les 10 ans."
 setting_fp1_scandi_adventurers_frequent_desc: "Des aventuriers étrangers tenteront de cibler divers royaumes tous les 5 ans."
 setting_fp1_scandi_adventurers_apocalyptic_desc:1 "Des aventuriers étrangers tenteront de cibler divers royaumes chaque année ; les personnages PNJ n'ont pas besoin de traits spécifiques pour lancer [varangian_adventures|E]."
 setting_fp1_scandi_adventurers_off_desc: "Des aventuriers étrangers ne tenteront jamais de cibler les différents royaumes."

 rule_black_death_occurrence: "Circonstances de la Grande Peste"
 setting_bd_occurrence_organic_desc: "La Grande Peste surviendra dans un scénario historiquement plausible, façonné par l'état actuel du monde."
 setting_bd_occurrence_historical_desc: "La Grande Peste prendra naissance à Rhûn au seizième siècle du Troisième Âge et se propagera naturellement par les grandes routes commerciales."
 
 setting_bd_occurrence_random_desc: "La Grande Peste prendra naissance dans une province entièrement aléatoire sur la carte."
 rule_black_death_frequency: "Fréquence de la Grande Peste"
 setting_bd_frequency_once_desc: "La Grande Peste ne peut survenir qu'une seule fois au cours de votre partie."
 setting_bd_frequency_unlimited_desc: "La Grande Peste peut apparaître un nombre illimité de fois au cours d'une campagne."
 setting_bd_frequency_never_desc: "La Grande Peste ne surviendra jamais."

 game_rule.1141.choice.margaret: "Par quelque miracle incompréhensible, le Witengamot s'est accordé sur #EMP moi#! comme candidate de compromis, écartant l'héritier attendu [jiltee.GetFirstName] [jiltee.GetHouse.GetName]. Les grands comtes croient manifestement pouvoir me gouverner, me prenant pour une marionnette à leurs ambitions.\n\nJe ne suis rien de tel, mais j'accueille avec faveur cette ascension inattendue au pouvoir — je suis, après tout, la première-née de mon père."
 game_rule.1141.choice.edgar: "Dans un accès de compétence sans précédent dans la politique anglaise depuis bien, bien des années, le Witengamot a jugé bon de reconnaître que #EMP je#! suis le légitime héritier de [GetScriptedCharacterByHistoryID( '114' ).GetTitledFirstNameNicknamedPossessive] et m'a désigné pour gouverner le royaume, écartant l'héritier attendu [jiltee.GetFirstName] [jiltee.GetHouse.GetName].\n\nJe ne saurais dire ce que j'ai accompli pour mériter si bien la faveur de [ROOT.Char.GetFaith.FateGodNamePossessive], mais je m'en réjouis au plus haut point."
 game_rule.1141.choice.svend: "Las de la mort et de la désolation semées par chaque prétendant, le Witengamot s'est — sagement, pour une fois — tourné vers #EMP moi#! comme candidat le plus naturel pour rétablir l'ordre, écartant l'héritier attendu [jiltee.GetFirstName] [jiltee.GetHouse.GetName].\n\nUne fois encore, le Danemark reprendra la place qui lui revient à la tête de l'Angleterre."
 game_rule.1141.choice.aelfwine: "Saisi de quelque folie arcane, le Witengamot m'a supplié — #EMP moi#! — de rentrer au pays pour gouverner le royaume de mon père et de mon aïeul, écartant l'héritier attendu [jiltee.GetFirstName] [jiltee.GetHouse.GetName].\n\nJe... je n'avais nulle ambition en ce sens. Je n'en voulais point. Je me suis éloigné du pouvoir autant que faire se peut, mais il est manifeste qu'on n'échappe point à la volonté de [elect.GetFaith.HighGodNamePossessive] que je retourne en ces terres que j'avais jadis quittées avec bonheur, croyant ne jamais y revenir."