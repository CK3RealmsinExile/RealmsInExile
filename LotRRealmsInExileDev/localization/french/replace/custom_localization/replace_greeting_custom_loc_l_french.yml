l_french:
 greeting_supplimentary.negative.tales: "Le récit de tes méfaits se conte de la Porte de la Nuit jusqu'à la Porte du Matin."
 greeting_supplimentary.negative.greek: "Ta vile nature est le sujet des Lais de Beleriand."
 greeting_supplimentary.negative.insult_muslim.1: "Puisse la barbe de ton Père-des-Nains tomber."
 greeting_supplimentary.negative.insult_muslim.2: "Puisses-tu être cousu vif dans le ventre d'un Mûmak crevé."
 greeting_supplimentary.negative.insult_muslim.3: "Puisse [ROOT.Char.GetFaith.HighGodName] anéantir ta maison."