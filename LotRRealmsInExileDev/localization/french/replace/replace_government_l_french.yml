l_french:

 feudal_government_desc: "\n$game_concept_feudal_desc$\n\n#F Le système féodal repose sur les liens entre le détenteur de terres et ceux qui offrent services et labeur en échange du droit d'y résider. Les dirigeants qui tiennent les terres désignent des vassaux auxquels sont accordés des fiefs à gouverner. En retour, les vassaux fournissent à leur suzerain des [soldiers|E] et des [taxes|E].#!"
 
 jizya_special_rights_tax_collector: "Taxer les Impies" #LotR
 jizya_special_rights_tax_collector_flavor_desc: "Des taxes de protection religieuse sont imposées aux minorités confessionnelles, en échange du privilège de pratiquer leur foi dévoyée en paix." #LotR
 
 iqta_special_rights_tax_collector: "Petite Noblesse" #LotR
 iqta_special_rights_tax_collector_flavor_desc: "Sous un système contrôlé par la Petite Noblesse, les seigneurs locaux se voient accorder une large autorité pour percevoir les impôts au nom de l'État. En contrepartie, ils sont tenus de renforcer les armées de leur suzerain." #LotR
 
 ghazi_special_rights_tax_collector: "Guerriers de la Foi" #LotR
 ghazi_special_rights_tax_collector_flavor_desc: "Combattants de la foi et des marches, ces Guerriers Sacrés tirent leurs revenus du butin et de la rapine, menant une guerre sans relâche contre les ennemis religieux de l'État." #LotR

 deqhan_special_rights_tax_collector: "Droits Délégués" #LotR
 deqhan_special_rights_tax_collector_flavor_desc: "Les Droits Délégués offrent un système de perception décentralisé, remettant le contrôle aux grands seigneurs locaux pour qu'ils administrent étroitement leurs terres et en accroissent les rendements — ainsi que leur propre prestige." #LotR

 maguh_special_rights_tax_collector: "Réinvestissement Direct" #LotR
 maguh_special_rights_tax_collector_flavor_desc: "Une forme plus directe d'administration des domaines, où une part des recettes fiscales est réinvestie pour favoriser le développement local — résultant en une contribution moindre versée à l'État." #LotR

 muqata_special_rights_tax_collector: "Autonomie Locale" #LotR
 muqata_special_rights_tax_collector_flavor_desc: "L'Autonomie Locale offre un système de perception où les terres lointaines jouissent d'une plus grande indépendance et sont moins imposées, afin de favoriser la stabilité et la prospérité durable." #LotR
 
 strict_taxation_tax_collector: "Impôt sur les Fastes" #LotR
 strict_taxation_tax_collector_flavor_desc: "Des taxes frappant les richesses et les fastes sont imposées aux nantis afin d'accroître les recettes de l'État et de porter secours aux plus démunis." #LotR

 special_contract_march: "Contrat de $special_contract_march_short$"
 special_contract_castellan: "Contrat de $special_contract_castellan_short$"
 special_contract_march_short: "Marche" #[Char.Custom('march_contract_name')]
 special_contract_castellan_short: "Châtelain" #[CHARACTER.Custom('castellan_contract_name')]
 march: "Marche"
 castellan: "Châtelain"

 wanua_government_desc: "\n$game_concept_wanua_desc$\n\n#F Depuis leurs établissements côtiers, les dirigeants Wanua peuvent sillonner les mers pour commercer et mener des raids bien plus efficacement que leurs homologues $tribal_government_adjective$ continentaux.#!" # LOTR