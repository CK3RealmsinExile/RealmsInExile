l_english: 
 ##################################################
 # IRANIAN INTERMEZZO FRONTIER FLAVOR EVENTS 
 ##################################################

 fp3_yearly.2000.desc_drinking: "Toute la nuit, j’ai bu avec mes vassaux et mes amis proches. Tandis que je savoure la fin de la rosée matinale,"
 fp3_yearly.2000.desc_hashish: "Toute la nuit, j’ai partagé mon [prudish_liege.Custom('GetPipeWeedName')] avec mes compagnons vassaux et camarades de réjouissance, jusqu’au lever du soleil. Tandis que je tire une dernière bouffée de ma pipe,"
 fp3_yearly.2000.desc_warning: "[cautious_vassal.GetTitledFirstName] me prend à part dans mon euphorie :\n\n« Si les gardes de [prudish_liege.GetTitledFirstName] vous voient ainsi en ville, [prudish_liege.Custom('FR_IlElle')] vous fera arrêter et vous fera fouetter. Reposez-vous ici à l’intérieur jusqu’à l’après-midi, puis partez une fois sobre. »"
 fp3_yearly.2000.b_failure: "Les gardes de [prudish_liege.GetTitledFirstNameNoTooltip|U] m’attrapent et me fouettent"


 fp3_yearly.2001.desc_intro: "Mes gardes m’informent que [intoxicated.Custom2('MyCharacterIntroduction', ROOT.Char)] erre dans les rues de la ville," #lotr
 fp3_yearly.2001.desc_hashish: "soufflant des ronds de fumée vers le ciel" #lotr


 fp3_yearly.2010.t: "Livres de blé" #lotr
 fp3_yearly.2010.desc: "Aucune nouvelle de sécheresse ni de famine n’est parvenue jusqu’à moi, et pourtant les habitants de [bakers_county.GetNameNoTier] se plaignent que le pain devienne déraisonnablement cher.\n\n« C’est votre boulanger royal, [greedy_baker.GetFirstName], » me dit [random_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)]. « [greedy_baker.Custom('FR_IlElle')|U] a acheté toutes les cargaisons de blé et de farine entrant dans la ville et ne nous permet pas d’en acquérir ne serait-ce qu’une seule livre. »" #lotr
 fp3_yearly.2010.a_elephants: "mûmakil!" #lotr


 fp3_yearly.2020.desc_cynical: "[sinful_tax_collector.Custom('FR_IlElle')|U] montre peu d’intérêt pour les affaires religieuses et n’éprouve aucun amour pour [ROOT.Char.GetFaith.HighGodName] ; [sinful_tax_collector.Custom('FR_IlElle')] s’endort pendant les prières et on peut le voir voler les pauvres." #lotr

 fp3_yearly.2021.desc_cynical: "« [sinful_tax_collector.GetTitledFirstNameNoTooltip] ne craint pas [ROOT.Char.GetFaith.HighGodName], s’endormant souvent pendant les prières et volant les pauvres. Nous craignons tous la justice de [ROOT.Char.GetFaith.HighGodName] à cause de [sinful_tax_collector.Custom('FR_LuiElle')]. »" #lotr
 fp3_yearly.2021.a: "[sinful_tax_collector.Custom('FR_le_Char_Pi')|U][sinful_tax_collector.GetTitledFirstNameNoTooltip] sera renvoyé[sinful_tax_collector.Custom('FR_E')]." #lotr

 fp3_yearly.8003.desc: "Ma[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('superstitious_consort'))] [superstitious_consort.GetFirstName] a l’habitude de brûler des graines d’#italic espand#! pour repousser les forces maléfiques. Mais à présent, [superstitious_consort.Custom('FR_IlElle')] affirme que m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('cruel_consort'))] [cruel_consort.GetFirstName] [superstitious_consort.Custom('FR_LuiElle')] a jeté le mauvais œil et a dérobé sa réserve d’espand. [cruel_consort.GetFirstNameNoTooltip], bien sûr, nie toute implication dans cette affaire. Mais [superstitious_consort.GetFirstNameNoTooltip] semble entièrement préoccupé[superstitious_consort.Custom('FR_E')] par l’acquisition de nouvel espand, afin de se débarrasser de cette prétendue malédiction.\n\n« Je vous en prie, [ROOT.Char.Custom('FR_MonseigneurMadame')|U], » supplie [superstitious_consort.Custom('FR_IlElle')], « un prêtre m’a parlé d’une montagne sacrée dans [espad_mountain_province.GetName] ; c’est là seulement que poussent les meilleures fleurs d’espand. Vous devez en faire venir, pour moi. »"

####The Frontiers' Call, by Ola Jentzsch####
 fp3_yearly.8004.t: "L’appel de la frontière"
 fp3_yearly.8004.desc: "Pour certains qui vivent dans les splendides cités de ces terres, les vents hurlants des steppes résonnent encore dans leur cœur. Pour le meilleur ou pour le pire, m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('fp3_child_to_leave'))] [fp3_child_to_leave.GetFirstName] a commencé à ressentir cet appel.\n\n« [parent.GetMotherFather|U], vous devez me laisser partir. Je veux aiguiser mon esprit et mon épée aux confins sauvages, voyager avec des caravanes et les peuples des montagnes, et peut-être même trouver le Palisor de légende. »\n\nMais [worried_relation.GetFirstName] aime profondément [fp3_child_to_leave.GetFirstNameNoTooltip] et me supplie de refuser sa requête."

 fp3_yearly.8008.desc: "Je recule en trébuchant, ensanglanté[ROOT.Char.Custom('FR_E')] et épuisé[ROOT.Char.Custom('FR_E')], tandis que [fp3_child_to_leave.GetFirstNameNoTooltip] s’approche de moi, une arme à la main.\n\n« Je vous l’ai déjà dit, [parent.GetMotherFather], je #italic partirai#!. Je voyagerai jusqu’aux confins, comme mon cœur le désire, loin le long de la route de Rhûn, et #italic vous#! paierez pour cela. »\n\nJe ne peux rien faire d’autre que regarder m[fp3_child_to_leave.Custom('FR_OnA')] [fp3_child_to_leave.Custom('GetDaughterSon')] partir, la tête haute, avec une bourse de pièces d’or tirées de mon trésor."

 fp3_yearly.8009.desc_beginning: "Les confins ont depuis longtemps servi de refuge aux païens et aux sectes étranges. Pourtant, à [caliphal_location.GetName], [righteous_caliph.Custom('FR_LeLa')] [righteous_caliph.GetTitleTierName] [righteous_caliph.GetFirstName] s’en montre de plus en plus préoccupé[ROOT.Char.Custom('FR_E')].\n\n« Nous avons entendu parler des [very_heretic_county.GetCountyData.GetFaith.GetAdherentNamePlural] dans [very_heretic_county.GetName], qui pratiquent des rituels étranges. » L’émissaire [hof_emissary.GetName] du/de la [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetAdjectiveNoTooltip] marque une pause, comme pour rassembler son courage, avant que [hof_emissary.Custom('FR_IlElle')] ne reprenne d’une voix basse et scandalisée : « Certains parlent même de rituels de nature #italic charnelle#!. Cela suffit. »"


 fp3_yearly.8010.desc_not_muslim: "[righteous_caliph.Custom('FR_LeLa')|U] [righteous_caliph.GetTitleTierName] [righteous_caliph.GetFirstName] croit fermement à une vision du monde comme une lutte sans fin entre civilisation et barbarie, et se montre constamment préoccupé[ROOT.Char.Custom('FR_E')] par des ennemis impies tapis et complotant dans l’Est indompté.\n\n« Il est de votre devoir, en tant que [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip], » me dit [righteous_caliph.Custom('FR_IlElle')], « de placer les confins païens sous notre vigilance. Voilà trop longtemps que nous tolérons les pratiques idolâtres de [pagan_ruler.GetTitledFirstName]. Je vous enverrai des troupes fidèles et des mercenaires nomades, afin que vous puissiez libérer [pagan_county.GetNameNoTier] de la domination de [pagan_ruler.Custom('FR_LuiElle')]. »"

 fp3_yearly.8012.desc: "« Il semble, » déclare [righteous_caliph.Custom('FR_LeLa')] [righteous_caliph.GetTitleTierName] [righteous_caliph.GetFirstName], « que vous n’avez pas tardé à tenir votre promesse de conquérir [pagan_county.GetNameNoTier] au nom de notre foi. Vous avez prouvé être un dirigeant digne de confiance et un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetFaith.GetReligion.GetAdjectiveNoTooltip] dévot[ROOT.Char.Custom('FR_E')], et nous ne l’oublierons pas de sitôt. »"

 fp3_yearly.8014.desc: "Voilà longtemps que je m’efforce de concilier mon goût pour les boissons enivrantes avec la vision pieuse des [ROOT.Char.GetFaith.GetAdherentNameNoTooltip] sur ces questions. Heureusement, m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('smart_courtier'))] [smart_courtier.GetFirstName] a trouvé une solution.\n\n« J’ai appris que d’anciens [ROOT.Char.Custom('LevyMenWomen')] vivent dans les montagnes, » explique [smart_courtier.Custom('FR_IlElle')], « et qu’ils ont besoin d’une certaine quantité d’alcool pour supporter le froid. Et pour se divertir, bien sûr. Ils ont l’habitude de verser leurs boissons dans un pot de cuivre, de sorte que tout observateur trop zélé pense qu’ils boivent du thé, et non du vin. Je fais cela moi-même depuis un certain temps, et c’est fort pratique. »"

 #Forgotten Runestones, by Ola Jentzsch 
 fp3_yearly.8016.t: "Pierres oubliées"
 fp3_yearly.8016.desc: "M[ROOT.Char.Custom2('FR_RelationToMe_OnA', SCOPE.sC('hyrcanian_vassal'))] [hyrcanian_vassal.GetFirstName] m’a invité[ROOT.Char.Custom('FR_E')] à venir observer un trio d’étranges pierres sculptées, au cœur [ROOT.Char.Custom('FR_du_Char_Pi')] [runestone_province.GetTerrain.GetNameNoTooltip|l] de son domaine.\n\n« Elles ont sans doute été dressées par une expédition perdue des sauvages du Nord, » m’explique [hyrcanian_vassal.Custom('FR_IlElle')]. « À présent, les habitants [ROOT.Char.Custom('FR_du_Char_Pi')] la [runestone_province.GetTerrain.GetNameNoTooltip|l] se sont attachés à ces pierres et croient que leurs mystérieux bâtisseurs descendront sur eux depuis la vallée de l’Anduin avec une vengeance rapide et sanglante si elles sont détruites. Mais je ne crois pas à ces récits. Bien que je ne puisse lire les inscriptions, ce sont assurément des idoles païennes, et elles doivent être réduites en morceaux. N’est-ce pas, mon suzerain ? »"

 fp3_yearly.8017.desc: "Le désastre a frappé ! De furieux guerriers #italic Nordiques#! se sont abattus sur [runestone_county.GetNameNoTier] comme des charognards sur un cadavre, massacrant tout sur leur passage. [hyrcanian_vassal.GetTitledFirstName] a été frappé[hyrcanian_vassal.Custom('FR_E')] par un coup de hache et se trouve dans un état critique, gravement mutilé[hyrcanian_vassal.Custom('FR_E')]. Mais aussi vite qu’ils étaient venus, les pillards ont regagné leurs embarcations et ont disparu dans la brume matinale de la mer Caspienne.\n\nDes rumeurs se répandent parmi les survivants : les assaillants auraient cherché à se venger de [hyrcanian_vassal.GetFirstNameNoTooltip] pour la profanation des pierres runiques nordiques, il y a toutes ces années..."
 fp3_yearly.8018.desc_eunuch: "Alors que je m’entraîne avec [ROOT.Char.Custom('WarhorseStoryName')], un voyageur venu de contrées lointaines s’approche de moi. Il s’incline avec des gestes mesurés, témoignant d’une longue carrière dans de somptueuses cours.\n\n« Je sers une grande dame, » dit-il, « à Khy, au-delà de ces hautes montagnes. Ma maîtresse est une fervente adepte du #italic chovgan#!, ce sport équestre populaire même dans votre modeste royaume, mais elle est aussi encline à se vanter. Elle a déclaré à ses amis que, lors de la prochaine partie, elle monterait le plus noble cheval sous le ciel. Mon peuple a toujours prisé les #italic chevaux célestes#! de votre terre, et il semblerait, [ROOT.Char.Custom('FR_MonseigneurMadame')|U], que vous possédiez le plus remarquable d’entre eux. Mais je sais aussi que vous avez quelques difficultés #italic financières#!... »\n\n« Alors, qu’en dites-vous ? Puis-je acheter cette magnifique [ROOT.Char.Custom('HorseStoryMareStallion')] ? »"

 fp3_yearly.8018.desc_grand_old_lady: "Alors que je m’entraîne avec [ROOT.Char.Custom('WarhorseStoryName')], une noble dame vêtue d’atours exotiques s’approche de moi avec sa suite.\n\n« Je viens, » m’explique-t-elle, « des grandes cours de Khy. Récemment, je me suis intéressée au #italic chovgan#!, ce sport équestre populaire même dans votre modeste royaume. Mais pour la prochaine partie, j’ai juré de monter un #italic cheval céleste#!, ces montures au sang écarlate venues du Rohan que mon peuple chérit plus encore que le Pilier de l’Immortalité. Or, j’ai appris que vous, humble [ROOT.Char.Custom('FR_MonseigneurMadame')] de ces contrées, possédez un[ROOT.Char.Custom('FR_E')] [ROOT.Char.Custom('HorseStoryMareStallion')] supérieur[ROOT.Char.Custom('FR_E')] à tous les autres. J’ai aussi appris que vous êtes endetté[ROOT.Char.Custom('FR_E')]... »\n\nElle vous tend une lourde bourse d’or, et son intention est limpide."

 fp3_yearly.8888.desc: "[upset_vassal.GetName] vient me trouver, visiblement contrarié[upset_vassal.Custom('FR_E')].\n\n« Mon suzerain, » déclare [upset_vassal.Custom('FR_IlElle')], « la tribu [turkic_leader.GetCulture.GetName] dirigée par [turkic_leader.GetName] s’est emparée de toutes les terres de pâturage dans [nomads_county.GetNameNoTier] et cause bien des troubles aux braves gens sédentaires. J’ai tenté d’envoyer des mercenaires pour les chasser, mais ils se replient dans les terres désertes avant de revenir un mois plus tard. Vous devez m’aider à expulser ces barbares malpropres, une bonne fois pour toutes. »\n\n« Je peux m’en charger, » affirme m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('possibly_capable_marshal'))] [possibly_capable_marshal.GetCouncilTitle] [possibly_capable_marshal.GetFirstName], « envoyez-moi à [nomads_county.GetNameNoTierNoTooltip]. »"

 fp3_frontier_story_cycle.0002_letter: "Je regrette mon comportement lors de l’affaire des nomades. Ils ont effectivement quitté [nomads_county.GetNameNoTier], et j’entends dire que les conflits avec les paysans se sont apaisés. Bien que je maintienne que vous devriez prendre la menace nomade au sérieux, je souhaite vous offrir ces magnifiques pièces d’or, frappées dans l’Empire [khyan|E] il y a fort longtemps, en gage de mon respect."

 fp3_frontier_story_cycle.0003_not_jizya: "Nous devrions leur imposer une taxe supplémentaire, car vous avez déjà fait preuve d’une grande générosité à leur égard, n’est-ce pas ?\n\n"

 fp3_frontier_story_cycle.0007.desc: "« Ô [ROOT.Char.GetTitleTierName], » dit m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('warmonger_councillor'))] [warmonger_councillor.GetFirstName], « les marchands de [bandits_county.GetName] parlent de raids menés par des bandits à cheval. Les caravanes évitent désormais cette région, ce qui nuit à notre commerce sur la route de Rhûn. Je vous prie de m’envoyer enquêter. »\n\n« Non, » intervient vivement [turkic_leader.GetName], « je peux envoyer mes guerriers sécuriser durablement les routes caravanières — si nous pouvons faire paître nos chevaux dans [bandits_county.GetNameNoTierNoTooltip] à l’avenir. N’est-ce pas une meilleure solution ? »\n\nMais [warmonger_councillor.GetFirstNameNoTooltip] proteste : « Prenez garde, [ROOT.Char.Custom('FR_MonseigneurMadame')|U] — les paysans détestent que vous laissiez les nomades errer librement. »"

 fp3_yearly.8021.desc: "Il y a quelques jours, [alchemy_enthusiast.GetName], l’érudit[alchemy_enthusiast.Custom('FR_E')] [alchemy_enthusiast.Custom2('RelationToMe', SCOPE.sC('upset_vassal'))] de m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('upset_vassal'))] [upset_vassal.GetFirstName], a pris part à une expérience avec de l’huile de vitriol concoctée par le célèbre alchimiste [enthusiastic_alchemist.GetName]. Apparemment, quelque chose a terriblement mal tourné.\n\n« Vous devez punir sévèrement [enthusiastic_alchemist.GetFirstNameNoTooltip], » me dit [upset_vassal.GetTitledFirstNameNoTooltip], « voyez l’état misérable de m[alchemy_enthusiast.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('upset_vassal'))] ! »\n\n« Non, m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('upset_vassal'))] [ROOT.Char.GetTitleTierName], » implore [enthusiastic_alchemist.GetFirstNameNoTooltip], « je n’ai fait que perfectionner une formule longtemps recherchée par les sages. Ce n’est pas ma faute si [alchemy_enthusiast.GetTitledFirstNameNoTooltip] a été imprudent[alchemy_enthusiast.Custom('FR_E')] avec une #italic once#! entière de la substance la plus corrosive jamais vue en [middleearth|E]. »"

 fp3_yearly.8022.desc: "« Ce que j’ai inventé provient d’un minéral vitreux que les [numenoreans|E] d’autrefois appelaient #italic vitriol#!, » explique [enthusiastic_alchemist.Custom('FR_le_Char')][enthusiastic_alchemist.GetName]. « En chauffant minutieusement du vitriol vert dans un récipient de fer, j’ai créé cette substance corrosive. J’y vois des usages à la fois savants et médicinaux, mais prenez garde, [ROOT.Char.Custom('FR_MonseigneurMadame')|U], elle ne doit pas être manipulée à la légère, comme l’a appris [alchemy_enthusiast.Custom('FR_le_Char_Pi')][alchemy_enthusiast.GetTitledFirstName]. Peut-être souhaiteriez-vous financer mes recherches ? »"

 fp3_yearly.8023.desc: "Tandis que je verse délicatement des liquides aux sinistres crépitements d’une fiole à l’autre, [enthusiastic_alchemist.Custom('FR_le_Char')][enthusiastic_alchemist.GetName] me regarde avec inquiétude.\n\n« Ô [ROOT.Char.GetTitleTierName], » dit [enthusiastic_alchemist.Custom('FR_IlElle')], « je suis avant tout un érudit[enthusiastic_alchemist.Custom('FR_E')] en histoire et en théologie ; comparé[enthusiastic_alchemist.Custom('FR_E')] à vous, je ne suis qu’un débutant[enthusiastic_alchemist.Custom('FR_E')] en alchimie, semble-t-il. Mon expérience me dit toutefois que nous ne pouvons rien apprendre de plus pour l’instant. Nous devrions cesser d’expérimenter cette huile de vitriol que j’ai créée, ou je crains que [ROOT.GetCharacter.GetFaith.HighGodNameAlternate] ne nous punisse pour notre vanité. Peut-être que de tels acides n’auraient jamais dû exister en [middleearth|E]. »"

 fp3_yearly.8024.desc: "Alors que la fièvre et les frissons s’apaisent un instant, [dying_consort.GetFirstName] me regarde avec un pâle sourire. « Select_CString(ROOT.Char.IsFemale, 'Ma chère épouse', 'Mon cher époux')], je n’ai plus beaucoup de temps en ce monde. Même les meilleurs médecins n’ont pu que retarder l’inévitable, je le sens. » [dying_consort.Custom('FR_IlElle')|U] semble lutter pour rester conscient[dying_consort.Custom('FR_E')] un peu plus longtemps.\n\n« Écoutez, » murmure t-[dying_consort.Custom('FR_IlElle')] d’une voix défaillante, « car c’est mon dernier souhait. Je veux que mon corps soit offert aux oiseaux charognards, selon la coutume de mes ancêtres, afin que mon âme puisse être emportée vers sa demeure céleste. Ni sépulture ni crémation, je vous en prie. J’ai entrevu l’au-delà dans mes rêves fiévreux… Je veux finir selon l’ancienne voie, en véritable [dying_consort.Custom('GetDaughterSon')] de [dying_consort.GetFaith.CreatorName]. »"

 fp3_yearly.8025.desc: "Avec toutes les cérémonies appropriées, le corps [dying_consort.Custom('FR_du_Char')][dying_consort.GetName] est déposé dans les niches d’une ancienne #italic Tour du Silence#!, exposé au ciel et aux vautours qui tournent déjà au-dessus.\n\nTrois jours se sont écoulés depuis sa mort, et je me surprends à rester près de la Tour du Silence jusqu’au lever du soleil. Selon les anciennes croyances, au quatrième matin suivant la mort, l’âme rejoint son esprit #italic fravashi#! dans le monde supérieur. Là, elle lui transmet tout ce qu’elle a appris de son vivant, afin de participer à la lutte éternelle contre le mal. Mais je ne vois aucune âme s’élever vers le ciel depuis les murs décrépits de la Tour du Silence, seulement la sombre silhouette des oiseaux charognards dans la pâle lumière de l’aube."


 fp3_yearly.8026.t: "La tour du silence secrète"
 fp3_yearly.8026.desc: "Bien au-delà de mon [ROOT.Char.Custom('ResidenceBuilding')], s’élève une ancienne Tour du Silence, lentement rongée par les vents glacés des steppes. Ici, nul regard indiscret — et, avec [helpful_courtier.GetFirstName], je porte le corps [dying_consort.Custom('FR_du_Char_Pi')][dying_consort.GetTitledFirstName] jusqu’à son dernier repos, dans les niches desséchées de la tour. Je demeure silencieux tandis que les vautours descendent comme une nuée noire, et je me demande un instant d’où ils viennent — sont-ils envoyés par les anciens dieux, ou par [ROOT.Char.GetFaith.DevilName] ? Je ne le saurai jamais.[helpful_courtier.GetFirstNameNoTooltip] reste muet, visiblement saisi[helpful_courtier.Custom('FR_E')] par la gravité du moment."

 fp3_yearly.8032.desc: "À mesure que la fin de l’ancienne année du calendrier khailûza approche, vient le temps de la fête ancestrale dédiée aux âmes des morts. M[ROOT.Char.Custom2('FR_RelationToMe_OnA', SCOPE.sC('death_enthusiast'))] [death_enthusiast.Custom('FR_le_Char_Pi')][death_enthusiast.GetTitledFirstName] est devenu étrangement silencieux, presque accablé, déposant des offrandes de nourriture pour les esprits des ancêtres devant les portes.\n\n« Vous devriez aller allumer les lampes », me dit-[death_enthusiast.Custom('FR_IlElle')], « afin d’accueillir les esprits. Car vos ancêtres nous observent sans doute à présent, au-delà des fines parois de ce monde matériel. Songez à [ancestor_1.GetName] et aux illustres aïeux de votre maison. »"

 fp3_yearly.8032.a: "Hélas, je ne célèbre point les rites des ancêtres."

 fp3_yearly.8034.t: "Le Trésor des Balchoth" #lotr
 fp3_yearly.8034.desc: "« Écoutez-moi, [ROOT.Char.Custom('FR_MonseigneurMadame')|U] », implore [wronged_vassal.Custom('FR_le_Char')][wronged_vassal.GetName] devant moi. « Il y a un mois, alors que j’inspectais des terres près d’une rivière en [hephthalite_hoard_province.GetNameNoTier], je découvris un trésor d’or d’une magnificence rare. Aux crânes allongés des rois frappés sur les pièces, je compris qu’il avait été enfoui par un peuple balchoth — peut-être même le Clan Impérial, qui gouverna ces terres il n’y a pas si longtemps. Étant de leur sang, je considère ce trésor comme mien de droit. Toutefois, [ROOT.Char.Custom('FR_MonseigneurMadame')|U], [greedy_vassal.Custom('FR_le_Char_Pi')][greedy_vassal.GetTitledFirstName], le conteste. [greedy_vassal.Custom('FR_IlElle')|U] cherche à me le ravir, prétendant qu’il lui revient en tant qu’héritier de leur domination. Je vous en conjure, soutenez ma cause. »" #lotr


 fp3_yearly.8036.t: "La Terre des Hommes Púkel" #lotr
 fp3_yearly.8036.desc: "Le soleil s’est couché lorsque je chevauche dans les terres sauvages aux abords de [spooky_county.GetNameNoTier], accompagné de m[ROOT.Char.Custom2('FR_RelationToMe_OnA', SCOPE.sC('superstitious_councillor'))] [superstitious_councillor.Custom('FR_le_Char_Pi')][superstitious_councillor.GetTitledFirstName].\n\nDans la lueur blafarde de la lune, nous découvrons un lieu dont j’ai déjà entendu parler : un vaste dédale de pierres dressées — brisées et disjointes — ancien lieu de sépulture ou sanctuaire d’un peuple oublié des Âges Sombres, bien avant qu’un navire n’atteigne les rivages occidentaux de [middleearth|E].Mais dans la pierre ont été gravées des silhouettes humaines aux formes grossières : membres maladroits, assis en tailleur, bras courts croisés sur leurs ventres épais. Ces idoles flétries nous fixent d’un regard glacé tandis que nous tentons de passer, et semblent presque s’animer.\n\n« Ne nous attardons pas ici », murmure [superstitious_councillor.GetFirstNameNoTooltip], frissonnant. Pourtant, je ne puis m’empêcher de me demander — qui étaient ces gens ? Et ces lieux sont-ils vraiment hantés ?"

 fp3_yearly.8040.a: "Je partirai en quête de savoirs mystiques."

 fp3_yearly.8041.desc: "« Ce chemin sera ardu », déclare [sufi_mystic.Custom('FR_le_Char')][sufi_mystic.GetName] après avoir entendu mes tourments.\n\n« Les voies du mystique offrent une compréhension profonde de soi et de l’univers, mais elles exigent une discipline extrême. Je ne suis moi-même qu’un[sufi_mystic.Custom('FR_E')] initié[sufi_mystic.Custom('FR_E')] sur cette voie. Pourtant, mon [ROOT.Char.GetTitleTierName], nous pourrions tenter d’atteindre cet état de méditation où, simple goutte d’eau dans le rêve de [ROOT.GetCharacter.GetFaith.HighGodNameAlternatePossessive], vous prenez conscience de l’océan qui vous entoure. Peut-être y trouverez-vous une nouvelle vision de cette brève existence. »" 

 fp3_yearly.8043.desc: "[persian_polymath.GetFirstName] m’observe depuis de longues semaines, plongé dans de profondes réflexions.\n\n« Hélas, j’ai épuisé tous mes recours, grand [ROOT.Char.GetTitleTierName]. J’ai convoqué tout le savoir et toute l’habileté dont je dispose, mais comme je vous l’ai déjà confié, les afflictions de l’esprit se laissent difficilement apaiser. Pourtant, je crois que nous avons accompli quelque progrès : vos humeurs tendent désormais vers un meilleur équilibre, et votre esprit s’est affermi. Si vous faites preuve de patience, et persévérez à consommer des quantités saines de poisson ainsi que les herbes que je vous ai prescrites, alors, si [ROOT.GetCharacter.GetFaith.HighGodNameAlternate] le veut, vous pourriez encore triompher du #italic naergon#!. »\n\n« Quant à moi, je dois prendre congé, car j’ai des connaissances à approfondir ailleurs. »"

 fp3_yearly.8051_ending.desc: "Malgré ce sombre présage, [magi.Custom('FR_le_Char')][magi.GetName] ne semble point céder au désespoir.\n\n« Il nous faut raviver la flamme », déclare [magi.Custom('FR_IlElle')]. « La plus pure et la plus grande de toutes serait le Feu de la Victoire, né de la foudre au cœur des nuées. Mais puisque ce temple est modeste, contentons-nous peut-être du Feu des Feux, tel qu’un foyer d’orfèvre saurait l’offrir. Ou même d’un feu plus humble encore, que l’on peut consacrer à partir de n’importe quelle flamme domestique… »"

 fp3_scholarship.8000.desc: "Mon érudit[court_scholar.Custom('FR_E')] de la Cour, [court_scholar.Custom('FR_le_Char_Pi')][court_scholar.GetTitledFirstName], se précipite vers moi, accompagné de serviteurs qui portent des livres, des rouleaux et d’antiques parchemins.\n\n« Je suis sur le point d’atteindre une percée décisive, pour peu que l’on m’accorde le temps nécessaire, des fonds suffisants et assez d’encre pour noircir l’Anduin tout entier. »"
