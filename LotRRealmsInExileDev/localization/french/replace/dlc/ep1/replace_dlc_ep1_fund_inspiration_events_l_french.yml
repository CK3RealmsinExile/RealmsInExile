 fund_inspiration.2070.desc.hashishiyah: "On me rapporte les grandes quantités de [inspiration_owner.Custom('GetPipeWeedName')] sur lesquelles [inspiration_owner.GetFirstNameNoTooltip] dépense son financement, avant de s'enfermer dans les ténèbres."

 #India -> Harad Jungles
 fund_inspiration.6002.t: "Mon périple à travers les jungles se poursuit !"
 fund_inspiration.6002.desc: "Tant de gemmes scintillent dans les cours que je visite que j'en suis presque aveuglé. Je me surprends à aspirer à la crasse de la grand-route.\n\nJ'ai dépêché un courrier porteur d'un présent particulièrement criard qu'on m'a offert — un ornement frontal de Mûmak serti sur un anneau, avec des joyaux en guise d'yeux. Avez-vous jamais vu chose si tapageuse ?"
 
 #Africa -> Harad Deserts
 fund_inspiration.6003.desc: "Mon suzerain, mon voyage vers les déserts du Haradwaith est en cours, et j'ai rejoint une caravane de chameaux qui traverse ces terres de part en part.\n\nJe vous envoie un bijou qu'un de mes compagnons de route m'a offert — un collier des plus délicats, couvert de perles de coquille d'autruche. Je suppose que vous n'avez jamais vu d'autruche."

 #Middle East -> Gondor
 fund_inspiration.6004.t: "Les routes du Royaume méridional"
 fund_inspiration.6004.desc: "Mon voyage à travers le Gondor m'a surtout mené à longer d'innombrables ruines au bord des routes.\n\nSouvent, en quête de quelque trouvaille, je tombe sur de menus objets. J'ai dépêché un courrier chargé de ces babioles. Peut-être vous divertiront-elles."
 
 #Europe -> Westlands
 fund_inspiration.6005.desc: "[ROOT.Char.Custom('FormOfAddressForLiege')|U], j'ai déniché quelques reliques sans grand intérêt jusqu'ici au cours de mes aventures, que j'ai confiées à ce courrier, mais j'ignore ce que je découvrirai ensuite.\n\nLes [inspiration_owner.Char.GetCurrentLocation.GetCounty.GetCulture.GetCollectiveNoun] sont les créatures les plus malodorantes que j'aie rencontrées. Enfant, je rêvais de verts et plaisants pâturages, mais je suis désormais convaincu que la moitié de ce monde est faite de boue. Si vous êtes un suzerain miséricordieux, je vous en prie, faites-moi rappeler."

 #Asia minor -> Rhovanion
 fund_inspiration.6006.t: "Salutations du Rhovanion,"
 fund_inspiration.6006.desc: "Mes pérégrinations à travers le Rhovanion m'ont donné un goût certain pour les gâteaux au miel et le brochet d'Esgaroth, et j'ai joint quelques recettes à ce courrier.\n\nUn de mes hôtes m'a offert une broche d'or ornée d'un cheval, que je vous envoie également. Je ne doute point que mes voyages m'apporteront d'autres merveilles en temps voulu."
 
 #Poet sends you a book on same sex love if you requested it, as a side project by Isabella Welch
 fund_inspiration.6503.t: "$fund_inspiration.title$ Murmures du Rhûn"
 fund_inspiration.6503.desc: "\n\n« J'ai exploré un kourgane, un ancien tumulus funéraire datant de l'époque des Balchoth. Des centaines de chevaux depuis longtemps trépassés, empaillés, conservés et fichés aux murs pour se tenir debout, chacun dans sa propre alcôve. C'était une écurie des damnés, engloutie par le temps.\n\n« Conscient de mon devoir de quérir le savoir pour notre royaume, j'ai songé à dérober une relique de ce tombeau à l'insu de mon guide, afin de vous l'apporter. »"