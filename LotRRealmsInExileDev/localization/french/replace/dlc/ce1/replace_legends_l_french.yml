l_french:
 legend_chapter_famous_deed_raised_by_animals: "Jour après jour, [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip] gagna en force et en sagesse, préservé[ROOT.Legend.GetProtagonist.Custom('FR_E')] de la barbarie de la civilisation. À l'image des fondateurs de [numenor|E], [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] embrassa le monde qui lui avait donné la vie et enseigna à ceux des demeures la maîtrise de la chasse, abattant [ROOT.Legend.GetProtagonist.Custom('RegionalFerociousAnimal')] au pelage d'un blanc immaculé."
 
  # Drink a Troll (instead of an ogre) under the table!
 legend_spread_events.5420.desc: "[chronicler.GetFirstName] continue de consigner de plus en plus de récits tirés de [ROOT.Char.GetPromotedLegend.GetName], jusqu'à ce que soudain [chronicler.Custom('FR_IlElle')] s'interrompe, un sourire narquois aux lèvres.\n\n« J'ai bien entendu #EMP une#! histoire plutôt intéressante, » commence-t-[chronicler.Custom('FR_IlElle')] lentement, « celle d'un certain concours de boisson avec un [troll|E], rien de moins ! Quelle prouesse de la part de notre [ROOT.Char.Custom('GetHeroineHero')], d'avoir fait rouler pareille créature sous la table ! Peut-être qu'une petite démonstration me permettrait de vraiment apprécier un tel exploit ? »\n\nJ'ignore d'où sort ce conte à dormir debout, mais une certaine fierté commence à me picoter..."