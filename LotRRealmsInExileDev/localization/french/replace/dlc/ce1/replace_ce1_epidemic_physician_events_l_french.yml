 physician_epidemic_events.1050.desc: "Mes gardes traînent devant moi [physician.Custom2('MyCharacterIntroduction', ROOT.Char)] enchaîné[physician.Custom('FR_E')]. [physician.Custom('FR_IlElle')|U] soigne les soldats blessés — amis comme ennemis — après chaque bataille.\n\nOn appelle son refuge « l'auberge [ROOT.Char.GetPrimaryTitle.GetAdjective|U] », et mes commandants exigent sa fermeture. Mais [physician.GetFirstName] se contente de répondre : « Ils saignent et souffrent comme les nôtres. Qui suis-je pour les repousser ? »"