l_french:
 game_concept_obedience_desc: "Dans les [realms|E] sous [GetGovernment( 'nomad_government' ).GetName] ou [GetGovernment( 'orcish_government' ).GetName], l'obéissance détermine la fidélité d'un [character|El] envers son [liege|El], son [suzerain|El] ou le maître de sa [court|El]. Un personnage ne peut être obéissant qu'envers un seul [ruler|El] à la fois.\n\nLes personnages obéissants sont moins enclins à participer à des [hostile_schemes|E], à rejoindre des [wars|E] ou à se joindre à des [factions|E] contre leur suzerain. Ils soutiendront toujours les préférences de leur suzerain lors de la [succession|El] et ne feront point valoir leurs [claims|E] contre lui. Les [tributaries|El] non obéissants peuvent tenter de s'affranchir.\n\nLorsque le score d'un personnage dépasse le [obedience_threshold|E], il devient obéissant."