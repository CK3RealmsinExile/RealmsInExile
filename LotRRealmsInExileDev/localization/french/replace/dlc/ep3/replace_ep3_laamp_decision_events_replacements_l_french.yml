l_french:

 ep3_laamp_decision_event.1031.desc_01: "#EMP « ...et acculé par la terreur qu'Ungoliant lui inspirait, il appela ses Balrogs, qui la chassèrent à coups de fouets de flammes. »#!"
 ep3_laamp_decision_event.1031.desc_02: "#EMP « ...et elle chanta un chant qui plongea Morgoth lui-même dans le sommeil, et Beren, armé du couteau Angrist, trancha un Silmaril de la Couronne de Fer de Morgoth. »#!"
 ep3_laamp_decision_event.1031.desc_03: "#EMP « ...et Ecthelion, mortellement blessé, livra un ultime assaut contre Gothmog et de son heaume à pointe abattit le Seigneur des Balrogs, et tous deux se noyèrent dans la Fontaine du Roi. »#!"
 ep3_laamp_decision_event.1031.desc_04.: "#EMP « ...et alors, contre toute attente, Eärendil surgit des cieux de l'Occident, et il occit Ancalagon le Noir, et dans sa chute le dragon fracassa les pics du Thangorodrim. »#!"
 ep3_laamp_decision_event.1031.desc_05: "#EMP « ...et Fingolfin chevaucha son destrier Rochallor jusqu'à Angband, et il défia Morgoth en combat singulier, et en cette heure il blessa le Seigneur Sombre sept fois avant de succomber. »#!"
 ep3_laamp_decision_event.1031.desc_06: "#EMP « ...et alors Celebrimbor comprit qu'il avait été trompé, car Sauron avait forgé dans les flammes du Mont du Destin Un Anneau pour les gouverner tous, et tous les Anneaux hormis les Trois des Elfes lui étaient asservis. »#!"
 ep3_laamp_decision_event.1031.desc_07: "#EMP « ...et Yavanna chanta, et alors surgirent sur Ezellohar les Deux Arbres, Telperion l'argenté et Laurelin la dorée, et ils furent abreuvés des larmes de Nienna, et ils illuminèrent Valinor. »#!"
 ep3_laamp_decision_event.1031.desc_08: "#EMP « ...et alors, quand elle comprit que c'était son propre frère, Túrin, qu'elle avait épousé sans le savoir, elle se jeta dans la gorge et dans les eaux du Taeglin. »#!"
 ep3_laamp_decision_event.1031.desc_09: "#EMP « ...et alors Númenor fut engloutie sous les flots et sombra dans l'abîme, et dans le courroux d'Eru le monde fut brisé et refaçonné, de plan qu'il était devenant sphère. »#!"
 ep3_laamp_decision_event.1031.desc_10: "#EMP « ...et Il créa d'abord les Ainur, enfants de Sa pensée, et ils étaient avec Lui avant que quoi que ce fût d'autre ; et ils firent devant Lui une grande Musique. »#!"
 ep3_laamp_decision_event.1031.desc_11: "#EMP « ...et Durin, Père de notre peuple, s'éveilla, et il erra par les collines et les vallons sans nom, et but à des sources encore vierges. »#!"
 ep3_laamp_decision_event.1031.desc_12: "#EMP « ...et frappé de chagrin il prit racine et y demeura lié, et son affliction fut murmurée par le vent, bien que le Roi des Fées lui eût depuis longtemps pardonné. »#!"
 ep3_laamp_decision_event.1031.desc_13: "#EMP « ...et le Roi-des-Roches, désormais trop gras et repu pour se mouvoir, ne put que regarder Iunást et ses compagnons passer devant lui. »#!"
 ep3_laamp_decision_event.1031.desc_14: "#EMP « ...et Gurzil, le resplendissant, fut une fois de plus contrecarré, déjoué par le venin sacré et mordant de Shâsmekh. »#!"
 ep3_laamp_decision_event.1031.desc_15: "#EMP « ...et ses suppliques restèrent vaines, car il éprouva alors toute la fureur de Malíciam, et à jamais il souffrirait enchaîné au fond des mers, toujours se noyant mais jamais noyé. »#!"
 ep3_laamp_decision_event.1031.desc_16: "#EMP « ...et ce fut au cœur de la nuit sur l'Urud an-Khibil qu'Izindubêth reçut cette grande révélation d'Ilúvatar, et de là il révéla la vérité du Batân an-Izindi. »#!"
 ep3_laamp_decision_event.1031.desc_17: "#EMP « ...et bien que le courroux de Vâtra eût changé une grande part du monde en désert, les larmes de Ladnôca préservèrent un peu de ces terres fertiles, et de ces terres naîtrait, bien des générations plus tard, Iunást. »#!"
 ep3_laamp_decision_event.1031.desc_18: "#EMP « ...et pour prix de leur avidité, Aamumeren Isä les maudit, et ils connurent la faim durant de nombreux hivers. »#!"

 ep3_laamps.8090.desc.world_europe: "Où d'autre aurais-je le plaisir de humer la lavande fraîche, d'admirer le soleil couchant sur les ruines de la vieille Osgiliath, d'écouter les antiques récits des Jours Anciens, ou de passer l'hiver au coin du feu chez un étranger accueillant ? Nulle part ailleurs que dans les Terres de l'Ouest."
 ep3_laamps.8090.desc.world_middle_east: "Contempler le ciel du désert constellé d'étoiles, traverser les sables au milieu des chameaux de caravane. Quelle terre pourrait prétendre être le berceau de l'humanité, sinon celle-ci ?"