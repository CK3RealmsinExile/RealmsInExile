l_french:
 game_concept_imperial_grace_desc: "$game_concept_imperial_grace$ représente le statut accordé à un [tributary|El] par le [son_of_heaven|E].\n\nUne $game_concept_imperial_grace$ élevée peut se traduire par l'octroi de privilèges particuliers au $game_concept_tributary$ lors des [tribute_missions|E]. À un niveau bas de $game_concept_favor$, le $game_concept_son_of_heaven$ peut #EMP exiger#! un tribut de votre part, et si elle atteint zéro, cela pourrait signifier la rupture de cette relation."

 game_concept_minister_grand_chancellor_desc: "Le $game_concept_minister_grand_chancellor$ est le [minister|E] de plus haut rang et a la charge des affaires diplomatiques. Il se voit généralement confier le poste de [grand_secretariat_director|E].\n\n#indent_newline:4 #weak Ce ministre peut, par exemple :\n$BULLET$Utiliser la [decision|El] « Façonner le Cycle Dynastique »#!#!"

 game_concept_favored_movement_desc: "Le $game_concept_favored_movement$ est le [movement|E] qui a obtenu le soutien du [son_of_heaven|E].\n$BULLET_WITH_TAB$ Ses membres ont des [candidate_scores|E] plus élevés pour tout [titles|E] dans [SelectLocalization( GetPlayer.IsValid, 'game_concept_favored_movement_desc_ingame', 'h_china' )]\n$BULLET_WITH_TAB$Les requêtes issues de la [decision|El] [GetDecision('movement_petition_decision').GetName] ont plus de chances d'être acceptées\n$BULLET_WITH_TAB$Les [situation_catalyst_catalysts|E] du [dynastic_cycle_possessive|E] sont déclenchés selon le [movement|E] en faveur\n$BULLET_WITH_TAB$Donne accès à la [decision|El] « Façonner le Cycle Dynastique »\n\n#help Pour devenir le mouvement en faveur, vous devez vaincre le chef du mouvement actuellement en faveur lors d'une [activity|El] [GetActivityType('activity_debate').GetName].#!"