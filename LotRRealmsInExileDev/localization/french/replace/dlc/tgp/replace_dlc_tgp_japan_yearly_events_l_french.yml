l_french:

 tgp_japan_yearly_events.0006.desc: "Au loin, le long du rivage, j'aperçois de petits points blancs qui se déplacent sur le sable et les rochers. Je concentre mon regard sur leurs mouvements et réalise qu'il s'agit de pêcheuses de perles. Par curiosité, je décide de les saluer pour voir leur dernière récolte.\n\nUne plongeuse remarque ma présence, s'avance lentement vers moi et demande : « M[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.GetLadyLord|U], qu'est-ce qui vous amène sur ces rivages lointains ? Nous sommes fort occupées et devons préparer notre prise du jour. »\n\nPeut-être y a-t-il là une occasion d'alléger le labeur de ces plongeuses en leur proposant un échange ?"

 tgp_japan_yearly_events.0012.desc: "Une brume épaisse apparaît au loin, se rapprochant à chacun de mes pas prudents. Il semble que j'aie découvert une source chaude, mais je ne suis visiblement pas son premier visiteur de la journée.\n\nUn macaque des neiges a déjà pris place dans le bain, savourant apparemment l'eau brûlante qui imprègne sa fourrure.\n\nCela vaut-il vraiment le risque d'entrer dans la source chaude en compagnie d'un animal sauvage ?"

 tgp_japan_yearly_events.0013.desc: "Au loin, je commence à percevoir une mélopée ténue — enveloppée d'une brume épaisse qui dissimule quiconque s'y trouve. Je ne discerne qu'une silhouette de [mystic.GetWomanMan].\n\nÀ mon approche, [mystic.GetWomanMan] se contente de regarder dans ma direction, hoche la tête pour reconnaître ma présence, puis reprend ses préparatifs avant d'entrer dans la source chaude.\n\nLa mystique me fait signe d'approcher pour prendre part à ce qui va se dérouler."

 tgp_japan_yearly_events.0014.desc: "Le souffle court et le cœur lourd, je rassemble mes dernières forces pour lever la tête vers les sommets, les yeux plissés pour les protéger de la brise glaciale.\n\nÀ ma grande surprise, une légère vapeur s'élève au loin, se dissipant après avoir atteint une certaine hauteur, pour recommencer le même cycle — encore et encore. Comme une invitation silencieuse à m'en approcher.\n\nAprès avoir atteint le sommet, je peux enfin reprendre mon souffle et admirer la source chaude accueillante qui s'offre à moi."

 tgp_japan_yearly_events.0021.desc: "Le printemps est là ! Les cerisiers, ployant sous leurs somptueuses fleurs, mettent tout le monde en liesse. Les habitants de [ROOT.Char.GetCurrentLocation.GetName] sont pleins d'entrain et espèrent une récolte abondante à venir.\n\nM[ROOT.Char.Custom2('FR_RelationToMe_OnA', hanami_enjoyer)] [ROOT.Char.Custom2('RelationToMe', hanami_enjoyer)], [hanami_enjoyer.GetTitledFirstName], déclare : « La vie en [middleearth|E] est pareille à la beauté éphémère d'une fleur. » Ses paroles me rappellent de remercier [ROOT.Char.GetFaith.HouseholdGodName] pour cette abondance."
 tgp_japan_yearly_events.0021.a: "Rendre grâce à [ROOT.Char.GetFaith.HouseholdGodName]."
 tgp_japan_yearly_events.0021.a_pleased_deities.tt: "[ROOT.Char.GetFaith.HouseholdGodName] #EMP semble#! avoir entendu mes remerciements"
 tgp_japan_yearly_events.0021.a_char_modifier.tt: "J'ai l'impression qu'un poids s'est levé de mes épaules"
 tgp_japan_sake_offering_county_modifier: "Offrande de Miruvor"
 tgp_japan_sake_offering_county_modifier_desc: "Le souverain de ce comté a honoré les divinités lors d'une célébration des cerisiers en fleurs."
 tgp_japan_sake_offering_character_modifier: "Don de Miruvor"
 tgp_japan_sake_offering_character_modifier_desc: "Ce personnage a honoré les divinités lors d'une célébration des cerisiers en fleurs."
 
 
 tgp_japan_yearly_events.1000.desc: "Une pluie légère nous accompagne tandis que nous traversons [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip].\n\nAlors que la bruine s'intensifie, j'aperçois des lumières dansantes qui scintillent au loin.\n\nM[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', chaplain)] [ROOT.Char.Custom2('RelationToMeShort', chaplain)], [chaplain.GetFirstNameNoTooltip], conseille la prudence, suggérant qu'il pourrait s'agir de fées de feu cherchant à nous attirer vers le danger."
 tgp_japan_yearly_events.1000.a.tt.success: "En poursuivant la fée, vous avez découvert un trésor caché"
 tgp_japan_yearly_events.1000.a.tt.failure: "En poursuivant la fée, vous avez glissé sur le terrain détrempé et vous êtes blessé"

 tgp_japan_yearly_events.1020.t_siren: "Une Mélodie Envoûtante"
 tgp_japan_yearly_events.1020.desc_end: "\n\nEst-ce le poids de ma charge de [ROOT.Char.GetTitleAsNameNoTooltip] qui me pèse, ou serait-ce l'œuvre d'une fée ?"
 tgp_siren_yokai_love_modifier_desc: "Ce personnage a été inspiré par une fée à trouver l'amour."
 tgp_siren_yokai_prose_modifier_desc: "Ce personnage est inspiré par les chants qu'une fée lui a murmurés en rêve. Il composera désormais ses propres récits."
 tgp_garden_yokai_bloom_modifier_desc: "Ce personnage croit avoir vu une fée l'incitant à investir dans son jardin."
 tgp_garden_yokai_building_modifier_desc: "Ce personnage croit avoir vu une fée l'incitant à bâtir des édifices dans son domaine."
 tgp_shadow_yokai_imitation_modifier_desc: "Ce personnage dégage une présence intimidante, persuadé d'avoir une fée pour alliée."
 tgp_shadow_yokai_torch_modifier_desc: "Ce personnage croit qu'une fée a pris possession de son ombre et renforce les défenses de son domaine."
 tgp_burned_yokai_modifier: "Chasseur de Fées"
 tgp_burned_yokai_modifier_desc: "Ce personnage se méfie davantage des fées depuis peu."

 tgp_japan_yearly_events.1070.desc: "« Un bâtiment sur les terres du [ROOT.Char.Custom('GetFaithTemple')] de [province.GetName] a brûlé jusqu'aux fondations ! » s'écrie m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', messenger)] [ROOT.Char.Custom2('RelationToMeShort', messenger)|U], [messenger.GetName].\n\n« Les fidèles et les érudits se démènent pour trouver un nouveau lieu, » poursuit [messenger.GetNameNoTooltip], « Si vous pouviez aider à restaurer le [ROOT.Char.Custom('GetFaithTemple')], assurément [ROOT.Char.GetFaith.HighGodName] vous bénira. »"
 tgp_japan_yearly_events.1071.desc_yokai: "« Nombre de gens dans les environs ont rapporté avoir aperçu une étrange fée de feu quelques jours avant l'incendie. Peut-être est-elle responsable de ce drame ? » s'exclame m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', messenger)] [ROOT.Char.Custom2('RelationToMeShort', messenger)|], [messenger.GetFirstName]."
 
 tgp_japan_yearly_events.1080.desc: "Le bassin ornemental de mon jardin est un lieu de repos et de réflexion, et sa vue sereine offre une fin parfaite à une promenade vespérale. Les eaux qui l'entourent sont généralement calmes, troublées seulement par quelque carpe happant un insecte à la surface. Mais aujourd'hui, l'atmosphère paisible est brisée par de violents clapotis !\n\nM[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', fisherman)] [ROOT.Char.Custom2('RelationToMeShort', fisherman)], [fisherman.GetName], se tient au bord de l'eau, canne à pêche lancée dans le bassin jadis serein. Ose-t-[fisherman.Custom('FR_IlElle')] vraiment chercher son prochain repas dans mon étang ?!"

 tgp_japan_yearly_events.1120.tt.success: "Le guerrier rejoint vos rangs"
 tgp_japan_yearly_events.1120.tt.failure: "Vous ne parvenez pas à convaincre le guerrier"
 tgp_japan_yearly_events.1120.c_tt: "Vos gardes affrontent le guerrier, permettant à votre groupe de passer sans encombre."

 tgp_japan_yearly_events.1130.desc: "Chaque soir, m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', poet_daughter)] [ROOT.Char.Custom2('RelationToMeShort', poet_daughter)], [poet_daughter.GetName], contemple la lune. Des taches d'encre souillent ses mains délicates, bien que je n'aie jamais entendu parler de lettres qu'[poet_daughter.Custom('FR_IlElle')] écrirait. Ces excentricités pourraient être tolérées, mais [poet_daughter.Custom('FR_IlElle')] commence à négliger sa santé, ce qui pourrait rejaillir sur moi.\n\nLa suivant jusqu'à ses appartements, j'épie à travers un rideau la cause de son étrange comportement.\n\n« M[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', poet_daughter)|U] [ROOT.Char.Custom2('RelationToMeShort', poet_daughter)|U] ! Il semble que je ne puisse vous cacher mon œuvre. » dit-elle en me tendant un [ROOT.Char.Custom('GetWritingMaterial')] couvert de vers."