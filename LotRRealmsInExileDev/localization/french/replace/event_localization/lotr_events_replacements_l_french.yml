 ep3_laamp_flavour_ewan.4081.desc.intro: "Au début, ce ne sont que quelques paysans [local_peasant.GetCulture.GetName] faméliques que nous apercevons. Ils surgissent au loin, ou épient depuis les moindres replis du terrain, s'enfuyant dès que nous les remarquons.\n\nLes heures passent, les autochtones craintifs nous observant de loin tout du long.\n\nAlors qu'ils semblent enfin s'être retirés, un cri s'élève, et une horde en furie déferle sur nous depuis le couvert d'une crête. Le regard fou et décharnés,"


