 yearly_persian.1002.t: "Nouvel An"
 yearly_persian.1002.desc:1 "Bien que ma Cour célèbre chaque année le festival de Khailûzan marquant le nouvel an, mes devoirs de [ROOT.Char.GetTitleAsNameNoTooltip] me permettent rarement de prendre part aux festivités.\n\nL'équinoxe approche et mon royaume jouit d'une prospérité et d'une stabilité certaines. Je me demande si je ne devrais pas m'accorder quelque répit cette année, quitter [ROOT.Char.Custom('ResidenceBuilding')] et me laisser gagner par l'esprit des fêtes ?"
 yearly_persian.1002.a: "J'honorerai Âzie par de généreux présents de gemmes et d'or !"
 yearly_persian.1002.c: "Je me consacrerai au rituel du banquet traditionnel en famille."

 ep3_emperor_yearly.2170.desc: "[our_county.GetNameNoTier] est une contrée difficile, et notre emprise sur elle demeure bien précaire. Ses habitants sont des survivants endurcis, dont la connaissance et la maîtrise de leur terre âpre et sauvage sont sans égales.\n\nEn cela, ils sont servis par leur propre création : un vaste réseau de tunnels, de refuges secrets et de colonies souterraines où ils peuvent aisément disparaître lorsque le temps devient hostile, qu'un ennemi attaque, ou que nos percepteurs approchent pour réclamer ce qui revient de droit au [ROOT.Char.GetTitleAsNameNoTooltip]."

 tournament_events.1310.desc:1 "Une glorieuse fanfare déchire l'air. Passant au trot devant moi, un héraut à cheval déroule un parchemin.\n\n« Oyez, oyez ! En ce jour des plus fastes, nous sommes bénis par la présence d'un véritable virtuose. [famous_knight.GetSheHe|U] a vaincu tous les prétendants, des Havres Gris jusqu'à l'Orocarni ! C'est pour moi un honneur et un privilège de vous présenter le combattant le plus habile, le plus splendide, le meilleur au monde : [famous_knight.GetTitledFirstName] ! »\n\nUne silhouette surgit devant le héraut, immobilisant s[famous_knight.Custom('FR_OnA')] destrier dans un dérapage, un rayon de soleil l'auréolant tel un nimbe divin tandis que la clameur de la foule fait presque trembler le sol."

