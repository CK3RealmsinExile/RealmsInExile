l_french:
 # Saved by a Mundburgian
 murder_save.0010.t: "$murder_save_header$ Les Mundburgiens"
 murder_save.0010.desc: "Mon attentat contre [target.GetTitledFirstName] a échoué !\n\nL'assassin a été arrêté par l'un de ces satanés Mundburgiens ! Je suppose que [target.Custom('FR_le_Char_L')][target.GetTitleAsNameNoTooltip] a fini par obtenir s[target.Custom('FR_OnA')] garde, après tout..."
 murder_save.0010.mundburgian_dies: "\n\nAu moins, l'assassin a eu raison du garde. [mundburgian.GetTitledFirstName] ne me barrera plus la route."
 murder_save.0010.a: "Je ne [target.Custom('FR_LeLa')] rattraperai jamais !"
 murder_save.0010.b: "Il me faut un nouveau plan..."

 murder_save.1010.desc: "Un assassin a attenté à ma vie ! Fort heureusement, [mundburgian.GetFirstName], membre de mon Éored mundburgien, se trouvait aux portes de mes appartements et est intervenu[mundburgian.Custom('FR_E')] sur-le-champ. [mundburgian.Custom('FR_IlElle')|U] a eu tôt fait d'occire l'assassin avant qu'aucun mal ne me fût causé."
 murder_save.1010.mundburgian_dies: "Tragiquement, [mundburgian.GetFirstNameNoTooltip] a succombé à ses blessures."
 murder_save.1010.owner_discovered: "\n\nNul doute que tout ceci est l'œuvre [owner.Custom2('FR_du_MyCharacterIntroductionNoComma', ROOT.Char)] !"
 murder_save.1010.a: "Qui peut bien être derrière cette ignoble tentative ?"
 murder_save.1010.b: "[owner.Custom('FR_IlElle')|U] me le paiera !"