l_french:
 #A vassal (or your liege) wants to eat some hashish while visiting your capital, by Ewan Cowhig Croft.
 learning_medicine.2110.t: "Fumée et Confidences"
 learning_medicine.2110.b.bad_terms: "Soit. Mais #EMP une seule#! pipe."
 learning_medicine.2110.b.neutral_terms: "Ma foi, pourquoi ne pas tirer quelques bouffées ?"
 learning_medicine.2110.b.flavour: "Une pipe en entraîne une autre, puis une troisième, puis cinq..."
 cosmic_insights_modifier: "Champion des Ronds de Fumée"
 cosmic_insights_modifier_desc: "Une longue nuit d'étude et de pratique a fait de ce personnage un véritable expert en ronds de fumée !"
 learning_medicine.2110.c.good_terms: "Une pipe me ferait le plus grand bien !"
 learning_medicine.2110.c.bad_terms: "Vous ne me surpasserez point !"
 learning_medicine.2110.c.neutral_terms: "Faisons de cette nuit une débauche !"
 learning_medicine.2110.c.tt_success: "Cette conversation amicale pousse [hashish_vassal_or_liege.Custom('FR_LuiElle')] à parler trop librement"

##########
#learning_medicine_special
###########
 learning_medicine_special.1002.desc: "Je tente de retenir mon souffle tandis que je fouille l'amas enchevêtré de viscères gluants et gonflés qui émergent du ventre béant du cadavre, mais en vain. La puanteur putride de la décomposition s'insinue lentement dans mes poumons et me soulève le cœur.\n\nQuelque chose se déchire alors, et un flot d'ichor visqueux et jaunâtre se répand sur la table d'opération.\n\n« Qu'est-ce que c'était que #EMP ça#! ? »"