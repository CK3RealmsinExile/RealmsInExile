 # Fight between my soldiers (Diplomacy skill challenge), Sean Hughes
 martial_authority.2040.c.hashishiyah: "Au diable tout cela, je vais fumer une pipe." # LOTR

 # Deal with Deserters, by Linnéa Thimrén
 martial_authority_special.1501.t: "Les Déserteurs"
 martial_authority_special.1501.desc: "Je mène une patrouille lorsque nous apercevons un groupe de silhouettes surgissant des ténèbres nocturnes. Des capes à capuchon dissimulent leurs visages, mais à sa démarche maladroite, je reconnais [deserting_soldier.GetTitledFirstName], mon [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('deserting_soldier'))].\n\n« Mon [ROOT.Char.GetLadyLord] », murmure l'un de mes hommes. « Ce sont des déserteurs. Que devons-nous faire ? »"