 stewardship_general.1054.desc: "Étoffe maculée de sang... plumes de corbeau... mixtures aux relents étranges. Voilà les preuves que m'ont présentées des manants de [target_county.GetNameNoTier] pour attester que [witch.GetFirstName] pratique [witch.Custom('MagicPracticeTerm')] dans sa hutte, aux confins de leur hameau.\n\nLes villageois affirment que ses œuvres maléfiques sont la cause de leur [witch.Custom('MagicSuperstitionTerm')] et réclament son exécution." # Adjusted to work for underground