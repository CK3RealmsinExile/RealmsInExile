l_french:
 bp1_yearly.1000.desc_hashish: "\n\n« Quand le poids des soucis et des responsabilités vous accable, j'aime allumer ma pipe et tirer quelques bouffées de [ROOT.Char.Custom('GetPipeWeedName')]. Voulez-vous vous joindre à moi ? »" # LOTR
 bp1_yearly.1020.desc_intro: "Tandis que je gis sur ma couche, terrassé par la maladie et maudissant ce corps faible et défaillant, je distingue à peine une silhouette humaine qui s'approche. Ses pas lents et son lourd silence m'emplissent d'effroi."