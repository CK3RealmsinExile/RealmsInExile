 pilgrimage_type_hajj: ""
 pilgrimage_type_hajj_desc: ""
 
 ###Christian Pilgrimage Journey Events
 #Zealous priest giving sermon in freezing rains
 pilgrimage.3001.desc: "Même en pèlerinage, les [ROOT.Char.Custom('DefaultPriestTitlePlural')] tiennent leurs prières hebdomadaires. En l'absence de temple, l'office se déroule en plein air — mais ce matin, un orage s'est levé et ne faiblit point.\n\nNul découragement n'arrête un[zealous_priest.Custom('FR_E')] [ROOT.Char.Custom('DefaultPriestTitle')] zélé[zealous_priest.Custom('FR_E')] : debout sous les trombes, il prêche la persévérance face à l'adversité. Las, s[zealous_priest.Custom('FR_OnA')] assemblée se clairsème à vue d'œil, les fidèles cherchant refuge contre le déluge."

 ###Hindu Pilgrimage Journey Events
 #Ritual purification in a river
 pilgrimage.3201.desc: "La purification rituelle est au cœur de tout pèlerinage [ROOT.Char.GetFaith]. L'une des formes les plus répandues consiste à se laver dans les eaux d'un gué sacré.\n\nL'un d'eux se trouve juste devant nous, mais force m'est de constater qu'il est #EMP bondé#! de gens du peuple venus eux aussi en pèlerinage..."

 ###Buddhist Pilgrimage Journey Events
 #Critical Wanderer
 pilgrimage.3301.c: "Ah, mais il ne sied point [ROOT.Char.Custom('FR_au_Char_L')][ROOT.Char.GetTitleAsNameNoTooltip] de voyager dans l'austérité."

 ### Dharmic Pilgrimage Journey Events
 #Brahmacharya Challenged
 pilgrimage.3401.t: "$pilgrimage_header$ Pureté mise à l'épreuve"
 pilgrimage.3401.desc: "Notre pèlerinage nous a menés sur les rives de [body_of_water.GetName]. Ses eaux scintillent comme des paillettes d'or sous le soleil déclinant, nous invitant au bain.\n\nMon regard dérive vers l'un de mes compagnons de route, [bather.GetName], dont le corps dénudé n'est vêtu que de la lueur des eaux.\n\nDurant [ROOT.Char.GetInvolvedActivity.GetShortName], il convient d'observer une pureté quasi parfaite, s'abstenant de toute pensée et pulsion charnelle..."
 pilgrimage.3401.a: "Le désir pour guide, je me baigne dans la beauté de [bather.GetFirstName]."
 pilgrimage.3401.b: "Je pénètre dans les eaux fraîches, mes passions éteintes."
 pilgrimage.3401.b.flavor: "Un pas de plus vers [ROOT.Char.GetFaith.PantheonTerm]."
 
 # Adapted for Dunlendings.
 # Norse Germanic
 pilgrimage.5901.t: "Carras !"
 pilgrimage.5901.desc: "Au cœur des Bouches inexplorées du Gwathló, notre peuple est né et a prospéré — jusqu'à la venue des Peuples de la mer. Ces envahisseurs dévastèrent nos terres et abattirent nos forêts, jusqu'à ce que l'océan les engloutisse tout entiers. Mais notre peuple perdure, tandis que leurs [realms_in_exile|E] s'étiolent. Le Carras, comme nous nommons le grand estuaire du Gwathló, a conservé sa beauté sauvage, et nombreux sont ceux qui font le pèlerinage vers ce lieu sacré."

 pilgrimage.5911.desc: "Le monde est le temple [ROOT.Char.GetFaith.HighGodNamePossessive], le grand ciel bleu plus majestueux que la voûte de n'importe quel sanctuaire. Ici, dans les vastes steppes de [destination_title.GetNameNoTierNoTooltip], je me sens particulièrement proche [ROOT.Char.GetFaith.PantheonTerm], et je me surprends à méditer sur le chemin parcouru pour atteindre ce lieu sacré."

 #Sanctity of Nature
 pilgrimage.5921.desc: "Me voici enfin parvenu[ROOT.Char.Custom('FR_E')] en [destination_title.GetNameNoTierNoTooltip]. Certains prient dans de grands temples ; je sais, moi, que les lieux les plus sacrés se trouvent en pleine forêt, là où les pieds nus sont caressés par la terre nourricière.\n\nLes bosquets anciens d'ici sont particulièrement vénérables, et je m'interroge sur ma place dans l'ordre naturel tandis que je me tiens parmi ces arbres séculaires."