l_french:
 
 county_list_tt: "Chaque [county|El] détenu par [GetFaithByKey('faith_haruze').GetName] au sein du [realm|El] de [mardat.GetTitledFirstName]"

 game_concept_harrying_resistance_desc: "La Résistance mesure l'opposition persistante à la domination Khäz-gamaze sur Rây, émanant des cultes ancestraux du royaume. Si la Résistance est #BOL supérieure#! à la [purge_pacification|E], elle confère les effets suivants selon son niveau :\n\n#S Résistance supérieure à #V 10#!#!\n$EFFECT_LIST_BULLET$Risque légèrement accru de [claimant_factions|E] contre le souverain de Rây\n\n#S Résistance supérieure à #V 13#!#!\n$EFFECT_LIST_BULLET$Risque modérément accru de [claimant_factions|E] contre le souverain de Rây\n$EFFECT_LIST_BULLET$Le [county_control|E] de tous les [counties|El] diminue de [EmptyScope.ScriptValue('minor_discontent_loss')|0V] tous les #V 3#! mois pour chaque [vassal|El] de Rây\n\n#S Résistance supérieure à #V 16#!#!\n$EFFECT_LIST_BULLET$Risque fortement accru de [claimant_factions|E] contre le souverain de Rây\n$EFFECT_LIST_BULLET$Le [county_control|E] de tous les [counties|El] diminue de [EmptyScope.ScriptValue('medium_discontent_loss')|0V] tous les #V 3#! mois pour chaque [vassal|El] de Rây"

 game_concept_harrying_pacification_desc: "La Pacification mesure l'efficacité des nouveaux maîtres Khäz-gramaze de Rây à soumettre les cultes ancestraux du royaume. Si la Pacification est #BOL supérieure#! à la [purge_resistance|E], elle confère les effets suivants selon son niveau :\n\n##S Pacification supérieure à #V 8#!#!\n$EFFECT_LIST_BULLET$Ajoute [dread_i]#V 1#! point de [dread|El] au souverain de Rây par mois\n\n#S Pacification supérieure à #V 11#!#!\n$EFFECT_LIST_BULLET$Ajoute [dread_i]#V 2#! points de [dread|El] au souverain de Rây par mois\n\n#S Pacification supérieure à #V 14#!#!\n$EFFECT_LIST_BULLET$Ajoute [dread_i]#V 3#! points de [dread|El] au souverain de Rây par mois"
 
 game_concept_harrying_widget_i: "@purge_widget!"
 game_concept_harrying_widget: "@purge_widget! Purge de Rây"
 game_concept_harrying_widget_desc: "Les souverains Khäz-gramaze et les nobles déchus des anciennes dynasties sont engagés dans une lutte acharnée pour le contrôle de Rây. Ce conflit ne prendra fin que lorsqu'un camp — ou les deux — aura été entièrement écarté du pouvoir.\n\nÀ mesure que la situation évolue, les actions entreprises par ces factions et d'autres personnages détermineront les niveaux de [purge_resistance|E] et de [purge_pacification|E] de la région.\n\n#TS Une #EMP Résistance#! élevée entraînera :#!\n$EFFECT_LIST_BULLET$Un [county_control|E] plus faible\n$EFFECT_LIST_BULLET$Un risque accru de [claimant_factions|E], voire de [civil_war|E].\n\n#TS Une #EMP Pacification#! élevée entraînera :#!\n$EFFECT_LIST_BULLET$Une [dread|El] croissante pour le souverain de Rây"

