 pilgrimage.3004.a: "De Dagor Dagorath nul ne connaît le jour, sinon [ROOT.Char.GetFaith.HighGodName] seul"
 pilgrimage.3302.desc: "En pénétrant pour la première fois dans les [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] sauvages de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier], je pensais que notre traversée du col serait aisée. Après des heures d'ascension éreintante, il me revient que je dois accueillir les épreuves de mon Dieu.\n\nJe m'arrête pour essuyer la sueur de mon front et suis frappé[ROOT.Char.Custom('FR_E')] par la vue de chèvres sauvages agrippées au flanc quasi vertical de [ROOT.Char.GetCurrentLocation.Custom('GetTerrainType')].\n\nUn[mountain_local.Custom('FR_E')] [Select_CString(mountain_local.IsFemale, 'vieille', 'vieux')] [mountain_local.GetWomanMan] du pays se tourne vers moi :\n\n« Ces chèvres avides ne grimpent que pour lécher le sel. »"