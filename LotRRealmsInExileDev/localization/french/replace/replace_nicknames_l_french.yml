l_french:
 DEFAULT_NICKNAME_DESC: "Amis et ennemis à travers la [middleearth|E] connaissent [CHARACTER.GetShortUINameNoTooltipNoFormat] sous le nom de '[CHARACTER.GetNicknameNoTooltip]'."
 nick_tiny_desc: "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] connu[CHARACTER.Custom('FR_E')] pour [CharYourHerHis(CHARACTER)]... ambitions de grandeur. On l'a comparé à un [halfling|E]."
 nick_the_magnificent_desc: "Les récits de [CharYourHerHis(CHARACTER)] hauts faits splendides se content de [eriador|E] jusqu'au [ray|E]."
 nick_the_viking: "le Corsaire"
 nick_the_ecumenist_desc: "[CharYourHerHis(CHARACTER)|U] efforts vers la consolidation et la conciliation du monde théologique font de [CHARACTER.GetShortUINameNoTooltipNoFormat] un héros pour beaucoup — et un hérétique pour d'autres."
 nick_the_sword_of_god_desc: "En tant qu’arme choisie par le Seigneur juste, [Select_CString(CHARACTER.IsLocalPlayer,'vous',CHARACTER.Custom('FR_IlElle'))] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] formé l’$e_outremer$ à partir des terres des infidèles."
 nick_the_messenger_of_christ_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] porta la parole de l'Agneau de Dieu à tous les peuples d'Outremer."
 nick_the_knight_of_gabriel_desc: "En tant qu’épée brûlante de l’ange vengeur de Dieu, [Select_CString(CHARACTER.IsLocalPlayer,'vous',CHARACTER.Custom('FR_IlElle'))] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] bâti l’$e_outremer$ dans le sang."
 nick_troll_slayer_desc: "Les gens du commun se vantent fièrement de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] geste protecteur, de la façon dont [Select_CString(CHARACTER.IsLocalPlayer,'vous',CHARACTER.Custom('FR_IlElle'))] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] terrassé un [troll|E] en leur nom."
 nick_twistedbeard_desc: "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'êtes', 'est' )] un souverain d'une remarquable vaillance martiale."
 nick_the_goliath: "le Tarkhil"
 nick_the_goliath_desc: "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString( CHARACTER.IsLocalPlayer, 'êtes', 'est' )] un guerrier de stature imposante, tel le puissant Tarkhil des temps anciens."
 nick_aurei_testiculi: "Malvilt" #Sindarin for Golden Semen
 