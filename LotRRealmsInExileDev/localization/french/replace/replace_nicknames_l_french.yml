l_french:
 DEFAULT_NICKNAME_DESC: "Amis et ennemis à travers la [middleearth|E] connaissent [CHARACTER.GetShortUINameNoTooltipNoFormat] sous le nom de '[CHARACTER.GetNicknameNoTooltip]'."
 nick_tiny_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] connu[Select_CString(CHARACTER.IsFemale,'e','')] pour [CharYourHerHis(CHARACTER)]... ambitions de grandeur. On l'a comparé à un [halfling|E]."
 nick_the_magnificent_desc: "Les récits de [CharYourHerHis(CHARACTER)] hauts faits splendides se content de [eriador|E] jusqu'au [ray|E]."
 nick_the_viking: "le Corsaire"
 nick_the_ecumenist_desc: "[CharYourHerHis(CHARACTER)|U] efforts vers la consolidation et la conciliation du monde théologique font de [CHARACTER.GetShortUINameNoTooltipNoFormat] un héros pour beaucoup — et un hérétique pour d'autres."
 nick_the_sword_of_god_desc: "En tant qu'arme élue du Seigneur justicier, [CharYouSheHe(CHARACTER)] arracha Outremer aux terres des infidèles."
 nick_the_messenger_of_christ_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] porta la parole de l'Agneau de Dieu à tous les peuples d'Outremer."
 nick_the_knight_of_gabriel_desc: "Épée ardente de l'ange vengeur de Dieu, [CharYouSheHe(CHARACTER)] érigea Outremer, pierre après pierre ensanglantée."
 nick_troll_slayer_desc: "Les gens du commun se vantent fièrement de [CharYourHerHis(CHARACTER)] geste protecteur, de la façon dont [CharYouSheHe(CHARACTER)] terrassa un [troll|E] en leur nom."
 nick_twistedbeard_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] un souverain d'une remarquable vaillance martiale."
 nick_the_goliath: "le Tarkhil"
 nick_the_goliath_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharAreIs(CHARACTER)] un guerrier de stature imposante, tel le puissant Tarkhil des temps anciens."
 nick_aurei_testiculi: "Malvilt" #Sindarin for Golden Semen
 