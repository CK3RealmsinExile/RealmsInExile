 #########################################
 ### FESTIVAL OF FIRST-FRUITS ACTIVITY ###
 #########################################
 # Adapted from RICE Bema Festival Activity
 # Popular harvest festival in Bay of Tulwang
 # Practiced in Bellakar and the Rây


 # Activities
 activity_firstfruits_festival_host_an_a: "$host_activity_a$"
 activity_firstfruits_festival: "Fête des Prémices"
 activity_firstfruits_festival_desc: "Célébrée au temps des premières moissons, à la fin de l'été, la Fête des Prémices est un rite à la fois sacré et populaire autour de la [bayoftulwang|E], où l'on célèbre et implore une récolte généreuse.\n\nIl est d'usage d'offrir les premiers grains de la moisson, présents rendus aux cieux en témoignage de gratitude pour leurs bienfaits."
 activity_firstfruits_festival_selection_tooltip: "Participez à une Fête des Prémices, antique célébration de la moisson propre aux [haradric|E].\n\nRécompenses anticipées :\n$BULLET_WITH_TAB$Gain de [prestige|El] [prestige_i]\n$BULLET_WITH_TAB$Gain de [piety|El] [piety_i]\n$EFFECT_LIST_BULLET$Réduction du [stress|El] [stress_loss_i|E]\n$EFFECT_LIST_BULLET$#P Effets bénéfiques#! [character_modifiers|El]\n$EFFECT_LIST_BULLET$[modifier|E] [GetModifier('firstfruits_festival_county_modifier').GetNameWithTooltip] pour les [domains|El] des [counties|El] dotés de [GetFaithDoctrine('tenet_bellakari_syncretism').GetBaseName]"
 activity_firstfruits_festival_host_desc: "\n$EFFECT_LIST_BULLET$Gain de [prestige|El] [prestige_i|E]\n$EFFECT_LIST_BULLET$Gain de [piety|El] [piety_i|E]\n$EFFECT_LIST_BULLET$Réduit le [stress|El][stress_loss_i|E]\n$EFFECT_LIST_BULLET$#P Effets bénéfiques#! [character_modifiers|E]\n$EFFECT_LIST_BULLET$Les [domains|El] des [counties|El] dotés de [GetFaithDoctrine('tenet_bellakari_syncretism').GetBaseName] reçoivent le [county_modifier|El] [GetModifier('firstfruits_festival_county_modifier').GetNameWithTooltip]"
 activity_firstfruits_festival_guest_desc: "$activity_firstfruits_festival_host_desc$"
 activity_firstfruits_festival_province_desc: ""
 activity_firstfruits_festival_destination_selection: "$activity_firstfruits_festival_province_desc$"
 activity_firstfruits_festival_guest_help_text: "$activity_firstfruits_festival$"
 activity_firstfruits_festival_predicted_cost: "Le coût de cette [activity|El] dépend des [activity_options|El] que vous choisissez."
 activity_firstfruits_festival_conclusion_desc: "La $activity_firstfruits_festival$ de cette année touche à son terme ; puissent les justes qui ont témoigné de leur piété être bénis d'une longue vie, d'une santé florissante et d'une moisson abondante !"
 lotr_firstfruits_fasting_length_type: "Durée du Jeûne"
 lotr_firstfruits_fasting_length_type_day: "Un Jour"
 lotr_firstfruits_fasting_length_type_day_desc: "$EFFECT_LIST_BULLET$ Vous gagnerez #EMP moins#! de [piety|El] à l'issue\n$EFFECT_LIST_BULLET$ Aucun risque de subir un [modifier|El] négatif de [health|E]\n$EFFECT_LIST_BULLET$ Perte ou gain de [stress_loss_i|E] [stress_gain_i|E] [stress|El] selon votre [personality|El]\n\n#weak Un jour de jeûne symbolique suffira pour se préparer à la célébration.#!"
 lotr_firstfruits_fasting_length_type_week: "Une Semaine"
 lotr_firstfruits_fasting_length_type_week_desc: "$EFFECT_LIST_BULLET$ Les gains de [piety|El] restent inchangés\n$EFFECT_LIST_BULLET$ Très faible risque de subir un [modifier|El] négatif de [health|E]\n$EFFECT_LIST_BULLET$ Réduit légèrement le [stress|El][stress_loss_i|E]\n\n#weak Je me dois d'honorer les Dieux par un jeûne digne, tel qu'il sied à un guide des hommes.#!"
 lotr_firstfruits_fasting_length_type_month: "Un Mois"
 lotr_firstfruits_fasting_length_type_month_desc: "$EFFECT_LIST_BULLET$ Vous gagnerez davantage de [piety|El] à l'issue\n$EFFECT_LIST_BULLET$ Faible risque de subir un [modifier|El] négatif de [health|E]\n$EFFECT_LIST_BULLET$ Perte ou gain de [stress_loss_i|E] [stress_gain_i|E] [stress|El] selon votre [personality|El]\n\n#weak Il est de mon devoir, envers les Dieux comme envers les hommes, de prouver ma ferveur par un mois entier de jeûne.#!"
 lotr_firstfruits_fruit_alms_type: "Offrandes de Fruits"
 lotr_firstfruits_fruit_alms_type_small: "Offrandes Modestes"
 lotr_firstfruits_fruit_alms_type_small_desc: "$EFFECT_LIST_BULLET$ Vous ne gagnerez #EMP aucun#! [prestige|El] à l'issue\n$EFFECT_LIST_BULLET$ Le [county_modifier|El] [GetModifier('firstfruits_festival_county_modifier').GetNameWithTooltip] sera #EMP plus faible#!\n\n#weak J'offrirai une part mesurée de la moisson au peuple et aux Dieux.#!"
 lotr_firstfruits_fruit_alms_type_medium: "Offrandes Conséquentes"
 lotr_firstfruits_fruit_alms_type_medium_desc: "$EFFECT_LIST_BULLET$ Les gains de [prestige|El] restent inchangés\n$EFFECT_LIST_BULLET$ Le [county_modifier|El] [GetModifier('firstfruits_festival_county_modifier').GetNameWithTooltip] sera normal\n\n#weak J'offrirai la part attendue de la moisson au peuple et aux Dieux.#!"
 lotr_firstfruits_fruit_alms_type_large: "Offrandes Généreuses"
 lotr_firstfruits_fruit_alms_type_large_desc: "$EFFECT_LIST_BULLET$ Vous gagnerez davantage de [prestige|El] à l'issue\n$EFFECT_LIST_BULLET$ Le [county_modifier|El] [GetModifier('firstfruits_festival_county_modifier').GetNameWithTooltip] sera renforcé\n\n#weak J'offrirai une part généreuse de la moisson au peuple et aux Dieux.#!"
 lotr_firstfruits_fruit_alms_type_huge: "Offrandes Abondantes"
 lotr_firstfruits_fruit_alms_type_huge_desc: "$EFFECT_LIST_BULLET$ Vous gagnerez bien davantage de [prestige|El] à l'issue\n$EFFECT_LIST_BULLET$ Le [county_modifier|El] [GetModifier('firstfruits_festival_county_modifier').GetNameWithTooltip] sera grandement renforcé\n\n#weak Je comblerai le peuple et les Dieux des fruits de la moisson !#!"
 firstfruits_festival_ceremony_phase: "Cérémonie"
 firstfruits_festival_ceremony_phase_desc: "Nous rendons grâce aux Dieux pour une moisson encore une fois prospère."
 firstfruits_festival_celebration_intent_header: "Célébration :"
 firstfruits_festival_celebration_intent: "Célébration"
 firstfruits_festival_celebration_intent_desc: "Si la $activity_firstfruits_festival$ est un rite sacré, elle est aussi l'occasion de se réjouir d'une moisson prospère. Réduit davantage le [stress_i|E] [stress|El]."
 firstfruits_festival_reflection_intent_header: "Recueillement :"
 firstfruits_festival_reflection_intent: "Recueillement"
 firstfruits_festival_reflection_intent_desc: "La $activity_firstfruits_festival$ est avant tout une cérémonie sacrée, à pratiquer avec révérence et introspection. Vous gagnez davantage de [piety_i|E] [piety|El]. Vos [vassals|El] [theocratic|El], [vassals|El] [GetVassalStance( 'zealot' ).GetTextIcon][GetVassalStance( 'zealot' ).GetName], et [courtiers|El] gagnent #P +10#! d'[opinion|El] à votre égard."
 firstfruits_festival_completed_log_title: "Clôture de la $activity_firstfruits_festival$"
 firstfruits_festival_completed_log: "[CHARACTER.GetShortUIName|U] a pris part jusqu'à son terme à la $activity_firstfruits_festival$ de cette année."
 TRAVEL_NAME_FOR_activity_firstfruits_festival: "$activity_firstfruits_festival$ de [Character.GetFirstNamePossessiveNoTooltip]"
 firstfruits_festival_fasting_effect_log_title: "Épreuves du Jeûne"
 firstfruits_festival_fasting_effect_log: "Le corps de [CHARACTER.GetShortUINamePossessive|U] a mal supporté le temps de jeûne. Les prières de [CharYourHerHis(CHARACTER)|U] pour la santé n'ont point trouvé grâce auprès de [CHARACTER.GetFaith.HealthGodName] !"
 lotr_firstfruits_festival_month_requirement: "Le mois doit être compris entre janvier (1) et mars (3)"

 # Custom Loc - Which deity/deities to invoke during events? Use [ROOT.Char.Custom('firstfruits_invoked_deity')]
 firstfruits_invoked_deity_ladnoca_and_eru: "Ladnôca et Êru"
 firstfruits_invoked_deity_eru_and_ladnoca: "Êru et Ladnôca"
 firstfruits_invoked_deity_ishtra_and_ladnoca: "Îshtra et Ladnôca"
 firstfruits_invoked_deity_ladnoca: "Ladnôca"
 firstfruits_invoked_deity_fertilitygod: "[ROOT.Char.GetFaith.FertilityGodName]"

 # Modifiers
 firstfruits_fast_health_malus_modifier: "Jeûne Excessif"
 firstfruits_fast_health_malus_modifier_desc: "Le corps de ce personnage n'a pas su endurer les rigueurs du jeûne observé en préparation de la $activity_firstfruits_festival$."
 firstfruits_festival_county_modifier: "Réjouissances des Prémices"
 firstfruits_festival_county_modifier_desc: "Le peuple de ce comté recueille les bienfaits de la récente $activity_firstfruits_festival$."
 firstfruits_festival_county_modifier_scale_desc: "\t#weak Amélioré par l'[activity_option|E]#! $lotr_firstfruits_fruit_alms_type_small$#! "

 # Effect Loc
 EVERY_ZEALOT_AND_THEOCRAT_VASSAL_AND_COURTIER_EFFECT: "Chaque [GetVassalStance( 'zealot' ).GetTextIcon][GetVassalStance( 'zealot' ).GetName] ou [vassal|El] [theocratic|E] et [courtier|E] fidèle à la doctrine [GetFaithDoctrine('tenet_bellakari_syncretism').GetBaseName]"
 custom.every_firstfruits_domain_county: "Chaque [county|El] de votre [domain|El] suivant la doctrine [GetFaithDoctrine('tenet_bellakari_syncretism').GetBaseName]"
 activity_firstfruits_because_of_alms_type_small: "En raison de l'[activity_option|E] #V $lotr_firstfruits_fruit_alms_type_small$#! :"
 activity_firstfruits_because_of_alms_type_medium: "En raison de l'[activity_option|E] #V $lotr_firstfruits_fruit_alms_type_medium$#! :"
 activity_firstfruits_because_of_alms_type_large: "En raison de l'[activity_option|E] #V $lotr_firstfruits_fruit_alms_type_large$#! :"
 activity_firstfruits_because_of_artifact_urenanvale: "En vertu de votre [artifact|El] [manuscript_artifact.GetName] :"
 activity_firstfruits_because_of_artifact_missingmountain: "En vertu de votre [artifact|El] [manuscript_artifact.GetName] et de votre [piety_level|E] :"
 activity_firstfruits_because_of_artifact_gatarazay: "En vertu de votre [artifact|El] [manuscript_artifact.GetName] :"
 activity_firstfruits_because_of_artifact_emissariesinnature: "En vertu de votre [artifact|El] [manuscript_artifact.GetName] :"
 activity_firstfruits_because_of_artifact_scoldingtheflames: "En vertu de votre [artifact|El] [manuscript_artifact.GetName] :"

 # Events
 firstfruits.0030.t: "Le Jeûne commence"
 firstfruits.0030.desc: "La #bold $activity_firstfruits_festival$#! approche à grands pas, célébration majeure de la foi de [ROOT.Char.GetFaith.GetName]. C'est le temps où nous rendons grâce à [ROOT.Char.Custom('firstfruits_invoked_deity')], qui nous a accordé une moisson abondante, et dont nous implorons à nouveau la faveur pour l'année à venir.\n\nMais avant que ne s'ouvrent pleinement les réjouissances, souverains et hommes de foi doivent se soumettre au jeûne. Par cette abstinence, nous témoignons à [ROOT.Char.GetFaith.PantheonTerm] de notre humilité et de notre vertu."
 firstfruits.0030.a: "Nous #italic nous purifierons#! avant que ne débute la fête."
 
 #Finish Fast, prepare ceremony
 firstfruits.0031.t.izindutarik: "Préparatifs de l'Ascension"
 firstfruits.0031.t.generic: "Préparatifs de la Cérémonie"
 firstfruits.0031.desc.intro: "Notre jeûne s'est achevé, observé en préparation de la $activity_firstfruits_festival$. Purifiés de corps et d'esprit, nous pouvons désormais ouvrir la célébration.\n\n"
 firstfruits.0031.desc.izindutarik: "De près comme de loin, le peuple afflue afin de gravir le sanctuaire sacré d'Izindutârik. Fouler ses hauteurs et entendre la grande prière proclamée par le monarque est tenu pour une grâce insigne, marque d'une piété sincère et d'un profond respect envers les cieux.\n\nLes prêtres se rassemblent, les nobles devisent, et les convois s'apprêtent pour la longue ascension vers le sommet. Là-haut sera dressé le camp, en un lieu digne des plus saintes invocations de notre foi."
 firstfruits.0031.desc.generic: "Le peuple se rassemble, prêt à ouvrir la véritable fête. Selon l'antique coutume, beaucoup apportent les premiers grains de leur moisson : gage de piété et d'action de grâce, offrande rendue aux [ROOT.Char.GetFaith.PantheonTerm] pour les bienfaits accordés, afin qu'ils soient renouvelés l'an prochain.\n\nTous retiennent leur souffle : l'heure des prières est venue."
 firstfruits.0031.a.izindutarik: "Je gravirai l'Izindutârik !"
 firstfruits.0031.a.generic: "Puisque tous sont réunis, commençons."
 firstfruits.0031.a.toast: "Le jeûne a éprouvé votre santé"

 # Ceremony Part 1
 firstfruits.0032.t.izindutarik: "Sur le Haut-Lieu"
 firstfruits.0032.t.generic: "La Cérémonie s'ouvre"
 firstfruits.0032.desc.izindutarik: "À mesure que nous gravissons la montagne, Izindutârik se dresse dans toute sa majesté. Près du sommet s'étend une large esplanade, préparée depuis des générations pour cette prière solennelle.\n\nLes convois déchargent leurs fardeaux ; les gerbes sont amoncelées devant le grand autel, sous la voûte nue du ciel. Nul temple de pierre ici, nul édifice façonné par la main des hommes : le sanctuaire des [ROOT.Char.GetFaith.PantheonTerm] est la terre elle-même, et son plafond la course des astres.\n\nLorsque tout est prêt, je m'avance vers l'autel. Un profond silence descend sur l'assemblée, tandis que je m'apprête à prononcer les paroles sacrées…"
 firstfruits.0032.desc.generic: "Réunis dans le sanctuaire, nous ouvrons la cérémonie. Les familles s'avancent tour à tour, déposant leur grain sur l'autel : offrande de foi, promesse d'espérance pour les récoltes à venir.\n\nQuand la dernière gerbe est posée, la prière peut enfin s'élever."
 firstfruits.0032.a.izindutarik: "Recevez cette offrande…"
 firstfruits.0032.a.generic: "Louange soit rendue…"

 # Ceremony Part 2
 firstfruits.0033.t.izindutarik: "La Prière proclamée"
 firstfruits.0033.t.generic: "L'Offrande"
 firstfruits.0033.desc.izindutarik: "« Nous vous présentons cette offrande, ô grand [ROOT.Char.Custom('firstfruits_invoked_deity')]. Voyez les fruits de la terre que votre peuple a peiné à semer ; que votre miséricorde les multiplie au centuple, afin que des jours d'abondance soutiennent nos corps et manifestent la gloire de votre règne éternel. Veillez sur nous en l'année qui vient comme vous l'avez fait jadis, préservez-nous de nos ennemis, apportez paix et prospérité sur la terre, réprimez le mal et affermissez la justice.\n\nComme vous le jurâtes aux Rois d'Autrefois, maintenez encore votre serment. Accordez-nous la sagesse de gouverner votre peuple avec droiture ; et si nous venions à nous égarer, reprenez-nous et guidez nos pas vers la voie juste. »\n\nLongue est la prière, comme toujours ; nulle ne ressemble tout à fait à la précédente. Enfin, le silence retombe. Je demeure immobile, cherchant à sentir la présence de [ROOT.Char.Custom('firstfruits_invoked_deity')]."
 firstfruits.0033.desc.generic: "« [ROOT.Char.Custom('firstfruits_invoked_deity')], contemplez les dons de vos fidèles. Accordez-leur faveur et bénédiction pour l'année à venir ; que ce grain offert soit rendu au centuple. Que la pluie tombe sans inonder, que le soleil brille sans accabler, que la moisson soit abondante et le fardeau léger. »\n\nLa prière achevée, je fais signe aux assistants : une part du grain sera pétrie en pains communs, partagés librement durant la fête. Le reste est livré aux flammes, et la fumée s'élève vers les cieux."
 firstfruits.0033.a.izindutarik: "Je sens leur présence !"
 firstfruits.0033.a.generic: "Quelle révélation !"

 firstfruits.0034.t: "Conclusion"
 firstfruits.0034.desc: "Les prières ont été dites, les gerbes offertes ; le temps du recueillement s'achève.\n\nVient désormais l'heure de la liesse. D'une voix forte, j'ordonne que l'on dresse les tables, que l'on débouche les amphores et que s'élèvent les musiques. Le peuple saura gré à ma générosité, j'en suis certain.\n\nBientôt la fête bat son plein : jeux, artistes et curiosités emplissent rues et étals, tandis que la foule se presse, savourant ces instants de répit et de communion.\n\nNombreux sont les jours que dure la célébration, avant qu'enfin chacun ne regagne son foyer, le cœur léger et l'âme rassérénée."
 firstfruits.0034.a: "Quelle mémorable célébration !"