 tamska_elective_candidates_tooltip: "Pour être une candidate valide dans l'Ascension de la Tamska, la candidate doit être une femme et suivre une foi possédant le [core_tenet|El] [GetFaithDoctrine('tenet_tamska_main').GetBaseName].\n\nToute femme identifiée comme la [GetTrait('tamska_heir').GetName( GetNullCharacter )], ainsi que toutes les filles biologiques de la Tamska actuelle seront considérées comme candidates. Lorsqu'aucune candidate ne remplit ces critères, les vassales féminines du royaume seront envisagées comme alternatives jusqu'à ce qu'une nouvelle [GetTrait('tamska_heir').GetName( GetNullCharacter )] soit découverte."
 
