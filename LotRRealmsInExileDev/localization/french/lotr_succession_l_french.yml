 ##Balan Lai leader Elective 
 balan_lai_leader_elective_succession_law: "Conclave du Balân-Lâi"
 balan_lai_leader_elective_succession_law_desc: "Le dirigeant du [balan_lai|E] occupe une position largement cérémonielle, présidant les réunions du conseil et arbitrant les débats de procédure. Pourtant, ceux qui détiennent ce titre exercent une influence considérable parmi leurs pairs, établissant les programmes et forgeant des accords pour promouvoir non seulement les objectifs du [balan_lai|E], mais aussi leurs propres ambitions. Ce rôle prestigieux ne se transmet pas de père en fils, mais est réattribué par les Princes à la mort de l'ancien, allant généralement à l'un des plus puissants d'entre eux, ou à celui favorisé par le dirigeant précédent."
 balan_lai_leader_elective_electors: "Membres du Balân-Lâi"
 balan_lai_leader_elective_electors_tooltip: "Pour être un [elector|E] valide dans le Conclave du [balan_lai|E], l'électeur doit être un [independent_ruler|El] possédant le [trait|E] [GetTrait('balan_lai_member').GetName( GetNullCharacter )] et appartenir à la [culture|El] Kharadûnâim ou l'une de ses descendantes."
 balan_lai_leader_elective_candidates: "Héritier Principal du Dirigeant et Membres du Balân-Lâi"
 balan_lai_leader_elective_candidates_tooltip: "Pour être un candidat valide à la direction dans le Conclave du [balan_lai|E], le candidat doit être l'[primary_heir|E] du Dirigeant Actuel ou un [independent_ruler|El] possédant le [trait|E] [GetTrait('balan_lai_member').GetName( GetNullCharacter )]. Tout candidat doit également appartenir à la [culture|El] Kharadûnâim ou l'une de ses descendantes."
 
