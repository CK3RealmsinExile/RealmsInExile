 balan_lai_elective_candidates: "Candidat du Balân-Lâi"
 balan_lai_elective_candidates_tooltip: "Pour être un candidat valide au Conclave du [balan_lai|E], le candidat doit être l'[primary_heir|E] du Souverain actuel ou un [independent_ruler|El] avec le [trait|E] [GetTrait('balan_lai_member').GetName( GetNullCharacter )]. Tout candidat doit également appartenir à la [culture|El] Kharadûnâim ou l'une de ses descendantes."
 balan_lai_elective_electors: "Balân-Lâi"
 balan_lai_elective_electors_tooltip: "Pour être un [elector|E] valide au Conclave du [balan_lai|E], l'électeur doit être un [independent_ruler|El] avec le [trait|E] [GetTrait('balan_lai_member').GetName( GetNullCharacter )] et doit appartenir à la [culture|El] [trait|E] ou l'une de ses descendantes."
