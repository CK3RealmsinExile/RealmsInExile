 tamska_elective_electors_tooltip: "Pour être un [elector|E] valide dans l'Ascension de la Tamska, l'Électeur doit être la Tamska actuelle ou un [ruler|El] dans le territoire [de_jure|El] du titre, et suivre une [faith|El] possédant le [core_tenet|El] [GetFaithDoctrine('tenet_tamska_main').GetBaseName]."
