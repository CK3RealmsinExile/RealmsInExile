l_french:

 EVENT_WINDOW_OPTION_PURPOSE_RANGERS: "Cette option est disponible en raison de votre [camp_purpose|El] [GetLaw('camp_purpose_rangers').GetName]"
 EVENT_WINDOW_OPTION_PURPOSE_EXPLORERS_WANDERERS_AND_RANGERS: "Cette option est disponible si vous possédez l'un des éléments suivants :\n$EFFECT_LIST_BULLET$ [camp_purpose|E] [GetLaw('camp_purpose_explorers').GetName]\n$EFFECT_LIST_BULLET$ [camp_purpose|E] [GetLaw('camp_purpose_wanderers').GetName]\n$EFFECT_LIST_BULLET$ [camp_purpose|E] [GetLaw('camp_purpose_rangers').GetName]"
 EVENT_WINDOW_OPTION_PURPOSE_BRIGANDS_MERCENARIES_AND_RANGERS: "Cette option est disponible si vous possédez l'un des éléments suivants :\n$EFFECT_LIST_BULLET$ [camp_purpose|E] [GetLaw('camp_purpose_brigands').GetName]\n$EFFECT_LIST_BULLET$ [camp_purpose|E] [GetLaw('camp_purpose_mercenaries').GetName]\n$EFFECT_LIST_BULLET$ [camp_purpose|E] [GetLaw('camp_purpose_rangers').GetName]"
 event_window_widget_purge_tooltip_widget: "La [harrying_widget_i]Purge de Rây suit les valeurs de [harrying_resistance|El] et de [harrying_pacification|El]. Elles influencent les deux factions majeures de la région : le souverain Khäz-gramaze de Rây, et tout vassal d'une foi différente placé sous son autorité.\n\nUne [harrying_resistance|El] élevée traduit la résistance Vâtraist et Kât-Polozây à la domination Khäz-gramaze ; des niveaux croissants peuvent réduire le [county_control|El] et accroître la probabilité de [claimant_factions|El], voire d'une [civil_war|El].\n\nUne [harrying_pacification|El] élevée peut à l'inverse accroître le [county_control|El] et réduire la probabilité de [claimant_factions|El]."
 