 CULTURE_CREATION_DESCRIPTION: "Description:"
 CULTURE_CREATION_SAVE_DESCRIPTION: "Définir la description"
 culture_acceptance.0500.title: "Aux origines d’un peuple"
 culture_acceptance.0500.desc: "Nous sommes un peuple encore à naître, uni non par l’ancienneté des lignées ni par l’héritage des aïeux, mais par la volonté de devenir davantage que ce que nous fûmes. Nos coutumes seront façonnées par celles et ceux qui marchent à mes côtés, et par les épreuves que nous affronterons ensemble."

