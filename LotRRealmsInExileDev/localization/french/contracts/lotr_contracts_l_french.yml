 lotr_laamp_4001_desc_title: "Vous qui maîtrisez l'art de guérir,"
 lotr_laamp_4001_desc: "Guérisseurs compétents recherchés pour le traitement d'un mal rare et grave. [TaskContract.GetEmployer.GetTitleAsNameNoTooltip] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] promet juste rétribution pour un traitement approprié."
