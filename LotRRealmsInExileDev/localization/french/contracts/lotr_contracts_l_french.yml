 ### Bountig Contracts ###
 lotr_bountig_story_eastern_rhovanion_war_contract: "$lotr_bountig_story_eastern_rhovanion_war$"
 lotr_bountig_story_eastern_rhovanion_war: "Épée à Louer"
 lotr_bountig_story_eastern_rhovanion_war_desc: "[TaskContract.GetTaker.GetName], j'ai entendu dire que vous possédez un bras solide et un esprit aiguisé. Je rassemble une armée dans les terres de l'ouest pour trouver un nouveau domaine sûr où nous établir.\n\nJe ne nierai pas que ce sera ardu — les cavaliers des plaines verdoyantes sont puissants, mais je ne doute pas de notre victoire. Joignez-vous à nous, et je ferai de vous un capitaine, avec droit de premier choix sur le butin — peut-être même des terres, si le cœur vous en dit ?"
 lotr_bountig_story_eastern_rhovanion_war_desc_title: "$lotr_bountig_story_eastern_rhovanion_war$"
 lotr_bountig_story_eastern_rhovanion_war_request: "Ce [task_contract|El] exige de participer à une [war|El]"
