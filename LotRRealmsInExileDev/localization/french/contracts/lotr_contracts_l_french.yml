 ### Arphazel Contracts ###
 lotr_arphazel_contract_mirlond: "Secourir Mírlond"
 lotr_arphazel_contract_mirlond_contract: "$lotr_arphazel_contract_mirlond$"
 lotr_arphazel_contract_mirlond_desc: "\nAu nord se dresse le grand havre de [GetTitleByKey('c_mirlond').GetNameNoTier], connu des hommes épars du [GetTitleByKey('k_harondor').GetNameNoTier] sous le nom de #italic Mírlond#!. Le Seigneur de Mírlond m'a fait parvenir un message, m'invitant en sa demeure pour discuter d'un contrat lucratif. Les détails demeurent flous, mais le message précisait que l'issue de ce contrat affectera le destin de la cité tout entière..."
 lotr_arphazel_contract_mirlond_desc_title: "$lotr_arphazel_contract_mirlond$"
 lotr_arphazel_contract_mirlond_request: "Ce [task_contract|El] exige de conseiller un souverain."
 
 lotr_arphazel_contract_harfalas: "Secourir Harfalas"
 lotr_arphazel_contract_harfalas_contract: "$lotr_arphazel_contract_harfalas$"
 lotr_arphazel_contract_harfalas_desc: "\nLe long des côtes du [GetTitleByKey('k_harondor').GetNameNoTier] s'alignent de nombreux petits ports qui ont souvent changé de mains au fil des guerres entre le [gondor|E] et les Haradrim. L'un d'eux est [GetTitleByKey('c_harfalas').GetNameNoTier], actuellement gouverné par un seigneur des Harondorrim. Ayant eu vent de mon succès à Mírlond, le Seigneur de Harfalas a requis mon assistance pour une affaire délicate, m'invitant à lui rendre visite dès que possible..." 
 lotr_arphazel_contract_harfalas_desc_title: "$lotr_arphazel_contract_harfalas$"
 lotr_arphazel_contract_harfalas_request: "Ce [task_contract|El] exige de conseiller un souverain."
 
 lotr_arphazel_contract_linhir: "Convocation à Linhir"
 lotr_arphazel_contract_linhir_contract: "$lotr_arphazel_contract_linhir$"
 lotr_arphazel_contract_linhir_desc: "\nUne lettre parvient à mon campement, envoyée par Dame Fírien de [GetTitleByKey('c_linhir').GetNameNoTier], dont j'ai sauvé la vie lors de mon séjour dans la cité de [GetTitleByKey('c_harfalas').GetNameNoTier]. Elle m'invite à me rendre à la cour de son père afin de me remercier dignement de l'avoir secourue et de discuter de nouvelles opportunités pour moi au [gondor|E]..." 
 lotr_arphazel_contract_linhir_desc_title: "$lotr_arphazel_contract_linhir$"
 lotr_arphazel_contract_linhir_request: "Ce [task_contract|El] exige de rendre visite à un souverain."
 
 lotr_arphazel_contract_ramlond: "Secourir Ramlond"
 lotr_arphazel_contract_ramlond_contract: "$lotr_arphazel_contract_ramlond$"
 lotr_arphazel_contract_ramlond_desc: "\nDe l'autre côté des bouches du fleuve Harnen se dresse le port fortifié de [GetTitleByKey('c_ramlond').GetNameNoTier]. Un message me parvient, envoyé par le seigneur local, sollicitant mon aide. L'affaire demeure vague, sans doute par crainte d'une interception du message..."
 lotr_arphazel_contract_ramlond_desc_title: "$lotr_arphazel_contract_ramlond$"
 lotr_arphazel_contract_ramlond_request: "Ce [task_contract|El] exige de se rendre à la cour d'un souverain."
 
 lotr_arphazel_contract_tolfalas: "Un Message Mystérieux"
 lotr_arphazel_contract_tolfalas_contract: "$lotr_arphazel_contract_tolfalas$"
 lotr_arphazel_contract_tolfalas_desc: "\nJ'ai reçu un message mystérieux d'un inconnu m'offrant une « opportunité unique » qui expirera bientôt. L'inconnu souhaite me rencontrer sur les quais à l'extrémité sud de l'île de [GetTitleByKey('d_tolfalas').GetNameNoTier], promettant une récompense très particulière."
 lotr_arphazel_contract_tolfalas_desc_title: "$lotr_arphazel_contract_tolfalas$"
 lotr_arphazel_contract_tolfalas_request: "Ce [task_contract|El] exige de se rendre sur l'île de [GetTitleByKey('d_tolfalas').GetNameNoTier]."
  
 lotr_arphazel_contract_andrast: "Bras Valides Recherchés"
 lotr_arphazel_contract_andrast_contract: "$lotr_arphazel_contract_andrast$"
 lotr_arphazel_contract_andrast_desc: "\nLe Seigneur de [GetTitleByKey('c_serelond').GetNameNoTier] m'a contacté, cherchant de l'aide pour la construction d'un nouveau port de l'autre côté du cap d'Andrast. Mon aide est requise afin de permettre à la colonie de se développer en une véritable ville."
 lotr_arphazel_contract_andrast_desc_title: "$lotr_arphazel_contract_andrast$"
 lotr_arphazel_contract_andrast_request: "Ce [task_contract|El] exige d'aider à l'édification d'une nouvelle colonie."
 
 ### Eradan Contracts ###
 
 lotr_eradan_contract_fornost: "Rhunlest : Les Ténèbres Intérieures"
 lotr_eradan_contract_fornost_contract: "$lotr_eradan_contract_fornost$"
 lotr_eradan_contract_fornost_desc: "\nDes rapports d'autres [dunedainnorth|E] suggèrent qu'un mal s'éveille dans la cité en ruines de [GetTitleByKey('c_rhunlest').GetNameNoTier]. Le Chef Aragorn nous a chargés, mes compagnons et moi, d'enquêter sur ces ténèbres et d'en éliminer la source."
 lotr_eradan_contract_fornost_desc_title: "$lotr_eradan_contract_fornost$"
 lotr_eradan_contract_fornost_request: "Ce [task_contract|El] exige d'enquêter sur les ruines de [GetTitleByKey('c_rhunlest').GetNameNoTier]."

 lotr_eradan_contract_barrowdowns: "Hauts des Galgals : Rôdeurs Disparus"
 lotr_eradan_contract_barrowdowns_contract: "$lotr_eradan_contract_barrowdowns$"
 lotr_eradan_contract_barrowdowns_desc: "\nDeux rôdeurs des [dunedainnorth|E] ont disparu parmi les Hauts des Galgals, antique lieu de repos des ancêtres des Edain. Halbarad nous a demandé d'enquêter sur ces disparitions tandis que nous nous rendons à [imladris|E] pour informer [elrond|E] des événements survenus à [GetTitleByKey('c_rhunlest').GetNameNoTier]."
 lotr_eradan_contract_barrowdowns_desc_title: "$lotr_eradan_contract_barrowdowns$"
 lotr_eradan_contract_barrowdowns_request: "Ce [task_contract|El] exige de retrouver deux rôdeurs disparus à [GetTitleByKey('c_tyrn_gorthad').GetNameNoTier]."
 
 lotr_eradan_contract_rivendell: "Fondcombe : La Dernière Maison Simple"
 lotr_eradan_contract_rivendell_contract: "$lotr_eradan_contract_rivendell$"
 lotr_eradan_contract_rivendell_desc: "\nAprès avoir retrouvé les deux Rôdeurs disparus dans les Hauts des Galgals, nous devons poursuivre la mission originelle confiée par Halbarad : nous rendre à [imladris|E] pour informer [elrond|E] des événements survenus à [GetTitleByKey('c_rhunlest').GetNameNoTier]."
 lotr_eradan_contract_rivendell_desc_title: "$lotr_eradan_contract_rivendell$"
 lotr_eradan_contract_rivendell_request: "Ce [task_contract|El] exige de se rendre à [imladris|E] pour s'entretenir avec [elrond|E]."
 
 lotr_eradan_contract_ettenmoors: "Landes d'Etten : Déchaînement d'un Géant de Pierre"
 lotr_eradan_contract_ettenmoors_contract: "$lotr_eradan_contract_ettenmoors$"
 lotr_eradan_contract_ettenmoors_desc: "\n[elrond|E] a reçu des nouvelles inquiétantes des [GetTitleByKey('c_ettenmoors').GetNameNoTier]. Un Géant de pierre est descendu des [mistymountains|E] et ravage les terres sauvages. Cette créature doit être arrêtée à tout prix avant qu'elle n'atteigne les régions habitées de l'[eriador|E]..."
 lotr_eradan_contract_ettenmoors_desc_title: "$lotr_eradan_contract_ettenmoors$" 
 lotr_eradan_contract_ettenmoors_request: "Ce [task_contract|El] exige d'enquêter sur l'apparition d'un Géant de pierre dans les [GetTitleByKey('c_ettenmoors').GetNameNoTier]."
 
 lotr_eradan_contract_gundabad: "Gundabad : L'Essor des Orques"
 lotr_eradan_contract_gundabad_contract: "$lotr_eradan_contract_gundabad$"
 lotr_eradan_contract_gundabad_desc: "\nAu nom d'[elrond|E], j'ai été chargé d'infiltrer la forteresse [orc|E] de [GetTitleByKey('c_gundabad').GetNameNoTier] et de découvrir leurs plans concernant une invasion des terres septentrionales..."
 lotr_eradan_contract_gundabad_desc_title: "$lotr_eradan_contract_gundabad$" 
 lotr_eradan_contract_gundabad_request: "Ce [task_contract|El] exige de découvrir les plans des [orcs|E] de [GetTitleByKey('c_gundabad').GetNameNoTier]."
 
 lotr_eradan_contract_mirkwood: "Forêt Noire : La Traversée de la Forêt"
 lotr_eradan_contract_mirkwood_contract: "$lotr_eradan_contract_mirkwood$"
 lotr_eradan_contract_mirkwood_desc: "\n[GetTitleByKey('c_nordinbad').GetNameNoTier] est en danger. Les orques de [gundabad|E] menacent d'entrer en guerre contre le dernier bastion nain des [greymountains|E] ! Au nom du Seigneur Gorin, nous devons traverser [mirkwood|E] pour nous rendre à [erebor|E] et solliciter l'aide du Roi sous la Montagne..."
 lotr_eradan_contract_mirkwood_desc_title: "$lotr_eradan_contract_mirkwood$" 
 lotr_eradan_contract_mirkwood_request: "Ce [task_contract|El] exige de traverser [mirkwood|E] pour s'entretenir avec le Roi de [GetTitleByKey('k_erebor').GetNameNoTier]."
 
 lotr_eradan_contract_erebor: "Erebor : Un Appel à l'Aide"
 lotr_eradan_contract_erebor_contract: "$lotr_eradan_contract_erebor$"
 lotr_eradan_contract_erebor_desc: "\nAprès avoir secouru [radagastcharacter|E], notre mission originelle de demander de l'aide au nom de [GetTitleByKey('c_nordinbad').GetNameNoTier] doit se poursuivre. Pour atteindre [erebor|E] et solliciter l'aide du Roi sous la Montagne, nous braverons une nouvelle fois les ténèbres de [mirkwood|E]..."
 lotr_eradan_contract_erebor_desc_title: "$lotr_eradan_contract_erebor$" 
 lotr_eradan_contract_erebor_request: "Ce [task_contract|El] exige de se rendre à la Montagne Solitaire pour s'entretenir avec le Roi de [GetTitleByKey('k_erebor').GetNameNoTier]."
 
 lotr_eradan_contract_mountains: "Montagnes Grises : Couper la Route à l'Ennemi"
 lotr_eradan_contract_mountains_contract: "$lotr_eradan_contract_mountains$"
 lotr_eradan_contract_mountains_desc: "\nLe Roi sous la Montagne nous a envoyés au nord pour couper la route à l'ennemi qui marche sur [GetTitleByKey('c_nordinbad').GetNameNoTier]. Nous devons faire diligence pour entraver ou retarder l'armée orque, afin que les forces d'[erebor|E] puissent atteindre [nordinbad|E] à temps..."
 lotr_eradan_contract_mountains_desc_title: "$lotr_eradan_contract_mountains$" 
 lotr_eradan_contract_mountains_request: "Ce [task_contract|El] exige de voyager vers le nord dans les [greymountains|E] pour retarder une armée d'[orcs|E]."
 
 lotr_eradan_contract_final: "Gundabad : La Bataille Finale"
 lotr_eradan_contract_final_contract: "$lotr_eradan_contract_final$"
 lotr_eradan_contract_final_desc: "\n[nordinbad|E] est sauvée, mais la menace de [gundabad|E] demeure. Avec nos alliés nains, nous devons marcher sur la forteresse que les [orcs|E] tiennent depuis des siècles, et la libérer pour les [longbeards|E]."
 lotr_eradan_contract_final_desc_title: "$lotr_eradan_contract_final$" 
 lotr_eradan_contract_final_request: "Ce [task_contract|El] exige de mettre fin une bonne fois pour toutes à la menace de [gundabad|E]."

 ### Thorondor Contracts ###
 lotr_thorondor_contract_cameth_brin: "Cameth Brin : Exploration"
 lotr_thorondor_contract_cameth_brin_contract: "$lotr_thorondor_contract_cameth_brin$"
 lotr_thorondor_contract_cameth_brin_desc: "\n[GetTitleByKey('c_cameth_brin').GetNameNoTier], l'ancienne Tour de Guet du Rhudaur — nous soupçonnons que des orques s'y terrent."
 lotr_thorondor_contract_cameth_brin_desc_title: "$lotr_thorondor_contract_cameth_brin$"
 lotr_thorondor_contract_cameth_brin_request: "Ce [task_contract|El] exige de se rendre à Cameth Brin et d'y exterminer les orques qui s'y cachent."

 lotr_thorondor_contract_imladris: "Imladris : Quérir Conseil"
 lotr_thorondor_contract_imladris_contract: "$lotr_thorondor_contract_imladris$"
 lotr_thorondor_contract_imladris_desc: "\n[GetTitleByKey('c_imladris').GetNameNoTier] est un antique refuge des Elfes. C'est la demeure de l'un des plus sages des Eldar, Elrond Semi-elfe. Nous devons solliciter son conseil concernant la présence orque dans les montagnes septentrionales."
 lotr_thorondor_contract_imladris_desc_title: "$lotr_thorondor_contract_imladris$"
 lotr_thorondor_contract_imladris_request: "Ce [task_contract|El] exige de se rendre à Imladris pour solliciter le conseil d'Elrond."