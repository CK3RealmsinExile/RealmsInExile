 lotr_laamp_3051_desc: "[TaskContract.GetEmployer.GetTitleAsNameNoTooltip] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] offre juste récompense aux chasseurs d'expérience éprouvée pour la traque et l'élimination de la bête."

