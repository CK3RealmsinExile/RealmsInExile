 lotr_laamp_4001_contract.tt.elven_ring: "Anneau Elfique$VALUE|=+0$"
 lotr_laamp_4001_contract.tt.black_breath: "Traiter le Souffle Noir$VALUE|=+0$"

 lotr_laamp_contract_schemes.4001.t: "Guérisseurs à louer"
 lotr_laamp_contract_schemes.4001.desc.employer: "[employer.GetTitledFirstName] me lance un regard désespéré, visiblement affaibli.\n\n« Je vous en supplie, aventurier, mes meilleurs médecins ont épuisé tout leur savoir à tenter de me soigner. Vous êtes mon dernier espoir ! Guérissez-moi de cette affliction et vous serez généreusement récompensé. »"
 lotr_laamp_contract_schemes.4001.desc: "[employer.GetTitledFirstName] me lance un regard désespéré, visiblement rongé d'inquiétude.\n\n« Je vous en supplie, aventurier, mes meilleurs médecins ont épuisé tout leur savoir à tenter de soigner [target.GetName]. Vous êtes mon dernier espoir ! Guérissez-[target.Custom('FR_LeLa')] de cette affliction et vous serez généreusement récompensé. »"
 lotr_laamp_contract_schemes.4001.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 lotr_laamp_contract_schemes.4001.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 lotr_laamp_contract_schemes.4001.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 lotr_laamp_contract_schemes.4001.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 lotr_laamp_contract_schemes.4001.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"

 lotr_laamp_contract_schemes.4002.t: "$lotr_laamp_contract_schemes.4001.t$ : Succès !"
 lotr_laamp_contract_schemes.4002.desc: "Je retourne dans la grande salle de [employer.GetTitledFirstNamePossessive] le cœur léger, les doigts tachés de remèdes et les yeux rougis par le manque de sommeil, mais ma tâche accomplie.\n\n« Nous étions sur le point d'abandonner tout espoir », souffle [employer.GetTitleAsNameNoTooltip], avant de nous serrer les mains avec effusion. « Mes serviteurs veilleront à vous remettre votre paie bien méritée. »"
 lotr_laamp_contract_schemes.4002.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"

 lotr_laamp_contract_schemes.4003.t: "$lotr_laamp_contract_schemes.4001.t$ : Échec !"
 lotr_laamp_contract_schemes.4003.desc: "« Asseyez-vous », ordonne [employer.GetTitledFirstName] d'un ton acerbe. « Nous vous avons accordé notre confiance et voici comment vous nous le rendez ? Non seulement vous n'avez pas guéri le terrible mal, mais vous l'avez rendu plus virulent encore ! »\n\n« Dehors ! Vous n'êtes plus le bienvenu en ces murs ! »"
 lotr_laamp_contract_schemes.4003.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"

 lotr_laamp_5001_contract_scheme: "Raid sur une Colonie"
 lotr_laamp_5001_contract_scheme_action: "Piller une colonie appartenant à"
 lotr_laamp_5001_contract_scheme_desc: "Une guerre ne se gagne pas qu'en première ligne. Piller le territoire ennemi réduit les ressources dont il dispose.$laamp_contract_scheme_desc_general_boilerplate$"
 lotr_laamp_5001_contract_scheme_desc_general: "$lotr_laamp_5001_contract_scheme_desc$"
 lotr_laamp_5001_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 lotr_laamp_5001_desc_title: "Tous les voyageurs dans les terres de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier], et ses sujets"
 lotr_laamp_5001_desc: "[TaskContract.GetEmployer.GetTitledFirstNameNoTooltip] rappelle à #EMP tous#! les peines encourues pour vol sur ses terres, ainsi que les sanctions réservées à quiconque en serait soupçonné. Les pillards seront capturés et pendus par le cou jusqu'au trépas."
 lotr_laamp_5001_contract: "$lotr_laamp_5001_contract_scheme$"
 lotr_laamp_5001_request: "$laamp_request_boilerplate_prowess_scheme$"
 scheme_target_capital_raided: "Votre cible vient d'être pillée par un autre"

 RAID_PROTECTION_BUILDING_DESC: "Les bâtiments de la colonie offrent une protection contre les pillards$VALUE|=+0$"
 
 lotr_laamp_contract_schemes.5001.t: "Raid sur une Colonie"
 lotr_laamp_contract_schemes.5001.desc.elf: "« Les [elves|E] sont redoutables, avec cette lumière dans leurs yeux et leurs lames. Mais si nous frappons ici... » [officer.GetNameNoTooltip] désigne un point sur notre grossière carte — je plisse les yeux pour déchiffrer le nom : [target_province.GetName]. « Si nous frappons [target_province.GetName] avant que [employer.GetTitledFirstNameNoTooltip] n'en soit averti, nous pourrons peut-être mettre la main sur ces joyaux elfiques dont j'ai tant entendu parler. »\n\nAprès mûre réflexion, j'acquiesce, et nous préparons notre expédition de pillage..."
 lotr_laamp_contract_schemes.5001.desc.dwarf: "« Maudits soient les [dwarves|E] et leur acier ! » [officer.GetNameNoTooltip] serre le poing, mais je pose une main sur son épaule et [officer.Custom('FR_IlElle')] se calme.\n\n« [employer.GetTitledFirstNameNoTooltip] règne sur le manoir de [target_province.GetName] — si nous nous y faufilons avant qu'[employer.Custom('FR_IlElle')] ne s'en aperçoive, les trésors nains seront nôtres ! »\n\nAprès mûre réflexion, j'acquiesce, et nous préparons notre expédition de pillage..."
 lotr_laamp_contract_schemes.5001.desc.hobbit: "« Avez-vous entendu parler des [halflings|E], [ROOT.Char.GetFirstNameNoTooltip] ? Ils vivent sur des terres fertiles, et sont gras et faibles. Ils doivent bien posséder quelques objets de valeur, ne serait-ce que de la nourriture. » L'espace d'un instant, l'idée de mettre un peuple si joyeux et innocent à feu et à sang me révulse, mais je chasse vite cette pensée. [officer.GetNameNoTooltip] désigne [target_province.GetName], l'un des rares foyers hobbits des environs. « Je sais que [employer.GetTitledFirstNameNoTooltip] est le chef des Demi-Hommes de la région, mais il ne peut tout de même pas opposer une résistance #italic si#! terrible. »\n\nAprès mûre réflexion, j'acquiesce, et nous préparons notre expédition de pillage..."
 lotr_laamp_contract_schemes.5001.desc.orc: "« Des [orcs|E] ! Nous avons repéré l'un de leurs repaires à [target_province.GetName], sous la coupe du cruel [employer.GetTitledFirstNameNoTooltip]. Vous ai-je dit à quel point je hais les Orques ? » Je fais signe à [officer.GetNameNoTooltip] d'en venir au fait. « Ces orques ont forcément entreposé leur butin quelque part. Nous pourrions nous l'approprier. »\n\nAprès mûre réflexion, j'acquiesce, et nous préparons notre expédition de pillage..."
 lotr_laamp_contract_schemes.5001.desc.human: "« [employer.GetTitledFirstNameNoTooltip] règne sur [target_province.GetName], mais nos éclaireurs m'informent que certains accès à la région ne sont pas gardés. » [officer.GetNameNoTooltip] me lance un regard appuyé avant de poursuivre. « Nous pouvons frapper [target_province.GetName] avant que [employer.GetTitledFirstNameNoTooltip] n'en soit averti, et rafler tout ce qu'ils possèdent. »\n\nAprès mûre réflexion, j'acquiesce, et nous préparons notre expédition de pillage..."
 lotr_laamp_contract_schemes.5001.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 lotr_laamp_contract_schemes.5001.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 lotr_laamp_contract_schemes.5001.c: "$laamp_base_contract_schemes.0000.generic_option.secrecy$"
 lotr_laamp_contract_schemes.5001.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 lotr_laamp_contract_schemes.5001.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"

 lotr_laamp_contract_schemes.5002.t: "$lotr_laamp_contract_schemes.5001.t$ : Succès !"
 lotr_laamp_contract_schemes.5002.desc.elf: "Le feu fait rage contre le ciel nocturne, la fumée s'élève en volutes dans les ténèbres, tandis que [officer.GetNameNoTooltip] et moi regagnons notre campement aux côtés de notre troupe de pillards. Nos mains et nos chariots débordent des trésors scintillants des [elves|E], qui brillent même dans l'obscurité et irradient d'une lumière intérieure. Nos cris de joie résonnent dans la nuit, et je sais pertinemment que [employer.GetNameNoTooltip] ne nous oubliera pas de sitôt.\n\nLes Elfes de [target_province.GetName] panseront leurs blessures un bon moment encore, et nous avons tiré le meilleur parti de leur infortune, tant pour nous-mêmes que pour l'effort de guerre."
 lotr_laamp_contract_schemes.5002.desc.dwarf: "Le feu fait rage contre le ciel nocturne, la fumée s'élève en volutes dans les ténèbres, tandis que [officer.GetNameNoTooltip] et moi regagnons notre campement aux côtés de notre troupe de pillards. Nos mains et nos chariots débordent des trésors des [dwarves|E] — lampes de cristal et bibelots d'or et d'argent arrachés aux mains des barbichus. Nos cris de joie résonnent dans la nuit, et je sais pertinemment que [employer.GetNameNoTooltip] ne nous oubliera pas de sitôt.\n\nLes Nains de [target_province.GetName] panseront leurs blessures un bon moment encore, et nous avons tiré le meilleur parti de leur infortune, tant pour nous-mêmes que pour l'effort de guerre."
 lotr_laamp_contract_schemes.5002.desc.hobbit: "Le feu fait rage contre le ciel nocturne, la fumée s'élève en volutes dans les ténèbres, tandis que [officer.GetNameNoTooltip] et moi regagnons notre campement aux côtés de notre troupe de pillards. Nos mains et nos chariots débordent des trésors des [hobbits|E] — vivres à profusion pour festoyer, mais aussi de curieux mathoms et objets de provenance plus ancienne. Nos cris de joie résonnent dans la nuit, et je sais pertinemment que [employer.GetNameNoTooltip] ne nous oubliera pas de sitôt.\n\nLes Demi-Hommes de [target_province.GetName] panseront leurs blessures un bon moment encore, et nous avons tiré le meilleur parti de leur infortune, tant pour nous-mêmes que pour l'effort de guerre."
 lotr_laamp_contract_schemes.5002.desc.orc: "Le feu fait rage contre le ciel nocturne, la fumée s'élève en volutes dans les ténèbres, tandis que [officer.GetNameNoTooltip] et moi regagnons notre campement aux côtés de notre troupe de pillards. Nos mains et nos chariots débordent du butin des [orcs|E] — trésors de raids passés et d'autres peuples, mais aussi bon nombre des instruments cruels des gobelins eux-mêmes. Nos cris de joie résonnent dans la nuit, et je sais pertinemment que [employer.GetNameNoTooltip] ne nous oubliera pas de sitôt.\n\nLes Orques de [target_province.GetName] panseront leurs blessures un bon moment encore, et nous avons tiré le meilleur parti de leur infortune, tant pour nous-mêmes que pour l'effort de guerre."
 lotr_laamp_contract_schemes.5002.desc.human: "Le feu fait rage contre le ciel nocturne, la fumée s'élève en volutes dans les ténèbres, tandis que [officer.GetNameNoTooltip] et moi regagnons notre campement aux côtés de notre troupe de pillards. Nos mains et nos chariots débordent de tout l'or, les joyaux et les trésors que nous pouvons emporter. Nos cris de joie résonnent dans la nuit, et je sais pertinemment que [employer.GetNameNoTooltip] ne nous oubliera pas de sitôt.\n\nLes habitants de [target_province.GetName] panseront leurs blessures un bon moment encore, et nous avons tiré le meilleur parti de leur infortune, tant pour nous-mêmes que pour l'effort de guerre."
 lotr_laamp_contract_schemes.5002.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"

 lotr_laamp_contract_schemes.5003.t: "$lotr_laamp_contract_schemes.5001.t$ : Échec !"
 lotr_laamp_contract_schemes.5003.desc.elf: "[officer.GetNameNoTooltip] me soutient tandis que je trébuche, les jambes lourdes de notre fuite éperdue — même à présent, il me semble entendre des poursuivants derrière nous. Notre raid sur le refuge elfique de [target_province.GetName] a été repoussé par la force et la fureur étincelante des [elves|E] de [employer.GetNameNoTooltip]. J'ai cru l'apercevoir dans la mêlée, étoile brillante dans la nuit, l'épée luisant à la lueur des flammes. Même maintenant, j'imagine les pas silencieux des Elfes à nos trousses, car ils ne faisaient aucun bruit en se déplaçant.\n\nNous n'avons conquis nul trésor, nous avons échoué dans notre mission, et nous ne récolterons nulle récompense."
 lotr_laamp_contract_schemes.5003.desc.dwarf: "[officer.GetNameNoTooltip] me soutient tandis que je trébuche, les jambes lourdes de notre fuite éperdue — j'entends encore le fracas de l'acier au loin. Notre raid sur le manoir de [target_province.GetName] a été repoussé par la force des [dwarves|E] et leurs armes d'acier tranchant. J'ai beaucoup vu [employer.GetNameNoTooltip] — dès que le combat a éclaté, [employer.Custom('FR_IlElle')] s'est jeté dans la bataille, grande hache au poing et cri de guerre aux lèvres. J'entends faiblement un cor dans le lointain — les Nains se rassemblent pour nous traquer.\n\nNous n'avons conquis nul trésor, nous avons échoué dans notre mission, et nous ne récolterons nulle récompense."
 lotr_laamp_contract_schemes.5003.desc.hobbit: "[officer.GetNameNoTooltip] me soutient tandis que je trébuche, les jambes lourdes de notre fuite éperdue — le tintement des cloches résonne dans ma tête, et le cri « Peur, Feu, Ennemis » me hante encore. Notre raid sur les smials de [target_province.GetName] a été repoussé par — de toutes les créatures — les [hobbits|E] et leur force inexplicable. [employer.GetNameNoTooltip] était en première ligne, brandissant une grande massue, fonçant sur nous avec un courage invraisemblable. Aucun Hobbit ne nous a encore suivis, mais je n'ai pas l'intention de m'attarder.\n\nNous n'avons conquis nul trésor, nous avons échoué dans notre mission, et nous ne récolterons nulle récompense."
 lotr_laamp_contract_schemes.5003.desc.orc: "[officer.GetNameNoTooltip] me soutient tandis que je trébuche, les jambes lourdes de notre fuite éperdue — ma tête tourne, mais le poison sur la flèche n'est rien qu'un médecin ne puisse soigner. Notre raid sur la forteresse de [target_province.GetName] a été repoussé par la férocité et la ruse des [orcs|E]. Leur chef, [employer.GetNameNoTooltip], a mené la défense, son cimeterre cruel taillant et tranchant dans les rangs de mes compagnons, tandis que ses orques hurlaient pour réclamer du sang. Je les entends à présent — les hurlements des wargs et des orques !\n\nNous n'avons conquis nul trésor, nous avons échoué dans notre mission, et nous ne récolterons nulle récompense."
 lotr_laamp_contract_schemes.5003.desc.human: "[officer.GetNameNoTooltip] me soutient tandis que je trébuche, les jambes lourdes de notre fuite éperdue. Notre raid sur [target_province.GetName] a été repoussé par les gardes aguerris que [employer.GetNameNoTooltip] avait engagés, et même maintenant je l'imagine riant, ses trésors en sécurité dans ses coffres. Des cors sonnent au loin, et nous entendons le murmure d'hommes qui nous cherchent.\n\nHélas, nous avons échoué dans notre mission, et nous ne récolterons nulle récompense."
 lotr_laamp_contract_schemes.5003.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 
 lotr_laamp_6001_contract: "Patrouille Frontalière"
 lotr_laamp_6001_request: "Ce [task_contract|El] exige de vous rendre aux frontières du royaume de [TaskContract.GetEmployer.GetName]."
 lotr_laamp_6001_desc: "[TaskContract.GetEmployer.GetTitleAsNameNoTooltip] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] offrira bonne rétribution à tout gardien des marches aguerri disposé à patrouiller les frontières de ses terres."
 lotr_laamp_6001_desc_title: "Vaillants gardiens des marches,"
 
 lotr_laamp_contract_schemes.6000.t: "Patrouille Frontalière"
 lotr_laamp_contract_schemes.6000.desc: "Mes compagnons et moi sommes conduits dans la grande salle de [employer.GetName], qui nous accueille d'un hochement de tête. « Il est bon que vous soyez venus, mes amis », déclare [employer.GetTitleAsNameNoTooltip]. « Comme vous le savez, notre royaume a toujours besoin de gardiens des marches aguerris, prêts à surveiller nos frontières et à protéger les lisières qui nous séparent du vaste monde. Vous devez partir sur-le-champ, car le temps presse. »"
 lotr_laamp_contract_schemes.6000.a: "Soit, nous partons."
 lotr_laamp_contract_schemes.6000.a.tt: "Vous voyagerez vers [patrol_target_county.GetNameNoTier]"
 lotr_laamp_contract_schemes.6000.tt_1: "[knight1.GetName] rejoint votre patrouille"
 lotr_laamp_contract_schemes.6000.tt_2: "[knight2.GetName] rejoint votre patrouille"

 lotr_laamp_contract_schemes.6001.t: "$lotr_laamp_contract_schemes.6000.t$ : Succès !"
 lotr_laamp_contract_schemes.6001.desc: "De retour à la cour de [employer.GetName], [employer.GetTitleAsNameNoTooltip] nous attend dans sa grande salle. « J'apprends que tout va bien aux frontières », dit [employer.GetFirstName] avec une quiétude sereine.\n\n« En effet », réponds-je. « Les [elves|E] de votre royaume demeureront en sécurité dans un avenir prévisible. » [employer.GetFirstName] me remercie, puis récupère ma paie auprès de son intendant et me la remet."
 lotr_laamp_contract_schemes.6001.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"

 lotr_laamp_contract_schemes.6002.t: "$lotr_laamp_contract_schemes.3051.t$ : Échec !"
 lotr_laamp_contract_schemes.6002.desc: "De retour à la cour de [employer.GetName], [employer.GetTitleAsNameNoTooltip] nous attend dans sa grande salle. Une ombre plane entre nous tandis que nous relatons le récit de notre patrouille malheureuse, mais il n'y a que tristesse et résignation dans les yeux de [employer.GetFirstName]. « La Longue Défaite ne se repousse pas aisément », dit-[employer.Custom('FR_IlElle')] avant de nous congédier."
 lotr_laamp_base_contract_schemes.6002.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 
 lotr_laamp_6000_contract_scheme: "Patrouille Frontalière"
 lotr_laamp_6000_contract_scheme_action: "Patrouiller les Frontières"
 lotr_laamp_6000_contract_scheme_desc: "Les [elves|E] partent souvent s'assurer que leurs frontières sont sûres.$laamp_contract_scheme_desc_general_boilerplate$"
 lotr_laamp_6000_contract_scheme_desc_general: "$lotr_laamp_6000_contract_scheme_desc$"
 lotr_laamp_6000_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 lotr_laamp_6000_desc_title: "Vaillants gardiens des marches,"
 lotr_laamp_6000_desc: "[TaskContract.GetEmployer.GetTitleAsNameNoTooltip] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] offre juste récompense aux gardiens des marches d'expérience éprouvée pour patrouiller avec succès les frontières du royaume."
 
