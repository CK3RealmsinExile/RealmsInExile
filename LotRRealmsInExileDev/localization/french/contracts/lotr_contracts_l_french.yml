l_french: 

 lotr_laamp_1001_contract: "Traquer les Maraudeurs"
 lotr_laamp_1001_desc_title: "Guerriers de renom,"
 lotr_laamp_1001_desc: "[TaskContract.GetTarget.GetPrimaryTitle.GetNameNoTierNoTooltip] souffre de la présence de maraudeurs ennemis rescapés qui sèment terreur et chaos. Quiconque les exterminera jusqu'au dernier sera généreusement récompensé."
 lotr_laamp_1001_request: "Ce [task_contract|El] exige de [travel|El] vers les [counties|El] [contractor_possessive|E] où subsiste une population ennemie" 
 
 lotr_laamp_contract_schemes.1001.t: "$contract_event_prefix$ $lotr_laamp_1001_contract$"
 lotr_laamp_contract_schemes.1001.desc: "[task_contract_councillor.GetName], [task_contract_councillor.GetCouncilTitle] de [task_contract_councillor_liege.GetPrimaryTitle.GetNameNoTierPossessive], se présente à mon campement pour la journée. Dès que nous sommes seuls, [task_contract_councillor.Custom('FR_IlElle')] se met à marmonner.\n\n« J'ai honte de l'admettre... mais j'ai besoin de votre aide pour mettre fin au chaos qui ravage [task_contract_destination.GetName]. » [task_contract_councillor.GetCouncilTitle|l] pousse un soupir exaspéré et lance un regard sombre.\n\n"
 lotr_laamp_contract_schemes.1001.desc_orcs: "Les Orques continuent de brûler et piller nos villages dès que nos guerriers ont le dos tourné ! »"
 lotr_laamp_contract_schemes.1001.desc_elves: "Les Immortels surgissent à la nuit tombée, et dans leurs yeux brille une lumière terrible à contempler. On a retrouvé nombre de nos guerriers et contremaîtres, une flèche fichée dans l'œil ou la gorge tranchée ! »"
 lotr_laamp_contract_schemes.1001.a: "Laissez-moi m'en charger !"
 lotr_laamp_contract_schemes.1001.a_tt: "$lotr_laamp_contract_schemes.1003.travel_without_domicile$"
 lotr_laamp_contract_schemes.1001.b: "J'y déplacerai mon campement." 
 lotr_laamp_contract_schemes.1001.b_tt: "$lotr_laamp_contract_schemes.1003.travel_with_domicile$" 
 lotr_laamp_contract_schemes.1002.t: "$lotr_laamp_contract_schemes.1001.t$"
 lotr_laamp_contract_schemes.1002.desc: "Sitôt arrivé à [task_contract_destination.GetName], je m'enquiers des maraudeurs qui terrorisent la population. [corrupt_province_peasant.GetName],"
 lotr_laamp_contract_schemes.1002.desc_orcs: "un grand Orque assoiffé de sang, les mène depuis les recoins les plus ténébreux des terres sauvages."
 lotr_laamp_contract_schemes.1002.desc_elves: "un Elfe de haute stature armé d'une lame étincelante, guide ses guerriers sans répit ni merci."
 lotr_laamp_contract_schemes.1002.a: "« Fuyez ou périssez, vermines ! »"
 lotr_laamp_contract_schemes.1002.b: "Nous opterons pour une approche plus subtile."
 lotr_laamp_contract_schemes.1002.a_win: "Vous contribuez à asseoir l'autorité [task_contract_councillor.GetCouncilTitleFirstNamePossessive]"
 lotr_laamp_contract_schemes.1002.a_lose: "Mais vous devez abandonner quelques [ROOT.Char.GetWomenMen] derrière vous"
 lotr_laamp_contract_schemes.1003.t: "$lotr_laamp_contract_schemes.1001.t$"
 lotr_laamp_contract_schemes.1003.desc: "L'épreuve épuisante de débusquer chaque bandit enfin achevée, nous reprenons la route. [task_contract_councillor.GetName] évoque notre prochaine destination.\n\n« Nous nous rendrons à [corrupt_province.GetName], pour le meilleur ou pour le pire. Les bandes armées locales sont source de vive inquiétude."
 lotr_laamp_contract_schemes.1003.desc_orcs: "$lotr_laamp_contract_schemes.1001.desc_orcs$"
 lotr_laamp_contract_schemes.1003.desc_elves: "$lotr_laamp_contract_schemes.1001.desc_elves$"
 lotr_laamp_contract_schemes.1003.a: "Hâtons-nous !"
 lotr_laamp_contract_schemes.1003.b: "J'y déplacerai mon campement." 
 lotr_laamp_contract_schemes.1003.c: "J'en ai assez des ennuis [task_contract_employer.GetFirstNamePossessiveNoTooltip]."
 lotr_laamp_contract_schemes.1003_success: "Vous accomplissez le [task_contract.GetType.GetName] [task_contract|El] : vous avez aidé [task_contract_employer.GetShortUIName] à ramener la paix sur ses terres"
 lotr_laamp_contract_schemes.1003_fail: "Vous échouez au [task_contract.GetType.GetName] [task_contract|El] : vous n'avez pu ramener la paix sur les terres de [task_contract_employer.GetShortUIName]"
 lotr_laamp_contract_schemes.1003.travel_without_domicile: "Entamer un [travel|El] vers [corrupt_province.GetName] sans déplacer votre [camp|El]"
 lotr_laamp_contract_schemes.1003.travel_with_domicile: "Entamer un [travel|El] vers [corrupt_province.GetName] en emportant votre [camp|El]"
 
 lotr_laamp_contract_1001_cleared_stragglers_effect_tt: "Augmente le contrôle de #P 1#!"
 lotr_laamp_contract_1001_stragglers_remain_effect_tt: "Augmente l'échec de #N 1#!"
 msg_stragglers_remain.title: "Maraudeurs en fuite"
 msg_stragglers_remain.desc: "[task_contract_taker.GetShortUIName] n'a pas réussi à éliminer les maraudeurs"
 msg_cleared_stragglers.title: "Maraudeurs éliminés"
 msg_cleared_stragglers.desc: "[task_contract_taker.GetShortUIName] nous a aidés à nous débarrasser des maraudeurs"
 
 lotr_laamp_1011_contract_scheme: "Embuscade sur Colonne Ennemie"
 lotr_laamp_1011_contract_scheme_action: "Tendre une embuscade pour"
 lotr_laamp_1011_contract_scheme_desc: "Quand un [contractor|El] a besoin qu'une force ennemie en approche soit embusquée discrètement et sans délai, un rôdeur offre bien plus de discrétion que des hommes liges ordinaires.$laamp_contract_scheme_desc_general_boilerplate$"
 lotr_laamp_1011_contract_scheme_desc_general: "$lotr_laamp_1011_contract_scheme_desc$"
 lotr_laamp_1011_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 lotr_laamp_1011_desc_title: "Rôdeurs de bonne renommée,"
 lotr_laamp_1011_desc: "[TaskContract.GetEmployer.GetTitleAsNameNoTooltip] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] recherche de toute urgence des combattants discrets pour une mission brève mais périlleuse. Généreuse récompense promise pour travail rapide et sans bavure."
 lotr_laamp_1011_contract: "$lotr_laamp_1011_contract_scheme$"
 lotr_laamp_1011_request: "$laamp_request_boilerplate_martial_scheme$"
 
 lotr_laamp_contract_schemes.1011.t: "Embuscade sur Colonne Ennemie"
 lotr_laamp_contract_schemes.1011.desc: "« Mes besoins sont simples », m'explique [employer.GetFirstName]. « Mes éclaireurs ont repéré une colonne des forces de [assault_target.GetTitledFirstNamePossessive] qui traverse mes terres. Nous ne pouvons les laisser circuler en toute impunité. Mes troupes pourraient les affronter de front, mais des individus dotés de vos talents particuliers sont mieux à même de les surprendre en marche. »\n\nJe trace un pouce en travers de ma gorge, interrogateur.\n\n« Exactement », confirme mon employeur. « Tuez-en le plus possible. Chaque soldat mort sera un ennemi de moins à affronter sur le champ de bataille. »\n\nVoilà qui paraît simple."
 lotr_laamp_contract_schemes.1011.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 lotr_laamp_contract_schemes.1011.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 lotr_laamp_contract_schemes.1011.c: "$laamp_base_contract_schemes.0000.generic_option.progress$"
 lotr_laamp_contract_schemes.1011.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 lotr_laamp_contract_schemes.1011.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"

 lotr_laamp_contract_schemes.1012.t: "$lotr_laamp_contract_schemes.1011.t$ : Succès !"
 lotr_laamp_contract_schemes.1012.desc: "« Excellent travail, [ROOT.Char.GetFirstNameNoTooltip] ! Les terres de [employer.GetCapitalLocation.GetTitle.GetNameNoTier] connaissent enfin la paix, et je pourrai dormir un peu plus tranquille. »\n\n[employer.Custom('FR_IlElle')|U] me lance une bourse d'argent.\n\n« Faites-nous l'honneur de demeurer parmi nous la prochaine fois que vous traverserez la région ! Je suis certain que nous pourrons vous trouver un gîte convenable — sans parler d'un #EMP emploi#! convenable — pour un [ROOT.Char.Custom2('GetYoungOld',employer)] [ROOT.Char.Custom('GetLaampDescribeTypeSelf')] aussi entreprenant. »"
 lotr_laamp_contract_schemes.1012.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"
 lotr_laamp_1011_heavy_losses: "Les Hommes d'armes de [assault_target.GetTitledFirstNamePossessive] subissent de lourdes pertes"
 lotr_laamp_1011_catastrophic_losses: "Les Hommes d'armes de [assault_target.GetTitledFirstNamePossessive] subissent des pertes catastrophiques"

 lotr_laamp_contract_schemes.1013.t: "$lotr_laamp_contract_schemes.1011.t$ : Échec !"   
 lotr_laamp_contract_schemes.1013.desc: "« Vous n'aviez qu'une seule tâche, [ROOT.Char.GetFirstNameNoTooltip] », soupire [employer.GetFirstNameNoTooltip]. « Localiser la colonne ennemie, en tuer le plus possible, puis revenir chercher votre argent. »\n\nMon [ROOT.Char.Custom('MaskFace')] demeure impassible. C'est peut-être vexant, mais mieux vaut laisser [employer.GetTitleAsNameNoTooltip] exprimer ses frustrations par des mots, plutôt qu'il n'y recoure par la force des armes.\n\n« Je suis sans doute bien fou d'avoir attendu mieux d'un [ROOT.Char.Custom('GetLaampDescribeTypeInsult')] de votre espèce. Tant pis. »\n\nUne pause... J'attends de voir si cet [employer.GetWomanMan] a encore quelque chose à ajouter.\n\n« Vous pouvez disposer. #EMP Sur-le-champ#!, je vous prie. »"
 lotr_laamp_contract_schemes.1013.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 lotr_laamp_1011_light_losses: "Les Hommes d'armes de [assault_target.GetTitledFirstNamePossessive] subissent des pertes légères"
 lotr_laamp_1011_light_losses_own: "Vos Hommes d'armes subissent des pertes légères"
 
 lotr_laamp_2001_contract_scheme: "Intercepter les Convois Ennemis"
 lotr_laamp_2001_contract_scheme_action: "Intercepter les convois de"
 lotr_laamp_2001_contract_scheme_desc: "On dit qu'une armée marche sur son ventre. Pillez un dépôt de ravitaillement ennemi, coupez leurs vivres, et la moitié de la bataille est déjà gagnée.$laamp_contract_scheme_desc_general_boilerplate$"
 lotr_laamp_2001_contract_scheme_desc_general: "$lotr_laamp_2001_contract_scheme_desc$"
 lotr_laamp_2001_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 lotr_v_desc_title: "Prenez garde aux vagabonds et aux bons-à-rien,"
 lotr_laamp_2001_desc: "[TaskContract.GetEmployer.GetTitleAsNameNoTooltip] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] met en garde tout bandit ou ruffian mal intentionné contre toute entrave au transport de ses convois militaires."
 lotr_laamp_2001_contract: "$lotr_laamp_2001_contract_scheme$"
 lotr_laamp_2001_request: "$laamp_request_boilerplate_stewardship_scheme$"
 
 lotr_laamp_contract_schemes.2001.t: "Intercepter les Convois Ennemis"
 lotr_laamp_contract_schemes.2001.desc: "[officer.GetFirstName] déroule devant moi une carte de la région. Dans un coin figure un repère rouge, relié par une ligne en pointillés. [officer.Custom('FR_IlElle')] le désigne du doigt.\n\n« Ici se trouve un dépôt de ravitaillement ennemi, où ils entreposent vivres et armes, et voici l'itinéraire des convois. Si nous les prenons par surprise, nous pourrons détourner ces biens à notre profit ! »"
 lotr_laamp_contract_schemes.2001.desc.outro: "\n\nJ'acquiesce et me mets en route."
 lotr_laamp_contract_schemes.2001.tt.destination_list: "Vous entamez immédiatement un [traveling|E] vers [supply_depot.GetNameNoTier]"
 lotr_laamp_contract_schemes.2001.a: "$travel.stationary_domicile.option.t$"
 lotr_laamp_contract_schemes.2001.b: "$travel.mobile_domicile.option.t$"
 
 lotr_laamp_contract_schemes.2002.t: "$lotr_laamp_contract_schemes.2001.t$ : Tendre l'Embuscade"
 lotr_laamp_contract_schemes.2002.desc: "Je me tiens sur une crête dominant le dépôt de ravitaillement, ceint d'une palissade de bois et de tours de guet. Des torches vacillent dans la nuit, et des convois chargés de provisions passent à intervalles réguliers. J'observe les mouvements des gardes et médite mon approche."
 lotr_laamp_contract_schemes.2002.desc.outro: "\n\nNous pourrions lancer un assaut direct sur le dépôt et piller leurs provisions d'un seul coup ; mais tendre des embuscades aux convois plus loin s'avérerait moins risqué."
 lotr_laamp_contract_schemes.2002.a: "Le calendrier des convois est facile à prévoir ; les attaquer un par un sera aisé."
 lotr_laamp_contract_schemes.2002.b: "Tendre des embuscades aux convois peut être fastidieux, mais c'est la meilleure solution."
 lotr_laamp_contract_schemes.2002.b.tt.success: "Vous parvenez à détourner une quantité appréciable de provisions"
 lotr_laamp_contract_schemes.2002.b.tt.failure: "Vous échouez à intercepter la moindre provision"
 lotr_laamp_contract_schemes.2002.c: "Bah, attaquons directement et discrètement, et finissons-en !"
 lotr_laamp_contract_schemes.2002.d.sacrifice_exists: "[sacrifice.GetFirstNameNoTooltip|U] demeurera sur place pour organiser des interceptions régulières."
 lotr_laamp_contract_schemes.2002.d.sacrifice_unexists: "Hélas, je n'ai aucun serviteur assez habile pour s'en charger à ma place."
 lotr_laamp_contract_schemes.2002.d.no_valid_char: "Vous n'avez aucun [follower|E] disponible avec au moins [EmptyScope.ScriptValue('laamp_base_contract_schemes_2661_other_skill_threshold_value')|0] en [intrigue|El] à détacher temporairement auprès de la [court|El] de [employer.GetFirstNamePossessive]"
 lotr_laamp_contract_schemes.2002.d.tt.courtier_stays_here: "[sacrifice.GetFirstName|U] sera détaché auprès de la [court|El] de [employer.GetTitledFirstNamePossessive] — [sacrifice.Custom('FR_IlElle')] vous reviendra dans quatre à huit ans"
 lotr_laamp_contract_schemes.2002.e.officer_exists: "[officer.GetTitledFirstNameNoTooltip|U], cela semble être de votre ressort ?"
 lotr_laamp_contract_schemes.2002.e.officer_unexists: "Hrm, je n'ai pas d'officier compétent à qui confier cette tâche."
 #lotr_laamp_contract_schemes.2002.f: "A chance for enlightened debate you say!"
 lotr_laamp_contract_schemes.2002.g: "Je puis résoudre n'importe quel problème si j'y mets du mien !"

 lotr_laamp_contract_schemes.2003.t: "$lotr_laamp_contract_schemes.2001.t$ : Succès !"
 lotr_laamp_contract_schemes.2003.desc: "[officer.GetFirstName] revient de l'expédition, le visage tuméfié mais rayonnant de fierté.\n\n« Nous avons réussi ! » s'exclame-t-[officer.Custom('FR_IlElle')] avec un large sourire. « Nous les avons dépouillés de tout ! Ils combattront pieds nus et se nourriront de pain moisi et vermoulu désormais ! »\n\nL'un de mes compagnons s'avance, tenant une petite cassette remplie d'or. « Et voici un petit bonus déniché dans l'un des chariots. »"
 lotr_laamp_contract_schemes.2003.a: "Du beau travail !"

 lotr_laamp_contract_schemes.2004.t: "$lotr_laamp_contract_schemes.2001.t$ : Échec !"
 lotr_laamp_contract_schemes.2004.desc: "[officer.GetFirstName] revient de l'expédition, le visage tuméfié et rouge de honte.\n\n« Je n'arrive pas à y croire... Tout était prêt, notre plan était parfait, et nous avons échoué lamentablement ! Nous avons été repoussés et sommes revenus blessés, les mains vides. »"
 lotr_laamp_contract_schemes.2004.a: "Quelle honte."



 lotr_laamp_3011_contract: "$lotr_laamp_3011_contract_scheme$"
 lotr_laamp_3011_request: "$laamp_request_boilerplate_intrigue_scheme$"

 lotr_laamp_contract_schemes.3011.t: "Décimer les Rangs Ennemis"
 lotr_laamp_contract_schemes.3011.desc: "« [target.GetTitledFirstName] a envoyé trop de nos meilleurs soldats dans les bras de [employer.GetFaith.DeathDeityNamePossessive], bien trop. Quelqu'un doit y mettre un terme, peu importe la manière. » grogne [employer.GetTitledFirstName].\n\nJ'acquiesce. Il n'y a rien de plus à dire — [target.Custom('FR_IlElle')] est bien trop redoutable au service de notre ennemi — et mon employeur préfère s'en remettre à un professionnel.\n\nUne vie tranchée pour en épargner beaucoup d'autres."
 lotr_laamp_contract_schemes.3011.orc.desc: "« Trop de mes joyeux petits snagas ont été découpés en morceaux par [target.GetFirstNameNoTooltip] et ses troupes, [root.GetFirstNameNoTooltip] ! On n'est plus que des loques ! » [employer.GetFirstNameNoTooltip] plante un couteau dans la table, bavant de rage. De toute évidence, [employer.getSheHe] n'a plus toute sa tête, et vous haussez les épaules.\n\n[employer.getSheHe] ramasse le couteau et vous le pointe dessus, un sourire cruel fendant ses lèvres. « C'est pourquoi #italic toi#!, mon bon petit asticot, tu vas me rapporter sa tête, et vite ! Sinon, j'accrocherai tes boyaux puants de Dushgoi jusqu'à Lugbúrz ! » Le message est passé. Vous partez sans tarder."
 lotr_laamp_contract_schemes.3011.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 lotr_laamp_contract_schemes.3011.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 lotr_laamp_contract_schemes.3011.c: "$laamp_base_contract_schemes.0000.generic_option.secrecy$"
 lotr_laamp_contract_schemes.3011.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 lotr_laamp_contract_schemes.3011.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"

 lotr_laamp_contract_schemes.3012.t: "$lotr_laamp_contract_schemes.3011.t$ : Succès !"
 lotr_laamp_contract_schemes.3012.desc: "« Votre reçu, [employer.GetTitleAsNameNoTooltip] », dis-je en laissant tomber l'insigne dérobé sur la table de [employer.GetFirstNameNicknamedPossessive]. Le tissu est moucheté de taches sombres, mais le sceau de [target.GetTitledFirstNamePossessive] demeure reconnaissable.\n\n« Vous nous avez rendu un fier service », grogne-t-[employer.Custom('FR_IlElle')]. « Les jours où [target.GetTitledFirstName] terrorisait nos soldats sont révolus. Du beau travail. Votre paie vous attend dehors, auprès du serviteur. »\n\nJ'incline la tête respectueusement et prends congé."
 lotr_laamp_contract_schemes.3012.orc.desc: "« Tiens, [employer.GetTitleAsNameNoTooltip] », dis-je en laissant tomber le paquet sur la table de [employer.GetFirstNameNicknamedPossessive]. Le ballot est ficelé et couvert de vieilles taches brunes, mais sa forme ronde ne laisse aucun doute sur son contenu.\n\n« Du bon travail, ma joyeuse petite limace », grogne-t-[employer.Custom('FR_IlElle')]. « Du bon travail ! On dit que la Grande Guerre prendra bientôt fin, et tu n'y es pas pour rien avec tes décapitations. Ha ! Ha ! Maintenant... où vais-je t'accrocher, [target.GetTitledFirstName] ? » [employer.GetFirstNameNoTooltip] berce le ballot comme un nourrisson et tournoie avec une joie mauvaise, tandis que vous attendez, puis finissez par vous racler la gorge. L'Orque vous fixe, les yeux plissés. « Tes pièces puantes sont dehors, petit rat ! Dégage de ma vue ! » \n\nJe sors sans demander mon reste et récupère les sacs de paie auprès d'un des orques dehors."
 lotr_laamp_contract_schemes.3012.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"

 lotr_laamp_contract_schemes.3013.t: "$lotr_laamp_contract_schemes.3011.t$ : Échec !"
 lotr_laamp_contract_schemes.3013.desc: "« Alors comme ça, [target.GetTitledFirstName] sait que quelqu'un en veut à sa tête ? Imbécile ! » gronde [employer.GetTitledFirstName]. « Pourquoi vous ai-je #EMP fait confiance#! ? Raaah ! »\n\nJe hausse les épaules, ouvrant la bouche pour expliquer la... mésaventure qui a permis à notre proie d'échapper à son destin, mais la main de [employer.GetFirstNamePossessiveNoTooltip] fuse, doigt pointé vers la cour.\n\n« Vous ne serez pas payé pour un travail bâclé. Sortez de mon [employer.Custom('FortifiedBuilding')] avant que je ne passe ma déception sur #EMP vous#!. »"
 lotr_laamp_contract_schemes.3013.orc.desc: "« Tu veux me dire, misérable petit ver, que [target.GetTitledFirstName] est au courant ? Et que c'est à cause de #italic tes #! bévues ? » rugit [employer.GetTitledFirstName] en empoignant un cimeterre cruel tandis que ses gardes portent la main à leurs armes.\n\nJe tends les mains en signe de supplication, ouvrant la bouche pour expliquer la... mésaventure qui a permis à notre proie d'échapper à son destin, mais un poing noueux se dresse et je me tais aussitôt. [employer.GetFirstNamePossessiveNoTooltip] se met à trépigner et à gronder, et je recule lentement. « Dehors ! Hors de ma vue avant que j'aie ta tête à la place de la sienne ! Cours, petit asticot ! Cours ! »\n\nQuelque part dehors, des wargs hurlent, les chandelles vacillent, et des orques dégainent leurs lames cruelles. Je déguerpis sans demander mon reste."
 lotr_laamp_contract_schemes.3013.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 
 lotr_laamp_3011_contract_scheme: "Éliminer un Ennemi"
 lotr_laamp_3011_contract_scheme_action: "Éliminer"
 lotr_laamp_3011_contract_scheme_desc: "Il est des moments où un [contractor|El] a besoin que quelqu'un disparaisse, mais refuse de risquer d'orchestrer cela lui-même ou est trop accaparé par d'autres affaires. Fort heureusement, le meurtre se délègue aisément aux bonnes personnes.$laamp_contract_scheme_desc_general_boilerplate$"
 lotr_laamp_3011_contract_scheme_desc_general: "$lotr_laamp_3011_contract_scheme_desc$"
 lotr_laamp_3011_contract_scheme_desc_success: "$laamp_contract_scheme_desc_success_boilerplate$"
 lotr_laamp_3011_desc_title: "Épées loyales à la volonté ferme,"
 lotr_laamp_3011_desc: "[TaskContract.GetEmployer.GetTitleAsNameNoTooltip] de [TaskContract.GetEmployer.GetPrimaryTitle.GetNameNoTier] offre généreuse récompense à des bras au caractère irréprochable et à l'expérience éprouvée pour un travail délicat et exigeant."
 
 lotr_laamp_contract_schemes.3051.t: "Chasse au Monstre"
 lotr_laamp_contract_schemes.3051.desc: "À mon arrivée dans la grande salle de [employer.GetName], [employer.Custom('FR_IlElle')] me salue et en vient aussitôt au fait. « Une créature maléfique sévit sur mes terres. Les rôdeurs sont censés protéger la paix, n'est-ce pas ? Occisez ce monstre, et vous serez récompensé. »\n\nLa mission est simple : traquer la sombre créature qui ravage cette province, et l'abattre."
 lotr_laamp_contract_schemes.3051.a: "$laamp_base_contract_schemes.0000.generic_option.success_chance$"
 lotr_laamp_contract_schemes.3051.b: "$laamp_base_contract_schemes.0000.generic_option.speed$"
 lotr_laamp_contract_schemes.3051.c: "$laamp_base_contract_schemes.0000.generic_option.secrecy$"
 lotr_laamp_contract_schemes.3051.d: "$laamp_base_contract_schemes.0000.generic_option.nothing$"
 lotr_laamp_contract_schemes.3051.d.tt: "$laamp_base_contract_schemes.0000.d.no_starting_bonus$"

 lotr_laamp_contract_schemes.3052.t: "$lotr_laamp_contract_schemes.3051.t$ : Succès !"
 lotr_laamp_contract_schemes.3052.desc: "Je me présente devant [employer.GetName], la preuve de mon succès en main. « La créature est morte ? » s'enquiert [employer.GetTitleAsNameNoTooltip], le visage illuminé.\n\n« Elle l'est », réponds-je. « Vos terres ne seront plus troublées par sa présence. » [employer.GetFirstName] me remercie, puis récupère ma paie auprès de son intendant et me la remet."
 lotr_laamp_contract_schemes.3052.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.neutral$"

 lotr_laamp_contract_schemes.3053.t: "$lotr_laamp_contract_schemes.3051.t$ : Échec !"
 lotr_laamp_contract_schemes.3053.desc: "La créature demeure introuvable. La piste s'est refroidie depuis longtemps, et le monstre qui hantait apparemment ces terres s'est volatilisé. Il ne me reste qu'à retourner auprès de [employer.GetName] et faire mon rapport.\n\n« Aucune trace de ce monstre ? » demande [employer.GetFirstName]. « Alors comment se fait-il qu'un autre village ait été ravagé la nuit dernière ? Il semble que vous ayez tout bonnement échoué à traquer la créature... et cela ne mérite aucune paie. Hors de ma vue ! »"
 laamp_base_contract_schemes.3053.a: "$laamp_base_contract_schemes.0000.generic_option.proceed.negative.light$"
 
 lotr_laamp_contract_schemes.3054.t: "$lotr_laamp_contract_schemes.3051.t$ : Premières Découvertes"
 lotr_laamp_contract_schemes.3054.desc.orc: "Tandis que ma troupe fouille la province de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], nous découvrons bientôt des indices de l'activité de la créature. Nous tombons sur un groupe de villageois terrifiés qui racontent qu'un orque sanguinaire terrorise les forêts avoisinantes.\n\nL'identité du monstre qui sévit à [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] dévoilée, nous partons en quête de nouvelles traces."
 lotr_laamp_contract_schemes.3054.desc.spider: "Tandis que ma troupe fouille la province de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], nous découvrons bientôt des indices de l'activité de la créature. Nous tombons sur un groupe de villageois terrifiés qui racontent qu'un nid de grandes araignées hante les forêts avoisinantes.\n\nL'identité du monstre qui sévit à [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] dévoilée, nous partons en quête de nouvelles traces."
 lotr_laamp_contract_schemes.3054.desc.warg: "Tandis que ma troupe fouille la province de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], nous découvrons bientôt des indices de l'activité de la créature. Nous tombons sur un groupe de villageois terrifiés qui racontent qu'un warg vorace rôde dans les ruelles sombres à la nuit tombée.\n\nL'identité du monstre qui sévit à [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] dévoilée, nous partons en quête de nouvelles traces."
 lotr_laamp_contract_schemes.3054.desc.troll: "Tandis que ma troupe fouille la province de [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], nous découvrons bientôt des indices de l'activité de la créature. Nous tombons sur un groupe de villageois terrifiés qui racontent qu'un [troll|E] massif est descendu des montagnes.\n\nL'identité du monstre qui sévit à [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] dévoilée, nous partons en quête de nouvelles traces."
 lotr_laamp_contract_schemes.3054.a: "Nous retrouverons bientôt sa piste."
 
