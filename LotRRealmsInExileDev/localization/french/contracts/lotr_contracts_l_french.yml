 lotr_laamp_4001_contract_scheme: "Soigner les Malades"
 lotr_laamp_4001_contract_scheme_action: "Soigner"
 lotr_laamp_4001_contract_scheme_desc: "Les médecins compétents sont rares, et un guérisseur doué d'un grand talent trouvera nombre de gens disposés à payer grassement pour ses services. Un guérisseur itinérant offre ainsi aux [task_contracts|E] une occasion en or d'exercer son art.$laamp_contract_scheme_desc_general_boilerplate$"
 lotr_laamp_4001_contract_scheme_desc_general: "$lotr_laamp_4001_contract_scheme_desc$"
