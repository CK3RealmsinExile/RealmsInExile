l_french:

 # Documentation - By Trig
 # Formatting gloss tooltips: [Glossary('gloss_txt','GLOSS_KEY')], where "gloss text" is the tooltip, and "GLOSS_KEY" links to the gloss itself. 
 # Example: " [Glossary( 'Pax Romana', 'PAX_ROMANA_GLOSS' )] "
 # Formating gloss definititons: GLOSS_KEY: "gloss_tooltip", where "gloss_tooltip" is the translation of the gloss
 # Example: PAX_ROMANA_GLOSS: "The #bold Pax Romana#! — a Latin phrase meaning "The Roman Peace" — has been historically used to describe the period of "peace" inaugurated by Augustus' victory at Actium. This phrase does not refer to an absence of war, but rather means that all Rome's foes were subdued."

 # Best practice for Realms: place all gloss definitions here, for easy access, under the correct language alphabetiacally. If possible, mention where it is used for reference. 

 ############ Valarian ############
 aromez_gloss: "Val. #bold Arǭmēz#! est d'une signification inconnue, mais était associé au son des cornes dans les langues [eldarin|E] auxquelles il a été adapté."

############ Elven Tongues ############

### Quenya ###
 almaren_gloss: "En [quenya_short|E], #bold Almaren#! désignait l'île primordiale qui servit de demeure aux [valargods|E], son nom signifie 'bénédiction divine'."

 andamacil_gloss: "En [quenya_short|E] #bold Andamacil #! signifie 'Épée longue'."

 andumir_gloss: "Le terme [quenya_short|E] #bold Andúmir#! se traduit par 'Le Joyau de l'Ouest' ou 'Le Joyau du Soleil Couchant'."

 angulocelunte_gloss: "En [quenya_short|E], #bold Angulóceluntë#! signifie 'Dragon des Mers', nom d'honneur conquis par [GetScriptedCharacterByHistoryID( 'lineofciryaheri12' ).GetNameNoTooltip] grâce à sa colère redoutable, sa puissance et son habileté en tant que capitaine corsaire écumant les côtes du [gondor|E]"

 aracano_gloss: "En [quenya_short|E] #bold Aracáno#! est le [amilesse|E] de [fingolfin|E], qui signifie 'Grand Chef'. Il donna à son tour ce nom à son fils, Argon."

 aranel_gloss: "Le mot [quenya_short|E] #bold Aranel#! signifie 'princesse', désignant celle qui est fille de roi."

 aratar_gloss: "En [quenya_short|E], #bold Aratar#! signifie 'les Exaltés', terme synonyme du [quenya_short|E] #bold Máhani#! 'Autorités' dérivé du Valarien #bold Māxanumāz#!."

 arate_gloss: "En [quenya_short|E] #bold Aratë#! signifie 'la noble', et est souvent utilisé par les [highelves|E] pour désigner les femmes [elves|E]  avec des rôles de dirigeants."

 arato_gloss: "En [quenya_short|E] #bold Arato#! signifie 'le noble', et est souvent utilisé par les [highelves|E] pour désigner les hommes [elves|E]  avec des rôles de dirigeants."

 arassatar_gloss: "Le terme [quenya_short|E] #bold Arassatar#! signifie 'Celui qui suit le Roi' - appellation réservée à quiconque fait preuve d'une loyauté exceptionnelle envers la Lignée Royale."

 ardamire_gloss: "En [quenya_short|E] #bold Ardamírë#! signifie 'Le Joyau de ce Monde'."

 atannahtar_gloss: "En [quenya_short|E] #bold Atannahtar #! signifie 'Tueur d'Hommes'."

 aureamaitale_gloss: "En [quenya_short|E], #bold Aurëamaitalë#! signifie 'poète du soleil matinal' et [GetScriptedCharacterByHistoryID( 'lineoftelemir1' ).GetNameNoTooltip] était ainsi nommé pour la chaleur bienfaisante qui émanait de ses œuvres sublimes consacrées à la vie et aux terres de [numenor|E]. [GetScriptedCharacterByHistoryID( 'lineoftelemir1' ).GetNameNoTooltip] connut un immense succès durant la brève renaissance de Númenor sous le règne de [GetScriptedCharacterByHistoryID( 'lineofelros25' ).GetNameNoTooltip]."

 avari_gloss: "En [quenya_short|E] #bold Avari #! signifie 'Réticent', faisant référence aux Elfes qui ne souhaitaient pas effectuer le voyage vers l'Ouest."

 ciryatan_gloss: "En [quenya_short|E] #bold Ciryatan#! signifie 'Constructeur de navire'–une variante possible pourrait être #bold Ciryatamo#!."

 coacalina_gloss: "En [quenya_short|E], #bold cöacalina#! signifie 'lumière de la demeure', appellation poétique désignant la [Glossary('fëa','fea_gloss')]."

 ela_gloss: "En [quenya_short|E] #bold ela#! constitue un cri de surprise et d'émerveillement, proféré lorsque les [elves|E] contemplèrent pour la première fois les étoiles."

 elessar_gloss: "En [quenya_short|E], #bold Elessar#! signifie 'Pierre-Elfe' et désigne le joyau vert de Galadriel puis d'Aragorn, qui en tira son nom royal. Cette gemme était connue en [sindarin|E] sous le nom d'#bold Edhelharn#!. L'élément initial de la forme [quenya|E] est proprement #bold elen#! 'étoile', mais les [dunedain|E] l'employaient souvent pour signifier 'elfe'."

 emerwen_gloss: "En [quenya_short|E], #bold Emerwen#! signifie 'bergère', nom donné à Tar-Ancalimë en raison de son éducation peu conventionnelle."

 envinyatar_gloss: "Le terme [quenya_short|E] #bold Envinyatar#! signifie 'le Renouveleur'."

 eru_gloss: "En [quenya_short|E], #bold Eru#! signifie 'L'Unique', celui qui est sans pareil, singulier et solitaire."

 fea_gloss: "Le mot [quenya_short|E] #bold fëa#! désigne en langue [elven|E] l''esprit', particulièrement celui qui réside dans un [Glossary('hröa','hroa_gloss')], parfois décrit poétiquement comme la [Glossary('cöacalina','coacalina_gloss')]."

 feanturi_gloss: "En [quenya_short|E], #bold Fëanturi#! signifie 'maîtres des esprits' et fait référence aux [valargods|E] [namocharactershort|E] et [irmocharactershort|E], mieux connus sous les noms de [mandoscharacter|E] et [loriencharacter|E]. Ces 'frères' exercent ensemble une grande domination sur la plupart des affaires touchant à la [Glossary('fëa','fea_gloss')]."

 findecano_gloss: "En [quenya_short|E] #bold Findecáno#! est le [ataresse|E] de [fingon|E], qui signifie 'Commandant aux Cheveux,' un nom particulier pour le fils aîné de Fingolfin, en référence à son grand-père #italic Finwë#!."

 finwenolofinwe_gloss: "En [quenya_short|E] #bold Finwe·ñolofinwë#! est le nom adopté par [fingolfin|E] lors des premières phases de l'[exileofthenoldor|E], pour symboliser sa revendication au titre de Haut-Roi après la mort de Finwë, et aurait été un facteur déterminant dans la décision de [feanor|E] d'incendier les Navires-Cygnes des Falmari à Losgar."

 formendil_gloss: "En [quenya_short|E] #bold Formendil#! signifie 'Amoureux du Nord', nom donné à celui qui se sent chez lui dans les étendues enneigées sauvages d'Eriador."

 hroa_gloss: "Le terme [quenya_short|E] #bold hröa#! désigne en langue [elven|E] le 'corps' d'un être incarné."

 hyandolire_gloss: "En [quenya_short|E], #bold Hyandolírë#! 'Chant qui Fend' est le nom de l'épée de [maglor|E], forgée à l'imitation de sa voix mélodieuse."

 hyarmendacil_gloss: "En [quenya_short|E] #bold Hyarmendacil#! signifie 'Vainqueur du Sud'."

 hyarmendil_gloss: "En [quenya_short|E] #bold Hyarmendil#! signifie 'Ami du Sud'."

 iluvatar_gloss: "En [quenya_short|E] #bold Ilúvatar#! signifie 'Père de Toutes Choses', celui qui constitue le commencement de tout ce qui existe."

 isil_gloss: "En [quenya_short|E], #bold Isil#! est le nom propre que les [noldor|E] donnèrent à la Lune, distincte de son pilote [tilioncharacter|E]. Ce terme signifie 'L'Éclat' et s'apparente aux mots [quenya|E] désignant la lumière argentée."

 isillonde_gloss: "En [quenya_short|E] #bold Isillondë#! constitue l'ancien nom [quenya|E] d'Ad. #bold Nîlulôni#!, la capitale de [bellakar|E]."

 kanafinwe_gloss: "En [quenya_short|E] #bold Kanafinwë#! est le [ataresse|E] de [maglor|E], qui signifie 'Finwë à la voix puissante'."

 laicamaite_gloss: "En [quenya_short|E], #bold Laicamaitë#! 'Main-Verte' est le surnom de [GetScriptedCharacterByHistoryID( 'lineofroquendil1' ).GetNameNoTooltip], acquis par sa gouvernance de [calenardhon|E] et son amour des plantes et du jardinage."

 lamatyave_gloss: "Le terme [quenya_short|E] #bold lámatyávë#! signifie 'goût-sonore' et fait référence au caractère phonétique particulier ou aux prédilections sonores d'un locuteur, soigneusement considérées et développées au fil de sa maturation."

 lanquetta_lirion_gloss: "L'expression [quenya_short|E] #bold Lanquetta Lírion#! signifie 'Débat de Chants', qu'il s'agisse d'une conversation amicale ou d'une bataille redoutable."

 macalaure_gloss: "En [quenya_short|E] #bold Macalaurë#! est le [amilesse|E] de [maglor|E], qui signifie 'Couperet d'Or', une référence à sa voix puissante et à sa prédisposition musicale."

 macilion_gloss: "En [quenya_short|E] #bold Macilion#! constitue une traduction de son nom [adunaic|E] #bold Zagarthôr#!, signifie 'Fils de l'Épée'."

 mahanaxar_gloss: "En [quenya_short|E] #bold Máhanaxar#! désigne l'Anneau du Jugement situé à l'extérieur de la cité de Valimar, également connu parmi les [vanyarelves|E] sous le nom de #bold Riþil Anamo#!, portant la même signification. Il s'agit d'une adaptation du Valarien #bold Māxananaškād#! 'Anneau-du-Destin', dérivé du Valarien #bold māxan#! 'Autorité'."

 maitimo_gloss: "En [quenya_short|E] #bold Maitamo#! est le [amilesse|E] de [maedhros|E], qui signifie 'Le Bien Bâti', surnom donné par Nerdanel en raison de sa beauté physique."

 mamandil_gloss: "En [quenya_short|E], #bold Mámandil#! signifie 'Ami-des-Moutons', nom approprié pour le prétendant d'[Glossary('Emerwen','emerwen_gloss')]."

 marimo_gloss: "En [quenya_short|E] #bold Marimo#! signifie 'celui qui reste', un nom approprié pour [GetScriptedCharacterByHistoryID( 'lineofelentirold1' ).GetNameNoTooltip] qui est resté paisiblement à l'ouest lorsque les siens s'aventurèrent, en Terre du Milieu."

 martaryon_gloss: "Le terme [quenya_short|E] #bold Martaryon#! signifie 'héritier du destin', celui qui est destiné à régner."

 meletyalya_gloss: "En [quenya_short|E] #bold Meletyalya#! signifie 'glorieux' ou 'majesté', et est souvent utilisé par les [highelves|E] pour désigner les rois et reines [elven|E]."

 namalcasse_gloss: "En [quenya_short|E] #bold Námalcassë#! désigne la 'Foudre du Jugement', l'épée éclatante de Manwë connue en [sindarin|E] sous le nom de [Glossary('Celeg Aithorn','celeg_aithorn_gloss')]."

 nelyafinwe_gloss: "En [quenya_short|E] #bold Nelyafinwë#! signifie 'Troisième Finwë,' et est le [ataresse|E] de [maedhros|E]."

 nendelote_gloss: "En [quenya_short|E], #bold Nendelótë#! signifie 'Fleur du Lac', nom donné à celle qui chérissait tendrement les eaux de Nenuial baignées de lune."

 noldolante_gloss: "En [quenya_short|E] #bold Noldolantë#!, signifie 'La Chute des Noldor', est une lamentation composée par [maglor|E], narrant la rébellion contre les [valar|E], le [firstkinslaying|E] et l'[exileofthenoldor|E]."

 noldoran_gloss: "En [quenya_short|E] #bold Ñoldóran#! signifie 'Roi des [noldorelves|E]'."

 nolofinwe_gloss: "En [quenya_short|E] #bold Ñolofinwë#! est le [ataresse|E] de [fingolfin|E], qui signifie 'Sage Finwë'."

 nyarie_i_turecormaron_gloss: "En [quenya_short|E] #bold Nyárië i Túrecormaron #! signifie la Légende des Anneaux de Pouvoir."

 oath_of_elendil_gloss: "En [quenya_short|E] #bold Et Eärello Endorenna utúlien. Sinomë maruvan ar Hildinyar tenn' Ambar-metta#!\n\nAinsi parla [elendil|E] lors de son débarquement en [middleearth|E] ; prononçant ce serment : 'Depuis la Grande Mer vers la Terre du Milieu, je suis venu. En ce lieu je demeurerai, ainsi que mes héritiers, jusqu'à la fin du monde.'"

 ohtanis_gloss: "En [quenya_short|E] #bold Ohtanis#! signifie 'Femme-Guerrière' — appellation réservée à une dame d'exceptionnelle prouesse et de renommée martiale."

 pelori_gloss: "En [quenya_short|E] #bold Pelóri#! signifie 'Mur de la Montagne' ou 'Hauts-Murs', et désigne les Montagnes de Aman qui entourent la terre des Valar."

 raine_ondonoreo_gloss: "En [quenya_short|E] #bold Rainë Ondonórëo#! signifie La Paix Gondorienne et fait référence à la paix sans pareille dont jouissait le Gondor à l'apogée de sa puissance durant le [thirdage|E]."

 ramandor_gloss: "En [quenya_short|E] #bold Ramandor#! signifie 'le Hurleur' ou 'le Crieur' et était aussi un surnom de Thorondor."

 ravi_gloss: "En [quenya_short|E] #bold Rávi#! est apparenté au mot #italic ravenne#! qui signifie 'la lionne'."

 ringil_gloss: "En [quenya_short|E], #bold Ringil#! 'Le Froid Glacial' s'apparente au mot [quenya|E] désignant la 'glace'."

 romendacil_gloss: "En [quenya_short|E] #bold Rómendacil #! signifie 'Vainqueur de l'Est'."

 russandol_gloss: "En [quenya_short|E] #bold Russandol#! signifie 'Cheveux-de-Cuivre', et est un [epesse|E] donné à [maedhros|E] par ses amis et les siens en raison de ses cheveux roux foncé, hérités de sa mère et de son grand-père. Il était également connu pour porter un diadème de cuivre."

 serinde_gloss: "En [quenya_short|E] #bold Serindë#! signifie 'Brodeuse' ou 'Couturière'. L’orthographe la plus correcte est #bold Þerindë#! pour ceux qui tiennent à la Shibboleth de [feanor|E]."

 silima_gloss: "En [quenya_short|E] #bold Silima#! désigne la substance cristalline imaginée par [feanor|E] et employée dans la création des [silmarils|E]. Ce terme signifie 'argenté, d'un blanc scintillant' et s'apparente au mot [quenya|E] [Glossary('Isil','isil_gloss')]."

 tar_elestirne_gloss: "En [quenya_short|E], #bold Tar-Elestirnë#! signifie 'Dame au Front d'Étoile' et faisait référence au diamant blanc que portait Erendis."

 telemmaite_gloss: "En [quenya_short|E] #bold Telemmaitë#!! signifie 'Main d'argent'."

 tindome_gloss: "En [quenya_short|E] #bold Tindómë#! et [sindarin_short|E] #bold Tinnu#! ou #bold Minuial#! signifie 'crépuscule du matin', par opposition à [Glossary('Undómë','undome_gloss')]."

 tirnor_arano_gloss: "En [quenya_short|E] #bold Tirnor Arano#! est le titre donné aux soldats d'élite de [numenor|E], qui signifie 'Gardes du Roi'."

 turambar_gloss: "En [quenya_short|E] #bold Turambar#! était un surnom donné à [GetScriptedCharacterByHistoryID( 'lineofhador7' ).GetFirstName] de la Maison Hador par les [elves|E], qui signifie 'Maître du Destin'."

 umbardacil_gloss: "En [quenya_short|E] #bold Umbardacil #! signifie 'Victorieux d'Umbar'."

 undome_gloss: "En [quenya_short|E] #bold Undómë#! et [sindarin_short|E] #bold Aduial#!  signifie 'crépuscule du soir', par opposition à [Glossary('Tindómë','tindome_gloss')]."

 undomiel_gloss: "En [quenya_short|E] #bold Undómiel#! signifie 'Étoile du Soir' et évoquait la beauté d'Arwen ainsi que sa position symbolique marquant la fin de l'époque [elven|E] en [endor|E]."

 urundil_gloss: "En [quenya_short|E] #bold Urundil#! signifie 'Amoureux du Cuivre'."

 vanimalya_gloss: "En [quenya_short|E] #bold Vanimalya#! signifie 'le magnifique', et est souvent utilisé par les [highelves|E] pour désigner les rois et reines [elves|E] d'une beauté particulière."

 vasa_gloss: "En [quenya_short|E], #bold Vása#! signifie 'Dévoreur', nom donné par les [noldor|E] au Soleil, en signe de l'Éveil des [men|E] et de leur propre déclin."

 veatura_gloss: "En [quenya_short|E] #bold Vëaturá#! ou 'Lion des Mers' constitue le surnom accordé à [GetScriptedCharacterByHistoryID( 'lineofciryaheri1' ).GetNameNoTooltip], en raison de sa force élevée et de ses hauts faits sur terre comme sur mer en tant que capitaine et cousin du premier roi-navigateur [GetScriptedCharacterByHistoryID( 'lineofanarion15' ).GetNameNoTooltip]."

 vinyaraine_gloss: "En [quenya_short|E] #bold Vinyarainë#! signifie 'Nouvelle Paix', et fait référence à la nouvelle Paix amenée aux [dunedain|E] par le Haut Roi Elessar."

 voronwe_gloss: "En [quenya_short|E] #bold Voronwë#! signifie 'Le Constant' ou 'Le Fidèle'. C'était le nom du guide [elven|E] de [GetScriptedCharacterByHistoryID( 'lineofhador10' ).GetFirstNameRegnal] vers [GetTitleByKey('k_gondolin').GetNameNoTier], un compagnon d'[elendil|E]; et une épithète adoptée par [GetScriptedCharacterByHistoryID( 'linesteward4' ).GetFirstNameRegnal], le premier Intendant Régnant du [gondor|E]."

### Sindarin ###
 aeglos_gloss: "En [sindarin_short|E], #bold Aeglos#! signifie 'Pointe de Neige' ou 'Glaçon', nom porté à la fois par la lance de Gil-galad et par une plante épineuse ressemblant aux ajoncs du [firstage|E]."

 aen_estar_hadhafang_gloss: "En [sindarin_short|E] : 'Cette lame se nomme [Glossary('Hadhafang','hadhafang_gloss')], noble défense contre la horde ennemie pour une noble demoiselle.'"

 amdir_gloss: "En [sindarin_short|E] #bold Amdir#! signifie 'espoir', spécifiquement #italics 'une attente du bien qui, bien qu'incertaine, possède quelque fondement dans ce qui est connu'#!. Il contraste ainsi avec le [sindarin_short|E] [Glossary('estel','estel_gloss')], 'foi' qui constitue une foi aveugle sans preuves."

 amon_amarth_gloss: "En [sindarin_short|E], #bold Amon Amarth#! 'Mont du Destin' constitue le nom tardif d'[orodruin|E], ainsi appelé après son éruption qui annonça le retour de [sauroncharacter|E] vers la fin du [secondage|E]. Il reçut ce nom car il était lié dans d'anciennes prophéties peu comprises au 'destin', la fin ultime du [thirdage|E], qui selon les prédictions devait survenir lorsque le Fléau d'[isildur|E] serait découvert à nouveau."

 angrist_gloss: "En [sindarin_short|E], #bold Angrist#! signifie 'Fendoir de Fer'."

 anorvegil_gloss: "En [sindarin_short|E] #bold Anorvegil #! signifie 'Épée solaire'."

 aradan_gloss: "En [sindarin_short|E] #bold Aradan#! était un surnom donné à[GetScriptedCharacterByHistoryID( 'lineofmarach1' ).GetFirstName] par les [elves|E], signifie 'Homme Noble'."

 aranthel_gloss: "En [sindarin_short|E] #bold Aranthel#! signifie 'Volonté du Roi' et constitue l'une des lames jumelles du Roi Thranduil du [woodlandrealm|E]."

 araw_gloss: "En [sindarin_short|E], #bold Araw#! désigne la manière dont les [sindarelves|E] nomment [oromecharactershort], dérivé de son nom Valinórien [Glossary('Arǭmēz','aromez_gloss')]."

 arost_gloss: "En [sindarin_short|E] #bold Arost#! signifie 'Haute-Cité'."

 ar_feiniel_gloss: "En [sindarin_short|E], #bold Ar-Feiniel#! signifie 'Dame Blanche'."
 
 barin_gloss: "En [sindarin_short|E] #bold Barin#! signifie 'Au Cœur du Foyer'."

 bar_durin_gloss: "En [sindarin_short|E], #bold Bar Durin#! signifie 'Demeure de Durin'."

 bauglir_gloss: "En [sindarin_short|E] #bold Bauglir#! 'Le Contraignant' constitue un ancien titre de [morgothcharacter|E], le tyran et oppresseur."

 brandir_gloss: "En [sindarin_short|E] #bold Brandir#! est un nom commun signifie 'Noble Seigneur', porté en premier par le dernier chef des Haladin."

 branhael_gloss: "En [sindarin_short|E], #bold Branhael#! signifie 'Noble Sagesse' ou 'Sagesse du Seigneur'."

 cair_andros_gloss: "En [sindarin_short|E] #bold Cair Andros#! signifie 'Navire de la Longue Écume' ; car l'île avait la forme d'un grand navire, avec une haute proue pointant vers le nord, contre laquelle se brisait l'écume blanche de l'[anduin|E] sur des rochers acérés."

 canath_gloss: "En [sindarin_short|E], #bold Canath#! signifie 'quart' ou 'quartier' et désigne au Gondor une pièce d'argent, le quart du [Glossary('mirian','mirion_gloss')], également connue en Occidentalien sous le nom de [Glossary('tharni','tharni_gloss')]."

 caras_galadhon_gloss: "En [sindarin_short|E] #bold Caras Galadhon#! 'Cité des Arbres' constitue une adaptation du Nandorin local #bold Caras Galadon#!, par opposition au [sindarin|E] pur #bold Caras i-Ngelaidh#!."

 celebrindal_gloss: "En [sindarin_short|E] #bold Celebrindal#! signifie 'Pied-d'Argent'."

 celeg_aithorn_gloss: "En [sindarin_short|E], #bold Celeg Aithorn#! désigne la 'Lance-Aigle Rapide', l'Épée de Manwë dans son courroux antique. \n\n#TOLKIENQUOTE "La faux balayante de la tempête tailladante, le glaive bondissant de l'éclair lumineux, même Celeg Aithorn qui fendra le monde"#!\n\n#QUOTEDCHARACTER — Le Sortilège d'Aiguisage de Beleg Cúthalion#!"

 ciriaran_gloss: "En [sindarin_short|E] #bold Ciriáran#! signifie 'Roi-Marin'."

 cirith_ungol_gloss: "En [sindarin_short|E] #bold Cirith Ungol#! signifie 'Fente de l'Araignée'. C'est un passage à travers l'Ephel Dúath qui mène au [mordor|E]." 

 cuthalion_gloss: "En [sindarin_short|E], #bold Cúthalion#! signifie 'Arc-Puissant'."

 dagor_aglareb_gloss: "En [sindarin_short|E] #bold Dagor Aglareb#! signifie 'Bataille Glorieuse' et désigne la troisième bataille des Guerres du [beleriand|E]."

 dagor_bragollach_gloss: "En [sindarin_short|E] #bold Dagor Bragollach#! signifie 'Bataille de la Flamme Subite' et désigne la quatrième bataille des Guerres du [beleriand|E]."

 dagor_dagorath_gloss: "En [sindarin_short|E] #bold Dagor Dagorath#! signifie 'Bataille des Batailles' et désigne la Seconde Prophétie de [mandoscharacter|E]."

 dagor_nuin_giliath_gloss: "En [sindarin_short|E] #bold Dagor-nuin-Giliath#! signifie 'Bataille sous les étoiles' et désigne la deuxième battle des Guerres du [beleriand|E]."

 dirnaith_gloss: "Le #bold Dírnaith#! constituait une tactique de bataille [numenorean|E] signifie 'fer-de-lance d'hommes'. Il s'agissait d'une formation en coin lancée sur une courte distance, destinée à une attaque rapide contre une armée qui se ralliait ou une formation défensive, particulièrement efficace en terrain découvert. Cette tactique reposait sur la grande force et la stature des [numenoreans|E] pour écraser un ennemi avant qu'il ne puisse se disposer convenablement pour la bataille."

 dor_lomin_gloss: "En [sindarin_short|E], #bold Dor-lómin#! signifie 'Terre des Échos'."

 durins_door_gloss: "L'inscription se lit ainsi : #bold 'Les [doorsofdurin|E], Seigneur de [moria|E]. Parlez, ami, et entrez. Moi, Narvi, les ai faites. [celebrimbor|E] de Hollin a tracé ces signes.'#!"

 dunacharn_gloss: "En [sindarin_short|E], #bold Dúnacharn#! signifie 'Vengeance de l'Ouest', nom de l'[Glossary('Orthadel','orthadel_gloss')] reforgée."

 erchamion_gloss: "En [sindarin_short|E] #bold Erchamion#! était un surnom donné à [GetScriptedCharacterByHistoryID( 'lineofbeor32' ).GetFirstName] de la Maison [Glossary('Bëor','beor_gloss')] par les [elves|E], qui signifie 'Manchot'."

 eledhwen_gloss: "En [sindarin_short|E] #bold Eledhwen#! était un surnom donné à [GetScriptedCharacterByHistoryID( 'lineofbeor24' ).GetFirstName] de la Maison [Glossary('Bëor','beor_gloss')], 'Éclat elfique' ou 'Belle-elfique'."

 eluchil_gloss: "En [sindarin_short|E] #bold Eluchíl#! signifie 'Héritier d'Elu'."

 ered_lindon_gloss: "En [sindarin_short|E], #bold Ered Lindon#! signifie 'Montagnes du Lindon'."

 ered_luin_gloss: "En [sindarin_short|E] #bold Ered Luin#! signifie 'Montagnes Bleues'."

 ered_mellin_gloss: "En [sindarin_short|E], #bold Ered Mellin#! signifie 'Montagnes Jaunes'."

 ered_mithrin_gloss: "En [sindarin_short|E] #bold Ered Mithrin#! signifie 'Montagnes Grises'."

 ered_nimrais_gloss: "En [sindarin_short|E], #bold Ered Nimrais#! signifie 'Montagnes Blanches'."

 estel_gloss: "En [sindarin_short|E] #bold Estel#! 'espoir' diffère de l'[sindarin_short|E] [Glossary('amdir','amdir_gloss')] 'espoir' en ce que tandis qu'[Glossary('amdir','amdir_gloss')] se réfère à un espoir fondé sur les circonstances, #bold estel#! désigne plutôt la 'foi' ou la 'confiance' en la bonté d'[eru|E] et son plan divin. \n\n#bold "Voilà une chose que les Hommes nomment 'espoir', Amdir nous l'appelons, 'regard vers le haut'. Mais il en existe une autre qui trouve ses racines plus profondément. Estel nous la nommons, c'est-à-dire 'confiance'. Elle n'est point vaincue par les voies du monde, car elle ne vient pas de l'expérience, mais de notre nature et de notre être premier. Si nous sommes véritablement les Eruhin, les Enfants de l'Unique, alors Il ne souffrira pas d'être privé de ce qui Lui appartient, ni par aucun Ennemi, ni même par nous-mêmes. Voilà le fondement ultime d'Estel, que nous gardons même quand nous contemplons la Fin : de tous Ses desseins, l'issue doit être pour la joie de Ses Enfants."#!"

 faelivrin_gloss: "En [sindarin_short|E], #bold Faelivrin#! signifie 'Reflet du Soleil sur les Bassins d'Ivrin'."

 felagund_gloss: "En [sindarin_short|E] #bold Felagund#! signifie 'Tailleur de Cavernes'. Ce n'est pas originellement un terme Sindarin, mais plutôt issu du [khuzdul|E] des [dwarves|E], qui donnèrent ce nom comme [Glossary('Epessë','epesse_gloss')] à [finrod|E]."

 fimbaeth_gloss: "En [sindarin_short|E], #bold Fimbaeth#! signifie 'Habile de Parole'."

 forochel_gloss: "En [sindarin_short|E] #bold Forochel#! signifie 'Glace du Nord'. C'est le nom donné par les [dunedain|E] à la toundra glacée située dans les régions septentrionales de la [middleearth|E]."

 forodwaith_gloss: "En [sindarin_short|E] #bold Forodwaith#! signifie 'Peuple, ou Région, du Nord'. C'est le nom donné par les [dunedain|E] aux tribus indigènes des [northernwaste|E] qui, à leur tour, ont donné leur nom à toute la région."

 gorchu_gloss: "En [sindarin_short|E] #bold Gorchu#! signifie 'Chien Redoutable'."

 gorthagnir_gloss: "En [sindarin_short|E], #bold Gorthagnir#! signifie 'Fléau-des-Spectres' et constitue l'une des Lames des Tertres forgées en [arthedain|E] contre les forces obscures du [witchking|E] d'[angmar|E]."

 gil_estel_gloss: "En [sindarin_short|E] #bold Gil-Estel#! signifie 'L'Étoile du Haut-Espoir' et constitue un surnom traditionnel pour l'étoile d'Eärendil. Il emploie le terme [sindarin|E] [Glossary('estel','estel_gloss')], faisant référence à l'espoir donné par le lever de l'Étoile." 

 glamdring_gloss: "En [sindarin_short|E], #bold Glamdring#! 'Assommoir à Ennemis' était l'épée de Turgon, connue des Orques sous le nom de 'Cogneuse'."

 gorthol_gloss: "En [sindarin_short|E] #bold Gorthol#! signifie 'le Heaume Redoutable'."

 hadhafang_gloss: "En [sindarin_short|E], #bold Hadhafang#! 'Pourfendeuse de Hordes' était le nom de l'épée d'Idril Celebrindal et plus tard d'Elrond."

 heryvellyn_gloss: "En [sindarin_short|E] #bold Heryvellyn#! signifie 'Amoureux du Vin'."

 ingoldo_gloss: "En [sindarin_short|E] #bold Ingoldo#! signifie 'un éminent parmi la famille des [noldor|E]'."

 ingweron_gloss: "En [sindarin_short|E] #bold Ingweron#! signifie 'Chef des Chefs'."

 lalaith_gloss: "En [sindarin_short|E] #bold Lalaith#! était un surnom donné à Urwen de la Maison Hador par les [elves|E], signifie 'Rire'."

 leithian_gloss: "Le Lai de [sindarin_short|E] #bold Leithian#! 'Libération de l'Esclavage' constitue le plus long, à une exception près, des chants concernant le monde d'autrefois. Parmi ces histoires les plus belles résonnant encore aux oreilles des [elves|E] se trouve le conte de Beren et Lúthien." #Used in artifcat description

 lindalph_gloss: "En [sindarin_short|E], #bold Lindalph#! signifie 'Chant du Cygne', motif récurrent de la maison princière de [dol_amroth|E]."

 linnar_gloss: "En [sindarin_short|E] #bold Linnar#! signifie 'le Chanteur'."

 lorindol_gloss: "En [sindarin_short|E] #bold Lórindol#! était un surnom donné à Hador par les [elves|E], qui signifie 'Tête d'or'."

 lossoth_gloss: "En [sindarin_short|E] #bold Lossoth#! signifie 'Ost des neiges'. C'est le nom donné aux tribus indigènes d'[snowmen|E] de la Baie Glacée de [forochel|E] par les [dunedain|E]."

 mae_govannen_gloss: "En [sindarin_short|E], #bold Mae Govannen#! signifie 'bien rencontré' et constitue une salutation commune parmi les [elves|E] et les [dunedain|E]."

 meldis_gloss: "[sindarin_short|E] #bold Meldis#!, pluriel #italic Meldis#! signifie 'une amie'."

 meleth_ilertha_gloss: "En [sindarin_short|E] #bold Meleth Ilertha#! est la devise des [GetDynastyHouseByID('house_roquendilin').GetName] et signifie 'L'amour unit tous'."

 mellon_gloss: "En [sindarin_short|E] #bold Mellon#!, pluriel #italic mellyn#! signifie 'ami'."

 methrohir_gloss: "En [sindarin_short|E], #bold Methrohir#! signifie 'Dernier-Cavalier' - nom de mauvais augure pour qui ne fut pas le moindre d'une lignée seigneuriale."

 men_i_naugrim_gloss: "En [sindarin_short|E] #bold Men-i-Naugrim#! signifie 'Voie des Nains'."

 mirian_gloss: "En [sindarin_short|E] #bold Mirian#!, signifie 'chose de valeur', désigne une pièce [gondorian|E], la principale monnaie employée dans ce royaume. Elle équivaut à quatre [Glossary('canaith','canath_gloss')] et est également connue en Occidentalien sous le nom de [Glossary('castar','castar_gloss')]."

 mormegil_gloss: "En [sindarin_short|E] #bold Mormegil #! signifie 'Épée-Noire'."

 narn_i_chin_hurin_gloss: "En [sindarin_short|E] #bold Narn i Chîn Húrin#! constitue le conte des Enfants d'[hurin|E], et demeure le plus long de tous les récits qui parlent de ces jours. Il s'entrelace avec le destin des [silmarils|E] et des [elves|E] ; et on l'appelle le Conte de Douleur, car il est empreint de tristesse, et s'y révèlent les œuvres les plus maléfiques de [morgothcharacter|E] [Glossary('Bauglir','bauglir_gloss')]." #Used in artifact description

 nauglamir_gloss: "En [sindarin_short|E], #bold Nauglamír#! signifie 'Joyau-Nain'."

 niniel_gloss: "En [sindarin_short|E] #bold Níniel#! était un surnom donné à [GetScriptedCharacterByHistoryID( 'lineofhador9' ).GetFirstName] de la Maison Hador par les [elves|E], qui signifie 'Fille des Larmes'."

 nirnaeth_arnoediad_gloss: "En [sindarin_short|E] #bold Nirnaeth Arnoediad#! signifie 'Bataille des Larmes Innombrables' et désigne la cinquième bataille des Guerres du [beleriand|E]."

 orch_gloss: "En [sindarin_short|E] #bold Orch#!, pluriel 'yrch', signifie Orque. Il fait référence aux [orcs|E], cette race cruelle et rusée qui servit le [firstdarklord|E] jadis, et sert encore ses serviteurs."

 orcrist_gloss: "En [sindarin_short|E] #bold Orcrist#! signifie 'Pourfendeuse de Gobelins' et désigne une épée connue parmi les [goblins|E] sous le nom de 'Mordeuse'."

 orocarni_gloss: "En [sindarin_short|E], #bold Orocarni#! signifie 'Montagnes Rouges'."

 orodruin_gloss: "En [sindarin_short|E] #bold Orodruin#! constitue l'ancien nom du [mount_doom|E], signifie 'La Montagne Ardente' ou 'Montagne de Flamme Rouge'. Il fut remplacé dans l'usage commun parmi les hommes des jours tardifs par [Glossary('Amon Amarth','amon_amarth_gloss')]."

 orthadel_gloss: "En [sindarin_short|E], #bold Orthadel#! signifie 'Étoile d'Élévation', référant probablement à l'espoir que l'épée élèverait son propriétaire originel, désormais perdu dans les brumes du temps."

 perian_gloss: "En [sindarin_short|E] et [quenya_short|E] #bold Perian#!, pluriel '#italic Periain#!' et pluriel collectif '#italic Periannath#!'. Cela signifie 'Demi-Homme' et désigne à la fois l'usage Sindarin et Quenya du nom attribué aux [hobbits|E], bien qu'en Quenya le pluriel soit #italic 'Periandi'#!."

 ras_megor_gloss: "En [sindarin_short|E] #bold Ras Megor#! signifie 'Pointe saillante' ou 'Cap pointu'."

 ras_melethyr_gloss: "En [sindarin_short|E] #bold Ras Melethyr#! signifie 'Pointe des amoureux' ou 'Cap des amoureux'."

 rodel_gloss: "En [sindarin_short|E] #bold Rodel#! signifie 'la noble',  et est souvent utilisé par les non-[highelves|E] pour désigner les femmes [elves|E]  avec des rôles de dirigeants."

 rodir_gloss: "En [sindarin_short|E] #bold Rodir#! signifie 'le noble',  et est souvent utilisé par les non-[highelves|E] pour désigner les hommes [elves|E]  avec des rôles de dirigeants."

 saelind_gloss: "En [sindarin_short|E] #bold Saelind#!, signifie 'Cœur sage'."

 sammath_naur_gloss: "Les [sindarin_short|E] #bold Sammath Naur#! désignent les 'Chambres de Feu', les grandes forges de [sauroncharacter|E] au cœur du [mount_doom|E]. À l'intérieur se trouvaient les 'Failles du Destin', où l'[onering|E] fut forgé et devait être à nouveau défait..."

 sigil_elu_naeth_gloss: "En [sindarin_short|E], #bold Sigil Elu-naeth#! signifie 'Collier du Malheur de Thingol', faisant référence au meurtre de [GetScriptedCharacterByHistoryID( 'lineofelwe1' ).GetFirstNameNicknamedRegnal] par les forgerons [dwarven|E] de [nogrod|E], qui convoitaient pour eux-mêmes le Collier des Nains, le [Glossary('Nauglamír','nauglamir_gloss')]."

 thalion_gloss: "En [sindarin_short|E] #bold Thalion#! était un surnom donné à [hurin|E] de la Maison Hador par les [elves|E], signifie 'le Constant'."

 thangail_gloss: "Le #bold Thangail#! constituait une tactique de bataille [numenorean|E] signifie 'barrière de boucliers'. Les soldats formaient un mur de boucliers de deux rangs serrés qui pouvait se courber vers l'arrière pour s'adapter aux mouvements de l'ennemi et l'empêcher de contourner les défenseurs, formant finalement un cercle fermé."

 tinuviel_gloss: "En [sindarin_short|E] #bold Tinúviel#! signifie 'Rossignol', mais plus littéralement 'Fille du Crépuscule' ([Glossary('tinnu','tindome_gloss')])."

 ungoldagnir_gloss: "En [sindarin_short|E], #bold Ungoldagnir#! signifie 'Fléau-d'Araignées' et constitue l'une des lames jumelles du Roi Thranduil du [woodlandrealm|E]."

 barad_del_gloss: "En [sindarin_short|E] #bold Barad Dêl#! signifie 'Tour de la Haine'."

 barad_naeth_gloss: "En [sindarin_short|E] #bold Barad Naeth#! signifie 'Tour du Chagrin'."

 orodraug_gloss: "En [sindarin_short|E] #bold Orodraug#! signifie 'Montagne-aux-Loups'."

 ceber_gel_gloss: "En [sindarin_short|E] #bold Ceber Gêl#! signifie 'Pieu Larmoyant'."

 ### Avarin ###

 # Avari #
 druin_gloss: "Av. #bold Druin #! signifie 'le Farouche'."

 malln_gloss: "Av. #bold Mallin #! signifie 'l'Être d'Or'."

 # Penni #
 athrad_gillith_gloss: "C'est une forme d'Elfique, je ne peux la déchiffrer."

 lhinnalen_gloss: "Pennia. Le #bold Lhinnalen#!, en entier #bold Ti Linnalen oPhalammara#!, constitue un terme [penni|E] qui signifie 'le [greatsong|E] du Monde', la musique créative qui forme une part fondamentale de leur philosophie." # Short form 'Pn.' ?

 # Cuind #
 cilulend_gloss: "Cuendi. #bold Cilulend#! signifie 'flots de beauté' ou 'rivières de chants'." # Short form 'Cu.' ?

 # Kinn-lai # 
 ildol_gloss: "Kenni-lamm. #bold Ildol#! signifie Terre Désirée, et désigne l'Extrême-Sud."

 glitamlai_gloss: "Kenni-lamm. #bold Glîtam-lai#! signifie Ceux qui prennent soin et est le pluriel de Glîtam."

 oyabi_rani_gloss: "Kenni-lamm. #bold Oyabî Râni#! signifie 'errant à jamais'." # Short form 'Kl.' ?

############ Khuzdul ############
 amdaru_sulladad_gloss: "En [khuzdul_short|E], #bold Amdâru Sulladad#! signifie 'Miséricorde du Père-de-Tous'."

 azan_zaram_gloss: "En [khuzdul_short|E] #bold Azan-zâram#! signifie 'Lac Sombre'."

 baraz_lagil_gloss: "En [khuzdul_short|E] #bold Baraz-lagil#! signifie 'Gouffre Rouge'."

 baruk_khazad_gloss: "En [khuzdul_short|E] #bold Baruk Khazâd#! signifie 'Haches des Nains'."

 bulnd_mabul_gloss: "En [khuzdul_short|E], #bold Bûlnd-Mabûl#! signifie 'Montagnes-des-Boucles-Noires'."

 barazanthual_gloss: "En [khuzdul_short|E] #bold Barazanthual#! signifie 'Hache Rouge'."

 baruzkhizdin_gloss: "En [khuzdul_short|E], #bold Baruzkhizdîn#! signifie 'Grande Salle du Nord' et désigne le lieu où [thrarproud|E] et [bavorcold|E] se sont éveillés."

 bazunal_gloss: "En [khuzdul_short|E] #bold Bazunâl#! signifie 'Ceux qui cultivent'."

 gamil_gloss: "En [khuzdul_short|E], #bold Gamil#! signifie 'l'Ancien'."

 khathza_ibriz_gloss: "En [khuzdul_short|E] #bold Khathzâ-Ibriz#! signifie 'Coucher de Soleil Éternel'."

 khathza_zul_gloss: "En [khuzdul_short|E], #bold Khathzâ-zûl#! signifie 'Mémoire Éternelle'."

 khazad_ai_menu_gloss: "En [khuzdul_short|E] #bold Khazâd ai-mênu#! signifie 'Les [dwarves|E] sont sur vous'."

 kheledkhizdin_gloss: "Le [khuzdul_short|E] #bold Kheledkhizdîn#! signifie 'Salle du Miroir' et désigne le lieu où [sindririch|E] et [thulinswift|E] se sont éveillés."

 kheled_zaram_gloss: "En [khuzdul_short|E] #bold Kheled-zâram#! signifie 'Miralonde'."

 khuzd_gloss: "En [khuzdul_short|E] #bold Khuzd#!, pluriel #italic Khazâd#! signifie '[dwarf|E]'."

 kemnel_mesem_gloss: "En [khuzdul_short|E], #bold Kemnêl-mesêm#! signifie 'Toutes les richesses de la terre'."

 ibriz_garan_gloss: "En [khuzdul_short|E] #bold Ibriz-Garân#! signifie 'Cavernes du Coucher de Soleil'."

 id_ahaban_gloss: "En [khuzdul_short|E], #bold Id-Ahabân#! signifie 'Ceux qui vengent'."

 id_ahlath_darag_gloss: "En [khuzdul_short|E] #bold Id-Ahlâth Darâg#! signifie 'Tombeaux du Divin'."

 mabiratadnan_gloss: "En [khuzdul_short|E], #bold Mabiratadnân#! signifie 'Ceux qui demeurent'."

 mahal_ai_menu_gloss: "En [khuzdul_short|E] #bold Mahal ai-mênu#! signifie '[aulecharacter|E] soit sur vous'."

 mammadaran_gloss: "En [khuzdul_short|E] #bold Mamaddârân#! signifie 'Ceux qui ont pitié'."

 mazalabkan_gloss: "[khuzdul_short|E] #bold Zelemabkân#! signifie 'Chambre de l'Éveil' et désigne le lieu où [durindeathless|E] s'éveille."

 mazalikan_gloss: "En [khuzdul_short|E], #bold Mazalikân#! signifie 'Ceux qui continuent de se souvenir'."

 m_imnu_mahal_gloss: "En [khuzdul_short|E] #bold M'imnu Mahal#! signifie 'au nom d'[aulecharacter|E]'."

 omziri_gloss: "En [khuzdul_short|E] #bold Omziri#! signifie 'Ceux qui peinent'."

 ozbirani_gloss: "En [khuzdul_short|E], #bold Ozbirani#! signifie 'Ceux qui consignent'."

 ozbih_ozil_gloss: "En [khuzdul_short|E] #bold Ozbih Ozil#! signifie 'Testament de Mémoire'."

 ozokhlitnan_gloss: "En [khuzdul_short|E], #bold Ozokhlitnân#! signifie 'Ceux qui préservent la mémoire'."

 sulladad_gloss: "En [khuzdul_short|E] #bold Sulladad#! signifie 'Père de tout' et fait référence à [eruiluvatar|E]."

 yanad_mahalul_gloss: "En [khuzdul_short|E] #bold Yanâd Mahalul#! signifie 'Fils d'[aulecharacter|E]."

 zelemabkan_gloss: "[khuzdul_short|E] #bold Zelemabkân#! signifie 'Éveil de l’Ouest' et désigne le lieu d’éveil de [uriscarred|E] et [dwalinwise|E]."

 # Khuzdul names for the Valar #
 arkhu_gal_gloss: "En [khuzdul_short|E], #bold 'Arkhu'gal#! signifie 'Celui qui désire' et constitue le nom [khuzdul|E] du [valagod|E] [irmocharacter|E]."

 a_khatabnam_gloss: "En [khuzdul_short|E] #bold A'khatabnâm#! signifie 'Essence de Beauté' et constitue le nom [khuzdul|E] de la [valiegod|E] [vanacharacter|E]."

 bebanuknar_gloss: "En [khuzdul_short|E], #bold Bebanuknar#! signifie 'Dame du Métier à Tisser' et constitue le nom [khuzdul|E] de la [valiegod|E] [vairecharacter|E]."

 kaminzadbuna_gloss: "En [khuzdul_short|E] #bold Kaminzabdûna#! signifie 'Reine de la Terre, Dispensatrice de Grains' et constitue le nom [khuzdul|E] de la [valiegod|E] [yavannacharactershort|E], épouse de [mahalcharacter|E]."

 kidzulzanat_gloss: "En [khuzdul_short|E], #bold Kidzulzanât#! signifie 'Celui aux cheveux d'or' et constitue le nom [khuzdul|E] du [valagod|E] [tulkascharacter|E]."

 madakh_khatuna_gloss: "En [khuzdul_short|E] #bold Madakh-khatûna#! signifie 'Celle qui demeure dans le repos' et constitue le nom [khuzdul|E] de la [valiegod|E] [estecharacter|E]."

 mahal_gloss: "En [khuzdul_short|E], #bold Mahal#! signifie 'le Créateur' et constitue le nom [khuzdul|E] du [valagod|E] [mahalcharacter|E], [Concept('dwarfcreation', 'Creator')|E] des [dwarves|E]."

 mamahdun_gloss: "En [khuzdul_short|E] #bold Mamahdûn#! signifie 'Celui qui a été béni' et constitue le nom [khuzdul|E] du [valagod|E] [manwecharacter|E]."

 manakh_khashuna_gloss: "En [khuzdul_short|E], #bold Manakh-khashûna#! signifie 'Litanie de Pierre' et constitue le nom [khuzdul|E] de la [valiegod|E] [niennacharacter|E]."

 thatruna_gloss: "En [khuzdul_short|E] #bold Thatrûna#! signifie 'Dame-Étoile, Reine des Étoiles' et constitue le nom [khuzdul|E] de la [valiegod|E] [vardacharacter|E]."

 udmas_gloss: "En [khuzdul_short|E], #bold Udmas#! signifie 'Celui qui juge' et constitue le nom [khuzdul|E] du [valagod|E] [namocharacter|E]."

 unbar_gloss: "En [khuzdul_short|E] #bold Unbar#! signifie 'Celui qui avertit de son cor' et constitue le nom [khuzdul|E] du [valagod|E] [oromecharacter|E]."

 usahu_gloss: "En [khuzdul_short|E], #bold Usahu#! signifie 'Celui qui verse' et constitue le nom [khuzdul|E] du [valagod|E] [ulmocharacter|E]."

 usranulkarduna_gloss: "En [khuzdul_short|E] #bold Usranulkardûna#! signifie 'Celle au cœur dansant' et constitue le nom [khuzdul|E] de la [valiegod|E] [nessacharacter|E]."

 ### Dwarven MaA ###

 # Longbeards #
 craban_azgith_gloss: "En [khuzdul_short|E] #bold Craban Azgîth#! signifie 'Yeux de corbeau'. Il est intéressant de noter que le mot #bold craban#! est d’origine [sindarin|E]."

 higem_thinbin_gloss: "En [khuzdul_short|E] #bold Higêm Thinbîn#! signifie 'Tonnerre qui Roule'."

 kharabal_tharag_gloss: "En [khuzdul_short|E], #bold Kharabâl Tharâg#! signifie 'Cavaliers de Béliers'."

 klethuhur_gloss: "En [khuzdul_short|E] #bold Klethuhûr#! signifie 'Forêt d'Acier'."

 nemahinkhed_gloss: "En [khuzdul_short|E], #bold Nêmahinkhêd#! signifie 'Immortels'."

 sigin_baruk_gloss: "En [khuzdul_short|E] #bold Sigin Baruk#! signifie 'Longues Haches'."

 zirin_shathur_gloss: "En [khuzdul_short|E], #bold Zirin Shathur#! signifie 'Pluie de Fer'."

 # Firebeards #
 ashur_thargu_gloss: "En [khuzdul_short|E] #bold Ashur Thargu#! signifie 'Piliers de Fumée'."

 beblel_ishmiri_gloss: "En [khuzdul_short|E], #bold Beblêl Ishmirî#! signifie 'Garde d'Airain'."

 gazag_faras_gloss: "En [khuzdul_short|E] #bold Gazag Farâs#! signifie 'Gueules de Dragon'."

 hurzu_tumnu_gloss: "En [khuzdul_short|E], #bold Hurzu Tumnu#! signifie 'Coureurs de la Vallée'."

 shumzrakaz_gloss: "En [khuzdul_short|E] #bold Shumzrâkâz#! signifie 'Gardiens de Flamme'."

 tumunzahar_gloss: "En [khuzdul_short|E], #bold Tumunzahar#! signifie 'Creusement du Creux'."

 # Broadbeams #
 ashamur_gabilgathol_gloss: "En [khuzdul_short|E] #bold Ashâmur Gabilgathol#! signifie 'Gardiens de la Grande Forteresse'."

 fahamgathol_taradal_gloss: "En [khuzdul_short|E], #bold Fahamgathôl Taradâl#! signifie 'Sentinelles de la Forteresse Septentrionale'."

 gabilgathol_gloss: "En [khuzdul_short|E] #bold Gabilgathol#! signifie 'Grande Forteresse'."

 karashu_gloss: "En [khuzdul_short|E], #bold Karashu#! signifie 'Tireurs d'Élite'."

 khagla_barak_gloss: "En [khuzdul_short|E] #bold Khaglâ Barâk#! signifie 'Haches Bleues'."

 uslukh_fathal_gloss: "En [khuzdul_short|E], #bold Uslukh Fathâl#! signifie 'Tueurs de Dragons'."

 # Ironfists #

 # Stiffbeards #
 balb_urs_gloss: "En [khuzdul_short|E] #bold Balb'urs#! signifie 'Flamme de Glace'."

 kibil_tarag_gloss: "En [khuzdul_short|E], #bold Kibil-Tarag#! signifie 'Barbe d'Argent'."

 kibiltumun_gloss: "En [khuzdul_short|E] #bold Kibiltumun#! signifie 'Sanctuaire d'Argent'."

 kibilzahar_gloss: "En [khuzdul_short|E], #bold Kibilzahar#! signifie 'Excavation d'Argent'."

 ihkhed_bagd_gloss: "En [khuzdul_short|E] #bold Ihkhêd Bagd#! signifie 'Vent Mordant'."

 iklel_marakh_gloss: "En [khuzdul_short|E], #bold Iklêl Marâkh#! signifie 'Boucliers Gelés'."

 zarsthu_balrak_gloss: "En [khuzdul_short|E] #bold Zarsthu Balrâk#! signifie 'Gardiens des Forêts Glaciales'."

 # Blacklocks #
 azaruk_azagh_gloss: "En [khuzdul_short|E] #bold Azâruk Azâgh#! signifie 'Maîtres de Guerre'."

 isbej_tahfa_urd_gloss: "En [khuzdul_short|E], #bold Isbêj Tahfâ'urd#! signifie 'Éclaireurs des Montagnes Jaunes'."

 naikhdiri_gloss: "En [khuzdul_short|E] #bold Naikhdiri#! signifie 'Murs Compagnons'."

 naragzanat_buh_gloss: "En [khuzdul_short|E], #bold Naragzanât Buh#! signifie 'Compagnies des Boucles-Noires'."

 naragzanat_zegar_gloss: "En [khuzdul_short|E] #bold Naragzanât Zegâr#! signifie 'Lames des Boucles-Noires'."

 # Stonefoots #

############ Orcish Tongues ############

### Black Speech ###
 hai_gloss: "Bl. #bold hai#! signifie 'Tribu', ou 'Peuple' lorsqu'il est employé seul, et est le terme que les [trolls|E], [goblins|E], et surtout les [orcs|E] utilisaient typiquement pour désigner leurs groupes ethniques et raciaux." # References in loc have not been replaced with the gloss

 uruk_gloss: "Bl. #bold Uruk#! signifie 'Orque' et est utilisé pour désigner les [orcs|E] en général, les Orcs d' [isengard|E] l'utilisant particulièrement." # References in loc have not been replaced with the gloss

### Orcish Westron ###
 ashdurbuk_gloss: "Or. #bold Ashdurbúk#! signifie 'Seul Maître' et désigne le haut-roi des tribus de [goblins|E] de [gundabad|E], lorsque toutes ont été mises au pas."

 ulukai_gloss: "Or. #bold Ulûkai#! signifie 'Servant la Non-Lumière' et fait référence au grand joyau de Morgoth, qui dévore plutôt qu'il n'émet la lumière."

 lugharn_gloss: "Or. #bold Lûgharn#! signifie 'Casque de Vouivre'."

 krimpuruk_gloss: "Or. #bold Krimpuruk#! signifie 'Orque-Liant'."

 naukhash_gloss: "Or. #bold Naukhâsh#! signifie 'Feu-brûlant', et fait spécifiquement référence au feu volcanique, auquel les [orcs|E] attribuaient un pouvoir spirituel."

 unikki_gloss: "Or. #bold Ûnikki#! signifie 'Épine-Maudite'."

 rukongi_gloss: "Or. #bold Rûkongi#! signifie 'Orque-de-la-Peur'."

############ Human Tongues ############

### Taliska ###
 beor_gloss: "Ta. #bold Bëor#! était un surnom donné à [GetScriptedCharacterByHistoryID( 'lineofbeor1' ).GetFirstName], qui signifie 'Vassal' en Taliska, la langue de son peuple."

### Adunaic ###
 agannalumaba_aru_gloss: "L'[adunaic_short|E] #bold $agannalumaba_aru$#! se traduit par 'le Roi sans l'Ombre de la Mort', faisant référence à [pharazon_golden|E]."

 aruwanai_gloss: "L'[adunaic_short|E] #bold Ârûwânai#! se traduit par 'les [kingsmen|E]', désignant la faction politique dominante du tardif [numenorean_empire|E]."

 batan_an_izindi_gloss: "L'[adunaic_short|E] #bold Batân an-Izindi#! means 'la Route Détroit' ou plus poétiquement, 'le Chemin de la Sagesse', et fait référence à une secte religieuse [bellakarean|E]."

 ephalzagar_an_azarkhor_gloss: "L'[adunaic_short|E] #bold Ephalzagar-an-Azarkhôr#! se traduit par 'la Lance du Seigneur-des-Mers', nom direct pour un guerrier sans détours."

 kathasaptha_gloss: "L'[adunaic_short|E] #bold Kâthasaptha#! signifie 'Omniscient' ou plus poétiquement 'Sagesse infinie', etrefers fait référence à la fois à une secte religieuse [bellakarean|E] et [eru|E]."

 miyanai_gloss: "Le terme [adunaic_short|E] #bold Mîyanâi#! constitue un mot [anbalukkhori|E] signifie 'hommes inférieurs', littéralement 'grands nourrissons'. Il est employé de manière dépréciative pour désigner leurs esclaves et sujets, qui manquent de la raison et de la puissance des [adunai|E]."

 naluzor_gloss: "L'[adunaic_short|E] #bold Nâluzôr#! signifie 'ombre de flamme', choisi par le Vizir pour ses implications obscures."

 nardu_gloss: "L'[adunaic_short|E] #bold nardû#! signifie 'soldat', et est un terme courant pour désigner les guerriers et les soldats au sein des royaumes [adunaic|E]."

 niluzagar_gloss: "L'[adunaic_short|E] #bold Nîluzagar#! signifie 'Épée-Lune', motif récurrent en [bellakar|E]."

 rophazan_gloss: "L'[adunaic_short|E] #bold Rôphazan#! signifie 'Or Blanc', et fait référence à l'alliage métallique électrum."

 zayan_an_agan_gloss: "L'[adunaic_short|E] #bold Zâyan an-Agan#! constitue le nom [adunaic|E] du 'Champ de la Mort Noire', site de la plus grande bataille de l'histoire [bellakarean|E]. Ici, l'armée des Tedjin affronta celle de [bellakar|E] durant l'invasion Tedjin-Qarsag.\n\nDurant des siècles après, les ossements des morts continuèrent d'affleurer du sol aride, et chaque crue printanière charriait des fragments de métal et d'équipement de guerre dans les sables mouvants. Les esprits des défunts hantaient encore ces lieux, et cette portion de la vallée était évitée par les populations superstitieuses de la région."

### Westron ### 
 castar_gloss: "[westron_short|E] #bold Castar#! désigne une pièce [gondorian|E], la principale monnaie employée dans ce royaume. Elle équivaut à quatre [Glossary('tharni','tharni_gloss')] et est également connue en [sindarin|E] sous le nom de [Glossary('mirian','mirian_gloss')]. Sa signification originelle demeure inconnue, mais elle s'apparente peut-être à l'ancien mot #italic kastu#! signifie 'mathom, objet précieux'."

 kuduk_gloss: "[westron_short|E] #bold Kuduk#! est le mot par lequel les [hobbits|E] se désignent eux-mêmes."

 suza_gloss: "[westron_short|E] #bold Sûza#! qui signifie 'province' ou 'division du royaume' est le nom [westron|E] de la [shire|E] des [hobbits|E]."

 tharni_gloss: "[westron_short|E] #bold Tharni#! signifie 'quart' ou 'quartier' désigne au Gondor une pièce d'argent, le quart du [Glossary('castar','castar_gloss')], également connue en [sindarin|E] sous le nom de [Glossary('canath','canath_gloss')]. \n\nParmi les hobbits de la Comté, ce terme sert également à désigner leurs principales divisions administratives, les quatre Quartiers."

# Hobbit Westron #
 kast_mathom_gloss: "[hobbitish_short|E] #bold Kast#! signifie 'trésor' ou 'chose précieuse' est le terme que les [hobbits|E] utilisent pour [mathoms|E]."

 stoor_gloss: "[hobbitish_short|E] #bold Stoor#! signifie 'gros' ou 'large' est l'une des trois branches anciennes des [hobbits|E]."

### Northmen Languages ###

# Rhovanian #
 freas_gloss: "Rhov. #bold Fréas #! signifie 'Grands Anciens', un terme utilisé par les [northrons|E] pour parler de leurs dieux. Les [dunedain|E] les ont assimilés aux [valargods|E]."

# Rohirric #
 guthwine_gloss: "Roh. #bold Gúthwine#! signifie 'Compagnon-de-Bataille', et cette lame fut un compagnon fidèle à de nombreux guerriers vaillants."

 herugrim_gloss: "Roh. #bold Heregrim#! signifie 'cruel' ou 'sauvage', nom approprié pour une épée de Rois."

 steelsheen_gloss: "Roh. #bold Stýlescíene#! signifie 'Beauté-d'Acier'."

### Dunlending ###
 forgoil_gloss: "Dun. #bold Forgoil#! signifie 'Têtes-de-Paille', leur nom pour les Rohirrim aux cheveux clairs qui usurpèrent leurs terres ancestrales."

 ### Forodwaithrim ###
 hakyranti_gloss: "Fo. #bold Häkyränti#! signifie 'seigneur de la proie'. C’est le terme par lequel les [lossoth|E] appellent leurs maîtres de chasse."

 jatami_gloss: "Fo. #bold Jätämi#! signifie 'gardien de mousse'. C’est le terme utilisé par les [lossoth|E] pour désigner leurs jardiniers."

 kynnaja_gloss: "Fo. #bold Kynnäjä#! signifie 'constructeur de glace'. C’est le terme utilisé par les [lossoth|E] pour désigner leurs architectes."

 mokkaja_gloss: "Fo. #bold Mökkäjä#! signifie 'porteur de dons'. C’est le terme utilisé par les [lossoth|E] pour désigner leurs aumôniers." 

 mullaja_gloss: "Fo. #bold Mullaja#! signifie 'conteur'. C’est le terme utilisé par les [lossoth|E] pour désigner leurs chroniqueurs."

 muuttohti_gloss: "Fo. #bold Muuttohti#! signifie 'gardien de reliques'. C’est le terme utilisé par les [lossoth|E] pour désigner leurs antiquaires."

 nyka_gloss: "Fo. #bold Nykä#! signifie 'farceur'. C’est le terme utilisé par les [lossoth|E] pour désigner leurs bouffons."  

 okkospyr_gloss: "Fo. #bold Okkospyr#! signifie 'ce qui vient de l'extérieur'."

 rannojari_gloss: "Fo. #bold Rännöjäri#! signifie 'maître des rennes'. C’est le terme utilisé par les [lossoth|E] pour désigner leurs maîtres d’élevage."

 runtyrra_gloss: "Fo. #bold Runtyrrä#! signifie 'tisserand de runes'. C’est le terme utilisé par les [lossoth|E] pour désigner leurs musiciens."

 tespra_mereija_gloss: "Fo. #bold Tespra Mereijä#! signifie 'Grand Rythme de la Mer'. C’est une branche de la foi [lossoth|E]."

 tespra_yspymra_gloss: "Fo. #bold Tespra Yspymrä#! signifie 'Équilibre Parfait du Monde', le concept central d’une des principales religions [forodwaith|E]."

 tujsvalta_gloss: "Fo. #bold Tujsvalta#! signifie 'intendant'. C’est le terme utilisé par les [lossoth|E] pour désigner leurs sénéchaux."

 vanha_isa_gloss: "Fo. #bold Vanha Isä#! signifie 'Ancien Père'."

 yllikori_gloss: "Fo. #bold Ylliköri#! signifie 'homme protecteur'. C’est le terme par lequel les [lossoth|E] call their bodyguards."  

 ystavat_talven_gloss: "Fo. #bold Ystävät Talven#! signifie 'Amis de l’Hiver'. C’est le terme par lequel les [lossoth|E] se désignent eux-mêmes."

### Noi Trevan ###
 ail_leagan_gloss: "Trev. #bold Ail-Leagan#! signifie 'Petits Joyaux' et sert d'euphémisme pour les âmes des ancêtres défunts."

 ainfer_gloss: "Trev. #bold Ainfer#! signifie 'Petits Hommes'. Ce terme provient d'[ainurgods|E] via l'Occidentalien, mais fut mal compris comme faisant référence aux âmes des ancêtres des [dunedain|E]."

 dileas_a_sinnsear_gloss: "Trev. #bold Dìleas à Sinnsear#! signifie 'Fidèles de leurs Ancêtres' et désigne ceux qui pratiquent les rites religieux traditionnels [noi_trevan|E]."

 dileas_do_sunnsear_an_iar_gloss: "Trev. #bold Dìleas do Sinnsear an Iar#! signifie 'Fidèles des Ancêtres de l'Ouest' et désigne ceux qui pratiquent les rites religieux traditionnels [noi_trevan|E], modifiés pour tenir compte des [dunedain|E]."

 eil_gloss: "Trev. #bold Eil#! signifie 'L'Ancien'. Ce terme provient des noms d'[eru|E] et d'[elrosshort|E] via l'Occidentalien, qui furent syncrétisés."

 elan_gloss: "Trev. #bold Elan#! signifie 'Élévateur-d'Élan'. Ce terme provient des noms d'[elendil|E] et d'[eonwecharacter|E] via l'Occidentalien, qui furent syncrétisés."

 iarfer_gloss: "Trev. #bold Iarfer#! signifie 'Hommes de l'Ouest' et désigne les [dunedain|E]."

 mefer_gloss: "Trev. #bold Mèfer#! signifie 'Hommes-Moutons'. Ce terme provient de [maiargods|E] via l'Occidentalien, mais fut mal compris comme faisant référence à un peuple ancestral des [dunedain|E] d'[arnor|E] qui ne venait pas d'outre-mer, les Eriadorrim."

 noi_trevan_gloss: "Trev. #bold Noi Trevan#! signifie 'Neuf Tribus' et constitue la manière dont les Montagnards du [rhudaur|E] se désignent eux-mêmes."

 rhai_erthol_gloss: "Trev. #bold Rhai-Erthol#! signifie 'Puissants' et sert principalement à décrire les [dunedain|E], mais également les [ainurgods|E] et les [elves|E]."

 tigh_moradh_gloss: "Trev. #bold Tigh Mòradh#! signifie 'Haut Seigneur' (ou plus littéralement, 'Seigneur Propriétaire-de-Maison'). Ce terme provient du nom de [manwecharactershort|E] et de l'épithète royale d'[elros|E] via l'Occidentalien, qui furent syncrétisés."

 valfer_gloss: "Trev. #bold Valfer#! signifie 'Hommes-Val'. Ce terme provient de [valargods|E] via l'Occidentalien, mais fut mal compris comme faisant référence à un peuple ancestral des [dunedain|E] qui venait d'outre-mer, les [numenoreans|E]."

### Apysaic ###
 vatra_acolu_gloss: "Ap. #bold Vâtra Acolû#! signifie 'Rejeton Radieux de Vâtra' dans la langue de Rây, nom quelque peu prétentieux adopté par certains membres de la Dynastie Solaire."

 pon_gramazza_gloss: "Ap. #bold Pôn Gramâzza#! signifie 'Prince de Khäz-gramaze' dans la langue des Bozishnarûd, nom redoutable pour ceux aux intentions obscures - appellation des hérauts du Roi-Serpent."

### Magrin ###
 hase_ikog_anjike_gloss: "Mg. L'enfant est menée au Lac Jak, où son reflet dans les eaux sacrées est attentivement observé. Le reflet de la véritable Tamskangi révèle, dit-on, une aura divine ou une lumière céleste, le 'Manteau du Divin', confirmant sa lignée sacrée."

 iga_madingi_gloss: "Mg. L'épreuve finale constitue l'#bold Iga Madingi#!, le 'Sentier des Murmures'. Dans les montagnes, l'enfant doit emprunter un chemin rocheux qui bifurque, censé être sous la protection du Grand Esprit du Ciel lui-même. La véritable Tamskangi trouvera son chemin à travers les sentiers déroutants sans effort, comme guidée par les murmures du [namur_sky_god|E]."

 kula_luwa_gloss: "Mg. L'enfant est exposée aux hymnes anciens chantés à [namur|E] durant les événements célestes. La véritable Tamskangi est censée s'harmoniser avec les hymnes, comme si elle était née avec une connexion innée à ce 'Chant du Ciel' sacré."

 siyi_chele_gloss: "Mg. Un 'nom secret' des dieux, connu seulement de la [tamska|E] et de ses plus proches conseillers, est murmuré à l'enfant. La véritable Tamskangi est censée réagir instinctivement, reconnaissant la profonde signification spirituelle du nom, bien qu'on ne lui en ait jamais enseigné la signification."

### Khyan ###
 artazar_gloss: "Kh. #bold Artazar#! signifie 'Flamme vertueuse'."

 azimtabar_gloss: "Kh. #bold Azimtabâr#! signifie Famille Noble, désignant les familles de la [khycastesystemshort|E] [Glossary('Vaysha','vaysha_gloss')]."

 fajusha_gloss: "Kh. #bold Fajusha#! signifie 'Gens du Commun'. Ils constituent la deuxième [khycastesystemshort|E] la plus basse de la société [khyan|E], après les [Glossary('Shadru','shadru_gloss')]."

 shadru_gloss: "Kh. #bold Shadru#! signifie 'Serviteurs'. Ils constituent la [khycastesystemshort|E] la plus basse de la société [khyan|E]."

 tirandaza_gloss: "Kh. #bold Tirandazâ#! signifie 'Archers'."

 tizaspa_gloss: "Kh. #bold Tizaspâ#! signifie 'Possédant un cheval rapide'."

 tizrava_gloss: "Kh. #bold Tizravâ#! signifie 'Qui se meut promptement'."

 tizyarshti_gloss: "Kh. #bold Tizyarshti#! signifie 'Tenant une lame perçante'."

 varna_gloss: "Kh. #bold Varna#! signifie 'Prêtres'. Ils constituent traditionnellement la [khycastesystemshort|E] la plus élevée de la culture [khyan|E]."

 vata_gloss: "Kh. #bold Vata#! signifie 'Marchands'. Ils constituent une [khycastesystemshort|E] intermédiaire dans la société [khyan|E]."

 vaysha_gloss: "Kh. #bold Vaysha#! signifie 'Nobles-Guerriers'. Ils ne sont dépassés que par la [khycastesystemshort|E] [Glossary('Varna','varna_gloss')] dans la culture [khyan|E]."

### Muranian ###
 nuara_gloss: "Mu. #bold Núara#! signifie 'Peuple des Núar'."

### Mumakani Languages ###

 # Akanali #
 amujici_gloss: "Ak. #bold Amujici#! signifie 'Île du Grand Serpent' dans la langue ancienne de $e_mumakan$."

 # Inkamakil #
 inkamakil_gloss: "In. #bold $inkamakil$#! signifie 'vrai peuple', 'peuple natif' ou 'notre peuple', selon le contexte."

 # Ganim #
 gan_gloss: "Ga. #bold $k_gan$#! signifie 'magnifique, plaisant, fructueux'."

 maimaki_gloss: "Ga. #bold $faith_gan_adherent$#! signifie un apprenti, celui qui s'assoit aux pieds des anciens et écoute les histoires des temps anciens."

 majari_gloss: "Ga. #bold Majari#! sont les esprits des ancêtres, littéralement 'les anciens'."
