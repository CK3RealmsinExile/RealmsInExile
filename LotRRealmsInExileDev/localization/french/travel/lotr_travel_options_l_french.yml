l_french:

 ### Trans-Haradric Merchants Travel Option ###
 # Only useable in Harad, gives occasional random events with gold gain
 trans_haradric_merchants_option: "Caravane Trans-Haradique"
 trans_haradric_merchants_option_desc: "Voyager avec une grande caravane de [trans_haradric_merchants|E] ralentira peut-être la route, mais les gains substantiels en valent le détour. Ces marchands chevronnés connaissent les paysages changeants du [harad|E] comme leurs poches, et cheminer avec eux pourrait offrir l'occasion d'un négoce profitable !"
 trans_haradric_geographical_req: "Vous possédez un [county|El] ou un [domicile|El] dans [GetGeographicalRegion('middleearth_harad').GetName]"
 RICE_haradric_merchants_option_effect_1: "Chaque fois que vous pénétrez dans une [barony|El], vous avez #V [GetPlayer.MakeScope.ScriptValue('trans_haradric_merchant_travel_option_event_chance')]%#! de chances de tirer un modeste bénéfice en [gold|El][gold_i|E] d'un accord commercial, selon votre [diplomacy|El] et votre [stewardship|El]"
 trans_haradric_merchant_recruited_tt: "La caravane [RICE_merchant.Custom('FR_du_Char_U_Pi')][RICE_merchant.GetName] a rejoint votre suite"