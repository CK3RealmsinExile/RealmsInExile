l_french:

  action_defensive_ally_available: "@alliance_icon! Vous pouvez appeler un allié défensif"
  action_defensive_ally_available_label: "@alliance_icon! Vous pouvez appeler des alliés défensifs à la guerre"
  action_defensive_ally_available_desc: "Vous pouvez appeler votre [ally|El] [recipient.GetUIName] à vos [wars|El].\n\n[recipient.Custom('FR_IlElle')|U] dispose de @soldier_icon![recipient.GetMilitaryStrengthText] [soldiers|El] qui pourraient vous aider dans vos [wars|El].$CALL_TO_WAR_HELP$"
  action_defensive_ally_available_click: "#I Cliquez pour appeler l'allié#!"

  action_join_suzerain_in_offensive_war: "@alliance_icon! Offrir de rejoindre la guerre du Suzerain"
  action_join_suzerain_in_offensive_war_label: "@alliance_icon! Vous aidez votre Suzerain dans sa guerre"
  action_join_suzerain_in_offensive_war_desc: "@alliance_icon! Offrir de venir en aide à un [ally|El], votre [liege|El], un défenseur de votre [faith|El] dans une [holy_war|E], ou aider un vassal à réprimer une [revolt|E] paysanne"
  action_join_suzerain_in_offensive_war_click: "@alliance_icon! #I Cliquez pour rejoindre le Suzerain#!"

  action_join_temporary_tributary_in_defensive_war: "@alliance_icon! Vous rejoignez une guerre"
  action_join_temporary_tributary_in_defensive_war_label: "@alliance_icon! Aider [recipient.GetUINameNoTooltip]"
  action_join_temporary_tributary_in_defensive_war_desc: "@alliance_icon! Vous pouvez rejoindre votre [tributary|El] [recipient.GetUIName] dans ses [wars|El] défensives.\n\n[recipient.Custom('FR_IlElle')|U] dispose de @soldier_icon![recipient.GetMilitaryStrengthText] [soldiers|El] actuellement disponibles pour ses [wars|El]."
  action_join_temporary_tributary_in_defensive_war_click: "@alliance_icon! #I Cliquez pour rejoindre en tant qu'allié#!"
  action_join_temporary_tributary_in_defensive_war_combined_group_label: "@alliance_icon! Aider les tributaires en guerre"
  action_join_temporary_tributary_in_defensive_war_combined_group_description: "Vous pouvez utiliser vos armées pour défendre vos [tributaries|El]\n\n#Weak Aider vos [tributaries|El] leur permettra de survivre plus longtemps, ce qui se traduira par plus de ressources pour vous au fil du temps.#!"
  action_join_temporary_tributary_in_defensive_war_combined_group_name: "@alliance_icon! Les tributaires peuvent être défendus"
  action_join_temporary_tributary_in_defensive_war_combined_label: "$action_join_temporary_tributary_in_defensive_war_label$"

