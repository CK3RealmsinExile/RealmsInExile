 wok_courtship.1001.t: "$court_event_title$ La voie la plus rapide"
 wok_courtship.1001.desc: "Je suis responsable de la nourriture pour la soirée qui je vais passer avec [target.GetFirstName], et je veux [target.Custom('FR_LeLa')] surprendre en "
 wok_courtship.1001.desc_arrogant: "faisant une démonstration de mes talents !"
 wok_courtship.1001.desc_humble: "démontrant que je ne suis pas mauvais[ROOT.Char.Custom('FR_E')] cuisinier[ROOT.Char.Custom('FR_E')] !"
 wok_courtship.1001.desc_compassionate: "lui donnant ce qu'[target.Custom('FR_IlElle')] aime !"
 wok_courtship.1001.desc_fallback: "préparant un bon repas !"
 wok_courtship.1001.desc_outro: "\n\nMais... que dois-je préparer ?"
 wok_courtship.1001.spicy: "Quelque chose d'épicé et de mémorable !"
 wok_courtship.1001.sweet: "Quelque chose de sucré et de délicieux !"
 wok_courtship.1001.ask: "Je vais juste lui demander ce qu'[target.Custom('FR_IlElle')] préfère, bien que cela gâche la surprise."
 wok_courtship.1001.self: "Je vais lui montrer ce que #EMP j'aime#! !"
 wok_courtship.1001.self_flavor: "Vous préparez votre plat favoris, [GetPlayer.Custom('FavoriteTreat')]"
 wok_courtship.1001.cannibal: "Je préparerais un plat #EMP vraiment spécial#!..."
 wok_courtship.1001.cannibal_flavor: "Vous assassinez quelqu'un pour vous procurer la viande du plat"
 wok_courtship.1001.fish: "Poisson, poisson, poisson !" #Ref Cosmere à trouver
 wok_courtship.1001.fish_flavor: "Vous préparez le meilleur poisson de Roshar !" #Ref Cosmere à trouver
 signature_weapon_shardblade: "Laméclat" #Ref Cosmere à trouver
 signature_weapon_honorblade: "Lame-honorable" #Ref Cosmere à trouver

 wokc_1001_success: "Le plat est bien reçu"
 wokc_1001_mediocre: "Le plat est médiocre"
 wokc_1001_failure: "Le plat est un désastre"

 wok_courtship_1001_success_character_modifier: "Amoureusement rassasié"
 wok_courtship_1001_failure_character_modifier: "Estomac mécontent"
 wok_courtship_1001_success_scheme_modifier: "Excellent cuisinier"
 wok_courtship_1001_failure_scheme_modifier: "Terrible cuisinier"
 wok_courtship_1001_considerate_scheme_modifier: "Cuisinier attentionné"

 msg_wok_courtship_1001_success_title: "Cuisine excellente"
 msg_wok_courtship_1001_mediocre_title: "Cuisine médiocre"
 msg_wok_courtship_1001_failure_title: "Cuisine terrible"

 wok_courtship.1002.reaction_joy: "« C'était délicieux ! Presque aussi bon qu'un [target.Custom('FavoriteTreat')] ! » [target.Custom('FR_IlElle')|U] sourit d'une oreille à l'autre. « J'adore, vraiment ! »"
 wok_courtship.1002.reaction_stubborn: "« Je ne sais pas comment réagir. Cela pourrait remplacer [target.Custom('FavoriteTreat')] en tant que mon plat favoris. » [target.Custom('FR_IlElle')|U] prend un air sérieux. « Je n'aurais jamais cru que ça pourrait arriver. »"
 wok_courtship.1002.reaction_arrogant: "« Pas mal ! Pas mal du tout. Je préfère toujours un bon [target.Custom('FavoriteTreat')], mais c'est tout  de même excellent ! »"
 wok_courtship.1002.reaction_callous: "« Rien à redire ! Vraiment ! C'est vous qui l'avez fait ? »"
 wok_courtship.1002.reaction_paranoid: "« Qu'est-ce ? » [target.GetFirstName] lève un sourcil maladroit. « Y a t-il quelque substance hautement addictive ? Je ne pense pas qu'il soit normal que quelque chose soit aussi bon sans qu'il n'y ai une quelconque manigance derrière... »"

 wok_courtship.1003.reaction_diplomatic: "« Ce n'était pas #EMP mauvais#!, mais j'aurais préféré manger un [target.Custom('FavoriteTreat')], honnêtement. »"
 wok_courtship.1003.reaction_cold: "« C'était... pas mal, je suppose. Pour une prochaine fois, je préfère manger un [target.Custom('FavoriteTreat')]. »"
 wok_courtship.1003.reaction_apathetic: "« Franchement bof. Ça me donne juste envie de manger un [target.Custom('FavoriteTreat')]. »"
 wok_courtship.1003.reaction_paranoid: "« Aah. Ça avait exactement le goût que je m'imaginais. Merci. »"

 wok_courtship.1004.reaction_diplomatic: "« Pour être parfaitement honnête, c'était un petit désastre. J'apprécie le sentiment, mais peut-être, la prochaine fois, préférais je manger quelque chose comme un [target.Custom('FavoriteTreat')]. »"
 wok_courtship.1004.reaction_blargh: "« #EMP Blargh !#! C'est le mot. » [target.GetFirstName] semble soupeser le mot dans sa bouche. « Oui, ce fut complètement #EMP blargh#!. »"
 wok_courtship.1004.reaction_fickle: "« C'était #EMP dégoûtant !#! Que que ce soit qui a cuisiné ça mérite de retourner à l'école de cuisine !» [target.GetFirstName] marque une pause. « Y a t-il seulement des écoles de cuisine ? Je me rends compte que je n'en sais rien... »"
 wok_courtship.1004.reaction_sadistic: "« C'était #EMP dégooûtant !#! J'espère que vous exécuterez le cuisinier pour crimes contre la nourriture ! »"
 wok_courtship.1004.reaction_paranoid: "« Essayez vous de m'#EMP empoisonner#! !? » [target.GetFirstName] me lance un regard suspicieux, puis enfonce sa main dans sa bouche et se fait vomir. « Ou avez vous tenter de m'entourlouper avec cette nourriture ? Est-ce une farce !? »"

 wok_courtship.1004.reaction_fallback: "« C'était vraiment mauvais. Ne mangeons plus jamais cela. »"
 
 wok_courtship.poop.t: "$court_event_title$ Une question inattendue"
 wok_courtship.poop.intro: "Je divertis [target.GetTitledFirstName] avec une histoire que j'ai sans doute déjà racontée cent fois — celle de mes exploits au combat."
 wok_courtship.poop.prompt: "\n\n« Et si vous devez faire vos besoins ? » [target.GetFirstName] penche la tête. « Les batailles peuvent durer des heures… Que faites-vous quand la nature appelle ? »"
 #wok_courtship.poop.outro: "\n\nThe silence left hanging in the air is deafening."
 wok_courtship.poop.truth: "Eh bien… mieux vaut être embarrassé que mort !"
 wok_courtship.poop.truth_flavor: "Vous exposez franchement les réalités de la guerre"
 wok_courtship.poop.lie: "On s'en occupe avant la bataille, rien de compliqué."
 wok_courtship.poop.lie_flavor: "Vous prétendez que la guerre est propre"
 wok_courtship.poop.avoid: "Ce n'est pas un sujet approprié !"
 wok_courtship.poop.avoid_flavor: "Vous tentez de couper court à la conversation"
 wok_courtship.poop.ignore: "Bref, comme je le disais à propos de mes exploits…"
 wok_courtship.poop.ignore_flavor: "Vous ignorez la question"
 wok_courtship.poop.first_time: "C'est la première fois qu'on me pose #EMP une telle#! question…"
 wok_courtship.poop.first_time_flavor: "Vous exprimez votre incompréhension face à cette question"
 wok_courtship.poop.demonstrate: "Oh, laissez-moi vous montrer…"
 wok_courtship.poop.demonstrate_flavor: "Vous « démontrez » comment vous vous soulagez en pleine bataille"
 wok_courtship.poop.big_lie: "Les guerriers ne font jamais leurs besoins."
 wok_courtship.poop.big_lie_flavor: "Même Lift produit de l'aluminium"
 wok_courtship.poop.yay_for_originality: "« Quelle originalité ! » [target.GetFirstName] rayonne, ravi[e] de m'avoir acculé[e], et refuse de lâcher le sujet."
 wok_courtship.poop.avoided_rebuttal: "J'essaie d'expliquer que les excréments de champ de bataille ne sont pas un sujet convenable.\n\n« C'est #EMP précisément#! ce qui en fait un sujet intéressant ! » rétorque [target.GetFirstName]."
 wok_courtship.poop.justification_singer: "« Je peux entendre des récits édulcorés d'héroïsme guerrier dans bien des chansons, mais vous, vous l'avez #EMP vécu#! ! »"
 wok_courtship.poop.justification_literate: "« Je peux lire vos exploits dans les chroniques officielles, mais vous, vous l'avez #EMP vécu#! ! »"
 wok_courtship.poop.justification_illiterate: "« Les scribes racontent vos exploits, mais vous, vous l'avez #EMP vécu#! ! »"

 wok_courtship.poop.expand_explanation: "Très bien, posez toutes vos questions et j'y répondrai honnêtement."
 wok_courtship.poop.extra_truth_flavor: "La communication ouverte est essentielle à une relation saine"
 wok_courtship.poop.refuse_to_elaborate: "Je refuse d'en dire davantage."
 wok_courtship.poop.abandon_scheme: "Je n'écouterai pas davantage ces absurdités !"

 wok_courtship.poop.attempt_resume: "Je tente de reprendre mon récit, mais [target.GetFirstName] ne semble plus intéressé[e]."
 wok_courtship.poop.admitted_but_ignored_rebuttal: "« Oui, oui, vous avez sûrement été très courageux, » dit [target.Custom('FR_IlElle')], grimaçant. « Moins que celui qui devait nettoyer votre armure, toutefois ! »"

 wok_courtship_poop_success_scheme_modifier: "Communication ouverte"
 wok_courtship_poop_ignored_scheme_modifier: "Tabous corporels"
 wok_courtship_poop_demonstration_positive_scheme_modifier: "Fétichisme partagé"
 wok_courtship_poop_demonstration_negative_scheme_modifier: "Porteur de souillure"

 wok_courtship.poop.demonstration.success: "[target.GetFirstName] apprécie"
 wok_courtship.poop.demonstration.failure: "[target.GetFirstName] est dégoûté[e]"
 wok_courtship.poop.demonstration.msg_title: "Réaction à la démonstration"
 wok_courtship.poop.demonstration.msg_good: "[target.GetFirstName] apprécie votre démonstration"
 wok_courtship.poop.demonstration.msg_bad: "[target.GetFirstName] est dégoûté[e] !"

 wok_courtship.poop.demonstration.intro: "Avec entrain, je me livre à une démonstration aussi maîtrisée qu'indécente.\n\n"
 wok_courtship.poop.demonstration.deviant: "Le sourire de [target.GetFirstNamePossessive] s'élargit tandis qu'[target.Custom('FR_IlElle')] m'imite et participe à la scène."
 wok_courtship.poop.demonstration.normal: "Le sourire de [target.GetFirstNamePossessive] disparaît, remplacé par une expression horrifiée lorsque l'odeur confirme que je ne plaisante pas.\n\nJ'aurais dû y penser avant de me lancer dans un concours visant à mettre l'autre mal à l'aise !"
 wok_courtship.poop.demonstration.a: "Voilà à quoi ressemble le véritable amour."

 wok_courtship.poop.admission: "Je finis par admettre que [GetPlayer.Custom('HowManyTimesIPooped')]\n\n"
 wok_courtship.poop.once: "Moi, [GetPlayer.GetFullNameNoTooltip], me suis souillé[e] dans mon armure. Une seule fois — mais volontairement."
 wok_courtship.poop.twice: "Moi, [GetPlayer.GetFullNameNoTooltip], me suis souillé[e] dans mon armure. Deux fois, toutes deux volontairement."
 wok_courtship.poop.more_than_twice: "Moi, [GetPlayer.GetFullNameNoTooltip], me suis souillé[e] dans mon armure [GetPlayer.MakeScope.Var('poop_events_counter').GetValue|0V] fois — toujours volontairement."
 wok_courtship.poop.none: "Cela ne m'est jamais arrivé, mais j'ai vu d'autres y être contraints."
 wok_courtship.poop.truth.desc_intro_extra: "Je passe un long moment à raconter à [target.GetFirstName] mes expériences du champ de bataille, y compris les aspects les plus crus que l'on évite d'ordinaire d'évoquer."
 #wok_courtship.poop.truth.desc: ""
 wok_courtship.poop.truth.desc_intro: "Je réponds honnêtement aux questions étranges de [target.GetFirstNamePossessive], en tâchant de ne pas paraître trop grossier."
 wok_courtship.poop.truth.desc: "« Vous voyez ? » demande [target.Custom('FR_IlElle')]. « N'était-ce pas bien plus intéressant que ces histoires ressassées ? »\n\n"
 wok_courtship.poop.truth.desc_uninterested: "« Oui, oui, vous avez sûrement été très courageux, » dit [target.Custom('FR_IlElle')], grimaçant."
 wok_courtship.poop.truth.desc_interested: "« Ne vous inquiétez pas, vous avez sûrement été très courageux, » dit [target.Custom('FR_IlElle')] avec un sourire malicieux."
 wok_courtship.poop.truth.desc_outro: "« Moins que celui qui doit nettoyer votre armure, toutefois ! »"
 wok_courtship.poop.truth.laugh: "#EMP HA !#!"
 wok_courtship.poop.truth.laugh_flavor: "Vous savez rire de vous-même"
 wok_courtship.poop.truth.deadpan: "Oui, oui, très mature."
 wok_courtship.poop.truth.deadpan_flavor: "Ce n'est pas exactement du grand humour"
 wok_courtship.poop.truth.mockery: "Je vous raconte tout cela, et vous vous #EMP moquez#! de moi !?"
 wok_courtship.poop.truth.mockery_flavor: "Vous refusez cet affront"
 wok_courtship.poop.truth.brando: "Celui qui a écrit cela mérite une correction."
 wok_courtship.poop.truth.brando_flavor: "Blâmez Brandon Sanderson, pas moi !"

 wok_courtship.3001.t: "$court_event_title$ Petits secrets"
 wok_courtship.3001.intro_levelheaded: "Dans un moment d'assurance calme, [target.GetFirstName] affirme avec fermeté que, si cela doit fonctionner, nous devrions être plus ouverts l'un envers l'autre."
 wok_courtship.3001.intro_levelheaded_me: "Je commence à me lasser de ces jeux. Les sous-entendus constants et les demi-vérités qui laissent l'autre deviner le véritable sens de chaque parole… Si cela doit fonctionner, [target.GetFirstName] et moi devons être plus ouverts l'un envers l'autre."
 wok_courtship.3001.intro_emotional: "Les larmes aux yeux, [target.GetFirstName] me supplie de mettre fin à ces jeux, affirmant que les demi-vérités et l'incertitude sont insupportables ! « Nous devons être plus ouverts l'un envers l'autre ! » s'exclame [target.Custom('FR_IlElle')]. « Je t'en prie ! »"
 wok_courtship.3001.intro_emotional_me: "Les larmes aux yeux, je supplie de mettre fin à ces jeux, affirmant que les demi-vérités et l'incertitude sont insupportables ! « Nous devons être plus ouverts l'un envers l'autre ! » m'exclamé-je. « Je t'en prie ! »"
 wok_courtship.3001.intro_dominant: "« Je sais que tu me caches des choses, » dit [target.GetFirstName] avec un léger sourire. « À vrai dire, j'en cache moi-même quelques-unes. Et si nous révélions chacun un petit secret de notre passé, pour dissiper tout cela ? »"
 wok_courtship.3001.intro_dominant_me: "Je sens bien que [target.GetFirstName] me cache quelque chose, sans parvenir à savoir quoi. Alors que je le/la pousse dans ses retranchements, [target.Custom('FR_IlElle')] propose de me le dire — mais seulement si je révèle un secret d'importance comparable."
 wok_courtship.3001.desc: "\n\nNous tournons autour du pot depuis un moment, et il est clair que nous gardons tous deux des secrets."
 wokc_3001_learn_effect: "Je découvrirai l'un des [secrets|E] de [target.GetFirstName]"

