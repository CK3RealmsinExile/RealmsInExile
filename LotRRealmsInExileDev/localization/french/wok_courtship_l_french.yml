# Effect tooltip
 wok_courtship_outcomes.handholding: "[target.GetShortUIName|U] et [owner.GetShortUIName] se tiennent la main"

 wok_courtship_outcomes.1001.t: "$court_event_title$ Dot"
 wok_courtship_outcomes.1001.desc_intro: "Bien que [liege.Custom('FR_IlElle')] ait d'abord été disposé(e) à envisager la chose, [liege.GetTitledFirstName] a décidé que [liege.Custom('FR_IlElle')] ne me laissera pas épouser [target.GetTitledFirstName] sans fournir une dot conséquente prouvant que je peux subvenir à ses besoins."
 wok_courtship_outcomes.1001.desc_successful: "La somme demandée est plutôt classique."
 wok_courtship_outcomes.1001.desc_unsuccessful: "La somme exigée par [liege.GetFirstName] est exorbitante — il semble que [liege.Custom('FR_IlElle')] préfère que je renonce de moi-même plutôt que de me refuser ouvertement."
 wok_courtship_outcomes.1001.desc: "\n\nSi je paie la dot, nous serons immédiatement mariés. Sinon, [target.GetFirstName] pourrait le prendre comme une insulte…"

 wok_courtship_outcomes.1001.pay_gold: "Je paierai !"
 wok_courtship_outcomes.1001.no: "C'est trop."
 wok_courtship_outcomes.1001.artifact: "Et si je proposais plutôt un artefact ?"

 dowry_opinion: "Dot"

 wok_courtship_matchmaker.1001.t: "$court_event_title$ Demande d'aide"
 wok_courtship_matchmaker.1001.gallant: "Je peux t'apprendre à te mettre en valeur !"
 wok_courtship_matchmaker.1001.money: "Tiens — achète-lui quelque chose de beau."
 wok_courtship_matchmaker.1001.much_money: "Les gemmes résolvent tous les problèmes !"
 wok_courtship_matchmaker.1001.hook: "Je pourrais avoir un levier sur lui/elle…"
 wok_courtship_matchmaker.1001.hook.liege: "[target_liege.GetTitledFirstName] me doit une faveur…"
 wok_courtship_matchmaker.1001.poet: "Je ferai de mon mieux pour accroître ton prestige !"
 wok_courtship_matchmaker.1001.rumors: "Je vais répandre quelques rumeurs utiles."
 wok_courtship_matchmaker.1001.seduce: "Tu dois lui dire ce que [target.Custom('FR_IlElle')] #EMP veut#! entendre."
 wok_courtship_matchmaker.1001.fallback: "Sois simplement toi-même !"
 wok_courtship_matchmaker.1001.math: "Je peux te proposer quelques problèmes mathématiques intéressants."
 wok_courtship_matchmaker.1001.math_flavor: "Résoudre des énigmes ensemble peut rapprocher les cœurs"
 wok_courtship_matchmaker.1001.theology: "Que [GetPlayer.GetFaith.HighGodName] te guide."
 wok_courtship_matchmaker.1001.theology_flavor: "Tout le monde #EMP adore#! parler de théologie !"
