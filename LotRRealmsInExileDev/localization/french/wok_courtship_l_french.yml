 wok_courtship_matchmaker.1001.desc: "[GetPlayer.Custom2('RelationToMe',SCOPE.sC('owner'))|U], [owner.GetTitledFirstName], rencontre des difficultés dans sa cour organisée avec [scheme.GetActionName] [target.GetName], et a sollicité mon aide.\n\n"
 wok_courtship_matchmaker.1001.desc_arrogant: "« Je commence à perdre patience avec lui/elle ! » dit [owner.GetFirstName]. « C'est comme s'il/elle ne me témoignait pas le respect qui m'est dû ! Ne pourrais-tu pas tirer quelques ficelles ? »"
 wok_courtship_matchmaker.1001.desc_chaste_diligent: "« Ce n'est pas que cela me tienne particulièrement à cœur, » dit [owner.GetFirstName], « mais c'est mon devoir et j'entends l'accomplir du mieux possible. Cela dit, un peu d'aide ne serait pas de refus. »"
 wok_courtship_matchmaker.1001.desc_zealous: "« Par [owner.GetFaith.HighGodName] ! Je prie chaque jour pour obtenir les faveurs de [target.GetFirstName], » dit [owner.GetFirstName], « mais un peu d'aide dans le monde matériel ne serait pas de trop ! »"
 wok_courtship_matchmaker.1001.desc_lustful: "« Je n'arrive pas à me le/la sortir de la tête ! » gémit [owner.GetFirstName]. « Il me #EMP faut#! absolument le/la conquérir ! Aide-moi, je t'en prie ! »"
 wok_courtship_matchmaker.1001.desc_humble: "« Je ne veux pas tout gâcher, » dit [owner.GetFirstName], « mais je ne suis pas sûr d'y arriver seul. Je ne suis pas très doué pour cela… Toute aide serait la bienvenue. »"
 wok_courtship_matchmaker.1001.desc_fallback: "« Je ne sais plus quoi faire pour le/la séduire, » dit [owner.GetFirstName]. « Pourrais-tu m'aider, d'une manière ou d'une autre ? »"
 wokcm_1001_msg_title.success: "Aide à la cour réussie"
 wokcm_1001_msg_title.failure: "Aide à la cour échouée"
 wokcm_threat_of_abduction: "Menace"
 horrified_opinion: "Horrifié"

