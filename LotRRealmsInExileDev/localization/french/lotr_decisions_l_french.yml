 decision_restore_defeated_gondor: "Libérer le Gondor"
 decision_restore_defeated_gondor_desc: "Le Royaume du [gondor|E] est tombé devant l'ombre de [mordor|E]. Son peuple souffre sous le joug du Seigneur Ténébreux, endurant d'innombrables tribulations et horreurs chaque jour qui passe.\n\nIl est temps de prendre l'épée et d'aider les hommes souffrants du Gondor. Luttons pour les libérer de l'oppression de [sauroncharacter|E] !"
 decision_restore_defeated_gondor_confirm: "À la guerre ! Nous ne craignons aucune ténèbre !"
