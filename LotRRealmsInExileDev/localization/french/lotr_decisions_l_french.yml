 decision_restore_gondor_province.tt.harnendor_desc: ""
 reintegrate_province_harnendor_tooltip: "#T #V Intégrer la Province Fluviale de [GetTitleByKey('k_mirlond').GetNameNoTier]#! #!\n\n[GetTitleByKey('k_mirlond').GetNameNoTier] fut l'une des premières colonies [numenorean|E]. Après la [downfallofnumenor|E], elle fut oubliée, jusqu'à ce qu'elle soit ravivée à la fin du [thirdage|E]. Nous pouvons maintenant l'intégrer convenablement dans notre royaume."
 reclaim_harnendor_decision: "L'Embouchure du Harnen sera intégrée à votre de-jure légitime."
 
 decision_restore_gondor_province.tt.andrast: "[GetTitleByKey('k_andrast').GetNameNoTier]"
 decision_restore_gondor_province.tt.andrast_desc: ""
 reintegrate_province_andrast_tooltip: "#T #V Intégrer les Falaises Isolées d'[GetTitleByKey('k_andrast').GetNameNoTier]#! #!\n\nL'Andrast a toujours été, du moins en théorie, une partie du [gondor|E]. Mais en dehors de la citadelle de [GetTitleByKey('c_tharagrondost').GetNameNoTier], le pouvoir des [dunedain|E] dans la région a toujours été ténu, même à l'apogée de la puissance du [southernkingdom|E]. Cependant, maintenant que notre contrôle du cap devient de plus en plus permanent, nous pouvons enfin commencer à l'administrer convenablement en fait, et non en fiction."
 reintegrate_province_andrast_valid: "Vous devez contrôler pleinement la Province reculée d'[GetTitleByKey('k_andrast').GetNameNoTier]" #unused
 
 decision_restore_gondor_province.tt.umbar: "[GetTitleByKey('k_umbar').GetNameNoTier]"
 decision_restore_gondor_province.tt.umbar_desc: ""
 reintegrate_province_umbar_tooltip: "#T #V Reconquérir le Havre Méridional d'[GetTitleByKey('k_umbar').GetNameNoTier]#! #!\n\nPendant si longtemps, [umbar|E] a été une dague méridionale pointée vers le cœur du [gondor|E]. Pendant un temps, sous les [shipkings|E], il fut intégré et devint une province prospère de la Couronne Ailée. Si nous pouvions le ramener dans le giron, notre littoral serait enfin sécurisé."
 reintegrate_province_umbar_valid: "Vous devez contrôler pleinement le Havre Méridional d'[GetTitleByKey('k_umbar').GetNameNoTier]" #unused
 
 decision_restore_gondor_province.tt.calenardhon: "[GetTitleByKey('k_rohan').GetNameNoTier]"
 decision_restore_gondor_province.tt.calenardhon_desc: ""
 reintegrate_province_calenardhon_tooltip: "#T #V Réintégrer les Plaines Verdoyantes de [GetTitleByKey('k_rohan').GetNameNoTier]#! #!\n\nIl y a longtemps, les Intendants du [gondor|E] accordèrent la province de Calenardhon à l'[eothed|E]. Avec la chute du [rohan|E], et l'intégralité du Calenardhon à nouveau entre nos mains, nous pouvons formellement ramener la 'Province Verte' sous le Sceptre."
 
 decision_restore_gondor_province.tt.dor_rhunen: "[GetTitleByKey('k_south_rhovanion').GetNameNoTier]"
 decision_restore_gondor_province.tt.dor_rhunen_desc: ""
 reintegrate_province_dor_rhunen_tooltip: "#T #V Réintégrer les Vastes Plaines de [GetTitleByKey('k_south_rhovanion').GetNameNoTier]#! #!\n\nLe grand Rómendacil revendiqua les terres du [rhovanion|E] méridional pour le [gondor|E], mais graduellement elles furent perdues par une combinaison de négligence et des machinations de l'ennemi. Après maints conflits, elles sont à nouveau nôtres, de vastes terres mûres pour la colonisation et la fortification. \n\nFormalisons notre contrôle, et annonçons à tous que Dor Rhúnen est sous le Sceptre maintenant et pour toujours !"
 
 decision_restore_gondor_province.tt.enedhwaith: "[GetTitleByKey('e_enedhwaith').GetNameNoTier]"
 decision_restore_gondor_province.tt.enedhwaith_desc: ""
 reintegrate_province_enedhwaith_tooltip: "#T #V Revendiquer les Marécages Sauvages d'[GetTitleByKey('e_enedhwaith').GetNameNoTier]#! #!\n\nL'[enedhwaith|E] a toujours été une terre sauvage, définie par les frontières du [northernkingdom|E] et du [southernkingdom|E]. Les [dunedain|E] y montrèrent peu d'intérêt, excepté pour maintenir la grande Route Nord-Sud. Maintenant, notre emprise sur la région est enfin assez ferme pour que nous puissions l'intégrer convenablement dans notre royaume."
 
 decision_restore_gondor_province.tt.eregion: "[GetTitleByKey('k_eregion').GetNameNoTier]"
 decision_restore_gondor_province.tt.eregion_desc: ""
 reintegrate_province_eregion_tooltip: "#T #V Intégrer les Ruines Abandonnées d'[GetTitleByKey('k_eregion').GetNameNoTier]#! #!\n\nL'[eregion|E] est un désert depuis la [waroftheelvesandsauron|E]. Peu de [conceptracemen|E] osèrent y mettre le pied, et encore moins s'y installer, car on disait qu'elle était hantée par des esprits hantant les ruines [elven|E] éparses. Mais nous avons réussi à dompter ce royaume perdu et à rétablir l'ordre dans la région, et maintenant nous pouvons formellement l'intégrer comme partie de notre royaume."
 
 ## Old Reintegration Decisions ##
 decision_recover_harondor: "Récupérer Harondor"
 decision_recover_harondor_tooltip: "Réintégrer la province longuement contestée de Harondor"
 decision_recover_harondor_desc: "Depuis maintes générations, la province de Harondor a été disputée entre les [gondorians|E] et les [haradrim|E]. La province étant enfin pleinement reconquise, il est temps de mettre fin au débat une fois pour toutes et de graver dans la pierre que Harondor est une partie légitime du [gondor|E] !"
 decision_recover_harondor_confirm: "Enfin, le Royaume est à nouveau entier."
 reclaim_harondor_decision: "Le long différend sur l'état de Harondor sera résolu, celle-ci devenant partie de votre de-jure."
 
 decision_integrate_andrast: "Intégrer Andrast"
 decision_integrate_andrast_tooltip: "Intégrer pleinement la région d'Andrast au Gondor"
 decision_integrate_andrast_desc: "L'Andrast a toujours été, du moins en théorie, une partie du [gondor|E]. Mais, en dehors de la citadelle de Tharagrondost, le pouvoir des [dunedain|E] dans la région a toujours été ténu, même à l'apogée de la puissance du Gondor. Cependant, avec notre peuple commençant enfin à s'implanter sur le cap, nous pouvons enfin commencer à l'administrer convenablement en fait, et non en fiction."
 decision_integrate_andrast_confirm: "L'Andrast est du Gondor - maintenant et à jamais."
 integrate_andrast_decision: "La région d'Andrast sera enfin placée sous le contrôle centralisé des Dúnedain."
 
 decision_reclaim_umbar: "Intégrer Umbar"
 decision_reclaim_umbar_tooltip: "Intégrer Umbar au Gondor"
 decision_reclaim_umbar_desc: "Pendant si longtemps, [umbar|E] a été une dague méridionale pointée vers le cœur du [gondor|E]. Pendant un temps, sous les Rois-Marins, il fut intégré et devint une province prospère de la Couronne Ailée. Si nous pouvions le ramener dans le giron, notre littoral serait enfin sécurisé."
 decision_reclaim_umbar_confirm: "Hyarmendacil à nouveau !"
 reclaim_umbar_decision: "La menace des Corsaires prendra enfin fin, et Umbar sera convenablement intégré à la couronne gondorienne."
 
 decision_calenardhon_claim: "Reconquérir Calenardhon"
 decision_calenardhon_claim_tooltip: "Envahir le Royaume du Rohan et le restituer au Gondor."
 decision_calenardhon_claim_desc: "Il y a longtemps, les Intendants du [gondor|E] accordèrent le Calenardhon aux Rohirrim. Maintenant que les fidèles Rohirrim ont perdu leur royaume, c'est au Gondor de déterminer le destin de cette terre et de son peuple, et d'assurer la sécurité de nos frontières septentrionales. Nous chasserons l'ennemi du Calenardhon !"
 decision_calenardhon_claim_confirm: "Nous marchons vers le nord !"
 press_calenardhon_claim_tooltip: "Envahir le Royaume du Rohan et le restituer au Gondor."
 
 decision_integrate_calenardhon: "Réintégrer Calenardhon"
 decision_integrate_calenardhon_tooltip: "Réintégrer la Province de Calenardhon."
 decision_integrate_calenardhon_desc: "Il y a longtemps, nous avons accordé la province de Calenardhon à nos alliés Rohirrim. Avec la chute du Rohan, et l'intégralité du Calenardhon à nouveau entre les mains du Gondor, nous pouvons formellement ramener la 'Province Verte' sous le Sceptre."
 decision_integrate_calenardhon_confirm: "Calenardhon est à nouveau gondorien !"
 integrate_calenardhon_decision: "Les plaines du [rohan|E] seront réintégrées dans votre royaume de-jure."
 
 decision_reclaim_dor_rhunen: "Réintégrer Dor Rhúnen"
 decision_reclaim_dor_rhunen_tooltip: "Réintégrer la Province de Dor Rhúnen."
 decision_reclaim_dor_rhunen_desc: "Le grand Rómendacil revendiqua ces terres pour le [gondor|E], mais graduellement elles furent perdues par une combinaison de négligence et des machinations de l'Ennemi. Après maints conflits, elles sont à nouveau nôtres, de vastes terres mûres pour la colonisation et la fortification. \n\nFormalisons notre contrôle, et annonçons à tous que Dor Rhúnen est sous le Sceptre maintenant et pour toujours !"
 decision_reclaim_dor_rhunen_confirm: "Dor Rhúnen est à nouveau gondorien !"
 reclaim_dor_rhunen_decision: "La grande province orientale du Gondor sera formellement rendue au sceptre."

 decision_gondorian_renaissance: "Promouvoir une Renaissance Gondorienne"
 decision_gondorian_renaissance_desc: "Maintenant que l'Ombre a enfin été vaincue, [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] sera libre. Un nouvel âge d'art et de découverte attend les [dunedain|E], désormais libérés de leur fardeau.\n\n#TOLKIENQUOTE « Les ténèbres doivent passer, un jour nouveau viendra. Et quand le soleil brillera, il brillera d'autant plus clairement. »#!"
 decision_gondorian_renaissance_confirm: "Une nouvelle aube est venue."
 decision_gondorian_renaissance_tooltip: "Conduire votre peuple vers un nouvel âge de découverte et de prospérité."
