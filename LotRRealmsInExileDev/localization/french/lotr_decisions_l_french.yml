 # Yield the Spice Trade to the Namâlo
 decision_yield_the_spice_trade: "Céder le Commerce d'Épices aux Namâlo"
 decision_yield_the_spice_trade_tooltip: "Reconnaître et promouvoir les [namalo|E] pour faciliter le commerce d'épices avec le [farharad|E]"
 decision_yield_the_spice_trade_desc: "Un groupe de marchands appelés les [namalo|E] gagne peu à peu en influence dans [GetGeographicalRegion('middleearth_harad_bayoformal_sirayn').GetName]. Si nous les reconnaissions officiellement et leur confiions la gestion du commerce d'épices à travers leurs réseaux marchands, nous pourrions mutuellement en bénéficier, car ils peuvent transporter nos épices vers le [farharad|E] et au-delà."
 decision_yield_the_spice_trade_effect_tooltip_1: "Les autres [cultures|E] dans la [region|E] de [GetGeographicalRegion('special_region_innovation_namalo').GetName] pourront désormais débloquer l'[innovation|E] #V $innovation_namalo$#! si leur [culture_head|El] prend la [decision|El] d'#V Intégrer les Namâlo aux Communautés Locales#!"
 decision_yield_the_spice_trade_effect_tooltip_2: "L'[innovation|E] #V $innovation_namalo$#! débloque à son tour la [decision|El] de #V $decision_namalo_synergy$#!"
 decision_yield_the_spice_trade_confirm: "L'épice doit couler !"

 # Integrate the Namâlo
 decision_integrate_namalo: "Intégrer les Namâlo aux communautés [ROOT.Char.GetCulture.GetNameNoTooltip]"
 decision_integrate_namalo_tooltip: "Les [namalo|E] pourraient grandement aider nos communautés."
 decision_integrate_namalo_desc: "Les marchands [namalo|E] contrôlaient autrefois le commerce des épices de Sîrayn, mais ils ont diversifié leurs activités au fil des ans en s'étendant vers d'autres terres pour commercer bien d'autres marchandises. Nous devrions prendre l'initiative d'intégrer les communautés [ROOT.Char.GetCulture.GetName] dans leurs réseaux."
 decision_integrate_namalo_effect_tooltip_1: "Les [rulers|E] [THIS.Char.GetCulture.GetName] pourront désormais accéder à d'autres mécaniques [namalo|E], comme la [decision|El] de $decision_namalo_synergy$"
 decision_integrate_namalo_confirm: "Les Namâlo sont bienvenus dans les terres [ROOT.Char.GetCulture.GetNameNoTooltip] !"
 
 # Namâlo Synergy Flavor Decision
 decision_namalo_synergy: "Créer une Synergie avec les Namâlo"
 decision_namalo_synergy_tooltip: "Les [namalo|E] pourraient contribuer grandement à notre civilisation."
 decision_namalo_synergy_desc: "Les [namalo|E] se sont intégrés aux communautés [ROOT.Char.GetCulture.GetName] depuis un certain temps maintenant. [ROOT.Char.GetPrimaryTitle.GetNameNoTier] bénéficie grandement de leur entreprise mercantile, mais si nous pouvons trouver d'autres opportunités de collaboration avec les [namalo|E], nous pourrions en tirer encore plus d'avantages !"
