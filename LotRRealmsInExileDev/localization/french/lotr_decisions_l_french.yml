 decision_develop_industry_desc: "Gorgoroth est restée trop longtemps vide et désolée. Désormais, tandis que les Orques reviennent et que [sauronthedarklordcharacter|E] étend sa puissance, il est temps d'en faire le royaume le plus prospère d'Arda.\n\nQue les roues tournent et que le métal rougeoie — puissance et richesse s'en viennent au [mordor|E] !"
