 control_trade_in_the_bay_of_ormal_decision.tt.tul_harar: "[GetTitleByKey('c_tul_harar').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.tul_harar_desc: "#T #V [GetTitleByKey('c_tul_harar').GetNameNoTier]#! #!\n\nPorte d'entrée du cœur fluvial de Sîrayn, Tûl Harar contrôle le flux des marchandises sur la Sîresha. Contrôler ce port accorde une influence sur tout le commerce intérieur de Sîrayn.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_tul_harar_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_tul_harar').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_tul_harar_tooltip: "#T #V [GetTitleByKey('c_tul_harar').GetNameNoTier]#! #!\n\nPorte d'entrée du cœur fluvial de Sîrayn, Tûl Harar contrôle le flux des marchandises sur la Sîresha. Contrôler ce port accorde une influence sur tout le commerce intérieur de Sîrayn.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_tul_harar_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_tul_harar').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.pyrador: "[GetTitleByKey('c_pyrador').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.pyrador_desc: "#T #V [GetTitleByKey('c_pyrador').GetNameNoTier]#! #!\n\nPyrador commande l'embouchure du Núar et contrôle le poumon vital d'Harshandatt. Avec ses bibliothèques, marchés et anciens quais, s'en emparer assure prestige et taxation sur l'épine dorsale de l'ancien grand empire.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_pyrador_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_pyrador').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_pyrador_tooltip: "#T #V [GetTitleByKey('c_pyrador').GetNameNoTier]#! #!\n\nPyrador commande l'embouchure du Núar et contrôle le poumon vital d'Harshandatt. Avec ses bibliothèques, marchés et anciens quais, s'en emparer assure prestige et taxation sur l'épine dorsale de l'ancien grand empire.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_pyrador_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_pyrador').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.mejha: "[GetTitleByKey('c_mejha').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.mejha_desc: "#T #V [GetTitleByKey('c_mejha').GetNameNoTier]#! #!\n\nMejha contrôle les exportations rares de Kjhana et possède une longue tradition de guérison et de commerce. Son palais est le centre du gouvernement régional, et son accès à des richesses botaniques uniques lui confère une influence inégalée.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_mejha_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_mejha').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_mejha_tooltip: "#T #V [GetTitleByKey('c_mejha').GetNameNoTier]#! #!\n\nMejha contrôle les exportations rares de Kjhana et possède une longue tradition de guérison et de commerce. Son palais est le centre du gouvernement régional, et son accès à des richesses botaniques uniques lui confère une influence inégalée.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_mejha_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_mejha').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.samarth: "[GetTitleByKey('c_west_samarth').GetNameNoTier] et [GetTitleByKey('c_east_samarth').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.samarth_desc: "#T #V [GetTitleByKey('c_west_samarth').GetNameNoTier] et [GetTitleByKey('c_east_samarth').GetNameNoTier]#! #!\n\nSamarth se trouve là où le grand fleuve de Khy rencontre la mer, un port númenóréen historique devenu artère impériale. Contrôler Samarth permet de taxer presque toutes les marchandises fluviales à destination de l'intérieur de Khy.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_samarth_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_west_samarth').GetNameNoTier] et [GetTitleByKey('c_east_samarth').GetNameNoTier] restent dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_samarth_tooltip: "#T #V [GetTitleByKey('c_west_samarth').GetNameNoTier] et [GetTitleByKey('c_east_samarth').GetNameNoTier]#! #!\n\nSamarth se trouve là où le grand fleuve de Khy rencontre la mer, un port númenóréen historique devenu artère impériale. Contrôler Samarth permet de taxer presque toutes les marchandises fluviales à destination de l'intérieur de Khy.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_samarth_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_west_samarth').GetNameNoTier] et [GetTitleByKey('c_east_samarth').GetNameNoTier] restent dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.kantilya: "[GetTitleByKey('c_kantilya').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.kantilya_desc: "#T #V [GetTitleByKey('c_kantilya').GetNameNoTier]#! #!\n\nPort bulchyadéen prospère, célèbre pour ses marchés et ses routes maritimes, Kantilya est un centre de céréales, de sel et de monnaie. S'en emparer affaiblit un rival régional tout en renforçant la navigation lynerienne.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_kantilya_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_kantilya').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_kantilya_tooltip: "#T #V [GetTitleByKey('c_kantilya').GetNameNoTier]#! #!\n\nPort bulchyadéen prospère, célèbre pour ses marchés et ses routes maritimes, Kantilya est un centre de céréales, de sel et de monnaie. S'en emparer affaiblit un rival régional tout en renforçant la navigation lynerienne.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_kantilya_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_kantilya').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.jorash: "[GetTitleByKey('c_jorash').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.jorash_desc: "#T #V [GetTitleByKey('c_jorash').GetNameNoTier]#! #!\n\nJorash est un carrefour du commerce côtier bulchyadéen, alimentant les villes de l'intérieur en produits étrangers. Ses ports sont profonds et ses coffres encore plus.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_jorash_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_jorash').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_jorash_tooltip: "#T #V [GetTitleByKey('c_jorash').GetNameNoTier]#! #!\n\nJorash est un carrefour du commerce côtier bulchyadéen, alimentant les villes de l'intérieur en produits étrangers. Ses ports sont profonds et ses coffres encore plus.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_jorash_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_jorash').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.kandalar: "[GetTitleByKey('c_kandalar').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.kandalar_desc: "#T #V [GetTitleByKey('c_kandalar').GetNameNoTier]#! #!\n\nAvant-poste stratégique sur les côtes bulchyadéennes, Kandalar se distingue par ses chantiers navals robustes et ses douanes animées. Dominer ce port permet de projeter sa puissance navale et de couper les flottes rivales.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_kandalar_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_kandalar').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_kandalar_tooltip: "#T #V [GetTitleByKey('c_kandalar').GetNameNoTier]#! #!\n\nAvant-poste stratégique sur les côtes bulchyadéennes, Kandalar se distingue par ses chantiers navals robustes et ses douanes animées. Dominer ce port permet de projeter sa puissance navale et de couper les flottes rivales.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_kandalar_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_kandalar').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.narikhar: "[GetTitleByKey('c_narikhar').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.narikhar_desc: "#T #V [GetTitleByKey('c_narikhar').GetNameNoTier]#! #!\n\nNarikhar, la capitale d'Anarikê, est un port fortifié d'argent, d'épices et de saphirs. C'est le joyau d'un fier royaume marchand. S'en emparer affaiblirait l'influence anarikêenne sur toute la Baie.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_narikhar_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_narikhar').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_narikhar_tooltip: "#T #V [GetTitleByKey('c_narikhar').GetNameNoTier]#! #!\n\nNarikhar, la capitale d'Anarikê, est un port fortifié d'argent, d'épices et de saphirs. C'est le joyau d'un fier royaume marchand. S'en emparer affaiblirait l'influence anarikêenne sur toute la Baie.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_narikhar_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_narikhar').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.inyaloni: "[GetTitleByKey('c_inyaloni').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.inyaloni_desc: "#T #V [GetTitleByKey('c_inyaloni').GetNameNoTier]#! #!\n\nSeconde ville d'Anarikê, Inyalôni n'est pas une simple ombre : elle fourmille de dockers, de trésors et de courtiers indépendants. S'y établir, c'est s'ouvrir l'avenir d'Anarikê. Sa perte ébranlerait leur confiance et leurs coffres.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_inyaloni_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_inyaloni').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_inyaloni_tooltip: "#T #V [GetTitleByKey('c_inyaloni').GetNameNoTier]#! #!\n\nSeconde ville d'Anarikê, Inyalôni n'est pas une simple ombre : elle fourmille de dockers, de trésors et de courtiers indépendants. S'y établir, c'est s'ouvrir l'avenir d'Anarikê. Sa perte ébranlerait leur confiance et leurs coffres.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_inyaloni_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_inyaloni').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.lyneria: "[GetTitleByKey('c_lyneria').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.lyneria_desc: "#T #V [GetTitleByKey('c_lyneria').GetNameNoTier]#! #!\n\nAu centre de la Ligue se trouve Lyneria, joyau de la Côte lynerienne, fière et indomptée. Ses artisans façonnent le luxe à partir de l'os et du bronze, tandis que les caravanes d'ivoire affluent de l'intérieur sauvage de la péninsule.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_lyneria_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_lyneria').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_lyneria_tooltip: "#T #V [GetTitleByKey('c_lyneria').GetNameNoTier]#! #!\n\nAu centre de la Ligue se trouve Lyneria, joyau de la Côte lynerienne, fière et indomptée. Ses artisans façonnent le luxe à partir de l'os et du bronze, tandis que les caravanes d'ivoire affluent de l'intérieur sauvage de la péninsule.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_lyneria_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_lyneria').GetNameNoTier] reste dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_decision.tt.thaamutasenga: "[GetTitleByKey('c_thaamutasenga').GetNameNoTier]"
 control_trade_in_the_bay_of_ormal_decision.tt.thaamutasenga_desc: "#T #V [GetTitleByKey('c_thaamutasenga').GetNameNoTier]#! #!\n\nAu plein sud de la Baie d'Ormal s'étend la longue péninsule de Senga Muta, et à son extrémité la plus lointaine se dresse le riche havre de Thaamutasenga, point de rencontre entre les océans Haragaer et Rómenaer.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_thaamutasenga_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_thaamutasenga').GetNameNoTier] demeurera dans votre [realm|El]."
 control_trade_in_the_bay_of_ormal_thaamutasenga_tooltip: "#T #V [GetTitleByKey('c_thaamutasenga').GetNameNoTier]#! #!\n\nAu plein sud de la Baie d'Ormal s'étend la longue péninsule de Senga Muta, et à son extrémité la plus lointaine se dresse le riche havre de Thaamutasenga, point de rencontre entre les océans Haragaer et Rómenaer.\n\n• Vous gagnerez [GetModifier('control_trade_in_the_bay_of_ormal_thaamutasenga_modifier').GetNameWithTooltip] dans votre [capital|El] tant que [GetTitleByKey('c_thaamutasenga').GetNameNoTier] demeurera dans votre [realm|El]."

 control_trade_in_the_bay_of_ormal_tul_harar_modifier: "Commerce avec Tûl Harar"
 control_trade_in_the_bay_of_ormal_tul_harar_modifier_desc: "Épices exotiques, riches étoffes et indigo bleu profond du delta de la Sîresha vivifient les marchés locaux de parfums et de couleurs de Sîrayn."
 control_trade_in_the_bay_of_ormal_pyrador_modifier: "Commerce avec Pyrador"
 control_trade_in_the_bay_of_ormal_pyrador_modifier_desc: "Des palais fluviaux de Pyrador proviennent huiles parfumées, manuscrits rares et artisans formés dans les antiques écoles de la cité. Leur savoir-faire, affiné sur des générations, apporte rapidité et précision à toute grande œuvre."
 control_trade_in_the_bay_of_ormal_mejha_modifier: "Commerce avec Mejha"
 control_trade_in_the_bay_of_ormal_mejha_modifier_desc: "Résine de Kjhana, herbes médicinales et fruits travaillés par les chèvres de Mejha offrent remèdes prisés et santé robuste à tous ceux qui les importent."
 control_trade_in_the_bay_of_ormal_samarth_modifier: "Commerce avec Samarth"
 control_trade_in_the_bay_of_ormal_samarth_modifier_desc: "Les navires de Samarth apportent chevaux robustes et céréales nourrissantes, soutenant la levée des troupes et nourrissant notre peuple."
 control_trade_in_the_bay_of_ormal_kantilya_modifier: "Commerce avec Kantilya"
 control_trade_in_the_bay_of_ormal_kantilya_modifier_desc: "Marchandises salées, poix collante et résine âcre forment le cœur des exportations de Kantilya, maintenant les navires à flot et les biens préservés."
 control_trade_in_the_bay_of_ormal_jorash_modifier: "Commerce avec Jorash"
 control_trade_in_the_bay_of_ormal_jorash_modifier_desc: "Les collines de Jorash produisent de fines olives et des vins millésimés, mis en bouteille sous le soleil bulchyadéen et destinés à orner les tables étrangères."
 control_trade_in_the_bay_of_ormal_kandalar_modifier: "Commerce avec Kandalar"
 control_trade_in_the_bay_of_ormal_kandalar_modifier_desc: "Les pentes boisées de Kandalar fournissent un bois robuste et des outils de précision, prisés des charpentiers et artisans de toute la Baie."
 control_trade_in_the_bay_of_ormal_narikhar_modifier: "Commerce avec Narikhar"
 control_trade_in_the_bay_of_ormal_narikhar_modifier_desc: "Saphirs extraits des hauts plateaux d'Anarikê et argent martelé des forges de Narikhar apportent splendeur et monnaie sonnante à ceux qui en assurent le flux."
 control_trade_in_the_bay_of_ormal_inyaloni_modifier: "Commerce avec Inyalôni"
 control_trade_in_the_bay_of_ormal_inyaloni_modifier_desc: "Les bois tropicaux d'Inyalôni sont prisés non seulement pour leur beauté, mais aussi pour leur solidité, utilisés aussi bien dans les fortifications que dans les chantiers navals."
 control_trade_in_the_bay_of_ormal_lyneria_modifier: "Commerce avec Lyneria"
 control_trade_in_the_bay_of_ormal_lyneria_modifier_desc: "Lyneria attire les esprits ambitieux comme la marée : philosophes, marchands, ingénieurs et artistes cherchent fortune sur ses quais bondés et dans ses guildes, leurs idées se répandant aussi vite que leurs marchandises."
 control_trade_in_the_bay_of_ormal_thaamutasenga_modifier: "Commerce avec Thaamutasenga"
 control_trade_in_the_bay_of_ormal_thaamutasenga_modifier_desc: "Thaamutasenga achemine des marchandises depuis l'Est comme depuis l'Ouest — un assortiment varié de denrées issues de presque toutes les côtes de la [middleearth|E]."

 tame_the_lynerian_jungles_decision: "Domestiquer la Sára Bask"
 tame_the_lynerian_jungles_decision_desc: "La partie lynerienne de la grande Sára Bask demeure vaste, sauvage et regorge de promesses inexploitées. En offrant de l'or et une protection à des colons audacieux, nous pouvons cartographier la jungle inexplorée, en extraire les ressources et transformer le silence de la jungle en richesse et en chansons."
 tame_the_lynerian_jungles_decision_tooltip: "Financer des expéditions pour coloniser et exploiter les jungles de la Sára Bask."
 tame_the_lynerian_jungles_decision_confirm: "Envoyez l'or, envoyez les colons, et ramenez la richesse !"

 colonise_lynerian_jungles_county_modifier: "Colonistes lyneriens parrainés"
 colonise_lynerian_jungles_county_modifier_desc: "Avec le soutien des villes côtières de Lyneria, les colons ont pénétré dans la canopée de la Sára Bask, traçant des sentiers, abattant des arbres et fondant des domaines. Bien que le danger rôde encore dans le vert, l'ambition lynerienne fleurit dans chaque clairière."

 is_settled_area: "Vous devez être dans une zone habitée"

 #########################
 ### Mumakan Decisions ###
 #########################
 decision_utter_south_mumakan: "Unifier le Royaume d'Amâv"
 decision_utter_south_mumakan.tamska: "Répandre la Lumière Divine vers l'Est"
 decision_utter_south_mumakan_desc: "Les premiers parmi la race des [men|E] à pénétrer dans les terres de l'Extrême-Sud furent conduits par [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName], qui les y mena et leur fit dominer une grande part de ces contrées — les légendes proclamant son règne sur toute la vastitude de l'Extrême-Sud.\n\nQue ce soit vérité ou non, cet héritage peut être restauré."
 decision_utter_south_mumakan_desc.tamska: "En tant que [tamska|E], je suis la fille d'un dieu — mon règne est à la fois divin et absolu. Partout dans les Royaumes Jumeaux, c'est là une réalité, et les terres en sont plus sûres.\n\nDe l'autre côté de la Baie d'Ûsakan s'étendent les terres farouches de Mûmakan, gouvernées par des tribus qui se font la guerre entre elles depuis les jours de [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName]. Leur pitoyable état pourrait être guéri et guidé par une main ferme, mais douce. #italic Ma#! main."
 decision_utter_south_mumakan_confirm: "Repose en paix, Amâv. Ton héritage est entre de bonnes mains."
 decision_utter_south_mumakan_tooltip: "Unifiez sous votre commandement les royaumes que les légendes d'Amâv disaient siens."

 decision_utter_south_integrate_mag_tumag_mumakan: "Intégrer Mag et Tumag"
 decision_utter_south_integrate_mag_tumag_mumakan_desc: "Le peuple des Magrin, bien que longtemps séparé de nous, est une tribu sœur qui descendit vers le sud au temps de [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName] — et nous devrions aspirer à ne plus former qu'un, comme aux jours d'antan."
 decision_utter_south_integrate_mag_tumag_mumakan_confirm: "Ajouter Mag et Tumag au Grand Royaume."
 decision_utter_south_integrate_mag_tumag_mumakan_tooltip: "Réunir les Magrin avec leurs frères perdus."
 decision_utter_south_integrate_mag_tumag_mumakan_tt: "A soumis les Royaumes Jumeaux"

 decision_utter_south_integrate_shayn_mag_tumag: "Intégrer Shayn"
 decision_utter_south_integrate_shayn_mag_tumag_desc: "Les habitants des lointaines terres de Shayn, bien que plus civilisés que leurs cousins de Mûmakan, demeurent un peuple égaré — ceux du sud s'accrochant à leurs cultes locaux, tandis que les Lynériens du nord passent d'un dieu à l'autre. La paix et l'ordre peuvent leur être apportés, pour peu que j'en fasse l'effort."
 decision_utter_south_integrate_shayn_mag_tumag_confirm: "Apporter la Paix à Shayn"
 decision_utter_south_integrate_shayn_mag_tumag_tooltip: "Placer Shayn sous votre vigilante tutelle."
 decision_utter_south_integrate_shayn_mag_tumag_tt: "A intégré Shayn"

 decision_integrate_gan: "Intégrer Gân"
 decision_integrate_gan_desc: "À l'est s'étendent les vastes jungles et collines de [GetTitleByKey('k_gan').GetNameNoTier]. Les souverains de [GetTitleByKey('e_mumakan').GetNameNoTier] ont souvent exercé une grande influence sur les nombreuses tribus d'[men|E] qui y demeurent, mais l'heure est venue d'y asseoir pleinement leur autorité. Gân deviendra une part de Mûmakan pour l'éternité, et enrichira le royaume de ses abondantes ressources !"
 decision_integrate_gan_tooltip: "Faire de Gân une part de Mûmakan"
 decision_integrate_gan_confirm: "Soit !"
 decision_integrate_gan_tt: "A intégré Gân"

 decision_subjugate_hathor: "Soumettre Hathôr"
 decision_subjugate_hathor_desc: "Au sud demeurent les farouches Hathôriens, venus, dit-on, d'un rivage lointain en des âges révolus. Longtemps ont-ils défié les Seigneurs de [GetTitleByKey('e_mumakan').GetNameNoTier], mais voici qu'enfin [GetTitleByKey('k_hathor').GetNameNoTier] s'agenouillera devant nous."
 decision_subjugate_hathor_tooltip: "Soumettre définitivement les Hathôriens"
 decision_subjugate_hathor_confirm: "Leur heure est venue."
 decision_subjugate_hathor_tt: "A soumis Hathôr"

 decision_subjugate_koronande: "Conquérir Kôronânde"
 decision_subjugate_koronande_desc: "À l'ouest s'étendent les nombreuses cités-états des Kôronândi, un ensemble d'oligarchies loosement unies sous l'autorité de [GetTitleByKey('k_koronande').GetNameNoTier] elle-même. Par le passé, elles se sont humiliées devant les Maîtres de [GetTitleByKey('e_mumakan').GetNameNoTier] — et l'heure est venue qu'elles le fassent une fois encore…"
 decision_subjugate_koronande_tooltip: "Ajouter Kôronânde à votre royaume"
 decision_subjugate_koronande_confirm: "Kôronânde est à moi."
 decision_subjugate_koronande_tt: "A conquis Kôronânde"

 decision_subjugate_talilan: "Dévaster Tâlilan"
 decision_subjugate_talilan_desc: "Longtemps les [kinnlai|E] ont demeuré dans leurs forêts et leurs jungles sur la péninsule de [GetTitleByKey('k_talilan').GetNameNoTier]. Ils sont affaiblis, [kinnlai_sundered|E] depuis longtemps déjà, si l'on en croit les légendes. Il est temps de mettre en pleine lumière l'étendue de leur faiblesse et de les chasser de ces terres, si bien que les forêts elles-mêmes les oublieront."
 decision_subjugate_talilan_tooltip: "Chasser les [elves|E] de Tâlilan"
 decision_subjugate_talilan_confirm: "Qu'ils fuient devant nous."

 decision_adopt_pet_mumak: "Adopter un Jeune Mûmak"
 decision_adopt_pet_mumak_desc: "Il est de coutume dans certaines maisons nobles de [GetTitleByKey('e_mumakan').GetNameNoTier] d'élever un Mûmak apprivoisé en leur demeure. Si je parviens à trouver un jeune ou un veau, je pourrai peut-être tisser avec lui un lien durable et en retirer l'estime de tous."
 decision_adopt_pet_mumak_tooltip: "Tenter d'apprivoiser un jeune Mûmak"
 decision_adopt_pet_mumak_confirm: "Partons en trouver un !"
 decision_adopt_pet_mumak_tt: "A apprivoisé un jeune Mûmak"
 decision_adopt_pet_mumak_failure: "Impossible d'apprivoiser le jeune animal"

 decision_drenim_goblin_offering: "Apaiser les Uvâg"
 decision_drenim_goblin_offering_desc: "Dans les montagnes au nord demeurent les cruels Uvâg — esprits tourmentés de nos ancêtres, maudits à hanter pour l'éternité les cimes désolées et les contreforts des [yellowmountains|E].\n\nParmi les Drenim, il est de coutume de déposer des offrandes afin d'apaiser les Uvâg, lesquels, en retour, pourront nous protéger des incursions extérieures — s'ils nous jugent dignes."
 decision_drenim_goblin_offering_tooltip: "Vous prémunir contre les menaces [orcish|E]"
 decision_drenim_goblin_offering_confirm: "Je pars sur l'heure."
 decision_drenim_goblin_offering_tt: "Vous voyagerez jusqu'aux contreforts des montagnes"

 decision_mumakani_revolt: "Se Soulever en Rébellion"
 decision_mumakani_revolt_desc: "Les faibles ont toujours été la proie des forts. Et ne suis-je pas le plus puissant des chefs de [GetTitleByKey('e_mumakan').GetNameNoTier] ? Nul ne peut nier que c'est moi qui devrais siéger sur le trône d'Amâv et gouverner toutes les tribus sous le ciel.\n\nLorsque l'heure sera propice, je ferai appel à mes partisans et me soulèverai — pour prendre ce qui m'appartient de droit !"
 decision_mumakani_revolt_tooltip: "Revendiquer pour vous-même le siège du Grand Chef"
 decision_mumakani_revolt_confirm: "À la guerre !"
 mumakan_challenge_cb: "Rébellion Mumakânil"
 decision_mumakani_revolt_tt: "Vous avez une prétention sur le titre [GetTitleByKey('e_mumakan').GetName]"

 decision_nafarati_confederation: "Unir les $nafarati$"
 decision_nafarati_confederation_desc: "Trop longtemps les $nafarati$ sont restés passifs et divisés, gouvernés par des hommes moins valeureux. Si seulement nous nous unissions sous un chef puissant, nous pourrions plier tout $e_mumakan$ à notre volonté. Rien n'arrêtera les armées guerrières des $nafarati$ !"
 decision_nafarati_confederation_tooltip: "Établir un royaume pour les $nafarati$"
 decision_nafarati_confederation_confirm: "Par la force de nos lames !"
 own_all_culture_counties: "Vous êtes le [liege|El] de #P 80%#! de l'ensemble des [counties|El] [GetPlayer.GetCulture.GetName]"
 nafarati_war_host: "Ost de Guerre $nafarati$"
 nafarati_war_host_tt: "Vous recrutez une armée composée de [GetMaA('nafarati_marauders').GetName] #italic (Taille #V 4#!)#!, [GetMaA('mahud_headhunters').GetName] #italic (Taille #V 4#!)#!, et [GetMaA('mubadar_berserkers').GetName] #italic (Taille #V 4#!)#!."

 decision_nafarati_kingdom: "Tailler un Royaume $nafarati$"
 decision_nafarati_kingdom_desc: "Nous sommes les $nafarati$, braves et inébranlables. Nous prenons ce qui nous appartient, de droit de conquête, l'épée et la lance au poing. Ces terres seront nôtres, dès à présent et jusqu'à la fin du monde !"
 decision_nafarati_kingdom_tooltip: "Ancrer le Royaume $nafarati$ dans Mûmakan"
 decision_nafarati_kingdom_confirm: "Par la force de nos lames !"
 decision_nafarati_kingdom_tt_2: "#N Cette décision aura des effets différents selon que les $nafarati$ sont indépendants ou vassalisés#!"

 decision_inkamakil_restoration: "Restaurer l'Esprit $inkamakil$"
 decision_inkamakil_restoration_desc: "Longtemps mon peuple a souffert comme serf des $mumakanil$, mais l'heure est venue de reconquérir notre fierté antique ! Nous étions jadis le plus fier des peuples de l'Extrême-Sud, mais le temps et les longues souffrances ont brisé nos âmes.\n\nMais plus jamais ! Nous avons triomphé, nous sommes libres, et nous sommes forts !"
 decision_inkamakil_restoration_tooltip: "Réformer la culture $inkamakil$"
 decision_inkamakil_restoration_confirm: "L'avenir est à nous !"
 own_all_inkamakil_counties: "Vous êtes le principal [overlord|E] de l'ensemble des [counties|El] [GetCultureByKey('inkamakil').GetName]"
 convert_counties_to_own_faith: "Chaque [county|El] du [realm|El] a #P 50%#! de chances de voir sa [faith|El] se convertir à [GetPlayer.GetFaith.GetName]."

 #####################
 ## Shayn Decisions ##
 #####################

 elevate_ambason_decision: "Élever le [GetTitleByKey('k_ambason').GetNameNoTooltip]"
 elevate_ambason_decision_desc: "Aux temps anciens, $amav$ promit $c_ambason$ à Amba, sa fille, comme son royaume de droit. Pourtant aujourd'hui, nos voisins ne nous regardent guère mieux que comme des sauvages sur un rocher nu. Il nous faut une reine puissante pour montrer au monde notre force — et je suis la femme pour cela ! Tous les hommes apprendront à craindre les héritières d'Amba !"
 elevate_ambason_decision_tooltip: "Revendiquer votre royaume antique par le sang et l'or"
 elevate_ambason_decision_confirm: "À l'infamie et à l'immortalité !"
 elevate_ambason_decision_royal_guard_tt: "Peut recruter [GetMaA('ambason_royal_guard').GetName|l] comme [men_at_arms|El]"

 decision_onto_the_boundless_horizon: "Vers l'Horizon Sans Fin"
 decision_onto_the_boundless_horizon_desc: "Mon heure est venue. Je le sens dans les sables sous mes pieds et dans les cris des oiseaux de mer dans le ciel au-dessus de moi. Depuis les jours des filles d'Amba, il est de coutume immémoriale parmi les matriarches d'Ambasôn de céder leur place à leurs successeuses lorsque la force de leur main s'est éteinte.\n\nJe me rendrai jusqu'à la pointe la plus orientale de notre île, là où la plage descend doucement vers le grand océan, et je rassemblerai toutes mes forces qui restent, une dernière fois. Que les vagues me portent loin, avant que l'horizon sans fin ne m'accueille en son sein."
 decision_onto_the_boundless_horizon_tooltip: "S'avancer seule dans les flots"
 decision_onto_the_boundless_horizon_confirm: "Je laisse derrière moi les sables d'Ambasôn."

 hasnt_taken_sea_trade: "Vous n'avez pas pris la [decision|El] [GetDecision('decision_establish_lyneria_sea_trade').GetName]"
 hasnt_taken_overland_trade: "Vous n'avez pas pris la [decision|El] [GetDecision('decision_establish_lyneria_overland_trade').GetName]"
 hasnt_taken_coastal_trade: "Vous n'avez pas pris la [decision|El] [GetDecision('decision_establish_lyneria_coastal_trade').GetName]"

 decision_establish_lyneria_overland_trade: "Établir le Commerce Terrestre avec Lyneria"
 decision_establish_lyneria_overland_trade_desc: "Le [GetGeographicalRegion('custom_lyneria_pass').GetName] a longtemps été le lien unissant $k_lyneria$ et $k_gan$. Par-dessus les montagnes ont afflué $mumakil$, épices et bois de charpente vers les cités du littoral, et en retour $k_gan$ a été richement approvisionné en joyaux, en outils et en armements.\n"
 decision_establish_lyneria_overland_trade_desc.wilderness: "Or ce fleuve s'est tari, et rares sont les compagnies de marchands qui s'aventurent sur les sentiers traîtres vers $k_lyneria$. Les seules sentinelles du col sont les cimes silencieuses, et les périls du voyage rendent le négoce peu rentable. Pourtant, si j'ai le courage de sécuriser les cols, le commerce pourrait de nouveau irriguer $k_gan$ et enrichir mes terres."
 decision_establish_lyneria_overland_trade_desc.enemy: "Désormais cependant, d'autres souverains tiennent les cols et font payer de lourds péages pour la sécurité de nos marchands. Si je m'emparais moi-même de la route, je pourrais en contrôler le flux et le diriger vers mes propres terres."
 decision_establish_lyneria_overland_trade_confirm: "Que le commerce reprenne !"
 decision_establish_lyneria_overland_trade_tooltip: "Commencer à commercer avec $k_lyneria$ par les cols montagneux"
 decision_establish_lyneria_overland_trade_tt: "Commerce Terrestre Établi"
 control_all_of_lyneria_pass: "#V Vous#! ou l'un de vos [allies|El] contrôlez entièrement chaque [county|El] le long du [GetGeographicalRegion('custom_lyneria_pass').GetName]"

 decision_establish_lyneria_sea_trade: "Établir le Commerce Maritime avec Lyneria"
 decision_establish_lyneria_sea_trade_desc: "Le [GetGeographicalRegion('custom_lyneria_pass').GetName] a longtemps été le lien unissant $k_lyneria$ et $k_gan$."
 decision_establish_lyneria_sea_trade_desc.wilderness: "$decision_establish_lyneria_sea_trade_desc$ Or il se dresse à présent désert, et les périls du voyage rendent le négoce peu rentable. $decision_establish_lyneria_sea_trade_desc.conculsion$"
 decision_establish_lyneria_sea_trade_desc.enemy: "$decision_establish_lyneria_sea_trade_desc$ Or désormais, d'autres souverains tiennent cette route et font payer de lourds péages pour la sécurité de nos marchands. $decision_establish_lyneria_sea_trade_desc.conculsion$"
 decision_establish_lyneria_sea_trade_desc.conculsion: "Il conviendrait donc d'envisager des voies commerciales alternatives.\n\nLes $akanali_collective_noun$ n'aiment guère la mer en général, mais les $lynerian_collective_noun$ ont montré que, une fois domptée, elle peut apporter une grande richesse. Peut-être devrions-nous aussi tourner le dos aux montagnes et regarder vers la mer pour trouver la route vers $k_lyneria$."
 decision_establish_lyneria_sea_trade_desc.singapura: "Entre mes terres et les riches cités de $k_lyneria$ s'étendent les jungles antiques du [GetGeographicalRegion('custom_lyneria_coastline').GetName], que les [GetFaithByKey('faith_degi').GetAdherentNamePlural] locaux nomment « Degi ». Denses, hostiles et quasiment impénétrables, elles ont barré le commerce côtier depuis des temps immémoriaux, le renvoyant vers les navires des $lynerian_collective_noun$ et des $sengani_collective_noun$.\nLes $akanali_collective_noun$ n'aiment guère la mer en général, mais les $lynerian_collective_noun$ ont montré que, une fois domptée, elle peut apporter une grande richesse. Peut-être devrions-nous aussi renoncer à notre passivité et regarder vers la mer pour trouver la route vers $k_lyneria$."
 decision_establish_lyneria_sea_trade_desc.singapura_enemy: "Entre mes terres et les riches cités de $k_lyneria$ s'étendent les jungles antiques du [GetGeographicalRegion('custom_lyneria_coastline').GetName], que les [GetFaithByKey('faith_degi').GetAdherentNamePlural] locaux nomment « Degi ». Denses, hostiles et quasiment impénétrables, elles ont barré le commerce côtier depuis des temps immémoriaux, le renvoyant vers les navires des $lynerian_collective_noun$ et des $sengani_collective_noun$.\nOr récemment, d'autres ont ouvert une route à travers les jungles, et nos marchands se trouvent désormais confrontés à de lourds tarifs quelle que soit la voie empruntée. Les $akanali_collective_noun$ n'aiment guère la mer en général, mais les $lynerian_collective_noun$ ont montré que, une fois domptée, elle peut apporter une grande richesse. Peut-être devrions-nous aussi renoncer à notre passivité et regarder vers la mer pour trouver la route vers $k_lyneria$."
 decision_establish_lyneria_sea_trade_desc.degi: "En travers de la route côtière vers $k_lyneria$ se dresse #V Degi#!, mon dieu et mon éprouveur, dense, hostile et impénétrable à ceux qui n'ont point appris ses secrets. Depuis d'innombrables années le commerce a évité ses jungles profondes, voyageant plutôt par mer sur les navires des $lynerian_collective_noun$ et des $sengani_collective_noun$.\n\nMon peuple en a peu profité, et forcer une route à travers Degi pour un négoce intensif serait folie. Nous n'aimons guère la mer en général, mais les $lynerian_collective_noun$ ont montré que, lorsqu'on lui fait face, elle peut apporter une grande maîtrise. Peut-être devrions-nous aussi nous détourner de la forêt et regarder vers la mer pour trouver la route vers $k_lyneria$."
 decision_establish_lyneria_sea_trade_desc.pirate: "De mémoire d'homme, les [ROOT.Char.GetCulture.GetCollectiveNoun] ont razzié les navires des $lynerian_collective_noun$, préférant percevoir leur dû à la pointe de l'épée. Pourtant cette politique nous a valu peu d'amis, et il est peut-être temps de recourir à d'autres tactiques.\nSi nous établissions des liens commerciaux #italic paisibles#! avec $k_lyneria$, nous pourrions grandement profiter de cet arrangement."
 decision_establish_lyneria_sea_trade_confirm: "Que le commerce reprenne !"
 decision_establish_lyneria_sea_trade_tooltip: "Commencer à commercer avec $k_lyneria$ par voie maritime"
 decision_establish_lyneria_sea_trade_tt: "Commerce Maritime Établi"
 decision_establish_lyneria_sea_trade_confed: "Vous êtes allié à un membre du [GetTitleByKey('c_lyneria').GetHolder.GetConfederation.GetName|V]"
 capital_county_is_coastal: "Votre [capital|El] se trouve dans un [county|El] côtier"

 decision_establish_lyneria_coastal_trade: "Établir le Commerce Côtier avec Lyneria"
 decision_establish_lyneria_coastal_trade_desc.wilderness: "Entre mes terres et les riches cités de $k_lyneria$ s'étendent les jungles antiques du [GetGeographicalRegion('custom_lyneria_coastline').GetName], que les [GetFaithByKey('faith_degi').GetAdherentNamePlural] locaux nomment « Degi ». Denses, hostiles et quasiment impénétrables, elles ont barré le commerce côtier depuis des temps immémoriaux.\n\nPourtant si elles venaient à être domptées et qu'un chemin y était tracé, je pourrais diriger une grande partie du commerce méridional de $k_lyneria$ à travers mes propres terres."
 decision_establish_lyneria_coastal_trade_desc.degi: "En travers de la route côtière vers $k_lyneria$ se dresse #V Degi#!, mon dieu et mon éprouveur, dense, hostile et impénétrable à ceux qui n'ont point appris ses secrets. Depuis d'innombrables années le commerce a évité ses jungles profondes, voyageant plutôt par mer.\n\nPourtant si mon peuple et moi nous montrons dignes, nous pourrions établir un chemin sûr à travers ses dangers et faire affluer le commerce méridional de $k_lyneria$ vers nos terres."
 decision_establish_lyneria_coastal_trade_desc.degi_enemy: "En travers de la route côtière vers $k_lyneria$ se dresse #V Degi#!, mon dieu et mon éprouveur, dense, hostile et impénétrable à ceux qui n'ont point appris ses secrets. Depuis d'innombrables années le commerce a évité ses jungles profondes, voyageant plutôt par mer.\n\nOr désormais, d'autres ont bravé ses dangers et tracé une route le long du littoral, lui témoignant peu du respect qui lui est dû. Mon peuple et moi devrions reprendre les jungles — pour honorer Degi et recueillir le fruit de ce commerce."
 decision_establish_lyneria_coastal_trade_desc.enemy: "Entre mes terres et les riches cités de $k_lyneria$ s'étendent les jungles antiques du [GetGeographicalRegion('custom_lyneria_coastline').GetName], que les [GetFaithByKey('faith_degi').GetAdherentNamePlural] locaux nomment « Degi ». Denses, hostiles et quasiment impénétrables, elles ont barré le commerce côtier depuis des temps immémoriaux.\n\nOr désormais, d'autres ont percé une route à travers ces jungles, et le commerce suit le littoral — au grand prix de mes marchands. Si je m'emparais du chemin, c'est #bold moi#! qui en tirerais avantage à la place."
 decision_establish_lyneria_coastal_trade_confirm: "Que le commerce reprenne !"
 decision_establish_lyneria_coastal_trade_tooltip: "Commencer à commercer avec $k_lyneria$ par la route côtière"
 decision_establish_lyneria_coastal_trade_tt: "Commerce Côtier Établi"
 decision_establish_lyneria_coastal_trade_confed: "Vous êtes allié à un membre de la [confederation|E] Lynérienne"
 control_all_of_lyneria_coastline: "#V Vous#! ou l'un de vos [allies|El] contrôlez entièrement chaque [county|El] le long du [GetGeographicalRegion('custom_lyneria_coastline').GetName]"
 settle_all_of_lyneria_coastline: "Chaque [county|El] le long du [GetGeographicalRegion('custom_lyneria_coastline').GetName] doit être entièrement colonisé"

 decision_hire_vulmaw_mercenaries: "Recruter des Mercenaires $vulmaw$"
 decision_hire_vulmaw_mercenaries_desc: "Au sud-est de [GetTitleByKey('e_shayn').GetNameNoTier] s'étendent les innombrables îlots de l'Archipel Méridional, où demeurent les $vulmaw$. Ils s'aventurent souvent au loin sur leurs embarcations rapides, visitant nos ports en marchands comme pillant nos navires en pirates. Pour le juste prix, bon nombre de ces hommes robustes pourraient être convaincus de combattre pour nous — et non contre nous…"
 decision_hire_vulmaw_mercenaries_tooltip: "Recruter un régiment de Pirates Waw"
 decision_hire_vulmaw_mercenaries_confirm: "Soit. Faites-leur parvenir un message."
 decision_hire_vulmaw_mercenaries_tt: "Mercenaires $vulmaw$ Recrutés"
 decision_hire_vulmaw_mercenaries_effect_tt: "Vous recrutez une armée de [GetMaA('waw_pirates').GetName] #italic (Taille #V 2#!)#!"
 vulmaw_mercenaries: "Mercenaires $vulmaw$"

 decision_join_lynerian_league: "Rejoindre le [GetTitleByKey('c_lyneria').GetHolder.GetConfederation.GetName]"
 decision_join_lynerian_league_desc: "Le long de la côte septentrionale de $e_shayn$ s'étendent les cités de $k_lyneria$, qui se sont historiquement coalisées pour exercer leur puissance collective en matière de diplomatie et de commerce. Bien que mon royaume se tienne résolument indépendant, peut-être y aurait-il des avantages à lier notre destin à celui de la Ligue ?"
 decision_join_lynerian_league_tooltip: "Rejoindre le [GetTitleByKey('c_lyneria').GetHolder.GetConfederation.GetName|V]"
 decision_join_lynerian_league_confirm: "En avant vers la Prospérité"
 half_lynerian_league_opinion: "Au moins #V 50%#! des membres du [GetTitleByKey('c_lyneria').GetHolder.GetConfederation.GetName|V] ont une [opinion|El] supérieure à #P +50#! de vous."
 decision_join_lynerian_league_toast: "Vous rejoignez la Ligue"
 decision_join_lynerian_league_tt: "Vous avez rejoint la [confederation|E] [GetTitleByKey('c_lyneria').GetHolder.GetConfederation.GetName]"

 decision_found_protected_harbour: "Établir un Port Fortifié"
 decision_found_protected_harbour_desc: "Les ravages de la mer, naturels comme navals, constituent un danger permanent pour nos cités côtières. Si nous établissions des ports fortifiés en des emplacements stratégiques, une grande partie des dommages subis par notre flotte lors des raids de pirates ou des tempêtes pourrait être prévenue."
 decision_found_protected_harbour_confirm: "Posez les fondations !"
 decision_found_protected_harbour_tooltip: "Ériger un [great_building|E] pour défendre vos ports"
 protected_harbour_barony_requirements_tt: "L'une de vos [counties|El] détenues doit posséder une [barony|El] côtière, dotée d'une [city_holding|El] et sans [great_building|E] déjà attribué"
