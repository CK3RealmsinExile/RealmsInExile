 decision_restore_harad_province.tt.sirayn: "[GetTitleByKey('e_sirayn').GetNameNoTier]"
 decision_restore_harad_province.tt.sirayn_desc: ""
 integrate_province_sirayn_tooltip: "#T #V Revendiquer [GetTitleByKey('e_sirayn').GetNameNoTier] de l'Abondance#! #!\n\nSirayn, la terre de l'Abondance, a longtemps entretenu des liens de parenté avec les fils [harad|El]. Ils deviennent désormais véritablement frères."

 decision_restore_harad_province.tt.harshandatt: "[GetTitleByKey('e_harshandatt').GetNameNoTier]"
 decision_restore_harad_province.tt.harshandatt_desc: ""
 integrate_province_harshandatt_tooltip: "#T #V Revendiquer la Terre-du-Fleuve [GetTitleByKey('e_harshandatt').GetNameNoTier]#! #!\n\nHarshandatt, la terre du grand fleuve Núar, abrite des frères oubliés depuis longtemps, pas seulement le peuple d'anciens rois. Ils sont des frères perdus que nous ramenons dans notre giron."

 decision_restore_harad_province.tt.khy: "[GetTitleByKey('e_khy').GetNameNoTier]"
 decision_restore_harad_province.tt.khy_desc: ""
 integrate_province_khy_tooltip: "#T #V Revendiquer le Fils Perdu, [GetTitleByKey('e_khy').GetNameNoTier]#! #!\n\n[khy|E], ainsi que les habitants orientaux nomment désormais les terres des Elinse et Halûdi d'antan, fut perdu aux fils [harad|El] il y a bien longtemps. Il leur est à présent restitué."

