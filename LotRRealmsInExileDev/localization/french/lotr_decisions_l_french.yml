 decision_rhovannorim_new_tradition_2: "Gagne la [tradition|E] [GetCultureTradition('tradition_the_people_of_the_plains').GetName]" # Pour reconquérir les Plaines du Rhovanion aux Orientais
 decision_remove_rhovannorim_tradition_2: "Perd la [tradition|E] [GetCultureTradition('tradition_a_people_reforged').GetName]"
 decision_rhovannorim_new_innovation_2: "Peut recruter [GetMaA('rhovanion_heavy_cavalry').GetName|l] comme [men_at_arms|El]"

 decision_restore_rhovanion_alt: "Restaurer le Royaume du Rhovanion"

 decision_reclaim_rhovanion_plains: "Reconquérir les Plaines du Rhovanion"
 decision_reclaim_rhovanion_plains_tooltip: "Reprendre les plaines du [rhovanion|E] aux Orientais"
 decision_reclaim_rhovanion_plains_desc: "Bien que le [rhovanion_kingdom|E] soit rené grâce à la valeur de mon peuple, une grande partie de nos terres ancestrales dans les plaines du [rhovanion|E] restent sous le contrôle d'étrangers qui n'y appartiennent pas.\n\nSi je parviens à reconquérir toutes les terres jusqu'à la [seaofrhun|E], mes domaines seraient plus vastes et ma prospérité plus grande que même ceux du légendaire Vidugavia. Si j'accomplis cela, je renforcerai sûrement la place de mon peuple une fois de plus sur les plaines du Rhovanion et graverai mon propre nom dans les annales de l'histoire !"
 decision_reclaim_rhovanion_plains_confirm: "Les plaines sont à nouveau nôtres !"

 rhovanion_resettlement_culture_counties_custom: "Chaque [county|e] d'origine Orientaise ou Nordique dans la [region|E] [GetGeographicalRegion('custom_plains_rhovanion').GetName]"
 
 decision_rhovanion_hegemony: "Forger le Plus Grand Royaume Nordique"
 decision_rhovanion_hegemony_tooltip: "Unir tous les royaumes des [northmen|E]"
 decision_rhovanion_hegemony_desc: "Les [northmen|E] ont demeuré sur les plaines du [rhovanion|E] et dans le [anduinvale|E] pendant trois âges, mais jamais leurs royaumes épars ne se sont rassemblés sous une même bannière. L'heure est-elle enfin venue de changer cela ?"
 decision_rhovanion_hegemony_confirm: "Que le Nord soit témoin."
 decision_rhovanion_hegemony_aladegan: "Vous avez accompli la décision #high Aladegan#!"
 decision_rhovanion_hegemony_rhovanion: "Vous avez accompli la décision #high Reconquérir les Plaines du Rhovanion#!"
 decision_rhovanion_hegemony_eotheod: "Vous avez accompli la décision #high Unir l'Éothéod#!"
 decision_rhovanion_hegemony_dale: "Vous avez accompli la décision #high Haut Roi du Val#!"
 decision_rhovanion_hegemony_celduin: "Vous avez accompli la décision #high Unir le Celduin#!"

 decision_rhovanion_hegemony_expand_rhun: "Chasser les Orientais"
 decision_rhovanion_hegemony_expand_rhun_tooltip: "Remporter la victoire définitive sur les envahisseurs de l'Est"
 decision_rhovanion_hegemony_expand_rhun_desc: "Trop longtemps les Orientais de [rhun|E] ont défié notre puissance. Nous n'avons point oublié leurs invasions passées, lorsque notre peuple fut réduit en servitude par leur cruauté et dispersé aux quatre vents par leur sauvagerie. Plus jamais !\n\nNous chevaucherons vers l'est, au-delà de la [seaofrhun|E], et ils trembleront sous les sabots tonnants de nos armées !"
 decision_rhovanion_hegemony_expand_rhun_confirm: "La vengeance est nôtre."

 decision_rhovanion_hegemony_expand_enedhwaith: "Pacifier les Plaines de l'Ouest"
 decision_rhovanion_hegemony_expand_enedhwaith_tooltip: "Apporter une paix durable au Dunland et à l'Enedhwaith"
 decision_rhovanion_hegemony_expand_enedhwaith_desc: "Bien des guerres ont ravagé les terres au-delà de la rivière Isen, et la Trouée du [rohan|E] a bu plus de sang qu'il n'en faudrait compter. L'heure est venue de mettre fin à ce carnage en rassemblant les tribus rivales des vastes plaines et marais qui s'étendent à notre ouest, afin qu'elles ne portent plus jamais la guerre sur nos terres ancestrales."
 decision_rhovanion_hegemony_expand_enedhwaith_confirm: "Enfin, la paix est venue."

