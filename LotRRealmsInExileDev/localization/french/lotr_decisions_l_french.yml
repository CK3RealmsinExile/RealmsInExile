 #######################
 ### Shire Decisions ###
 #######################
 decision_integrate_westmarch_title: "Intégrer la Marche Occidentale"
 decision_integrate_westmarch_desc: "Bien que ne faisant pas partie de la concession du Roi Argeleb II, la Marche Occidentale a, depuis avant la chute du Royaume du Nord, été abandonnée et réclamée par la nature sauvage. Ces dernières années, des Hobbits aventureux du Quartier Ouest ont commencé à empiéter sur les zones occidentales des collines blanches, enhardis par la vue des Elfes de passage qui voyagent vers les Havres Gris. En raison de ces facteurs, une décision doit être prise, il y a maintenant une population considérable dans la Marche Occidentale pour l'intégrer ou la laisser à la nature sauvage de l'Eriador."
 decision_integrate_westmarch_confirm: "Plus de nature sauvage désormais"
 decision_integrate_westmarch_tooltip: "La Marche Occidentale sera intégrée à la Comté"
 
 decision_integrate_buckland_title: "Intégrer le Pays de Bouc"
 decision_integrate_buckland_desc: "Bien que ne faisant pas partie de la concession du Roi Argeleb II, le Pays de Bouc fut colonisé par des hobbits du Maresque qui traversèrent le Brandevin sous la direction de Gorhendad Vieilbouc, dont les descendants ont gouverné la terre depuis lors en tant que Maîtres du Pays de Bouc. Au fil du temps, des parties du Maresque ont prêté allégeance aux Maîtres de Château Bouc, créant une situation complexe qui est restée non résolue pendant longtemps. Si la Comté devait établir son contrôle sur le Pays de Bouc, l'intégrer serait une tâche facile, mettant fin à une situation complexe qui profitera à tous."
 decision_integrate_buckland_confirm: "Enfin intégré"
 decision_integrate_buckland_tooltip: "Le Pays de Bouc sera intégré à la Comté"
 
 decision_seize_bag_end_title: "S'emparer de Cul-de-Sac"
 decision_seize_bag_end_desc: "Jadis havre de joyeuses assemblées, Cul-de-Sac peut désormais devenir un bien de prix. Ordonnez à vos hommes de main d'occuper le smial et de transformer la colline creusée en véritable bureau du Chef des Shiriffes : une garnison compacte et bien placée, depuis laquelle patrouilles et proclamations maintiendront l'ordre et jetteront un œil vigilant sur la région. Que la vieille demeure de [hobbit|E] soit refaçonnée en signe d'autorité : un avertissement pour ceux qui s'élèveraient en défi, et le siège inflexible de la loi."
 decision_seize_bag_end_confirm: "Saisissez-la !"
 decision_seize_bag_end_tooltip: "[GetBuilding('wonder_bag_end_03').GetName] sera remplacé par le [building|El] [GetBuilding('wonder_bag_end_02').GetName]"

 decision_reform_hobbitry_in_arms_title: "Réformer la Hobbiterie en Armes"
 decision_reform_hobbitry_in_arms_desc: "[shire|E] a toujours chéri la paix et les plaisirs simples, pourtant le passé a montré que même les gens tranquilles doivent être prêts à défendre leur foyer. Nous allons transformer la Hobbiterie en Armes, d'une simple levée de fermiers en une milice mieux entraînée : des exercices courts et sensés, un équipement amélioré, simple et solide, toujours prêt à défendre nos demeures. Nous sommes des [hobbits|E] : gais, prudents et épris de paix — mais prêts quand le devoir nous appelle."
 decision_reform_hobbitry_in_arms_confirm: "Toujours prêts quand il le faut !"
 decision_reform_hobbitry_in_arms.tt: "Peut recruter [GetMaA('hobbit_first_bounders_troop').GetName], [GetMaA('hobbit_hedgewardens').GetName] et [GetMaA('hobbit_pony_riders').GetName|l] comme [men_at_arms|El]"


 #############################################
 ####### Angmar & Forodwaith Decisions #######
 #############################################
 decision_adopt_angmarrin_ways: "Ressusciter les Coutumes Angmarrim"
 decision_adopt_angmarrin_ways_tooltip: "Adopter la Culture Angmarrim"
 decision_adopt_angmarrin_ways_desc: "Nos lointains parents, les Angmarrim étaient à la fois comme nous et différents. Mais nul ne peut débattre qu'ils devinrent en effet puissants, capables de rivaliser même avec les grands Rois du Sud. Ayant nous-mêmes emménagé en Angmar, nous pourrions peut-être raviver leurs coutumes ?"
 decision_adopt_angmarrin_ways_confirm: "Que le monde sache qu'Angmar vit !"
 decision_adopt_angmarrim_counties_custom: "Chaque [county|e] avec [heritage|E] $baradhrim$ dans votre [domain|El]"

 decision_empire_angmar_restore: "Restaurer l'Empire d'Angmar"
 decision_empire_angmar_restore_tooltip: "Restaurer le Royaume-Sorcier perdu d'Angmar"
 decision_empire_angmar_restore_desc: "La Couronne de Fer d'Angmar fut l'une des nations les plus puissantes à s'élever dans le nord de la Terre du Milieu. Pendant des siècles, elle s'est affrontée au royaume d'[arnor|E], le surpassant même. Cependant, elle fut détruite peu après, son peuple anéanti par les représailles des hommes du [gondor|E] et des [elves|E]. Cependant, sa mémoire demeure. Si nous pouvons affirmer notre contrôle sur les terres centrales de l'ancien royaume d'Angmar, tant à l'est qu'à l'ouest du Mont Gundabad, nous pourrions décréter sa renaissance."
 decision_empire_angmar_restore_confirm: "La Couronne de Fer s'élève à nouveau !"

 decision_angmar_integrate_counties_custom: "Chaque [county|e] dans vos nouvelles terres"

 decision_annex_east_forodwaith: "Intégrer le Forodwaith Oriental"
 decision_annex_east_forodwaith_tooltip: "Assimiler les marches occidentales dans notre royaume"
 decision_annex_east_forodwaith_desc: "Le peuple du Forodwaith Oriental a des liens profonds avec les Angmarrim. Maintenant qu'ils reconnaissent mon autorité, nous devons les amener plus pleinement sous notre contrôle. Ils doivent apprendre à me servir et à me craindre comme le font leurs parents."
 decision_annex_east_forodwaith_confirm: "Leur place légitime !"

 decision_subjugate_the_ettenmoors: "Subjuguer les Landes d'Etten"
 decision_subjugate_the_ettenmoors_tooltip: "Vous remarquez la présence de Trolls des Collines errant dans les Landes d'Etten. Peut-être pourraient-ils servir à un dessein plus grand..."
 decision_subjugate_the_ettenmoors_desc: "Alors que les vents glacés de [GetTitleByKey('c_baruk_zigil').GetName] en [angmar|e] cèdent à l'étendue morne des [GetTitleByKey('c_ettenmoors').GetName], vous êtes déterminé à marcher en avant, les yeux fixés sur une grande ambition. Vos conseillers et vous-même vous embarquez dans une expédition vers les Landes d'Etten, visant à subjuguer les trolls qui y demeurent. Menés par vos compagnons les plus rusés, l'opportunité de renforcer vos forces en enrôlant les redoutables trolls dans vos rangs obscurs."
 decision_subjugate_the_ettenmoors_tooltip_confirm: "Aux Landes d'Etten !"
 decision_subjugate_the_ettenmoors_effect_desc: "Certains de vos conseillers voyageront aux Landes d'Etten pour tenter de subjuguer les trolls"
 decision_subjugate_the_ettenmoors.b_cennmoin_is_a_wilderness: "[GetTitleByKey('b_cennmoin').GetName] est une région sauvage"
 decision_subjugate_the_ettenmoors.not_ai_or_not_lore_friendly: "Cette décision n'est PAS compatible avec les règles. Ce qui signifie qu'elle ne se déclenche qu'avec la règle `lore-friendly` désactivée ou par un humain."
 
 decision_gram_destroy_rangers: "Affaiblir les Rôdeurs"
 decision_gram_destroy_rangers_tooltip: "Établir des Avant-postes de Raid en Eriador"
 decision_gram_destroy_rangers_desc: "Longtemps les Rôdeurs [dunedain|E] ont défendu les terres de l'Ancien [arnor|E]. On dit que beaucoup de richesses se cachent derrière leur bouclier encerclant. Si nous pouvions déchirer un trou dans leurs défenses, les richesses de la Comté seraient nôtres pour la prise."
 decision_gram_destroy_rangers_confirm: "Mort aux Dúnedain !"
 
 decision_stabilize_gram: "Stabiliser le Mont Gram"
 decision_stabilize_gram_tooltip: "Mettre fin à l'Anarchie de Gram"
 decision_stabilize_gram_desc: "Golfimbul a échoué, son raid sur la Comté fut un désastre sans précédent. Notre capitaine est mort, et avec lui la majeure partie de nos forces combattantes. Maintenant, les esclaves se révoltent, et chaque misérable snaga se voit sur le trône de Gram. Le sang coule librement à travers les galeries alors que des bandes de hors-la-loi et de renégats s'entretuent au grand jour. Un chef fort est nécessaire pour mettre fin à cette folie."
 decision_stabilize_gram_confirm: "Ce sera moi !"
 
 decision_stabilize_gram_non_orc: "Stabiliser le Mont Gram"
 decision_stabilize_gram_non_orc_tooltip: "Mettre fin à l'Anarchie de Gram"
 decision_stabilize_gram_non_orc_desc: "Quand nous sommes arrivés à Gram, nous avons découvert que les orques étaient si occupés à s'entretuer qu'ils n'ont presque offert aucune résistance."
 decision_stabilize_gram_non_orc_confirm: "Ça se termine maintenant, du moins."
 
 decision_gram_avenge_greenfields: "Venger la Bataille de Champs-du-Vert"
 decision_gram_avenge_greenfields_tooltip: "Détruire les Misérables Semi-Hommes"
 decision_gram_avenge_greenfields_desc: "Golfimbul, Chef de Guerre de Gram, fut tué par le « Taureau Mugissant » Touque et humilié par les [hobbits|E] de la Comté. Bien que nous ne soyons pas de son clan, tous ceux qui demeurent dans cette montagne portent la tache de cette humiliation, des [orcs|E], défaits par des semi-hommes ! Nous devons venger cette défaite."
 decision_gram_avenge_greenfields_confirm: "Pour Golfimbul, Pour Gram !"
 decision_gram_avenge_greenfields_kill_tooks: "Bandobras 'Taureau Mugissant' Touque est mort"
 decision_gram_avenge_greenfields_destroy_rangers: "Vous avez brisé les défenses des Rôdeurs"
 decision_gram_avenge_greenfields_stabilize_gram: "Vous avez stabilisé l'anarchie au Mont Gram"
 decision_avenge_greenfields_scour_shire: "Vous ravagez la Comté, brisant le titre et pillant les comtés."

 ################################
 ###### Bellakar Decisions ######
 ################################
 decision_reclaim_mardruak: "Reconquérir Mardrûak"
 decision_reclaim_mardruak_tooltip: "Reconquérir la province la plus septentrionale de Bellakar"
 decision_reclaim_mardruak_desc: "Pendant maintes générations, Mardrûak fut partie intégrante de Bellakar. Elle abrite des cités qui aidèrent à former le fondement de la Ligue Bellakarienne, et demeura (majoritairement) une province loyale durant toutes les invasions Tedjin et bien avant dans le Troisième Âge. Mais depuis les Jours de Discorde, elle et Felaya nous ont été arrachées. Maintenant, avec Felaya enfin revenue sous contrôle royal, il est temps de ramener au bercail la dernière des provinces septentrionales !"
 decision_reclaim_mardruak_confirm: "Enfin, le royaume est restauré !"
 
 decision_bellakar_felayan_rapprochement: "Rapprochement entre Bellakar et Felaya ?"
 decision_bellakar_felayan_rapprochement_tooltip: "Ramener la province septentrionale déchue dans le giron"
 decision_bellakar_felayan_rapprochement_desc: "Depuis les sombres jours de la guerre civile, Felaya a opéré indépendamment de Bellakar, réticente à s'incliner devant nous à nouveau après notre incapacité à veiller à leur sécurité ou leurs intérêts locaux. Si nous pouvons prouver notre fiabilité et cultiver une relation étroite avec leurs dirigeants, nous pourrions peut-être les ramener pacifiquement dans le giron en échange de certains privilèges."
 decision_bellakar_felayan_rapprochement_confirm: "Nous devons nous unir, ou périr"

 decision_bellakar_vassalise_izindubeth: "Vassaliser l'Izindubêth"
 decision_bellakar_vassalise_izindubeth_tooltip: "Vassaliser l'Izindubêth sous la couronne bellakaréenne"
 decision_bellakar_vassalise_izindubeth_desc: "#help Par égard pour la piété de Ladnoca Ma fille, les Tumakveh seuls pourront continuer à prononcer Mon nom sur le hallow d'Izindutârik aux heures qu'elle a désignées ; mais à cause de leurs péchés, les Bellakaranî ne M'adoreront qu'en silence. Et que nul ne méprise les Kôlir ni ne néglige leur culte ; car c'est ainsi qu'il honorera Ma volonté.#!\n\nTelle fut la parole d'Êru, délivrée par l'Izindubêth Imrathôr à Ar-Artârik 'an-Aranî'. Le [Glossary('Batân an-Izindi','batan_an_izindi_gloss')] n'a jamais résisté à la monarchie des Tumakveh, mais à mesure que l'autorité de la couronne se repliait vers le sud, le lien qui existait jadis s'est distendu. Felaya étant désormais restaurée au sein de [bellakar|E] même, peut-être l'Izindubêth peut-elle être ramenée dans le giron de la couronne ?"
 decision_bellakar_vassalise_izindubeth_confirm: "Nous protégerons tous les Fidèles du sud"

 decision_tame_desert: "Dompter les Frontières Désertiques"
 decision_tame_desert_tooltip: "Dompter la longue et turbulente frontière désertique de Bellakar"
 decision_tame_desert_desc: "Depuis des âges innombrables, les sables sans fin de la Mer de Dunes ont constitué la principale voie par laquelle les ennemis étrangers se sont abattus sur Bellakar. Les Tedjin, les Qarsags, même les Aukar n'ont pas toujours été bien disposés à notre égard. Maints rois ont renoncé à toute ambition sur cette région ; la terre rocailleuse cède la place à des sables infinis et à un soleil sans merci, sans répit ni ressources. Le vieux poste avancé d'Ephalak fut abandonné précisément pour cette raison : le coût fut jugé bien trop lourd, les gains bien trop maigres. Mais le royaume entrant dans une ère d'expansion et de prospérité, peut-être ce coût vaudrait-il la plus grande sûreté du cœur de Bellakar."
 decision_tame_desert_confirm: "Nous n'endurerons plus les déprédations des sables !"
 conversion_west_dune_sea_desc: "Vous devez convertir au moins #V 50%#! des [counties|El] de la [region|E] [GetGeographicalRegion('special_region_west_dune_sea').GetName] à votre foi"
 tame_desert_effects_tt: "De nombreux colons Bellanarud s'établiront dans la Mer de Dunes occidentale, y répandant leur culture."

 anbalkumagan_grain_dole_decision: "Rétablir la Pharaz an-Dâira"
 anbalkumagan_grain_dole_decision_desc: "Dans les années qui précédèrent la [downfallofnumenor|E], [ciryatanore|E] servit de grand grenier à blé de l'empire [numenorean|E], offrant de vastes récoltes pour nourrir l'île. En ces temps-là, le peuple de [numenor|E] bénéficiait de la Pharaz an-Dâira, l'« Or de la Terre » : les distributions régulières de pain gratuit ou à prix contrôlé. Cette noble tradition fut balayée lorsque le culte des [valargods|E] fut proscrit, et périt entièrement lors de l'[akallabeth|E]. Elle est pourtant encore dans les mémoires, et tout souverain assez hardi pour la restaurer gagnerait sûrement les cœurs du peuple."
 anbalkumagan_grain_dole_decision_tooltip: "Instaurer des distributions de pain pour le peuple de la capitale"
 anbalkumagan_grain_dole_decision_confirm: "Ouvrez les greniers !"
 enough_granaries_in_anbalkumagan: "Au moins 3 comtés de la région de [GetGeographicalRegion('custom_anbalkumagan').GetName] ont construit [GetBuilding('cereal_fields_05').GetName] ou mieux"
 MODIFIER_DEFINITION_VALUE_PER_ANBALKUMGAN_GRANARY: " \t#weak Augmentation par [GetBuilding('cereal_fields_05').GetName] construit dans [GetGeographicalRegion('custom_anbalkumagan').GetName]#!"
 MODIFIER_DEFINITION_MAIN_DESC_PER_ANBALKUMGAN_GRANARY: "Ce modificateur augmente par [GetBuilding('cereal_fields_05').GetName] construit dans [GetGeographicalRegion('custom_anbalkumagan').GetName] ($MULTIPLIER|+=0$), plafonné à #V 10#!"
 grain_dole_already_active_anbalkumagan: "La Pharaz an-Dâira est déjà active !"
 unlocked_grain_dole_anbalkumagan: "Rétablir la Pharaz an-Dâira est moins coûteux"
 bellakar.3000.t: "La Pharaz an-Dâira"
 bellakar.3000.desc: "Le peuple a toutes les raisons de se réjouir : l'antique et chère tradition de la Pharaz an-Dâira revient à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] !\n\nGrâce à #EMP mes#! efforts, notre capitale sera la plus grande en ce monde — [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] reçoit un flot ininterrompu de grain bon marché en provenance de [GetGeographicalRegion('custom_anbalkumagan').GetName], comme il y a des siècles de cela.\n\nEt comme le disait avec justesse le poète antique : il suffit au peuple de pain et de jeux !"
 bellakar.3000.a: "Qu'ils mangent du pain !"
 reconfirm_anbalkumagan_grain_dole_decision: "Reconfirmer la Pharaz an-Dâira"
 reconfirm_anbalkumagan_grain_dole_decision_desc: "Depuis sa réintroduction officielle, les habitants de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] se sont accoutumés aux largesses offertes par la Pharaz an-Dâira — les distributions régulières de pain gratuit ou à prix contrôlé. C'est un puissant instrument entre les mains de tout Empereur pour assurer la productivité de son peuple et sa propre popularité."
 reconfirm_anbalkumagan_grain_dole_decision_tooltip: "Reconfirmer les distributions de pain pour le peuple de la capitale"
 reconfirm_anbalkumagan_grain_dole_decision_confirm: "$reinstitute_grain_dole_decision_confirm$"
 reconfirm_anbalkumagan_grain_dole_decision_tt: "Pharaz an-Dâira Reconfirmée"

 grain_anbalkumagan_providers_county_modifier: "Grenier de Pharazâin"
 grain_anbalkumagan_providers_county_modifier_desc: "La Pharaz an-Dâira de la capitale dépend de cette région pour la production et l'exportation de vastes quantités de grain bon marché, au travers d'un réseau avancé de marchands, de transporteurs, de négociants et même de spéculateurs."
 bread_and_circuses_anbalkumagan_county_modifier: "Pharaz an-Dâira"
 bread_and_circuses_anbalkumagan_county_modifier_desc: "La Pharaz an-Dâira est active : tous les citoyens ont droit aux distributions régulières de pain gratuit, aux frais de l'Empereur."
 ### WIP ### issue #228 -> The Last Alliance of the Númenórean Realms decision
 decision_bellakar_x_gondor: "Envoyer des Émissaires au Gondor"
 decision_bellakar_x_gondor_tooltip: "Chercher à restaurer l'ancienne alliance avec le Gondor"
 decision_bellakar_x_gondor_desc: "De longues années se sont écoulées depuis que Bellakar a reçu des nouvelles des Fidèles du nord. Pourtant, en des jours anciens, Zagarthôr de Nîlûlôni apporta l'aide de Bellakar au Gondor durant les jours les plus sombres de la Guerre de la Dernière Alliance. Et durant les années des Rois-Marins, les deux royaumes bâtirent sur les serments prêtés en ces temps, et s'aidèrent mutuellement dans leurs campagnes à Umbar, Mardurak, et sur le Harnen.\n\nMaintenant que Felaya et Mardruak sont à nouveau entre les mains de Bellakar, les communications peuvent être rétablies avec les Rois Elendili à Minas Tirith. Assurément, le temps est venu de restaurer l'ancienne alliance, et d'œuvrer ensemble contre le Grand Ennemi ? Pourtant, après tant d'années, qui sait comment le Gondor répondra..."
 decision_bellakar_x_gondor_confirm: "Dépêchez les émissaires"
 decision_bellakar_x_gondor_custom_tooltip_a: "Vous avez réintégré Mardruak dans votre royaume" # Feel free to replace @ Red/Vector
 decision_bellakar_x_gondor_custom_tooltip_b: "Vous vous êtes réconcilié avec Felaya" # Feel free to replace @ Red/Vector
 
 #Adopt a Cat
 decision_lotr_adopt_cat: "Adopter un Chat"
 decision_lotr_adopt_cat_desc: "J'ai souvent rêvé d'avoir un chat à moi. Il est peut-être temps d'en avoir un."
 decision_lotr_adopt_cat_desc.city_of_cats: "Esmer est familièrement surnommée la « Cité des Chats » pour une bonne raison. On dit en plaisantant que nos chats tirent vraiment les ficelles dans les coulisses — et pas seulement celles d'une pelote de laine. Les chats les plus exquis sont élevés dans les cours inférieures du $building_type_wonder_ishtra_shrine$, et pour un don, il m'en serait peut-être accordé un."
 decision_lotr_adopt_cat_tooltip: "Adopter un compagnon félin"
 decision_lotr_adopt_cat_confirm: "Un chat !"

 #Restore Korlean League Localization##
 decision_restore_korlean_league: "Restaurer la Ligue Korléenne"
 decision_restore_korlean_league_tooltip: "Vous rétablissez Korlea en tant que puissance prééminente dans la Baie de Tûlwang."
 decision_restore_korlean_league_desc: "Autrefois, Korlea était la plus grande des villes de [bellakar|E], le centre du commerce sur la [bayoftulwang|E], et le cœur des [adunai] du Sud. Pourtant, son pouvoir ne dura pas, car frappée par les puissantes vagues de la [downfall|E], Korlea fut noyée comme [anadune|E] elle-même, et notre emprise sur les peuples de ces terres fut brisée. Mais contrairement à [westernesse|E], nous avons reconstruit et grandi plus forts, et maintenant le temps est venu de reproclamer ce que nous n'avons jamais oublié. Nous allons revenir à notre leadership de ces terres, et une fois de plus le port de Korlea sera le plus riche du sud."
 decision_restore_korlean_league_confirm: "Que Korlea retourne à sa place légitime !"
 decision_restore_korlean_league_title: "Restaurer la Ligue Korléenne"

 ###############################
 ##### Pharazain Decisions #####
 ###############################
 decision_proclaim_pharazain: "Proclamer le Dominion de Pharazâin"
 decision_proclaim_pharazain_tooltip: "Unifier les Adûnâi du Sud"
 decision_proclaim_pharazain_desc: "Durant l'empire [numenorean|E], ces terres au sud d'[umbar|E] étaient connues sous maints noms, mais le plus attesté est Pharazâin - les Terres Dorées. L'origine exacte du nom est obscure, peut-être référant à l'or blanc des montagnes Bellakari ou aux lucratifs dépôts minéraux dans l'Ûrid-Pharazâin, ou même aux grandes récoltes de céréales dans les champs de Zimrathâni.\n\nQuelle qu'en soit l'origine, le nom persista, bien que toujours utilisé dans les termes les plus vagues, une couverture servant à désigner les colonies de la côte sud-ouest d'où les richesses affluaient vers l'île de l'étoile. Depuis la [downfallofnumenor|E], ces terres se sont querellées, se combattant mutuellement. Bellakar prospéra tandis qu'An-Balkûmagân fulminait, les [thanihazad|E] s'efforcèrent de maintenir un ordre figé, éternel. Pourtant, au final, ne sont-ce pas toutes des royaumes des [adunai|E] ?\n\nAssurément, nous sommes plus forts ensemble que séparés. Si nous pouvons amener ces terres longtemps en discorde sous une seule bannière, peut-être que ce nom vague mais ancien pourrait renaître, avec dessein et force."
 decision_proclaim_pharazain_confirm: "Les terres natales des Adûnâi !"
 control_of_pharazain_desc: "Vous devez contrôler au moins #V 85%#! des [counties|El] de la [region|E] [GetGeographicalRegion('special_pharazain').GetName]"

