 decision_choose_dorwinion_faction: "Aligner la Dynastie avec une Faction"
 decision_choose_dorwinion_faction_tool_tip: "Aligner la [dynasty|El] [ROOT.Char.GetDynasty.GetName] avec l'une des deux grandes factions de [dorwinion|E]."
 decision_choose_dorwinion_faction_desc: "Les machinations politiques et les intrigues sont une part importante de la société de [dorwinion|E], où deux factions opposées dominent : les Seigneurs du Vin et les Maîtres Marchands.\n\nNotre [dynasty|El] a jusqu'à présent évité tout alignement public avec l'un de ces grands blocs de pouvoir. Peut-être est-il temps de reconsidérer notre position de neutralité."
 decision_choose_dorwinion_faction_confirm: "Choisir un camp"
 decision_choose_dorwinion_faction_tool_tip_2: "Votre [dynasty|El] s'alignera avec les [GetModifier('winelords').GetNameWithTooltip] ou les [GetModifier('master_merchants').GetNameWithTooltip]."
 
 decision_change_dorwinion_faction: "Changer l'Alignement Factionnel de la Dynastie"
 decision_change_dorwinion_faction_tool_tip: "Changer l'alignement factionnel de la [dynasty|El] [ROOT.Char.GetDynasty.GetName]."
 decision_change_dorwinion_faction_desc: "Les machinations politiques et les intrigues sont une part importante de la société de [dorwinion|E], où deux factions opposées dominent : les Seigneurs du Vin et les Maîtres Marchands.\n\nPar le passé, notre [dynasty|El] a choisi de s'aligner avec les intérêts de l'une de ces parties. Mais le monde politique est en perpétuel mouvement, et les décisions du passé ne correspondent pas toujours aux intérêts d'aujourd'hui.\n\nIl y a toujours la possibilité de se réaligner, mais pas sans une perte significative de prestige et de respect pour ma maison..."
 decision_change_dorwinion_faction_confirm: "Réaligner vos intérêts"
 decision_change_dorwinion_faction_tool_tip_2: "Votre [dynasty|El] s'alignera avec les [GetModifier('winelords').GetNameWithTooltip] ou les [GetModifier('master_merchants').GetNameWithTooltip], ou choisira de redevenir neutre."
 
 decision_dorwinion_abolish_elections: "Abolir les Élections"
 decision_dorwinion_abolish_elections_tool_tip: "Accroître votre emprise sur le pouvoir dans le Royaume en abolissant les élections"
 decision_dorwinion_abolish_elections_desc: "Depuis des générations, les seigneurs de notre royaume ont sélectionné un chef parmi leurs pairs pour guider notre peuple vers l'avenir. Bien que noble dans ses objectifs, cette pratique a conduit à la faction et à la désunion.\n\nJe suis respecté et le royaume prospère sous la direction de ma [dynasty|El]. Pourquoi devrions-nous risquer de tout perdre lorsque je viendrai à trépasser ? Peut-être le temps est-il venu de réévaluer la valeur de notre système électif..."
 decision_dorwinion_abolish_elections_confirm: "Ma famille seule règnera"
 decision_dorwinion_abolish_elections_title_heir_is_your_heir: "Votre [player_heir|El] est [heir|E] du [GetTitleByKey('k_dorwinion').GetName]"
 
 decision_fortify_southern_pass: "Fortifier le Col Méridional"
 decision_fortify_southern_pass_tooltip: "Construire une forteresse dans le col montagneux menant au Rhûn"
 decision_fortify_southern_pass_desc: "Au-delà de la cité de [GetTitleByKey('c_caras_sant').GetNameNoTier] se trouve un col montagneux menant aux terres détenues par les Orientais de [GetTitleByKey('e_rhun').GetNameNoTier]. Bien que les Hommes de [rhun|E] aient souvent commercé avec nous, ils sont tout aussi susceptibles d'envahir nos terres si l'occasion se présente.\n\nAfin de nous prémunir contre toute menace venant du sud, nous devrions fortifier nos frontières au sud de Caras Sant, construisant une forteresse juste à la sortie du col montagneux - créant un point d'étranglement facilement défendable."
 decision_fortify_southern_pass_confirm: "Commencer la construction immédiatement !"

