 #########################
 ### Zantaka Decisions ###
 #########################
 decision_zantaka_marriage_offer: "Offrir votre Main en Mariage"
 decision_zantaka_marriage_offer_tooltip: "Vous contactez les dirigeants de [GetTitleByKey('c_emelcyn').GetNameNoTier], cherchant à renforcer vos liens par le mariage et à vous emparer de la cité."
 decision_zantaka_marriage_offer_desc: "Avec [GetTitleByKey('c_pelorna').GetNameNoTier] désormais sous mon autorité, l'heure est venue d'élargir mes horizons. Au sud, la grande cité de [GetTitleByKey('c_emelcyn').GetNameNoTier] constitue un allié tentant. De fait, [GetScriptedCharacterByHistoryID('lineofpharala69').GetFirstName], homme faible et aisément manipulable, semble un candidat idéal pour époux. \n\nBien que [GetScriptedCharacterByHistoryID('lineofpharala69').GetFirstName] ne s'opposera guère à notre union, le conseil municipal de [GetTitleByKey('c_emelcyn').GetNameNoTier] se montrera sans doute bien moins enthousiaste face à cette perspective."
 decision_zantaka_marriage_offer_confirm: "Leur résistance sera de courte durée..."
 decision_zantaka_marriage_offer_effect_tt: "Vous vous rendez à [GetTitleByKey('c_emelcyn').GetNameNoTier] où vous tenterez d'obtenir ce mariage."

 decision_zantaka_coup_emelkyn: "S'emparer du Pouvoir à Emelkyn"
 decision_zantaka_coup_emelkyn_tooltip: "Utilisez votre souverain marionnette à [GetTitleByKey('c_emelcyn').GetNameNoTier] pour vous emparer du pouvoir sur la cité, vous établissant comme la souveraine la plus puissante de [GetTitleByKey('k_lyneria').GetNameNoTier]."
 decision_zantaka_coup_emelkyn_desc: "[GetTitleByKey('c_emelcyn').GetNameNoTier], l'une des trois grandes cités ayant longtemps dominé [GetTitleByKey('k_lyneria').GetNameNoTier], est enfin à portée de main. Grâce à ma marionnette et agent [GetScriptedCharacterByHistoryID('lineofpharala69').GetFirstName] et son libre accès aux plus hautes sphères du pouvoir au sein de la cité, j'ai pu tramer et préparer mon ascension à [GetTitleByKey('c_emelcyn').GetNameNoTier]. \n\nAvant de pouvoir agir, cependant, je dois m'assurer que ma marionnette règne en tant que maître du conseil sur [GetTitleByKey('c_emelcyn').GetNameNoTier]. Sans cette légitimité, mon ascension serait une fois de plus perçue comme usurpation, non seulement par un conseil mais à travers toute [GetTitleByKey('k_lyneria').GetNameNoTier]. \n\nCette fois, je devrai manœuvrer avec subtilité si je veux éviter de faire face à une coalition. De telles manœuvres délicates requièrent cependant une loyauté absolue de ma marionnette. Mais cela s'obtient aisément..."
 decision_zantaka_coup_emelkyn_confirm: "Une fois encore, je m'élève au-dessus du reste."
 decision_zantaka_coup_emelkyn_effect_tt: "Vous vous emparerez du pouvoir à [GetTitleByKey('c_emelcyn').GetNameNoTier], reléguant votre époux marionnette au rang de simple vassal dans les marches extérieures."
 zantaka_ruler_must_be_spouse: "[GetTitleByKey('c_emelcyn').GetNameNoTier] doit être gouvernée par votre [spouse|e]"
 zantaka_ruler_must_be_lover: "Votre [spouse|e] gouverne [GetTitleByKey('c_emelcyn').GetNameNoTier] et est votre [lover|e]"
 zantaka_ruler_must_be_hooked: "Votre [spouse|e] gouverne [GetTitleByKey('c_emelcyn').GetNameNoTier] et est la cible d'une [strong_hook|e]"

 decision_subdue_murnak: "Soumettre Muraakan"
 decision_subdue_murnak_tooltip: "Soumettez la cité-État de [GetTitleByKey('c_murnak').GetNameNoTier] qui divise votre domaine en deux."
 decision_subdue_murnak_desc: "[GetTitleByKey('c_emelcyn').GetNameNoTier], et [GetTitleByKey('d_sylara').GetNameNoTier] de fait, sont miens. Pourtant, la mesquine cité de [GetTitleByKey('c_murnak').GetNameNoTier] ose rejeter mon autorité en tant que maîtresse légitime de tout l'est de [GetTitleByKey('k_lyneria').GetNameNoTier], proclamant avec fermeté son indépendance de mon royaume nouvellement fondé. Une telle résistance de la part de la cité qui ose scinder mes terres en deux est, naturellement, inacceptable. \n\nJe dois cependant rester prudente. La Ligue Lynérienne est censée protéger ses membres des aspirants hégémons et, bien qu'elle soit devenue en pratique un outil permettant aux grandes cités d'opprimer les moindres, elle s'opposerait assurément à mon ascension si l'occasion lui en était donnée. Même à présent, je ne puis espérer vaincre l'ensemble de [GetTitleByKey('k_lyneria').GetNameNoTier] seule. Je devrai donc dissimuler mes actions jusqu'à ce qu'il soit bien trop tard pour qu'une intervention importe."
 decision_subdue_murnak_confirm: "J'ai filé des mensonges bien moins crédibles..."
 decision_subdue_murnak_effect_tt: "Vous déciderez de la manière dont vous soumettrez [GetTitleByKey('c_murnak').GetNameNoTier]. \n#N Soyez prévenue, la Ligue n'acceptera aucune expansion supplémentaire sans combattre. Si vous échouez à soumettre [GetTitleByKey('c_murnak').GetNameNoTier], il y aura des conséquences.#!"

 decision_zantaka_end_trade_monopoly: "Écraser les Monopoles Oligarchiques"
 decision_zantaka_end_trade_monopoly_tooltip: "Mettez fin aux monopoles qui ont longtemps permis aux oligarques de votre domaine de prospérer au détriment des moins fortunés."
 decision_zantaka_end_trade_monopoly_desc: "Nombre des grandes familles de [GetTitleByKey('k_lyneria').GetNameNoTier] tirent leur richesse de vastes et puissants monopoles, leur contrôle absolu sur une partie du marché de leur cité les enrichissant considérablement. Ce système, peut-être intentionnellement, condamne ceux nés parmi les classes inférieures à demeurer sans la moindre opportunité, espérant au mieux gravir les échelons de quelque entreprise oligarchique pour obtenir une fraction de la richesse de leur maître. \n\nLe système des monopoles est profondément ancré dans la société lynérienne, mais que suis-je sinon celle qui brise ce système ? L'heure est venue de mettre fin à cette injustice, apportant de nouvelles opportunités à tous mes sujets."
 decision_zantaka_end_trade_monopoly_confirm: "Qu'il en soit fait ainsi par la loi."

 decision_zantaka_help_poor: "Élever les Masses"
 decision_zantaka_help_poor_tooltip: "Vous tenterez d'investir massivement dans l'amélioration de la vie des classes inférieures de votre domaine."
 decision_zantaka_help_poor_desc: "Aux yeux de beaucoup, il est tout simplement naturel que la plupart soient abandonnés par la société. Pour chaque riche marchand et artisan, il y a dix mendiants, bandits ou prostituées désespérés de survivre jusqu'au lendemain. Tels des parasites, les oligarques ont longtemps usé de leur richesse et pouvoir pour en accumuler toujours davantage, jusqu'à ce que tous hormis eux-mêmes soient écrasés sous le poids de leur règne. \n\nMon ascension a jeté cet ordre dans le chaos le plus total, cependant, car les oligarques se trouvent désormais confrontés à la preuve vivante de leurs injustices. En tant que messagère d'un nouvel ordre à [GetTitleByKey('k_lyneria').GetNameNoTier], l'heure est enfin venue de mettre un terme à cette oppression insensée de mes sujets."
 decision_zantaka_help_poor_confirm: "Les désespérés connaîtront l'espoir."
 decision_zantaka_help_poor_effect_tt: "Vous pourrez choisir entre tenter d'obtenir le modificateur [GetModifier('zantaka_peasant_investment').GetNameWithTooltip] ou le modificateur [GetModifier('zantaka_peasant_trade').GetNameWithTooltip]."

 decision_zantaka_faith_reform: "Abolir le Patriarcat Lynérien"
 decision_zantaka_faith_reform_tooltip: "Mettez fin au patriarcat historique qui a longtemps prévalu en Lynérie."
 decision_zantaka_faith_reform_desc: "Nous autres Lynériens pouvons nous enorgueillir de la nature méritocratique et équitable de nos cités, mais il est clair que cet idéal a depuis longtemps été abandonné dans les faits. Les injustices vont cependant au-delà de celles de richesse et de pouvoir. Les grands patriarches parmi l'oligarchie ont toujours détenu davantage de pouvoir que les rares femmes s'étant élevées dans leurs rangs. Génération après génération, ils ont usé de cet avantage pour consolider leur emprise sur la société. \n\nIl a longtemps été impensable qu'une femme puisse jamais véritablement accéder au pouvoir ouvertement, quels que soient son talent ou son mérite. Pourtant, cette norme, comme d'innombrables autres, a été brisée. Depuis ma position, il m'est peut-être enfin possible de mettre fin à ce rejet insensé des souveraines et aux abus du règne patriarcal."
 decision_zantaka_faith_reform_confirm: "Qui peut m'arrêter désormais ?"
 decision_zantaka_faith_reform_effect_tt: "Vous mettrez fin à l'antique tradition patriarcale de votre foi."
 zantaka_equal_armies: "Les femmes seront libres de servir comme soldats."

 decision_zantaka_end_oligarchy: "Mettre Fin au Règne Oligarchique"
 decision_zantaka_end_oligarchy_tooltip: "Mettez fin au système oligarchique historique qui a longtemps détenu le pouvoir à [GetTitleByKey('k_lyneria').GetNameNoTier] en faveur d'un règne méritocratique."
 decision_zantaka_end_oligarchy_desc: "Depuis bien trop longtemps, [GetTitleByKey('k_lyneria').GetNameNoTier] est gouvernée non par le mérite mais par la richesse : les conseils municipaux ne sont guère plus que des rassemblements d'élites riches ne cherchant qu'à accroître leur richesse obscène malgré leurs prétentions méritocratiques. Ces jours sont révolus ! L'heure est venue de mettre fin à ce système d'exploitation et d'instaurer un véritable règne méritocratique à [GetTitleByKey('k_lyneria').GetNameNoTier] ! \n\nLà où jadis les riches et influents pouvaient s'élever sans le moindre mérite, je ferai en sorte que seuls ceux véritablement dignes du pouvoir puissent le détenir. Mon peuple ne souffrira plus d'oligarques décadents et gras, guère mieux que des porcs ! Sous le sage gouvernement de mon nouvel ordre, tous seront enfin libres de prospérer."
 decision_zantaka_end_oligarchy_confirm: "Un nouvel ordre s'élève !"

 decision_zantaka_civil_war_prep: "Rassembler les Loyalistes Étrangers"
 decision_zantaka_civil_war_prep_tooltip: "Commencez les préparatifs pour contacter et vous allier avec des acteurs partageant vos vues à travers [GetTitleByKey('k_lyneria').GetNameNoTier]."
 decision_zantaka_civil_war_prep_desc: "Bien que je sois la première à avoir connu un réel succès dans le renversement de l'ancien ordre, d'autres, comme moi, souhaiteraient le voir s'effondrer. Dispersés à travers [GetTitleByKey('k_lyneria').GetNameNoTier], ils sont depuis longtemps déconnectés et désunis, loin du niveau d'organisation ou de pouvoir nécessaire pour apporter un changement véritable au sein de la Ligue. En eux réside un grand potentiel, mais leur pouvoir a longtemps été gaspillé et inutilisé : les grandes puissances n'ont d'autre intérêt envers eux que de les maintenir à terre. \n\nSi je parviens à rassembler ces renégats, hors-la-loi, réformateurs et roturiers, je pourrais bien être en mesure de me constituer une base de pouvoir assez grande pour mettre l'ancien ordre à genoux. Tout ce dont j'ai besoin, c'est d'or et de temps, le reste suivra assurément..."
 decision_zantaka_civil_war_prep_confirm: "Envoyer mes agents."
 decision_zantaka_civil_war_prep_effect_tt: "Dans 5 ans, vous pourrez déclencher une guerre pour vous placer au pouvoir sur [GetTitleByKey('k_lyneria').GetNameNoTier] et mettre fin à la Ligue."

 decision_zantaka_civil_war: "Apporter la Ruine à la Ligue"
 decision_zantaka_civil_war_tooltip: "Déclenchez une grande guerre pour renverser l'ordre régnant de [GetTitleByKey('k_lyneria').GetNameNoTier] et vous établir à sa place."
 decision_zantaka_civil_war_desc: "À travers [GetTitleByKey('k_lyneria').GetNameNoTier], j'ai rassemblé dans l'ombre de grandes forces dont la loyauté envers ma cause est incontestable. En secret, elles se sont entraînées et ont organisé leurs rangs, se préparant pour le jour où je déclarerais ouvertement ma guerre contre l'ordre pourri de la Ligue. \n\nMes réformes ont rendu mes terres plus riches et plus grandes que toutes autres et m'ont portée vers des sommets jamais atteints par aucun souverain au-delà des trois grandes cités. La Ligue demeure forte, cependant, et la guerre à venir sera assurément âprement disputée."
 decision_zantaka_civil_war_confirm: "Voici venir mon épreuve finale."
 decision_zantaka_civil_war_effect_tt: "#P En déclenchant votre guerre pour unifier [GetTitleByKey('k_lyneria').GetNameNoTier] sous votre règne, vous recevrez une armée de #italic #bold 6 000 hommes.#!#! #N La guerre sera menée contre la puissance combinée de toute la Ligue Lynérienne. Assurez-vous d'être prête avant de tenter ce coup de dés, il n'y aura pas de seconde chance.#!"
