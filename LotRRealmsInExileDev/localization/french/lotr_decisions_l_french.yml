 # Unify Harad
 decision_unify_harad: "Unifier les Royaumes de Harad"
 decision_unify_harad_tooltip: "Les Hauts Royaumes de [harad|E] peuvent être consolidés en un seul titre plus grand."
 decision_unify_harad_desc: "Trop longtemps, les [haradrim|E] ont vécu dispersés, brisés, simples pions dans des jeux plus grands ! Que ce soit [sauroncharacter|E] ou [numenor|E], nous avons été forcés de nous incliner devant des maîtres extérieurs. Plus maintenant ! Il est temps pour les fils de [harad|E] de mettre de côté leurs différences et de s'unir sous une seule bannière et un seul trône."
 decision_unify_harad_confirm: "Unis nous tenons bon !"
 
 # Add to the Realms of Harad
 decision_increase_harad: "Intégrer aux Royaumes du Harad"
 decision_increase_harad_tooltip: "Intégrer l'un des royaumes perdus du Harad à votre royaume"
 decision_increase_harad_desc: "Les terres [harad|El], qu'elles soient peuplées de ses fils ou d'habitants d'origines étrangères, appartiennent au Grand Royaume [haradrim|El]."
 decision_increase_harad_confirm: "Qu'il en soit ainsi."
