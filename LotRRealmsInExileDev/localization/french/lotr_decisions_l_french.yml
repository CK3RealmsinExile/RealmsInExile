 #### Rhudaur Hillmen Decisions ####
 ###################################
 
 # Restore Hillmen Kingdom of Rhudaur
 decision_restore_hillmen_rhudaur: "Restaurer le Royaume des Hommes des Collines de Rhudaur"
 decision_restore_hillmen_rhudaur_tooltip: "Le temps de restaurer le Royaume de Rhudaur par ses seigneurs légitimes est venu !"
 decision_hillmen_new_tradition: "L'accès aux forges de Cameth Brin permet une nouvelle armée formelle"
 decision_restore_hillmen_rhudaur_desc: "Trop longtemps le peuple Noi Trevan a vécu dispersé, se cachant dans les collines au nord de notre royaume autrefois glorieux. Plus maintenant ! Il est temps pour les fils de Rhudaur de se lever et de retrouver leur gloire d'antan sous une seule bannière et un seul Roi !"
 decision_restore_hillmen_rhudaur_confirm: "Pour le peuple Noi Trevan !"
 
 # Hwaldar's Succession - Secure Strong Heir
 decision_affirm_rhudaur_succession: "Sécuriser l'Héritage de Rhudaur"
 decision_affirm_rhudaur_succession_desc: "J'ai gagné mon royaume par la force des armes et la volonté de maintenir son peuple indiscipliné uni. Je suis le Chef des Chefs - et mon héritier sera forgé en un successeur digne ! \n\nSi cela n'est pas fait, mon royaume se brisera sûrement quand je ne serai plus !"
 decision_affirm_rhudaur_succession_tooltip: "Je vais sécuriser ma succession en ayant un héritier fort et capable."
 decision_affirm_rhudaur_succession_confirm: "Hommes des Collines, contemplez votre futur souverain !"
 decision_affirm_rhudaur_succession_success: "Vous empêcherez votre royaume de se briser à votre mort."
 player_heir_prowess: "Votre [player_heir|El] a une [prowess_i|E] de base de 7 ou plus"
 player_heir_martial: "Votre [player_heir|El] a un [martial_i|E] de base de 7 ou plus"
 player_heir_diplomacy: "Votre [player_heir|El] a une [diplomacy_i|E] de base de 5 ou plus"
 
 # Follow the Cult of the Winter King 
 decision_worship_witchking: "Commencer à vénérer le Roi d'Hiver"
 decision_worship_witchking_desc: "De nombreux hommes des collines ont commencé à suivre un culte qui semble provenir d'[angmar|E] - le Culte du Roi d'Hiver. Il est clair que la cible de leur vénération n'est autre que le [witchkingshort|E], le Seigneur de la Couronne de Fer, un puissant Roi-Sorcier. \n\nSuivre son culte pourrait s'avérer avantageux dans les guerres à venir..."
 decision_worship_witchking_tooltip: "Vous convertirez vos tribus au Culte du Roi d'Hiver."
 decision_worship_witchking_confirm: "Nous servons le Roi d'Hiver !"

 ########################
 #### Donan Decisions ####
 #########################
 
 donan_military: "Essor des Donan"
 donan_military_desc: "Les Donan connaissent enfin leur résurgence, et [ROOT.Char.GetNameNoTierNoTooltip] se tient à leur tête."


 #Donan Eastern Kingdom
 decision_create_eastern_donan_kingdom: "Établir Kobahdonath"
 decision_create_eastern_donan_tooltip: "Créer un royaume voué à Kobah"
 decision_create_eastern_donan_desc: "Depuis notre arrivée à Harondor, notre peuple a été sur la défensive, s'accrochant à nos foyers dans les montagnes reculées à côté de l'Ombre. Mais plus maintenant. Grâce aux conseils donnés par l'Ancien Dieu de la Montagne, notre peuple s'est efforcé de revendiquer les terres qui, de toute évidence, nous reviennent de droit. Et pour son soutien, nous nommerons notre royaume d'après lui : Kobahdonath."
 decision_create_eastern_donan_confirm: "La Volonté de Kobah"
 donan_formation_eastern_drift_tooltip: "Si entièrement contrôlés, les duchés de Hingren, Amrun et Huk Saromis deviendront également une partie de jure du royaume"
 
 #Donan Western Kingdom
 decision_create_western_donan_kingdom: "Établir Kazidonath"
 decision_create_western_donan_tooltip: "Créer un royaume voué à Kaz"
 decision_create_western_donan_desc: "Depuis notre arrivée à Harondor, notre peuple a été sur la défensive, s'accrochant à nos villages reculés dans les collines et vallées balayées par le vent. Mais plus maintenant. Grâce aux conseils donnés par le Seigneur du Ciel Ouvert, notre peuple s'est efforcé de revendiquer les terres qui, de toute évidence, nous reviennent de droit. Et pour son soutien, nous nommerons notre royaume d'après lui : Kazidonath"
 decision_create_western_donan_confirm: "La Volonté de Kaz"
 
 #Donan Empire
 donan_formation_western_drift_tooltip: "Si entièrement contrôlés, les duchés d'Annun et de Doriant deviendront également une partie de jure du royaume"
 decision_create_donan_empire: "Établir le Grand Royaume de Beldonath"
 decision_create_donan_empire_tooltip: "Créer un royaume dévoué aux deux Bels"
 decision_create_donan_empire_desc: "Autrefois, notre peuple avait été conduit au bord de l'extinction. Des millénaires de lutte entre les [realms_in_exile|E], l'Ombre et le peuple de [harad|E] nous ont cependant rendus, si rien d'autre, résilients. Maintenant que nos parents dans les Montagnes, les Collines et même poussés jusqu'aux confins de l'Ithilien ont été unis, nous pouvons enfin ressentir du soulagement. Nous sommes unis et en sécurité, et tout cela est selon la volonté des Grands Bels."
 decision_create_donan_empire_confirm: "Les Grands Bels l'ont voulu ainsi"
 donan_formation_empire_drift_tooltip: "Tous les duchés précédents qui auraient pu être ajoutés à Kobahdonath ou Keldonath et ne l'ont pas été seront ajoutés, aux côtés des duchés d'Aegardh, Laergaladrin et Eredir étant ajoutés à Kazidonath"
 
 ###########################
 ##### Daen Decisions ######
 ###########################
 
 # Eredrim Kingdom 
 decision_eredrim_kingdom: "Unir les Eredrim"
 decision_eredrim_tooltip: "Créer un royaume pour les Eredrim"
 decision_eredrim_desc: "Le peuple des montagnes a longtemps été désuni, éclaté en clans rivaux. Cependant, un grand chef, fort comme les montagnes qui l'ont vu naître, pourrait encore réussir à les rassembler. Sous un tel puissant chef, nous atteindrions des sommets jamais vus depuis le [secondage|E], peut-être même reconquérir nos anciennes demeures !"
 decision_eredrim_confirm: "Venez, mes enfants !"

 #Eredrim Lefnui Expansion
 decision_eredrim_expansion_lefnui: "Expansion le Long du Lefnui"
 decision_eredrim_expansion_lefnui_tooltip: "S'étendre le long de la Rivière Lefnui"
 decision_eredrim_expansion_lefnui_desc: "Dans nos chants anciens, les rivières sont nées de leurs mères, les crêtes montagneuses, et coulent vers leur père, le vaste et large océan. De ces mêmes sommets jusqu'au bord de la mer, notre peuple est venu, et maintenant tous les peuples du Lefnui se joignent à notre royaume. Cette rivière qui sculpte les falaises et arrose les champs nourrira nos récoltes et fera grandir notre peuple !"
 decision_eredrim_expansion_lefnui_confirm: "La rivière est notre cœur."

 #Eredrim Druwaith Expansion
 decision_eredrim_expansion_druwaith: "Intégrer Drúwaith"
 decision_eredrim_expansion_druwaith_tooltip: "S'étendre à travers les Montagnes"
 decision_eredrim_expansion_druwaith_desc: "Longtemps nous avons vécu dans l'ombre des Montagnes Blanches, et notre peuple s'est répandu à travers elles, au nord et au sud. Maintenant que nous avons uni les clans des vallées méridionales, nous devons nous tourner vers le nord vers la terre des Pukel, où vivent nos frères septentrionaux parmi les Woses des Bois. Nous les accueillerons dans notre royaume, car les collines ne nous divisent pas, nous les fils et les filles des montagnes."
 decision_eredrim_expansion_druwaith_confirm: "Les montagnes sont notre abri."

 #Eredrim Erech Expansion
 decision_eredrim_expansion_erech: "Reconquérir Erech"
 decision_eredrim_expansion_erech_tooltip: "S'étendre vers nos terres ancestrales"
 decision_eredrim_expansion_erech_desc: "Il y a longtemps, le Roi venu de l'Ouest a vaincu le Roi des Montagnes, repoussant leur peuple et les maudissant d'une mort éternelle. Depuis lors, l'ancien sanctuaire d'Erech est resté sous contrôle gondorien. Maintenant, enfin, le Peuple de la Montagne est de retour ! Nous allons réhabiter ces terres où autrefois marchaient les Morts, et maudire les [gondorians|E] à leur tour. Ces collines seront de nouveau notre foyer, et Erech notre forteresse et frontière."
 decision_eredrim_expansion_erech_confirm: "Les collines sont notre foyer."
 
 #Daen Coentis Empire
 decision_daen_coentis_empire: "Reconquérir les Montagnes"
 decision_daen_coentis_empire_tooltip: "Établir un Empire Daen le long des Montagnes Blanches"
 decision_daen_coentis_empire_desc: "Dans les jours anciens, les Hommes des Montagnes régnaient sur tous les contreforts des [erednimrais|E], sûrs et fiers. Mais alors les [dunedain|E] envahisseurs sont arrivés, et notre peuple a été vaincu, forcé vers l'ouest et oublié.\n\n Maintenant nous nous sommes relevés à nouveau, et les [dunedain|E] ont fui devant nos visages, et nous contrôlons à nouveau les terres ancestrales de notre peuple. Cette fois, nous ne serons pas déplacés, et notre peuple durera aussi longtemps que ces montagnes."
 decision_daen_coentis_empire_confirm: "Nous n'avons besoin d'aucun ami autre que les montagnes."

