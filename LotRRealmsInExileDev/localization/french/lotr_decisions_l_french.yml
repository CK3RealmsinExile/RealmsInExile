 decision_employ_mud_masons: "Employer des Maçons de Terre"
 decision_employ_mud_masons_tooltip: "Les [mud_masons|E] de notre [realm|El] peuvent nous aider avec des projets de construction"
 decision_employ_mud_masons_desc: "Le peuple [GetPlayer.GetCulture.GetName] a une longue tradition de [mud_masonry|E]. Je peux, et devrais, faire appel à la guilde des [mud_masons|E] dans mon royaume pour m'assister dans divers projets de construction. Leurs connaissances architecturales et spirituelles garantiront que nos bâtiments résistent à l'épreuve du temps !"
 decision_employ_mud_masons_desc_not_culture: "Certains habitants de mon [realm|El] sont issus d'une [culture|El] avec une longue tradition de [mud_masonry|E]. Je peux, et devrais, faire appel à leur guilde de [mud_masons|E] pour m'assister dans divers projets de construction. Leurs connaissances architecturales et spirituelles garantiront que nos bâtiments résistent à l'épreuve du temps !"
