 decision_strengthen_mordor_defences: "Renforcer les Fortifications"
 decision_strengthen_mordor_defences_tooltip: "Fortifier les défenses aux principales entrées du [mordor|E]."
 decision_strengthen_mordor_defences_desc: "Les Montagnes de l'Ombre et les Montagnes de Cendre forment une barrière naturelle qui protège le [mordor|E] contre toute attaque venant de notre ouest ou nord. Mais il existe deux entrées qui permettent aux envahisseurs de contourner les chaînes montagneuses infranchissables : les cols de Cirith Gorgor et Cirith Ungol.\n\nAfin d'assurer la sécurité du Mordor contre toute attaque du [gondor|E] ou de ses alliés nordiques, nous devons construire ou refaire les fortifications à la Porte Noire et à Minas Morgul."
