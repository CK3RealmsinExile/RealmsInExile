 decision_join_gondor_liberation: "Rejoindre la Libération du Gondor"
 decision_join_gondor_liberation_desc: "Les Hommes du [gondor|E] se sont levés contre les marées des ténèbres, déterminés à libérer leurs terres des ombres du [mordor|E].\n\nComme leur cause est noble, je pourrais décider de les rejoindre dans cette guerre de libération."
 decision_join_gondor_liberation_confirm: "Au Gondor! Au Gondor!"
 decision_join_gondor_liberation_tooltip: "Rejoindre la guerre pour la libération du Gondor"
