 decision_investigate_brants_murder_tt: "Vous partez en quête de réponses"
 
 decision_convince_dunmen_chieftain: "Convaincre le Chef Dunlandais"
 decision_convince_dunmen_chieftain_desc: "Il me faut convaincre ce chef de rejoindre notre cause."
 decision_convince_dunmen_chieftain_tooltip: "Voyager jusqu'à un chef et lui parler."
