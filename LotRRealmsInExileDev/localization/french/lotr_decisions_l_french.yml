 decision_wulf_conversion: "Une Question de Foi"
 decision_wulf_conversion_tooltip: "Embrasser l'une des religions prédominantes du Dunland lors d'un grand rituel de conversion publique, ou réaffirmer votre engagement envers les croyances des Rohirrim."
 decision_wulf_conversion_desc: "Les eaux de Loch Thiar miroitent sous le clair de lune, un site sacré où les esprits du Dunland sont réputés demeurer. Bien que je détienne maintenant ce lieu, le peuple me voit encore comme un étranger, mes coutumes étrangères et étranges. Si je dois les mener, un acte public de dévotion pourrait changer leurs cœurs — les rendant plus sympathiques à ma cause et prouvant que mon allégeance est avec eux, non avec leurs ennemis séculaires, les Rohirrim.\n\nPourtant, une telle démarche comporte des risques. Embrasser leurs coutumes pourrait aliéner les seigneurs du Rohan, rendant plus difficile de gagner leur soutien pour ma revendication au trône. C'est un pari qui pourrait façonner mon chemin vers le pouvoir - ou l'entraver."
 decision_wulf_conversion_confirm: "Voyager à Loch Thiar"
 convert_to_turthalis: "Embrasser le seigneur des brumes, #V [GetFaithByKey('faith_dunlending_turthalis').GetName]#!"
 convert_to_turthalis_tooltip: "La foi de [GetFaithByKey('faith_dunlending_turthalis').GetName] honore l'esprit des brumes, une présence guide vénérée par les Dunlendings du nord. Ses fidèles valorisent l'hospitalité, la diplomatie et l'unité, croyant que Tûrthalis apporte la clarté à ceux qui sont perdus dans le brouillard.\n\n#P En embrassant cette foi, je pourrais gagner la confiance des clans du nord, et chercher à sécuriser des alliances par la paix et la négociation.#!\n\n#N Cependant, son accent sur la médiation et la retenue pourrait aliéner les guerriers du sud à la frontière du Rohan qui aspirent à l'action, et entretiennent de longues rancunes contre leurs ennemis : les Rohirrim.#!"
 convert_to_turthalis_desc: "$convert_to_turthalis_tooltip$"
 convert_to_khrabnazerh: "Embrasser le seigneur des tempêtes, #V [GetFaithByKey('faith_dunlending_khrabnazerh').GetName]#!"
 convert_to_khrabnazerh_tooltip: "Les fidèles de [GetFaithByKey('faith_dunlending_khrabnazerh').GetName] vénèrent l'esprit corvidé des tempêtes montagnardes, une force de vengeance et de gloire révérée par les Dunlendings du sud. Ils sont féroces et inflexibles, valorisant la force, la guerre et le règlement des vieilles querelles.\n\n#P En embrassant Khrabnazarh, je pourrais rallier les guerriers du Dunland, forgeant une armée animée par une fureur et un but communs.#!\n\n#N Pourtant, ce choix risque d'approfondir les divisions avec les clans plus modérés du nord et d'aliéner complètement les Rohirrim, me faisant passer pour un porteur de guerre plutôt qu'un unificateur.#!"
 convert_to_khrabnazerh_desc: "$convert_to_khrabnazerh_tooltip$"
 retain_rohirric_faith: "Renouveler ma foi #V [GetFaithByKey('faith_rohirric').GetName]#!"
 retain_rohirric_faith_tooltip: "Les anciens dieux [GetFaithByKey('faith_rohirric').GetName] de [bemacharacter|E] et [foldewyncharacter|E], représentent la chasse sauvage et l'abondance de la terre.\n\n#P Bien que les Dunlendings rejettent cette foi comme étrangère, ma dévotion continue envers elle pourrait renforcer ma revendication parmi les seigneurs Rohirrim qui seraient mes vassaux et montrer mon intention de récupérer mon droit du sang perdu.#!\n\n#N Cependant, cette voie est susceptible de me gagner peu d'amis parmi les Dunlendings, les laissant sceptiques quant à ma véritable allégeance, affaiblissant potentiellement leur soutien et me laissant isolé dans les terres que je cherche à diriger.#!"
 retain_rohirric_faith_desc: "$retain_rohirric_faith_tooltip$"
 you_keep_your_rohirric_faith: "Vous conservez votre [faith|El] [GetFaithByKey('faith_rohirric').GetName]"
 decision_wulf_conversion.you_may_make_a_friend: "Vous pourriez vous faire un [friend|El]"
 your_liege_has_dunfearnshaws: "[GetTitleByKey('c_dunfearnshaws').GetNameNoTier] est dans le [realm|El] de votre [top_liege_possessive|E]"

 decision_wulf_marriage_pursuing_goal: "Vous poursuivez déjà une autre opportunité de mariage."

 decision_wulf_declare_war_for_rohan: "Envahir le Rohan"
 decision_wulf_declare_war_for_rohan_tooltip: "Envahir le Rohan pour revendiquer son trône et chercher vengeance pour la mort de votre père aux mains de Helm."
 decision_wulf_declare_war_for_rohan_desc: "Des années d'exil et de lutte m'ont conduit à ce moment. Des ombres de la défaite, j'ai forgé la force - unissant les clans du Dunland sous une seule bannière et cherchant des alliés là où il n'y avait autrefois que de l'inimitié. Le temps est venu de rembourser la dette de sang due par la maison d'Eorl.\n\nJ'ai vu la souffrance des Dunlendings, un peuple écrasé sous la botte des Rohirrim depuis des générations. Leur sort est le mien, leurs blessures aussi vives que celles que je porte. Cette guerre n'est pas seulement pour la vengeance, elle est pour la justice, pour mettre fin à leur douleur et à la mienne.\n\nMes alliés sont prêts, mes armées impatientes, et la volonté du Dunland aussi tranchante que n'importe quelle lame. Le Riddermark tombera, et je prendrai sa couronne - non comme son oppresseur, mais comme son souverain légitime."
 decision_wulf_declare_war_for_rohan_confirm: "« Pas de pitié ! Pas de reddition ! »"
 wulf_rohan_claim_cb: "Vengeance"

 decision_wulf_gather_oathsworn_warriors: "Le Serment des Serments"
 decision_wulf_gather_oathsworn_warriors_tooltip: "Envahir le Rohan pour revendiquer son trône et chercher vengeance pour la mort de votre père aux mains de Helm."
 decision_wulf_gather_oathsworn_warriors_desc: "Le moment approche pour affronter le Rohan, mais la loyauté doit être scellée dans le sang et la pierre. Les Uchoryow du Dunland seront convoqués aux anciennes pierres runiques, où les exploits de leurs ancêtres sont gravés dans le passé, et les anciens dieux de la nature observent en silence.\n\nLà, ils jureront sur l'honneur de leurs ancêtres, promettant leurs guerriers à ma cause et vouant une vendetta contre la maison d'Eorl. Bien que je sois un étranger, ce serment les lie à moi comme ils se lient eux-mêmes à leur haine partagée du Rohan.\n\nLes pierres se tiendront comme témoins des vœux prononcés ce jour, tout comme les esprits de leurs ancêtres, et les dieux qui demeurent dans les montagnes et le vent."
 decision_wulf_gather_oathsworn_warriors_confirm: "Que les pierres en soient témoins."
 decision_wulf_gather_oathsworn_warriors_effects1: "[GetTitleByKey('d_dunlandfells').GetHolder.GetTitledFirstName] vous accordera un nombre de [GetMaA('dunlending_huscarl').GetName] basé sur l'opinion de [GetTitleByKey('d_dunlandfells').GetHolder.GetHerHis] envers vous."
 decision_wulf_gather_oathsworn_warriors_effects2: "[GetTitleByKey('d_dunfearan').GetHolder.GetTitledFirstName] vous accordera un nombre de [GetMaA('dunlending_axe_hunters').GetName] basé sur l'opinion de [GetTitleByKey('d_dunfearan').GetHolder.GetHerHis] envers vous."
 decision_wulf_gather_oathsworn_warriors_effects3: "[GetTitleByKey('d_dathabha').GetHolder.GetTitledFirstName] vous accordera un nombre de [GetMaA('dunlending_outriders').GetName] basé sur l'opinion de [GetTitleByKey('d_dathabha').GetHolder.GetHerHis] envers vous."
 is_daen_lintis: "Partage un [heritage|E] [cultural|E] avec les Dunlendings"

 decision_wulf_affirm_descent_from_freawine: "Affirmer la Descendance de Fréawine"
 decision_wulf_affirm_descent_from_freawine_tooltip: "Confirmer une fois pour toutes que les Frecalings descendent de la Lignée Royale d'Eorl."
 decision_wulf_affirm_descent_from_freawine_desc: "Pendant des années, ma maison a proclamé ce que les sceptiques et les détracteurs refusent d'accepter : que [GetScriptedCharacterByHistoryID( 'lineprefreca2' ).GetFirstName], le fondateur de notre lignée, était le fils bâtard de [GetScriptedCharacterByHistoryID( 'lineofeorl6' ).GetFirstName], le cinquième roi du Rohan. Le sang de [GetScriptedCharacterByHistoryID( 'lineofeorl1' ).GetFirstName] coule dans mes veines aussi sûrement qu'il coulait dans les siennes, bien que les fiers et arrogants l'aient longtemps nié.\n\nMaintenant, avec le trône de [GetTitleByKey('k_rohan').GetNameNoTier] sous moi et les [ROOT.Char.GetHouse.GetName]#L s#! ascendants, j'ai le pouvoir de rétablir la vérité. Je le décréterai comme vérité, liant le nom de Freca à la lignée royale pour tous les temps."
 decision_wulf_affirm_descent_from_freawine_confirm: "Que ceux qui nous ont douté s'étouffent avec leur fierté."
 you_are_illustrious: "Votre [prestige_level|E] est au moins @prestige_level_3_icon! [GetModifier( 'prestige_level_3' ).GetNameWithTooltip|L]"
 your_dynasty_is_illustrious: "Votre [dynasty_prestige_level|E] est au moins @dynasty_prestige_icon! #V [dynasty_prestige_level_3|L]#!"
 decision_wulf_affirm_descent_from_freawine_effects1: "Vous pouvez convertir tous les membres de la [dynasty|El] [GetScriptedCharacterByHistoryID( 'lineprefreca2' ).GetDynasty.GetName] à la [dynasty|El] [GetScriptedCharacterByHistoryID( 'lineofeorl1' ).GetDynasty.GetName]"
 decision_wulf_affirm_descent_from_freawine_effects2: "Ou vous pouvez garder la [dynasty|El] [GetScriptedCharacterByHistoryID( 'lineprefreca2' ).GetDynasty.GetName] et gagner @dynasty_prestige_icon! #P 500#! [dynasty_prestige|E]"

 decision_invite_saruman_to_isengard: "Accorder les Clés d'Isengard à Saruman"
 decision_invite_saruman_to_isengard_tooltip: "Vous conférez l'intendance de la tour d'Orthanc à Saruman le Blanc."
 decision_invite_saruman_to_isengard_desc: "Le [GetBuilding('wonder_angrenost_01').GetName] se dresse comme une sentinelle au cœur de [GetTitleByKey('c_isengard').GetNameNoTier], sa pierre noire s'élevant haut au-dessus de l'anneau de montagnes environnant. Autrefois fier bastion de [GetTitleByKey('e_gondor').GetNameNoTier], sa gloire s'est estompée, son but perdu dans le temps. Maintenant, une nouvelle opportunité se présente - une qui pourrait restaurer Isengard à sa grandeur.\n\n[GetScriptedCharacterByHistoryID( 'lineofsaruman' ).GetFirstNameNicknamed], le plus érudit des [istariconcept|E], a exprimé son désir de faire d'[orthanc|E] son siège de pouvoir. Sa connaissance du savoir ancien et sa maîtrise de l'art pourraient transformer l'ancienne forteresse en un phare de force et de sagesse pour l'[west|E].\n\nEn accordant à Saruman le contrôle d'Isengard, vous gagneriez la faveur de l'un des [thewise|E] et forgeriez un lien avec une figure d'immense influence."
 decision_invite_saruman_to_isengard_confirm: "Que ceux qui nous ont douté s'étouffent avec leur fierté."

