 decision_network_with_trans_haradric_merchants_desc: "De nombreux marchands voyagent le long des routes commerciales de la Mer des Dunes dans nos territoires, nous devrions donc prendre le temps de tisser des liens avec eux. Construire des relations fructueuses avec des marchands [Concept('haradrim', 'Haradron')|E] intéressés et ambitieux peut nous être mutuellement bénéfique."
