 CHOOSE_TAYEE_FAITH: "Sélectionner un nouveau Patron"
 choose_new_tayee_patron_loose_access: "@warning_icon! #X Cette nouvelle foi n'a pas accès à la décision #V Choisir un nouveau patron Tayee#! !#!"
 decision_choose_new_tayee_patron_desc: "Mon ancien patron ne convient plus à la situation dans laquelle je me trouve. Le Tarat Balazayn enseigne que tous les dieux promettent l'entrée dans l'au-delà à leurs serviteurs, s'ils suivent fidèlement leurs commandements. Ma nouvelle foi sera sûrement une meilleure façon d'assurer l'avenir de mon âme ! Il est temps de changer."
 fervor_gain_sirayn_fervor: "Choisi par un dirigeant comme son patron"
 decision_choose_new_tayee_patron_confirm: "Affirmer ma dévotion"

 restore_ardacheran_hegemony_decision: "Restaurer l'Hégémonie Ardâchérane"
 restore_ardacheran_hegemony_decision_desc: "Sous le règne de la dynastie Ardâchérane, l'influence de Khy atteignit son apogée. Gouvernant directement les côtes de la Baie d'Ormal jusqu'à Côdya et Lyneria, cet âge d'or de près de trois cents ans vit le plus grand essor de l'art, de la science et de la culture khyanes de l'histoire. Des souverains étrangers envoyaient émissaires, marchands et captifs à la cour impériale de Chajapûn.\n\nAvec nos succès récents, certains nous qualifient d'héritiers de l'héritage ardâchéran, restaurateurs de la place légitime de Khy comme phare de civilisation et de lumière. Peut-être pourrons-nous, avec le temps, transformer cette position en une légitimité durable sur toute la baie."
 restore_ardacheran_hegemony_decision_tooltip: "Restaurer l'Hégémonie Ardâchérane"
 restore_ardacheran_hegemony_decision_confirm: "Nous sommes la lumière des Hommes, les hérauts d'Arien."

 decision_khy_dynastic_mausoleum: "Construire un Grand Mausolée"
 decision_khy_dynastic_mausoleum_desc: "Notre dynastie est devenue l'une des grandes dynasties de [GetTitleByKey('e_khy').GetNameNoTier]. Il est temps de consolider ce fait en bâtissant un Grand Mausolée pour célébrer nos ancêtres et ancrer notre place dans l'histoire."
 decision_khy_dynastic_mausoleum_tooltip: "Construire un Grand Mausolée"
 decision_khy_dynastic_mausoleum_confirm: "Faites venir les architectes"

 decision_bulchyades_marches: "Établir les Marches Bulchyades"
 decision_bulchyades_marches_desc: "Les centres de pouvoir de Khy ont toujours été les vallées centrales et les cités côtières des Bulchyades. Entre les deux s'étend une terre vallonnée, longtemps disputée et souvent théâtre de conflits. Jadis, le Râshanashân a établi la région comme une domination indépendante, distincte de ses voisines, confiée à l'un de ses serviteurs de confiance."
 decision_bulchyades_marches_desc.vassal: "\n\nMaintenant que je me suis imposé comme la seule puissance de la région, ne pourrais-je pas moi aussi revendiquer ce titre de puissant Râshana ?"
 decision_bulchyades_marches_tooltip: "Vous établirez une nouvelle domination dans l'intérieur des Bulchyades"
 decision_bulchyades_marches_confirm: "De la discorde, la stabilité"

 decision_radyani_vengeance: "Venger Yóm contre Arien"
 decision_radyani_vengeance_desc: "Le temps est venu de chasser les adeptes de la déesse du Soleil, Arien. Plus jamais son regard orgueilleux ne se posera sur Sîrayn ! Plus jamais nous ne tolérerons ses enseignements hérétiques ! Plus jamais la sagesse de Yóm ne sera rejetée ! À la guerre !"
 decision_radyani_vengeance_tooltip: "Mener une guerre sainte contre tous les Arienistes en Sîrayn"
 decision_radyani_vengeance_confirm: "Pas un seul adorateur du Soleil ne restera !"
 RADYANI_WAR_TARGET_EXISTS: "Au moins un [ruler|El] en [GetTitleByKey('e_sirayn').GetNameNoTier] est Arieniste"
 RADYANI_ARIENISTS_RALLY: "Tous les adeptes d'Arien en Sîrayn s'uniront contre vous"

 decision_radyani_avatar: "Devenir l'Avatar de Yóm"
 decision_radyani_avatar_desc: "Depuis ma naissance, j'ai ressenti la guidance de la Donneuse de Rêves comme une douce voix à mon oreille, me menant sur la voie de la justice et de la vengeance contre ceux qui m'ont offensé. Yóm me protège. Yóm veille sur moi. Quand je la sens bouger, je bouge aussi. D'une certaine façon... elle fait partie de moi, et je suis devenue l'incarnation de sa volonté. Il est temps que tous le sachent."
 decision_radyani_avatar_tooltip: "Proclamer votre statut d'Avatar de Yóm"
 decision_radyani_avatar_confirm: "Douce lumière de la lune, guide mes pas."

 decision_secure_sirayn: "Sécuriser $e_sirayn$"
 decision_secure_sirayn_desc: "Trop longtemps des souverains étrangers ont apporté leurs croyances et traditions sur cette terre, mais cela suffit ! Nous avons chassé les derniers de ces dirigeants étrangers, et il est temps de purifier $e_sirayn$ de leurs influences néfastes. Notre terre prospérera à nouveau, ne faisant confiance qu'à nos propres dieux et ne suivant que nos propres traditions, comme nous l'avons fait depuis des âges !"
 decision_secure_sirayn_tooltip: "Vous chassez les croyances étrangères de $e_sirayn$ dans une vague de ferveur religieuse."
 decision_secure_sirayn_confirm: "Dehors, dehors !"
 decision_secure_sirayn_trigger_tt: "Il n'y a aucun dirigeant [faith_evil|El] d'une [faith|El] non-Tayee dans [GetTitleByKey('e_sirayn').GetNameNoTier]"
 decision_secure_sirayn_effect_tt: "Vous convertissez un certain nombre de [counties|El] à votre [faith|El], selon votre [fervor|E]."
 fervor_greater_than_50: "Votre [faith|El] a plus de 50 de [fervor|E]"

 decision_destroy_arienism: "Frapper au Cœur d'Arien"
 decision_destroy_arienism_desc: "Au nord se trouve le royaume de Khy, source de tout l'Arienisme. Si nous voulons briser à jamais cette foi maudite, nous devons vaincre les plus puissants défenseurs d'Arien. Rassemblons nos forces et chassons ces adorateurs du Soleil, jusqu'à ce que le cœur même d'Arien soit mis à nu. J'y plongerai ma lame et mettrai fin à son joug pour toujours !"
 decision_destroy_arienism_tooltip: "Éliminer la foi arieniste une bonne fois pour toutes"
 decision_destroy_arienism_confirm: "Pas un seul adorateur du Soleil ne restera !"
 destroy_arienism_effect_tooltip: "Vous démantelez toutes les structures de l'Arienisme"
 fervor_greater_than_70: "Votre [faith|El] a plus de 70 de [fervor|E]"
 
 decision_avatar_of_x_deity: "Devenir l'Avatar [ROOT.Char.GetFaith.HighGodNamePossessive]"
 decision_avatar_of_x_deity_desc: "Il n'existe nul dévot [ROOT.Char.GetFaith.HighGodNamePossessive] plus fervent et dévoué que moi. Je deviendrai l'incarnation [ROOT.Char.GetFaith.HighGodNamePossessive] aux yeux de tous !"
 decision_avatar_of_x_deity_tooltip: "Vous vous consacrez entièrement [ROOT.Char.GetFaith.HighGodName2]."
 decision_avatar_of_x_deity_confirm: "Que cela soit su."

 decision_reign_of_the_avatar: "Établir le Règne Divin"
 decision_reign_of_the_avatar_desc: "L'heure est venue pour le royaume de s'enraciner dans la vénération [ROOT.Char.GetFaith.HighGodNamePossessive] et de [ROOT.Char.GetFaith.HighGodHerHis|U] avatar qui marche sur cette terre. Tous adoreront et révéreront [ROOT.Char.GetFaith.HighGodName] incarné !"
 decision_reign_of_the_avatar_tooltip: "Réformez votre [realm|El] en Gouvernement Mandala"
 decision_reign_of_the_avatar_confirm: "[ROOT.Char.GetFaith.HighGodName] régnera."

 decision_visit_ormalian_port: "Visiter un Port de la Baie"
 decision_visit_ormalian_port_desc: "Si je veux retrouver la carte au trésor que je cherche, je dois explorer toute la Baie d'Ormal. Les principaux ports seront de bons points de départ pour mes recherches. Je devrais tous les visiter et voir si je peux retrouver la piste du trésor de PLACEHOLDER !"
 decision_visit_ormalian_port_tooltip: "Chercher des indices sur le trésor de PLACEHOLDER"
 decision_visit_ormalian_port_second_step: "Prendre ce que l'on peut obtenir..."
 decision_visit_ormalian_port_confirm: "...et ne rien rendre en retour !"
 decision_visit_ormalian_port_tt: "Une liste de ports à visiter vous sera proposée"
 decision_visit_ormalian_port.tt.tul_harar: "[GetTitleByKey('c_tul_harar').GetNameNoTier]"
 decision_visit_ormalian_port.tt.tul_harar_desc: "#T #V [GetTitleByKey('c_tul_harar').GetNameNoTier]#! #!\n\nPorte d'entrée du cœur fluvial de Sîrayn, Tûl Harar contrôle le flux des marchandises sur la Sîresha. Puisque la plupart du commerce intérieur de Sîrayn est géré ici, il y a de bonnes chances d'y trouver des indices sur le trésor."
 decision_visit_ormalian_port_tul_harar_tooltip: "#T #V [GetTitleByKey('c_tul_harar').GetNameNoTier]#! #!\n\nPorte d'entrée du cœur fluvial de Sîrayn, Tûl Harar contrôle le flux des marchandises sur la Sîresha. Puisque la plupart du commerce intérieur de Sîrayn est géré ici, il y a de bonnes chances d'y trouver des indices sur le trésor."
 decision_visit_ormalian_port.tt.pyrador: "[GetTitleByKey('c_pyrador').GetNameNoTier]"
 decision_visit_ormalian_port.tt.pyrador_desc: "#T #V [GetTitleByKey('c_pyrador').GetNameNoTier]#! #!\n\nPyrador commande l'embouchure du Núar et contrôle le poumon vital d'Harshandatt. Avec ses bibliothèques, marchés et anciens quais, de nombreuses opportunités peuvent s'y présenter."
 decision_visit_ormalian_port_pyrador_tooltip: "#T #V [GetTitleByKey('c_pyrador').GetNameNoTier]#! #!\n\nPyrador commande l'embouchure du Núar et contrôle le poumon vital d'Harshandatt. Avec ses bibliothèques, marchés et anciens quais, de nombreuses opportunités peuvent s'y présenter."
 decision_visit_ormalian_port.tt.mejha: "[GetTitleByKey('c_mejha').GetNameNoTier]"
 decision_visit_ormalian_port.tt.mejha_desc: "#T #V [GetTitleByKey('c_mejha').GetNameNoTier]#! #!\n\nMejha contrôle les exportations rares de Kjhana et possède une longue tradition de guérison et de commerce. Son palais est le centre du gouvernement régional, et son accès à des richesses botaniques uniques lui confère une influence inégalée."
 decision_visit_ormalian_port_mejha_tooltip: "#T #V [GetTitleByKey('c_mejha').GetNameNoTier]#! #!\n\nMejha contrôle les exportations rares de Kjhana et possède une longue tradition de guérison et de commerce. Son palais est le centre du gouvernement régional, et son accès à des richesses botaniques uniques lui confère une influence inégalée."
 decision_visit_ormalian_port.tt.samarth: "[GetTitleByKey('c_west_samarth').GetNameNoTier] et [GetTitleByKey('c_east_samarth').GetNameNoTier]"
 decision_visit_ormalian_port.tt.samarth_desc: "#T #V [GetTitleByKey('c_west_samarth').GetNameNoTier] et [GetTitleByKey('c_east_samarth').GetNameNoTier]#! #!\n\nSamarth se trouve là où le grand fleuve de Khy rencontre la mer, un port númenóréen historique devenu artère impériale."
 decision_visit_ormalian_port_samarth_tooltip: "#T #V [GetTitleByKey('c_west_samarth').GetNameNoTier] et [GetTitleByKey('c_east_samarth').GetNameNoTier]#! #!\n\nSamarth se trouve là où le grand fleuve de Khy rencontre la mer, un port númenóréen historique devenu artère impériale."
 decision_visit_ormalian_port.tt.kantilya: "[GetTitleByKey('c_kantilya').GetNameNoTier]"
 decision_visit_ormalian_port.tt.kantilya_desc: "#T #V [GetTitleByKey('c_kantilya').GetNameNoTier]#! #!\n\nPort bulchyadéen prospère, célèbre pour ses marchés et ses routes maritimes, Kantilya est un centre de céréales, de sel et de monnaie."
 decision_visit_ormalian_port_kantilya_tooltip: "#T #V [GetTitleByKey('c_kantilya').GetNameNoTier]#! #!\n\nPort bulchyadéen prospère, célèbre pour ses marchés et ses routes maritimes, Kantilya est un centre de céréales, de sel et de monnaie."
 decision_visit_ormalian_port.tt.jorash: "[GetTitleByKey('c_jorash').GetNameNoTier]"
 decision_visit_ormalian_port.tt.jorash_desc: "#T #V [GetTitleByKey('c_jorash').GetNameNoTier]#! #!\n\nJorash est un carrefour du commerce côtier bulchyadéen, alimentant les villes de l'intérieur en produits étrangers. Ses ports sont profonds et ses coffres encore plus."
 decision_visit_ormalian_port_jorash_tooltip: "#T #V [GetTitleByKey('c_jorash').GetNameNoTier]#! #!\n\nJorash est un carrefour du commerce côtier bulchyadéen, alimentant les villes de l'intérieur en produits étrangers. Ses ports sont profonds et ses coffres encore plus."
 decision_visit_ormalian_port.tt.kandalar: "[GetTitleByKey('c_kandalar').GetNameNoTier]"
 decision_visit_ormalian_port.tt.kandalar_desc: "#T #V [GetTitleByKey('c_kandalar').GetNameNoTier]#! #!\n\nAvant-poste stratégique sur les côtes bulchyadéennes, Kandalar se distingue par ses chantiers navals robustes et ses douanes animées."
 decision_visit_ormalian_port_kandalar_tooltip: "#T #V [GetTitleByKey('c_kandalar').GetNameNoTier]#! #!\n\nAvant-poste stratégique sur les côtes bulchyadéennes, Kandalar se distingue par ses chantiers navals robustes et ses douanes animées."
 decision_visit_ormalian_port.tt.narikhar: "[GetTitleByKey('c_narikhar').GetNameNoTier]"
 decision_visit_ormalian_port.tt.narikhar_desc: "#T #V [GetTitleByKey('c_narikhar').GetNameNoTier]#! #!\n\nNarikhar, la capitale d'Anarikê, est un port fortifié d'argent, d'épices et de saphirs. C'est le joyau d'un fier royaume marchand."
 decision_visit_ormalian_port_narikhar_tooltip: "#T #V [GetTitleByKey('c_narikhar').GetNameNoTier]#! #!\n\nNarikhar, la capitale d'Anarikê, est un port fortifié d'argent, d'épices et de saphirs. C'est le joyau d'un fier royaume marchand."
 decision_visit_ormalian_port.tt.inyaloni: "[GetTitleByKey('c_inyaloni').GetNameNoTier]"
 decision_visit_ormalian_port.tt.inyaloni_desc: "#T #V [GetTitleByKey('c_inyaloni').GetNameNoTier]#! #!\n\nSeconde ville d'Anarikê, Inyalôni n'est pas une simple ombre : elle fourmille de dockers, de trésors et de courtiers indépendants. S'y établir, c'est s'ouvrir l'avenir d'Anarikê."
 decision_visit_ormalian_port_inyaloni_tooltip: "#T #V [GetTitleByKey('c_inyaloni').GetNameNoTier]#! #!\n\nSeconde ville d'Anarikê, Inyalôni n'est pas une simple ombre : elle fourmille de dockers, de trésors et de courtiers indépendants."
 decision_visit_ormalian_port.tt.lyneria: "[GetTitleByKey('c_lyneria').GetNameNoTier]"
 decision_visit_ormalian_port.tt.lyneria_desc: "#T #V [GetTitleByKey('c_lyneria').GetNameNoTier]#! #!\n\nAu centre de la Ligue se trouve Lyneria, joyau de la Côte lynerienne, fière et indomptée. Ses artisans façonnent le luxe à partir de l'os et du bronze, tandis que les caravanes d'ivoire affluent de l'intérieur sauvage de la péninsule."
 decision_visit_ormalian_port_lyneria_tooltip: "#T #V [GetTitleByKey('c_lyneria').GetNameNoTier]#! #!\n\nAu centre de la Ligue se trouve Lyneria, joyau de la Côte lynerienne, fière et indomptée. Ses artisans façonnent le luxe à partir de l'os et du bronze, tandis que les caravanes d'ivoire affluent de l'intérieur sauvage de la péninsule."

