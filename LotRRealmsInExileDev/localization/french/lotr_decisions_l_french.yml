 ### Subsidize Cochineal Industry ###
 ####################################
 # Adapted from RICE
 support_cochineal_industry: "Soutenir l'Industrie de la Cochenille"
 support_cochineal_industry_tooltip: "La [cochineal|E] constitue une exportation profitable !"
 support_cochineal_industry_desc: "Certains de nos territoires se trouvent dans [GetGeographicalRegion('special_cochineal_production_region').GetName]. La teinture rouge produite par les larves [cochineal|El] est un produit fort lucratif, vendu à travers [middleearth|E]. Si nous soutenons cette industrie, les marchands pourront continuer d'exporter ces teintures au loin, en grandes quantités."
 support_cochineal_industry_effect_tooltip_1: "La puissance de ce [modifier|El] est accrue pour les [counties|e] dans un [duchy|El] possédant le [duchy_building|E] $building_type_cochineal_industry_01$"
 support_cochineal_industry_confirm: "Ces insectes nous apportent grande richesse !"
 RICE_cochineal_region_req: "Vous possédez un [county|El] dans [GetGeographicalRegion('special_cochineal_production_region').GetName] qui n'est #emp pas#! [orcish|E]"
 RICE_every_cochineal_region_county: "Chaque [county|El] que vous possédez dans [GetGeographicalRegion('special_cochineal_production_region').GetName]"
 RICE_cochineal_industry_effect_desc_01: "Lors de la prise de la [decision|El] #bold $support_cochineal_industry$#!, au lieu du [county_modifier|El] de base, ce [county|El] gagne le [modifier|El] amélioré [GetModifier('cochineal_modifier_2').GetNameWithTooltip]."
 RICE_cochineal_industry_effect_desc_02: "Lors de la prise de la [decision|El] #bold $support_cochineal_industry$#!, au lieu du [county_modifier|El] de base, ce [county|El] gagne le [modifier|El] amélioré [GetModifier('cochineal_modifier_3').GetNameWithTooltip]."
 RICE_cochineal_industry_effect_desc_03: "Lors de la prise de la [decision|El] #bold $support_cochineal_industry$#!, au lieu du [county_modifier|El] de base, ce [county|El] gagne le [modifier|El] amélioré [GetModifier('cochineal_modifier_4').GetNameWithTooltip]."
 rhun.0001.t: "Cochenille"
 rhun.0001.desc: "Certains des territoires que je contrôle se trouvent dans [GetGeographicalRegion('special_cochineal_production_region').GetName]. Les larves [cochineal|El] peuvent être utilisées pour produire une magnifique teinture rouge qui se vend à des prix exorbitants sur les marchés étrangers.\n\nSeul un fou ne verrait pas l'importance de soutenir l'industrie de la cochenille, et c'est précisément ce que je m'apprête à faire. En investissant dans les plantations de cochenilles de ces régions et en encourageant les marchands à acheter ce produit pour le vendre ailleurs, nous pouvons aider l'économie locale à prospérer – et générer de beaux revenus en prélevant des taxes sur ce négoce, cela va sans dire."
 rhun.0001.a: "Cette teinture rouge nous apportera grand profit."
 cochineal_modifier_1: "Investissements dans l'Industrie de la Cochenille (Niveau 1)"
 cochineal_modifier_1_desc: "La teinture rouge produite dans les plantations locales provient des larves [cochineal|El] et constitue une exportation lucrative. Les seigneurs locaux font tout leur possible pour soutenir la récolte et l'exportation de ces teintures.\n\n#EMP La puissance de ce [modifier|El] dépend de la présence du [duchy_building|E] $building_type_cochineal_industry_01$ dans le [duchy|El] de ce [county|El] au moment où la [decision|El] $support_cochineal_industry$ fut prise.#!"
 cochineal_modifier_2: "Investissements dans l'Industrie de la Cochenille (Niveau 2)"
 cochineal_modifier_2_desc: "$cochineal_modifier_1_desc$"
 cochineal_modifier_3: "Investissements dans l'Industrie de la Cochenille (Niveau 3)"
 cochineal_modifier_3_desc: "$cochineal_modifier_1_desc$"
 cochineal_modifier_4: "Investissements dans l'Industrie de la Cochenille (Niveau 4)"
 cochineal_modifier_4_desc: "$cochineal_modifier_1_desc$"


