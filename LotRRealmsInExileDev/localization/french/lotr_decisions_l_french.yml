 decision_sponsor_tayee_holy_building: "Parrainer un Édifice Sacré Tayee"
 decision_sponsor_tayee_holy_building_tooltip: "Ériger un site religieux Tayee dans votre [capital|El]"
 decision_sponsor_tayee_holy_building_desc: "En tant que [ROOT.Char.GetTitleAsNameNoTooltip] désireux de manifester ma dévotion aux Tayee, ou plus particulièrement à mon patron, je souhaite offrir des fonds pour ériger un édifice religieux dans mon [domain|El]. La communauté locale bénéficiera spirituellement de cette nouvelle structure, et tous connaîtront ma piété !"
 decision_sponsor_tayee_holy_building_effect_tooltip_1: "Vous choisirez de parrainer un Oratoire, un Temple ou un Monastère, ce qui rapporte différents bénéfices en [piety|El], [prestige|El] et en [dynasty_prestige|El], ainsi qu'un [character_modifier|El] correspondant et un [county_modifier|El] pour votre [realm_capital|El]"
 decision_sponsor_tayee_holy_building_effect_tooltip_2: "Vous ne recevrez pas ces bonus immédiatement, car la construction prendra entre un an et deux ans"
 decision_sponsor_tayee_holy_building_effect_tooltip_3: "Puisque vous contrôlez [GetBuilding('wonder_tarnet_barzain').GetName], vous recevrez le [character_modifier|El] unique [GetModifier('tayee_worthy_of_augar_prophet').GetNameWithTooltip], dont la puissance évolue selon le nombre d'édifices parrainés."
 decision_sponsor_tayee_holy_building_effect_tooltip_4: "Puisque vous contrôlez [GetBuilding('wonder_tarnet_barzain').GetName], votre [character_modifier|El] [GetModifier('tayee_worthy_of_augar_prophet').GetNameWithTooltip] s'#P améliorera#! !"
 decision_sponsor_tayee_holy_building_confirm: "Pour la gloire [ROOT.Char.GetFaith.HighGodNameAlternate] !"
 decision_sponsor_tayee_holy_building_county_faith_req: "Votre [realm_capital|El] suit une [faith|El] dotée du [core_tenet|El] [GetFaithDoctrine('tenet_sirayn_syncretism').GetBaseName]"
