 decision_restore_tamska_title: "Devenir Tamska"
 decision_restore_tamska_desc: "Pendant des millénaires Mag and Tûmag ont été gouvernés par les [tamska|E], filles divines du dieu du ciel [namur|E]. Cependant, après le règne de la dernière Tamska, aucune nouvelle Tamskangi ne l'a remplacée. Si je parviens à prendre le contrôle des Royaumes Jumeaux et à prouver ma dévotion, je pourrai peut-être me montrer digne d'être moi-même appelée Tamska!"
 decision_restore_tamska_confirm: "Je suis la fille de Namur!"
 decision_restore_tamska_tooltip: "Rétablir la position de Tamska"

 decision_conquest_of_pel: "Conquête de Pél"
 decision_conquest_of_pel_desc: "Depuis d'innombrables années, le peuple Magrin s'est battu pour Pél, même avant que les Adûnâi n'arrivent dans cette terre. Avec le royaume sécurisé, nous pouvons maintenant le proclamer à nouveau comme une partie centrale des Deux Couronnes."
