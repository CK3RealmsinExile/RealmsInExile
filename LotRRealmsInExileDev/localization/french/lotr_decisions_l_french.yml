 commit_suicide_decision_desc_black_breath: "Un froid spectral envahit mes veines, comme si je cheminais dans les brumes d'un cauchemar éveillé. Le soleil ne parvient plus à réchauffer ma chair mortelle, désormais prisonnière d'une gangue glaciale. Nul n'a jamais recouvré la santé après avoir été touché par cette malédiction innommable... Je ne désire plus que sombrer dans un sommeil éternel, loin de cette souffrance qui ronge mon âme."
 
 lotr_lay_down_life_decision_tooltip: "Vous accepterez de sacrifier votre vie."
 lotr_lay_down_life_decision_confirm: "C'est dans la tristesse, non dans le désespoir, que nous devons partir !"
 lotr_lay_down_life_decision: "Déposer votre Vie"
 lotr_lay_down_life_decision_desc: "Ma vie a été longue et riche, mais n'était pas destinée à être éternelle. J'ai choisi une vie mortelle et un destin mortel. Je devrais déposer ma vie et permettre à la prochaine génération de régner."
 
 decision_h_middle_earth: "Revendiquer la souveraineté sur toute la Terre du Milieu"
 decision_h_middle_earth_desc: "J'ai placé toutes les terres et tous les peuples loyaux de la [middleearth|E] sous mon autorité, et nul ne peut désormais contester ma suzeraineté !"
 decision_h_middle_earth_confirm: "Maître de la Terre !"
 decision_h_middle_earth_tooltip: "Revendiquer toute la Terre du Milieu comme votre domaine légitime."
 decision_h_middle_earth_tt: "Vous obtenez un titre [hegemony|E] sur l'ensemble de la [middleearth|E]"
 decision_h_middle_earth_trigger: "Vous contrôlez chaque [county|El] colonisé dans [GetGeographicalRegion('middleearth').GetName]"

 decision_fire_intro_events: "Revoir l'Événement d'Introduction"
 decision_fire_intro_events_desc: "Si vous avez oublié les mécaniques propres à votre peuple, vous pouvez prendre cette décision pour revoir l'événement d'introduction."
 decision_fire_intro_events_confirm: "Ah, voilà."
 decision_fire_intro_events_tooltip: "Revoir l'événement d'introduction aux mécaniques de votre peuple"
 decision_fire_intro_events_tt: "Vous verrez l'événement d'introduction de votre peuple."

 decision_elevate_defensive_alliance_into_being_permanent_title: "Consacrer une Alliance Perpétuelle"
 decision_elevate_defensive_alliance_into_being_permanent_desc: "Le pacte entre nos peuples nous a servi de rempart solide, mais il demeure lié à la brève durée de ma propre existence. Quand je disparaîtrai, le [realm|El] ne devra point demeurer seul.\n\nL'heure est venue de graver cette amitié dans quelque chose de plus durable que le parchemin — de forger une union qui survive aux rois et perdure par-delà la mort. Que nos héritiers soient liés comme des frères, unis contre quelque ombre qui vienne à se lever."
 decision_elevate_defensive_alliance_into_being_permanent_confirm: "Un lien que la mort ne saurait rompre !"
 decision_elevate_defensive_alliance_into_being_permanent_tooltip: "Établir une union permanente entre vos [realms|E]."
 decision_elevate_defensive_alliance_into_being_permanent.tt_1: "Vous vous êtes mutuellement secourus dans au moins #V 10#! guerres en [Concept('defensive_alliance', 'defensive')|E]\n$BULLET_WITH_TAB$Nombre actuel : #V [GetPlayer.MakeScope.ScriptValue('lotr_defensive_wars_joined')|0]#!"
 decision_elevate_defensive_alliance_into_being_permanent.tt_2: "Vous formez une alliance permanente avec [fellow_member.GetName]"
 decision_elevate_defensive_alliance_into_being_permanent.tt_3: "L'autre membre de votre [defensive_alliance|E] vous porte une opinion supérieure à #P 80#!"
 
