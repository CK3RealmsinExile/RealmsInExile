 convert_to_wanua_decision: "Adopter les Voies des Wanua"
 convert_to_wanua_decision_desc: "Il est manifeste que le commerce maritime est au cœur de notre société. Il est juste que notre gouvernance en soit le reflet, accordant plus de place à la coopération qu'au conflit."
