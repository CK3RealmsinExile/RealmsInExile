 ##############################
 #### Dol Guldur Decisions ####
 ##############################
 decision_demand_submission_to_dol_guldur: "Exiger la Soumission à Dol Guldur"
 decision_demand_submission_to_dol_guldur_desc: "Le temps est enfin venu pour [dolguldur|E] de s'élever. D'abord, je vais consolider la région entourant la forteresse, mais mon seigneur a semé les graines de ceci il y a longtemps, corrompant nombre des tribus humaines qui vivent autour de nous. Elles vivent déjà dans la terreur et la crainte respectueuse de la Colline de Sorcellerie. Ce sera une simple formalité de transformer cela en allégeance. Et ceux qui ne s'agenouillent pas... seront passés au fil de l'épée."
 decision_demand_submission_to_dol_guldur_confirm: "Exiger la Soumission"
 decision_demand_submission_to_dol_guldur_tooltip: "Exiger la Soumission à Dol Guldur"
 decision_demand_submission_to_dol_guldur.send_message: "Les [rulers|e] [independent|E] avec une [faith|e] Maléfique dans le [GetTitleByKey('k_amon_lanc').GetNameNoTier] [de_jure|El] recevront un ultimatum pour devenir votre [vassal|e]. S'ils refusent, vous gagnerez des [unpressed_claims|E] sur tous leurs [titles|E]."
 decision_demand_submission_to_dol_guldur.check_evil_trigger: "Il y a au moins un [ruler|El] avec une [faith|El] Maléfique dans [GetTitleByKey('k_amon_lanc').GetNameNoTier]"

 decision_demand_submission_of_neighboring_evil_leofring: "Subjuguer la Cour Flétrie"
 decision_demand_submission_of_neighboring_evil_leofring_desc: "Pendant de longues années, [dolguldur|E] a utilisé son influence maligne pour chercher à corrompre les hommes vivant près de la Colline de Sorcellerie. Dans cette entreprise, nous avons eu le plus de succès avec les Leofrings appauvris, dont beaucoup ont été convertis à la cruelle foi de la Cour Flétrie, avec ses ignobles rites de sacrifice humain. Cela les a rendus mûrs pour la subjugation. Le moment est venu d'appeler leurs bannières et de les contraindre à se soumettre comme vassaux de Dol Guldur."
 decision_demand_submission_of_neighboring_evil_leofring_confirm: "Exiger la Soumission"
 decision_demand_submission_of_neighboring_evil_leofring_tooltip: "Exiger la Soumission des Leofrings Maléfiques Voisins"
 decision_demand_submission_of_neighboring_evil_leofring.send_message: "Les [rulers|E] [independent|E] voisins avec une [faith|El] Maléfique et de [culture|El] Leofring recevront un ultimatum pour devenir votre [vassal|El]. S'ils refusent, vous gagnerez des [unpressed_claims|E] sur tous leurs [titles|E]."
 decision_demand_submission_of_neighboring_evil_leofring.check_evil_trigger: "Il y a au moins un [ruler|El] voisin avec une [faith|El] Maléfique"

 decision_desecrate_caras_galadhon: "Profaner Caras Galadhon"
 decision_desecrate_caras_galadhon_desc: "Caras Galadhon, le soi-disant cœur du Domaine Elfique en [middleearth|E], se dresse comme un monument à la puissance des [elves|E], et plus particulièrement, à Galadriel et Celeborn. Leur domaine est centré autour d'un arbre véritablement majestueux... quelle joie ce serait de l'embraser, une chandelle et un bûcher funéraire pour les [elves|E] déclinants, alors que leur temps s'achève..."
 decision_desecrate_caras_galadhon_confirm: "Réduisez-le en cendres !"
 decision_desecrate_caras_galadhon_tooltip: "Profaner Caras Galadhon"
 decision_desecrate_caras_galadhon.every_eldar_ruler_loses_piety: "Chaque [ruler|El] [eldar|E] perd de la [piety|El]"

 decision_desecrate_aradhrynd: "Profaner Aradhrynd"
 decision_desecrate_aradhrynd_desc: "Les salles pitoyables de Thranduil, simple imitation bon marché du refuge souterrain du lâche Thingol, se dressent depuis longtemps dans le nord de la [mirkwood|E] comme un phare de force et de stabilité autour duquel son peuple s'est rassemblé. Au lieu d'un refuge, faisons-en une demeure de choses sombres, chassons la lumière et remplissons les cavernes de chagrin et de peur..."
 decision_desecrate_aradhrynd_confirm: "Ces cavernes seront un lieu d'effroi."
 decision_desecrate_aradhrynd_tooltip: "Profaner Aradhrynd"
 decision_desecrate_aradhrynd.every_eldar_ruler_loses_piety: "Chaque [ruler|El] [eldar|E] perd de la [piety|El]"

 decision_desecrate_imladris: "Profaner Imladris"
 decision_desecrate_imladris_desc: "Imladris, 'Fondcombe', ont longtemps été les refuges des [elves|E]. Ils ne les cacheront plus.  les murs de la Maison d'Elrond et faites-en un monument de leur folie."
 decision_desecrate_imladris_confirm: "Étouffer la vallée sous la fumée."
 decision_desecrate_imladris_tooltip: "Profaner Imladris"

 decision_desecrate_mithlond: "Profaner Mithlond"
 decision_desecrate_mithlond_desc: "Les Havres Gris sont le dernier espoir [elves|El], leur ultime lien vers [valinor|E]. Rompez-le."
 decision_desecrate_mithlond_confirm: "Brûler les derniers navires."
 decision_desecrate_mithlond_tooltip: "Profaner Mithlond"

 decision_shackle_the_anduin_vale: "Enchaîner le Val d'Anduin"
 decision_shackle_the_anduin_vale_desc: "Les hommes du [anduinvale|E] sont devenus hautains et fiers sous la direction de Beorn et de ses descendants. Mais il y a à peine quelques générations, ils n'étaient que de simples forestiers, vivant dans notre ombre. Et maintenant ils le seront à nouveau."
 decision_shackle_the_anduin_vale_desc.1: "Les forêts du [anduinvale|E] résonnaient jadis des cris des nôtres, avant que les [northmen|E] ne viennent ramper hors de leurs tanières. Ils se sont engraissés sous les arbres qui devraient être les nôtres. Nous les chasserons, et le Val s'assombrira de nouveau sous nos bannières."
 decision_shackle_the_anduin_vale_confirm: "Ces terres seront miennes."
 decision_shackle_the_anduin_vale_tooltip: "Enchaîner le Val d'Anduin"

 decision_dominion_of_the_sorcerer: "Domination du Sorcier"
 decision_dominion_of_the_sorcerer_desc: "Toutes les Terres Sauvages tremblent devant la puissance de [dolguldur|E], et notre grand maître est fort satisfait de notre œuvre. Longue s'étend l'ombre, faible devient la lumière, et tous connaîtront et craindront le fléau."
 decision_dominion_of_the_sorcerer_confirm: "Voici mon heure !"
 decision_dominion_of_the_sorcerer_tooltip: "Domination du Sorcier"
 decision_dominion_of_the_sorcerer.greenwood_renamed_dominion_of_the_sorcerer: "Le [GetTitleByKey('e_greenwood').GetName] recevra un nouveau nom, Domination du Sorcier."
 decision_dominion_of_the_sorcerer.check_evil_trigger: "Il y a au moins un [ruler|El] avec une [faith|El] Maléfique dans [GetTitleByKey('k_amon_lanc').GetNameNoTier]"
 DESECRATE_CARAS_GALADHON_DONE: "La [decision|El] Profaner Caras Galadhon est accomplie"
 DESECRATE_ARADHRYND_DONE: "La [decision|El] Profaner Aradhrynd est accomplie"
 
 decision_subjugate_mount_gundabad: "Subjuguer Mont Gundabad"
 decision_subjugate_mount_gundabad_desc: "Autrefois, les orques de [gundabad|E] et les hommes de Langwell rendaient hommage au [witchking|E] d'[angmar|E], fournissant à ses armées des corps et des provisions. En ces jours, cette terre devint connue sous le nom d'[eastangmar|E]. Maintenant, le temps est venu pour eux de reconnaître un autre maître."
 decision_subjugate_mount_gundabad_confirm: "Ils serviront à nouveau les Ténèbres."
 decision_subjugate_mount_gundabad_tooltip: "Subjuguer Mont Gundabad"
 DOMINION_OF_THE_SORCERER_DONE: "La [decision|El] Domination du Sorcier est accomplie"
 
