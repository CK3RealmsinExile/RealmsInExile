 decision_reclaim_gondor_kingship_desc: "Les descendants de Castamir ont marché vers le nord, revendiqué le Gondor en son nom et régné. Mais leur temps est désormais révolu, aucun Castamiri ne siège sur le trône du Gondor, alors le Gondor doit-il les accepter à nouveau ?"
