 completed_decision_revive_gundabad: "A complété la [decision|El] #V $decision_revive_gundabad$#!"
 completed_decision_gundabad_dominion_over_langwell: "A complété la [decision|El] #V $decision_gundabad_dominion_over_langwell$#!"
