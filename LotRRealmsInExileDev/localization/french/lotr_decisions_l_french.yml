 decision_numenor_in_exile_desc: "Depuis les jours de la [downfall|E], les héritiers de [numenor|E] ont décliné et diminué, se battant entre eux. Autrefois la flamme qui était un phare pour toute l'[mankind|E], seules des braises subsistent. Mais les braises, si rassemblées, pourraient raviver une flamme."
