 abdication_decision_desc: "Je peux sentir mon âge dans mes os, bien que je me sente encore vigoureux et bien dans l'ensemble. Est-ce que je veux vraiment passer les dernières années de ma vie à lutter avec les affaires d'État ? Mon héritier est adulte et prêt à assumer les rôles de gouvernance."
