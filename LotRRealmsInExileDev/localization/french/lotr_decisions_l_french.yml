 ###############################
 decision_aladegana: "Devenir l'Aladegan"
 decision_aladegana_tooltip: "Unifier les Hommes des Bois et du Val sous une seule couronne"
 decision_aladegana_desc: "Devenir le Thane-Suprême des Bois et du Val, forgeant les Hommes des Bois et leurs frères en un nouvel empire sous votre [dynasty|El]."
 decision_aladegana_confirm: "Les Bois et le Val sous une seule couronne !"

 decision_eotheod: "Restaurer le Royaume d'Éothéod"
 decision_eotheod_tooltip: "Créer à nouveau un Royaume centralisé dans le Haut Val d'Anduin"
 #decision_eotheod_desc: "Affirmez la domination des Framlings sur les peuples du haut Anduin, restaurez le royaume de l'Éothéod, et prouvez que votre dynastie est un véritable prétendant à l'héritage de Fram."
 decision_eotheod_desc: "Il y a longtemps, des Cavaliers régnaient sur le Val. Après la chute du [rhovanion_kingdom|E], nos ancêtres ont fui vers le nord-ouest dans le fertile [anduinvale|E]. Là, ils ont régné pendant de nombreux siècles, jusqu'à ce que le roi Eorl le jeune conduise la plupart d'entre eux vers le sud.\n\nNos ancêtres, cependant, ont choisi de rester, enchantés par la beauté du val. Depuis lors, notre peuple a subsisté comme une petite coalition de clans menée par les Framlings, descendants de Fram le Tueur de Dragon.\n\nMais avec de nouvelles menaces qui s'élèvent partout, peut-être le temps est-il venu de reprendre ce qui nous revient de droit. Si nous parvenions à reconquérir le Val et à nous réorganiser en un royaume féodal, nous pourrions nous proclamer à nouveau Rois de l'Éothéod."
 decision_eotheod_confirm: "En avant, Framlingas !" 

 decision_eotheod.langwell_renamed_eotheod: "[GetTitleByKey('k_langwell').GetName] sera renommé en Royaume de l'Éothéod" 

 decision_integrate_twainmantle: "Intégrer Twainmantle"
 decision_integrate_twainmantle_tooltip: "Intégrer pleinement les contreforts septentrionaux à votre royaume"
 decision_integrate_twainmantle_desc: "Pendant des siècles, nous avons parcouru les contreforts des Montagnes Grises, mais ne les avons jamais revendiqués. Maintenant que nous avons forgé à nouveau notre royaume, nous devons prouver que notre royaume a vraiment le pouvoir de perdurer !"
 decision_integrate_twainmantle_confirm: "Que nos cors résonnent dans les collines !"
 
 decision_reveal_necromancer_woodmen: "Enquêter sur le Nécromancien"
 decision_reveal_necromancer_woodmen_tooltip: "Découvrir la vérité derrière les ténèbres de Dol Guldur"
 decision_reveal_necromancer_woodmen_desc: "La [mirkwood|E] est un lieu de ténèbres et d'ombres, toutes provenant de la sombre forteresse de Dol Guldur. Le temps est venu de révéler l'identité du Nécromancien qui y demeure et de mettre fin à sa malveillance pour de bon."
 decision_reveal_necromancer_woodmen_confirm: "Nous devons mettre fin à ce mal."
 decision_reveal_necromancer_woodmen_tt: "Vous rejoignez la Guerre de Réclamation des #high Terres Natales Elfiques#! en tant qu'attaquant"
 
 decision_dissolve_langwell_confederation: "Subvertir la Confédération de Langwell"
 decision_dissolve_langwell_confederation_tooltip: "Détruire la Confédération de Langwell"
 decision_dissolve_langwell_confederation_desc: "La Confédération de Langwell est instable, à deux doigts d'être déchirée par les dissensions et les querelles internes. Une légère poussée et quelques coups de poignard dans le dos — voilà tout ce qu'il faudrait pour que ces malheureux Nordiques se jettent les uns sur les autres tels des loups..."
 decision_dissolve_langwell_confederation_confirm: "Que cette misérable coalition s'effondre !"
 effect_decision_dissolve_langwell_confederation: "La Confédération de Langwell s'effondrera."
 holden_riculfo_harkind_deceased: "[GetScriptedCharacterByHistoryID('lineedelgar9').GetFirstName], [GetScriptedCharacterByHistoryID('linegarsind7').GetFirstName] et [GetScriptedCharacterByHistoryID('linegisilher7').GetFirstName] sont morts"

 decision_strengthen_langwell_confederation: "Renforcer la Confédération de Langwell"
 decision_strengthen_langwell_confederation_tooltip: "Mettre fin aux dissensions au sein de la Confédération de Langwell"
 decision_strengthen_langwell_confederation_desc: "Trop longtemps les membres de la Confédération de Langwell se sont déchirés, paralysés par leurs querelles, tandis que les forces de [angmar|E] se rassemblent et s'arment, avides de nous réduire en esclavage et d'anéantir tout ce que nous aimons. Je ne saurais pourtant demeurer les bras croisés pendant que frères et amis se retournent les uns contre les autres, s'accablant d'accusations viles et d'insultes. Jadis, nos ancêtres jurèrent amitié et alliance, et j'entends honorer ces serments. Je mettrai fin aux dissensions qui rongent notre coalition, afin que nous puissions nous dresser, unis, face à toute menace qui viendrait nous éprouver."
 decision_strengthen_langwell_confederation_confirm: "Unis, nous tiendrons contre n'importe quel hiver !"
 strengthen_langwell_confederation_tt: "Pour refermer les blessures entre les membres de la Confédération de Langwell, "
 decision_strengthen_langwell_confederation_effect_1: "Si vous choisissez une approche défensive, vous devez vous concilier les faveurs des souverains de [GetTitleByKey('c_langburg').GetName] et de [GetTitleByKey('c_feorlond').GetName]. Cependant, à moins d'être liés d'amitié avec eux, cela risque de provoquer la colère du souverain de [GetTitleByKey('c_taurau').GetName] et son retrait de la Confédération de Langwell."
 decision_strengthen_langwell_confederation_effect_2: "Si vous choisissez une approche offensive, vous devez vous concilier les faveurs des souverains de [GetTitleByKey('c_mithlin_vale').GetName] et de [GetTitleByKey('c_marsham').GetName]. Cependant, à moins d'être liés d'amitié avec eux, cela risque de provoquer la colère du souverain de [GetTitleByKey('c_marsham').GetName] et son retrait de la Confédération de Langwell."

