 decision_calenardhon_calemmir: "Restaurer la Capitale du Calenardhon"
 decision_calenardhon_calemmir_desc: "Durant le règne des rois de la lignée d'Anárion, la province de [GetTitleByKey('k_rohan').GetNameNoTier] était gouvernée depuis la cité de [GetTitleByKey('c_aldburg').GetNameNoTier]. Maintenant que la province est à nouveau entre des mains gondoriennes, nous pourrions restaurer Calemmir à son ancien statut de capitale des marches septentrionales."
 decision_calenardhon_calemmir_confirm: "Que Calemmir retrouve sa place légitime."
 decision_calenardhon_calemmir_tooltip: "Faire de Calemmir la capitale du Calenardhon à nouveau."
 decision_calenardhon_calemmir.tt: "La cité de [GetTitleByKey('c_aldburg').GetNameNoTier] devient la capitale de la province de [GetTitleByKey('k_rohan').GetNameNoTier]."

 decision_establish_the_ithilien_rangers: "Établir les Rôdeurs d'Ithilien"
 decision_establish_the_ithilien_rangers_desc: "Jadis le jardin du [gondor|E], l'Ithilien est tombé aux mains de l'ennemi. Notre peuple a fui, la terre est dévastée, et maintenant les forces du mal menacent l'Anduin, l'artère même du [gondor|E].\n\nPourtant, nous pouvons encore résister. Parmi ceux qui ont fui, nombreux sont ceux qui connaissent intimement les sentiers secrets et les voies cachées de l'Ithilien, et dont les cœurs brûlent du désir de venger leur foyer perdu. Nous pouvons recruter ces hommes et constituer une force de guérilla d'élite pour disputer les forêts et les ruisseaux de l'Ithilien à l'ombre envahissante."
 decision_establish_the_ithilien_rangers_tt: "Fonder les Rôdeurs d'Ithilien"
 decision_establish_the_ithilien_rangers_confirm: "Nous défendrons ces terres !"
 decision_establish_the_ithilien_rangers.tt: "Vous gagnez accès aux Hommes d'Armes Rôdeurs d'Ithilien"
 decision_establish_the_ithilien_rangers.trigger: "Un souverain maléfique vous borde en [GetTitleByKey('k_ithilien').GetNameNoTier]."

 ##########################
 ### Dol Amroth Reforms ###
 ##########################
 decision_dol_amroth_reforms: "Réformer l'Ordre du Cygne"
 decision_dol_amroth_reforms_tooltip: "En réformant l'Ordre, vous gagnerez accès à des unités d'élite avancées."
 decision_dol_amroth_reforms_desc: "Il y a longtemps, l'Ordre du Cygne fut créé par les Princes de Dol Amroth pour agir comme leurs conseillers personnels et leurs plus féroces champions au combat. Rempli de capitaines renommés et aguerris de Belfalas, l'Ordre se tenait aux plus hauts standards, incarnant véritablement l'apogée de l'honneur et de la vertu númenoréens...\n\nMalheureusement, cependant, les Hommes sont facilement corrompus, et dans les siècles suivant sa fondation originelle, l'Ordre commença lentement à décliner. Les lignées et les positions à la cour, non la valeur ou la vertu individuelle, dictent maintenant les rangs de ses membres, ternissant la grandeur de l'Ordre qui avait pendant tant de siècles servi de phare pour tout le Gondor. Si les Fils du Cygne d'Argent doivent retrouver leur héritage en tant que plus fins chevaliers du Royaume, l'état de pourriture maligne de l'Ordre doit être corrigé."
 decision_dol_amroth_reforms_confirm: "Commencez l'entraînement immédiatement."
 
 decision_dol_amroth_amrothian_troops: "Élargir les Réserves Amrothiennes"
 decision_dol_amroth_amrothian_troops_tooltip: "Commencer l'entraînement d'un contingent de Réserves Amrothiennes" 
 decision_dol_amroth_amrothian_troops_desc: "Pendant des années relégués aux positions les plus humbles au sein de l'Ordre du Cygne, les soldats Amrothiens ont à bien des égards été le groupe qui a le mieux maintenu le véritable esprit de l'Ordre originel. Cependant, malgré cela, leurs rangs ont été tristement diminués, le rôle étant considéré comme manquant d'honneur et de splendeur, et donc négligé. \n\nTravaillons à restaurer cette épine dorsale de nos forces à leur propre puissance de combat." 
 decision_dol_amroth_amrothian_troops_confirm: "Commencez l'entraînement immédiatement" 
 
 decision_dol_amroth_elvish_troops: "Recruter les Hommes d'Edhellond"
 decision_dol_amroth_elvish_troops_tooltip: "Recruter un contingent de Chevaliers et de Rôdeurs d'Edhellond" 
 decision_dol_amroth_elvish_troops_desc: "Edhellond, autrefois foyer du domaine Elfique du même nom, est l'un des gouvernorats les plus nobles et les plus riches de Dor-en-Ernil. Ils s'efforcent d'émuler les tactiques elfiques au combat, contrairement au reste du Gondor, qui maintient une ferme tradition martiale héritée des jours de Númenor. Leurs rangs au sein de l'Ordre sont restés vides, les serments non prononcés alors que la pourriture fermentait au sein de l'organisation. Nous devons renouveler nos serments d'antan. \n\nS'ils pouvaient être réintégrés dans les armées du Prince, ils pourraient servir de contingent puissant et novateur." 
 decision_dol_amroth_elvish_troops_confirm: "Envoyez notre cavalier le plus rapide." 
 
 decision_dol_amroth_seaward_troops: "Élargir les Régiments de la Garde Maritime"
 decision_dol_amroth_seaward_troops_tooltip: "Commencer l'entraînement d'un Régiment de la Garde Maritime" 
 decision_dol_amroth_seaward_troops_desc: "Autrefois l'égal de Dor-en-Ernil aux puissants marines de Pelargir, les régiments de la Garde Maritime combattaient sur les hautes mers et les côtes, triomphant des corsaires et gagnant de grands honneurs. Cependant, alors que Pelargir a pris de l'importance comme cœur de la Marine Royale, cette division de garde a diminué jusqu'à devenir une force squelettique, maintenant tout au plus quelques postes de guet côtiers. \n\nSi nous pouvions les développer à nouveau, ils nous serviraient une fois de plus comme redoutables troupes de choc." 
 decision_dol_amroth_seaward_troops_confirm: "Commencez l'entraînement immédiatement." 
 
 decision_dol_amroth_tirith_aear_troops: "Reforger le Tirith Aear"
 decision_dol_amroth_tirith_aear_troops_tooltip: "Commencer l'entraînement d'un détachement de Chevaliers du Tirith Aear" 
 decision_dol_amroth_tirith_aear_troops_desc: "Le Tirith-Aear, ou 'Tour Maritime' en Sindarin, est la grande tour de Dor-en-Ernil, jadis construite par les Elfes habitant la région. Le nom est également devenu celui des unités de garde d'élite qui protègent la tour, les Gardiens des Serments de Tirith-Aear, l'élite des troupes maritimes. Tenus de prêter des serments de vertu et de valeur, ces gardiens devraient être d'un caractère irréprochable. Mais de toutes les classes de l'ancien Ordre, celle-ci s'est le plus corrompue, la position étant accordée en raison du sang, non de la valeur. Il faudra de grands efforts pour la reconstruire dans sa gloire d'antan. \n\nNous commencerons par licencier ceux de l'ordre connus pour être corrompus, puis nous commencerons à chercher ceux dignes de ce grand honneur." 
 decision_dol_amroth_tirith_aear_troops_confirm: "Prononcez les serments." 
 
 decision_dol_amroth_swan_guard_troops: "Établir l'Ordre du Cygne d'Argent"
 decision_dol_amroth_swan_guard_troops_tooltip: "Commencer l'entraînement d'un détachement d'élite de Chevaliers du Cygne d'Argent" 
 decision_dol_amroth_swan_guard_troops_desc: "L'épitomé de la valeur Númenoréenne, l'Ordre Royal du Cygne d'Argent est une image de la noblesse des Hommes à l'apogée de leur vertu. D'une fibre morale inégalée et d'une grande habileté aux armes, seuls quelques élus sont jamais comptés parmi cet ordre des plus sanctifiés. Se voir offrir une telle chance est considéré comme un honneur au-delà de tout prix dans les terres de Dol Amroth, et peu le refusent, car c'est à la fois un grand honneur et un devoir écrasant. \n\nAvec ces guerriers triés sur le volet, parangons de valeur et de compétence, le Prince n'a rien à craindre, car il est gardé par les hommes les plus capables de tout Dor-en-Ernil." 
 decision_dol_amroth_swan_guard_troops_confirm: "Un phare d'honneur, rené." 
 
 ########################################################
 #### League of Pelargir/Númenórean League Decisions ####
 ########################################################
 decision_league_of_pelargir: "Refonder la Ligue de Pelargir"
 decision_league_of_pelargir_tooltip: "Restaurer les droits antiques et l'autonomie de la colonie númenoréenne de Pelargir !"
 decision_league_of_pelargir_desc: "Au temps de Númenor, Pelargir était prééminente parmi les colonies du nord de la Terre du Milieu. L'autonomie, les droits commerciaux et la dignité étaient nôtres, mais depuis la fondation des Royaumes-en-Exil, Pelargir a été diminuée sous des rois qui ne veillent pas à ses intérêts. Nous devrions nous séparer des Rois et reconquérir l'antique droit de tous les Dúnedain libres à décider de leur propre destin. En avant Pelargir, sur les vagues vers demain !"
 decision_league_of_pelargir_confirm: "Nos droits antiques sont à nouveau nôtres."
 league_of_pelargir_decision: "Pelargir se séparera du Gondor et tentera de forger sa propre voie."
 
 decision_colonial_belfalas: "Intégrer Belfalas dans la Ligue"
 decision_colonial_belfalas_tooltip: "Étendre la Ligue des colonies Númenoréennes en intégrant les anciennes colonies de Belfalas !"
 decision_colonial_belfalas_desc: "Pelargir n'est pas seule à être un ancien établissement de dignité Númenoréenne. Belfalas aussi fut jadis une grande colonie de Númenor, et en tant que telle notre parenté et nos frères. Amenons-les dans la ligue et devenons plus forts !"
 decision_colonial_belfalas_confirm: "Notre ligue devient plus puissante !"
 
 decision_colonial_umbar: "Intégrer Umbar dans la Ligue"
 decision_colonial_umbar_tooltip: "Étendre la Ligue des colonies Númenoréennes en intégrant le puissant havre d'Umbar !"
 decision_colonial_umbar_desc: "Pelargir n'est pas seule à être un ancien établissement de dignité Númenoréenne. Umbar, jadis notre grand rival, a un fier héritage, autrefois la plus grande - maintenant la seconde - colonie établie par les Númenoréens en Terre du Milieu. Mettons de côté les vieilles rancunes, et marchons ensemble vers un avenir radieux, images de la splendeur d'antan !"
 decision_colonial_umbar_confirm: "Notre ligue devient plus puissante !"
 
 decision_colonial_harnen: "Sécuriser le Harnen"
 decision_colonial_harnen_tooltip: "Étendre la Ligue des colonies Númenoréennes en sécurisant l'embouchure du Harnen !"
 decision_colonial_harnen_desc: "Númenor contrôlait jadis le Harnen jusqu'à l'état tributaire d'Al Amrûn (maintenant connu sous le nom de Haruzan). Si nous pouvions le mettre sous notre contrôle, nous aurions une emprise sur le trafic maritime entrant dans la Baie de Belfalas. L'héritage de Númenor est en train d'être reconquis !"
 decision_colonial_harnen_confirm: "Mirlond et Ramlond nous serviront bien."

 #######################
 ### Umbar Decisions ###
 #######################
 decision_harnen_kingdom: "Unifier les Havres de Harnendor" #  Unify the Havens of Mirlond and Ramlond
 decision_harnen_kingdom_adunaic: "Unifier les Havres de Nînzayan"
 decision_harnen_kingdom_desc: "Depuis maintes générations, Ramlond et Mirlond se sont disputés le contrôle du commerce fluvial du Harnen. Cependant, si les deux havres pouvaient être réunis sous un seul seigneur, ils pourraient obtenir une mainmise sur tout commerce désirant entrer au Harad par le Harnen. Enterrons le passé et marchons ensemble vers l'avenir, plus riches et plus forts qu'auparavant !"
 decision_harnen_kingdom_tooltip: "Unifier les havres à l'embouchure du Harnen"
 decision_harnen_kingdom_confirm: "Mettons fin aux rivalités d'antan, vers un avenir radieux !"
 harnen_kingdom_decision: "Mirlond et Ramlond mettront de côté leurs anciennes rivalités et s'unifieront en un nouveau royaume, un puissant royaume commercial contrôlant l'embouchure du Harnen !"
 
 decision_castamir_claim: "Faire Valoir la Revendication Castamirienne"
 decision_castamir_claim_tooltip: "Restaurer la Lignée de Castamir sur le Trône Gondorien"
 decision_castamir_claim_desc: "Castamir était le roi légitime du Gondor, injustement chassé. Nous restaurerons notre place légitime !"
 decision_castamir_claim_confirm: "Préparez la flotte, nous frappons d'abord Pelargir !"
 press_castamiri_claim_tooltip: "Vous lancerez une invasion du Gondor au nom de placer le sang de Castamir sur son trône."
 decision_castamir_claim_already_pressed_tooltip: "Vous n'avez pas encore fait valoir la Revendication Castamirienne durant votre vie."
 decision_castamir_claim_recently_failed.tt: "Les Castamiriens ont récemment échoué à faire valoir leur revendication !"
 finished_castamiri_legend_tt: "Un membre de votre maison a accompli la [legend|El] [legend_mythical|E] $legend_castamir$"
 unlock_castamiri_claim_tt: "Gagnez accès à la [decision|El] #EMP $decision_castamir_claim$#!"
 decision_castamir_claim_gondor_exists: "Le [gondor|E] n'est pas tombé"

 decision_turn_to_piracy: "Se Tourner vers la Piraterie"
 decision_turn_to_piracy_AI: "Se Tourner vers la Piraterie (IA)"
 decision_turn_to_piracy.desc: "Assez longtemps nous avons prétendu être civilisés, être faibles. Nous sommes les fiers fils du rivage et nous nous tournerons vers une vie de pillage, nos voiles seront craintes tout le long de la Côte du Belegaer !"
 decision_turn_to_piracy_desc.ormal: "Les [GetFaithByKey('faith_ormal_pirate').GetAdherentNamePlural], corsaires aussi renommés que redoutés, régnèrent jadis sur les eaux de la Baie d'Ormal. Nous sommes de la même trempe, forgés par les mêmes mers âpres — et bientôt, tous frémiront à la vue de nos voiles."
 decision_turn_to_piracy_desc.vulmaw: "Parmi les $vulmaw$ de l'Archipel Méridional, il en est qui brisent les chaînes d'une existence ordinaire pour embrasser la liberté des flots, et se nomment les [GetFaithByKey('faith_nlkum_kadir').GetAdherentNamePlural]. Adoptons leur mode de vie — et bientôt tous frémiront à la vue de nos navires de guerre !"
 decision_turn_to_piracy.tt: "Embrassez votre héritage de pillard"
 decision_turn_to_piracy_confirm: "Pillage et Gloire."
 corsair_conversion_event_troops: "Équipage Corsaire"

 decision_adunaic_revival: "Renaissance Adûnaïque"
 decision_adunaic_revival_desc: "Dans les jours anciens, Umbar était gouverné par les [adunai|E], grands hommes, puissants et fiers. De même facture était Castamir le Grand, fondateur de notre lignée et le plus grand des Rois du [gondor|E], dont les descendants furent injustement bannis à Umbar. Bien que beaucoup de temps soit passé et que la mémoire se soit déformée, l'ombre de leurs héritages plane encore sur Umbar.\n\nNous sommes de la même grande lignée, véritables héritiers du droit de naissance de Castamir. Nous aussi méritons d'être exaltés au-dessus des hommes inférieurs, car dans nos veines coule le sang d'[anadune|E]. Si nous prêchions ces similitudes et nous liions à ces puissances historiques, nous renforcerions grandement notre position à Umbar, peu importe combien certains considèrent notre revendication comme fallacieuse. Il est temps d'embrasser les traditions de notre héritage, et de rendre les [adunai|E] grands à nouveau !"
 decision_adunaic_revival_tt: "Raviver l'héritage Adûnaïque d'Umbar"
 decision_adunaic_revival_confirm: "Nous embrasserons notre passé !"

 decision_feudalize_umbar: "Adopter le Gouvernement Local"
 decision_feudalize_umbar_desc: "Umbar est différent des autres royaumes du [harad|E], car ils préservent sous une certaine forme l'héritage juridique de [numenor|E]. Alors que les autres peuples de la région valorisent hautement les liens de [clan|E] et les liens familiaux plutôt que l'unité d'une nation, parmi le peuple d'Umbar, ils sont liés plutôt par des serments et des obligations entre vassal et suzerain. Ce système [feudal|E] remplace les querelles familiales factieuses par des vœux sacrés et des devoirs envers leur roi.\n\nNous ne suivons pas ces traditions, et en tant que tels, les gens d'Umbar nous considèrent comme guère plus que des usurpateurs et conquérants étrangers, et n'accepteront jamais pleinement mon règne. Si j'adoptais ces traditions [feudal|E], cela augmenterait ma légitimité aux yeux de mes sujets et renforcerait mon règne sur le royaume."
 decision_feudalize_umbar_confirm: "Mon peuple sera mon guide"
 decision_feudalize_umbar_tt: "Adopter le gouvernement [fedual|E] de vos sujets"

 decision_wildman_invasion_t: "Financer une Invasion des Hommes Sauvages au Gondor"
 decision_wildman_invasion_desc: "Pendant des siècles, l'ouest du Gondor a été un lieu d'agitation, servant toujours d'épine dans le flanc de notre royaume légitime. Peut-être pourrions-nous offrir à l'une des factions des hommes sauvages un financement substantiel pour une invasion dans la frontière du Gondor ?"
 decision_wildman_invasion_confirm: "Envoyez une offre aux Hommes Sauvages !"
 decision_wildman_invasion_tooltip: "Les Hommes Sauvages examineront la proposition de lancer une [varangian_adventure|E]."
 decision_wildman_invasion_tooltip_2: "Ils pourraient profiter de notre offre, décidant de ne pas envahir le Gondor mais de cibler un royaume plus faible d'Enedhwaith, du Rohan, de l'Anduin ou de l'Eriador."
 
 decision_claim_the_sacred_isles: "Revendiquer les Îles Sacrées"
 decision_claim_the_sacred_isles_desc: "La légende raconte la Création des quatre îles sacrées, créées par [ulmocharacter|E] lui-même. D'abord fut le Havre Étroit, loin au sud et le plus proche du domaine du Seigneur des Marées. Puis, les îles jumelles des Îles Solitaire et Pélican furent élevées, pour orner la côte de Mardruak. Et dernière des quatre sœurs fut l'Île Stérile façonnée, où des conques s'échouent sur le rivage qui, dit-on, parlent avec la voix du souverain de la Mer...\n\nRevendiquons ces îles sacrées, afin de prouver notre suprématie sur tous les autres qui osent braver les eaux sauvages de la Grande Mer."
 decision_claim_the_sacred_isles_tooltip: "Gagnez une revendication pressée sur chacune des Îles Sacrées des Corsaires."
 decision_claim_the_sacred_isles_confirm: "Les Îles seront miennes !"
 
 decision_unite_the_sacred_isles: "Unir les Îles Sacrées"
 decision_unite_the_sacred_isles_desc: "Ayant capturé les quatre Îles Sacrées, le temps est venu de consolider mon règne sur elles.\n\nQue tous les Corsaires connaissent mon nom et soient émerveillés par la splendeur de l'unificateur des Îles Sacrées !"
 decision_unite_the_sacred_isles_tooltip: "Former un nouveau royaume basé sur les quatre Îles Sacrées."
 decision_unite_the_sacred_isles_confirm: "Tous reconnaîtront ma renommée !"
 
 decision_settle_tol_uialgaer: "Coloniser l'Île Stérile"
 decision_settle_tol_uialgaer_desc: "Au nord des terres de Mardruak se trouve la mystérieuse Île Stérile, également appelée [GetTitleByKey('c_tol_uialgaer').GetNameNoTier] par notre peuple. Si nous voulons unir les Îles Sacrées, nous devrions coloniser cette dernière île afin d'y établir un havre de Corsaires."
 decision_settle_tol_uialgaer_tooltip: "Coloniser la lointaine [GetTitleByKey('c_tol_uialgaer').GetNameNoTier]."
 decision_settle_tol_uialgaer_confirm: "Envoyez un navire de nos meilleurs ouvriers !"

 decision_arminalethor: "Construire Arminalêthôr"
 decision_arminalethor_desc: "Sur ces rivages commencera la restauration d'Anadûnê. Toute grande nation requiert une capitale à sa mesure — qu'une cité rivalisant avec l'antique Arminalêth s'élève donc ici. Elle se nommera Arminalêthôr, car elle est le fils et l'héritier d'Arminalêth, bâtie à son image et à sa mémoire."
 decision_arminalethor_tooltip: "Élever une grande capitale à l'image d'Armenelos"
 decision_arminalethor_confirm: "Lève-toi, Fils d'Arminalêth !"
 decision_arminalethor_tt: "Arminalêthôr édifiée"

 ###############################
 ####### Rohan Decisions #######
 ###############################
 decision_westmarch_integration: "Consolider le Contrôle sur la Marche Occidentale"
 decision_westmarch_integration_tooltip: "Placer fermement la Marche Occidentale sous le contrôle des Rohirrim"
 decision_westmarch_integration_desc: "Comme défini dans le Don de Cirion, la Marche Occidentale - le triangle entre les rivières Isen et Adorn - est une partie légitime du Riddermark. Mais la loyauté de son peuple, mélange de Dunlendings et de Rohirrim, a longtemps été incertaine, et ces dernières années, ils ont été de facto indépendants d'Edoras. Nous devons consolider notre contrôle sur la région et la ramener fermement sous la Maison d'Eorl."
 decision_westmarch_integration_confirm: "La Frontière Occidentale du Riddermark est sécurisée !"
 
 decision_invite_dwarves_whitemountains_northern: "Inviter les Nains aux Montagnes Blanches Septentrionales"
 decision_invite_dwarves_whitemountains_northern_tooltip: "Encourager les [dwarves|E] à commencer à s'établir dans les Montagnes Blanches (depuis le versant nord)"
 decision_invite_dwarves_whitemountains_southern: "Inviter les Nains aux Montagnes Blanches Méridionales"
 decision_invite_dwarves_whitemountains_southern_tooltip: "Encourager les [dwarves|E] à commencer à s'établir dans les Montagnes Blanches (depuis le versant sud)"
 decision_invite_dwarves_whitemountains_desc: "Les Montagnes Blanches qui bordent mon royaume n'ont, à toutes les époques du monde, jamais été colonisées, pas même par le peuple robuste des haches et de l'artisanat, les hardis [dwarves|E].\n\nBien que nous-mêmes manquions de finesse pour coloniser ces pics menaçants et ces grottes sans lumière, il y a sûrement quelques personnages aventureux dans les royaumes nains de ce monde qui seraient prêts à relever le défi, si suffisamment motivés."
 decision_invite_dwarves_whitemountains_confirm: "Contactons les Seigneurs des Nains !"
 decision_invite_dwarves_whitemountains_northern_tt: "Les Nains seront invités à s'établir dans les Montagnes Blanches depuis le versant nord"
 decision_invite_dwarves_whitemountains_southern_tt: "Les Nains seront invités à s'établir dans les Montagnes Blanches depuis le versant nord"

 decision_oath_of_eorl_rohan: "Invoquer le Serment de Cirion"
 decision_oath_of_eorl_rohan_tooltip: "Chercher l'assistance militaire du Gondor"
 decision_oath_of_eorl_rohan_desc: "Il y a de nombreuses générations, nous nous sommes établis au Calenardhon à la demande de l'Intendant Cirion, à condition que nous y demeurions à jamais amis du Gondor. Notre roi, Eorl, prêta un grand serment d'alliance et d'aide pour sceller ceci, et l'Intendant Cirion prêta également serment. Les deux parties sont venues en aide l'une à l'autre maintes fois auparavant en raison de ce serment.\n\nMaintenant, nous nous trouvons durement pressés, et dans le besoin d'aide. Devons-nous appeler les Gondoriens et invoquer à nouveau le Serment de Cirion ?"
 decision_oath_of_eorl_rohan_confirm: "Dépêchez un cavalier à Minas Tirith. Le Rohan appelle à l'aide !"
 call_on_gondor_for_aid_effect: "Vous appellerez le Gondor à fournir des [men_at_arms|El] pour vous aider dans vos guerres ou à rejoindre chaque [war|El] contre des [kingdoms|E] et des [empires|E]"
 gondor_will_join_your_wars: "Le Gondor rejoindra chacune de vos [wars|E] contre des [kingdoms|E] ou [empires|E]"
 oath_of_eorl_host_rohan_large: "Cavaliers du Rohan"
 oath_of_eorl_host_rohan_small: "Auxiliaires du Rohan"
 LOTR_NOT_ALREADY_FIGHTING_ALONGSIDE_GONDOR_TRIGGER: "Vous ne combattez pas déjà aux côtés du Gondor dans une [war|El]."
 is_in_defensive_war_vs_empire: "Vous êtes en [war|El] Défensive contre un [kingdom|E] ou un [empire|E]"
 
 decision_train_mounted_combat: "S'Entraîner au Combat Monté"
 decision_train_mounted_combat_tooltip: "Chevaucher dans les plaines et s'entraîner à mener la cavalerie au combat"
 decision_train_mounted_combat_desc: "Mener des cavaliers au combat est une affaire totalement différente que de diriger l'infanterie. Le cavalier et la monture doivent être pris en considération; et bien que les charges de cavalerie puissent être extrêmement dévastatrices contre tout ennemi, en commander une avec succès n'est pas une tâche facile.\n\nJ'ai des commandants de cavalerie capables à mon service qui pourraient sûrement m'enseigner une chose ou deux sur le combat monté !"
 decision_train_mounted_combat_confirm: "Chevauchons !"

 #################################
 ####### Hadorrim Decisions #######
 #################################
 decision_reunite_the_eotheod: "Réunifier l'Éothéod"
 decision_reunite_the_eotheod_tooltip: "Unifier les cultures disparates du peuple Hadorrim"
 decision_reunite_the_eotheod_desc: "Depuis les jours d'Eorl et sa grande chevauchée vers le sud, en vérité nul n'a régné sur tous les Éothéod.\n\nCertains restèrent en arrière sous Leofr, s'établissant dans la Vallée de l'Anduin méridional, tandis que d'autres refusèrent complètement de partir, menant une existence dure et fragile dans les terres de l'Anduin septentrional. Mais au final, nous sommes tous parents, malgré les différences mineures qui ont surgi entre nous.\n\nSi nous pouvons rassembler tous nos frères sous une seule bannière, nous pourrons revendiquer le manteau d'un Éothéod unifié."
 decision_reunite_the_eotheod_confirm: "Enfin, notre peuple ne fait plus qu'un"
 reunite_the_eotheod_eotheod_heritage_counties_outside_realm: "Nombre total de [counties|El] dont la [culture|El] possède le [culture_pillar|E] Éothéod en dehors de votre [realm|El] = "
 embrace_eotheod_culture_vassals_custom: "Chaque [vassal|El] $rohirrim$, $leofring$ ou $framling$"
 embrace_eotheod_culture_counties_custom: "Chaque [county|e] $rohirrim$, $leofring$ ou $framling$ dans votre [realm|El]"
 decision_embrace_eotheod_culture_get_innovations: "La [culture|El] Éothéod gagne toutes les [innovations|E] Rohirrim, Leofring et Framling"
 decision_eotheod_new_tradition: "Gagne la [tradition|E] [GetCultureTradition('tradition_a_people_reunited').GetName]"
 decision_eotheod_new_maa: "Peut recruter [GetMaA('eotheod_vanguard').GetName|l] comme [men_at_arms|El]"

 rohan.0002.t: "Les Éothéod Unifiés"
 rohan.0002.desc: "Depuis les jours d'Eorl et sa grande chevauchée vers le sud, en vérité nul n'a régné sur tous les Éothéod.\n\nCertains restèrent en arrière sous Leofr, s'établissant dans la Vallée de l'Anduin méridional, tandis que d'autres refusèrent complètement de partir, menant une existence dure et fragile dans les terres de l'Anduin septentrional. Mais au final, notre peuple est parent, malgré les différences mineures qui ont surgi entre nous.\n\nMaintenant, le grand [unifier.GetName] a revendiqué le manteau d'un Éothéod unifié, appelant nos peuples à mettre de côté ce qui nous divise et à nous rassembler comme un seul peuple à nouveau."
 rohan.0002.a: "Nous serons un seul peuple, un seul Éothéod."
 rohan.0002.b: "Jamais... Je n'abandonnerai pas nos coutumes !"
 
 decision_visit_dwimordene: "Visiter le Dwimordene"
 decision_visit_dwimordene_desc: "Le Dwimordene est une forêt enchantée, enveloppée de brumes. Certains disent qu'une puissante fée règne sur ces terres. Certains suggèrent même de visiter cette forêt afin de recevoir les conseils de la fée..."
 decision_visit_dwimordene_tooltip: "Voyager jusqu'au Bois d'Or et rencontrer son souverain."
 decision_visit_dwimordene_confirm: "Je me rendrai au Dwimordene."
 decision_visit_dwimordene_tt: "Vous voyagerez jusqu'au Bois d'Or"
 
 ###################################
 ####### Enedwaith Decisions #######
 ###################################
 decision_create_dunland_kingdom: "Fonder le Haut Royaume d'Ùtrì Dunhainn"
 decision_create_dunland_kingdom_tooltip: "Vous couronner comme premier souverain d'Ùtrì Dunhainn, le royaume entre trois rivières."
 decision_create_dunland_kingdom_desc: "Il y a des siècles, les [Concept('rohirrim','cavaliers du nord')|E] chassèrent nos aïeux des plaines fertiles, volant les terres qui étaient notre droit de naissance. Cette antique trahison a semé une haine profonde et tenace dans notre peuple, une blessure qui n'a jamais guéri.\n\nDepuis des générations, nous avons rêvé de reconquérir ce qui a été perdu, de nous élever de l'ombre de [GetTitleByKey('k_rohan').GetNameNoTier] et de restaurer notre place légitime. Beaucoup ont essayé, et la vengeance a souvent semblé à notre portée. Pourtant, là où [GetScriptedCharacterByHistoryID('lineoffreca3').GetFirstName], [GetScriptedCharacterByHistoryID('lineoffreca1').GetFirstName], et d'autres avant moi ont faibli, je ne fléchirai pas.\n\nLe temps est venu d'unir notre peuple et de sculpter notre propre royaume, un qui perdurera et reconquerra la gloire qui nous a été volée il y a si longtemps."
 decision_create_dunland_kingdom_desc_older: "Il n'y a pas si longtemps, de sauvages [Concept('rohirrim','cavaliers du nord')|E] chassèrent nos ancêtres des riches plaines qui étaient autrefois notre foyer. À leur place, ils bâtirent le [riddermark|E], un royaume qui prospéra tandis que nous étions rejetés dans les contrées sauvages, laissés à lutter et à endurer.\n\nÀ travers les âges, nombre des nôtres ont cherché à reconquérir ce qui fut perdu, et bien que leurs efforts aient échoué, leur feu brûle encore dans nos cœurs.\n\nMaintenant, le temps est venu d'achever ce qu'ils ont commencé. Nous nous lèverons comme un seul peuple, unis sous une seule bannière, et sculpterons notre propre royaume. Les plaines de nos ancêtres seront nôtres à nouveau, et aucun cavalier ne nous chassera jamais plus de nos terres."
 decision_create_dunland_kingdom_confirm: "Reprenons ce qui est nôtre."
 
 decision_integrate_enedhwaith: "Intégrer l'Enedhwaith Occidental"
 decision_integrate_enedhwaith_tooltip: "Notre Royaume s'étendra du Gwathlo à l'Anduin."
 decision_integrate_enedhwaith_desc: "Avec notre force croissante, je cherche de nouvelles cibles d'expansion.\nNous avons longtemps revendiqué le titre d'Ùtrì Dunhainn, la terre-entre-trois-rivières, mais notre contrôle n'atteint pas l'embouchure du Gwathlo. Si nous pouvions conquérir les terres de l'Enedhwaith Occidental, elles pourraient être intégrées à notre royaume."
 decision_integrate_enedhwaith_confirm: "Les tribus ploieront le genou."
 
 decision_restore_saralain: "Restaurer le Royaume de Saralain"
 decision_restore_saralain_tooltip: "Tenter de réunir les clans Saralain éparpillés en revendiquant la royauté"
 decision_restore_saralain_desc: "Longtemps en déclin, le Royaume de Saralain est tombé dans l'histoire et la ruine. Mais, si nous pouvions établir une base de pouvoir suffisante, peut-être pourrions-nous tenter de revendiquer le manteau et rassembler les clans sous un seul trône."
 decision_restore_saralain_confirm: "Ralliez-vous à moi, membres du clan !"
 restore_saralain_custom_warning: "#W D'autres chefs de clan suffisamment puissants pourraient contester notre revendication et tenter de s'emparer eux-mêmes du royaume !#!"
 
