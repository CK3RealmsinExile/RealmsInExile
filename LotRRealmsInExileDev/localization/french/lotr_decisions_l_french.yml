 reintegrate_province_harondor_tooltip: "#T #V Récupérer la Province Longuement Contestée de [GetTitleByKey('k_harondor').GetNameNoTier]#! #!\n\nDepuis maintes générations, la Province de Harondor a été disputée entre les [gondorians|E] et les [haradrim|E]. La province étant enfin pleinement reconquise, il est temps de mettre fin au débat une fois pour toutes et de graver dans la pierre que Harondor est une partie légitime du [gondor|E] !"
