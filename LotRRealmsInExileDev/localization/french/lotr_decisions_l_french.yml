 ##############################
 #### Dol Amroth Decisions ####
 ##############################
 decision_amrothian_reserves: "Rassembler les Réserves Amrothiennes"
 decision_amrothian_reserves_desc: "Reléguées depuis des années au rang de fonctions les plus humbles au sein de l'Ordre du Cygne, les troupes amrothiennes ont pourtant, à bien des égards, préservé l'esprit véritable de l'Ordre originel mieux que quiconque. Malgré cela, leurs rangs ont été douloureusement clairsemés — ce rôle jugé dénué d'honneur et de splendeur fut trop longtemps négligé.\n\nŒuvrons à rendre à cette colonne vertébrale de nos forces toute sa vigueur combattante."
 decision_amrothian_reserves_tooltip: "Renflouer les rangs qui forment l'ossature de votre armée"
 decision_amrothian_reserves_confirm: "Que chaque homme sache le besoin de [ROOT.Char.GetTitleAsNameNoTooltip] !"

 decision_dol_amroth_edhellond: "Établir les Rôdeurs de Nimrodel"
 decision_dol_amroth_edhellond_desc: "Edhellond, ancien foyer du domaine [elven|E] éponyme, est l'une des gouvernorats les plus nobles et les plus opulents de Dor-en-Ernil. Ses habitants s'efforcent d'imiter les tactiques guerrières des Elfes, à rebours du reste de [dol_amroth|E] qui perpétue une tradition martiale héritée des jours glorieux de [numenor|E]. Au sein de l'Ordre, leurs rangs sont demeurés vides, les serments non prononcés tandis que la corruption rongeait l'institution. Nous devons renouer avec les serments d'antan.\n\nSi ces hommes pouvaient être réintégrés dans les armées de [ROOT.Char.GetTitleAsNameNoTooltip], ils constitueraient un contingent aussi puissant qu'original."
 decision_dol_amroth_edhellond_tooltip: "Réformer les Régiments d'Edhellond"
 decision_dol_amroth_edhellond_confirm: "Envoyez notre cavalier le plus rapide rassembler les hommes !"
 decision_dol_amroth_edhellond_tt: "Peut recruter [GetMaA('rangers_of_ithilien').GetName|l] comme [men_at_arms|El]"

