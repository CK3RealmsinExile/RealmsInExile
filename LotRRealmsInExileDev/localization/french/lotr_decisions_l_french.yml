 lotr_invite_northron_colonists_option: "#Bold Colons#!"
 lotr_invite_northron_colonists_option_desc: "Inviter des colons du Nord"
 lotr_invite_northron_colonists_option_tooltip: "Coût : @gold_icon! #V #Bold [GetPlayer.MakeScope.ScriptValue('lotr_northron_settlers_large_cost')|]#!#!\n\n$EFFECT_LIST_BULLET$Tous les [counties|El] que vous possédez dans le [duchy|El] de votre [capital|El] gagnent une petite quantité de [development|El] et de [control|El] ainsi que le [county_modifier|El] [GetModifier('northron_colonists_modifier').GetNameWithTooltip] pour #V 10#! à #V 25#! ans\n$EFFECT_LIST_BULLET$Vous pourriez obtenir le [character_modifier|El] [GetModifier('northron_reinforcements_modifier').GetNameWithTooltip|L] selon votre [intrigue|El] [intrigue_i|E]"
 lotr_invite_northron_courtiers_option: "#Bold Courtisans#!"
 lotr_invite_northron_courtiers_option_desc: "Inviter des courtisans du Nord"
 lotr_invite_northron_courtiers_option_tooltip: "Coût : @gold_icon! #V #Bold [GetPlayer.MakeScope.ScriptValue('lotr_northron_settlers_small_cost')|]#!#!\n\n$EFFECT_LIST_BULLET$Deux [courtiers|El] du Nord rejoindront votre [court|El], chacun excellent dans au moins une [skill|El], souvent la [martial|El] et la [prowess|El], vous pourrez choisir l'un ou les deux. Ils pourraient arriver avec leur [family|El]\n$EFFECT_LIST_BULLET$Vous pourriez obtenir le [character_modifier|El] [GetModifier('northron_reinforcements_modifier').GetNameWithTooltip|L] selon votre [diplomacy|El] [diplomacy_i|E]"
 lotr_invite_northron_mercenaries_option: "#Bold Mercenaires#!"
 lotr_invite_northron_mercenaries_option_desc: "Inviter des mercenaires du Nord"
 lotr_invite_northron_mercenaries_option_tooltip: "Coût : @gold_icon! #V #Bold [GetPlayer.MakeScope.ScriptValue('lotr_northron_settlers_large_cost')|]#!#!\n\n$EFFECT_LIST_BULLET$Vous gagnerez entre #V 200#! et #V 1000#! [special_troops|E], incluant au moins un [regiment|E] d'[men_at_arms|El] du Nord\n$EFFECT_LIST_BULLET$Vous pourriez obtenir le [character_modifier|El] [GetModifier('northron_reinforcements_modifier').GetNameWithTooltip|L] selon votre [martial|El] [martial_i|E]"
 lotr_invite_northron_traders_option: "#Bold Marchands#!"
 lotr_invite_northron_traders_option_desc: "Inviter des marchands du Nord"
 lotr_invite_northron_traders_option_tooltip: "Coût : @gold_icon! #V #Bold [GetPlayer.MakeScope.ScriptValue('lotr_northron_settlers_large_cost')|]#!#!\n\n$EFFECT_LIST_BULLET$Vous gagnez le [character_modifier|El] [GetModifier('northron_traders_modifier').GetNameWithTooltip] pour #V 10#! à #V 25#! ans\n$EFFECT_LIST_BULLET$Vous pourriez obtenir le [character_modifier|El] [GetModifier('northron_reinforcements_modifier').GetNameWithTooltip|L] selon votre [stewardship|El] [stewardship_i|E]"
 lotr_invite_northron_rulers_option: "#Bold Seigneurs#!"
