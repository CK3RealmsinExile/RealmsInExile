 completed_decision_gundabad_unite_misties: "A complété la [decision|El] #V $decision_gundabad_unite_misties$#!"

 decision_revive_gundabad: "Raviver Gundabad"
 decision_revive_gundabad_tooltip: "Rétablir le grand royaume orque de Gundabad"
 decision_revive_gundabad_desc: "[gundabad|E] demeure l'ombre de ce qu'il fut jadis. Autrefois le plus puissant royaume [orc|E] des [westlands|E], le Sac de Gundabad et la Bataille des Cinq Armées nous ont ruinés. Nos nombres sont diminués, nos armées ne sont que des coquilles de leur ancienne puissance. Nous devons inverser cette chute, sous peine de ne jamais pouvoir prendre notre vengeance sur les [men|E], les [elves|E] et les [dwarves|E] !\n\nLa première étape est de récupérer notre arrière-pays, où de petits chefdoms gobelins et orques ont surgi. Nous devons les forcer à s'agenouiller, et par leur force, nous nous reconstruirons."
 decision_revive_gundabad_confirm: "Rappelez-leur notre force !"

 decision_gundabad_ignite_the_forges: "Embraser les Forges de Gundabad"
 decision_gundabad_ignite_the_forges_tooltip: "Renforcer notre machine de guerre au cœur de notre royaume"
 decision_gundabad_ignite_the_forges_desc: "Profondément dans Gundabad reposent, froides, les forges des anciens Nains, de grande taille et capacité. Si nous pouvions les rallumer à nouveau, nous pourrions façonner des armes et des armements pour équiper une armée d'immense taille et puissance. Cela prendra du temps, mais cela pourrait bien valoir les ressources."
 decision_gundabad_ignite_the_forges_confirm: "Qu'elles brûlent à nouveau !"
 decision_gundabad_ignite_the_forges_requirement: "N'importe quel [county|El] dans [GetTitleByKey('k_gundabad').GetNameNoTier] possède le [building|El] [GetBuilding('furnaces_04').GetName]"
 decision_gundabad_ignite_the_forges_maa1: "Peut recruter [GetMaA('gundabad_blackshields').GetName|l] comme [men_at_arms|El]"
 decision_gundabad_ignite_the_forges_maa2: "Peut recruter [GetMaA('gundabad_war_troll').GetName|l] comme [men_at_arms|El]"

 decision_gundabad_angmar_mountains: "Établir le Contrôle sur les Montagnes d'Angmar"
 decision_gundabad_angmar_mountains_tooltip: "Étendre notre influence sur les Montagnes d'Angmar"
 decision_gundabad_angmar_mountains_desc: "Les montagnes d'Angmar ont toujours été étroitement liées à Gundabad géographiquement et politiquement, mais elles échappent à notre emprise ! Le Mont Gram est devenu puissant dans un passé récent, au point même de rivaliser avec nous en force et en influence. Nous devons établir notre suprématie et intégrer les montagnes d'Angmar."
 decision_gundabad_angmar_mountains_confirm: "Gundabad s'agrandit..."

 decision_gundabad_dominion_over_langwell: "Restaurer la Domination Orque de Langwell"
 decision_gundabad_dominion_over_langwell_tooltip: "Établir la domination sur les seigneurs des chevaux de Langwell"
 decision_gundabad_dominion_over_langwell_desc: "Autrefois, les hommes du haut Langwell offraient tribut aux Seigneurs Orques de Gundabad, vivant dans la crainte de notre courroux. Cela continua sous Angmar, mais avec sa chute, notre influence sur les Hommes de la région s'effondra également. L'Éothéod nous massacrait chaque fois que nous sortions, et nous fûmes ainsi forcés de rester dans les montagnes. La première étape pour rétablir nos domaines est de remettre à nouveau la peur de Gundabad dans les cœurs des Hommes !"
 decision_gundabad_dominion_over_langwell_confirm: "Les chevaux ne sont pas de taille face aux wargs !"
 decision_gundabad_dominion_over_langwell_effect: "Option d'installer des adeptes corrompus de [culture|El] locale [THIS.Char.GetFaith.GetName] dans [GetTitleByKey('k_langwell').GetNameNoTier] pour régner comme [vassals|El] sur la population du pays."
 decision_gundabad_dominion_over_langwell_effect2: "Option alternative de ravager la population humaine de [GetTitleByKey('k_langwell').GetNameNoTier] et tenter une conversion massive de [culture|El] et de [faith|El]."

 decision_drive_men_from_the_vale: "Chasser les Hommes de la Vallée"
 decision_drive_men_from_the_vale_tooltip: "L'âge des Hommes est terminé. Le temps de l'Orque est venu !"
 decision_drive_men_from_the_vale_desc: "Avant la désastreuse Bataille des Cinq Armées à Dale, ou les temps anciens où les grandes forteresses d'Angmar et de Gundabad agissaient de concert, inaugurant un âge d'or pour les Orques inégalé depuis longtemps, apportant destruction aux ennemis haïs de l'Uruk et richesses pour la Montagne. Pourtant, ces épisodes de gloire ne durèrent pas longtemps. Angmar tomba face aux vils Tarks, et Gundabad aussi perdit sa grandeur. Nous devons conquérir les Hommes pendant qu'ils sont divisés et que les Tarks sont occupés à se défendre contre le Seigneur Ténébreux. Une fois de plus nous nous élèverons !"
 decision_drive_men_from_the_vale_confirm: "Rappelez-leur notre seigneurie !"

 decision_gundabad_grey_mountains: "Intégrer les Clans Guerriers des Montagnes Grises"
 decision_gundabad_grey_mountains_tooltip: "Étendre notre influence sur les Montagnes Grises"
 decision_gundabad_grey_mountains_desc: "Depuis que les dragons ont chassé les Nains, les orques et gobelins des Montagnes Grises sont restés en grande partie inactifs là-bas. Mais ils ont entendu l'appel de Bolg pour venger le Grand Gobelin et ont joint leurs armées aux nôtres dans la Bataille des Cinq Armées. Nous les récompenserons en les intégrant dans notre royaume grandissant et en consolidant les Montagnes Grises comme une extension de Gundabad !"
 decision_gundabad_grey_mountains_confirm: "La grande armée orque du nord se lève !"
 decision_gundabad_grey_mountains_requirement: "Pas de [independent_ruler|El] de [culture|El] [orc|E] dans [GetTitleByKey('k_grey_mountains').GetNameNoTier]"
 decision_gundabad_grey_mountains_effect1: "Plusieurs [orcs|E] qualifiés des [GetTitleByKey('k_grey_mountains').GetNameNoTier] rejoignent votre [court|El]"
 decision_gundabad_grey_mountains_effect2: "Découvrez un puissant [artifact|El] des profondeurs des Montagnes"

 decision_revenge_for_five_armies: "Venger la Bataille des Cinq Armées"
 decision_revenge_for_five_armies_tooltip: "Éliminer les amis des Tarks avant qu'ils ne s'unissent"
 decision_revenge_for_five_armies_desc: "Avec notre emprise à nouveau fermement établie dans le Nord, le Mont se mettra en marche pour accomplir la tâche que le Seigneur Ténébreux Sauron a fixée pour la Montagne - L'annihilation des maudits Elfes et de leurs alliés humains. Si la Tour Noire doit éclipser celle d'Ecthelion le Tark, le Gondor doit être isolé de tout ce qui pourrait lui venir en aide. Les richesses d'Aradhrynd, Dale et la Montagne Solitaire, qui auraient dû être nôtres il y a des décennies, sont utilisées pour fortifier des villes, forger des alliances et lever des armées. La Montagne doit les éteindre avant qu'ils ne frappent les premiers."
 decision_revenge_for_five_armies_confirm: "Tout le Nord s'inclinera devant le Seigneur Ténébreux !"

 decision_gundabad_unite_misties: "Unir les Orques des Montagnes Brumeuses"
 decision_gundabad_unite_misties_tooltip: "Rétablir notre domination des montagnes"
 decision_gundabad_unite_misties_desc: "[gundabad|E] renaît, et sa force grandissant, le temps est venu d'unir les Orques des Montagnes ! Rien de tel n'a été tenté depuis Azog de la Moria, mais maintenant nous avons une véritable chance. Que les armées de Gundabad marchent, et que chaque orque et gobelin connaisse sa place - au pas derrière elles !"
 decision_gundabad_unite_misties_desc.fallback: "[gundabad|E] se dresse à nouveau, et sa puissance croissant, l'heure est venue d'unifier les [orcs|E] des Montagnes ! Une telle entreprise n'a que rarement été tentée, et plus rarement encore menée à bien — mais nous avons désormais une véritable chance. Que les armées de Gundabad se déploient, et que chaque Orque et chaque [goblin|E] connaisse sa place — en rangs serrés derrière elles !"
 decision_gundabad_unite_misties_confirm: "Nous ferons pleuvoir la terreur depuis nos demeures montagneuses !"
 decision_gundabad_unite_misties_requirement: "Pas de [independent_ruler|El] dans [GetTitleByKey('e_misty_mountains').GetNameNoTier]"
 
 decision_dissolve_unified_durins_folk: "Dissoudre le Peuple de Durin"
 decision_dissolve_unified_durins_folk_tooltip: "Démanteler la domination [dwarven|E] sur ces montagnes"
 decision_dissolve_unified_durins_folk_desc: "Les [dwarves|E] des [durinsfolk|E] ont jadis régné sur ces montagnes, mais leur heure est révolue. L'âge des [orcs|E] est venu — nous sommes désormais les rois sous la montagne ! Leurs halls sont nôtres, leur orgueil brisé, leurs antiques demeures profanées."
 decision_dissolve_unified_durins_folk_confirm: "Profanons l'héritage de Durin !"

 ##########################
 ### Druedain Decisions ###
 ##########################

 decision_create_watch_stone: "Tailler une Pierre-Sentinelle"
 decision_create_watch_stone_desc: "Parmi les Drûedain, certains possèdent le savoir-faire nécessaire pour tailler ce que mon peuple appelle une pierre-sentinelle. Façonnées à l'image de leur créateur, ces pierres sont réputées monter une garde silencieuse et sans fin sur leur demeure.\n\nTailler une telle pierre n'est pas chose aisée, mais si j'y parvenais, cela m'attirerait un grand respect parmi les miens."
 decision_create_watch_stone_tooltip: "Créer une pierre de veille dans votre capitale"
 decision_create_watch_stone_confirm: "Apportez-moi un ciseau."

 decision_reclaim_ray: "Restaurer le Sûzush Agkhôr"
 decision_reclaim_ray_tooltip: "Reconquérir les terres ancestrales du Sûzush Agkhôr sur les Haradrim !"
 decision_reclaim_ray_desc: "Aux premiers jours, notre peuple façonna de puissantes choses, apprenant des Anciens qui s'éveillèrent sous les étoiles, et des Esprits qui demeuraient parmi nous. Puis les Étrangers vinrent de l'est. Un temps nous vécûmes en harmonie, mais ils commencèrent à se méfier et à nous haïr, nous repoussant dans la forêt de Sûza Sûmar avec leurs nombres toujours croissants. Nous oubliâmes beaucoup de ce que nous savions jadis, et devînmes un peuple simple, à peine capable de maintenir les grands édifices de pierre que nous avions autrefois élevés. Mais peut-être, si nous pouvions repousser les envahisseurs, pourrions-nous reconquérir notre stature perdue..."
 decision_reclaim_ray_confirm: "Sûzush Agkhôr est notre patrie !"

 decision_rediscover_yatalin_gan: "Redécouvrir les Terres Oubliées"
 decision_rediscover_yatalin_gan_tooltip: "Fouler les Sentiers du Yatali-Gân depuis longtemps perdu"
 decision_rediscover_yatalin_gan_desc: "Jadis vivait le lignage du Yatali-Gân, dans les jungles à notre orient. Depuis longtemps il a disparu, laissant ses forêts derrière lui. Vides et silencieuses, ces terres n'ont été troublées par aucun peuple.\n\nLes Hommes du Rây nous encerclant de toutes parts dans le Sûza-Sûmar, il se pourrait bien que l'heure soit venue de quitter ces terres et de chercher refuge dans les jungles paisibles du Yatali-Gân."
 decision_rediscover_yatalin_gan_confirm: "Il nous faut nous remettre en chemin."
 decision_rediscover_yatalin_gan_tt: "Vous partirez pour [GetTitleByKey('c_bru_kha').GetNameNoTier|U]."

 decision_tree_of_sorrows: "Nourrir l'Arbre des Douleurs"
 decision_tree_of_sorrows_tooltip: "Offrir des captifs au cœur d'Eryn Vorn"
 decision_tree_of_sorrows_desc: "Au plus profond des bois obscurs d'Eryn Vorn se dresse l'antique Arbre des Douleurs. On dit qu'il est le dernier bastion des forêts anciennes qui dominèrent jadis une grande part de [eriador|E]. L'arbre est massif, tordu et gonflé bien au-delà de la taille naturelle de son espèce. De loin, il ressemble à un géant voûté, une sombre cape de feuilles drapée autour de ses épaules courbées comme pour le protéger des vents froids de la mer, son visage miséricordieusement soustrait aux regards.\n\nL'arbre semble se gonfler doucement à l'approche de tout être vivant, montagne vivante de verdure emmêlée. Les Beffraen suspendent les corps de leurs captifs à ses branches tordues, leur sang nourrissant les racines obscures..."
 decision_tree_of_sorrows_confirm: "Amenez les prisonniers."
 decision_tree_of_sorrows_tt: "Vos [prisoners|El] sont sacrifiés"
 decision_tree_of_sorrows_prisoners: "Vous devez avoir au moins 20 [prisoners|El]"

 #####################################
 ###### Bozisha-Miraz Decisions ######
 #####################################
 decision_recreate_zajantak: "Unir le Royaume de Zajantak"
 decision_recreate_zajantak_tooltip: "Unir le Royaume de Guerre en consolidant ses terres centrales, et préparer un puissant coup contre l'Hôte des Tempêtes"
 decision_recreate_zajantak_desc: "Il y a de longues années, nous étions un peuple simple : demeurant comme des sauvages dans la forêt, vivant et mourant comme nous le pouvions, ne méritant ni grand chant ni grand conte. De temps à autre, nous pouvions nous unir derrière un grand Roi de Guerre contre une menace extérieure, mais jamais tous, et jamais longtemps. Pendant de longues années, nous avons combattu contre les descendants des Rois de la Mer - les [southerndragonarmyadunaic|E], qui ont asservi nos misérables parents - mais maintenant nous sommes dispersés, avec de petits chefs se disputant quelque modeste semblant de pouvoir. Mais la forêt doit s'unir à nouveau - et sous mon règne, Zajantak triomphera. Jamais plus nous ne serons esclaves !"
 decision_recreate_zajantak_confirm: "[GetTitleByKey('k_zajantak').GetNameNoTier] s'élève !"

 decision_break_stormhost_power: "Libérer vos parents de l'Hôte des Tempêtes"
 decision_break_stormhost_power_tooltip: "Dresser vos forces contre l'Hôte des Tempêtes pour libérer une partie de votre peuple des Adûnâi"
 decision_break_stormhost_power_desc: "Zajantak est uni, et le [stormhost|E] tremble. Sans le pouvoir du [stormking|E], les Adûnâi sont devenus faibles et impuissants, et pourtant ils s'accrochent encore au joug avec les derniers vestiges de leur force. Plus encore et pire, ils sont devenus plus cruels depuis la restauration de notre royaume, et quels que soient nos parents qui n'ont pas été détruits par leurs nouvelles dépravations saignent sous un fouet plus acéré, avide d'un nouveau sadisme.\n\nNous ne pouvons pas assaillir l'Hôte des Tempêtes dans son entier - mais nous rognerons les chaînes qui retiennent nos parents. La vengeance vient, et avec une lame sanglante !"
 decision_break_stormhost_power_confirm: "Jamais plus ils ne seront esclaves !"

 decision_tandiland: "Briser le Joug Adûnâi"
 decision_tandiland_tooltip: "Usurper le titre de [GetTitleByKey('k_an_balkumagan').GetNameNoTier] aux Adûnâi pour de bon"
 decision_tandiland_desc: "Les maîtres d'esclaves ont été entièrement chassés des arrière-pays et des forêts profondes des Tandi, et repoussés vers les côtes d'où ils vinrent initialement. Éparpillés et querelleurs, leur pouvoir s'est affaibli tandis que nous sommes devenus forts et libres, unis comme un seul peuple contre la menace venue de l'Ouest. Il est temps pour moi de proclamer Antakwêlâi, le Zaja des Côtes, et d'unir mes parents pour de bon, quoi qu'il advienne."
 decision_tandiland_confirm: "Je dépose mes lances pour des charrues, et ne fais plus la guerre."
 
 #################################
 #####  Ray Story Decisions  #####
 #################################

 ### Mardat Decisions ###
 decision_envoy_haruzan: "Envoyer des Émissaires à Haruzan"
 decision_envoy_haruzan_tooltip: "Envoyer des émissaires à Haruzan, dans l'espoir d'obtenir le soutien de votre famille maternelle et de vos frères dans la foi de Khäz-gramaze."
 decision_envoy_haruzan_desc: "Si Haruzan est loin de mon royaume, il est gouverné par la famille de ma mère et demeure le plus grand royaume à suivre la vraie foi. Sous la tutelle directe de Khäz-gramaze, son royaume a prospéré et ils ont entrepris la grande œuvre de restaurer l'empire déchu de Harwan. Je suis certain que si je leur envoyais des émissaires en quête de leur amitié, ils enverraient tout ce qu'ils peuvent épargner pour voir [ray|E] les rejoindre dans leur grandeur."
 decision_envoy_haruzan_confirm: "Envoyez les émissaires"
 mardat_envoy_effects_tt: "Vous recevrez le soutien de Haruzan après que vos émissaires seront revenus de leur long voyage vers le nord."
 mardat_only_one_scheme: "Vous ne pouvez pas déjà préparer une autre machination"

 decision_stormhost_support: "Chercher le Soutien de l'Ost-tempête"
 decision_stormhost_support_tooltip: "Chercher le soutien de l'Ost-tempête dans votre usurpation de [GetTitleByKey('k_ray').GetNameNoTier]"
 decision_stormhost_support_desc: "Bien que les Anbalûkkhôri de l'[stormhost|E] soient issus des partisans du vil Malicìam, ils ont renié leur ancienne allégeance depuis plus d'un demi-millénaire. Désormais, ils projettent même d'aider la cause de Khäz-gramaze et de détruire le honni [bellakar|E].\n\nLes Anbalûkkhôri cherchent tout allié susceptible de servir leur dessein de détruire leur ennemi du nord. Si je pouvais me positionner, moi et [ray|E], comme un allié dans leurs efforts, cela pourrait grandement favoriser mon but d'usurper le pouvoir de la Dynastie Solaire mourante."
 decision_stormhost_support_confirm: "Ceci #Italic devrait# bien se passer..."
 mardat_stormhost_support_effects_tt: "Vous vous rendrez à Khorsâj, capitale de l'Ost-tempête, et tenterez de négocier les termes d'une alliance avec le Maréchal-tempête."

 decision_powan_support: "Chercher des Soutiens à Pôwa"
 decision_powan_support_tooltip: "Chercher le soutien de la tribu Pôwan de Ne Sargoà dans votre usurpation de [GetTitleByKey('k_ray').GetNameNoTier]"
 decision_powan_support_desc: "Bien que les tribus Pôwans aient toujours été faibles et désunies, certains petits chefs ont réussi à rassembler pouvoir et renom. Directement à l'est de [ray|E], la tribu de Ne Sargoà s'est affermie et a prospéré grâce aux routes commerciales avec mon royaume.\n\nÉtant des adeptes de la brutale déesse Shyra, je ne doute pas qu'ils se joindraient volontiers à ma future purge de [GetTitleByKey('k_ray').GetNameNoTier]. Après tout, importe-t-il vraiment que les hérétiques et les traîtres périssent dans les temples de Khäz-gramaze ou dans ceux de Shyra ?"
 decision_powan_support_confirm: "J'espère que leur soif de sang les guidera."
 mardat_powan_support_effects_tt: "Vous vous rendrez à Beghom, capitale de Ne Sargoà, et tenterez de négocier les termes d'une alliance avec le chef Pôwan de la région."

 decision_nafarati_support: "Chercher le Soutien des Nâfarati"
 decision_nafarati_support_tooltip: "Chercher le soutien des guerriers et mercenaires Nâfarati dans votre usurpation de [GetTitleByKey('k_ray').GetNameNoTier]"
 decision_nafarati_support_desc: "Bien que les Nâfarati soient des nouveaux venus dans les environs de [ray|E], ils ont déjà prouvé leur valeur comme grands guerriers à travers tout Sîrayn. Depuis son arrivée il y a trois générations, la tribu de Delritha compte parmi les grandes puissances de Chennacatt, au sud-est de mon royaume.\n\nSi je pouvais gagner la loyauté de leur chef, par l'or ou par des promesses de terres, les Nâfarati pourraient se révéler de précieux alliés contre la Dynastie Solaire."
 decision_nafarati_support_confirm: "Quel prix leur aide aura-t-elle, je me le demande..."
 mardat_nafarati_support_effects_tt: "Vous vous rendrez à Junrik, capitale de Delritha, et négocierez avec les Nâfarati pour obtenir leur soutien."

 decision_infiltration: "Infiltrer Bôzisha-Dâr"
 decision_infilration_tooltip: "Établir un réseau d'espions et d'agents dans la capitale de [GetTitleByKey('k_ray').GetNameNoTier]."
 decision_infilration_desc: "Si je dois prendre le pouvoir à [ray|E], je dois commencer par installer un réseau d'espions et d'agents loyaux dans la capitale du royaume. Bien que les partisans de Khäz-gramaze y soient peu nombreux, la nature commerciale de Bôzisha-Dâr la rend très aisée à infiltrer pour les nouveaux venus.\n\nUne fois mes agents en place, je pourrai commencer à étendre mon pouvoir dans l'ombre de la capitale et œuvrer à la chute de la Dynastie Solaire depuis le cœur même de sa puissance."
 decision_infilration_confirm: "Préparez mes agents."
 decision_infilration_effects_tt: "Vous enverrez vos agents tenter d'infiltrer Bôzisha-Dâr."

 decision_guard_takeover: "Prendre le Contrôle de la Garde Capitoline"
 decision_guard_takeover_tooltip: "Corrompre ou convaincre les gardes de la capitale de [GetTitleByKey('k_ray').GetNameNoTier] de vous aider dans une tentative de coup."
 decision_guard_takeover_desc: "Si je dois m'emparer de [ray|E] depuis l'ombre, il me faut m'assurer le soutien de la garde de la cité de Bôzisha-Dâr. Sans eux, je n'aurais aucun moyen pratique de prendre la ville sans un siège sanglant et probablement long, laissant à mes rivaux intérieurs l'occasion d'exploiter l'opportunité.\n\nPour gagner la garde, il me faudra conquérir leur loyauté, soit par la corruption, soit en les convainquant de ma puissance et du bien-fondé de ma cause."
 decision_guard_takeover_confirm: "Demandez à mes agents de prendre contact avec les chefs de la garde."
 decision_guard_takeover_effects_tt: "Vous déciderez comment convaincre la hiérarchie des gardes capitolins de vous soutenir contre les Kralyi."

 decision_rob_merchants: "Exploiter le Commerce Trans-Haradique"
 decision_rob_merchants_tooltip: "Engager des brigands pour affaiblir le contrôle central sur le commerce et vous enrichir au passage."
 decision_rob_merchants_desc: "De tout temps, le commerce a été la sève vitale de [ray|E] et sans lui le royaume sombреrait rapidement dans la ruine économique. Pour prévenir une telle chose, les Kralyi et les seigneurs de [GetTitleByKey('k_ray').GetNameNoTier] déploient de grands efforts pour assurer la sécurité de tous les marchands qui traversent le royaume.\n\nSi ce commerce venait à s'étioler, cela pourrait porter un coup fatal à l'autorité Kanivâtra déjà vacillante. Si je finançais les brigands mêmes que je suis chargé de combattre, je pourrais exploiter davantage encore ma position aux marges de [GetTitleByKey('k_ray').GetNameNoTier], m'enrichissant tout en paralysant peut-être l'économie centrale du royaume."
 decision_rob_merchants_confirm: "Une telle entreprise serait fort lucrative en vérité..."
 decision_rob_merchants_effects_tt: "Vous commencerez à mettre en place une opération à grande échelle visant à paralyser l'économie du royaume tout en vous enrichissant."

 decision_convert_radicals: "Convertir les Masses de Bôzisha-Dâr"
 decision_convert_radicals_tooltip: "Tenter de convertir la population de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] au Culte de Khäz-gramaze."
 decision_convert_radicals_desc: "Nombreux sont, dans la grande cité capitale de [ray|E], ceux qui ne sont plus satisfaits du [GetFaithByKey('faith_vatra').GetName]. En vérité, la faiblesse des Vâtrans et leur absence de tout vrai zèle ou dessein au-delà de l'accumulation toujours plus grande de richesses ont conduit beaucoup à perdre la foi. Si je pouvais apporter les ténèbres de Khäz-gramaze à ces âmes égarées, je pourrais en faire des forces loyales dans la prochaine lutte pour le pouvoir à [GetTitleByKey('k_ray').GetNameNoTier].\n\nIl me suffirait de charger mes agents d'introduire en secret mon prêtre le plus loyal et le plus zélé à Bôzisha-Dâr et de lui faire exploiter la stupide tolérance des Kanivâtra pour répandre la vraie foi parmi le peuple de la cité."
 decision_convert_radicals_confirm: "Les cœurs de la cité seront miens."
 decision_convert_radicals_effects_tt: "Vous tenterez de convertir une grande part du peuple de Bôzisha-Dâr en adorateurs fanatiques de Khäz-gramaze afin qu'ils puissent déstabiliser la capitale et accroître votre influence sur la cité."

 decision_block_port: "Rassembler une Flotte de Blocus"
 decision_block_port_desc: "Si je dois consolider mon pouvoir à [GetTitleByKey('c_bozisha_dar').GetNameNoTier], il me faudra non seulement prendre le contrôle des portes et des remparts de la cité, mais aussi de ses grands havres. En effet, le grand port de la capitale est la véritable source de sa richesse et de sa puissance — et d'une grande part de celle de [ray|E] — en tant que centre de tout le commerce transitant par la [bayoftulwang|E].\n\nSans contrôle sur les ports, non seulement les Kanivâtra ou leurs partisans pourraient tenter de fuir la cité lors de mon accession au pouvoir, mais j'aurais aussi toutes les peines du monde à imposer ma volonté à tout autre dissident dans la cité. [GetTitleByKey('d_suza_riy').GetNameNoTier] étant trop enclavé pour constituer une grande flotte, il me faudra en trouver une plus proche de mon objectif..."
 decision_block_port_tooltip: "Tenter de rassembler une flotte pour bloquer les ports de [GetTitleByKey('c_bozisha_dar').GetNameNoTier]."
 decision_block_port_confirm: "Certains capitaines rejoindront sûrement ma cause..."
 decision_block_port_effects_tt: "Vous enverrez vos agents trouver des capitaines prêts à servir votre cause afin que leurs navires vous aident à bloquer les havres de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] lors de votre coup."

 decision_mardat_civil_war: "Déclarer la Guerre Civile à Rây"
 decision_mardat_civil_war_tt: ""
 decision_mardat_civil_war_desc: "Lorsque j'ai commencé à comploter mon accession au pouvoir à [ray|E], j'en avais imaginé un coup rapide et décisif contre la règle Kanivâtra. Pourtant, maintes et maintes fois, mes complots se sont révélés coûteux et infructueux. Pendant ce temps, j'ai pu rassembler de nombreux alliés parmi les voisins avides de pouvoir de [GetTitleByKey('k_ray').GetNameNoTier].\n\nAvec leur aide et la bénédiction de Khäz-gramaze, je suis sûr de l'emporter sur les adorateurs faibles et décadents de Vâtra. Je dois cependant veiller à ne pas frapper trop tôt : même mes guerriers zélés ne peuvent écraser Vâtra seuls, du moins pour l'heure."
 decision_mardat_civil_war_confirm: "Les jours des Kanivâtra sont comptés !"
 decision_mardat_civil_war_tooltip: "Vous déclarerez la guerre à [GetTitleByKey('k_ray').GetNameNoTier] pour éradiquer les Kanivâtra et renverser la règle Vâtrane en faveur de la domination du royaume par le Culte de Khäz-gramaze. Toutes les puissances étrangères qui ont accepté de vous aider dans votre ascension se joindront à cette guerre."
 nafarati_completion_text: "Vous avez sollicité l'aide des Nâfarati"
 stormhost_completion_text: "Vous avez sollicité l'aide de l'Ost-tempête"
 powa_completion_text: "Vous avez sollicité de l'aide à Pôwa"
 haruzan_completion_text: "Vous avez sollicité le soutien de Haruzan"
 mardat_ray_claim_cb: "Guerre pour le Destin de Rây"
 mardat_ray_claim_name: "Guerre pour le Destin de Rây"
 mardat_civil_powa_only: "Lorsque j'ai commencé à comploter mon accession au pouvoir à [ray|E], j'en avais imaginé un coup rapide et décisif contre la règle Kanivâtra. Pourtant, maintes et maintes fois, mes complots se sont révélés coûteux et infructueux. Pendant ce temps, j'ai pu rassembler de nombreux alliés parmi les voisins avides de pouvoir de [GetTitleByKey('k_ray').GetNameNoTier].\n\nAvec leur aide et la bénédiction de Khäz-gramaze, je suis sûr de l'emporter sur les adorateurs faibles et décadents de Vâtra. Je dois cependant veiller à ne pas frapper trop tôt : même mes guerriers zélés ne peuvent écraser Vâtra seuls, du moins pour l'heure.\n\n#N N'ayant assuré que le soutien des Pôwans, la guerre civile à venir sera très difficile. Il serait sage de rassembler davantage d'alliés avant de déclarer ouvertement la guerre civile. #!"
 mardat_civil_nafarati_only: "Lorsque j'ai commencé à comploter mon accession au pouvoir à [ray|E], j'en avais imaginé un coup rapide et décisif contre la règle Kanivâtra. Pourtant, maintes et maintes fois, mes complots se sont révélés coûteux et infructueux. Pendant ce temps, j'ai pu rassembler de nombreux alliés parmi les voisins avides de pouvoir de [GetTitleByKey('k_ray').GetNameNoTier].\n\nAvec leur aide et la bénédiction de Khäz-gramaze, je suis sûr de l'emporter sur les adorateurs faibles et décadents de Vâtra. Je dois cependant veiller à ne pas frapper trop tôt : même mes guerriers zélés ne peuvent écraser Vâtra seuls, du moins pour l'heure.\n\n#N N'ayant assuré que le soutien des Nâfarati, la guerre civile à venir sera très difficile. Il serait sage de rassembler davantage d'alliés avant de déclarer ouvertement la guerre civile. #!"
 mardat_civil_stormhost_only: "Lorsque j'ai commencé à comploter mon accession au pouvoir à [ray|E], j'en avais imaginé un coup rapide et décisif contre la règle Kanivâtra. Pourtant, maintes et maintes fois, mes complots se sont révélés coûteux et infructueux. Pendant ce temps, j'ai pu rassembler de nombreux alliés parmi les voisins avides de pouvoir de [GetTitleByKey('k_ray').GetNameNoTier].\n\nAvec leur aide et la bénédiction de Khäz-gramaze, je suis sûr de l'emporter sur les adorateurs faibles et décadents de Vâtra. Je dois cependant veiller à ne pas frapper trop tôt : même mes guerriers zélés ne peuvent écraser Vâtra seuls, du moins pour l'heure.\n\n#P Ayant assuré le soutien du puissant Ost-tempête, la guerre civile à venir jouera en votre faveur. Rassembler davantage d'alliés n'est pas nécessaire mais pourrait encore s'avérer utile. #!"
 mardat_civil_powa_and_nafarati: "Lorsque j'ai commencé à comploter mon accession au pouvoir à [ray|E], j'en avais imaginé un coup rapide et décisif contre la règle Kanivâtra. Pourtant, maintes et maintes fois, mes complots se sont révélés coûteux et infructueux. Pendant ce temps, j'ai pu rassembler de nombreux alliés parmi les voisins avides de pouvoir de [GetTitleByKey('k_ray').GetNameNoTier].\n\nAvec leur aide et la bénédiction de Khäz-gramaze, je suis sûr de l'emporter sur les adorateurs faibles et décadents de Vâtra. Je dois cependant veiller à ne pas frapper trop tôt : même mes guerriers zélés ne peuvent écraser Vâtra seuls, du moins pour l'heure.\n\n#N Ayant assuré le soutien des Pôwans et des Nâfarati, la guerre civile à venir sera équilibrée. Il serait encore sage de rassembler davantage d'alliés avant de déclarer ouvertement la guerre civile. #!"
 mardat_civil_all_allies: "Lorsque j'ai commencé à comploter mon accession au pouvoir à [ray|E], j'en avais imaginé un coup rapide et décisif contre la règle Kanivâtra. Pourtant, maintes et maintes fois, mes complots se sont révélés coûteux et infructueux. Pendant ce temps, j'ai pu rassembler de nombreux alliés parmi les voisins avides de pouvoir de [GetTitleByKey('k_ray').GetNameNoTier].\n\nAvec leur aide et la bénédiction de Khäz-gramaze, je suis sûr de l'emporter sur les adorateurs faibles et décadents de Vâtra. Je dois cependant veiller à ne pas frapper trop tôt : même mes guerriers zélés ne peuvent écraser Vâtra seuls, du moins pour l'heure.\n\n#P Ayant assuré le soutien de toutes les grandes puissances favorables à votre cause, la guerre civile à venir sera très aisée. Rây ne pourra tenir face à une si grande coalition. #!"
 mardat_civil_none: "Lorsque j'ai commencé à comploter mon accession au pouvoir à [ray|E], j'en avais imaginé un coup rapide et décisif contre la règle Kanivâtra. Pourtant, maintes et maintes fois, mes complots se sont révélés coûteux et infructueux. Pendant ce temps, j'ai pu rassembler de nombreux alliés parmi les voisins avides de pouvoir de [GetTitleByKey('k_ray').GetNameNoTier].\n\nAvec leur aide et la bénédiction de Khäz-gramaze, je suis sûr de l'emporter sur les adorateurs faibles et décadents de Vâtra. Je dois cependant veiller à ne pas frapper trop tôt : même mes guerriers zélés ne peuvent écraser Vâtra seuls, du moins pour l'heure.\n\n#N N'ayant assuré aucune alliance, la guerre civile à venir sera très difficile. Il serait sage de rassembler des alliés étrangers avant de déclarer ouvertement la guerre civile. #!"

 decision_coup_ray: "Lancer le Coup d'État de Rây"
 decision_coup_ray_tooltip: "Lancer votre machination pour usurper la souveraineté de [GetTitleByKey('k_ray').GetNameNoTier] par l'intrigue plutôt que par la guerre. Vos divers complots visant à accroître votre emprise sur la capitale augmenteront vos chances de succès."
 decision_coup_ray_desc: "Enfin, l'heure est venue pour toutes mes machinations d'atteindre leur aboutissement. Tout est désormais prêt pour que j'envoie le mot à mes agents à [GetTitleByKey('c_bozisha_dar').GetNameNoTier] afin qu'ils exécutent mon plan de prise de contrôle de la cité.\n\nMes hommes loyaux feront en sorte que les portes de la cité soient verrouillées et que ses remparts tombent sous mon contrôle, tandis que les grands havres seront soumis à un blocus, coupant toute voie d'évasion aux Kanivâtra et à leurs partisans. Toutes les sorties bloquées par mes agents et partisans au sein de la cité, ceux-ci marcheront sur le palais du Kralyi et emprisonneront ce dernier ainsi que toute sa cour, le mettant à ma merci."
 decision_coup_ray_confirm: "Les jours des Kanivâtra sont comptés !"
 decision_coup_ray_effects_tt: "Vos chances actuelles de succès pour votre tentative de coup sont de #N [GetPlayer.MakeScope.ScriptValue('lotr_mardat_coup_odds_of_success')]% #!. Pour accroître vos chances de succès, vous devez mener à bien les machinations de la catégorie de décisions Coup d'État de Rây."
 mardat_capital_spies_requierment: "Vous devez avoir infiltré la capitale et y avoir établi un réseau d'agents."

 decision_mardat_murder_bellakar: "Détruire Bellakar"
 decision_mardat_murder_bellakar_desc: "Depuis des millénaires, le royaume honni de [bellakar|E] a prospéré, incontesté, sur la côte septentrionale de la [bayoftulwang|E]. De leurs grandes forteresses, ils se sont enrichis et alourdis, régnant en tyrans sur les survivants épars des grandes conquêtes de leurs ancêtres.\n\nFini ! À [ray|E], le Culte de Khäz-gramaze a enfin surgi, rappelant à son peuple son devoir de faire la guerre aux maux de Malicìam et de ses vils serviteurs. Déjà, des armées au service du grand Dieu de la Nuit se rassemblent et se préparent pour la grande guerre qui détruira enfin le plus grand royaume encore sous l'emprise de Malicìam dans tout [harad|E]."
 decision_mardat_murder_bellakar_confirm: "Que Bellakar désespère sur mon passage !"
 decision_mardat_murder_bellakar_tooltip: "Déclarer une grande guerre pour conquérir et détruire Bellakar, le plaçant sous la règle de Khäz-gramaze."
 decision_mardat_murder_bellakar_tt: ""

 decision_mardat_crush_reactionary: "Écraser les Réactionnaires Vâtrans"
 decision_mardat_crush_reactionary_tooltip: "L'ancien ordre Vâtran entièrement détruit, la grande purge peut se poursuivre sans entrave dans les cœurs de [GetTitleByKey('k_ray').GetNameNoTier]."
 decision_mardat_crush_reactionary_desc: "Bien que les Kanivâtra soient tombés, l'ancien ordre Vâtran perdure dans les cœurs de [ray|E]. Centré autour de [GetTitleByKey('d_riyeshara').GetNameNoTier], son existence continue affaiblit ma légitimité en tant que souverain de [GetTitleByKey('k_ray').GetNameNoTier] et menace mon autorité sur [GetTitleByKey('d_dar').GetNameNoTier] et la capitale.\n\nEn écrasant ces sots rebelles, mes hommes pourront véritablement se déchaîner et détruire toute hérésie dans les cœurs du royaume. Sans chefs pour les mener et livrés à ma merci, je suis certain que le [GetFaithByKey('faith_vatra').GetName] s'éteindra rapidement. Et s'il ne le fait pas... eh bien."
 decision_mardat_crush_reactionary_confirm: "Le [GetFaithByKey('faith_vatra').GetName] est mort enfin !"
 decision_mardat_crush_reactionary_effects_tt: "Sans chef ni défense, le peuple des cœurs de [GetTitleByKey('k_ray').GetNameNoTier] n'aura d'autre choix que de plier à votre volonté."
 no_reactionary_vassals: "Aucun souverain de votre royaume ne suit le [GetFaithByKey('faith_vatra').GetName]."
 mardat_reactionary_county_effect: "Chaque comté [GetFaithByKey('faith_vatra').GetName] de votre royaume #N perd 5 de développement#!, reçoit le modificateur [GetModifier('mardat_purge_county_modifier').GetNameWithTooltip] pendant 50 ans et #P a 33% de chances de se convertir à votre foi.#!"

 decision_mardat_crush_revolutionary: "Écraser les Révolutionnaires [GetFaithByKey('faith_ray').GetName]"
 decision_mardat_crush_revolutionary_tooltip: "Les seigneurs [GetFaithByKey('faith_ray').GetName] des confins de [GetTitleByKey('k_ray').GetNameNoTier] écrasés, les frontières de Rây pourront être placées sous la règle absolue de Khäz-gramaze."
 decision_mardat_crush_revolutionary_desc: "Dans les confins de [ray|E], loin de la capitale et des anciens centres de pouvoir, les adeptes du [GetFaithByKey('faith_ray').GetName] se sont organisés autour de leurs seigneurs locaux en de grandes bandes rebelles armées. Tant que ces hérétiques rebelles seront au pouvoir, les frontières du royaume resteront instables et la menace d'un seigneur rebelle assez puissant pour rassembler une armée de paysans mécontents et marcher sur [GetTitleByKey('c_bozisha_dar').GetNameNoTier] ne m'échappe pas.\n\nEn écrasant totalement ces rebelles, en abattant leurs chefs et en détruisant la Haute Citadelle de Kâtri autour de laquelle ils se sont rassemblés, je pourrais imposer à la fois ma règle et le Culte de Khäz-gramaze sur ces terres frontières."
 decision_mardat_crush_revolutionary_confirm: "Là où les Kanivâtra ont échoué, je réussirai."
 decision_mardat_crush_revolutionary_effects_tt: "Les centres de pouvoir et de culture du [GetFaithByKey('faith_ray').GetName] réduits en ruines, la population désespérée pliera à votre volonté ou sera brisée."
 must_have_crushed_reactionaries: "Vous devez avoir écrasé le [GetFaithByKey('faith_vatra').GetName] des cœurs du royaume et consolidé votre règle sur la capitale."
 no_revolutionary_vassals: "Aucun souverain de votre royaume ne suit le [GetFaithByKey('faith_ray').GetName]"
 mardat_revolutionary_county_effect: "Chaque comté [GetFaithByKey('faith_ray').GetName] de votre royaume #N perd 3 de développement#!, reçoit le modificateur [GetModifier('mardat_purge_county_modifier').GetNameWithTooltip] pendant 50 ans et #P a 33% de chances de se convertir à votre foi.#!"

 decision_powan_buy: "L'Acquisition de Zizâl"
 decision_powan_buy_tooltip: "Acheter les territoires historiquement Râyans de [GetTitleByKey('c_zizal').GetNameNoTier] et [GetTitleByKey('c_salibara').GetNameNoTier] à votre allié Pôwan."
 decision_powan_buy_desc: "Sous l'inefficace règle des Kanivâtra, les territoires Râyans des confins de [GetTitleByKey('c_zizal').GetNameNoTier] et [GetTitleByKey('c_salibara').GetNameNoTier] furent conquis par d'ambitieux seigneurs de guerre Pôwans. Maintenant que j'ai fait la paix avec la tribu qui détient ce territoire, je pourrais proposer de le racheter, élargissant mon royaume et renforçant ma légitimité en tant que souverain de [ray|E]."
 decision_powan_buy_confirm: "Préparez l'acquisition."
 decision_powan_buy_effects_tt: "Vous offrirez à votre allié Pôwan de [GetTitleByKey('d_ne_sargoa').GetNameNoTier] de l'or en échange de vos comtés de jure de [GetTitleByKey('c_zizal').GetNameNoTier] et [GetTitleByKey('c_salibara').GetNameNoTier]."

 decision_mardat_consolidate_power: "Proclamer la Dynastie du Serpent"
 decision_mardat_consolidate_power_tooltip: "Ayant écrasé toute opposition au sein de [GetTitleByKey('k_ray').GetNameNoTier] et vous étant établi comme souverain absolu, vous serez libre de plier le royaume à votre volonté."
 decision_mardat_consolidate_power_desc: "Depuis des années, j'ai œuvré, négocié, comploté et guerroyé vers un seul et même but : l'extermination totale de tous ceux qui oseraient s'opposer au Culte de Khäz-gramaze comme foi unique à [ray|E]. Maintenant, après tant de labeur et de préparations, l'ambition de toute ma vie est à portée. Bientôt viendra le jour où toute hérésie aura enfin été purgée. Où tous ceux qui maintiendraient [GetTitleByKey('k_ray').GetNameNoTier] sous l'emprise de leurs faibles mensonges et qui oseraient s'opposer à ma règle absolue seront morts.\n\nJe suis au seuil d'une grandeur inouïe — mais à la différence du Héraut du Soleil, fondateur des Kanivâtra, je ne tolérerai pas que la corruption et les faux dieux précipitent la ruine de mon royaume. De moi naîtra une nouvelle dynastie, non du soleil mais du serpent et de la nuit, une dynastie qui régnera véritablement sur [GetTitleByKey('k_ray').GetNameNoTier] pour toujours."
 decision_mardat_consolidate_power_confirm: "Mon ascension n'est pas terminée — elle ne fait que commencer !"
 must_have_crushed_revolutionaries: "Vous devez avoir écrasé les révolutionnaires du [GetFaithByKey('faith_ray').GetName] et sécurisé votre règle sur les confins de [GetTitleByKey('k_ray').GetNameNoTier]."
 no_heretic_vassals: "Chacun de vos vassaux doit suivre le Culte de Khäz-gramaze."
 mardat_consolidate_county_effect: "Chaque comté non Khäz-gramaze de votre royaume #N perd 3 de développement#!, reçoit le modificateur [GetModifier('mardat_purge_county_modifier').GetNameWithTooltip] pendant 50 ans, #P gagne 50 de contrôle#! et a #P 50% de chances de se convertir à votre foi.#!"

 ### Rebels of Rây decisions ###
 decision_organize_rebels: "Organiser la Résistance"
 decision_organize_rebels_tooltip: "Organiser les rebelles épars et sans chef contre la tyrannie de Khäz-gramaze au sein des frontières de votre royaume."
 decision_organize_rebels_desc: "Dans tout mon royaume, et à travers [ray|E] tout entier, de petites bandes rebelles éparses ont pris les armes, cherchant à chasser le Culte de Khäz-gramaze du pouvoir sur le royaume. Bien que je sois avec eux et leur cause, leur absence de chefs a grandement affaibli leur capacité à agir de manière efficace contre les armées organisées des Kralyi. Si [GetTitleByKey('k_ray').GetNameNoTier] doit être libérée et l'ordre restauré, un grand chef devra se lever et prendre en main la résistance.\n\nEn tant que l'un des seigneurs les plus haut placés du royaume, je suis dans la position idéale pour endosser un tel rôle, du moins parmi ceux qui partagent ma foi. Là où seuls nous aurions été contraints de plier à la volonté de l'Usurpateur, ensemble nous aurons la force de le renverser !"
 decision_organize_rebels_confirm: "Prenez contact avec les chefs rebelles."
 decision_organize_rebels_effect_tt: "Vous prenez contact avec les chefs rebelles de votre royaume, cherchant leur coopération contre la tyrannie de Khäz-gramaze et votre confirmation en tant que leur chef."

 decision_save_purge_refugees: "Fonder un Refuge Sûr à Rây"
 decision_save_purge_refugees_tooltip: "Ayant rassemblé une force capable de rivaliser avec celles contrôlées par le Culte de Khäz-gramaze, il serait en votre pouvoir de protéger votre royaume des ravages de la purge."
 decision_save_purge_refugees_desc: "Depuis que Khäz-gramaze a pris le pouvoir à [ray|E], le royaume a été plongé dans un chaos total. Des villages brûlent partout pour avoir refusé la conversion, tandis que des foules fuient vers les terres sauvages pour échapper aux chiens du Dieu de la Nuit. Même mes terres n'ont pas été épargnées par le massacre, mes hommes ne pouvant protéger chaque village à la fois et le peuple étant incapable de se défendre. Cependant, les forces du Kralyi sont limitées et l'essentiel de sa puissance vient de partisans étrangers indisciplinés. Si je pouvais surpasser ses propres forces, j'aurais le pouvoir de faire respecter la sécurité des frontières de mon royaume.\n\nNon seulement cela apporterait une sécurité bien plus grande à mon peuple, mais cela ferait également de mon royaume une destination attrayante pour ceux qui souhaitent fuir la brutale folie du nouvel ordre abject de [GetTitleByKey('k_ray').GetNameNoTier]."
 decision_save_purge_refugees_confirm: "Mes terres seront enfin en sécurité."
 decision_save_purge_refugees_effect_tt: "Vous pourrez décider comment tirer parti de votre nouvelle position pour l'avenir."
 immune_from_purge: "#P Votre royaume sera à l'abri des événements négatifs liés à la Purge de Rây #!"
 must_have_mardat_mil_strength: "Votre force militaire doit représenter au moins 80% de celle des Kralyi"

 decision_ally_felira: "Solliciter l'Aide de Felira"
 decision_ally_felira_tooltip: "Solliciter l'aide du royaume Vâtran voisin de [GetTitleByKey('d_felira').GetNameNoTier] dans votre lutte contre le Culte de Khäz-gramaze."
 decision_ally_felira_desc: "[GetTitleByKey('d_felira').GetName] a longtemps existé et prospéré en marge de [ray|E]. Si grand est en effet le lien entre nos deux royaumes que ses dirigeants et son peuple ont pleinement et volontiers embrassé l'Aûdtra Vâtra et les coutumes des Bôzishnarûd. Ils doivent être eux aussi, j'en suis sûr, choqués et consternés de voir [GetTitleByKey('k_ray').GetNameNoTier] sombrer dans un état aussi sanglant et désespéré sous cette folle règle de Khäz-gramaze. Même s'ils sont pour l'heure en sécurité, il m'est évident — et sûrement à eux aussi — que si [GetTitleByKey('k_ray').GetNameNoTier] devait tomber, ils seraient la prochaine cible de l'usurpateur.\n\nDans cette situation, il ne serait que naturel que moi, dernier représentant du juste ordre Vâtran, et leur royaume, dernier bastion de la libre règle Vâtrane, nous unissions en un front commun pour libérer notre peuple de la tyrannie de Khäz-gramaze."
 decision_ally_felira_confirm: "Nous ferons front commun."
 decision_ally_felira_effect_tt: "Vous tenterez de rallier [GetTitleByKey('d_felira').GetNameNoTier] à votre cause et d'en faire votre allié dans la lutte pour le pouvoir sur [GetTitleByKey('k_ray').GetNameNoTier]."

 decision_ally_gai: "Tendre la Main à Gài"
 decision_ally_gai_tooltip: "Chercher à s'allier avec le [GetFaithByKey('faith_ray').GetName] isolationniste et reculé de [GetTitleByKey('d_gai').GetNameNoTier]."
 decision_ally_gai_desc: "Aux confins les plus reculés des terres frontières de [ray|E] se trouve le royaume de jungles de [GetTitleByKey('d_gai').GetNameNoTier]. Bien que longtemps rattaché à [GetTitleByKey('k_ray').GetNameNoTier] en théorie, ses seigneurs isolationnistes se sont longtemps tenus en dehors de la politique, préservant les coutumes et les modes de vie ancestraux de leur peuple simple et versant tribut et hommage aux Kralyi sans offrir grand-chose d'autre au royaume. Pourtant, même eux ne sont pas à l'abri de la tempête montante des purges de Khäz-gramaze, car même l'épaisse jungle ne parvient pas à dissuader les plus fanatiques parmi les forces de l'usurpateur.\n\n[GetTitleByKey('d_gai').GetName] aura besoin d'aide pour survivre à la Purge, car aucun de nous n'a la force de renverser le Culte de Khäz-gramaze seul. En tant que visage de la résistance du [GetFaithByKey('faith_ray').GetName], qui mieux que moi pourrait leur offrir l'aide dont ils ont tant besoin en ces temps les plus durs ?"
 decision_ally_gai_confirm: "Envoyez mon offre"
 decision_ally_gai_effect_tt: "Vous enverrez une offre d'alliance au souverain de [GetTitleByKey('d_gai').GetNameNoTier], cherchant un front commun contre la règle de Khäz-gramaze sur [GetTitleByKey('k_ray').GetNameNoTier]."

 decision_bellakar_support: "Faire Appel au Soutien de Bellakar"
 ray_stormhost_must_be_destroyed: "L'[GetTitleByKey('e_thon_an_kharlokh').GetName] a été détruit"
 decision_bellakar_support_tooltip: "Solliciter l'aide de Bellakar dans votre lutte contre le Culte de Khäz-gramaze."
 decision_bellakar_support_desc: "En des temps anciens, bien avant les Kanivâtra, [ray|E] et [bellakar|E] étaient de grands alliés. Ensemble, nos royaumes régnaient sur la [bayoftulwang|E] sans rival, maintenant une paix millénaire en nos terres. Après tant d'années, la plupart ont oublié notre ancien lien à [GetTitleByKey('k_ray').GetNameNoTier] — mais à [GetTitleByKey('e_bellakar').GetNameNoTier], la mémoire des temps anciens est longue en vérité.\n\nEn tant que dernier représentant des seigneurs anciens qui se tenaient jadis aux côtés de Bellakar, je suis peut-être le mieux placé pour tendre la main à [GetTitleByKey('c_nilulonde').GetNameNoTier] afin que nous puissions détruire ensemble nos ennemis communs de Khäz-gramaze, comme nos royaumes l'auraient fait jadis.\n\nPourtant, les choses ne seront peut-être pas si simples... Tant que l'Ost-tempête attend son heure pour détruire entièrement [GetTitleByKey('e_bellakar').GetNameNoTier], peu d'aide sera disponible pour un acteur marginal comme moi."
 decision_bellakar_support_confirm: "Restaurons nos liens perdus."
 decision_bellakar_support_effect_tt: "Vous vous rendrez à [GetTitleByKey('c_nilulonde').GetNameNoTier] pour solliciter l'aide de [GetTitleByKey('e_bellakar').GetNameNoTier]."
 decision_bellakar_support_stormhost_nerf: "#N Tant que l'[GetTitleByKey('e_thon_an_kharlokh').GetName] n'a pas été détruit, [GetTitleByKey('e_bellakar').GetNameNoTier] est peu susceptible de venir à votre aide !#!"

 decision_build_up_katri: "Renforcer la Haute Citadelle de Kâtri"
 decision_build_up_katri_tooltip: "Vous investirez massivement dans l'amélioration de la Citadelle de Kâtri et de [GetTitleByKey('c_tresti').GetNameNoTier] dans son ensemble."
 decision_build_up_katri_desc: "La Haute Citadelle de Kâtri et la cité de [GetTitleByKey('c_tresti').GetNameNoTier] bâtie autour d'elle ne sont secondes qu'à [GetTitleByKey('c_bozisha_dar').GetNameNoTier] à [ray|E], tant en taille qu'en importance religieuse. Depuis des millénaires innombrables, nos ancêtres et prédécesseurs ont veillé sur le grand temple du [GetFaithByKey('faith_ray').GetName]. En cette période de chaos où les purges de Khäz-gramaze portent la mort à tant de gens, ma possession de la cité sainte pourrait fort bien s'avérer un grand atout pour ma position.\n\nSi je pouvais rassembler assez d'or et de ressources et les allouer judicieusement, je pourrais faire de [GetTitleByKey('c_tresti').GetNameNoTier] un phare de prospérité dans une mer de destruction, un lieu où tous les opposants au régime de Khäz-gramaze pourraient se rassembler en une seule alliance."
 decision_build_up_katri_confirm: "La Haute Citadelle sera sans rivale."
 decision_build_up_katri_effect_tt: "Vous pourrez choisir de tenter d'améliorer la position économique, militaire ou diplomatique de [GetTitleByKey('c_tresti').GetNameNoTier]."
 katri_building_slot_warning: "#N Si [GetTitleByKey('b_tresti').GetNameNoTier] ne dispose pas d'au moins 2 emplacements de bâtiments libres, vous risquez de perdre votre investissement et n'aurez pas accès à la récompense complète de cette décision ! #!"

 decision_ray_rebel_uprising: "Lancer la Libération de Rây"
 decision_ray_rebel_uprising_tooltip: "Rassembler vos compagnons rebelles dans une grande guerre pour renverser enfin la règle de Khäz-gramaze sur [GetTitleByKey('k_ray').GetNameNoTier]."
 decision_ray_rebel_uprising_desc: "Depuis l'accession au pouvoir de Mardat et du vil ordre de Khäz-gramaze, le royaume n'a connu que violence, effusions de sang et catastrophes. Des familles ont été déchirées par la mort ou pire, des cités, des champs et des foyers réduits en cendres, et des bandes de fanatiques de Khäz-gramaze ont traqué et torturé à mort tous ceux qui osaient fuir leur sanglante tyrannie. Fini ! Plus jamais le Culte de Khäz-gramaze ne sera libre de se déchaîner ! Plus jamais ses innombrables crimes ne resteront impunis !\n\nSous ma règle a grandi une grande coalition rebelle. J'ai gagné respect, rassemblé des alliés et consolidé ma position. Bientôt, l'heure sera venue et [ray|E] sera libre à nouveau !"
 decision_ray_rebel_uprising_confirm: "Plus jamais nous ne nous agenouillerons devant Khäz-gramaze !"
 decision_ray_rebel_uprising_effect_tt: "Vous et les compagnons rebelles que vous convaincrez à votre cause partirez en guerre pour libérer [GetTitleByKey('k_ray').GetNameNoTier] de la règle de Khäz-gramaze. #P Tout vassal qui partage votre foi ou vous porte une opinion positive rejoindra votre camp#! cependant #N tout vassal Khäz-gramaze au sein du royaume se joindra à la guerre contre vous.#!"
 bellakar_counts_twice: "Vous avez assuré le soutien de [GetTitleByKey('e_bellakar').GetNameNoTier]."
 safe_haven_requierment: "Vous avez fondé un refuge sûr au sein de [GetTitleByKey('k_ray').GetNameNoTier]."
 is_ray_rebel_leader: "Vous avez organisé la résistance sous votre commandement."
 has_felira_alliance: "Vous avez assuré une alliance avec [GetTitleByKey('d_felira').GetNameNoTier]."
 has_gai_alliance: "Vous avez pris contact avec [GetTitleByKey('d_gai').GetNameNoTier]."
 mardat_lost_bellakar_invasion: "[GetTitleByKey('k_ray').GetNameNoTier] a échoué dans une invasion de [GetTitleByKey('e_bellakar').GetNameNoTier]."
 some_rebel_requierments_impossible: "Il ne sera pas possible de remplir toutes les conditions suivantes. Celles auxquelles vous avez accès dépendent de votre foi."
 mardat_purge_has_been_inherited: "Mardat ne règne plus sur [GetTitleByKey('k_ray').GetNameNoTier]."
 ray_high_resistance: "La résistance est supérieure à #N 14#! et dépasse la pacification."

 ### Vatalinar/Kanivatra decisions ###
 decision_investigate_ray: "Sonder les Ombres de Rây"
 decision_investigate_ray_tooltip: "Vous commencerez une investigation des complots tapis dans l'ombre de votre royaume."
 decision_investigate_ray_desc: "Bien que j'en ignore encore la nature exacte, j'en suis certain. Quelque part à [ray|E] se cache un grand et terrible maître des ombres, bâtissant son pouvoir au cœur de mon royaume depuis les ténèbres. Si j'ai une chance de sauver ma position, je dois agir de manière proactive dans mes efforts de fouiller le royaume, quel qu'en soit le coût en temps ou en or. J'ignore à quelle vitesse grandit la conspiration ni quelle est sa puissance, mais je sais que je dois la frapper vite et fort, avant qu'elle ne soit prête à me défier ouvertement.\n\nPourtant, malgré mes meilleurs efforts, il y a beaucoup à chercher. Il se passera probablement bien du temps avant que je puisse vraiment me reposer, et ceux en qui je peux vraiment avoir confiance sont si peu nombreux. Dans ces circonstances, je crains que le poids de cette tâche ne soit trop lourd à porter..."
 decision_investigate_ray_confirm: "Je ne pourrai me reposer que lorsque tout sera révélé..."
 decision_investigate_ray_effects_tt: "Vous pourrez choisir entre enquêter sur le milieu criminel de [GetTitleByKey('c_bozisha_dar').GetNameNoTier], investiguer l'armée pour y trouver des membres de la conspiration ou concentrer vos efforts sur les seigneurs du royaume pour tenter de trouver le maître des ombres lui-même."


 decision_vatalinar_civil_war: "Rendre Justice à Mardat"
 decision_vatalinar_civil_war_tooltip: "Engager une guerre contre Mardat pour le destin de [GetTitleByKey('k_ray').GetNameNoTier]. #N Mardat pourra appeler tous les partisans qu'il a pu trouver dans cette guerre.#!"
 decision_vatalinar_civil_war_desc: "Depuis trop longtemps, le seigneur traître et hérétique de [GetTitleByKey('d_suza_riy').GetNameNoTier] a été autorisé à comploter depuis l'ombre la chute de moi-même et de ma dynastie. Ses cruels complots et ambitions prennent fin aujourd'hui ! Je ne verrai pas mon bien-aimé [ray|E], le domaine divin de Vâtra, sombrer dans la folie du Culte de Khäz-gramaze.\n\nToutes les bannières des Kanivâtra jusqu'au dernier seront convoquées à [GetTitleByKey('c_bozisha_dar').GetNameNoTier]. De là nous commencerons notre marche vers l'est et porterons la mort à tous les traîtres que nous trouverons. Bientôt, ce comploteur lâche qu'est Mardat apprendra quelle est sa place et sa faiblesse — et plus jamais nul n'osera se dresser contre l'élu de Vâtra !"
 decision_vatalinar_civil_war_confirm: "Mort à tous les Traîtres !"
 decision_vatalinar_civil_war_effects_tt: "Vous déclarerez une guerre civile contre Mardat de [GetTitleByKey('d_suza_riy').GetNameNoTier] pour le destin de [GetTitleByKey('k_ray').GetNameNoTier]. Remporter cette guerre vous permettra de destituer Mardat, mais la perdre le verra s'emparer du royaume pour lui-même. #N Mardat appellera tous ses partisans étrangers secrets dans cette guerre !#!"

 ################################
 ####### Tedjin Decisions #######
 ################################
 decision_found_tedjin_confederacy: "Unifier le peuple Tedjin"
 decision_found_tedjin_confederacy_tooltip: "Unifier les Tedjin sous une bannière"
 decision_found_tedjin_confederacy_desc: ""
 decision_found_tedjin_confederacy_confirm: "Un nouveau jour se lève sur les Tedjin"
 found_tedjin_confederacy_tt: "Tous les autres souverains Tedjin dans la région [GetGeographicalRegion('custom_reform_tedjin_confederacy').GetName] :\n$BULLET_WITH_TAB$Actuellement, #V [GetPlayer.MakeScope.ScriptValue('lotr_form_tedjin_confederacy_total_convinced')]#! sur #V [GetPlayer.MakeScope.ScriptValue('lotr_form_tedjin_confederacy_total')]#! remplissent cette exigence\n$BULLET_WITH_TAB$Au moins un de ceux-ci :\n$TAB$$BULLET_WITH_TAB$Eux ou leur [regent|E] sont #V Votre#! [friend|El]\n$TAB$$BULLET_WITH_TAB$Eux ou leur [regent|E] sont #V Votre#! [lover|E]\n$TAB$$BULLET_WITH_TAB$Eux ou leur [regent|E] sont #V Votre#! [ally|El]\n$TAB$$BULLET_WITH_TAB$Eux ou leur [regent|E] sont [hooked|E] par #V Vous#!\n$TAB$$BULLET_WITH_TAB$Ils sont #V Votre#! [tributary|El]"
 found_tedjin_confederacy.effect1: "Tout personnage [independent|E] d'Héritage Tedjin [friends|E], [lovers|E], [allies|El], [tributaries|El] ou [hooked|E] deviendra votre vassal."
 found_tedjin_confederacy.effect2: "#V Tout personnage [independent|E] d'Héritage Tedjin [friends|E], [lovers|E], [allies|El], [tributaries|El] ou [hooked|E] deviendra votre vassal#!"
 fervor_nationalist_unity: "Les Tedjin se sont unis sous la bannière de Maladûm."
 
 decision_refound_qadjajar: "Refonder le Katajate de Qadjajar"
 decision_refound_qadjajar_tooltip: "Placer le nord de Bellakar sous domination Tedjin, et restaurer le Katajate déchu de Qadjajar"
 decision_refound_qadjajar_desc: "Il y a plus de 2000 ans, le Katajate de Qadjajar tomba devant un Bellakar resurgissant. Bien que nous ayons vécu en paix relative depuis sa chute, notre peuple n'a jamais atteint la prospérité et la richesse de cette brève heure glorieuse, quand tout Bellakar tremblait devant nos armées, et même les Tumakveh fuyaient devant nous. Maintenant cependant, nous sommes enfin en position de revendiquer l'héritage du Katajate depuis longtemps oublié, et de proclamer un Qadjajar restauré !"
 decision_refound_qadjajar_confirm: "Un nouveau jour se lève sur les Tedjin"
 
 decision_declare_greater_qadjajar: "Déclarer le Grand Qadjajar"
 decision_declare_greater_qadjajar_tooltip: "Amener toutes les anciennes conquêtes Tedjin sous votre bannière !"
 decision_declare_greater_qadjajar_desc: "Bien que Qadjajar soit rené, il n'est encore que l'ombre de notre glorieux zénith quand tout Bellakar, nord et sud, s'inclinait devant nous. Si nous pouvons conquérir le sud de Bellakar, nous pourrons proclamer Qadjajar véritablement restauré dans son ancienne gloire, et étendre son concept au-delà de Felaya et Mardrûak - un Grand Qadjajar."
 decision_declare_greater_qadjajar_confirm: "Voici notre heure !"
 
 decision_faithful_tedjin_kingdom: "Former Tedyathâni"
 decision_faithful_tedjin_kingdom_tooltip: "Accomplir le rêve des réformistes Tedjin, et créer un nouveau foyer pour les Tedjin"
 decision_faithful_tedjin_kingdom_desc: "Trop longtemps, notre peuple est resté bloqué au milieu, gagnant modestement sa vie dans les désolations arides entre Felaya, Mardrûak et Umbar. Felaya est le foyer de nos parents dans la foi, et en tant que tel ne peut être notre nouveau foyer - mais Mardrûak et Umbar ? Ces corsaires harcèlent les fidèles, vivant du malheur des autres ! C'est presque un mandat divin que nous devrions prendre leurs grandes cités, et les utiliser pour créer un nouveau foyer pour les fidèles."
 decision_faithful_tedjin_kingdom_confirm: "Tedyathâni, si longtemps un rêve - il sera"
 
 decision_greater_faithful_tedjin_kingdom: "Étendre les Terres des Fidèles"
 decision_greater_faithful_tedjin_kingdom_tooltip: "Poursuivre la conquête au nom de l'Unique"
 decision_greater_faithful_tedjin_kingdom_desc: "Bien que les Corsaires soient tombés, il reste encore plus de terres près de nous où les ennemis des fidèles demeurent retranchés. Si nous devons bâtir un véritable foyer, où les fidèles pourraient vivre libres et en sécurité, nous devons pousser nos frontières au-delà de leurs limites actuelles, et prendre leurs terres."
 decision_greater_faithful_tedjin_kingdom_confirm: "Jusqu'au Khand, s'il le faut."
 
 ###############################
 #### Thâni-Hazâd Decisions ####
 ###############################
 decision_anbalkumagan_empire: "Restaurer le Royaume d'Anbalûkkhôr"
 decision_anbalkumagan_empire_tooltip: "Restaurer les terres d'Anbalûkkhôr à leur ancienne gloire d'avant la Guerre des Renégats"
 decision_anbalkumagan_empire_desc: "Jadis, An-Balkûmagân se dressait comme la plus puissante colonie au sud d'Umbar, contrôlant Tulwang par ses tributaires et sa frontière méridionale formée par la citadelle d'Azarîdêth à Kharadûnê. Cependant, dans le sillage de la Guerre des Renégats, la colonie fut grandement réduite - dépouillée de Tulwang, et ses établissements méridionaux à Kharadûnê détachés pour former la nouvelle principauté coloniale de Zimrathâni.\n\nBien qu'An-Balkûmagân se soit relevé en puissance et en force, il n'a jamais réussi à reprendre toutes ces terres. Si nous le faisons, nous pourrions proclamer le grand royaume d'Anbalûkkhôr pleinement restauré !" 
 decision_anbalkumagan_empire_confirm: "Tous s'inclineront devant nous !"

 decision_anbalkumagan_west_sirayn: "Frapper dans $e_sirayn$"
 decision_anbalkumagan_west_sirayn_desc: "Il y a longtemps, dans le [secondage|E], les riches terres de [GetTitleByKey('e_sirayn').GetName] furent conquises par [khorahil|E], apportant grande richesse et pouvoir à [anbalkumagan|E]. Pourtant, dans le renversement qui suivit de son royaume, ces possessions lointaines furent perdues, et la majesté de [GetTitleByKey('e_anbalkumagan').GetName] réduite. Maintenant que nous avons une fois de plus établi notre royaume d'antan, n'est-il pas temps de regarder à nouveau vers l'est et de reprendre ces terres qui étaient autrefois les nôtres ?"
 decision_anbalkumagan_west_sirayn_tooltip: "Vous intégrez les terres de l'Ouest $e_sirayn$ dans votre royaume - à un coût."
 decision_anbalkumagan_west_sirayn_confirm: "Ces terres sont les nôtres, par droit de conquête !"
 all_counties_loose_control_tt: "Tous les [counties|El] dans la région nouvellement annexée perdent tout [control|El]"

 decision_anbalkumagan_east_sirayn: "Ramener $e_sirayn$ à la guérison"
 decision_anbalkumagan_east_sirayn_desc: "Avec notre conquête de ces terres viennent de nombreuses difficultés, la principale étant la population autochtone, qui se soulève en rébellion contre notre règne. Aussi ennuyeux que cela puisse être, cela ne fait pas le poids face à la puissance des [adunai|E], et a été pacifié et soumis à notre règne.\n\nMaintenant, ces terres seront les nôtres en vérité, pas seulement tant que la mémoire de notre conquête dure, mais jusqu'au règne des enfants de nos enfants, et jamais plus [GetTitleByKey('e_anbalkumagan').GetName] ne connaîtra la défaite !"
 decision_anbalkumagan_east_sirayn_tooltip: "Vous intégrez le reste de $e_sirayn$."
 decision_anbalkumagan_east_sirayn_confirm: "À nous, maintenant et pour toujours !"
 has_completed_descision_anbalkumagan_west_sirayn: "Vous avez intégré l'Ouest $e_sirayn$."
 sirayn_is_pacified: "Tous les [counties|El] dans [GetGeographicalRegion('custom_anbalkumagan_sirayn').GetName] ont un maximum de [control|El]"
 decision_anbalkumagan_east_sirayn.opinion_effect: "Tous vos [vassals|El] gagnent #P 20#! d'[opinion|El] de #V vous#! #weak (-1.20/an) (Admiration)#!"

 decision_anbalkumagan_annexation: "Annexer Etûlia"
 decision_anbalkumagan_annexation_tooltip: "Annexer Etûlia, la partie méridionale de Tulwang, à An-Balkûmagân"
 decision_anbalkumagan_annexation_desc: "Pendant d'innombrables générations, Tulwang a été une région qui est entrée et sortie du contrôle d'An-Balkûmagân. Au fil des générations, les Etûliens méridionaux ont adopté nos traditions culturelles, et en effet beaucoup nous sont apparentés par le sang. Cela a conduit à un sentiment croissant qu'Etûlia est une province légitime d'An-Balkûmagân. Si nous pouvons solidifier notre contrôle sur la région, nous pourrions formellement annexer la zone, aidant à nous empêcher de perdre à nouveau notre emprise dans la région."
 decision_anbalkumagan_annexation_confirm: "Etûlia fait légitimement partie d'An-Balkûmagân !"
 
 decision_integrate_tulwang_title: "Réintégrer Tûlwang"
 decision_integrate_tulwang_tooltip: "Réintégrer Tûlwang, l'un des Sept Dominions de Thâni-Hazâd"
 decision_integrate_tulwang_desc: "Trop longtemps les royaumes de Thâni-Hazâd furent des fiefs mesquins séparés, se querellant et se faisant la guerre, mais maintenant que j'ai unifié les Sept Terres, il est important de réintégrer ces terres qui ont échappé à notre contrôle. Tûlwang est le Septième Royaume de Thâni-Hazâd, pourtant aujourd'hui il est vu par beaucoup comme une extension d'un plus grand royaume de Bôzishnarûd, par conséquent, maintenant que nous avons établi une emprise ferme sur Tûlwang, il est important de s'assurer que le monde reconnaisse cette région comme nôtre."
 decision_integrate_tulwang_confirm: "Les Sept Terres unies"
 decision_integrate_tulwang_an_balkumagan_priamry_title: "Soit [GetTitleByKey('e_anbalkumagan').GetNameNoTier] soit [GetTitleByKey('h_pharazain').GetNameNoTier] est votre titre principal"

 decision_murder_bellakar: "Envahir Bellakar"
 decision_murder_bellakar_tooltip: "Plutôt explicite en soi"
 decision_murder_bellakar_desc: "Trop longtemps Bellakar s'est dressé contre la puissance des Maréchaux des Tempêtes, le temps est venu de briser ces faux adûnâi"
 decision_murder_bellakar_confirm: "Ravageons leurs cités"

 decision_destroy_zajantak: "Détruire le Royaume de Zajantak"
 decision_destroy_zajantak_tooltip: "Rassembler votre puissance contre les Hommes de la Forêt, et briser leur nouveau royaume"
 decision_destroy_zajantak_desc: "Nous avons été trop généreux envers le peuple simple de la forêt. Nous les avons laissés vivre par eux-mêmes, dans leurs entités politiques mineures et leurs tribus querelleuses, et maintenant ils parlent d'un Roi dans la Forêt, et de résistance. Et nous l'avons vu se propager à nos propres serviteurs - mais je ne laisserai pas cela perdurer.\n\nTrop longtemps nous nous sommes tenus sur ces rivages occidentaux, fiers et nobles, au service du Roi des Hommes. Nous sommes les Adûnâi, et notre force vient de Zigûr lui-même. Nous sommes les Maîtres du Monde. Nous ne permettrons pas à ces arrivistes de nous humilier - nous les remettrons à leur place !"
 decision_destroy_zajantak_confirm: "Je vous ordonne de vous lever, Hommes de l'Ouest !"
  
 decision_seek_the_princes: "Aller à la rencontre des Princes"
 decision_seek_the_princes_tooltip: "Apprendre de vos pairs est la première étape pour prospérer en tant que Prince"
 decision_seek_the_princes_desc: "J'irai à la rencontre de mes pairs du [balan_lai|E], en quatre voyages à travers le [thanihazad|E], afin de les jauger. J'apprendrai de leurs réussites comme de leurs échecs, de leur morale et de leurs priorités. Lorsque je verrai plus clairement quels souverains ils sont, j'espère mieux comprendre quel souverain je dois devenir."
 decision_seek_the_princes_confirm: "En route"
 decision_seek_the_princes_tt: "Vous voyagerez pour rencontrer chacun des Princes :\n\nPremier voyage — Rencontre avec le Vieux Prince\n- [GetTitleByKey('c_uruloni').GetHolder.GetName]\n\nDeuxième voyage — [mirenore|E]\n- [GetTitleByKey('c_karasalas').GetHolder.GetName]\n- [GetTitleByKey('c_alsarias').GetHolder.GetName]\n\nTroisième voyage — Le Nord\n- [GetTitleByKey('c_azarideth').GetHolder.GetName]\n- [GetTitleByKey('c_inzilloni').GetHolder.GetName]\n- [GetTitleByKey('c_holzoreth').GetHolder.GetName]\n\nDernier voyage — Pél et Mispir\n- [GetTitleByKey('c_arpel').GetHolder.GetName]\n- [GetTitleByKey('c_mispir').GetHolder.GetName]"

