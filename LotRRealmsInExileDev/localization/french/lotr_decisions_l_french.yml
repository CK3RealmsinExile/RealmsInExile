 decision_form_sea_dragon_host: "Revendiquer le Manteau du « Dragon des Mers »"
 decision_form_sea_dragon_host_desc: "Par des gloires et des richesses inégalées, j'ai mené les Libérés de Kadir à la prospérité et à la puissance au-delà de ce que quiconque pensait possible. Il est temps de revendiquer le manteau de « Dragon des Mers » et de pousser mon peuple vers un avenir toujours plus grandiose. Nous ne serons plus laissés à récupérer les richesses des autres pour notre puissance. Nous créerons un royaume qui nous est propre pour répandre la Liberté de Kadir à toutes les côtes et croyances de la Terre du Milieu !"
