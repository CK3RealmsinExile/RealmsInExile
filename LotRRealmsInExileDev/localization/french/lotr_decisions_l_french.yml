 restore_king_title: "Revendiquer la Domination Ancestrale"
 restore_king_title_tooltip: "Vous proclamer Roi"
 restore_king_title_durin: "Nous sommes les Longues-Barbes, Le peuple de Durin, notre roi s'éveilla le premier de tous les pères. Nous avons régné de Khazad-dûm aux Montagnes Grises, et loin, jusqu'à Erebor. Sous la lignée de Durin, mes ancêtres et leurs pères avant eux, nos demeures devinrent riches en joyaux et en trésors, et la terre même s'émerveillait des richesses que nous en avions extraites et affinées jusqu'à la beauté et la perfection.\n\nMais bien que notre royaume ne s'étende peut-être pas sur la même distance qu'autrefois, la lignée de Durin détient le titre de Roi du Peuple de Durin, peu importe d'où ils règnent. Je suis l'héritier de Durin - je suis le Roi des Longues-Barbes, et je le proclame maintenant ! J'honorerai ma parenté tombée et régnerai, dans toute la gloire et la puissance de la lignée de Durin !"
 restore_king_title_dwalin: "Nous sommes les Larges-Épaules, le peuple de Dwálin, qui était renommé pour sa sagesse et sa miséricorde. Nous régnons de Belegost dans les Montagnes Bleues, et longtemps nos artisanats ont été enrichis par les arts des Elfes - en effet, nous avons été les amis des Eldar pendant de longues années.\n\nMais bien que notre Royaume soit diminué, la lignée de Dwálin gouverne encore tous les Larges-Épaules, peu importe où nous demeurons. Je suis l'héritier de la lignée de Dwálin, sage et bienveillant dans sa mesure, seigneur des Larges-Épaules et de ceux qui se sont engagés envers ma lignée. Je suis le Roi des Larges-Épaules et je le proclame maintenant - j'honorerai ma parenté tombée et règnerai comme ils l'ont fait, avec compassion et intelligence."
 restore_king_title_uri: "Nous sommes les Barbes-de-Feu, les Nains d'Úri. Longtemps nous avons gardé nos mémoires proches, et nous n'avons pas oublié les rancunes que nous tenons, et les divisions qui nous ont autrefois séparés. Notre plus grande salle était la puissante Tumunzahar, Nogrod dans les langues elfiques, bien que plus récemment nous ayons régné depuis la majestueuse et puissante Buzra-dûm. Mais bien que notre royaume soit diminué, et Nogrod perdue depuis de longues années, l'héritier du peuple d'Úri est le Roi de tous les Barbes-de-Feu, peu importe où ils se trouvent et quelle salle ils tiennent. Je suis l'héritier d'Úri le balafré, Roi des Barbes-de-Feu et je le proclame maintenant ! J'honorerai ceux qui sont tombés, et gouvernerai mon peuple comme il était censé être gouverné - plus jamais séparé !"
 restore_king_title_thrar: "Nous sommes les Boucles-Noires, serviteurs de la lignée de Thrár, les plus fiers de tous les nains. Nos chevelures sont luxuriantes et sombres, et nos hoyaux mordent à travers l'acier et la chair des orques ! Dans les jours anciens, nous régnions depuis Nargubraz, mais notre peuple a creusé de grandes et plus grandes salles - Bizarûldûm perdue et la grande Mablad-dum, et enfin la puissante Barazimabûl, dans les Montagnes Jaunes. Mais bien que nos peuples aient été divisés et dispersés vers l'est et le sud, notre Roi est le Roi de tous les Boucles-Noires peu importe quel coin de la Terre du Milieu ils nomment foyer. Je suis l'héritier de Thrár et Roi des Boucles-Noires ! J'honorerai ma parenté divisée et règnerai dans la gloire convenant à mon peuple !"
 restore_king_title_confirm: "Je suis le Roi de mon peuple !"
 
 cant_give_title: "Ces titres nains ne peuvent pas être donnés"

 decision_uldona_spine_dwarf: "Reprendre l'Échine d'Uldona"
 decision_uldona_spine_dwarf_tooltip: "Rétablir le royaume sous les sommets de l'Échine d'Uldona"
 decision_uldona_spine_dwarf_desc: "Ces montagnes étaient autrefois le foyer des Poings-de-Fer. Les Dragons qui les ont chassés et les Gobelins qui les ont pillées ont été repoussés, et les Nains sont de retour !"
 decision_uldona_spine_dwarf_confirm: "Une salle royale reconquise !"

 decision_nurunkizdin_remove_deepest_darkness: "Répandre la lumière dans les Ténèbres Profondes"
 decision_nurunkizdin_remove_deepest_darkness_tooltip: "Repousser les horreurs tapies sous l'Échine d'Uldona"
 decision_nurunkizdin_remove_deepest_darkness_desc: "Bien que nous ayons récupéré cette forteresse, autrefois perdue, elle n'a pas été la nôtre uniquement. Des choses terribles se cachent dans les profondeurs, bien au-delà de nos moyens de les déloger. Avec la bonne infrastructure en place, nous pouvons trouver une solution à ce problème."
 decision_nurunkizdin_remove_deepest_darkness_confirm: "Repoussez-les."

 decision_enter_moria: "Entrer dans la Moria"
 decision_enter_moria_tooltip: "Voyage vers la Moria"
 decision_enter_moria_desc: "Je suis las de la misère et du mépris des Hommes. Les salles ancestrales de nos pères nous attendent dans Khazad-dûm."
 decision_enter_moria_confirm: "Nous sommes des héritiers qui rentrent au bercail."
 decision_enter_moria_tt: "Possède un [ringofpower|E] [dwarven|E]."
 decision_enter_moria_tt_2: "Vous tenterez de pénétrer dans [moria|E]."

 decision_kill_smaug: "Reconquérir Erebor"
 decision_kill_smaug_alt: "Reconquérir Dale"
 decision_kill_smaug_tooltip: "Commencer l'expédition pour tuer Smaug"
 decision_kill_smaug_desc: "Smaug gît à Erebor depuis trop longtemps. Il a dû devenir gras et paresseux pendant ce temps. De nombreux signes montrent que l'influence du dragon sur notre Foyer a diminué. Je dois saisir cette chance et reconquérir la Montagne Solitaire !"
 decision_kill_smaug_desc_alt: "Smaug s'est installé dans Erebor depuis trop longtemps, répandant la terreur parmi notre peuple à la seule idée de reprendre le Val. Mais les présages se multiplient : l'emprise du dragon sur la région s'effrite. Si nous préparons notre plan avec soin et nous attachons les bonnes alliances, l'heure est peut-être venue de ressaisir le Val !"
 decision_kill_smaug_confirm: "Reconquérir la Montagne Solitaire !"
 decision_kill_smaug_confirm_alt: "Reprendre Dale !"
 decision_kill_smaug_decision_effect_1: "Vous tenterez de tuer le [dragon|E] Smaug. Ce qui suit affectera votre chance de succès, jusqu'à un plafond de 80%\n$BULLET_WITH_TAB$Un membre de la dynastie [GetScriptedCharacterByHistoryID( 'lineofdale1' ).GetDynasty.GetName] présent à [GetTitleByKey('c_esgaroth').GetNameNoTier]\n$BULLET_WITH_TAB$Le Seigneur d'Esgaroth ayant une [prowess|El] élevée.\n$BULLET_WITH_TAB$Manier une épée [elven|E] du [firstage|E].\n$BULLET_WITH_TAB$Avoir un Heaume Nain du Premier Âge.\n$BULLET_WITH_TAB$Vous avez l'aide d'un Hobbit dont l'[intrigue|El] est de [intrigue_i|E]15 ou plus.\n$BULLET_WITH_TAB$Le Seigneur d'Esgaroth possédant un [artifact|El] tueur de Dragon tel qu'une Flèche Noire ou un Arc-à-Vent."
 decision_kill_smaug_decision_effect_1_a: "Vous tenterez de tuer le [dragon|E] Smaug. Ce qui suit affectera votre chance de succès, jusqu'à un plafond de 50%\n$BULLET_WITH_TAB$Le Seigneur d'Esgaroth ayant une [prowess|El] élevée.\n$BULLET_WITH_TAB$Manier une épée [elven|E] du [firstage|E].\n$BULLET_WITH_TAB$Avoir un Heaume Nain du Premier Âge.\n$BULLET_WITH_TAB$Vous avez l'aide d'un Hobbit dont l'[intrigue|El] est de [intrigue_i|E]15 ou plus.\n$BULLET_WITH_TAB$Le Seigneur d'Esgaroth possédant un [artifact|El] tueur de Dragon tel qu'une Flèche Noire ou un Arc-à-Vent."
 decision_kill_smaug_decision_effect_1_b: "[chosen_dwarf.GetFirstName] tentera d'abattre le [dragon|E] Smaug. Les éléments suivants influeront sur ses chances de succès, jusqu'à un maximum de 95 %\n$BULLET_WITH_TAB$La présence d'un membre de la dynastie [GetScriptedCharacterByHistoryID( 'lineofdale1' ).GetDynasty.GetName] à [GetTitleByKey('c_esgaroth').GetNameNoTier]\n$BULLET_WITH_TAB$Le Seigneur de Bourg-du-Lac doté d'une haute [prowess|El].\n$BULLET_WITH_TAB$Le port d'une épée [elven|E] du [firstage|E].\n$BULLET_WITH_TAB$Le port d'un Heaume-Dragon nain du Premier Âge.\n$BULLET_WITH_TAB$L'aide d'un Hobbit dont l'[intrigue|El] est [intrigue_i|E]15 ou au-dessus.\n$BULLET_WITH_TAB$Le Seigneur de Bourg-du-Lac porteur d'un [artifact|El] de tueur de dragon, telle une Flèche Noire ou un Carreau de Lance-Vent.\n$BULLET_WITH_TAB$Votre requête à [chosen_dwarf.GetFirstName] de venir prêter son bras contre le dragon."
 decision_kill_smaug_decision_effect_2: "Si vous #N échouez#!, vous #N MOURREZ !#! et Esgaroth deviendra une ruine"
 decision_kill_smaug_decision_effect_3: "Si vous #P réussissez#!, vous reconquerrez la Montagne Solitaire et le dragon sera mort !"
 decision_enter_erebor_chances: "Vous tenterez de vous faufiler dans la [lonelymountain|E].\n$BULLET_WITH_TAB$Votre [intrigue|El][intrigue_i|E] et [prowess|El][prowess_i|E] affecteront vos chances de succès\n"

 decision_usurp_dynast: "Usurper le trône de [ROOT.Char.GetDynasty.GetNameNoTooltip]"
 decision_usurp_dynast_tooltip: "Usurper le Trône"
 decision_usurp_dynast_desc: "Un faux souverain a occupé le trône de notre peuple depuis trop longtemps, il est temps qu'un autre prenne sa place."
 decision_usurp_dynast_confirm: "Envoyer l'Avis de mon Règne"
 army_bigger: "Vous avez une force plus importante que votre Chef de Maison"
 cannot_usurp_dorfdad: "Vous ne pouvez usurper votre [dwarffather|E]"

 dwarven_beard_care_decision: "Prendre soin de votre Barbe"
 dwarven_beard_care_decision_desc: "Ma barbe a toujours été une source de fierté et d'inspiration pour moi, comme pour tous les enfants de [mahalcharacter|E]. Chez les [dwarves|E], une barbe longue et bien entretenue est plus qu'une simple chevelure. La faire pousser, c'est honorer l'héritage de nos ancêtres, et bien l'entretenir, c'est faire preuve de discipline et de respect pour les traditions qui nous lient.\n\nJe dois prendre soin de la mienne pour qu'elle soit la plus belle possible."
 dwarven_beard_care_decision_tooltip: "Vous installer pour prendre soin de votre barbe"
 dwarven_beard_care_decision_effect_tooltip: "Vous pouvez perdre un peu de [stress|El] et vous aurez l'air en pleine forme!"
 dwarven_beard_care_decision_confirm: "Je vais avoir besoin d'huile à barbe..."

 decision_rally_dwarves: "Rassembler les Nains"
 decision_rally_dwarves_tooltip: "Rallier les Nains à votre cause"
 decision_rally_dwarves_desc: "Les [dwarves|E] sont un peuple fier et antique, dont l'histoire est tissée de luttes et de triomphes. Maintes épreuves nous ont forgés — et de chacune nous sommes sortis plus solides. L'heure est venue de rassembler notre peuple une fois encore, de venger notre roi tombé et de reprendre notre patrie !"
 decision_rally_dwarves_confirm: "Pour la gloire des Nains !"
 decision_rally_dwarves_effect_tt: "Vous lèverez une armée de [dwarves|E] en préparation de la guerre pour reconquérir [khazaddum|E]."
 decision_rally_dwarves_tt: "[GetScriptedCharacterByHistoryID('lineofdurin81').GetFirstName] a été tué"

 decision_moria_war_thror_heir: "Venger Thrór et Reprendre la Moria"
 decision_moria_war_thror_heir_tooltip: "Vengez votre roi tombé et reconquérez votre demeure ancestrale de [khazaddum|E]"
 decision_moria_war_thror_heir_confirm: "Pour Khazad-dûm ! Pour le Peuple de Durin !"
 decision_moria_war_thror_heir_desc: "Les [dwarves|E] de la lignée de [durin|E] ont perdu foyer après foyer. Nous avons perdu [gunduzbad|E], où Durin s'éveilla ; [khazaddum|E], le plus puissant des royaumes nains qui fut et sera jamais ; et voici que nous avons perdu la [lonelymountain|E], [erebor|E], l'un de nos plus grands halls.\n\nLa chute de Khazad-dûm fut une tragédie immense pour notre peuple, et la mort de notre roi, [GetScriptedCharacterByHistoryID('lineofdurin81').GetFirstName], un coup dont nous ne nous sommes pas encore relevés. Mais l'heure est venue de reconquérir notre demeure ancestrale et de venger notre roi tombé !\n\nNous marcherons sur la Moria, et nous la reprendrons ! Pour Khazad-dûm ! Pour [durinsfolk|E] !"
 decision_moria_war_thror_heir_tt: "Vous déclarerez la guerre au détenteur actuel de [khazaddum|E]"

 decision_zorzir_find_captains: "Retrouver les Expéditionnaires Disparus"
 decision_zorzir_find_captains_desc: "Après la bataille contre [GetScriptedCharacterByHistoryID('lineoflughasya23').GetFirstNameNicknamed], notre troupe s'est dispersée, se repliant dans des tunnels profonds. L'espoir est mince, mais il est possible que certains des nôtres vivent encore. Si nous partons à leur recherche, nous pourrons peut-être grossir nos rangs."
 decision_zorzir_find_captains_confirm: "On ne laisse aucun Nain derrière !"
 decision_zorzir_find_captains_tooltip: "Partir à la recherche de survivants nains"

 decision_contact_barazimabul: "Sécuriser la Route de Barazimabûl"
 decision_contact_barazimabul_desc: "Avec une solide emprise sur [GetTitleByKey('k_mablad_dum').GetNameNoTier], et la route à travers [GetTitleByKey('k_raimumahal').GetNameNoTier] dégagée, les colons afflueront de [GetTitleByKey('k_barazimab_ul').GetNameNoTier] pour nous rejoindre."
 decision_contact_barazimabul_confirm: "Faites passer le mot."
 decision_contact_barazimabul_tooltip: "Recruter des colons pour des bonus économiques."
 decision_contact_barazimabul.tt: "[GetTitleByKey('k_barazimab_ul').GetNameNoTier] est gouverné par des [dwarves|E]."
 decision_contact_barazimabul.tt_2: "Il n'y a ni [goblins|E] ni [orcs|E] dans [GetTitleByKey('k_raimumahal').GetNameNoTier]."
 decision_contact_barazimabul.tt_3: "Vous partagez une frontière avec [GetTitleByKey('k_barazimab_ul').GetNameNoTier]."

 decision_reclaim_mabladdum: "Reconquérir Mablâd-dûm"
 decision_reclaim_mabladdum_desc: "Les halls ancestraux de nos pères, si longtemps souillés par la graine d'Ulkhásh, résonneront de nouveau de l'art [dwarven|E]."
 decision_reclaim_mabladdum_confirm: "[Glossary('Baruk Khazâd','baruk_khazad_gloss')] !"
 decision_reclaim_mabladdum_tooltip: "Consolider l'emprise sur l'ancien royaume de Mablâd-dûm."
 decision_reclaim_mabladdum.tt: "Vous avez retrouvé tous les expéditionnaires nains disparus."
 decision_reclaim_mabladdum.tt_2: "Vous avez sécurisé la route vers [GetTitleByKey('k_barazimab_ul').GetNameNoTier]."
 decision_reclaim_mabladdum.tt_3: "Désigner un nouveau souverain pour [GetTitleByKey('k_mablad_dum').GetNameNoTier]."

 decision_restore_mabladdum: "Reconquérir Mablâd-dûm"
 decision_restore_mabladdum_desc: "Jadis citadelle orgueilleuse des [blacklocks|E] dans les [yellowmountains|E], un cataclysme s'abattit sur le puissant [GetTitleByKey('k_mablad_dum').GetNameNoTier]. Le Cœur de Feu, volcan qui alimentait les grandes forges, entra en éruption dans un déchaînement de violence, chassant nos ancêtres de leurs halls brisés. Désormais, d'immondes [orcs|E] et [goblins|E] squattent les couloirs en ruine, les profanant de leur seule présence.\n\nCela, je le dis, n'aura plus cours ! Je dis que l'heure est venue d'honorer nos serments, et de chasser les ennemis répugnants qui occupent Mablâd-dûm ! Nous ne nous reposerons point avant que ces halls soient dispersés aux quatre vents et que les halls de nos longues-pères soient de nouveau entre les mains des Nains — une fois pour toutes !"
 decision_restore_mabladdum_tooltip: "Libérer les halls perdus de Mablâd-dûm"
 decision_restore_mabladdum_confirm: "#italic Qu'on m'apporte ma hache et mon armure !#!"

 ## Dwarven Beardcare loc
 beard_care_standard_modifier: "Belle Barbe"
