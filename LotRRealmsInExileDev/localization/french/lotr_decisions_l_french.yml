 decision_margoz_election_choice: "Diriger le Royaume Doré"
 decision_margoz_election_choice_tooltip: "Qu'est-ce qui motive mon règne ?"
 decision_margoz_election_choice_desc: "L'élection assurée, je dois ouvertement déclarer mes intentions au Royaume Doré. D'une manière ou d'une autre, l'ouest tombera. Dois-je mener nos armées dorées vers Dale pendant que les patriciens de Dorwinion"
 decision_margoz_election_choice_confirm: "Quel que soit le choix, j'ai déjà gagné"
 huz_makes_choice_tooltip: "Décider du futur du Royaume Doré et de votre famille"

 decision_margoz_conspire_patrician: "Avances vers Les Patriciens"
 decision_margoz_conspire_patrician_hover_tooltip: "Le feu n'a besoin que d'une étincelle"
 decision_margoz_conspire_patrician_desc: "La nouvelle de mon élection se répand à travers le Rhovanion. La plupart reconnaissent le danger que je représente et sont justement terrifiés, cependant... Il y en a dans Dorwinion dont la mémoire de mes ancêtres est si profondément ancrée dans leur esprit qu'ils ne peuvent même pas envisager de s'opposer à moi \n\nSi je montrais aux Patriciens mon côté 'aimable', je pourrais les plier à ma volonté. Peut-être même les pousser à commettre l'ultime trahison en mon nom"
 decision_margoz_conspire_patrician_confirm: "Par le charme et l'effroi, la tête d'Hawin est mienne"
 decision_margoz_conspire_patrician_tooltip: "Conclure un pacte avec les Patriciens. Une simple promesse d'amitié et quelques droits frivoles et privilèges économiques dont je n'ai pas le temps de me soucier. En échange, ils élimineront le Maître du Royaume et tous les membres de sa famille qu'ils pourront trouver. Plongeant Dorwinion dans le chaos et mettant fin à leur alliance avec Dale"

 decision_settle_central_rhovanion: "Coloniser le Rhovanion Central"
 decision_settle_central_rhovanion_tooltip: "Soumettre la frontière"
 decision_settle_central_rhovanion_desc: "Le centre du Rhovanion est resté un désert depuis trop longtemps. Si je dois marcher sur le joyau de la couronne de Dale, cette terre doit être domptée. \n\nL'Ordre du Dragon Noir a bien servi le Royaume. Ils ont maintenu la frontière sous contrôle et sont le choix naturel pour mener cette action"
 decision_settle_central_rhovanion_confirm: "Convoquez les Chevaliers du Dragon !"
 decision_margoz_settle_rhovanion_tooltip: "Revendiquer le Rhovanion Central et autoriser les Chevaliers du Dragon à maintenir cette nouvelle section de frontière. Cela nous permettra de marcher sur Dale"

 decision_war_in_the_north: "Guerre Dans le Nord"
 decision_war_in_the_north_tooltip: "La grande confrontation est à portée de main"
 decision_war_in_the_north_desc: "Le moment est venu. Dale et Erebor sont assis au sommet du Rhovanion comme sa couronne depuis assez longtemps. \nAutrefois, 'Smaug le Doré' trônait sur cette couronne. Il régnait sur le Rhovanion avec une tyrannie de doux silence d'effroi. Le dernier grand dragon a peut-être disparu, mais nous rappellerons à ces nordiques la peur qu'ils ont connue autrefois"
 decision_war_in_the_north_confirm: "Hommes et Nains brûlent tous de la même façon"
 decision_war_in_the_north_effect_1: ""

 war_in_the_north_cb: "Guerre dans Le Nord"
 huz_colonized_rhovanion: "Avoir achevé « Coloniser le Rhovanion Central »"
 
 decision_margoz_dale_crushed: "Dale Écrasé"
 decision_margoz_dale_crushed_tooltip: "Ils s'agenouillent"
 decision_margoz_dale_crushed_desc: "Enfin. La cité de Smaug le Doré est entre nos mains. Les [dalemen|E] connaîtront la terreur avant la fin, tandis que leur espèce sera chassée de la cité. Nul, hormis ceux fidèles à Kerkassk et ses dragons, ne mettra le pied dans cette cité. Notre cité, de nouveau !"
 decision_margoz_dale_crushed_confirm: "Dale n'est plus. Norievar est né"
 
 decision_margoz_fate_of_dorwinion: "Le Destin de Dorwinion"
 decision_margoz_fate_of_dorwinion_tooltip: "Que faire de ces imbéciles imbibés de vin ?"
 decision_margoz_fate_of_dorwinion_desc: "Dorwinion est à moi. Szrel Kain rendu à ma famille enfin ! C'est vraiment le début d'un nouvel âge. Un âge marqué par l'avènement d'une nouvelle dynastie de terreur sur tout l'est et l'ouest. Il ne reste plus qu'à reconstruire la forteresse-donjon de Szrel-Kain avant que notre souvenir puisse être à jamais gravé dans l'esprit des Hommes du Nord pour toujours"
 decision_margoz_fate_of_dorwinion_confirm: "Cet âge a commencé par notre chute. Il se termine par notre ascension triomphale !"
 
 decision_margoz_szreldor_reform: "Szreldor Renaît"
 decision_margoz_szreldor_reform_tooltip: "Une nouvelle aube se lève"
 decision_margoz_szreldor_reform_desc: "Le jour dont mes ancêtres ont rêvé est arrivé ! Nous ne nous cachons plus en exil, condamnés à diminuer et à disparaître. Notre étoile dorée s'élève à nouveau. Notre aube est leur crépuscule. Maintenant Szreldor sera à nouveau gravé de façon permanente dans l'esprit de tous les Hommes du Nord qui nous ont moqués et des esprits maléfiques de la forêt qui nous ont trompés dans la [lastalliance|E] !"
 decision_fate_of_dorwinion_complete: "Terminer « Le Destin de Dorwinion »"
 decision_northward_march_complete: "Terminer « Une Armée Dorée d'Igath »"
 decision_margoz_szreldor_reform_confirm: "Et leurs enfants. Et les enfants de leurs enfants pour toujours"
 decision_szreldor_kingdom_integration: "Les [kingdoms|E] complètement contrôlés de jure dans [GetTitleByKey('e_rhovanion').GetNameNoTier] ou [GetTitleByKey('e_rhun').GetNameNoTier] seront intégrés dans le [GetTitleByKey('e_szreldor').GetName]."
 finished_serkhoz_legend_tt: "Un membre de votre maison a accompli la [legend|El] [legend_mythical|E] $legend_serkhoz$"
 unlock_szreldor_reform_tt: "Gagnez accès à la [decision|El] #EMP $decision_margoz_szreldor_reform$#!"
 
 decision_margoz_cleanse_nelornieth: "Purifier Nelornieth"
 decision_margoz_cleanse_nelornieth_tooltip: "Brûler chaque esprit que nous trouvons"
 decision_margoz_cleanse_nelornieth_desc: "La forêt des esprits maléfiques a été purifiée de leur souillure. Les soi-disant « [penni|E] » chassés de leurs demeures cachées dans les bois, tout comme mes ancêtres l'ont fait il y a longtemps aux [entwives|E]. Cette terre prendra du temps pour guérir de leur présence corruptrice. De nouveaux colons de Mistrand et Lest restaureront la région avec le temps. Maintenant, avec ma dévotion à Kerkassk prouvée, je peux déjà commencer à sentir son pouvoir divin à l'œuvre en moi. Bientôt tous craindront ma puissance !"
 decision_margoz_cleanse_nelornieth_confirm: "Je suis Szrel le cruel réincarné"
 
 decision_fortify_northern_pass: "Fortifier le Col du Nord"
 decision_fortify_northern_pass_tooltip: "Construire une forteresse dans le col montagneux menant à [dorwinion|E]"
 decision_fortify_northern_pass_desc: "Au-delà du château de [GetTitleByKey('c_dargeca').GetNameNoTier] se trouve un col montagneux menant aux terres tenues par les Hommes de [GetTitleByKey('k_dorwinion').GetNameNoTier]. Bien que les Hommes de [dorwinion|E] aient souvent commercé avec nous, ils sont tout aussi susceptibles d'envahir nos terres si l'occasion se présente.\n\nAfin de nous protéger contre toute menace venant du nord, nous devrions fortifier nos frontières au nord de Dargeca, en construisant une forteresse juste à la sortie du col montagneux - créant ainsi un point d'étranglement facilement défendable."
 decision_fortify_northern_pass_confirm: "Commencez la construction immédiatement !"
 
 decision_return_to_mistrand: "Retour à Mistrand"
 decision_return_to_mistrand_tooltip: "Retourner à Mistrand"
 decision_return_to_mistrand_desc: "Après avoir passé de nombreuses années à errer dans des terres étrangères, mon cœur et mon esprit se tournent de plus en plus vers les terres de mon peuple. Ils se querellent sans cesse, mais je crois qu'ils pourraient être grands s'ils mettaient de côté leurs rancunes.\n\nIl n'y a qu'un seul endroit pour commencer mon œuvre - Mistrand, la grande cité de mon peuple. Sous ses puissantes murailles se pressent de nombreuses âmes, et si mon message y trouve un terrain fertile, il pourrait encore se répandre."
 decision_return_to_mistrand_confirm: "Le temps est venu pour l'errance de prendre fin."
 decision_return_to_mistrand_tt: "Voyager vers [GetTitleByKey('c_mistrand').GetName] avec votre #high Domicile#!"

 decision_convince_easterling_lord: "Visiter un Seigneur Orientais"
 decision_convince_easterling_lord_tooltip: "Visiter un Seigneur Orientais"
 decision_convince_easterling_lord_desc: "Mon message a commencé à se répandre à travers le pays, mais tous les seigneurs ne sont pas disposés à y prêter attention. Peut-être que l'entendre de mes propres lèvres aiderait à les inspirer et à les convaincre de la justice de ma cause ?"
 decision_convince_easterling_lord_confirm: "Visiter un Seigneur Orientais"
 decision_convince_easterling_lord_tt.1: "Sélectionné un Seigneur Orientais à visiter"
 decision_convince_easterling_lord_tt.2: "[GetPlayer.MakeScope.Var('selected_character').Char.GetName] est disponible"
 decision_convince_easterling_lord_effect.t1: "Voyager vers la capitale de [GetPlayer.MakeScope.Var('selected_character').Char.GetNamePossessive] #bold sans#! votre #V Domicile#!"

