 #### Move the Capital ####
 ##########################
 decision_new_capital.t.invocate: "Déplacer le Siège de l'Invocateur"
 decision_new_capital.t.steward: "Déplacer le Siège des Intendants"
 decision_new_capital.t.prince: "Déplacer la Cour Princière"
 decision_new_capital.t.nie: "Déplacer le Siège des Rois-en-Exil"
 decision_new_capital.t.king: "Déplacer le Siège des Rois"
 decision_new_capital.t.fallback: "Déplacer votre Siège de Pouvoir"
 
 decision_new_capital.desc.gondor: "Au cours de son histoire, la [capital|El] du [gondor|E] a déjà changé auparavant. Lorsque l'ancienne capitale d'[GetTitleByKey('c_osgiliath').GetNameNoTier] tomba en ruine, les rois déplacèrent leur cour à [GetTitleByKey('c_minas_tirith').GetNameNoTier]. Si elle était reprise au [nazgulcharacter|E] et purifiée de leur corruption, [GetTitleByKey('c_minas_ithil').GetNameNoTier] pourrait également servir de siège de pouvoir digne. Durant la [kinstrife|E], on rapporte que Castamir envisagea de la déplacer à [GetTitleByKey('c_pelargir').GetNameNoTier], sans doute le cœur du pouvoir du Gondor durant les [shipkings|E].\n\nSi nous jugeons notre siège actuel inadéquat, nous pourrions choisir de le déplacer à nouveau."
 decision_new_capital.desc.castamir: "Tout au long de son histoire, la [capital|El] du [gondor|E] a changé plus d'une fois. Lorsque l'ancienne capitale d'[GetTitleByKey('c_osgiliath').GetNameNoTier] tomba en ruine, les rois déplacèrent leur cour à [GetTitleByKey('c_minas_tirith').GetNameNoTier]. Si elle était reprise au [nazgulcharacter|E] et purifiée de leur corruption, [GetTitleByKey('c_minas_ithil').GetNameNoTier] pourrait également servir de siège de pouvoir digne. Durant la [kinstrife|E], on rapporte que Castamir envisagea de la déplacer à [GetTitleByKey('c_pelargir').GetNameNoTier], bien qu'il ne pût jamais réaliser son rêve. Enfin, après que nos ancêtres furent chassés par les faux rois sous Eldacar, le Siège des Rois Légitimes fut déplacé par nécessité à [GetTitleByKey('c_umbar').GetNameNoTier], où il demeura jusqu'à ce que nous recouvrions notre antique droit de naissance.\n\nSi nous jugeons notre siège actuel inadéquat, nous pourrions choisir de le déplacer à nouveau."
 decision_new_capital.desc.arnor: "La [capital|El] traditionnelle d'[arnor|E] était autrefois [GetTitleByKey('c_annuminas').GetNameNoTier], jusqu'à ce qu'elle tombe en ruine alors que le royaume se fractionnait et que les rois d'[arthedain|E] se déplacèrent à [GetTitleByKey('c_fornost').GetNameNoTier]. [GetTitleByKey('c_cameth_brin').GetNameNoTier], capitale de [rhudaur|E] et [GetTitleByKey('c_thalion').GetNameNoTier], capitale de [cardolan|E] seraient également des options plausibles. Enfin, [GetTitleByKey('c_tharbad').GetNameNoTier] fut jadis l'une des plus importantes cités de tout l'[eriador|E], et pourrait aussi être un candidat viable si nous voulions déplacer notre capitale une fois de plus."
 decision_new_capital.desc.rk: "Les capitales jumelles du [gondor|E] et d'[arnor|E] étaient jadis [GetTitleByKey('c_osgiliath').GetNameNoTier] et [GetTitleByKey('c_annuminas').GetNameNoTier], jusqu'à ce que toutes deux soient finalement abandonnées. Maintenant que les deux royaumes sont à nouveau unis, je peux choisir parmi plusieurs sites clés pour gouverner. [GetTitleByKey('c_tharbad').GetNameNoTier] pourrait également être un choix intéressant, car il fut jadis administré conjointement par les deux [realms_in_exile|E]."
 decision_new_capital.desc.nie: "Avant la [downfall|E], les rois de [numenor|E] régnaient depuis [armenelos|E] la Dorée, Cité des Rois. Comme elle fut perdue il y a si longtemps, je peux choisir parmi de nombreux candidats potentiels pour la [capital|El] des [realms_in_exile|E] qui servirait à sa place."
 decision_new_capital.desc.fallback: "Au cours de notre histoire, plusieurs cités importantes ont servi de sièges de pouvoir pour nos souverains. Si nous sommes insatisfaits de notre [realm_capital|El] actuelle, nous pourrions choisir un nouveau site d'où régner."
 decision_new_capital_tooltip: "Si notre [capital|El] actuelle s'avère inadéquate, nous pourrions la déplacer vers un meilleur emplacement."
 decision_new_capital_confirm: "Une capitale digne de ce nom"
 decision_new_capital.second_step: "Mais où ?"
 
 new_capital_fallback: "Solution de repli"
 decision_new_capital.tt.new_capital_fallback: "Votre [capital|El] sera déplacée vers un nouvel emplacement."
 new_capital_fallback_effect.tt: "Vous choisirez une nouvelle province pour devenir votre [realm_capital|El]"
  
 decision_new_capital.tt.new_capital_osgiliath: "[GetTitleByKey('c_osgiliath').GetNameNoTier]"
 new_capital_osgiliath_tooltip: "[osgiliath|E] est la capitale originelle du [gondor|E]. Après avoir été mise à sac durant la [kinstrife|E], elle connut une longue période de déclin jusqu'à ce qu'elle soit finalement abandonnée, ses ruines servant de fortifications militaires improvisées."
 new_capital_osgiliath.effect.tt: "Votre [capital|El] sera déplacée à nouveau vers [GetTitleByKey('c_osgiliath').GetNameNoTier], l'antique capitale du [gondor|E]."
 
 decision_new_capital.tt.new_capital_minas_tirith: "[GetTitleByKey('c_minas_tirith').GetNameNoTier]"
 new_capital_minas_tirith_tooltip: "[minastirith|E], originellement connue sous le nom de Minas Anor, est une grande forteresse de pierre blanche qui servit de capitale au [gondor|E] après la chute d'[osgiliath|E]. C'est la forteresse-sœur de [minasithil|E]."
 new_capital_minas_tirith.effect.tt: "Votre [capital|El] sera déplacée vers [GetTitleByKey('c_minas_tirith').GetNameNoTier], la [whitecity|E]."
 
 decision_new_capital.tt.new_capital_minas_ithil: "[GetTitleByKey('c_minas_ithil').GetNameNoTier]" 
 new_capital_minas_ithil_tooltip: "[minasithil|E] est une grande forteresse blanche construite à l'est de l'[anduin|E]. Elle fut finalement conquise par [mordor|E] et corrompue par le [witchkingshort|E]. C'est la cité-sœur de [minasanor|E]."
 minas_ithil_free_of_corruption.tt: "[GetTitleByKey('c_minas_ithil').GetNameNoTier] doit être libre de la [GetModifier('fading_morgul_corruption_modifier').GetNameWithTooltip]."
 
 decision_new_capital.tt.new_capital_emyn_arnen: "[GetTitleByKey('c_emyn_arnen').GetNameNoTier]" 
 new_capital_emyn_arnen_tooltip: "Emyn Arnen est une ancienne forteresse du [gondor|E]. Elle pourrait servir de nouvelle capitale provinciale puisque [minasithil|E] est encore affligée par la Corruption du [nazgulcharacter|E]."
 
 decision_new_capital.tt.new_capital_pelargir: "[GetTitleByKey('c_pelargir').GetNameNoTier]" 
 new_capital_pelargir_tooltip: "Pelargir est le plus grand port du [gondor|E]. C'est l'une des premières cités fondées par les [dunedain|E] et elle a toujours joué un rôle vital dans le commerce maritime et comme havre militaire."
 
 decision_new_capital.tt.new_capital_dol_amroth: "[GetTitleByKey('c_dol_amroth').GetNameNoTier]" 
 new_capital_dol_amroth_tooltip: "[dol_amroth|E] est le siège légendaire des Princes de Dol Amroth. C'est un puissant château [dunedain|E] et un centre culturel clé du [gondor|E] méridional."
 
 decision_new_capital.tt.new_capital_methir: "[GetTitleByKey('c_methir').GetNameNoTier]" 
 new_capital_methir_tooltip: "Methir est l'une des plus grandes agglomérations du Harondor. Bien qu'elle ait fortement décliné vers la fin du [thirdage|E], elle pourrait être reconstruite."
 
 decision_new_capital.tt.new_capital_mirlond: "[GetTitleByKey('c_mirlond').GetNameNoTier]" 
 new_capital_mirlond_tooltip: "Mirlond est le plus septentrional des havres jumeaux situés à l'embouchure du Harnen. C'est une antique colonie [numenorean|E] qui entretient une longue rivalité avec sa jumelle méridionale, Ramlond."
 
 decision_new_capital.tt.new_capital_ramlond: "[GetTitleByKey('c_ramlond').GetNameNoTier]" 
 new_capital_ramlond_tooltip: "Ramlond est le plus méridional des havres jumeaux situés à l'embouchure du Harnen. C'est une antique colonie [numenorean|E] qui entretient une longue rivalité avec sa jumelle septentrionale, Mirlond."
 
 decision_new_capital.tt.new_capital_umbar: "[GetTitleByKey('c_umbar').GetNameNoTier]" 
 new_capital_umbar_tooltip: "Le Havre Noir d'[umbar|E] est l'une des premières colonies [numenorean|E] en [middleearth|E] et l'un de ses plus grands ports. Il a été le foyer des peuples [black_numenoreans|E], [dunedain|E] et [haradrim|E]. Sa position centrale entre le [gondor|E] et [bellakar|E] en fait un choix évident pour quiconque souhaite unir les [realms_in_exile|E]."
 
 decision_new_capital.tt.new_capital_annuminas: "[GetTitleByKey('c_annuminas').GetNameNoTier]" 
 new_capital_annuminas_tooltip: "Annúminas est l'antique capitale d'[arnor|E]. Elle fut finalement abandonnée et tomba en ruine alors que les [dunedainnorth|E] déclinaient. Elle pourrait servir de grande capitale si elle était reconstruite."
 
 decision_new_capital.tt.new_capital_fornost: "[GetTitleByKey('c_fornost').GetNameNoTier]" 
 new_capital_fornost_tooltip: "Fornost est une grande forteresse [arnorian|E]. Elle servit de capitale à l'État successeur d'[arthedain|E] après la chute d'[arnor|E]."
 
 decision_new_capital.tt.new_capital_tharbad: "[GetTitleByKey('c_tharbad').GetNameNoTier]" 
 new_capital_tharbad_tooltip: "Tharbad est l'une des plus anciennes colonies établies durant l'[eriadorcolonisation|E]. Après la [downfallofnumenor|E], elle fut administrée conjointement par [arnor|E] et [gondor|E], bien qu'elle tombât en déclin et fût finalement abandonnée. Sa position centrale pourrait en faire un candidat viable comme capitale d'un royaume [dunedain|E] uni."
 
 decision_new_capital.tt.new_capital_thalion: "[GetTitleByKey('c_thalion').GetNameNoTier]" 
 new_capital_thalion_tooltip: "Thalion est une ancienne forteresse [arnorian|E]. Elle servit de capitale au Royaume de [cardolan|E] jusqu'à ce qu'elle soit finalement détruite durant les [angmar_wars|E]."
 
 decision_new_capital.tt.new_capital_cameth_brin: "[GetTitleByKey('c_cameth_brin').GetNameNoTier]" 
 new_capital_cameth_brin_tooltip: "Cameth Brin est une ancienne forteresse [arnorian|E]. Elle servit de capitale au Royaume de [rhudaur|E], jusqu'à ce qu'elle tombe en ruine après les [angmar_wars|E]."
 
 decision_new_capital.tt.new_capital_nilulonde: "[GetTitleByKey('c_nilulonde').GetNameNoTier]" 
 new_capital_nilulonde_tooltip: "Nîlûlondê est une antique forteresse [numenorean|E] et la capitale historique de [bellakar|E]. Elle fut bâtie sur le flanc d'une grande montagne et devint un phare de culture et d'érudition."
 
 decision_new_capital.tt.new_capital_korlea: "[GetTitleByKey('c_korlea').GetNameNoTier]" 
 new_capital_korlea_tooltip: "La Grande Cité de Korlea est l'un des plus anciens ports [numenorean|E]. Les Korléens ont toujours été traditionalistes, cherchant à maintenir l'héritage de [numenor|E] après la [downfall|E]."
 
 decision_new_capital.tt.new_capital_tariketh_an_kharat: "[GetTitleByKey('c_tariketh_an_kharat').GetNameNoTier]" 
 new_capital_tariketh_an_kharat_tooltip: "Târikêth an-Kharat est le centre traditionnel d'[anbalkumagan|E] et en son centre se dresse Marath Kharadûnê. La grande tour s'élève au-dessus de la cité et pourrait servir de capitale imposante si elle était convenablement rénovée."
 
 decision_new_capital.tt.new_capital_khorsaj: "[GetTitleByKey('c_khorsaj').GetNameNoTier]" 
 new_capital_khorsaj_tooltip: "Khorsâj est une grande forteresse des [adunai|E] du sud et la capitale traditionnelle de l'Hôte des Tempêtes. Elle se situe au centre de la [bayoftulwang|E] et a servi de bastion contre les autochtones indisciplinés pendant de nombreux siècles."
 
 decision_new_capital.tt.new_capital_tol_uialgaer: "[GetTitleByKey('c_tol_uialgaer').GetNameNoTier]" 
 new_capital_tol_uialgaer_tooltip: "L'archipel d'Anagzâyan a été complètement englouti par la grande cité d'Arminalêthôr. La prospérité de la forteresse [black_numenoreans|E] construite par les Ar-Adûnâim est alimentée par des milliers d'esclaves et elle ne peut être que la seule capitale digne de l'[anadune|E] reconstruit."
 
