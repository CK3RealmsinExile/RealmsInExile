 propaganda_decision: "Parrainer la Propagande Adûnaïque"
 propaganda_decision_desc: "C'est une vérité indéniable que les descendants des Hauts Hommes d'[anadune|E] ont longtemps régné en maîtres suprêmes de tous les [conceptracemen|E] en [middleearth|E]. Cependant, au fil des ans, beaucoup ont oublié cette vérité et murmurent plutôt avec mécontentement contre notre règne. Nous devons nous assurer que tous nos sujets connaissent notre droit divin à les gouverner."
 propaganda_decision_tooltip: "Vous décrétez que les crieurs publics et les artistes locaux doivent participer à la propagande [adunaic|E] par des proclamations publiques et des pièces de théâtre."
 propaganda_decision_desc_activity: "Vous consacrez du temps à #high Parrainer la Propagande Adûnaïque#! ."
 propaganda_decision_desc_warnings: "Une propagande peu subtile pourrait ne pas être bien reçue par vos sujets."
 propaganda_decision_desc_benefits: "Vous pourrez augmenter vos [skills|El] personnelles et tenter d'influencer la perception de votre règne par vos sujets."
 propaganda_decision_confirm: "Cherchez mes scribes !"
 
