 decision_integrate_drakkenvast: "Intégrer Drakkenvast"
 decision_integrate_drakkenvast_tooltip: "Intégrer pleinement la frontière nord à votre royaume"
 decision_integrate_drakkenvast_desc: "Au-delà de la Montagne Solitaire s'étend la plaine de Drakkenvast, qui n'a jamais été que légèrement peuplée. Maintenant que nos parents ont commencé à s'étendre vers les contreforts des Montagnes Grises, il est temps de déclarer notre juridiction sur ces terres pour qu'elle soit visible par tous."
 decision_integrate_drakkenvast_confirm: "Que le Nord soit sécurisé !"
 
 decision_strengthen_eastern_border: "Renforcer la Frontière Orientale"
 decision_strengthen_eastern_border_tooltip: "Investir dans la défense des marches orientales"
 decision_strengthen_eastern_border_desc: "Le long de notre frontière orientale coule la rivière Carnen, défendue par les avant-postes de [GetTitleByKey('c_carnedir').GetNameNoTier] et [GetTitleByKey('c_khunandar').GetNameNoTier]. Avec notre récente expansion dans cette région et les menaces de l'Est toujours présentes, il serait sage d'investir dans la défense de cette frontière cruciale."
 decision_strengthen_eastern_border_confirm: "Notre vigilance vers l'est sera renouvelée !"
 
 decision_train_logath_cavalry_archers: "Former des Archers Montés Logath"
 decision_train_logath_cavalry_archers_tooltip: "Acquérir des connaissances sur le style de combat des semi-nomades Logath"
 decision_train_logath_cavalry_archers_desc: "Les Logath ont longtemps été nos voisins orientaux, tant en temps de paix que de guerre. Leurs cavaliers peuvent traverser rapidement les plaines, et ils favorisent l'arc comme beaucoup parmi notre propre peuple. Si nous établissions de bonnes relations avec les Logath, nous pourrions acquérir suffisamment de connaissances sur leur style de combat pour former de manière fiable nos propres archers montés."
 decision_train_logath_cavalry_archers_confirm: "Nos flèches voleront encore plus vite maintenant."
 unlock_logath_cav_archer_maa: "Peut recruter des [GetMaA('logath_horsearchers').GetName|l] comme [men_at_arms|El]"
 
 decision_buy_armour_from_the_dwarves: "Acheter de l'Armement Nain"
 decision_buy_armour_from_the_dwarves_tooltip: "Acquérir des armures fabriquées par les nains d'Erebor pour votre armée."
 decision_buy_armour_from_the_dwarves_desc: "Dans les jours précédant l'arrivée du Dragon, nos ancêtres commerçaient souvent avec les [dwarves|E] de la Montagne Solitaire, leur fournissant des vivres en échange de leurs armes et armures supérieures. Nous pourrions faire revivre cette tradition et équiper nos soldats d'armures forgées par les nains, leur donnant un avantage dans les guerres à venir."
 decision_buy_armour_from_the_dwarves_confirm: "Envoyez une missive à Erebor !"
 
 decision_help_rebuild_erebor: "Contribuer à la Restauration d'Erebor"
 decision_help_rebuild_erebor_tooltip: "Envoyer de l'aide aux Nains du Peuple de Durin pour restaurer Erebor."
 decision_help_rebuild_erebor_desc: "La Montagne Solitaire, jadis florissant royaume des [dwarves|E] du Peuple de Durin, n'est désormais qu'une ruine hantée par les spectres du passé. Couloirs vides et tunnels obscurs ont remplacé les cavernes resplendissantes et les salles animées depuis que les nains furent chassés de leur demeure ancestrale.\n\nMais Dale, qui toujours fut alliée aux Fils de Durin, tient encore bon. Ceci nous offre l'opportunité de prêter assistance aux nains afin qu'ils puissent reconquérir la Montagne Solitaire une fois encore."
 decision_help_rebuild_erebor_confirm: "Pour la Montagne Solitaire !"
 tom_holds_erebor_desc: "Erebor est tombée"
 helps_dwarves_colonise_erebor: "Erebor sera restaurée par le Peuple de Durin"
 
 decision_dale_high_king: "Devenir Haut Roi du Nord"
 decision_dale_high_king_tooltip: "Ceindre le manteau de Haut Roi du Val"
 decision_dale_high_king_desc: "[dale|E] prospère sous mon règne. Nos frontières sont gardées par de hauts remparts et de solides alliances, et le bon commerce comme le négoce florissant remplissent les coffres jusqu'au moindre des hommes du royaume — le Nord n'a jamais connu pareille splendeur et prospérité.\n\nJ'ai parachevé l'œuvre que mes ancêtres avaient entreprise, et je revendiquerai en récompense le titre de véritable Haut Roi du Nord."
 decision_dale_high_king_confirm: "Pour le Lac et la Montagne !"
 decision_dale_high_king_development: "Chaque [county|El] du [GetTitleByKey('d_dalelands').GetName] a amélioré son bâtiment principal au moins une fois"
 decision_dale_high_king_drakkenvast: "Le [GetTitleByKey('d_drakkenvast').GetName] a été intégré"
 decision_dale_high_king_borders: "Les frontières orientales ont été consolidées"
 decision_dale_high_king_fealty: "Les [ruler|El]s nordiques voisins peuvent prêter allégeance"
 decision_dale_high_king_fealty_tt: "[new_dale_vassal.GetName] a prêté allégeance"
 
 decision_celduin_empire: "Unir les Couronnes du Celduin"
 decision_celduin_empire_tooltip: "Forger un royaume impérissable le long du Cours d'Eau"
 decision_celduin_empire_desc: "Le puissant Celduin, le Cours d'Eau, est la veine vitale de deux grands royaumes des Nordiques : [dale|E], qui s'élève près de la source du fleuve à [erebor|E] et s'étend autour du Long Lac d'Esgaroth, et [dorwinion|E], qui embrasse les deux rives du Celduin tandis qu'il traverse les terres verdoyantes avant de se jeter dans la [seaofrhun|E].\n\nPar la diplomatie et les alliances, ces royaumes fraternels pourraient être unis et fondus en une seule entité, rassemblant les forces de l'un et de l'autre."
 decision_celduin_empire_confirm: "Faites parvenir la nouvelle à tous les Hommes du Nord."
 decision_celduin_empire_dale: "[GetTitleByKey('k_dorwinion').GetHolder.GetName] devient votre [vassal|El]"
 decision_celduin_empire_dorwinion: "[GetTitleByKey('k_dale').GetHolder.GetName] devient votre [vassal|El]"

 decision_unite_the_western_houses: "Unifier les Clans Occidentaux"
 decision_unite_the_western_houses_tooltip: "Rassembler tous les [dwarves|E] habitant les [bluemountains|E]"
 decision_unite_the_western_houses_desc: "Les [bluemountains|E] sont les demeures ancestrales des deux clans occidentaux de [dwarves|E]. C'est ici que s'éveillèrent les pères des [broadbeams|E] et des [firebeards|E], et leurs maisons y résident depuis l'aube des temps.\n\nNos antiques forteresses ayant retrouvé leur gloire d'antan, et des alliances indéfectibles forgées entre les deux clans comme le mithril, l'heure est venue de s'unir enfin sous une seule bannière, au nom de tous les fiers nains de l'occident."
