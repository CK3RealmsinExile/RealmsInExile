 decision_sauron_reveal_yourself_tt: "Débloque les casus belli réguliers et l'expansion"

 decision_bend_the_knee_to_mordor: "Plier le genou face au Mordor"
 decision_bend_the_knee_to_mordor_tooltip: "Devenir un tributaire volontaire du Seigneur Sombre"
 decision_bend_the_knee_to_mordor_desc: "Dans les Terres du [mordor|E], il y a un Seigneur Sombre sur un Trône Sombre. Il cherche depuis longtemps à dominer tous les peuples de la [middleearth|E]. Il serait sage de ne pas s'attirer ses foudres. Il serait sage... de se joindre à Lui. Et d'être récompensé une fois qu'Il sera victorieux..."
 decision_bend_the_knee_to_mordor_confirm: "Envoyez un messager!"
 decision_bend_the_knee_to_mordor_tt: "Votre royaume borde le Mordor"

 decision_return_the_rings: "Remettre les Anneaux de Pouvoir au Seigneur Sombre"
 decision_return_the_rings_desc: "En ma possession se trouvent des anneaux forgés par le Seigneur Sombre, mon maître, Sauron. Outre [nazgul_ring.GetName] que mon Seigneur me remit au cours du Deuxième Âge, je détiens des anneaux qui lui appartiennent de plein droit.\nJe pourrais les lui rendre et l'aider à recouvrer ses forces, ou les conserver pour contribuer à affaiblir ses ennemis dans le monde."
 decision_return_the_rings_tooltip: "Remettre les anneaux à Sauron"
 decision_return_the_rings_confirm: "Rendre les Anneaux"
 decision_return_the_rings_tt: "Vous vous rendrez à [sauron_capital.GetName]"
 
 ######################
 ### Orc Descisions ###
 ######################
 decision_challenge_the_orc_leader: "Défier le Chef de Guerre"
 decision_challenge_the_orc_leader_tooltip: "Vous défierez votre suzerain dans un combat à mort. Si vous êtes victorieux, vous saisirez tous ses titres sur son cadavre ensanglanté."
 decision_challenge_the_orc_leader_desc: "C'est une honte que vous soyez le serviteur d'une telle mauviette. Le fort doit régner, et le faible lui obéir, pas l'inverse ! Aucun orque n'est digne de sa position s'il n'est pas assez fort pour la conserver... peut-être pourriez-vous montrer à cet arriviste le sens de la vraie force."
 decision_challenge_the_orc_leader_confirm: "Je festoierai de sa chair !"
 
 decision_reject_sauron: "Défier le Seigneur Ténébreux"
 decision_reject_sauron_tooltip: "Libéré de son joug, vous pouvez maintenant faire connaître votre véritable opinion sur le Seigneur Ténébreux."
 decision_reject_sauron_desc: "Pourquoi devrais-je vénérer le Seigneur Ténébreux ? Il a abandonné le Mordor et nous autres orques pendant des milliers d'années, fuyant comme un lâche poltron ! Si ce n'est pas la preuve de sa faillibilité, rien ne l'est. Il peut mériter la peur, mais pas l'adoration. Et comme tout être puissant, à un moment donné il trébuchera, et quelqu'un de plus fort prendra sa place - peut-être ce sera moi !"
 decision_reject_sauron_confirm: "Il est temps de dire ce que je pense - c'est ainsi que fonctionne le monde !"
 
 decision_unify_the_orcs: "Unifier les Bandes Orques"
 decision_unify_the_orcs_tooltip: "Unifier les Tribus Orques désorganisées en une seule armée !"
 decision_unify_the_orcs_desc: "Depuis si longtemps, les orques ont été dispersés et désunifiés, repoussés à chaque tournant par les Hommes, les Nains et les Elfes. Nous étions unifiés sous les Seigneurs Ténébreux, mais ils ne sont pas dignes de nos épées ! Les Orques devraient diriger les orques, et le plus fort de tous devrait mener - moi. \n\nSous ma bannière, l'Armée Orque se répandra sur toute la terre !"
 decision_unify_the_orcs_confirm: "L'ère de l'Orque est venue !"
 
 found_hegemony_decision_three_empires_held: "Vous détenez 3 [empires|E] ou davantage"
 create_goblin_duchy: "Créer un nouveau Duché Gobelin"

 NEW_GOBLIN_TITLE_NAME: "[founder.GetCulture.GetNameNoTooltip]s"

 decision_high_pass_west: "Sécuriser le Col Haut Occidental"
 decision_high_pass_west_tooltip: "Sécuriser le Col Haut Occidental"
 decision_high_pass_west_desc: "Les Elfes de la Vallée Cachée représentent une grande menace pour notre expansion. Leurs groupes de chasse détruisent tous les établissements que nous créons, et nous empêchent de revendiquer notre seigneurie légitime sur le Col Haut. Ces entraves doivent être détruites."
 decision_high_pass_west_confirm: "Les Elfes ne nous importuneront plus !"

 decision_high_pass_east: "Sécuriser le Col Haut Oriental"
 decision_high_pass_east_tooltip: "Sécuriser le Col Haut Oriental"
 decision_high_pass_east_desc: "Les Changeurs de Peau peuplaient autrefois les pentes montagneuses, et guerroyaient avec nos ancêtres pendant de nombreux siècles. Nous avons exterminé la plupart des leurs, mais l'un d'eux s'est échappé et gouverne maintenant dans la Vallée de l'Anduin. Sous son autorité, les Hommes de la Vallée, avec une force renouvelée, nous empêchent désormais de piller leurs établissements comme nous le faisions jadis. Ce peuple maudit doit être anéanti une fois pour toutes."
 decision_high_pass_east_confirm: "Les Changeurs de Peau seront exterminés pour de bon !"
 
 decision_demand_orc_submission: "Exiger la Soumission des Montagnes Brumeuses"
 decision_demand_orc_submission_tooltip: "Tous les Orques s'agenouilleront ou seront détruits."
 decision_demand_orc_submission_desc: "Mon règne sera absolu et incontesté. Nul n'osera se dresser contre moi, le Seigneur de tous les Pics et Cavernes !\n\nJ'exigerai l'allégeance de tout Orque qui pense encore régner indépendamment. Pas un seul d'entre eux ne me défiera et vivra !"
 decision_demand_orc_submission_confirm: "Les Montagnes sont MIENNES !"
 decision_demand_orc_submission_is_azog: "Vous êtes Azog"
 decision_demand_orc_submission_tt: "Tous les [orcs|E] des Montagnes Brumeuses doivent réagir à votre exigence"
 
 decision_solidify_moria: "Consolider le Contrôle de la Moria"
 decision_solidify_moria_tooltip: "Revendiquer la domination incontestée sur tout le Gouffre Noir."
 decision_solidify_moria_desc: "Le Gouffre Noir sera mien, à moi seul ! Je dois m'assurer qu'il n'y a pas de contestataires à mon règne en éliminant ceux qui commandent encore des positions de pouvoir dans ces salles en ruine. Nul ne se dressera contre moi et persistera !"
 decision_solidify_moria_confirm: "Le Gouffre Noir est mien !"
 decision_solidify_moria_tt: "Les souverains mineurs de la Moria prêteront allégeance"
 
 decision_uldona_spine_orc: "Revendiquer l'Épine d'Uldona"
 decision_uldona_spine_orc_tooltip: "Forger un royaume sous les pics de l'Épine d'Uldona"
 decision_uldona_spine_orc_desc: "Ces montagnes sont nôtres. Les puants portebarbes qui vivaient ici ont poussé leur dernier souffle il y a longtemps. Ces terribles lézards, les Dragons, dotés d'un pouvoir et d'une terreur effroyables, ont également disparu. Mais nous sommes là - les Orques combattants ! Nous revendiquerons l'Épine d'Uldona, et tout le Rhûn tremblera devant ma puissance !"
 decision_uldona_spine_orc_confirm: "Et nous ne laisserons personne nous en chasser..."
 
 decision_infiltrate_whitemountains: "Infiltrer les Montagnes Blanches"
 decision_infiltrate_whitemountains_tooltip: "Envoyer certains de vos laquais de confiance pour tenter d'infiltrer les Montagnes Blanches."
 decision_infiltrate_whitemountains_desc: "Nichées entre les terres des Peaux-Blanches et des Terriens se trouvent les Montagnes Blanches. Peu d'[orcs|E] ont jamais mis le pied dans ces terres sauvages et indomptées. Qui sait quelles richesses se cachent sous leurs pics !\n\nSi nous établissions un avant-poste en secret, nous pourrions commencer à rassembler nos forces là-bas, cachés des regards, jusqu'à ce que nous soyons prêts à piller les riches terres qui s'étendent en contrebas..."
 decision_infiltrate_whitemountains_confirm: "Nous devons être rusés et rapides."
 decision_infiltrate_whitemountains_tt: "Vous tenterez d'envoyer quelqu'un aux Montagnes Blanches en secret"
 
 decision_azog_raid_eriador: "Piller l'Eriador"
 decision_azog_raid_eriador_tooltip: "Envoyer un groupe de pillage en [eriador|E]."
 decision_azog_raid_eriador_desc: "Les terres de l'[eriador|E] sont moins peuplées que les régions à l'est des Montagnes Brumeuses, mais en contrepartie, elles sont moins défendues.\n\nJ'enverrai un groupe de pillage pour saccager ce que nous pourrons des hommes vivant à la lisière de la Contrée Sauvage !"
 decision_azog_raid_eriador_confirm: "Rassemblez mes pillards !"
 decision_azog_raid_eriador_tt: "Vous sélectionnerez une cible de raid"
 
 decision_azog_raid_rhovanion: "Piller le Rhovanion"
 decision_azog_raid_rhovanion_tooltip: "Envoyer un groupe de pillage dans le Rhovanion."
 decision_azog_raid_rhovanion_desc: "Les terres qui s'étendent à l'est des Montagnes Brumeuses sont peuplées d'[elves|E] et d'Hommes. Il y aura du butin et des richesses à prendre pour tout [orc|E] audacieux, j'imagine !\n\nJ'enverrai un groupe de pillage pour saccager ce que nous pourrons des habitants des terres sauvages dans la Vallée de l'Anduin !"
 decision_azog_raid_rhovanion_confirm: "Rassemblez mes pillards !"
 decision_azog_raid_rhovanion_tt: "Vous sélectionnerez une cible de raid"
 
 decision_azog_summoned_by_sauron: "Répondre à la Convocation du Seigneur Ténébreux"
 decision_azog_summoned_by_sauron_desc: "Il y a un nouveau pouvoir qui s'élève à Dol Guldur - d'après le message inquiétant que j'ai reçu, et le travail de mes éclaireurs, son nom - ou peut-être seulement son titre - est le Nécromancien. C'est un pouvoir qui devient plus fort d'heure en heure.\n\nMême si je ne veux pas m'avilir en m'inclinant devant sa puissance, je devrais au moins voir ce qu'il a à offrir..."
 decision_azog_summoned_by_sauron_tooltip: "Voyager à Dol Guldur pour répondre à la convocation de ce Nécromancien"
 decision_azog_summoned_by_sauron_confirm: "Amenez-moi mon warg !"
 decision_azog_summoned_by_sauron_tt: "Vous voyagerez à Dol Guldur dans le sud du [mirkwood|E]"
 
 decision_azog_ulukai_search: "Rechercher l'Ulúkai"
 decision_azog_ulukai_search_desc: "L'Ulúkai, une pierre sombre ancienne et mystérieuse, a longtemps été le symbole du pouvoir exercé par l'Ashdurbúk - le véritable chef de Gundabad. Elle a été perdue pendant de nombreux siècles.\n\nSi la gemme était retrouvée, je pourrais l'utiliser pour revendiquer la position d'Ashdurbúk pour moi-même, solidifiant ma revendication sur Gundabad..."
 decision_azog_ulukai_search_tooltip: "Commencer la recherche de la gemme Ulúkai, perdue depuis longtemps."
 decision_azog_ulukai_search_confirm: "Commencez la recherche immédiatement !"
 decision_azog_ulukai_search_tt: "Vous rechercherez l'Ulúkai jusqu'à ce qu'il soit trouvé"
 decision_azog_ulukai_short_search: "La gemme est trouvée rapidement"
 decision_azog_ulukai_medium_search: "La recherche prend un certain temps"
 decision_azog_ulukai_long_search: "La recherche est longue et ardue"
 decision_azog_ulukai_verylong_search: "Vous commencez à craindre que la gemme ne soit jamais trouvée"
 
 decision_azog_claim_final_victory: "Saisir le Pouvoir Illimité"
 decision_azog_claim_final_victory_desc: "J'ai gagné. Il ne reste personne pour me défier - tous les Orques louent mon nom, et tous les Peuples Libres tremblent, se cachant dans leurs trous ou refuges ! Mes armées s'étendent sur le flanc de la montagne, aussi dures que la pierre ! Je suis le Maître ! Je suis le Tyran du Nord !"
 decision_azog_claim_final_victory_tooltip: "Faites connaître votre victoire ultime à tous."
 decision_azog_claim_final_victory_confirm: "Rien ne peut m'arrêter."

 decision_deep_worship_nameless_things: "S'aventurer dans les Ténèbres Primordiales"
 decision_deep_worship_nameless_things_tooltip: "Sonder les abysses à la recherche d'horreurs innommables."
 decision_deep_worship_nameless_things_desc: "Ici, dans les profondeurs insondables, une vérité nous est connue par-dessus tout : des choses obscures et sans nom rongent les racines mêmes du monde. Bien que nous risquions notre santé mentale et notre vie en les cherchant, ne serait-ce qu'entrevoir leur forme indicible constitue une révélation d'essence divine."
 decision_deep_worship_nameless_things_confirm: "Plonger dans l'Abîme"
 decision_deep_worship_nameless_things.tt1: "La capitale doit être située dans les profondeurs souterraines."
 decision_deep_worship_nameless_things.tt2: "Subir du stress en échange de puissantes bénédictions occultes."
 decision_deep_worship_nameless_things.tt3: "Alternativement, perdre du stress au prix de blessures corporelles."
 
 decision_drake_tribute: "Offrir un tribut au Dragon local"
 decision_drake_tribute_tooltip: "Rechercher l'alliance d'un Dragon des environs."
 decision_drake_tribute_desc: "Notre nouvelle colonie s'établit au cœur même du territoire draconique. Quelle folie serait-ce de défier une puissance si terrible ? Offrons plutôt tribut en sang et en or. Envoyons sacrifices et trésors scintillants afin de gagner la faveur d'un ver ancestral, grandiose et terrifiant."
 decision_drake_tribute_confirm: "Envoyer le tribut"
 
 decision_desolation_kingdom: "Proclamer la Seconde Désolation"
 decision_desolation_kingdom_tooltip: "Anéantir Erebor et les Terres de Dale"
 decision_desolation_kingdom_desc: "Si totale fut la destruction d'Erebor et Dale par Smaug que ces terres ne furent plus connues que sous le nom de 'Désolation de Smaug'. Voici maintenant la nôtre, une Seconde Désolation, le 'Nokhar Krulûzg'. Pillez chaque fief, videz chaque entrepôt. Tous les greniers seront écumés, chaque pièce saisie. Les richesses de deux royaumes seront rassemblées en un seul. Que tout ce qui n'est point doré soit réduit en cendres."
 decision_desolation_kingdom_confirm: "Prendre ce qui nous revient !"
 desolation_modifier.tt: "Chaque comté d'Erebor et Dale sera mis à sac durant 20 années, réduisant levées et développement, mais augmentant considérablement leur production aurifère."
 desolation_dejure.tt: "Fusionner les terres de jure d'Erebor et Dale en un nouveau royaume unifié."

 ###########################
 #### Nurnoth Decisions ####
 ###########################
  
 decision_destroy_thaurband: "Détruire les Marchés aux Esclaves de Thaurband"
 decision_destroy_thaurband_tooltip: "Détruisez le mal de Thaurband — purifiez les Marchés aux Esclaves, réduisez-les en cendres et en décombres"
 decision_destroy_thaurband_desc: "Le Mal de Thaurband a trop longtemps sévi en [nurn|E]. Il est temps que nous nous attaquions à la racine de ce mal — cette source de tant de souffrances en ces terres sombres — les Marchés aux Esclaves de Thaurband."
 decision_destroy_thaurband_confirm: "Détruire les Marchés aux Esclaves"
 
 decision_thaurband_building_nurnoth: "Ériger un nouvel Édifice Central à Thaurband"
 decision_thaurband_building_nurnoth_tooltip: "Choisissez un édifice vertueux à ériger à Thaurband"
 decision_thaurband_building_nurnoth_desc: "Là où s'élevaient jadis les plus grands marchés aux esclaves de [nurn|E], les anciens Marchés de Thaurband se dressent vides et nus... Existe-t-il un moyen de les reclamer pour une cause plus juste ?"
 decision_thaurband_building_nurnoth_confirm: "Ériger un nouvel Édifice Central"
 
 ##############################
 #### Near Harad Decisions ####
 ##############################
 decision_chelkar_submission: "Exiger la Soumission de Chelkar"
 decision_chelkar_submission_tooltip: "Exiger la soumission de Chelkar"
 decision_chelkar_submission_desc: "Chelkar est la racine de la désunion d'Harwen. Si nous souhaitons restaurer notre place en tant que puissance prééminente du Harad Proche, nous devons les faire s'agenouiller."
 decision_chelkar_submission_confirm: "Agenouillez-vous devant votre seigneur !"
 send_chelkar_ultimatum: "Envoie un ultimatum à Chelkar - se soumettre ou faire face à l'invasion"
 
 decision_harnen_submission: "Exiger la Soumission du Harnen"
 decision_harnen_submission_tooltip: "Reconquérir l'embouchure du Harnen des fiers Umbaréens"
 decision_harnen_submission_desc: "Les Umbaréens ont trop longtemps eu libre règne sur l'embouchure du Harnen. Ils taxent notre commerce qui en provient, et pourraient même éventuellement nous le fermer complètement. Si nous souhaitons restaurer notre hégémonie sur le Harad Proche, nous devrons les remettre à leur place."
 decision_harnen_submission_confirm: "Le Harnen est mien !"
 decision_harnen_submission.tt: "Les Umbaréens le long du Harnen recevront vos exigences..."
  
 decision_repulse_khand_lurmsakun: "Repousser la Revendication du Khand sur Lurmsakun"
 decision_repulse_khand_lurmsakun_tooltip: "Transférer Lurmsakun du Khand à l'Haradwaith"
 decision_repulse_khand_lurmsakun_desc: "Depuis d'innombrables générations, Lurmsakun a souffert des déprédations des cruels raids et de la domination du Khand. Bien qu'il soit vrai que la région n'est pas aussi interconnectée que le reste des Haradrim du Nord, son peuple reste néanmoins apparenté. \n\nSi nous pouvions consolider Lurmsakun sous un fort leadership Apysaïque, nous pourrions peut-être enfin mettre un terme aux revendications de seigneurie du Khand sur la région."
 decision_repulse_khand_lurmsakun_confirm: "Ne plus jamais s'agenouiller !"
 
 decision_purchase_mumakil: "Acheter des Mûmakil"
 decision_purchase_mumakil_tooltip: "Importer des Mûmakil des terres lointaines du Sud"
 summon_mumakil_trader_tt: "Vous convoquerez un marchand pour acheter dix [men_at_arms|El] [GetMaA('war_mumak').GetName]"
 summon_mumakil_trader_inflated_price_tt: "#warning Vous paierez un prix gonflé par rapport à leur recrutement direct !#!"
 summon_mumakil_trader_recruitment_info_tt: "#help Le recrutement direct est débloqué via :\n$BULLET_WITH_TAB$Le [duchy_building|E] [GetBuilding('mumakil_pen_01').GetName] dans la [GetGeographicalRegion('special_region_build_mumakil_pens').GetName]\n$BULLET_WITH_TAB$Le [special_building|E] [GetBuilding('wonder_palace_of_haruzan_03').GetName] à [GetTitleByKey('b_amrun').GetNameNoTier]#!"
 decision_purchase_mumakil_desc: "Bien qu'ils ne soient pas nécessairement natifs de nos terres, mon peuple possède les connaissances nécessaires pour dompter et utiliser les puissants Mûmakil en guerre. Bien que cela me coûterait significativement plus cher comparé à les élever moi-même, je pourrais payer pour les importer de l'Extrême Sud, afin de me donner un avantage dans les guerres à venir..."
 decision_purchase_mumakil_confirm: "Trouvez-moi un marchand."
 
 decision_jelut_empire: "Unir les Jelut"
 decision_jelut_empire_desc: "Les Jelut sont un peuple disparate et tribal, souvent méprisé par les [haradrim|E] du nord plus sédentaires. Parfois cependant, un souverain particulièrement fort unit toutes les tribus sous un royaume. Si mes conquêtes étaient suffisamment réussies, je pourrais tenter de revendiquer cette Haute Royauté, bien qu'il n'y ait aucune garantie sur la durée pendant laquelle ma [dynasty|El] règnera."
 decision_jelut_empire_tooltip: "Vous vous proclamerez Haut Roi des Jelut et du Grand Narak."
 decision_jelut_empire_confirm: "Une fois de plus, nous frappons unis."
 jelut_are_independent: "Pas d'autres souverains [jelutculture.GetName] indépendants"
 
 decision_restore_ancient_lurmsakun: "Restaurer l'Ancien Lurmsakun"
 decision_restore_ancient_lurmsakun_tooltip: "Restaurer les anciennes frontières de Lurmsakun"
 decision_restore_ancient_lurmsakun_desc: "Depuis d'innombrables générations, Lurmsakun a souffert des déprédations des cruels raids et de la domination du Khand. Pourtant, après la migration des Tedjin, nos ancêtres ont renversé leurs suzerains Khandiens et créé un grand royaume qui a duré plusieurs centaines d'années. Si nous reconquérons les anciennes frontières du Lurmsakun d'antan, nous restaurerons l'ancienne gloire de ce royaume et mettrons peut-être définitivement fin aux revendications de seigneurie du Khand sur la région."
 decision_restore_ancient_lurmsakun_confirm: "Ne plus jamais s'agenouiller !"
 
 decision_siaken_kingdom: "Devenir Roi des Siaken"
 decision_siaken_kingdom_tooltip: "Vous proclamer Roi des Siaken, élever votre peuple"
 decision_siaken_kingdom_desc: "Seuls parmi les peuples du [nearharad|E], nous autres Siaken avons historiquement manqué de notre propre Royaume. Toujours considérés comme le petit frère du robuste $k_lurmsakun$ et du riche $k_arysis$, notre royaume était rarement reconnu comme un égal.\n\nEt pourtant, j'ai engendré le petit frère, et l'ai nourri pour qu'il devienne fort et fier. Mon peuple me regarde avec admiration, et le temps est venu pour nous de nous affirmer - en tant que Rois des Siaken.\n\nCe royaume hypothétique a porté plusieurs noms à travers l'histoire, et il n'existe pas de convention parmi nous. Est-ce Siakan, Siakor, Sirysis, ou Sirazan ? Si je dois nous mener, le choix m'appartient."
 decision_siaken_kingdom.second_step: "Je suis Roi de..."
 decision_siaken_kingdom_confirm: "Et ainsi nous nous élevons."
 decision_siaken_kingdom.tt.siakan: "$k_siakan$"
 kingdom_name_siakan_tooltip: "Mon nouveau Royaume s'appellera #P $k_siakan$#!"
 decision_siaken_kingdom.tt.siakor: "$k_siakor$"
 kingdom_name_siakor_tooltip: "Mon nouveau Royaume s'appellera #P $k_siakor$#!"
 decision_siaken_kingdom.tt.sirysis: "$k_sirysis$"
 kingdom_name_sirysis_tooltip: "Mon nouveau Royaume s'appellera #P $k_sirysis$#!"
 decision_siaken_kingdom.tt.siakun: "$k_siakun$"
 kingdom_name_siakun_tooltip: "Mon nouveau Royaume s'appellera #P $k_siakun$#!"
 decision_siaken_kingdom.tt.sirazan: "$k_sirazan$"
 kingdom_name_sirazan_tooltip: "Mon nouveau Royaume s'appellera #P $k_sirazan$#!"
 cultural_acceptance_gain_siaken_recognition: "Impressionné par le [GetTitleByKey('k_siakan').GetNameNoTooltip]"

 recruit_witch_decision: "Recruter une Sorcière"
 recruit_witch_decision_desc: "Recruter une sorcière à votre cour, pour servir de conseillère depuis les ombres."
 recruit_witch_decision.tt: "Un courtisan avec le [trait|E] [GetTrait('witch').GetName( GetNullCharacter )] rejoint votre [court|El]"
 recruit_witch_decision_tooltip: "Un courtisan avec le [trait|E] [GetTrait('witch').GetName( GetNullCharacter )] rejoint votre [court|El]"
 recruit_witch_decision_confirm: "Commencer la Recherche"
 witch_recruited.t: "Sorcière Recrutée"
 witch_recruited.desc: "Un courtisan mystérieux arrive..."

 decision_harrying_of_the_coasts: "Harceler les Côtes du Gondor"
 decision_harrying_of_the_coasts_tooltip: "Lancer une invasion et un raid massifs contre le Gondor"
 decision_harrying_of_the_coasts_desc: "Depuis des années innombrables, le Gondor a été le grand ennemi du peuple du Harad. Mes ancêtres ont reconnu ce fait, et dans leur prévoyance, ont commencé la préparation de grandes flottes avec lesquelles chasser la menace de nos rivages. Maintenant enfin, le moment est venu, mes armées sont prêtes, mes flottes entièrement préparées. Il est temps de frapper et de sécuriser ces côtes pour nous-mêmes !"
 decision_harrying_of_the_coasts_confirm: "Toutes voiles dehors !"
 decision_harrying_of_the_coasts_tt: "Vous lancerez une guerre pour [GetTitleByKey('k_harondor').GetNameNoTier], dans laquelle tous les comtés occupés perdront du [development|El] et du [control|El]."
 first_fleet: "Première Flotte - Kas Shadoul"
 third_fleet: "Troisième Flotte - Kas Marzûk"
 fourth_fleet: "Quatrième Flotte - Amakûhd"

 decision_further_preparations: "Effectuer des Préparations Supplémentaires"
 decision_further_preparations_tooltip: "Consacrer plus de ressources à l'invasion du Gondor"
 decision_further_preparations_desc: "Malgré tout le labeur consacré à la prochaine invasion du Gondor, mon cœur craint encore notre échec. Je dois consacrer encore plus aux préparatifs de l'invasion, pour garantir qu'il n'y ait aucun risque de désastre."
 decision_further_preparations_confirm: "Qu'aucune main ne reste inactive !"
 decision_further_preparations_tt: "Vous recevrez une autre flotte de troupes d'événement (#italic 2700#!) lorsque vous déclarerez la guerre au [gondor|E]."

 decision_consolidate_harondor: "Consolider le Harondor"
 decision_consolidate_harondor_tooltip: "Nettoyer les frontières au Harondor"
 decision_consolidate_harondor_desc: "Alors que le pouvoir du [gondor|E] a diminué au Harondor, les souverains locaux se sont élevés pour combler le vide laissé. Divisés en nombreuses seigneuries querelleuses, les divers dirigeants du Harondor ne sont guère plus qu'un obstacle à mes plans pour la région. Je dois les soumettre et restaurer la sécurité et la paix dans cette terre - sous la bannière d'Harwan."
 decision_consolidate_harondor_confirm: "En avant vers la Victoire !"
 decision_consolidate_harondor_tt: "Vous déclarez la guerre à tous les souverains indépendants du Harondor."

 decision_darsalan_kingdom: "Forger le Royaume de Darsalan"
 decision_darsalan_kingdom_tooltip: "Solidifier l'ascension au pouvoir de Darsalan."
 decision_darsalan_kingdom_desc: "Trop longtemps notre peuple a souffert sous le joug d'étrangers tels que les scélérats d'Abrakhan, les zélotes de Koanoz ou même les oppresseurs de Khy. Mais plus maintenant !\n\nJe vais établir un royaume de Darsalan au nom de ma dynastie et solidifier sa place dans la Mer des Dunes !"
 decision_darsalan_kingdom_confirm: "Darsalan est en ascension !"

 decision_unite_the_dunes: "Unir les Dunes"
 decision_unite_the_dunes_tooltip: "Intégrer le Royaume de Darsalan à la Mer des Dunes"
 decision_unite_the_dunes_desc: "La Mer des Dunes est une patrie hostile, mais elle a forgé de nombreux guerriers endurcis. À l'est s'étendent les terres de Darsalan, où les royaumes s'élèvent et tombent aussi rapidement que la tempête de sable balaie les terres arides.\n\nC'est maintenant l'heure de l'unification ! Je forgerai ces terres en un seul royaume et apporterai paix, liberté, justice et sécurité à mon nouvel empire."
 decision_unite_the_dunes_confirm: "Pour la prospérité des Arani !"

 decision_pust_revival: "Revendiquer l'Héritage Pûst"
 decision_pust_revival_tooltip: "Proclamez-vous restaurateur de l'antique royaume Pûst"
 decision_pust_revival_desc: "Il y a fort longtemps, nos ancêtres régnaient sur les terres désertiques d'Abrakhân. Nos cités étaient le fleuron de l'architecture et du génie des [haradrim|E]. Mais lorsque le Miroir de Feu se retira, notre royaume et notre culture furent mis à bas — nombre de nos gens se réfugièrent dans les montagnes de l'est et les déserts de Darsalan à l'ouest. L'espoir de recouvrer notre ancienne prospérité sembla s'éteindre.\n\nPourtant, cet espoir était bien vivant. J'ai réuni les peuples d'Abrakhân sous mon sceptre. Les Pûst s'établissent à nouveau dans les cités de nos ancêtres, et une grande part du savoir perdu est désormais retrouvée. Jamais plus mon peuple ne se terrera dans l'obscurité !"
 decision_pust_revival_confirm: "Enfin les Pûst renaissent !"
 decision_pust_revival_custom_description_01: "Descend de la culture Pûst ou de cultures qui en sont issues"
 
 decision_rebuild_zaja_sahr_noria_mines: "Reconstruire la Noria de Zaja Sahr"
 decision_rebuild_zaja_sahr_noria_mines_tooltip: "Reconstruire les illustres excavations de Zaja Sahr"
 decision_rebuild_zaja_sahr_noria_mines_desc: "La plus profonde excavation jamais creusée sans le concours des Nains, Zaja Sahr — la Grande Noria — comptait parmi les plus remarquables réalisations des Pûst. Elle alimentait en eau de nombreuses cités, mais sombra dans les ruines lorsque les Pûst se retirèrent de la région. Forts de notre savoir retrouvé, nous pouvons à présent restaurer les antiques mécanismes et y puiser l'eau précieuse des profondeurs."
 decision_rebuild_zaja_sahr_noria_mines_confirm: "Retrouvons les merveilles des profondeurs !"
 abrakhan_custom_tooltip: "Chaque [county|El] en [GetTitleByKey('d_abrakhan').GetNameNoTier] possède un [development|El] supérieur à 20"
 
 decision_claim_orjalun: "Revendiquer le Col d'Orjalun"
 decision_claim_orjalun_tooltip: "Revendiquer le col d'Orjalun pour Abrakhân"
 decision_claim_orjalun_desc: "À l'est s'étendent de nombreux puissants royaumes — Khy et Harshandatt. Nous devons nous assurer du col stratégique d'Orjalun pour nous défendre contre leurs ambitions."
 decision_claim_orjalun_confirm: "Nos frontières orientales seront protégées !"
 
 decision_build_ghaesch_kanra_fortress: "Ériger la Forteresse de Ghaesch Kanra"
 decision_build_ghaesch_kanra_fortress_tooltip: "Élever une puissante forteresse contre la menace du Khy"
 decision_build_ghaesch_kanra_fortress_desc: "Notre royaume est constamment menacé par le puissant Empire Khy de l'est. Si nous souhaitons repousser leurs prochaines incursions depuis les terres d'Ashanur, nous devons élever des fortifications dignes de la Citadelle Sombre d'Abrakhân. Que leurs hordes déferlent — nos hautes murailles les arrêteront."
 decision_build_ghaesch_kanra_fortress_confirm: "Nul ne viendra impunément de l'Est !"
 

 ##################################
 #### Arysis / Maresh Decisions ###
 ##################################
 maresh_decision_header: "#M Maresh:#! "
 maresh_prosperity_capital_shift_tt: "En raison de l'importance croissante de [GetTitleByKey('c_maresh').GetNameNoTier] comme centre régional de commerce, il remplacera [old_capital.GetNameNoTier] comme [capital|El] [de_jure|El] de [GetTitleByKey('k_arysis').GetNameNoTier]"
 decision_maresh_resolve_conflicts: "Résoudre les Conflits de Longue Date de Maresh"
 decision_maresh_resolve_conflicts_tooltip: "Les discordes civiles ont affligé l'oasis de Maresh depuis trop longtemps !"
 decision_maresh_resolve_conflicts_desc: "Pendant de nombreuses lunes, Maresh a souffert d'un factionnalisme constant et de guerres civiles. De nombreux habitants se lassent de cela, et je crois qu'il est temps d'établir une paix plus permanente. Nous avons besoin d'un système pour résoudre les conflits entre les nombreux peuples et caravanes différents qui se rencontrent à ce carrefour du [trans_haradric_trade|E]."
 decision_maresh_resolve_conflicts_effect_tooltip: "Le niveau de [maresh_prosperity|E] #P augmente#!"
 decision_maresh_resolve_conflicts_effect_tooltip_2: "Débloque les [decisions|El] pour #V $decision_maresh_establish_mints$#!, #V $decision_maresh_divert_rysis_river$#!, et #V $decision_maresh_wall_the_oasis$#!"
 decision_maresh_resolve_conflicts_confirm: "Rassemblez les notables locaux - il est temps de nous réunir."
 maresh_prosperity_1_requirement_desc: "[maresh_prosperity|E] doit être #M 1 ou supérieur#!"
 maresh_prosperity_2_requirement_desc: "[maresh_prosperity|E] doit être #M 2 ou supérieur#!"
 maresh_prosperity_3_requirement_desc: "[maresh_prosperity|E] doit être #M 3 ou supérieur#!"
 maresh_prosperity_4_requirement_desc: "[maresh_prosperity|E] doit être #M 4 ou supérieur#!"
 
 decision_maresh_establish_mints: "Établir les Ateliers Monétaires de Maresh"
 decision_maresh_establish_mints_tooltip: "Ordonner la construction d'ateliers monétaires pour produire des pièces."
 decision_maresh_establish_mints_desc: "Maresh est un important carrefour du commerce de la Mer des Dunes. Des marchands de [nearharad|E], [bellakar|E], du [ray|E], de Khy et de Sîrayn s'y rencontrent tous, transportant de grandes quantités d'or. Combiné aux riches gisements de cuivre dans les collines d'Arysis, cela fait de [GetTitleByKey('b_arsasak').GetNameNoTier] un excellent candidat pour un futur atelier monétaire."
 decision_maresh_establish_mints_effect_tooltip_1: "Peut maintenant construire le [special_building|E] [GetBuilding('arsasan_mints_01').GetName] à [GetTitleByKey('b_arsasak').GetNameNoTier]"
 decision_maresh_establish_mints_effect_tooltip_2: "$decision_maresh_resolve_conflicts_effect_tooltip$"
 decision_maresh_establish_mints_dynasty_perk_req: "Votre [dynasty|El] a débloqué le [dynasty_perk|E] [GetDynastyPerk('lotr_haradrim_legacy_2').GetName]"
 decision_maresh_establish_mints_copper_mine_req: "Une #V $building_type_copper_mines_01$#! doit être construite quelque part dans [GetGeographicalRegion('middleearth_harad_dunesea_arysis').GetName] dans le cadre de votre [realm|El]"
 decision_maresh_establish_mints_confirm: "Posons les bases."

 decision_maresh_divert_rysis_river: "Détourner et Endiguer la Rivière Rysis"
 decision_maresh_divert_rysis_river_tooltip: "Contrôler le flux de la Rivière Rysis peut avoir ses avantages."
 decision_maresh_divert_rysis_river_desc: "Les habitants de Maresh ont continuellement étendu leurs ressources en eau au fil des ans. Maintenant, mes ingénieurs ont présenté de nouvelles idées pour plusieurs projets hydrauliques qui nous permettraient de mieux contrôler la Rivière Rysis qui traverse Maresh. Cela maximisera les terres arables et fournira encore plus d'eau aux habitants, bien que certains puissent m'en vouloir pour des raisons religieuses."
 decision_maresh_divert_rysis_river_effect_tooltip: "$decision_maresh_resolve_conflicts_effect_tooltip$"
 decision_maresh_divert_rysis_river_confirm: "Coordonnons ces efforts."
 piety_loss_because_of_sacred_waters_effect: "Cela pourrait contrarier ceux dont la [faith|El] possède le [core_tenet|El] [GetFaithDoctrine('tenet_sacred_waters').GetBaseName]"

 decision_maresh_wall_the_oasis: "Fortifier l'Oasis de Maresh"
 decision_maresh_wall_the_oasis_tooltip: "Nous avons besoin de défenses adéquates autour de la région de Maresh."
 decision_maresh_wall_the_oasis_desc: "Bien que les défenses de Maresh ne soient pas à négliger, elles peuvent être encore améliorées. Les locaux recommandent que nous étendions les fortifications de la cité pour entourer une grande partie de l'Oasis de Maresh."
 decision_maresh_wall_the_oasis_effect_tooltip: "$decision_maresh_resolve_conflicts_effect_tooltip$"
 decision_maresh_wall_the_oasis_requirement: "Votre [dynasty|El] a débloqué le [dynasty_perk|E] [GetDynastyPerk('lotr_haradrim_legacy_3').GetName]"
 decision_maresh_wall_the_oasis_confirm: "Cela sera fait."
 
 decision_maresh_attract_settlers: "Attirer des Colons à Maresh"
 decision_maresh_attract_settlers_tooltip: "Maresh est un emplacement prometteur pour le commerce...."
 decision_maresh_attract_settlers_desc: "Dernièrement, divers conflits ont poussé beaucoup de gens d'ailleurs à fuir vers [GetTitleByKey('k_arysis').GetNameNoTier]. Peut-être puis-je encourager certains de ces aventuriers, marchands, réfugiés et autres à s'installer à Maresh. Malgré leurs différences, leurs perspectives diverses peuvent aider la cité à croître et prospérer. L'oasis montre beaucoup de promesse en tant que centre commercial potentiel, donc dominer les routes commerciales de la Mer des Dunes de cette manière serait tout à fait avantageux !" 
 decision_maresh_attract_settlers_effect_tooltip_1: "Débloque le mécanisme de [maresh_prosperity|E] pour [GetTitleByKey('c_maresh').GetNameNoTier]"
 decision_maresh_attract_settlers_effect_tooltip_2: "$decision_maresh_resolve_conflicts_effect_tooltip_2$"
 decision_maresh_attract_settlers_confirm: "Faisons cela !"
 decision_maresh_attract_settlers_req: "Votre [dynasty|El] a débloqué le [dynasty_perk|E] [GetDynastyPerk('lotr_haradrim_legacy_1').GetName]"
 
 decision_maresh_arysor_trade_dominance: "Consolider le Royaume-Commerçant d'Arysis"
 decision_maresh_arysor_trade_dominance_desc: "Pour la majeure partie de notre histoire, les Arysori se sont contentés de vivre divisés le long des frontières claniques, tout au plus vaguement unis sous une confédération faible et décentralisée. Mais avec l'ascension de ma famille à la prééminence et l'augmentation considérable du commerce traversant nos terres, une opportunité se présente d'établir solidement nous-mêmes et le [GetTitleByKey('k_arysis').GetName] comme une monarchie propre, plus semblable à nos cousins du nord près du Harnen."
 decision_maresh_arysor_trade_dominance_tooltip: "Vous élèverez [GetTitleByKey('k_arysis').GetNameNoTier] au rang de royaume-commerçant centralisé au cœur des routes commerciales [haradric|E] orientales, avec vous-même comme son Roi."
 decision_maresh_arysor_trade_dominance_confirm: "Unis, nous prospérerons."
 must_be_arysori_or_child_culture: "Doit être [arysisani_culture.GetName] ou d'une [culture|El] descendante"
 arysor_trade_dominance_decision_requirement_desc: "Toutes les autres [decisions|El] liées à la [maresh_prosperity|E] doivent avoir été complétées."
 arysor_trade_dominance_gain_innovations_khy: "[myculture.GetName] découvre #P jusqu'à trois#! [innovations|E] des [cultures|E] situées dans [GetGeographicalRegion('middleearth_harad_bayoformal_khy').GetName]"
 arysor_trade_dominance_gain_innovations_sirayn: "[myculture.GetName] découvre #P jusqu'à trois#! [innovations|E] des [cultures|E] situées dans [GetGeographicalRegion('middleearth_harad_bayoformal_sirayn').GetName]"
 arysor_trade_dominance_gain_innovations_haradwaith: "[myculture.GetName] découvre #P jusqu'à trois#! [innovations|E] des [cultures|E] situées dans [GetGeographicalRegion('middleearth_harad_near_harnen').GetName]"

