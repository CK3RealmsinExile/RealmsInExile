 formalise_the_league_decision: "Unifier la Ligue Lynerienne"
 formalise_the_league_decision_desc: "Depuis des générations, les cités de la Ligue se sont tenues côte à côte, mais jamais comme une seule. Les pactes commerciaux et la défense mutuelle nous ont liés de façon lâche, chaque cité protégeant sa propre charte, sa propre fierté. Mais le monde change.\n\nIl est temps que Lyneria devienne plus qu'un nom sur un parchemin. Que nos guildes querelleuses et nos conseils fiers cèdent la place à quelque chose de plus grand…"
 formalise_the_league_decision_tooltip: "Dissoudre la [confederation|E] et formaliser la Ligue Lynerienne en un seul [kingdom|E], unissant ses [confederates|E] sous une même bannière."
 formalise_the_league_decision_confirm: "Que la Ligue soit unifiée sous mon règne !"
 formalise_the_league_decision_vassal_req: "Il y a au moins #high 6#! [confederates|E] avec des [counties|El] côtiers dans [GetTitleByKey('k_lyneria').GetNameNoTier]"
 formalise_the_league_decision_vassal_income_level_req: "Aucun autre [confederate|E] n'a un [income|El] en [gold_i][gold|El] supérieur"
 formalise_the_league_decision_kingdom_creation_tt: "Vous formez [GetTitleByKey('k_lyneria').GetNameNoTier] et tous les [confederates|E] deviennent vos [vassals|El]"
 formalise_the_league_decision_succession_tt: "[GetTitleByKey('k_lyneria').GetNameNoTier] obtient la [GetLaw('confederation_elective_succession_law').GetName] comme [succession_law|E]"
 formalise_the_league_decision_king_modifier_tt: "Vous obtenez [GetModifier('formalise_the_league_decision_king_modifier').GetNameWithTooltip] pendant #high 15 ans#!"
 formalise_the_league_decision_vassal_modifier_tt: "Tous les [vassals|El] obtiennent [GetModifier('formalise_the_league_decision_vassal_modifier').GetNameWithTooltip] pendant #high 15 ans#!"
 formalise_the_league_decision_county_modifier_tt: "Tous les [counties|El] obtiennent [GetModifier('formalise_the_league_decision_lands_modifier').GetNameWithTooltip] pendant #V 30#! ans"
 formalise_the_league_decision_king_modifier: "Architecte de la Ligue"
 formalise_the_league_decision_king_modifier_desc: "Ce personnage a unifié les cités-états indépendantes de la Ligue Lynerienne en un seul [kingdom|E], forgeant des liens durables de commerce, de loi et de défense."
 formalise_the_league_decision_vassal_modifier: "Signataire du Concordat"
 formalise_the_league_decision_vassal_modifier_desc: "La cité de ce personnage a prêté allégeance à la nouvelle Charte de la Ligue, rejoignant sa sécurité et sa prospérité partagées."
 formalise_the_league_decision_lands_modifier: "Territoire de la Charte de la Ligue"
 formalise_the_league_decision_lands_modifier_desc: "Ces terres bénéficient désormais de l'infrastructure, de la protection et du commerce garantis par une Ligue Lynerienne unifiée."
 k_lyneria_lynerian_league_name: "Ligue Lynerienne"

 control_trade_in_the_bay_of_ormal_decision: "Contrôler le commerce dans la Baie d'Ormal"
 control_trade_in_the_bay_of_ormal_decision_desc: "Tout autour du large arc de la Baie d'Ormal se trouvent des rivaux commerciaux, chacun protégeant jalousement les artères du commerce qui nourrissent leur puissance.\n\nPour dominer la Baie, il n'est pas nécessaire de conquérir de vastes arrière-pays, mais seulement les places fortes côtières qui contrôlent le flux des richesses. Ce n'est pas une conquête pour la conquête, mais une redéfinition de l'influence.\n\nLà où la richesse s'accumule le plus, que nos bannières s'élèvent, et que les autres paient pour ce privilège."
 control_trade_in_the_bay_of_ormal_decision_tooltip: "Établir le contrôle sur les principales cités marchandes autour de la Baie d'Ormal."
 control_trade_in_the_bay_of_ormal_decision_confirm: "Que les vagues portent nos bannières."
 control_trade_in_the_bay_of_ormal_decision_second_step: "Sélectionner une cité..."

 control_trade_in_the_bay_of_ormal_decision_capital_requirement: "Votre [capital|El] est dans un [county|El] côtier de la [region|E] [GetGeographicalRegion('special_ormal_bay_trade_region').GetName]"
 control_trade_in_the_bay_of_ormal_decision_control_requirement: "Vous contrôlez l'une des cités marchandes listées dans votre [realm|El]"
 control_trade_in_the_bay_of_ormal_decision.effect.1: "Gagnez un revenu en [gold_i][gold|El] accru et d'autres [modifiers|E] dans votre [capital|El] [county|El], selon la cité ciblée."
 special_ormal_bay_trade_region: "Baie d'Ormal"

