 #############################
 decision_restore_rhovanion: "Reconquérir le Royaume du Rhovanion"
 decision_restore_rhovanion_tooltip: "Restaurer le royaume déchu de Vidugavia"
 decision_restore_rhovanion_desc: "Depuis l'invasion des Wainriders, le [rhovanion_kingdom|E] appartient désormais à l'histoire. Les [northmen|E] des plaines du [rhovanion|E] sont maintenant peu nombreux - très peu nombreux. Il ne faudrait rien de moins qu'un miracle pour reprendre les plaines aux Orientais et restaurer le royaume. Mais - si cela pouvait être fait, je pourrais revendiquer la couronne et l'héritage de Vidugavia."
 decision_restore_rhovanion_confirm: "Par le sang et le serment, nous tenons bon !"
 decision_restore_rhovanion_tt: "Vous restaurerez l'une des antiques capitales du [rhovanion|E]"
 rhovanion_formation_drift_tooltip: "Si vous contrôlez entièrement l'un des [duchies|El] suivants, ils deviendront de jure partie du [GetTitleByKey('k_rhovanion').GetNameNoTier] : \n- [GetTitleByKey('d_anthardor').GetNameNoTier] \n- [GetTitleByKey('d_sunnarinna').GetNameNoTier] \n- [GetTitleByKey('d_rinnavuld').GetNameNoTier]"
