 decision_conquest_of_pel_tooltip: "Des Deux Couronnes aux Trois"
 
 decision_conquer_mulambur: "Annexer Mûlambur"
 decision_conquer_mulambur_desc: "Sur nos rivages orientaux demeurent les Mûlambûril, navigateurs aguerris des innombrables îles et archipels au sud de la Baie d'Ûsakan. Si nous parvenons à les soumettre, l'influence de la divine [tamska|E] pourra s'étendre par-delà les flots et les grèves, imposant un nouvel ordre à ces terres indomptées."
 decision_conquer_mulambur_tooltip: "Intégrer Mûlambur aux Royaumes Jumeaux"
