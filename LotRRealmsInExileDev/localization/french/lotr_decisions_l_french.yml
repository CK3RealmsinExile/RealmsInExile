 decision_rhudaur_troll_orc_hunting.t: "Chasser les Ennemis Errants en Rhudaur"
 decision_rhudaur_troll_orc_hunting_tooltip: "Patrouiller dans les terres autour de votre domaine pour combattre les ennemis venant du Nord."
 decision_rhudaur_troll_orc_hunting.desc: "Dans les contrées sauvages et ombreuses du [rhudaur|e], le danger se profile alors que vous détectez des groupes d'ennemis errants approchant du nord. Montant prestement votre destrier, vous vous embarquez dans une chevauchée résolue à travers ces terres accidentées avec une mission claire : intercepter et vaincre tout ennemi — qu'il s'agisse d'orque, de troll ou d'autre chose — que vous pourriez rencontrer avant qu'ils ne puissent empiéter davantage sur l'[eriador|E].\n\n"
 decision_rhudaur_troll_orc_hunting.a: "Chevauchons !"
 
 explore_history_decision: "Explorer les Histoires"
 explore_history_decision_desc: "Il y a une sagesse ancienne dans les tomes poussiéreux et les manuscrits d'antan. Les leçons du passé peuvent nous enseigner comment bâtir un avenir meilleur, de peur que nous ne laissions l'histoire se répéter."
