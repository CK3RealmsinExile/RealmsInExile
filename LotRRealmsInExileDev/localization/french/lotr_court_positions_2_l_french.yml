l_french:

 first_axe_oversee_marching: "Mener la Marche"
 first_axe_oversee_marching_desc: "La Première Hache conduit ses guerriers au pas cadencé, forgeant force et unité à chaque foulée sous son œil vigilant."
 first_axe_improve_discipline: "Forger la Discipline"
 first_axe_improve_discipline_desc: "La Première Hache trempe la compagnie d'une main de fer, forgeant des soldats qui ne flanchent point et ne doutent jamais de leur place dans le mur de boucliers."

 taskmaster_punish_disobedience: "Châtier l'Insoumis"
 taskmaster_punish_disobedience_desc: "Le Fouailleur frappe sans merci ceux qui fléchissent ou osent braver ses ordres, s'assurant que la peur maintient les rangs. Là où siffle le fouet..."
 taskmaster_oversee_breeding: "Façonner la Meute"
 taskmaster_oversee_breeding_desc: "Le Fouailleur préside à l'accouplement brutal et au dressage des loups-montures, ne retenant que les bêtes les plus féroces pour renforcer la meute et écraser les lignages faibles."