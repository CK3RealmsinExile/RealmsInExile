  # 
  # (there might be more, check the vanilla file)
  # remember to add |U at the end to capitalize the start of a sentence!
  
  ### Dwarven Nicknames ###
  nick_the_slug_unique: "Dalat 'azm-markh"
  nick_the_slug_unique_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut parmi les premiers [dwarves|E] [stiffbeard|E] à s'établir à Nulâ Mabedkhmâ, bien que [CHARACTER.Custom('FR_IlElle')] fût lent[CHARACTER.Custom('FR_E')] à en reconnaître la valeur — si bien que le lieu tomba en ruine durant quelques décennies au cours du [secondage|E]."
  nick_the_watcher_unique: "[CHARACTER.Custom('FR_LeLa')] Guetteu[CHARACTER.Custom('FR_RSe')]"
  nick_the_watcher_unique_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut parmi les forgerons [dwarven|E] qui assistèrent au meurtre d'[elu_thingol|E], certains disant qu'[CHARACTER.Custom('FR_IlElle')] avait été envoûté[CHARACTER.Custom('FR_E')] par le [nauglamir|E]. De retour parmi les siens, [CHARACTER.Custom('FR_IlElle')] évoqua avec amertume la trahison et le mépris, semant la discorde parmi les [firebeards|E] et fondant la foi des [Glossary('Khathzâ-zûl','khathza_zul_gloss')]. [CHARACTER.Custom('FR_IlElle')|U] enseigna à sa lignée de ne compter que sur les leurs et de ne jamais accorder confiance à un étranger."
  nick_the_first_greybeard: "le Premier Barbe-Grise"
  nick_the_first_greybeard_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le fondateur des Barbes-Grises, maîtres du Chant de Pierre, et érigea un grand monastère au sommet de [GetTitleByKey('d_mount_dolmed').GetNameNoTier], au-dessus de [Glossary('Zelemabkân','zelemabkan_gloss')], là où les [dwarffathers|E] des [bluemountains|E] s'éveillèrent pour la première fois."
  nick_the_axe_that_walks_unique: "la Hache qui Marche"
  nick_the_axe_that_walks_unique_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] naquit sur les routes. Prenant le commandement de l'armée affaiblie de son père à seulement trente ans, [CHARACTER.Custom('FR_IlElle')] passa deux siècles à arpenter la [middleearth|E].\n\nAnimé[CHARACTER.Custom('FR_E')] autant par la soif de vengeance contre [sauroncharacter|E] — propre aux [blacklocks|E] — que par le besoin de prouver à ses pairs et à [CHARACTER.Custom('FR_LuiElle')]-même que nulle épreuve ne saurait l'abattre. Certains disent que son orgueil rivalise avec les moins humbles de la maison de Thrár."
  nick_the_generous_unique: "[CHARACTER.Custom('FR_LeLa')] Généreu[CHARACTER.Custom('FR_XSe')]"
  nick_the_generous_unique_desc: "Bien que l'obstination et l'impulsivité eussent toujours marqué ses retours en [ardaconcept|E], sa sixième incarnation fut d'une compassion singulière. [CHARACTER.Custom('FR_IlElle')|U] saisit avec ardeur l'occasion de combattre lors de la guerre des [dwarves|E] et des [orcs|E], où Dáin II 'Piédéfer' et [CHARACTER.Custom('FR_IlElle')] se sauvèrent mutuellement à maintes reprises.\n\n[CHARACTER.Custom('FR_IlElle')|U] accueillit également les exilés de Thorin pour qu'ils s'établissent auprès de son propre domaine, et balaya tout souci matériel en finançant leur colonie. Enfin, [CHARACTER.Custom('FR_IlElle')] apporta la foi du 'Kemnêl-mesêm' à son peuple, fruit de sa coopération avec les [broadbeams|E] et Círdan de [lindon|E]. [CHARACTER.GetShortUINameNoTooltipNoFormat|U] évoqua avec ferveur sa foi et l'amitié avec les [elves|E] auprès de quiconque voulait l'entendre.\n\nObstiné[CHARACTER.Custom('FR_E')] dans sa générosité, [CHARACTER.Custom('FR_IlElle')] consacra sa vie à bâtir des ponts entre les peuples et posa les fondations de liens qui permirent aux septièmes et ultimes incarnations de Durin, d'Úri et de Dwálin de rebâtir leurs antiques demeures de [khazaddum|E], [belegost|E] et [nogrod|E]. Les actes du plus compatissant des [dwarves|E] furent rappelés longtemps après la mort du dernier Nain."
  nick_the_deathless: "l'Immortel" # Durin I
  nick_the_deathless_desc: "[durindeathless|E] fut le [dwarffather|E] des [longbeards|E] et le premier parmi les sept [dwarffathers|E] à s'éveiller. On disait de [GetScriptedCharacterByHistoryID( 'lineofdurinI' ).GetFirstName] qu'[CHARACTER.Custom('FR_IlElle')] avait 'donné un nom aux collines et aux vallées sans nom'. [CHARACTER.GetFirstNameNoTooltip] vécut si longtemps que nombre des [dwarves|E] jugeaient [CHARACTER.Custom('FR_LuiElle')] immortel[CHARACTER.Custom('FR_E')], ayant traversé bien des fois la durée de vie ordinaire de sa race."
  nick_the_scarred_dwarf: "le Balafré"
  nick_the_scarred_dwarf_desc: "[uriscarred|E] fut le [dwarffather|E] des [firebeards|E]. Énergique et souvent prompt à s'enflammer, [GetScriptedCharacterByHistoryID( 'lineofuriI' ).GetFirstName] reçut son épithète pour une grande cicatrice acquise en retenant un pilier qui s'effondrait sur un Nanillon. L'incident révéla sa force, et sa guérison son énergie vitale, ainsi que son amour profond et sa loyauté indéfectible envers son peuple. Les [elves|E] du [beleriand|E] connurent également [GetScriptedCharacterByHistoryID( 'lineofuriI' ).GetFirstName] sous le nom de [Glossary('Barin','barin_gloss')], car [CHARACTER.Custom('FR_IlElle')] quittait rarement [nogrod|E], et lorsque [CHARACTER.Custom('FR_IlElle')] le faisait, [CHARACTER.Custom('FR_IlElle')] s'empressait d'y revenir, agité[CHARACTER.Custom('FR_E')] loin de ses halls."
  nick_the_wise_dwarf: "le Sage"
  nick_the_wise_dwarf_desc: "[dwalinwise|E] fut le [dwarffather|E] des [broadbeams|E]. [GetScriptedCharacterByHistoryID( 'lineofdwalinI' ).GetFirstName] était renommé[CHARACTER.Custom('FR_E')] pour son calme et son maintien solennel, à l'opposé de son père associé [uriscarred|E]. C'est sous sa conduite que les [dwarves|E] de [belegost|E] creusèrent les cavernes de Menegroth pour [GetScriptedCharacterByHistoryID( 'lineofelwe1' ).GetFirstNameNicknamedRegnal] de [GetTitleByKey('k_doriath').GetNameNoTier], leurs travaux approfondissant les liens avec les [elves|E] du [beleriand|E]. [CHARACTER.Custom('FR_IlElle')|U] avait coutume d'entonner des chants avec son peuple durant les labeurs, et pour cela, les Elfes [CHARACTER.Custom('FR_LuiElle')] donnèrent le nom de [Glossary('Linnar','linnar_gloss')]."
  nick_the_rich_dwarf: "le Riche"
  nick_the_rich_dwarf_desc: "[sindririch|E] fut le [dwarffather|E] des [ironfists|E]. Artisan de génie et infatigable inventeur, [GetScriptedCharacterByHistoryID( 'lineofsindriI' ).GetFirstName] mérita l'épithète 'le Riche' pour l'incroyable fortune qu'[CHARACTER.Custom('FR_IlElle')] amassa. Ce fut [CHARACTER.Custom('FR_IlElle')] qui dévoila en premier les secrets du travail du fer alors que les autres forgeaient encore dans le bronze. Ce savoir conféra à ses descendants un avantage considérable. Les [ironfists|E] s'imposèrent dans le commerce de l'Est, les clans payant de hauts prix pour les ouvrages de fer forgé. Les halls de Sindri étaient célèbres pour leur splendeur, parés de biens venus de contrées lointaines, dont les rares délices des [hisildi|E]."
  nick_the_swift_dwarf: "[CHARACTER.Custom('FR_LeLa')] Rapide"
  nick_the_swift_dwarf_desc: "[thulinswift|E] fut le [dwarffather|E] des [stiffbeards|E]. [GetScriptedCharacterByHistoryID( 'lineofthulinI' ).GetFirstName] était renommé[CHARACTER.Custom('FR_E')] pour une obstination sans faille, remarquable même parmi les [dwarves|E]."
  nick_the_proud_dwarf: "[Select_CString(CHARACTER.IsFemale,'la Fière','le Fier')]"
  nick_the_proud_dwarf_desc: "[thrarproud|E] fut le [dwarffather|E] des [blacklocks|E]. D'une présence imposante et d'une voix tonitruante, [CHARACTER.Custom('FR_IlElle')] était renommé[CHARACTER.Custom('FR_E')] pour son immense orgueil, tant envers [CHARACTER.Custom('FR_LuiElle')]-même qu'envers son peuple. Les [avari|E] de l'Est se souvinrent de [CHARACTER.Custom('FR_LuiElle')] sous le nom de [Glossary('Druin','druin_gloss')], tandis que les Orientais [CHARACTER.Custom('FR_LuiElle')] donnaient le surnom de 'Sadal', 'le Grossier'."
  nick_the_cold_dwarf: "[CHARACTER.Custom('FR_LeLa')] Froid[CHARACTER.Custom('FR_E')]"
  nick_the_cold_dwarf_desc: "[bavorcold|E] fut le [dwarffather|E] des [stonefoots|E]. [dwarf|E] réservé et calculateur, dont la main ferme et la loyauté discrète démentaient une réputation de froideur, [GetScriptedCharacterByHistoryID('lineofbavor0').GetFirstName] guida son peuple avec une résolution mesurée et une retenue caractéristique. Connu des [avari|E] voisins sous le nom de [Glossary('Mallin','malln_gloss')], [CHARACTER.Custom('FR_IlElle')] maintint des relations pacifiques qui profitèrent à son royaume."
  nick_the_last_dorfdad_durin: "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')]"
  nick_the_last_dorfdad_durin_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut reconnu[CHARACTER.Custom('FR_E')] comme la dernière incarnation de [durindeathless|E], [dwarffather|E] des [longbeards|E]."
  nick_the_last_dorfdad_uri: "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')]"
  nick_the_last_dorfdad_uri_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut reconnu[CHARACTER.Custom('FR_E')] comme la dernière incarnation d'[uriscarred|E], [dwarffather|E] des [firebeards|E]."
  nick_the_last_dorfdad_dwalin: "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')]"
  nick_the_last_dorfdad_dwalin_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut reconnu[CHARACTER.Custom('FR_E')] comme la dernière incarnation de [dwalinwise|E], [dwarffather|E] des [broadbeams|E]."
  nick_the_last_dorfdad_sindri: "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')]"
  nick_the_last_dorfdad_sindri_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut reconnu[CHARACTER.Custom('FR_E')] comme la dernière incarnation de [sindririch|E], [dwarffather|E] des [ironfists|E]."
  nick_the_last_dorfdad_thulin: "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')]"
  nick_the_last_dorfdad_thulin_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut reconnu[CHARACTER.Custom('FR_E')] comme la dernière incarnation de [thulinswift|E], [dwarffather|E] des [stiffbeards|E]."
  nick_the_last_dorfdad_thrar: "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')]"
  nick_the_last_dorfdad_thrar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut reconnu[CHARACTER.Custom('FR_E')] comme la dernière incarnation de [thrarproud|E], [dwarffather|E] des [blacklocks|E]."
  nick_the_last_dorfdad_bavor: "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')]"
  nick_the_last_dorfdad_bavor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut reconnu[CHARACTER.Custom('FR_E')] comme la dernière incarnation de [bavorcold|E], [dwarffather|E] des [stonefoots|E]."
  nick_gamil_zirak: "Gamil"
  nick_gamil_zirak_desc: "[Glossary('Gamil','gamil_gloss')] [GetScriptedCharacterByHistoryID('lineofgamilzirak').GetFirstName] était un forgeron [dwarven|E] et le maître de [GetScriptedCharacterByHistoryID( 'lineoftelchar1' ).GetFirstName] de [nogrod|E]. Les trésors de [GetScriptedCharacterByHistoryID( 'lineofelwe1' ).GetFirstName] de [GetTitleByKey('k_doriath').GetNameNoTier] étaient réputés pour renfermer des œuvres de sa main."
  nick_ironfoot: "Piédéfer" # Dain II
  nick_ironfoot_desc: "La présence de [CHARACTER.GetShortUINameNoTooltip] se fait sentir à chaque pas, [CHARACTER.Custom('FR_LuiElle')] valant le surnom de 'Piédéfer'."
  nick_stonehelm: "Heaume-de-Pierre" # Thorin son of Dain
  nick_stonehelm_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son surnom en bas âge lors d'un incident présumé où une pierre et sa tête se rencontrèrent. La pierre perdit."
  nick_the_slakeless: "l'Inextinguible"
  nick_the_slakeless_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son surnom lors de la [battle_of_the_five_armies|E], lorsque ni blessure ni ennemi ne purent endiguer son inextinguible soif du combat."
  nick_oakenshield: "Lécudechesne" # Thorin son of Thrain
  nick_oakenshield_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son épithète en l'an 2799 du [ageTA|E] lors de la Bataille d'Azanulbizar, au paroxysme de la [warofdwarvesandorcs|E]. Au cours du combat, son bouclier se brisa et, saisissant une branche de chêne trouvée à terre pour se protéger, [CHARACTER.Custom('FR_IlElle')] mérita l'épithète 'Lécudechesne'."
  nick_bravesoul_unique: "Âme Vaillante"
  nick_bravesoul_unique_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut l'ancêtre légendaire de la famille des Âmes Vaillantes. Parmi les barbillons, on conte de [CHARACTER.Custom('FR_LuiElle')] qu'[CHARACTER.Custom('FR_IlElle')] captura un diamant semblable au soleil et terrassa un démon. Ce qui est certain, cependant, c'est que l'héritage de ce [dwarf|E] entretient une tradition d'honnêteté et de labeur parmi ses descendants, qui s'en tiennent fermement au crédo que la richesse doit servir un besoin."
  nick_durin_bane_bane: "Fléau du Fléau de Durin" # For slaying the Balrog
  nick_durin_bane_bane_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] terrassa le [balrog|E] qui hantait les profondeurs de [khazaddum|E]."
  nick_the_turncoat: "[CHARACTER.Custom('FR_LeLa')] Renégat[CHARACTER.Custom('FR_E')]"
  nick_the_turncoat_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] tenta de s'emparer du trône de son frère à la mort du Roi précédent de [khazaddum|E], et fut banni[CHARACTER.Custom('FR_E')] pour ses crimes."
  nick_roadwalker: "l'Arpenteu[CHARACTER.Custom('FR_RSe')] des Routes"
  nick_roadwalker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était renommé[CHARACTER.Custom('FR_E')] pour l'entretien de la Route des Nains qui traversait le [greenwoodshort|E] et longeait [erebor|E], reliant [khazaddum|E] aux [ironhills|E]."
  nick_of_the_naugrim: "des Naugrim"
  nick_of_the_naugrim_desc: "Orphelin[CHARACTER.Custom('FR_E')] dès l'enfance, [CHARACTER.GetShortUINameNoTooltipNoFormat] fut élevé[CHARACTER.Custom('FR_E')] comme un [dwarf|E] solitaire au milieu d'une mer d'[elves|E]."
  nick_orc_hewer: "Tranche-Orques"
  nick_orc_hewer_desc: "'Kári était un petit [dwarf|E], / Plus chétif que vous et moi. / Partout où Kári cheminait, / Sa hache il emportait... ou trois.'\n\nTelle était une comptine enfantine fondée sur sa vie."
  nick_river_seeker: "[CHARACTER.Custom('FR_LeLa')] Quêteu[CHARACTER.Custom('FR_RSe')] des Rivières"
  nick_river_seeker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] tourna son regard vers des horizons inattendus. Là où la plupart des [dwarves|E] cherchèrent refuge à la [lonelymountain|E] après la chute de [khazaddum|E], [CHARACTER.Custom('FR_IlElle')] leva les yeux vers les eaux des [eredluin|E] et fonda le port de commerce de [GetTitleByKey('c_kheledul').GetNameNoTier], défiant tradition et attente à la fois."
  nick_of_the_three_hammers: "aux Trois Marteaux"
  nick_of_the_three_hammers_desc: "Durant le règne de [CHARACTER.GetShortUINameNoTooltipNoFormat], trois grandes rébellions s'élevèrent, et à chaque fois, sa colère s'abattit comme un coup de marteau, les écrasant une à une. Ces actes [CHARACTER.Custom('FR_LuiElle')] valurent son surnom, redouté des ennemis et honoré des siens."
  nick_the_reconciler_uri_V: "[CHARACTER.Custom('FR_LeLa')] Réconciliat[CHARACTER.Custom('FR_EurRice')]"
  nick_the_reconciler_uri_V_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut appelé[CHARACTER.Custom('FR_E')] '[Select_CString(CHARACTER.IsFemale,'la Réconciliatrice','le Réconciliateur')]' pour avoir comblé les antiques fractures entre les [firebeards|E], les [longbeards|E] et les [broadbeams|E]. Par une diplomatie patiente et avisée, [CHARACTER.Custom('FR_IlElle')] guida son peuple hors de l'isolement et le ramena dans la grande fraternité des [dwarves|E]."
  nick_the_flamebeard_secondlineofuri: "la Barbe-de-Flamme"
  nick_the_flamebeard_secondlineofuri_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U], frère de [GetScriptedCharacterByHistoryID('lineofuri5').GetFirstName], conduisit la moitié du peuple [firebeard|E] vers [khazaddum|E] après que la [warofwrath|E] eut détruit [nogrod|E], s'opposant au refus de son frère d'accepter l'offre de refuge de [GetScriptedCharacterByHistoryID('lineofdurin2').GetFirstNameNicknamedRegnal]. Tandis que Thrur fondait [GetTitleByKey('k_buzra_dum').GetNameNoTier] dans le sud des [bluemountains|E], Baraz cherchait refuge parmi les [longbeards|E]. Aucun de ces [firebeards|E] ne retourna jamais en leur demeure ancestrale, car beaucoup périrent lors de la chute de [gundabad|E] sous le règne de [GetScriptedCharacterByHistoryID('lineofdurinIII').GetFirstNameRegnal], ce qui entraîna l'abandon des bastions nains du nord des [mistymountains|E]. Les [firebeards|E] restants à Khazad-dûm furent peu à peu assimilés au peuple des [longbeards|E]."
  nick_the_broadbeard_dwalin_II: "le Large-Épaule"
  nick_the_broadbeard_dwalin_II_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] mena les trois quarts des [broadbeams|E] vers [khazaddum|E] au lendemain de la [warofwrath|E] qui détruisit [belegost|E], cherchant sûreté et fraternité parmi les [longbeards|E]. Bien que les [broadbeams|E] dussent revenir en leur demeure ancestrale des siècles plus tard, certains choisirent de demeurer, entièrement assimilés au peuple des [longbeards|E]."
  nick_the_magnanimous_dwalin_IV: "le Magnanime"
  nick_the_magnanimous_dwalin_IV_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était renommé[CHARACTER.Custom('FR_E')] pour sa générosité et sa vision, favorisant le commerce des [orocarni|E] aux [eredluin|E], offrant des trésors aux [noldor|E], et contribuant à dissoudre les silences séculaires entre clans [dwarven|E] brouillés, inaugurant l'âge d'or de [nelvorin|E]."
  nick_trollbane_dwalin_VI: "Fléau-des-Trolls"
  nick_trollbane_dwalin_VI_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit une grande renommée après avoir seul[CHARACTER.Custom('FR_E')] terrassé trois [trolls|E] dans [GetTitleByKey('d_high_pass').GetNameNoTier] des [mistymountains|E], protégeant son entourage d'une embuscade lors d'un voyage diplomatique vers les [longbeards|E] des [ironhills|E]."
  nick_the_reunifier_dwarf: "l'Unificateur"
  nick_the_reunifier_dwarf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] restaura l'héritage des [broadbeams|E] en guidant leur retour de [khazaddum|E] vers [belegost|E] et en unissant deux branches de $Dw_alin$ par le mariage avec [GetScriptedCharacterByHistoryID('secondlineofdwalin19').GetFirstName] de la seconde lignée des [dwalin|E], dont naquit [GetScriptedCharacterByHistoryID('lineofdwalinIII').GetFirstNameNicknamedRegnal]."
  nick_the_preserver_linar: "[CHARACTER.Custom('FR_LeLa')] Gardie[CHARACTER.Custom('FR_NNne')]"
  nick_the_preserver_linar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U], chargé[CHARACTER.Custom('FR_E')] de mission par [GetScriptedCharacterByHistoryID('lineofdwalinII').GetFirstNameRegnal], préserva l'héritage des [broadbeams|E] en sauvegardant leur savoir et leurs trésors dans le nord des [bluemountains|E], assurant la pérennité de la mémoire de [belegost|E] après la [warofwrath|E]."
  nick_the_gilded_sindri_II: "[Select_CString(CHARACTER.IsFemale,'la Dorée','le Doré')]"
  nick_the_gilded_sindri_II_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit le surnom du 'Doré' lorsque [CHARACTER.Custom('FR_IlElle')] inaugura l'âge d'or des [ironfists|E] en gonflant les richesses de [GetTitleByKey('k_kheled_nala').GetNameNoTier] et en ralliant la Diaspora dispersée des [ironfists|E] par le commerce et la diplomatie. C'est sous son règne que fut établi le principe de neutralité commerciale, garantissant la prospérité des [ironfists|E] par les échanges avec les nombreuses tribus de [rhun|E]."
  nick_the_burned_sindri_IV: "[CHARACTER.Custom('FR_LeLa')] Consumé[CHARACTER.Custom('FR_E')]"
  nick_the_burned_sindri_IV_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] chercha à restaurer la splendeur de [GetTitleByKey('k_kheled_nala').GetNameNoTier] pour les [ironfists|E] aux premières heures du [thirdage|E], mais périt dans les flammes d'un [dragon|El]. Au lendemain de sa mort, Kheled-Nâla fut dévastée et finalement abandonnée."
  nick_the_wanderer_sindri_V: "l'[Errant[CHARACTER.Custom('FR_E')]"
  nick_the_wanderer_sindri_V_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était renommé[CHARACTER.Custom('FR_E')] pour ses longs périples à travers l'Est au lendemain de la Grande Peste. [CHARACTER.Custom('FR_IlElle')|U] recherchait les siens perdus et renouait les liens parmi les [ironfists|E] dispersés. Bien qu'[CHARACTER.Custom('FR_IlElle')] eût arpenté les plaines de [rhun|E] pour la majeure partie de sa vie, ses pas conduisirent nombre des siens vers leur demeure."
  nick_the_mercenary_sindri_VI: "[CHARACTER.Custom('FR_LeLa')] Mercenaire"
  nick_the_mercenary_sindri_VI_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] forja une redoutable compagnie de mercenaires, la Légion de Sindri, dont la trempe répandit crainte et respect aux quatre vents des plaines de [rhun|E]. Dans sa vieillesse, [CHARACTER.Custom('FR_IlElle')] reprit le gouvernement de [GetTitleByKey('k_namagaluz').GetNameNoTier], mais revint néanmoins avec sa Légion pour prêter main-forte lors de la [warofdwarvesandorcs|E]."
  nick_the_prolific_thulin_II: "[CHARACTER.Custom('FR_LeLa')] Fécond[CHARACTER.Custom('FR_E')]"
  nick_the_prolific_thulin_II_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était renommé[CHARACTER.Custom('FR_E')] pour sa nombreuse progéniture, don rare parmi les [dwarves|E]. Sous son règne, les halls de [GetTitleByKey('k_kibilzahar').GetNameNoTier] regorgeaient de barbillons, et des liens furent forgés au-delà de leurs frontières habituelles avec les tribus des [forodwaithrim|E]. Pour ces tribus, [CHARACTER.Custom('FR_IlElle')] était plutôt connu[CHARACTER.Custom('FR_E')] sous le nom de Vanha Isä, 'le Vieux Père'."
  nick_the_steadfast_thulin_III: "l'Inébranlable"
  nick_the_steadfast_thulin_III_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] guida les [stiffbeards|E] à travers d'incessants assauts d'[orcs|E] et des [dragons|El], consolidant leur emprise sur [kibil_tarag|E]. [CHARACTER.Custom('FR_IlElle')|U] privilégiait la préservation défensive à la prise de risque offensive, à l'inverse de [GetScriptedCharacterByHistoryID( 'lineofthrarIII' ).GetFirstNameNicknamedRegnal], assurant ainsi la survie de son royaume."
  nick_the_charred_thulin_IV: "[CHARACTER.Custom('FR_LeLa')] Calciné[CHARACTER.Custom('FR_E')]"
  nick_the_charred_thulin_IV_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] régna à un tournant de l'histoire des [stiffbeards|E]. Sous son règne, [GetTitleByKey('k_kibilzahar').GetNameNoTier] fut violée pour la première fois de mémoire naine. [CHARACTER.Custom('FR_IlElle')|U] tomba en défendant le bastion contre les flammes d'un [dragon|El], et le [Concept('sevenringsofdwarves', 'Anneau des Barbes-Raides')|E] fut consumé dans les flammes. Bien que son règne eût connu une grande prospérité, il fut aussi marqué par une perte profonde."
  nick_the_pragmatic_thulin_V: "[CHARACTER.Custom('FR_LeLa')] Clairvoyant[CHARACTER.Custom('FR_E')]"
  nick_the_pragmatic_thulin_V_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était renommé[CHARACTER.Custom('FR_E')] pour sa vigilance et sa prévoyance. Sous son règne, face aux assauts répétés d'[orcs|E] et des [dragons|El], [CHARACTER.Custom('FR_IlElle')|U] autorisa le rétablissement de bastions et d'avant-postes lointains, préparant les [stiffbeards|E] aux temps incertains et préservant leur avenir."
  nick_the_forlorn_thulin_VI: "l'Esseulé[CHARACTER.Custom('FR_E')]"
  nick_the_forlorn_thulin_VI_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] régna en exil durant un âge sombre pour les [stiffbeards|E]. Bien qu'[CHARACTER.Custom('FR_IlElle')] n'eût jamais vu [kibilzahar|E], [CHARACTER.Custom('FR_IlElle')] trempa la résolution de son peuple et mena maintes campagnes contre des ennemis moins redoutables. Ses fils et petits-fils reconquirent finalement leur demeure ancestrale et [CHARACTER.Custom('FR_LuiElle')] y ramenèrent pour y être inhumé[CHARACTER.Custom('FR_E')], accomplissant un rite essentiel des [GetScriptedCharacterByHistoryID('lineofthulinVI').GetFaith.GetAdherentNamePlural]."
  nick_the_peacemaker_thris: "[CHARACTER.Custom('FR_LeLa')] Pacificat[CHARACTER.Custom('FR_EurRice')]"
  nick_the_peacemaker_thris_desc: "Bien que méprisé[CHARACTER.Custom('FR_E')] par nombre de ses proches exilés après la [warofiron|E], [CHARACTER.GetShortUINameNoTooltipNoFormat|U] rendit possible la survie de certains des [ironfists|E] dans les [redmountains|E]. Son règne marqua un tournant, prouvant que la sagesse et la paix pouvaient encore guider son peuple là où la guerre avait échoué."
  nick_south_king_thrar_II: "[Select_CString(CHARACTER.IsFemale,'Reine-du-Sud','Roi-du-Sud')]"
  nick_south_king_thrar_II_desc: "Montant sur le trône dans sa jeunesse, [CHARACTER.GetShortUINameNoTooltipNoFormat] établit le royaume de [GetTitleByKey('e_bizaruldum').GetNameNoTier] sur les fondations de la colonie qui avait existé là en l'an 625 du [ageSA|E]. [CHARACTER.Custom('FR_IlElle')|U] épouserait [GetScriptedCharacterByHistoryID( 'lineofbavor14' ).GetFirstName], fille de [GetScriptedCharacterByHistoryID( 'lineofbavorII' ).GetFirstNameNicknamedRegnal], qui devint le Premier Vassal et Roi-du-Nord de Bizarûldûm. Les [blacklocks|E] dominèrent le Bizarûldûm méridional, Thrár II en étant le premier Roi-du-Sud."
  nick_the_bloodstained_thrar_III: "l'Ensanglanté[CHARACTER.Custom('FR_E')]"
  nick_the_bloodstained_thrar_III_desc: "Sous le règne de [CHARACTER.GetFirstNameNoTooltip], de grandes hordes d'[orcs|E] commencèrent à infester les [orocarni|E] par le nord. Menant une expédition dans ces contrées, [CHARACTER.GetShortUINameNoTooltipNoFormat] soulageait la pression sur les bastions [dwarven|E], mais périt vers la fin de ses campagnes. Nombre de bastions satellites furent néanmoins perdus, et les royaumes nains de l'Est s'en trouvèrent diminués. C'est cette détresse qui poussa les maisons de l'Est à faire usage des anneaux qu'ils allaient bientôt recevoir."
  nick_three_day_king_thrar_IV: "le Roi des Trois Jours"
  nick_three_day_king_thrar_IV_desc: "Sous le règne du père de [CHARACTER.GetShortUINameNoTooltipNoFormat], trois dragons s'abattirent sur [GetTitleByKey('e_bizaruldum').GetNameNoTier], semant une dévastation profonde et donnant la mort à son père. [CHARACTER.GetShortUINameNoTooltipNoFormat] rallia Bizarûldûm et résolut de purger les montagnes jusqu'au dernier, quel qu'en fût le prix. [CHARACTER.Custom('FR_IlElle')|U] y parvint au prix de sa vie et de nombre de ses [dwarves|E]. Sans héritiers hormis ses cousins de la lignée royale des [stonefoots|E], cela déclencha une terrible crise de succession à Bizarûldûm, et les Anneaux des [blacklocks|E] et des [stonefoots|E] furent perdus dans les batailles."
  nick_the_rebuilder_thrar_V: "le Bâtisseur"
  nick_the_rebuilder_thrar_V_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] rebâtit le royaume des [blacklocks|E] sur les cendres de [GetTitleByKey('k_mablad_dum').GetNameNoTier]. Après sa destruction sous le règne de son père, [CHARACTER.Custom('FR_IlElle')] consacra sa vie à forger une nouvelle demeure pour son peuple à [GetTitleByKey('k_barazimab_ul').GetNameNoTier]."
  nick_the_valiant_thrar_VI: "le Vaillant"
  nick_the_valiant_thrar_VI_desc: "Sous le règne de [CHARACTER.GetShortUINameNoTooltipNoFormat|U], les [blacklocks|E] du sud commencèrent à s'engager de nouveau avec le monde extérieur, et [CHARACTER.Custom('FR_IlElle')] mena son peuple contre le puissant royaume orque qui s'était élevé à [GetTitleByKey('k_mablad_dum').GetNameNoTier]. Remarquable pour avoir orchestré une alliance entre son royaume et celui de Kôronânde contre le $Ji_Indur$ de retour, qui para avec succès les desseins du [nazgul|E] sur la république, le forçant à demeurer dans la région bien plus longtemps que prévu."
  nick_north_king_bavor_II: "Roi-du-Nord"
  nick_north_king_bavor_II_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] devint le Premier Vassal et Roi-du-Nord de [GetTitleByKey('e_bizaruldum').GetNameNoTier] lors du mariage de sa fille [GetScriptedCharacterByHistoryID( 'lineofbavor14' ).GetFirstName] avec [GetScriptedCharacterByHistoryID('lineofthrarII').GetFirstNameNicknamedRegnal]."
  nick_the_steward_bavor_III: "l'Intendant"
  nick_the_steward_bavor_III_desc: "[GetScriptedCharacterByHistoryID('lineofbavorIII').GetFirstName] demeura sur place tandis que [GetScriptedCharacterByHistoryID('lineofthrarIII').GetFirstName] menait la guerre dans le nord des [redmountains|E], soutenant [GetTitleByKey('e_bizaruldum').GetNameNoTier] par le labeur, le ravitaillement et le conseil. Tandis que Thrár combattait, Bavór veillait à ce que le royaume perdurât."
  nick_sole_king_bavor_IV: "le Roi Unique"
  nick_sole_king_bavor_IV_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] hérita d'un royaume divisé par les flammes d'un [dragon|El] et la [successionofbizaruldum|E]. En tant que Roi du Nord et du Sud de [GetTitleByKey('e_bizaruldum').GetNameNoTier], [CHARACTER.Custom('FR_IlElle')] régna avec une force tranquille et est rappelé[CHARACTER.Custom('FR_E')] comme le Roi Unique pour avoir maintenu uni ce que d'autres avaient brisé."
  nick_the_blessed_bavor_V: "le Béni"
  nick_the_blessed_bavor_V_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] favorisa un âge de paix et de prospérité pour les [stonefoots|E] de [GetTitleByKey('e_bizaruldum').GetNameNoTier], béni[CHARACTER.Custom('FR_E')] de [mahalcharacter|E]. Cherchant refuge dans la solitude, [CHARACTER.Custom('FR_IlElle')] consacra sa vie à la maîtrise des arts."
  nick_flamehand: "Main-de-Flamme"
  nick_flamehand_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut célèbre pour son habileté dans le travail des métaux et la forge des armes, mais [CHARACTER.Custom('FR_IlElle')] fut surtout connu[CHARACTER.Custom('FR_E')] pour son arrogance et son emportement, aussi prompt à s'enflammer que les feux qu'[CHARACTER.Custom('FR_IlElle')] maniait. Son orgueil démesuré conduisit à la [successionofbizaruldum|E] et à la destruction du [Concept('sevenringsofdwarves', 'Anneau des Boucles-Noires')|E] et du [Concept('sevenringsofdwarves', 'Anneau des Pieds-de-Pierre')|E] lorsque [CHARACTER.Custom('FR_IlElle')] fut englouti[CHARACTER.Custom('FR_E')] dans les flammes d'un [dragon|El]."
  nick_the_hero_hevdrok: "le Héros"
  nick_the_hero_hevdrok_desc: "Révéré[CHARACTER.Custom('FR_E')] pour un courage sans égal et son sacrifice par les [stiffbeards|E] des [redmountains|E], [CHARACTER.GetShortUINameNoTooltipNoFormat] acquit son épithète en terrassant le redouté [dragon|E] Veznarûkh, 'la Flamme de la Ruine', malgré de graves blessures."
  nick_the_jewelwright: "le Joaillier"
  nick_the_jewelwright_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit une grande renommée parmi les [stonefoots|E] pour avoir fondé la Guilde des Joailliers et forgé des joyaux d'une beauté somptueuse. Ses œuvres tissèrent des liens durables avec les [hisildi|E], dont le commerce apportait des matériaux rares qui étendirent les savoir-faire des [stonefoots|E] bien au-delà de la seule joaillerie."
  nick_the_ram_rider: "le Chevaucheur de Béliers"
  nick_the_ram_rider_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son épithète en domptant les béliers sauvages des [ironhills|E], poussé par le désir de conquérir le cœur d'une noble demoiselle naine. Son exploit posa les fondations des grands troupeaux et des chars tirés par des béliers que montent les [longbeards|E] des [ironhills|E]."
  nick_the_exile_ron: "l'Exilé[CHARACTER.Custom('FR_E')]"
  nick_the_exile_ron_desc: "Connu[CHARACTER.Custom('FR_E')] sous le nom de 'l'Exilé[CHARACTER.Custom('FR_E')]' pour son bannissement de [GetTitleByKey('k_nargubraz').GetNameNoTier], [CHARACTER.GetShortUINameNoTooltipNoFormat] est rappelé[CHARACTER.Custom('FR_E')] pour avoir conduit les [blacklocks|E] exilés de Nargubraz dans leur combat lors de la [warofthelie|E] et être devenu le premier Seigneur des [axesofnargubraz|E]."
  nick_the_raven_keeper: "[CHARACTER.Custom('FR_LeLa')] Gardie[CHARACTER.Custom('FR_NNne')] des Corbeaux"
  nick_the_raven_keeper_desc: "Connu[CHARACTER.Custom('FR_E')] pour son rôle de messager et d'émissaire, [CHARACTER.GetShortUINameNoTooltipNoFormat] fut le premier [dwarf|E] à comprendre le langage des Corbeaux et à leur enseigner la langue des Occidentaux."
  nick_the_goblinslayer_gorovod: "[CHARACTER.Custom('FR_LeLa')] Pourfendeu[CHARACTER.Custom('FR_RSe')] de Gobelins"
  nick_the_goblinslayer_gorovod_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son épithète pour sa guerre sans relâche contre la gent [goblin|E] dans les profondeurs du nord. Croyant [GetScriptedCharacterByHistoryID('lineofthrarIII').GetFirstNameNicknamedRegnal] tombé au combat, [CHARACTER.Custom('FR_IlElle')] continua le combat longtemps après le repli des autres [blacklocks|E], donnant sa vie pour tenir seul[CHARACTER.Custom('FR_E')] la ligne."
  nick_the_bridgemaster: "le Maître du Pont"
  nick_the_bridgemaster_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] dirigea la construction du grand Pont de l'Unité, reliant le Royaume du Nord et le Royaume du Sud de [GetTitleByKey('e_bizaruldum').GetNameNoTier] en pierre comme en esprit, en une période de ramification et de migration parmi les [blacklocks|E]."
  nick_the_avaricious_dwarf: "l'Avare"
  nick_the_avaricious_dwarf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut maudit dans la mémoire des siens comme 'l'Avare'. Dans sa cupidité et sa désespération à rebâtir [GetTitleByKey('k_kheled_nala').GetNameNoTier] après l'[akallabeth|E], [CHARACTER.Custom('FR_IlElle')] accepta l'or de [sauroncharacter|E] et envoya des guerriers [ironfist|E] combattre au nom du Seigneur Sombre lors de la [warlastalliance|E], événement passé à la postérité sous le nom de la [treacheryoforn|E]."
  nick_the_banished_dwarf: "[CHARACTER.Custom('FR_LeLa')] Banni[CHARACTER.Custom('FR_E')]"
  nick_the_banished_dwarf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit le surnom du 'Banni' pour sa fuite après les actes de son père [GetScriptedCharacterByHistoryID('lineofsindri102').GetFirstNameNicknamedRegnal] lors de la [treacheryoforn|E]. Rejeté[CHARACTER.Custom('FR_E')] par les siens, [CHARACTER.Custom('FR_IlElle')] s'enfuit avec ses derniers loyalistes vers [GetTitleByKey('k_nurunkizdin').GetNameNoTier], où [CHARACTER.Custom('FR_IlElle')] chassa les maîtres du bastion et s'en empara pour [CHARACTER.Custom('FR_LuiElle')]-même."
  nick_the_sampler_dwarf: "[CHARACTER.Custom('FR_LeLa')] Gourm[CHARACTER.Custom('FR_EtEtte')]"
  nick_the_sampler_dwarf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son surnom pour ses périples à travers les [redmountains|E], goûtant les mets de ses cousins lointains et mêlant leurs saveurs. Son habileté et sa renommée [CHARACTER.Custom('FR_LuiElle')] valurent finalement d'entrer au service de [GetScriptedCharacterByHistoryID('lineofbavor52').GetFirstNameNicknamedRegnal], nourrissant une cour dont l'appétit ne connaissait nulle mesure."
  nick_the_gargantuan_dwarf: "[CHARACTER.Custom('FR_LeLa')] Colossal[CHARACTER.Custom('FR_E')]"
  nick_the_gargantuan_dwarf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son épithète pour son appétit et sa stature démesurés, qui emplissaient les halls de festins sans fin et réclamaient l'art des meilleurs cuisiniers des [redmountains|E]."
  nick_the_woodcutter_dwarf: "[CHARACTER.Custom('FR_LeLa')] Bûchero[CHARACTER.Custom('FR_NNne')]"
  nick_the_woodcutter_dwarf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son épithète pour ses infatigables expéditions en quête des bois les plus précieux. Sous le règne de [GetScriptedCharacterByHistoryID('lineofdurinV').GetFirstNameRegnal], son art fit entrer dans les halls de [khazaddum|E] nombre d'essences rares."
  nick_the_north_hammer_dwarf: "le Marteau-du-Nord"
  nick_the_north_hammer_dwarf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son épithète pour son ardente défense de l'offensive vers le nord contre la menace [orcish|E]. Comme [GetScriptedCharacterByHistoryID('lineofthrarIII').GetFirstNameNicknamedRegnal], [CHARACTER.Custom('FR_IlElle')] était convaincu[CHARACTER.Custom('FR_E')] que la sécurité ne viendrait que par la force et la riposte prompte."
  nick_the_dwarfling: "le Barbillon"
  nick_the_dwarfling_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son surnom pour être parvenu à la souveraineté en bas âge."
  nick_the_elder_dwarf: "[CHARACTER.Custom('FR_LeLa')] Doye[CHARACTER.Custom('FR_NNne')]"
  nick_the_elder_dwarf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son surnom pour avoir vécu jusqu'à un âge grandement vénéré parmi ses pairs [dwarves|E]."
  

  ### Hobbit Nicknames ###
  nick_fatty: "Gros-Lard"
  nick_fatty_desc: "Il est communément admis que le tour de taille de [CHARACTER.GetFirstNameNoTooltip] surpasse sa propre taille."
  nick_the_bullroarer: "Fiertaureau"
  nick_the_bullroarer_desc: "Bien plus grand que les autres [hobbits|E], sa stature imposante lui permet de monter à cheval et de fondre en poussant de grands cris sur ceux qui menacent sa maisonnée."
  nick_the_old_took: "le Vieux Touc"
  nick_the_old_took_desc: "Contrairement à la croyance populaire, [CHARACTER.GetShortUINameNoTooltipNoFormat] ne fut d'abord connu[CHARACTER.Custom('FR_E')] sous le nom du 'Vieux Touc' non pas pour sa longévité, mais pour le nombre de ses jeunes parents."
  nick_the_great_the_fat: "[CHARACTER.Custom('FR_LeLa')] Grand[CHARACTER.Custom('FR_E')]"
  nick_the_great_the_fat_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] est appelé[CHARACTER.Custom('FR_E')] '[Select_CString(CHARACTER.IsFemale,'la Grande','le Grand')]' en face, et '[Select_CString(CHARACTER.IsFemale,'la Grasse','le Gras')]' dans le dos, avec moins de courtoisie."
  nick_deepdelver: "Fouille-Profond"
  nick_deepdelver_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est connu[CHARACTER.Custom('FR_E')] pour ses grands travaux de construction, ayant creusé mainte nouvelle demeure et agrandi bien d'autres encore."
  nick_proudneck: "Fière-Nuque"
  nick_proudneck_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est réputé[CHARACTER.Custom('FR_E')] se croire au-dessus des autres [hobbits|E], se promenant parmi eux le regard perché au-dessus de leurs têtes."
  nick_masterful: "Main-de-Maître"
  nick_masterful_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est réputé[CHARACTER.Custom('FR_E')] doué[CHARACTER.Custom('FR_E')] pour à peu près tout ce à quoi [CHARACTER.Custom('FR_IlElle')] s'applique."
  nick_broadbelt: "Large-Panse"
  nick_broadbelt_desc: "Plus corpulent[CHARACTER.Custom('FR_E')] que le [hobbit|E] ordinaire, le bruit court depuis longtemps que [CHARACTER.GetShortUINameNoTooltipNoFormat] doit faire faire ses ceintures sur mesure, histoire d'éviter que ses braies lui tombent."
  nick_goldfather: "Bourse-Ronde"
  nick_goldfather_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est réputé[CHARACTER.Custom('FR_E')] avoir un flair particulier pour les affaires d'argent."
  nick_scattergold: "Large-Bourse"
  nick_scattergold_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est réputé[CHARACTER.Custom('FR_E')] pour ses dépenses aussi généreuses que déraisonnables."
  nick_old_toby: "Vieux Toby"
  nick_old_toby_desc: "Nul ne sait avec certitude si c'est [CHARACTER.GetShortUINameNoTooltipNoFormat] ou la fameuse herbe qu'[CHARACTER.Custom('FR_IlElle')] introduisit dans la [shire|E] qui fut d'abord surnommée 'Old Toby', mais les deux sont évoqués avec une grande tendresse parmi les siens."
  nick_farmer_maggot: "le Paysan"
  nick_farmer_maggot_desc: "Redouté des chapardeurs comme pas deux, le Paysan Magotte était aussi bien connu pour sa ferme de navets et ses champignons."
  nick_gaffer: "l'Ancêtre"
  nick_gaffer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était depuis longtemps jardinier à Cul-de-Sac, et l'expert local en pommes de terre et autres racines."
  nick_roper: "le Cordier"
  nick_roper_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était un cordier renommé dans la [shire|E]."
  nick_bombadil: "Bombadil"
  nick_bombadil_desc: "L'Ancien, voilà ce que je suis... Tom se souvient de la première goutte de pluie et du premier gland... [CHARACTER.Custom('FR_IlElle')] a connu les ténèbres sous les étoiles, quand elles étaient encore sans peur — avant que le Seigneur Sombre ne vînt du Dehors.\n\n“Le vieux Tom Bombadil est un joyeux compère ;\nSa veste est bleu vif, et ses bottes sont jaunes.”"
  nick_flourdumpling: "Boulette-de-Farine"
  nick_flourdumpling_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut ce surnom moqueur après être sorti[CHARACTER.Custom('FR_E')] de l'effondrement du Trou Municipal de Grande-Creusée couvert[CHARACTER.Custom('FR_E')] de craie."
  nick_long_hom: "Long Hom"
  nick_long_hom_desc: "Ce surnom fut donné à [CHARACTER.GetShortUINameNoTooltipNoFormat] en raison de sa taille considérable, caractéristique des plus singulières chez un [hobbit|E]."
  nick_the_greenhanded: "Main-Verte"
  nick_the_greenhanded_desc: "Ce surnom fut donné à [CHARACTER.GetShortUINameNoTooltipNoFormat] pour sa grande habileté et sa passion pour les plantes, les fruits, les arbres, et tout ce qui touche au jardinage."
  nick_old_noakes: "le Vieux Nouguier"
  nick_old_noakes_desc: "Ce surnom fut donné à [CHARACTER.GetShortUINameNoTooltipNoFormat] en raison de son âge vénérable."
  nick_daddy: "Papa"
  nick_daddy_desc: "Ce surnom fut donné à [CHARACTER.GetShortUINameNoTooltipNoFormat] en gage d'affection pour sa bonté singulière."
  nick_old_gammidgy: "le Vieux Gammidgy"
  nick_old_gammidgy_desc: "Ce surnom fut donné à [CHARACTER.GetShortUINameNoTooltipNoFormat] en raison de son âge vénérable."
  nick_andy: "Titi"
  nick_andy_desc: "Ce surnom fut donné à [CHARACTER.GetShortUINameNoTooltipNoFormat] en gage d'affection."
    
  ### Eotheod Nicknames ###
  nick_the_hapless: "[CHARACTER.Custom('FR_LeLa')] Malchanceu[CHARACTER.Custom('FR_XSe')]"
  nick_hammerhand: "Mainmarteau"
  nick_hammerhand_desc: "#TOLKIENQUOTE “On croyait que s'il ne portait nulle arme, nulle arme ne pouvait mordre sur lui.”#!\n\n[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut surnommé[CHARACTER.Custom('FR_E')] Mainmarteau pour sa force prodigieuse et sa maîtrise des poings nus. [CHARACTER.Custom('FR_IlElle')|U] était réputé[CHARACTER.Custom('FR_E')] combattre à mains nues, et terrassa son rival Freca d'un seul coup."
  nick_leofa: "Léofa"
  nick_ednew: "Ednew"
  nick_eadig: "Éadig"
  nick_knight_of_the_mark: "Chevalier de la Marche"
  nick_wormtongue: "Langue-de-Serpent"
  nick_wormtongue_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] sous le nom de Langue-de-Serpent, car on disait de [CHARACTER.Custom('FR_LuiElle')] que chaque mot sortant de ses lèvres était un mensonge."
  nick_wolfsbane: "Fléau-des-Loups"
  nick_wolfsbane_desc: "Dans un accès de fureur, on prêtait à [CHARACTER.GetShortUINameNoTooltipNoFormat] d'avoir décimé seul[CHARACTER.Custom('FR_E')] une meute entière de loups. Cela [CHARACTER.Custom('FR_LuiElle')] valut le surnom de Fléau-des-Loups."
  nick_the_unifier: "l'Unificat[CHARACTER.Custom('FR_EurRice')]"
  nick_steelsheen: "Éclat-d'Acier"
  nick_steelsheen_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] du peuple du Rohan sous le nom de [Glossary('Stýlescíene','steelsheen_gloss')] pour sa prestance fière et gracieuse."
  nick_the_pure: "[CHARACTER.Custom('FR_LeLa')] Pur[CHARACTER.Custom('FR_E')]"
  nick_bride_of_death: "l'Épousée de la Mort"
  nick_bride_of_death_desc: "Durant le siège du Gouffre de Helm en l'hiver long, [CHARACTER.GetShortUINameNoTooltipNoFormat] accomplit son devoir en tant que dernier sang de la lignée de son père et mena son peuple dans la défense ultime du Cornu d'Or. Sur les remparts, [CHARACTER.Custom('FR_IlElle')] jura à Wulf de n'épouser que la mort, rejetant à jamais sa proposition."
  nick_warrior_poet: "le Guerrier-Poète"
  nick_warrior_poet_desc: "À la différence de son frère aîné, [CHARACTER.GetShortUINameNoTooltipNoFormat] était insouciant, de bonne nature, et portait en lui le cœur d'un poète. Aussi ses passions allaient-elles aux chants et aux récits, dont [CHARACTER.Custom('FR_IlElle')] usait pour porter ceux qui l'entouraient à d'éclatants exploits de courage et de vaillance."
  nick_freared: "Fréared"
  nick_freared_desc: "Fuyant les querelles de son foyer, [CHARACTER.GetShortUINameNoTooltipNoFormat] voyagea d'abord vers les terres natales de sa mère à Belfalas pour servir auprès des Princes. Il gagna ensuite le Rohan, où il s'attira les faveurs du roi Gram qui lui octroya la seigneurie de Harrowdale, ainsi que la main de la fille du roi, Hild. Né [Glossary('Brandir','brandir_gloss')], pour ses exploits audacieux et ses conseils avisés il fut mieux connu sous le nom de [Glossary('Branhael','branhael_gloss')] Fréared — 'Conseiller des Seigneurs'."
  
  nick_of_the_hills: "des Collines"
  nick_of_the_hills_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] passa une grande partie de sa jeunesse à parcourir les collines sauvages du [rhovanion|E]. Cela, joint à sa réputation de pillard fondant à l'improviste sur les marchands traversant les Terres Brunes, [CHARACTER.Custom('FR_LuiElle')] valut l'épithète 'des Collines'."
  nick_the_rider_that_remained: "le Cavalier qui Demeura"
  nick_the_rider_that_remained_desc: "Lorsqu'Eorl conduisit la majorité de l'[eothed|E] vers le sud, certains demeurèrent dans le [anduinvale|E] pour diverses raisons. Ils choisirent pour chef [CHARACTER.GetShortUINameNoTooltipNoFormat], que ses cousins du sud surnommèrent 'le Cavalier qui Demeura'. Bien qu'[CHARACTER.Custom('FR_IlElle')] ne se fût jamais arrogé le titre de roi — se considérant toujours comme un sujet du Roi du [rohan|E] — [CHARACTER.Custom('FR_IlElle')] fut rappelé[CHARACTER.Custom('FR_E')] comme l'ancêtre des Leofrings modernes ('le Peuple de Leofr')."
  nick_the_singer_of_sagas: "[CHARACTER.Custom('FR_LeLa')] Chantre des Sagas"
  nick_the_singer_of_sagas_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était un[CHARACTER.Custom('FR_E')] barde d'exception, et ses récits légendaires inspirèrent nombre des mythes et sagas entourant les [fay|E]."

  ### Northmen Nicknames
  nick_the_last: "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')]"
  nick_the_last_desc: "Avec [CHARACTER.GetShortUINameNoTooltipNoFormat], s'éteignit la lignée de ses souverains."
  nick_the_outrider: "l'Éclaireur"
  nick_the_outrider_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] pour vivre en selle, ne se rendant dans la capitale de son royaume que lorsque sa présence y était requise."
  nick_the_steadfast_shield: "l'Écu Inébranlable"
  nick_the_steadfast_shield_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] pour son attachement inébranlable à ses traditions et à sa foi, quand bien même les plaines mouvantes du Rhovanion se trouvaient au cœur de migrations et de bouleversements incessants."
  nick_rhovanion_savior: "le Sauveur du Rhovanion"
  nick_rhovanion_savior_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut un artisan déterminant du retour du royaume brisé du [rhovanion|E] à sa pleine gloire."
  nick_rhovanion_sovereign: "le Haut Souverain du Nord"
  nick_rhovanion_sovereign_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] a réuni tous les royaumes des [northmen|E] sous une même bannière."

  ### Dorwinion Nicknames ###
  nick_gwinaran: "Gwînaran"
  nick_grapeseed: "Pépin"
  nick_alphathel: "Alphathel"
  nick_half_full: "Mi-Plein"
  nick_half_full_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était souvent raillé[CHARACTER.Custom('FR_E')] pour sa petite stature."
  nick_anoriell: "Anoriell"
  nick_anoriell_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut surnommé[CHARACTER.Custom('FR_E')] Anoriell, signifiant 'Fille du Soleil', pour sa beauté et son naturel rayonnant."
  nick_elf_friend: "Ami[CHARACTER.Custom('FR_E')] des Elfes"
  nick_elf_friend_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se lia[CHARACTER.Custom('FR_E')] d'amitié avec l'un des [eldar|E]. Leur lien était l'écho d'une unité rare et profonde qui avait jadis brillé d'un vif éclat en des âges révolus."
  nick_elf_friend_dwarf: "Ami[CHARACTER.Custom('FR_E')] des Elfes"
  nick_elf_friend_dwarf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se lia[CHARACTER.Custom('FR_E')] d'amitié avec l'un des [eldar|E]. Leur lien était l'écho d'une unité rare et profonde qui avait jadis brillé d'un vif éclat en des âges révolus."
  nick_the_vine_whisperer: "le Chuchoteur des Vignes"
  nick_the_vine_whisperer_desc: "On disait de [CHARACTER.GetShortUINameNoTooltipNoFormat] qu'[CHARACTER.Custom('FR_IlElle')] savait toujours exactement ce dont ses plants avaient besoin. Sous ses soins attentifs, les vignes de sa famille comptèrent parmi les plus grands crus de [dorwinion|E]."
  nick_wineblood: "Sang-de-Vin"
  nick_wineblood_desc: "Le vin coulait, disait-on, dans les veines de [CHARACTER.GetShortUINameNoTooltipNoFormat], tant pour son naturel jovial que pour la teinte pourpre de son sang."
  nick_the_esoteric_lotr: "l'Ésotérique"
  nick_the_esoteric_lotr_desc: "Bien des récits étranges circulent au sujet de [CHARACTER.GetShortUINameNoTooltipNoFormat]. On disait de [CHARACTER.Custom('FR_LuiElle')] qu'[CHARACTER.Custom('FR_IlElle')] était mi-poisson, se glissant dans la [seaofrhun|E] à la nuit tombée pour s'entretenir avec ses étranges congénères dans les profondeurs."

  ### Dale Nicknames ###
  nick_the_bowman: "l'Archer"
  nick_the_bowman_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était célèbre pour son adresse légendaire à l'arc. Son plus grand exploit fut la mort de Smaug. [CHARACTER.Custom('FR_IlElle')] parvint à décocher une flèche noire dans le seul point faible du [dragon|El], sur son ventre."
  nick_shatterstag: "Fracasse-Cerf"
  nick_shatterstag_desc: "Dans sa jeunesse, [CHARACTER.GetShortUINameNoTooltipNoFormat] attira par la ruse un grand cerf dans un chêne, lui fendant le crâne — lequel orne désormais les murs de son hall."
  nick_the_lavish: "[CHARACTER.Custom('FR_LeLa')] Prodigue"
  nick_the_lavish_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] posséder de grandes richesses, acquises pour l'essentiel en commerçant avec les [dwarves|E] d'[erebor|E] et les [elves|E] du [greenwoodshort|E]. Ses trésors étaient partagés avec générosité parmi ceux qu'[CHARACTER.Custom('FR_IlElle')] jugeait dignes."

  ### Woodmen & Valemen Nicknames ###
  nick_the_wood_goer: "[CHARACTER.Custom('FR_LeLa')] Marcheu[CHARACTER.Custom('FR_RSe')] des Bois"
  nick_the_wood_goer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] pour passer la majeure partie de son temps dans les forêts du [rhovanion|E]."
  nick_raven_eye: "Œil-de-Corbeau"
  nick_raven_eye_desc: "Même avec un seul œil valide, la vision de [CHARACTER.GetShortUINameNoTooltipNoFormat] est réputée deux fois plus perçante qu'à l'ordinaire."
  nick_honeybeard: "Barbe-de-Miel"
  nick_honeybeard_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est connu[CHARACTER.Custom('FR_E')] pour son naturel jovial et son amour du miel, mais raillé[CHARACTER.Custom('FR_E')] pour son peu d'esprit."
  nick_dwarf_friend: "Ami des Nains"
  nick_dwarf_friend_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se lia[CHARACTER.Custom('FR_E')] d'amitié avec l'un des [dwarves|E], forgeant un lien rare dans la peine partagée et l'aide mutuelle."

  ### Dunlending Nicknames ###
  nick_the_secretive: "[CHARACTER.Custom('FR_LeLa')] Taciturne"
  nick_champion_of_dunland: "[CHARACTER.Custom('FR_LeLa')] Champio[CHARACTER.Custom('FR_NNne')] du Dunland"
  nick_champion_of_the_hillmen: "[CHARACTER.Custom('FR_LeLa')] Champio[CHARACTER.Custom('FR_NNne')] des Montagnards"
  nick_the_grim: "l'Implacable"
  nick_mist_child: "Enfant de la Brume"
  nick_first_among_equals: "le Premier entre Égaux"
  nick_thornheart: "Cœur-d'Épine"
  nick_bloodspear: "Lance-Sanglante"
  nick_bloodspear_desc: "Lorsque son père fut empoisonné, il revint à la guerrière [CHARACTER.GetShortUINameNoTooltipNoFormat] d'unir la tribu des Dunlandfells — ce qu'[CHARACTER.Custom('FR_IlElle')] accomplit en brandissant une lance presque toujours ruisselante du sang de ses ennemis."
  nick_red_raider: "[Select_CString(CHARACTER.IsFemale,'la Pilleuse','le Pillard')] Rouge"
  nick_red_raider_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut un brigand redouté qui rassembla les tribus dispersées le long de la rivière Adorn."

  nick_the_loremaster_nendur: "[CHARACTER.Custom('FR_LeLa')] Lettré[CHARACTER.Custom('FR_E')]"
  nick_the_loremaster_nendur_desc: "Nendur fut d'abord un lettré sans renom à [gondor|E]. Son destin allait pourtant prendre un tour bien inattendu lorsqu'il tomba sur des documents historiques révélant que son royaume natal était bien plus sombre qu'il ne l'avait jamais imaginé. Désabusé[CHARACTER.Custom('FR_E')], [CHARACTER.Custom('FR_IlElle')] gagna Isengard, où [CHARACTER.Custom('FR_IlElle')] embrassa les coutumes et les rancœurs des [dunlendings|E] et les enseignements de plus en plus radicaux de Saruman le Sage."


  ### Gwaithuirim Nicknames ###
  nick_the_mad_dog: "le Chien Enragé"
  nick_the_mad_dog_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] pour ses exploits aussi téméraires que dangereux, qui [CHARACTER.Custom('FR_LuiElle')] valurent une réputation d'ennemi redoutable."
  nick_the_river_snake: "le Serpent de Rivière"
  nick_the_river_snake_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] pour sa duplicité et sa ruse. On disait de [CHARACTER.Custom('FR_LuiElle')] que sa langue était fourchue."
  nick_the_weasel: "la Belette"
  nick_the_weasel_desc: "Le comportement de [CHARACTER.GetShortUINameNoTooltipNoFormat] était souvent comparé à celui d'une belette."
  nick_the_riverlord: "le Seigneur des Rivières"
  nick_the_mountainfather: "le Père de la Montagne"
  nick_the_mountainfather_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut un grand patriarche des Eredrim, dont les enfants étaient aussi nombreux que les pics de la montagne, et un protecteur résolu de son clan."
  nick_the_mountainmother: "la Mère de la Montagne"
  nick_the_mountainmother_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut une grande matriarche des Eredrim, dont les enfants étaient aussi nombreux que les pics de la montagne, et une protectrice résolue de son clan."
  nick_brazen_brigant: "le Brigand Effronté"
  nick_brazen_brigant_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut un pillard notoire qui s'aventurait souvent en mer pour ravager les côtes de l'[enedhwaith|E], passant parfois au-delà du cap d'Andrast pour convoiter les richesses du [gondor|E]."

  ### Angmar Nicknames ###
  nick_the_merciless_angmar: "l'Impitoyable"
  nick_the_merciless_angmar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut un tyran cruel, établi dans le Val par le [witchkingshort|E], qui enrôla de force nombre des [northmen|E] locaux pour servir dans les armées d'[angmar|E], réprimant dans le sang toute tentative de révolte."

  ### Hillmen Nicknames ###
  nick_nine_chief: "Chef des Neuf"
  nick_nine_chief_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] unifia les neuf tribus du [rhudaur|E] en devenant le chef de chacune d'elles par la diplomatie, la force et la ruse. Ses exploits sont contés dans nombre de contes populaires des [hillmen|E]."
  nick_chief_of_chiefs: "le Chef des Chefs"
  nick_chief_of_chiefs_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se dressa contre le dernier [king|El] [dunedain|E] du [rhudaur|E], rétablissant un [kingdom|El] des [hillmen|E] avec l'aide d'[angmar|E]."

  nick_the_adjudicator: "l'Arbitre"
  nick_the_adjudicator_desc: "Réputé[CHARACTER.Custom('FR_E')] homme sage et diplomate, [CHARACTER.GetShortUINameNoTooltipNoFormat] se gagna de nombreux amis tant parmi les siens que parmi les [dunedain|E], s'élevant jusqu'à la dignité de Roi d'Arne et des Arniens."

  ### Maiar Nicknames ###
  nick_the_white_istari: "$nick_the_white$" #juke note: distinct from vanilla the White
  nick_the_white_istari_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le Magicien Blanc, premier des [istariconcept|E] et chef du [whitecouncil|E]."
  nick_the_grey_istari: "le Gris"
  nick_the_grey_istari_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le Magicien Gris, l'un des [istariconcept|E], ami des peuples de la [middleearth|E]."
  nick_the_brown_istari: "le Brun"
  nick_the_brown_istari_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le Magicien Brun, l'un des [istariconcept|E], connu[CHARACTER.Custom('FR_E')] pour son naturel solitaire et son amour des contrées sauvages."
  nick_the_blue_istari: "le Bleu" # Description added by Jaguaism, feel free to change, was missing a description.
  nick_the_blue_istari_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut l'un des Magiciens Bleus, parmi les [istariconcept|E], qui voyagèrent loin vers l'Est, au-delà de toute connaissance de l'Occident."
  nick_of_many_colors: "aux Mille Couleurs"
  nick_of_many_colors_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le plus puissant des [istariconcept|E], et chercha à influer plus directement sur le destin de la [middleearth|E]."
  nick_the_radiant: "[CHARACTER.Custom('FR_LeLa')] Rayonnant[CHARACTER.Custom('FR_E')]" #unused
  nick_the_radiant_generic_description: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] brillait d'un vif éclat."
  nick_ramandor: "Ramandor"
  nick_ramandor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut appelé[CHARACTER.Custom('FR_E')] [Glossary('Ramandor','ramandor_gloss')], en référence aux grands cris de guerre qu'[CHARACTER.Custom('FR_IlElle')] poussait, dont les rugissements se répercutaient à travers les plaines et assourdissaient ses ennemis. On dit que son rire frénétique à la vue d'un dragon répandit la terreur sur tout le champ de bataille."
  nick_ravi: "Rávi"
  nick_ravi_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] [Glossary('Rávi','ravi_gloss')] pour sa férocité et sa ruse au combat."

  ### Dunedain Nicknames ###
  nick_the_bad: "[CHARACTER.Custom('FR_LeLa')] Mauvais[CHARACTER.Custom('FR_E')]"
  nick_the_bad_desc: "En raison de la mauvaise gestion de son royaume, les vassaux de [CHARACTER.GetFirstNameNoTooltip] se révoltèrent et [CHARACTER.Custom('FR_LeLa')] tuèrent."
  nick_the_tall_dunedain: "le Grand" #Elendil
  nick_the_tall_dunedain_desc: "Même au regard des critères [dunedain|E], [CHARACTER.GetShortUINameNoTooltipNoFormat] était d'une stature exceptionnelle."
  nick_sheep_lord: "le Seigneur des Moutons"
  nick_sheep_lord_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] fut un modeste noble [numenorean|E] qui représentait le Mittalmar au Conseil du Sceptre, et acquit cette épithète en raison de ses grands troupeaux de moutons."
  nick_mamandil: "Mámandil"
  nick_mamandil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] se donna lui-même le nom de [Glossary('Mámandil','mamandil_gloss')] lorsqu'il cherchait à conquérir le cœur de Tar-Ancalimë, qui elle-même se dissimulait sous les traits de la bergère [Glossary('Emerwen','emerwen_gloss')] dans les champs de l'Émerie."
  nick_emerwen_aranel: "Emerwen Aranel"
  nick_emerwen_aranel_desc: "Dans sa jeunesse, Tar-Ancalimë fut élevée par sa mère Erendis dans une demeure composée uniquement de femmes, amères des absences incessantes de Tar-Aldarion. Élevée dans le mépris des hommes et vivant à la campagne parmi les moutons, Ancalimë fut connue sous le nom d'[Glossary('Emerwen','emerwen_gloss')] [Glossary('Aranel','aranel_gloss')] pour une enfance peu commune pour l'Héritière du Roi. Elle se montra à la hauteur de son nom lorsqu'elle fuit dans les champs pour échapper à ses prétendants, avant d'être découverte par Hallacar [Glossary('Mámandil','mamandil_gloss')]."
  nick_uinendil: "Uinendil"
  nick_uinendil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut surnommé[CHARACTER.Custom('FR_E')] 'Uinendil' pour avoir refondé la Guilde des Aventuriers."
  nick_of_nindamos: "de Nindamos"
  nick_of_nindamos_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] naquit dans le havre de Nindamos à [numenor|E], et y passa une grande partie de sa jeunesse sous le règne de Tar-Palantir. Lorsque [pharazon|E] prit le pouvoir, il le quitta pour embrasser une carrière navale.\n\nSon nom serait tombé dans l'oubli sans ses écrits après la [downfall|El]. Malgré l'absence de toute formation savante, son œuvre #bold La Montagne Perdue#! devint un texte fondateur pour les [faithful|E] de [bellakar|E] dans leur deuil du [meneltarma|E] et de la Lignée d'Elros."
  nick_the_faithful: "le Fidèle" #Bór the Faithful - unused
  nick_the_renewer_dunedain: "Envinyatar" #Aragorn
  nick_the_renewer_dunedain_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] revendiqua le nom de [Glossary('Envinyatar','envinyatar_gloss')]. Il fait référence au renouveau de la Royauté des [dunedain|E], et ainsi au renouveau de l'espoir des [men|E]."
  nick_jewel_west: "Andúmir" #Eldarion
  nick_jewel_west_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut le surnom d'[Glossary('Andúmir','andumir_gloss')] peu après son accession à la majorité. Il fait référence à sa place en tant qu'héritier du trône du [reunitedkingdom|E] et à sa naissance au commencement du Règne des [men|E], alors que les [elves|E] quittaient en masse [valinor|E], royaume du couchant."
  nick_southernvictor: "Hyarmendacil"
  nick_southernvictor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] prit le nom de [Glossary('Hyarmendacil','hyarmendacil_gloss')]."
  nick_umbardacil: "Umbardacil"
  nick_umbardacil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] prit le nom de [Glossary('Umbardacil','umbardacil_gloss')], après avoir repris la province méridionale d'[umbar|E]."
  nick_romendacil: "Rómendacil" #East-victor
  nick_romendacil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] prit le nom de [Glossary('Rómendacil','romendacil_gloss')], après avoir repris la province orientale de Dor Rhúnen."
  nick_hyarmendacil: "Hyarmendacil" #South-victor
  nick_hyarmendacil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] prit le nom de [Glossary('Hyarmendacil','hyarmendacil_gloss')], signifiant 'Vainqueur du Sud' en [quenya|E], après avoir défait sans appel les [haradrim|E] et les anciens Seigneurs d'[umbar|E] qui avaient donné la mort à son père."
  nick_falastur: "Falastur"
  nick_falastur_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] prit le nom de Falastur, mot [elven|E] signifiant 'Seigneur des Côtes'."
  nick_the_steadfast_dunedain: "Voronwë" # Mardil Voronwë
  nick_the_steadfast_dunedain_desc: "Après l'extinction de la lignée des rois dans le [southernkingdom|El], [CHARACTER.GetShortUINameNoTooltipNoFormat] prit les rênes en tant que roi de fait, devenant le premier Intendant Régent du [gondor|E]. [CHARACTER.Custom('FR_IlElle')|U] gouverna le royaume d'une main ferme, méritant l'épithète de [Glossary('Voronwë','voronwe_gloss')]."
  nick_the_last_castellan: "le Dernier Châtelain"
  nick_the_last_castellan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le dernier[CHARACTER.Custom('FR_E')] des châtelains [gondorian|E] d'Úlond."
  nick_the_last_flame: "la Dernière Flamme"
  nick_the_last_flame_desc: "Après qu'[GetScriptedCharacterByHistoryID( 'lineeruholion11' ).GetFirstName] eut usurpé le gouvernement d'Úlond sur le dernier Châtelain, [CHARACTER.GetShortUINameNoTooltipNoFormat|U], fils de ce dernier, chercha refuge à la cour d'Anfalas, attendant son heure avant de s'assurer par un mariage politique les forces nécessaires à la reconquête. De retour, [CHARACTER.Custom('FR_IlElle')] reprit le territoire en terrassant le seigneur Andrake en duel, mais succomba bientôt à ses blessures — éteignant ainsi la dernière braise de la maison d'An Úlond."
  nick_udalraph: "Udalraph" #the Stirrupless
  nick_udalraph_desc: "L'épithète de [CHARACTER.GetShortUINameNoTooltipNoFormat] signifie 'l'Étrier-Absent', car [CHARACTER.Custom('FR_IlElle')] était un cavalier qui n'avait nul besoin d'étriers, à la manière des [northmen|E]."
  nick_the_sunsword: "Anorvegil"
  nick_the_sunsword_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] [Glossary('Anorvegil','anorvegil_gloss')], pour avoir seul[CHARACTER.Custom('FR_E')] terrassé un [troll|E] après l'avoir aveuglé du reflet du soleil sur sa lame."
  nick_orcsbane: "Fléau-des-Orques"
  nick_orcsbane_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut un grand guerrier qui acquit son titre en décimant sans relâche des meutes d'[orcs|E] lors de ses patrouilles dans les ruines d'[arnor|E]."
  nick_atannahtar: "Atannahtar"
  nick_atannahtar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son surnom de [Glossary('Atannahtar','atannahtar_gloss')] pour avoir abattu de nombreux soldats ennemis lors de l'assaut du roi Minalcar contre les Orientais."
  nick_andamacil: "Andamacil"
  nick_andamacil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut le nom de [Glossary('Andamacil','andamacil_gloss')]. Ses pairs lui choisirent ce nom en raison de la longue épée qu'[CHARACTER.Custom('FR_IlElle')] portait fidèlement au combat."
  nick_mormegil: "Mormegil"
  nick_mormegil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut le nom de [Glossary('Mormegil','mormegil_gloss')] pour les massacres qu'[CHARACTER.Custom('FR_IlElle')] commit lors du siège de Narthan."
  nick_the_outlander: "l'Étrang[CHARACTER.Custom('FR_ErEre')]"
  nick_the_outlander_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut exilé[CHARACTER.Custom('FR_E')] de ses terres ancestrales en [rhudaur|E] lorsque le royaume tomba aux mains des [hillmen|E] et d'[angmar|E] au [thirdage|E], errant un temps dans les contrées sauvages avant de finir sa vie au service du Roi d'[arthedain|E]."
  nick_son_of_rhudaur: "Fils du Rhudaur"
  nick_son_of_rhudaur_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] prouva maintes fois qu'[CHARACTER.Custom('FR_IlElle')] était un vrai [dunadan|E] par sa vaillance et sa loyauté envers les Héritiers d'[isildur|E]. La plus noble vertu du [rhudaur|E] demeure vive encore à ce jour."
  nick_avenging_swan: "le Cygne Vengeur"
  nick_avenging_swan_desc: "Lorsque des pillards venus d'[enedhwaith|E] par mer ravagèrent les côtes d'Anfalas, [CHARACTER.GetShortUINameNoTooltipNoFormat] prit personnellement sa revanche en menant une expédition punitive jusqu'à Lond Angren."
  nick_the_pale: "[CHARACTER.Custom('FR_LeLa')] Pâle"
  nick_the_pale_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] pour sa peau blanche et son teint laiteux, que beaucoup admiraient pour leur subtile beauté."
  nick_the_ambusher: "l'[Select_CString(CHARACTER.IsFemale,'Embusqueuse','Embusqueur')]"
  nick_the_ambusher_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était un chasseur habile, réputé[CHARACTER.Custom('FR_E')] pour attirer ses ennemis dans des pièges et des embuscades — méthode fort efficace contre les pillards [orcish|E] qui ravagent périodiquement l'[eriador|E]."
  nick_alcarin: "Alcarin"
  nick_alcarin_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] régna sur [gondor|E] à l'apogée de sa puissance et de sa splendeur, telle que les joyaux les plus précieux n'étaient pour ses sujets que des jouets."
  nick_liberator_gondor: "le Libérateur du Gondor"
  nick_liberator_gondor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut la force vive derrière la libération du [gondor|E], qui vit le royaume déchu restauré et affranchi de l'ombre de [mordor|E]."
  nick_orcslayer: "le Pourfendeur d'Orques"
  nick_orcslayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] défia le chef des [orcs|E] de [moria|E] en combat singulier et terrassa son adversaire dans un exploit d'une maîtrise de la lame sans égale."
  nick_laicamaite: "Laicamaitë"
  nick_laicamaite_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut surnommé[CHARACTER.Custom('FR_E')] [Glossary('Laicamaitë','laicamaite_gloss')] tant pour son gouvernement du [calenardhon|E] que pour sa connaissance du jardinage."
  nick_veatura: "Vëaturá"
  nick_veatura_desc: "Doué[CHARACTER.Custom('FR_E')] d'une grande vaillance sur terre comme sur mer, [CHARACTER.GetShortUINameNoTooltipNoFormat] fut surnommé[CHARACTER.Custom('FR_E')] [Glossary('Vëaturá','veatura_gloss')] pour ses exploits de force, de courage et de loyauté fière en tant que capitaine du [gondor|E]."
  nick_of_many_lands: "des Mille Contrées"
  nick_of_many_lands_desc: "Toute sa vie, le monde l'appela, et [CHARACTER.GetShortUINameNoTooltipNoFormat] répondit — connu[CHARACTER.Custom('FR_E')] comme une âme libre, voyager, explorer et connaître les contrées d'[ardaconcept|E] était sa raison d'être."
  nick_angulocelunte: "Angulóceluntë"
  nick_angulocelunte_desc: "[Glossary('Angulóceluntë','angulocelunte_gloss')] est l'épithète de [CHARACTER.GetShortUINameNoTooltipNoFormat] pour ses exploits de domination et de vaillance sur les côtes du [gondor|E] et au-delà. Il se dit qu'en bataille, [CHARACTER.GetShortUINameNoTooltipNoFormat] portait en lui une fureur ardente qui inspirait crainte et admiration aux ennemis comme aux alliés."
  nick_aureamaitale: "Aurëamaitalë"
  nick_aureamaitale_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] [Glossary('Aurëamaitalë','aureamaitale_gloss')] car ses œuvres étaient chéries par nombre des [faithful|E] pour la chaleur de sa prose et les belles illustrations de son jardin de Hyarnustar — contant maints récits qui rappelaient à l'âme la vie, le bien et la lumière demeurés présents même dans l'assombrissement de [numenor|E]."
  nick_moria_purger: "le Porteur de Lumière"
  nick_moria_purger_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] parvint à chasser les [orcs|E] de [moria|E], apportant un peu de lumière dans la Fosse Noire — si court qu'en fût le temps."
  # nick_the_dreamer: "The Dreamer" #Duplicate
  # nick_the_dreamer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] is known as 'The Dreamer'
  nick_formendil: "Formendil"
  nick_formendil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] [Glossary('Formendil','formendil_gloss')] pour son affinité avec les [northmen|E] et les Arnorrim, et pour la nationalité de son épouse, dont [CHARACTER.Custom('FR_IlElle')] tomba épris[CHARACTER.Custom('FR_E')] lors de l'un de ses voyages au nord."
  nick_ohtanis: "Ohtanis"
  nick_ohtanis_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] sous le nom de [Glossary('Ohtanis','ohtanis_gloss')]. [CHARACTER.Custom('FR_IlElle')|U] était un grand capitaine des [men|E] et un guerrier que peu surpassaient dans l'art de l'épée. Mais la guerre, bien qu'[CHARACTER.Custom('FR_IlElle')] ne l'aimât point, l'entoura et [CHARACTER.Custom('FR_LeLa')] forgea."
  nick_arassatar: "Arassatar"
  nick_arassatar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] [Glossary('Arassatar','arassatar_gloss')], pour sa loyauté envers la lignée défaillante d'[anarion|E]."
  nick_methrohir: "Methrohir"
  nick_methrohir_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] [Glossary('Methrohir','methrohir_gloss')]. Dernier[CHARACTER.Custom('FR_E')] des siens, [CHARACTER.Custom('FR_IlElle')] chevaucha vers la gloire et la mort par amour des siens et de son foyer. [CHARACTER.Custom('FR_IlElle')|U] ne fut point [CHARACTER.Custom('FR_LeLa')] moins noble d'une maison noble."
  nick_nendelote: "Nendelótë"
  nick_nendelote_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] [Glossary('Nendelótë','nendelote_gloss')] pour sa grâce et son amour des eaux que baigne la lune sur le lac Nenuial, non loin de son foyer à Tarmabar."
  nick_haven_finder: "le Premier du Havre"
  nick_haven_finder_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était une âme curieuse, qui rejoignit la Ligue des Aventuriers de bonne heure et navigua depuis [lindon|E] jusqu'à la pointe du [thanihazad|E]. Bien que [faithful|E] en vérité, [CHARACTER.GetFirstNameNoTooltip|U] affichait une façade modérée, se ménageant la faveur de [GetScriptedCharacterByHistoryID( 'lineofelros15' ).GetTitledFirstName] pour posséder et développer une modeste parcelle de terre à l'est de Belfalas. Par un usage avisé des ressources du Seigneur d'Andúnië, ses beaux-parents, [CHARACTER.GetFirstNameNoTooltip|U] posa les fondations de la cité de Pelargir, havre des [faithful|E]. S'[CHARACTER.Custom('FR_IlElle')] ne fut pas le seul à avoir participé à sa fondation, [CHARACTER.Custom('FR_IlElle')] est néanmoins compté[CHARACTER.Custom('FR_E')] parmi les premiers."
  nick_warrior_of_the_north: "le Guerrier du Nord"
  nick_warrior_of_the_north_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] vainquit d'innombrables ennemis menaçant la paix au [rhovanion|E] comme en [eriador|E], méritant l'estime et l'admiration de tous les peuples libres du Nord."
  nick_aearthuron: "Aearthuron"
  nick_aearthuron_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] grandit à tirer des filets sur les côtes déchiquetées, apprenant chaque courant et chaque vent au seul toucher. Lorsque [CHARACTER.GetFirstNameNoTooltip|U] commanda son premier navire, même les marins chevronnés l'appelaient [Glossary('Aearthuron','aearthuron_gloss')], car nul autre ne lisait la mer comme [CHARACTER.GetFirstNameNoTooltip|U]."
  nick_the_seer_malbeth: "[Select_CString(CHARACTER.IsFemale,'la Voyante','le Voyant')]"
  nick_the_seer_malbeth_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] sous le nom du 'Voyant' pour ses nombreuses prophéties, annonçant espoir et ruine pour les [dunedain|E]. La plus célèbre concernait le destin de [GetScriptedCharacterByHistoryID( 'lineisildur26' ).GetTitledFirstName] et la purification finale des Chemins des Morts."

  nick_the_stayer: "Marimo"
  nick_the_stayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U], nommé[CHARACTER.Custom('FR_E')] [Glossary('Marimo','marimo_gloss')], était une âme timide et paisible, préférant la sécurité et la quiétude du foyer de [numenor|E] à l'incertitude de la mer. Lorsqu'il advint que son père [GetScriptedCharacterByHistoryID( 'lineofingoldur1' ).GetTitledFirstName] et son frère [GetScriptedCharacterByHistoryID( 'lineofingoldur3' ).GetTitledFirstName] partirent pour la [middleearth|E], il demeura résolument chez lui en Occidentale."
  nick_the_south_star: "Hyarmendil"
  nick_the_south_star_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut appelé[CHARACTER.Custom('FR_E')] [Glossary('Hyarmendil','hyarmendil_gloss')] pour avoir quitté [numenor|E] à la recherche des étoiles du sud sous leurs cieux méridionaux, et pour demeurer libre des chaînes de la Grande Armada. Après l'[akallabeth|E], [CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut laissé[CHARACTER.Custom('FR_E')] à la dérive, son grand navire ancré sur les côtes de [bellakar|E], loin des siens au nord."

  nick_fimbaeth: "Fimbaeth"
  nick_fimbaeth_desc: "[CHARACTER.GetFirstNameNoTooltip|U] acquit son épithète de [Glossary('Fimbaeth','fimbaeth_gloss')] pour son don exceptionnel pour les mots. [CHARACTER.Custom('FR_IlElle')|U] négocia pour [CHARACTER.Custom('FR_LuiElle')]-même et pour nombre de familles nobles du sud d'[arnor|E] de solides alliances matrimoniales et des accords commerciaux. Certains de ces traités furent conclus avec la noblesse [gondorian|E], permettant aux Borinionath de rivaliser avec les plus grandes maisons nobles d'Arnor pendant près de quatre générations."
  nick_gorchu: "Gorchu"
  nick_gorchu_desc: "[CHARACTER.GetFirstNameNoTooltip|U] grandit sous l'ombre des destins funestes de ses ancêtres, et développa une profonde haine du royaume d'[angmar|E] et des [hillmen|E] du [rhudaur|E]. À mesure que le temps passait et que sa haine s'intensifiait avec l'âge, [CHARACTER.Custom('FR_IlElle')] recruta des âmes partageant ses rancœurs et livra sa propre guerre à ceux qu'[CHARACTER.Custom('FR_IlElle')] jugeait avoir lésé [CHARACTER.Custom('FR_LuiElle')] et les siens. [CHARACTER.Custom('FR_IlElle')|U] pilla et ravagea tous les établissements qu'[CHARACTER.Custom('FR_IlElle')] croisa, commettant maints actes funestes, pour lesquels [CHARACTER.Custom('FR_IlElle')] mérita son nom de [Glossary('Gorchu','gorchu_gloss')] du [rhudaur|E]."

  nick_the_sun_catcher: "le Chasseur de Soleil"
  nick_the_sun_catcher_desc: "On dit de [CHARACTER.GetFirstNameNoTooltip|U] qu'[CHARACTER.Custom('FR_IlElle')] poursuivit le soleil levant jusqu'aux confins du monde, cinglant plus loin vers l'est qu'aucun [dunedain|E] depuis la chute de [numenor|E] — atteignant jusqu'à [khy|E] et toutes les terres entre les deux. Lorsque [CHARACTER.GetFirstNameNoTooltip|U] rentra enfin en Occident après trente ans de mer, [CHARACTER.Custom('FR_IlElle')] ramena sept navires lourdement chargés de richesses exotiques, amassant une fortune à faire pâlir d'envie."
  ### Defender against Wildmen Nicknames ###
  nick_the_unyielding: "l'Indomptable"
  nick_the_unyielding_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut un rempart inébranlable contre tous les envahisseurs."
  nick_the_westron_hammer: "le Marteau de l'Occident"
  nick_the_westron_hammer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] prouva maintes fois sa vaillance en défendant ses terres. Maintes fois, le Marteau s'abattit sur ses ennemis !"
  nick_the_bane_of_wildmen: "le Fléau des Sauvages"
  nick_the_bane_of_wildmen_desc: "Rares furent les Sauvages qui envahirent les terres de [CHARACTER.GetShortUINameNoTooltipNoFormat] et survécurent pour le raconter."
  nick_the_shield_of_the_west: "le Bouclier de l'Occident"
  nick_the_shield_of_the_west_desc: "Fort comme un bouclier, [CHARACTER.GetShortUINameNoTooltipNoFormat] défendit ses terres contre tous les envahisseurs."
  
  ### Númenórean Nicknames ###
  nick_minyatur: "Tar-Minyatur" # Elros's regnal name
  nick_minyatur_desc: "Tar-Minyatur fut le nom de règne d'Elros. Il signifiait 'Haut Premier Souverain' en [quenya|E]."
  nick_nolimon: "Nólimon" # Epiteth of Vardamir, son of Elros
  nick_nolimon_desc: "Nólimon fut l'épithète de Vardamir, deuxième Roi de [numenor|E]. Il signifiait 'le Savant' en [quenya|E], ainsi nommé pour son amour de l'ancien savoir."
  nick_parmaite: "Parmaitë" # Epiteth of Elendil, King of Númenor
  nick_parmaite_desc: "Parmaitë fut l'épithète d'Elendil, quatrième Roi de [numenor|E]. Il signifiait 'Mains-de-Livre' en [quenya|E], pour les nombreux livres qu'il composa à partir des légendes rassemblées par son grand-père Tar-Vardamir."
  nick_star_watcher: "Elentirmo" # Epiteth of Tar-Meneldur, 5th King of Numenor
  nick_star_watcher_desc: "Elentirmo fut l'épithète de Meneldur, cinquième Roi de [numenor|E]. Il signifiait 'Guetteur des Étoiles' en [quenya|E]."
  nick_the_mariner_elros: "le Navigateur" #Epiteth of Tar-Aldarion, 6th King of Numenor
  nick_the_mariner_elros_desc: "Tar-Aldarion fut le sixième Roi de [numenor|E]. Son développement des traditions maritimes de Númenor et son exploration des côtes de la [middleearth|E] [CHARACTER.Custom('FR_LuiElle')] valurent l'épithète du 'Navigateur'."
  nick_the_vigilant_elros: "Tirítë" #Epiteth
  nick_the_vigilant_elros_desc: "Tirítë fut l'épithète de Tar-Minastir, onzième Roi de [numenor|E]. Sous son règne, les [numenoreans|E] commencèrent à établir des colonies permanentes en [middleearth|E]. L'épithète signifiait 'le Vigilant' en [quenya|E]."
  nick_ship_builder_elros: "Balkumagân" #Epiteth
  nick_ship_builder_elros_desc: "Tar-Ciryatan, connu sous le nom d'Ar-Balkumagân en [adunaic|E], fut le douzième Roi de [numenor|E]. Sous son règne, les [numenoreans|E] commencèrent à murmurer contre le [banofthevalar|E]. Sur le continent, son règne fut marqué par un colonialisme croissant. [CHARACTER.Custom('FR_IlElle')|U] développa considérablement la marine númenóréenne, méritant l'épithète de [Glossary('Ciryatan','ciryatan_gloss')]."
  nick_bright_sword: "Ar-Belzagar" #Epiteth
  nick_bright_sword_desc: "Calmacil était le fils de Tar-Alcarin. Grand capitaine des armées de Númenor, il conquit de vastes terres le long des côtes de la Terre du Milieu dans sa jeunesse. En conséquence, Sauron se retira des côtes et fortifia sa puissance dans l'Est, loin de celles-ci. Durant son règne, les Hommes du Roi [CHARACTER.Custom('FR_LuiElle')] donnèrent le nom d'Ar-Belzagar, qui signifiait 'Épée Brillante' en [adunaic|E]. Ce fut la première fois que le nom d'un roi fut prononcé en [adunaic|E] à [numenor|E]."
  nick_jewel_gatherer: "Amasseur de Joyaux" #Epiteth of Ar-Zimrathôn, 21st king of Numenor
  nick_jewel_gatherer_desc: "Ar-Zimrathôn était le fils et héritier d'Ar-Adûnakhôr, et devint le vingt et unième Roi de Númenor. Son père fut le premier Roi à prendre son nom dans la langue [adunaic|E], et Ar-Zimrathôn perpétua cette tradition, bien que la forme [quenya|E] de son nom, Tar-Hostamir, fût consignée au Parchemin des Rois."
  nick_shore_son: "Fils du Rivage" #Epiteth of Ar-Sakalthôr, 22nd king of Numenor
  nick_star_flame: "Flamme des Étoiles" #Epiteth of Gimilzôr, 23rd king of Numenor
  nick_star_flame_desc: "Ar-Gimilzôr fut un grand ennemi des [faithful|E]. Il interdit en totalité l'usage des langues elfiques. Il n'autorisa point les [eldar|E] à venir à [numenor|E] et punit ceux qui accueillaient encore les navires elfiques venus secrètement d'Eressëa vers les côtes occidentales de Númenor où vivait la majorité des Fidèles, car il tenait ces Elfes pour des 'espions des [valar|E]' et cherchait à dissimuler ses actes et ses conseils aux Valar. Finalement, la méfiance d'Ar-Gimilzôr envers les [faithful|E] [CHARACTER.Custom('FR_LuiElle')] poussa à exiler tous les [faithful|E] qu'il put identifier vers l'est de Númenor, non loin du havre de Rómenna. Il les y maintint sous surveillance. La forme [quenya|E] de son nom, Tar-Telemnar, fut néanmoins consignée au Parchemin des Rois."
  nick_the_far_sighted: "Ar-Inziladûn" #Epiteth of Tar-Palantir, 24th king of numenor
  nick_the_far_sighted_desc: "Inziladûn était le nom [adunaic|E] donné à Tar-Palantir, vingt-quatrième Roi de [numenor|E], à sa naissance par son père. Il signifiait 'Fleur de l'Occident'. Lorsqu'Inziladûn prit le Sceptre, Númenor traversait une période de grande obscurité. Depuis le règne de Tar-Atanamir, chaque Roi avait parlé contre les [valar|E] et contesté leur Interdit sur les Númenóréens de naviguer vers [aman|E]. À mesure que la richesse et la puissance de Númenor croissaient, leur crainte de la Mort s'intensifiait, et leur joie et leurs années déclinèrent. Il chercha à se repentir des actes de ses prédécesseurs et prit un nom royal en langue elfique [quenya|E], selon la tradition de ses ancêtres : Tar-Palantir. En conséquence, il laissa les [faithful|E] vivre en paix."
  nick_the_golden_pharazon: "le Doré" # Epiteth of Ar-Pharazon, last king of numenor
  nick_the_golden_pharazon_desc: "[pharazon|E] fut le dernier roi de [numenor|E]. Il fut surnommé 'le Doré' pour ses fastueux étalages de richesse et de puissance. Il leva la plus grande armée que la [middleearth|E] eût jamais vue, et ses actes conduisirent à l'[akallabeth|E]."
  nick_tar_elestirne: "Tar-Elestirnë" # Epiteth of Erendis, wife of Tar-Eldarion
  nick_tar_elestirne_desc: "Erendis était connue pour porter un joyau blanc sur le front, qui lui avait été offert lors de ses fiançailles avec Tar-Aldarion, et pour cela fut nommée [Glossary('Tar-Elestirne','tar_elestirne_gloss')]. Bien qu'elle eût abandonné cette pratique en des jours plus sombres, le peuple de [numenor|E] la perpétua pour toujours comme signe de royauté."
  nick_the_last_lord_admiral: "le Dernier Grand-Amiral"
  nick_the_last_lord_admiral_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le dernier Grand-Amiral d'Anarikê avant l'[akallabeth|E], commandant de la Flotte Orientale de [numenor|E]. Au lendemain de l'[akallabeth|E], [CHARACTER.Custom('FR_IlElle')] guida la modeste minorité [numenorean|E] qu'[CHARACTER.Custom('FR_IlElle')] gouvernait dans son assimilation avec les populations locales d'Anarikê, ayant compris que la colonie ne disposait pas de la puissance nécessaire pour maintenir durablement son autorité sur une population indigène hostile.\n\nSoucieux[CHARACTER.Custom('FR_E')] d'éviter les erreurs et la tyrannie de [pharazon|E], [CHARACTER.Custom('FR_IlElle')] créa le Grand Conseil d'Anarikê, une assemblée de conseillers chargée à la fois de contraindre et de guider le nouveau monarque."

  ### Edain Nicknames ###
  nick_lorindol: "Lórindol" # Hador
  nick_lorindol_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut l'épithète [Glossary('Lórindol','lorindol_gloss')] en [sindarin|E], en référence à sa chevelure dorée."
  nick_turambar: "Turambar" # Turin
  nick_turambar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] prit le nom de [Glossary('Turambar','turambar_gloss')], à son arrivée à Brethil, considérant la malédiction posée sur [CHARACTER.Custom('FR_LuiElle')]-même par [morgothcharacter|E] comme révolue."
  nick_beor: "Bëor" # Bëor/Balan
  nick_beor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut connu[CHARACTER.Custom('FR_E')] sous le nom de [Glossary('Bëor','beor_gloss')] par les [elves|E] de [GetTitleByKey('k_nargothrond').GetNameNoTier]."
  nick_aradan: "Aradan" # Malach
  nick_aradan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] vécut quatorze ans parmi les [elves|E] durant le [firstage|E], recevant le nom [sindarin|E] de [Glossary('Aradan','aradan_gloss')]."
  nick_meldis: "Meldis" # Zimrahin
  nick_meldis_desc: "[Glossary('Meldis','meldis_gloss')] était le nom [sindarin|E] de [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_saelind: "Saelind" # Andreth
  nick_saelind_desc: "[Glossary('Saelind','saelind_gloss')] était le nom [sindarin|E] de [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_thalion: "Thalion" # Hurin
  nick_thalion_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] sous le nom de [Glossary('Thalion','thalion_gloss')] en [sindarin|E]."
  nick_lalaith: "Lalaith" # Urwen sister of Turin
  nick_lalaith_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut le surnom de [Glossary('Lalaith','lalaith_gloss')] de ses parents."
  nick_niniel: "Níniel" # Nienor sister of Turin
  nick_niniel_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut le nom de [Glossary('Níniel','niniel_gloss')] de [GetScriptedCharacterByHistoryID( 'lineofhador7' ).GetFirstNameNicknamed], après la perte de sa mémoire lorsque [CHARACTER.Custom('FR_IlElle')|U] fut maudit[CHARACTER.Custom('FR_E')] par le [dragon|E] Glaurung."
  nick_erchamion: "Erchamion" # Beren One-Handed
  nick_erchamion_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut surnommé[CHARACTER.Custom('FR_E')] [Glossary('Erchamion','erchamion_gloss')] en [sindarin|E], à la suite de la perte de sa main dans la gueule du loup Carcharoth."
  nick_eledhwen: "Eledhwen" # Morwen Eledhwen mother of Turin
  nick_eledhwen_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut l'[epesse|E] [Glossary('Eledhwen','eledhwen_gloss')] des [men|E], pour l'éclat de son regard et la beauté de son visage."

  ### Elven Nicknames ###
  nick_noldoran: "Ñoldóran" # Finwë
  nick_noldoran_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le premier Haut-Roi des [noldorelves|E], et était connu[CHARACTER.Custom('FR_E')] sous le nom de [Glossary('Ñoldóran','noldoran_gloss')]."
  nick_serinde: "$Serind_e_e$" # Miriel
  nick_serinde_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut l'[epesse|E] [Glossary('Serindë','serinde_gloss')] pour son habileté à l'aiguille."
  nick_the_unbegotten: "l'Inengendré" # For Elves of Cuiviénen
  nick_the_unbegotten_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut parmi les premiers [elves|E] qui s'éveillèrent à [cuivienen|E], et n'a donc point de parents."
  nick_the_minstrel: "le Ménestrel" # Maglor
  nick_the_minstrel_desc: "[maglor|E] était l'un des [sonsoffeanor|E], réputé pour sa maîtrise de la poésie comme du chant, avec peu parmi les [eldar|E] pour le surpasser."
  nick_felagund: "Felagund" # Finrod
  nick_felagund_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut le surnom de [felagund|E], un honneur que [CHARACTER.Custom('FR_LuiElle')] accordèrent les [dwarves|E] des [bluemountains|E]."
  nick_the_white_lady: "Ar-Feiniel" # Aredhel
  nick_the_white_lady_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut la seule fille de [fingolfin|E], nommée [Glossary('Ar-Feiniel','ar_feiniel_gloss')] pour sa peau blanche et son habitude de toujours porter des vêtements blancs et argentés."
  nick_the_wise_elven: "le Sage" # Turgon
  nick_the_wise_elven_desc: "$nick_the_wise_desc$"
  nick_the_wise_celeborn: "le Sage" # Celeborn
  nick_the_wise_celeborn_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est tenu pour le plus sage des [elves|E] de la [middleearth|E], et pour un dispensateur de dons qui dépasse la puissance des rois."
  nick_the_crafty_elven: "le Subtil" # Curufin
  nick_the_crafty_elven_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le fils préféré de [feanor|E], lui ressemblant plus que tout autre de ses frères et sœurs par l'apparence, le talent et le caractère."
  nick_the_dark_elven: "le Sombre" # Caranthir
  nick_the_dark_elven_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le plus dur et le plus prompt à la colère parmi les [sonsoffeanor|E]."
  nick_ambarussa: "Ambarussa" # Amrod and Amras
  nick_the_shipwright: "le Charpentier de Navires" # Cirdan
  nick_the_shipwright_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est connu[CHARACTER.Custom('FR_E')] dans toutes les contrées pour sa maîtrise de la construction et de la navigation, ce qui [CHARACTER.Custom('FR_LuiElle')] a valu le surnom du 'Charpentier de Navires'."
  nick_greycloak: "Manteau-Gris" # Elu Thingol
  nick_swan_maiden: "la Vierge-Cygne" # Eärwen, wife of Finarfin
  nick_the_elvenking: "le Roi Sylvestre" # Thranduil
  nick_the_elvenking_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] le Roi Sylvestre, car [CHARACTER.Custom('FR_IlElle')] régnait sur les [lasgalendrimelves|E] du nord de la [mirkwood|E]."
  nick_celebrindal: "Celebrindal" # Idril
  nick_celebrindal_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] portait l'[epesse|E] [Glossary('Celebrindal','celebrindal_gloss')], pour son habitude de toujours marcher pieds nus."
  nick_faelivrin: "Faelivrin" # Finduilas
  nick_faelivrin_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommée[CHARACTER.Custom('FR_E')] [Glossary('Faelivrin','faelivrin_gloss')] par son fiancé [GetScriptedCharacterByHistoryID( 'lineofguilin2' ).GetFirstName], pour sa beauté rayonnante."
  nick_tinuviel: "Tinúviel" # Lúthien
  nick_tinuviel_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connue[CHARACTER.Custom('FR_E')] sous le nom de [Glossary('Tinúviel','tinuviel_gloss')], que [GetScriptedCharacterByHistoryID( 'lineofbeor32' ).GetFirstName] lui donna en premier lorsqu'il la découvrit dans les bois de Neldoreth."
  nick_undomiel: "Undómiel" # Arwen
  nick_undomiel_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut l'[epesse|E] [Glossary('Undómiel','undomiel_gloss')], en référence à sa beauté et à sa place comme dernier flambeau de l'ère [elven|E] en [endor|E]."
  nick_eluchil: "Eluchíl" # Dior
  nick_eluchil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut le fils de [GetScriptedCharacterByHistoryID('lineofbeor32').GetFirstName] et de [GetScriptedCharacterByHistoryID('lineofelwe2').GetFirstName]. [CHARACTER.Custom('FR_IlElle')|U] fut plus tard connu[CHARACTER.Custom('FR_E')] sous le nom de [Glossary('Eluchíl','eluchil_gloss')], en tant qu'héritier d'[elu_thingol|E], Seigneur de [GetTitleByKey('k_doriath').GetNameNoTier]."
  nick_ardamire: "Ardamírë" # Eärendil
  nick_ardamire_desc: "[Glossary('Ardamírë','ardamire_gloss')] était l'[amilesse|E] prophétique de [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_athrad_gillith: "Athrad"
  nick_athrad_gillith_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est un maître de la harpe, capable de produire une musique merveilleuse qui enchante même les cœurs les plus inflexibles."
  nick_lordlady_of_light: "[Select_CString(CHARACTER.IsFemale,'Dame','Seigneur')] de Lumière"
  nick_lordlady_of_light_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut ainsi nommé[CHARACTER.Custom('FR_E')] après la destruction de [dolguldur|E] et le retour de la lumière sans voile de [lothlorien|E]."
  nick_the_radiant_elven: "$nick_the_radiant$"
  nick_the_radiant_elven_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut perçu[CHARACTER.Custom('FR_E')] comme un symbole d'[hope|E] pour tous les [elves|E]."
  nick_the_bulwark_of_the_glades: "Rempart des Clairières"
  nick_the_mariner_voronwe: "le Navigateur" # Voronwë
  nick_the_mariner_voronwe_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut surnommé[CHARACTER.Custom('FR_E')] « le Navigateur » pour son art suprême de la navigation parmi les [noldor|E]."
  nick_telpemaite: "Telpemaitë"
  nick_telpemaite_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] [Glossary('Telpemaitë','telemmaite_gloss')] par ses frères Mirdain d'[ostinedhil|E], avant de fuir sa ruine aux côtés du maître [elrond|E]."
  nick_the_pale_elf: "[CHARACTER.Custom('FR_LeLa')] Pâle"
  nick_the_pale_elf_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] a un teint très clair et préfère éviter une exposition prolongée au soleil."
  nick_the_garden_gnome: "[CHARACTER.Custom('FR_LeLa')] Gnome Jardini[CHARACTER.Custom('FR_ErEre')]"
  nick_the_garden_gnome_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] — chose rare parmi les [noldorelves|E] — [CHARACTER.Custom('FR_IlElle')] apprécie l'art du jardinage."
  nick_halfelven: "Semi-Elfe" #Elrond
  nick_halfelven_desc: "En raison de son héritage semi-elfe, [CHARACTER.GetShortUINameNoTooltipNoFormat] choisit de se compter parmi la parenté des [elves|E] après la [warofwrath|E]."
  nick_the_duckwarrior: "[Select_CString(CHARACTER.IsFemale,'la Guerrière','le Guerrier')]-Canard"
  nick_the_duckwarrior_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut le surnom du 'Guerrier-Canard' à cause de son casque et de son plastron — le premier orné d'ailes de canard, le second d'une image de canard. Il acquit sa renommée en portant cette armure dans diverses batailles lors de la [warlastalliance|E]."
  nick_the_venturesome: "l'Intrépide"
  nick_the_venturesome_desc: "Lorsque ses parents quittèrent les rives de la [middleearth|E] — éveillés par l'assombrissement du [greenwoodshort|E] — [CHARACTER.GetShortUINameNoTooltipNoFormat|U] jura de trouver la cause des ombres grandissantes, s'aventurant vers le sud depuis le royaume du Roi Sylvestre en quête de réponses."
  nick_galion: "Galion"
  nick_of_the_fountain: "de la Fontaine"
  nick_of_the_fountain_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut Seigneur de la Maison de la Fontaine à [GetTitleByKey('k_gondolin').GetNameNoTier], connu[CHARACTER.Custom('FR_E')] pour sa voix de commandement au combat et sa loyauté inébranlable envers [GetScriptedCharacterByHistoryID( 'lineoffingolfin2' ).GetFirstNameRegnal]. À l'heure ultime de la cité, [CHARACTER.Custom('FR_IlElle')] terrassa Gothmog, Seigneur des [balrogs|E], mais y laissa la vie."
  nick_the_vigilant: "[CHARACTER.Custom('FR_LeLa')] [Select_CString(CHARACTER.IsFemale,'Vigilante','Vigilant')]"
  nick_the_vigilant_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] a juré de préserver les terres d'[eriador|E] de toute menace susceptible de les mettre en péril."
  nick_urundil: "Urundil"
  nick_urundil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut l'[epesse|E] [Glossary('Urundil','urundil_gloss')] pour son amour et sa maîtrise du cuivre."
  nick_kinnlai_reconciler: "[CHARACTER.Custom('FR_LeLa')] Réconciliat[CHARACTER.Custom('FR_EurRice')]"
  nick_kinnlai_reconciler_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] réunit les [elves|E] [kinnlai|E] qui avaient été longtemps [kinnlai_sundered|El]."
  nick_the_harrier: "[CHARACTER.Custom('FR_LeLa')] Traqueu[CHARACTER.Custom('FR_RSe')]"
  nick_the_harrier_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] pour son impatience et son caractère résolu parmi les [cuind|E], menant les gardes-marches du royaume en de nombreuses et périlleuses patrouilles jusqu'au-delà des frontières de Drêl."
  nick_silver_stag: "le Cerf d'Argent"
  nick_silver_stag_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut ce titre des [penni|E] après avoir sans relâche pourchassé et repoussé une multitude d'intrus tout le long des lisières des bois de Nelornieth."
  nick_solitary_blade: "la Lame Solitaire"
  nick_solitary_blade_desc: "Lorsque les [kinnlai|E] furent [kinnlai_sundered|El], [CHARACTER.GetShortUINameNoTooltipNoFormat] souhaita que [GetScriptedCharacterByHistoryID( 'lineoftainalann3' ).GetFirstName] demeurât dans le [kingdom|E] de [GetTitleByKey('k_talilan').GetNameNoTier], refusant de la suivre en exil. Désaccordé[CHARACTER.Custom('FR_E')] avec la confiance de [GetScriptedCharacterByHistoryID( 'lineoftainalann5' ).GetFirstName] envers les [men|E], [CHARACTER.Custom('FR_IlElle')] jura d'arpenter les frontières de Tâlilan, protégeant les terres des intrus aussi longtemps qu'[CHARACTER.Custom('FR_IlElle')] aurait la force de combattre."

  ### Maiar ###
  nick_lord_of_the_rings: "le Seigneur des Anneaux"
  nick_the_dark_lord: "le Seigneur Sombre"
  nick_the_deceiver_sauron: "$nick_the_deceiver$"
  nick_the_deceiver_sauron_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] porta bien des titres et des épithètes. Au [secondage|E], sous l'alias d'[annatarcharacter|E], [CHARACTER.Custom('FR_IlElle')] trompa les [elves|E] pour les amener à forger les [ringsofpower|E]. [CHARACTER.Custom('FR_IlElle')|U] séduisit ensuite les [conceptracemen|E] de [numenor|E] et provoqua l'[akallabeth|E]."
  nick_the_necromancer: "le Nécromancien"
  nick_the_necromancer_desc: "Le Nécromancien était le sombre souverain de [dolguldur|E]. Son identité demeurait inconnue, bien que [thewise|E] soupçonnassent [CHARACTER.Custom('FR_LuiElle')] d'être l'un des [nazgul|E]. Lorsqu'il élut domicile à Dol Guldur, une ombre s'étendit sur le [greenwoodshort|E], qui devint plus tard la [mirkwood|E].\n\nFinalement, le [whitecouncil|E] apprit que le Nécromancien n'était autre que [sauroncharacter|E] [CHARACTER.Custom('FR_LuiElle')]-même, se dissimulant pour ourdir son retour et rechercher l'[onering|E]."

  ### Nazgul ###
  nick_witch_king: "le Roi-Sorcier"
  nick_witch_king_desc: "[witchking|E], Premier des [nazgulcharacter|E], fut ainsi nommé durant le milieu du [thirdage|E] par les peuples du Nord de la [middleearth|E], pour ses années de souveraineté sorcière sur [angmar|E]."
  nick_shadow_of_east: "l'Ombre de l'Est"
  nick_shadow_of_east_desc: "[khamulshadwoftheeast|E], également connu comme l'Orientais Noir, Deuxième des [nazgulcharacter|E], fut ainsi nommé car [CHARACTER.Custom('FR_IlElle')] servit de grand commandant de [sauroncharacter|E] en Orient durant le [thirdage|E]."
  nick_dog_lord: "le Seigneur des Chiens"
  nick_dog_lord_desc: "Le Seigneur des Chiens, Troisième des [nazgulcharacter|E], fut ainsi nommé pour avoir employé des milliers de chiens de guerre lors de sa conquête de l'île de Waw."
  nick_dawndeath: "Tueur-d'Aube"
  nick_dawndeath_desc: "Tueur-d'Aube, Quatrième des [nazgulcharacter|E], fut ainsi nommé pour son habitude de lancer ses assauts à la pointe du jour."
  nick_blind_sorcerer: "le Sorcier Aveugle"
  nick_blind_sorcerer_desc: "[blindsorcerer|E], également connu sous le nom de [stormking|E], Cinquième des [nazgulcharacter|E], fut ainsi nommé pour avoir sacrifié ses propres yeux afin d'acquérir un pouvoir magique ténébreux."
  nick_ice_king: "le Roi-de-Glace"
  nick_ice_king_desc: "Le Roi-de-Glace, Sixième des [nazgulcharacter|E], fut ainsi nommé car on disait de [CHARACTER.Custom('FR_LuiElle')] qu'[CHARACTER.Custom('FR_IlElle')] avait régné sur Ûrd, un royaume glacé dans le lointain nord-est de la [middleearth|E]."
  nick_ard_the_silent: "le Silencieux"
  nick_ard_the_silent_desc: "[ardthesilentshort|E], Septième des [nazgulcharacter|E], fut ainsi nommé pour son maintien silencieux et intimidant, même parmi les Spectres de l'Anneau."
  nick_fire_king: "le Roi-de-Feu"
  nick_fire_king_desc: "[fireking|E], Huitième des [nazgulcharacter|E], fut ainsi nommé pour avoir apporté le feu et la destruction à $k_chey_sart$ au cours d'une série de campagnes connues sous le nom des Guerres de Flammes."
  nick_black_horseman: "le Cavalier Noir"
  nick_black_horseman_desc: "Le Cavalier Noir, Neuvième des [nazgulcharacter|E], fut ainsi nommé car [CHARACTER.Custom('FR_IlElle')] apparaissait souvent à cheval, enveloppé[CHARACTER.Custom('FR_E')] de ténèbres."

  ### Black Númenórean ###
  nick_mouth_of_sauron: "la Bouche de Sauron"
  nick_mouth_of_sauron_desc: "[themouthofsauron|E] était l'un des serviteurs les plus dévoués de [sauroncharacter|E], servant de héraut et de messager, ainsi que de Lieutenant de la Tour de Barad-dûr lors de la Guerre de l'Anneau. Son vrai nom fut oublié de tous, même par [CHARACTER.Custom('FR_LuiElle')]-même."
  nick_the_black_dulgu: "$nick_the_black$"
  nick_the_black_dulgu_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était un général sans pitié du [stormking|E]. Son style de commandement brutal et ses tactiques déshonorantes lui valurent son épithète."
  nick_the_great_anbalkumagan: "$nick_the_great$"
  nick_the_great_anbalkumagan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était le plus grand des rois d'[anbalkumagan|E], car [CHARACTER.Custom('FR_IlElle')] non seulement conquit $e_sirayn$, mais le soumit et l'écrasa, le plaçant à jamais sous la domination de $anbalukkhori$."
  nick_the_radiant_gimlumagan: "$nick_the_radiant$"
  nick_the_radiant_gimlumagan_desc: "Nul ne s'accorde vraiment sur la raison de cette épithète. Certains l'attribuent à la prestance royale de [CHARACTER.GetShortUINameNoTooltipNoFormat] et à sa nature charismatique, d'autres à sa grande beauté. Tous s'accordent pourtant : [CHARACTER.Custom('FR_IlElle')] était éblouissant[CHARACTER.Custom('FR_E')] entre tous."
  nick_storm_disciple: "[CHARACTER.Custom('FR_LeLa')] Disciple de la Tempête"
  nick_storm_disciple_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut initié[CHARACTER.Custom('FR_E')] aux sorcelleries obscures par le [stormking|E] et le [witchkingshort|E] en personne. Son règne en tant que Maréchal-tempête fut marqué par l'annexion de Tûlwang et l'écrasement des révoltes tûlwangiennes."
  nick_black_vizier: "le Vizir Noir"
  nick_black_vizier_desc: "Le Vizir Noir était le second d'[ardthesilent|E]. [CHARACTER.Custom('FR_IlElle')|U] était [Select_CString(CHARACTER.IsFemale, 'une sorcière', 'un sorcier')] d'ascendance [black_numenorean|E]. Sa cruauté était aussi légendaire que son ingéniosité, et une grande part de l'administration d'Âbrakhan fut confiée entre ses mains, ce qui [CHARACTER.Custom('FR_LeLa')] rendait incroyablement puissant[CHARACTER.Custom('FR_E')]."
  nick_the_ghost_of_belegaer: "le Fantôme de Belegaer"
  nick_the_ghost_of_belegaer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était un roi corsaire légendaire de Madruak. [CHARACTER.Custom('FR_IlElle')|U] fut surnommé[CHARACTER.Custom('FR_E')] 'Fantôme de Belegaer' car ses navires semblaient surgir de nulle part pour s'évanouir tout aussi promptement."
  nick_the_sorceress_of_mirkwood: "[Select_CString(CHARACTER.IsFemale,'la Sorcière','le Sorcier')] de la [mirkwood|E]"
  nick_the_sorceress_of_mirkwood_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une adepte', 'un adepte')] des sorcelleries obscures et [Select_CString(CHARACTER.IsFemale, 'une fervente sujette', 'un fervent sujet')] de [dolguldur|E]."
  nick_andrake: "Andrake"   # Drake of Anrast Corsair
  nick_andrake_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une aventurière ambitieuse', 'un aventurier ambitieux')] originaire d'[umbar|E], qui rassembla une équipée de vauriens et de brigands avant de s'emparer de la forteresse d'Úlond. [CHARACTER.Custom('FR_IlElle')|U] en fit une base navale pour mener des raids sur les côtes d'Andrast, ce qui lui valut le surnom du 'Drac d'Andrast', rapidement contracté en 'Andrake'."
  nick_the_lost_jerman: "l'Égaré[CHARACTER.Custom('FR_E')]"   # Jerman flavor char
  nick_the_lost_jerman_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une corsaire notoire', 'un corsaire notoire')] originaire d'[anbalkumagan|E]. Malheureusement, ses talents de navigateur laissaient quelque peu à désirer."
  nick_falseheir: "Faux Héritier"
  nick_falseheir_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était cru[CHARACTER.Custom('FR_E')] par nombre de ses pairs ne pas être l'enfant dont [CHARACTER.Custom('FR_IlElle')] se réclamait, ayant profité du chaos suivant la mort de son prédécesseur pour usurper ce rôle d'héritier[CHARACTER.Custom('FR_E')]."
  nick_the_ship_born: "l'Enfant du Navire"
  nick_the_ship_born_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] naquit sur le pont d'un navire alors que les héritiers de Castamir se repliaient vers [umbar|E]."
  nick_the_sun_king: "Anararan"
  nick_the_sun_king_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une grande reine', 'un grand roi')] qui cultiva sa réputation de Soleil sans égal. Son règne pourrait se résumer en cette fameuse maxime : 'Nánye i turmen'."
  nick_twice_bled: "Deux-Fois-Saigné"
  nick_twice_bled_desc: "On dit que [CHARACTER.GetShortUINameNoTooltipNoFormat|U] n'aurait versé son sang qu'à deux reprises en toute sa vie.\nLa première fois dans sa jeunesse, lorsque son père [CHARACTER.Custom('FR_LeLa')] châtia cruellement pour quelque affront supposé et [CHARACTER.Custom('FR_LeLa')] bannit de son foyer.\nLa seconde fois, bien plus tard, lorsque son cimeterre frappa son père avec une telle violence qu'il se brisa deux doigts et le trancha en deux."
  nick_captain_of_the_pit: "[CHARACTER.Custom('FR_LeLa')] Maîtr[CHARACTER.Custom('FR_EEsse')] des Fosses"
  nick_captain_of_the_pit_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était redouté[CHARACTER.Custom('FR_E')] parmi les [orcs|E] de [mordor|E] pour avoir conquis le pouvoir dans la sombre forteresse de Seregost, en terrassant dans les fosses tout adversaire osant [CHARACTER.Custom('FR_LeLa')] défier en combat singulier."
  nick_the_iron_handed: "la Main de Fer"
  nick_the_iron_handed_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour son coup de poing dévastateur — un adversaire redoutable au corps à corps."
  nick_throng_cleaver: "le Fendeur de Rangs"
  nick_throng_cleaver_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour se frayer inexorablement un chemin à travers les rangs ennemis les plus serrés."
  nick_the_lookout_unique: "$nick_the_lookout$"
  nick_the_lookout_unique_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] savait depuis le jour de sa naissance que nul port ne [CHARACTER.Custom('FR_LeLa')] retiendrait longtemps. Peu après avoir atteint l'âge adulte, [CHARACTER.Custom('FR_IlElle')] prit la mer pour sillonner la Grande Mer, au grand dam de son père.\n\nAu cours de ses voyages, [CHARACTER.GetShortUINameNoTooltipNoFormat] se fit de nombreux amis, ennemis et compagnons de toujours aux quatre coins de la [middleearth|E]. Plus notable encore, [CHARACTER.Custom('FR_IlElle')] passa de longs moments dans les ports du [southernkingdom|El], où [CHARACTER.Custom('FR_IlElle')] apprit beaucoup sur l'antique Guilde des Aventuriers, dont [CHARACTER.Custom('FR_IlElle')] cherchait à égaler les exploits."
  nick_silken_spider: "l'Araignée de Soie"
  nick_silken_spider_desc: "Parti[CHARACTER.Custom('FR_E')] d'une misérable existence d'esclave en Núrn, [CHARACTER.GetShortUINameNoTooltipNoFormat] brisa ses chaînes pour devenir un[CHARACTER.Custom('FR_E')] souverain[CHARACTER.Custom('FR_E')] loyal[CHARACTER.Custom('FR_E')] de [GetTitleByKey('d_ghurzun').GetBaseNameNoTier] au nom du Seigneur de Morgul.\n\nAvec le temps, [CHARACTER.Custom('FR_IlElle')] se fit connaître pour les nombreux pièges tendus à ses ennemis, aussi bien physiques que métaphoriques."
  nick_seashadow: "l'Ombre des Mers"
  nick_seashadow_desc: "Issu[CHARACTER.Custom('FR_E')] d'une lignée de seigneurs pirates aussi renommée que redoutée, [CHARACTER.GetShortUINameNoTooltipNoFormat] s'empressa de saisir son héritage après la mort prématurée de son père, forgeant sa réputation de spectre surgi du néant, capable de ravager les côtes avant de s'évanouir sans laisser de trace."
  nick_golden_reaver: "l'Écumeur Doré"
  nick_golden_reaver_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était un[CHARACTER.Custom('FR_E')] corsaire d'une redoutable efficacité, s'enrichissant au point de pouvoir parer son navire amiral d'or pur sur maintes parties de sa coque."
  nick_the_unlikely_kalbahil: "l'Improbable"
  nick_the_unlikely_kalbahil_desc: "Après que les usurpateurs eurent assassiné sa famille et ravagé ses terres, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut contraint[CHARACTER.Custom('FR_E')] de survivre dans la clandestinité. Durant le chaos de l'[akallabeth|E], [CHARACTER.GetShortUINameNoTooltipNoFormat|U] abattit le dernier de la lignée des usurpateurs, reprit son héritage et prit le nom de $Kalbahil$ — Héritier[CHARACTER.Custom('FR_E')] des Déchus."
  nick_the_soldier_arunnardu: "le Soldat"
  nick_the_soldier_arunnardu_desc: "Prompt à s'emporter, habile au pillage et à la dévastation, avide de gloire — [CHARACTER.GetShortUINameNoTooltipNoFormat|U] était né[CHARACTER.Custom('FR_E')] pour servir comme soldat d'[anadune|E], gravissant rapidement les rangs de l'armée et gagnant l'estime de son seigneur, [GetScriptedCharacterByHistoryID( 'lineofelros22' ).GetTitledFirstName]. Pour ses nombreuses expéditions dans les terres des peuples sauvages, [GetScriptedCharacterByHistoryID( 'lineofelros22' ).GetFirstNameNoTooltip] lui confia le gouvernement de $d_nardubarim$ — un fief à gouverner ou à ravager à sa guise, pourvu qu'en soit rapporté le tribut en gemmes — ainsi qu'un mariage avec un membre de la branche féminine de la Maison d'Elros."
  nick_the_prince_imrathor_ab: "le 'Prince'"
  nick_the_prince_imrathor_ab_desc: "Lorsque [CHARACTER.GetShortUINameNoTooltipNoFormat|U] se présenta à la cour de [GetScriptedCharacterByHistoryID( 'lineofazruben2desc1' ).GetTitledFirstName], [CHARACTER.Custom('FR_IlElle')] prétendit descendre du plus infâme des Princes de [thanihazad|E], [GetScriptedCharacterByHistoryID( 'lineofprinceimrazor1' ).GetTitledFirstName]. Son noble maintien et sa nature charismatique convainquirent [GetScriptedCharacterByHistoryID( 'lineofazruben2desc1' ).GetFirstNameNoTooltip], qui lui accorda une place à la cour, puis des terres et un mariage dans la maison de [GetScriptedCharacterByHistoryID( 'lineofazruben1' ).GetFirstNameNoTooltip]. Cependant, lorsque [CHARACTER.GetShortUINameNoTooltipNoFormat] fut incapable de fournir la preuve de cette ascendance, les $anbalukkhori$ se mirent à se moquer de [CHARACTER.Custom('FR_LuiElle')], lui accolant le titre de son prétendu 'père'."
  nick_lady_of_tides: "la Dame des Marées"
  nick_lady_of_tides_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] uni les îles sacrées, devenant ainsi une corsaire de légende."
  nick_lord_of_tides: "le Seigneur des Marées"
  nick_lord_of_tides_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] uni les îles sacrées, devenant ainsi un corsaire de légende."

  ### Black Captains of Mordor###
  nick_black_hand_of_sauron: "la Main Noire de Sauron"
  nick_black_hand_of_sauron_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était l'un des Capitaines Noirs de [sauronthedarklordcharacter|E], surnommé[CHARACTER.Custom('FR_E')] 'la Main Noire' pour son rôle éminent dans les cultes mystiques des [GetCultureByKey('ruhai').GetName]."
  nick_hammer_of_sauron: "le Marteau de Sauron"
  nick_hammer_of_sauron_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était l'un des Capitaines Noirs de [sauronthedarklordcharacter|E], surnommé[CHARACTER.Custom('FR_E')] 'le Marteau' pour sa réponse impitoyable aux fauteurs de troubles dans sa surveillance des portes de [mordor|E]."
  nick_tower_of_sauron: "la Tour de Sauron"
  nick_tower_of_sauron_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était l'un des Capitaines Noirs de [sauronthedarklordcharacter|E], surnommé[CHARACTER.Custom('FR_E')] 'la Tour' en raison de sa station au sein de [GetBuilding('wonder_baraddur_02').GetName]."

  ### Haruzan Nicknames ###
  #nick_serpentlord:  "the Serpent Lord"
  nick_serpentlord: "le Serpent Noir"
  nick_serpentlord_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une puissante reine', 'un puissant roi')] [haradrim|E], crainte et redoutée dans tout [harad|E]. On disait de [CHARACTER.Custom('FR_LuiElle')] qu'[CHARACTER.Custom('FR_IlElle')] avait été choisi[CHARACTER.Custom('FR_E')] comme champion mortel de Khäz-Gramaze, destiné[CHARACTER.Custom('FR_E')] à accomplir la Longue Vengeance contre les [dunedain|E] — ce qui lui valut le titre de 'Serpent Noir'."
  nick_greatking: "le Grand Roi"
  nick_greatking_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était un roi légendaire de [GetTitleByKey('k_haruzan').GetBaseNameNoTier] qui étendit son Royaume depuis l'embouchure du Harnen jusqu'aux collines de Lurmsakûn. Il fonda le Haut Royaume de Harwan, qui domina le [nearharad|E] pendant plusieurs siècles."
  nick_the_serpents_shade: "l'Ombre du Serpent" #Unused
  nick_the_old_viper: "la Vieille Vipère"
  nick_the_old_viper_desc: "Malgré son grand âge, la ruse de [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] demeurait redoutée et respectée de tous."
  nick_the_clawless: "[CHARACTER.Custom('FR_LeLa')] Sans-Griffes"
  nick_the_clawless_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une reine fantoche', 'un roi fantoche')] installé[CHARACTER.Custom('FR_E')] par [gondor|E]. Pour cela, conjugué à son attitude, [CHARACTER.Custom('FR_IlElle')] était moqué[CHARACTER.Custom('FR_E')] par nombre de ses sujets."
  nick_the_arbiter_pezar: "l'Arbitre"
  nick_the_arbiter_pezar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une souveraine impartiale et juste', 'un souverain impartial et juste')], réputé[CHARACTER.Custom('FR_E')] pour avoir réglé nombre de querelles mesquines entre ses pairs chefs de clans lors de la Confédération Méridionale. Ses arbitrages finirent par les unir sous une confédération tribale, et les chefs de clans votèrent à l'unanimité pour [CHARACTER.Custom('FR_LeLa')] porter à leur tête, faisant ainsi de [CHARACTER.Custom('FR_LuiElle')] [Select_CString(CHARACTER.IsFemale, 'la première reine', 'le premier roi')] de [GetTitleByKey('k_pezarsan').GetBaseNameNoTier]. La loi pezarsane moderne repose encore sur son code juridique originel."
  nick_the_cunning_pezar: "le Rusé"
  nick_the_cunning_pezar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] conquit [GetTitleByKey('k_haruzan').GetBaseNameNoTier], étendant son royaume jusqu'à l'embouchure du Harnen."
  nick_the_warlord_haruzan: "[CHARACTER.Custom('FR_LeLa')] [CHARACTER.Custom('FR_SeigneurDame')|U] de Guerre"
  nick_the_warlord_haruzan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une vétérante commandante', 'un vétéran commandant')] haruze, qui sut tirer parti du chaos de la Révolte de Chelkar pour tailler sa part dans le [GetTitleByKey('e_haradwaith').GetBaseName] en décomposition. Après sa mort, son royaume s'effondra promptement sous les querelles intestines de ses fils."
  nick_the_valiant_arzagar: "$nick_the_valiant$"
  nick_the_valiant_arzagar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était né[CHARACTER.Custom('FR_E')] du fils d'un général haruze et d'une princesse ayerikkä. [CHARACTER.Custom('FR_IlElle')|U] se distingua rapidement comme [Select_CString(CHARACTER.IsFemale, 'une commandante populaire, compétente et loyale', 'un commandant populaire, compétent et loyal')], et fut établi[CHARACTER.Custom('FR_E')] comme roi vassal de [GetTitleByKey('k_pezarsan').GetBaseNameNoTier]."
  nick_the_kings_guide: "[CHARACTER.Custom('FR_LeLa')] Guide du Roi"
  nick_the_kings_guide_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une conseillère et amie', 'un conseiller et ami')] précieux d'Ayer, premier roi de [GetTitleByKey('k_haruzan').GetBaseNameNoTier], dont [CHARACTER.Custom('FR_IlElle')] finit par épouser la fille. [CHARACTER.Custom('FR_IlElle')|U] continua de prodiguer ses conseils aux trois générations de monarques suivantes et fut largement récompensé[CHARACTER.Custom('FR_E')] pour ses services."
  nick_the_opportunist_harad: "l'Opportuniste"
  nick_the_opportunist_harad_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] savait saisir chaque occasion d'accroître le rang de sa famille. [CHARACTER.Custom('FR_IlElle')|U] parvint finalement à faire établir son premier-né comme roi vassal de [GetTitleByKey('k_umbar').GetBaseNameNoTier] avec le soutien de leur suzerain, le roi de [GetTitleByKey('k_haruzan').GetBaseNameNoTier]. Pour consolider la prétention de son fils, [CHARACTER.Custom('FR_IlElle')] mit en avant pour la première fois depuis des siècles la prétendue ascendance castamiri de sa famille sur les vieux rois de [umbar|E]."
  nick_the_beloved: "[CHARACTER.Custom('FR_LeLa')] Bien-Aimé[CHARACTER.Custom('FR_E')]"
  nick_the_beloved_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était chéri[CHARACTER.Custom('FR_E')] de son peuple. Tant et si bien que ses sujets l'aimaient au point que [CHARACTER.Custom('FR_IlElle')] put renverser son frère aîné sans effusion de sang et s'emparer du trône."
  nick_the_spurned: "[CHARACTER.Custom('FR_LeLa')] Rejeté[CHARACTER.Custom('FR_E')]"
  nick_the_spurned_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut chassé[CHARACTER.Custom('FR_E')] du trône par son cadet, qui mena contre [CHARACTER.Custom('FR_LuiElle')] un coup d'État sans effusion de sang."
  nick_the_perennial_harad: "l'Éternelle"
  nick_the_perennial_harad_desc: "Née de l'union d'un capitaine [gondorian|E] et d'une princesse de la cité [haradric|E] qu'il avait mission de protéger, [CHARACTER.GetShortUINameNoTooltipNoFormat] passa la majeure partie de sa jeunesse entre [umbar|E] et [GetTitleByKey('d_kes_karrak').GetBaseNameNoTier].\n\nLorsque les [GetDynastyByID('dynasty_narghan').GetName] furent assiégés et anéantis par les seigneurs [black_numenorean|E] que les [shipkings|E] avaient envoyés en exil, elle prit en main le destin de son peuple et entreprit de rebâtir ce qui subsistait de la vieille Kârna. Grâce au [bloodofnumenor|E], son règne s'étira sur plus d'un siècle, lui valant la vénération des Karrani."

  ### Tedjin Nicknames ###
  nick_the_enduring_tedjin: "l'Inébranlable"
  nick_the_enduring_tedjin_desc: "Quoi que le monde lui réservât, [CHARACTER.GetShortUINameNoTooltipNoFormat] ne fléchit jamais."
  nick_the_shrouded_tarb: "[CHARACTER.Custom('FR_LeLa')] Tarb Voilé"
  nick_the_shrouded_tarb_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une conseillère', 'un conseiller')] d'[umbar|E] d'illustre naissance [adunaic|E]. Tandis que les tensions avec [gondor|E] s'exacerbaient, [CHARACTER.Custom('FR_IlElle')] chercha à briser la puissance de leur allié méridional de [bellakar|E]. Sous l'identité secrète du 'Tarb Voilé', [CHARACTER.Custom('FR_IlElle')] convainquit les derniers Tedjin de [khand|E] de rejoindre leurs frères en [harad|E], où [CHARACTER.Custom('FR_IlElle')] joua un rôle clé dans l'organisation de l'invasion Tedjin-Qarsag qui aboutit à la fondation de [GetTitleByKey('e_tedjin').GetBaseNameNoTier]."
  nick_the_bloodmaker: "[Select_CString(CHARACTER.IsFemale,'la Faiseuse','le Faiseur')] de Sang"
  nick_the_bloodmaker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une tyrane', 'un tyran')] sans pitié qui réduisait impitoyablement au silence toute opposition à son autorité sur [GetTitleByKey('e_tedjin').GetBaseNameNoTier]."
  nick_tedjinrestorer: "Père des Tedjin"
  nick_tedjinrestorer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] refonda le Katajate tedjin de Qadjajar, s'imposant à jamais parmi les plus grandes figures de l'histoire tedjin."
  nick_tedjinrestorer_female: "Mère des Tedjin"
  nick_tedjinrestorer_female_desc: "$nick_tedjinrestorer_desc$"
  nick_high_marshal_of_maladum: "Grand Maréchal de Maladûm"
  nick_high_marshal_of_maladum_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] unifié les Tedjin sous la bannière de Maladûm, forgeant une force redoutable."

  ### Haradrim Nicknames ###
  nick_terror_of_nafarat: "la Terreur de Nâfarat"
  nick_terror_of_nafarat_desc: "Aussi à l'aise dans le désert que dans les hautes terres, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('êtes', 'est')] [Select_CString(CHARACTER.IsFemale, 'une guerrière et cheffe de guerre', 'un guerrier et chef de guerre')] d'exception. Lançant ses raids au nord, loin de son pays, [CHARACTER.Custom('FR_IlElle')] [CHARACTER.LocalPlayerString('êtes', 'est')] une menace pour la paix et la sécurité des marches de Poa et de la Mer de Dunes."
  nick_the_camel: "le Chameau"
  nick_the_camel_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était souvent raillé[CHARACTER.Custom('FR_E')] pour son apparence physique. Mais être sous-estimé[CHARACTER.Custom('FR_E')] avait ses avantages..."
  nick_the_trusting: "[CHARACTER.Custom('FR_LeLa')] Confiant[CHARACTER.Custom('FR_E')]"
  nick_the_trusting_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] accordait aisément sa confiance — une disposition dont ses vassaux surent tirer parti bien plus souvent qu'à leur tour."
  nick_the_dowser: "[CHARACTER.Custom('FR_LeLa')] Sourci[CHARACTER.Custom('FR_ErEre')]"
  nick_the_dowser_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une mystique renommée', 'un mystique renommé')], très aimé[CHARACTER.Custom('FR_E')] pour son don à trouver les sources d'eau avec pour tout instrument une branche en apparence ordinaire."
  nick_the_hand_of_gurzil: "la Main de Gurzil"
  nick_the_hand_of_gurzil_desc: "On dit que [CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut une vision ardente et lumineuse de Gurzil, qui [CHARACTER.Custom('FR_LeLa')] choisit pour traverser les montagnes et chasser les [dunedain|E] d'[umbar|E]. #juke note: likely influenced by sauron"
  nick_the_jelut_unifier: "le Grand Unificateur"
  nick_the_jelut_unifier_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] unifia avec succès les Jelut sous une seule bannière, pour un temps."
  nick_the_great_guide: "le Grand Guide"
  nick_the_great_guide_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] guida avec sagesse les tribus jelut unifiées hors de leur désert pour déferler sur les royaumes alentour."
  nick_gurzils_arrow: "la Flèche de Gurzil"
  nick_gurzils_arrow_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une grande cheffe', 'un grand chef')] qui unifia les tribus jelut."
  nick_the_suntouched: "le Béni-du-Soleil"
  nick_the_suntouched_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] unifia les tribus jelut. On dit que [CHARACTER.Custom('FR_IlElle')] était béni[CHARACTER.Custom('FR_E')] des dieux, insensible aux brûlures du soleil."
  nick_caravan_born: "l'Enfant des Caravanes"
  nick_caravan_born_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est peut-être d'un sang doublement noble, mais par l'opprobre et la trahison des siens, [CHARACTER.Custom('FR_IlElle')] passa toute sa vie à ne rien connaître d'autre que les grandes caravanes."
  
  # Dune Sea
  nick_wind_crowned: "Couronné-du-Vent"
  nick_wind_crowned_desc: "'Couronné-du-Vent', 'Chien-Aigle', 'Roi-des-Dunes' — [CHARACTER.GetShortUINameNoTooltipNoFormat|U] avait autant d'épithètes que de tribus menées. Pour des raisons perdues dans le temps, une multitude de nomades du désert se rassemblèrent sous sa bannière et abandonnèrent les terres arides au nord de la [bayoftulwang|E] pour tenter leur chance dans le [ray|E]. Durant quelques siècles, la Migration Kindilár établit une nouvelle classe dirigeante, mais ses conquêtes laissèrent des traces profondes.\n\nSes motivations étaient complexes : de son propre aveu, [CHARACTER.Custom('FR_IlElle')] n'avait jamais aspiré à la conquête, cherchant seulement un nouveau foyer pour son peuple. Contempler le carnage nécessaire qu'[CHARACTER.Custom('FR_IlElle')] avait infligé brisa quelque chose en [CHARACTER.Custom('FR_LuiElle')]. Là où la plupart ne voyaient qu'un seigneur de guerre brutal, son peuple voyait un être hanté par les choix qu'[CHARACTER.Custom('FR_IlElle')] avait été contraint[CHARACTER.Custom('FR_E')] de faire."
  nick_tent_ruler: "Roi-de-la-Tente"
  nick_tent_ruler_desc: "Dans les premiers temps après la Migration Kindilár, les nouveaux Hauts-Rois eurent quelque peine à s'adapter à la vie dans le Dâr. Lorsqu'ils formaient encore une confédération tribale nomade, leurs chefs se réunissaient en érigeant un cercle de tentes tournées vers un même feu. [CHARACTER.GetShortUINameNoTooltipNoFormat] s'attira quelques railleries de ses nouveaux sujets en perpétuant cette coutume sur le dallage de la grande salle du trône du palais du Bôzisha-Dâr."
  nick_the_sandstorm: "la Tempête de Sable"
  nick_the_sandstorm_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une reine légendaire', 'un roi légendaire')], réputé[CHARACTER.Custom('FR_E')] pour avoir brièvement unifié les tribus nomades de la Mer de Dunes. On disait de [CHARACTER.Custom('FR_LuiElle')] qu'[CHARACTER.Custom('FR_IlElle')] fondait sur ses ennemis avec la vélocité du vent.\n\nLa [dynasty|El] Ezarkia de Koanoz se réclame de son sang."
  nick_tribemaker: "Forgeur de Tribus"
  nick_tribemaker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] rassembla autour de Rakhudish nombre des nomades de la Mer de Dunes et forgea entre eux des liens d'amitié durables."
  nick_windrider: "Chevaucheur-du-Vent"
  nick_windrider_desc: "Dans sa jeunesse, [CHARACTER.GetShortUINameNoTooltipNoFormat] était réputé[CHARACTER.Custom('FR_E')] pour être [Select_CString(CHARACTER.IsFemale, 'une meneuse habile mais terriblement téméraire', 'un meneur habile mais terriblement téméraire')]. Ses hommes lui donnèrent le surnom de 'Chevaucheur-du-Vent' après qu'[CHARACTER.Custom('FR_IlElle')] eut construit un véhicule de bois glissant sur les sables grâce à une grande voile. [CHARACTER.Custom('FR_IlElle')|U] l'utilisa à plusieurs reprises durant son règne, surtout pour impressionner ses vassaux — ce qui lui coûta finalement une jambe."
  nick_scorpion_king: "le Roi Scorpion"
  nick_scorpion_king_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] [Select_CString(CHARACTER.IsFemale, 'une cheffe', 'un chef')] de grand renom, servant de figure de proue aux nomades de la Mer de Dunes. Cela, conjugué à sa fascination pour les grands scorpions, lui valut le titre de 'Roi Scorpion'."
  nick_mother_of_shades: "Mère des Ombres"
  nick_mother_of_shades_desc: "Une nuée de mythes entourait [CHARACTER.GetShortUINameNoTooltipNoFormat], surnommée 'la Mère des Ombres'. Le plus répandu est le conte de [the_girl_and_the_spider|E], qui retrace sa jeunesse et son commandement du Culte de Sanbaiz. Les chefs de nombreuses tribus-covens au service de la grande araignée se réclament de sa descendance."
  nick_the_evil_dunesea: "la Malfaisante"
  nick_the_evil_dunesea_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] commit nombre d'actes sombres et malfaisants, ce qui [CHARACTER.Custom('FR_LeLa')] valut une âpre rivalité parmi les tribus-covens."
  nick_the_widow: "la Veuve"
  nick_the_widow_desc: "On prêtait à [CHARACTER.GetShortUINameNoTooltipNoFormat|U] une beauté ténébreuse capable d'envoûter quiconque posait les yeux sur elle. On dit aussi qu'aucun de ses innombrables époux ne survécut plus d'un an après leurs noces."
  nick_the_knowing: "la Savante"
  nick_the_knowing_desc: "Le savoir de [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat|U] était hautement respecté de ses sœurs, mais ses conseils avaient toujours un prix."
  nick_the_old_crone: "la Vieille Sorcière"
  nick_the_old_crone_desc: "On dit que [CHARACTER.GetShortUINameNoTooltipNoFormat] scella un sombre pacte avec Sanbaiz — sa vie fut prolongée, mais étirée jusqu'à l'extrême. Elle vieillit alors très vite et fut ainsi incapable de jouir de la longévité qu'on lui avait accordée."
  nick_the_camel_spider: "l'Araignée-Chameau"
  nick_the_camel_spider_desc: "Impitoyable, secrète et venimeuse — on disait que sa mère avait échangé l'âme de [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] contre celle d'une araignée-chameau lorsqu'elle était enfant. Elle éliminait ses adversaires sans pitié et s'emparait du pouvoir depuis l'ombre."
  nick_the_hag: "la Mégère"
  nick_the_hag_desc: "On dit que [CHARACTER.GetShortUINameNoTooltipNoFormat|U] reçut de Sanbaiz des pouvoirs surnaturels, mais en échange fut rendue hideuse et difforme."
  nick_tempest_of_darsalan: "la Tempête"
  nick_tempest_of_darsalan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour fondre sur ses ennemis à la manière d'une tempête, ne laissant dans son terrible sillage que désolation."
  nick_the_lion_of_darsalan: "le Lion"
  nick_the_lion_of_darsalan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était semblable aux grands lions des plaines : fier et honorable, mais prompt à la colère et à la guerre."
  nick_the_lovestruck: "l'Amoureux Transi"
  nick_the_lovestruck_desc: "À un jeune âge, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] tomba éperdument amoureux[CHARACTER.Custom('FR_E')] de la princesse Nafisa de Harwan, une femme bien au-dessus de sa condition. Témoin de l'amour qui les liait, le Chák Taskral leur permit de s'unir, mais la dot qu'il exigea était lourde — vingt pour cent de toute sa fortune, à perpétuité."

  ### Druedain Nicknames ###
  nick_honnin_restorer: "le Grand Restaurateur"
  nick_honnin_restorer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] parvint à reprendre les terres que les Honnin avaient perdues si longtemps auparavant."
  nick_unifier_of_eryn_vorn: "Unificateur d'Eryn Vorn"
  nick_unifier_of_eryn_vorn_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] parvint à unifier les tribus forestières d'Eryn Vorn."
  nick_the_son_of_darkness: "[CHARACTER.Custom('FR_LeLa')] Sanguinaire"
  nick_the_son_of_darkness_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était tristement célèbre[CHARACTER.Custom('FR_E')] pour ses actes sans merci envers ses compagnons Beffraen."
  nick_z_i_ghis_heir: "Héritier de Zîghi"
  nick_z_i_ghis_heir_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se montra [Select_CString(CHARACTER.IsFemale, 'une véritable héritière', 'un véritable héritier')] du grand Haut-Chef Zîghi en réclamant son héritage."
  nick_viper_of_the_wood: "la Vipère de la Forêt"
  nick_viper_of_the_wood_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une légendaire Maîtresse-Lance', 'un légendaire Maître-Lance')] parmi les Beffraen, surnommé[CHARACTER.Custom('FR_E')] 'Vipère de la Forêt' pour la rapidité et la précision de ses coups, aussi fulgurants que la morsure d'une vipère."

  ### Rhun and Khand Nicknames ###
  nick_blackspear: "Lance-Noire"
  nick_blackspear_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] souvent surnommé[CHARACTER.Custom('FR_E')] Lance-Noire en raison de son arme de prédilection : une grande lance ornée de nombreuses bandelettes de tissu noir."
  nick_the_streamer_unique: "le Rhapsode"
  nick_the_streamer_unique_desc: "Sachant qu'il était indésirable chez lui, [CHARACTER.GetShortUINameNoTooltipNoFormat] échappa au sort réservé à la plupart des hommes logath. Cherchant à choisir sa propre épouse et à tracer sa propre voie, [CHARACTER.GetShortUINameNoTooltipNoFormat] devint un homme de savoir, connu pour enseigner aux gens du commun la lecture et l'écriture à travers des récits fantastiques tissés comme les méandres d'un ruisseau."
  nick_the_mysterious: "l'Énigme"
  nick_the_mysterious_desc: "Peu de choses étaient connues de [CHARACTER.GetShortUINameNoTooltipNoFormat], que ses pairs considéraient comme une véritable énigme."
  nick_the_preserver_khand: "le Gardien"
  nick_the_preserver_khand_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] s'imposa comme Haut Roi de [khand|E] à la mort de son grand-père. Sous son autorité, les Variags connurent une longue période d'unité."
  nick_the_defeated_khand: "le Vaincu"
  nick_the_defeated_khand_desc: "À la différence des autres Hauts Rois de [khand|E], il rassembla les Variags non par la seule force de sa volonté, mais en forgeant une coalition contre une menace extérieure, grâce à son charisme. Malheureusement, son inexpérience militaire lui coûta une mort rapide et infamante lorsque le Royaume Doré envahit ses terres."
  nick_the_brightest_pebble: "le Plus Brillant des Cailloux"
  nick_the_brightest_pebble_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était d'une incompétence spectaculaire. On disait de [CHARACTER.Custom('FR_LuiElle')] qu'[CHARACTER.Custom('FR_IlElle')] était le penseur le plus brillant parmi tous les cailloux du rivage de [nurn|E]. À la mort de son père, un coup d'État soutenu par [mordor|E] renversa son clan."
  nick_the_spearmaster: "[CHARACTER.Custom('FR_LeLa')] Maître-Lance"
  nick_the_spearmaster_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour sa maîtrise de la lance."
  nick_gilded_star: "l'Étoile Dorée"
  nick_gilded_star_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] refonda avec succès l'antique royaume de Szreldor, semant l'effroi et la mort parmi les peuples du [rhovanion|E]."
  nick_the_restless_flame: "la Flamme Ardente"
  nick_the_restless_flame_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était toujours prompt[CHARACTER.Custom('FR_E')] et empressé[CHARACTER.Custom('FR_E')] à frapper, laissant dans son sillage un chemin de désolation."
  nick_the_lord_of_blades_unique: "[CHARACTER.Custom('FR_LeLa')] [CHARACTER.Custom('FR_SeigneurDame')] des Lames"
  nick_the_lord_of_blades_unique_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour son armure en écailles de dragon. On disait de ces écailles qu'elles étaient si acérées que chacune était aussi meurtrière que n'importe quelle lame."
  nick_the_uniter_khand: "l'Unificateur"
  nick_the_uniter_khand_desc: "Face à la menace d'une unification Orientais sous l'égide du charismatique Bountig Medlókan, [CHARACTER.GetShortUINameNoTooltipNoFormat] fut le fer de lance de l'unification de tout [khand|E] sous une seule bannière."

  ### Womarin Nicknames
  # Vulmaw Nicknames
  nick_dragon_at_world_end: "Dragon au Bout du Monde"
  nick_dragon_at_world_end_desc: "Flairant l'opportunité, [CHARACTER.GetShortUINameNoTooltipNoFormat] s'éleva parmi les pirates de Vulmaw avec l'aide de son proche ami Bhalrîm. Ensemble, [CHARACTER.GetShortUINameNoTooltipNoFormat] et Bhalrîm levèrent une flotte et mirent le cap vers un lieu connu des Vulmaw sous le nom de 'Bout-du-Monde'. Là, [CHARACTER.GetShortUINameNoTooltipNoFormat] chercha à exploiter la faiblesse de la Principauté de Pêl en lambeaux."
  nick_scarlet_sword: "l'Épée Écarlate"
  nick_scarlet_sword_desc: "Réputé pour la joie qu'il tirait de la souffrance de ses ennemis, on dit que le seul homme à connaître [CHARACTER.GetShortUINameNoTooltipNoFormat] plus intimement que ses victimes était son cher ami Szôranh."

  ### Bellakarean Nicknames
  nick_ironhand: "Main de Fer"
  nick_ironhand_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] comme l'unificateur de [bellakar|E]. Selon une antique légende, il perdit sa main au combat et les dieux lui firent don d'une nouvelle, forgée dans le fer, qu'il pouvait mouvoir comme s'il s'agissait de chair vive."
  nick_ervak: "Ervak" #Used to be 'League Maker', but using a non-translated word like the source doc does sounds cooler.
  nick_ervak_desc: "Si ce fut son père Arphazân qui infligea la défaite décisive aux Tedjin de Qadajajar, c'est bien le Prince [CHARACTER.GetFirstNameNoTooltip] qui mérita pour lui-même le nom d'Ervak, le Destructeur, en rasant la cité de Zimrênzil plutôt que d'y maintenir un poste si loin des centres de pouvoir du Tumakveh. Cette approche brutale ne lui gagna guère la faveur des Sôriya, et son règne fut sans cesse éprouvé par des rébellions dans le Mardruak fraîchement reconquis. Ce n'est qu'avec l'aide du [gondor|E], obtenue par l'ambassade de son fils Arzagar, que le Mardruak fut enfin pleinement soumis."
  nick_the_warmaker: "le Faiseur de Guerre"
  nick_the_warmaker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] consacra sa vie à protéger [bellakar|E] contre les envahisseurs Tedjin."
  nick_the_virtuous: "[CHARACTER.Custom('FR_LeLa')] Vertueu[CHARACTER.Custom('FR_XSe')]"
  nick_the_virtuous_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était connu[CHARACTER.Custom('FR_E')] pour être [Select_CString(CHARACTER.IsFemale, 'une souveraine d''une piété exceptionnelle', 'un souverain d''une piété exceptionnelle')]. Il finança de nombreuses bibliothèques et temples dédiés à une grande variété de divinités à travers [bellakar|E]."
  nick_the_hammer_of_doom: "le Marteau du Destin"
  nick_the_hammer_of_doom_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour manier un immense marteau de guerre forgé à Esmer."
  nick_the_prudent: "[CHARACTER.Custom('FR_LeLa')] Prudent[CHARACTER.Custom('FR_E')]"
  nick_the_prudent_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une souveraine', 'un souverain')] fort circonspect[CHARACTER.Custom('FR_E')], pesant toujours soigneusement ses options avant d'agir. Cette prudence [CHARACTER.Custom('FR_LeLa')] rendait parfois lent[CHARACTER.Custom('FR_E')] à la décision — ce dont ses ennemis surent tirer parti à plus d'une reprise."
  nick_the_arrogant: "l'Arrogant[CHARACTER.Custom('FR_E')]"
  nick_the_arrogant_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était d'un orgueil et d'une vanité sans bornes. [CHARACTER.Custom('FR_IlElle')|U] fit tailler une grande statue de [CHARACTER.Custom('FR_LuiElle')]-même dans le marbre, haut dans les montagnes — qui fut promptement engloutie par la boue d'un ravin quelques années plus tard."
  nick_the_sorcerer_king: "le Sorcier-Roi"
  nick_the_sorcerer_king_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut surnommé[CHARACTER.Custom('FR_E')] le Sorcier-Roi car on le disait adonné à de sombres rituels dans les catacombes secrètes de [GetTitleByKey('c_korlea').GetBaseNameNoTier]."
  nick_the_repentent: "le Repentant"
  nick_the_repentent_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut surnommé[CHARACTER.Custom('FR_E')] 'le Repentant' à titre posthume, car ses actes aboutirent à la réunification de [bellakar|E] sous le [tumakveh|E]."
  nick_the_silver_crowned: "la Couronnée d'Argent"
  nick_the_silver_crowned_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était célèbre pour sa chevelure d'un blanc argenté."
  nick_arud_tumakveh: "Arud Tumakveh"
  nick_arud_tumakveh_desc: "Que l'on pourrait rendre par 'Tumakveh le Victorieux', ce titre, [CHARACTER.GetShortUINameNoTooltipNoFormat] se l'attribua après sa défaite du Katajan tedjin Batou Jochë et du Bulgan [GetScriptedCharacterByHistoryID( 'lineofsikentr0' ).GetFullName]. Universellement considéré[CHARACTER.Custom('FR_E')] comme le plus grand esprit militaire des [adunai|E] de son époque, son règne fut tenu pour un âge d'or de la splendeur et de la prospérité [bellakarean|E]. Sous son autorité régnait la paix, l'économie prospérait, ses ouvertures aux Adûnai d'[anbalkumagan|E] comme aux [balan_lai|E] furent accueillies favorablement, et ses émissaires auprès du [gondor|E] posèrent les fondements d'une coopération qui s'avérerait d'une importance vitale dans les années à venir."
  nick_imruphazgan: "Imruphazgân"
  nick_imruphazgan_desc: "Les victoires de [CHARACTER.GetShortUINameNoTooltipNoFormat] lors de la Campagne de Mardruak tiennent de la légende. Lorsque [bellakar|E] fut accablé[CHARACTER.Custom('FR_E')] par une rébellion sôriyane soutenue par Umbarnas, son père Narkuzîr [CHARACTER.Custom('FR_LeLa')] envoya vers le nord quérir l'aide du [gondor|E]. [CHARACTER.Custom('FR_IlElle')|U] gagna la faveur du Roi en prenant part à ses côtés à une campagne le long du Harnen, avant de rentrer au pays avec un soutien gondorien suffisant pour faire basculer le cours de la guerre. Le secours qu'[CHARACTER.Custom('FR_IlElle')|U] apporta au siège de Narîk-zadan lui valut l'épithète d'Imruphazgân, le Libérateur.\n\nSon propre règne fut tout aussi illustre : [CHARACTER.Custom('FR_IlElle')|U] fut le roi de Bellakar qui repoussa la Grande Armada, et dans ses vieux jours [CHARACTER.Custom('FR_IlElle')|U] repartit vers le nord pour combattre une nouvelle fois aux côtés du [gondor|E]."
  nick_an_arani: "an-Aranî"
  nick_an_arani_desc: "Pour résoudre le chaos provoqué par la tentative de réforme religieuse de son frère, le Prince [CHARACTER.GetFirstNameNoTooltip] arrangea leur double mariage avec les filles de la puissante famille an-Aranî d'Esmer, grande mécène du Culte d'Ishtra. Pragmatiques et politiquement avisées, nombre de ses décisions en tant que conseiller de son frère puis en tant que roi furent perçues par certains de ses sujets moins perspicaces comme servant directement les ambitions de sa belle-famille."
  nick_aruyati: "Aruyati"
  nick_aruyati_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut raillé[CHARACTER.Custom('FR_E')] du diminutif 'Aruyati' pour son impuissance présumée, n'ayant pu empêcher la sécession de Mardruak en faveur des Castamirioni durant la longue [kinstrife|E] du [gondor|E]."
  nick_the_impetuous: "l'Impétueux"
  nick_the_impetuous_desc: "Fils du premier roi de [bellakar|E], Ar-Zimrêbal 'Main de Fer', [CHARACTER.GetShortUINameNoTooltipNoFormat|U] ne prit jamais pour acquis sa succession au trône nouvellement établi de son père. Korlea, Balkuzôr et Ûrêzâyan se révoltèrent contre [CHARACTER.Custom('FR_LuiElle')], cherchant à ramener le pouvoir à la [baitha|E]. L'exécution du Bârunkhôr de Korlea à l'issue de la guerre fut jugée par beaucoup comme précipitée et impulsive, valant à [CHARACTER.GetShortUINameNoTooltipNoFormat|U] le douteux épithète de 'l'Impétueux' — et garantissant que nul n'osât plus jamais remettre en question son autorité."
  nick_the_golden_princess: "la Princesse Dorée"
  nick_the_golden_princess_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était l'unique enfant de son père Ar-Zimrukhôr de [bellakar|E] et, selon la loi en vigueur, son époux serait héritier du trône. Ce n'était pas que pour le pouvoir que des hommes de toutes contrées sollicitaient sa main, car elle était aussi dotée d'une beauté telle qu'on n'en voit qu'une fois dans une vie. Sa caractéristique la plus frappante était peut-être sa chevelure dorée, qu'elle refusa de couper tout au long de sa jeunesse. Au grand dam de beaucoup, elle finit par épouser son cousin au second degré Nîlûhîn, maintenant la succession au sein de la famille Tumakveh — bien que les bardes affirment qu'il s'agissait bel et bien d'un mariage d'amour, et non de seule politique."
  nick_the_eruist: "l'Êruiste"
  nick_the_eruist_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] passa une partie de sa jeunesse à [gondor|E], s'imprégnant des croyances et pratiques des [dunedain|E]. À son avènement sur le trône de [bellakar|E], [CHARACTER.Custom('FR_IlElle')|U] tenta d'y instaurer des réformes religieuses pour rapprocher son [southernkingdom|El]. En dépit de ses efforts pour amadouer les masses, [CHARACTER.Custom('FR_IlElle')] fut renversé[CHARACTER.Custom('FR_E')] au profit de son frère bien plus pragmatique, Artârik, sous la pression d'un soulèvement populaire."
  nick_sand_lord: "le Seigneur des Sables"
  nick_sand_lord_desc: "Ayant enfin pacifié la frontière désertique de [bellakar|E], [CHARACTER.GetShortUINameNoTooltipNoFormat] établit la domination de son royaume sur les terres occidentales de la Mer de Dunes."

  ### Cult of Saints ###
  nick_the_prophet_saint: "$nick_the_prophet$"                # Izindubêth Saint
  nick_the_prophet_saint_desc: "Izindubêth Imrathôr fut le plus grand des saints et le fondateur du [Glossary('Batân an-Izindi','batan_an_izindi_gloss')]. Durant l'hégémonie du Khatajate sur [bellakar|E], il appela à une croisade contre les envahisseurs Tedjin depuis son monastère fortifié d'Urud an-Khibil. Ses guerriers, connus sous le nom de Narduwî am-Batân, combattirent avec acharnement jusqu'à leur défaite finale, lorsque leur monastère fut pris d'assaut."
  nick_the_militant_saint: "le Militant"                     # Izindubêth Saint
  nick_the_militant_saint_desc: "Saint [CHARACTER.GetShortUINameNoTooltipNoFormat] était [Select_CString(CHARACTER.IsFemale, 'une sainte-épée vénérée', 'un saint-épée vénéré')], qui défendait la foi par ses lames et sa parole."
  nick_the_unbreakable_saint: "l'Indestructible"               # Izindubêth Saint
  nick_the_unbreakable_saint_desc: "La constitution de Saint [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] était légendaire. [CHARACTER.Custom('FR_IlElle')|U] demeura inébranlable[CHARACTER.Custom('FR_E')] dans sa foi quels que soient les maux qui l'affligeaient, et malgré toutes les épreuves vécut une longue vie bénie par [erutheone|E]."
  nick_the_wise_saint: "$nick_the_wise$"
  nick_the_wise_saint_desc: "Saint [CHARACTER.GetShortUINameNoTooltipNoFormat] était [Select_CString(CHARACTER.IsFemale, 'une théologienne et philosophe politique', 'un théologien et philosophe politique')] d'une vaste érudition. Ses écrits allaient fournir une grande part de l'impulsion à un sentiment croissant d'identité felayane entremêlant politique et religion, nourrissant la marche vers l'indépendance de facto de la région."
  nick_the_patron_of_pilgrims: "le Patron des Pèlerins"       # Izindubêth Saint
  nick_the_patron_of_pilgrims_desc: "Saint [CHARACTER.GetShortUINameNoTooltipNoFormat] était réputé[CHARACTER.Custom('FR_E')] pour avoir parcouru une grande partie de la [middleearth|E], contemplant les merveilles qu'[erutheone|E] avait créées et répandant la foi par le pèlerinage."
  nick_the_fasting_saint: "le Jeûneur"                       # Izindubêth Saint
  nick_the_fasting_saint_desc: "Saint [CHARACTER.GetShortUINameNoTooltipNoFormat] était [Select_CString(CHARACTER.IsFemale, 'une Izindubêth hautement vénérée', 'un Izindubêth hautement vénéré')] qui jeûnait durant de longues périodes. Vers la fin de sa vie, on dit de lui qu'il ne se nourrissait plus que de sa foi en [erutheone|E]."
  nick_the_anointed_saint: "$nick_the_anointed$"
  nick_the_anointed_saint_desc: "Saint [CHARACTER.GetShortUINameNoTooltipNoFormat] était [Select_CString(CHARACTER.IsFemale, 'une Premier Seigneur de Felaya d''une piété exceptionnelle', 'un Premier Seigneur de Felaya d''une piété exceptionnelle')]. Il consultait souvent les Izindubêth et fut l'un des rares souverains séculiers à jamais avoir été sanctifié."
  nick_the_reformer_tedjin: "le Réformateur"
  nick_the_reformer_tedjin_desc: "Saint [CHARACTER.GetShortUINameNoTooltipNoFormat] était [Select_CString(CHARACTER.IsFemale, 'une grande cheffe', 'un grand chef')] de la Confédération Tedjin. [CHARACTER.Custom('FR_IlElle')|U] réforma les coutumes de son peuple et fut sanctifié[CHARACTER.Custom('FR_E')] à titre posthume pour ses grandes œuvres."

  ### Thâni-Hazâd Nicknames ###
  nick_the_rebuilder_thani: "[CHARACTER.Custom('FR_LeLa')] Rebâtisseu[CHARACTER.Custom('FR_RSe')]"
  nick_the_rebuilder_thani_desc: "Les efforts de [CHARACTER.GetShortUINameNoTooltipNoFormat|U] permirent à [anbalkumagan|E] de se relever des pertes dévastatrices de la Grande Armada."
  nick_the_daring: "l'Audacieu[CHARACTER.Custom('FR_XSe')]"
  nick_the_resplendent: "[Select_CString(CHARACTER.IsFemale,'la Resplendissante','le Resplendissant')]"
  nick_the_mystic: "[CHARACTER.Custom('FR_LeLa')] Mystique"
  nick_the_mystic_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour accomplir d'étranges rituels afin de deviner sa prochaine décision."
  nick_the_fierce_adunaic: "[CHARACTER.Custom('FR_LeLa')] Farouche"
  nick_the_fierce_adunaic_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] tenta d'affirmer son autorité royale contre le Maréchal-tempête. [CHARACTER.Custom('FR_IlElle')|U] [CHARACTER.LocalPlayerString('avez été', 'fut')] peu couronné[CHARACTER.Custom('FR_E')] de succès, mais d'une ténacité remarquable."
  nick_the_storm_caller: "l'Invocat[CHARACTER.Custom('FR_EurRice')] de Tempêtes"
  nick_the_storm_caller_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une sorcière novice', 'un sorcier novice')], résolu[CHARACTER.Custom('FR_E')] à utiliser ses sombres pouvoirs pour conjurer orages et tonnerre. [CHARACTER.Custom('FR_IlElle')] finit par y parvenir — mais avait malheureusement négligé d'apprendre à contrôler la tempête ainsi invoquée. Les récits de ses exploits jouissaient d'une grande popularité parmi la jeunesse d'[anbalkumagan|E]."
  nick_the_witch_doctor_unique: "le Sorcier-Guérisseur"
  nick_the_witch_doctor_unique_desc: "Les légendes des Adena du Nord évoquent un chamane sage et puissant. On dit que ce 'Sorcier-Guérisseur' hante les profondeurs mêmes des marécages. Les habitants refusent cependant de révéler sa demeure aux seigneurs adûnaïques, et murmurent en secret le jour où ils seront libres de leurs maîtres oppressifs."
  nick_the_bandit_king_unique: "le Roi Brigand"
  nick_the_bandit_king_unique_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut poussé à agir par le funeste conseil qui fractura le [GetTitleByKey('k_pel').GetName], aidé et entravé en égale mesure par sa nature généreuse. [CHARACTER.Custom('FR_IlElle')|U] jura que son peuple connaîtrait la liberté de toute tyrannie, ou que [CHARACTER.Custom('FR_IlElle')] mourrait à la peine."
  nick_the_moonflower: "la Fleur de Lune"
  nick_the_moonflower_desc: "On disait que [CHARACTER.GetShortUINameNoTooltipNoFormat] fuyait la lumière du jour, ne quittant jamais ses appartements qu'à la faveur de la nuit."
  nick_the_intrigrant: "l'Intrigant"
  nick_the_intrigrant_desc: "Durant toute sa vie, [CHARACTER.GetShortUINameNoTooltipNoFormat] entretint une image publique honorable et généralement bienveillante. Ce n'est qu'après sa mort que des rumeurs commencèrent à circuler — sur son immense réseau d'espions, ses liens avec d'innombrables disparitions mystérieuses et d'autres machinations ténébreuses."
  nick_the_painter: "[CHARACTER.Custom('FR_LeLa')] Peintre"
  nick_the_painter_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une artiste', 'un artiste')] de réputation extraordinaire. Nombre de ses toiles étaient d'une incroyable minutie et chargées de symbolisme. Certaines de ses œuvres servirent de présents diplomatiques et ornent encore aujourd'hui les demeures familiales d'éminents membres du conseil des [balan_lai|E]."
  nick_the_contentious_thani: "[CHARACTER.Custom('FR_LeLa')] Controversé[CHARACTER.Custom('FR_E')]"
  nick_the_contentious_thani_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une érudite politique', 'un érudit politique')] de grand talent, surtout célèbre pour son traité 'Le Prince'. Rédigé comme un guide à l'intention des souverains khâradûnai aspirants, le texte décrit un style de gouvernement impitoyablement efficace et dépourvu de tout cérémonial et de toute subtilité — ce qui fit de [CHARACTER.Custom('FR_LuiElle')] une figure très controversée. Le sens profond de son œuvre, qu'il faille le prendre au pied de la lettre, comme une critique du système des [balan_lai|E] ou comme une satire des [anbalukkhori|E], était encore largement débattu à la fin du [thirdage|E]."
  nick_the_peoples_prince: "le Prince du Peuple"
  nick_the_peoples_prince_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] mit en œuvre plusieurs mesures accordant davantage de droits aux gens du commun d'Alsarias, accroissant considérablement sa popularité au prix d'une hostilité de l'aristocratie locale."
  nick_the_conqueror_thani: "le Conquérant"
  nick_the_conqueror_thani_desc: "Bien que [CHARACTER.GetShortUINameNoTooltipNoFormat] n'eût jamais conquis aucune terre étrangère, [CHARACTER.Custom('FR_IlElle')] [CHARACTER.LocalPlayerString('avez été', 'fut')] surnommé[CHARACTER.Custom('FR_E')] ainsi par sa cour avec humour, pour sa passion des jeux de stratégie."
  nick_the_poisoner_thani: "l'Araignée de Mispír"
  nick_the_poisoner_thani_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut soupçonné[CHARACTER.Custom('FR_E')] d'être le noble responsable de la mort suspecte d'Imrazôr II durant le Siège de Mispír. Après la fin de la guerre, [CHARACTER.Custom('FR_IlElle')] utilisa ses liens avec les nobles des [balan_lai|E] pour se faire proclamer à leur tête et accorder à ses héritiers la gouvernance de [GetTitleByKey('d_alsarias').GetName]."
  nick_the_stranded_unique: "l'Échoué[CHARACTER.Custom('FR_E')]"
  nick_the_stranded_unique_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une officière', 'un officier')] [numenorean|E] de marine chargé[CHARACTER.Custom('FR_E')] de ramener le tribut du Lointain Sud. Lors de la [downfall|E], [CHARACTER.Custom('FR_IlElle')] ravitaillait sa flotte à [GetTitleByKey('c_ayahopa').GetBaseNameNoTier], et ses derniers navires furent brûlés par des indigènes déchaînés dans le chaos qui s'ensuivit."
  nick_the_mountain_wright: "le Maître-d'Œuvre des Montagnes"
  nick_the_mountain_wright_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] tint bon contre des odds insurmontables, pendant des mois, acculé[CHARACTER.Custom('FR_E')] et seul, livrant un ultime combat désespéré contre les forces d'[anbalkumagan|E] dans la Bataille du Col Zairanak. Pour [CHARACTER.Custom('FR_LuiElle')], nul prix n'était trop élevé en vue de la victoire sur l'ennemi : [CHARACTER.Custom('FR_IlElle')] déclencha une avalanche depuis les hauteurs pour briser l'assaillant, détruisant son propre foyer dans le même élan. Pour cet exploit de force et de sacrifice, [CHARACTER.Custom('FR_IlElle')] fut dès lors surnommé[CHARACTER.Custom('FR_E')] 'le Maître-d'Œuvre des Montagnes'."
  nick_forest_bandit: "le Couteau"
  nick_forest_bandit_desc: "Après le meurtre cruel de sa mère, [CHARACTER.GetShortUINameNoTooltipNoFormat] abattit son père de la même façon tordue, puis disparut dans les basses terres boisées de Pel. Là, [CHARACTER.Custom('FR_IlElle')] ourdit sa vengeance contre ceux qui l'avaient blessé[CHARACTER.Custom('FR_E')] — à savoir, la famille [GetScriptedCharacterByHistoryID( 'lineofagathohin1' ).GetDynastyName]."

  ### Tanturak Nicknames ###
  nick_batan_an_zigur: "Izindubêth an-Zigûr"
  nick_batan_an_zigur_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une fervente adoratrice', 'un fervent adorateur')] de [sauroncharacter|E]. Cette dévotion [CHARACTER.Custom('FR_LeLa')] poussa à se rebeller contre l'Empire [numenorean|E] négligent et à établir un nouveau domaine à [GetTitleByKey('e_usakan').GetBaseNameNoTier] pour y répandre les enseignements glorieux de [sauroncharacter|E]."
  nick_the_abominable_tanturak: "l'Abominable"
  nick_the_abominable_tanturak_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était l'abominable, l'horrible, le terrible ; on pourrait proférer mille malédictions et elles ne suffiraient pas à décrire les atrocités de [CHARACTER.GetShortUINameNoTooltipNoFormat|U]. [CHARACTER.Custom('FR_IlElle')|U] fut séduit[CHARACTER.Custom('FR_E')] par les perversions du Tueur-d'Aube de Mûmakan dès son jeune âge, ce qui fit de [CHARACTER.Custom('FR_LuiElle')] un tueur brutal et sans remords, tristement célèbre pour des années à venir."
  nick_the_heathen_tanturak: "le Traître de Zigûr"
  nick_the_heathen_tanturak_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] tenta de convertir Tantûrak aux enseignements des [balan_lai|E]. Cela fut perçu comme dangereusement étranger par la population conservatrice de Tantûrak, qui se révolta et mit [CHARACTER.Custom('FR_LeLa')] à mort dans un glorieux déferlement de carnage."
  nick_the_scholar_tanturak: "[CHARACTER.Custom('FR_LeLa')] Savant[CHARACTER.Custom('FR_E')] de Zigûr"
  nick_the_scholar_tanturak_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une mystique et érudite', 'un mystique et érudit')] controversé[CHARACTER.Custom('FR_E')] à Tantûrak durant le début du Troisième Âge. [CHARACTER.Custom('FR_IlElle')|U] était obsédé[CHARACTER.Custom('FR_E')] par l'île maudite d'Ardinâk, et usa de son savoir et de son influence pour convaincre le roi de financer une grande expédition afin de percer ses secrets — qui s'acheva par la mort horrible de tous ses participants."
  nick_the_last_tanturak: "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')]"
  nick_the_last_tanturak_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était le dernier roi de Tantûrak. [Select_CString(CHARACTER.IsFemale, 'Une souveraine faible et avide', 'Un souverain faible et avide')] qui plongea le royaume dans la guerre civile par son usurpation du trône, ce qui mena à l'effondrement de Tantûrak après un soulèvement indigène."
  nick_the_crusher_tanturak: "le Victorieux"
  nick_the_crusher_tanturak_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] remporta une victoire décisive contre un vaste soulèvement d'esclaves parmi les hommes natifs d'Ûsakan. Par cette victoire, [CHARACTER.Custom('FR_IlElle')] s'établit[CHARACTER.Custom('FR_E')] la réputation d'un brillant commandant militaire et gagna le respect des nobles déloyaux de Tantûrak. [CHARACTER.GetShortUINameNoTooltipNoFormat|U] serait le dernier monarque à exercer une autorité centrale totale dans l'histoire tantûraki, car après sa mort les nobles déloyaux comploteraient contre ses héritiers."
  nick_the_loyal_tanturak: "[CHARACTER.Custom('FR_LeLa')] Fidèle"
  nick_the_loyal_tanturak_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une loyale compagne', 'un loyal compagnon')] d'Ar-Kinyârn et de ses héritiers, combattant à leurs côtés même après leur exil dans la jungle. À la suite de la reconquête de Tantûrak par Ar-Thônuzîr, [CHARACTER.Custom('FR_IlElle')] fut récompensé[CHARACTER.Custom('FR_E')] par la seigneurie de [GetTitleByKey('d_wariga').GetBaseNameNoTier] et fonda la grande cité de Dulgîsaibêth."

  ### Mag and Tûmag Nicknames ###
  nick_the_first_tamska: "la Fille de Namur"
  nick_the_first_tamska_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était la fille divine du Dieu du Ciel [namur|E], qui descendit en [middleearth|E] et devint la première [tamska|E] de [GetTitleByKey('k_tumag').GetBaseNameNoTier]. [GetTitleByKey('k_mag').GetBaseNameNoTier] aussi fut bientôt illuminé par sa gloire rayonnante, ce qui aboutit à la création de [GetTitleByKey('e_mag_tumag').GetBaseName].\n\nCertains prêtres ont émis l'hypothèse que son incarnation en forme mortelle fut la cause de la [downfall|E]."
  nick_firstfound_tamska: "la Première Trouvée"
  nick_firstfound_tamska_desc: "Lorsqu'il devint évident que la Tamska Dag Ema III mourrait sans héritière, la lignée directe de la Tamska Veryana était sur le point de s'éteindre. En prévision, le sacerdoce se réunit en Grand Conseil de [GetTitleByKey('c_ayahopa').GetBaseNameNoTier] et, après dix jours de délibération, proclama que la prochaine incarnation de la [tamska|E] pourrait naître parmi n'importe quel membre du peuple de Mag et Tûmag, car la Fille de [namur|E] n'était pas liée par les mêmes lois d'hérédité que les simples mortels.\n\nAprès plusieurs mois de recherche assidue, le conseil découvrit [CHARACTER.GetShortUINameNoTooltipNoFormat], qui allait s'élever pour devenir la première Tamska découverte de cette manière."
  nick_the_goddess_of_light: "la Déesse de Lumière"
  nick_the_goddess_of_light_desc: "Connue comme la Déesse de Lumière, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] transforma entièrement le paysage théologique par ses nombreux décrets et réformes, codifiant nombre de rituels administratifs et religieux, et faisant évoluer la foi d'une croyance populaire traditionnelle vers une vision du monde plus cosmopolite. Plus notablement, elle codicia le processus de désignation de la prochaine Tamska, confiant officiellement cette tâche à un conseil désormais dûment constitué de six anciens.\n\nTout au long du [thirdage|E], plusieurs mouvements revivalistes de ses enseignements virent le jour, souvent en réaction à des Tamskas peu populaires."
  nick_the_azure: "l'Azurée"
  nick_the_azure_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se présentait toujours revêtu[CHARACTER.Custom('FR_E')] d'extravagantes robes azurées en audience — une habitude qui engendra bientôt son épithète. Selon la légende, certaines nuances correspondaient à certaines humeurs, et les sages pétitionnaires ne sollicitaient le jugement de la [tamska|E] que les jours favorables, en fonction de la subtile nuance de ses manches."
  nick_mariner_tamska: "Régente des Vagues"
  nick_mariner_tamska_desc: "Ayant grandi comme fille de pêcheur, [CHARACTER.GetShortUINameNoTooltipNoFormat] ne perdit jamais son amour de la voile. Une grande part de son règne en tant que [tamska|E] fut consacrée à l'aventure en mer, à explorer les rivages de la [middleearth|E] tandis que son époux-régent administrait le royaume.\n\nDe nombreuses légendes sont contées de ses exploits, et notamment le récit de son combat contre l'Impératrice Miroitante, un grand [serpent|El] des mers qui dévastait la Baie de Mag. Les légendes racontent que lors de son dernier voyage, elle invoqua les pouvoirs de [namur|E] pour terrasser l'Impératrice dans une lutte divine, venant à bout de la menace écailleuse une fois pour toutes.\n\nMais cela fit d'elle la Tamska de la terre et de la mer par droit de conquête, et Namur lui présenta bientôt un ultimatum : renoncer à l'une, conserver l'autre. Elle choisit son peuple, et ne hissa plus jamais les voiles."
  nick_the_unworthy_tamska: "l'Indigne"
  nick_the_unworthy_tamska_desc: "Afin d'accroître ses chances de devenir [tamska|E], [CHARACTER.GetShortUINameNoTooltipNoFormat] assassina sa sœur peu avant la mort de sa mère. Lorsque la vérité éclata, [CHARACTER.Custom('FR_IlElle')] devint la première [tamska|E] de l'histoire à abdiquer, suscitant un âpre débat théologique. Sa doctrine assez radicale, qui stipulait que seuls les parents en ligne directe de la Tamska pouvaient lui succéder, aboutit finalement à la [valake_civil_war|E]."
  nick_the_crimson_tamska: "la Cramoisie"
  nick_the_crimson_tamska_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se proclama [tamska|E] après une tentative d'assassinat infructueuse sur la véritable Tamskangi, Ânjiru.\n\nLorsque les prêtres de [GetTitleByKey('c_korul').GetBaseNameNoTier] et nombre d'autres nobles refusèrent de confirmer son avènement et se rassemblèrent dans la cité-temple pour délibérer, elle ordonna à sa garde de massacrer le sacerdoce et de mettre la cité à sac. Cet événement fut connu sous le nom du Déluge de Kôrul, car le sang de ses ennemis coulait en cascade sur les marches de la grande pyramide jusqu'à la cité en contrebas, teintant le marbre de cramoisi."
  nick_the_winged_jackal: "le Chacal Ailé"
  nick_the_winged_jackal_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son épithète durant la [valake_civil_war|E], où [CHARACTER.Custom('FR_IlElle')] déploya de dévastatrices tactiques de harcèlement pour décimer les forces de la [tamska|E] Valake VII. On disait de [CHARACTER.Custom('FR_LuiElle')|U] qu'[CHARACTER.Custom('FR_IlElle')] bondissait d'un champ de bataille à l'autre en un clin d'œil, et des rapports contradictoires [CHARACTER.Custom('FR_LeLa')] décrivaient souvent à la tête d'assauts simultanés dans plusieurs régions."
  nick_the_strange_tamska: "la Brûlée-du-Soleil"
  nick_the_strange_tamska_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était passablement excentrique et, selon certains récits, quelque peu dérangé[CHARACTER.Custom('FR_E')]. Au lieu d'étudier pour devenir la prochaine [tamska|E] sous l'œil vigilant du conseil des anciens, [CHARACTER.Custom('FR_IlElle')] s'enfuit du temple peu après avoir été choisi[CHARACTER.Custom('FR_E')], mais fut repris[CHARACTER.Custom('FR_E')] peu après. [CHARACTER.Custom('FR_IlElle')|U] s'échappa ensuite cinq fois de plus, et fut retrouvé[CHARACTER.Custom('FR_E')] et ramené[CHARACTER.Custom('FR_E')] à chaque fois. Après sa septième tentative, [CHARACTER.Custom('FR_IlElle')] disparut, semblant s'être évanoui[CHARACTER.Custom('FR_E')] dans la nature. Les recherches durèrent sept ans, jusqu'à ce qu'[CHARACTER.Custom('FR_IlElle')] soit déclaré[CHARACTER.Custom('FR_E')] mort. Sept ans plus tard, alors que les anciens n'avaient pas encore trouvé de nouvel héritier, [CHARACTER.Custom('FR_IlElle')] revint soudainement, prétendant avoir parcouru le monde et vu 'un soleil dans une montagne', 'le trône des fils de [namur|E]' et 'la terre où dorment les rois de haute stature'."
  nick_the_perennial_tamska: "l'Éternelle"
  nick_the_perennial_tamska_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut la [tamska|E] ayant vécu le plus longtemps du [thirdage|E], réputée avoir reçu une bénédiction particulière de [namur|E]. Là où d'autres fleurs se fanaient, elle perdurait. Des siècles après sa disparition, son nom était encore invoqué pour la bonne santé par les peuples des Royaumes Jumeaux."
  nick_omgeg: "Omgeg" # Mag. Rhino
  nick_omgeg_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était d'une stature et d'une force prodigieuses. Ses passe-temps favoris étaient les tournois martiaux et les épreuves de force, et [CHARACTER.Custom('FR_IlElle')] fut surnommé[CHARACTER.Custom('FR_E')] Omgeg (mag. 'Rhinocéros') d'après l'animal sacré des plaines."
  nick_the_shivering_storm: "la Tempête Frémissante"
  nick_the_shivering_storm_desc: "La maîtrise du cimeterre de [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat|U] était sans égale parmi toutes les [tamska|E] de l'histoire. Selon la légende, [CHARACTER.Custom('FR_IlElle')] affûta ses talents dans les jungles de [GetTitleByKey('e_usakan').GetBaseNameNoTier], et ses doubles lames fendaient l'air lui-même lorsqu'[CHARACTER.Custom('FR_IlElle')] exécutait sa danse mortelle."
  nick_the_pedantic_tamska: "la Pédante"
  nick_the_pedantic_tamska_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] défendait avec ferveur le rituel de sa cour. Chaque cérémonie devait être accomplie scrupuleusement selon la tradition, et le sacerdoce était tenu à une exigence élevée. Le perfectionnisme dogmatique de la [tamska|E] [CHARACTER.Custom('FR_LeLa')] poussa à mener une vie pieuse — jugée ennuyeuse par certains."
  nick_the_wet_fish: "le Poisson Mort"
  nick_the_wet_fish_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était toujours fasciné[CHARACTER.Custom('FR_E')] par la mer, passant de longues heures à contempler sa surface envoûtante. L'origine du surnom 'le Poisson Mort' demeure inconnue, n'étant qu'une des nombreuses bizarreries qui l'entouraient."
  nick_the_liberator_tanturak: "le Libérateur d'Ûsakan"
  nick_the_liberator_tanturak_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] arracha héroïquement la liberté des Ûsakani réduits en esclavage par le fer et le sang, et chassa la gangrène des [adunai|E] du sud, s'assurant que leur héritage oppressif ne reviendrait jamais."
  nick_the_splendorous: "le Splendide"
  nick_the_splendorous_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] devint célèbre[CHARACTER.Custom('FR_E')] pour son règne des plus sereins et se vit accorder la vénération et le dévouement absolus de ses vassaux et serviteurs."

  ### Ray and Tulwang Nicknames ###
  nick_the_fierce_blade: "la Lame Ardente"
  nick_the_fierce_blade_desc: "Tenant de son père, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] [Select_CString(CHARACTER.IsFemale, 'une brillante lame', 'un brillant lame')], et rares sont ceux qui peuvent faire face à sa redoutable épée."
  nick_golden_nose: "Nez d'Or"
  nick_the_jaguar: "le Jaguar" #Gái Chief
  nick_the_young_inda: "le Jeune"
  nick_the_young_inda_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé $king_ray_male$ des $bozishnarud_collective_noun$ à l'âge de dix-sept ans. Les Régents espéraient qu'il se laisserait facilement guider par leurs conseils — ils se trompaient."
  nick_the_spurned_inda: "le Rejeté"
  nick_the_spurned_inda_desc: "Né héritier du plus éminent chef de [GetTitleByKey('k_raishoul').GetBaseNameNoTier], [CHARACTER.GetShortUINameNoTooltipNoFormat] fut déshérité par son père en raison de sa cruauté. Il s'enfuit vers l'est, vers le [GetTitleByKey('e_thon_an_kharlokh').GetBaseNameNoTier], et tomba profondément dans les services de [GetScriptedCharacterByHistoryID('nazgul5').GetFirstName], devenant l'un des plus grands et des plus terribles parmi les $faith_taimaraud_adherent_plural$."
  nick_the_herald_of_the_sun: "le Héraut du Soleil"
  nick_the_inquisitor: "l'Inquisiteur"
  nick_vatra_acolu: "Vâtra Acolû"
  nick_vatra_acolu_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se proclama [Glossary('Vâtra Acolû','vatra_acolu_gloss')]."
  nick_pon_gramazza: "Pôn Gramâzza"
  nick_pon_gramazza_desc: "Lorsque [CHARACTER.GetShortUINameNoTooltipNoFormat|U] usurpa le trône de [GetTitleByKey('k_ray').GetBaseNameNoTier] et anéantit la Dynastie Solaire, [CHARACTER.Custom('FR_IlElle')] proclama l'avènement de la dynastie du Serpent et se déclara [Glossary('Pôn Gramâzza','pon_gramazza_gloss')]."
  nick_the_flame_tender: "le Gardien de la Flamme"
  nick_storm_queller: "le Briseur de Tempêtes"
  nick_storm_queller_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour sa résistance à l'Ost-tempête, œuvrant à mettre fin à son emprise."
  nick_the_war_king: "le Roi de Guerre"
  nick_the_war_king_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fonda le royaume de Zajantak, assurant la pérennité du peuple [CHARACTER.GetCulture.GetNameNoTooltip]. Désormais, [CHARACTER.Custom('FR_IlElle')] [CHARACTER.LocalPlayerString('êtes', 'est')] prêt[CHARACTER.Custom('FR_E')] pour la guerre contre l'Ost-tempête."
  nick_the_widowless: "le Sans-Veuves"
  nick_the_widowless_desc: "Sur son lit de mort, [CHARACTER.GetShortUINameNoTooltipNoFormat] ordonna que toutes ses épouses soient tuées et enterrées à ses côtés — dernier acte d'un égoïsme sans pitié."
  nick_mokrysis: "Mokrysis"
  nick_mokrysis_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] choisit de dévier et de modifier considérablement le cours du fleuve Rysis afin d'accroître la [maresh_prosperity|E]. Nombre d'habitants affirment que cela irrita les esprits du fleuve, qui le maudirent de mauvaise fortune."
  nick_the_wayfinder: "le Chercheur de Voie"
  nick_the_wayfinder_desc: "Suivant une antique prophétie, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] marcha pendant dix mille jours sur la Route.\nToujours vigilant, traçant le Chemin de Gurzil à travers la Mer d'Étoiles en haut.\nToujours prudent, pour ne point éveiller Shâsmekh dans la Mer de Sable en bas.\nToujours cherchant la Mer de Sel au-delà.\nEnfin, il trouva une source limpide, s'y désaltéra, et vit que cela était juste. Il planta son bâton de voyageur dans la terre et érigea un sanctuaire de chemin. Ici, là où deux mers se rejoignaient, ses enfants se répandraient — et cette terre fut nommée Narak." #WIP Juke
  nick_two_skies: "Deux-Cieux"
  #nick_two_skies_desc: "" #WIP Juke
  nick_salt_king: "Salt-Tarb"
  nick_salt_king_desc: "Avec l'aide de ses alliés Jelut, les caravanes de [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] bravèrent [GetTitleByKey('e_dune_sea').GetNameNoTier|l] en grande partie sans encombre, lui permettant d'amasser une fortune colossale grâce au réseau de [trans_haradric_trade|E].\n\n[CHARACTER.Custom('FR_IlElle')|U] fut dit être la [Select_CString(CHARACTER.IsFemale, 'femme', 'homme')] la plus riche de tout [harad|E] en son temps — une rumeur qu'[CHARACTER.Custom('FR_IlElle')]-même entretenait, bien sûr."

  nick_west_conqueror: "le Conquérant de l'Ouest"
  nick_west_conqueror_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] s'éleva depuis ses humbles origines et bâtit le royaume de Mimita le long du fleuve Zaja, poussant vers l'ouest dans des terres plus prospères."
  nick_san_gatar: "sân Gatar"
  nick_san_gatar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une érudite influente', 'un érudit influent')], dont les travaux lui valurent l'épithète de $nick_san_gatar$, signifiant 'Fils de Gatara'. Son œuvre la plus importante est une vaste compilation de récits oraux de [legend_of_iunast|E] rassemblés depuis toute la [bayoftulwang|E], connue sous le nom de #bold Gatar-Azây#!. Selon la légende, Gatara le Voyant était le seul compagnon survivant d'Iunást, de qui toutes les versions du mythe sont issues."
  nick_sun_serpent: "le Serpent qui Terrassa le Soleil"
  nick_sun_serpent_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] renversa la dynastie Kanivâtra vieille de plusieurs siècles et l'ordre vâtraïste de [ray|e], établissant une nouvelle dynastie et arrachant son royaume à l'emprise de Khäz-gramaze par de sanglantes purges et une guerre civile."
  nick_second_herald: "le Second Héraut"
  nick_second_herald_desc: "Il y a des siècles, le premier Héraut du Soleil et fondateur de la maison Kanivâtra apporta l'Aûdarat Vâtra à [ray|e] et renversa le souverain Kât Polozây du royaume. Pour avoir repris et libéré [GetTitleByKey('k_ray').GetBaseNameNoTier] de l'emprise de Khäz-gramaze, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez été', 'a été')] surnommé[CHARACTER.Custom('FR_E')] le Second Héraut du Soleil par les adeptes de Vâtra."
  nick_iunast_two: "la Fierté d'Iunást"
  nick_iunast_two_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] libéra [ray|e] de l'emprise des tyrans au service des dieux malfaisants Khäz-gramaze et Vâtra, s'inscrivant ainsi dans la lignée de [legend_of_iunast|E]. Pour cet exploit, ses compagnons Kât-Polozây prirent l'habitude de [CHARACTER.Custom('FR_LeLa')] désigner du nom du sauveur de l'humanité."
  nick_moon_serpent: "le Serpent qui Terrassa la Lune"
  nick_moon_serpent_desc: "Marchant sur les traces de ses illustres ancêtres, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] anéantit le puissant royaume de [bellakar|e] au nom de Khäz-gramaze, soumettant cet ancien royaume jadis fier à ce qui s'annonce comme un règne de terreur et de sang."
  nick_avenging_sun: "le Soleil Vengeur"
  nick_avenging_sun_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] survécut à la chute des Kanivâtra et reprit son héritage sur leurs usurpateurs au service de Khäz-gramaze, acquérant une gloire légendaire ce faisant. Sous [CHARACTER.GetShortUINameNoTooltipNoFormat], le peu qui doutait encore du droit divin des Kanivâtra fut réduit au silence — le règne éternel de la lignée élue de Vâtra avait été restauré, même depuis la plus grande des chutes."

  ### Bay of Ormal Nicknames
  nick_last_apyrabande: "l'Apayrabande" #Eliminated last because Jangi doesn't know if he'll be the last or not
  nick_last_apyrabande_desc: "Né dans la vie de pirate, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] gravit les rangs jusqu'à devenir Capitaine du Mahin Sanglant, le dernier navire survivant des flottes jadis redoutées des Apayrabandâ. Chassé des havres de l'Archipel Méridional, [CHARACTER.Custom('FR_IlElle')] mènerait son équipage épuisé de retour vers la Baie d'Ormal que ses semblables terrorisaient autrefois, se lançant dans une dernière quête de trésor avant que le Soleil ne se couche définitivement sur les Apayrabandâ."
  nick_sikentr_great_and_terrible: "le Grand et le Terrible"
  nick_sikentr_great_and_terrible_desc: "Le plus redoutable conquérant mortel qu'ait jamais vu [harad|E], [CHARACTER.GetShortUINameNoTooltipNoFormat|U] mérita le droit d'être dit le Grand, et acquit la réputation d'être dit le #italic Terrible#!."
  nick_sword_of_yom: "l'Épée de Yóm"
  nick_sword_of_yom_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] libéré[CHARACTER.Custom('FR_E')] Sîrayn de l'oppression de la Déesse-Soleil Arien, gagnant ainsi la faveur du Chuchoteur de la Nuit, Yóm."
  nick_league_bender: "l'Inconvenant" # Formerly 'league bender', but no longer part of the league.
  nick_league_bender_desc: "L'adhésion sans vergogne de [CHARACTER.Custom('FR_du_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltip|U] aux libertés de la piraterie a débordé bien au-delà des bornes de la bienséance marchande — aussi avantageuse que soit la chose."
  nick_the_elder_posthumous: "l'Aîné"
  nick_the_elder_posthumous_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] la malchance de partager son nom avec un autre personnage notable, et est ainsi passé[CHARACTER.Custom('FR_E')] à l'histoire sous le nom de [CHARACTER.GetFirstName] #EMP $nick_the_elder_posthumous$#!"

  # Mumakan Nicknames
  nick_the_wise_matara: "[CHARACTER.Custom('FR_LeLa')] Sage"
  nick_the_wise_matara_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour sa délibération méticuleuse et sa clairvoyance, par lesquelles [CHARACTER.Custom('FR_IlElle')] mena $e_mumakan$ vers une ère de paix et de puissance.\n\n#Italic \"Tu manques encore d'imagination, petit frère. Pourquoi faut-il que l'un de nous gagne et l'autre perde ? Le monde n'est pas si étroitement gouverné par la dichotomie ; il existe d'innombrables possibilités où nous gagnons tous.\"#!"
  nick_iron_lion: "[Select_CString(CHARACTER.IsFemale,'la Lionne','le Lion')] de Fer"
  nick_iron_lion_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était dur[CHARACTER.Custom('FR_E')] dans toutes ses entreprises, aussi bien par nécessité que par éducation.\n\n#Italic \"Une main ferme, et une juste récompense — et une action sévère, si besoin est.\"#!"
  nick_lady_of_night: "la Dame de la Nuit"
  nick_lady_of_night_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était née d'une simple fille de taverne anonyme, au bas de l'échelle de la société lynérienne. Pourtant, par ses charmes et ses manœuvres, elle conquit pour elle-même une richesse et un pouvoir que son moi plus jeune aurait à peine osé rêver. Même aujourd'hui, cependant, sa basse naissance et ses humbles débuts lui valent encore moqueries et mépris."
  nick_shadow_queen: "la Reine Née dans l'Ombre"
  nick_shadow_queen_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] naquit dans les ombres de Lynéria pour une vie de tourments et d'exploitation. Pourtant, elle défia tout ce que sa naissance lui avait assigné : s'élevant de la condition de quasi-esclave à celle de la femme la plus puissante de l'histoire lynérienne et première souveraine absolue de l'ancienne ligue. Là où il n'y avait jadis qu'insultes et moqueries, il ne reste plus que louanges, car nul ne souhaite s'attirer les foudres d'une puissance si redoutable."
  nick_daughter_of_amba: "la Fille d'Amba"
  nick_daughter_of_amba_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] éleva le Royaume d'Ambasôn et se forgea un héritage de raids foudroyants et de riches butins, devenant l'une des pirates les plus redoutées des mers méridionales."

  ### Lossoth Nicknames ###
  nick_assistant_unique: "l'Assistant[CHARACTER.Custom('FR_E')]"
  nick_assistant_unique_desc: "Je ne suis pas Christina et je ne suis pas ton Assistant !"
  nick_the_whaler: "le Chasseur de Baleines"
  nick_the_whaler_desc: "Ayant passé l'essentiel de sa jeunesse sur la mer glacée du cap de [forochel|E], le désir de [CHARACTER.GetFirstNameNoTooltip] de terrasser la Terreur Blanche, une baleine colossale, lui valut ce surnom."
  nick_the_white_dread: "la Terreur Blanche"
  nick_the_white_dread_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] accompli un exploit longtemps tenu pour impossible : [CHARACTER.Custom('FR_IlElle')|U] a traqué et abattu la Terreur Blanche, une formidable baleine albinos, s'arrogeant son surnom."

  ### Event Nicknames ###
  nick_serpent_slayer: "[CHARACTER.Custom('FR_LeLa')] Tueu[CHARACTER.Custom('FR_RSe')] de Vers"
  nick_serpent_slayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour avoir abattu un [serpent|E] des mers de moindre espèce."
  nick_rhudaur_explorer: "l'Explorat[CHARACTER.Custom('FR_EurRice')] du Rhudaur"
  nick_rhudaur_explorer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] parcourut les collines silencieuses et les vallées de [rhudaur|E]."
  nick_troll_seeker: "[CHARACTER.Custom('FR_LeLa')] Chercheu[CHARACTER.Custom('FR_RSe')] de Trolls"
  nick_troll_seeker_desc: "Au cours de ses voyages, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] tomba sur de sauvages [trolls|E] des collines."
  nick_the_emancipator: "l'Émancipat[CHARACTER.Custom('FR_EurRice')]"
  nick_loremaster: "[CHARACTER.Custom('FR_LeLa')] Maîtr[CHARACTER.Custom('FR_EEsse')] du Savoir"
  nick_loremaster_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était célèbre[CHARACTER.Custom('FR_E')] dans les cercles savants pour sa vaste connaissance de la [middleearth|E] et de son histoire."
  nick_brightlordlady: "l'Éclatant[CHARACTER.Custom('FR_E')] [Select_CString(CHARACTER.IsFemale,'Dame','Seigneur')]"
  nick_brightlordlady_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se para du titre d'Éclatant[CHARACTER.Custom('FR_E')] [Select_CString(CHARACTER.IsFemale,'Dame','Seigneur')], en opposition directe à [sauronthedarklordcharacter|E]."
  nick_archivist: "l'Archiviste"
  nick_archivist_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était universellement réputé[CHARACTER.Custom('FR_E')] comme [Select_CString(CHARACTER.IsFemale,'une érudite', 'un érudit')] possédant de vastes archives du savoir antique des quatre coins de la [middleearth|E]."
  nick_the_mariner: "[CHARACTER.Custom('FR_LeLa')] Marin"
  nick_the_mariner_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] passa de longs moments en mer et excellait dans la navigation."
  nick_the_sailor: "[CHARACTER.Custom('FR_LeLa')] Matelot"
  nick_the_sailor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] aimait profondément la mer et ne dédaignait pas manœuvrer les cordages de ses propres mains."
  nick_the_corsair: "[CHARACTER.Custom('FR_LeLa')] Corsaire"
  nick_the_corsair_desc: "La vue de la flotte de [CHARACTER.GetShortUINameNoTooltipNoFormat|U] glaçait d'effroi les marins les plus aguerris. Le meilleur du butin lui revenait, cela va sans dire."
  nick_the_plunderer: "[Select_CString(CHARACTER.IsFemale,'la Pilleuse','le Pillard')]"
  nick_the_plunderer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] aime prendre, et prendre, et #italic prendre#! encore !"
  nick_doppelganger: "[CHARACTER.Custom('FR_LeLa')] Doppelgänger"
  nick_doppelganger_desc: "Il y a quelque chose d'étrange dans [CHARACTER.GetShortUINameNoTooltipNoFormat|U]..."

  ### Mountain Orc/ Goblin Nicknames (Scripted) ###
  nick_the_lesser: "[CHARACTER.Custom('FR_LeLa')] Moindre"
  nick_the_lesser_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut nommé[CHARACTER.Custom('FR_E')] d'après un souverain bien plus illustre — auquel [CHARACTER.Custom('FR_IlElle')] ne fut jamais à la hauteur."
  nick_the_reaper: "[CHARACTER.Custom('FR_LeLa')] Faucheu[CHARACTER.Custom('FR_RSe')]"
  nick_the_reconqueror: "[Select_CString(CHARACTER.IsFemale,'la Reconquérante','le Reconquérant')]"
  nick_the_first: "[Select_CString(CHARACTER.IsFemale,'la Première','le Premier')]"
  nick_the_first_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était le premier Ashdurbúk de [gundabad|E]. [CHARACTER.Custom('FR_IlElle')|U] était légendaire[CHARACTER.Custom('FR_E')] pour sa force, sa ruse et sa puissance. [CHARACTER.Custom('FR_IlElle')|U] fut le premier à revendiquer l'Úlukai pour [CHARACTER.Custom('FR_LuiElle')]-même."
  nick_the_scourge: "le Fléau"
  nick_the_wargrider: "le Chevaucheur de Warg"
  nick_the_wargrider_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était un roi des [goblins|E] du Mont Gram dans les [mistymountains|E]. Il mena une invasion [orcish|E] de la [shire|E], écrasée lors de la Bataille des Champs Verts.\n\nIl fut fameusement décapité par Bandobras Touc — sa tête roula dans un terrier de lapin à cent mètres de là, inventant prétendument le jeu de golf."
  nick_skullkeeper: "[CHARACTER.Custom('FR_LeLa')] Gardie[CHARACTER.Custom('FR_NNne')] de Crânes"
  nick_skullkeeper_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale, 'une reine', 'un roi')] [orcish|E] du Mont Gram. [CHARACTER.Custom('FR_IlElle')] collectionnait les crânes de ses ennemis et les empilait avec soin aux côtés de son trône, dans les profondeurs des [mistymountains|E] occidentales."
  nick_the_great_goblin: "le Grand Gobelin"
  nick_the_great_goblin_desc: "Le Grand [goblin|E] était un chef orque des [mistymountains|E]. Il régnait sur [GetTitleByKey('d_goblin_town').GetNameNoTier], près du Col Supérieur. Il commit l'erreur de capturer Thorin et sa Compagnie lors de leur quête vers [erebor|E], et dans la mêlée de leur évasion, fut mis à mort par [gandalfcharacter|E]."
  nick_the_frenzied_gob: "[CHARACTER.Custom('FR_LeLa')] Frénétique"
  nick_the_frenzied_gob_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] devint roi de [GetTitleByKey('d_goblin_town').GetNameNoTier] après la mort du Grand [goblin|E]. Ralliant de nouveau les bandes de pillards, [CHARACTER.Custom('FR_IlElle')] repoussa les tentatives de soumettre les Habitants-de-la-Ville et relança leurs raids sur le Col Supérieur et les basses terres. [CHARACTER.Custom('FR_IlElle')|U] était réputé[CHARACTER.Custom('FR_E')] être [Select_CString(CHARACTER.IsFemale,'une individue ambitieuse et avide','un individu ambitieux et avide')], cherchant sans cesse à étendre sa sphère d'influence."
  nick_the_shambler_gob: "[Select_CString(CHARACTER.IsFemale,'la Traîneuse','le Traîneur')]"
  nick_the_shambler_gob_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] murmure d'étranges choses dans le noir. Certains disent que le noir lui répond."
  nick_dwarfcutter: "Nain-Tranche"
  nick_dwarfcutter_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] réputé[CHARACTER.Custom('FR_E')] pour avoir tué bien des [dwarves|E], et en tuera vraisemblablement bien d'autres encore."
  nick_skullgnawer: "Ronge-Crânes"
  nick_skullgnawer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] acquit son surnom pour avoir rongé les crânes de ses ennemis tombés après chaque bataille — une habitude macabre qui répandait la terreur et nourrissait sa légende."
  nick_old_tooth_gob: "Vieille Dent"
  nick_old_tooth_gob_desc: "Parmi les [goblins|E], [CHARACTER.GetShortUINameNoTooltipNoFormat] était connu[CHARACTER.Custom('FR_E')] comme [Select_CString(CHARACTER.IsFemale,'une vieille guerrière avisée','un vieux guerrier avisé')]."
  nick_the_loud_gob: "la Grande Gueule"
  nick_the_loud_gob_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] est incapable de se taire, fracassant sans cesse de grossiers 'instruments' et hurlant sur ses subalternes."
  nick_ash_stump: "Moignon-de-Cendre"
  nick_ash_stump_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')], par une extraordinaire force de volonté, réussi à se brûler rituellement l'avant-bras jusqu'à l'os."
  nick_the_lucid_gob: "[CHARACTER.Custom('FR_LeLa')] Lucide"
  nick_the_lucid_gob_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] prétend avoir atteint une compréhension véritable du monde et de sa place en lui. Il débite sans cesse prédictions et prophéties, dont fort peu semblent jamais se réaliser."
  nick_sporelord: "Seigneur-des-Spores"
  nick_sporelord_desc: "Un épais brouillard de spores fongiques entoure en permanence [CHARACTER.GetShortUINameNoTooltipNoFormat], qui se plaît à expérimenter avec les nombreux champignons étranges poussant sous les [mistymountains|E]."
  nick_chasmfinder: "Découvreur-de-Gouffres"
  nick_chasmfinder_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] connaissait les profondeurs des [mistymountains|E] mieux que n'importe quel autre [goblins|E] et dénicha bien des recoins et crevasses cachés."
  nick_the_cloughless: "[CHARACTER.Custom('FR_LeLa')] Sans-Foyer"
  nick_the_cloughless_desc: "Brutalement écrasé[CHARACTER.Custom('FR_E')] par la rapide et impitoyable conquête de [GetScriptedCharacterByHistoryID('lineofazog10').GetFirstName] sur sa tribu, [CHARACTER.GetShortUINameNoTooltipNoFormat] se retrouva sans demeure."
  nick_the_blackguard_orc: "le Scélérat"
  nick_the_blackguard_orc_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ne se souciait ni des serments ni de la hiérarchie. Ses exploits brutaux [CHARACTER.Custom('FR_LeLa')] amenèrent à se tailler son propre domaine dans les marges de [gundabad|E]."
  nick_guldur_herald: "le Héraut de Dol Guldur"
  nick_guldur_herald_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fut envoyé par [sauronthedarklordcharacter|E] depuis [dolguldur|E] vers la Ville-des-Gobelins afin de 'motiver' les [goblins|E] des [mistymountains|E] à s'aligner."
  nick_the_soldier_orc: "le Soldat"
  nick_the_soldier_orc_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] n'était guère un penseur, mais il accomplissait sa tâche. Quel qu'en soit le prix."
  nick_the_faceless_gob: "[CHARACTER.Custom('FR_LeLa')] Sans-Visage"
  nick_the_faceless_gob_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale,'une combattante', 'un combattant')] redoutable[CHARACTER.Custom('FR_E')] et sans pitié, qui menait ses [goblins|E] avec férocité. Son visage avait été hideusement balafré par un [orc|E] bien plus grand — qui le paya de sa vie peu après."
  nick_the_wyrm_mad: "[CHARACTER.Custom('FR_LeLa')] Fol-des-Dracs"
  nick_the_wyrm_mad_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] nourrissait une étrange obsession pour les [dragons|E] qui hantaient les [greymountains|E]."
  nick_dragon_axe: "Hache-Dragon"
  nick_dragon_axe_desc: "La hache de guerre de [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat|U] ressemblait davantage à un Warg qu'à une hache — ce qui importait peu à ceux qui s'en trouvaient dans l'angle."
  nick_the_storm_eater: "le Mangeur-de-Tempête"
  nick_the_storm_eater_desc: "Durant un violent orage, [CHARACTER.GetShortUINameNoTooltipNoFormat] escalada les pics dominant le Gouffre-du-Tonnerre, où il 'avala un pic de foudre'."
  nick_ice_pick: "Pic-de-Glace"
  nick_ice_pick_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] est [Select_CString(CHARACTER.IsFemale,'une exilée','un exilé')] des terres de glace et de neige éternelles."
  nick_the_charred: "le Calciné"
  nick_the_charred_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] eut une rencontre intime avec un jeune drac et en réchappa pour le raconter."
  nick_the_blighted: "[CHARACTER.Custom('FR_LeLa')] Putréfié[CHARACTER.Custom('FR_E')]"
  nick_the_blighted_desc: "On disait de [CHARACTER.GetShortUINameNoTooltipNoFormat|U] qu'[CHARACTER.Custom('FR_IlElle')] était maudit[CHARACTER.Custom('FR_E')], sa chair se décomposant sur ses os au fil de son règne jusqu'à ce qu'il ressemblât à un cadavre. Sa cour mit deux jours à comprendre qu'il avait trépassé sur son trône."
  nick_stonehead: "Tête-de-Pierre"
  nick_the_cracked: "le Fêlé"
  nick_the_cutthroat_orc: "le Coupe-Gorge"
  nick_bateater: "Mange-Chauve-Souris"
  nick_bateater_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] développé un goût prononcé pour les grandes chauves-souris qui peuplent les profondeurs des [mistymountains|E]."
  nick_dwarfflayer: "Nain-Écorcheur" #juke note: not to be confused with [CharYourHerHis(CHARACTER)] weird cousin, the dwarf-layer
  nick_dwarfflayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] captura et tortura maints [dwarves|E] durant la [warofdwarvesandorcs|E], lui valant un épithète macabre."
  nick_the_outcast_mazog: "le Proscrit"
  nick_the_outcast_mazog_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se lassa du règne de son frère et tenta de s'emparer du pouvoir à [gundabad|E] par la force. Après son échec, il s'enfuit vers le sud, plus profondément dans les [mistymountains|E]. Là, il commença à rassembler une nouvelle armée dans l'intention de s'emparer de [moria|E], qu'il tenait pour son droit d'aînesse en tant qu'héritier de [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstName]."
  nick_the_knowing_orc: "l'Omniscient"
  nick_the_knowing_orc_desc: "L'ouïe de [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat|U] est impeccable. Des rumeurs circulent de ce fait selon lesquelles il serait omniscient."
  nick_rotback: "Dos-Pourri"
  nick_rotback_desc: "Malgré son imposante stature, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('êtes', 'est')] depuis longtemps raillé[CHARACTER.Custom('FR_E')] pour son physique."
  nick_brittlebrains: "Cerveau-Fragile"
  nick_brittlebrains_desc: "Une conversation avec un crapaud serait plus fructueuse."
  nick_the_despoiler: "le Dévastateur"
  nick_the_despoiler_desc: "Inspiré[CHARACTER.Custom('FR_E')] par l'épithète redoutable de [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstName] — ou peut-être en dérivant — [CHARACTER.GetShortUINameNoTooltipNoFormat] fut connu comme 'le Dévastateur' après sa victoire sur les royaumes septentrionaux des [men|E], des [dwarves|E] et des [elves|E]."
  nick_champion_of_dragons: "le Champion des Dragons"
  nick_champion_of_dragons_desc: "Convaincu[CHARACTER.Custom('FR_E')] d'avoir été choisi par les [dragons|E] de la Lande Desséchée et guidé par leur volonté, [CHARACTER.GetShortUINameNoTooltipNoFormat] chercha à soumettre les terres du Nord à son autorité."
  nick_whispering_one: "le Chuchoteur"
  nick_whispering_one_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était redouté[CHARACTER.Custom('FR_E')] parmi les [goblins|E] pour sa discrétion et sa ruse hors du commun."
  nick_greatest_goblin: "le Plus Grand des Gobelins"
  nick_greatest_goblin_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se proclama 'le Plus Grand de tous les [goblins|E]' — une affirmation que seuls ses partisans croyaient."
  nick_flameflinger: "le Lance-Flammes"
  nick_flameflinger_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour jeter des pots de poudre incendiaire sur ses ennemis, en mettant un grand nombre d'entre eux en feu."
  nick_darkseeker: "[Select_CString(CHARACTER.IsFemale,'Chercheuse','Chercheur')]-de-Ténèbres"
  nick_darkseeker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale,'une cultiste','un cultiste')] des Choses Profondes, convaincu[CHARACTER.Custom('FR_E')] d'être guidé[CHARACTER.Custom('FR_E')] par des voix venues des ombres les plus anciennes aux racines des [mistymountains|E]."
  nick_gate_warden: "[CHARACTER.Custom('FR_LeLa')] Gardie[CHARACTER.Custom('FR_NNne')] de la Porte"
  nick_gate_warden_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale,'une Gobeline d''une loyauté', 'un Gobelin d''une loyauté')] peu commune, chargé[CHARACTER.Custom('FR_E')] par [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstNameNicknamed] de monter la garde à la Porte Orientale de [khazaddum|E]."
  nick_book_keeper: "[CHARACTER.Custom('FR_LeLa')] Gardie[CHARACTER.Custom('FR_NNne')] des Livres"
  nick_book_keeper_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était une sorte d'intellectuel parmi ses congénères [goblins|E], et fut élevé par [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstNameNicknamed] lorsque celui-ci bâtit son royaume dans les salles de [khazaddum|E]."
  nick_the_scrapper: "le Bûcheur"
  nick_the_scrapper_desc: "Assidu pour un [goblin|E], [CHARACTER.GetShortUINameNoTooltipNoFormat] était connu[CHARACTER.Custom('FR_E')] pour passer la majeure partie de son temps dans les mines, supervisant et participant même en personne aux travaux de creusement."
  nick_spear_tosser: "Jeteur-de-Lances"
  nick_spear_tosser_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour combattre surtout à distance, gardant toujours sur [CHARACTER.Custom('FR_LuiElle')] un carquois plein de javelots et de lances pour harceler ses ennemis de loin."
  nick_hand_eater: "[CHARACTER.Custom('FR_LeLa')] Mange-Mains"
  nick_hand_eater_desc: "Grand glouton devant l'Éternel, [CHARACTER.GetShortUINameNoTooltipNoFormat] devint tristement célèbre parmi les [goblins|E] de [moria|E] pour avoir dévoré diverses parties du corps de ses ennemis tombés, développant à la longue une prédilection particulière pour les mains tranchées."
  nick_the_amicable: "l'Affable"
  nick_the_amicable_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était célèbre parmi les [goblins|E] de [moria|E] pour son étrange affabilité. À la longue, son 'amitié' donna bien lieu à bien des disparitions inexpliquées, il est vrai..."
  nick_peak_watcher: "[CHARACTER.Custom('FR_LeLa')] Guetteu[CHARACTER.Custom('FR_RSe')] des Cimes"
  nick_peak_watcher_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était réputé[CHARACTER.Custom('FR_E')] pour être [Select_CString(CHARACTER.IsFemale,'une âme assez solitaire','un être assez solitaire')], préférant passer son temps au sommet de l'un des pics orientaux des [mistymountains|E], veillant avec anxiété sur les terres qui s'étendent en contrebas."
  nick_the_menacing: "[CHARACTER.Custom('FR_LeLa')] Menaçant[CHARACTER.Custom('FR_E')]"
  nick_the_menacing_desc: "Un titre que [CHARACTER.GetShortUINameNoTooltipNoFormat] s'est lui-même octroyé, quand bien même la plupart de ses menaces se sont révélées fort creuses."
  nick_the_ponderer: "le Songeur"
  nick_the_ponderer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était assez taciturne pour un [goblin|E], ne parlant que lorsque c'était strictement nécessaire. La plupart de ses propos donnaient l'impression d'être profonds, mais à la réflexion se révélaient n'être que de vaines sornettes."
  nick_sirescourge: "Fléau-de-Géniteurs"
  nick_sirescourge_desc: "Lorsque [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstNameNicknamed] vint conquérir les [mistymountains|E], [CHARACTER.GetShortUINameNoTooltipNoFormat] saisit l'occasion de s'emparer du siège de son père et de gagner la faveur d'Azog en lui décapitant son père et en assassinant sa mère. Dès lors, son père et sa mère gisant morts, le nom de 'Fléau-de-Géniteurs' s'accrocha à [CHARACTER.Custom('FR_LuiElle')] comme du sang séché — redouté, chuchoté, et jamais oublié."
  nick_the_fishmonger: "le Poissonnier"
  nick_the_fishmonger_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] entama son ascension au pouvoir en vendant des poissons pêchés dans un bassin caché dans les profondeurs des [mistymountains|E], connu de lui seul. Le surnom lui colla à la peau même après être devenu un puissant chef de tribu [goblin|E]."
  nick_the_toll_collector: "le Péager"
  nick_the_toll_collector_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était le chef des [goblins|E] qui prirent le contrôle du Col Supérieur, exigeant une lourde rançon des voyageurs de passage."
  nick_great_goblin_lw: "le Grand Gobelin"
  nick_great_goblin_lw_desc: "Le titre de 'Grand Gobelin' était généralement détenu par le plus fort des [goblins|E] de [GetTitleByKey('d_goblin_town').GetNameNoTier], devenant le surnom attitré du chef des [orcs|E] dans les [mistymountains|E] centrales."
  nick_gutsmasher: "le Fracasse-Tripes"
  nick_gutsmasher_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat] était réputé[CHARACTER.Custom('FR_E')] pour exécuter ses ennemis en leur fracassant les entrailles."
  nick_the_snatcher: "le Chapardeur"
  nick_the_snatcher_desc: "Prenez garde ! [CHARACTER.GetShortUINameNoTooltipNoFormat] rôde peut-être derrière le prochain coin obscur, prêt à vous saisir..."
  nick_the_believer: "[CHARACTER.Custom('FR_LeLa')] Croyant[CHARACTER.Custom('FR_E')]"
  nick_the_believer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale,'une fervente adepte','un fervent adepte')] du Culte de l'Ulûkai, ne doutant pas un instant que la gemme des ténèbres pourrait un jour être retrouvée."
  nick_the_obliging: "[CHARACTER.Custom('FR_LeLa')] Complaisant[CHARACTER.Custom('FR_E')]"
  nick_the_obliging_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale,'presque courtoise','presque courtois')] — pour un[CHARACTER.Custom('FR_E')] [goblin|E] — attirant à sa cour une cohorte d'admirateurs."
  nick_frog_skin: "Peau-de-Grenouille"
  nick_frog_skin_desc: "Aucun doute là-dessus — [CHARACTER.GetShortUINameNoTooltipNoFormat] était repoussant[CHARACTER.Custom('FR_E')] à regarder, même pour un[CHARACTER.Custom('FR_E')] [goblin|E]."
  nick_the_survivor: "le Survivant"
  nick_the_survivor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était d'une remarquable résistance pour un[CHARACTER.Custom('FR_E')] [goblin|E], parvenant à s'élever au pouvoir contre toute attente au Mont Gram après la mort de Golfimbul, tombé lors d'un raid manqué sur la [shire|E]."
  nick_the_burrower: "le Fouisseur"
  nick_the_burrower_desc: "Dans les profondeurs des montagnes, la vie se déroule ordinairement loin du soleil. Mais même parmi les [goblins|E], certains aspirent à creuser plus profond encore que les racines les plus enfouies de la terre. [CHARACTER.GetShortUINameNoTooltipNoFormat] était l'un des plus passionnés en la matière."
  nick_the_ashen: "[CHARACTER.Custom('FR_LeLa')] Cendré[CHARACTER.Custom('FR_E')]"   #Ulkhash nickname
  nick_the_ashen_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale,'une légendaire seigneure de guerre', 'un légendaire seigneur de guerre')] [orcish|E], célèbre pour avoir utilisé une éruption volcanique active comme couverture afin de conquérir Mablâd-dûm sur les [blacklocks|E] au début du Troisième Âge."
  nick_the_sword_of_mordor: "l'Épée de Mordor"
  nick_the_sword_of_mordor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] comptait parmi les plus redoutables des Uruk-hai noirs de [mordor|E]. Peu pouvaient résister à sa lame."
  nick_granny_goblin: "Mémé Gobeline"
  nick_granny_goblin_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était plus vieille, plus sage, plus rusée et plus mauvaise que tous ceux qui l'entouraient."
  nick_the_gaoler: "le Geôlier"
  nick_the_gaoler_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] aime enfermer les prisonniers dans des endroits sombres."
  nick_firespeaker: "le Parleur du Feu"
  nick_firespeaker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était [Select_CString(CHARACTER.IsFemale,'une dévote adoratrice','un dévot adorateur')] de la Flamme des Ténèbres, le [balrog|E]."
  nick_the_merry_fellow: "l'Orque Jovial"
  nick_the_merry_fellow_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était l'orque le plus heureux de tout [moria|E]. Il était connu pour chanter le sourire aux lèvres tout en fouettant ses esclaves."
  nick_the_doorwarden: "le Gardien de la Porte"
  nick_the_doorwarden_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] était le gardien de la Porte Orientale de [moria|E]."
  nick_the_butcher_ym: "le Boucher"
  nick_the_butcher_ym_desc: "Nous avons tous nos secrets. Les siens se trouvent simplement enfouis au fond du lac."
  nick_the_big_ym: "le Grand"

  ### Orcs Nicknames ###
  nick_flamesworn:  "Voué-aux-Flammes"
  nick_flamesworn_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] défia les lois du sort et parvint à apaiser le [balrog|E] de [moria|E], établissant une coexistence paisible avec lui et prenant la tête du culte qui le vénère."
  nick_flame_of_moria:  "Flamme de la [moria|E]" # For slaying the Balrog as an Orc
  nick_flame_of_moria_desc:  "De façon éclatante, [CHARACTER.GetShortUINameNoTooltipNoFormat] abattit le [balrog|E] qui hantait les profondeurs de [moria|E]. De ce fait, on [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_LeLa'))] considère désormais comme l'incarnation de l'inconcevable puissance de la créature."
  nick_of_uz:  "d'Ûz"
  nick_of_uz_desc:  "Ûz était l'une des contrées mythologiques que le légendaire héros [haradrim|E] [GetScriptedCharacterByHistoryID('lineiunast1').GetFirstName] traversa. Elle n'est mentionnée brièvement que dans le contexte de la victoire de [CHARACTER.GetShortUINameNoTooltipNoFormat] sur le « Roi-des-Crêtes d'Ûz »."
  nick_blood_painter:  "le Peintre-de-Sang"
  nick_blood_painter_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] connu[CHARACTER.Custom('FR_E')] pour collecter avidement le sang de [CHARACTER.LocalPlayerString('vos', 'ses')] victimes et l'utiliser pour en peindre des portraits minutieux, avec une précision surprenante."
  nick_the_fervent:  "le Fervent"
  nick_the_fervent_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('étiez', 'était')] connu[CHARACTER.Custom('FR_E')] comme un fervent adepte du Culte des Ulúkai, ayant consacré de longs mois à une quête passionnée de la gemme des ténèbres."
  nick_the_pale_orc:  "l'Orque Pâle"
  nick_the_pale_orc_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] tristement célèbre parmi les [orcs|E] de [moria|E] pour [CHARACTER.LocalPlayerString('votre', 'sa')] brutalité et [CHARACTER.LocalPlayerString('vos', 'ses')] prouesses au combat. La simple rumeur de la présence de « l'Orque Pâle » sur le champ de bataille suffisait parfois à mettre en fuite les [goblins|E] couards de [moria|E]."
  nick_the_gourmet:  "le Gourmet"
  nick_the_gourmet_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] connu[CHARACTER.Custom('FR_E')] pour [CHARACTER.LocalPlayerString('vos', 'ses')] festins extravagants, où une quantité surprenante de mets exotiques était servie."
  nick_rusty_axe:  "Hache-Rouillée"
  nick_rusty_axe_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] connu[CHARACTER.Custom('FR_E')] pour manier toutes sortes d'armes rouillées, jetant chacune après la bataille, avec une préférence marquée pour les vieilles haches naines."
  nick_ash_skin:  "Peau-de-Cendre"
  nick_ash_skin_desc:  "La peau [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] n'est pas des plus agréables."
  nick_the_ashen_sage:  "le Sage des Cendres"
  nick_the_ashen_sage_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] plongé le regard dans le Cœur ardent d'Ulkhásh, et [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('déverserez', 'déversera')] [CHARACTER.LocalPlayerString('mon', 'son')] grand courroux sur tous."
  nick_red_eyes:  "Yeux-Rouges"
  nick_red_eyes_desc:  "Les yeux [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] brillent comme des rubis."
  nick_blood_eyes:  "Yeux-de-Sang"
  nick_blood_eyes_desc:  "La soif de sang [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] se lit jusque dans [CHARACTER.LocalPlayerString('vos', 'ses')] yeux."
  nick_fire_eyes:  "Yeux-de-Feu"
  nick_fire_eyes_desc:  "Les flammes du [mount_doom|E] brûlent dans les yeux [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_bag_head:  "Tête-de-Sac"
  nick_bag_head_desc:  "[CHARACTER.LocalPlayerString('Votre', 'Sa')] tête ressemble-t-elle à un sac, ou faudrait-il [CHARACTER.LocalPlayerString('vous', 'lui')] en faire porter un ?"
  nick_the_handsome_face:  "Beau-Visage"
  nick_the_handsome_face_desc:  "La physionomie [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] est assez agréable... si l'on plisse les yeux."
  nick_barrel_scraper:  "Racleur-de-Tonneau"
  nick_barrel_scraper_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('mangez', 'mange')] jusqu'au fond du tonneau, au grand dégoût de tous."
  nick_the_beast_slayer:  "Tueur-de-Bêtes"
  nick_the_beast_slayer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] une menace pour les créatures les plus sauvages."
  nick_the_beastmaster:  "Maître-des-Bêtes"
  nick_the_beastmaster_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] passé[CHARACTER.Custom('FR_E')] dans l'art de dompter les bêtes sauvages."
  nick_berserker_master:  "Maître des Berserkers"
  nick_berserker_master_desc:  "Les berserkers peuvent-ils seulement avoir un maître ? [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('semblez', 'semble')] le croire."
  nick_black_blade:  "Lame-Noire"
  nick_black_blade_desc:  "La lame [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] est aussi noire que la nuit."
  nick_black_heart:  "Cœur-Noir"
  nick_black_heart_desc:  "L'empathie est une notion étrangère à [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_black_thorn:  "Épine-Noire"
  nick_black_thorn_desc:  "En l'honneur de [CHARACTER.LocalPlayerString('votre', 'son')] épée ? Ou pour ce jour mémorable où les orties du [mordor|E] ont laissé leur marque ?"
  nick_blade_master:  "Maître-des-Lames"
  nick_blade_master_desc:  "Qu'il s'agisse de dagues, de couteaux ou d'épées plus affinées, les manier [CHARACTER.LocalPlayerString('vous', 'lui')] est aussi naturel que de respirer."
  nick_the_blacksmith:  "le Forgeron"
  nick_the_blacksmith_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('trouvez', 'trouve')] autant de plaisir à forger les armes qu'à s'en servir."
  nick_blood_licker:  "Lèche-Sang"
  nick_blood_licker_desc:  "Le sang de [CHARACTER.LocalPlayerString('vos', 'ses')] ennemis est une gâterie bienvenue pour [CHARACTER.GetShortUINameNoTooltipNoFormat] après chaque bataille."
  nick_blood_axe:  "Hache-de-Sang"
  nick_blood_axe_desc:  "La hache [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] est rouge comme le sang des Hommes... généralement parce qu'elle en est couverte."
  nick_blood_hand:  "Main-de-Sang"
  nick_blood_hand_desc:  "Noires ou rouges, les mains [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] dégoulinent généralement de ce liquide écarlate."
  nick_blood_lover:  "Amateur-de-Sang"
  nick_blood_lover_desc:  "Certains trouvent cela barbare ou étrange ; ils ne #italic saisissent#! tout simplement pas [CHARACTER.LocalPlayerString('votre', 'sa')] passion pour le sang."
  nick_blood_storm:  "Tempête-de-Sang"
  nick_blood_storm_desc:  "Quand [CHARACTER.GetShortUINameNoTooltipNoFormat|U] entre en bataille, les rivières et la pluie elle-même rougissent !"
  nick_the_bloody_cleaver:  "le Couperet Ensanglanté"
  nick_the_bloody_cleaver_desc:  "La lame [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] n'est jamais propre, surtout lorsque [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('mettez', 'met')] la main sur ceux jadis menacés."
  nick_bone_crusher:  "Brise-Os"
  nick_bone_crusher_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('adorez', 'adore')] le #italic craquement#! à chaque fois que [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('piétinez', 'piétine')] un ennemi."
  nick_bone_licker:  "Lèche-Os"
  nick_bone_licker_desc:  "En général, c'est après la bataille... mais [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('êtes', 'est')] aussi connu[CHARACTER.Custom('FR_E')] pour lécher les os pendant les combats."
  nick_bone_ripper:  "Arrache-Os"
  nick_bone_ripper_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] si fort[CHARACTER.Custom('FR_E')] que [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('pouvez', 'peut')] #italic arracher#! les os comme du papier."
  nick_bone_snapper:  "Casse-Os"
  nick_bone_snapper_desc:  "Pour [CHARACTER.GetShortUINameNoTooltipNoFormat], rien n'est aussi satisfaisant qu'un #italic craquement#! suivi d'un cri."
  nick_bow_master:  "Maître-de-l'Arc"
  nick_bow_master_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('adorez', 'adore')] voir [CHARACTER.LocalPlayerString('vos', 'ses')] flèches frapper leurs cibles."
  nick_brain_damaged:  "Cerveau Ramolli"
  nick_brain_damaged_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] le cerveau amoché pour avoir été lâché[CHARACTER.Custom('FR_E')] sur la tête étant enfant. Ou était-ce le coup de massue reçu un jour ?"
  nick_the_brawler:  "[CHARACTER.Custom('FR_LeLa')] Bagarreu[CHARACTER.Custom('FR_RSe')]"
  nick_the_brawler_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] connu[CHARACTER.Custom('FR_E')] pour [CHARACTER.LocalPlayerString('votre', 'son')] amour d'une bonne rixe comme il se doit, après avoir vidé un tonnelet de grog."
  nick_brawl_master:  "Maître-des-Rixes"
  nick_brawl_master_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] prêt[CHARACTER.Custom('FR_E')] pour une rixe, à toute heure, en tout lieu."
  nick_bright_eyes:  "Yeux-Brillants"
  nick_bright_eyes_desc:  "Les yeux [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] brillent dans l'obscurité comme des torches."
  nick_broken_shield:  "Bouclier-Brisé"
  nick_broken_shield_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('n\'avez', 'n\'a')] nul besoin d'un bouclier, et [CHARACTER.LocalPlayerString('jugez', 'juge')] insultant que l'on puisse le croire."
  nick_warg_tamer:  "Dompteur-de-Wargs"
  nick_warg_tamer_desc:  "Même les Wargs les plus féroces ne [CHARACTER.LocalPlayerString('vous', 'lui')] résistent pas."
  nick_cave_rat:  "Rat-des-Cavernes"
  nick_cave_rat_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] plus à [CHARACTER.LocalPlayerString('votre', 'son')] aise dans un terrier humide, loin du Soleil ardent."
  nick_chain_driver:  "Meneur-de-Chaînes"
  nick_chain_driver_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('n\'écrasez', 'n\'écrase')] pas [CHARACTER.LocalPlayerString('vos', 'ses')] ennemis et [CHARACTER.LocalPlayerString('n\'entendez', 'n\'entend')] pas leurs lamentations, mais [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('excellez', 'excelle')] à les mener à la chaîne."
  nick_the_cleaver:  "le Couperet"
  nick_the_cleaver_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('adorez', 'adore')] trancher et couper."
  nick_corpse_grinder:  "Broyeur-de-Cadavres"
  nick_corpse_grinder_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('adorez', 'adore')] affûter [CHARACTER.LocalPlayerString('vos', 'ses')] lames sur les os des cadavres. Il y a pire !"
  nick_corpse_eater:  "Mangeur-de-Cadavres"
  nick_corpse_eater_desc:  "Il se dit que les cadavres sont la friandise préférée de [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_dead_eye:  "Œil-Mort"
  nick_dead_eye_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('n\'avez', 'n\'a')] qu'un seul bon œil, mais cela n'empêche pas [CHARACTER.GetShortUINameNoTooltipNoFormat] de toucher sa cible à chaque fois."
  nick_dull_cleaver:  "le Couperet Émoussé"
  nick_dull_cleaver_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] n'[CHARACTER.LocalPlayerString('êtes', 'est')] peut-être pas aussi tranchant[CHARACTER.Custom('FR_E')] que d'autres, mais [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('savez', 'sait')] faire le travail quand il le faut."
  nick_death_blade:  "Lame-de-Mort"
  nick_death_blade_desc:  "Même les Hurleurs tremblent devant [CHARACTER.LocalPlayerString('votre', 'sa')] maîtrise de la lame. Du moins, c'est ce que [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('prétendez', 'prétend')], bien que les Nazgûl pourraient ne pas partager cet avis..."
  nick_the_drooler:  "le Baveux"
  nick_the_drooler_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('n\'avez pas', 'n\'a pas')] la meilleure hygiène."
  nick_the_dung_collector:  "Collecteur-de-Fumier"
  nick_the_dung_collector_desc:  "Quiconque a le cœur sensible ferait bien de rester loin, très loin de la chambre [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_dwarf_eater:  "Mangeur-de-Nains"
  nick_dwarf_eater_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] apprécie beaucoup le côté caoutchouteux des [dwarves|E]."
  nick_dwarf_slayer:  "Tueur-de-Nains"
  nick_dwarf_slayer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] honni[CHARACTER.Custom('FR_E')] de tous les [dwarves|E]."
  nick_eagle_eye:  "Œil-d'Aigle"
  nick_eagle_eye_desc:  "Nul détail n'échappe au regard [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] — toujours aux aguets, toujours prêt[CHARACTER.Custom('FR_E')] à frapper."
  nick_ear_collector:  "Collecteur-d'Oreilles"
  nick_ear_collector_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('aimez', 'aime')] collecter les oreilles de [CHARACTER.LocalPlayerString('vos', 'ses')] ennemis."
  nick_elf_eater:  "Mangeur-d'Elfes"
  nick_elf_eater_desc:  "La chair d'Elfe est une délicatesse pour [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_elf_slayer:  "Tueur-d'Elfes"
  nick_elf_slayer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] le fléau des [elves|E]."
  nick_evil_eye:  "Œil du Mal"
  nick_the_eye_gouger:  "Creveur-d'Yeux"
  nick_the_eye_gouger_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] comprend la bénédiction que représente la vue ; c'est pourquoi [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('commencez', 'commence')] toujours par les yeux."
  nick_fast_feet:  "Pieds-Rapides"
  nick_fast_feet_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] plus vif[CHARACTER.Custom('FR_E')] qu'un Warg."
  nick_fat_head:  "Grosse-Tête"
  nick_fat_head_desc:  "Le cerveau [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] n'est malheureusement pas aussi vaste qu'il n'y paraît."
  nick_the_fire_brander:  "[CHARACTER.Custom('FR_LeLa')]  Marqueu[CHARACTER.Custom('FR_RSe')]-au-Fer"
  nick_the_fire_brander_desc:  "Pourquoi tuer ses adversaires quand on peut les marquer pour l'éternité ?"
  nick_the_fire_eater:  "[CHARACTER.Custom('FR_LeLa')]  Mangeu[CHARACTER.Custom('FR_RSe')]-de-Feu"
  nick_the_fire_eater_desc:  "Pourquoi s'en servir pour cuire d'autres aliments, quand le feu lui-même devrait être la délicatesse !"
  nick_the_firelord:  "[CHARACTER.Custom('FR_LeLa')] Seigneur-du-Feu"
  nick_the_firelord_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] un[CHARACTER.Custom('FR_E')] maître des flammes, dont certains chuchotent qu'[Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('les maniez', 'les manie')] par une sombre magie."
  nick_the_flesh_glutton:  "[CHARACTER.Custom('FR_LeLa')] Goinfre-de-Chair"
  nick_the_flesh_glutton_desc:  "Oiseau, bête, et #italic surtout#! Homme ; tout n'est que délicatesse pour [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_flesh_picker:  "Gratteur-de-Chair"
  nick_flesh_picker_desc:  "Les os des ennemis [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] sont souvent rongés jusqu'à la moelle."
  nick_flesh_bringer:  "Pourvoyeur-de-Chair"
  nick_flesh_bringer_desc:  "Regardez ça ! Ce brave asticot nous a ramené de la chair fraîche ! Quoi ? Non, bien sûr que [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] n'en [CHARACTER.LocalPlayerString('aurez', 'aura')] pas !"
  nick_flesh_rot:  "Chair-Pourrie"
  nick_flesh_rot_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] n'[CHARACTER.LocalPlayerString('êtes', 'est')] pas consulté[CHARACTER.Custom('FR_E')] pour des conseils d'hygiène."
  nick_foul_spawn:  "Rejeton Immonde"
  nick_foul_spawn_desc:  "Bolg était le rejeton de [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstName], mais [CHARACTER.GetShortUINameNoTooltipNoFormat] est fort probablement le rejeton d'une flaque de boue quelque part !"
  nick_frog_blood:  "Sang-de-Grenouille"
  nick_frog_blood_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] assez verruqueux[CHARACTER.Custom('FR_E')] pour soulever quelques questions sur [CHARACTER.LocalPlayerString('vos', 'ses')] origines."
  nick_giggles:  "Ricaneur"
  nick_giggles_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('éclatez', 'éclate')] de rire à tout moment — que ce soit pour une bonne blague ou les cris de [CHARACTER.LocalPlayerString('vos', 'ses')] ennemis."
  nick_grim_cleaver:  "le Couperet Sinistre"
  nick_grim_cleaver_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] aussi froid[CHARACTER.Custom('FR_E')] et implacable que la lame que [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('portez', 'porte')]."
  nick_grog_burner:  "[CHARACTER.Custom('FR_LeLa')] Brûleu[CHARACTER.Custom('FR_RSe')]-de-Grog"
  nick_grog_burner_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('ne savez', 'ne sait')] pas ce que [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('préférez', 'préfère')] faire du grog — le boire ou le brûler ?"
  nick_the_guard_master:  "[Select_CString(CHARACTER.IsFemale,'Maîtresse','Maître')]-des-Gardes"
  nick_the_guard_master_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('imposez', 'impose')] une discipline de fer à toutes les gardes."
  nick_the_hacker:  "[Select_CString(CHARACTER.IsFemale,'la Charcutière','le Charcuteur')]"
  nick_the_hacker_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('adorez', 'adore')] tout réduire en lambeaux."
  nick_hobbit_eater:  "[CHARACTER.Custom('FR_LeLa')] Mangeu[CHARACTER.Custom('FR_RSe')]-de-Hobbits"
  nick_hobbit_eater_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] ne [CHARACTER.LocalPlayerString('trouvez', 'trouve')] rien de meilleur à grignoter qu'un [hobbit|E]."
  nick_hobbit_slayer:  "[CHARACTER.Custom('FR_LeLa')] Tueu[CHARACTER.Custom('FR_RSe')]-de-Hobbits"
  nick_hobbit_slayer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] le fléau des [hobbits|E]."
  nick_the_head_chopper:  "Tranche-Têtes"
  nick_the_head_chopper_desc:  "Celui-là se passe d'explication."
  nick_the_head_hunter:  "Chasseu[CHARACTER.Custom('FR_RSe')]-de-Têtes"
  nick_the_head_hunter_desc:  "Quand les autres [orcs|E] ont un problème, ils viennent trouver [CHARACTER.GetShortUINameNoTooltipNoFormat] pour une bonne solution."
  nick_the_head_eater:  "Mangeu[CHARACTER.Custom('FR_RSe')]-de-Têtes"
  nick_the_head_eater_desc:  "Les autres [orcs|E] ne sont pas aussi difficiles que [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('l\'êtes', 'l\'est')]."
  nick_the_heart_eater:  "Mangeu[CHARACTER.Custom('FR_RSe')]-de-Cœurs"
  nick_the_heart_eater_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] atteint tout juste la dose de viande recommandée à chaque repas — mais le sang, lui, ne manque jamais."
  nick_hide_skinner:  "Dépeceu[CHARACTER.Custom('FR_RSe')]-de-Peaux"
  nick_the_hide_skinner_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('prenez', 'prend')] le plus grand plaisir après la chasse."
  nick_horn_blower:  "Souffleu[CHARACTER.Custom('FR_RSe')]-de-Cor"
  nick_horn_blower_desc:  "Le seul qui souffle dans un cor plus souvent que [CHARACTER.GetShortUINameNoTooltipNoFormat], c'est Boromir !"
  nick_hot_tongs:  "Tenailles-Brûlantes"
  nick_hot_tongs_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('adorez', 'adore')] laisser des souvenirs cuisants sur les corps de [CHARACTER.LocalPlayerString('vos', 'ses')] victimes."
  nick_hot_tongue:  "Langue-de-Feu"
  nick_hot_tongue_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] se décrit avant tout comme une grande gueule."
  nick_hot_head:  "Tête-Brûlée"
  nick_hot_head_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('foncez', 'fonce')] le plus souvent tête baissée sans réfléchir."
  nick_jaws:  "Mâchoires"
  nick_jaws_desc:  "Prâk ! Prâk ! Prâk ! Attendez, ce n'est pas le bon [orc|E]."
  nick_jitters:  "Tremblotant[CHARACTER.Custom('FR_E')]"
  nick_jitters_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] souvent des frissons — même à se baigner dans l'eau chaude, ou le sang !"
  nick_boss_slayer:  "Tueu[CHARACTER.Custom('FR_RSe')]-de-Chef"
  nick_boss_slayer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez tué', 'a tué')] [CHARACTER.LocalPlayerString('votre', 'son')] chef, et ce grand et terrible acte restera à jamais gravé dans les mémoires."
  nick_king_slayer:  "Tueu[CHARACTER.Custom('FR_RSe')]-de-Roi"
  nick_king_slayer_desc:  "Non, [CHARACTER.LocalPlayerString('votre', 'ses')] cheveux ne sont ni bouclés ni dorés comme de l'or battu, mais le travail a été fait quand même !"
  nick_the_knifer:  "[CHARACTER.Custom('FR_LeLa')] Lardeur"
  nick_the_knifer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('tailladez', 'taillade')] et éventre quiconque se met en travers de [CHARACTER.LocalPlayerString('votre', 'son')] chemin."
  nick_the_scribe:  "[CHARACTER.Custom('FR_LeLa')] Scribe"
  nick_the_scribe_desc:  "Qui a dit que les [orcs|E] ne savaient pas lire ?"
  nick_the_learned:  "[CHARACTER.Custom('FR_LeLa')] Lettré[CHARACTER.Custom('FR_E')]"
  nick_the_learned_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] versé[CHARACTER.Custom('FR_E')] en bien des domaines, même si la plupart ont trait au meurtre et à la mort."
  nick_lice_head:  "Tête-à-Poux"
  nick_lice_head_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] devrait [CHARACTER.LocalPlayerString('essayer', 'essayer')] de [CHARACTER.LocalPlayerString('vous peigner', 'se peigner')] de temps à autre. Après tout, les poux, c'est des protéines !"
  nick_life_drinker:  "Buveur-de-Vie"
  nick_life_drinker_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] une propension marquée à boire le sang de [CHARACTER.LocalPlayerString('vos', 'ses')] ennemis."
  nick_limp_leg:  "Patte-Boiteuse"
  nick_limp_leg_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('marchez', 'marche')] avec une claudication permanente."
  nick_lock_jaw:  "Mâchoire-Serrée"
  nick_lock_jaw_desc:  "Clac ! Clac ! Voilà comment se déroulent la plupart des rencontres avec [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_long_tooth:  "Longue-Croc"
  nick_long_tooth_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] une croc à faire pâlir un Warg."
  nick_lump_head:  "Bosse-au-Crâne"
  nick_lump_head_desc:  "[Select_CString(CHARACTER.IsLocalPlayer, 'Vous', CHARACTER.Custom('FR_IlElle')|U)] [CHARACTER.LocalPlayerString('devriez', 'devrait')] peut-être faire examiner ça."
  nick_mad_eye:  "Œil-Fou"
  nick_mad_eye_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] un regard particulièrement dérangé dans l'un de [CHARACTER.LocalPlayerString('vos', 'ses')] yeux."
  nick_maggot_nest:  "Nid-à-Asticots"
  nick_maggot_nest_desc:  "Un [orc|E] a sûrement inventé le savon quelque part ? Utilise-le, pour le bien de tous !"
  nick_man_eater:  "Mangeu[CHARACTER.Custom('FR_RSe')]-d'Hommes"
  nick_man_eater_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] un penchant particulier pour la chair humaine."
  nick_man_slayer:  "Tueu[CHARACTER.Custom('FR_RSe')]-d'Hommes"
  nick_man_slayer_desc:  "Les Hommes maudissent le nom que porte [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_meat_hooks:  "Crochets-à-Viande"
  nick_meat_hooks_desc:  "On peut se débattre, mais ça va faire mal !"
  nick_meat_beater:  "[Select_CString(CHARACTER.IsFemale,'Batteuse','Batteur')]-de-Chair"
  nick_meat_beater_desc:  "Bon. Vous voyez."
  nick_metal_beater:  "[Select_CString(CHARACTER.IsFemale,'Batteuse','Batteur')]-de-Métal"
  nick_metal_beater_desc:  "Les Orques sont habiles à forger des outils, et [CHARACTER.GetShortUINameNoTooltipNoFormat] ne fait pas exception !"
  nick_neck_snapper:  "Brise-Nuques"
  nick_neck_snapper_desc:  "Pour [CHARACTER.GetShortUINameNoTooltipNoFormat|U], briser les nuques est aussi naturel que de respirer."
  nick_the_new_cleaver:  "le Nouveau Couperet"
  nick_the_new_cleaver_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('taillez', 'taille')] aussi profond et aussi net que le précédent."
  nick_night_bringer:  "Porteu[CHARACTER.Custom('FR_RSe')]-de-Nuit"
  nick_night_bringer_desc:  "Car la nuit est sombre et pleine de terreurs..."
  nick_the_oath_breaker:  "le Parjure"
  nick_the_oath_breaker_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('ne voyez', 'ne voit')] vraiment pas l'intérêt de tenir [CHARACTER.LocalPlayerString('votre', 'sa')] parole."
  nick_pain_lover:  "Amateur-de-Souffrance"
  nick_pain_lover_desc:  "Allez-y, faites de votre mieux !"
  nick_pit_fighter:  "Combattant[CHARACTER.Custom('FR_E')]-des-Fosses"
  nick_pit_fighter_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('officiez', 'officie')] dans les fosses de combat souterraines et clandestines du [mordor|E]."
  nick_plague_bringer:  "Porteu[CHARACTER.Custom('FR_RSe')]-de-Peste"
  nick_plague_bringer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] #italic adore#! parler de [CHARACTER.LocalPlayerString('votre', 'son')] grand-père, sans raison apparente."
  nick_pot_licker:  "Lèche-Marmite"
  nick_pot_licker_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('mangez', 'mange')] jusqu'au fond de la marmite, au grand dégoût de tous."
  nick_prison_master:  "[Select_CString(CHARACTER.IsFemale,'Maîtresse','Maître')]-des-Geôles"
  nick_prison_master_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] prompt[CHARACTER.Custom('FR_E')] du fouet !"
  nick_quarter_master:  "Intendant[CHARACTER.Custom('FR_E')]"
  nick_quarter_master_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] étonnamment organisé[CHARACTER.Custom('FR_E')] pour un [orc|E]. À moins que [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('sachiez', 'sache')] aussi découper les gens en quatre."
  nick_quick_blades:  "Lames-Vives"
  nick_quick_blades_desc:  "Clip ! Clap ! [CHARACTER.GetShortUINameNoTooltipNoFormat|U] ferait un excellent barbier."
  nick_rabble_rouser:  "Meneur-de-Racailles"
  nick_rabble_rouser_desc:  "Même le plus crasseux des snagas enfilerait un casque et empoignerait une lance pour [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_rage_mind:  "Esprit-Furieux"
  nick_rage_mind_desc:  "Quand [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('entrez', 'entre')] en rage, certains [orcs|E] disent qu'[Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('virez', 'vire')] au vert."
  nick_raid_leader:  "Meneur-de-Raid"
  nick_raid_leader_desc:  "Répandez leurs tripes puantes ! Quiconque m'amènera le seigneur de cette ville pestilentielle aura le droit de garder [CHARACTER.LocalPlayerString('votre', 'sa')] tête pestilentielle !"
  nick_ranger_killer:  "Tueu[CHARACTER.Custom('FR_RSe')]-de-Rôdeurs"
  nick_ranger_killer_desc:  "Du nord au sud, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('êtes', 'est')] un[CHARACTER.Custom('FR_E')] tueur hors pair de ces Tarks à la face blême qui rampent sur le ventre !"
  nick_the_ravager:  "le Ravageur"
  nick_the_ravager_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('adorez', 'adore')] briser et piller, encore plus que la plupart des [orcs|E]."
  nick_raw_head:  "Tête-Crue"
  nick_raw_head_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] une tête qui ressemble à un morceau de viande fraîche."
  nick_rock_crusher:  "Brise-Rocs"
  nick_rock_crusher_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('pouvez', 'peut')] briser des pierres à mains nues."
  nick_runny_bowels:  "Ventre-Coulant"
  nick_runny_bowels_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] tendance à laisser une traînée derrière [CHARACTER.LocalPlayerString('vous', 'lui')]."
  nick_the_rusted_cleaver:  "le Couperet Rouillé"
  nick_the_rusted_cleaver_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U], vieux[CHARACTER.Custom('FR_E')] et corrodé[CHARACTER.Custom('FR_E')], [CHARACTER.LocalPlayerString('savez', 'sait')] encore éventrer ceux qui [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_LuiElle'))] cherchent des noises."
  nick_sawbones:  "Scie-Boyaux"
  nick_sawbones_desc:  "Surnommé[CHARACTER.Custom('FR_E')] Scie-Boyaux par les [orcs|E] en raison de [CHARACTER.LocalPlayerString('votre', 'son')] goût prononcé pour l'amputation, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('avez', 'a')] rejoint cet ordre vénérable de bouchers et d'amputateurs."
  nick_scar_artist:  "Artiste-des-Cicatrices"
  nick_scar_artist_desc:  "Certains [orcs|E] aiment les cicatrices, pour montrer leur endurance. [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('êtes', 'est')] bien plus habile à les infliger."
  nick_the_shaman:  "[CHARACTER.Custom('FR_LeLa')] Chaman"
  nick_the_shaman_desc:  "Même les [orcs|E] ont besoin d'un peu de spiritualité, et [CHARACTER.GetShortUINameNoTooltipNoFormat] la leur offre — sous forme de rituels cruels de sang, de chair et de viscères."
  nick_shield_master:  "Maître-des-Boucliers"
  nick_shield_master_desc:  "Même un marteau [dwarven|E] ne pourrait rompre les rangs des porte-boucliers que [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('avez', 'a')] entraînés."
  nick_skin_flayer:  "Écorcheur-de-Peaux"
  nick_skin_flayer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('trouvez', 'trouve')] souvent de nouveaux vêtements de nulle part. Personne ne pose jamais la question."
  nick_skull_collector:  "Collecteur-de-Crânes"
  nick_skull_collector_desc:  "Les crânes d'oiseaux, d'animaux et de lézards [CHARACTER.LocalPlayerString('vous', 'l\'')]intéressent tous, mais [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('avez', 'a')] une préférence marquée pour ceux des Hommes."
  nick_skull_cracker:  "Brise-Crânes"
  nick_skull_cracker_desc:  "...Pratiquer une incision dans le crâne, d'environ la largeur d'une tête de marteau, puis commencer à forer..."
  nick_skull_splitter:  "Fend-Crânes"
  nick_skull_splitter_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('avez', 'a')] parfois la main un peu trop lourde avec un ciseau."
  nick_the_slasher:  "[CHARACTER.Custom('FR_LeLa')] Tailleu[CHARACTER.Custom('FR_RSe')]"
  nick_the_slasher_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('donnez', 'donne')] tout à ceux qu'[Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('jugez', 'juge')] méritants."
  nick_slashface:  "Gueule-Balafréee"
  nick_slashface_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] le visage couvert de cicatrices."
  nick_slave_taskmaster:  "Contremaître-aux-Esclaves"
  nick_slave_taskmaster_desc:  "'Là où claque le fouet, la volonté suit, mes limaces !'"
  nick_the_slaver:  "le Négrier"
  nick_the_slaver_desc:  "On [CHARACTER.LocalPlayerString('vous', 'le')] voit rarement sans fouet en main."
  nick_slave_lover:  "Amateur-d'Esclaves"
  nick_slave_lover_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('adorez', 'adore')] réduire les hommes libres en esclavage, et les faire souffrir."
  nick_spear_master:  "Maître-de-Lance"
  nick_spear_master_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('embrochez', 'embroche')] les Tarks avec les meilleurs d'entre eux !"
  nick_storm_bringer:  "Porteur-de-Tempête"
  nick_storm_bringer_desc:  "Le Thôn an-Khârlôkh ne [CHARACTER.LocalPlayerString('me', 'lui')] arrive pas à la cheville !"
  nick_sword_master:  "Maître-des-Épées"
  nick_sword_master_desc:  "Seuls les plus habiles des [freepeople|E] peuvent rivaliser avec [CHARACTER.GetShortUINameNoTooltipNoFormat] dans la maîtrise de la lame."
  nick_the_taskmaster:  "[CHARACTER.Custom('FR_LeLa')] Contremaître"
  nick_the_taskmaster_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('savez', 'sait')] mettre au travail n'importe quelle bande de snagas indisciplinés."
  nick_the_advisor:  "[Select_CString(CHARACTER.IsFemale,'la Conseillère','le Conseiller')]"
  nick_the_advisor_desc:  "Il est dit : « N'allez point quérir conseil auprès des [orcs|E], car ils vous dévoreront le visage. »"
  nick_the_all_eater:  "[CHARACTER.Custom('FR_LeLa')] Mangeu[CHARACTER.Custom('FR_RSe')]-de-Tout"
  nick_the_all_eater_desc:  "Du plus humble morceau de restes au plus grand festin de rois, [CHARACTER.GetShortUINameNoTooltipNoFormat] mangera n'importe quoi... et n'importe qui."
  nick_the_amputator:  "l'Amputateur"
  nick_the_amputator_desc:  "Que ce soit sur le champ de bataille ou sur la table d'opération, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('êtes', 'est')] habile du couteau !"
  nick_the_angry:  "[CHARACTER.Custom('FR_LeLa')] Furieu[CHARACTER.Custom('FR_XSe')]"
  nick_the_angry_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] encore plus en rage que la plupart des Orques !"
  nick_the_armorer:  "l'[Select_CString(CHARACTER.IsFemale,'Armurière','Armurier')]"
  nick_the_armorer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('forgez', 'forge')] des armures qui feraient pâlir d'envie même les [dwarves|E] !"
  nick_the_assassin:  "l'Assassin"
  nick_the_assassin_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] de nombreuses façons de tuer, toutes sournoises et silencieuses."
  nick_the_battle_hardened:  "l'Aguerri[CHARACTER.Custom('FR_E')]"
  nick_the_battle_hardened_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] livré bien des combats, et en livrera bien d'autres encore."
  nick_the_beggar:  "[CHARACTER.Custom('FR_LeLa')] Mendiant[CHARACTER.Custom('FR_E')]"
  nick_the_beggar_desc:  "Petits travaux contre pièces ! Le meurtre, lui, est gratuit."
  nick_the_beheader:  "le Décapiteur"
  nick_the_beheader_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] une propension à prendre la tête de [CHARACTER.LocalPlayerString('vos', 'ses')] victimes."
  nick_the_biter:  "[CHARACTER.Custom('FR_LeLa')] Mordeu[CHARACTER.Custom('FR_RSe')]"
  nick_the_biter_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez', 'a')] une mâchoire plus puissante que celle d'un Warg, et [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('en usez', 'en use')] bien plus souvent !"
  nick_the_bleeder:  "[CHARACTER.Custom('FR_LeLa')] Saigneur"
  nick_the_bleeder_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('aimez', 'aime')] les regarder mourir lentement."
  nick_the_bloated:  "[CHARACTER.Custom('FR_LeLa')] Bouffi[CHARACTER.Custom('FR_E')]"
  nick_the_bloated_desc:  "C'est un miracle que [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('puissiez', 'puisse')] seulement se déplacer."
  nick_the_bone_collector:  "le Collecteur-d'Os"
  nick_the_bone_collector_desc:  "Crânes, doigts, mains... [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('possédez', 'possède')] même quelques bassins."
  nick_the_breaker:  "le Briseur"
  nick_the_breaker_desc:  "Tables, murs, individus ; peu de choses résistent à [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_the_brewer:  "le Brasseur"
  nick_the_brewer_desc:  "Les [orcs|E] aiment le grog, les brasses et les alcools, tant pour se soigner que pour s'amuser — [CHARACTER.GetShortUINameNoTooltipNoFormat] est le meilleur pour en préparer."
  nick_the_brother:  "le Frère"
  nick_the_brother_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] un frère dévoué et affectueux — ils ont le droit de mourir vite, pas lentement."
  #nick_the_champio:  "the Champion" exists, and is misspelled
  nick_the_choker:  "l'Étrangleur"
  nick_the_choker_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('adorez', 'adore')] serrer !"
  nick_the_claw:  "la Griffe"
  nick_the_claw_desc:  "À l'image des bêtes sauvages, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('possédez', 'possède')] une griffe, souvent acérée et ensanglantée."
  nick_the_complainer:  "le Pleurnicheur"
  nick_the_complainer_desc:  "Le seul moment où [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('n\'êtes', 'n\'est')] pas en train de geindre sur quelque chose, c'est quand [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('dormez', 'dort')]."
  nick_the_cook:  "le Cuisinier"
  nick_the_cook_desc:  "Malheureusement, [CHARACTER.GetShortUINameNoTooltipNoFormat] n'utilise que des recettes à base de viande mystérieuse !"
  nick_the_corruptor:  "le Corrupteur"
  nick_the_corruptor_desc:  "Partout où [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('allez', 'va')], la terre frémit, les nuages se rassemblent et les plantes dépérissent."
  nick_the_coward:  "[CHARACTER.Custom('FR_LeLa')] Couard"
  nick_the_coward_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] souvent vu[CHARACTER.Custom('FR_E')] prendre la fuite lors des batailles."
  nick_the_crafty:  "[CHARACTER.Custom('FR_LeLa')] Retors"
  nick_the_crafty_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] souvent surpris[CHARACTER.Custom('FR_E')] à comploter, les doigts joints en pyramide."
  nick_the_crazy:  "[CHARACTER.Custom('FR_LeLa')] Toqué[CHARACTER.Custom('FR_E')]"
  nick_the_crazy_desc:  "Même comparé à la plupart des Orques, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('êtes', 'est')] un peu cinglé[CHARACTER.Custom('FR_E')]."
  nick_the_crippler:  "l'Estropieux"
  nick_the_crippler_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('ne voulez', 'ne veut')] pas que [CHARACTER.LocalPlayerString('vos', 'ses')] victimes meurent. [Select_CString(CHARACTER.IsLocalPlayer, 'Vous', CHARACTER.Custom('FR_IlElle')|U)] [CHARACTER.LocalPlayerString('voulez', 'veut')] seulement qu'elles souffrent."
  nick_the_dark:  "[CHARACTER.Custom('FR_LeLa')] Sombre"
  nick_the_defender:  "[CHARACTER.Custom('FR_LeLa')] Défenseu[CHARACTER.Custom('FR_RSe')]"
  nick_the_defiler:  "le Profanateur"
  nick_the_defiler_desc:  "En 3.A. 2790, [CHARACTER.GetShortUINameNoTooltipNoFormat] décapita Thrór, ancien Roi d'[ereborrealmshort|E], et marqua sa tête tranchée du mot « AZOG » gravé en runes [cirth|E]."
  nick_the_defiler_general:  "[Select_CString(CHARACTER.IsFemale,'la Profanatrice','le Profanateur')]"
  nick_the_defiler_general_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] décapita Thrór, ancien Roi d'[ereborrealmshort|E], et marqua sa tête tranchée du mot « AZOG » gravé en runes [cirth|E]."
  nick_the_disgusting:  "l'Écœurant"
  nick_the_dreamer:  "[CHARACTER.Custom('FR_LeLa')]  Rêveu[CHARACTER.Custom('FR_RSe')]"
  nick_the_dreamer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('prétendez', 'prétend')] avoir des rêves prophétiques, s'étendant interminablement sur diverses façons dont le monde prendra fin dans un futur proche."
  nick_the_drummer:  "le Tambourinaire"
  nick_the_drummer_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] un musicien de talent qui — au grand agacement et désarroi de [CHARACTER.LocalPlayerString('vos', 'ses')] voisins — passait le plus clair de [CHARACTER.LocalPlayerString('votre', 'son')] temps libre à battre [CHARACTER.LocalPlayerString('votre', 'son')] tambour surdimensionné (et assourdissant). Comment [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('avez', 'a')] évité une mort prématurée reste un mystère pour beaucoup."
  nick_the_drunk:  "l'Ivrogne"
  nick_the_drunk_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('appréciez', 'apprécie')] le grog en grande variété comme en grande quantité."
  nick_the_duelist:  "[CHARACTER.Custom('FR_LeLa')] Duelliste"
  nick_the_dumb:  "l'Abruti[CHARACTER.Custom('FR_E')]"
  nick_the_ever_wounded:  "l'Éternellement Blessé[CHARACTER.Custom('FR_E')]"
  nick_the_fanatical:  "[CHARACTER.Custom('FR_LeLa')] Fanatique"
  nick_the_fearful:  "[CHARACTER.Custom('FR_LeLa')] Peureu[CHARACTER.Custom('FR_XSe')]"
  nick_the_filthy:  "l'Encrassé[CHARACTER.Custom('FR_E')]"
  nick_the_flogger:  "le Flagellateur"
  nick_the_flogger_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('appréciez', 'apprécie')] bien plus administrer une bonne flagellation que d'en recevoir une."
  nick_the_fool:  "l'Imbécile"
  nick_the_forsworn:  "[CHARACTER.Custom('FR_LeLa')] Renégat[CHARACTER.Custom('FR_E')]"
  nick_the_foul:  "[CHARACTER.Custom('FR_LeLa')] Répugnant[CHARACTER.Custom('FR_E')]"
  nick_the_friendly:  "l'Affable"
  nick_the_friendly_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] pourrait presque être qualifié[CHARACTER.Custom('FR_E')] de courtois — du moins pour un [orc|E]."
  nick_the_funny_one:  "[CHARACTER.Custom('FR_LeLa')] Bouffo[CHARACTER.Custom('FR_NNne')]"
  nick_the_gluttonous:  "[CHARACTER.Custom('FR_LeLa')] Goulu[CHARACTER.Custom('FR_E')]"
  nick_the_grinder:  "[CHARACTER.Custom('FR_LeLa')] Broyeu[CHARACTER.Custom('FR_RSe')]"
  nick_the_gutless:  "[CHARACTER.Custom('FR_LeLa')] Trouillard[CHARACTER.Custom('FR_E')]"
  nick_the_hasty:  "l'Impétueux"
  nick_the_hook:  "le Crochet"
  nick_the_humiliator:  "l'Humiliateur"
  nick_the_hungry:  "l'Affamé"
  nick_the_infernal:  "l'Infernal[CHARACTER.Custom('FR_E')]"
  nick_the_knife:  "le Couteau"
  nick_the_large:  "le Mastodonte"
  nick_the_legend:  "la Légende"
  nick_the_legend_desc:  "[CHARACTER.GetFirstNameNoTooltip] ! [CHARACTER.GetFirstNameNoTooltip] ! [CHARACTER.GetFirstNameNoTooltip] !"
  nick_the_literate_one:  "[CHARACTER.Custom('FR_LeLa')] Liseu[CHARACTER.Custom('FR_RSe')]"
  nick_the_literate_one_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] très fier[CHARACTER.Custom('FR_E')] de [CHARACTER.LocalPlayerString('votre', 'sa')] capacité à lire et écrire. Le bien le plus précieux de [CHARACTER.LocalPlayerString('votre', 'son')] repaire est un livre noir, dans lequel [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('consignez', 'consigne')] les noms de tous ceux qu'[Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('désirez', 'désire')] tuer."
  nick_the_lookout:  "la Vigie"
  nick_the_mangler:  "[CHARACTER.Custom('FR_LeLa')] Déchiqueteu[CHARACTER.Custom('FR_RSe')]"
  nick_the_mangler_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] très friand[CHARACTER.Custom('FR_E')] de chair crue — de préférence encore vivante et frétillante — en [CHARACTER.LocalPlayerString('vous', 'se')] servant uniquement de [CHARACTER.LocalPlayerString('vos', 'ses')] mains nues et de [CHARACTER.LocalPlayerString('vos', 'ses')] dents."
  nick_the_marauder:  "[CHARACTER.Custom('FR_LeLa')] Maraudeu[CHARACTER.Custom('FR_RSe')]"
  nick_the_massive:  "le Mastodonte"
  nick_the_meat_hoarder:  "l'Accapareur-de-Viande"
  nick_the_mindless:  "l'Insensé[CHARACTER.Custom('FR_E')]"
  nick_the_mountain:  "la Montagne"
  nick_the_murderous:  "[Select_CString(CHARACTER.IsFemale,'la Meurtrière','le Meurtrier')]"
  nick_the_painted:  "le Peinturluré"
  nick_the_pathetic:  "le Pitoyable"
  nick_the_poisoner:  "l'Empoisonneur"
  nick_the_prickler:  "l'Épineux"
  nick_the_prince:  "le Prince"
  nick_the_prince_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] souvent surnommé[CHARACTER.Custom('FR_E')] « le Prince » par [CHARACTER.LocalPlayerString('vos', 'ses')] amis, en raison de [CHARACTER.LocalPlayerString('vos', 'ses')] manières gracieuses et de [CHARACTER.LocalPlayerString('vos', 'ses')] hautes ambitions."
  nick_the_patient:  "[CHARACTER.Custom('FR_LeLa')] Patient[CHARACTER.Custom('FR_E')]"
  nick_the_puny:  "[Select_CString(CHARACTER.IsFemale,'la Chétive','le Chétif')]"
  nick_the_rat:  "le Rat"
  nick_the_rat_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] peut être comparé[CHARACTER.Custom('FR_E')] à un gros rongeur — prompt[CHARACTER.Custom('FR_E')] à prendre la fuite et à se terrer dans un trou jusqu'à ce que tout danger soit passé."
  nick_the_raven:  "le Corbeau"
  nick_the_reckless:  "l'Imprudent[CHARACTER.Custom('FR_E')]"
  nick_the_relentless:  "l'Implacable"
  nick_the_ripper:  "l'Éventreur"
  nick_the_rugged:  "[CHARACTER.Custom('FR_LeLa')] Robuste"
  nick_the_ruinous:  "le Dévastateur"
  nick_the_sadistic:  "[CHARACTER.Custom('FR_LeLa')] Sadique"
  nick_the_screamer:  "[CHARACTER.Custom('FR_LeLa')] Hurleu[CHARACTER.Custom('FR_RSe')]"
  nick_the_serpent:  "le Serpent"
  nick_the_shield:  "le Bouclier"
  nick_the_sickly:  "le Cacochyme"
  nick_the_skinless:  "l'Écorché[CHARACTER.Custom('FR_E')]"
  nick_the_skinner:  "l'Écorcheur"
  nick_the_slaughter:  "le Massacre"
  nick_the_small:  "le Menu"
  nick_the_smasher:  "[CHARACTER.Custom('FR_LeLa')] Fracasseu[CHARACTER.Custom('FR_RSe')]"
  nick_the_sneak:  "[CHARACTER.Custom('FR_LeLa')] Sournois[CHARACTER.Custom('FR_E')]"
  nick_the_spike:  "le Pieu"
  nick_the_steady:  "l'Inébranlable"
  nick_the_stalker:  "[CHARACTER.Custom('FR_LeLa')] Traqueu[CHARACTER.Custom('FR_RSe')]"
  nick_the_stinger:  "le Piqueur"
  nick_the_surgeon:  "[CHARACTER.Custom('FR_LeLa')] Chirurgie[CHARACTER.Custom('FR_NNne')]"
  nick_the_swift:  "[CHARACTER.Custom('FR_LeLa')] Rapide"
  nick_the_tainted:  "le Souillé"
  nick_the_terror:  "la Terreur"
  nick_the_terror_desc:  "L'horreur ! L'effroi ! L'angoisse ! Les mots ne manquent pas pour le dire."
  nick_the_terror_drukurz:  "la Terreur"
  nick_the_terror_drukurz_desc:  "Massacreur de nombreux [dunadan|E], [CHARACTER.GetFirstNameNoTooltip] [CHARACTER.LocalPlayerString('étiez', 'était')] le cauchemar de bien des soldats durant la [warlastallianceshort|E], le second seulement derrière [sauroncharacter|E] et [ninenazgulshort|E]. [CHARACTER.LocalPlayerString('Votre', 'Son')] règne de terreur prit finalement fin sous les coups de [GetScriptedCharacterByHistoryID( 'lineofelendil' ).GetFirstNameNicknamed], mais bien des rejetons de [CHARACTER.LocalPlayerString('votre', 'son')] engeance continueraient à tourmenter le malheureux monde jusqu'à la fin du [fourthage|E]."
  nick_the_thirsty:  "l'Assoiffé[CHARACTER.Custom('FR_E')]"
  nick_the_thunderer:  "le Tonnant"
  nick_the_tiny:  "le Minuscule"
  nick_the_tongue:  "la Langue"
  nick_the_torturer:  "le Bourreau"
  nick_the_uncatchable:  "l'Insaisissable"
  nick_the_uncatchable_desc:  "Quoi qu'il arrive, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('semblez', 'semble')] toujours glisser entre les mains de [CHARACTER.LocalPlayerString('vos', 'ses')] adversaires."
  nick_the_unclean:  "l'Impur[CHARACTER.Custom('FR_E')]"
  nick_the_unkillable:  "l'Indestructible"
  nick_the_venomous:  "[CHARACTER.Custom('FR_LeLa')]  Venimeu[CHARACTER.Custom('FR_XSe')]"
  nick_the_vile:  "l'Abject[CHARACTER.Custom('FR_E')]"
  nick_the_war_bringer:  "l'Annonciateur-de-Guerre"
  nick_the_warrior:  "[Select_CString(CHARACTER.IsFemale,'la Guerrière','le Guerrier')]"
  nick_the_watcher:  "[CHARACTER.Custom('FR_LeLa')] Guetteu[CHARACTER.Custom('FR_RSe')]"
  nick_the_whiner:  "[CHARACTER.Custom('FR_LeLa')] Pleurnichard[CHARACTER.Custom('FR_E')]"
  nick_the_whiner_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('considérez', 'considère')] [CHARACTER.LocalPlayerString('vos', 'ses')] récriminations comme honnêtes, constructives et nécessaires. Les autres, beaucoup moins."
  nick_the_wrestler:  "[CHARACTER.Custom('FR_LeLa')] Lutteu[CHARACTER.Custom('FR_RSe')]"
  nick_thin_bones:  "Os-Frêles"
  nick_thunderhead:  "Tête-de-Tonnerre"
  nick_tree_killer:  "Tueur-d'Arbres"
  nick_ugly_face:  "Gueule-Laide"
  nick_warmonger:  "Fauteur-de-Guerre"
  nick_who_flees:  "Qui-Fuit"
  nick_wrath_breeder:  "Semeur-de-Courroux"
  nick_the_lizard:  "le Lézard"
  nick_the_lumps:  "le Bosselé"
  nick_the_smoke_eater:  "le Mangeur-de-Fumée"
  nick_the_fire_spitter:  "le Cracheur-de-Feu"
  nick_the_long:  "le Longiligne"
  nick_the_barren:  "[CHARACTER.Custom('FR_LeLa')] Stérile"
  nick_the_horny:  "[CHARACTER.Custom('FR_LeLa')] Cornu"
  nick_orc_unifier:  "[Select_CString(CHARACTER.IsFemale,'la Grande Cheffe-de-Guerre','le Grand Chef-de-Guerre')]"
  nick_orc_unifier_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] unit des bandes disparates d'[orcs|E] sous une même bannière, conquérant et ravageant de vastes étendues de [middleearth|E]."
  nick_dead_meat:  "Chair-à-Pâtée"
  nick_dead_meat_desc:  "Si [CHARACTER.GetShortUINameNoTooltipNoFormat] et [CHARACTER.LocalPlayerString('vos', 'ses')] amis croisent un ours, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('vous ferez', 'se fera')] trébucher, c'est certain."
  nick_the_abolist:  "l'Abolitionniste"
  nick_the_abolist_desc:  "À bas le Seigneur Sombre ! À bas Sauron !"
  nick_fly_nest:  "Nid-à-Mouches"
  nick_fly_nest_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('puez', 'pue')], c'est le moins qu'on puisse dire."
  nick_ghul_kin:  "Sang-de-Ghûl"
  nick_ghul_kin_desc:  "Les Ghûls sont des créatures de la terre et du sol, nus, roses et glabres. [CHARACTER.GetShortUINameNoTooltipNoFormat], apparemment, [CHARACTER.LocalPlayerString('tenez', 'tient')] d'eux."
  nick_the_mauled:  "[CHARACTER.Custom('FR_LeLa')] Mutilé[CHARACTER.Custom('FR_E')]"
  nick_the_mauled_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('ne faites', 'ne fait')] malheureusement pas le blessage."
  nick_the_warmonger:  "[CHARACTER.Custom('FR_LeLa')] Belliciste"
  nick_the_warmonger_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] plus à [CHARACTER.LocalPlayerString('votre', 'son')] aise à la tête d'une armée."
  nick_the_cunning:  "[CHARACTER.Custom('FR_LeLa')] Roublard[CHARACTER.Custom('FR_E')]"
  nick_the_cunning_desc:  "Rien ne peut arrêter [CHARACTER.GetShortUINameNoTooltipNoFormat]."
  nick_drake_slayer:  "Tueu[CHARACTER.Custom('FR_RSe')]-de-Dracs"
  nick_the_heart_ripper:  "l'[Select_CString(CHARACTER.IsFemale,'Arracheuse','Arracheur')]-de-Cœurs"
  nick_the_heart_ripper_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('avez acquis', 'acquit')] [CHARACTER.LocalPlayerString('votre', 'son')] sinistre réputation le jour où [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] arracha le cœur de [CHARACTER.LocalPlayerString('votre', 'son')] propre père, s'arrogeant le commandement absolu de [GetTitleByKey('d_haryagsh').GetNameNoTier]."
  nick_the_boastful:  "[CHARACTER.Custom('FR_LeLa')] Vantard[CHARACTER.Custom('FR_E')]"
  nick_the_boastful_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('fûtes', 'fut')] prompt[CHARACTER.Custom('FR_E')] à unifier les tribus dispersées du mont Gram sous [CHARACTER.LocalPlayerString('votre', 'son')] bannière — un exploit qu'[Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('rappelez', 'rappelle')] souvent et avec enthousiasme."
  nick_the_deep:  "[CHARACTER.Custom('FR_LeLa')] Profond[CHARACTER.Custom('FR_E')]"
  nick_the_deep_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] connu[CHARACTER.Custom('FR_E')] pour des remarques d'apparence profonde, qui se révélaient souvent n'être que sornettes et vaines divagations."
  nick_spider_eater:  "Mangeur-d'Araignées"
  nick_spider_eater_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] depuis toujours épris[CHARACTER.Custom('FR_E')] du goût des araignées, allant jusqu'à déplacer toute [CHARACTER.LocalPlayerString('votre', 'son')] tribu plus au nord pour se rapprocher des grands nids d'araignées de [mirkwood|E]."
  nick_terror_in_the_woods:  "la Terreur-des-Bois"
  nick_terror_in_the_woods_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] tristement célèbre parmi les [orcs|E] du [greenwood|E] et les unit sous [CHARACTER.LocalPlayerString('votre', 'son')] bannière, s'emparant d'une grande partie des forêts proches des Montagnes du [mirkwood|E]."
  nick_bloody_fist:  "le Poing-Sanglant"
  nick_bloody_fist_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] connu[CHARACTER.Custom('FR_E')] pour une soif de sang hors du commun, même parmi les [orcs|E] des [yellowmountains|E]. Ayant dévalé dans les plaines d'Ûsakan, cette réputation n'a vraisemblablement fait que croître."
  nick_spider_lover:  "l'Ami-des-Araignées"
  nick_spider_lover_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] singulier[CHARACTER.Custom('FR_E')] parmi les [orcs|E] du [mordor|E] pour entretenir une relation quasi-symbiotique avec les araignées de l'Ephel Dúath."
  nick_the_sailor_unique:  "[CHARACTER.Custom('FR_LeLa')] Marin"
  nick_the_sailor_unique_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] unique parmi les [orcs|E] du [mordor|E] pour avoir tenté, non pas une, mais plusieurs traversées du lac salé de Núrn."
  nick_the_ugly:  "[CHARACTER.Custom('FR_LeLa')] Repoussant[CHARACTER.Custom('FR_E')]"
  nick_the_ugly_desc:  "Il n'y a rien à y redire. [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] répugnant[CHARACTER.Custom('FR_E')] à regarder, même pour un [orc|E]."
  nick_the_tower:  "la Tour"
  nick_the_tower_desc:  "D'une stature extraordinaire et revêtu[CHARACTER.Custom('FR_E')] d'armure en presque toutes circonstances, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('évoquiez', 'évoquait')] une tour de fer et d'acier — hommage vivant à la Tour Sombre elle-même."
  nick_the_watchful:  "[CHARACTER.Custom('FR_LeLa')] Vigilant[CHARACTER.Custom('FR_E')]"
  nick_the_watchful_desc:  "Loyal pour un [orc|E], [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('fûtes', 'fut')] désigné[CHARACTER.Custom('FR_E')] gardien du col de Cirith Nargíl, montant une garde sans relâche sur l'entrée méridionale du [mordor|E]."
  nick_the_slave_driver:  "le Fouailleur-d'Esclaves"
  nick_the_slave_driver_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] très friand[CHARACTER.Custom('FR_E')] de donner des ordres aux esclaves et de les fouetter lorsqu'ils n'exécutaient pas [CHARACTER.LocalPlayerString('vos', 'ses')] commandements à la lettre."
  nick_caragor_wrestler:  "le Dompteur-de-Caragors"
  nick_caragor_wrestler_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] tristement célèbre parmi les Maraud-haï du [mordor|E] méridional pour [CHARACTER.LocalPlayerString('votre', 'son')] aptitude à dompter et maîtriser les redoutables Caragors de guerre."
  nick_the_twin:  "[Select_CString(CHARACTER.IsFemale,'la Jumelle','le Jumeau')]"
  nick_the_twin_desc:  "Né jumeau, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('étiez', 'était')] connu[CHARACTER.Custom('FR_E')] pour un attachement inhabituel à [CHARACTER.LocalPlayerString('votre', 'son')] frère ou sœur."
  nick_the_bitter_orc:  "l'Amer"
  nick_the_bitter_orc_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] un[CHARACTER.Custom('FR_E')] [orc|E] de [gundabad|E]. [Select_CString(CHARACTER.IsLocalPlayer, 'Vous', CHARACTER.Custom('FR_IlElle'))] servit Bolg en tant que l'un de ses imposants gardes du corps lors de la [battle_of_the_five_armies|E].\n\n[Select_CString(CHARACTER.IsLocalPlayer, 'Vous', CHARACTER.Custom('FR_IlElle'))] fut grièvement blessé[CHARACTER.Custom('FR_E')] par Beorn et prit la fuite vers [mirkwood|E], où [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('réduisîtes', 'réduisit')] les orques locaux en soumission. Là, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('demeurâtes', 'demeura')], maudissant les [dwarves|E] et ce maudit homme-ours jusqu'au dernier souffle."
  nick_tyrant_of_the_north:  "le Tyran du Nord"
  nick_tyrant_of_the_north_desc:  "En tant que souverain de tous les [orcs|E] du nord, [CHARACTER.GetShortUINameNoTooltipNoFormat] [CHARACTER.LocalPlayerString('fûtes', 'fut')] le maître incontesté de leur espèce, exerçant un pouvoir sans partage de [moria|E] à [gundabad|E]."
  nick_hand_of_azog:  "la Main d'Azog"
  nick_hand_of_azog_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] l'un des lieutenants de [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstName]. Connu[CHARACTER.Custom('FR_E')] pour être tout aussi impitoyable que [CHARACTER.LocalPlayerString('votre', 'son')] maître, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] était souvent dépêché[CHARACTER.Custom('FR_E')] pour mater les subalternes indisciplinés — tâche dans laquelle [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('ne faillîtes', 'ne faillit')] jamais."
  nick_descendant_of_azog:  "Descendant d'Azog"
  nick_descendant_of_azog_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] un[CHARACTER.Custom('FR_E')] prétendu[CHARACTER.Custom('FR_E')] descendant de [GetScriptedCharacterByHistoryID( 'lineofazog1' ).GetFirstNameNicknamedRegnal], retraçant [CHARACTER.LocalPlayerString('votre', 'son')] lignée jusqu'à [GetScriptedCharacterByHistoryID( 'lineofazog2' ).GetFirstNameNicknamed] par l'entremise de [CHARACTER.LocalPlayerString('votre', 'son')] « père » [GetScriptedCharacterByHistoryID( 'lineofazog9' ).GetFirstName] — bien que des murmures aient depuis longtemps mis en doute la véracité de cette prétention. Chassé[CHARACTER.Custom('FR_E')] de [GetTitleByKey('d_gundabad').GetNameNoTier] dans [CHARACTER.LocalPlayerString('votre', 'sa')] jeunesse, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('vous taillâtes', 'se tailla')] un chemin de violence pour faire valoir [CHARACTER.LocalPlayerString('vos', 'ses')] droits, ralliant l'espèce orcique à l'ombre du nom de [CHARACTER.LocalPlayerString('votre', 'son')] aïeul."
  nick_the_dwarf_mad:  "le Fou-de-Nains"
  nick_the_dwarf_mad_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('étiez', 'était')] une anomalie singulière parmi [CHARACTER.LocalPlayerString('vos', 'ses')] congénères — un [goblin|E] entièrement obsédé par la culture [dwarven|E]. Coiffé d'un chapeau nain dérobé et drapé de fourrure animale sous le menton pour imiter une barbe, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] déambulait en singeant maladroitement la fierté naine."
  nick_candleman:  "l'Homme-aux-Bougies"
  nick_candleman_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] doit son sinistre sobriquet à la mer de bougies vacillantes qui baigne en permanence ses sombres chambres."
  nick_ingweron:  "Ingweron"
  nick_ingweron_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] appelé[CHARACTER.Custom('FR_E')] [Glossary('Ingweron','ingweron_gloss')], en raison de [CHARACTER.LocalPlayerString('votre', 'son')] suzeraineté sur les [vanyarelves|E], la parenté principale des [elves|E]."
  nick_ciriaran:  "Ciriáran"
  nick_ciriaran_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] connu[CHARACTER.Custom('FR_E')] sous le nom de [Glossary('Ciriáran','ciriaran_gloss')]."
  nick_ingoldo:  "Ingoldo"
  nick_ingoldo_desc:  "[Glossary('Ingoldo','ingoldo_gloss')] est l'[amilesse|E] de [CHARACTER.GetShortUINameNoTooltipNoFormat|U]."
  nick_prince_of_all_elves:  "Prince de tous les Elfes"
  nick_prince_of_all_elves_desc:  "En tant que fils de [GetScriptedCharacterByHistoryID( 'lineofingwe2' ).GetFirstName], le Haut-Roi titulaire des [elves|E], [CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('êtes', 'est')] connu[CHARACTER.Custom('FR_E')] comme le « Prince de tous les Elfes »."

  # Gondolin
  nick_of_the_hammer_of_wrath:  "du Marteau de la Colère"
  nick_of_the_hammer_of_wrath_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('fûtes', 'fut')] Seigneur de la Maison du Marteau de la Colère à [GetTitleByKey('k_gondolin').GetNameNoTier], célèbre pour [CHARACTER.LocalPlayerString('votre', 'sa')] puissance et [CHARACTER.LocalPlayerString('votre', 'sa')] ardeur au combat. Lors de la Chute de la cité, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('conduisîtes', 'conduisit')] une troupe des siens dans la mêlée, et bien que tous fussent tombés, il est dit que les morts ennemis furent sept fois plus nombreux que ceux de la Maison du Marteau de la Colère."
  nick_of_the_pillar_and_tower_of_snow:  "du Pilier et de la Tour de Neige"
  nick_of_the_pillar_and_tower_of_snow_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('fûtes', 'fut')] Seigneur à la fois de la Maison du Pilier et de la Maison de la Tour de Neige à [GetTitleByKey('k_gondolin').GetNameNoTier], connu[CHARACTER.Custom('FR_E')] pour [CHARACTER.LocalPlayerString('votre', 'sa')] haute stature et [CHARACTER.LocalPlayerString('votre', 'son')] inébranlable constance. Lors de la Chute de Gondolin, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('tîntes', 'tint')] [CHARACTER.LocalPlayerString('votre', 'son')] position dans la cité aussi longtemps que possible, mourant dos au mur."
  nick_of_the_heavenly_arch:  "de l'Arche Céleste"
  nick_of_the_heavenly_arch_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('fûtes', 'fut')] Seigneur de la Maison de l'Arche Céleste à [GetTitleByKey('k_gondolin').GetNameNoTier]. [Select_CString(CHARACTER.IsLocalPlayer, 'Vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('survécûtes', 'survécut')] à la Chute de Gondolin après avoir été blessé[CHARACTER.Custom('FR_E')] lors des combats sur la Place du Roi, pour trouver la mort plus tard aux Bouches du Sirion lors du Troisième Massacre Fratricide."
  nick_of_the_swallow:  "de l'Hirondelle"
  nick_of_the_swallow_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('fûtes', 'fut')] Seigneur de la Maison de l'Hirondelle à [GetTitleByKey('k_gondolin').GetNameNoTier], célèbre pour [CHARACTER.LocalPlayerString('votre', 'sa')] vélocité et [CHARACTER.LocalPlayerString('votre', 'son')] art de l'arc. En ce jour néfaste qui vit choir Gondolin, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] fut [CHARACTER.LocalPlayerString('arraché', 'arraché')] aux combats par un trait de feu lancé par un [balrog|E]."
  nick_of_the_tree:  "de l'Arbre"
  nick_of_the_tree_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('fûtes', 'fut')] Seigneur de la Maison de l'Arbre à [GetTitleByKey('k_gondolin').GetNameNoTier] — [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] comptait parmi les plus vaillants de toute la cité, le second seulement derrière le Roi lui-même. Tandis que les exilés s'échappaient de Gondolin, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] et les siens formèrent l'avant-garde de l'armée en fuite."
  nick_of_the_harp:  "de la Harpe"
  nick_of_the_harp_desc:  "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('fûtes', 'fut')] Seigneur de la Maison de la Harpe à [GetTitleByKey('k_gondolin').GetNameNoTier], connu[CHARACTER.Custom('FR_E')] pour [CHARACTER.LocalPlayerString('votre', 'sa')] couardise et [CHARACTER.LocalPlayerString('votre', 'sa')] servilité envers Maeglin. Lorsque vint la Chute de Gondolin, [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('prîtes', 'prit')] la fuite pour se terrer dans sa demeure du Petit Marché. Si [Select_CString(CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_IlElle'))] [CHARACTER.LocalPlayerString('y pérîtes', 'y périt')] ou fut emmené captif par Morgoth, nul ne le sait."