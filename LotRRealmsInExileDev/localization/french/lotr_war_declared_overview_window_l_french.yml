l_french:
 lotr_war_declared_flavor.valinor_invasion: "Les cris des opprimés ont franchi les Mers Séparantes jusqu'aux Terres immortelles, et les Valar ont de nouveau tourné leur regard vers la Terre du Milieu. Je suis Eönwë, Héraut du Roi Ancien, et je mène l'Ost de l'Ouest pour abattre ton ombre ! Ton règne de ténèbres s'achève ici — car la lumière de Valinor ne souffrira plus ton insolence !"
 lotr_war_declared_flavor.pharazon_invasion: "Croyais-tu que le Roi Doré n'était plus qu'un souvenir ? Je suis revenu des abîmes du temps pour reprendre la domination qui me revient de droit ! Ta « paix » n'est qu'un sursis avant l'échafaud. J'élèverai un trône d'or sur les ruines de tes lois débiles, et je montrerai à ce monde ce qu'est un véritable maître !"
 lotr_war_declared_flavor.amav_invasion: "Les légendes ne mentaient point, mais tu fus trop sot pour y prêter l'oreille. Moi, Amav, je suis revenu fouler ces terres ! Je n'ai cure de tes titres dérisoires ni de ton « droit » à régner. Je suis la tempête des mythes faite chair, et je viens reprendre ce qui m'appartient de droit ancien !"