 purge_of_ray_end: "La #BOL Purge de Rây#! a #Xlight pris fin.#!"

 #Intro
 purge_of_ray.0120.t: "La Purge de Rây"
 purge_of_ray.0120.desc: "Avec l'accession au pouvoir de [mardat.GetTitledFirstName] sur [ray|E], ce royaume jadis stable et prospère a sombré dans un chaos absolu. Déjà, les loyalistes de [mardat.GetFirstName] et les nouveaux convertis au Culte de Khäz-gramaze ont entrepris des purges et des massacres indiscriminés de quiconque refuse d'abjurer sa foi pour embrasser le Dieu de la Nuit et ses enseignements.\n\nLes anciennes élites Vâtran comme les prétendants Kât-Polozây assoiffés de revanche ont pris les armes contre la tyrannie du nouveau Kralyi, mais beaucoup craignent que les soutiens étrangers de [mardat.GetTitledFirstName] n'assurent son maintien au pouvoir, si acharnée que soit leur lutte."
 purge_of_ray.0120.a: "Des jours de sang et de deuil s'annoncent..."
 every_rebel_control: "Le contrôle diminue dans tous les [county|El] de [GetTitleByKey('k_ray').GetNameNoTier]"

 #Story
 purge_of_ray.0416.t: "Crépuscule sur Rây"
 purge_of_ray.0416.desc: "L'Aûdrat Vâtra n'est plus. Pendant des siècles, ses adeptes, et avec eux l'ordre Kanivâtra de [ray|E], n'ont apporté au royaume que faiblesse et siècles de soumission. Il n'en sera plus ainsi ! Les terres du cœur de [GetTitleByKey('k_ray').GetNameNoTier] sont désormais solidement tenues par Khäz-gramaze, et seule une erreur véritablement catastrophique pourrait remettre cela en cause.\n\nMa position assurée, mon regard se tourne à présent vers les marches lointaines. Si les Vâtran ont été écrasés, les révolutionnaires Kât-Polozây continuent de menacer gravement les confins du royaume. Pour l'heure, cependant, je peux célébrer ma victoire sur les derniers réactionnaires qui s'opposaient à moi."
 purge_of_ray.0416.a: "Les terres du cœur sont miennes."

 purge_of_ray.0417.t: "Iunást Brisée"
 purge_of_ray.0417.desc: "Les Kât-Polozây ont enfin été réduits à une ruine totale. Leur tentative désespérée de se soulever contre mon autorité et la vraie foi de Khäz-gramaze ne leur a valu que mort et destruction, lot commun des hérétiques. Avec leur chute, les derniers chefs de la résistance organisée contre mon règne sont tombés. Nul en [ray|E] n'est en mesure de défier mon pouvoir, et nul ne le sera jamais.\n\nAu nom de Khäz-gramaze, j'ai réduit en cendres la Citadelle de Kâtri. Le temple qui s'y dressait était devenu un foyer de rébellion, et devait donc être anéanti. Avec lui a disparu le dernier monument d'un [GetTitleByKey('k_ray').GetNameNoTier] d'avant la venue de Khäz-gramaze ; et si les Kât-Polozây pleurent la perte de leur lieu saint, les fidèles de la vraie foi se réjouissent de la destruction de ce monument à l'hérésie."
 purge_of_ray.0417.a: "Quel dommage que les fondations n'aient pu brûler elles aussi..."

 purge_of_ray.0418.t: "La Dynastie du Serpent"
 purge_of_ray.0418.desc: "Après des années d'efforts, de complots et d'œuvre patiente, j'ai atteint mon but ultime. L'ancien ordre de [ray|E], Aûdrat Vâtra et Kât-Polozây confondus, est mort et enterré. Leur règne chancelant, qui n'avait conduit [GetTitleByKey('k_ray').GetNameNoTier] qu'à une stagnation éternelle parmi les prétendus grands royaumes de la [bayoftulwang|E], est enfin renversé sans retour.\n\nÀ la place de la Kanivâtra, je suis au faîte du pouvoir. Mon autorité absolue sur le royaume est incontestée et incontestable. Partout où je pose les yeux, je vois de nouveaux convertis au Culte de Khäz-gramaze, et des prières ferventes là où ne se trouvaient jadis que de vils marchands n'aspirant qu'à l'or. Enfin, [GetTitleByKey('k_ray').GetNameNoTier] a atteint la grandeur et le destin qui lui étaient toujours destinés, masqués derrière la décadence de ses fausses croyances.\n\nL'heure est venue, et ma proclamation ne souffre aucune opposition. Je suis [root_scope.GetTitledFirstName], premier de la Dynastie du Serpent."
 purge_of_ray.0418.a: "Bénis par Khäz-gramaze, notre règne durera éternellement !"

 #Maintenance
 purge_of_ray.0001.t: "Le Serpent qui Dévora le Soleil"
 purge_of_ray.0001.desc: "Après des années de purges implacables et de guerres civiles religieuses, [ray|E], naguère l'un des plus grands royaumes du [harad|E] Lointain, est passé sous la coupe des fanatiques adeptes du Culte de Khäz-gramaze. Bien que les nombreuses factions traditionalistes et révolutionnaires du royaume aient tenté de renverser [ruler_ray.GetTitledFirstName], leurs forces ont été brisées par la puissance et le zèle implacables des sbires du nouveau régime.\n\nSi [ruler_ray.GetTitledFirstName] et ses loyalistes se réjouissent de la chute des derniers seigneurs qui s'opposaient à leur domination, [ray.GetNameNoTier] a été dévastée par cette sanglante guerre civile, et il faudra peut-être des années pour qu'elle retrouve sa puissance d'antan. À court terme, cependant, la mainmise de Khäz-gramaze sur [ray.GetNameNoTier] semble assurée."
 purge_of_ray.0001.a: "L'étreinte des Ombres se resserre toujours davantage sur le [harad|E]..."
 purge_of_ray.0001.b: "Quelles en seront les conséquences pour moi, je me demande ?"
 purge_of_ray.0001.c: "Rây est enfin délivrée de la faiblesse Vâtran !"
 purge_of_ray.0001.d: "Nous survivrons à cela aussi..."
 purge_of_ray.0001.e: "Rây est véritablement perdue..."

 purge_of_ray.0002.t: "Le Second Héraut"
 purge_of_ray.0002.desc: "Après le renversement par [mardat.GetFirstName] de la Kanivâtra et d'une grande partie de l'ancien ordre Vâtran de [ray|E], bien des adeptes de l'Aûdrat Vâtra craignaient d'avoir définitivement perdu leur place dans [GetTitleByKey('k_ray').GetNameNoTier]. Et pourtant, [ruler_ray.GetTitledFirstName] a su dissiper ces craintes. En effet, avec son accession au pouvoir, les séditieux de Khäz-gramaze ont été défaits et leurs ambitions d'imposer leur foi radicale contrecarrées.\n\nPour beaucoup dans le [harad|E], c'est un immense soulagement : la domination intégriste de Khäz-gramaze sur [ray.GetNameNoTier] aurait pu durablement bouleverser l'antique équilibre du Sud, notamment dans la [bayoftulwang|E]. La Purge de Rây n'en a pas moins été dévastatrice, et il faudra des années avant que le royaume ne retrouve sa force d'antan."
 purge_of_ray.0002.a: "Tant de sang versé pour rien..."
 purge_of_ray.0002.b: "C'est une excellente nouvelle pour le commerce."
 purge_of_ray.0002.c: "Hm ! Les Vâtran ne sont pas #italic si #!mauvais que ça, après tout..."
 purge_of_ray.0002.d: "Nous avons au moins traversé la tempête..."
 purge_of_ray.0002.e: "Un jour de gloire !"
 purge_of_ray.0002.f: "Rây apprendra bientôt à rester à sa place !"

 purge_of_ray.0003.t: "Temps Incertains"
 purge_of_ray.0003.desc: "L'âpre conflit qui a ravagé le camp de Khäz-gramaze comme celui des gardiens de l'ancien ordre de Rây a produit des résultats véritablement inattendus.\n\nLes [ruler_ray.GetFaith.GetCollectiveNounNoTooltip] tiennent désormais le sceptre de [ray.GetNameNoTier], avec [ruler_ray.GetTitledFirstName] présidant aux destinées de terres meurtries et disloquées. La Purge de Rây s'est éteinte d'elle-même, les factions belligérantes n'étant plus en mesure de poursuivre leur querelle.\n\nL'avenir du royaume demeure obscur, et bien des choses restent incertaines en ces temps de transition."
 purge_of_ray.0003.a: "Je surpasserai les dieux querelleurs de [ray.GetNameNoTier] !"
 purge_of_ray.0003.b: "Intéressant..."

 purge_of_ray.0004.t: "La Fierté d'Iunást"
 purge_of_ray.0004.desc: "Dans un retournement de situation qui a stupéfié bien des habitants de [ray|E], les adeptes si longtemps dominés du Kât-Polozây ont réussi à restaurer leur autorité sur leur ancien royaume, après des siècles de domination de l'Aûdrat Vâtra. Les purges sanglantes et dévastatrices orchestrées par l'usurpateur [mardat.GetFirstName] dans sa tentative d'imposer le Culte de Khäz-gramaze au royaume à n'importe quel prix n'ont fait qu'embraser les braises depuis longtemps éteintes de la rébellion au sein du peuple de [ray.GetNameNoTier]. En fin de compte, les querelles entre les fidèles de Khäz-gramaze et les partisans de l'ancien ordre Vâtran n'ont fait que les épuiser mutuellement, laissant la voie libre à [ruler_ray.GetTitledFirstName] pour revendiquer le pouvoir au nom des Kât Polozây.\n\nPour beaucoup dans [ray.GetNameNoTier] et même à travers le [harad|E] élargi, c'est l'occasion d'une grande célébration, mais les ravages de la purge de [mardat.GetFirstName] prendront des années à être réparés."
 purge_of_ray.0004.a: "Le soleil s'est enfin couché sur les tyrans de Rây !"
 purge_of_ray.0004.b: "Intéressant..."
 purge_of_ray.0004.c: "Ces insurgés seront remis à leur place !"
 purge_of_ray.0004.d: "Jamais plus nous ne nous inclinerons devant des tyrans !"
 purge_of_ray.0004.e: "Notre heure semble révolue..."
 purge_of_ray.0004.f: "Comment cela a-t-il pu arriver !"

 ### Mardat Events
 purge_of_ray.1000.t: "Tout Par le Feu"
 purge_of_ray.1000.desc: "Jour après jour, des rapports me parviennent sur des communautés hérétiques prospères qui s'épanouissent en dépit de leur mépris flagrant pour mon autorité et mes lois. Sous la protection de [aetheling.GetTitledFirstName], ces rebelles continuent de mener une existence paisible. Mais leur paix traîtresse est bien fragile...\n\nSi j'envoyais mes hommes brûler leurs champs et leurs villages, je pourrais soumettre ces rebelles par la famine et la terreur. Que je les anéantisse simplement pour faciliter leur intégration future ou que j'use de ma force pour arracher loyauté et soumission aux populations locales, voilà une belle occasion de consolider mon pouvoir."
 purge_of_ray.1000.a: "Brûlez chaque champ ! Brûlez chaque hérétique !"
 purge_of_ray.1000.b: "Ceux qui se convertissent peuvent vivre, j'imagine..."
 purge_of_ray.1000.c: "Un peu d'intimidation pourrait donner de meilleurs résultats..."
 every_county_in_duchy_rebel: "Chaque [county|El] du [crop_duchy.GetName]"

 purge_of_ray.1005.t: "La Grande Rîyesha"
 purge_of_ray.1005.desc: "Ces derniers temps, la Rîyesha, plus grand fleuve de [ray|E], a connu une activité bien moindre qu'elle ne l'avait jamais été sous la domination Vâtran. Mon conseiller, [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))] [marshal.GetFirstName], m'explique que si une partie de ce déclin est imputable aux nombreux vils hérétiques qui refusent toujours d'embrasser Khäz-gramaze, les infrastructures du fleuve ont également été laissées à l'abandon.\n\nEn tant que seule voie maritime vers l'intérieur du royaume, s'assurer que les infrastructures de la Rîyesha demeurent en état de fonctionner est crucial pour maintenir mon autorité. Je pourrais cependant également chercher à saboter activement la navigation sur le fleuve, afin d'affamer les nombreux rebelles de l'intérieur..."
 purge_of_ray.1005.a: "Le fleuve sera rendu navigable... sous étroite surveillance."
 purge_of_ray.1005.b: "Nous ne pouvons nous permettre de réduire encore davantage le commerce !"
 purge_of_ray.1005.c: "Affamons les rebelles, la prospérité viendra ensuite."
 purge_of_ray.1005.a.tt: "Chaque [county|El] sur [Glossary( 'la Rîyesha', 'RIY_GLOSS' )]"
 purge_of_ray.1005.c.tt1: "Tous les [counties|El] hérétiques sur [Glossary( 'la Rîyesha', 'RIY_GLOSS' )] :"
 purge_of_ray.1005.c.tt2: "Tous les [counties|El] Khäz-gramaze sur [Glossary( 'la Rîyesha', 'RIY_GLOSS' )] :"
 RIY_GLOSS: "Un grand fleuve traversant une grande partie des terres du cœur de Rây. La Rîyesha serpente à travers les [counties|El] suivants :\n\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_bozisha_dar').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_sanma').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_baisa').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_ramadi').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_simza').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_nariyar').GetBaseName]\n$EFFECT_LIST_BULLET$[GetTitleByKey('c_felhan').GetBaseName]"

 purge_of_ray.1010.t: "Décider d'un Sort"
 purge_of_ray.1010.desc: "Il est bien malheureux d'être prisonnier de guerre. Une telle créature me regarde avec morosité à travers les barreaux de sa cellule.\n\n« Je vaux quelque chose, vous savez. » La voix est mince et chevrotante, brisée par des jours de cachot. « Je suis [captured.GetFirstName], de la Maison [captured.GetHouse.GetBaseName]. Si vous faites parvenir un message à ma famille, vous obtiendrez une belle rançon. »\n\nUne rançon ? Ce serait fort bien, mais en ces temps d'épreuve, un [captured.GetWomanMan] de cette trempe peut servir de message bien plus efficacement que de simple monnaie d'échange pour quelque or que ce soit..."
 purge_of_ray.1010.a: "« Vous avez eu le malheur de vous opposer au mauvais [ROOT.Char.GetWomanMan], [captured.Custom('GirlBoy')]. »"
 purge_of_ray.1010.b: "« Je vous libère. Mais je vous laisserai un souvenir de mon #EMP hospitalité#!. »"
 purge_of_ray.1010.c: "« Convertissez-vous à la [ROOT.Char.GetFaith.GetNameNoTooltip] et je pourrais vous laisser partir... »"
 purge_of_ray.1010.c.success: "[captured.GetSheHe|U] accepte votre proposition"
 purge_of_ray.1010.c.failure: "[captured.GetSheHe|U] se moque de votre proposition"
 purge_of_ray.1010.d: "« Vous pourrirez ici jusqu'au paiement de votre rançon. »"

 purge_of_ray.1015.t: "Cendres à Venir"
 purge_of_ray.1015.desc: "Récemment, un bastion de rebelles hérétiques dissimulés contre mon autorité a été découvert à [offending_village.GetName]. Inutile de dire que, maintenant que je connais leur présence, ces insensés seront promptement châtiés. Je ne puis m'empêcher de penser, cependant, que les villageois qui ont osé les cacher, eux et leurs hommes, sont tout aussi coupables de trahison que ceux qu'ils ont dissimulés.\n\nIl serait si aisé d'anéantir purement et simplement ces paysans, dont nul ne suit même Khäz-gramaze, et cette affaire m'offre la justification parfaite pour mener une action plus #EMP décisive#! contre ces vils hérétiques."
 purge_of_ray.1015.a: "N'épargnez personne..."
 purge_of_ray.1015.b: "Tuez-en la moitié, laissez les autres répandre la nouvelle..."
 purge_of_ray.1015.c: "Je dois me contenir."
 purge_of_ray.1015.c.tt: "Car enfin, quel royaume resterait-il à gouverner ?"

 purge_of_ray.1016.t: "Les Routes du Désespoir"
 purge_of_ray.1016.desc: "Nombre des lâches hérétiques encore tapis à [offending_village.GetName] ont commencé à fuir la cité. Au début, ce n'étaient que de petites bandes, vouées à périr dans les contrées sauvages, mais depuis peu le flot des fuyards a atteint des proportions dangereuses. Non seulement cette dépopulation affaiblit la puissance de Khäz-gramaze, mais ces traîtres désespérés font de parfaits soldats pour la maudite cause des rebelles.\n\nSi je pouvais résoudre le problème en envoyant une force de purge en bonne et due forme vers la cité pour tuer quiconque envisagerait de fuir, cela ne réglerait pas le problème de fond. Peut-être serait-il préférable d'ordonner à mes hommes de traquer ces hérétiques et de les ramener de force à la cité ?"
 purge_of_ray.1016.a: "Envoyer mes hommes écraser toute résistance."
 purge_of_ray.1016.b: "Traquez-les jusqu'au dernier !"
 purge_of_ray.1016.c: "Laissez-les partir mourir d'eux-mêmes..."
 purge_of_ray.1016.c.tt: "Ils ne survivront sûrement pas dans les contrées sauvages..."

 purge_of_ray.1017.t: "Une Terre en Ruine"
 purge_of_ray.1017.desc: "En dépit de la grande prospérité que mon règne a apportée à [ray|E], il semble que [offending_village.GetName] ait trouvé le moyen de sombrer dans un déclin chronique. Les routes commerciales, artères vitales de richesse pour le royaume, semblent s'y être taries, plongeant la contrée dans la misère économique. Associé aux vils hérétiques qui sévissent encore dans la région, l'avenir de [offending_village.GetName] semble véritablement en jeu.\n\nEn tant que Kralyi, il est de mon devoir de veiller sur mon peuple, bien sûr, mais il me paraît évident que la situation découle en grande partie des craintes insensées et de la paresse des habitants. Quelques hommes pour mettre les locaux au travail, ou quelques modestes investissements pour remettre les choses en ordre, voilà tout ce qu'il faudrait."
 purge_of_ray.1017.a: "Mettre les habitants au travail."
 purge_of_ray.1017.b: "Peut-être qu'un investissement plus conséquent pourrait suffire..."
 purge_of_ray.1017.c: "Ah ! Qu'ils souffrent !"

 purge_of_ray.1018.t: "Maraudeurs Ensanglantés"
 purge_of_ray.1018.desc: "Profitant du chaos de la purge, une grande bande de mercenaires reconvertis en bandits s'est mise à ravager les terres de [aetheling.GetTitledFirstName], semant la destruction sur son passage. L'opportunité que représente cette situation ne m'échappe pas. En effet, si je devais recruter ces mercenaires maintenant, j'aurais de bons hommes parfaitement positionnés pour porter la purge dans toute sa force sur les terres de [aetheling.GetTitledFirstName].\n\nSi je décide de les engager, deux grandes options s'offrent à moi. Je peux les laisser exactement là où ils sont, à semer le chaos mais en propageant désormais l'Ombre de Khäz-gramaze, ou je pourrais les recruter pour qu'ils me servent directement. Mais je dois tenir compte de mes finances limitées, et le fait que cette razzia continue déjà de servir mes objectifs."
 purge_of_ray.1018.a: "Ils seront mes agents contre [aetheling.GetTitledFirstName]."
 purge_of_ray.1018.b: "J'ai besoin de tout homme capable de se battre !"
 purge_of_ray.1018.c: "Laissons-les semer la ruine."

 purge_of_ray.1019.t: "Un Intendant Non Éprouvé"
 purge_of_ray.1019.desc: "Le récemment investi [aetheling.GetTitledFirstName], fidèle de Khäz-gramaze, semble avoir perdu le contrôle de son domaine face à la résistance acharnée des hérétiques de la région. Si [aetheling.GetTitledFirstName] m'assure que les rebelles seront finalement écrasés, son royaume bénéficierait grandement d'une aide directe de ma part.\n\nBien que cela représente un effort quelque peu coûteux, je pourrais rediriger mes hommes vers le [crop_duchy.GetName] pour rétablir l'ordre et éradiquer l'hérésie d'un seul coup décisif. Je dois cependant peser le fait que ces fonds pourraient être cruciaux pour remporter les nombreuses batailles qu'il me reste à livrer pour véritablement asseoir mon autorité sur [ray|E]."
 purge_of_ray.1019.a: "Les fidèles de Khäz-gramaze combattent comme un seul homme !"
 purge_of_ray.1019.b: "[aetheling.GetTitledFirstName] peut sûrement gérer cela..."

 purge_of_ray.1020.t: "Des Dieux à l'Agonie"
 purge_of_ray.1020.desc: "On me rapporte que les habitants de [offending_village.GetName] semblent avoir en grande partie abandonné leur foi hérétique. Je serais prêt à parier que ma grande démonstration de force et mes victoires répétées leur ont fait perdre confiance en leurs dieux de pacotille, les rendant mûrs pour une conversion au Culte de Khäz-gramaze. Cependant, toutes les nouvelles de [offending_village.GetName] ne sont pas aussi favorables. Il semble en effet qu'un culte étrange et sans attaches ait récemment commencé à gagner en popularité parmi les habitants.\n\nBien que ce culte naissant ne survivrait guère à une tentative sérieuse de conversion des locaux, si je dois agir, c'est maintenant, ou risquer que cette affaire ne devienne incontrôlable..."
 purge_of_ray.1020.a: "Les prêtres de Khäz-gramaze les remettront dans le droit chemin."
 purge_of_ray.1020.b: "Pourquoi s'embarrasser d'une conversion pacifique ?"
 purge_of_ray.1020.c: "Quel pire résultat pourrait-il y avoir ?"
 

 ### Rebel Events
 purge_of_ray.2000.t: "Âmes à l'Agonie"
 purge_of_ray.2000.desc: "Les habitants de [location.GetName] souffrent : les restrictions sur les vivres imposées par [mardat.GetTitledFirstNameRegnal] commencent à se faire cruellement sentir, rongeant la chair sur leurs os. L'un de ces malheureux reconnaît mon port et se jette à mes pieds pour implorer ma pitié.\n\n« Je vous en supplie ! » [starving_man.GetSheHe|U] implore, ses doigts osseux agrippés à mes jambes. « Voilà deux jours que je n'ai rien mangé. Les deux jours d'avant, je n'avais eu qu'un seul repas. Je vous en supplie... #DIE1 vous devez faire #EMP quelque chose...#!#! »"
 purge_of_ray.2000.notcallous: "\n\nCe pauvre [starving_man.GetWomanMan]."
 purge_of_ray.2000.a: "Payer des importations, de ma propre bourse."
 purge_of_ray.2000.b: "« Venez avec moi. Je vous nourrirai. »"
 purge_of_ray.2000.c: "Peut-être puis-je trouver un moyen de résoudre cela ?"
 purge_of_ray.2000.c.success: "Vos méthodes pour accroître la production agricole portent leurs fruits"
 purge_of_ray.2000.c.failure: "Vos méthodes ne donnent aucun résultat"

 purge_of_ray.2001.opening: "[marshal.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 purge_of_ray.2001.desc: "La production alimentaire dans la région se stabilisant, bien des habitants qui étaient trop affaiblis pour travailler offrent maintenant leurs services.\n\nLes plus robustes d'entre eux se proposent comme guerriers pour votre cause !"
 purge_of_ray.2001.a: "Accueillez-les !"
 purge_of_ray.2001.b: "Je n'ai pas besoin de guerriers pour l'instant."
 purge_of_ray.2001.b.tt: "Peut-être en aurai-je besoin à l'avenir..."

 purge_of_ray.2005.t: "Sursis"
 purge_of_ray.2005.desc: "Quand on est un [ROOT.Char.GetLadyLord] de mon rang, il faut parfois prendre les décisions difficiles. C'est dans cet esprit que, lorsqu'un meurtrier notoire de la région m'est amené enchaîné, j'ordonne à [spymaster.GetFirstName] de le conduire à l'armurerie afin que nous puissions nous entretenir en privé.\n\nLe [murderer.GetWomanMan] me regarde avec curiosité. Il ne fait aucun doute que sans mon intervention, il se balancera au gibet d'ici la fin de la semaine. Je jette un regard à [spymaster.GetFirstNameNoTooltip] pour confirmation et reçois un hochement de tête en réponse.\n\n« J'ai besoin d'un [murderer.GetWomanMan] de vos aptitudes... »"
 purge_of_ray.2005.a: "Nous devons viser la cible la plus haute possible."
 purge_of_ray.2005.b: "Prenez cet or et engagez quelques hommes de main..."
 purge_of_ray.2005.b.tt: "Et tuez chaque fidèle de Khäz-gramaze que vous trouverez dans le [mardat_vassal.GetName]."
 purge_of_ray.2005.c: "Vous semblez être un [murderer.GetWomanMan] bien utile à avoir avec soi."

 purge_of_ray.2010.t: "Effort de Guerre"
 purge_of_ray.2010.desc: "En tant que l'un des seigneurs rebelles les plus puissants de [GetTitleByKey('k_ray').GetNameNoTier], il m'incombe de rallier les nobles mineurs à notre juste cause. Les enjeux étant si élevés, tous sont réticents à s'y engager sans réserve, mais nous avons besoin d'eux pour réussir notre mission.\n\nLa seule question est de savoir quel type de soutien nous recherchons précisément. L'or est toujours le bienvenu, bien sûr, mais peut-être pourrais-je susciter une agitation populaire plus active ? Ou même, peut-être, avons-nous besoin d'une résistance dûment organisée ?"
 purge_of_ray.2010.a: "Une résistance organisée est la voie à suivre."
 purge_of_ray.2010.a.critsuccess: "La résistance s'enflamme rapidement"
 purge_of_ray.2010.a.success: "La résistance progresse"
 purge_of_ray.2010.a.failure: "Vos appels restent lettre morte"
 purge_of_ray.2010.a.critfailure: "Vos messages sont interceptés par le Kralyi"
 purge_of_ray.2010.b: "Je vais solliciter quelques dons en or."
 purge_of_ray.2010.b.success: "L'or arrive rapidement"
 purge_of_ray.2010.b.failure: "Les nobles ignorent vos suppliques"
 purge_of_ray.2010.c: "Ils devraient inciter le petit peuple à se soulever."

 purge_of_ray.2011.t: "Un Combattant des Terres Sauvages"
 purge_of_ray.2011.desc: "Ma cour et moi-même sommes surpris lorsque, sans la moindre annonce, [rebel_leader.GetName] fait son apparition et exige une audience. Il est évident que [CharYouSheHe(rebel_leader)] est un guerrier, au vu de sa stature robuste et de son apparence éprouvée, et en ces temps d'épreuve tout soldat prêt à se battre a de l'importance.\n\nS'avançant devant moi, [rebel_leader.GetName] se présente comme le chef de l'une des nombreuses petites bandes rebelles qui combattent pour s'affranchir de la tyrannie de Khäz-gramaze. [CharYouSheHe(rebel_leader)] et les siens ont longtemps mené une existence misérable dans les contrées sauvages, mais ils viennent désormais me proposer leurs services, estimant que leur lutte solitaire est vaine."
 purge_of_ray.2011.a: "Tout guerrier est précieux."
 purge_of_ray.2011.b: "Peut-être pourraient-ils travailler la terre ?"
 purge_of_ray.2011.c: "Je n'ai que faire de ces hommes des bois !"

 purge_of_ray.2012.t: "Les Suppliques des Errants"
 purge_of_ray.2012.desc: "Récemment, un important groupe de réfugiés fuyant les persécutions de Khäz-gramaze a franchi les frontières de mon royaume. Mes hommes me rapportent qu'ils sont clairement affamés et que, sans soutien, certains pourraient bientôt se tourner vers le brigandage et le crime par désespoir. Si je gère bien la situation, ces âmes éprouvées pourraient fort bien servir ma cause.\n\nS'ils sont peu nombreux, quelques hommes robustes parmi eux sont assurément prêts à tout pour défaire Khäz-gramaze. Il serait également possible de les inviter à s'établir sur mes terres, renforçant ainsi mon assise, du moins à long terme."
 purge_of_ray.2012.a: "Certains d'entre eux feront de bons soldats."
 purge_of_ray.2012.b: "Mettez-les au travail ! Nous avons toujours besoin de bras."
 purge_of_ray.2012.c: "Qu'on les chasse d'ici !"

 purge_of_ray.2013.t: "La Gangrène qui Progresse"
 purge_of_ray.2013.desc: "En dépit de mes efforts, le chaos incessant de la purge a plongé [offending_village.GetName] dans une ruine économique. Alors que les voyages se réduisaient à un filet et que des bandes de fanatiques de Khäz-gramaze commençaient à traquer quiconque osait s'aventurer sur les grandes routes du royaume, les routes commerciales autrefois si prospères de [ray|E] ont semblé se tarir.\n\nSans mon soutien, il semble quasi certain que [offending_village.GetName] dépérira à mesure que ses habitants rejoindront le nombre sans cesse croissant de réfugiés déplacés par la folie de Khäz-gramaze. Je dois agir maintenant et sauver les populations de la région, ou me résoudre à la voir sombrer dans un déclin chronique."
 purge_of_ray.2013.a: "J'enverrai de l'aide pour assurer leur survie."
 purge_of_ray.2013.b: "Peut-être une solution plus radicale s'impose-t-elle..."
 purge_of_ray.2013.c: "Nous n'y pouvons rien..."

 purge_of_ray.2014.t: "Fondations Corrompues"
 purge_of_ray.2014.desc: "Si, pour beaucoup, le chaos engendré par les purges de Khäz-gramaze fut une source d'horreur et de désespoir, pour quelques âmes sombres ce fut une source d'opportunités considérables. En effet, à [offending_village.GetName], de petits seigneurs du crime ont pris le pouvoir, bravant ouvertement l'autorité officielle.\n\nS'il m'est impératif de régler promptement le cas de ces fauteurs de troubles avant qu'ils ne causent davantage de dégâts, la question devra être abordée avec intelligence. Un investissement suffisant pourrait les déloger, mais peut-être qu'une intervention militaire donnerait de meilleurs résultats pour un effort bien moindre..."
 purge_of_ray.2014.a: "Aucun prix n'est trop élevé pour la sécurité de [offending_village.GetName]."
 purge_of_ray.2014.b: "Ces bandits ne résisteront pas longtemps à mes hommes."
 purge_of_ray.2014.c: "Une intervention est bien trop risquée..."
 purge_of_ray.2014.success: "Vous défaites les seigneurs du crime"
 purge_of_ray.2014.fail: "Vos forces ne parviennent pas à vaincre les seigneurs du crime"
 
 purge_of_ray.2015.opening: "[marshal.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 purge_of_ray.2015.desc.win: "Nos efforts pour déloger les seigneurs du crime ont porté leurs fruits !\n\nVous pouvez dormir sur vos deux oreilles en sachant que le problème est résolu et que la paix est revenue dans la région."
 purge_of_ray.2015.desc.fail: "Je dois vous annoncer que nos forces n'ont pu vaincre les seigneurs du crime.\n\nIl est peu probable que nous parvenions à une conclusion rapide de cette affaire."
 purge_of_ray.2015.a: "Bon débarras !"
 purge_of_ray.2015.b: "Comment avez-vous pu perdre face à de simples bandits ?!"