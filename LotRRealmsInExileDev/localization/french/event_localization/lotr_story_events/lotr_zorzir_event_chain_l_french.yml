l_french:

 zorzir_event_chain.0100.t: "Installation du Camp"
 zorzir_event_chain.0100.desc: "La décision est prise : la lutte pour Mablâd-dûm continuera.\n\nCependant, [GetScriptedCharacterByHistoryID('lineofvarakh101').GetName] prêche la prudence. À cette position, nous ne sommes qu'à quelques lieues du site de notre dernière déroute. Si les [orcs|E] venaient à revenir, nous serions des taupes sur un billot. Nos éclaireurs rapportent qu'ils ont découvert, plus au sud, les vestiges d'un ancien poste de surveillance [blacklock|E], dissimulé dans une caverne. Bien approvisionné, bien caché. Un tel lieu pourrait devenir un camp de base redoutable, loin des regards ennemis.\n\nCe plan n'est pas sans opposants. [GetScriptedCharacterByHistoryID('lineofthanul83').GetName] tonne qu'un tel repli abandonnerait tout [dwarves|E] égaré cherchant à nous rejoindre. En demeurant près du champ de bataille, nous trouverons davantage de survivants."
 zorzir_event_chain.0100.a: "Nous n'abandonnerons pas nos frères ! Ici nous resterons."
 zorzir_event_chain.0100.b: "Demeurer ici, c'est signer notre arrêt de mort. En marche vers le poste de surveillance."
 zorzir_survivors: "Survivants Boucle-Noire"

 zorzir_event_chain.0200.t: "Les Expéditionnaires Portés Disparus"
 zorzir_event_chain.0200.desc: "Lorsque notre ligne de bataille s'est brisée sous l'assaut [orcish|E], nos forces ont été fracturées en quatre groupes. Si le gros des troupes a pu rejoindre ce camp, trois capitaines et leurs compagnies demeurent introuvables.\n\nNous devons retrouver nos frères et les ramener, quoi qu'il en coûte."
 zorzir_event_chain.0200.a: "Nous les retrouverons !"
 zorzir_event_chain.0200.b: "Un de moins, deux à trouver."
 zorzir_event_chain.0200.c: "Un seul capitaine manque encore à l'appel."
 zorzir_event_chain.0200.d: "Quelles nouvelles du dernier capitaine ?"


 zorzir_event_chain.0300.t: "Expédition dans le Désespoir"
 zorzir_event_chain.0300.desc: "À peine avons-nous quitté le camp que des murmures inquiétants parviennent à mes oreilles. Mes compagnons chuchotent qu'il n'est plus d'espoir, que nulle autre compagnie n'a survécu.\n\nIls assombrissent les rangs de leurs spéculations macabres sur le sort des capitaines. Selon eux, nous aurons de la chance si nous retrouvons ne serait-ce que leurs corps brisés."
 zorzir_event_chain.0300.a: "Sans espoir ? L'espoir ne meurt jamais !"
 zorzir_event_chain.0300.b: "Ils portent le nom des [axesofnargubraz|E]. Nous ne plions pas si aisément."
 zorzir_event_chain.0300.c: "Au fond de moi, je crains qu'ils n'aient raison."

 zorzir_event_chain.0310.t: "Vivres Corrompus"
 zorzir_event_chain.0310.desc: "Mauvaise nouvelle du porteur : quelque pourriture dans l'air de ces profondeurs a imprégné nos réserves, les rendant quasiment immangeables. Ici, loin derrière les lignes ennemies, nous ne pouvons nous réapprovisionner à quelque hameau que ce soit.\n\nSi nous sommes assez robustes pour survivre avec de maigres rations, les gémissements incessants de nos [dwarves|E] sont suffisamment agaçants pour exiger une solution."
 zorzir_event_chain.0310.a: "Il doit bien y avoir quelque chose à chasser par ici."
 zorzir_event_chain.0310.b: "Constituer une équipe de fourageurs."
 zorzir_event_chain.0310.c: "Nous nous y sommes préparés ! Faites monter les réserves de secours."

 zorzir_event_chain.0320.t: "Les Mésaventures de Tormog"
 zorzir_event_chain.0320.desc: "Des acclamations me tirent du sommeil. Une douzaine de survivants ont trouvé le chemin de notre camp et reçoivent l'accueil que mérite tout [dwarven|E] revenu de l'abîme.\n\nParmi eux, mon capitaine disparu, [tormog.GetFirstName]. Il explique que sa compagnie est prise au piège dans un tunnel voisin, bloquée par d'épaisses toiles et chassée sans relâche par des araignées.\n\nIl implore notre aide et jure de reprendre la mission si les siens sont délivrés."
 zorzir_event_chain.0320.a: "Des araignées ? Elles ne sauront nous résister."
 zorzir_event_chain.0320.b: "Faites venir les ingénieurs. Ces toiles ne tiendront pas longtemps."
 zorzir_event_chain.0320.c: "Tu dois attirer les araignées loin de là, Tormog. C'est la seule voie."
 tormog_troops: "Bataillon de Tormog"
 zorzir_event_chain.0320.tt.success: "Tormog et son bataillon sont saufs."
 zorzir_event_chain.0320.tt.fail: "Tormog et la plupart de son bataillon sont tués."

 zorzir_event_chain.0400.t: "KHROATOAN"
 zorzir_event_chain.0400.desc: "Quelques jours à peine s'écoulent avant que nous ne retrouvions la piste.\n\nNous avons découvert les vestiges d'un camp [dwarven|E], récemment abandonné. S'il est vide, les Nains qui l'occupaient ne semblent pas avoir fui sous la contrainte. Aucune trace de combat, et l'emplacement a été soigneusement rangé par ceux qui l'habitaient.\n\nUne seule chose détonne. Gravé dans une palissade de fortune, un unique mot, tracé en runes [cirth|E]. On y lit : 'KHROATOAN'.\n\nCe mot n'appartient ni au [khuzdul|E] ni à l'[adunaic|E]. Est-ce un lieu ? Le nom d'un peuple, d'une tribu ? Nul doute que c'est là un indice..."
 zorzir_event_chain.0400.a: "Ah ! Je sais précisément ce que cela signifie."
 zorzir_event_chain.0400.b: "D'autres indices nous échappent, j'en suis certain..."
 zorzir_event_chain.0400.c: "Voilà une distraction bien futile."

 zorzir_event_chain.0410.t: "Patrouilles Gobelins"
 zorzir_event_chain.0410.desc: "Notre compagnie tombe sur un col gardé par une patrouille de [goblin|E]. Leur nombre est réduit, mais ils portent tambours et cors, sans nul doute pour appeler des renforts.\n\nNous pourrions les défaire sans peine, mais une attaque frontale risquerait d'alerter chaque [orc|E] de la région."
 zorzir_event_chain.0410.a: "Nous tendrons une embuscade. Ils seront morts avant qu'un cor n'effleure leurs lèvres."
 zorzir_event_chain.0410.b: "Nous pouvons les contourner en silence."
 zorzir_event_chain.0410.c: "Un seul nain ne vaut pas qu'ils sonnent l'alarme. Je les affronterai seul."

 zorzir_event_chain.0420.t: "La Trahison de Khibilun"
 zorzir_event_chain.0420.desc: "Le vent fouette ma barbe tandis que je me tiens au bord des falaises de [GetTitleByKey('c_fhul').GetNameNoTier]. Derrière moi, les tours brisées et les cols grouillant d'[orcs|E] de [GetTitleByKey('c_tul_askar').GetNameNoTier]. Devant moi, mon capitaine disparu, [khibilun.GetFirstName], le regard perdu sur les herbages verdoyants de [GetTitleByKey('e_sirayn').GetNameNoTier]. Sa compagnie l'attend, dans l'attente de ses ordres.\n\n« Nous n'étions pas prêts... » Il marque une pause, soupesant la situation. 'Pourquoi sacrifier autant pour un amas de scories fondues ? Ne reste-t-il pas d'autres terres à libérer des Ombres ? Je ne me battrai pas et ne mourrai pas dans quelque trou obscur alors que je pourrais m'enrichir en terres vertes et fertiles.'"
 zorzir_event_chain.0420.a: "Tu as prêté serment, Khibilun, de combattre aux côtés de tes frères."
 zorzir_event_chain.0420.b: "Tu me trouveras ennemi bien plus redoutable que [GetScriptedCharacterByHistoryID('lineoflughasya23').GetFirstName]."
 zorzir_event_chain.0420.c: "Que partent ceux qui le souhaitent."
 khibilun_troops: "Compagnie de Khibilun"
 zorzir_event_chain.0420.tt.success: "Khibilun et sa compagnie font demi-tour."
 zorzir_event_chain.0420.tt.fail: "Khibilun et sa compagnie s'en vont."

 zorzir_event_chain.0500.t: "Chassés dans l'Obscurité"
 zorzir_event_chain.0500.desc: "Notre dernière expédition se heurte aussitôt à une résistance acharnée. Des saboteurs [orcish|E] nous talonnent à chaque détour, surgissant pour incendier nos réserves avant de se fondre à nouveau dans les ténèbres. S'ils n'ont pas encore osé nous attaquer de front, ce n'est qu'une question de temps avant qu'ils n'escaladent leur harcèlement.\n\nMes compagnons me pressent de poursuivre les Orques au prochain assaut, mais la menace d'un piège ne m'échappe pas."
 zorzir_event_chain.0500.a: "Piège ou non, nous aurons leurs têtes !"
 zorzir_event_chain.0500.b: "Peut-être devrions-nous leur tendre notre propre piège..."
 zorzir_event_chain.0500.c: "Effaçons nos traces, nous les sèmerons dans les tunnels."

 zorzir_event_chain.0510.t: "Les Haches Assiégées"
 zorzir_event_chain.0510.desc: "Le fracas d'une mêlée acharnée nous attire vers les ruines d'un ancien aqueduc [blacklock|E]. Des flèches zèbrent un air chargé de fumée tandis que les poudres explosives enflamment les alentours. Un bataillon des [axesofnargubraz|E] tient le pont face à une horde d'[orcs|E].\n\nLes Orques sont bien trop nombreux pour le peu de compagnons que j'ai amenés. Il nous faudra faire preuve d'ingéniosité pour porter secours à nos alliés."
 zorzir_event_chain.0510.a: "Donnez le signal de retraite aux [dwarves|E], nous ferons s'effondrer l'aqueduc dans leur sillage."
 zorzir_event_chain.0510.b: "Ces Orques sont superstitieux. Effroyons-les avec un mauvais présage."
 zorzir_event_chain.0510.c: "Je ne peux vaincre les Orques, mais je peux gagner à nos Nains le temps de fuir !"
 godrathor_troops: "Légion de Gôdrathôr"
 zorzir_event_chain.0510.tt.success: "La légion de Gôdrathôr est sauvée."
 zorzir_event_chain.0510.tt.fail: "La légion de Gôdrathôr est décimée."

 zorzir_event_chain.0520.t: "Un Fils de la Hache Tombé"
 zorzir_event_chain.0520.desc: "Tandis que la bataille fait rage, je me retrouve face au chef des [orcs|E], [boss_orc.GetFirstNameNicknamed]. 'Contemple, [blacklock|E], je t'apporte un présent, un souvenir de notre dernière rencontre !' L'Orque jette un sac ensanglanté à tes pieds.\n\nÀ l'intérieur, tu découvres la tête tranchée du troisième capitaine disparu, ton prince, [GetScriptedCharacterByHistoryID('thirdlineofthrar89').GetName]."
 zorzir_event_chain.0520.a: "Tu paieras pour cela."
 zorzir_event_chain.0520.b: "[boss_orc.GetFirstName] s'en repentira."
 zorzir_event_chain.0520.a.tt: "Défier [boss_orc.GetFirstName] en combat singulier."

 zorzir_event_chain.0522.t: "Une Troupe Reforjée"
 zorzir_event_chain.0522.desc: "[boss_orc.GetFirstNameNicknamed] s'effondre, vaincu. D'un dernier coup de lame, je lui accorde la fin qu'il mérite. Les [orcs|E] survivants poussent des cris de détresse et fuient, lançant des malédictions dans leur déroute.\n\nSi nous sommes victorieux, ce n'est là que l'aube de notre guerre. Nous avons perdu un frère, mais nous en avons regagné bien d'autres. Tous les capitaines comptabilisés, nous devons nous préparer à frapper [GetTitleByKey('k_mablad_dum').GetNameNoTier] en son cœur."
 zorzir_event_chain.0522.a: "Pour [GetScriptedCharacterByHistoryID('thirdlineofthrar89').GetName] !"

 zorzir_event_chain.0523.t: "Le Premier d'une Longue Série"
 zorzir_event_chain.0523.desc: "Dans le chaos de la mêlée qui s'ensuit, [boss_orc.GetFirstName] disparaît. Les [orcs|E] survivants poussent des cris de détresse et fuient, lançant des malédictions dans leur déroute.\n\nSi nous sommes victorieux, ce n'est là que l'aube de notre guerre. Nous avons perdu un frère, mais nous en avons regagné bien d'autres. Tous les capitaines comptabilisés, nous devons nous préparer à frapper [GetTitleByKey('k_mablad_dum').GetNameNoTier] en son cœur."
 zorzir_event_chain.0523.a: "Pour [GetScriptedCharacterByHistoryID('thirdlineofthrar89').GetName] !"

 zorzir_event_chain.0524.t: "Hache Brisée"
 zorzir_event_chain.0524.desc: "Je tombe à genoux, le sang s'épanchant entre mes doigts. 'Que tous retiennent mon nom, [dwarf|E], [boss_orc.GetFirstNameNicknamed] !'\n\n[boss_orc.GetFirstName] lève sa lame... et l'abat d'un coup sec."
 zorzir_event_chain.0524.a: "Vengez-moi, frères !"

 zorzir_event_chain.0530.t: "Le Dernier Capitaine"
 zorzir_event_chain.0530.desc: "Les éclaireurs rapportent que le troisième capitaine porté disparu, [GetScriptedCharacterByHistoryID('thirdlineofthrar89').GetName], a été retrouvé à [GetTitleByKey('c_medandushathur').GetNameNoTier]. Il n'a pas survécu.\n\nNous avons perdu un frère, mais nous en avons regagné bien d'autres. Tous les capitaines comptabilisés, nous devons à présent consolider notre emprise sur [GetTitleByKey('k_mablad_dum').GetNameNoTier]."
 zorzir_event_chain.0530.a: "Pour [GetScriptedCharacterByHistoryID('thirdlineofthrar89').GetName] !"

zorzir_event_chain.0600.t: "Mablâd-dûm Reconquise"
zorzir_event_chain.0600.desc: "Enfin, enfin, [GetTitleByKey('k_mablad_dum').GetNameNoTier] est entre les mains des [blacklock|E].\n\nSeule la prise du terrain n'aurait pas suffi à convaincre le monde [dwarven|E] de notre victoire. Des siècles entiers s'étaient écoulés depuis que les nôtres avaient foulé pour la dernière fois ces couloirs, charriant avec eux bien des échecs tragiques. Des millénaires de déceptions avaient glacé les cœurs, et l'on nous traitait de mercenaires et de fanatiques. Il était impératif que nous prouvions, sans l'ombre d'un doute, que nous étions les maîtres de ce domaine.\n\nÀ présent, nul ne peut en douter. Les [axesofnargubraz|E] tiennent chaque symbole du pouvoir.\n\nDe droit ancien, Mablâd-dûm appartient à la Maison [adunabar.GetDynastyHouseName], et nous avons le devoir sacré de la lui rendre. Pourtant, je ne puis m'empêcher de méditer sur le chemin parcouru. Ce n'est pas [adunabar.GetFirstName] qui s'est battu et a saigné pour cette forteresse, mais bien la [GetTitleByKey('d_zorzirs_expedition').GetNameNoTier] ! Si nous souhaitions garder Mablâd-dûm comme fief de guerre, que pourrait [adunabar.Custom('FR_IlElle')] faire pour nous en empêcher ?"
zorzir_event_chain.0600.a: "Nous combattons au nom de la Maison [adunabar.GetDynastyHouseName]."
zorzir_event_chain.0600.b: "Elle est nôtre, et nôtre uniquement."
zorzir_event_chain.0600.a.tt_1: "Transférer tous les titres détenus au souverain de [GetTitleByKey('k_thrars_folk').GetNameNoTier]"
zorzir_event_chain.0600.a.tt_2: "Recevoir [GetTitleByKey('d_shakulzaram').GetNameNoTier] comme nouveau fief."
zorzir_event_chain.0600.a.tt_3: "Tous les comtés Souterrains de [terrain|E] détenus se convertissent à la culture [GetCultureByKey('blacklocks').GetName]"

zorzir_event_chain.0601.t: "Un Royaume Restauré"
zorzir_event_chain.0601.desc: "Tandis que le monde extérieur se déchire dans le chaos, au cœur des Montagnes Jaunes, tout est enfin en ordre. [GetTitleByKey('k_mablad_dum').GetNameNoTier] rendu à son propriétaire légitime, je peux me reposer pour la première fois depuis bien longtemps.\n\nHélas, mon âme n'est guère faite pour l'oisiveté, et il ne faut pas longtemps pour que mon esprit se peuple de visions lointaines, de contrées inexplorées et de futurs qui auraient pu être.\n\nJe songe à [adunabar.GetFirstName], aux épreuves qui l'attendent dans la restauration de ces antiques salles, mais je rêve aussi de jungles voilées d'Ombres et de hauts sommets lointains, attendant des lames hardies pour en revendiquer la possession."
zorzir_event_chain.0601.a: "[adunabar.GetFirstName] apportera gloire à notre peuple."
zorzir_event_chain.0601.b: "Il reste encore beaucoup à accomplir."

zorzir_mablad_axes: "Haches de Mablâd-dûm"