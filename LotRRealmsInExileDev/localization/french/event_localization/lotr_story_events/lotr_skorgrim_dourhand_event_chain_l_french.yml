 skorgrim_dourhand.0100.t: "Les Paroles du Guetteur"
 skorgrim_dourhand.0100.desc: "Au sein de [GetTitleByKey('c_zillinakhur').GetNameNoTier], une nouvelle me parvient : un parchemin craquelé a été découvert parmi les ruines d'une antique bibliothèque. Sa surface est fendue et ternie par les âges, mais les runes demeurent lisibles. Y est consigné le récit de [khathza_the_watcher.GetFirstNameNicknamed]. Il décrit le courroux du [king|E] [naugladur.GetFirstName] des [firebeards|E] après la traîtrise d'[elu_thingol|E] de [GetTitleByKey('k_doriath').GetNameNoTier], lorsque des artisans [dwarven|E]s remodelèrent le [nauglamir|E] pour y sertir un [silmaril|E]. Khathzâ relate son rôle d'émissaire auprès d'[elu_thingol.GetFirstName] et comment il fut l'un des deux seuls Nains à survivre à la perfidie.\n\nDe retour à [nogrod|E], Khathzâ enseigna à qui voulait l'entendre les préceptes des [GetFaithByKey('faith_firebeards').GetAdherentNamePlural], proclamant que ceux qui s'en remettent au jugement d'autrui sont voués à l'échec.\n\nSes paroles me frappent en plein cœur. La traîtrise qu'il endura diffère peu des humiliations que je subis moi-même — écarté, entravé, abandonné à l'erreur tandis que mon suzerain demeure impassible. Peut-être étais-je destiné à entendre ce récit, afin de me souvenir, comme Khathzâ l'enseignait, que la mémoire des trahisons passées est le seul rempart contre celles à venir."
 skorgrim_dourhand.0100.a: "Ses paroles sonnent juste — je les graverai en ma mémoire."
 skorgrim_dourhand.0100.b: "Les anciennes rancœurs ne mènent qu'à la ruine."
