l_french:
 
 zantaka_event_chain.0001.t: "Reine née des Ombres"
 zantaka_event_chain.0001.desc: "Enfin, [GetTitleByKey('k_lyneria').GetNameNoTier] m'appartient. Pour la première fois dans l'histoire, la Ligue Lynérienne a dépassé la simple confédération pour devenir un royaume véritablement puissant. Par-delà la Baie d'Ormal, tous sont contraints de s'incliner devant ma suprématie sans partage, même [GetTitleByKey('e_khy').GetNameNoTier] en personne. De grandes flottes sont rassemblées sous mon commandement, attendant mon ordre pour déverser toujours plus de richesses dans mes coffres sans fond. Les vieux Oligarques sont pratiquement impuissants, mon royaume est soumis à mon règne absolu.\n\nJ'ai accompli l'impossible, l'impensable. Le peu qui doutaient encore de mon règne et se moquaient de moi dans l'ombre sont désormais réduits au silence. Une ère nouvelle de puissance et de suprématie sans précédent, s'est levée sur [GetTitleByKey('k_lyneria').GetNameNoTier], et j'en suis le héraut.\n\nLes haillons dans lesquels je suis née ne sont plus que de lointains souvenirs, et mes anciens tourments sont oubliés devant ma puissance et ma gloire. Nul n'est désormais assez fou pour oser se dresser contre moi, nul n'est assez fort pour me renverser ou m'avilir. Je ne suis pas une simple dame de la nuit, ni une vile courtisane : je suis une #italic Reine#! et tous s'inclineront devant ma puissance !"
 zantaka_event_chain.0001.desc.other: "Enfin, le rêve qui a fondé ma maison s'est accompli. L'héritière de Zantaka règne désormais sur une Lynérie unifiée, son peuple enfin libéré de ses antiques chaînes. Sous mon règne sage et juste, ces terres ne peuvent que croître et prospérer."
 zantaka_event_chain.0001.a: "Que les puissants #italic désespèrent#! à mon nom !"

 zantaka_event_chain.0101.t: "Le Conseil Plie"
 #zantaka_event_chain.0101.desc: "Though the high and mighty Oligarchs of [GetTitleByKey('k_lyneria').GetNameNoTier] pride themselves on the meritocracy of their republics, the thought that they would elect a concubine of low birth to the rank that she would deserve is laughable. It would be #italic improper#! to have a council-master not born a son of one of the rich and ancient families, after all. In their eyes, one like me should stay silent, accept their orders and suffer anything for their pleasure. \n\nToday, however, that cruel and callous order comes crashing down. The Sylaara, they who had maintained order among the merchants for generations, are utterly destroyed. Overnight, the republic has fallen into anarchy as every Oligarch dreams of taking the role of council-master for themselves. Of course, I am prepared for this. For the past twelve years, I have built a network of spies, hidden from the gaze of any other, and have gathered a list of every murder, broken vow, embezzlement and illegal deal made by the oligarchs that make up the council. \n\nWhen, this morning, the council will gather to elect its new master, the way will be open for me openly denounce these crimes. Unless I receive the votes I deserve, of course..."
 zantaka_event_chain.0101.desc: "Au cours des douze dernières années, j'ai été libre d'agir dans les sphères les plus élevées du pouvoir sans que personne ne remarquât mes mouvements, tous supposant que je ne faisais rien de plus que satisfaire les désirs de mon maître. Mes longs efforts m'ont portée à la tête du plus grand réseau d'espions et d'informateurs de [GetTitleByKey('c_pelorna').GetNameNoTier]. Bien peu parmi les conseils sont exempts de boue et de honte, leur privilège leur ayant monté à la tête, gonflée de luxure et d'arrogance.\n\nLa Sylaara morte, les Oligarques réduits au silence par un chantage peu subtil et quelques mercenaires achetés avec le trésor de la cité #italic emprunté#!, je suis certaine que l'élection de demain me verra remporter le pouvoir que j'ai toujours mérité."
 zantaka_event_chain.0101.a: "Qu'ils essaient de m'arrêter maintenant !"
 zantaka_may_not_increase_authority: "#N Vous ne pouvez pas augmenter l'autorité de la couronne avant que votre règne ne se soit stabilisé.#!"

 zantaka_event_chain.0102.t: "La Fierté des Citoyens"
 #zantaka_event_chain.0102.desc: "With my rule now being established, if not popular, one would think that this would be the time for celebration. Indeed, the council knows that any attempt to remove me would bring it down with me, as their crimes would come to light and their reputation would plummet. In time, they will learn to bow to my will, as all servants must, but quiet hatred and words of rebellion will do for now. \n\nTo my surprise, however, it is not only the great Oligarchs that seem to detest the thought of the orphan of a tavern girl rising to power over their city. Even common citizens have taken to mocking me and resisting my rule, no matter my obvious skill as ruler. \n\nMy rule over [GetTitleByKey('c_pelorna').GetNameNoTier] seems to grow less secure by the day, every open act of defiance seemingly bringing about another. If I am to survive the coming months, years or perhaps simply weeks, I will need to put these detractors down and remind them that I am not a some arrogant concubine but their rightful master."
 zantaka_event_chain.0102.desc: "Bien que l'opposition à mon règne reste acharnée, le conseil s'est trouvé sans autre choix que de me désigner comme son maître. À ma surprise, cependant, la colère suscitée par mon ascension dépasse les Oligarques mécontents. En effet, même les simples citoyens expriment bruyamment et ouvertement leur mécontentement. Cette tendance constitue une menace majeure pour mon pouvoir.\n\nLe conseil ne feint de m'écouter que par crainte de l'indignation publique qui suivrait la révélation de ses secrets. Si j'étais perçue comme rien de plus qu'une usurpatrice mensongère, aucune preuve ne persuaderait les masses de mes affirmations, laissant la voie libre pour me renverser. Si je veux survivre aux années à venir, ou peut-être aux simples mois qui suivent, je #italic dois#! mettre fin à cette dissidence."
 zantaka_event_chain.0102.a: "Je ne faillirai pas maintenant !"
 zantaka_strife_begins: "#N Si, dans les 3 prochaines années, vous n'atteignez pas le niveau de légitimité #italic aspirante#!, le niveau de renommée #italic établie#! ou #italic 100 points de contrôle#! à [GetTitleByKey('c_pelorna').GetNameNoTier], #italic vous serez renversée du pouvoir !#!#!"

 zantaka_event_chain.0103.t: "La Volonté du Peuple"
 zantaka_event_chain.0103.desc: "Bien des conseils municipaux se soient tenus au cours des années de mon règne, celui-ci est différent. Je sens une tension dans l'air, comme si quelque chose de terrible devait survenir aujourd'hui. Je suis stupéfaite quand [council_leader.GetTitledFirstName], un sourire arrogant sur le visage, déclare que la question à débattre aujourd'hui est #italic mon#! procès pour le meurtre de la Sylaara. Comment cet incompétent a-t-il pu découvrir #italic ça#! ! Les meurtres étaient parfaits ! Bien sûr, mes motifs seraient évidents, mais ma position devrait me protéger de telles accusations sans fondement. Grâce à ce qui ne peut être que l'œuvre d'un traître dans les rangs réduits de mes agents, [council_leader.GetTitledFirstName] a rassemblé suffisamment de preuves pour monter un dossier sérieux contre moi.\n\nCertains membres du conseil feignent l'indignation, d'autres me regardent avec mépris. Il est clair que je n'aurai pas droit à un procès équitable, bien que dans de telles circonstances, même cela n'eût peut-être pas suffi à me sauver. À l'unanimité, je suis déclarée coupable de meurtre, de régicide et de trahison envers la cité. Alors que la garde s'avance pour m'emmener au cachot, [council_leader.GetTitledFirstName] les arrête. « Je vais #italic m'occuper#! d'elle moi-même. » leur dit-il avant de se tourner vers moi. « On vous a tendu la main, Zantaka, ne l'oubliez jamais. Vous paierez chèrement votre orgueil... »"
 zantaka_event_chain.0103.a: "Je te verrai mort, #italic porc#! !"

 zantaka_event_chain.0104.t: "Un Nouvel Ordre"
 zantaka_event_chain.0104.desc: "Enfin, mon pouvoir sur [GetTitleByKey('c_pelorna').GetNameNoTier] est assuré. Ceux qui me prenaient jadis pour une arriviste arrogante se trouvent désormais contraints de me reconnaître comme la dirigeante que je suis née pour être. Dans tout [GetTitleByKey('k_lyneria').GetNameNoTier], mon nom est connu et prononcé avec crainte parmi les élites dirigeantes.\n\nMon combat a été rude, ma victoire arrachée aux mains froides et mortes de l'ordre cruel qui me précédait. Mes rêves, jadis rien de plus que les chimères d'une pauvre orpheline, peuvent enfin se réaliser. Les cruels maîtres de ce monde connaîtront enfin la justice et la #italic terreur !#!"
 zantaka_event_chain.0104.a: "#italic Telle est la Colère de Vinaleem !#!"
 zantaka_reforms_begin: "Ayant assuré votre autorité sur [GetTitleByKey('c_pelorna').GetNameNoTier], vous êtes désormais libre d'entreprendre des réformes dans vos terres et de chercher à étendre votre pouvoir sur [GetTitleByKey('k_lyneria').GetNameNoTier] dans son ensemble."

 zantaka_event_chain.0105.t: "Le Marché du Faiseur de Rois"
 zantaka_event_chain.0105.desc: "Après une nouvelle réunion fastidieuse du conseil municipal, je suis surprise de voir [council_leader.GetTitledFirstName], mon principal rival parmi les Oligarques, venir me trouver. Avant que je puisse lui poser la moindre question, il m'attrape le bras et commence à parler. « Zantaka », dit-il, s'abstenant de m'appeler par mon titre, « permettez-moi d'être direct. Votre position est intenable. Votre chute n'est pas une question de #italic si#! mais de #italic quand#!. Cependant, il se peut que je sois en mesure de trouver un arrangement qui #italic plaise#! à nous deux. Ma femme est décédée récemment, voyez-vous, et j'aurais grand plaisir à avoir une femme de votre... #italic qualité#! à mes côtés... et dans mon lit, bien sûr. »\n\nJe faillis rejeter cette proposition insultante dès que je l'entends, mais je me retiens au dernier moment. Tenir le conseil seule, entourée de rien d'autre qu'ennemis, sera certainement difficile, même pour une femme aussi habile que moi. Mais cette alliance vaut-elle vraiment que je vende mon corps et mon âme à un autre ? Tandis que j'hésite, [council_leader.GetTitledFirstName] se penche vers moi, les yeux emplis du désir que je vois chez trop d'hommes. « Si mon offre vous intéresse, rejoignez-moi dans mes appartements ce soir. Je vous fais confiance pour être à la hauteur de votre #italic réputation#!... »"
 zantaka_event_chain.0105.a: "Je n'ai plus pour métier de dormir avec des #italic porcs#! !"
 zantaka_event_chain.0105.b: "J'ai enduré bien pire pour en arriver là..."
 zantaka_marriage_no: "Vous refusez l'offre de [council_leader.GetTitledFirstName], espérant assurer votre règne seule et imposer votre vision sur [GetTitleByKey('c_pelorna').GetNameNoTier] sans liens avec l'ancien ordre."
 zantaka_marriage_yes: "Vous vous soumettez à [council_leader.GetTitledFirstName], servant d'épouse et abandonnant votre liberté nouvellement acquise pour assurer votre mainmise sur le pouvoir à tout prix."

 zantaka_event_chain.0106.t: "La Voie des Reines"
 zantaka_event_chain.0106.desc: "Pour la première fois, je suis libre de me tourner vers l'avenir, libérée de la peur et des tourments qui ont longtemps hanté mon esprit. Rien qu'à l'intérieur de [GetTitleByKey('k_lyneria').GetNameNoTier], je règne sur l'une des cités les plus pauvres, encerclée des deux côtés par les grandes puissances de la ligue. Si je ne suis pas prudente, je pourrais encore chuter après tant d'efforts.\n\nBien que j'aie des rêves de réforme pour ces terres, je dois encore prendre en compte la froide réalité de la politique. En tant que femme non mariée, la première étape vers un pouvoir plus grand serait normalement de me trouver un mari faible et facile à contrôler. Si je m'engageais dans cette voie, le meilleur choix serait assurément [emelkyn_son.GetTitledFirstName], fils de [emelkyn_ruler.GetTitledFirstName] de [GetTitleByKey('c_emelcyn').GetNameNoTier]. Pourtant, je n'ai aucun désir de me marier et de retomber sous l'emprise d'un homme, ne serait-ce qu'en apparence, et de telles manœuvres politiques pragmatiques m'obligeraient certainement à abandonner mon rêve de réforme."
 zantaka_event_chain.0106.a: "Je les vaincrai tous..."
 zantaka_revolt_route_tooltip: "Vous restez fidèle à vos rêves révolutionnaires, cherchant à prouver au monde qu'il avait tort de douter un seul instant de votre habileté et de votre droit à régner."
 zantaka_event_chain.0106.b: "Je ne suis pas arrivée ici en m'insurgeant contre le monde..."
 zantaka_marriage_route_tooltip: "Vous rechercherez le mariage et le pouvoir politique à [GetTitleByKey('c_emelcyn').GetNameNoTier], abandonnant vos rêves de grande réforme au profit du pouvoir personnel."
 zantaka_league_loses_opinion: "Tous les membres de la Ligue Lynérienne perdent #N 80#! points d'[opinion|El] à votre égard."

 zantaka_event_chain.0107.t: "Le Jugement d'un Conseil"
 zantaka_event_chain.0107.desc: "À mon arrivée à [GetTitleByKey('c_emelcyn').GetNameNoTier], je reçois un accueil plutôt froid de la part de [emelkyn_ruler.GetTitledFirstName]. Les formalités d'usage une fois expédiées, je suis autorisée à entrer dans la cité et à me présenter officiellement devant son conseil en tant que candidate au mariage de [emelkyn_son.GetTitledFirstName], l'un de ses membres les plus éminents.\n\nMa réputation souffrant encore grandement de mes origines, il faudrait beaucoup d'efforts, de débats et de persuasion pour faire pencher le conseil en ma faveur, si tant est qu'il le soit jamais. Cependant, [emelkyn_ruler.GetTitledFirstName] exerce une grande influence sur ses pairs oligarques en raison de sa position. Peut-être suffirait-il de gagner ses faveurs pour que le mariage soit conclu. Cependant, une troisième voie s'offre également à moi. [emelkyn_son.GetTitledFirstName] est un homme luxurieux, brûlant de désir. Si je trouvais la bonne occasion, je pourrais peut-être le convaincre de me prendre pour épouse en dépit des souhaits du conseil. Bien que je répugne à emprunter ce chemin, je #italic devrai#! coucher avec lui à un moment ou à un autre..."
 zantaka_event_chain.0107.a: "Je conquerrai le cœur de [emelkyn_son.GetTitledFirstName]..."
 zantaka_event_chain.0107.success.seduction: "#P Vous trouvez l'occasion de tenter de séduire [emelkyn_son.GetTitledFirstName].#!"
 zantaka_event_chain.0107.failure: "#N Votre tentative de mariage avec [emelkyn_son.GetTitledFirstName] s'est soldée par un échec.#!"
 zantaka_event_chain.0107.b: "[emelkyn_ruler.GetTitledFirstName] finira bien par s'adoucir avec suffisamment d'efforts."
 zantaka_event_chain.0107.success: "#P Vous réussissez à arranger votre mariage avec [emelkyn_son.GetTitledFirstName].#!"
 zantaka_event_chain.0107.c: "Le conseil prêtera attention à mes paroles."
 zantaka_personal_seduction: "Vous chercherez une occasion de séduire [emelkyn_son.GetTitledFirstName], pour qu'il vous désigne comme son épouse en dépit des souhaits du reste de son royaume."
 zantaka_befriend_ruler: "Vous tentez de convaincre [emelkyn_ruler.GetTitledFirstName] de soutenir votre mariage avec [emelkyn_son.GetTitledFirstName]."
 zantaka_convince_council: "Vous tentez de convaincre le conseil d'autoriser votre mariage avec [emelkyn_son.GetTitledFirstName] sur la seule base de vos mérites."

 zantaka_event_chain.0108.t: "Reine de Cœurs"
 zantaka_event_chain.0108.desc: "Depuis mon arrivée à [GetTitleByKey('c_emelcyn').GetNameNoTier], j'ai guetté et saisi toute occasion d'approcher [emelkyn_son.GetTitledFirstName]. D'abord, je me contente de lui parler, mais très vite j'ose aller plus loin. De simples sourires et caresses se transforment en un baiser volé loin des regards du conseil. La nuit tombée après une longue journée de séduction et de débats, ma prochaine démarche est évidente. Avec l'aide d'un serviteur soudoyé, j'emprunte les passages secrets dissimulés dans le palais jusqu'aux appartements de ma cible, vêtue de ma chemise de nuit la plus séduisante. Il est naturel que je joue ma meilleure carte.\n\n[emelkyn_son.GetTitledFirstName] est stupéfait de me voir, mais manifestement #italic très#! ravi. « Mon cher, je vous désire plus que vous ne pouvez l'imaginer », lui dis-je doucement. « Jamais je n'ai vu un homme aussi irrésistible que vous, [emelkyn_son.GetTitledFirstName]. Le conseil, froid et aveugle à l'amour, souhaiterait nous tenir séparés, mais je sais que c'est Vinaleem elle-même qui m'a amenée dans vos bras. Je le vois dans vos yeux : vous aussi me désirez, n'est-ce pas ? Je suis vôtre. Il n'est désir ni plaisir que je vous refuserais. » Je me penche vers lui et l'embrasse avec une passion feinte mais ardente. « Faites-moi l'amour ce soir, faites de moi votre femme demain, et chaque nuit qui suivra je serai vôtre. » Ce qui suit, je le connais fort bien. Sous peu, je verrai si j'ai là une marionnette entre les mains..."
 zantaka_event_chain.0108.a: "Tels sont les prix du pouvoir..."
 zantaka_event_chain.0108.success_crit: "#P [emelkyn_son.GetTitledFirstName] est totalement envoûté et devient le mari faible que vous cherchiez.#!"
 zantaka_event_chain.0108.success: "#N [emelkyn_son.GetTitledFirstName] accepte de vous épouser après votre #italic démonstration#! mais demeure un agent libre.#!"

 zantaka_event_chain.0109.t: "Le Jeu du Marionnettiste"
 zantaka_event_chain.0109.seduce: "Après une nuit fort longue qui a visiblement épuisé [emelkyn_son.GetTitledFirstName], le second jour de débats avec le conseil commence. Dès l'ouverture de la séance, j'ai déclaré que [emelkyn_son.GetTitledFirstName] m'avait officiellement prise pour épouse la nuit précédente, expliquant ainsi ce qui eût autrement constitué un comportement #italic scandaleux#!. Après ma prestation plus qu'impressionnante, [emelkyn_son.GetTitledFirstName] confirme mes paroles. Le conseil de [GetTitleByKey('c_emelcyn').GetNameNoTier], incapable de trouver quelque réfutation raisonnable aux paroles de mon nouveau mari, accepte à contrecœur de reconnaître mon mariage avec [emelkyn_son.GetTitledFirstName]. En dépit de cette victoire, elle me paraît creuse. Me voilà avec un mari bien connecté, stupide, facile à contrôler et idéalement placé pour faciliter mon ascension, mais cela a un prix. De jour, je serai puissante, mais de nuit je devrai de nouveau être l'esclave du plaisir d'un autre..."
 zantaka_event_chain.0109.other: "Bien que [emelkyn_ruler.GetTitledFirstName] et son conseil se soient d'abord fortement opposés à mon mariage avec [emelkyn_son.GetTitledFirstName], cette attitude semble avoir enfin évolué. Pour ce qui est peut-être la première fois, j'ai su convaincre les hautes cours du pouvoir que je suis plus que ma mère ou que ma naissance.\n\nSi [emelkyn_son.GetTitledFirstName] doit véritablement devenir un agent loyal, je n'aurai d'autre choix que de me soumettre à son plaisir, du moins en partie, pour qu'il devienne dépendant de moi. Même maintenant, tandis que je m'élève pour devenir la femme la plus puissante que [GetTitleByKey('k_lyneria').GetNameNoTier] ait jamais connue, l'ambition a un prix, et pour moi, il a toujours été le même..."
 zantaka_event_chain.0109.a: "Le pouvoir vaut #italic toujours#! le sacrifice !"

 zantaka_event_chain.0110.t: "Une Toile Déchirée"
 zantaka_event_chain.0110.desc: "En dépit de tous mes efforts, [emelkyn_ruler.GetTitledFirstName] et son conseil ont écarté toute possibilité d'accepter mon mariage avec [emelkyn_son.GetTitledFirstName]. En quittant [GetTitleByKey('c_emelcyn').GetNameNoTier], je suis envahie par l'amertume de la défaite. J'aurais peut-être dû être plus audacieuse dans mes manœuvres, moins retenue, plus disposée à mentir et à me soumettre pour plaire. Cette humiliation ne sera certes pas oubliée de sitôt, mais quelque chose en moi est soulagée. Mon esprit se tourne une fois encore vers mes vieux rêves, vers les réformes que j'avais longtemps rêvé d'apporter à mon peuple. Il se peut fort bien qu'une voie vers le pouvoir s'étende encore devant moi, même si elle sera longue et difficile..."
 zantaka_revolution_take_2: "Vous empruntez une fois encore la voie de la révolution et de la réforme, cherchant à vous hisser au pouvoir dans [GetTitleByKey('k_lyneria').GetNameNoTier] aux dépens des forces qui vous ont fait du tort."
 zantaka_event_chain.0110.a: "C'est peut-être un signe..."
 zantaka_event_chain.0110.b: "Je saurai sûrement en trouver un autre."

 zantaka_event_chain.0111.t: "Ligue dans la Ligue"
 zantaka_event_chain.0111.desc: "Enfin, le vrai pouvoir est mien. [GetTitleByKey('c_emelcyn').GetNameNoTier], fière et #italic puissante#!, est désormais sous mon autorité. Je me croyais riche quand j'avais pris pour la première fois le pouvoir sur la petite ville de [GetTitleByKey('c_pelorna').GetNameNoTier]. Désormais, je sais que la richesse est bien plus grande que ce que j'avais imaginé. Ma vie est si agréable que je pourrais presque oublier mon mari [emelkyn_vassal.GetTitledFirstName].\n\nEt pourtant, même maintenant, je ne suis pas satisfaite. Après avoir tant souffert pour en arriver là, ne mérite-je pas tout ? Quand je regarde la carte de mon royaume, je ne puis m'empêcher d'être agacée par la souveraineté persistante de la petite cité-état de [GetTitleByKey('c_murnak').GetNameNoTier]. Sa position en ferait un atout précieux pour consolider mon nouveau royaume en un État cohérent. Si je venais à régner sur tout [GetTitleByKey('d_sylara').GetNameNoTier], [GetTitleByKey('k_lyneria').GetNameNoTier] tout entière pourrait suivre."
 zantaka_event_chain.0111.a: "Je veux #italic tout !#!"
 zantaka_event_chain.0111.b: "C'est... c'est suffisant."
 zantaka_sieze_murnak: "Vous tenterez de soumettre [GetTitleByKey('c_murnak').GetNameNoTier] à votre royaume grandissant, au risque d'attirer la colère de la ligue dans son ensemble."
 zantaka_no_murnak: "Vous vous contentez de votre ascension déjà impressionnante, savourant les fruits de votre élévation."
 zantaka_league_opinion_loss: "Tous les membres de la Ligue Lynérienne ont perdu #N 50#! points d'[opinion|El] à votre égard."

 zantaka_event_chain.0112.t: "Jeux de Pouvoir"
 zantaka_event_chain.0112.desc: "Il semble difficile de croire que le dernier obstacle sur la voie de mes rêves de pouvoir sans rival soit de soumettre une cité aussi mineure que #italic [GetTitleByKey('c_murnak').GetNameNoTier]#!. Pourtant, cette cité sera probablement la goutte qui fait déborder le vase aux yeux de la Ligue, dont les chefs sont déjà mécontents de mon ascension. Mon ambition ne sera pas étouffée ici, ni nulle part, jusqu'à ce que tout [GetTitleByKey('k_lyneria').GetNameNoTier] soit mien.\n\nIl me faudra cependant un plan pour soumettre [GetTitleByKey('c_murnak').GetNameNoTier]. Ma richesse nouvellement acquise rendrait assez facile la corruption du conseil de la cité pour lui faire signer un traité de soumission, mais une telle entreprise se révélerait probablement fort coûteuse, même pour quelqu'un d'aussi riche que moi. M'étant emparée de la puissante flotte de [GetTitleByKey('c_emelcyn').GetNameNoTier], je pourrais chercher à imposer un blocus de la cité, mais un tel acte de domination ne manquerait pas d'attiser la colère de la Ligue."
 zantaka_event_chain.0112.a: "Un pot-de-vin #italic généreux#! devrait arranger les choses..."
 zantaka_murnak_bribe: "Vous corrompez le conseil municipal de [GetTitleByKey('c_murnak').GetNameNoTier] pour obtenir sa soumission."
 zantaka_event_chain.0112.b: "Ma flotte saura les effrayer jusqu'à la soumission..."
 zantaka_murnak_blockade: "Vous tentez de bloquer le port de [GetTitleByKey('c_murnak').GetNameNoTier] pour forcer sa soumission."
 zantaka_event_chain.0112.success: "#P Vous réussissez à soumettre [GetTitleByKey('c_murnak').GetNameNoTier].#!"
 zantaka_event_chain.0112.failure: "#N Vous échouez à soumettre [GetTitleByKey('c_murnak').GetNameNoTier].#!"

 zantaka_event_chain.0113.t: "Volonté Sans Fin"
 zantaka_event_chain.0113.desc: "Comme prévu, mes efforts pour soumettre [GetTitleByKey('c_murnak').GetNameNoTier] à mon royaume ont été couronnés d'un grand succès. [murnak_ruler.GetTitledFirstName] a vu l'inutilité de résister à mon ascension inévitable et a accepté mes conditions de soumission.\n\nTandis que la ligue s'indigne et élève de grandes protestations, la soumission #italic volontaire#! de [GetTitleByKey('c_murnak').GetNameNoTier] la maintient impuissante à agir contre moi. D'ici une décennie environ, je suis certaine que cette inimitié s'apaisera, la Ligue étant trop divisée pour agir véritablement contre mon pouvoir. D'ici là, j'aurai certainement accru mon influence au point de pouvoir enfin réaliser l'unification de la Ligue sous un souverain absolu : moi-même, bien entendu. Il ne me reste plus qu'à attendre que ma réputation se refasse."
 zantaka_event_chain.0113.a: "Nul désormais ne peut s'opposer à moi !"

 zantaka_event_chain.0114.t: "La Ligue Se Dresse"
 zantaka_event_chain.0114.desc: "Comprenant peut-être mieux sa situation que je ne l'aurais cru, [GetTitleByKey('c_murnak').GetNameNoTier] a refusé et dénoncé ma tentative de la soumettre à mon royaume. Les éternels Oligarques hautains de la Ligue ont officiellement déclaré mes actes comme une déclaration de guerre et exigé de lourdes réparations en compensation de mes actes criminels.\n\nBien que j'eusse souhaité mener à bien mon ascension en paix, il m'est clair désormais qu'elle devra être accomplie par la guerre. Sûrement, moi qui ai pu ourdir la chute de maisons vieilles de siècles, réduire des hommes à l'état de simples marionnettes et gouverner mon royaume mieux que n'importe quel maître de conseil avant moi, puis-je remporter une guerre contre ces Oligarques ventrus et inutiles..."
 zantaka_event_chain.0114.a: "Je. Ne. Faillirai. PAS. ICI !"

 zantaka_event_chain.0201.t: "Miroir de Pitié"
 zantaka_event_chain.0201.desc: "Alors que j'effectue une inspection du port de la cité, mes gardes m'alertent qu'une partie de mes perceptions fiscales a été dérobée. Ils m'apprennent qu'une jeune fille leur avait parlé, semblant d'abord vouloir les séduire, pour que, leurs gardes baissées, un complice s'empare de l'or volé. Ce forfait me rappelle en quelque sorte les jours de ma jeunesse. De toute évidence, quiconque a organisé ce plan savait ce qu'il faisait. De telles aptitudes pourraient toujours s'avérer utiles...\n\nLorsque mes gardes capturent inévitablement la jeune fille, on m'informe qu'elle était la meneuse de ces voleurs. Intéressée, je décide de lui parler. « Quel est ton nom, jeune fille ? » lui demandai-je. Elle hésite avant de répondre. « Je ne sais pas pourquoi ça vous importe, Madame, mais je m'appelle [daughter.GetTitledFirstName]. Je n'ai rien qui puisse intéresser une femme riche comme vous, à moins que les garçons ne soient pas votre genre... » « J'ai toujours besoin d'agents supplémentaires et de serviteurs habiles », lui répondis-je. « Si vous êtes assez audacieuse et habile pour voler un maître de conseil, peut-être seriez-vous disposée à aller plus loin pour le juste prix... » La jeune fille semble intéressée. Je viens peut-être de me trouver un nouvel agent..."
 zantaka_event_chain.0201.a: "Voyons ce qu'elle vaut..."
 zantaka_adopts_girl: "Vous faites de [daughter.GetTitledFirstName] votre agent, cherchant à éprouver sa valeur."
 zantaka_event_chain.0201.b: "J'ai des affaires plus importantes à régler..."
 zantaka_no_adoption: "Vous abandonnez l'idée de faire de [daughter.GetTitledFirstName] votre agent."

 zantaka_event_chain.0202.t: "Parenté Trouvée"
 zantaka_event_chain.0202.desc: "Au cours des derniers mois, je suis passée de voir [daughter.GetTitledFirstName] comme un agent à la voir comme une amie proche. Il s'était écoulé bien de longues années depuis que j'avais eu quelqu'un à qui parler librement, quelqu'un qui pût véritablement me comprendre, moi et ma vie. En [daughter.GetTitledFirstName], j'ai trouvé une amie, peut-être la plus proche que j'aie jamais eue.\n\nPourtant, quelque chose en moi ressent un lien plus profond avec elle. Par mon choix, je n'ai jamais été mère, cherchant toujours à empêcher les hommes qui m'avaient usée de m'imposer les douleurs de la maternité. Pourtant, quand je vois [daughter.GetTitledFirstName], quelque chose en moi ressent un amour maternel primitif pour elle.\n\nJe suis sans héritière et je n'ai aucun désir de laisser un mari faire de moi ce qu'il veut. Peut-être pourrais-je officialiser mon lien avec [daughter.GetTitledFirstName] en l'adoptant comme ma propre fille. Cela me donnerait une héritière sans avoir besoin d'un mari, certes. Mais au-delà même de cela, cela me semble tout simplement juste."
 zantaka_event_chain.0202.a: "Est-ce donc à quoi ressemble le #italic bonheur#! ?"
 zantaka_event_chain.0202.b: "Même maintenant, il serait plus sage de chercher une héritière #italic convenable#!..."

 zantaka_event_chain.0203.t: "Trésors Brisés"
 zantaka_event_chain.0203.desc: "Avec l'adoption forcée de mon nouvel édit, les monopoles qui ont longtemps accablé le peuple de [GetTitleByKey('k_lyneria').GetNameNoTier] ont été bannis dans mes terres. Quels que soient les grognements des Oligarques, ils n'ont d'autre choix que de s'y plier. Je suis certaine que beaucoup d'entre eux chercheront quelque subterfuge pour conserver leur pouvoir injuste, mais cette résistance ne fera que renforcer mes réformes avec le temps.\n\nLe peuple ordinaire a désormais, pour la première fois, accès aux opportunités qui lui ont toujours été refusées. Ils n'ont plus besoin de s'épuiser au profit d'une guilde ou d'un marchand avide : tous sont désormais libres de travailler pour leur propre profit et avancement. Sous peu, je suis certaine qu'une nouvelle génération de gens habiles, longtemps négligés, viendra remplacer les politiciens corrompus du conseil, bien que je doive encore me contenter de cette horrible vieille garde pour l'instant."
 zantaka_event_chain.0203.a: "Je me délecte de la rage de ces sots..."

 zantaka_event_chain.0204.t: "La Plume ou l'Épée"
 zantaka_event_chain.0204.desc: "Ayant rassemblé les ressources considérables nécessaires pour lancer ma nouvelle politique d'apport de prospérité aux masses longtemps opprimées de mon royaume, le temps est venu de décider précisément #italic comment#! allouer ces ressources.\n\nUne option serait d'investir massivement dans l'éducation et le développement économique, cherchant à éclairer la population et à accroître sa richesse par une plus grande attention portée à l'excellence artisanale.\n\nUne autre option serait d'affecter ces fonds à ma flotte et au commerce. Une telle entreprise ne manquerait pas d'accroître la richesse de mes terres et d'augmenter mon pouvoir et mon influence, une plus grande puissance navale renforcerait certainement aussi ma position militaire, consolidant davantage ma situation."
 zantaka_event_chain.0204.a: "Mes terres seront plus riches que jamais !"
 zantaka_event_chain.0204.b: "Laissons les autres peiner pendant que nous récoltons."
 zantaka_peasant_education: "Vous concentrez vos ressources sur le développement local."
 zantaka_peasant_navy: "Vous concentrez vos efforts sur le développement du commerce."
 zantaka_event_chain.0204.success: "#P Vos investissements sont couronnés de succès.#!"
 zantaka_event_chain.0204.failure: "#N Vos investissements ont échoué.#!"

 zantaka_event_chain.0205.t: "Temps de la Récolte"
 zantaka_event_chain.0205.success: "Bien que ce fût difficile au début, mes investissements dans mon peuple et mon royaume ont été couronnés d'un grand succès. Mes sujets ne peinent plus pour peu de gain, engraissant seulement la bourse de leurs maîtres indifférents ! À la place de leur misère, ils trouvent une richesse nouvelle.\n\nÀ mesure que mon peuple s'enrichit, je m'enrichis aussi. Mon influence sur l'ensemble de [GetTitleByKey('k_lyneria').GetNameNoTier] grandit désormais de jour en jour, tandis que l'ancien ordre se voit contraint de reconnaître ma longue série de succès. Ma position est plus forte que jamais et pourtant, il reste encore tant à faire. Sous peu, peut-être, j'aurai véritablement extirpé les Oligarques, dont l'hégémonie commence enfin à se désagréger..."
 zantaka_event_chain.0205.fail: "En dépit de tous mes efforts, mes grands plans pour l'élévation des opprimés de mes terres se sont heurtés à un échec complet.\n\nÀ maintes reprises, les Oligarques ont pu détourner ou diluer mes fonds jusqu'à ce qu'il n'en reste si peu que cela ne servît plus à rien. Mon trésor ayant désormais été gaspillé, je doute de pouvoir jamais réunir de nouveau de tels moyens pour une réforme d'une telle ampleur.\n\nIl semble que je sois condamnée à rester un acteur mineur dans [GetTitleByKey('k_lyneria').GetNameNoTier], du moins pour l'instant..."
 zantaka_event_chain.0205.a: "Ces gros porcs connaîtront bientôt la faim..."
 zantaka_event_chain.0205.b: "Comment ont-ils pu voler #italic autant#! d'or ?!"

 zantaka_event_chain.0206.t: "Le Droit d'une Reine"
 zantaka_event_chain.0206.desc: "Enfin, les traditions séculaires qui ont tenu les femmes à l'écart du pouvoir dans le monde lynérien ont été abolies. Grâce à mes immenses efforts en tant que première dirigeante d'un [GetTitleByKey('k_lyneria').GetNameNoTier] véritablement unifié, mes sujets ont enfin accepté de mettre fin à leur insensée mise à l'écart de tant d'âmes.\n\nPourtant, une question reste encore sans réponse. L'ancien ordre avait longtemps pris l'habitude de traiter les concubines comme de simples esclaves, une habitude avec laquelle je suis bien trop familière. L'ancien ordre étant enfin véritablement mort, je pourrais enfin mettre fin à cette pratique infâme. Si cela ne tenait vraiment qu'à moi, je pousserais mes réformes encore plus loin, une dernière fois, pour mettre fin à cette tache noire sur une terre par ailleurs juste et prospère. Un tel geste pourrait cependant m'attirer la colère de certains de mes sujets, même parmi ceux que j'ai moi-même portés au pouvoir. Il semblerait presque ridicule de s'arrêter ici, mais peut-être ai-je été suffisamment loin..."
 zantaka_event_chain.0206.a: "Les dernières chaînes se brisent maintenant."
 zantaka_event_chain.0206.b: "Cela risque d'aller trop loin..."

 zantaka_event_chain.0207.t: "Un Nouvel Ordre"
 zantaka_event_chain.0207.desc: "Les Oligarques, eux qui s'étaient si longtemps dressés contre moi, qui avaient voulu m'écraser depuis le jour de ma naissance, sont enfin tombés. L'ancien ordre, qui avait gouverné [GetTitleByKey('k_lyneria').GetNameNoTier] pendant des siècles, a été aboli. Les grandes familles marchandes qui infestaient nos cités comme des parasites sont enfin impuissantes, leurs anciens sujets libres de leurs chaînes.\n\nÀ la place de l'Ancienne Ligue, un grand royaume s'élève désormais. Plus jamais la position ne viendra de la richesse ! Ce sera le mérite, et le mérite seul, qui dictera qui s'élèvera au pouvoir dans mon nouvel ordre.\n\nSous mon règne, et peut-être celui de mes successeurs, je suis certaine que [GetTitleByKey('k_lyneria').GetNameNoTier] grandira d'une union de petites cités s'inclinant devant les grandes puissances de la Baie à un empire à part entière. Un jour, nous mettrons même [GetTitleByKey('e_khy').GetNameNoTier] à genoux !"
 zantaka_event_chain.0207.a: "Ma gloire ne cesse de croître."

 zantaka_event_chain.0208.t: "Armées dans les Ombres"
 zantaka_event_chain.0208.desc: "Des années de préparation ont mené à ce moment. Partout dans [GetTitleByKey('k_lyneria').GetNameNoTier], les ennemis de l'ordre régnant attendent mon commandement, leur service à ma cause assuré.\n\nLà où il y avait jadis une centaine de factions mesquines réclamant le changement ou la réforme, il n'en existe plus qu'une. À mon appel, des milliers sont prêts à prendre les armes au nom de la fin de la tyrannie des Oligarques.\n\nPourtant, la Ligue reste puissante. Elle combattrait certainement comme un seul homme contre notre cause, tout comme nous le ferons. Je dois choisir le bon moment pour frapper, ou je risque de me trouver face à la défaite. Que ce soit dans des mois ou des années, mes hommes seront prêts quand le jour viendra. Bientôt, la Ligue tombera et, à sa place, je m'élèverai !"
 zantaka_event_chain.0208.a: "Tout sera bientôt prêt..."
 zantaka_event_chain.0208.a.effects: "Vous pouvez désormais déclarer la guerre à la Ligue Lynérienne, lors de laquelle vous serez soutenue par vos loyalistes dispersés à travers [GetTitleByKey('k_lyneria').GetNameNoTier]."

 zantaka_event_chain.0209.t: "La Guerre des Renégats"
 zantaka_event_chain.0209.desc: "L'heure est venue. Mes forces se sont rassemblées ouvertement dans les cités de la Ligue, selon mon ordre. Partout dans [GetTitleByKey('k_lyneria').GetNameNoTier], mes hommes commencent à attaquer les forces des conseils dirigeants. Bien vite, les Oligarques perdent le contrôle de la situation tandis que mes foules loyales commencent à piller et ravager les campagnes lynériennes.\n\nVient désormais le moment pour moi de me déclarer ouvertement. Je fais passer le message à travers les cités de la Ligue : je ne l'accepterai plus, ni ses institutions infâmes ! À sa place, je régnerai en souveraine absolue et j'apporterai la réforme dont notre peuple a si désespérément besoin.\n\nL'appel à la guerre résonne puissamment à travers tout [GetTitleByKey('k_lyneria').GetNameNoTier], d'abord des centaines, puis bientôt des milliers rejoignent la lutte pour ma cause. Bientôt, la Ligue tombera et je prendrai sa place."
 zantaka_event_chain.0209.a: "Tout a mené à ce jour."
 zantaka_rebels: "Combattants Rebelles Lynériens"
 zantaka_lyneria_cb: "Guerre Civile Lynérienne"

 zantaka_event_chain.0210.t: "La Guerre d'une Renégate"
 zantaka_event_chain.0210.desc: "Dans quelque cité reculée, l'usurpatrice [claimant.GetTitledFirstName] s'est sottement arrogé le titre de souverain absolu de tout [GetTitleByKey('k_lyneria').GetNameNoTier]. Si pareille prétention eût normalement été tournée en dérision, balayée et résolue en quelques mois de pression, [claimant.GetTitledFirstName] a rassemblé des forces considérables sous son commandement.\n\nBien que cette racaille soit peu susceptible d'avoir la force de renverser notre ordre vieux de siècles, elle est suffisamment importante pour susciter quelque inquiétude. Si la Ligue n'agit pas maintenant, elle pourrait très bien se trouver submergée par cette crise..."
 zantaka_event_chain.0210.a: "Ces sots seront remis à leur place !"