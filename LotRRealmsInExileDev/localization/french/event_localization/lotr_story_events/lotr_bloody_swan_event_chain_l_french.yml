 ###########################
 # Bloody Swan Event Chain #
 ###########################

 ### Éira events ###
 bloody_swan.0001.t: "Le Dard du Poison"
 bloody_swan.0001.desc: "Tandis que je me tiens devant la dépouille inerte de mon père, [murdered_father.GetFirstName], ma vision troublée par les larmes qui montent à mes yeux, je sens que je suis au bord du désespoir. Longtemps mon père avait œuvré pour rapprocher les clans perpétuellement hostiles des collines, et ces derniers mois, il était enfin parvenu si près de son but. Mais à présent, il semble que tout cela fut en vain...\n\nJ'essuie les larmes de mon visage et contemple mon père une fois encore. Il paraît paisible dans la mort, du moins. Mais... qu'est-ce donc ? Pourquoi les veines de son cou sont-elles si sombres et visibles ? J'appelle l'un des herboristes à mes côtés et celui-ci confirme promptement mes soupçons : voici la marque d'un homme qui fut empoisonné. Et je crois savoir qui est le fourbe derrière ce sombre méfait..."
 bloody_swan.0001.a: "Ce chien du [gondor|E] paiera pour ce qu'il a fait, j'en fais le serment."
 bloody_swan.0001.a.tt: "Débloque plusieurs #high decisions#!"

 bloody_swan.0002.t: "En Quête de Réponses"
 bloody_swan.0002.desc: "Le rêve de mon père attarde dans les vallées et les contreforts de cette terre ; un murmure sur le vent, une promesse laissée inachevée. Il souhaitait la paix entre les clans, l'unité parmi notre peuple... et maintenant il repose froid dans la terre, trahi par le pouvoir même aux côtés duquel il cherchait à œuvrer.\n\nJe n'ai encore aucune preuve — seulement une amère certitude. Le poison qui l'a emporté, le moment de sa mort, les remous politiques qu'elle a causés ; tout cela oriente mes pensées vers [tharbad|E]. Vers [gondorian_governor.GetName]. Je dois avancer prudemment. Pas d'accusations précipitées, pas de colère mal placée. Il me faut des preuves. Il me faut des témoins. Il me faut la vérité.\n\nDes messages doivent être envoyés à nos alliés dispersés. De vieilles chroniques doivent être fouillées. Et peut-être... se trouve-t-il dans la cour de Glormagil des hommes qui nourrissent leurs propres rancœurs — ou des langues qui se délient. Je découvrirai ce qui a été fait, et par quelle main. Mais je ne laisserai pas la mort de mon père me paralyser. Les tribus me regardent désormais. Son héritage leur inspire encore confiance. Et d'une façon ou d'une autre, je veillerai à l'honorer."
 bloody_swan.0002.a: "Le temps du deuil est révolu. À présent, il me faut agir."
 bloody_swan.0002.a.tt: "Vous vous rendrez à [tharbad|E] pour y chercher des réponses"

 bloody_swan.0003.t: "Le Suspect à Tharbad"
 bloody_swan.0003.desc: "Tout désigne [tharbad|E]. La mort de mon père était trop précise, trop opportune, et trop propre pour une querelle tribale ou une rancœur personnelle. Il ne représentait une menace que pour un seul homme : celui qui a le plus à gagner de son absence.\n\n[gondorian_governor.GetName], gouverneur de l'[enedhwaith|E], feint d'être un maître lointain, mais son bras est plus long que la plupart ne l'imaginent. Des murmures circulent à Tharbad ; des serviteurs congédiés trop brusquement, des guérisseurs réduits au silence trop promptement, un festin où le vin ne fut versé que pour un seul.\n\nS'il a véritablement fait empoisonner mon père, il n'aura pas agi au grand jour. Mais la vérité filtre toujours par les fissures. Je dois écouter attentivement... et frapper quand le moment sera venu."
 bloody_swan.0003.a: "Vos murs ne vous protégeront pas de la justice, Glormagil."
 bloody_swan.0003.a.tt: "Vous demeurez à Tharbad quelques jours pour y chercher des réponses"

 bloody_swan.0004.t: "Une Toile de Mensonges"
 bloody_swan.0004.desc: "J'ai commencé à démêler les récits de ceux qui sont proches de [gondorian_governor.GetName] : anciens serviteurs, scribes exilés, et jusqu'à l'un de ses rivaux à la cour. Ils parlent tous avec soin, avec précaution... mais je sais entendre ce qui reste tu.\n\nUn homme a prétendu avoir vu le nom de mon père sur une liste de « subversifs » à surveiller. Un autre se souvient d'un étrange visiteur arrivé la nuit précédant l'empoisonnement et disparu le lendemain. Un marchand de vin se rappelle avoir été payé pour livrer un millésime rare — mais une seule bouteille.\n\nCe sont des fils, pas encore une corde. Mais ils se resserrent autour du nom de Glormagil à chaque jour qui passe. Si j'y mets la prudence qu'il faut, je trouverai la preuve dont j'ai besoin."
 bloody_swan.0004.a: "Continuez de parler. Je trouverai la vérité, un mensonge à la fois."
 bloody_swan.0004.a.tt: "Vous vous rapprochez de la preuve dont vous avez besoin"

 bloody_swan.0005.t: "La Preuve, Enfin"
 bloody_swan.0005.desc: "Enfin, j'ai ce qu'il me faut. Un vieux majordome, autrefois au service de [gondorian_governor.GetName], s'est présenté en secret. Il ne pouvait plus vivre avec ce poids sur la conscience, dit-il. Il a vu préparer le poison ; un mélange rare connu seulement de certains apothicaires gondoriens. Il l'a lui-même livré, dissimulé dans le vin qui gratifia la coupe de mon père.\n\nIl m'a remis une lettre : des ordres signés de la main de Glormagil. La signature correspond. Le sceau est authentique. Voilà l'arme que je cherchais.\n\nJe dois à présent décider comment m'en servir au mieux. Les tribus se rallieront à moi si elles connaissent la vérité. Le lointain Roi du [gondor|E] pourrait prêter l'oreille, ou bien étouffer l'affaire. Mais une chose est certaine : Glormagil en viendra à redouter le nom d'Éira."
 bloody_swan.0005.a: "Il va apprendre ce que signifie s'en prendre au sang d'un chef."
 bloody_swan.0005.a.tt: "Vous retournez dans votre hall, la preuve en main, pour décider ce qu'il convient d'en faire"
 bloody_swan.0005.tt: "#P Vous avez trouvé la preuve du meurtre de Brant par Glormagil#!"

### Glormagil Events ###
 bloody_swan.0201.t: "L'Étincelle de la Rébellion"
 bloody_swan.0201.desc: "Des rapports venus des collines de l'est parlent de feux qui se rassemblent, de réunions tenues dans l'ombre et de chefs forgeant des liens sans ma sanction. Un nom revient sans cesse : [eira.GetName], fille de ce maudit idéaliste [murdered_father.GetFirstName] dont je me suis débarrassé. La fille a le sang de son père, et davantage encore. Elle parle de justice, et de liberté.\n\nLes fous oublient toujours que la justice est décidée par ceux qui l'emportent. Mais je n'agirai pas à la hâte. Il n'y a nulle gloire dans une guerre ouverte contre un petit duché tribal. Non ; il est d'autres moyens de faire taire de tels propos. Le murmure de l'or à l'oreille d'un guerrier mécontent. Un #italic accident de chasse !# pour un retainer trop loyal. Peut-être même un accord secret conclu avec l'un de ses rivaux.\n\nCette terre m'a enseigné bien des choses. Ici, les poignards comptent davantage que les décrets."
 bloody_swan.0201.a: "Envoyez des agents à sa cour. Semez la discorde et brisez leur unité."
 bloody_swan.0201.a.tt: "Déverrouille plusieurs #high décisions narratives majeures#!"

 bloody_swan.0202.t: "Le Messager du Prince"
 bloody_swan.0202.desc: "Un messager couvert de poussière arrive du sud, portant le blason au cygne de Belfalas. Ses mots sont bruts, son ton frôlant l'insolence : [maratar.GetFirstName], second fils du Prince de Belfalas, a mené une expédition punitive à ses propres frais pour s'occuper des brigands qui infestent les côtes. Sans même un murmure adressé à ma personne.\n\nAinsi. Le jeune prince cherche la gloire. Sans nul doute il compte galoper à travers l'[enedhwaith|E] comme s'il s'agissait d'un terrain de tournoi, piétinant mon délicat réseau de pots-de-vin, de trêves et de menaces.\n\nJe pourrais lui rappeler qui gouverne #italic vraiment !# ici. Ou peut-être le laisser foncer dans le brasier pour y brûler, entraînant ce brigand avec lui.\n\nMais d'un autre côté, son père a l'oreille du Roi. Peut-être que ce Maratar pourrait être... façonné."
 bloody_swan.0202.a: "Envoyez un message de bienvenue. Peut-être nous trouverons-nous mutuellement utiles."
 bloody_swan.0202.b: "Laissez-le courir à son gré... jusqu'à sa perte."