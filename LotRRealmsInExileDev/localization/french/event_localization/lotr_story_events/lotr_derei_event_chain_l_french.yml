l_french:

  derei.1000.t: "En Quête de Conseil"
  derei.1000.desc: "Me voici entré dans mes fonctions. Il ne tient qu'à moi désormais de décider ce qui est le mieux pour le peuple de [GetTitleByKey('d_gimileth').GetNameNoTier], et quels chemins je dois emprunter. La perspective est vertigineuse. Bien que [terilaen.GetFirstName] m'ait élevé pour régner, la réalité du pouvoir m'écrase.\n\nJe ne saurais me résoudre à gaspiller ma vie à réagir sans plan aux petites affaires du quotidien. Un souverain avisé trace sa route, suit un cap, mais mon instinct me dit qu'il ne mérite pas encore confiance, et mon cœur demeure silencieux."
  derei.1000.a: "J'ai besoin de guidance."

  derei.1001.t: "Les Salles des Cuind"
  derei.1001.desc: "En pénétrant dans cette grande cité des [cuind|E], après des jours de marche à travers la forêt profonde, j'aperçois mon mentor dans toute sa majesté. Spectacle rare pour des [conceptracemen|E]. Je lui pose les questions qui tourmentent mon esprit : qui dois-je devenir ? Comment régner ? Comment traiter avec les autres Princes ?\n\n« Mon jeune élève, des conseils tu auras, puisque tu les désires, ainsi que guidance, et mes admonestations, tu les connais déjà. Je suis ton précepteur, et peut-être même ton ami ; pourtant je ne suis point des Hommes, quelles que soient les longues années de mon étude. Je ne puis décréter tes rêves, ni ce que tu devrais faire de cette vie...\n\nNoble est le cœur qui désire porter la lumière sur ce monde qui s'assombrit, mais ton noble cœur n'est-il point lui-même prisonnier de la noblesse ? As-tu eu suffisamment de jeux et de plaisirs ? Tes pairs, non. Intrigues et séductions, ils en ont usé pendant des siècles. Comment un jeune homme devient-il adulte parmi des enfants ? Comment un cœur noble échappe-t-il aux pièges de la noblesse ? Peut-être ne le peut-il point. Voilà ton énigme à résoudre. Tu peux te retirer, mon cher protégé. »"
  derei.1001.a: "Bien des choses à méditer..."
  derei.1001.a.toast: "Derei est venu vous demander conseil, vous lui avez posé une énigme !"

  derei.1002.t: "À la Rencontre des Princes : La Cité d'Ûrulôni"
  derei.1002.desc: "Cette grande et antique cité sert de siège à la famille princière la plus illustre du [balan_lai|E], les Imrazôrhîn. Descendants en ligne directe du grand Imrazôr, Prince de Zimrathâni, petit-fils d'[zimrathon.GetFirstNameNicknamedRegnal], Roi de [numenor|E]. C'est ici que je rencontre son héritier, [phorakon.GetName].\n\nLe vieil homme me traite avec une bienveillance presque paternelle, mais sans véritable chaleur. Voilà un homme depuis longtemps accoutumé aux pétitionnaires, à régner sur ses pairs, premier entre ses égaux. Arrogance tempérée par la générosité. Il y a quelque chose à apprendre ici."
  derei.1002.a: "Le vieil homme peut être convaincu."
  derei.1002.a.success: "Le vieil homme s'ouvre à vous"
  derei.1002.a.failure: "Il vous écoute à peine"
  derei.1002.a.toast: "Derei est un jeune homme charmant !"
  derei.1002.b: "Je dois apprendre autant que possible."
  derei.1002.b.success: "Il vous prodigue de précieux conseils"
  derei.1002.b.failure: "Vous avez posé les mauvaises questions !"

  derei.1003.t: "À la Rencontre des Princes : Le Joyau du Sud"
  derei.1003.desc: "Je suis venu à Karasalas pour rencontrer [arimith.GetName], la belle Princesse que l'on nomme parfois le Joyau des Terres du Sud. C'est une contrée de forêts et de plaines, aux fermes prospères. Elle est d'une grande beauté.\n\nLorsqu'on m'introduit dans sa salle du conseil, elle traite encore quelques affaires courantes. Sa compétence me frappe d'emblée : une connaissance approfondie des moindres détails de son royaume, des décisions pratiques formulées avec le moins de mots possible. Voilà une souveraine laborieuse et disciplinée. Je ne puis m'empêcher de l'admirer.\n\nLorsqu'elle tourne enfin son attention vers moi, c'est avec un regard vif mais distant. Tout l'opposé de Phorakôn. Le vieil homme parlait en père et écoutait en roi blasé ; cette princesse m'accorde toute son attention, mais sans la moindre chaleur."
  derei.1003.a: "Je dois faire un effort pour me rapprocher d'elle."
  derei.1003.a.success: "La conversation lui plaît"
  derei.1003.a.failure: "Elle semble s'ennuyer"
  derei.1003.b: "Parlons de gouvernance."
  derei.1003.b.success: "Elle a beaucoup d'idées pertinentes pour Gimilêth"
  derei.1003.b.failure: "Vos questions la laissent perplexe"

  derei.1004.t: "À la Rencontre des Princes : L'Héritier Désigné"
  derei.1004.desc: "Je rencontre aujourd'hui peut-être le plus célèbre des Princes du [balan_lai|E], [imrazor.GetFirstName], Prince d'Alsarias. Sa récente offensive de charme pour épouser Arimîth a agité le Balân-lâi, certains Princes prenant sa défense, d'autres condamnant ce qu'ils voient comme une manœuvre de pouvoir cynique. Terilaen semblait croire à un amour sincère. Quoi qu'il en soit, voilà un homme qui a la volonté de façonner l'ordre établi à sa guise. Il m'a invité à un dîner privé.\n\nÀ mesure que nous buvons, mangeons et conversons, je découvre un homme impressionnant. Travailleur, charismatique, et d'une ardeur sans pareille. Je vois en lui un Prince dans toute son essence, et je comprends pourquoi il est le candidat incontesté pour succéder à Phorakôn.\n\nEn parlant, il navigue avec aisance entre les intérêts politiques, les remarques spirituelles et un souci apparemment sincère pour moi et mon peuple. Je passe un moment fort agréable."
  derei.1004.a: "Quel homme plaisant."
  derei.1004.a.success: "Un lien rapide se tisse entre vous !"
  derei.1004.a.failure: "Vous avez une conversation tout à fait agréable"

  derei.1005.t: "À la Rencontre des Princes : La Citadelle"
  derei.1005.desc: "Après une marche éprouvante à travers les marécages de [GetTitleByKey('d_gimilurush').GetNameNoTier], je suis arrivé à la grande Citadelle d'Azaridêth. Elle forme un spectacle saisissant contre les montagnes. La contrée est riche en terres cultivées et en commerce, bourdonnante d'activité. Et pourtant, c'est ici que réside le Prince le plus reclus du [balan_lai|E], [karaag.GetFirstName]. Je me dirige vers le château pour n'y trouver que son sénéchal embarrassé, qui m'explique que Karaag ne pourra malheureusement pas honorer notre rencontre aujourd'hui.\n\nSatisfaire ma curiosité est à l'évidence le dernier de ses soucis, mais refuser à l'un de ses pairs une audience formelle peut aisément passer pour un affront. Imrazôr m'avait prévenu que Karaag n'accepte jamais une rencontre qu'il peut éviter. Ce Prince ne se soucie point de gouverner, seulement de son atelier."
  derei.1005.a: "J'attendrai et le suivrai s'il se montre."
  derei.1005.a.success: "Il vous supplie de ne point révéler ses secrets"
  derei.1005.a.failure: "Il vous échappe"
  derei.1005.a.toast: "Vous devez une faveur en échange de la discrétion de Derei."
  derei.1005.b: "Sottises, je n'ai qu'à parler à sa maisonnée."
  derei.1005.b.success: "Vous apprenez beaucoup sur les manières du Prince"
  derei.1005.b.failure: "Vous ne parvenez à rien apprendre d'utile"

  derei.1006.t: "À la Rencontre des Princes : Le Grand Port"
  derei.1006.desc: "À [GetTitleByKey('c_inzilloni').GetNameNoTier] se trouve le port commercial le plus actif du [thanihazad|E]. Cette ancienne cité númenóréenne s'est érigée en grand centre du négoce, dotée d'une puissante classe marchande et de la plus grande flotte commerciale des Sept Terres. C'est là que je dois rencontrer son Prince, [arthazroc.GetFirstName], homme à la réputation sinistre.\n\nIl m'accueille avec politesse, mais ses yeux acérés cherchent la faille. Je crains qu'il ne la trouve. Il s'amuse de ma conversation un moment, sans jamais rien répondre qui vaille. Voilà un homme subtil, accoutumé à obtenir ce qu'il veut par la manipulation.\n\nJe cesse de parler et, tel un araignée qui sent sa proie dans sa toile, il se ranime. Il s'excuse de n'avoir répondu à mes questions que de façon vague, alléguant des préoccupations liées à ses récents démêlés avec les marchands. Il m'explique alors qu'il manque de fonds pour racheter l'affaire d'un négociant particulièrement encombrant, et que si ce problème était réglé, il pourrait m'accorder une nouvelle audience."
  derei.1006.a: "Proposer de traiter avec la concurrence de ce marchand."
  derei.1006.a.success: "Arthazroc est impressionné"
  derei.1006.a.failure: "Les marchands vous roulent dans la farine !"
  derei.1006.a.toast: "Derei vous a aidé avec les marchands."
  derei.1006.b: "Je paierai la vieille araignée."
  derei.1006.b.success: "Il vous divertit avec les récits de ses anciennes intrigues"
  derei.1006.b.toast: "Derei a payé pour quelques leçons de complot"

  derei.1007.t: "À la Rencontre des Princes : Le Géant"
  derei.1007.desc: "Je suis venu dans la principauté frontière de [GetTitleByKey('d_holzoreth').GetNameNoTier] pour rencontrer le Prince [daroc.GetFirstName]. C'est une contrée relativement aride, avec quelques forêts et des jungles éparses. Lourdement militarisée, car la menace des invasions venues de [GetTitleByKey('k_an_balkumagan').GetNameNoTier] a toujours pesé sur elle. À l'approche du château, j'aperçois un régiment de [blacklocks|E] à l'entraînement.\n\nLe Prince de cette contrée est un homme puissant, issu d'une longue lignée de guerriers. Il impose le respect de toute sa stature, rien que du guerrier en lui, et sa claudication n'apparaît que comme un adversaire à vaincre à chaque pas. Voilà un homme de volonté et de force physique.\n\nIl me parle en homme pragmatique, mais avec une douceur cachée ; il est très franc et glisse de temps à autre une plaisanterie dans sa conversation."
  derei.1007.a: "Tenter de toucher sa fibre plus douce."
  derei.1007.a.success: "C'est un homme chaleureux !"
  derei.1007.a.failure: "La rencontre est maladroite"
  derei.1007.b: "Demander comment est la vie à la frontière."
  derei.1007.b.success: "Il a beaucoup à en dire"

  derei.1008.t: "À la Rencontre des Princes : L'Antagoniste"
  derei.1008.desc: "Mon désir de rencontrer tous les Princes m'a finalement conduit dans l'étrange principauté du [balan_lai|E], [GetTitleByKey('k_pel').GetNameNoTier]. Une fois passées les montagnes et les collines, je découvre une contrée plate aux bonnes terres agricoles. Voilà des jours que je n'ai pas croisé un seul [adunai|E].\n\nJe rencontre [seregul.GetName] en son château. Il m'accueille avec politesse, mais quelque chose semble le tracasser. Il répond à la plupart de mes questions avec calme, mais lorsque j'évoque la situation politique particulière de Pél, le conseil indigène, il s'enflamme.\n\n« Vous osez me parler de ces traîtres ? Dès lors que je leur ai proposé de les guider, ils se sont soulevés. Une main ferme a toujours été nécessaire, je le vois clairement à présent. Trop longtemps avons-nous laissé grandir leur insolence sans la réprimer. Ils nous ont invités dans cette contrée parce qu'ils étaient faibles, et pourtant ils m'en veulent de leur montrer la voie. Je ferai couler leur sang, lentement, et j'en ferai l'exemple de la façon dont Pél traite la trahison. »\n\nVoilà donc le Prince de Pél, un sot à la tête brûlée."
  derei.1008.a: "Quelle épreuve."
  derei.1008.a.success: "Vous naviguez la rencontre avec succès"
  derei.1008.a.failure: "La rencontre est un désastre"
  derei.1008.a.toast: "Cet enfant a essayé de vous apprendre à régner !"

  derei.1009.t: "À la Rencontre des Princes : La Capitale"
  derei.1009.desc: "La grande cité de [GetTitleByKey('c_mispir').GetNameNoTier] sert de siège au [balan_lai|E]. Trop importante pour appartenir à l'un quelconque des princes sans faire pencher la balance du pouvoir, et devant demeurer neutre en tant que cour commune des Princes, Mispir est gouvernée par un intendant élu au sein de l'oligarchie locale.\n\nAujourd'hui je rencontre [GetTitleByKey('c_mispir').GetHolder.GetName] pour m'instruire sur la gouvernance de la plus grande cité du [thanihazad|E] et méditer sur mes voyages, en tentant d'en tirer quelque enseignement.\n\nDu chaleureux Imrazôr et du vieux Phorakôn paternel au mesquin Seregul. De Karaag fuyant le pouvoir à Arthazroc qui le saisit par tous les moyens, j'ai rencontré une grande variété de souverains.\n\nJ'en suis venu à croire que le plus grand piège qui guette un souverain est l'isolement, comme Seregul et Karaag. Pour l'éviter, un souverain doit être diligent et ne point se reposer sur ses acquis, mais s'efforcer de travailler toujours davantage, à l'image de Daroc et d'Arimîth. Un Prince doit également demeurer accessible et affable, comme Imrazôr."
  derei.1009.a: "Bien des réflexions pour le chemin du retour."
  derei.1009.a.success: "Vous avez beaucoup appris"

  derei.1010.t: "Une Fugitive !"
  derei.1010.desc: "La récente occupation de la pointe méridionale de la péninsule du Drêl par des pirates a semé la peur et déplacé une partie de la population locale vers les tribus plus établies du nord. Bien peu ont eu l'audace de fuir jusqu'à notre forêt. Et ceux qui l'ont tenté ont été refoulés. Mais aujourd'hui des émissaires de [GetTitleByKey('d_cuindore').GetHolder.GetFirstName] sont arrivés, escortant une jeune fille humaine.\n\nSon regard est ferme, mais elle ne peut dissimuler la peur. Je lui souris et l'invite à s'asseoir dans l'herbe à mes côtés. Je lui demande son histoire, qu'elle raconte après un moment d'hésitation, gagnant en assurance à mesure que le récit avance.\n\nC'est un récit terrible. Ses parents exécutés, leur enfant unique faite prisonnière. Lorsqu'elle a vu sa chance de fuir, elle s'est précipitée à l'aveugle dans notre forêt, trop effrayée pour penser aux insaisissables [elves|E].\n\nAyant achevé le récit de sa rencontre avec Nimloth, elle me remercie de la bonté des [cuind|E] et demande ce qu'il adviendra d'elle."
  derei.1010.a: "Elle devrait vivre parmi les siens."
  derei.1010.a.tt: "Vous enverrez Âmâli à la cour de Derei, où elle sera traitée avec bienveillance"
  derei.1010.b: "Je peux faire une exception pour elle."
  derei.1010.b.tt: "Âmâli sera prise en charge à Drêl, c'est une jeune femme capable"

  derei.1011.t: "Un Émissaire de Terilaen"
  derei.1011.desc: "Aux alentours de midi, j'arrive aux portes de ma forteresse pour recevoir deux elfes venus du sud. Je remarque aussitôt que la jeune femme n'est pas une elfe, malgré les habits qu'on lui a donnés, mais une très belle femme de culture [derei_wife.GetCulture.GetName].\n\nL'elfe m'explique que la jeune femme s'est échappée de la région occupée à la pointe du Cap de Drêl, aux mains des pirates Vulmaw qui y règnent désormais. Il m'apprend que [GetTitleByKey('k_drel').GetHolder.GetFirstName], dans sa sagesse, a choisi ma forteresse comme demeure temporaire, et me fait confiance pour veiller sur elle jusqu'à ce qu'elle soit pleinement rétablie et reposée, et sache elle-même où elle souhaite se rendre. Je sais qu'une telle requête s'honore par ma meilleure hospitalité.\n\nNous prenons congé de l'elfe et je l'invite à déjeuner. [derei_wife.GetFirstName] a dans ses beaux yeux bruns un regard sincère, mais prudent. Je me sens attiré vers cette femme. Impatient d'entendre sa voix, je lui demande de me parler de sa contrée, quelle y est la vie, comment pourrait-on y aider, que veut son peuple. Elle aime parler ! Et est curieuse de bien des choses, en particulier de Terilaen et des Cuind. Nous conversons toute la journée, la conversation glissant vers nos enfances, nos espoirs et nos rêves. À la fin, j'ai le sentiment que quelque chose de solide s'est tissé entre nous."
  derei.1011.a: "C'est une personne vraiment remarquable !"

  derei.1012.a: "Peut-être est-il temps de me marier"

  derei.1013.t: "Rêver d'Elle"
  derei.1013.desc: "Voilà maintenant des mois que [derei_wife.GetFirstName] est arrivée à ma cour. Nous nous parlons chaque jour et passons de longues heures ensemble. Je ne cesse de penser à elle. Plusieurs membres de ma parenté, hommes et femmes, sont venus m'interroger sur mes intentions à son égard. La première fois qu'on m'a demandé si j'envisageais de l'épouser, j'ai acquiescé distraitement que c'était peut-être envisageable. Ma parenté en fut scandalisée et s'empressa de m'admonester, m'enjoignant de prendre la jeune femme comme concubine.\n\nC'est aujourd'hui le jour. Je vais exprimer clairement mes sentiments à Âmâli. Lorsque nous nous retrouvons dehors pour notre promenade matinale, mes mains sont moites et mes mots me font défaut. Elle me regarde avec curiosité. Il me faut une demi-heure avant de trouver le courage. Je lui dis que je suis et que j'ai toujours été amoureux d'elle, et si elle a déjà décidé ce qu'elle souhaitait faire de sa vie. Elle m'embrasse. C'est peut-être le plus beau jour de ma vie."
  derei.1013.a: "J'épouserai cette femme !"
  derei.1013.a.toast: "Encore quelques semaines !"
  derei.1013.b: "Le concubinage ternirait-il notre amour ? C'est la coutume..."
  derei.1013.c: "Je ne puis faire cela, elle est roturière..."

  derei.1014.t: "Notre Mariage !"
  derei.1014.desc: "C'est aujourd'hui le jour de nos noces. Depuis que j'ai annoncé le mariage, les jours ont été remplis de regards hostiles et d'insultes voilées de la plupart de mes courtisans, en particulier envers [derei_wife.GetFirstName]. Et pourtant, ce furent les semaines les plus heureuses de nos jeunes vies. Marcher main dans la main chaque fois que l'occasion se présente, l'un ou l'autre de ces baisers volés, et surtout nos conversations à table, tout cela emplit mon cœur, et je crois le sien, d'une joie profonde.\n\nJ'ai repris les rênes du conseil, et bien que la principale préoccupation ait été mon mariage avec une roturière et l'atteinte que cela porterait à ma réputation dans le [balan_lai|E], j'ai tenté de gouverner les autres affaires avec autant de justice et de diligence que possible.\n\nAujourd'hui ma cour est en deuil, bien des courtisans les plus dramatiques portent le noir. Et nombreux sont ceux qui restent dans leurs appartements, ou m'évitent, pour ne pas risquer de paraître approuver. Seuls quelques-uns se montrent pour assister à la cérémonie, tandis que je prends la main d'Âmâli et que l'on me demande si je consens à devenir son époux.\n\n#help Voici la fin du contenu de Derei pour l'instant ! #!"
  derei.1014.a: "Oui, bien sûr, oui !"
  derei.1014.b: "Je ne puis faire cela !"
  
  derei.1015.t: "Connaître sa Terre"
  derei.1015.desc: "Maintenant que j'ai pris la mesure de mes pairs Princes, j'ai acquis une idée bien plus précise de ce qu'est un bon souverain. Il est temps que je prenne la mesure de ma propre terre et de mon peuple. Dans les années à venir, j'espère me familiariser profondément avec ce pays, afin d'en comprendre les problèmes et de développer une meilleure intuition quant aux solutions qui pourraient y remédier.\n\nPour commencer, au cours de ce voyage je rendrai visite aux établissements qui échappent à mon contrôle direct, et m'entretiendrai avec leurs dirigeants."
  derei.1015.a: "En route."
  derei.1015.b: "Je ne puis pour l'heure."
  derei.1015.b.tt: "Vous aurez une autre occasion dans quelques mois."

  derei.1016.t: "La Cité de Kharadukal"
  derei.1016.desc: "Moins d'une journée de route suffit pour arriver à la cité de [GetTitleByKey('b_kharadukal').GetNameNoTier] — une terre généreuse aux nombreuses fermes.\n\nJ'y rencontre s[Select_CString(derei_vassal.IsFemale,'a ','on ')][Select_CString(derei_vassal.IsFemale,'dame','seigneur')], [derei_vassal.GetFirstName]. [derei_vassal.GetSheHe|U] me parle longuement de cet endroit, insistant toujours sur le manque de ressources pour améliorer concrètement la vie des citoyens. On me demande de l'argent, et sans grande subtilité.\n\nJe n'ai nulle obligation d'accorder ce don à [derei_vassal.Custom('FR_LuiElle')], et rien ne dit que [derei_vassal.Custom('FR_IlElle')] investirait véritablement ces fonds dans la cité. Et pourtant, voir s[Select_CString(derei_vassal.IsFemale,'a ','on ')][Select_CString(derei_vassal.IsFemale,'dame','seigneur')] s'enrichir profiterait bel et bien à la cité sur le long terme."
  derei.1016.a: "Continuez ainsi."
  derei.1016.b: "Voici un peu d'aide."

  derei.1017.t: "La Tribu de Drêl"
  derei.1017.desc: "À mesure que j'approchais du siège de [moreno.GetFirstName], la forêt commença à se clairsemer et le terrain se fit plus âpre, hérissé de collines. Je rencontre [moreno.GetFirstNameNoTooltip] dans une grande maison de bois, bien construite, au milieu d'un village. [moreno.GetSheHe] m'accueille à un dîner des plus austères. Je ne crois pas que les gens vivent si sobrement en ces lieux.\n\nIl voudrait me faire croire le contraire. Tandis que nous parlons de gouvernance, il oriente la conversation vers ses besoins et ceux de la terre — et pourtant, il entre en colère lorsque je lui demande comment il pourrait contribuer aux projets de développement de ses terres. Lorsque je franchis enfin cette ligne et lui demande directement combien il serait prêt à verser pour un modeste projet d'irrigation de ses terres, il explose.\n\n« Enfant gâté. Mon peuple a travaillé, saigné et est mort sur cette terre de génération en génération. Nous avons payé bien trop à toi et aux tiens au fil des longues années. Toi, enfant d'une longue lignée d'occupants. Ose encore me réclamer ce qui est mien, et je me défendrai comme contre un brigand ! »"
  derei.1017.a: "Je comprends votre point de vue — que puis-je faire pour vous ?"
  derei.1017.b: "Ah bon, vraiment ?"
  derei.1017.b.tt: "#X Si vous perdez le combat, vous recevrez une blessure supplémentaire !#!"
  derei.1017.b.toast: "Votre entourage parvient à vous sortir de la mêlée !"

  derei.1018.t: "Plans au Fil de la Nuit"
  derei.1018.desc: "Depuis mon retour de [GetTitleByKey('c_mispir').GetNameNoTierNoTooltip], chaque fois que mes devoirs m'ont accordé quelque liberté, j'ai cherché et médité un plan — non seulement pour le bienfait de [GetTitleByKey('d_gimileth').GetNameNoTier], mais aussi du [balan_lai|E] tout entier.\n\nCe soir j'ai longuement parlé avec [derei_wife.GetFirstNameNoTooltip] de la manière dont nous pourrions œuvrer à réparer le fossé entre les peuples indigènes des [sevenlands|E] et les Kharadûnâi. J'ai observé au cours de mes voyages une façon bien inefficace de gouverner nos terres. Les gens n'ont pas le sentiment de travailler à améliorer leur propre vie, mais pour le compte des Princes. Si nous devions, comme mes ancêtres l'ont longtemps cru, ne point chercher à exercer une domination innée sur les indigènes, mais plutôt agir en enseignants et tenter sincèrement d'élever la population native, ces terres pourraient connaître une prospérité sans précédent.\n\n« Tout cela est fort bien et fort noble. » [derei_wife.GetFirstNameNoTooltip] m'interrompt. « En vérité, le peuple peine pour une terre qui ne lui semble point être la sienne. Mais vos pairs ne se soucient guère de leur mécontentement. Longtemps le Balân-lâi a tenu, et longtemps encore il tiendra, sans s'en inquiéter. Vous ne convaincrez point les Princes par la morale. Il vous faudra des alliés, et jouer à leurs jeux — les faire chanter même, si vous le devez ! »"
  derei.1018.a: "[derei_wife.GetFirstNameNoTooltip] parle avec sagesse."
  derei.1018.tt: "Vous avez un plan ! Il est temps de retourner auprès de Terilaen pour chercher à nouveau sa guidance !"
  derei.1018.b: "Je ne puis pour l'heure."
  derei.1018.b.tt: "Vous aurez une autre occasion dans un mois."
  derei.1018.c: "Je sais désormais ce qu'il me faut faire."
  derei.1018.c.tt: "Vous ferez de votre vie l'œuvre de convaincre les Princes et de réparer le fossé sociétal des Sept Terres."

  derei.1019.t: "Est-ce l'Heure ?"
  derei.1019.desc: "J'ai différé mon voyage à la cour de Terilaen, et je pourrais le différer encore — mais je ne puis le faire indéfiniment.\n\nSon avis me tarde."
  derei.1019.a: "En route !"
  derei.1019.b: "Je dois le différer d'un mois encore."

  derei.1020.t: "Une Fois Encore dans les Halls des Cuind"
  derei.1020.desc: "J'arrive à [GetTitleByKey('c_ainglad').GetNameNoTierNoTooltip] une fois encore pour quérir l'avis de Terilaen. Je suis reçu avec toute la courtoisie due devant son trône. Je m'incline devant mon mentor et ami, et lui expose mon désir de conduire les Princes du [balan_lai|E] sur une meilleure voie.\n\n« Cher Derei, les [conceptracemen|E] sont véritablement une race admirable. Hier encore vous me demandiez de prendre vos décisions à votre place, et aujourd'hui vous voilà devenu un homme.\n\nEn vérité, cela réjouirait le cœur de chaque [cuind|E] de voir les Kharadûnâi abandonner la folie de vos ancêtres et revenir à votre devoir d'enseignants des Hommes moins fortunés. Si vous pouviez y parvenir, ce serait là un grand exploit. Mais pour atteindre un tel but — une véritable réforme culturelle — je crois que vous devriez prendre vous-même les rênes du commandement. N'oubliez point que les Hommes peuvent vous dire une chose et en tenir une autre en leur cœur.\n\nVous êtes congédié, Derei. Allez en paix — l'espoir des Cuind vous accompagne. »"
  derei.1020.a: "Une longue route s'étend devant moi."
  derei.1020.tt: "Vous ferez de votre vie l'œuvre de convaincre les Princes et de réparer le fossé sociétal des Sept Terres."
  derei.1020.a.toast: "Derei veut réformer le Balân-Lâi !"

  derei.1021.t: "Quel Prince Choisir ?"
  derei.1021.desc: "Ma femme [derei_wife.GetFirstName] et moi avons sélectionné, avec l'aide de mon conseil, quelques candidats qui nous semblent susceptibles d'être réceptifs à mon approche.\n\nQui dois-je choisir ?"
  derei.1021.leader.desc: "Ma femme [derei_wife.GetFirstName] et moi avons sélectionné, avec l'aide de ma cour, quelques candidats qui nous semblent susceptibles d'être réceptifs à mon approche. Au premier rang se trouve le chef du Balân-lâi — s'il était convaincu, ce serait un atout inestimable pour ma cause. Mais rien ne m'oblige à m'adresser à [balan_lai_leader.Custom('FR_LuiElle')] en premier.\n\nQui dois-je choisir ?"
  derei.1021.a: "[balan_lai_leader.GetFullNameNoTooltip]"
  derei.1021.b: "[balan_lai_1.GetFullNameNoTooltip]"
  derei.1021.c: "[balan_lai_2.GetFullNameNoTooltip]"
  derei.1021.d: "[balan_lai_3.GetFullNameNoTooltip]"

  derei.1022.t: "[target_prince.GetFullNameNoTooltip]"
  derei.1022.desc: "La lettre est rédigée.\n\nJ'y ai invoqué toute la bonne foi qui peut exister entre [target_prince.GetFirstNameNoTooltip] et moi, et expliqué, du mieux de mes capacités, les nécessités morales et pratiques de changer nos façons de faire. Nous verrons si mon appel à la conscience de [target_prince.GetFirstNameNoTooltip] portera ses fruits.\n\n#X Si vous échouez, vous ne pourrez plus tenter votre chance avec ce Prince pendant 10 ans.#!"
  derei.1022.hook.desc: "La lettre est rédigée.\n\nJ'y ai invoqué toute la bonne foi qui peut exister entre [target_prince.GetFirstNameNoTooltip] et moi, et expliqué, du mieux de mes capacités, les nécessités morales et pratiques de changer nos façons de faire. J'ai également rappelé à [target_prince.GetFirstNameNoTooltip] les faveurs qui me sont dues. Nous verrons si mon appel à la conscience de [target_prince.GetFirstNameNoTooltip] portera ses fruits.\n\n#X Si vous échouez, vous ne pourrez plus tenter votre chance avec ce Prince pendant 10 ans.#!"
  derei.1022.a: "Envoyez la lettre !"
  derei.1022.a.tt: "Vous recevrez leur réponse dans un mois."
  derei.1022.a.success: "#P Succès !#"
  derei.1022.a.failure: "#N Échec !#"
  derei.1022.b: "À la réflexion, je me précipite."
  derei.1022.c.tt: "En tant que joueur, ils auront le choix."

  derei.1023.t: "Au Prince Éclairé Derei,"
  derei.1023.desc: "J'ai passé bien des jours à peser sérieusement vos arguments. Vous êtes un homme persuasif. C'est avec un cœur lourd, et pourtant plein d'espoir, que je renonce par la présente aux voies de mes ancêtres pour adopter les vôtres. Puisse [target_prince.GetPrimaryTitle.GetNameNoTier] connaître la prospérité que vous nous avez promise !"
  derei.1023.a: "Qu'Êru soit béni !"

  derei.1024.t: "Hardi Prince Derei,"
  derei.1024.desc: "Vous osez me proposer de tourner le dos aux traditions de mes aïeux ! Vos façons provinciales conviennent peut-être à votre petite Principauté, mais ici en [target_prince.GetPrimaryTitle.GetNameNoTier], nous nous attachons à des vertus plus civilisées. Je ne permettrai point que notre identité [adunai|E] soit sapée par vos idées de faiblesse."
  derei.1024.a: "Maudit soit-il !"

  derei.1025.t: "Mon Très Estimé Pair [target_prince.GetFirstNameNoTooltip],"
  derei.1025.desc: "Je vous écris dans l'espoir de vous exposer les erreurs de nos façons. Trop longtemps nous avons abusé de la population locale et l'avons aliénée de cette terre qui nous appartient à tous — pas seulement aux Kharadûnâi. Je vous demande de chercher en votre cœur la vérité de mes mots, et si cela ne suffit, de considérer la richesse que nous pourrions créer si la population indigène travaillait de bon gré, et non sous le fouet."
  derei.1025.a: "Ces mots sont convaincants."
  derei.1025.a.toast: "[target_prince.GetSheHe|U] a accepté !"
  derei.1025.b: "Je dirai à [derei.GetFirstNameNoTooltip] ce qu'[derei.Custom('FR_IlElle')] veut entendre."
  derei.1025.c: "Non."
  derei.1025.c.toast: "[target_prince.GetSheHe|U] a refusé !"

  derei.1026.t: "Un Jour Historique"
  derei.1026.desc: "Dans les Halls du Balân-Lâi à [GetTitleByKey('c_mispir').GetNameNoTier], les Princes se rassemblent pour signer solennellement la Réforme. Un sentiment d'effervescence flotte dans l'air. Peu importe que les Princes croient véritablement en cet amendement ou qu'ils estiment ce changement du statu quo propice à de nouvelles opportunités, plus cyniques — ce qui compte est l'ensemble solide de lois qui garantira une vie plus juste à toutes les populations des [sevenlands|E].\n\nAprès la signature cérémonielle, je me présente devant mes pairs sur la place publique et proclame les lois au peuple de [GetTitleByKey('c_mispir').GetNameNoTierNoTooltip]. Les applaudissements vont du discret à l'enthousiaste. Beaucoup, ici même à [GetTitleByKey('c_mispir').GetNameNoTierNoTooltip], ne sont pas de pure souche [adunaic|E].\n\nAu terme de mon discours, [balan_lai_1.GetName] me présente une copie cérémonielle de mes Réformes. Puisse-t-elle devenir un héritage précieux de ma maison."
  derei.1026.a: "Mon œuvre est enfin accomplie."

  derei.1027.t: "Terilaen est Venu !"
  derei.1027.desc: "Tandis que la matinée s'épanouit en une journée agréablement douce, j'entends depuis les portes une grande fanfare, suivie d'une douce musique elfique. Je me précipite aux portes pour trouver [terilaen.GetFirstName] à la tête d'une suite elfique. Il n'est plus sous son déguisement et porte tous les insignes de sa puissance. Il m'étreint et me conduit jusqu'à ma salle du conseil.\n\n« Mon plus cher et plus noble pupille. Vous avez prouvé que vous êtes un grand homme — un personnage historique, à vrai dire. Bientôt vous serez parti, à la façon des [conceptracemen|E], mais je suis heureux que vous ayez laissé une marque en ce monde. Et pour que votre peuple ne vous oublie point de sitôt, je veillerai à ce qu'il en soit ainsi.\n\nIl y a longtemps, j'ai dit que l'espoir des [cuind|E] vous suivrait. Il s'est désormais levé, grandi, grâce à vos efforts. Je viens aujourd'hui vous honorer devant votre peuple afin qu'il sache que vous avez l'amitié et la loyauté éternelles des Elfes de Drêl. Veuillez accepter ce don, Sapthân. » Il s'incline."
  derei.1027.trigger.desc: "Tandis que la matinée s'épanouit en une journée agréablement douce, j'entends depuis les portes une grande fanfare, suivie d'une douce musique elfique. Je me précipite aux portes pour trouver [terilaen.GetFirstName] à la tête d'une suite elfique.\n\nLe chef [elven|E] s'incline devant moi et déclare :\n\n« Bien que Terilaen ne nous guide plus, nous souhaitons qu'il soit su que nous demeurons les amis de Gimilêth et de Derei le Sage. Que ce sceptre symbolise notre amitié pour de longues années à venir, et que la sagesse de Derei, longtemps après que lui sera parti, guide les Kharadûnâi et les préserve de la folie. »"
  derei.1027.a: "[terilaen.GetFirstNameNoTooltip] m'accorde un grand honneur."