l_french:

 orc_feast_0001_orc_trigger: "Un orc approprié assiste au festin"

 lotr_feast.0001.t: "La Pression Orc"
 lotr_feast.0001.desc: "Le festin est épuisant, et je risque de m’endormir lorsque [orc_participant.GetFirstName] s’avance soudainement vers moi avec un grand sac en cuir rempli d’un liquide.\n\n« Je t’ai apporté ma boisson spéciale ! Goûte ! » crie [orc_participant.GetFirstNameNoTooltip] en riant aux éclats.\n\nAu début, c’est difficile à avaler, et ma gorge semble brûler... mais ensuite une grande chaleur se répand dans tout mon corps, et soudain, je sens de nouvelles forces et de l’énergie dans mes muscles. Une seule goutte de cette boisson suffit à me donner envie de courir des tours autour de la salle."
 lotr_feast.0001.a: "[orc_participant.GetFirstNameNoTooltip], verse-m’en encore !"
 lotr_feast.0001.b: "Ça suffit pour moi."

 empowered_by_orc_brew_1_modifier: "Boisson Orc Rafraîchissante"
 empowered_by_orc_brew_1_modifier_desc: "Ce personnage a été rafraîchi par une boisson [orcish|E] douteuse."
 empowered_by_orc_brew_2_modifier: "Boisson Orc Revigorante"
 empowered_by_orc_brew_2_modifier_desc: "Ce personnage a été revigoré par une boisson [orcish|E] douteuse."
 empowered_by_orc_brew_3_modifier: "Boisson Orc Puissante"
 empowered_by_orc_brew_3_modifier_desc: "Ce personnage a été renforcé par une boisson [orcish|E] douteuse."
 empowered_by_orc_brew_4_modifier: "Boisson Orc Débordante"
 empowered_by_orc_brew_4_modifier_desc: "Ce personnage a été submergé par une boisson [orcish|E] douteuse."

 exempt_from_balrog_struggle: "Exempté de la Lutte pour la Moria"
 exempt_from_balrog_struggle_desc: ""

 lotr_feast.0050.t: "Défi à travers la table"
 lotr_feast.0050.desc: "Une massive tranche de viande imbibée de grog est déposée au centre de la table. Avant que je puisse la saisir, une main lourde et scarifiée s'abat, clouant le prix au bois. Je lève les yeux et vois [orc_potential_rival.GetFirstName] sourire à travers des dents jaguées, ses yeux brûlant d’un défi clair.\n\n« Cette pièce est pour un vrai guerrier », grogne-t-il assez fort pour que les tables environnantes se taisent. « Pas pour quelqu’un qui passe plus de temps à polir son armure qu’à aiguiser sa lame. À moins, bien sûr, que tu te croies assez fort pour me la prendre ? »"
 lotr_feast.0050.a: "Tu as une grande gueule, vermine ! Lève-toi et combats !"
 lotr_feast.0050.b: "Régale-toi. Je n’ai aucune faim pour des restes."

 lotr_feast.0051.t: "La table renversée"
 lotr_feast.0051.desc: "Avec un grondement profond, [orc_potential_rival.GetFirstName] se lève et renverse une table entière, envoyant os, bols et coupes voler.\n\n« La nourriture est pourrie ! » hurle-t-il. « Même un gobelin ne mangerait pas cette bouillie ! Celui qui a commandé ça mérite d’être écorché ! »\n\nSes yeux croisent les miens. La salle attend une réaction. Rester silencieux semblerait de la lâcheté. Répondre invite au sang."
 lotr_feast.0051.a: "Tu insultes MON festin ? Répète donc, vermine !"
 lotr_feast.0051.b: "Laisse tomber. Une table brisée ne vaut pas un crâne fracassé aujourd’hui."

 lotr_feast.0052.t: "Mensonges assourdissants"
 lotr_feast.0052.desc: "Au-dessus du vacarme des orcs rugissants et des os craquants, j’entends la voix de [orc_potential_rival.GetFirstName] proférer des mensonges à mon sujet—prétendant que j’ai fui une bataille, me suis caché derrière des esclaves, volé le butin.\n\nLa salle rit. Ils aiment une rumeur plus que de la viande fraîche. Si je n’y réponds pas, elle se répandra. Si je réponds... les armes pourraient être tirées."
 lotr_feast.0052.a: "Tiens-toi devant moi, menteur. Je graverai la vérité sur ta peau !"
 lotr_feast.0052.b: "Qu’ils parlent. Les mots ne peuvent pas me blesser."
 lotr_feast.0052.positive.t: "Vérité par la Force"
 lotr_feast.0052.positive.desc: "Tu as écrasé la langue du menteur et restauré ton honneur."
 lotr_feast.0052.negative.t: "Murmures Intacts"
 lotr_feast.0052.negative.desc: "Tu as ignoré les rumeurs, mais elles se sont propagées dans la salle sans contrôle."

 lotr_feast.0053.t: "Vanité brûlée"
 lotr_feast.0053.desc: "Les feux du festin flambent chaudement, et [orc_potential_rival.GetFirstName] se vante d’exploits clairement *volés* de mes propres victoires.\n\n« J’ai abattu dix ennemis d’un seul coup ! » hurle-t-il, brandissant un os graisseux comme une lame.\n\nPlusieurs orcs me jettent un regard. Ils connaissent la vérité—mais veulent aussi du sang."
 lotr_feast.0053.a: "Tu oses voler MA gloire ? Je graverai ces mensonges sur ta peau !"
 lotr_feast.0053.b: "Qu’ils parlent. Je n’ai pas besoin de crier pour me prouver."
 lotr_feast.0053.positive.t: "Gloire Reprise"
 lotr_feast.0053.positive.desc: "Tu as brûlé les fausses vantardises et gagné le respect."
 lotr_feast.0053.negative.t: "Fame Volée"
 lotr_feast.0053.negative.desc: "Tu as laissé le menteur se vanter, et ton silence t’a coûté ton honneur."

 lotr_feast.0054.t: "Danse d'insultes"
 lotr_feast.0054.desc: "Un cercle d’orcs se forme au centre de la salle de festin. L’un avance—[orc_potential_rival.GetFirstName], bien sûr—applaudissant, piétinant, scandant des vers grossiers sur ma parenté et l’odeur de mon camp de guerre.\n\nLa foule hurle de rire. C’est la danse orc des insultes—moitié moquerie, moitié défi. Si je monte sur scène, le sang suivra probablement."
 lotr_feast.0054.a: "J’entre dans le cercle et les brûle vivants avec mes mots !"
 lotr_feast.0054.b: "Qu’ils aboient comme des gobelins. Je ne répondrai pas."
 lotr_feast.0054.positive.t: "Des Mots Comme des Lames"
 lotr_feast.0054.positive.desc: "Tu as répondu à chaque insulte et laissé ton adversaire humilié."
 lotr_feast.0054.negative.t: "Cible Silencieuse"
 lotr_feast.0054.negative.desc: "Tu t’es éloigné, et le cercle s’est moqué de ton retrait silencieux."

 lotr_feast.1000.t: "Un moment opportun"
 lotr_feast.1000.desc: "Je passe près de [listening_elf.GetName] et [attentive_elf.GetName] qui sont profondément engagés dans une conversation. Plusieurs autres invités sont à proximité, et quelques têtes se tournent vers moi. Je réalise que c’est peut-être une bonne occasion de faire un discours pour inspirer de l’[hope|E] chez les participants. Mais puis-je trouver les mots justes si rapidement ?"
 lotr_feast.1000.a: "Je sais exactement quoi dire..."
 lotr_feast.1000.b: "Non, le moment n’est pas approprié..."