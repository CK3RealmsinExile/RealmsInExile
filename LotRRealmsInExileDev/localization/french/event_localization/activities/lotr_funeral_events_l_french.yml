l_french:

 lotr_funeral.0001.t: "À la mémoire des tombés"
 lotr_funeral.0001.desc: "Je viens me tenir aux côtés de [grieving_elf.GetFirstName], qui semble submergé par le chagrin. « Quel espoir reste-t-il maintenant sans [deceased.GetName] ? » demande t'[grieving_elf.Custom('IlElle')] tandis que des larmes coulent sur son visage. « Que pouvons-nous faire d'autre que fuir vers [valinor|E], où la mort n’existe pas pour notre peuple ? »"
 lotr_funeral.0001.a: "Même après une telle perte, nous devons continuer à nous battre."