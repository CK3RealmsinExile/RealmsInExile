l_french:

 hold_court_lotr.1001.t: "La Barbe Suprême"
 hold_court_lotr.1001.desc: "J'entends les cris de [dwarven_char_a.GetName] et [dwarven_char_b.GetName] d'un bout à l'autre de la cour. Toute ma suite retient son souffle tandis que la paire s'avance vers moi.\n\n« J'ai manifestement la plus belle barbe et cet imbécile de bouc de Nain refuse de l'admettre ! » vocifèrent-ils tous deux à l'unisson parfait, leur fureur mutuelle redoublant à l'instant même.\n\nIl semble qu'on me demande à présent de statuer sur qui des deux Nains possède la plus belle barbe."
 hold_court_lotr.1001.a: "[dwarven_char_a.GetName] a manifestement la plus belle barbe."
 hold_court_lotr.1001.b: "Je suis certain que [dwarven_char_b.GetName] a la plus belle barbe."
 hold_court_lotr.1001.c: "Tous deux ont une magnifique barbe à leur façon."
 dwarven_yearly.1001.c.success: "Mes arguments les ont convaincus."
 dwarven_yearly.1001.c.failure: "Il ne peut en être qu'un seul."
 hold_court_lotr.1001.d: "J'ai la PLUS BELLE barbe !"
 hold_court_lotr.1001.e: "Ils n'auront plus de barbe."
 hold_court_lotr.1001.b.befriend_reason: "se sont liés d'amitié autour de leurs barbes"
 hold_court_lotr.1001.a.befriend_reason: "$hold_court_lotr.1001.b.befriend_reason$"

