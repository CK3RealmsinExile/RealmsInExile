l_french:

 lotr_horse_race.0007.t: "Une nouvelle tradition équestre"
 lotr_horse_race.0007.desc: "Depuis que les courses de chevaux ont gagné en faveur dans cette région, elles sont devenues une occasion privilégiée pour les habitants de se rassembler et d’exalter leur cité.\n\nPlusieurs villes et bourgs tiennent déjà leurs propres courses lors de grandes fêtes, mais ces rassemblements demeurent parfois désordonnés, mal réglés et confus. J’ai donc œuvré de concert avec les notables de [capital.GetNameNoTier] afin d’y instituer une grande course, qui se tiendra désormais à intervalles réguliers. Ainsi naîtra une tradition nouvelle, propre à nourrir la fierté civique des habitants et à faire rayonner le nom de [capital.GetNameNoTierNoTooltip] dans toute la contrée.\n\nEn particulier, la course sera tenue"
 lotr_horse_race.0007.desc.religious: "lors d’une grande fête religieuse déjà chère au cœur du peuple. Cette tradition nouvelle se teintera ainsi d’une ferveur spirituelle, unissant solennité sacrée et liesse populaire."
 lotr_horse_race.0007.desc.civic: "afin de commémorer un événement majeur de l’histoire de [capital.GetNameNoTierNoTooltip]. Car comment la fierté des habitants ne s’approfondirait-elle pas, s’ils se souviennent des raisons mêmes qui fondent leur attachement à leur cité ?"
 lotr_horse_race.0007.desc.dynastic: "en l’honneur des heureux événements récents survenus à la maison [ROOT.Char.GetHouse.GetName]. Il est sage de resserrer nos liens avec les habitants, afin que nos triomphes soient célébrés d’un même élan."
 lotr_horse_race.0007.a: "Puisse cette tradition perdurer à travers les ans !"
 lotr_horse_race.0018.t: "L’héritage écrit des [ROOT.Char.GetDynasty.GetBaseNameNoTooltip]"
 lotr_horse_race.0018.desc: "Au fil des ans, le peuple [ROOT.Char.GetCulture.GetName] a fait grand usage d’écrits pour consigner fondations, donations, baux, acquisitions, litiges et autres affaires financières ou juridiques liées à nos institutions et édifices religieux.\n\nLa plupart des familles notables parmi les [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip], y compris les [ROOT.Char.GetDynasty.GetBaseName], ont ainsi rédigé maints parchemins. Toutefois, ces documents sont dispersés, certains reposent en nos demeures et chancelleries, d’autres sont conservés dans la [ROOT.Char.GetFaith.HouseOfWorship], et tous ne sont point en bon état.\n\nJ’ai donc ordonné que l’on rassemble autant que possible les écrits de notre lignée afin de les compiler à nouveau. Ils nous seront d’un grand secours, que ce soit lors de querelles juridiques, de transactions telles que ventes ou acquisitions de terres, ou encore pour rappeler à tous les œuvres charitables accomplies par notre maison."
 lotr_horse_race.0018.a: "Il était temps d’agir ainsi."
 lotr_horse_race.0019.t: "Investir dans les chevaux de course"
 lotr_horse_race.0019.desc.intro: "Il sied aux grandes maisons [GetPlayer.GetCulture.GetName], telle celle des [GetPlayer.GetHouse.GetName], de posséder des écuries garnies de chevaux de course finement élevés, rapides et endurants, dociles sous la main du cavalier. Si nos montures ne manquent ni de vigueur ni de fougue, elles peuvent encore être perfectionnées.\n\nC’est pourquoi "
 lotr_horse_race.0019.desc.investor: "j’ai pris l’initiative"
 lotr_horse_race.0019.desc.other: "[ROOT.Char.Custom2('RelationToMe', racing_horse_investor)] a pris l’initiative"
 lotr_horse_race.0019.desc.conclusion: "d’investir davantage dans les chevaux de course de notre maison, en acquérant et en dressant les plus prompts et les plus agiles, et en formant avec soin les plus prometteurs issus de nos propres écuries. Si nous agissons avec sagesse, nous dominerons les courses de la région durant de longues années."
 lotr_horse_race.0019.a: "Nos chevaux nous vaudront de grandes victoires !"
 lotr_horse_race.0019.small.tooltip: "Tant que votre [house|El] bénéficie du [modifier|El] [GetModifier('RICE_lotr_horse_race_Racing_horse_investment_small_modifier').GetNameWithTooltip], vos chances de remporter une course sont légèrement accrues."
 lotr_horse_race.0019.medium.tooltip: "Tant que votre [house|El] bénéficie du [modifier|El] [GetModifier('RICE_lotr_horse_race_Racing_horse_investment_medium_modifier').GetNameWithTooltip], vos chances de remporter une course sont accrues."
 lotr_horse_race.0019.large.tooltip: "Tant que votre [house|El] bénéficie du [modifier|El] [GetModifier('RICE_lotr_horse_race_Racing_horse_investment_large_modifier').GetNameWithTooltip], vos chances de remporter une course sont nettement accrues."
 lotr_horse_race.0020.t: "Préparatifs de départ"
 lotr_horse_race.0020.desc: "Lorsque j’appris que [host.GetTitledFirstName] allait tenir une grande course de chevaux à [location.GetName], je sus qu’il me fallait m’y rendre. Dignitaires, nobles et champions de toute la région pourraient s’y presser pour assister à l’épreuve, et la fête promet d’être mémorable.\n\nNous hâtons les préparatifs et partons dès l’aube."
 lotr_horse_race.0020.desc.host: "La course que j’organise à [location.GetName] débutera sous peu. Dignitaires, nobles et champions venus de toute la région seront présents pour assister à l’épreuve.\n\nNous hâtons les préparatifs et partons dès l’aube."
 lotr_horse_race.0020.a: "Puisse le spectacle être à la hauteur !"
 lotr_horse_race.0021.t: "Participer à la course hippique ?"
 lotr_horse_race.0021.desc: "Les courses sont une excellente occasion pour les grandes comme les modestes Maisons d’acquérir prestige et renommée, et la mienne ne fait pas exception. Honneur et gloire attendent les vainqueurs, mais le prix à payer peut être élevé.\n\nSi j’inscrivais l’un des chevaux de course de ma famille, il faudrait entreprendre un entraînement et des préparatifs conséquents, des préparatifs qui ne seraient pas sans coût."
 lotr_horse_race.0021.a: "Contentons-nous d’observer."
 lotr_horse_race.0021.a.tooltip: "Votre [house|El] ne paiera aucun cavalier pour participer à la course et #N renoncera#! à toute chance d’obtenir des récompenses en cas de victoire."
 lotr_horse_race.0021.b: "Préparons notre meilleur cheval !"
 lotr_horse_race.0021.b.tooltip: "Votre [house|El] aura les chances normales de remporter la course."
 lotr_horse_race.0021.c: "Je n’épargnerai aucune dépense !"
 lotr_horse_race.0021.c.tooltip: "Votre [house|El] aura une chance #P accrue#! de remporter la course."
 lotr_horse_race.0022.t: "Derniers préparatifs"
 lotr_horse_race.0022.desc: "Je suis arrivé sur le champ de course de [actual_location.GetName], et pas un instant trop tôt. La foule bruisse d’excitation ; serviteurs et intendants vont et viennent avec la rapidité des chevaux eux-mêmes, tandis que des visiteurs affluent de près comme de loin.\n\nUn tel événement ne se résume pas à la course elle-même. Celle-ci n’est, après tout, que l’aboutissement de jours de festivités. Il reste donc bien des préparatifs à superviser. Cette année, la course est organisée "
 lotr_horse_race.0022.desc.religious.christian: "pour célébrer la fête d’un saint populaire de foi [faith.GetAdjective] ici, à [actual_location.GetName]."
 lotr_horse_race.0022.desc.religious: "à l’occasion d’une célébration religieuse en l’honneur d’une figure sacrée locale de foi."
 lotr_horse_race.0022.desc.civic: "pour commémorer un événement historique majeur survenu à [actual_location.GetName]."
 lotr_horse_race.0022.desc.dynastic: "en l’honneur des triomphes de la Maison [host.GetHouse.GetName]."
 lotr_horse_race.0022.desc.horses: "\n\nJe vais également inspecter mon cheval et son cavalier, qui concourront plus tard. Tout semble en ordre pour l’instant. Espérons qu’ils triompheront cette fois !"
 lotr_horse_race.0022.a: "Je dois superviser les derniers préparatifs."
 lotr_horse_race.0023.a: "Installons-nous confortablement."
 lotr_horse_race.0024.t: "Le Banquet d’ouverture"
 lotr_horse_race.0024.desc: "Ce soir, habitants de [actual_location.GetName] et visiteurs participent au banquet d’ouverture ainsi qu’à la cérémonie d’offrande de foi [host.GetFaith.GetAdjective]. Des centaines de conversations se mêlent tandis que les paysans se rassemblent en foule et que les nobles, drapés dans leurs plus beaux atours, avancent tous dans la même direction.\n\nLa procession traverse la ville, accompagnée des [host.Custom('DefaultPriestTitlePlural')] et d’artistes, jusqu’à ce que nous atteignions enfin une grande salle. Les portes s’ouvrent devant nous, révélant un hall magnifiquement décoré où doit se tenir le festin.\n\nLes plats arrivent vite, les boissons encore plus."
 lotr_horse_race.0024.a: "Une occasion des plus festives !"
 lotr_horse_race.0026.t: "La Course commence !"
 lotr_horse_race.0026.desc.intro.christian: "C’est le matin de la fête."
 lotr_horse_race.0026.desc.intro: "C’est le matin de la fête."
 lotr_horse_race.0026.desc: "Je pars assister à une nouvelle procession avant que nous ne rendions hommage dans un important [host.GetFaith.HouseOfWorship] de [actual_location.GetName]. La liesse est générale, mais l’excitation atteint son comble à l’approche de l’heure de la course.\n\nL’après-midi venu, la course débute. L’enthousiasme est palpable. Les foules se pressent autour de la piste, tandis que les nobles prennent place sur des estrades élevées. L’odeur de sueur et de fumier flotte dans l’air sans troubler ma ferveur. Les chevaux s’alignent,"
 lotr_horse_race.0026.desc.horses: "et, vers l’arrière, j’aperçois celui qui représente notre maison, paré de nos couleurs et de nos emblèmes ! Mes gens et moi l’acclamons avec ardeur tandis que le cavalier ajuste les rênes."
 lotr_horse_race.0026.desc.none: "et à travers le champ je distingue des montures aux couleurs variées, éclatantes et chamarrées, portant les emblèmes de maisons nobles et de quelques roturiers. Les chevaux frémissent sous leurs caparaçons, mais obéissent docilement. La plaine résonne d’acclamations."
 lotr_horse_race.0026.desc.conclusion: "\n\nUn clairon strident fend l’air, et aussitôt les chevaux s’élancent comme l’éclair, soulevant un nuage de poussière !"
 lotr_horse_race.0026.a: "Allez ! Allez ! Allez !"
 lotr_horse_race.0028.t: "La Ligne d’arrivée !"
 lotr_horse_race.0028.desc: "La terre semble vibrer sous les sabots des chevaux lancés à toute allure et sous les cris exaltés de la foule. Enfin, le premier cheval franchit la ligne d’arrivée, déclenchant une clameur assourdissante.\n\n"
 lotr_horse_race.0028.desc.house_host: "Mon cri se mêle aux autres. Le cheval vainqueur appartient à notre propre [house|E] [ROOT.Char.GetHouse.GetName] ; nos couleurs flottent dans la brise tandis que le cavalier ralentit sa monture. Je me lève d’un bond, le cœur battant, et lève les bras au ciel.\n\nLe nom de la Maison [ROOT.Char.GetHouse.GetName] sera sur toutes les lèvres."
 lotr_horse_race.0028.desc.house_other: "Le cheval victorieux appartient à la [house|El] [lotr_horse_race_winner.GetHouse.GetName], soutenue par [lotr_horse_race_winner.GetTitledFirstName]. Nul doute que leur maison se réjouit pleinement de cette issue."
 lotr_horse_race.0028.desc.merchant: "Le cheval vainqueur appartient à une famille de marchands qui, manifestement, a largement payé pour l’obtenir. Ils ne sont pas de la haute noblesse, ce qui arrache quelques regards contrariés, mais leur victoire doit être reconnue."
 lotr_horse_race.0028.desc.patrician: "Le cheval victorieux appartient à une maison noble mineure de [actual_location.GetNameNoTooltip]. Ce jour restera gravé dans l’histoire de leur lignée, et pour un temps, ils goûteront aux feux de la gloire."
 lotr_horse_race.0028.desc.conclusion: "\n\nLe cavalier, encore couvert de sueur, s’avance vers les officiels pour recevoir la bannière du champion. Une ovation retentit tandis qu’il brandit fièrement son étendard."
 lotr_horse_race.0028.a: "La course s’achève, mais les festivités continuent !"
 lotr_horse_race.0028.b: "La victoire est douce, mais la fête n’est pas finie !"
 lotr_horse_race.0029.t: "$lotr_horse_race.0028.t$"
 lotr_horse_race.0029.desc: "$lotr_horse_race.0028.desc$"
 lotr_horse_race.0029.desc.house_other: "$lotr_horse_race.0028.desc.house_other$"
 lotr_horse_race.0029.desc.conclusion: "$lotr_horse_race.0028.desc.conclusion$"
 lotr_horse_race.0029.a: "$lotr_horse_race.0028.a$" 
 lotr_horse_race.0030.t: "Un Grand banquet"
 lotr_horse_race.0030.desc.intro: "La course achevée, vient le temps des réjouissances et du festin, comme le veut la tradition.\n\nLe tumulte se prolonge tard dans la nuit, et les chants résonnent jusqu’à l’aube. Les autorités locales prennent également le temps de distribuer diverses aumônes"
 lotr_horse_race.0030.desc.host: "financées en partie par moi-même"
 lotr_horse_race.0030.desc.guest: "financées principalement par [host.GetTitledFirstName]"
 lotr_horse_race.0030.desc.conclusion: "aux pauvres et aux nécessiteux. Des dots sont aussi attribuées par tirage au sort à de jeunes femmes démunies, et certains prisonniers sont graciés et libérés.\n\nNul n’oubliera la miséricorde et la grâce de [ROOT.Char.GetFaith.HighGodName]. Dans l’ensemble, l’atmosphère est vibrante et joyeuse, et chacun semble goûter pleinement aux festivités !"
 lotr_horse_race.0030.a: "[actual_location.GetNameNoTooltip] sait assurément célébrer comme il se doit !"
 lotr_horse_race.0031.t: "Les Marchés locaux"
 lotr_horse_race.0031.desc: "La fête et la course touchent à leur fin, et tandis que les visiteurs venus de loin commencent à lever le camp, les guildes et marchands locaux ont installé un vaste marché public pour exposer leurs marchandises.\n\nC’est là une excellente occasion de faire quelques emplettes ; peut-être pourrais-je rapporter quelques babioles afin de me délasser après tant d’émotions.\n\nIl est étrange de songer qu’après tant de réjouissances ces derniers jours, tout est désormais terminé…"
 lotr_horse_race.0031.a: "Je n’ai nul besoin d’acheter quoi que ce soit avant mon départ."
 lotr_horse_race.0031.b: "Avant de partir, j’aimerais acquérir quelques objets…"
 lotr_horse_race.0050.t: "Décoction fort dangereuse"
 lotr_horse_race.0050.desc: "Je participe à un modeste festin traditionnel [ROOT.Char.GetCulture.GetName], organisé pour renforcer les liens et rendre la pareille à des services passés. Celui-ci est donné en mon honneur, en remerciement de l’aide apportée aux notables locaux dans l’exercice de mes fonctions de [ROOT.Char.GetTitleAsNameNoTooltip].\n\nLes mets sont à la fois familiers et exotiques, mais le clou du repas survient après le festin. Lorsque nous sommes repus, les serviteurs apportent un grand chaudron rempli à ras bord d’un liquide vert sombre. Tandis que j’observe la pellicule luisante qui en recouvre la surface, on m’explique qu’il s’agit d’une décoction d’herbes locales cueillies dans les champs, consommée après le repas pour faciliter la digestion.\n\nAutour de moi, tous l’avalent bruyamment. Mais lorsque je l’approche de mes lèvres, une odeur âcre envahit mes narines. Mon estomac se noue."
 lotr_horse_race.0050.a: "Je ne suis pas un lâche, je survivrai !"
 lotr_horse_race.0050.b: "Peut-être devrais-je la diluer un peu…"
 lotr_horse_race.0050.c: "Certainement pas."
 lotr_horse_race.0050.bad.toast: "Votre estomac ne se sent pas très bien."
 lotr_horse_race.0051.t: "Un Dessert exquis"
 lotr_horse_race.0051.desc: "Lors d’une visite dans un village [culture.GetName], près de [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier], les habitants m’offrent un dessert traditionnel [culture.GetNameNoTooltip] composé de beignets frits fourrés de fromage blanc, de jus et zestes de citron et d’orange, ainsi que de saindoux, le tout nappé de miel, de sucre et d’une pointe de sel.\n\nSon goût mêle harmonieusement douceur et saveurs riches, me laissant pleinement satisfait.\n\nMalgré ses origines modestes, c’est là un véritable délice !"
 lotr_horse_race.0051.a: "Un mariage exquis de sucré et de salé !"
 lotr_horse_race.0052.t: "Les Ruines voisines"
 lotr_horse_race.0052.desc: "Alors que les festivités entourant la course battent leur plein, je me retrouve à errer près des portes de [actual_location.GetNameNoTooltip]. Au loin, j’aperçois une tour délabrée, depuis longtemps tombée en ruine.\n\nDes vestiges [numenorean|E] comme celui-ci parsèment de nombreuses contrées de l’Ouest. Ces monuments de pierre sont les témoins d’époques plus glorieuses.\n\nChacun recèle sa propre histoire, sujet sur lequel mes courtisans et moi débattons, chacun avançant sa théorie."
 lotr_horse_race.0052.a: "Elles furent assurément bâties par des hommes plus grands et plus forts que nous !"
 lotr_horse_race.0052.b: "Ces structures devaient être les châteaux d’anciens souverains."
 lotr_horse_race.0052.c: "Ce furent sans doute d’antiques [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] [ROOT.Char.GetFaith.HouseOfWorshipPlural]."
 lotr_horse_race.0052.d: "À vrai dire, j’ignore ce que c’est et cela m’importe peu."
 lotr_horse_race.0053.t: "Un Signe funeste"
 lotr_horse_race.0053.desc: "Dans le folklore [ROOT.Char.GetCulture.GetName], certains individus sont réputés voyants, prétendant pouvoir communiquer avec les morts, voire les voir. Plus précisément, ils disent apercevoir la procession des morts à la lueur de la lune ou à minuit.\n\nUne nouvelle alarmante nous est parvenue : un devin local affirme avoir vu [doomed.GetTitledFirstName] au sein d’une telle procession lors d’un voyage dans la campagne. On dit qu’il s’agit d’un présage funeste : toute personne vivante aperçue dans cette procession mourra dans l’année."
 lotr_horse_race.0053.a: "[doomed.GetFirstNameNoTooltip], vous devez prier [ROOT.Char.GetFaith.HighGodName] !"
 lotr_horse_race.0053.a.tooltip: "Si [doomed.GetFirstNameNoTooltip] prie avec assez de ferveur, peut-être que [ROOT.Char.GetFaith.HighGodName] [ROOT.Char.Custom('FR_LeLa')] sauvera et empêchera [ROOT.Char.GetFaith.DeathDeityName] de venir."
 lotr_horse_race.0053.b: "Ce devin dit des sottises, ce n’est que superstition."
 lotr_horse_race.0053.b.tooltip: "[doomed.GetFirstNameNoTooltip] n’a rien à craindre ! Le devin a sans doute eu des visions trompeuses. Assurément, rien de fâcheux n’arrivera. Assurément."
 lotr_horse_race.0054.t: "Le Présage accompli"
 lotr_horse_race.0054.desc: "Eh bien… Voilà qui est troublant.\n\nIl semblerait que le devin ait dit vrai. Je viens d’apprendre que [doomed.GetTitledFirstName] est décédé la nuit dernière, emporté par une maladie soudaine et fulgurante."
 lotr_horse_race.0054.a: "Voilà qui est inquiétant…"
 lotr_horse_race.0055.t: "La Tisseuse des destins"
 lotr_horse_race.0055.desc: "[dreamer.GetTitledFirstName] affirme que la Tisseuse des Destins, servante de [ROOT.Char.GetFaith.FateGodName], lui est apparue en songe la nuit dernière.\n\nDans les récits [ROOT.Char.GetCulture.GetName], elle est la reine des bonnes fées qui habitent les grottes et les anciens monuments de pierre des campagnes alentour.\n\nOn dit que ces fées récompensent les femmes travailleuses dans l’art du filage et du tissage, et punissent celles qui sont paresseuses. Ainsi les femmes sont encouragées à redoubler d’efforts, bien que les [ROOT.Char.GetFaith.GetAdjective] [ROOT.Char.Custom('DefaultPriestTitlePlural')] considèrent ces croyances comme de simples superstitions.\n\nQuoi qu’il en soit, [dreamer.GetFirstNameNoTooltip] affirme que le rêve qu’[dreamer.GetSheHe] fit de la Tisseuse était un"
 lotr_horse_race.0055.desc.bad: "mauvais rêve."
 lotr_horse_race.0055.desc.good: "bon rêve."
 lotr_horse_race.0055.a: "Je suis certain[ROOT.Char.Custom('FR_E')] que [ROOT.Char.GetFaith.FateGodName] veillait sur vous."
 lotr_horse_race.0055.b: "Tout cela ressemble fort à des balivernes."
 lotr_horse_race.0056.t: "Le Grand chasseur"
 lotr_horse_race.0056.desc: "M[chaplain.Custom('FR_OnA')] [chaplain.GetCouncilTitle] [chaplain.GetTitledFirstName] m’exhorte depuis peu à prier avec plus de ferveur [oromecharactershort|E], le Grand Cavalier.\n\n« Il est le patron non seulement de ceux qui chassent les bêtes sauvages, mais en vérité de tous les cavaliers », insiste [chaplain.GetFirstNameNoTooltip]. « Si vous lui offriez vos prières, il vous accorderait sans doute la victoire et maintes bénédictions. On dit que ceux qui l’honorent sont saisis par son esprit lorsqu’ils chevauchent, au point de paraître presque féeriques, comme lui lors de la Bataille des Valar aux premiers âges du monde. »"
 lotr_horse_race.0056.a: "Je prierai en privé."
 lotr_horse_race.0056.b: "Que tous voient ma dévotion au Chasseur !"
 lotr_horse_race.0057.t: "La Fausse lettre"
 lotr_horse_race.0057.desc: "Alors que j’assiste à la course, l’un de mes courtisans m’aborde, tenant un document jauni par le temps. Il m’explique qu’au cours d’un récent procès, une famille de serfs attachée à un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetFaith.HouseOfWorship] a prétendu que celui-ci n’avait aucun droit sur eux et qu’ils étaient libres.\n\nIls ont présenté cette lettre, scellée de ma propre signature, pour appuyer leurs dires, mais elle s’est révélée être un faux. Condamner ces paysans présomptueux et écervelés semble être la sanction évidente pour avoir forgé un document en #italic mon#! nom. Toutefois, certains de mes conseillers estiment qu’une telle peine serait excessive et qu’en l’honneur de [ROOT.Char.GetFaith.HighGodName], je devrais faire preuve de clémence."
 lotr_horse_race.0057.a: "Gracier les serfs et les renvoyer au [ROOT.Char.GetFaith.HouseOfWorship]."
 lotr_horse_race.0057.b: "Cela créerait un dangereux précédent. Qu’on les exécute."
 lotr_horse_race.0058.t: "Authentique ou faux ?"
 lotr_horse_race.0058.desc: "Parmi les [ROOT.Char.GetCulture.GetCollectiveNoun], les archives et chartes sont des outils précieux pour trancher les affaires juridiques. Mais cela signifie aussi que certains documents sont parfois falsifiés.\n\nMe voici face à une affaire délicate. Un noble et un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetFaith.GetAdjective] [ROOT.Char.Custom('DefaultPriestTitle')] local[ROOT.Char.Custom('FR_E')] se disputent la possession d’un serf. Le noble a produit un parchemin datant de l’époque de son père, censé étayer ses dires. Or, aucun des témoins ayant signé le document n’est encore en vie, circonstance fort commode. [ROOT.Char.Custom('FR_LeLa')|U] [ROOT.Char.Custom('DefaultPriestTitle')] affirme qu’il s’agit d’un faux.\n\nAu terme des audiences, il me revient, en tant que [ROOT.Char.GetTitleAsNameNoTooltip], de rendre un jugement. J’examine le parchemin et conclus que…"
 lotr_horse_race.0058.a: "Le document du noble semble authentique."
 lotr_horse_race.0058.b: "[ROOT.Char.Custom('FR_LeLa')|U] [ROOT.Char.Custom('DefaultPriestTitle')] a raison. L’absence de témoins vivants est suspecte."
 lotr_horse_race.0059.t: "Donations"
 lotr_horse_race.0059.desc: "J’ai identifié un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetFaith.GetAdjective] [ROOT.Char.GetFaith.HouseOfWorship] voisin[ROOT.Char.Custom('FR_E')] qui aurait grand besoin de dons en serviteurs et en bétail. Une fois effectuées, ces donations seront consignées par écrit en langue [ROOT.Char.GetCulture.GetLanguage.GetName]. Ainsi, l’on se souviendra durant des générations de ma générosité et de celle de la Maison [ROOT.Char.GetHouse.GetName].\n\nIl me faut décider si je saisis cette occasion ou si je la laisse passer."
 lotr_horse_race.0059.a: "Préparez les donations !"
 lotr_horse_race.0059.b: "Je ne puis me permettre une telle dépense."
 lotr_horse_race.0060.t: "Une Réputation mitigée"
 lotr_horse_race.0060.desc: "Alors que je visite les étals des marchands près du champ de course de [actual_location.GetName], un dignitaire étranger m’aborde. Il a récemment traversé mes terres en [ROOT.Char.GetCapitalLocation.GetName].\n\nIl m’avoue qu’il hésitait à voyager dans mon domaine, en raison de sa réputation de contrée peuplée d’hommes rudes et endurcis. De telles rumeurs ne sont pas rares en terres étrangères."
 lotr_horse_race.0060.a: "Comme vous le voyez, notre patrie peut être #italic belle#! elle aussi."
 lotr_horse_race.0060.b: "Vous vous méprenez lourdement, et vos propos sont biaisés."
 lotr_horse_race.0060.c: "À vrai dire, cette terre #italic est#! un endroit épouvantable."
 lotr_horse_race.0061.t: "Une Ruine prometteuse"
 lotr_horse_race.0061.desc: "Les [ROOT.Char.GetFaith.GetAdjective] [ROOT.Char.Custom('DefaultPriestTitlePlural')] de mon royaume ont identifié, en [county.GetNameNoTier], une antique ruine qui pourrait convenir à l’édification d’un petit sanctuaire destiné à servir la communauté locale. Ils espèrent que je financerai la transformation du site en un véritable lieu de culte.\n\nIl est courant que ces anciens monuments de pierre soient réutilisés de la sorte, et les habitants les fréquentent souvent, pour des raisons religieuses ou commerciales. Transformer l’un d’eux en lieu de culte [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] serait une œuvre pieuse et avisée."
 lotr_horse_race.0061.a: "Les [ROOT.Char.Custom('DefaultPriestTitlePlural')] recevront les fonds nécessaires."
 lotr_horse_race.0061.b: "Je ne puis les aider pour le moment."
 lotr_horse_race.0062.t: "Chant diphtonique [culture.GetNameNoTooltip]"
 lotr_horse_race.0062.desc: "Aujourd’hui, des roturiers [culture.GetName] venus de [county.GetNameNoTier], réputés pour leur art du chant diphonique, se sont installés près des pistes pour se produire devant quiconque souhaite les écouter.\n\nQuatre chanteurs forment un cercle durant la majeure partie de la représentation. L’un déclame un poème, tandis que les trois autres l’accompagnent en chœur. Le résultat est harmonieux, et leurs chants couvrent un vaste éventail de thèmes.\n\nÀ la fin de la prestation, il m’appartient, si je le souhaite, de récompenser ces talentueux artistes."
 lotr_horse_race.0062.a: "Merci pour cette superbe performance."
 lotr_horse_race.0062.b: "Un tel talent mérite plus qu’un simple présent !"
 lotr_horse_race.0063.t: "Les Sentiers des bergers"
 lotr_horse_race.0063.desc: "Des bergers parcourent toutes les terres environnantes. Durant un moment plus calme des festivités liées à la course, j’ai pris le temps d’explorer les sentiers dits « des bergers » disséminés à travers [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], serpentant collines, vallées et rivières.\n\nLa promenade fut reposante, mais il est également précieux de connaître les voies potentielles qu’emprunteront mes officiers et mes soldats dans la région."
 lotr_horse_race.0063.a: "Ces informations me seront utiles."
 lotr_horse_race.0063.b: "Je devrais repartir pour une autre promenade…"
 lotr_horse_race.0063.c: "Ah, être aussi libre que les errants qui parcourent ces terres sauvages…"
 lotr_horse_race.0063.c.tt: "Quelques jours après la course, vous abandonnerez vos titres et deviendrez un[ROOT.Char.Custom('FR_E')] [adventurer|El] sans terre."
 lotr_horse_race.0064.t: "Chevaux sauvages"
 lotr_horse_race.0064.desc: "Alors que je me promène dans la campagne de [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] avec mon escorte, nous tombons sur un petit troupeau de chevaux sauvages. Depuis des temps immémoriaux, ces magnifiques bêtes errent librement dans ces contrées, allant où bon leur semble à travers la plaine. Leur vue est un spectacle splendide."
 lotr_horse_race.0064.a: "Bêtes indomptées, mais d’une majesté certaine !"
 lotr_horse_race.0064.b: "Les chasser ferait un excellent exercice !"
 lotr_horse_race.0065.t: "Une Fillette perdue"
 lotr_horse_race.0065.desc: "Alors que je flâne dans les jardins de [actual_location.GetName], j’aperçois une enfant en pleurs.\n\nElle a manifestement été séparée de sa chaperonne, ce qu’elle confirme après que je suis parvenu[ROOT.Char.Custom('FR_E')] à la calmer.\n\n« Je m’appelle [lostgirl.GetFirstName], » me dit-elle. « Pouvez-vous m’aider, bo[lostgirl.Custom('FR_NNne')] [ROOT.Char.GetTitleAsName] ? »\n\nJe la regarde, choisissant mes mots avec soin afin de ne point l’effrayer."
 lotr_horse_race.0065.a: "Je paierai les gardes pour retrouver ta chaperonne."
 lotr_horse_race.0065.b: "Je suis désolé[ROOT.Char.Custom('FR_E')], mais je n’ai pas le temps."
 lotr_horse_race.0065.c: "Si tu le souhaites, une place t’attend à ma cour, petite."
 lotr_horse_race.0065.d: "Je peux t’offrir une place près de mon feu de camp, si l’aventure t’appelle !"
 lotr_horse_race.0066.t: "Un Cadeau sincère"
 lotr_horse_race.0066.desc: "Quelque temps après mon retour de la course, je croise [lostgirl.GetFirstName], la fillette que j’avais recueillie après qu’elle se fut égarée.\n\nElle m’adresse un large sourire et me tend un présent : un bouquet de fleurs cueillies de sa main.\n\nJe ne puis m’empêcher d’être touché[ROOT.Char.Custom('FR_E')] par son geste."
 lotr_horse_race.0066.a: "Je te remercie pour ce cadeau."
 lotr_horse_race.0067.t: "En rase campagne"
 lotr_horse_race.0067.desc: "Alors que je marche à travers les paysages entourant [actual_location.GetName], je remarque combien le terrain est plat. Les plaines ne s’élèvent que très légèrement au loin et semblent s’étendre à perte de vue.\n\nJ’aperçois un cavalier à l’horizon, et mes pensées dérivent vers l’art de la guerre. La cavalerie pourrait traverser ces terres avec aisance et poursuivre ses ennemis avec rapidité. Bien que je ne sois pas ici pour préparer une campagne, il pourrait être judicieux de réfléchir aux combats montés dans ces contrées…"
 lotr_horse_race.0067.a: "Une charge de cavalerie peut être dévastatrice."
 lotr_horse_race.0067.b: "Une telle plaine favorise des forces hautement mobiles."
 lotr_horse_race.0067.c: "Allons, je suis ici pour festoyer !"
 lotr_horse_race.0068.t: "Destriers de noble prestance"
 lotr_horse_race.0068.desc: "Tandis que les réjouissances se poursuivent, mes pas me mènent vers les marchés de [actual_location.GetName]. Comme il se doit en pareil jour, maints destriers y sont proposés à la vente. L’un des marchands, m’ayant reconnu, m’offre un prix avantageux pour l’un de ses jeunes chevaux.\n\nJe m’approche afin d’examiner la bête de plus près, lorsque soudain un fumet alléchant vient chatouiller mes sens. Mon regard se détourne vers les étals chargés de victuailles, tandis que le marchand s’efforce de ramener mon attention sur l’affaire qu’il espère conclure…"
 lotr_horse_race.0068.a: "Je ferai l’acquisition d’un nouveau destrier de guerre."
 lotr_horse_race.0068.b: "La faim me tenaille ; cherchons quelque mets à savourer."
 lotr_horse_race.0069.t: "Clameurs et allégresse"
 lotr_horse_race.0069.desc: "Alors que je déambule dans les rues animées de [actual_location.GetName], je demeure saisi par l’allégresse qui imprègne chaque pierre et chaque visage. Il apparaît bientôt que la populace attend cette course depuis bien longtemps et brûle d’en voir l’issue.\n\nUn cavalier passe au galop, saluant la foule d’un geste vif, et je me sens moi-même gagné par l’ardeur de la course. Mes peines s’évanouissent l’espace d’un instant, et je me promets en silence de conserver en mon cœur cette joie et cette liesse lorsque les clameurs se seront tues."
 lotr_horse_race.0069.a: "La Terre du Milieu recèle encore tant de merveilles !"
 lotr_horse_race.0069.b: "Voilà, en vérité, un spectacle fascinant."