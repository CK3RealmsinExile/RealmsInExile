#################################
### DWARF-FATHER INCARNATIONS ###
#################################

### DURIN ###

 ancestor_veneration.0101.t: "Vénération des Ancêtres : Durin I, l'Immortel"
 ancestor_veneration.0101.desc: "Le parchemin évoque [durindeathless|E], premier des [dwarves|E] à s'éveiller, en [Glossary('Mazalabkân','mazalabkan_gloss')], sous le mont [gunduzbad|E]. Il fut le plus ancien des sept [dwarffathers|E], [dwarffather|E] des [longbeards|E], et fonda la Maison de [GetScriptedCharacterByHistoryID('lineofdurinI').GetDynasty.GetName]. Seul, [GetScriptedCharacterByHistoryID('lineofdurinI').GetFirstName] s'en alla par des contrées où nul n'avait posé le pied, donnant leurs noms aux collines et aux vallons d'un monde encore jeune, ainsi que le rappelle [songofdurin|E].\n\nEn son temps, Durin parvint au [Concept('mirrormere', 'Lac-Miroir')|E], où d'étranges étoiles couronnaient la surface des eaux - signe, croyait-il, de sa destinée. Là, il dressa la Pierre de Durin et fonda [khazaddum|E] au-dessus du lac, taillant dans la montagne des halls qui deviendraient la fierté de toute la race des Nains.\n\nDans les profondeurs sous [GetTitleByKey('k_khazad_dum').GetNameNoTier], il découvrit [metal_mithril|E], et de ce trésor rare il se forgea le Heaume de Durin, un grand heaume masqué et royal, qui deviendrait un héritage illustre de son peuple. Il vécut d'une exceptionnelle longévité, même pour un [dwarf|E], et s'éteignit quelque temps avant la fin du [firstage|E]. Sa tombe repose au plus profond de Khazad-dûm."
 ancestor_veneration.0101.a: "Que mes actes honorent sa mémoire."
 ancestor_veneration.0101.a.saruman: "En vérité, il fut un Nain des plus honorables."
 ancestor_veneration.0101.b: "Il avait compris que les routes lointaines recèlent des richesses cachées."
 ancestor_veneration.0101.c: "La maîtrise de son art était une merveille pour beaucoup."

 ancestor_veneration.0102.t: "Vénération des Ancêtres : Durin II"
 ancestor_veneration.0102.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofdurinII').GetFirstNameRegnal], régnant sur [khazaddum|E] en un temps de paix et de puissance. [GetScriptedCharacterByHistoryID('lineofdurinII').GetFirstName] porta son regard au-delà des halls de la montagne et noua des liens avec le royaume voisin d'[eregion|E].\n\nEn un geste rare de confiance, il confia la construction de la Porte de l'Ouest de [GetTitleByKey('k_khazad_dum').GetNameNoTier] à l'art conjoint du [dwarf|E] et de l'[elf|E], chargeant [GetScriptedCharacterByHistoryID('lineofnarvi').GetFirstName], maître artisan de Khazad-dûm, et [celebrimbor|e], le seigneur elfe d'[eregion|E], de construire les [doorsofdurin|E], une collaboration qui allait forger une amitié durable entre Durin et Celebrimbor.\n\nLors de ses séjours dans la cité de [GetTitleByKey('c_ost_in_edhil').GetNameNoTier], principalement dans le quartier de [Glossary('Arost','arost_gloss')], où Durin s'était vu octroyer [Glossary('Bar Durin','bar_durin_gloss')] par [GetScriptedCharacterByHistoryID('lineoffeanor10').GetFirstName], Durin II se délectait à expérimenter des formes de haches, affinant des modèles qui alliaient fonction et beauté. Sous la conduite de Celebrimbor, cette confluence de l'artisanat aboutit à la création de la Hache de Durin, un chef-d'œuvre orné d'intr[ithildin|E] marquages travaillés par Celebrimbor lui-même. À l'instar de la création des Portes de Durin, cette hache marqua à jamais un rare moment d'unité entre les peuples des Nains et des Elfes."
 ancestor_veneration.0102.a: "Honorons la sagesse de Durin et cherchons des amitiés au-delà de nos halls."
 ancestor_veneration.0102.a.saruman: "Une alliance entre Elfes et Nains est chose rare et précieuse."
 ancestor_veneration.0102.b: "Les Longues-barbes n'avaient nul besoin d'aide pour trouver leur fortune."

 ancestor_veneration.0103.t: "Vénération des Ancêtres : Durin III"
 ancestor_veneration.0103.desc: "Le parchemin évoque [GetScriptedCharacterByHistoryID('lineofdurinIII').GetFirstNameRegnal], souverain des [longbeards|E] au [secondage|E], lorsque les [dwarves|E] de [khazaddum|E] partageaient une amitié rare avec les [elves|E] d'[eregion|E]. Guidés par [annatarcharacter|E], « le Seigneur des Dons », les Forgerons-Elfes sous la conduite de [celebrimbor|E] entreprirent la forge des [ringsofpower|E]. En dépit de viles rumeurs voulant que ce fût [sauroncharacter|E] qui eût remis le [Concept('sevenringsofdwarves', 'Anneau des Longues-barbes')|E] à [GetScriptedCharacterByHistoryID('lineofdurinIII').GetFirstName], les érudits tiennent pour vrai qu'il fut donné par [GetScriptedCharacterByHistoryID('lineoffeanor10').GetFirstName]. Quand le Seigneur Sombre révéla ses véritables desseins en [ageSA|E] 1695 et assaillit [GetTitleByKey('k_eregion').GetNameNoTier], [gundabad|E], l'[eriador|E] et les [greymountains|E] avec des [orcs|E] et de sauvages [men|E] venus de l'[east|E], des guerriers nains marchèrent au secours des Elfes, mais leur défense ne put prévaloir. Après la chute d'[eregion|E] en 2.A. 1697, les [doorsofdurin|E] furent closes, scellant le passage occidental vers [GetTitleByKey('k_khazad_dum').GetNameNoTier].\n\nEn 2.A. 1698, [GetTitleByKey('d_gundabad').GetNameNoTier] fut à son tour perdu, malgré une résistance acharnée, et avec l'afflux des Hommes de l'Est et des Orques dans la région, la Route Naine de Vertbois ne pouvait plus être parcourue en sécurité, coupant les [longbeards|E] de leurs frères des [ironhills|E]. L'[allianceofdwarvesandmen|E], forgée au début du Deuxième Âge entre [GetScriptedCharacterByHistoryID('lineofdurin3').GetFirstNameRegnal], petit-fils de [GetScriptedCharacterByHistoryID('lineofdurinI').GetFirstNameNicknamed], et [GetScriptedCharacterByHistoryID('lineofgundemar1').GetFirstNameNicknamedRegnal], avait longtemps résisté. Pourtant, dans les lendemains de la [waroftheelvesandsauron|E], l'alliance fut éprouvée par de cruelles pertes parmi les [northmen|E], dont la mort de leur chef [GetScriptedCharacterByHistoryID('lineofolmondo9').GetFirstNameRegnal]. Quand la tempête de la guerre s'apaisa, les [GetCultureByKey('dwergwine').GetCollectiveNoun] se retrouvèrent diminués et dispersés, et l'ancienne alliance ne put subsister davantage."
 ancestor_veneration.0103.a: "La trahison de Sauron ne sera point oubliée, ni laissée sans vengeance."
 ancestor_veneration.0103.b: "Les Elfes auraient dû se méfier davantage des étrangers bien intentionnés."
 ancestor_veneration.0103.c: "Nous devons être prêts, avant que l'ombre de Sauron ne se lève à nouveau."

 ancestor_veneration.0104.t: "Vénération des Ancêtres : Durin IV"
 ancestor_veneration.0104.desc: "Le parchemin décrit [GetScriptedCharacterByHistoryID('lineofdurinIV').GetFirstNameRegnal], souverain de [khazaddum|E] et [dwarffather|E] des [longbeards|E], qui marcha à la guerre quand le destin de la [middleearth|E] était en balance, et parvint par la suite à reprendre [gundabad|E], bien que pour la seule durée de sa vie. À la fin du [secondage|E], il se tint aux côtés des plus grands rois des [elves|E] et des [men|E]. [GetScriptedCharacterByHistoryID('lineoforodreth4').GetFirstName], [GetScriptedCharacterByHistoryID('lineoforopher1').GetFirstNameNicknamedRegnal], [GetScriptedCharacterByHistoryID('lineofamdir1').GetFirstNameNicknamedRegnal] et [elendil|E] formèrent le [lastallianceshort|E] contre l'Ombre du [mordor|E], avec le concours de [durinsfolk|E]. Chose stupéfiante, la [treacheryoforn|E] vit une partie des [ironfists|E] rejoindre la cause de [sauroncharacter|E], menés par leur roi [GetScriptedCharacterByHistoryID('lineofsindri102').GetFirstNameNicknamedRegnal], qui marchanda secrètement guerriers et armes contre l'or du Seigneur Sombre.\n\nL'un après l'autre, les grands rois tombèrent : Oropher à Dagorlad, [GetScriptedCharacterByHistoryID('lineofanarion1').GetFirstNameNicknamedRegnal] sous les murs de [GetTitleByKey('c_barad_dur').GetNameNoTier], et Gil-galad et [GetScriptedCharacterByHistoryID('lineofelendil').GetFirstNameNicknamedRegnal] dans la bataille finale sous la puissance de [GetScriptedCharacterByHistoryID('lineofsauron').GetFirstName]. Dans le chaos, [GetScriptedCharacterByHistoryID('lineisildur0').GetFirstNameNicknamedRegnal] ramassa [narsil|E] et trancha l'[masterring|E] de la main de Sauron, le détruisant. Durin IV fut l'un des rares rois à survivre à l'assaut, tandis qu'Ôrn périt dans les combats, avec ses espoirs de richesse.\n\nIsildur scella ensuite son propre destin en conservant l'Anneau, et fut occis par des [orcs|E] près de l'Anduin deux ans plus tard, où [Concept('onering', 'le Fléau d’Isildur')|E] se perdit dans les âges."
 ancestor_veneration.0104.a: "La victoire exige des sacrifices. Nous devons être prêts à en payer le prix."
 ancestor_veneration.0104.b: "Que les rois tombés reposent en paix. Nous demeurons parce que nous nous tenons seuls."
 ancestor_veneration.0104.c: "Si seulement j'avais été là en ce jour. J'aurais peut-être pu les sauver."

 ancestor_veneration.0105.t: "Vénération des Ancêtres : Durin V"
 ancestor_veneration.0105.desc: "Le parchemin rappelle le souvenir de [GetScriptedCharacterByHistoryID( 'lineofdurinV' ).GetFirstNameRegnal], souverain de [khazaddum|E] quand ses halls étaient à leur apogée. Sous les [mistymountains|E], les [longbeards|E] prospéraient, tirant des profondeurs l'or, les minerais, les gemmes et le [metal_mithril|E] en plus grande abondance que jamais avant ni depuis, portés par le [Concept('sevenringsofdwarves', 'Anneau des Longues-barbes')|E].\n\nAlors que les puissances obscures des Âges passés demeuraient endormies, les [dwarves|E] besognaient sans crainte, ignorant qu'un jour elles s'éveiller[raient] à nouveau. Leurs forges brûlaient ardentes, leurs enclumes sonnaient sous un labeur expert, et leurs creusées s'enfonçaient toujours plus avant dans la terre. Les portes de [GetTitleByKey('k_khazad_dum').GetNameNoTier] demeuraient closes pour la plupart, mais nul ne pouvait douter de leur grandeur. Le nom de [durin|E] portait un poids considérable aux quatre coins de la [middleearth|E].\n\nEn ces années, les Longues-barbes regardaient rarement par-delà leurs montagnes, car ils n'en avaient nul besoin. Leur royaume était puissant. La [dwarrowdelf|E], glorieuse. Ainsi s'acheva le règne de Durin V, un temps de splendeur sans égale, que les jours à venir ne devaient plus jamais connaître."
 ancestor_veneration.0105.a: "Chercher la paix et la prospérité est la vocation de tout souverain."
 ancestor_veneration.0105.b: "Un règne fondé sur la conquête est sans valeur."
 ancestor_veneration.0105.c: "Leur maîtrise leur permit de creuser plus profond que jamais auparavant."

 ancestor_veneration.0106.t: "Vénération des Ancêtres : Durin VI"
 ancestor_veneration.0106.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID( 'lineofdurinVI' ).GetFirstNameRegnal], souverain de [khazaddum|E] en son ultime Âge de splendeur. Sous son règne, les [longbeards|E] prospérèrent et les veines de [metal_mithril|E] coulaient profondes et riches. Mais dans leur quête toujours plus cupide, les [dwarves|E] creusèrent avec trop d'avidité et trop profond. Là, ils réveillèrent une terreur des Jours Anciens, un [balrog|E], créature de flamme et d'ombre. Bien que beaucoup prirent la fuite, Durin tint bon. Il tomba au combat contre la créature, que les Nains allaient nommer le Fléau de Durin, et avec sa mort, le sort de [GetTitleByKey('k_khazad_dum').GetNameNoTier] fut scellé.\n\nSon fils, [GetScriptedCharacterByHistoryID( 'lineofdurin73' ).GetFirstNameRegnal], ne régna qu'une seule année avant d'être à son tour englouti par les flammes. À sa mort, les Longues-barbes abandonnèrent leur bien-aimée Creusée des Nains, et un grand silence s'abattit sur les halls de Khazad-dûm. Son petit-fils [GetScriptedCharacterByHistoryID( 'lineofdurin74' ).GetFirstNameRegnal] allait fonder la demeure d'[GetTitleByKey('k_erebor').GetNameNoTier] dans les Terres du Val et devenir le premier Roi sous la Montagne."
 ancestor_veneration.0106.a: "Puissé-je faire preuve d'un tel courage quand viendra mon épreuve."
 ancestor_veneration.0106.b: "Ce ne fut point la cupidité, mais un sombre hasard, qui causa sa chute."

### ÚRI ###

 ancestor_veneration.0201.t: "Vénération des Ancêtres : Úri I, le Balafré"
 ancestor_veneration.0201.desc: "L'antique parchemin révèle l'histoire de [uriscarred|E], [dwarffather|E] des [firebeards|E] ou [urisfolk|E], qui s'éveilla dans les [bluemountains|E] en compagnie de [dwalinwise|E] des [broadbeams|E] en [Glossary('Zelemabkân','zelemabkan_gloss')], sous [GetTitleByKey('d_mount_dolmed').GetNameNoTier]. [GetScriptedCharacterByHistoryID( 'lineofuriI' ).GetFirstNameRegnal] fut le fondateur de la fière [nogrod|E] (Kh. Tumunzahar) et de la Maison de [GetScriptedCharacterByHistoryID('lineofuriI').GetDynasty.GetName]. Un jour, Úri se tint sous un grand pilier qui s'effondrait, le retenant de toute sa force inébranlable pour protéger un jeune Nanillon, lui valant ainsi son surnom et sa cicatrice.\n\nSi profonde était sa dévotion envers son peuple et ses halls que les [elves|E] l'appelaient [Glossary('Barin','barin_gloss')]. C'est sous son règne que les Barbes-de-Feu prêtèrent leur art à [finrod|E], qu'ils nommèrent [Glossary('Felagund','felagund_gloss')], concourant à la construction de la forteresse de [GetTitleByKey('k_nargothrond').GetNameNoTier], là où se dressaient jadis les antiques halls [dwarven|E] de Nulukkizdîn. De cette rare collaboration naquit un bijou de renom, forgé pour [GetScriptedCharacterByHistoryID( 'lineoffinarfin1' ).GetFirstName] : le [nauglamir|E], le Collier des Nains, que les Elfes vinrent à nommer [Glossary('Sigil Elu-naeth','sigil_elu_naeth_gloss')]."
 ancestor_veneration.0201.a: "Nous devons protéger les nôtres comme il le fit."
 ancestor_veneration.0201.a.saruman: "Protéger ceux dont on a la charge est le devoir d'un souverain."
 ancestor_veneration.0201.b: "Les histoires et les cicatrices ne nous nourriront pas."

 ancestor_veneration.0202.t: "Vénération des Ancêtres : Úri II"
 ancestor_veneration.0202.desc: "Le parchemin retrace les actes de [GetScriptedCharacterByHistoryID( 'lineofuriII' ).GetFirstNameNicknamedRegnal] des [firebeards|E], né dans la fierté et la division. Son père avait repoussé l'offre de [GetScriptedCharacterByHistoryID( 'lineofdurin2' ).GetFirstNameNicknamedRegnal] d'accorder aux Barbes-de-Feu un refuge dans [khazaddum|E], percevant en cela, bien que vraisemblablement sans raison, une atteinte à l'honneur et à la capacité des Barbes-de-Feu. La moitié des [urisfolk|E] s'opposa à [GetScriptedCharacterByHistoryID( 'lineofuri5' ).GetFirstName] et voyagea vers l'est jusqu'à [GetTitleByKey('k_khazad_dum').GetNameNoTier]. Parmi eux se trouvait le frère de Thrur, [GetScriptedCharacterByHistoryID('secondlineofuri1').GetFirstNameNicknamedRegnal], qui fonda une branche cadette de la lignée de [GetScriptedCharacterByHistoryID('lineofuriI').GetDynasty.GetName].\n\nBien que fier, il reconnut la sagesse de [GetScriptedCharacterByHistoryID( 'lineofdwalinII' ).GetFirstNameNicknamedRegnal], car, à l'instar des [broadbeams|E], les halls auxquels ils s'accrochaient ne pouvaient plus les sustenter. Thrur mena donc son peuple restant à fonder la nouvelle demeure de [GetTitleByKey('k_buzra_dum').GetNameNoTier] dans le sud des [eredluin|E], loin de leurs frères Larges-Épaules et de l'ancienne gloire de [nogrod|E]. [GetScriptedCharacterByHistoryID( 'lineofuriII' ).GetFirstName], cependant, perçut la folie d'un tel éloignement. En tant que deuxième souverain de Buzrâ-dûm, il ne chercha point à réunir tous les [dwarves|E], mais son propre peuple. Par des paroles mesurées, il renoua les liens avec des Barbes-de-Feu demeurés à l'écart. Son règne marqua un paisible retour à la parenté, les premiers pas vers une pleine réconciliation."
 ancestor_veneration.0202.a: "Parfois, un peuple doit se tenir seul pour préserver son identité."
 ancestor_veneration.0202.b: "Pour réussir, il faut avoir des alliés à ses côtés."

 ancestor_veneration.0203.t: "Vénération des Ancêtres : Úri III"
 ancestor_veneration.0203.desc: "Le parchemin retrace le règne de [GetScriptedCharacterByHistoryID('lineofuriIII').GetFirstNameRegnal] des [firebeards|E]. Il naquit en [ageSA|E] 1671, en un temps de troubles grandissants. Peu après sa naissance et la disparition de son [dwarffather|E] apparié [GetScriptedCharacterByHistoryID('lineofdwalinIII').GetFirstNameRegnal], une silhouette encapuchonnée se présenta à la porte de son père, portant un présent : le [Concept('sevenringsofdwarves', 'Anneau des Barbes-de-Feu')|E], forgé par [celebrimbor|E] et envoyé dans les suites de la chute d'[eregion|E], de la dissolution de l'[allianceofdwarvesandmen|E] et de la dévastation d'[eriador|E].\n\nL'Anneau fut remis à son père, [GetScriptedCharacterByHistoryID('lineofuri27').GetFirstNameRegnal], seigneur de [GetTitleByKey('k_buzra_dum').GetNameNoTier], accepté de bonne foi bien que son dessein fût obscur. Enfant, [GetScriptedCharacterByHistoryID('lineofuriIII').GetFirstName] vit la cour de son père devenir méfiante et secrète, gardant jalousement ses richesses. Cette prudence demeura quand Úri III recueillit à son tour l'héritage de l'Anneau. Contrairement à [GetScriptedCharacterByHistoryID('lineofuriII').GetFirstNameRegnal], qui avait poursuivi la diplomatie avec d'autres places fortes naines, Úri III gouverna vers l'intérieur, méfiant de toute influence extérieure. Après son règne, l'Anneau demeura un héritage des [urisfolk|E], transmis de génération en génération comme symbole de l'endurance des Barbes-de-Feu en des temps incertains."
 ancestor_veneration.0203.a: "Nul doute que ce présent fut jalousement protégé."
 ancestor_veneration.0203.b: "De tels dons voilent souvent de plus sombres desseins."

 ancestor_veneration.0204.t: "Vénération des Ancêtres : Úri IV"
 ancestor_veneration.0204.desc: "Ce parchemin parle de [GetScriptedCharacterByHistoryID('lineofuriIV').GetFirstNameRegnal], un [dwarf|E] déjà fort en années quand fut forgée la [Concept('warlastalliance', 'Dernière Alliance')|E]. Contrairement à ses frères de [durinsfolk|E], Úri ne marcha point à la guerre. Durant des siècles, les [firebeards|E] étaient demeurés à l'écart, ancrés dans leur fierté et le souvenir d'antiques trahisons. Pourtant, sous son règne, un lent dégel commença entre les maisons naines, peut-être semé dans sa jeunesse par les récits de [GetScriptedCharacterByHistoryID('lineofdwalinIV').GetFirstNameNicknamedRegnal] et de son règne généreux, dont les dernières années chevauchaient les premiers jours d'Úri. Les Barbes-de-Feu furent portés par le courage de [GetScriptedCharacterByHistoryID('lineofdurinIV').GetFirstNameRegnal] des [longbeards|E], et certains cherchèrent même à prêter leur concours à la guerre contre [GetScriptedCharacterByHistoryID('lineofsauron').GetFirstName]. Úri n'interdit point à ceux des [urisfolk|E] qui souhaitaient combattre aux côtés des [men|E] et des [elves|E], tels son cousin [GetScriptedCharacterByHistoryID('lineofuri45c').GetFirstNameRegnal], ni ne blâma les forgerons qui fondirent des armes pour les [arnorians|E].\n\nÚri IV devait vivre pour voir la chute de [GetScriptedCharacterByHistoryID('lineoforodreth4').GetFirstName], d'[elendil|E] et de [GetScriptedCharacterByHistoryID('lineoforopher1').GetFirstName], et la troncature de l'[masterring|E]. Le règne d'Úri ne marqua point la forge de nouvelles alliances, mais l'apaisement d'anciennes inimitiés, les premières fissures dans des murs longtemps demeurés inébranlables. En ses dernières années, la plupart des [firebeards|E], hormis ceux de la maison [GetScriptedCharacterByHistoryID('lineofkhathzaibriz1').GetDynasty.GetName], allaient à nouveau embrasser les anciennes coutumes du [GetFaithByKey('faith_khazad').GetName], ravivées d'abord par Dwálin IV et pleinement éveillées par les actes de la [lastallianceshort|E]."
 ancestor_veneration.0204.a: "Il fit confiance à la montée patiente d'un renouveau prudent."
 ancestor_veneration.0204.b: "Un roi se bat, il ne se cache point."

 ancestor_veneration.0205.t: "Vénération des Ancêtres : Úri V, le Réconciliateur"
 ancestor_veneration.0205.desc: "Le parchemin se déroule pour révéler l'héritage de [GetScriptedCharacterByHistoryID('lineofuriV').GetFirstNameNicknamedRegnal]. Il vécut en un temps où les clans [dwarven|E] étaient divisés par la méfiance et la fierté, mais son règne se révéla d'une mesure et d'une conciliation peu communes - contraste saisissant avec le tempérament défiant de ses incarnations antérieures.\n\nDepuis la [warofwrath|E] au [firstage|E], lorsque [GetScriptedCharacterByHistoryID( 'lineofuri5' ).GetFirstNameRegnal] de [GetTitleByKey('k_buzra_dum').GetNameNoTier] avait replié les Barbes-de-Feu sur eux-mêmes, loin des autres maisons, un isolement hautain s'était enraciné parmi les [urisfolk|E]. La douleur de [nogrod|E] perdue et la fierté blessée par l'exil s'étaient durcies en une méfiance tenace à travers les Âges.\n\n[GetScriptedCharacterByHistoryID('lineofuriV').GetFirstNameRegnal] vit pourtant dans la parenté le chemin du renouveau. Par la diplomatie et la persévérance, il rouvrit les antiques voies de confiance et de fraternité entre les Barbes-de-Feu, les [longbeards|E] et les [broadbeams|E]. Son règne marqua le raccommodement de liens que l'on croyait brisés au-delà de tout retour. Sous sa conduite, les maisons naines renouèrent les liens qui devaient résister aux sombres temps à venir, rallumant l'unité et le dessein partagés par tous les enfants de [mahalcharacter|E]."
 ancestor_veneration.0205.a: "C'est ensemble seulement que nous pourrons forger un avenir digne de nos ancêtres."
 ancestor_veneration.0205.a.saruman: "Renouer des liens d'amitié brisés est un but admirable."
 ancestor_veneration.0205.b: "C'est seulement en embrassant le changement que nos clans pourront véritablement prospérer."
 ancestor_veneration.0205.b.saruman: "Pour qu'un royaume prospère, il doit accepter le changement."

 ancestor_veneration.0206.t: "Vénération des Ancêtres : Úri VI, le Généreux"
 ancestor_veneration.0206.desc: "Ce parchemin consigne la vie de [GetScriptedCharacterByHistoryID('lineofuriVI').GetFirstNameNicknamedRegnal], qui combattit aux côtés de [GetScriptedCharacterByHistoryID('lineofdurin90').GetFirstNameNicknamedRegnal] durant la [warofdwarvesandorcs|E], et les deux se sauvèrent mutuellement la vie en plusieurs occasions. Le frère jumeau d'Úri, [GetScriptedCharacterByHistoryID('lineofuri116').GetFirstName], périt dans ce conflit, une perte qui hanterait longtemps la famille.\n\nÀ la suite du sac d'[erebor|E], Úri accorda terres et soutien en matériel aux exilés de [GetScriptedCharacterByHistoryID('lineofdurin83').GetFirstNameNicknamedRegnal], les établissant à proximité de sa propre place forte. Bien que Thorin entreprît par la suite la Quête d'Erebor, certains [longbeards|E] demeurèrent établis à [GetTitleByKey('c_thorins_hall').GetNameNoTier] même après son départ. En ses années tardives, Úri resserra ses liens avec les [broadbeams|E] et avec [GetScriptedCharacterByHistoryID('lineofcirdan').GetFirstNameNicknamedRegnal] du [lindon|E]. De ces échanges, les enseignements du [GetFaithByKey('faith_broadbeams').GetName] se répandirent parmi son peuple. Bien que certains y résistassent, Úri demeura fidèle à la foi comme à son ouverture envers les [elves|E].\n\nAprès la guerre, les contrées septentrionales de [nogrod|E] furent repeuplées par son neveu [GetScriptedCharacterByHistoryID('lineofuri122').GetFirstNameNicknamed]. Bien que celui-ci en voulût à Úri d'avoir survécu quand son propre père avait péri, les deux réglèrent leur rivalité peu avant la mort d'Úri, dans les suites de la fin de la Guerre de l'Anneau. La pleine reconquête de [GetTitleByKey('k_nogrod').GetNameNoTier] devait rester inachevée jusqu'au retour d'Úri VII."
 ancestor_veneration.0206.a: "Sa générosité mesurée bâtit une paix durable."
 ancestor_veneration.0206.b: "Sa bravoure ouvrit à notre peuple la voie à suivre."
 ancestor_veneration.0206.b.saruman: "Il fit preuve de bravoure là où d'autres auraient pu fléchir."

### DWÁLIN ###

 ancestor_veneration.0301.t: "Vénération des Ancêtres : Dwálin I, le Sage"
 ancestor_veneration.0301.desc: "L'écriture de l'antique parchemin révèle l'histoire de [dwalinwise|E], [dwarffather|E] des [broadbeams|E] ou [dwalinsfolk|E], qui s'éveilla dans les [bluemountains|E] en compagnie de [uriscarred|E] des [firebeards|E] en [Glossary('Zelemabkân','zelemabkan_gloss')], sous [GetTitleByKey('d_mount_dolmed').GetNameNoTier]. [GetScriptedCharacterByHistoryID( 'lineofdwalinI' ).GetFirstNameRegnal] fut le fondateur de l'antique [belegost|E] (Kh. Gabilgathol) et de la Maison de [GetScriptedCharacterByHistoryID('lineofdwalinI').GetDynasty.GetName]. Il était réputé pour la sérénité de ses conseils et la solennité de son maintien. Guidant son peuple non seulement dans le labeur, mais aussi dans le chant, les siens taillèrent les cavernes de [GetTitleByKey('d_menegroth').GetNameNoTier] pour [elu_thingol|E] de [GetTitleByKey('k_doriath').GetNameNoTier], sous les arbres du [beleriand|E]. Pour cela, les [elves|E] lui donnèrent le nom de [Glossary('Linnar','linnar_gloss')].\n\nPar sa conduite, les [dwarves|E] de [GetTitleByKey('k_belegost').GetNameNoTier] gagnèrent la confiance des Elfes, forgeant une parenté par l'art. Puis fut construite par les Nains des [bluemountains|E] la Route Naine de Beleriand, passant sous les épaules du Mont Dolmed et servant de voie commerciale vers l'ouest, jusqu'aux Elfes de Beleriand et de Doriath."
 ancestor_veneration.0301.a: "Que la sagesse et le chant guident nos efforts à leur tour."
 ancestor_veneration.0301.b: "Un grand art artisanal survit à tout le reste."

 ancestor_veneration.0302.t: "Vénération des Ancêtres : Dwálin II, le Barbe-large"
 ancestor_veneration.0302.desc: "Le parchemin porte la chronique de [GetScriptedCharacterByHistoryID( 'lineofdwalinII' ).GetFirstNameNicknamedRegnal], fils du légendaire [GetScriptedCharacterByHistoryID( 'lineofdwalin5' ).GetFirstName] de [belegost|E]. Dans les ruines laissées par la [warofwrath|E], Belegost gisait brisée. Bien que beaucoup réclamassent sa reconquête, $Dw_alin$ n'était point un roi à la vaine fierté. [GetScriptedCharacterByHistoryID( 'lineofdurin2' ).GetFirstNameRegnal], fils de [durindeathless|E], offrit à ses lointains frères un refuge dans [khazaddum|E], et $Dw_alin$ accepta. La plupart des [broadbeams|E] le suivirent, comme les maisons de [GetScriptedCharacterByHistoryID( 'lineofhargrim1' ).GetDynasty.GetName] et de [GetScriptedCharacterByHistoryID( 'lineofmazdul1' ).GetDynasty.GetName], mais un reste demeura sur place. Conduits par le second fils de [GetScriptedCharacterByHistoryID( 'lineofdwalinII' ).GetFirstName], [GetScriptedCharacterByHistoryID( 'secondlineofdwalin1' ).GetFirstName], qui fonda sa propre branche cadette de la lignée de [GetScriptedCharacterByHistoryID('lineofdwalinI').GetDynasty.GetName], ils taillèrent de nouveaux halls dans [GetTitleByKey('d_tagakhgershad').GetNameNoTier] au nord des [bluemountains|E].\n\n[GetScriptedCharacterByHistoryID('lineofdwalin7').GetFirstNameRegnal], frère cadet de Dwálin II, demeura lui aussi dans les Montagnes Bleues. Leurs rapports se tendirent à cause de l'insistance de Bodruith à ce qu'ils participent à la marche sur [GetTitleByKey('k_doriath').GetNameNoTier] après l'incident du [nauglamir|E], un appel que Dwálin refusa, préconisant la retenue. Après la migration des [firebeards|E] vers le sud des Montagnes Bleues, Bodruith fut parmi les rares Larges-Épaules autorisés à visiter le royaume de [GetTitleByKey('k_buzra_dum').GetNameNoTier] fondé par [GetScriptedCharacterByHistoryID( 'lineofuri5' ).GetFirstNameRegnal]."
 ancestor_veneration.0302.a: "Nous honorons les Larges-Épaules, qui choisirent la sagesse plutôt que la fierté."
 ancestor_veneration.0302.b: "Comme les Barbes-de-Feu, nous devons faire confiance aux capacités de notre propre peuple."
 ancestor_veneration.0302.c: "N'oublions pas que ce furent les Longues-barbes qui ouvrirent leurs portes en des temps sombres."

 ancestor_veneration.0303.t: "Vénération des Ancêtres : Dwálin III"
 ancestor_veneration.0303.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofdwalinIII').GetFirstNameRegnal], né de l'union entre les deux grandes lignées de [dwalin|E] : la branche issue de Dwálin qui avait enduré à [belegost|E], et les descendants de [GetScriptedCharacterByHistoryID('lineofdwalinII').GetFirstNameNicknamedRegnal], rentrés de [khazaddum|E] pour reconquérir leur siège antique. Depuis leur migration à la fin du [firstage|E], certains [broadbeams|E] de Khazad-dûm s'étaient fondus dans la culture des [longbeard|E] et avaient choisi de rester quand les autres étaient repartis. Si les Larges-Épaules avaient préservé les voies anciennes du [GetFaithByKey('faith_khazad').GetName] à Khazad-dûm, la réunion des lignées de Dwálin vit le [GetFaithByKey('faith_broadbeams').GetName] s'élever comme leur religion principale, sans pour autant éteindre le culte de Khazâd.\n\nPeu après la mort de Dwálin III, un présent parvint à son fils [GetScriptedCharacterByHistoryID('lineofdwalin29').GetFirstNameRegnal], apporté par un messager encapuchonné dans les suites de la chute d'[eregion|E] et du pillage d'[eriador|E], en un temps de deuil et de grand trouble. [sauroncharacter|E], sachant que le plus sage des Larges-Épaules n'eût pas été si aisément abusé, envoya le [Concept('sevenringsofdwarves', 'Anneau des Larges-Épaules')|E], ouvré par [celebrimbor|E], en hommage à la mémoire de Dwálin III. Bien que la véritable nature des [ringsofpower|E] fût alors inconnue, des murmures devaient par la suite évoquer de plus sombres desseins tissés dans la forge. Dans les années qui suivirent sa mort, l'Anneau demeura comme symbole d'unité et de l'esprit persistant des [dwalinsfolk|E]."
 ancestor_veneration.0303.a: "Dans l'unité réside la puissance de reconquérir notre ancienne gloire."
 ancestor_veneration.0303.a.saruman: "Dans l'unité réside la puissance de défier les ombres grandissantes."
 ancestor_veneration.0303.b: "De tels présents peuvent dissimuler des secrets et ne doivent point être acceptés à la légère."

 ancestor_veneration.0304.t: "Vénération des Ancêtres : Dwálin IV, le Magnanime"
 ancestor_veneration.0304.desc: "Ce parchemin honore [GetScriptedCharacterByHistoryID('lineofdwalinIV').GetFirstNameNicknamedRegnal], dont on se souvient non pour ses conquêtes, mais pour sa cour prospère et accueillante, étroitement liée à ses frères des [longbeards|E] et des [ironhills|E]. Il mena une politique d'amitié généreuse et de commerce lointain, parrainant des caravanes vers les [orocarni|E] aux côtés de [khazaddum|E], qui rapportèrent des marchandises rares et exotiques. À titre d'exemple, il offrit un jour à [GetScriptedCharacterByHistoryID('lineoforodreth4').GetFirstNameNicknamedRegnal], Haut Roi des [noldor|E], une tapisserie dorée tissée de soie des Orocarni, précieux trésor de [womawas_drus|E].\n\nAux [firebeards|E], il envoya des ouvrages artisanaux des [stonefoots|E], dont un grand portrait de [mahalcharacter|E] façonnant les sept [dwarffathers|E], geste de bonne volonté que beaucoup regardèrent par la suite comme le premier dégel des relations avec le clan renfermé. Aux [durinsfolk|E], il légua des meubles taillés dans le bois des Forêts Sauvages, coupé dans le royaume de la reine [elven|E] [GetScriptedCharacterByHistoryID('lineofnurwe3').GetFirstNameNicknamedRegnal]. Sa vision culmina dans l'âge d'or de [nelvorin|E], lieu où [dwarves|E], Elfes et colons [dunedain|E] commerçaient librement, sans taxe ni entrave. Bien que [GetScriptedCharacterByHistoryID('lineofuriIV').GetFirstNameRegnal] ne dût naître qu'au crépuscule du règne de Dwálin IV, beaucoup disent que les récits de sa générosité laissèrent une empreinte durable sur le jeune prince, dont le règne ultérieur porta l'écho de cette même chaleur silencieuse."
 ancestor_veneration.0304.a: "Il guida son peuple vers un âge de prospérité."
 ancestor_veneration.0304.b: "Il forja des liens qui protégèrent son peuple pour des générations."

 ancestor_veneration.0305.t: "Vénération des Ancêtres : Dwálin V"
 ancestor_veneration.0305.desc: "Ce parchemin retrace le sombre destin de [GetScriptedCharacterByHistoryID('lineofdwalinV').GetFirstNameRegnal], dernier des rois [broadbeam|E] à porter le [Concept('sevenringsofdwarves', 'Anneau des Larges-Épaules')|E]. Sous son règne, de sombres murmures s'élevèrent du [forodwaith|E], où [GetScriptedCharacterByHistoryID('nazgul1').GetFirstNameNicknamedRegnal] d'[angmar|E] amassait ses forces. À l'est, l'[arthedain|E] et le [cardolan|E] tenaient bon, mais le [rhudaur|E] tomba aux mains de [GetScriptedCharacterByHistoryID('linebroccach').GetFirstNameNicknamedRegnal], qui marchanda avec Angmar pour obtenir le pouvoir. Bien que Hwaldar gouvernât un temps en chef indépendant, après sa mort au combat les tribus désunies des [noi_trevan|E] furent rapidement absorbées dans le royaume du Roi-Sorcier, leurs terres dirigées par des chefs loyalistes et des intendants [GetCultureByKey('angmarrim').GetName].\n\nC'est durant ce temps de conflit que [GetScriptedCharacterByHistoryID('lineofdourhand17').GetFirstNameRegnal] revint d'une vaine tentative de reconquête de [nogrod|E], honni de ses frères [broadbeam|E] pour avoir imprudemment troublé les antiques halls du clan des [firebeard|E]. Bien que beaucoup perçussent une ombre grandissante autour de Skorgrím, $Dw_alin$, toujours clément, l'accueillit. Mais la clémence fut payée de trahison, car Skorgrím occit $Dw_alin$ ainsi que le roi Barbe-de-Feu de [GetTitleByKey('k_buzra_dum').GetNameNoTier] peu après, puis s'enfuit vers l'est avec les deux [dwarvenrings|E] des [bluemountains|E]. Skorgrím les offrit au Roi-Sorcier, qui le trahit à son tour, lui accordant la mort là où des promesses de grandeur avaient été faites. Ainsi l'Anneau des Larges-Épaules tomba-t-il en des mains d'ombre."
 ancestor_veneration.0305.a: "La fin de $Dw_alin$ V montre le péril de confondre parenté et loyauté."
 ancestor_veneration.0305.b: "Que le récit de $Dw_alin$ V trempe nos cœurs contre la trahison."

 ancestor_veneration.0306.t: "Vénération des Ancêtres : Dwálin VI, Fléau-des-Trolls"
 ancestor_veneration.0306.desc: "Ce parchemin retrace l'héritage de [GetScriptedCharacterByHistoryID('lineofdwalinVI').GetFirstNameNicknamedRegnal], qui régna durant la Paix Vigilante. Dans les suites de la chute de [khazaddum|E] et de la mort de [GetScriptedCharacterByHistoryID('lineofdurinVI').GetFirstNameRegnal] aux mains du Fléau de Durin, les réfugiés [longbeard|E] cherchèrent refuge auprès de leurs frères des [ironhills|E], bien que nombre de ces exilés finissent par s'établir à la [lonelymountain|E] sous la conduite du roi [GetScriptedCharacterByHistoryID('lineofdurin74').GetFirstNameRegnal].\n\nDwálin prit sur lui de rétablir le contact entre les [broadbeams|E] et les Longues-barbes désormais dispersés aux quatre vents, reconnaissant que l'unité était vitale face à de telles pertes. Son règne fut marqué par une diplomatie prudente, cultivant une parenté renouée avec le clan encore méfiant de ses blessures passées.\n\nPourtant, malgré son héritage de conciliateur accompli, la plupart des [dwarves|E] le retiennent plutôt sous le nom de « Fléau-des-Trolls », car il occit un jour trois [trolls|El] à lui seul en défendant son escorte dans [GetTitleByKey('d_high_pass').GetNameNoTier] des [mistymountains|E], au retour d'une mission aux [ironhills|E]."
 ancestor_veneration.0306.a: "L'exemple de sa compassion resserra les liens entre les siens."
 ancestor_veneration.0306.b: "Sa vaillance au combat inspira tous ceux qui le suivaient."

### SINDRI ###

 ancestor_veneration.0401.t: "Vénération des Ancêtres : Sindri I, le Riche"
 ancestor_veneration.0401.desc: "Le parchemin évoque [sindririch|E], [dwarffather|E] des [ironfists|E] ou [sindrisfolk|E], qui s'éveilla aux côtés de [thulinswift|E] des [stiffbeards|E] en [Glossary('Kheledkhizdîn','kheledkhizdin_gloss')], et fonda la demeure de [GetTitleByKey('k_gamil_nala').GetNameNoTier] ainsi que la Maison de [GetScriptedCharacterByHistoryID('lineofsindriI').GetDynasty.GetName]. Dès les premiers jours, [GetScriptedCharacterByHistoryID('lineofsindriI').GetFirstNameRegnal] se révéla bien plus qu'un fondateur. Il était artisan, inventeur, et maître forgeron.\n\nIl tourna sa volonté vers la nature cachée du fer, cherchant non seulement à le forger, mais à le maîtriser. Sous sa main, les Poings-de-Fer furent les premiers à façonner le fer d'une résistance durable : des outils qui tranchaient plus profond, des armes qui conservaient leur fil, des attaches qui ne cédaient pas. Ces secrets, jalousement gardés, devinrent la racine de leur fortune. Bientôt, les clans de l'est vinrent apporter leur or pour les ouvrages des Poings-de-Fer, et Sindri les laissa payer.\n\nSes halls s'enrichirent des largesses de quatre clans. On dit que les sols brillaient de richesses, et que sa cour festoyait de fruits et de viandes apportés par les [hisildi|E] de [GetScriptedCharacterByHistoryID('lineofnurwe2').GetFirstName] depuis de lointaines forêts. C'est ainsi qu'il fut nommé « le Riche », car sa fortune était sans égale en cet Âge. Pourtant même dans sa prospérité, il demeurait perpétuellement attentif à sa forge, et ne révéla jamais tout ce qu'il savait, une habitude que les autres clans de l'est allaient finir par lui reprocher."
 ancestor_veneration.0401.a: "Que notre héritage soit gravé dans l'art, comme le sien le fut."
 ancestor_veneration.0401.b: "Que les forges brûlent, et que les halls s'élèvent."
 ancestor_veneration.0401.a.saruman: "L'art de l'artisanat est une entreprise inspirante."
 ancestor_veneration.0401.b.saruman: "Un investissement dans l'avenir du royaume est rarement vain."

 ancestor_veneration.0402.t: "Vénération des Ancêtres : Sindri II le Doré"
 ancestor_veneration.0402.desc: "Le parchemin rapporte l'histoire de [GetScriptedCharacterByHistoryID('lineofsindriII').GetFirstNameNicknamedRegnal], qui gouverna en une période de grande prospérité pour les [ironfists|E]. Sous le règne de Sindri II, les [ironfists|E] en exil demeuraient depuis longtemps dans l'Ered Harmal, et sous sa conduite, [GetTitleByKey('k_kheled_nala').GetNameNoTier] s'éleva au rang de puissant bastion d'or et de fer.\n\nPourtant Sindri ne se contenta point d'amasser des richesses derrière des portes scellées. Il soutint de grands efforts pour rallier les membres dispersés de la Diaspora des Poings-de-Fer qui erraient encore dans les contrées sauvages de [rhun|E], dont beaucoup avaient été contraints de se lier aux seigneurs des [men|E], troquant leur art et leur force contre abri et survie. Grâce à ses émissaires et à ses pièces, Sindri rapprocha ces cousins éloignés, tout en posant les fondements de relations avec les tribus d'Hommes qui parcouraient la Grande Steppe. Le commerce formalisé et les routes sécurisées, les richesses affluèrent vers Kheled-Nâla.\n\nC'est sous son règne que fut forgé pour la première fois le principe de neutralité commerciale, proclamant que les [ironfists|E] ne prendraient parti dans aucune querelle des Hommes, ne choisiraient d'alliés parmi eux, mais commerceraient avec tous sans distinction, pourvu qu'une juste monnaie fût offerte. Ainsi commença l'âge d'or des [ironfists|E] dans l'Ered Harmal, un âge d'abondance qui se prolongea même au-delà de son incarnation suivante."
 ancestor_veneration.0402.a: "Le commerce est un art en soi, il l'a démontré."
 ancestor_veneration.0402.b: "Comme lui, nous tempèrerons richesse par l'art et le labeur."

 ancestor_veneration.0403.t: "Vénération des Ancêtres : Sindri III"
 ancestor_veneration.0403.desc: "Le parchemin retrace la vie de [GetScriptedCharacterByHistoryID('lineofsindriIII').GetFirstNameRegnal], qui régna au crépuscule de l'âge d'or des [ironfists|E] à [GetTitleByKey('k_kheled_nala').GetNameNoTier], dans l'Ered Harmal. Petit-fils du Roi [GetScriptedCharacterByHistoryID('lineofsindri29').GetFirstNameRegnal], qui reçut le premier le [Concept('sevenringsofdwarves', 'Anneau des Poings-de-Fer')|E], Sindri III hérita d'un royaume uni par le commerce et l'artisanat, mais se trouva au seuil d'un âge plus sombre. La volonté de [sauroncharacter|E] s'éveilla de nouveau à l'[east|E], et les plaines de [rhun|E] commencèrent à plier sous son poids. À mesure que l'ombre s'étendait, Sindri fut le premier monarque des Poings-de-Fer à tendre une main prudente vers les clans [dwarven|E] des [redmountains|E] longtemps séparés, cherchant à renouer quelque parenté ancienne avec des fortunes diverses, car la vieille méfiance persistait et toute alliance véritable demeurait lointaine.\n\nEn ces jours incertains, nombre de membres de la Diaspora des Poings-de-Fer, dispersés parmi les royaumes des [men|E], cherchèrent leur subsistance par les armes. Sindri, prudent mais pragmatique, révisa les coutumes de ses aïeux pour autoriser ce service à la stricte condition qu'aucun serment ne fût prêté, nulle allégeance engagée, nulle alliance contractée. Ainsi le principe de neutralité, né du commerce, s'étendit jusqu'au labeur mercenaire."
 ancestor_veneration.0403.a: "Honorons la paix et la neutralité, comme il l'a fait jadis."
 ancestor_veneration.0403.b: "C'est leur habileté au combat qui forgea leur renommée."

 ancestor_veneration.0404.t: "Vénération des Ancêtres : Sindri IV le Brûlé"
 ancestor_veneration.0404.desc: "Le parchemin évoque la vie de [GetScriptedCharacterByHistoryID('lineofsindriIV').GetFirstNameNicknamedRegnal], qui gouverna depuis [GetTitleByKey('k_namagaluz').GetNameNoTier] dans les années qui suivirent la ruine de [GetTitleByKey('k_nurunkizdin').GetNameNoTier]. Là périt dans les flammes d'un [dragon|El] [GetScriptedCharacterByHistoryID('lineofsindri107').GetFirstNameNicknamedRegnal], dernier de la lignée de [GetScriptedCharacterByHistoryID('lineofsindri102').GetFirstName], et avec lui le [Concept('sevenringsofdwarves', 'Anneau des Poings-de-Fer')|E]. Ce n'est qu'après sa disparition que naquit Sindri IV, marquant la fin de la malédiction posée par [GetScriptedCharacterByHistoryID('lineofdurinIV').GetFirstNameRegnal] durant la [warlastalliance|E] et la [treacheryoforn|E], que le [dwarffather|E] des [ironfists|E] ne reviendrait point avant que ne s'éteigne la lignée du traître.\n\nSindri grandit en souverain de vision et de volonté. Bien que [GetTitleByKey('k_kheled_nala').GetNameNoTier] fût encore habitée, elle avait grandement décliné au moment où il prit le trône. Il œuvra à la restauration du bastion, mais Kheled-Nâla devait connaître en fin de compte le même destin que Nurunkhizdín. Un [dragon|El], attiré par l'éclat de richesses nouvelles, s'abattit sur le bastion. Le courage de Sindri fut admirable, mais il succomba aux flammes du Dragon. Les Poings-de-Fer le vengèrent et tuèrent la bête, mais les dommages infligés à Kheled-Nâla s'avérèrent durables. Le bastion fut abandonné peu après, pourtant le nom de Sindri demeure comme celui d'un souverain qui porta le poids d'une longue ombre et osa rêver malgré tout."
 ancestor_veneration.0404.a: "Ses rêves furent ensevelis sous les cendres, mais sa bravoure demeure dans les mémoires."
 ancestor_veneration.0404.b: "Il s'acharna, sans jamais fléchir, à ramener la prospérité à son peuple."

 ancestor_veneration.0405.t: "Vénération des Ancêtres : Sindri V l'Errant"
 ancestor_veneration.0405.desc: "Le parchemin conte les pérégrinations de [GetScriptedCharacterByHistoryID('lineofsindriV').GetFirstNameNicknamedRegnal], né en les années médianes du [thirdage|E]. Prince encore, il vit l'ombre de la Grande Peste déferler sur les terres, menaçant les cousins dispersés des [ironfists|E] à travers les plaines de [rhun|E]. Bien que la maladie n'atteignît point les [dwarves|E], grâce à leur résistance naturelle aux épidémies et à la corruption, le chaos mit en péril leurs fragiles communautés et menaçait les moyens de subsistance de ceux qui vivaient parmi des hôtes [men|E], bien plus vulnérables, laissés dispersés et diminués.\n\nRefusant de demeurer inactif, Sindri supplia son père [GetScriptedCharacterByHistoryID('lineofsindri74').GetFirstNameRegnal] de partir à la recherche de leurs cousins, pour rassembler les isolés dispersés en un seul peuple. Même après le décès de son père, il poursuivit ses longues errances, confiant la gouverne de [GetTitleByKey('k_namagaluz').GetNameNoTier] à ses frères [GetScriptedCharacterByHistoryID('lineofsindri91').GetFirstNameRegnal] et [GetScriptedCharacterByHistoryID('lineofsindri92').GetFirstNameRegnal]. Ses efforts virent bon nombre de cousins revenir d'exil et de diaspora, gonflant les rangs de leur peuple et contribuant à rebâtir les salles et les foyers perdus en des jours plus sombres.\n\nL'âme infatigable de Sindri V devint un phare d'espérance, et par ses voyages, les Poings-de-Fer dispersés trouvèrent une nouvelle fois le chemin du retour."
 ancestor_veneration.0405.a: "Que nos pieds suivent toujours son chemin infatigable, en quête de cousins et de fraternité."
 ancestor_veneration.0405.b: "Que nous ne cessions jamais de chercher la sagesse en des lieux inattendus."

 ancestor_veneration.0406.t: "Vénération des Ancêtres : Sindri VI le Mercenaire"
 ancestor_veneration.0406.desc: "Le parchemin rappelle l'histoire de [GetScriptedCharacterByHistoryID('lineofsindriVI').GetFirstNameNicknamedRegnal], né tardivement dans le [thirdage|E] alors que les [ironfists|E] étaient dispersés et incertains. À la différence de ses aïeux qui prisaient richesse et unité, Sindri traça une nouvelle voie. Il forma une compagnie de [dwarves|E] mercenaires nommée la Légion de Sindri, inspirée des origines des [axesofnargubraz|E] à la suite de la [warofthelie|E].\n\nParmi les tribus belliqueuses de [rhun|E], la Légion se forgea un nom dans la crainte comme dans l'honneur. Mais en son vieil âge, Sindri rentra à [GetTitleByKey('k_namagaluz').GetNameNoTier], troquant sa hache contre une couronne, et laissa la Légion choisir sa propre voie. Elle devint la Légion de Fer, errant en tant que mercenaires et frères-d'armes, jusqu'à ce que l'appel de la vengeance éveillât tous les Nains à la fois. Durant la [warofdwarvesandorcs|E], Sindri VI revint pour mener sa Légion. Pour la première fois depuis des siècles, les sept clans des [dwarffathers|E] s'unirent pour venger le meurtre de [GetScriptedCharacterByHistoryID('lineofdurin81').GetFirstNameNicknamedRegnal] par [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstNameNicknamedRegnal].\n\nLe règne de Sindri VI est rappelé comme un temps où le nom des Poings-de-Fer résonna de nouveau au-delà de leurs montagnes, non par le commerce ni les traités, mais dans la fraternité des guerriers qui se tinrent aux côtés de leurs cousins dans le deuil comme dans la fureur."
 ancestor_veneration.0406.a: "Il veilla à ce que sa compagnie ne fléchisse jamais sur la route."
 ancestor_veneration.0406.b: "Notre force réside dans l'unité de tous les clans, inébranlable et inflexible."
 ancestor_veneration.0406.b.saruman: "L'union fait la force, une leçon à méditer pour tous les peuples libres."

### THÚLIN ###

 ancestor_veneration.0501.t: "Vénération des Ancêtres : Thúlin Iᵉʳ le Rapide"
 ancestor_veneration.0501.desc: "L'antique parchemin retrace la vie de [thulinswift|E], [dwarffather|E] des [stiffbeards|E], qui s'éveilla aux côtés de [sindririch|E] des [ironfists|E] à [Glossary('Kheledkhizdîn','kheledkhizdin_gloss')], et fonda le bastion de [kibil_tarag|E] ainsi que la Maison de [GetScriptedCharacterByHistoryID('lineofthulinI').GetDynasty.GetName]. Ce nom lui fut donné pour son fondateur, dont la barbe grisonnat rapidement passant du poivre à l'argent, tout en demeurant pleine et soignée dans sa forme.\n\nPrompt à parler et plus prompt encore à agir, [GetScriptedCharacterByHistoryID('lineofthulinI').GetFirstNameRegnal] portait une volonté inébranlable et affrontait chaque épreuve avec ferme résolution, lui valant le surnom de « le Rapide ». Sous son règne, un terrible accident minier emporta l'un de ses fils, [GetScriptedCharacterByHistoryID('lineofthulin0a').GetFirstName]. Accablé de deuil, il déposa le garçon sous la montagne, instituant ainsi la tradition d'inhumation à [Glossary('Kibiltumun','kibiltumun_gloss')]. Ce n'est que plus tard que cette coutume revêtit un caractère sacré, mais son origine réside dans le deuil d'un père.\n\nLes Barbes-Raides se souviennent de lui comme d'un souverain repentant mais résolu, dont l'allure imprima le rythme de tous les Barbes-Raides qui suivirent."
 ancestor_veneration.0501.a: "Que notre labeur égale son allure, rapide et implacable."
 ancestor_veneration.0501.b: "Comme il déposa son fils en terre, ainsi préserverons-nous la dignité des disparus."
 ancestor_veneration.0501.b.saruman: "Se souvenir du sacrifice des disparus est une vertu véritablement honorable."

 ancestor_veneration.0502.t: "Vénération des Ancêtres : Thúlin II le Prolifique"
 ancestor_veneration.0502.desc: "Ce parchemin raconte [GetScriptedCharacterByHistoryID('lineofthulinII').GetFirstNameNicknamedRegnal], qui gouverna dans les premières années du [secondage|E] depuis [kibil_tarag|E]. Sous sa conduite, les liens avec le lointain [GetTitleByKey('d_kheled_dum').GetNameNoTier] se resserrèrent, passant de simples envois de fer à un lien soigneusement cultivé entre cousins. Il fut également le premier souverain [stiffbeard|E] à établir des relations amicales avec les tribus du [forodwaith|E], s'attirant leur amitié par un conseil avisé et une main ouverte. Ils le nommèrent [Glossary('Vanha Isä','vanha_isa_gloss')], pour son grand âge et les nombreux barbetons qui peuplaient ses salles.\n\nLe frère de [GetScriptedCharacterByHistoryID('lineofthulinII').GetFirstName], [GetScriptedCharacterByHistoryID('lineofthulin16').GetFirstNameRegnal], fut écrasé sous des pierres en chute à un jeune âge. Bien que Thúlin peînât souvent à voir le bien en ce monde à cause de ce deuil, il plaçait la famille au-dessus de tout. Cette dévotion le conduisit à engendrer de nombreux enfants, exploit rare au sein de la gent des Nains, et les salles de Kibil-Tarag retentirent bientôt du vacarme de leurs propres enfants.\n\nAu cœur de l'effervescence d'un royaume prospère, son fils cadet [GetScriptedCharacterByHistoryID('secondlineofthulin1').GetFirstNameRegnal] chercha à se forger sa propre renommée et s'établit au-delà de Kibil-Tarag, à [GetTitleByKey('d_murthunin').GetNameNoTier]. Les Barbes-Raides ne retiennent pas l'héritage de Thúlin II pour l'or ou les armes, mais pour la force des liens du sang."
 ancestor_veneration.0502.a: "Même si nos cousins sont loin, la force de la famille nous unit."
 ancestor_veneration.0502.a.saruman: "Les liens d'amitié et de famille peuvent se révéler plus solides que l'acier."
 ancestor_veneration.0502.b: "Par lui, nous sommes rappelés que s'ouvrir à l'extérieur peut enrichir ce qui est au-dedans."

 ancestor_veneration.0503.t: "Vénération des Ancêtres : Thúlin III le Constant"
 ancestor_veneration.0503.desc: "Le parchemin honore l'héritage de [GetScriptedCharacterByHistoryID('lineofthulinIII').GetFirstNameNicknamedRegnal], qui gouverna durant la période d'assauts incessants des [orcs|E] et des [dragons|El] à travers les [redmountains|E] au cours du [secondage|E], et fut le contemporain de [GetScriptedCharacterByHistoryID('lineofthrarIII').GetFirstNameNicknamedRegnal] et de [GetScriptedCharacterByHistoryID('lineofbavorIII').GetFirstNameNicknamedRegnal]. Tandis que des creusées tombaient et que des colonies périphériques étaient coupées de tout secours, Thúlin rappela tous les cousins [stiffbeard|E] encore dispersés vers leur demeure ancestrale. Cette décision, controversée en son temps, abandonnait de fait plusieurs établissements mineurs, mais préservait la sécurité et les ressources de leur siège royal.\n\nThúlin refusa même d'engager ses forces dans la campagne offensive de Thrár contre les bastions Orques, décision qui engendra de profondes tensions durables avec les [blacklocks|E]. Kibil-Tarag demeura intacte sous sa direction, même si quelques bastions extérieurs furent perdus. On dit que l'exemple défensif de Thúlin influença Bavór lorsque ce dernier mit finalement un terme à ses actions offensives après la mort de Thrár. C'est après la chute de [eregion|E] que [GetScriptedCharacterByHistoryID('lineofthulin56').GetFirstNameRegnal] de [GetTitleByKey('k_thulins_folk').GetNameNoTier] se vit confier le [Concept('sevenringsofdwarves', 'Anneau des Barbes-Raides')|E], qu'ils gardèrent avec farouche jalousie. Avec cet héritage vint la découverte de vastes veines d'argent sous Kibil-Tarag. En son honneur, le bastion fut rebaptisé [Glossary('Kibilzahar','kibilzahar_gloss')]."
 ancestor_veneration.0503.a: "Sa résolution préserva ce que la fureur eût pu perdre."
 ancestor_veneration.0503.b: "Un bon chef sait quelles batailles mener et lesquelles laisser reposer."

 ancestor_veneration.0504.t: "Vénération des Ancêtres : Thúlin IV le Calciné"
 ancestor_veneration.0504.desc: "Le parchemin déroule la vie de [GetScriptedCharacterByHistoryID('lineofthulinIV').GetFirstNameNicknamedRegnal], qui gouverna [kibilzahar|E] à la fin du [secondage|E]. Sous son règne, [GetTitleByKey('k_kibilzahar').GetNameNoTier] était florissante. Sa gloire était assurée par le [Concept('sevenringsofdwarves', 'Anneau des Barbes-Raides')|E], grâce auquel les immenses veines d'argent enfouies dans les profondeurs furent découvertes et mises au jour. Un temps, même tandis que les [orcs|E] régnaient sur le nord des [redmountains|E], le bastion demeura impénétrable, sa nécropole de [Glossary('Kibiltumun','kibiltumun_gloss')] enrichie par une richesse tenace.\n\nSa splendeur fut sa perte, car les récits d'argent en quantité incalculable, tant dans les trésors extraits que dans les tombeaux incrustés d'argent, attirèrent l'attention d'un [dragon|El]. Sous le règne de [GetScriptedCharacterByHistoryID('lineofthulinIV').GetFirstName], les défenses de Kibilzahar furent percées pour la première fois de mémoire naine lorsqu'un Dragon fondit sur le bastion, semant le feu et la désolation.\n\nThúlin rassembla sa garde royale et livra bataille au Dragon. Dans cette bataille, il trouva la mort, et avec lui fut consumé le [Concept('sevenringsofdwarves', 'Anneau des Barbes-Raides')|E], le tout premier parmi ces Anneaux sacrés à jamais disparaître dans les flammes. Bien que le Dragon fût ensuite abattu par les petits-fils de Thúlin, [GetScriptedCharacterByHistoryID('lineofthulin75').GetFirstName] et [GetScriptedCharacterByHistoryID('lineofthulin75a').GetFirstName], et que Kibilzahar tînt bon, son invulnérabilité séculaire était brisée."
 ancestor_veneration.0504.a: "Sa bravoure et son sacrifice protégèrent ses cousins d'une ruine totale."
 ancestor_veneration.0504.b: "En poursuivant les grandes richesses, il défendit les nobles traditions de son peuple."

 ancestor_veneration.0505.t: "Vénération des Ancêtres : Thúlin V le Pragmatique"
 ancestor_veneration.0505.desc: "Ce parchemin retrace la vie de [GetScriptedCharacterByHistoryID('lineofthulinV').GetFirstNameNicknamedRegnal], qui gouverna depuis [kibilzahar|E] dans les premières années du [thirdage|E], plusieurs siècles après qu'un [dragon|El] eut percé les défenses du bastion et tué [GetScriptedCharacterByHistoryID('lineofthulinIV').GetFirstNameNicknamedRegnal]. Sous le règne de [GetScriptedCharacterByHistoryID('lineofthulinIV').GetFirstName], [GetTitleByKey('k_kibilzahar').GetNameNoTier] était demeurée intacte, mais son ancienne puissance s'était érodée. Les assauts incessants des [orcs|E] et des Dragons à travers les [redmountains|E] usaient ses défenses, et sa richesse en argent n'assurait plus sa sécurité.\n\nReconnaissant le déclin à long terme du bastion et la menace croissante pesant sur sa survie, Thúlin V inversa la politique de centralisation inaugurée par [GetScriptedCharacterByHistoryID('lineofthulinIII').GetFirstNameNicknamedRegnal]. Là où son aïeul avait rappelé tous les [stiffbeards|E] à Kibilzahar au nom de l'unité et de la défense, il autorisa le rétablissement d'anciens bastions et la fondation de nouvelles creusées dans des régions éloignées de Kibilzahar, où les Barbes-Raides pourraient subsister si le cœur du royaume venait à tomber.\n\nAprès la chute de Kibilzahar dans les dernières années du Troisième Âge, plusieurs de ces réduits serviraient de points de ralliement pour sa reconquête."
 ancestor_veneration.0505.a: "Sa sagesse créa des opportunités en des temps difficiles."
 ancestor_veneration.0505.b: "Sa clairvoyance posa les fondements de la survie de son peuple."

 ancestor_veneration.0506.t: "Vénération des Ancêtres : Thúlin VI l'Inconsolé"
 ancestor_veneration.0506.desc: "Le parchemin déploie la vie de [GetScriptedCharacterByHistoryID('lineofthulinVI').GetFirstNameNicknamedRegnal], qui gouverna en une période difficile pour les [stiffbeards|E]. Né en exil après la prise de [kibilzahar|E] par un drake de feu sous le règne de son arrière-grand-père [GetScriptedCharacterByHistoryID('lineofthulin105').GetFirstName], il ne posa jamais les yeux sur son bastion ancestral. Dans les dernières années du [thirdage|E], son règne vit l'effondrement de [womawas_drus|E], la corruption du peuple d'Urd et la montée de menaces à l'[east|E]. Après la chute du bastion, les Barbes-Raides en exil fondèrent les coutumes des [GetFaithByKey('faith_stiffbeards').GetAdherentNamePlural], selon lesquelles nul Barbe-Raide ne pouvait reposer avant que ses restes ne fussent restitués à [Glossary('Kibiltumun','kibiltumun_gloss')], sous [GetTitleByKey('k_kibilzahar').GetNameNoTier]. Pour préserver les morts jusqu'à leur réinhumation, ils adoptèrent la pratique de la momification.\n\nAnimé d'une résolution d'acier, Thúlin VI consacra sa vie à préparer la reconquête de Kibilzahar. Les Barbes-Raides abattirent bien des [dragons|El] de moindre envergure, aidés de leurs boucliers légendaires réputés pour avoir émoussé bien des assauts contre leur demeure perdue ; ils sollicitèrent l'aide des [hisildi|E] reclus du Grand Bois et établirent de nombreux points de ralliement en vue de la guerre pour reprendre Kibilzahar. Thúlin ne vécut point pour voir le bastion reconquis, ce furent ses fils et petits-fils qui menèrent la campagne finale. Après la reconquête, les restes de Thúlin furent parmi les premiers ramenés, déposés aux côtés de [GetScriptedCharacterByHistoryID('lineofthulin0a').GetFirstNameNicknamedRegnal], pour qui [Glossary('Kibiltumun','kibiltumun_gloss')] fut érigé pour la première fois durant les [yearofthetreesage|E]."
 ancestor_veneration.0506.a: "Il guida son peuple à travers ses jours les plus sombres et bâtit pour son retour."
 ancestor_veneration.0506.b: "Il endurcit un peuple brisé et le prépara pour la guerre à venir."

### THRÁR ###

 ancestor_veneration.0601.t: "Vénération des Ancêtres : Thrár Iᵉʳ le Fier"
 ancestor_veneration.0601.desc: "L'antique parchemin porte le récit de [thrarproud|E], [dwarffather|E] des [blacklocks|E] ou [thrarsfolk|E], qui s'éveilla pour la première fois dans les [redmountains|E] aux côtés de [bavorcold|E] des [stonefoots|E], dans les profondeurs voûtées de [Glossary('Baruzkhizdîn','baruzkhizdin_gloss')].\n\nBien que [GetScriptedCharacterByHistoryID('lineofthrarI').GetFirstNameRegnal] fût hardi et impérieux, et que [GetScriptedCharacterByHistoryID('lineofbavorI').GetFirstNameRegnal] fût calme et mesuré, leurs destins étaient étroitement liés. Ensemble, leurs forces façonnèrent les premiers temps des Boucles-Noires et des Pieds-de-Pierre, un lien qui devait s'étendre longtemps après leur époque. D'une voix tonitruante et d'une fierté à son image, Thrár fonda le bastion de [GetTitleByKey('k_nargubraz').GetNameNoTier] et la Maison de [GetScriptedCharacterByHistoryID('lineofthrarI').GetDynasty.GetName].\n\nIl ne chercha pas seulement la richesse, mais une grandeur au-delà de l'or. Sous sa main hardie, les [blacklocks|E] prospérèrent jusqu'à ce que de grandes calamités après sa disparition les contraignissent à se disperser aux confins du monde, fondant des salles partout où les montagnes pouvaient les abriter.\n\nLes [avari|E] le nommèrent [Glossary('Druin','druin_gloss')], tandis que les Orientais l'appelaient « Sadal », « le Rude ». Pour l'histoire, il demeure Thrár, intrépide et à jamais résolu."
 ancestor_veneration.0601.a: "Que nos hauts faits retentissent plus fort que sa voix."
 ancestor_veneration.0601.a.saruman: "Un peu de fierté pour ses propres accomplissements est chose permise."
 ancestor_veneration.0601.b: "La fierté elle-même doit s'incliner devant la sagesse."

 ancestor_veneration.0602.t: "Vénération des Ancêtres : Thrár II Roi-du-Sud"
 ancestor_veneration.0602.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofthrarII').GetFirstNameNicknamedRegnal], qui quitta le bastion de [GetTitleByKey('k_nargubraz').GetNameNoTier] gouverné par son oncle [GetScriptedCharacterByHistoryID('secondlineofthrar1').GetFirstNameNicknamedRegnal] après la mort de son père [GetScriptedCharacterByHistoryID('lineofthrar17').GetFirstNameRegnal].\n\nUne troupe des [blacklocks|E] suivit leur [dwarffather|E] vers le Sud, où il fonda le bastion de [GetTitleByKey('e_bizaruldum').GetNameNoTier] sur une pierre posée par des mains plus anciennes.\n\n$Thr_ar$ édifia ce royaume non par la conquête, mais par l'unité. Il épousa [GetScriptedCharacterByHistoryID( 'lineofbavor14' ).GetFirstName], fille de [GetScriptedCharacterByHistoryID( 'lineofbavorII' ).GetFirstNameNicknamedRegnal] des [stonefoots|E], lequel devint lui-même Premier Vassal et Roi-du-Nord de Bizarûldûm par cette union. Les Boucles-Noires vinrent régner sur les étendues méridionales de Bizarûldûm, avec Tumunamahal pour capitale, et donnèrent à leur souverain le titre de Roi-du-Sud.\n\nPar le premier fils de [GetScriptedCharacterByHistoryID('lineofthrarII').GetFirstNameNicknamedRegnal], [GetScriptedCharacterByHistoryID('lineofthrar21').GetFirstNameRegnal], sa lignée gouverna Bizarûldûm pendant de nombreux siècles, perdurant jusqu'à l'époque de la [successionofbizaruldum|E]. Son second fils, [GetScriptedCharacterByHistoryID('thirdlineofthrar1').GetFirstNameRegnal], s'aventura plus au Sud encore et fonda le bastion de [GetTitleByKey('k_mablad_dum').GetNameNoTier]."
 ancestor_veneration.0602.a: "Il bâtit avec intention. Nous ferons de même."
 ancestor_veneration.0602.b: "Comme il unit des maisons, ainsi forgerai-je de nouveaux pactes."

 ancestor_veneration.0603.t: "Vénération des Ancêtres : Thrár III l'Ensanglanté"
 ancestor_veneration.0603.desc: "Le parchemin évoque [GetScriptedCharacterByHistoryID('lineofthrarIII').GetFirstNameNicknamedRegnal] des [blacklocks|E], qui gouverna au cours du [secondage|E] lorsque les [orcs|E] du nord commencèrent à infester les [redmountains|E]. Alors que [GetTitleByKey('e_bizaruldum').GetNameNoTier] se trouvait sous une menace croissante, il mena une grande expédition militaire vers le nord, frappant profond dans les terres tenues par l'ennemi et soulageant la pression qui pesait sur bien des bastions [dwarven|E]. [GetScriptedCharacterByHistoryID('lineofthulinIII').GetFirstNameNicknamedRegnal] avait préféré rappeler défensivement les [stiffbeards|E] à [GetTitleByKey('k_kibilzahar').GetNameNoTier], ce qui exaspéra Thrár III, partisan de l'action offensive.\n\nIl fut cependant réconforté de trouver en [GetScriptedCharacterByHistoryID('lineofbavor20').GetFirstNameNicknamedRegnal], fils de Bavór III, un partageant sa conviction que la sûreté des Nains résidait dans la frappe préventive plutôt que dans l'attente derrière leurs portes. Drûhar allait servir par la suite comme l'un des principaux généraux de Thrár durant la guerre.\n\nLa dernière campagne de Thrár apporta un bref répit, mais à un coût terrible. $Thr_ar$ lui-même périt avant sa conclusion, non au combat, et bien qu'il eût préservé le cœur de son royaume, plusieurs creusées mineures furent perdues dans les combats. Tandis que la plupart des [dwarves|E] se retiraient vers des salles plus sûres, [GetScriptedCharacterByHistoryID('lineofgorovod3').GetFirstNameNicknamedRegnal], l'un des généraux de $Thr_ar$, et ceux qui lui étaient le plus fidèles demeurèrent sur place pour poursuivre le combat contre les Orques et les [goblins|E].\n\nDans l'agitation qui s'ensuivit dans les générations suivantes, [GetScriptedCharacterByHistoryID('lineofthrar35').GetFirstNameRegnal] de [GetTitleByKey('e_thrars_folk').GetNameNoTier] en vint à accepter le [Concept('sevenringsofdwarves', 'Anneau des Boucles-Noires')|E], don de mains douteuses qui promettait la force au milieu d'une incertitude grandissante."
 ancestor_veneration.0603.a: "Le commandement résolu de Thrár méritait d'être loué."
 ancestor_veneration.0603.b: "Il posséda la sagesse d'agir quand l'heure l'exigeait."

 ancestor_veneration.0604.t: "Vénération des Ancêtres : Thrár IV, le Roi-de-Trois-Jours"
 ancestor_veneration.0604.desc: "Le parchemin décrit [GetScriptedCharacterByHistoryID('lineofthrarIV').GetFirstNameNicknamedRegnal], fils de [GetScriptedCharacterByHistoryID('lineofthrar51').GetFirstNameNicknamedRegnal]. Son règne commença dans la calamité et s'acheva dans les flammes. [GetScriptedCharacterByHistoryID('lineofthrar51').GetFirstName], forgeron habile mais présomptueux, avait forgé pour son fils Thrár IV un nouvel héritage en forme d'épée parmi les [thrarsfolk|E] : Dumsuhersar. C'était l'œuvre maîtresse de Fullâ, façonnée avec le [Concept('sevenringsofdwarves', 'Anneau des Boucles-Noires')|E] et l'[Concept('sevenringsofdwarves', 'Anneau des Pieds-de-Pierre')|E] prêté, portés à ses mains, ce qui en décuplait les vertus.\n\nOr, dans les jours suivant l'achèvement de la lame, non pas un mais trois [dragons|El] fondirent sur [GetTitleByKey('e_bizaruldum').GetNameNoTier], attirés par les trésors amassés de deux clans. Fullâ et sa garde blessèrent le Dragon, mais furent consumés dans ses flammes. Les [dwarvenrings|E] furent perdus, bien que Dumsuhersar demeurât.\n\nRendu fou de deuil par la mort de son père, $Thr_ar$ rallia son ost et occit les Dragons, mais succomba au troisième jour de son règne. Ne laissant pour héritiers que de lointains cousins parmi les Pieds-de-Pierre, une âpre [Concept('successionofbizaruldum','querelle')|E] s'ensuivit. La vaine prétention de la lignée royale de Nargubraz conduisit finalement [GetScriptedCharacterByHistoryID('lineofbavor42').GetFirstNameRegnal] des [stonefoots|E] à devenir le nouveau souverain. Jugée maudite par les [bavorsfolk|E], Dumsuhersar fut rejetée et passa ainsi aux parents méridionaux de $Thr_ar$ à [GetTitleByKey('k_mablad_dum').GetNameNoTier], alors gouvernée par [GetScriptedCharacterByHistoryID('thirdlineofthrar31').GetFirstNameNicknamedRegnal]."
 ancestor_veneration.0604.a: "Moi aussi je ferai face au grand péril si le devoir l'exige."
 ancestor_veneration.0604.b: "Quelle peine de voir de tels ouvrages artisanaux se perdre dans les âges."

 ancestor_veneration.0605.t: "Vénération des Ancêtres : Thrár V, le Reconstructeur"
 ancestor_veneration.0605.desc: "Le parchemin retrace l'histoire de [GetScriptedCharacterByHistoryID('lineofthrarV').GetFirstNameNicknamedRegnal], qui se leva des cendres d'un royaume brisé. Lorsque les montagnes de [GetTitleByKey('k_mablad_dum').GetNameNoTier] entrèrent en éruption dans la jeunesse de Thrár, en l'an 1004 du [thirdage|E], peu parvinrent à fuir. Seuls ceux qui se trouvaient aux franges occidentales et orientales survécurent, tandis que les familles prises au piège dans le centre périrent dans l'inferno, dont les parents de Thrár. Thrár lui-même ne survécut que parce qu'il accomplissait ses devoirs princiers dans les quartiers occidentaux au moment du cataclysme.\n\nLes survivants de l'ouest se rallièrent à lui, et il les guida en sécurité jusqu'à la colonie minière [blacklock|E] occidentale de [GetTitleByKey('c_tuktazn_an').GetNameNoTier]. Les survivants de l'est cherchèrent refuge dans la colonie minière de [GetTitleByKey('d_nu_mekhem').GetNameNoTier], tenue par [GetScriptedCharacterByHistoryID('lineofkhodul61').GetFirstNameRegnal] au sein de [GetTitleByKey('k_luzna_dum').GetNameNoTier]. Pendant ce temps, les [orcs|E] et les [goblins|E], longtemps une nuisance persistante dans les montagnes, saisirent l'occasion pour envahir. Menés par le redoutable chef de guerre [GetScriptedCharacterByHistoryID('lineofulkhash1').GetFirstNameNicknamed], ils massacrèrent les survivants dispersés et harcelèrent les fuyards, bien que quelques réfugiés parvinssent à tenir.\n\nAprès un temps de consolidation, les places fortes [dwarven|E] de l'est et de l'ouest subirent de nouvelles attaques. Ce fut alors qu'Ulkaur fut enfin occis par Thrár V en personne, mais les nombreux conflits avaient infligé de lourdes pertes. Ayant assuré une nouvelle tête de pont pour son peuple dans les [yellowmountains|E], Thrár ne put rejoindre les derniers survivants de l'est retranchés par l'ennemi, qui périrent finalement dans les suites du conflit. Trempé par l'épreuve, il rebâtit avec les survivants de l'ouest, forgeant un refuge depuis lequel son peuple pourrait endurer, ce qui conduisit en ses années tardives à la construction de la demeure de [GetTitleByKey('k_barazimab_ul').GetNameNoTier]."
 ancestor_veneration.0605.a: "L'ambition doit parfois céder le pas à la stabilité."
 ancestor_veneration.0605.b: "L'endurance ne vaut rien sans la force pour la défendre."

 ancestor_veneration.0606.t: "Vénération des Ancêtres : Thrár VI, le Vaillant"
 ancestor_veneration.0606.desc: "Le parchemin porte le nom de [GetScriptedCharacterByHistoryID('lineofthrarVI').GetFirstNameNicknamedRegnal], qui régna au [thirdage|E] tandis que le danger se resserrait autour de son peuple. Bien que le sud eût depuis longtemps tourné le regard vers lui-même, $Thr_ar$ rallia les [blacklocks|E] à la guerre contre la domination orque qui pourrissait dans les ruines de [GetTitleByKey('k_mablad_dum').GetNameNoTier]. Pourtant sa force ne résidait pas seulement dans les armes, mais aussi dans la diplomatie : par des conseils avisés et une conviction inébranlable, il forja une alliance avec [GetTitleByKey('k_koronande').GetNameNoTier].\n\nEnsemble, ils repoussèrent [GetScriptedCharacterByHistoryID('nazgul4').GetFirstNameNicknamedRegnal], le Roi-Dieu de [GetTitleByKey('e_mumakan').GetNameNoTier] de retour, ainsi que ceux qui suivaient le [GetFaithByKey('faith_indur').GetName]. Par la résistance de $Thr_ar$, les ambitions de conquête du [nazgul|E] furent contrariées, le Roi-Dieu étant contraint de s'attarder dans la région bien plus longtemps que prévu, et la république de Kôronânde demeura inébranlable face à son assaut.\n\nTel fut l'héritage de $Thr_ar$ VI : la défiance, l'unité, et une volonté que la peur ne plia point."
 ancestor_veneration.0606.a: "En des temps de ténèbres, l'unité est l'arme qui assure la survie."
 ancestor_veneration.0606.b: "L'unité est précieuse, mais c'est la force des armes qui scelle la victoire."

### BAVÓR ###

 ancestor_veneration.0701.t: "Vénération des Ancêtres : Bavór I, le Froid"
 ancestor_veneration.0701.desc: "L'antique parchemin consigne la vie de [bavorcold|E], [dwarffather|E] des [stonefoots|E], qui s'éveilla aux côtés de [thrarproud|E] des [blacklocks|E] dans les [redmountains|E], dans les profondes voûtes de [Glossary('Baruzkhizdîn','baruzkhizdin_gloss')]. Là où [GetScriptedCharacterByHistoryID('lineofthrarI').GetFirstNameRegnal] était véhément et prompt à l'action, [GetScriptedCharacterByHistoryID('lineofbavorI').GetFirstNameRegnal] était silencieux et mesuré, réputé pour son maintien calme et retenu, parlant rarement mais avec un poids considérable quand il le faisait.\n\nDurant ses premières années de règne, il creusa les halls profonds de [GetTitleByKey('k_baraz_lagil').GetNameNoTier], réputés pour leur pierre rouge et leurs riches veines d'or, et fonda la Maison de [GetScriptedCharacterByHistoryID('lineofbavorI').GetDynasty.GetName]. Les [avari|E] voisins lui donnèrent le nom de [Glossary('Mallin','malln_gloss')] et entretinrent des relations paisibles avec son peuple. C'est également sous le règne de Bavór que [GetScriptedCharacterByHistoryID('lineofzabad').GetFirstNameNicknamedRegnal] fonda la Guilde des Joailliers, établissant une tradition des Pieds-de-Pierre d'excellence dans l'art de la gemme et de l'ornement.\n\nBien que Bavór et Thrár différassent de tempérament, leur coopération précoce posa les fondations de l'héritage partagé des Boucles-Noires et des Pieds-de-Pierre. Leurs places fortes étaient distinctes, mais leur alliance dura des générations."
 ancestor_veneration.0701.a: "Sa sérénité forgea des alliances solides et durables."
 ancestor_veneration.0701.b: "Sa main prudente assura richesse et ordre pour des générations."

 ancestor_veneration.0702.t: "Vénération des Ancêtres : Bavór II, le Roi-du-Nord"
 ancestor_veneration.0702.desc: "Ce parchemin consigne les actes de [GetScriptedCharacterByHistoryID('lineofbavorII').GetFirstNameNicknamedRegnal] des [stonefoots|E], qui vint du sud aux premiers temps de [GetTitleByKey('e_bizaruldum').GetNameNoTier] pour soutenir [GetScriptedCharacterByHistoryID('lineofthrarII').GetFirstNameNicknamedRegnal] des [blacklocks|E]. Déjà fort en années quand Thrár revint à la vie, Bavór apporta avec lui sagesse, vigueur et liens de parenté.\n\nSa fille [GetScriptedCharacterByHistoryID('lineofbavor14').GetFirstNameRegnal] épousa Thrár, et il devint Premier-Vassal et Roi-du-Nord de Bizarûldûm, titre de haute distinction, bien qu'il n'eût jamais recherché la prééminence. Là où Thrár désirait la grandeur et portait le titre le plus élevé en tant que souverain désigné du royaume, Bavór était son égal en conseil, guidant discrètement pour maintenir leur peuple uni.\n\nOn dit que lorsque Bavór arriva, Thrár éclata de rire et déclara que les choses étaient ainsi qu'elles devaient être : deux clans, et deux amis, main dans la main. La rumeur veut que Bavór eût répondu avec sécheresse qu'il n'avait guère eu le choix, de crainte que Thrár ne s'élançât tête baissée vers quelque péril insensé qui eût causé bien du chagrin. Leur association forma le cœur des premiers temps de Bizarûldûm, non point gouvernée par l'un sur l'autre, mais façonnée par leurs différences et leur confiance mutuelle. La force de leur union leur survécut à tous deux."
 ancestor_veneration.0702.a: "Un conseil ferme forge les plans les plus puissants."
 ancestor_veneration.0702.b: "Les titres s'effacent, mais la vraie sagesse demeure."

 ancestor_veneration.0703.t: "Vénération des Ancêtres : Bavór III, l'Intendant"
 ancestor_veneration.0703.desc: "Ce parchemin retrace le règne de [GetScriptedCharacterByHistoryID('lineofbavorIII').GetFirstNameNicknamedRegnal] des [stonefoots|E], qui gouverna [GetTitleByKey('e_bizaruldum').GetNameNoTier] en l'absence de [GetScriptedCharacterByHistoryID('lineofthrarIII').GetFirstNameNicknamedRegnal]. Tandis que Thrár s'embarquait pour des décennies de campagne dans le nord des [redmountains|E], Bavór administra le royaume et fut essentiel pour maintenir richesses et approvisionnements vers le nord, tant pour reconstruire les royaumes que pour ravitailler les armées en marche. On dit que là où les armées [blacklock|E] descendaient, les maçons [stonefoot|E] n'étaient pas loin derrière, pour ériger des fortifications et rebâtir des halls délabrés.\n\nBien que Bavór fût un souverain prudent, son fils [GetScriptedCharacterByHistoryID('lineofbavor20').GetFirstNameNicknamedRegnal] partageait la conviction de Thrár que les [dwarves|E] devaient frapper leurs ennemis les premiers. Quand la guerre vint, Drûhar en prit le commandement comme l'un des généraux en chef de Thrár. Malgré leurs différences d'approche, père et fils témoignèrent tous deux de leur indéfectible résolution à protéger leur peuple, poursuivant chacun des voies différentes pour assurer la sécurité des Pieds-de-Pierre. Quand enfin Thrár s'éteignit et que les combats se turent pour l'essentiel, ce fut Bavór, peut-être inspiré par la défense inébranlable de [GetScriptedCharacterByHistoryID('lineofthulinIII').GetFirstNameNicknamedRegnal] de son manoir ancestral, qui maintint les places fortes intactes, rebâtissant les halls, renouant les alliances et guidant le royaume vers des jours plus calmes. Divisés, les failles des deux [dwarffathers_pluralshort|E] auraient pu défaire tout ce pour quoi ils avaient combattu. Ensemble, ils tinrent ferme.\n\nDes générations plus tard, après la chute d'[eregion|E] dans sa tentative de s'attirer la faveur des [dwarven|E] et d'étendre son influence parmi leur espèce, [sauroncharacter|E] remit le [Concept('sevenringsofdwarves','Anneau des Pieds-de-Pierre')|E] à [GetScriptedCharacterByHistoryID('lineofbavor26').GetFirstNameRegnal] de [GetTitleByKey('k_bavors_folk').GetNameNoTier], que les Pieds-de-Pierre garderaient comme héritage de leur peuple."
 ancestor_veneration.0703.a: "La victoire se forge par bien plus que des épées."
 ancestor_veneration.0703.b: "Son savoir stabilisa le royaume en des temps difficiles."

 ancestor_veneration.0704.t: "Vénération des Ancêtres : Bavór IV, le Roi-Unique"
 ancestor_veneration.0704.desc: "Ce parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofbavorIV').GetFirstNameNicknamedRegnal], né de nombreuses années après la mort de [GetScriptedCharacterByHistoryID('lineofthrarIV').GetFirstNameNicknamedRegnal] et de [GetScriptedCharacterByHistoryID('lineofthrar51').GetFirstNameNicknamedRegnal], dans un royaume encore marqué par le feu du [dragon|El], la guerre civile et la destruction du [Concept('sevenringsofdwarves', 'Anneau des Boucles-Noires')|E] et de l'[Concept('sevenringsofdwarves', 'Anneau des Pieds-de-Pierre')|E].\n\nLa [successionofbizaruldum|E] avait maintenu le royaume dans l'instabilité, amorcée des siècles plus tôt par [GetScriptedCharacterByHistoryID('secondlineofthrar33').GetFirstNameRegnal] de [GetTitleByKey('k_nargubraz').GetNameNoTier] et descendant de la lignée de [thrar|E]. Pourtant ce n'est que bien des années plus tard, durant le long et régulier règne de Bavór IV, que ces prétentions cessèrent d'être activement poursuivies. Roi de [GetTitleByKey('e_bizaruldum').GetNameNoTier] du Nord comme du Sud, par le sang et par le droit, Bavór hérita d'une terre fracturée par des années de discorde.\n\nLà où Thrár IV avait chargé avec fougue et ardeur, Bavór IV apporta une patience mesurée et une résolution constante. Il guida son peuple à travers un âge de recueillement et de restauration prudente, s'employant à renouer des alliances brisées et rebâtir des places fortes éprouvées. Bien que nombre de [blacklocks|E] vécussent encore à Bizarûldûm, leur présence demeurait une source de tension dans les suites de la [successionofbizaruldum|E]. Bavór releva ce défi avec sagesse et diplomatie, posant les fondations d'une unité durable entre les Boucles-Noires et les [stonefoots|E]."
 ancestor_veneration.0704.a: "Il rebâtit ce que la fierté avait brisé."
 ancestor_veneration.0704.b: "Il guida un royaume blessé vers une paix durable."

 ancestor_veneration.0705.t: "Vénération des Ancêtres : Bavór V, le Béni"
 ancestor_veneration.0705.desc: "Ce parchemin consigne le règne de [GetScriptedCharacterByHistoryID('lineofbavorV').GetFirstNameNicknamedRegnal], qui régna autour du premier millénaire du [thirdage|E]. Son règne fut marqué par un âge de paix et de prospérité pour son peuple. Les [dragons|El] des [redmountains|E] sommeillaient, la menace des [orcs|E] s'estompa un temps, et le Second Empire de Lôkhas Drûs était à son apogée, lié à [GetTitleByKey('e_bizaruldum').GetNameNoTier] par l'amitié et le commerce.\n\nPour la première fois de bien des générations, Bavór put se consacrer à des pursites artistiques et philosophiques. Embrassant sa nature solitaire, il se voua à la création, façonnant des chefs-d'œuvre en pierre, en peinture et en encre. Bien qu'il n'eût cherché nulle gloire dans la guerre, son temps, béni de [mahalcharacter|E], est retenu pour sa sagesse et son art."
 ancestor_veneration.0705.a: "La paix est un trésor qui nourrit l'âme."
 ancestor_veneration.0705.b: "Par l'art et la sagesse, nous perdurons au-delà de nos années."
 ancestor_veneration.0705.b.saruman: "L'art et la sagesse peuvent en vérité forger des héritages durables."

 ancestor_veneration.0706.t: "Vénération des Ancêtres : Bavór VI"
 ancestor_veneration.0706.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofbavorVI').GetFirstNameRegnal], né dans un âge d'épreuve et de tourmente au cours de la [warofthelie|E], un conflit qui déchira les [stonefoots|E] et les [blacklocks|E]. Ce fut son père [GetScriptedCharacterByHistoryID('lineofbavor84').GetFirstNameRegnal] qui ouvrit le premier les portes de [GetTitleByKey('e_bizaruldum').GetNameNoTier] à [GetScriptedCharacterByHistoryID('lineofbarukodlig1').GetFirstNameNicknamedRegnal] et aux Exilés de [GetTitleByKey('k_nargubraz').GetNameNoTier], qui allaient plus tard devenir les [axesofnargubraz|E]. En son temps, $Bav_or$ fit preuve d'un cœur clément, permettant aux Boucles-Noires survivantes de Nargubraz, abusées par [sauroncharacter|E], de rejoindre leurs frères à Bizarûldûm.\n\nAprès avoir succédé à son père, $Bav_or$ fit face à l'ombre de [GetScriptedCharacterByHistoryID('nazgul3').GetFirstNameNicknamedRegnal] de Waw. Le [nazgul|E] s'était depuis longtemps emparé des îles du Second Empire déclinant de Lôkhas Drûs, dont la puissance s'était presque entièrement dissoute. Avec ses vieux alliés épuisés et le commerce tari, il conduisit les Pieds-de-Pierre à travers un âge de fortunes déclinantes, préservant ce qui restait par une intendance patiente et une action résolue."
 ancestor_veneration.0706.a: "Sa hache demeura tranchante, prête à opposer l'acier à l'ombre."
 ancestor_veneration.0706.b: "Il porta le poids de l'avenir de son peuple de mains fermes."

#########################
### DWARVEN ANCESTORS ###
#########################

### LONGBEARDS ###

 ancestor_veneration.0110.t: "Vénération des Ancêtres : Thrór, Roi sous la Montagne"
 ancestor_veneration.0110.desc: "Le parchemin porte le nom de [GetScriptedCharacterByHistoryID('lineofdurin81').GetFirstNameNicknamedRegnal]. Dans sa jeunesse, les [longbeards|E] habitaient les [greymountains|E], mais lorsque son père [GetScriptedCharacterByHistoryID('lineofdurin79').GetFirstNameRegnal] et son frère [GetScriptedCharacterByHistoryID('lineofdurin80').GetFirstNameRegnal] furent occis par un [drake|El], Thrór ramena son peuple à [erebor|E], restaurant le royaume abandonné de [GetScriptedCharacterByHistoryID('lineofdurin74').GetFirstNameRegnal]. Son frère cadet [GetScriptedCharacterByHistoryID('lineofdurin88').GetFirstNameRegnal] fonda une place forte dans les [ironhills|E], où sa lignée perdura. Les halls d'Erebor rayonnaient de splendeur, magnifiée par l'éclat de l'[arkenstone|E] dans ses profondeurs. Mais la fierté attira le péril, quand Smaug « le Terrible » s'abattit, attiré par ses richesses, dispersant les [dwarves|E] en exil.\n\nSans foyer mais sans courber l'échine, Thrór chercha à reconquérir le trône de ses pères, ne portant que son épée et les derniers fragments de son honneur. Il était accompagné d'un seul compagnon, son vieil ami [GetScriptedCharacterByHistoryID('lineofnar1').GetFirstNameNicknamedRegnal]. Avant de partir, il remit le [Concept('sevenringsofdwarves', 'Anneau des Longues-barbes')|E] à son fils [GetScriptedCharacterByHistoryID('lineofdurin82').GetFirstNameRegnal], en lui disant : « Garde-le bien, et garde-le secret ! » Puis il s'en alla seul dans [khazaddum|E], sourd aux mises en garde de Nár. Là il fut occis par [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstNameNicknamedRegnal], qui le décapita et grava les runes « AZOG » sur sa tête. Nár observa de loin et fut renvoyé vivant avec le cruel message d'Azog. Nár revint dans le deuil, portant la nouvelle de l'outrage. Bien qu'il fût tombé, la mort de Thrór alluma les braises nécessaires à la [warofdwarvesandorcs|E]."
 ancestor_veneration.0110.a: "Par ses richesses, son peuple demeura inébranlable et fier."
 ancestor_veneration.0110.b: "Son chemin forja une fureur naine que rien ne put éteindre."

 ancestor_veneration.0111.t: "Vénération des Ancêtres : Thráin II"
 ancestor_veneration.0111.desc: "Le parchemin retrace la voie douloureuse de [GetScriptedCharacterByHistoryID('lineofdurin82').GetFirstNameNicknamedRegnal]. Après que son père [GetScriptedCharacterByHistoryID('lineofdurin81').GetFirstName] eut été occis par [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstNameNicknamedRegnal] à Azanulbizar, Thráin leva les étendards de la vengeance depuis son exil à [GetTitleByKey('k_dunland').GetNameNoTier]. Une fois rassemblés, les sept clans [dwarven|E] lancèrent une offensive acharnée de [khazaddum|E] à [gundabad|E]. Parmi les compagnons principaux de Thráin se trouvaient ses fils [GetScriptedCharacterByHistoryID('lineofdurin83').GetFirstName] et [GetScriptedCharacterByHistoryID('lineofdurin84').GetFirstName], [GetScriptedCharacterByHistoryID('lineofuriVI').GetFirstNameRegnal] des [firebeards|E] et [GetScriptedCharacterByHistoryID('lineofsindriVI').GetFirstNameRegnal] des Poings-de-Fer. Bien que les Nains triomphassent enfin sur le champ ensanglanté d'Azanulbizar et qu'[GetScriptedCharacterByHistoryID('lineofazog1').GetFirstName] fût décapité par [GetScriptedCharacterByHistoryID('lineofdurin90').GetFirstNameNicknamedRegnal] devant les portes de [GetTitleByKey('k_khazad_dum').GetNameNoTier] en juste représailles, leur victoire coûta un prix terrible. Frerin fut du nombre de ceux qui y trouvèrent la mort.\n\nSans royaume à reconquérir, Thráin mena son peuple en exil dans les [bluemountains|E], où ils trouvèrent refuge grâce au concours de [GetScriptedCharacterByHistoryID('lineofuriVI').GetFirstNameRegnal]. Là il régna sans couronne et sans repos, accablé par le souvenir d'[erebor|E]. Il portait le dernier des [sevenringsofdwarves|E], qui corrompait son esprit. Consumé par le tourment, il disparut vers l'est. Dans les geôles de [GetTitleByKey('d_amon_lanc').GetNameNoTier], [Concept('sauroncharacter', 'l’Ombre')|E] s'empara de lui et réclama l'[dwarvenring|E]. Oublié et brisé, il fut découvert à l'agonie par [gandalfcharacter|E], à qui il confia une clé et une carte, signes destinés à guider son fils Thorin jusqu'à Erebor."
 ancestor_veneration.0111.a: "Par l'ordre et la préparation, nous transformons l'épreuve en triomphe."
 ancestor_veneration.0111.b: "Par la patience et les alliances, nous persisterons."

 ancestor_veneration.0112.t: "Vénération des Ancêtres : Thorin II Lécudechesne"
 ancestor_veneration.0112.desc: "Le parchemin évoque [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstNameNicknamedRegnal], fils de [GetScriptedCharacterByHistoryID( 'lineofdurin82' ).GetFirstNameNicknamedRegnal]. Pour reconquérir [erebor|E], il prit la route avec douze compagnons [dwarven|E], un cambrioleur [hobbit|E] et un [Concept('gandalfcharacter', 'Magicien')|E], bravant maint péril sur le chemin de la [lonelymountain|E].\n\nQuand Smaug fut abattu, ce ne fut point les [dwarves|E], mais [GetScriptedCharacterByHistoryID( 'lineofdale46' ).GetFirstNameNicknamed] qui occit la bête d'une grande Flèche Noire.\n\nLes richesses d'Erebor furent reconquises, mais quand [men|E] et [elves|E] vinrent réclamer leur part, Thorin ferma Erebor. Sa résistance aboutit à un siège, que seule l'arrivée de [GetScriptedCharacterByHistoryID( 'lineofdurin90' ).GetFirstNameNicknamedRegnal] avec ses guerriers des [ironhills|E] brisa. Seul l'assaut imprévu des [goblins|E] et des Wargs épargna l'effusion de sang entre les Peuples Libres, les forçant à s'unir contre la menace soudaine.\n\nMalgré les sacrifices héroïques de ses neveux [GetScriptedCharacterByHistoryID( 'lineofdurin86' ).GetFirstName] et [GetScriptedCharacterByHistoryID( 'lineofdurin87' ).GetFirstName] pour protéger leur [king|E] lors de cette [battle_of_the_five_armies|E], Thorin mourut peu après, se souvenant que certaines choses valent plus que l'or. Il fut inhumé avec [Glossary('Orcrist','orcrist_gloss')] et sa précieuse [arkenstone|E]."
 ancestor_veneration.0112.a: "Sa bravoure ne sera pas de sitôt oubliée."
 ancestor_veneration.0112.b: "Mon héritage sera encore plus grand que le sien."

 ancestor_veneration.0113.t: "Vénération des Ancêtres : Narvi"
 ancestor_veneration.0113.desc: "Le parchemin que je déroule conte l'histoire de [GetScriptedCharacterByHistoryID( 'lineofnarvi' ).GetFirstName], maître artisan qui s'éleva à la renommée au faîte de la gloire de [khazaddum|E]. Dans une collaboration inattendue avec [celebrimbor|E], le seigneur [elven|E] d'[eregion|E], Narvi fut chargé par [GetScriptedCharacterByHistoryID( 'lineofdurinII' ).GetFirstNameRegnal] de forger les puissantes [doorsofdurin|E], le grand portail qui gardait la Porte de l'Ouest de [GetTitleByKey('k_khazad_dum').GetNameNoTier].\n\nSon lien avec l'artisan elfe demeure légendaire, symbole de la coopération entre deux peuples fiers. Ensemble, ils créèrent un chef-d'œuvre, non seulement de l'art artisanal, mais d'une amitié qui résista au temps. Sur la porte était écrit en caractères Fëanoriens selon le mode du [beleriand|E] :\n\n#help [Glossary('Ennyn Durin Aran Moria: pedo mellon a minno. Im Narvi hain echant: Celebrimbor o Eregion teithant i thiw hin.','durins_door_gloss')]#!\n\nEn achevant ma lecture, une pensée me vient : que reste-t-il encore de l'héritage de Narvi ?"
 ancestor_veneration.0113.a: "Nous rebâtirons l'amitié que Narvi noua jadis avec les Elfes."
 ancestor_veneration.0113.a.saruman: "Je dois guider les Nains pour rebâtir l'amitié que Narvi noua jadis avec les Elfes."
 ancestor_veneration.0113.b: "Les Portes de Durin se dressèrent comme une sauvegarde inestimable du royaume."

 ancestor_veneration.0114.t: "Vénération des Ancêtres : Gorin I, Découvreur de Nordinbad"
 ancestor_veneration.0114.desc: "Le parchemin retrace le voyage de [GetScriptedCharacterByHistoryID('linegorin0').GetFirstName], premier du nom, dont les pas le portèrent au plus profond des contrées sauvages du nord en des jours où les [longbeards|E] abandonnaient [erebor|E], la place forte fondée par [GetScriptedCharacterByHistoryID('lineofdurin74').GetFirstNameRegnal], pour suivre [GetScriptedCharacterByHistoryID('lineofdurin75').GetFirstNameRegnal] dans les [greymountains|E]. Parmi ces migrants se trouvait Gorin, qui contempla le lac caché de [Glossary('Azan-zâram','azan_zaram_gloss')], immobile et étoilé dans le froid des hauteurs, et là il tailla les premiers halls de [nordinbad|E].\n\nEn ce temps, nombre des [durinsfolk|E] besognaient encore dans la région, mais le destin approchait. Du [GetTitleByKey('d_withered_heath').GetNameNoTier] vinrent des drac-froids, et dans leur fureur ils occircent [GetScriptedCharacterByHistoryID('lineofdurin79').GetFirstNameRegnal] et son fils [GetScriptedCharacterByHistoryID('lineofdurin80').GetFirstName]. Dans les années amères qui suivirent, les Montagnes Grises furent abandonnées, leurs places fortes laissées à la ruine. Seul Nordinbad tint, son peuple s'accrochant à la montagne comme son ancêtre l'avait fait jadis.\n\nFut-ce le destin qui guida Gorin jusqu'à ce lac secret, ou quelque autre chose encore ? Quelle que soit la vérité, c'est par sa main que l'héritage des Longues-barbes put perdurer dans le Nord quand tout le reste fut englouti par l'ombre."
 ancestor_veneration.0114.a: "Son courage perdure dans nos cœurs et dans la pierre."
 ancestor_veneration.0114.a.saruman: "Il est étonnant que Nordinbad ait réussi à survivre."
 ancestor_veneration.0114.b: "Gorin était un fou de s'établir en ce lieu maudit."

 ancestor_veneration.0115.t: "Vénération des Ancêtres : Boic Âme-Vaillante"
 ancestor_veneration.0115.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofbravesoul11').GetFirstNameNicknamedRegnal], fondateur d'une lignée qui perdure aux [ironhills|E] jusqu'à ce jour, bien que ses notes de bas de page reconnaissent les embellissements du récit. Il parle d'un âge où nos pères, enivrés de richesse, creusèrent trop profond et réveillèrent une terreur, une créature née de la flamme, un démon du monde antique. Selon la légende, la bête enchaîna les [dwarves|E] dans des liens de chaleur, n'épargnant que Boic, à qui elle ordonna d'apporter des trésors pour apaiser son courroux.\n\nIl brava le démon, n'offrant que ses bonnes œuvres. Dans la fureur qui s'ensuivit, Boic et la bête se battirent avec une ardeur sans relâche. Armé d'un diamant brillant comme le soleil et de son marteau, il enfonça la gemme dans le crâne de la bête, brisant son emprise et délivrant son peuple du destin.\n\nDepuis ce jour, « La richesse se trouve dans l'âme » devint la devise de la maison de Boic, un credo que ses descendants perpétuent encore. Pourtant la légende ne trouva point son origine dans le récit de Boic lui-même, mais dans les écrits de son arrière-petit-fils, [GetScriptedCharacterByHistoryID('lineofbravesoul17').GetFirstNameRegnal], premier souverain de [GetTitleByKey('c_boicstead').GetNameNoTier]. Il donna à son propre fils le nom de [GetScriptedCharacterByHistoryID('lineofbravesoul19').GetFirstNameRegnal], en hommage à l'ancêtre légendaire. Ainsi prit forme le mythe, tissé de fierté et de dessein, et il a traversé les générations."
 ancestor_veneration.0115.a: "Que la bravoure de Boic forge notre chemin."
 ancestor_veneration.0115.b: "Puissions-nous égaler la ruse de son descendant dans la forge d'un héritage."
 ancestor_veneration.0115.c: "Le courage est la meilleure défense contre le désespoir."

 ancestor_veneration.0116.t: "Vénération des Ancêtres : Róa, la Gardeuse de Corbeaux"
 ancestor_veneration.0116.a.desc: "Le parchemin rappelle les actes de [GetScriptedCharacterByHistoryID('lineofroa').GetFirstNameNicknamedRegnal], une illustre envoyée [longbeard|E] de [khazaddum|E] au [secondage|E], réputée pour ses longs voyages le long de la Route Naine de [greenwoodshort|E] entre Khazad-dûm et les [ironhills|E] en un âge de ténèbres grandissantes. Elle fut la première à comprendre le langage des Corbeaux, longtemps tenu pour simple imitation, et leur enseigna l'occidentalien, un art qu'ils ont transmis à leur descendance depuis lors. Par ses efforts, les oiseaux devinrent des messagers prompts, au regard perçant et dignes de confiance pour les Longues-barbes entre leurs places fortes lointaines."
 ancestor_veneration.0116.desc.erebor.settled: "\n\nBien après le temps de Róa, au [thirdage|E], lorsque [GetTitleByKey('c_ravenhill').GetNameNoTier] sous la [lonelymountain|E] fut pour la première fois peuplée, son épithète demeura vivante. Le [GetCourtPositionType('raven_keeper_court_position').GetName()] devint un poste de cour honoré parmi les [longbeards|E] qui y demeuraient, une voix de confiance qui veillait sur les oiseaux parlants et portait les messages d'importance. Bien que des générations se fussent écoulées, son nom demeurait à la fois légende et titre."
 ancestor_veneration.0116.b.desc: "\n\nBien qu'elle ne fût ni guerrière ni souveraine, l'héritage de Róa perdura dans les courriers aux plumes noires qui traversèrent montagnes et forêts longtemps après sa mort."
 ancestor_veneration.0116.a: "Elle montra que la diplomatie peut voyager sur des ailes comme sur des mots."
 ancestor_veneration.0116.b: "Toute connaissance commence par l'écoute."

 ancestor_veneration.0117.t: "Vénération des Ancêtres : Uni I, le Chercheur de Rivières"
 ancestor_veneration.0117.desc: "Le parchemin honore [GetScriptedCharacterByHistoryID('lineofuni19').GetFirstNameRegnal], retenu comme le fondateur de [GetTitleByKey('c_kheledul').GetNameNoTier], le port commercial des [dwarves|E] des [eredluin|E]. Ses aïeux à [khazaddum|E] étaient estimés comme maîtres des eaux souterraines, taillant aqueducs et citernes par nécessité et sécurité sous la couronne de la montagne. Pourtant dans le cœur d'Uni brûlait non point la prudence, mais la curiosité. Là où les siens maîtrisaient l'eau pour survivre, lui la cherchait non par besoin, mais par désir d'occasion.\n\nDans les années qui suivirent la mort de [GetScriptedCharacterByHistoryID('lineofdurinVI').GetFirstNameRegnal] aux mains du Fléau de Durin, quand les Nains de [GetTitleByKey('k_khazad_dum').GetNameNoTier] se détournèrent de leurs halls antiques pour chercher refuge à la [lonelymountain|E] sous la conduite du petit-fils de Durin VI, [GetScriptedCharacterByHistoryID('lineofdurin74').GetFirstNameRegnal], Uni ne se tourna point vers la pierre ni la gemme, mais vers les eaux des [bluemountains|E], où il établit le port de Kheledûl sur les rives de la rivière Lhûn.\n\nLes [elves|E] du [GetTitleByKey('e_lindon').GetNameNoTier] y virent une folie, et nombre des nôtres la nommèrent démence. Pourtant en son temps, le commerce fleurit de la source du fleuve dans les Montagnes Bleues jusqu'à son embouchure dans le Golfe de Lune, et les Nains troquèrent librement avec leurs voisins Elfes et bien d'autres encore."
 ancestor_veneration.0117.a: "L'eau ne nous appartient pas à dompter. Que nos frères demeurent liés à la pierre."
 ancestor_veneration.0117.a.saruman: "L'eau ne fut jamais un élément proche des Nains."
 ancestor_veneration.0117.b: "Ce fut une noble quête, pour étrange qu'elle demeure."
 ancestor_veneration.0117.c: "Il avait raison ! La place d'un Nain est auprès de l'eau !"

 ancestor_veneration.0118.t: "Vénération des Ancêtres : Vighar le Marcheur-des-Routes"
 ancestor_veneration.0118.desc: "Le parchemin retrace les actes de [GetScriptedCharacterByHistoryID('linewili5').GetFirstNameNicknamedRegnal]. En un temps d'ombre et de trouble, quand [angmar|E] s'agitait dans le Nord et que les voyageurs parlaient de choses sombres dans [greenwood|E], il demeura sans se laisser détourner. Depuis son hall près de la [lonelymountain|E], il veillait non sur un trésor ni sur une place forte, mais sur la route elle-même. Ce chemin de longue forge reliant [khazaddum|E] aux [ironhills|E].\n\nConnue des [dwarves|E] sous le nom de Vieille Route de la Forêt, et [Glossary('Men-i-Naugrim','men_i_naugrim_gloss')] des [elves|E], elle était une artère vitale de parenté et de commerce à travers des contrées périlleuses. Là où d'autres ne voyaient que le danger, Vighar voyait le devoir. Il patrouillait ses étendues, rebâtissait ses pavés et gardait ses relais de route. Par la pénombre de la forêt et le col de montagne, il marchait non pour la gloire, mais pour le bien de tous les siens.\n\nBien que nombre de ses contemporains craignissent les ténèbres montantes, sa résolution ne fléchit point. Longtemps après que d'autres se furent repliés sur eux-mêmes pour thésauriser et se terrer, le Marcheur-des-Routes demeura - gardien indéfectible de l'antique piste."
 ancestor_veneration.0118.a: "Son dévouement et son labeur sont un exemple pour les autres."
 ancestor_veneration.0118.b: "Entretenir les routes ? Guère le comble de l'ambition naine."

 ancestor_veneration.0119.t: "Vénération des Ancêtres : Lóni, le Renégat"
 ancestor_veneration.0119.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID( 'lineofdurin641' ).GetFirstNameNicknamed], second fils de [GetScriptedCharacterByHistoryID( 'lineofdurin62' ).GetFirstNameRegnal], né sous une ombre bien avant d'en projeter une de son cru.\n\nÀ la mort de leur père, ce fut son frère aîné, [GetScriptedCharacterByHistoryID( 'lineofdurin64' ).GetFirstNameRegnal], qui hérita du manoir de [khazaddum|E]. Pourtant [GetScriptedCharacterByHistoryID( 'lineofdurin641' ).GetFirstName] était convaincu que le trône lui revenait - par le mérite, à défaut de la naissance - et son ambition ne pouvait souffrir pareil affront.\n\nIl agit promptement, et échoua tout aussi vite. Sa tentative de saisir le trône fit de ses frères de sang des ennemis. Exilé et déshonoré en compagnie de son complice [GetScriptedCharacterByHistoryID( 'lineurdak3' ).GetFirstName], il s'enfuit vers le nord, où il tailla sa propre place forte dans d'anciennes creusées depuis longtemps abandonnées, ruminant sa vengeance.\n\nSa seconde tentative de prise de pouvoir ne devait pas mieux finir, que ce soit par le fer ou la trahison, nul ne peut le dire. Pourtant son nom perdure, prononcé avec colère et respect mêlés. Car même un traître peut graver profondément son récit dans la pierre de la mémoire naine."
 ancestor_veneration.0119.a: "Sa ruse tourna à la folie. Que son nom soit un avertissement."
 ancestor_veneration.0119.b: "Sa fierté lui coûta tout, mais son ambition méritait estime."

 ancestor_veneration.0120.t: "Vénération des Ancêtres : Regin le Chevaucheur-de-Bouc"
 ancestor_veneration.0120.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofregin').GetFirstNameNicknamedRegnal] des [ironhills|E], dont l'audace juvénile le vit tenter de courtiser [GetScriptedCharacterByHistoryID('lineofbori35a').GetFirstNameRegnal], fille de la noblesse [longbeard|E] des Collines de Fer, dans les années tardives du [secondage|E]. Ses efforts lui apportèrent plus de tribulations que de triomphes, et son suzerain [GetScriptedCharacterByHistoryID('lineofnarin35').GetFirstNameRegnal], lassé de ses frasques, lui assigna pour tâche de ramener un bouc des pentes sauvages en guise de tribut.\n\nBalafré par de nombreuses tentatives infructueuses, Regin revint enfin non point avec un captif, mais juché sur un puissant bouc, prouesse jamais vue jusqu'alors. Impressionné, [GetScriptedCharacterByHistoryID('lineofnarin35').GetFirstName] le chargea alors de la mission d'enseigner à ses frères l'art de la domestication des boucs et des béliers, lui promettant d'autoriser le mariage avec l'élue de son cœur.\n\nDepuis ce jour, les béliers des Collines de Fer portèrent cavaliers et tirèrent des chars, leur puissance prêtant une vigueur nouvelle aux Longues-barbes. L'esprit de la défiance et de l'audace de Regin revit dans chaque charge tonnante."
 ancestor_veneration.0120.a: "Que le lien de chaque cavalier porte l'écho de l'intrépide esprit de Regin."
 ancestor_veneration.0120.b: "Que chaque charge de bélier honore le courage sauvage de Regin."
 ancestor_veneration.0120.c: "Même les voies de combat non conventionnelles peuvent mener à la victoire."

 ancestor_veneration.0121.t: "Vénération des Ancêtres : Thráin I"
 ancestor_veneration.0121.desc: "Le parchemin porte le nom de [GetScriptedCharacterByHistoryID('lineofdurin74').GetFirstNameRegnal], qui gouverna les [longbeards|E] après la chute de [khazaddum|E]. Quand [GetScriptedCharacterByHistoryID('lineofdurinVI').GetFirstNameRegnal] et son fils [GetScriptedCharacterByHistoryID('lineofdurin73').GetFirstNameRegnal] furent occis par le Fléau de Durin, éveillé de son long sommeil sous [GetTitleByKey('k_khazad_dum').GetNameNoTier] par les [dwarves|E], les Longues-barbes durent abandonner leur demeure antique. Thráin, alors âgé de quarante-sept ans, devint [king|E] des [durinsfolk|E] et guida son peuple vers l'est, loin des halls déchus de leurs pères.\n\nDurant de nombreuses années ils errèrent en exil, jusqu'à ce qu'en l'an 1999 du [thirdage|E] Thráin fondât un nouveau royaume sous la [lonelymountain|E]. Il y établit le Royaume sous la Montagne, et dans ses profondeurs fut découverte l'[arkenstone|E], plus tard connue comme le Cœur de la Montagne. Sous le règne de Thráin, [erebor|E] grandit en force et en prospérité, devenant à nouveau un centre de l'art et du commerce.\n\nThráin régna plus de deux siècles, le plus long de tout descendant connu de Durin hormis [GetScriptedCharacterByHistoryID('lineofdurinI').GetFirstNameNicknamed] lui-même. Pourtant le royaume qu'il avait fondé ne demeura pas longtemps le siège principal des [GetTitleByKey('k_durins_folk').GetNameNoTier], car son héritier [GetScriptedCharacterByHistoryID('lineofdurin75').GetFirstNameRegnal] déplaça par la suite son peuple vers les [greymountains|E], en quête de halls plus vastes et de veines de minerai plus riches."
 ancestor_veneration.0121.a: "Il guida les Longues-barbes à travers l'exil et l'épreuve."
 ancestor_veneration.0121.b: "Il orienta leurs nouveaux halls vers la prospérité."

 ancestor_veneration.0122.t: "Vénération des Ancêtres : Thorin I"
 ancestor_veneration.0122.desc: "Le parchemin porte le nom de [GetScriptedCharacterByHistoryID('lineofdurin75').GetFirstNameRegnal], qui devint [king|E] des [longbeards|E] en [ageTA|E] 2190, succédant à son père [GetScriptedCharacterByHistoryID('lineofdurin74').GetFirstNameRegnal]. Bien qu'[erebor|E] prospérât sous sa famille, Thorin apprit que d'autres [longbeards|E], dont des survivants de [khazaddum|E] non établis à Erebor et certains des [ironhills|E], s'étaient implantés dans les [greymountains|E], attirés par la promesse de riches minerais et de territoires encore inexplorés. Dans les années tardives du Troisième Âge, les contacts entre [GetTitleByKey('k_khazad_dum').GetNameNoTier] et [GetTitleByKey('k_iron_hills').GetNameNoTier] s'étaient grandement réduits, la Route Naine de la [mirkwood|E] s'étant dégradée au point de n'être plus sûre à parcourir.\n\nEn 2210 3.A., Thorin mena son peuple vers le nord depuis Erebor jusqu'aux Montagnes Grises, rejoignant ces frères dispersés. Là ils établirent des places fortes, explorèrent des terres indomptées et renouèrent la cohésion des [durinsfolk|E]. Sous la conduite de Thorin, les Longues-barbes grandirent en force et en nombre, et les relations avec les Collines de Fer furent pleinement rétablies."
 ancestor_veneration.0122.a: "Il réunit des frères dispersés, restaurant les liens parmi le Peuple de Durin."
 ancestor_veneration.0122.b: "Il reconquit des richesses perdues, assurant la prospérité après la chute de Khazad-dûm."

 ancestor_veneration.0123.t: "Vénération des Ancêtres : Grór"
 ancestor_veneration.0123.desc: "Le parchemin porte le nom de [GetScriptedCharacterByHistoryID('lineofdurin88').GetFirstNameRegnal], fils cadet du roi [GetScriptedCharacterByHistoryID('lineofdurin79').GetFirstNameRegnal], né en [ageTA|E] 2563 dans les [greymountains|E]. Tout au long de sa jeunesse, les [dwarves|E] y furent harcelés à répétition par des [dragons|El], et en 2589 son père et son frère [GetScriptedCharacterByHistoryID('lineofdurin80').GetFirstNameRegnal] furent occis par des drac-froids, parmi bien d'autres victimes de ces attaques, ce qui poussa la plupart des [durinsfolk|E] à abandonner les Montagnes Grises. Grór mena un fidèle contingent vers l'est, s'établissant parmi les Nains des [ironhills|E] dont il devint le souverain, tandis que son frère aîné [GetScriptedCharacterByHistoryID('lineofdurin81').GetFirstNameRegnal] régnait sur [erebor|E] comme héritier de Dáin I.\n\nLorsque Thrór fut par la suite chassé d'Erebor par Smaug, il refusa l'offre de refuge de Grór et s'en alla finalement vers [GetTitleByKey('k_khazad_dum').GetNameNoTier], où il fut occis par [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstNameNicknamed]. À cette nouvelle, Grór envoya une compagnie conduite par son fils [GetScriptedCharacterByHistoryID('lineofdurin89').GetFirstName] pour prêter son concours à la [warofdwarvesandorcs|E]. Náin tomba devant Azog comme Thrór l'avait fait avant lui, devant la Porte de l'Est de Moria, mais le petit-fils de Grór, [GetScriptedCharacterByHistoryID('lineofdurin90').GetFirstNameNicknamed], encore enfant au regard nain, les vengea tous deux en tuant Azog et assura la victoire pour les [longbeards|E]. Grór mourut peu après la fin de la Guerre des Nains et des Orques, laissant son royaume à son petit-fils Dáin, un royaume stable et un peuple fortifié par l'épreuve."
 ancestor_veneration.0123.a: "Son peuple, inébranlable, abattit ceux qui l'avaient provoqué."
 ancestor_veneration.0123.b: "Par l'unité et le dessein, les siens se tinrent ensemble face à leurs ennemis."

 ancestor_veneration.0124.t: "Vénération des Ancêtres : Frerin"
 ancestor_veneration.0124.desc: "Le parchemin porte le nom de [GetScriptedCharacterByHistoryID('lineofdurin84').GetFirstNameNicknamedRegnal] et frère cadet de [GetScriptedCharacterByHistoryID('lineofdurin83').GetFirstNameNicknamedRegnal]. Encore jeune, il se révéla un guerrier farouche durant la [warofdwarvesandorcs|E], campagne au cours de laquelle les [durinsfolk|E] nettoyèrent les places fortes [orcish|E] des [mistymountains|E], dont [gundabad|E]. La lutte culmina à la Bataille d'Azanulbizar, où les [orcs|E] furent enfin défaits à la suite de la mort d'[GetScriptedCharacterByHistoryID('lineofazog1').GetFirstNameNicknamed].\n\nLes Nains se réjouirent d'abord de leurs victoires et de la mort de nombre des fils d'Azog, l'un abattu par la hache de Frerin qui leur avaient longtemps causé deuil. Pourtant le prix fut terrible. Parmi les tombés se comptaient plusieurs membres de la Maison de [GetScriptedCharacterByHistoryID('lineofdurinI').GetDynasty.GetName] : Frerin lui-même, alors second dans l'ordre de succession au trône de Durin, [GetScriptedCharacterByHistoryID('lineofdurin89').GetFirstNameNicknamed], père de [GetScriptedCharacterByHistoryID('lineofdurin90').GetFirstNameNicknamed], et [GetScriptedCharacterByHistoryID('lineofdurin94').GetFirstName], père de [GetScriptedCharacterByHistoryID('lineofdurin95').GetFirstName] et de [GetScriptedCharacterByHistoryID('lineofdurin96').GetFirstName]. Les lourdes pertes contraignirent les [longbeards|E] à abandonner tout espoir de reconquérir [khazaddum|E], le Fléau de Durin demeurant sans défi. Si loin de leurs halls, les Nains ne pouvaient ensevelir leurs morts et durent les incinérer à la place. Du bain de sang naquit une querelle durable entre les Maisons de Durin et de [GetScriptedCharacterByHistoryID('linepreazog1').GetDynasty.GetName], forgée dans la vengeance et la mémoire."
 ancestor_veneration.0124.a: "Le Peuple de Durin tint ensemble, frères de sang et alliés unis."
 ancestor_veneration.0124.b: "Le Peuple de Durin combattit sans relâche face à une opposition écrasante."

 ancestor_veneration.0125.t: "Vénération des Ancêtres : Dáin II Piédéfer"
 ancestor_veneration.0125.desc: "Le parchemin porte le nom de [GetScriptedCharacterByHistoryID('lineofdurin90').GetFirstNameNicknamedRegnal], roi de courage, de loyauté et de résolution indomptable. Il s'illustra d'abord dans la [warofdwarvesandorcs|E], quand il vengea son père [GetScriptedCharacterByHistoryID('lineofdurin89').GetFirstName] en décapitant [GetScriptedCharacterByHistoryID('lineofazog1').GetFirstNameNicknamed] à Azanulbizar, alors qu'il n'était encore qu'un Nanillon. Lors de la [battle_of_the_five_armies|E], il marcha depuis les [ironhills|E] au secours de son cousin [GetScriptedCharacterByHistoryID('lineofdurin83').GetFirstNameNicknamedRegnal], défendant [erebor|E] aux côtés des [men|E] et des [elves|E]. À la chute de Thorin, Dáin devint Roi sous la Montagne.\n\nDes années plus tard, un émissaire [nazgul|E] de [sauroncharacter|E] offrit l'[Concept('sevenringsofdwarves', 'Anneau des Longues-barbes')|E] en échange de nouvelles concernant un [hobbit|E] et [Concept('onering', 'la plus infime des bagatelles')|E]. Dáin n'accepta ni ne refusa. Sa prudence accorda aux Peuples Libres le temps d'apprendre la vérité de l'affaire, et ses conseils envoyèrent [GetScriptedCharacterByHistoryID('lineofdurin100').GetFirstName] et [GetScriptedCharacterByHistoryID('lineofdurin99').GetFirstName] au Conseil d'[elrondshort|E], mettant en branle les événements qui devaient mener à la formation de la Communauté de l'Anneau.\n\nDans la Guerre du Val et d'Erebor, à l'âge de 253 ans, un âge auquel peu de Nains pouvaient encore porter les armes, et encore moins les manier au combat, Dáin mena la défense de la [lonelymountain|E]. Là il occit [GetScriptedCharacterByHistoryID('lineofhuz189').GetFirstName] des Orientais, alliés de Sauron, et mourut en protégeant son ami tombé [GetScriptedCharacterByHistoryID('lineofdale51').GetFirstName], roi de [GetTitleByKey('k_dale').GetNameNoTier], non sans avoir occis d'innombrables forces ennemies auparavant. Trois guerres l'avaient éprouvé, et en chacune il avait préservé la Lignée de [GetScriptedCharacterByHistoryID('lineofdurinI').GetDynasty.GetName] et les Peuples Libres. De son héritage naquit la prophétie que de la lignée de Dáin descendrait Durin VII, ultime réincarnation de [GetScriptedCharacterByHistoryID('lineofdurinI').GetFirstNameNicknamed] et futur roi des [longbeards|E]. [GetScriptedCharacterByHistoryID('lineofgandalf').GetFirstName] dit par la suite que la perte de Dáin fut parmi les plus grandes qu'aient jamais connues les Nains."
 ancestor_veneration.0125.a: "Sa clairvoyance mit en branle la chute du mal."
 ancestor_veneration.0125.b: "Son courage et sa puissance n'assurèrent rien d'autre que la victoire au combat."

 ancestor_veneration.0126.t: "Vénération des Ancêtres : Farin I"
 ancestor_veneration.0126.desc: "Le parchemin retrace les actes de [GetScriptedCharacterByHistoryID('lineofdurin3').GetFirstNameNicknamedRegnal] et petit-fils de [GetScriptedCharacterByHistoryID('lineofdurinI').GetFirstNameNicknamed]. Dans les premières années du [secondage|E], les [firebeards|E] et les [broadbeams|E] s'étaient établis à [khazaddum|E] dans les suites de la [warofwrath|E], à l'invitation de son père. Les halls regorgeaient de réfugiés et les provisions de nourriture et de richesses peinaient à répondre aux besoins accrus. Pour assurer l'avenir de la coexistence avec les fiers Barbes-de-Feu méfiants de l'aide des Longues-barbes, Farin épousa [GetScriptedCharacterByHistoryID('lineofuri5b').GetFirstName], sœur de [GetScriptedCharacterByHistoryID('lineofuri5').GetFirstName] de [GetTitleByKey('k_buzra_dum').GetNameNoTier] et de [GetScriptedCharacterByHistoryID('secondlineofuri1').GetFirstNameNicknamed].\n\nLes Longues-barbes étaient dispersés dans tout le Nord, de [GetTitleByKey('k_khazad_dum').GetNameNoTier] au cœur des [mistymountains|E] jusqu'à leurs halls septentrionaux de [gundabad|E], et vers l'est au-delà du [anduinvale|E] dans les [ironhills|E]. Pourtant leurs effectifs étaient moindres que les menaces qui pesaient sur eux. Les [orcs|E], autrefois commandés par [morgothcharacter|E] mais fuyant désormais la désolation d'[angband|E] sans chef unique, pillaient sans relâche. Sans général pour les guider, ces ennemis étaient cruels, sauvages et téméraires. Farin reconnut que la survie exigerait des alliances.\n\nIl rencontra alors [GetScriptedCharacterByHistoryID('lineofgundemar1').GetFirstNameNicknamedRegnal] des [GetCultureByKey('dwergwine').GetName], des [northmen|E] aux côtés desquels les Nains avaient vécu en paix, et ensemble ils forgèrent l'[allianceofdwarvesandmen|E], un accord d'aide mutuelle et de protection. Les [GetCultureByKey('dwergwine').GetCollectiveNoun] fourniraient nourriture et assistance en échange d'armes et d'artisanat nains. C'était un partenariat né de la nécessité, mais trempé par la clairvoyance et l'honneur. Dans ses liens, Nains et [men|E] trouvèrent un terrain commun, une alliance rare qui dura des siècles."
 ancestor_veneration.0126.a: "Par le labeur partagé, la parenté se forge."
 ancestor_veneration.0126.b: "Des alliés peuvent surgir des halls les plus inattendus."

 ancestor_veneration.0127.t: "Vénération des Ancêtres : Frerin I"
 ancestor_veneration.0127.desc: "Le parchemin retrace le règne de [GetScriptedCharacterByHistoryID('lineofdurin8').GetFirstNameNicknamedRegnal], père de [GetScriptedCharacterByHistoryID('lineofdurinII').GetFirstNameRegnal] et [king|E] des [longbeards|E] à [khazaddum|E]. Sous son règne, les creuseurs de [GetTitleByKey('k_khazad_dum').GetNameNoTier] mirent au jour les premiers grands filons de [metal_mithril|E] sous les [GetTitleByKey('c_great_mines').GetNameNoTier]. C'était un métal léger et souple, pourtant plus résistant que l'acier trempé, et qui semblait briller de l'intérieur. Bien que des traces en fussent connues depuis les jours de [GetScriptedCharacterByHistoryID('lineofdurinI').GetFirstNameNicknamed], jamais pareille abondance n'en avait été trouvée. Frerin décréta qu'il n'en serait rien troqué au-delà de leurs halls, le tenant pour un don de [mahalcharacter|E] à ouvrager seulement par les mains des siens.\n\nPourtant les nouvelles de cette merveille ne purent être contenues. On dit que les récits de ce métal prodigieux parvinrent jusqu'à [celebrimbor|E] de la [houseoffeanor|E], dont le désir de le contempler et d'en faire commerce attisa la fondation d'[eregion|E]. Même [GetScriptedCharacterByHistoryID('lineoforodreth4').GetFirstNameRegnal], Haut Roi des [noldor|E] à [lindon|E], aurait entendu ces récits - mais contrairement à [GetScriptedCharacterByHistoryID('lineoffeanor10').GetFirstNameRegnal], il n'agit point à la hâte. Bien qu'aucune ambassade elfe ne vînt du temps de Frerin, leur curiosité était éveillée, et dans des règnes ultérieurs pareille fascination s'épanouirait en amitié et en commerce."
 ancestor_veneration.0127.a: "Il creusa profond, et garda sagement sa découverte secrète."
 ancestor_veneration.0127.b: "Gardons nos trésors comme Frerin le fit jadis."

### FIREBEARDS ###

 ancestor_veneration.0210.t: "Vénération des Ancêtres : Telchar de Nogrod"
 ancestor_veneration.0210.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID( 'lineoftelchar1' ).GetFirstName], maître forgeron de [nogrod|E] et disciple de [GetScriptedCharacterByHistoryID( 'lineofgamilzirak' ).GetFirstNameNicknamed]. Parmi ses plus grandes œuvres se comptaient [angrist|E], un couteau qui tranchait le métal comme du bois vert, dont [GetScriptedCharacterByHistoryID( 'lineofbeor32' ).GetFirstName] se servit pour détacher un [silmaril|E] de la couronne de [morgothcharacter|E] ; [narsil|E], la légendaire épée que [GetScriptedCharacterByHistoryID( 'lineofelendil' ).GetFirstName] brandit plus tard contre [sauroncharacter|E] ; et le [dragon_helm_of_dor_lomin|E], forgé pour [GetScriptedCharacterByHistoryID( 'lineofdwalin5' ).GetFirstName], Seigneur de [belegost|E].\n\nAzaghâl offrit le heaume à [maedhros|E] quand le prince de la [houseoffeanor|E] le sauva d'une embuscade orque sur la Route Naine de [beleriand|E]. Cependant le heaume fut jugé trop lourd et trop grand pour un [elf|E]. Même les [men|E] le trouvaient trop massif, et seul [GetScriptedCharacterByHistoryID( 'lineofhador1' ).GetFirstName] et quelques-uns de ses descendants avaient la force de le porter.\n\nSes œuvres portaient le poids de la puissance, de l'histoire et de la légende tout ensemble. L'héritage de Telchar est de ceux qui commandent le souvenir et la révérence."
 ancestor_veneration.0210.a: "Telchar fut avant tout un artisan légendaire."
 ancestor_veneration.0210.b: "L'héritage de Telchar est d'abord et avant tout celui de grandes victoires."
 ancestor_veneration.0210.c: "Telchar comprit que la connaissance précède la maîtrise."

 ancestor_veneration.0211.t: "Vénération des Ancêtres : Naugladur"
 ancestor_veneration.0211.desc: "Le parchemin rappelle le souvenir de [GetScriptedCharacterByHistoryID('lineofuri3').GetFirstName] de [nogrod|E], un roi fier qui régna quand la cupidité transforma des frères de sang en briseurs de serment. Lorsqu'[elu_thingol|E] de [GetTitleByKey('k_doriath').GetNameNoTier] voulut voir le [nauglamir|E] reforgé avec un [silmaril|E], les [dwarves|E] qui l'avaient ouvré se soulevèrent contre lui. Le désirant pour eux-mêmes, ils affirmèrent que seul [GetScriptedCharacterByHistoryID('lineoffinarfin1').GetFirstNameNicknamed] en était digne. [GetScriptedCharacterByHistoryID('lineofelwe1').GetFirstName] sut qu'ils convoitaient le Silmaril et les rabroua :\n\n#help « Comment osez-vous, vous de la race rustique, exiger quoi que ce soit de moi, [GetScriptedCharacterByHistoryID('lineofelwe1').GetFirstName], Seigneur de [beleriand|E], dont la vie commença aux eaux de Cuiviénen, des années innombrables avant que les [Concept('dwarffathers','pères du peuple des Trapus')|E] ne s'éveillent ? »#!\n\nLes Nains tuèrent Thingol et s'emparèrent du trésor. Deux meurtriers s'échappèrent jusqu'à Nogrod, alléguant la trahison. Hors de lui, Naugladur marcha sur [GetTitleByKey('d_menegroth').GetNameNoTier], saccageant Doriath et pillant ses trésors, faisant fi des conseils de [GetScriptedCharacterByHistoryID('lineofdwalinII').GetFirstNameRegnal], qui avait averti du chagrin qui s'ensuivrait. Son triomphe fut de courte durée. Au Gué de Sarn, Naugladur fut pris en embuscade par des [men|E] et des [elves|E] de [greenwoodshort|E]. Tué par [GetScriptedCharacterByHistoryID('lineofbeor32').GetFirstName], il maudit le trésor de son dernier souffle. Il fut jeté dans la rivière Ascar, hormis le [Glossary('Nauglamír','nauglamir_gloss')], que Beren offrit à [GetScriptedCharacterByHistoryID('lineofelwe2').GetFirstName], qui le porta jusqu'à la fin de ses jours."
 ancestor_veneration.0211.a: "Qui cherche trop peut perdre tout ce qu'il chérit."
 ancestor_veneration.0211.b: "Les forts ont le droit de prendre ce qu'ils jugent digne."

 ancestor_veneration.0212.t: "Vénération des Ancêtres : Khathzâ, le Veilleur"
 ancestor_veneration.0212.desc: "Le parchemin évoque [GetScriptedCharacterByHistoryID('lineofkhathzaibriz1').GetFirstNameNicknamedRegnal], fondateur de la foi du [GetFaithByKey('faith_firebeards').GetName] et l'un des forgerons [dwarven|E] qui prirent la fuite après le meurtre d'[elu_thingol|E]. Il ne prit nulle part au meurtre, mais demeura à observer tandis que cela se déroulait - certains disent qu'il avait été comme enchanté par la lumière du [nauglamir|E]. Une fois parmi les siens, Khathzâ ne garda point le silence longtemps.\n\nIl parla souvent et avec conviction, affirmant que les Nains avaient été trahis, que [GetScriptedCharacterByHistoryID('lineofelwe1').GetFirstName] avait rompu foi le premier et méprisé leur espèce. Ses paroles, amères et inflexibles, attisèrent la colère parmi les [firebeards|E]. Quand son suzerain [GetScriptedCharacterByHistoryID('lineofuri3').GetFirstName] entendit son récit, il rassembla un ost et marcha sur [GetTitleByKey('d_menegroth').GetNameNoTier], déversant sa vengeance sur Doriath. Dans les jours qui suivirent la [warofwrath|E], Nogrod étant détruite, les Barbes-de-Feu se divisèrent. Khathzâ voyagea vers le sud avec [GetScriptedCharacterByHistoryID('lineofuri5').GetFirstNameRegnal], et ceux qui suivaient ses enseignements furent connus sous le nom de [Glossary('Mazalikân','mazalikan_gloss')]. D'autres, menés par le frère de Thrur, [GetScriptedCharacterByHistoryID('secondlineofuri1').GetFirstNameRegnal], choisirent de maintenir les voies anciennes et s'établirent à [khazaddum|E].\n\nL'héritage de Khathzâ demeure : une méfiance profonde envers les [elves|E] et les étrangers, une foi en l'autosuffisance, et une identité Barbe-de-Feu fière, pour fracturée qu'elle soit."
 ancestor_veneration.0212.a: "Sa constance poussa bien des siens à remettre en question les anciens liens et à chercher une nouvelle voie."
 ancestor_veneration.0212.b: "Khathzâ avait raison, les étrangers ne peuvent être dignes de confiance !"

 ancestor_veneration.0213.t: "Vénération des Ancêtres : Thrur I"
 ancestor_veneration.0213.desc: "Le parchemin rappelle le souvenir de [GetScriptedCharacterByHistoryID('lineofuri5').GetFirstNameRegnal], père de [GetScriptedCharacterByHistoryID('lineofuriII').GetFirstNameRegnal], qui gouverna les [firebeards|E] quand la [warofwrath|E] porta la ruine sur [nogrod|E]. En ces années, Thrur s'attacha fermement aux enseignements de [GetScriptedCharacterByHistoryID('lineofkhathzaibriz1').GetFirstNameNicknamed] après la mort de [GetScriptedCharacterByHistoryID('lineofuri3').GetFirstName] dans la querelle autour du [nauglamir|E], et il ne faisait confiance à nul conseil venant d'au-delà des siens. Thrur, comme les autres [GetFaithByKey('faith_firebeards').GetAdherentNamePlural], croyait que son peuple avait été lésé et devait s'en remettre à lui seul. Ainsi, quand [GetScriptedCharacterByHistoryID('lineofdurin2').GetFirstNameRegnal] fils de [GetScriptedCharacterByHistoryID('lineofdurinI').GetFirstNameNicknamed] offrit refuge à [khazaddum|E] après la chute de [GetTitleByKey('k_nogrod').GetNameNoTier], Thrur refusa ce secours.\n\nTandis que son frère [GetScriptedCharacterByHistoryID('secondlineofuri1').GetFirstNameNicknamed] et la moitié des Barbes-de-Feu acceptèrent le toit des [longbeards|E], Thrur ne put se résoudre à placer les siens sous le toit d'un autre clan. Il mena les autres vers le sud pour tailler [GetTitleByKey('k_buzra_dum').GetNameNoTier] dans les [bluemountains|E], un royaume solide et fier, bien que jamais l'égal de Nogrod. Thrur entreprit également la construction de [GetBuilding('wonder_ursel_zabad').GetName], qui ne serait achevée que sous le règne d'Úri II.\n\nEn ses années tardives, il noua une amitié improbable avec [GetScriptedCharacterByHistoryID('lineofdwalin7').GetFirstName], frère de [GetScriptedCharacterByHistoryID('lineofdwalinII').GetFirstNameRegnal], l'un des rares non-Barbes-de-Feu à embrasser la foi du [GetFaithByKey('faith_firebeards').GetName]. En définitive, son règne insuffla cet esprit d'autosuffisance qui allait façonner les premiers jours de Buzrâ-dûm."
 ancestor_veneration.0213.a: "Un peuple endure en se tenant fermement aux siens."
 ancestor_veneration.0213.b: "Même les amis peuvent dissimuler leurs intentions."

### BROADBEAMS ###

 ancestor_veneration.0310.t: "Vénération des Ancêtres : Azaghâl de Belegost"
 ancestor_veneration.0310.desc: "L'antique parchemin usé par le temps détaille les actes valeureux de [GetScriptedCharacterByHistoryID( 'lineofdwalin5' ).GetFirstName], Seigneur de [belegost|E] et père de [GetScriptedCharacterByHistoryID( 'lineofdwalinII' ).GetFirstNameRegnal] et de [GetScriptedCharacterByHistoryID( 'lineofdwalin7' ).GetFirstNameRegnal]. Illustre parmi les [broadbeams|E], son amitié avec les [noldor|E] approfondit sa dévotion envers [mahalcharacter|E], tenu par les Noldor pour un ami proche et un maître. Leur vénération de [yavannacharactershort|E] poussa certains des Larges-Épaules à commencer de suivre le [GetFaithByKey('faith_broadbeams').GetName], une foi mettant l'accent sur la révérence envers tous les dons de la terre. Azaghâl forja une alliance avec [maedhros|E] de la [houseoffeanor|E], après que le prince elfe l'eut sauvé d'une embuscade orque sur la Route Naine de [beleriand|E]. En témoignage de sa gratitude, Azaghâl lui offrit le [dragon_helm_of_dor_lomin|E], un chef-d'œuvre forgé par [GetScriptedCharacterByHistoryID( 'lineoftelchar1' ).GetFirstName] de [nogrod|E].\n\nLe récit s'achève sur la [Glossary('Nirnaeth Arnoediad','nirnaeth_arnoediad_gloss')], où Azaghâl et ses guerriers tinrent tête au terrible [dragon|E] Glaurung. Bien que renversé dans l'affrontement, Azaghâl, de son dernier souffle, plongea un couteau dans le ventre de Glaurung, le blessant gravement et forçant le dragon et sa couvée à se replier vers [angband|E]. Les Nains emportèrent le corps d'Azaghâl, chantant une profonde complainte tandis qu'ils avançaient en procession solennelle, et nul n'osa les attaquer."
 ancestor_veneration.0310.a: "La vaillance d'Azaghâl inspirera nos propres actes."
 ancestor_veneration.0310.b: "Comme lui forgea des liens, nous en forgerons aussi."
 ancestor_veneration.0310.c: "Azaghâl se dressa haut en son temps. Je me dresserai plus haut encore dans le mien."

 ancestor_veneration.0311.t: "Vénération des Ancêtres : Bodruith"
 ancestor_veneration.0311.desc: "Le parchemin retrace l'histoire de [GetScriptedCharacterByHistoryID('lineofdwalin7').GetFirstName], fils cadet de [GetScriptedCharacterByHistoryID('lineofdwalin5').GetFirstName] de [belegost|E] et frère puîné de [GetScriptedCharacterByHistoryID('lineofdwalinII').GetFirstNameRegnal]. Dans sa jeunesse, il passa de nombreuses années dans le royaume [firebeard|E] de [nogrod|E], resserrant les liens entre les clans-frères. On dit qu'il était tenu pour un ami proche du Roi [GetScriptedCharacterByHistoryID('lineofuri3').GetFirstNameRegnal]. Ainsi, quand survint l'incident du [nauglamir|E] et que [GetScriptedCharacterByHistoryID('lineofelwe1').GetFirstNameNicknamedRegnal] fut occis, il poussa ardemment son frère et souverain à rejoindre les forces de Nogrod et à marcher sur [GetTitleByKey('k_doriath').GetNameNoTier].\n\nMais Dwálin ne se laissait pas aisément entraîner à la guerre, il percevait la tragédie qui se profilait. Belegost pressa Nogrod de faire preuve de retenue, et cependant Naugladur marcha sur Doriath, pour être tué dans une embuscade peu après. Ces événements creusèrent un fossé entre les deux frères : l'impétueux et fougueux Bodruith d'un côté, le solennel et réservé Dwálin de l'autre, et avec le temps Bodruith en vint à embrasser les voies des [GetFaithByKey('faith_broadbeams').GetAdherentNamePlural].\n\nAprès que Dwálin II eut choisi de mener la majeure partie de son peuple à [khazaddum|E], Bodruith opta pour demeurer dans les [bluemountains|E] auprès de son jeune neveu [GetScriptedCharacterByHistoryID('secondlineofdwalin1').GetFirstNameRegnal]. On dit qu'il fut l'un des rares [broadbeams|E] encore accueillis par [GetScriptedCharacterByHistoryID('lineofuri5').GetFirstNameRegnal] dans le royaume de [GetTitleByKey('k_buzra_dum').GetNameNoTier], fondé après la [warofwrath|E]."
 ancestor_veneration.0311.a: "Il œuvra à préserver les liens essentiels entre les clans-frères."
 ancestor_veneration.0311.b: "Il exhorta les siens à combattre pour ce qu'il croyait juste."

 ancestor_veneration.0312.t: "Vénération des Ancêtres : $Skorgr_im$ Maindure"
 ancestor_veneration.0312.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofdourhand17').GetFirstNameRegnal], né d'une noblesse mineure des [broadbeam|E], mais dévoré d'une avidité bien plus grande que son rang de naissance ne lui permettait.\n\nDans sa jeunesse, il chercha à reprendre [nogrod|E], ralliant sous sa bannière les désespérés et les téméraires. Pourtant les salles de [GetTitleByKey('k_nogrod').GetNameNoTier] n'offraient ni or ni gloire, et les murmures des siens se muèrent bientôt en mépris. Le cœur de $Skorgr_im$ s'aigrit, et il prêta l'oreille quand [GetScriptedCharacterByHistoryID('nazgul1').GetFirstNameNicknamedRegnal] lui commanda d'apporter les [dwarvenrings|E] des [bluemountains|E].\n\nPour gagner les faveurs de son maître, il trahit non pas un mais deux rois : [GetScriptedCharacterByHistoryID('lineofdwalinV').GetFirstNameRegnal], abattu sous un faux prétexte de paix, et [GetScriptedCharacterByHistoryID('lineofuri67').GetFirstNameRegnal], assassiné en conseil secret. Les deux anneaux ancestraux en main, il prit la fuite vers [angmar|E], guignant sa récompense promise - le lieu d'éveil de [durin|E] : [gundabad|E].\n\nMais la promesse du Roi-Sorcier n'était que trahison pure. $Skorgr_im$ et les quelques fidèles qui lui restaient furent abattus, mettant un terme à son ambition insatiable."
 ancestor_veneration.0312.a: "La vraie grandeur se mérite, elle ne se dérobe point."
 ancestor_veneration.0312.b: "Bien que ses plans aient échoué, sa ruse a infléchi le cours de l'histoire."

 ancestor_veneration.0313.t: "Vénération des Ancêtres : Eldran Iᵉʳ, le Premier Barbe-Grise"
 ancestor_veneration.0313.desc: "Le parchemin honore [GetScriptedCharacterByHistoryID('lineofeldran1').GetFirstNameNicknamedRegnal], vénéré fondateur des Barbes-Grises, qui voyagea à travers pierre et neige pour gravir [GetTitleByKey('d_mount_dolmed').GetNameNoTier], sous lequel [uriscarred|E] des [firebeards|E] et [dwalinwise|E] des [broadbeams|E] furent pour la première fois éveillés en [Glossary('Zelemabkân','zelemabkan_gloss')] par la main de [mahalcharacter|E].\n\nCe fut [GetScriptedCharacterByHistoryID('lineofeldran1').GetFirstName] qui, au cours du [secondage|E], porta le premier la main à la pierre pour élever un monastère au faîte du Mont Dolmed, consacrant la montagne comme demeure de ceux qui ont maîtrisé l'art du Chant-de-Pierre.\n\nEn l'honneur des [dwarffathers|E], Eldran convoqua les premiers Barbes-Grises au Mont Dolmed, taillant mille marches afin que les pèlerins pussent y monter dans l'humilité. Là, la pierre résonne encore des chants sacrés enseignés par Mahal."
 ancestor_veneration.0313.a: "Un jour, nous foulerons les mille marches en sa mémoire."
 ancestor_veneration.0313.a.saruman: "Préserver la sagesse et le savoir est le devoir de tout sage."
 ancestor_veneration.0313.b: "La maîtrise des armes, chèrement acquise, peut s'avérer aussi précieuse que tout savoir."

### IRONFISTS ###

 ancestor_veneration.0410.t: "Vénération des Ancêtres : Ôrn l'Avare"
 ancestor_veneration.0410.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofsindri102').GetFirstNameNicknamedRegnal], dont la cupidité faillit briser les [ironfists|E]. Après l'[akallabeth|E], la ruine s'abattit sur [GetTitleByKey('k_kheled_nala').GetNameNoTier]. [GetScriptedCharacterByHistoryID('lineofsindri100').GetFirstNameRegnal] fut écrasé sous les décombres, les coffres intacts mais vulnérables, et les [ironfists|E] se dispersèrent, beaucoup demeurant dans les plaines de [rhun|E]. Des cendres s'éleva son fils Ôrn, un prince de cupidité et de perfidie. Pour rebâtir, il passa un accord avec [sauroncharacter|E], troquant des guerriers contre du [metal_mithril|E] et de l'or. Tandis qu'il menait ses fidèles à la guerre, il laissa derrière lui son fils [GetScriptedCharacterByHistoryID('lineofsindri104').GetFirstName] sous le prétexte d'une mission commerciale vers [rhun|E]. Ainsi commença la [treacheryoforn|E]. On dit qu'en découvrant la duplicité des [ironfists|E], [GetScriptedCharacterByHistoryID('lineofdurinIV').GetFirstNameRegnal] maudit les descendants d'Ôrn, déclarant que leur [dwarffather|E], [sindri|E], ne marcherait plus parmi les [ironfists|E] aussi longtemps que leur lignée durerait.\n\nDans l'Ered Harmal, les [ironfists|E] établirent [GetScriptedCharacterByHistoryID('lineofsindri52').GetFirstNameRegnal], descendant de [GetScriptedCharacterByHistoryID('lineofsindri37').GetFirstNameNicknamedRegnal], comme nouveau souverain - lequel fonda [GetTitleByKey('k_namagaluz').GetNameNoTier], où les [ironfists|E] recommencèrent de zéro. Buldin, portant le [Concept('sevenringsofdwarves','Anneau des Poings-de-Fer')|E], fut exilé avec ses fidèles et prit la fuite vers le nord-ouest, jusqu'à la lointaine colonie minière de [GetTitleByKey('k_nurunkizdin').GetNameNoTier]. Là ils chassèrent les nobles des [ironfists|E] qui s'y étaient établis, se taillant un refuge amer. En son temps, un [dragon|El] fondit sur Nurunkhizdín, attiré par les récits de trésors. Il dévora le bastion et son peuple, menant à la ruine de la lignée d'Ôrn et à la destruction de l'Anneau des Poings-de-Fer."
 ancestor_veneration.0410.a: "Son destin nous avertit : nulle pièce ne rachète une âme vendue aux ténèbres."
 ancestor_veneration.0410.b: "Que la mémoire nous préserve du chemin que son orgueil a pavé."

 ancestor_veneration.0411.t: "Vénération des Ancêtres : Thrîs, la Pacificatrice"
 ancestor_veneration.0411.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofsindri0csister').GetFirstNameNicknamedRegnal], née dans la lignée de [sindri|E] à [GetTitleByKey('k_gamil_nala').GetNameNoTier]. Sous le règne de son père [GetScriptedCharacterByHistoryID('lineofsindri0a').GetFirstNameRegnal], les [ironfists|E] prospéraient, mais la fortune engendra la présomption. Quand les autres clans s'approchèrent des secrets du fer, son frère [GetScriptedCharacterByHistoryID('lineofsindri0c').GetFirstNameRegnal] rompit les accords anciens et s'empara de la place forte riche en fer de [GetTitleByKey('d_kheled_dum').GetNameNoTier] sur son détenteur [stiffbeard|E] [GetScriptedCharacterByHistoryID('lineofthulin0cbrother').GetFirstNameRegnal]. En réponse, les Barbes-Raides, les [blacklocks|E] et les [stonefoots|E] formèrent une ligue, coupèrent le commerce et percèrent eux-mêmes les secrets. Quand les Poings-de-Fer exigèrent la reprise du commerce ou menacèrent la guerre, la ligue réclama réparation.\n\nAinsi commença la [warofiron|E]. Les Poings-de-Fer furent finalement sévèrement défaits, ayant grandement sous-estimé leur opposition, et la plupart furent exilés vers l'Ered Harmal, ses trois frères périrent tous dans la guerre. Cela la laissa à la tête de ce qui restait de leur peuple, et son avènement marqua un moment sans précédent : la première Reine [dwarven|E] dont on garde mémoire. Longtemps opposée à la guerre, elle fit la paix avec les trois autres clans de l'est, acte que les Poings-de-Fer exilés vécurent comme un déshonneur. À sa mort, son fils [GetScriptedCharacterByHistoryID('lineofdhrim1').GetFirstNameNicknamedRegnal], qui n'était point de la lignée de Sindri, lui succéda. Dans les années qui suivirent, le siège royal des Poings-de-Fer passa à l'exilé [GetScriptedCharacterByHistoryID('lineofsindri0e').GetFirstNameNicknamedRegnal], qui fonda [GetTitleByKey('k_kheled_nala').GetNameNoTier] avec nombre des autres exilés."
 ancestor_veneration.0411.a: "Son règne prouva que la paix, pour amère qu'elle soit, peut renouer ce que la fierté a brisé."
 ancestor_veneration.0411.b: "De son chagrin nous pouvons apprendre ce que l'orgueil était incapable d'enseigner."

 ancestor_veneration.0412.t: "Vénération des Ancêtres : Tahm"
 ancestor_veneration.0412.desc: "Le parchemin retrace la vie de [GetScriptedCharacterByHistoryID('lineoftahm').GetFirstName], artisan [ironfist|E]. Dans les années qui suivirent la [warlastalliance|E], quand bien des Poings-de-Fer, dispersés par la ruine de leurs places fortes, cherchèrent du labeur parmi les [conceptracemen|E], Tahm se comptait parmi eux. Son errance le porta jusqu'à [khy|E], où [GetScriptedCharacterByHistoryID('lineofmythra').GetFirstName], dont on se souvient à la fois comme reine et déesse, avait depuis longtemps cherché une couronne qui lui donnât satisfaction. Bien des artisans essayèrent, et nul n'y réussit. Tahm se présenta à sa cour, proclamant qu'il surpasserait les faiseurs des Hommes, et cependant il échoua pendant bien des années.\n\nAprès sept années de tentatives infructueuses, Tahm entra en possession d'une émeraude d'une qualité rarissime. Avec elle il façonna un simple diadème d'or et d'argent, la pierre enchâssée à son front. Quand la reine le reçut, elle en fut enfin satisfaite, et les témoins jurèrent que l'émeraude dégageait une faible lumière. Après sa mort, ou sa supposée ascension, le diadème s'obscurcit et ne brilla plus jamais. Tahm demeura à son service pour le reste de son règne, forgeant maints joyaux, lames et ornements qui devinrent des héritages du Khy d'antan. Après la disparition de la reine, il repartit, et son sort demeure inconnu. Ses œuvres passèrent de main en main dans les années qui suivirent, beaucoup se perdirent, bien que des fragments apparaissent encore dans de vieux récits.\n\nCertains comptes le louent comme un artisan de rare maîtrise dont l'œuvre perdurait au-delà de sa vie. D'autres notent que sa quête de gloire le porta vers une entreprise que beaucoup jugeaient trop proche du domaine du divin."
 ancestor_veneration.0412.a: "Son œuvre montre comment la maîtrise peut élever un nom au-delà de son temps."
 ancestor_veneration.0412.b: "Son histoire avertit que l'orgueil dans l'art peut conduire un homme au-delà des limites qui lui sont dues."

### STIFFBEARDS ###

 ancestor_veneration.0510.t: "Vénération des Ancêtres : Hevdrok, le Héros"
 ancestor_veneration.0510.desc: "Ce parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofhevdrok').GetFirstNameNicknamedRegnal], illustre parmi les [stiffbeards|E] des [redmountains|E]. C'était au [secondage|E], peu après la [waroftheelvesandsauron|E], quand les Barbes-Raides entrèrent en possession d'un [ringofpower|E]. Comme les richesses d'argent de [kibilzahar|E], la demeure des Barbes-Raides, venaient d'être mises au jour, leur royaume attira l'attention de grands [dragons|El] des contrées sauvages. Nul ne se révéla aussi redoutable que Veznarûkh, la Flamme de la Ruine, à demi aveugle d'une blessure de flèche.\n\nDurant l'un des assauts de Veznarûkh, [GetScriptedCharacterByHistoryID('lineofhevdrok').GetFirstName] lui tint tête. S'il n'était point seul, son courage se distinguait de tous les autres. Tandis que ses compagnons décochaient des flèches incapables de percer l'écaille, il escalada une forteresse en ruine et frappa profondément dans l'aile de la bête. Le dragon tomba, arrachant le bras de Hevdrok et le précipitant dans les décombres. Pourtant Hevdrok se releva. La bête à demi aveugle railla le bras manquant de Hevdrok, ignorant la hache qu'il brandissait encore, jusqu'à ce que Hevdrok lui fende le crâne avant de succomber.\n\nLes siens le portèrent jusqu'à [Glossary('Kibiltumun','kibiltumun_gloss')] sous [GetTitleByKey('k_kibilzahar').GetNameNoTier], le seul lieu depuis lequel les Barbes-Raides croient que [mahalcharacter|E] guide leurs morts vers les Halles au-delà. Là il fut mis en terre avec les honneurs d'un Roi, symbole de défi et de dévotion envers l'antique demeure des Barbes-Raides."
 ancestor_veneration.0510.a: "C'est dans la vaillance et la force que naissent les vraies légendes."
 ancestor_veneration.0510.b: "Il frappa là où les autres ne le voyaient pas venir."

### BLACKLOCKS ###

 ancestor_veneration.0610.t: "Vénération des Ancêtres : Rôn, l'Exilé"
 ancestor_veneration.0610.desc: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofbarukodlig1').GetFirstNameNicknamedRegnal], lointain rejeton de la seconde lignée de [thrar|E] et chef des Exilés de [GetTitleByKey('k_nargubraz').GetNameNoTier] durant la [warofthelie|E]. Pendant des décennies, la corruption se répandit tandis que le roi [GetScriptedCharacterByHistoryID('secondlineofthrar73').GetFirstNameRegnal] et ses fils cadets tombèrent sous l'ombre de [sauroncharacter|E], tandis que le fils aîné [GetScriptedCharacterByHistoryID('secondlineofthrar75').GetFirstNameRegnal] résistait. Après la mort de Bhormûl en [ageTA|E] 2440, Bohûr régna brièvement avant d'être occis par ses frères, allumant la guerre civile.\n\nRôn mena hors d'exil vers [GetTitleByKey('e_bizaruldum').GetNameNoTier] ceux qui n'étaient pas fidèles à Sauron, forgeant un ost de guerre lié par la vengeance. Nargubraz, allié à Ruartar, mena une guerre sans relâche jusqu'à ce que le Magicien Blanc [sarumancharacter|E] unît les forces dispersées vers la fin du conflit. Aux côtés des souverains [stonefoot|E] et des [blacklocks|E] de Bizarûldûm, des Exilés de Nargubraz et des [men|E] de Lôkhas Drûs, la coalition de Saruman vainquit le proxy de l'ombre en 3.A. 2459. Sauron s'enfuit, la première incarnation de Ruartar s'effondra, et Nargubraz fut scellée.\n\nAu terme du conflit, Rôn devint le premier Seigneur des [axesofnargubraz|E]. Son héritage perdure par une résolution inébranlable et une noble lignée, puisque [GetScriptedCharacterByHistoryID('lineofbarukodlig3').GetFirstNameNicknamedRegnal] épousa [GetScriptedCharacterByHistoryID('secondlineofthrar77').GetFirstNameNicknamedRegnal], unissant les prétentions et renforçant leur droit à gouverner."
 ancestor_veneration.0610.desc.saruman: "Le parchemin conte l'histoire de [GetScriptedCharacterByHistoryID('lineofbarukodlig1').GetFirstNameNicknamedRegnal], lointain rejeton de la seconde lignée de [thrar|E] et chef des Exilés de [GetTitleByKey('k_nargubraz').GetNameNoTier] durant la [warofthelie|E]. Je me souviens fort bien d'avoir rencontré ses partisans exilés lors de mes voyages vers l'Est de la [middleearth|E], et longuement j'œuvrai à unir les [dwarves|E] qui avaient fui [GetTitleByKey('e_bizaruldum').GetNameNoTier] quand [sauroncharacter|E] était parvenu à s'insinuer dans le cœur de son roi, [GetScriptedCharacterByHistoryID('secondlineofthrar73').GetFirstNameRegnal].\n\nAux côtés des souverains [stonefoot|E] et des [blacklocks|E] de Bizarûldûm, des Exilés de Nargubraz et des [men|E] de Lôkhas Drûs, ma coalition vainquit le proxy de l'ombre en 3.A. 2459. Sauron s'enfuit, la première incarnation de Ruartar s'effondra, et Nargubraz fut scellée.\n\nAu terme du conflit, Rôn devint le premier Seigneur des [axesofnargubraz|E]. Son héritage perdure par une résolution inébranlable et une noble lignée, puisque [GetScriptedCharacterByHistoryID('lineofbarukodlig3').GetFirstNameNicknamedRegnal] épousa [GetScriptedCharacterByHistoryID('secondlineofthrar77').GetFirstNameNicknamedRegnal], unissant les prétentions et renforçant leur droit à gouverner."
 ancestor_veneration.0610.a: "La hache se souvient quand le sang oublie."
 ancestor_veneration.0610.a.saruman: "Depuis lors, les Haches de Nargubraz sont de jurés ennemis de Sauron."
 ancestor_veneration.0610.b: "Tous ceux qui avaient dévié n'étaient pas au-delà de la rédemption."

 ancestor_veneration.0611.t: "Vénération des Ancêtres : Gorovôd, le Tueur-de-Gobelins"
 ancestor_veneration.0611.desc: "Le parchemin retrace le sombre récit de [GetScriptedCharacterByHistoryID('lineofgorovod3').GetFirstNameNicknamedRegnal], guerrier implacable des [blacklocks|E] qui combattit sous les ordres de [GetScriptedCharacterByHistoryID('lineofthrarIII').GetFirstNameNicknamedRegnal]. Sa haine des [goblins|E] ne naquit point sur le champ de bataille, mais dans l'enfance, quand il regarda impuissant les ravisseurs emporter la vie de sa sœur [GetScriptedCharacterByHistoryID('lineofgorovod4').GetFirstNameRegnal] lors d'un raid aux abords des marches septentrionales. Gorovôd avait toujours été réservé dans sa jeunesse, mais à compter de ce jour il vécut pour la vengeance et refusa de jamais ôter son heaume. Il rejoignit les campagnes de Thrár non pour l'honneur ni pour l'or, mais pour voir couler le sang gobelin.\n\nQuand les armées de [GetTitleByKey('e_bizaruldum').GetNameNoTier] rentrèrent au bercail, Gorovôd, lui, n'y retourna pas. Il s'attarda dans les profondeurs du nord, chassant les bandes de guerre et gardant des cols abandonnés bien après que le royaume s'en fut retiré. Quand la fausse nouvelle lui parvint que Thrár était tombé, sa fureur se ralluma, et il disparut dans le noir à la poursuite des derniers échos de la guerre.\n\nLors de son ultime combat, cerné de toutes parts et mutilé dans les tunnels inférieurs, il ordonna à ses compagnons de faire s'effondrer le passage derrière lui. Seul, il tint la ligne jusqu'à ce que l'éboulement scelle son destin. Nulle tombe ne porte son nom, mais dans les profondeurs où rôdent les Gobelins, sa légende demeure un avertissement."
 ancestor_veneration.0611.a: "Certains héritages sont gravés dans le sang, non dans la pierre."
 ancestor_veneration.0611.b: "Sa fureur acheta la paix là où nul n'avait osé la chercher."

### STONEFOOTS ###

 ancestor_veneration.0710.t: "Vénération des Ancêtres : Zabad, le Joaillier"
 ancestor_veneration.0710.desc: "Le parchemin évoque [GetScriptedCharacterByHistoryID('lineofzabad').GetFirstNameNicknamedRegnal] des [stonefoots|E], qui en [yearofthetreesage|E], sous le règne de [bavorcold|E], aux premiers jours de [GetTitleByKey('k_baraz_lagil').GetNameNoTier], fonda la Guilde des Joailliers et façonna des parures d'une beauté sans égale. Là où les [ironfists|E] s'étaient enrichis par la maîtrise du fer forgé, les Pieds-de-Pierre gagnèrent richesse et renom par l'art de la joaillerie. Les œuvres de Zabad, réputées pour leur éclat somptueux, étaient prisées non seulement des siens, mais aussi des autres Peuples Libres.\n\nZabad rompit avec bien des coutumes [dwarven|E] dans sa quête de l'art. Sous sa conduite, les Pieds-de-Pierre devinrent les partenaires de prédilection du roi [elven|E] [GetScriptedCharacterByHistoryID('lineofnurwe2').GetFirstName] des [hisildi|E], qui troquait de fins ouvrages de bois et d'autres biens de la surface contre des trésors des Pieds-de-Pierre. Ce commerce fit entrer dans leurs mains de rares pigments et teintures, amorçant une expansion de leurs talents vers les arts de la fresque et de la peinture, une maîtrise désormais rivale de leur art de la gemme.\n\nBien que son savoir et son art eussent apporté grande richesse aux siens, le plus grand héritage de Zabad est l'esprit d'artisanat que les Pieds-de-Pierre portent avec fierté jusqu'à ce jour."
 ancestor_veneration.0710.a: "Que mes mains honorent sa mémoire dans l'art."
 ancestor_veneration.0710.b: "Ses trésors ne seront point oubliés."

 ancestor_veneration.0711.t: "Vénération des Ancêtres : Bhofôr, le Maître-Pont"
 ancestor_veneration.0711.desc: "Le parchemin honore [GetScriptedCharacterByHistoryID('lineofbhofor').GetFirstNameNicknamedRegnal], maître bâtisseur dont les ouvrages s'élevèrent en des temps de changement. Bien que le royaume de [GetTitleByKey('e_bizaruldum').GetNameNoTier] eût été fondé dans l'unité par [GetScriptedCharacterByHistoryID('lineofthrarII').GetFirstNameNicknamedRegnal] et [GetScriptedCharacterByHistoryID('lineofbavorII').GetFirstNameNicknamedRegnal], le royaume était partagé entre leurs peuples. Les [bavorsfolk|E] régnaient sur le Royaume-du-Nord, les [thrarsfolk|E] sur le Royaume-du-Sud, et ils s'alliaient souvent par mariage pour renforcer leurs liens.\n\nAlors même que les Boucles-Noires se fracturaient, les fils de Thrár II régnaient séparément : l'un demeura à Bizarûldûm, un autre fonda [GetTitleByKey('k_mablad_dum').GetNameNoTier] dans les lointaines [yellowmountains|E]. Pendant ce temps, le royaume de [GetTitleByKey('k_nargubraz').GetNameNoTier] tenait encore fermement sous les descendants de [GetScriptedCharacterByHistoryID('secondlineofthrar1').GetFirstNameNicknamedRegnal]. En ce temps de séparation, un ouvrage d'unité fut entrepris. Sur la commande de [GetScriptedCharacterByHistoryID('lineofthrar21').GetFirstNameRegnal] et de [GetScriptedCharacterByHistoryID('lineofbavor16').GetFirstNameRegnal], Bhofôr et des maçons des [blacklocks|E] et des [stonefoots|E] élevèrent le Pont de l'Unité au-dessus du fleuve central de Bizarûldûm, reliant ses deux capitales jumelles de [GetTitleByKey('k_tumunamahal').GetNameNoTier] et de [GetTitleByKey('k_khazad_madur').GetNameNoTier].\n\nUn grand festival s'éleva pour marquer l'union, célébré de génération en génération. La grande cité de Thisûle surgit au point médian du Pont, là où le Nord et le Sud se rejoignaient. Là, dans son grand hall, un conseil uni de Boucles-Noires et de Pieds-de-Pierre se réunissait souvent pour délibérer des affaires du royaume."
 ancestor_veneration.0711.a: "La pierre peut s'user, mais la fraternité perdure."
 ancestor_veneration.0711.b: "Que notre prochain ouvrage s'élève avec autant de fierté que le pont de Bhofôr."

 ancestor_veneration.0712.t: "Vénération des Ancêtres : Shisên, le Goûteur"
 ancestor_veneration.0712.desc: "Le parchemin rappelle le souvenir de [GetScriptedCharacterByHistoryID('lineofshisen').GetFirstNameNicknamedRegnal], dont la vie s'étala sur les premières années du [thirdage|E]. Après que la mort de [GetScriptedCharacterByHistoryID('lineofthrarIV').GetFirstNameNicknamedRegnal] eut mis fin à la lignée [blacklock|E] à [GetTitleByKey('e_bizaruldum').GetNameNoTier], laissant les [stonefoots|E] assumer la conduite à leur place. Les Pieds-de-Pierre régnèrent avec constance, bien que leur regard se fût tourné vers l'intérieur. Pourtant leur [king|E], [GetScriptedCharacterByHistoryID('lineofbavor52').GetFirstNameNicknamedRegnal], petit-fils de [GetScriptedCharacterByHistoryID('lineofbavorIV').GetFirstNameRegnal], se souciait peu des affaires au-delà de sa cour, même quand la [warlastalliance|E] se déroula sous son règne, emplissant ses halls de festins sans fin. Ghûr avait pris une telle ampleur que le hisser sur pied pour tenir conseil nécessitait les efforts conjugués d'une demi-douzaine d'intendants.\n\nParmi les sujets de Ghûr se trouvait Shisên, un artisan qui porta son ambition vers la maîtrise de la cuisine. Ce qui avait commencé par un goût pour la brasserie appris des Boucles-Noires devint une quête de saveur et de fraternité. Il parcourut les [redmountains|E], goûtant les viandes fumées des [ironfists|E], les racines des [stiffbeards|E] et les herbes des tribus orientales des [men|E], mêlant leurs manières en des mets d'une harmonie rare. Quand la nouvelle de son talent parvint à la cour, le goulu Ghûr le fit mander pour rassasier une faim qu'aucun art ne pouvait satisfaire. Shisên servit pendant des années, jusqu'au jour où son suzerain s'étouffa lors d'un nouveau festin, et Shisên repartit en quête de son savoir culinaire. Son héritage ne résidait point dans les armes ni dans l'or, mais dans l'art et la joie de la table."
 ancestor_veneration.0712.a: "Par l'abondance, il fortifia à la fois le foyer et le royaume."
 ancestor_veneration.0712.b: "La tempérance à table apporte davantage que l'excès ne le fera jamais."

### FALSE DWARF HISTORY ###

 ancestor_veneration.9000.t: "Les Nains-Mesquins"
 ancestor_veneration.9000.desc: "Parmi les rayonnages les plus anciens des archives, mon [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('overenthusiastic_researcher'))] [overenthusiastic_researcher.GetTitledFirstName] exhume une collection de témoignages concernant les « Nains-Mesquins » de l'ancien [beleriand|E]. Les comptes avaient été copiés de sources [elven|E] et [mannish|E], et nul ne s'accorde avec les autres. Un texte décrit un peuple petit et secret qui tailla des halls dissimulés dans les montagnes de l'ouest bien avant qu'aucun des sept [dwarffathersshort|E] ne s'éveillât. Connus comme un rameau rabougri de notre espèce, les Nains-Mesquins furent chassés par leurs propres frères pour fratricide, larcin et autres crimes graves, et laissés à se débrouiller seuls parmi les collines sauvages.\n\nUn compte bien plus amer rappelle les jours où des chasseurs elfiques les occidaient à vue, les forçant à se terrer et ne laissant que quelques survivants comme Mîm et ses fils, qui connurent des fins tragiques après la ruine de leur dernier refuge. La plus étrange prétention est que les Nains-Mesquins furent les premières tentatives de [mahalcharacter|E] pour façonner des enfants de pierre, des formes inachevées mises de côté une fois les vrais Pères créés. Les maîtres du savoir rejettent cette interprétation, et pourtant le vieux chroniqueur écrivait comme s'il y croyait absolument.\n\nMes trouvailles n'offrent nulle certitude. Mythe, calomnie ou vérité oubliée, le destin du Peuple Disparu demeure une énigme, aussi étrange et douloureuse que les récits qui en gardent mémoire."
 ancestor_veneration.9000.desc.saruman: "Parmi les rayonnages les plus anciens des archives, mon [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('overenthusiastic_researcher'))] [overenthusiastic_researcher.GetTitledFirstName] exhume une collection de témoignages concernant les « Nains-Mesquins » de l'ancien [beleriand|E]. Les comptes avaient été copiés de sources [elven|E] et [mannish|E], et nul ne s'accorde avec les autres. Un texte décrit un peuple petit et secret qui tailla des halls dissimulés dans les montagnes de l'ouest bien avant qu'aucun des sept [dwarffathersshort|E] ne s'éveillât. Connus comme un rameau rabougri de notre espèce, les Nains-Mesquins furent chassés par leurs propres frères pour fratricide, larcin et autres crimes graves, et laissés à se débrouiller seuls parmi les collines sauvages.\n\nUn compte bien plus amer rappelle les jours où des chasseurs elfiques les occidaient à vue, les forçant à se terrer et ne laissant que quelques survivants comme Mîm et ses fils, qui connurent des fins tragiques après la ruine de leur dernier refuge. La plus étrange prétention est que les Nains-Mesquins furent les premières tentatives de [mahalcharacter|E] pour façonner des enfants de pierre, des formes inachevées mises de côté une fois les vrais Pères créés. Les maîtres du savoir rejettent cette interprétation, et pourtant le vieux chroniqueur écrivait comme s'il y croyait absolument.\n\nMes trouvailles n'offrent nulle certitude. Mythe, calomnie ou vérité oubliée, le destin du Peuple Disparu demeure une énigme, aussi étrange et douloureuse que les récits qui en gardent mémoire."
 ancestor_veneration.9000.a: "Laissons-les s'amuser de leurs curiosités."
 ancestor_veneration.9000.b: "Pure spéculation. Rien de plus."

 ancestor_veneration.9001.t: "Le Mythe Nain de la Récréation"
 ancestor_veneration.9001.desc: "Parmi un ensemble de vieux contes recueillis auprès d'[men|E] itinérants, une histoire revient encore et encore. Elle prétend que les [dwarves|E] ne se marient pas, n'ont pas d'enfants et ne transmettent pas leur lignée de génération en génération. On dit qu'ils « surgissent tout formés de trous dans le sol » comme des pierres délogées par un tremblement de terre. Les conteurs citent toujours le même raisonnement : ils ne voient jamais de femmes naines, et comme celles-ci ressemblent tellement aux hommes par la voix et l'apparence, ils supposent qu'il n'en existe pas. Certains affirment même que les sept [dwarffathersshort|E] émergèrent ainsi, poussés des profondeurs de l'[ardaconcept|E] par la pression de la roche vivante.\n\nPour notre peuple, l'idée est absurde. Pourtant le malentendu est si répandu parmi les Hommes que même leurs nobles le répètent avec un sérieux parfait. Les archivistes débattent pour savoir s'il faut corriger le conte... ou le laisser persister pour l'amusement des générations à venir."
 ancestor_veneration.9001.a: "Les savants se trompent, les Hommes, plus que tous."
 ancestor_veneration.9001.b: "Détruisez-le avant que quelqu'un n'y croie."

 ancestor_veneration.9002.t: "Le Huitième Père des Cavernes Scintillantes"
 ancestor_veneration.9002.desc: "Une étrange histoire a commencé de circuler, propagée par un chroniqueur local avide d'élever le nom de sa famille. Il prétend que sa lignée descend non de l'un des sept, mais d'un huitième [dwarffather|E], un ancêtre caché que [mahalcharacter|E] aurait façonné et mis à reposer sous les [GetTitleByKey('c_glittering_caves').GetNameNoTier] d'Aglarond dans les [whitemountains|E].\n\nSelon le manuscrit, cet aïeul oublié était le plus petit des Pères-des-Nains, compact et robuste, façonné pour se glisser sans être vu dans les fissures de pierre les plus étroites. L'histoire le décrit s'éveillant dans un berceau de quartz et de gemmes, enseignant à ses descendants à lire les tremblements de la montagne et à entendre le faint chant dans les veines de cristal, avant de disparaître à nouveau dans la pierre aussi silencieusement qu'il en était sorti.\n\nAucune mémoire clanique n'atteste d'une telle figure, et la plupart des runes que cite le chroniqueur s'avèrent être des spirales décoratives trouvées sur des parois de caverne. Pourtant les cavernes d'Aglarond recèlent des merveilles sans nombre, et l'idée que Mahal aurait pu façonner un huitième Père oublié en quelque heure secrète a capturé l'imagination de quelques érudits fébriles.\n\nN'est-ce là que la vantardise d'un scribe ambitieux, ou une vérité longtemps enfouie pourrait-elle scintiller sous le conte ?"
 ancestor_veneration.9002.a: "Laissons le conte inspirer l'émerveillement, si ce n'est rien d'autre."
 ancestor_veneration.9002.b: "La main de Mahal pourrait encore attarder dans les coins cachés du monde."
 ancestor_veneration.9002.c: "Aulë a fait les sept, et pas davantage."

 ancestor_veneration.9003.t: "Servants du Seigneur Sombre"
 ancestor_veneration.9003.desc: "Une chronique amère, apparemment rédigée par un [longbeard|E] pleurant des frères de sang perdus dans la [warlastalliance|E], dépeint les [ironfists|E] comme entièrement corrompus, attirés par nature vers l'Ombre. Selon le manuscrit, les Poings-de-Fer ne furent jamais de loyaux alliés pour leurs frères de sang, avides de servir [sauroncharacter|E] et de semer la discorde parmi les autres [dwarves|E].\n\nLe texte est truffé de jugements moraux, de sombres illustrations de Poings-de-Fer aux yeux de braise, et d'affirmations que leurs cœurs mêmes étaient tordus depuis la naissance pour trahir les Peuples Libres. Les archivistes rejettent l'ouvrage comme une calomnie, et pourtant le détail méticuleux et le ton venimeux en font un morceau de pseudo-histoire saisissant, pour répugnant qu'il soit.\n\nNul fait n'étaye pareille vision, mais elle révèle la profondeur du chagrin et de la colère qui demeurent parmi ceux qui combattirent l'Ombre aux côtés de Nains aujourd'hui tombés."
 ancestor_veneration.9003.a: "Une insulte à nos pères, brûlez-le sur l'heure."
 ancestor_veneration.9003.b: "Une fantasme haineux, mais un avertissement sur l'amertume du passé."
 ancestor_veneration.9003.c: "Je me demande s'il n'y a pas un grain de vérité dans ce mythe."

 ancestor_veneration.9004.t: "Le Huitième Clan Caché"
 ancestor_veneration.9004.desc: "Un curieux parchemin en [khuzdul|E] archaïque conte un clan [dwarven|E] caché qui habiterait les profondeurs des [whitemountains|E]. Ce groupe, dit-on descendant d'un huitième [dwarffather|E], n'est jamais confirmé et n'est connu qu'à travers les récits fantaisistes d'[men|E] prétendant avoir entrevu d'étranges silhouettes se mouvant haut dans les montagnes, leurs identités masquées par la distance et la brume. Certaines descriptions affirment que ces silhouettes allaient sans barbe et étaient ornées de marques étranges sur la peau, bien que ces récits s'évanouissaient à chaque nouvelle transmission.\n\nLe parchemin imagine leurs creusées comme des merveilles d'artisanat : de scintillantes veines de minerai, des halls complexes et des couloirs silencieux où chaque membre pouvait lire les subtils tremblements de la montagne. Nul Nain n'a jamais prétendu les avoir rencontrés, et nulle lignée ne remonte à ce supposé clan.\n\nCertains érudits rejettent le conte comme pure légende, inspirée par des aperçus brumeux et des récits exagérés. D'autres supposent qu'un huitième clan, ou quelque chose qui lui ressemble, pourrait encore demeurer invisible dans les profondeurs."
 ancestor_veneration.9004.a: "Un conte obscur, fascinant, si invérifiable."
 ancestor_veneration.9004.b: "Peut-être certains Nains tracent-ils encore leurs racines jusqu'à ces halls secrets."

 ancestor_veneration.9005.t: "La Controverse de la Barbe"
 ancestor_veneration.9005.desc: "Enfoui parmi des chroniques négligées gît un traité sur les coutumes [dwarven|E], rédigé par un érudit [mannish|E] bien intentionné mais irrémédiablement confus. Il prétend qu'en des temps anciens, les Nains ne portaient aucune barbe, se rasant le visage ras en imitation des [numenoreans|E] imberbes. Un autre chapitre suggère que les tresses furent introduites plus tard comme marque de rébellion juvénile ou de défi. Les illustrations montrent des rois au menton lisse, leurs visages d'un nu déconcertant, et de jeunes Nains arborant des tresses élaborées en signe de protestation.\n\nLes archivistes sont horrifiés ; la barbe est sacrée, un don lié à notre nature même. Nul vrai Nain ne représenterait son peuple avec un menton rasé de près !"
 ancestor_veneration.9005.desc.saruman: "Enfoui parmi des chroniques négligées gît un traité sur les coutumes [dwarven|E], rédigé par un érudit [mannish|E] bien intentionné mais irrémédiablement confus. Il prétend qu'en des temps anciens, les Nains ne portaient aucune barbe, se rasant le visage ras en imitation des [numenoreans|E] imberbes. Un autre chapitre suggère que les tresses furent introduites plus tard comme marque de rébellion juvénile ou de défi. Les illustrations montrent des rois au menton lisse, leurs visages d'un nu déconcertant, et de jeunes Nains arborant des tresses élaborées en signe de protestation.\n\nBien qu'il soit de notoriété commune que la barbe est un signe distinctif de la fierté naine, je ne puis m'empêcher de me demander comment quelqu'un a pu concevoir une idée aussi saugrenue."
 ancestor_veneration.9005.a: "Quel scandaleux non-sens !"
 ancestor_veneration.9005.b: "Ridicule... mais les dessins sont amusants."

 ancestor_veneration.9006.t: "Le Nain à la Voile de l'Ouest"
 ancestor_veneration.9006.desc: "En époussetant un rayonnage négligé, je trouve un parchemin en lambeaux retraçant les aventures d'un [Glossary('Khuzd','khuzd_gloss')] sans nom. Selon ce texte, ce [dwarf|E] aventurier ne se contentait pas des tunnels ni des montagnes. Il aurait construit un minuscule navire et voilé vers l'ouest à travers le [belegaer_sea|E] pour atteindre les [undyinglands|E].\n\nLe récit est, franchement, impossible. Il détaille des conversations que ce Nain aurait eues avec les [valar|E] eux-mêmes, sa présence à des festins avec des [elves|E] d'antan, et jusqu'à son voyage de retour, au cours duquel il aurait rapporté un vestige des [twotrees|E] comme preuve de son périple. L'écriture devient de plus en plus fleurie vers la fin, laissant supposer que le scribe lui-même croyait peut-être au conte."
 ancestor_veneration.9006.a: "Clairement fictif, mais quelle imagination !"
 ancestor_veneration.9006.b: "La place d'un Nain est sous les montagnes, non à courir des horizons lointains."

 ancestor_veneration.9007.t: "Un Conte de Cour Improbable"
 ancestor_veneration.9007.desc: "Mon [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('amused_researcher'))] [amused_researcher.GetTitledFirstName] me soumet un curieux manuscrit rédigé par un chroniqueur scandalisé - peut-être des Premiers-Nés -, qui conte l'histoire d'un [dwarf|E] dont la présence parmi les [elves|E] causa bien plus qu'un frémissement. Selon le récit, il possédait un tel charme et un tel maintien que des demoiselles elfiques défaillaient et que des cours entières suspendaient leurs conseils rien que pour l'observer.\n\nLes illustrations sont tout aussi extravagantes : des Elfes s'évanouissant dans les bras les uns des autres, des mouchoirs voletant jusqu'au sol, et des instructions pour coiffer la chevelure du Nain à la perfection. Chaque détail, l'éclat de sa barbe, le scintillement de ses yeux, jusqu'au lustre de ses bottes, est décrit avec un soin stupéfiant.\n\nQue l'histoire exagère, ou que l'auteur eût quelque affection privée pour son sujet, le conte demeure un récit amusant et tout à fait improbable d'un lien franchissant l'antique fossé entre Nains et Elfes."
 ancestor_veneration.9007.desc.saruman: "Au cours de mes recherches je tombe sur un curieux manuscrit rédigé par un chroniqueur scandalisé - peut-être des Premiers-Nés -, qui conte l'histoire d'un [dwarf|E] dont la présence parmi les [elves|E] causa bien plus qu'un frémissement. Selon le récit, il possédait un tel charme et un tel maintien que des demoiselles elfiques défaillaient et que des cours entières suspendaient leurs conseils rien que pour l'observer.\n\nLes illustrations sont tout aussi extravagantes : des Elfes s'évanouissant dans les bras les uns des autres, des mouchoirs voletant jusqu'au sol, et des instructions pour coiffer la chevelure du Nain à la perfection. Chaque détail - l'éclat de sa barbe, le scintillement de ses yeux, jusqu'au lustre de ses bottes, est décrit avec un soin stupéfiant.\n\nQue l'histoire exagère, ou que l'auteur eût quelque affection privée pour son sujet, le conte demeure un récit amusant et tout à fait improbable d'un lien franchissant l'antique fossé entre Nains et Elfes."
 ancestor_veneration.9007.a: "Ha ! Les nôtres savent en effet étonner, même les hautains Elfes !"
 ancestor_veneration.9007.b: "Peut-être certains Nains se portent-ils avec un charme irrésistible."
 ancestor_veneration.9007.c: "Si les unions entre Elfes et Hommes sont attestées, ce récit ne peut qu'être fictif."

 ancestor_veneration.9008.t: "La Théorie du Forgeage Noir"
 ancestor_veneration.9008.desc: "Dans un compartiment caché des archives, je découvre un traité fragmentaire affirmant que les [dwarves|E] ne furent pas façonnés par [mahalcharacter|E], mais par [morgothcharacter|E], par cruauté ou malice. L'auteur étaye cette idée stupéfiante par des généalogies élaborées, quoique manifestement inventées, des runes mal lues et d'obscures prophéties, suggérant toutes que les Nains étaient destinés à être des instruments de l'Ombre.\n\nPourtant le traité insiste sur le fait que l'entêtement naturel des Nains et leur habileté au combat représentent une rébellion contre leur créateur : bien que supposément formés pour servir le mal, ils résistèrent à toute tyrannie, combattirent [dragons|El] et Seigneurs Sombres à l'égal, et préservèrent leur art et leur liberté. Des notes en marge représentent des Nains dans leurs halls, complotant pour braver la volonté de leur supposé père. Le manuscrit ressemble à une fable morale, et pourtant son audace est étrangement saisissante."
 ancestor_veneration.9008.a: "Absurde... et pourtant j'admire le défi éternel des Nains."
 ancestor_veneration.9008.b: "Peut-être cela explique-t-il pourquoi notre espèce s'oppose toujours à l'Ombre."
 ancestor_veneration.9008.c: "Nenni, les Nains sont les enfants adoptifs de l'Unique !"

 ancestor_veneration.9009.t: "Un Conte d'Ambition Aurique"
 ancestor_veneration.9009.desc: "Parmi les parchemins, je trouve un curieux récit détaillant un [dwarf|E] « alchimiste » qui se serait lui-même transformé entièrement en or. Le texte décrit le processus avec un luxe de détails accablants : chauffe, incantations et bains dans des veines de minerai enchanté.\n\nSelon le manuscrit, il demeura statue pendant des siècles, vénéré et redouté en égale mesure. Des marchands tentèrent de vendre des morceaux de sa barbe dorée, tandis que des aventuriers cherchèrent à le « libérer », pour découvrir que l'or ne pouvait ni être fondu ni entaillé.\n\nL'auteur conclut sur une morale concernant l'ambition et la cupidité, bien que la fiabilité pratique du texte soit, pour le moins, sujette à caution. Vérité, allégorie ou exagération, le conte perdure."
 ancestor_veneration.9009.a: "Ridicule... mais divertissant !"
 ancestor_veneration.9009.b: "Je me demande si une part de ce récit pourrait être vraie..."

 ancestor_veneration.9010.t: "Les Forgerons Célestes"
 ancestor_veneration.9010.desc: "En feuilletant un ensemble de cartes stellaires et d'obscures chroniques, je trouve une affirmation audacieuse : qu'aux premiers Âges, le Soleil et la Lune n'étaient pas l'ouvrage des [valar|E], mais furent forgés par les [dwarffathers|E], travaillant ensemble bien que dispersés aux quatre coins du monde.\n\nL'auteur décrit d'énormes forges dissimulées sous de lointaines montagnes, du métal en fusion plus brillant que nulle flamme, et des enclumes résonnant du son de la création elle-même. Des diagrammes montrent les orbes célestes hissés dans le ciel par d'immenses chaînes et de subtiles magies, comme si les étoiles elles-mêmes étaient des ornements à la gloire du génie [dwarven|E].\n\nLe manuscrit est clairement conçu comme une allégorie, ou une plaisanterie élaborée, mais l'auteur le traite avec un sérieux solennel."
 ancestor_veneration.9010.a: "Absurde, et pourtant étrangement inspirant."
 ancestor_veneration.9010.b: "Si seulement nous pouvions forger de pareilles merveilles aujourd'hui..."

 ancestor_veneration.9011.t: "La Doctrine de l'Âme Minérale"
 ancestor_veneration.9011.desc: "Certains vieux comptes suggèrent que quand un [dwarf|E] meurt, son esprit ne retourne pas aux [hallsofmandos|E] pour être réuni à [mahalcharacter|E] le Façonneur, ni ne part vers de lointains royaumes. Au lieu de cela, son corps se transformerait en gemmes et minéraux au plus profond de la terre. De riches veines d'améthyste, de rubis et de mithril ne seraient peut-être rien de moins que des Nains ancestraux reposant à jamais dans la pierre.\n\nDes témoins décrivent des veines luisant doucement, des runes naines gravées dans des formations de cristal, et des veines d'or miroitantes comme si elles étaient vivantes. Certains passages affirment que quelques Nains renaissent en diamants, tandis que d'autres deviennent simple quartz, leur essence pliée à jamais dans la montagne."
 ancestor_veneration.9011.a: "Ces descriptions sont extraordinaires... et pourtant troublantes."
 ancestor_veneration.9011.b: "Peut-être y a-t-il dans la pierre elle-même une vérité, qui attend d'être découverte."

 ancestor_veneration.9012.t: "Contrariés par la Taille"
 ancestor_veneration.9012.desc: "Mon [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('amused_researcher'))] [amused_researcher.GetTitledFirstName] fait irruption dans l'étude en agitant frénétiquement un manuscrit. « Il faut voir ça ! » s'écrie [amused_researcher.Custom('FR_IlElle')]. En y regardant de plus près, il décrit l'[ainulindale|E], les [valar|E], et contient des diagrammes élaborés d'[elves|E], d'[men|E] et de [dwarves|E].\n\nSelon ce fantaisiste récit, les Nains étaient autrefois plus grands que les Eldar eux-mêmes, élancés et gracieux, tout en étant encore ornés de longues et belles barbes. Une mystérieuse malédiction, censée châtier leur orgueil, les aurait progressivement rendus plus petits et trapus au fil des Âges. Certaines marges contiennent d'amusantes illustrations : un Nain de haute taille tentant de se cacher derrière un arbre, seuls sa tête et sa barbe ondoyante dépassant, tandis qu'un Elfe perplexe l'observe."
 ancestor_veneration.9012.desc.saruman: "En parcourant un manuscrit d'apparence plutôt anodine, certaines bizarreries retiennent mon attention. En y regardant de plus près, il décrit l'[ainulindale|E], les [valar|E], et contient des diagrammes élaborés d'[elves|E], d'[men|E] et de [dwarves|E].\n\nSelon ce fantaisiste récit, les Nains étaient autrefois plus grands que les Eldar eux-mêmes, élancés et gracieux, tout en étant encore ornés de longues et belles barbes. Une mystérieuse malédiction, censée châtier leur orgueil, les aurait progressivement rendus plus petits et trapus au fil des Âges. Certaines marges contiennent d'amusantes illustrations : un Nain de haute taille tentant de se cacher derrière un arbre, seuls sa tête et sa barbe ondoyante dépassant, tandis qu'un Elfe perplexe l'observe."
 ancestor_veneration.9012.a: "Fascinant ! Cela explique tant de choses !"
 ancestor_veneration.9012.b: "Hilarant ! Les dessins seuls valent la lecture."
 ancestor_veneration.9012.c: "Quelle absurdité sans nom."

 ancestor_veneration.9013.t: "Les Anneaux Inviolés"
 ancestor_veneration.9013.desc: "Un conte persiste dans des chroniques éparses et des histoires orales, affirmant que les [sevenringsofdwarves|E] remis aux sept clans furent façonnés exempts de corruption par [celebrimbor|E] et que [sauroncharacter|E] n'eut aucune part dans leur création. Leur artisanat y est décrit en termes flatteurs : résilients, lumineux et puissants, amplifiant l'habileté et la richesse de ceux qui les portaient sans plier leur volonté.\n\nL'histoire loue les [dwarves|E] pour leur vigilance et leur ingéniosité, montrant comment ils gardèrent ces trésors et en usèrent avec sagesse, indemnes de l'ombre qui tomba sur d'autres Anneaux. Les détails varient, mais la légende de ces Anneaux Nains purs perdure, inspirant émerveillement et admiration à l'égal."
 ancestor_veneration.9013.a: "Un tel art surpasse même les plus hautes louanges."
 ancestor_veneration.9013.b: "En vérité, les Nains sont sans rivaux en habileté et en prudence."
 ancestor_veneration.9013.c: "Avec une main qui guide, les Nains peuvent accomplir bien d'autres merveilles de ce genre."

 ancestor_veneration.9014.t: "La Pierre Commune des Pères"
 ancestor_veneration.9014.desc: "Une chronique récente circulant parmi des érudits curieux avance une affirmation frappante : que les sept [dwarffathersshort|E] ne furent pas seulement façonnés par [mahalcharacter|E], mais taillés dans une seule et massive veine de roche vivante, sculptés en séquence pour préserver une essence partagée.\n\nLe texte inclut des illustrations montrant chaque Père émergeant de la pierre, leurs traits et leur maintien se faisant écho les uns aux autres, comme si la montagne elle-même les avait imprégnés d'une force et d'une volonté communes.\n\nBien que l'idée mette la crédulité à l'épreuve, elle sert à mettre en lumière l'unité et la parenté durable des Pères, par-delà le temps et la distance."
 ancestor_veneration.9014.a: "Remarquable ! Même leur ressemblance les lie à travers les âges."
 ancestor_veneration.9014.b: "Peut-être toute grandeur jaillit-elle d'une même racine, après tout."

 ancestor_veneration.9015.t: "Fankil et les Nains Mauvais"
 ancestor_veneration.9015.desc: "Parmi des chroniques éparses se trouve un récit sensationnel de Fankil, figure malveillante dit enfant de [melkorcharacter|E] qui pervertit des [men|E] et s'allia à des [goblins|E] et à des « Nains Mauvais ». Selon le conte, ces Nains Mauvais, partie des Úvanimor, furent engendrés de la terre par Melkor. Ils portaient des haches sombres et des boucliers noircis à la [battleofpalisor|E], combattant aux côtés des forces de Fankil contre les Ilkorindi (les [elves|E]).\n\nL'histoire décrit l'armée de Fankil répandant aliénation et chaos parmi Hommes et [dwarves|E] à l'égal. En vérité, cependant, les seuls Nains dont on sache avec fiabilité qu'ils le suivirent étaient des parias des clans des [orocarni|E], criminels et exilés qu'il avait tentés avec des promesses de richesse et de vengeance contre les frères de sang qui les avaient lésés.\n\nLe reste du récit est chaotique, contradictoire, et en désaccord avec tout compte fiable de la bataille. L'auteur semble plus épris de fable que de vérité, se délectant de l'idée que les Nains pourraient trahir les Peuples Libres avec un tel panache."
 ancestor_veneration.9015.a: "Ridicule ! De tels contes déshonorent la mémoire des nôtres."
 ancestor_veneration.9015.a.saruman: "Rien dans la mémoire des Sages ne prête quelque vérité à ce récit."
 ancestor_veneration.9015.b: "Amusant, ne serait-ce que pour l'imagination de l'auteur."

 ancestor_veneration.9016.t: "Une Rencontre sans Précédent"
 ancestor_veneration.9016.desc: "Arborant un sourire espiègle, mon [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('amused_researcher'))] [amused_researcher.GetTitledFirstName] me soumet une curieuse chronique d'un [dwarf|E] et d'une demoiselle [elf|E] qui se rencontrèrent en des circonstances extraordinaires, loin de leurs frères de sang et de leurs cours. Le conte décrit leurs audacieuses rencontres dans des forêts sauvages, sur des sentiers de montagne cachés et à travers des halls antiques, chacun apprenant les usages du peuple de l'autre.\n\nLe manuscrit entrelace romance et aventure, les montrant partageant des festins, échangeant des présents et se tenant côte à côte dans le péril, malgré le scepticisme de leur entourage. Les chronologies et les généalogies sont contradictoires, et pourtant le charme de leur improbable compagnonnage est indéniable."
 ancestor_veneration.9016.desc.saruman: "Je tombe sur une curieuse chronique d'un [dwarf|E] et d'une demoiselle [elf|E] qui se rencontrèrent en des circonstances extraordinaires, loin de leurs frères de sang et de leurs cours. Le conte décrit leurs audacieuses rencontres dans des forêts sauvages, sur des sentiers de montagne cachés et à travers des halls antiques, chacun apprenant les usages du peuple de l'autre.\n\nLe manuscrit entrelace romance et aventure, les montrant partageant des festins, échangeant des présents et se tenant côte à côte dans le péril, malgré le scepticisme de leur entourage. Les chronologies et les généalogies sont contradictoires, et pourtant le charme de leur improbable compagnonnage est indéniable."
 ancestor_veneration.9016.a: "Voilà qui explique bien des choses sur les interactions Nains-Elfes !"
 ancestor_veneration.9016.b: "Un conte d'audace, d'amour et d'impossibilités, que c'est divertissant !"

 ancestor_veneration.9017.t: "Le Dwarrowmoot des Anneaux qui Roulent"
 ancestor_veneration.9017.desc: "Un petit parchemin chaotique retrace un Dwarrowmoot de rois qui n'aurait supposément jamais eu lieu. Le récit commence normalement : les rois Nains se rassemblent, chacun donnant un bref résumé des affaires de son royaume. Tout se passe bien, nourriture et boisson sont servies, et l'assemblée paraît parfaitement ordonnée. Mais soudain, l'un des Nains servant le repas trébuche, tente de s'agripper à la table et entraîne la nappe dans sa chute.\n\nQu'y a-t-il dans un coffret posé sur cette table ? Exactement, les sept [sevenringsofdwarves|E]. Les voilà qui roulent sur le sol de la salle du Dwarrowmoot, et la prochaine chose que quiconque aperçoit, c'est sept dignes rois Nains se ruant frénétiquement à quatre pattes pour récupérer chacun son Anneau. L'un d'eux crie peut-être quelque chose à propos de « mon précieux » tandis que le chaos éclate autour de la table du conseil.\n\nLe parchemin cligne de l'œil à ses lecteurs, suggérant que les rois eux-mêmes convinrent par la suite de ne plus jamais mentionner cette réunion, de crainte de révéler leur avidité et la folie de s'être bousculés pour protéger leurs Anneaux."
 ancestor_veneration.9017.a: "Hilarant ! Qui eût cru que l'histoire pouvait être aussi divertissante ?"
 ancestor_veneration.9017.b: "Même les plus dignes ne gardent pas toujours leur contenance."

 ancestor_veneration.9018.t: "La Malédiction des Thésauriseurs"
 ancestor_veneration.9018.desc: "Un excentrique parchemin que me présente mon [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('overenthusiastic_researcher'))] [overenthusiastic_researcher.GetTitledFirstName] affirme que les premiers [dragons|El] ne naquirent pas de la malice de [morgothcharacter|E], mais de [dwarves|E] qui succombèrent à une terrible malédiction. Selon le scribe, ces Nains thésaurisèrent l'or au-delà de toute raison, leurs âmes se tordant sous le poids de l'avidité jusqu'à ce que leurs corps se remodelassent en bêtes à écailles et à ailes. Leurs esprits, insiste-t-il, demeurèrent confusément conscients de leurs origines, ce qui explique que les Dragons affament éternellement les trésors nains : ils réclament ce qui leur appartint jadis.\n\nLe manuscrit cite de folles histoires de gardiens de trésors disparus du jour au lendemain, de chambres retrouvées griffées et fondues comme si leur occupant avait simplement... changé. Naturellement, pas un seul chroniqueur digne de foi ne corrobore quoi que ce soit, et l'ouvrage ressemble davantage à une fable morale qu'à un récit historique, un avertissement que la cupidité dévore les avides jusqu'à ce qu'il ne reste plus rien de reconnaissable."
 ancestor_veneration.9018.desc.saruman: "Un excentrique parchemin sur lequel je tombe par hasard prétend que les premiers [dragons|El] ne naquirent pas de la malice de [morgothcharacter|E], mais de [dwarves|E] qui succombèrent à une terrible malédiction. Selon le scribe, ces Nains thésaurisèrent l'or au-delà de toute raison, leurs âmes se tordant sous le poids de l'avidité jusqu'à ce que leurs corps se remodelassent en bêtes à écailles et à ailes. Leurs esprits, insiste-t-il, demeurèrent confusément conscients de leurs origines, ce qui explique que les Dragons affament éternellement les trésors nains : ils réclament ce qui leur appartint jadis.\n\nLe manuscrit cite de folles histoires de gardiens de trésors disparus du jour au lendemain, de chambres retrouvées griffées et fondues comme si leur occupant avait simplement... changé. Naturellement, pas un seul chroniqueur digne de foi ne corrobore quoi que ce soit, et l'ouvrage ressemble davantage à une fable morale qu'à un récit historique, un avertissement que la cupidité dévore les avides jusqu'à ce qu'il ne reste plus rien de reconnaissable."
 ancestor_veneration.9018.a: "Pur non-sens, un Nain ne peut jamais avoir trop d'or."
 ancestor_veneration.9018.a.saruman: "Quel fatras. Je devrais faire brûler ce parchemin."
 ancestor_veneration.9018.b: "Des Dragons comme Nains déchus ? Absurde... mais étrangement saisissant."

 ancestor_veneration.9019.t: "Des Barbes Rudes aux Pieds Velus"
 ancestor_veneration.9019.desc: "Mon [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('amused_researcher'))] [amused_researcher.GetTitledFirstName] arrive avec un curieux traité débordant d'enjouées gribouilles en marge et d'un argument si audacieux qu'il me laisse presque sans voix. Le parchemin affirme que les [hobbits|E] sont en réalité un rameau rapetissé des « Nains-Mesquins » des contes anciens, qui perdit la capacité de faire pousser la barbe, et reporta d'une façon ou d'une autre cette fierté ancestrale sur les poils de leurs pieds.\n\nL'auteur anonyme prétend que leur goût pour les foyers, les maisons-trous et les repas copieux découle d' « instincts proto-[dwarven|E] », et insiste sur le fait que leur fascination pour les choses enfouies - des semis aux tubercules - est l'écho affaibli d'une tradition oubliée de creusée.\n\nChaque argument est cousu ensemble de coïncidences et de dictons rustiques, et pourtant le sérieux et l'absurdité absolue de l'ensemble rendent difficile de ne pas sourire."
 ancestor_veneration.9019.desc.saruman: "Au cours de mes recherches je tombe sur un curieux traité débordant d'enjouées gribouilles en marge et d'un argument si audacieux qu'il me laisse presque sans voix. Le parchemin affirme que les [hobbits|E] sont en réalité un rameau rapetissé des « Nains-Mesquins » des contes anciens, qui perdit la capacité de faire pousser la barbe, et reporta d'une façon ou d'une autre cette fierté ancestrale sur les poils de leurs pieds.\n\nL'auteur anonyme prétend que leur goût pour les foyers, les maisons-trous et les repas copieux découle d' « instincts proto-[dwarven|E] », et insiste sur le fait que leur fascination pour les choses enfouies, des semis aux tubercules, est l'écho affaibli d'une tradition oubliée de creusée.\n\nChaque argument est cousu ensemble de coïncidences et de dictons rustiques, et pourtant le sérieux et l'absurdité absolue de l'ensemble rendent difficile de ne pas sourire."
 ancestor_veneration.9019.a: "Une thèse audacieuse, égarée, mais assurément mémorable."
 ancestor_veneration.9019.b: "Imaginez un peu... des Hobbits comme cousins imberbes. Délicieusement ridicule."
 ancestor_veneration.9019.c: "Ah, les Demi-Hommes... à ce propos, où est donc ma pipe ?"

 ancestor_veneration.9020.t: "L'Implication des Larges-Épaules"
 ancestor_veneration.9020.desc: "Un antique traité, rédigé avec une grande assurance mais peu de discernement, tente de prouver que les deux clans des [bluemountains|E], [firebeards|E] et [broadbeams|E], prirent part à l'incident du [nauglamir|E] et au meurtre de [GetScriptedCharacterByHistoryID('lineofelwe1').GetFirstName]. L'auteur [elvish|E] s'appuie lourdement sur des formulations vagues telles que « les forgerons [dwarf|E] des [eredluin|E] » ou « les Nains de [nogrod|E] et de [belegost|E] », affirmant que cela doit désigner les deux peuples à l'égal.\n\nPour faire coller l'assertion, l'auteur tord des registres de commerce, lit mal des récits de voyage, et suggère même que des Larges-Épaules « auraient pu teindre leurs barbes » pour se fondre parmi leurs frères Barbes-de-Feu, un argument si absurde qu'il confine à la comédie, vu la chevelure rousse inimitable de tout Barbe-de-Feu.\n\nLe traité est manifestement égaré, et pourtant son existence même illustre avec quelle facilité les érudits étrangers confondent tous les Nains quand ils ne se donnent pas la peine de distinguer un clan d'un autre."
 ancestor_veneration.9020.a: "Absurde. Notre histoire n'est pas la leur à réécrire."
 ancestor_veneration.9020.b: "Les scribes elfiques... toujours à simplifier ce qu'ils ne comprennent pas."
 ancestor_veneration.9020.c: "Quand Elfes et Nains en finiront-ils donc avec leurs antiques rancœurs ?"
