l_french:
 activity_ancestor_veneration_owner: "Archiviste"
 activity_ancestor_veneration_name: "Vénération des Ancêtres"

 # Ancestor Veneration Start Event

 ancestor_veneration.0001.t: "Un Domaine d’Étude"
 ancestor_veneration.0001.desc: "Alors que tous mes invités sont arrivés et que mon [GetCourtPositionType('chronicler_court_position').GetName()] règle les derniers préparatifs, je me dirige vers les archives. Des piles de parchemins attendent, bien plus que je ne pourrais jamais en lire en une seule vie. Les archives renferment les longues histoires des [dwarves|E].\n\nParmi elles, les récits des sept [dwarffathers|E] et de leurs incarnations, dont on croit qu'ils reviennent à la vie jusqu'à ce que chacun ait vécu sept fois.\n\nIl y a aussi ceux qui se sont fait un nom parmi les sept clans, que ce soit pour l'honneur ou l'infamie."
 ancestor_veneration.0001.a: "Les incarnations de Durin..."
 ancestor_veneration.0001.a.tt: "Vous apprendrez la vie de [durindeathless|E], [dwarffather|E] des [longbeards|E]"
 ancestor_veneration.0001.b: "Les incarnations de Úri..."
 ancestor_veneration.0001.b.tt: "Vous apprendrez la vie de [uriscarred|E], [dwarffather|E] des [firebeards|E]"
 ancestor_veneration.0001.c: "Les incarnations de Dwálin..."
 ancestor_veneration.0001.c.tt: "Vous apprendrez la vie de [dwalinwise|E], [dwarffather|E] des [broadbeams|E]"
 ancestor_veneration.0001.d: "Les incarnations de Sindri..."
 ancestor_veneration.0001.d.tt: "Vous apprendrez la vie de [sindririch|E], [dwarffather|E] des [ironfists|E]"
 ancestor_veneration.0001.e: "Les incarnations de Thúlin..."
 ancestor_veneration.0001.e.tt: "Vous apprendrez la vie de [thulinswift|E], [dwarffather|E] des [stiffbeards|E]"
 ancestor_veneration.0001.f: "Les incarnations de Thrár..."
 ancestor_veneration.0001.f.tt: "Vous apprendrez la vie de [thrarproud|E], [dwarffather|E] des [blacklocks|E]"
 ancestor_veneration.0001.g: "Les incarnations de Bavór..."
 ancestor_veneration.0001.g.tt: "Vous apprendrez la vie de [bavorcold|E], [dwarffather|E] des [stonefoots|E]"
 ancestor_veneration.0001.h: "Des Nains de grande renommée..."
 ancestor_veneration.0001.h.tt: "Vous étudierez la vie d’autres grands Nains issus des sept clans"

 ancestor_veneration.0011.t: "Incarnations de Durin l'Immortel"
 ancestor_veneration.0011.desc: "Premier d'entre les [dwarffathers|E], [durindeathless|E] fut façonné par [mahalcharacter|E] lors de la [dwarfcreation|E] et s'éveilla après l'éveil des [elves|E] et des [men|E], sous les contreforts septentrionaux des [mistymountains|E]. Il fut l'ancêtre des [longbeards|E].\n\nLes récits de ses réincarnations doivent être nombreux, et je m'émerveille que son âme ait traversé tous les âges sans s'éteindre."
 ancestor_veneration.0011.a: "Plongeons-nous dans les récits des exploits de Durin..."
 ancestor_veneration.0011.b: "À la réflexion..."

 ancestor_veneration.0012.t: "Incarnations d'Úri le Balafré"
 ancestor_veneration.0012.desc: "L'un des [dwarffathers|E], [uriscarred|E] fut façonné par [mahalcharacter|E] lors de la [dwarfcreation|E] et s'éveilla après l'éveil des [elves|E] et des [men|E], en [west|E], aux côtés de [dwalinwise|E] des [broadbeams|E]. Il fut l'ancêtre des [firebeards|E].\n\nQuelles chroniques pourraient conter ses vies successives, et comment son essence a-t-elle résisté à la marche des âges ?"
 ancestor_veneration.0012.a: "L'heure est venue de rapporter les hauts faits d'Úri..."
 ancestor_veneration.0012.b: "À la réflexion..."

 ancestor_veneration.0013.t: "Incarnations de Dwálin le Sage"
 ancestor_veneration.0013.desc: "L'un des [dwarffathers|E], [dwalinwise|E] fut façonné par [mahalcharacter|E] lors de la [dwarfcreation|E] et s'éveilla après l'éveil des [elves|E] et des [men|E], en [west|E], aux côtés de [uriscarred|E] des [firebeards|E]. Il fut l'ancêtre des [broadbeams|E].\n\nJe ne puis m'empêcher de songer aux récits de ses incarnations, ni à la manière dont son âme a su traverser les âges entiers."
 ancestor_veneration.0013.a: "Il est temps de dérouler les chroniques de Dwálin..."
 ancestor_veneration.0013.b: "À la réflexion..."

 ancestor_veneration.0014.t: "Incarnations de Sindri le Riche"
 ancestor_veneration.0014.desc: "L'un des [dwarffathers|E], [sindririch|E] fut façonné par [mahalcharacter|E] lors de la [dwarfcreation|E] et s'éveilla après l'éveil des [elves|E] et des [men|E], à l'[east|E], aux côtés de [thulinswift|E] des [stiffbeards|E]. Il fut l'ancêtre des [ironfists|E].\n\nJe médite sur les histoires de ses incarnations et sur la permanence impérissable de son âme."
 ancestor_veneration.0014.a: "Que les récits des exploits de Sindri soient contés..."
 ancestor_veneration.0014.b: "À la réflexion..."

 ancestor_veneration.0015.t: "Incarnations de Thúlin le Rapide"
 ancestor_veneration.0015.desc: "L'un des [dwarffathers|E], [thulinswift|E] fut façonné par [mahalcharacter|E] lors de la [dwarfcreation|E] et s'éveilla après l'éveil des [elves|E] et des [men|E], à l'[east|E], aux côtés de [sindririch|E] des [ironfists|E]. Il fut l'ancêtre des [stiffbeards|E].\n\nLes récits de ses nombreuses vies doivent être légion, et je m'interroge sur la façon dont son âme demeure inébranlable à travers les âges."
 ancestor_veneration.0015.a: "Tournons à présent notre regard vers l'héritage de Thúlin..."
 ancestor_veneration.0015.b: "À la réflexion..."

 ancestor_veneration.0016.t: "Incarnations de Thrár le Fier"
 ancestor_veneration.0016.desc: "L'un des [dwarffathers|E], [thrarproud|E] fut façonné par [mahalcharacter|E] lors de la [dwarfcreation|E] et s'éveilla après l'éveil des [elves|E] et des [men|E], à l'[east|E], aux côtés de [bavorcold|E] des [stonefoots|E]. Il fut l'ancêtre des [blacklocks|E].\n\nLes légendes de ses incarnations me fascinent, tout comme la résilience de son âme au fil du temps."
 ancestor_veneration.0016.a: "Les récits des aventures de Thrár nous attendent..."
 ancestor_veneration.0016.b: "À la réflexion..."

 ancestor_veneration.0017.t: "Incarnations de Bavór le Froid"
 ancestor_veneration.0017.desc: "L'un des [dwarffathers|E], [bavorcold|E] fut façonné par [mahalcharacter|E] lors de la [dwarfcreation|E] et s'éveilla après l'éveil des [elves|E] et des [men|E], à l'[east|E], aux côtés de [thrarproud|E] des [blacklocks|E]. Il fut l'ancêtre des [stonefoots|E].\n\nJe médite souvent sur les récits tissés autour de ses nombreuses incarnations, et sur la vigueur inébranlable de son âme tenace."
 ancestor_veneration.0017.a: "Il est temps de déployer la légende de Bavór..."
 ancestor_veneration.0017.b: "À la réflexion..."

 ancestor_veneration.0018.t: "Nains de Grande Renommée"
 ancestor_veneration.0018.desc: "Au-delà des récits des sept [dwarffathers|E], les chroniques relatent l'existence de bien d'autres [dwarves|E] de grande importance, issus de chacun des sept clans. Guerriers, artisans, rois et explorateurs dont les hauts faits ont résonné à travers les âges, pour l'honneur, la sagesse, ou des actes plus sombres.\n\nLeurs vies et leurs héritages ont laissé de profondes empreintes dans l'histoire des Nains, façonnant le destin de leur peuple de manière à la fois grandiose et subtile."
 ancestor_veneration.0018.a: "J'étudierai les grands Nains des sept clans..."
 ancestor_veneration.0018.b: "À la réflexion..."

 ancestor_veneration.0040.t: "Les Préparatifs"
 ancestor_veneration.0040.host: "En attendant l'arrivée du reste des convives, mes serviteurs ont commencé les préparatifs. Les érudits sont envoyés à la recherche d'antiques parchemins, tandis que l'on installe notre équipement dans les chambres d'hôtes et les archives.\n\n"
 ancestor_veneration.0040.guest: "En attendant l'arrivée du reste des convives, [host.GetTitledFirstName] a entrepris les préparatifs. Ses érudits sont envoyés à la recherche d'antiques parchemins, tandis que l'on installe notre équipement dans les chambres d'hôtes et les archives.\n\n"
 ancestor_veneration.0040.standard: "Les tablettes de pierre sont préparées pour accueillir les parchemins de nos aïeux. L'heure de la vénération approche..."
 ancestor_veneration.0040.saruman: "Mes archives sont ouvertes, et les parchemins et livres retraçant la vie de divers [dwarves|E] ont été disposés, prêts à être étudiés."
 ancestor_veneration.0040.intent_arrived: "\n\n[ROOT.Char.GetIntentTarget.GetTitledFirstName] demeure totalement ignorant[ROOT.Char.GetIntentTarget.Custom('FR_E')] de mon projet de [ROOT.Char.GetInvolvedActivityIntent.GetName|l]."
 ancestor_veneration.0040.intent: "\n\n[ROOT.Char.GetIntentTarget.GetTitledFirstName] n'est pas encore arrivé[ROOT.Char.GetIntentTarget.Custom('FR_E')], il ne faudra guère de temps avant que mon projet de [ROOT.Char.GetInvolvedActivityIntent.GetName|l] puisse avancer."
 ancestor_veneration.0040.a: "Bientôt."

 #Travelling to Archives
 ancestor_veneration.0041.t: "$activity_ancestor_veneration$: $travel_start_event.1000.t$"
 ##Ancestor Veneration
 ancestor_veneration.0041.desc_ancestor_veneration: "M[ROOT.Char.Custom2('FR_RelationToMe_OnA', SCOPE.sC('host'))] [host.GetTitledFirstName] accueille une [ROOT.Char.GetInvolvedActivity.GetShortName] à [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] et l'heure du départ est venue."
 ancestor_veneration.0041.desc_ancestor_veneration_negative: "Je devrai me montrer prudent lors de ce voyage ; la confiance que j'accorde à [host.GetTitledFirstNameNoTooltip] ne va guère loin."
 ancestor_veneration.0041.desc_ancestor_veneration_positive: "Je me réjouis à l'idée de passer davantage de temps en sa compagnie."
 ancestor_veneration.0041.desc_ancestor_veneration_default: "Je devrais être en mesure de représenter dignement la Maison de [ROOT.Char.GetHouse.GetName]."
 ancestor_veneration.0041.desc_ancestor_veneration_outro_standard: "\n\nCe voyage s'annonce des plus intéressants, si l'événement est bien organisé."
 ##My Ancestor Veneration
 ancestor_veneration.0041.desc_my_ancestor_veneration: "Je vais accueillir une [ROOT.Char.GetInvolvedActivity.GetShortName] à [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] et l'heure du départ est venue."
 ancestor_veneration.0041.desc_my_ancestor_veneration_archivist: "Voilà enfin l'occasion d'accomplir le devoir qui m'incombe : honorer mes aïeux."
 ancestor_veneration.0041.desc_my_ancestor_veneration_humble: "Je me réjouis à l'idée de passer du temps entouré de textes anciens."
 ancestor_veneration.0041.desc_my_ancestor_veneration_arrogant: "Je ne doute point que je rentrerai bientôt, couvert de gloire."
 ancestor_veneration.0041.desc_my_ancestor_veneration_saruman: "Quand bien même mes connaissances sont vastes, il y a toujours davantage à apprendre, même sur les Nains."
 ancestor_veneration.0041.desc_my_ancestor_veneration_outro_standard: "\n\nC'est vrai, rien ne vaut un bon voyage aux archives, à l'ancienne !"

 ancestor_veneration.0042.t: "Un Chroniqueur de Cour"
 ancestor_veneration.0042.desc.intro: "Mes études sont sur le point de commencer, et je n'ai pas encore désigné de [GetCourtPositionType('chronicler_court_position').GetName()]. Je pourrais m'en charger moi-même, mais un bon [ROOT.Char.GetTitleAsNameNoTooltip|U] sait quand il convient de s'en remettre à autrui."
 ancestor_veneration.0042.desc.hates_candidate_a: "Aussi difficile que cela me soit à admettre, le [host.Custom('InsultAdjective')] [chronicler_candidate_1.GetFirstName] est le mieux qualifié pour ce poste.\n\n"
 ancestor_veneration.0042.desc.candidate_a: "De loin le [chronicler_candidate_1.GetWomanMan] le plus qualifié pour la tâche est [chronicler_candidate_1.GetName], et [chronicler_candidate_1.Custom('FR_IlElle')] semble avide de faire ses preuves.\n\n"
 ancestor_veneration.0042.desc.nepotism: "Cependant, [chronicler_candidate_2.Custom2('MyCharacterIntroduction', ROOT.Char)] ferait un candidat aussi apte que fiable."
 ancestor_veneration.0042.desc.enthusiasm: "[chronicler_candidate_3.Custom2('MyCharacterIntroduction', ROOT.Char)|U] semble résolument décidé[chronicler_candidate_3.Custom('FR_E')] à obtenir ce poste, bien qu'[chronicler_candidate_3.Custom('FR_IlElle')] ne soit pas tout à fait aussi apte que [chronicler_candidate_1.GetFirstNameNoTooltip]."
 ancestor_veneration.0042.desc.outro: "\n\nMais après tout, rien ne m'oblige à nommer qui que ce soit."
 ancestor_veneration.0042.a: "[chronicler_candidate_1.GetFirstNameNoTooltip|U] est le meilleur candidat."
 ancestor_veneration.0042.b: "Je puis faire confiance à [chronicler_candidate_2.GetFirstNameNoTooltip|U]."
 ancestor_veneration.0042.c: "[chronicler_candidate_3.GetFirstNameNoTooltip|U] est enthousiaste."
 ancestor_veneration.0042.d: "Je n'ai besoin de personne."

 ancestor_veneration.0043.t: "Un Antiquaire"
 ancestor_veneration.0043.desc.intro: "Mes études sont sur le point de commencer, et je n'ai pas encore désigné d'[GetCourtPositionType('antiquarian_court_position').GetName()]. Je pourrais m'en charger moi-même, mais un bon [ROOT.Char.GetTitleAsNameNoTooltip|U] sait quand il convient de s'en remettre à autrui."
 ancestor_veneration.0043.desc.hates_candidate_a: "Aussi difficile que cela me soit à admettre, le [host.Custom('InsultAdjective')] [antiquarian_candidate_1.GetFirstName] est le mieux qualifié pour ce poste.\n\n"
 ancestor_veneration.0043.desc.candidate_a: "De loin le [antiquarian_candidate_1.GetWomanMan] le plus qualifié pour la tâche est [antiquarian_candidate_1.GetName], et [antiquarian_candidate_1.Custom('FR_IlElle')] semble avide de faire ses preuves.\n\n"
 ancestor_veneration.0043.desc.nepotism: "Cependant, [antiquarian_candidate_2.Custom2('MyCharacterIntroduction', ROOT.Char)] ferait un candidat aussi apte que fiable."
 ancestor_veneration.0043.desc.enthusiasm: "[antiquarian_candidate_3.Custom2('MyCharacterIntroduction', ROOT.Char)|U] semble résolument décidé[antiquarian_candidate_3.Custom('FR_E')] à obtenir ce poste, bien qu'[antiquarian_candidate_3.Custom('FR_IlElle')] ne soit pas tout à fait aussi apte que [antiquarian_candidate_1.GetFirstNameNoTooltip]."
 ancestor_veneration.0043.desc.outro: "\n\nMais après tout, rien ne m'oblige à nommer qui que ce soit."
 ancestor_veneration.0043.a: "[antiquarian_candidate_1.GetFirstNameNoTooltip|U] est le meilleur candidat."
 ancestor_veneration.0043.b: "Je puis faire confiance à [antiquarian_candidate_2.GetFirstNameNoTooltip|U]."
 ancestor_veneration.0043.c: "[antiquarian_candidate_3.GetFirstNameNoTooltip|U] est enthousiaste."
 ancestor_veneration.0043.d: "Je n'ai besoin de personne."

 ancestor_veneration.0050.t: "Terme de l'Étude"
 ancestor_veneration.0050.desc: "La fatigue alourdit mes paupières, et les braises dans l'âtre rougeoient faiblement. Comme les heures ont passé vite. Je roule soigneusement les parchemins usés et les mets de côté. Avec un soupir las, je me redresse et me prépare à reprendre mes devoirs de souverain."
 ancestor_veneration.0050.a: "Je porterai les hauts faits des ancêtres avec moi en retournant gouverner."
 ancestor_veneration.0050.b: "Pour l'heure, que mes études sur les Nains reposent."

 ancestor_veneration.0060.t: "Clôture des Études"
 ancestor_veneration.0060.desc.intro: "Nos travaux touchent à leur fin, et mes érudits referment leurs livres et rangent leurs plumes, prêts à partir. Ils ont réuni"
 ancestor_veneration.0060.desc.standard: "un compendium magnifiquement rédigé et illustré des diverses sources que nous avons pu rassembler."
 ancestor_veneration.0060.desc.outro: "\n\nQue faire à présent ? Mieux vaudrait-il le laisser ici pour enrichir cette bibliothèque, ou le ramener dans ma collection ?"
 ancestor_veneration.0060.a: "Le confier aux archivistes, il enrichira leur bibliothèque."
 ancestor_veneration.0060.a.tt: "Les livres seront laissés sur place."
 ancestor_veneration.0060.b: "Le prendre avec nous, bien entendu ! Je le montrerai à tout le monde chez moi !"
 ancestor_veneration.0060.b.tt: "Vous emporterez le livre avec vous."
 ancestor_veneration.0060.c: "Je prendrai celui-là, merci bien."
 ancestor_veneration.0060.d: "Je préfère l'autre, je crois."

 ancestor_veneration.0063.t: "La Fin des Recherches"
 ancestor_veneration.0063.desc: "Avec la disparition de [host.Custom2('MyCharacterIntroduction', ROOT.Char)], ses recherches s'achèvent.\n\nTandis que les hôtes abattus s'en vont, je prie [ROOT.Char.GetFaith.HighGodNameAlternate] d'accueillir [host.GetFirstName] aussi chaleureusement en [ROOT.Char.GetFaith.PositiveAfterLife] qu'[host.Custom('FR_IlElle')] nous a accueillis en sa compagnie."
 ancestor_veneration.0063.a: "Quelle journée des plus stimulantes !"
 ancestor_veneration.0063.a.tt: "#F Vous savez... jusqu'à ce qu'[host.Custom('FR_IlElle')] meure.#!"

 ancestor_veneration.0064.desc: "Me voilà derrière les barreaux, mes études devront être annulées. Toutes ces heures passées à les préparer... Pour rien !"
 ancestor_veneration.0064.a: "Pas d'hôte, pas d'étude."

 ancestor_veneration.0065.desc: "[host.Custom2('MyCharacterIntroduction', ROOT.Char)|U] a été emprisonné[host.Custom('FR_E')], et ses grandes études ont pris fin. Quel contretemps !"

 ancestor_veneration.0070.t: "Des Recherches Interrompues"
 ancestor_veneration.0070.desc: "Mon prédécesseur, [host.GetNameRegnal], a quitté son enveloppe mortelle tandis qu'il organisait une grande étude. Tragiquement, [host.Custom('FR_IlElle')] [host.GetDeathReason].\n\n"
 ancestor_veneration.0070.desc.entourage: "$activity_system.1010.desc.entourage$"
 ancestor_veneration.0070.desc.ruler: "Ce [host.GetTitleAsName] tombé ne méritait pas de mourir ainsi."
 ancestor_veneration.0070.a: "$activity_system.1010.a$"
 ancestor_veneration.0070.tt: "[GetActivityType('activity_feast').GetName] [host.Custom('FR_du_Char_U_Pi')][host.GetShortUINameNoTooltip] a été annulée."

 ancestor_veneration.0071.t: "Une Piètre Assemblée"
 ancestor_veneration.0071.desc: "C'est incroyable. Malgré mes invitations et mes préparatifs, pas un seul invité ne s'est présenté pour rejoindre mon équipe de recherche.\n\nN'importe ! Je savourerai tous ces livres en solitaire, l'écho de mes pas dans la bibliothèque me tiendra compagnie !"
 ancestor_veneration.0071.a: "Suis-je donc si seul ?"
 ancestor_veneration.0071.b: "Je me sens quelque peu soulagé."

#  ancestor_veneration.0003.t: "Into the Archives"
#  ancestor_veneration.0003.desc: "I follow [realm_priest.GetCouncilTitle] [realm_priest.GetFirstName] into the lower halls, where the air is dry and still. Shelves of ledgers and worn scrolls line the room, each holding fragments of long-kept memory.\n\nWithout a word, [realm_priest.GetSheHe] begins scanning the seals and markings, moving with the ease of someone who knows exactly where to look. Soon, [realm_priest.GetSheHe] finds what [realm_priest.GetSheHe]'s after and hands me a scroll.\n\nI take it and sit down. The script is aged and the edges brittle, but the words remain clear."
#  ancestor_veneration.0003.a: "Let me read it without distraction."

