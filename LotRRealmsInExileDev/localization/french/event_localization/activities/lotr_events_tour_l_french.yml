l_french:

 lotr_tour_events.0100.t: "Un dîner magnanime"
 lotr_tour_events.0100.desc: "Le dîner bat son plein tandis que je regarde de l'autre côté de la table où [visiting_liege.GetName] est assis en tant qu'invité d'honneur. Je lève mon verre, prêt à porter un toast digne que tous les invités puissent entendre, et bientôt, tous les regards se tournent vers moi un bref instant.\n\nChoisissant mes mots avec soin, je commence par remercier tout le monde d'être venu, et par louer la qualité de la nourriture et des boissons fournies par mes fidèles serviteurs. Puis, j'ajoute une pause dramatique pour plus d'effet, alors que je m'apprête à conclure mon discours en..."
 lotr_tour_events.0100.a: "...prononçant des paroles d'espoir et de réjouissance."
 lotr_tour_events.0100.b: "...soulignant le grand courage de [visiting_liege.GetName] !"

 lotr_tour_events.0101.t: "Murs hauts et mains fortes"
 lotr_tour_events.0101.desc: "Lors de la visite des terres de ma cour, je mène [visiting_liege.GetName] aux remparts extérieurs de la seigneurie. De là, tout le monde a une vue splendide sur les terres environnantes, et je m'assure que mon [liege|El] voit combien les défenses sont bien entretenues et solides.\n\nLes [elves|E] ne vont pas à la guerre sans raison valable, mais nos ennemis n'ont pas de telles réserves. Les [orcs|E] sont enclins aux raids, tout comme certains Hommes ayant succombé au service du Seigneur Sombre."
 lotr_tour_events.0101.a: "Notre vigilance ne faiblira jamais, m[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('FR_SeigneurDame')|U]."
 lotr_tour_events.0101.b: "Nous avons besoin d'aide pour réparer ces défenses."

 lotr_tour_events.0102.t: "Un souvenir des Jours Passés"
 lotr_tour_events.0102.desc: "Le festival bat son plein, et j'accompagne [visiting_liege.GetName] tandis que'[visiting_liege.Custom('IlElle')] parcourt les terrains de la fête, prenant des impressions de toutes les différentes activités et réjouissances en cours.\n\nPrès de la zone centrale du festival, [visiting_liege.GetFirstName] semble très impressionné par une pièce représentant les exploits héroïques du Premier Âge, tels que le courage des [elves|E] qui ont résisté à de nombreuses attaques de [morgothcharacter|E]."
 lotr_tour_events.0102.a: "Nous avons encore la force semblable à celle des héros d'autrefois."
 lotr_tour_events.0102.b: "Une telle performance devrait être donnée dans tout le royaume !"

 lotr_tour_events.0500.t: "Chansons au coin du feu"
 lotr_tour_events.0500.desc: "Pendant que le dîner bat son plein, musiciens et chanteurs se tiennent près de la grande cheminée qui ancre la salle de banquet, interprétant de nombreuses chansons magnifiques. Je remarque [stop_host_scope.GetName], assis de l'autre côté de la table, regardant les performances avec excitation.\n\nAlors qu'une autre chanson se termine, je fais une pause dans mon repas un instant et, m'adressant à [stop_host_scope.GetFirstName], je..."
 lotr_tour_events.0500.a: "...annonce que je chanterai moi-même la prochaine chanson."
 lotr_tour_events.0500.b: "...complimente [stop_host_scope.Custom('FR_LeLa')] pour avoir organisé de telles réjouissances."

 lotr_tour_events.0501.t: "La vigile inquiète"
 lotr_tour_events.0501.desc: "Alors que nous visitons les terres de [stop_host_scope.GetName], nous sommes conduits aux défenses extérieures du refuge. Je suis ravi de voir qu'il y a des sentinelles bien placées surveillant toutes les approches du village, et [stop_host_scope.GetFirstName] m'assure qu'il y a encore plus de gardiens cachés hors de vue.\n\n« Cela me rassure de savoir que vos terres sont bien protégées, [stop_host_scope.GetFirstName], » dis-je, et je continue en ajoutant..."
 lotr_tour_events.0501.a: "« Aucun mal ne franchira votre vigile attentive. »"
 lotr_tour_events.0501.b: "« Je vais investir dans vos défenses. »"

 lotr_tour_events.0502.t: "Une performance merveilleuse"
 lotr_tour_events.0502.desc: "Le festival culturel commence à atteindre son apogée alors que [stop_host_scope.GetName] me conduit doucement vers la place centrale de la fête, où une scène a été érigée. En nous rapprochant, je vois qu'une pièce y est jouée, représentant divers événements du Premier Âge.\n\nDes scènes montrent le courage des [elves|E] qui ont tenu bon pendant de nombreux siècles contre les innombrables attaques de [morgothcharacter|E]. Lorsque la pièce se termine, [stop_host_scope.GetFirstName] se tourne vers moi, l'air très satisfait. « La performance vous a-t-elle plu ? » demande t-[stop_host_scope.Custom('IlElle')], et je réponds..."
 lotr_tour_events.0502.a: "« C'était vraiment merveilleux. »"
 lotr_tour_events.0502.b: "« Cela devrait être joué dans tout le royaume ! »"