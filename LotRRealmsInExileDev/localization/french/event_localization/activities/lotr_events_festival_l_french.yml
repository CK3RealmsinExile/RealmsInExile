l_french:

 festival.004.hobbit.desc: "Les invités se rassemblent autour du jardin du festival, bavardant avec enthousiasme des souhaits qu'ils ont formulés pour les jours et les années à venir.\n\nSous la douce lueur des étoiles, je m'arrête un instant, profitant de l'atmosphère joyeuse et des sons lointains du festival tout autour de moi, et il me vient à l'esprit que moi aussi, j'aurais peut-être un souhait à formuler."
 festival.004.e: "Je souhaite des coffres remplis et de nombreux repas heureux."

 festival.008.hobbit.desc: "L'air lui-même semble vibrer au son des flûtes et du roulement des tambours, tandis que de jeunes [hobbits|E] dansent gaiement - certains sont même montés sur les tables pour le faire.\n\nC'est leur démonstration joyeuse qui réjouit l'esprit et l'âme, et je commence à penser aux choses à venir. De bonnes récoltes, des repas abondants et un repos bien mérité après une journée de dur labeur."

 festival.010.d: "Une délicatesse locale, bien sûr !"

 festival.014.hobbit.t: "Ces jours de bonheur"
 festival.014.hobbit.desc: "Aujourd'hui est le jour de notre festival planifié ! Chaque [hobbit|E] invité arrive, chacun rayonnant d'excitation et de joie. Bientôt, les festivités commenceront sérieusement, et quelle occasion grandiose ce sera !"
 festival.014.b: "J'ai hâte du banquet !"

 festival.018.hobbit.t: "Un besoin de boisson"
 festival.018.hobbit.desc: "Ah, quelle soirée joyeuse ! À perte de vue, des hobbits réjouis s'amusent vraiment merveilleusement. Mais soudain, un tumulte apparaît. En enquêtant sur le bruit, je tombe sur [possessed_priestess.GetFirstName], une jeune fille que je n'avais jamais vue.\n\n« S'il vous plaît, quelque chose à boire, vite ! » supplie-t-elle en me tendant son gobelet vide. Comme c'est étrange ! Les provisions seraient-elles déjà épuisées ? Ou [possessed_priestess.GetFirstName] a-t-elle des difficultés à trouver les tonneaux de vin, juste là-bas ?"
 festival.018.d: "Tiens, laisse-moi te servir à boire."

 festival.019.d: "Eh bien, cela devrait être un bon moment pour tous les invités !"

 festival.101.hobbit.t: "Un certain parfum"
 festival.101.hobbit.desc: "Bien avant de voir [target_character.GetName], on peut certainement le #italic sentir#!. Bien que les parfums ne soient pas inconnus dans la Comté, leurs effets sont rarement destinés à être perçus à une centaine de pieds de la personne qui les porte.\n\nPeut-être qu'une note discrète serait appropriée, bien qu'un murmure à une autre oreille pourrait assurer que cette faiblesse perdure bien après la disparition du parfum."

 festival.103.hobbit.desc: "Alors que je me promène dans les allées du festival, j'entends une voix forte.\n\nMes vers sont #italic exquis# !! Pourquoi, il y a seulement quinze jours, [target_character2.GetName] a mis à l'épreuve mon talent poétique, et a été humilié par mon art ! [target_character.GetFirstName] se vante.\n\nJe ne me souviens d'aucune rumeur disant qu'il possédait un quelconque talent pour la poésie, mais renforcer son égo pourrait me servir. Cependant, remettre un fanfaron à sa place est difficile à résister..."

 festival.104.hobbit.desc: "Chaque rassemblement a son flux et reflux, et il faut se méfier de ses courants pour ne pas se retrouver isolé.\n\nLorsque [target_character3.GetFirstName] se tourne pour saluer [target_character4.GetFirstName], je me retrouve soudainement perdu dans la foule, privé de conversation.\n\nUn peu plus loin, je vois [target_character.GetFirstName] et [target_character2.GetFirstName] regardant ostensiblement dans ma direction, mais un tel geste est-il vraiment une invitation ?"