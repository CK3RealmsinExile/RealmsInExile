l_french:
 pilgrimage.1100.t.ulmo: "$pilgrimage_header$ la Flamme d'Ulmo"
 pilgrimage.1100.t.stormking: "$pilgrimage_header$ la flamme du Roi des Tempêtes"
 
 lotr_pilgrimage.0001.t: "La Radiance de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier]"
 lotr_pilgrimage.0001.desc: "Je me tiens devant l’entrée principale de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier], merveille véritable de l’art des Elfes. Un instant, le silence me saisit tandis que ma suite se rassemble derrière moi. Serait-ce là une occasion d’attiser en leurs cœurs une espérance nouvelle, éveillée par une telle splendeur ? Ou ne ferais-je qu’user de l’aura radieuse de ce sanctuaire à des fins trop légères ?"
 lotr_pilgrimage.0001.a: "Tant que [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier] se dressera, l'[hope|El] ne faiblira point."
 lotr_pilgrimage.0001.b: "Ne nous attardons pas, le sanctuaire nous appelle."

 lotr_pilgrimage.0002.t: "Sous les bois"
 lotr_pilgrimage.0002.desc: "Ma suite et moi avons suivi les sentiers sylvestres de [ROOT.Char.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTier] depuis un long moment déjà, et j’y perçois une ombre de tristesse qui voile toute joie et tout chant. Appelant à une halte dans une clairière retirée, je me tourne vers les [elves|E] présents.\n\nSi je veux raviver l'[hope|El] en leurs cœurs, il me faudra choisir mes paroles avec soin. Pourtant, je pourrais aussi m’adresser à chacun d’eux avec des mots de réconfort, et ainsi m’attacher davantage leur estime."
 lotr_pilgrimage.0002.a: "Je parlerai d’[hope|El], afin d’éclairer leur voie."
 lotr_pilgrimage.0002.b: "J’offrirai à chacun des paroles d’encouragement."
 
 pilgrimage.3005.t: "$pilgrimage_header$ le Seigneur Sombre arrive" #LotR
 pilgrimage.3005.desc: "Alors que mon groupe traverse une petite ville, je remarque une foule qui s'est rassemblée sur la place du marché. Au milieu, un[doomsayer.Custom('FR_E')] [doomsayer.GetWomanMan] se tient sur un chariot à poisson renversé et s'adresse bruyamment à tous ceux qui veulent bien l'écouter : « La fin est proche ! Les armées du Seigneur Sombre marchent sur nous ! Les [ROOT.Char.GetFaith.PantheonTerm] nous ont abandonné ! »\n\nLes citadins chuchotent nerveusement, car ils ont peur des paroles [doomsayer.Custom('FR_DuDela')] proph[doomsayer.Custom('FR_EteEtesse')] de malheur." #LotR
 pilgrimage.3005.a: "« Pas tant que je serai en vie »" #LotR
 pilgrimage.3005.a.flavor: "La Terre du Milieu s'est déjà trouvée au bord du précicipe autrefois..." #LotR
 pilgrimage.3005.b: "Avançons et ne lui prêtons pas d'attention" #LotR
 pilgrimage.3005.c: "Cet[doomsayer.Custom('FR_TTte')] [doomsayer.GetWomanMan] est clairement devenu[doomsayer.Custom('FR_E')] f[doomsayer.Custom('FR_OuOlle')] ! Faites-[doomsayer.Custom('FR_LeLa')] descendre de là !" #LotR
 
 ###Generic Pilgrimage Destination Events
 #Standard arrival
 pilgrimage.4001.a.adunaic: "J'ai marché et vécu la preuve de notre Grandeur."

 # LOTR
 pilgrimage.5701.t: "Barad-dûr"
 pilgrimage.5701.desc.sauron: "Les serviteurs du [darklord|E] du monde entier empruntent le chemin périlleux des plaines cendrées de Gorgoroth pour contempler le site de Barad-dûr. Que ce soit silencieux ou rempli de serviteurs damnés des Ténèbres, c'est un lieu d'effroi, la puissance des Ténèbres imprégnant l'air même.\n\nMes jambes tremblent pendant que je marche, l'effroi et la terreur s'entremêlant d'être au cœur d'une telle puissance."
 pilgrimage.5701.a: "Une telle terreur..."
 pilgrimage.5701.b: "Loué soit le Seigneur Sombre !" 

 pilgrimage.5702.t: "Sammath Naur"
 pilgrimage.5702.desc.evil: "Enfouie profondément dans la chaleur déchaînée d’Orodruin se trouve Sammath Naur, les Failles du Destin.\n\nLa chaleur est presque insupportable pour moi – mais je continue d’avancer. Voici les véritables forges d’un dieu, dans lesquelles ont été forgées des choses terribles et grandioses.\n\nIl n’y a ni gardes, et encore moins de visiteurs – rares sont ceux qui oseraient affronter cet enfer. Mais alors que je contemple les forges noircies et occultes au cœur du volcan, je suis saisi d’admiration."
 pilgrimage.5702.a: "Mont Destin."
 pilgrimage.5702.a.cynical: "Mont Destin... un nom approprié." 

 pilgrimage.5703.t.faithful: "Minas Ithil" 
 pilgrimage.5703.t.evil: "La Cité de la Sorcellerie"
 pilgrimage.5703.desc.evil: "L’ancienne cité d’[isildur|E] a depuis longtemps été transformée. Ses ouvrages de pierre luisent désormais d’un vert pâle de non-mort, et la route est surveillée par d’effroyables statues. Ceux qui souhaitent apprendre les voies de Morgul s’y rendent, une sorcellerie sombre et profane. Peu vont jusqu’au bout, mais malgré tout, c’est une terre de terreur divine. Je maîtrise ma peur et j’entre."

 pilgrimage.5705.t: "Le Grand Havre de Pelargir"
 pilgrimage.5705.t.faithful: "Eithel Ulu"
 pilgrimage.5705.desc.adunaic: "Arrivant par bateau, je foule enfin le sol du port de Pelargir.\n\nJ’arpente cet immense havre ; un flot constant de navires y accoste, déchargeant marchandises exotiques, vivres et butin. Notre peuple est exposé aux merveilles du monde entier, toutes convergeant vers Pelargir. Et en retour, ces visiteurs découvrent à leur tour les merveilles de Pelargir et répandent sa gloire à travers le monde. Désormais revenue à ses racines et traditions adûnaïques, Pelargir peut être considérée comme l’un des plus grands legs survivants de la défunte Anadûnê.\n\nLe Grand Roi Castamir chérissait autrefois Pelargir, et tenta sagement de restaurer son héritage adûnaïque ; pour cela, il fut honni par les Nimruzîrim du [gondor|E], et sa lignée fut bannie. En notre ère, cependant, nous, Fidèles adûnaïques, avons repris Pelargir, prouvant notre supériorité sur les Adorateurs de l’Arbre Blanc une bonne fois pour toutes.\n\nMais il est finalement temps de repartir. Mettant le cap, nous rentrons chez nous, laissant derrière nous le grand havre de Pelargir."
 pilgrimage.5705.desc.faithful: "Alors que j’entre dans le [tol_aerhir|E], guidé par l’un des maîtres du savoir, je me sens honoré d’être l’un des rares à avoir jamais été autorisé à pénétrer dans les grottes de [eithel_ulmo|E].\n\nMon guide me conduit à travers les merveilleuses grottes, créées et façonnées par [ulmocharacter|E] lui-même, toujours plus profondément, à travers des cavernes apparemment sans fin, jusqu’à ce que nous atteignions une lourde porte renforcée d’acier : l’entrée de la source de [eithel_ulmo|E].\n\nLorsque j’entre dans la pièce, je me sens observé, mais pas d’une manière suspecte. Au contraire, je me sens totalement serein, comme guidé par un esprit ancien et sage.\n\nAlors que je contemple les difficultés auxquelles moi et mes sujets faisons face, je reçois soudain des intuitions et des révélations comme je n’en ai jamais eues auparavant.\n\nEn quittant la pièce et remontant vers Tol Aerhir, je ne peux que conclure que [ulmocharacter|E] lui-même m’a conseillé..."
 pilgrimage.5705.a.adunaic: "Des milliers de voiles..." 
 pilgrimage.5705.a.faithful: "La descente est longue."
 
 pilgrimage.5706.t: "Le Havre Noir d'Umbar"
 pilgrimage.5706.desc.adunaic: "Je hisse les voiles de mon navire en approchant des quais du grand havre d'Umbar. Même mon puissant navire semble n’être qu’un jouet minuscule au milieu des vénérables tours et constructions en pierre adûnaïque.\n\nEn débarquant sur la jetée au sud du port, je contemple les magnifiques palais des Seigneurs de la Mer de l’ancienne Anadûnê. Plus profondément dans la cité, j’aperçois les vestiges de Tarma Tar Calion, le souvenir du dernier grand roi d’Anadûnê, Ar-Pharazôn. Me demande-je si je pourrai un jour élever notre peuple à la même grandeur ?\n\nJe poursuis mon chemin à travers les rues animées du quartier du marché et j’observe les statues fanées des grands rois umbariens d’antan – parmi eux, je reconnais Herumor, Fuinur, et même le juste roi Castamir lui-même.\n\nAlors que le soleil se couche, je regagne mon navire, rempli d’espoir et d’ambition pour l’avenir. Je suis certain que, par la grâce des rois adûnaïques d’antan, j’élèverai notre peuple vers de nouveaux sommets. Un jour, mes héritiers fouleront les rues d’Umbar en contemplant des statues à mon effigie."
 pilgrimage.5706.a: "J’ai marché et constaté la preuve de notre Grandeur."
 pilgrimage.5706.b: "$pilgrimage.4001.b$"
 
 pilgrimage.5707.t: "Târikêth an-Kharat"
 pilgrimage.5707.desc: "Mon cortège et moi arrivons épuisés à Târikêth an-Kharat à cheval. Tandis que nous traversons les terres agricoles vallonnées, ma fatigue disparaît soudainement lorsque mes yeux se posent sur les imposants remparts de Zadan an-Adûn — le joyau de Târikêth an-Kharat.\n\nS’élevant au-dessus des murailles, je découvre une merveille de maçonnerie adûnaïque : une remarquable forteresse aux teintes rougeâtres. J’entre dans la cité par la porte principale. En arpentant les rues pavées, j’observe la pierre taillée avec une précision impeccable. C’est là, sans nul doute, la preuve que les Anbalûkkhôri sont les véritables descendants d’Anadûnê.\n\nEnfin, je franchis les murs de la Citadelle Rouge elle-même. En son sein repose le trône des Anbalûkkhôri. Les salles sont décorées d’œuvres d’art pompeuses, de biens luxueux et de reliques de l’ancienne Anadûnê, fièrement exposées dans les nombreuses salles du donjon.\n\nAlors que je quitte la cité et m’éloigne au trot vers mon foyer, je médite sur les nombreux grands Adûnâi, loyaux aux Hommes du Roi d’autrefois, qui régnèrent depuis ce siège du pouvoir en des temps anciens."
 pilgrimage.5707.a: "J’ai marché et constaté la preuve de notre Grandeur."
 pilgrimage.5707.b: "$pilgrimage.4001.b$"
 
 pilgrimage.5708.t: "Hazaj Tollin"
 pilgrimage.5708.desc: "Ah, Hazaj Tollin... La première colonie adûnaïque en Bellakar, fondée par les Adûnâi aux premiers temps du Deuxième Âge, sous le règne du neuvième roi d’Anadûnê, le glorieux Tar-Súrion.\n\nJe descends de mon cheval et parcours les environs de la cité pendant des heures, émerveillé par l’Arche de Ciryandur au-delà des portes de la ville. Je me remémore le nom de cette arche : l’honorable capitaine adûnaïque qui découvrit la côte de Bellakar et établit Hazaj Tollin. J’examine les détails minutieux qui ornent la surface de l’arche, laquelle, contrairement au reste de la cité, a résisté aux grandes vagues de l’Akallabêth qui dévastèrent ces lieux.\n\nLes magnifiques ouvrages de pierre de mes ancêtres sont un spectacle à couper le souffle. Je ferme les yeux et médite sur les nobles exploits de mes aïeux : la fondation de cette colonie, la soumission puis l’anoblissement des Haradrim. Empli de fierté et d’admiration, je remonte à cheval et quitte les limites de la cité."
 pilgrimage.5708.a: "J’ai marché et constaté la preuve de notre Grandeur."
 pilgrimage.5708.b: "$pilgrimage.4001.b$"
 
 pilgrimage.5709.t: "Le Grand Havre de Korlea"
 pilgrimage.5709.desc.adunaic: "J’arrive au port de Korlea par bateau. L’anse menant au havre est grouillante de toutes sortes de navires, grands et petits : majestueux vaisseaux marchands, bateaux de pêche de toutes tailles, navires militaires, et enfin ; les prétentieux yachts amarrés à la jetée du quartier noble.\n\nKorlea est un creuset de cultures indigènes, mais sous ce tumulte, je distingue l’architecture et le stuc sculpté propre à l’artisanat adûnaïque. Je ressens l’héritage fier des Adûnâi tandis que j’explore les moindres recoins de la cité. Korlea fut jadis une ville fière et florissante, bastion des plus loyaux Hommes du Roi d’antan.\n\nJe flâne dans les divers quartiers jusqu’au coucher du soleil, avant de retourner sur mon navire pour une bonne nuit de sommeil. Mes rêves m’emmènent vers un futur proche, celui de Korlea sous le contrôle ferme des Hommes du Roi. J’y vois la silhouette d’une figure adûnaïque royale, assise sur le trône de Korlea, acclamée par la foule. Cette silhouette me rappelle… moi-même. Le rêve est intense, mais je me sens en paix."
 pilgrimage.5709.a.adunaic: "J’ai marché et constaté la preuve de notre Grandeur."
 pilgrimage.5709.b: "$pilgrimage.4001.b$"
 pilgrimage.5809.desc.neutral: "J’arrive au port de Korlea par bateau. L’anse menant au havre est grouillante de toutes sortes de navires, grands et petits : majestueux vaisseaux marchands, bateaux de pêche de toutes tailles, navires militaires, et enfin ; les prétentieux yachts amarrés à la jetée du quartier noble.\n\nKorlea est un creuset de cultures indigènes, mais l’influence de l’architecture [numenorean|E] est encore visible. Je ressens l’ancienneté des bâtiments de pierre en explorant les moindres recoins de la cité.\n\nJe flâne dans les divers quartiers jusqu’au coucher du soleil, avant de retourner sur mon navire pour une bonne nuit de sommeil."
 
 pilgrimage.5710.t: "La Grande Cité de Bôzisha-Dâr"
 pilgrimage.5710.desc: "Tôt le matin, j’arrive dans la grande cité de Bôzisha-Dâr, connue sous le nom de Port-Sévère dans la langue commune. Les marchés de la ville sont déjà pleins de vie, et l’on entend les marchands vanter leurs marchandises en une douzaine de langues à travers tout le centre urbain. Sur le port, de grands négociants discutent à voix haute de leurs affaires habituelles et se plaignent des taxes et des corsaires. Dans la ville haute résident les plus riches nobles et familles marchandes, installés dans leurs vastes palais.\n\nLe Rây est une terre de nombreux peuples et croyances, et l’on y trouve des sanctuaires dédiés à une grande variété de divinités [haradric|E]."
 pilgrimage.5710.a.greedy: "C’est l’argent qui fait la différence entre rois et mendiants ici."
 pilgrimage.5710.a.generous: "Ceux qui n’ont pas le sou ne peuvent prospérer ici."
 
 pilgrimage.5801.t: "Le Sanctuaire d'Imrazôr"
 pilgrimage.5801.desc: "Arrivant par bateau, j’aperçois enfin l’anse qui abrite le lieu de repos final d'[imrazor|E] ; renommé comme le père des Princes de [dol_amroth|E] et, selon la légende, l’époux d’une [elven|E] vierge. Même à cette distance, je sens le parfum enivrant du [oiolaire_tree|E] pour lequel cette crique est si fameuse. \n\nAccostant à une jetée dissimulée, je débarque. À l’entrée de la crique, une présence semble peser sur moi. Comme si l’on jaugeait mes intentions. Après un instant, la sensation disparaît, et je me sens irrésistiblement poussé à entrer. Les légendes disent que [uinencharacter|E] veille sur ce lieu sacré ; était-ce son pouvoir que j’ai ressenti ?\n\nEn entrant, je découvre une scène magnifique : un [oiolaire_tree|E] surplombe de nombreux autres arbres entourant un mausolée impressionnant, recouvert de fleurs, un rayon de soleil illuminant l’ensemble. Au-dessus de celui-ci, je vois une statue saisissante représentant sans doute [imrazor|E] lui-même !\n\nPrenant un moment pour rendre hommage, je quitte à regret la crique et retourne à mon navire. Jamais je n’oublierai ce que j’ai vu, ni le parfum du [oiolaire|E]."
 
 pilgrimage.5803.t: "Minas Tirith"
 pilgrimage.5803.t.faithful: "Mindolluin, le Mont Sacré"
 pilgrimage.5803.desc.faithful: "$pilgrimage.4001.desc$"
 pilgrimage.5803.desc.adunaic: "$pilgrimage.4001.desc$"
 
 pilgrimage.5804.t: "Orthanc"
 pilgrimage.5804.desc.generic_good: "Je suis enfin arrivé. Je lève les yeux vers l’imposante tour noire nommée [orthanc|E], qui se dresse fière et inébranlable. Au grand cercle de pierre de l’[isengard|E], on m’invite à entrer. \n\nOn m’encourage à me promener dans les paisibles et magnifiques jardins [numenorean|E]. Soigneusement entretenus par de nombreux jardiniers, ils forment un bouquet vibrant de vie, peuplé de toutes sortes d’arbres et de plantes. Je prends un moment pour pêcher dans la rivière de l’[isengard|E], avant d’être finalement conduit vers [orthanc|E] elle-même."
 pilgrimage.5804.desc.saruman_good: "Je suis enfin arrivé. Je lève les yeux vers l’imposante tour noire nommée [orthanc|E], qui se dresse fière et inébranlable. Au grand cercle de pierre de l’[isengard|E], on m’invite à entrer. \n\nOn m’encourage à me promener dans les paisibles et magnifiques jardins [numenorean|E]. Soigneusement entretenus par de nombreux jardiniers, ils forment un bouquet vibrant de vie, peuplé de toutes sortes d’arbres et de plantes. Je prends un moment pour pêcher dans la rivière de l’[isengard|E], avant d’être finalement conduit vers [orthanc|E] elle-même.\n\nLà, le gardien de l’[isengard|E] m’accueille. Ensemble, nous nous retirons dans une pièce plus profonde de la [Concept('orthanc','tour noire')|El], où nous passons de longues heures à parler et à discuter de maintes choses. Je demande conseil sur de nombreux sujets, et mon hôte y réfléchit longuement avant de me faire part de ses avis et réponses. Nous finissons par dîner ensemble. Le vin et le porc salé qu’on m’offre sont particulièrement savoureux."
 pilgrimage.5805.desc.postents: "Je suis enfin arrivé. Je lève les yeux vers l’imposante tour noire nommée [orthanc|E], qui, malgré les nombreuses tribulations de sa longue histoire, se dresse toujours fièrement. Là où se trouvait jadis un grand cercle de pierre protecteur, il ne reste plus que des décombres ; un rappel durable de la force des [ents|E]. \n\nBien que les impressionnants jardins [numenorean|E] de l’[isengard|E] aient disparu, les [ents|E] ont laissé derrière eux une grande beauté verdoyante : le Jardin-des-Arbres d’[orthanc|E]. Après leur victoire, ils se sont employés à rendre vie à la terre dévastée. À l’issue de leur labeur, ils avaient fait naître une forêt nouvelle et formidable. \n\nVergers, clairières et vie s’étendent désormais sur la région. La rivière, autrefois endiguée, coule désormais en un ruisseau paisible se jetant dans un lac, au centre duquel se dresse [orthanc|E]. Bien que la tour m’en soit interdite, je prends un moment pour flâner et admirer l’œuvre des [ents|E]. \n\nJe n’oublierai jamais qu’aussi profondément le mal puisse ravager un lieu — comme ce fut le cas à [isengard|E] —, il peut toujours renaître."
 pilgrimage.5804.desc.evil: "Il était temps que j’arrive. Descendant de cheval, je lève les yeux vers l’imposante forteresse qu’est [orthanc|E] ; l’Anneau de l’[isengard|E]. Un immense mur de pierre formant un cercle. Des regards perçants m’observent depuis les créneaux, et je m’identifie d’un cri. Les yeux s’écarquillent, les gardes ordonnent rapidement l’ouverture des portes. \n\nDès mon entrée, mon attention est happée par la tour massive d’[orthanc|E]. Énorme et intimidante, sa silhouette est visible à des kilomètres. Là où s’étendaient jadis les jardins verdoyants [numenorean|E], il ne reste plus que terre morte et vastes fonderies, constamment alimentées pour entretenir les rouages de l’industrie. \n\nAlors que j’arpente l'[isengard|E], je m’efforce de mémoriser ce que je vois. L’intérieur d’[orthanc|E] est intéressant à explorer, bien que je ne puisse accéder qu’au premier étage. L’ouvrage est magistralement conçu, impressionnant autant de l’extérieur que de l’intérieur. \n\nFinalement, je décide de quitter l'[isengard|E]. Jetant un dernier regard aux cieux couverts de suie d’[orthanc|E], je reprends la route du retour."
 pilgrimage.5806.t: "Dol Amroth"
 pilgrimage.5806.desc.faithful: "$pilgrimage.4001.desc$"    #placeholder
 
 pilgrimage.5807.t: "Les Champs de Tertres d’Edoras"
 pilgrimage.5807.desc: "$pilgrimage.4001.desc$"    #placeholder
 
 pilgrimage.5840.t: "La Cité cachée dans les Cimes"
 pilgrimage.5840.desc: "Au début, je pense que mon guide m’a trompé — nous devrions déjà être arrivés à Sairthiudabaurg. Mais alors il fait un signe, et soudain je réalise que nous nous tenons déjà sous la Cité Cachée ! Avec un regain d’intérêt, j’observe de plus près les cimes autour de moi — il semble y avoir des sentiers dissimulés dans les branches de presque chaque grand arbre ! Un réseau ingénieux de plateformes dissimulées, reliées par des passerelles suspendues et des ponts de corde artistiques, est soutenu par une combinaison de menuiserie habile et des anciens arbres de la forêt elle-même.\n\nDe nombreuses heures plus tard, je suis assis dans une taverne accrochée au flanc d’un vieux chêne. Mon pèlerinage fut un succès, et les longues heures de marche ont porté leurs fruits. Il me faut à présent planifier mes prochaines actions."
 pilgrimage.5840.c: "Quel endroit ! Peut-être puis-je troquer quelques herbes rares dans les environs."
 pilgrimage.5840.ctt: "Vous obtenez diverses herbes rares que l’on ne trouve que dans la forêt de Grand'Peur au marché voisin."
 pilgrimage.5840.d: "Je chercherai les conseils du Sage des Bois."
 pilgrimage.5840.dtt: "Vous décidez de faire un détour par les bois voisins de Rhosgobel, dans l’espoir de tomber sur le [sageofthewoods|E]."
 
 pilgrimage.8401.t: "Aradhrynd"
 pilgrimage.8401.desc.elven: "$pilgrimage.4001.desc$"    #placeholder
 
 pilgrimage.8402.t: "Caras Galadhon"
 pilgrimage.8402.desc.elven: "$pilgrimage.4001.desc$"    #placeholder
 
 pilgrimage.8403.t.evil: "Dol Guldur"
 pilgrimage.8403.t.elven: "Amon Lanc"
 pilgrimage.8403.desc.elven: "$pilgrimage.4001.desc$"    #placeholder
 pilgrimage.8403.desc.evil: "$pilgrimage.4001.desc$"    #placeholder
 
 pilgrimage.8404.t: "Grand Palais d'Amrûn"
 pilgrimage.8404.desc: "Enfin, j'arrive au Grand Palais d'Amrûn, le cœur battant de la culture [haradrim|E] du Harad proche. Les rues de la ville que je traverse sont pleines de marchands et de soldats, mais en me dirigeant vers le complexe du palais, je suis impressionné par sa construction solide – bien que clairement destiné à être un centre administratif, il possède aussi de formidables défenses."
 
 pilgrimage.8405.t: "Oasis de Mazharath"
 pilgrimage.8405.desc: "Ma caravane arrive enfin à l'Oasis de Mazharath, l'un des seuls lieux de repos dans la dure Mer de Dunes.\n\nAlors que mes hommes et moi nous rafraîchissons à une fontaine, je réfléchis à tout ce qui a dû se passer pour que [ROOT.Char.GetFaith.PantheonTerm] me conduise ici, en ce moment précis."
 
 pilgrimage.8406.t: "Dale"
 pilgrimage.8406.desc: "J'arrive enfin aux portes du [dale|E]. La cité [northron|E] est l'une des plus grandes du [rhovanion|E]. Je tombe bientôt sur le « Marché des Merveilles », la grande place de la ville où marchands et bricoleurs offrent de nombreuses marchandises — la cité est réputée pour ses bricoleurs et fabricants de jouets.\n\nJe réfléchis à tout ce qui a dû se passer pour que [ROOT.Char.GetFaith.PantheonTerm] me conduise ici, en ce moment précis."
 
 pilgrimage.8407.t: "Le Bourg-du-Lac"
 pilgrimage.8407.desc: "Enfin, moi et ma suite arrivons à Bourg-du-Lac. Connue en entier sous le nom d’Esgaroth sur le Long Lac, la cité [northron|E] est remarquable pour être construite entièrement en bois, reposant sur des piliers de bois enfoncés dans le fond du Long Lac.\n\nJe réfléchis à tout ce qui a dû se passer pour que [ROOT.Char.GetFaith.PantheonTerm] me conduise ici, en ce moment précis."