 lotr_hunt.0001.t: "Vantardise sanglante"
 lotr_hunt.0001.desc: "La piste s’est refroidie et la troupe s’impatiente. Tandis que nous examinons une branche brisée, [orc_potential_rival.GetFirstName] crache au sol et me lance un regard chargé de mépris. \n\n« Voilà des heures que nous marchons sans rien trouver d’autre que de la boue », gronde-t-il assez fort pour être entendu des autres. « Si c’était moi qui menais cette chasse, nous festoierions déjà. Tu passes plus de temps à renifler l’air qu’à flairer une piste. Nous conduis-tu vers une proie... ou nous promènes-tu dans la fange ? »"
 lotr_hunt.0001.a: "Je trouverai la bête, et ensuite une bonne raison de t’éventrer !"
 lotr_hunt.0001.b: "Silence, imbécile. Tes braillements font fuir tout le gibier."

 lotr_hunt.0002.t: "Une flèche dans le dos"
 lotr_hunt.0002.desc: "La forêt est silencieuse tandis que nous progressons à travers les fourrés. Soudain, un sifflement aigu fend l’air, et une flèche aux plumes noires vient se ficher dans un tronc à quelques pouces de mon épaule. \n\nJe me retourne vivement et vois [orc_potential_rival.GetFirstName] ajuster la prise sur son arc. « Mille pardons », ricane-t-il, les yeux brillants de malice. « J’ai cru voir une ombre derrière ta tête. Ma visée doit faiblir dans cette pénombre. » \n\nLa menace est claire. Il cherche à savoir combien je supporterai avant de riposter."
 lotr_hunt.0002.a: "La prochaine flèche sera pour toi, et elle ne manquera pas sa cible !"
 lotr_hunt.0002.b: "Surveille où tu pointes cela, à moins de vouloir mâcher la corde."

 lotr_hunt.0003.t: "Proie usurpée"
 lotr_hunt.0003.desc: "Alors que je découvre des traces fraîches près d’un ruisseau, un tumulte éclate plus loin sur le sentier. Je m’élance et trouve [orc_potential_rival.GetFirstName] debout au-dessus d’un petit charognard sans vie, pris dans un piège grossier. \n\n« Regardez donc ! » crie-t-[orc_potential_rival.Custom('FR_IlElle')] à la troupe qui s’approche, brandissant la misérable carcasse. « Le premier sang de ce jour m’appartient ! Tandis que le chef contemplait d’antiques empreintes, j’assurais, moi, notre dîner. » \n\nD’un coup dérisoire, [orc_potential_rival.Custom('FR_IlElle')] cherche à s’approprier l’élan de la chasse et à saper mon autorité avant même que la véritable proie ne soit trouvée."
 lotr_hunt.0003.a: "Ce n’est qu’un rat, point un trophée. Repose cela et suis-moi."
 lotr_hunt.0003.b: "Si ce maigre rebut te satisfait, tu n’es qu’un chasseur pitoyable."

 lotr_hunt.0004.t: "Retraite d’un Lâche"
 lotr_hunt.0004.desc: "Nous traversons un défilé étroit et périlleux en direction des aires de nidification lorsqu’un éboulement dévale des falaises. Le danger reste modeste, mais il exige que chacun tienne son rang et dégage le passage. \n\nAu lieu de cela, [orc_potential_rival.GetFirstName] pousse un cri strident et se rue vers l’arrière du sentier, renversant deux chasseurs au passage et me laissant seul face aux pierres qui pleuvent. Depuis la sécurité de l’arrière-garde,[orc_potential_rival.Custom('FR_IlElle')] observe la scène avec un rictus moqueur, guettant l’instant où je serais enseveli sous les gravats."
 lotr_hunt.0004.a: "Tu as déserté ton poste ! Je devrais moi-même t’ensevelir sous ces rochers !"
 lotr_hunt.0004.b: "Lâcheté coutumière. Au moins le passage est-il désormais libre."

 lotr_hunt.0005.t: "Duel au Grog Répandu"
 lotr_hunt.0005.desc: "Nous faisons halte afin de consulter nos cartes et d’aiguiser nos lames. Assis près d’une pierre moussue, je sens [orc_potential_rival.GetFirstName] passer derrière moi. Il « trébuche » soudain, et toute son outre de grog fermenté se déverse sur mes genoux.  \n\n« Mes pieds sont aussi maladroits que ton flair », ricane-t-[orc_potential_rival.Custom('FR_IlElle')] tandis que quelques rires étouffés s’élèvent autour de nous. L’odeur âcre de la boisson aigre me saisit, et mes vêtements ruissellent encore. [orc_potential_rival.Custom('FR_IlElle')|U] me provoque, cherchant à m’arracher à la retenue avant même que nous n’atteignions les terres de chasse."
 lotr_hunt.0005.a: "Je laverai cet affront dans ton sang !"
 lotr_hunt.0005.a.duel_success: "Vous humiliez [orc_potential_rival.GetFirstName]"
 lotr_hunt.0005.a.duel_failure: "[orc_potential_rival.GetFirstName] vous humilie"
 lotr_hunt.0005.b: "Ravale ta langue, vermine, avant que je ne la tranche."

 lotr_hunt.0151.t: "Les Grandes araignées de Vertbois"
 lotr_hunt.0151.desc: "Sous la voûte des arbres, je poursuis la trace d’un grand cerf. Une bête exceptionnelle, en mouvement depuis longtemps déjà, mais je sens que je me rapproche. En contournant une racine noueuse qui me cachait la piste, je découvre du sang, les signes d’une lutte, puis les traces indubitables d’un Ungol traînant une carcasse. \n\nMalédiction ! Depuis que le Nécromancien s’est établi à Dol Guldur, de telles créatures pullulent Vertbois. Je ne puis laisser vivre pareille engeance.\n\nAprès de longues heures de traque, nous trouvons son antre. Elle n’a guère pris soin de dissimuler ses traces, sans doute une jeune, trop sotte pour comprendre qu’elle n’est pas le prédateur suprême de ces terres. Ce faisant, elle a condamné tout son nid.\n\nMes compagnons prennent position autour de l’antre, tandis que les Grandes Araignées se disputent la dépouille du cerf. Je lève la main, attendant l’instant parfait..."
 lotr_hunt.0151.a: "À l’attaque ! Purgez cette engeance !"
 lotr_hunt.0151.a.success: "Vous l’abattez"
 lotr_hunt.0151.a.failure: "Elle vous échappe"
 lotr_hunt.0151.a.success.tt: ""
 lotr_hunt.0151.a.failure.tt: ""
 lotr_hunt.0151.b: "Cet ennemi dépasse nos forces."
 
 lotr_hunt.0152.t: "Triomphe sur les araignées"
 lotr_hunt.0152.desc: "Nos flèches volent droit et sûr. Empennant les créatures immondes, elles les abattent sous notre ire. Celles qui survivent à la première volée cèdent à la panique et tentent de fuir. Mais nos regards sont perçants, et nos pointes plus perçantes encore. Les traits sifflent dans l’air, et les Ungol hurlent lorsqu’elles tombent. \n\nPourtant, nos cœurs se chargent d’une sombre tristesse. Parmi les dépouilles enserrées de soie gisent sans équivoque des formes d’[edain|E]. Peut-être même d’[edhil|E]. \n\nNous recueillons ces corps afin de leur offrir des funérailles dignes ; car si nous ignorons qui ils furent jadis, bien peu méritent d’être abandonnés à la pourriture dans le nid profané de ces viles Ungol. \n\nPlus avant dans l’antre, nous découvrons un coffre enveloppé de toiles blanchâtres. Nous le dégageons, puis le brisons. À l’intérieur repose une fortune poussiéreuse d’or terni. \n\nChargés des dépouilles et de ce trésor retrouvé, nous reprenons le chemin du retour. Grande fut la peine en ce lieu, mais ces araignées ne nuiront plus à âme qui vive."
 lotr_hunt.0152.a: "Rentrer au foyer."

 lotr_hunt.0153.t: "Défaits par les araignées"
 lotr_hunt.0153.desc: "Nos flèches frappent juste. Les araignées hurlent sous notre grêle de traits et nombre d’entre elles s’effondrent en amas frémissants. Mais trop survivent encore ; dans un cliquetis furieux, elles se ruent vers nous. \n\nNous engageons le combat. Beaucoup tombent sous nos lames et nos arcs, et pourtant leurs rangs semblent inépuisables. Peu à peu, nous sommes repoussés, contraints d’abandonner le nid, bien plus vaste que nous ne l’avions cru. \n\nUn cri aigu déchire l’air à mes côtés. Je vois l’un des nôtres entraîné à terre et mis en pièces. Alors j’ordonne la retraite. Nous fuyons sous les frondaisons sombres. \n\nLes Ungol nous poursuivent un temps, puis renoncent : elles n’ont guère goût à traquer une proie capable d’emporter tant des leurs dans la mort. \n\nNous revenons blessés, le cœur lourd et le corps meurtri. Folie fut la nôtre que de charger ainsi..."

 lotr_hunt.0153.a: "Rentrer au foyer."
 lotr_hunt.0154.t: "Une Autre compagnie de chasse"
 lotr_hunt.0154.desc: "Tandis que nous parcourons les sentiers forestiers de nos terres de chasse, un son effleure la lisière de mon ouïe. Je lève la main, et notre troupe s’immobilise. Un rire musical résonne au loin, mêlé à des chants joyeux. Et parmi ces voix, je reconnais notre langue. \n\nJ’abaisse mon arme et réfléchis : devons-nous saluer ces gens ou les laisser à leur quiétude ?"
 lotr_hunt.0154.a: "Allons à leur rencontre."
 lotr_hunt.0154.b: "Laissons-les en paix."
 
 lotr_hunt.0155.t: "Rencontre sous les bois"
 lotr_hunt.0155.desc: "Nous progressons entre les arbres jusqu’à leur camp. Arrivés en lisière, nous annonçons notre présence dans la même langue qu’eux. Certains sursautent ; d’autres nous accueillent avec chaleur. \n\nJe m’assieds près du chef de leur groupe et converse avec lui. Ils forment eux aussi une compagnie de chasse et célèbrent la mise à mort récente d’une vermine d’Orques. Ils s’excusent de ne point nous avoir perçus plus tôt : la boisson avait émoussé leurs sens. \n\nLongtemps nos deux compagnies demeurent ensemble, riant et buvant. Nous comparons nos prises, nos prouesses. Nous contons des récits et chantons jusqu’au cœur de la nuit. \n\nMais vient l’heure de se séparer. Après avoir salué le chef de l’autre troupe, je passe l’arc en bandoulière et regagne le sentier."
 lotr_hunt.0155.a: "Prendre congé."
 
 lotr_hunt.0156.t: "Rencontre avec un Huorn"
 lotr_hunt.0156.desc: "Après une longue journée de chasse, nous dressons le camp dans une clairière qui semblait paisible. Des sentinelles sont postées, et je m’abandonne à une transe méditative afin de recouvrer mes forces.\n\nAu cœur de la nuit, un bruit me tire de ma quiétude : terre remuée, bois qui gémit. Je tends l’oreille. Trop tard... \n\nDéjà les racines d’un Huorn nous enserrent. Et ce ne sont point les Huorns de Fangorn; non. Ce sont les Huorns Noirs de Grand’Peur, tors et funestes, avides de meurtre. \n\nPeut-être pourrais-je tenter de parlementer ; car même les Huorns les plus farouches gardent mémoire de leurs liens anciens avec les [eldar|E], parents des Ents. Mais oserai-je courir ce risque ?\n\nOu bien devrais-je tailler mon chemin hors de cette étreinte ? Les racines qui me lient ne se sont pas encore refermées tout à fait..."
 lotr_hunt.0156.a: "Peut-être puis-je apaiser cette créature."
 lotr_hunt.0156.a.success: "Vous bercez le Huorn jusqu’au sommeil"
 lotr_hunt.0156.a.success.tt: ""
 lotr_hunt.0156.a.failure: "Vos paroles demeurent sans effet sur le Huorn"
 lotr_hunt.0156.a.failure.tt: "" 
 lotr_hunt.0156.b: "Aux armes !"
 lotr_hunt.0156.b.success: "Vous repoussez le Huorn"
 lotr_hunt.0156.b.success.tt: ""
 lotr_hunt.0156.b.failure: "Vous êtes défait par le Huorn"
 lotr_hunt.0156.b.failure.tt: ""

 lotr_hunt.0157.t: "Vous apaisez le Huorn"
 lotr_hunt.0157.desc: "La voie des paroles me semble la plus sage. Car si les Huorns noirs sont devenus des créatures redoutables, ils furent jadis des Huorns, et peut-être demeure-t-il en eux une part ancienne à laquelle je puis encore m’adresser.\n\nJe parle d’une voix basse et rythmée, presque chantée. Je tisse un récit, le mien, contant les raisons de notre présence en ces bois, les chemins parcourus et les épreuves traversées. J’évoque nos prises comme nos échecs, et les périls affrontés. Peu à peu, tel un enfant que l’on berce, ma voix apaise la créature, et ses racines se rétractent lentement.\n\nLorsque mon récit s’achève, le Huorn noir retombe dans sa torpeur. Mes compagnons demeurent ébranlés par cette rencontre, car être broyé par un tel être est une fin des plus funestes que je ne souhaite connaître.\n\nNotre repos brisé, nous levons le camp et reprenons la route. Puissent les arbres qui nous abriteront ensuite ne point nourrir de sombres desseins..."
 lotr_hunt.0157.a: "Grâce soit rendue à Eru, cela a suffi !"

 lotr_hunt.0158.t: "Le Huorn réclame sa proie"
 lotr_hunt.0158.desc: "Je choisis d’adresser la parole au Huorn, espérant apaiser sa fureur. Car les Huorns sont parents des Ents, et les Ents reçurent des Eldar le don de la parole ; peut-être une telle voie saura-t-elle atteindre cette créature.\n\nJe parle donc. Je conte notre chasse, ce que nous avons vu et affronté, et bien d’autres choses encore. Mais en vain : les racines du Huorn se resserrent inexorablement. Je poursuis malgré tout, la voix de plus en plus tendue, jusqu’à ce que, soudain, l’étreinte cesse.\n\nMais point pour l’un des nôtres. Lentement, il est entraîné sous la terre. Le deuil voile ma voix, et un instant les racines semblent hésiter... puis, enfin, le Huorn nous relâche.\n\nNous fuyons cet arbre maudit, blessés et haletants, amoindris d’un compagnon. Un jour, nous reviendrons pour mettre fin à cette abomination - mais d’abord, il nous faut panser nos plaies. Tandis que nous nous éloignons, des larmes amères coulent sur les visages de mes gens."
 lotr_hunt.0158.a: "Nous l’avons échappé belle..."
 lotr_hunt.0158.a.tt: "Vous pleurez la perte de votre compagnon"

 lotr_hunt.0159.t: "Le Huorn abattu"
 lotr_hunt.0159.desc: "Les paroles seraient vaines face à ces Huorns noirs, corrompus et difformes. Peut-être furent-ils autrefois intacts, mais rien ne subsiste désormais de leur nature première. Je donne l’ordre de nous libérer, quel qu’en soit le prix.\n\nLa lutte est âpre. Les racines se tordent et nous enserrent toujours plus étroitement, résistantes comme le fer. Nous frappons de toutes nos armes pour briser leur emprise. Enfin, sous nos coups répétés, la créature cède, relâchant sa prise, et nous parvenons à nous arracher à ses griffes."
 lotr_hunt.0159.a: "De peu, assurément !"

 lotr_hunt.0160.t: "Racines implacables"
 lotr_hunt.0160.desc: "Les paroles seraient vaines face à ces Huorns noirs, corrompus et dévoyés. Peut-être furent-ils autrefois purs, mais rien ne subsiste de leur essence première. Je donne l’ordre de nous dégager par tous les moyens.\n\nLa lutte se prolonge, rude et épuisante. À chaque coup porté, les racines se resserrent davantage, comme si la créature se nourrissait de notre résistance. Épées et haches peinent à entamer son étreinte. Ce n’est qu’après ce qui semble une éternité de lutte et de convulsions que le Huorn relâche légèrement sa prise, nous permettant de ramper hors de son emprise.\n\nPar chance, nul ne manque à l’appel, bien que le jour décline déjà."
 lotr_hunt.0160.a: "Maudite soit cette corruption dévorante !"

 lotr_hunt.0161.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : Une rencontre"
 lotr_hunt.0161.desc: "Alors que nous poursuivons notre proie, [ROOT.Char.Custom('WarhorseStoryName')] ralentit soudain et tourne brusquement la tête. Au loin, à peine visible, se tient un magnifique [ROOT.Char.Custom('HorseStoryOppositeMareStallion')], tout aussi captivé.\n\nJe pourrais emprunter la monture d’un courtisan et laisser [ROOT.Char.Custom('HorseStoryHerHis')] répondre à l’appel de la nature... mais qu’adviendrait-il de ma chasse ?"
 lotr_hunt.0161.a: "Va, et réjouis-toi !"
 lotr_hunt.0161.b: "Ce n’est pas l’heure des distractions, en avant !"
 hunt_meara_mate_log_title: "$lotr_hunt.0161.t$"
 hunt_meara_mate_log: "[CHARACTER.GetShortUIName|U] laisse [CHARACTER.Custom('WarhorseStoryName')] trouver un compagnon."
 hunt_meara_focus_log_title: "$hunt_meara_mate_log_title$"
 hunt_meara_focus_log: "[CHARACTER.GetShortUIName|U] est concentré sur la chasse"
 
 lotr_hunt.0162.t: "Une bande d’Orques des montagnes"
 lotr_hunt.0162.desc: "Alors que [similar_participant.GetTitledFirstName] et moi chevauchons à travers les [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')], suivant la piste d’un [activity.Custom('GetAnimalType')], notre chasse joyeuse est interrompue par de sinistres clameurs.\n\nAttirés par ces cris rauques et ces rires brutaux, nous découvrons une bande d’Orques en maraude, sans doute issus de "
 lotr_hunt.0162.desc.a: "[orc_county.GetNameNoTier]."
 lotr_hunt.0162.a: "Qui est votre chef ? Qu’il m’affronte !"
 lotr_hunt.0162.b: "Tendons-leur une embuscade, chassons ces orques !"
 lotr_hunt.0162.b.critical_success: "Les orques furent abattus"
 lotr_hunt.0162.b.success: "Victoire, mais à quel prix"
 lotr_hunt.0162.b.failure: "Défaite, mais nous avons fui"
 lotr_hunt.0162.b.critical_failure: "Défaite totale"
 lotr_hunt.0162.c: "À moi, [similar_participant.GetTitledFirstName] ! Abattons ces maraudeurs !"
 lotr_hunt.0162.c.critical_success: "Victoire"
 lotr_hunt.0162.c.success: "Victoire, mais à quel prix"
 lotr_hunt.0162.c.failure: "Défaite, mais nous avons fui"
 lotr_hunt.0162.c.critical_failure: "Défaite"
 lotr_hunt.0162.d: "Repli !"

 lotr_hunt.0163.t: "Victoire !"
 lotr_hunt.0163.desc: "Lorsque j’abattis le chef orque en combat singulier, la terreur saisit les misérables snaga de la troupe. D’un cri puissant, mon compagnon et moi nous jetâmes sur eux, et ils fuirent sous la force de notre assaut. Beaucoup furent traqués et abattus, et nous chantions en combattant, mais hélas, quelques-uns échappèrent à notre courroux... pour semer ailleurs leurs méfaits."
 lotr_hunt.0163.a: "La victoire ne faisait guère de doute ! En chasse, désormais..."

 animal_type_warg_plural: "wargs"
 animal_type_caragor_plural: "caragor"

 lotr_hunt.1000.t: "Les Terres Préservées"
 lotr_hunt.1000.desc: "Alors que notre compagnie traverse une clairière, nous faisons halte un instant pour contempler la splendeur qui s’offre à nous. Collines ondoyantes et prairies verdoyantes s’étendent jusqu’à l’horizon, baignées par la douce lumière du soleil qui en exalte les couleurs.\n\nJe me tourne vers [hunting_elf.GetName], tout proche. Dois-je inviter chacun à s’imprégner de la beauté indomptée de ces terres, ou poursuivre la chasse sans tarder, de peur de voir notre proie nous échapper ?"
 lotr_hunt.1000.a: "L’œuvre de [yavannacharacter|E] demeure, à nous d’en être dignes."
 lotr_hunt.1000.b: "En avant ! Ne tardons pas et ne perdons point notre proie !"
 lotr_hunt.1000.c: "La terre est belle, mais notre tâche nous appelle."

