 hunt.7011.e.hunting_outposts: "Cette option est disponible grâce aux [building|El] postes de chasse de [host.GetCurrentLocation.GetTitle.GetBaseNameNoTierPossessive]"
 hunt.7011.e.dwarven_outpost: "Cette option est disponible grâce au [building|El] avant-poste nain de [host.GetCurrentLocation.GetTitle.GetBaseNameNoTierPossessive]"