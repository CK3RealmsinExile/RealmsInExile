l_french:

 orc_succession_duel_toast.title: "Un Prétendant Terrassé"
 orc_succession_duel_toast.desc: "La foule explose en hurlements stridents et frénétiques tandis qu'un nouveau prétendant mord la poussière !"

# Challenger decides on whether to accept the challenge
 orc_government_events.0002.t: "Le Défi Relevé"
 orc_government_events.0002.desc: "L'ancien chef gît devant moi, déjà en train de pourrir. Faible. Indigne. Plus rien à en tirer. De droit, je suis maintenant le chef, mais seulement après avoir écrasé les autres prétendants. Je pivote, cramponnant mon arme, et la horde se rassemble avec avidité. Sur chaque visage je lis ambition et cupidité, mais c'est [orc_fighting_ruler.GetTitledFirstName] qui s'avance en premier.\n\nLes tambours tonnent, et les scandements rythmés de la foule sont comme le claquement du fouet d'un maître, poussant en avant à travers toute fatigue.\n\nLe plus fort, le plus féroce prendra le dessus, et le plus fort s'emparera du trône."
 orc_government_events.0002.a: "Je prouverai ma force."
 orc_government_events.0002.b: "C'est de la folie. Je ne mourrai pas pour l'orgueil."
 orc_government_events.0002.c: "Il existe d'autres façons de remporter ce combat..."

# Starting event of duel process. Go along, or say "Screw it, LAAMP here I come!"
 orc_government_events.0004.t: "Le Duel de Succession"
 orc_government_events.0004.desc: "Le cadavre de l'ancien chef est encore chaud, son sang se répandant de ses blessures dans le sable, sa puanteur infecte envahissant l'arène. L'odeur de la mort. Il gît écartelé et brisé. Mais ce n'est pas fini. Je ne lui accorde pas même un regard, fixant à la place la nuée de prétendants qui se bousculent.\n\n[defending_ruler.MakeScope.Var('challenger_count').GetValue|0] guerriers martèlent leurs armes contre leurs boucliers, chacun avide d'arracher le trône dans le sang et l'os. La salle résonne des hurlements de la foule, toujours assoiffée de plus.\n\nJe pourrais rester et combattre, au moins pourrais-je savourer la lueur de vie qui s'éteint dans leurs yeux tandis qu'ils agonisent... ou bien choisir de rester en vie, abandonner le trône, et vivre en Orque du rang."
 orc_government_events.0004.a: "Qu'ils viennent. Je vais briser chaque prétendant."
 orc_government_events.0004.a.tt: "Vous décidez de combattre les prétendants"
 orc_government_events.0004.b: "Le trône ne vaut pas ça. Qu'ils se le disputent."
 orc_government_events.0004.c: "Les trônes sont pour les lâches oisifs. Je vais affronter la sauvagerie en vrai Orque."

# Orc challenger reconsiders whether they're willing to fight the current ruler
 orc_government_events.0049.t: "Le Doute Avant le Duel"
 orc_government_events.0049.desc: "La foule explose en hurlements stridents et frénétiques tandis qu'un nouveau prétendant s'effondre, rejoignant un tas croissant de morts et de mourants. Une puanteur fétide saisit la gorge, et les mouches bourdonnent avec impatience. Je suis le prochain ! Face à face avec [defending_ruler.GetTitledFirstName].\n\n[defending_ruler.Custom('FR_IlElle')|U] est prêt[defending_ruler.Custom('FR_E')] au combat ; balafré[defending_ruler.Custom('FR_E')], armé[defending_ruler.Custom('FR_E')], et il est évident que sa soif de sang est loin d'être assouvie. Je plonge le regard dans ses yeux brillants, emplis à la fois de rage et de joie sauvage, et dans son large rictus je distingue des rangées de crocs jaunis mais acérés.\n\nReculer serait une honte... mais survivre pour se battre un autre jour a son attrait."
 orc_government_events.0049.a: "Je vais t'effacer ce petit sourire de ta face !"
 orc_government_events.0049.b: "Je me tire de là !"
 orc_government_events.0049.b.toast: "Prétendant en Fuite"
 orc_government_events.0049.b.toast.desc: "[ROOT.Char.GetFirstName] a choisi de se retirer du défi."

# Attempt to bribe the orc challenger.
 orc_government_events.0050.t: "Argent, Doux Argent"
 orc_government_events.0050.desc: "[orc_fighting_ruler.GetTitledFirstName] s'avance d'un pas furieux, l'air féroce, bavant et fendant l'air de son épée avec férocité. Mes muscles sont épuisés, mais en effleurant la bourse pendue à ma ceinture, débordante de pièces, une idée me traverse l'esprit...\n\nLes Orques aiment certes le sang et respectent la force, mais ils chérissent l'or et l'argent avec un zèle presque égal. Si les bonnes offres sont faites, peut-être [orc_fighting_ruler.GetTitledFirstName] estimerait que je lui propose un marché équitable."
 orc_government_events.0050.a: "Proposer de riches butins et de futurs pillages."
 orc_government_events.0050.a.higher_stewardship_successful: "Le pot-de-vin fonctionne."
 orc_government_events.0050.a.higher_stewardship_fail: "L'offre est tournée en dérision, et le pot-de-vin rejeté."
 orc_government_events.0050.b: "Promettre terres et titres après le duel."
 orc_government_events.0050.b.stewardship_successful: "Le prétendant accepte."
 orc_government_events.0050.b.stewardship_fail: "Le prétendant se rit de l'offre."
 orc_government_events.0050.c: "Quelle idée absurde !"

# Attempt to blackmail the orc challenger.
 orc_government_events.0051.t: "Une Arme Secrète"
 orc_government_events.0051.desc: "[orc_fighting_ruler.GetTitledFirstName] avance avec enthousiasme et ayant un sourire suffisant sur le visage, s'affichant fier et hautain, porté par les rugissements de la foule. Pourtant je suis bien conscient d'un secret qu'[orc_fighting_ruler.Custom('FR_IlElle')] dissimule. Quelque chose qui attirerait au mieux les moqueries, et au pire la mort.\n\nJe parie qu'[orc_fighting_ruler.Custom('FR_IlElle')] ne voudrait pas que ce secret soit étalé aux yeux de tous. Peut-être pourrais-je en tirer parti, et regarder son air suffisant se dissiper."
 orc_government_events.0051.a: "Menacer de révéler leur honte."
 orc_government_events.0051.a.blackmail_successful: "Le prétendant recule nerveusement."
 orc_government_events.0051.a.blackmail_fail: "Il gronde et vous défie de parler."
 orc_government_events.0051.b: "Le chantage seul ne suffira pas, une incitation supplémentaire pourrait aider."
 orc_government_events.0051.b.blackmail_and_stewardship_successful: "La peur et la cupidité conjuguées brisent sa volonté."
 orc_government_events.0051.b.blackmail_and_stewardship_fail: "Il crache sur votre offre."
 orc_government_events.0051.c: "Pas besoin de coups tordus, je vais l'écraser de mes propres mains !"

# An upstart orc jumps the line, and now challenges the main challenger so they can get to you quicker. You look on (intervene/let it play out)
 orc_government_events.0052.t: "Un Arriviste Effronté"
 orc_government_events.0052.desc: "Le rugissement de stupeur de la foule est assourdissant, et tous les yeux se lèvent tandis qu'un autre Orque, [upstart_orc.GetName], bondit dans la fosse en grondant, l'épée au poing. [upstart_orc.Custom('FR_IlElle')]|U] montre ses crocs à [orc_fighting_ruler.GetName], qui est pris de court et enragé.\n\n« Dégages le passage, vermines ! » gronde l'arriviste avant de se tourner vers moi. « C'est toi que je veux, fils de charogne ! Je vais te fracturer le crâne comme une vieille noix et avaler ta cervelle comme de la gnôle, c'est sûrement tout ce qu'elle vaut ! Dans tous les cas, ton trône m'appartient. »\n\n[upstart_orc.GetName] avance cependant et gronde. Il n'y a qu'une seule place dans la file, et chacun est prêt à tuer pour l'avoir."
 orc_government_events.0052.a: "Laissons-les se déchirer mutuellement."
 orc_government_events.0052.a.success: "[upstart_orc.GetName] abat [orc_fighting_ruler.GetName] dans un affrontement brutal !"
 orc_government_events.0052.a.success.tt: "[upstart_orc.GetName] vous affrontera comme le prochain #V prétendant#!"
 orc_government_events.0052.a.failure: "[orc_fighting_ruler.GetName] taille [upstart_orc.GetName] en pièces sans pitié."
 orc_government_events.0052.a.failure.tt: "[orc_fighting_ruler.GetName] vous affrontera comme le prochain #V prétendant#!"
 orc_government_events.0052.b: "Je vous affronte tous les deux !"
 orc_government_events.0052.b.tt: "Vous choisissez de les affronter tous les deux en même temps"
 orc_government_events.0052.b.tt.2: "Tuer les deux prétendants incitera les autres à #bold reconsidérer#! s'ils veulent vous affronter"

# You've won!
 orc_government_events.0500.t: "Régner par la Seule Terreur"
 orc_government_events.0500.desc: "Plus aucun prétendant n'ose se dresser. Un tas de cadavres convulsifs gît devant moi, d'où suintent des fluides nauséabonds dans le sable. Les mouches descendent réclamer leur dû, et je lève les yeux vers la foule.\n\nJe dresse mon arme et les murs eux-mêmes frémissent sous leurs acclamations, leurs rugissements et leurs scandements tandis qu'ils frappent le sol du pied. Je me penche et m'enduis le visage du sang noir des vaincus, puis j'inspire profondément. Je sens à la fois la fierté, l'effroi et la peur... et bien sûr tous ces cadavres en décomposition. Je sens le sable frémir sous mes pieds dans un frisson de triomphe, et le feu brûle dans mon sang."
 # No one challenged you! You're just an insane orc. Your rule is already bloody scary!
 orc_government_events.0500.desc.unchallenged: "Je pénètre dans le cercle, arme levée, et rugis mon défi à quiconque oserait me disputer le trône. L'air est chargé de sueur et du sang des duels passés, et de l'âcre relent de gnôle. Je frappe le sol du pied, tranche l'air — ma lame ne rencontre que le vide.\n\nPersonne ne bouge. Je sens leur peur, leur terreur, leur lâcheté. Lentement, j'abaisse ma lame.\n\nChaque membre de la horde détourne les yeux, mais les brefs éclats de leurs prunelles jaune pâle me comblent d'une satisfaction suffisante. Ma réputation a fait mon œuvre pour moi, et ce silence est plus éloquent que n'importe quel cri de guerre."
 orc_government_events.0500.a: "Bien. Qu'ils se souviennent de qui règne ici."

 orc_government_events.orc_challenger_not_persuaded: "[orc_fighting_ruler.GetName] veut toujours se battre"