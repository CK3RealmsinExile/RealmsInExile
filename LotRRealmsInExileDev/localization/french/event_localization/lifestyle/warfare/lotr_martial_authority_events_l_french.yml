l_french:

 # Deal with Deserters, by Linnéa Thimrén
 martial_authority_special.1502.desc_scuffle_lost: "Recevant un coup de coude au visage, je tombe durement dans l'échauffourée qui suit notre confrontation avec les déserteurs, mais ils sont bientôt appréhendés.\n\n"
 martial_authority_special.1502.desc_scuffle: "Après une brève échauffourée, les soldats déserteurs sont appréhendés."
 martial_authority_special.1502.desc: "Chaque soldat présent, loyal ou non, sait que le châtiment pour ce genre de trahison peut être sévère. L'air est chargé d'appréhension et de crainte.\n\n« M[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('FR_SeigneurDame')] », [deserting_soldier.GetTitledFirstName] croise mon regard avec des yeux fatigués, « Ce ne sont que des enfants. Nous voulons simplement rentrer chez nous. »"
 martial_authority_special.1502.a: "Le prix de la trahison doit être payé. Exécutez-les tous."
 martial_authority_special.1502.b: "Vous nettoierez les latrines pendant des mois."
 martial_authority_special.1502.b.tt: "La puanteur des latrines ne fait guère de bien au moral des soldats."
 martial_authority_special.1502.c: "Laissez-moi vous conter une histoire de discipline et d'#EMP honneur#!."
 martial_authority_special.1502.c.tt: "Rien de ce que vous dites ne semble convaincre les soldats de l'erreur de leurs actes."
 martial_authority_special.1502.d: "Un exemple doit être donné. Nul ne me désobéira plus."

 martial_authority_special.1503.desc_execution: "Les déserteurs ne méritent qu'une seule miséricorde ; celle accordée par la lame du bourreau.\n\nFace à la nécessité de prendre des décisions difficiles, j'en suis venu à comprendre certains des fardeaux du commandement d'une manière plus... intime."
 martial_authority_special.1503.desc_latrine: "Après des mois dans la fange, les déserteurs rentrent dans le rang à la première occasion.\n\nEn observant les réactions tant des déserteurs punis que des autres soldats, effrayés de subir un châtiment similaire, j'en suis venu à mieux comprendre les troupes."
 martial_authority_special.1503.desc_diplomacy: "Revigorés par mon discours, épuisés par la longue nuit, et reconnaissants pour la clémence accordée, les déserteurs regagnent leurs [Select_CString(IsLandlessAdventurer(ROOT.Char),'tentes','casernes')] avec une nouvelle flamme dans les yeux.\n\nInspirer la loyauté des troupes de cette manière m'a montré qu'il y a plus dans le fait d'être un commandant que la force de votre bras."
 martial_authority_special.1503.a.tt_execution: "[deserting_soldier.GetTitledFirstNameNoTooltip] fut exécuté pour ses crimes."
 martial_authority_special.1503.a: "Enfin, toute cette épreuve est terminée."

 martial_authority_special.1504.desc_opening: "Toute la situation aurait pu mieux se dérouler.\n\n"
 martial_authority_special.1504.desc_latrine: "Même si les déserteurs sont revenus dans les rangs, et que leurs camarades ont pris la leçon souillée à cœur, j'ai l'impression que le problème demeure. Pourquoi déserteraient-ils en premier lieu ?\n\nJe suis tout aussi confus qu'au début de toute cette affaire."
 martial_authority_special.1504.desc_diplomacy: "Je pensais qu'un discours entraînant inspirerait les soldats déserteurs, les inciterait à travailler davantage pour se montrer dignes de la clémence qui leur avait été manifestée. Cependant, même s'ils sont revenus dans les rangs, la flamme avait quitté leurs yeux.\n\nLes soldats qui étaient en patrouille avec moi, en revanche, semblaient absorber le discours comme [ROOT.Char.Custom('RegionalDrink')]."
 martial_authority_special.1504.a: "Au moins, toute cette épreuve est enfin terminée."