l_french:
 warhorse.0001.t: "Le cheval de bataille"
 warhorse.0001.desc: "Admirant m[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('HorseStoryMareStallion')] qui suit maintenant chacun de mes ordres, je songe à lui donner un nom..."
 warhorse.0001.a: "Un nom inspiré par l’histoire !"
 warhorse.0001.b: "Les Âges regorgent de noms de chevaux inspirant l'émerveillement !"
 warhorse.0001.c: "C’est juste un cheval, et il convient de le nommer comme tel."

 warhorse.0002.desc: "Je vais nommer m[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('HorseStoryMareStallion')] d’après un des chevaux célèbres ayant appartenu aux chefs et aux héros du passé."
 warhorse.0002.a: "Rochallor - tel la monture du Haut Roi Fingolfin, qui l'amena aux portes d'Angband !"
 warhorse.0002.b: "Asfaloth - comme le cheval du puissant Glorfindel !"
 warhorse.0002.c: "Felaróf - le premier des Mearas qui porta Eorl le Jeune au secours du Gondor !"
 warhorse.0002.d: "Arroch - pour le cheval de Húrin qui le mena à la grande bataille Nírnaeth Arnoediad !"
 warhorse.0002.e: "Gros Nigaud - comme le poney monté par le mystérieux Tom Bombadil !"
 warhorse.0002.go_back: "Hm, un autre thème pour le nom conviendrait mieux..."

 warhorse.0003.desc: "Le monde mythologique est riche en grandeur et en noms de chevaux."
 warhorse.0003.llamrei: "Nahar - comme le destrier légendaire monté par Oromë, le Chasseur des Valar !"
 warhorse.0003.sleipnir: "Ancalagon - d'après le plus grand de tous les dragons ailés !"
 warhorse.0003.uchchaihshravas: "Glaurung - comme le Père des Dragons et serviteur de Morgoth !"
 warhorse.0003.dadhi_kra: "Thorondor - Seigneur des Aigles !"
 warhorse.0005.devadatta: "Ungoliant - l'araignée primordiale et première araignée géante d'Arda !"
 warhorse.0005.keshi: "Angainor - en l'honneur de la chaîne utilisée par le Vala Tulkas pour enfermer Morgoth !"
 warhorse.0005.kanthaka: "[Glossary('Bauglir','bauglir_gloss')] - le mot sindarin pour tyran, attribué à l'Ennemi !"
 warhorse.0005.burko: "Gothmog - d'après le Seigneur des Balrogs, meurtrier de Fëanor !"
 warhorse.0006.aranjagaan: "Silmaril - assurément le Serment de Fëanor est inoffensif maintenant !"
 warhorse.0006.haizum: "Gurthang - comme l'arme utilisée par Túrin Turambar pour occire Glaurung !"
 warhorse.0006.buraq: "Narsil - d'après l'épée du Roi Elendil des Dúnedain !"
 warhorse.0006.balius: "Grond - le nom de la masse de Morgoth qui tua Fingolfin !"
 warhorse.0007.xanthos: "Ringil - comme l'épée brandie par Fingolfin dans la Guerre des Joyaux !"
 warhorse.0007.boreas: "Dailir - tel que la flèche préférée de Beleg, le plus grand archer du Premier Âge !"
 warhorse.0003.go_on: "Hm, peut-être autre chose..."
 warhorse.0003.khiimori: "Khiimori, le Cheval du Vent, allégorie de l’âme humaine !"
 warhorse.0003.rlung_rta: "Loungta, un porteur de prières et de bonne fortune !"
 warhorse.0003.jonon_khar: "Jonon Khar, un destrier ailé qui hennit comme le morin khuur."
 warhorse.0003.tulpar: "Tulpar - une bête divine et ailée d’une vitesse incomparable."
 warhorse.0003.aranzhale: "Aranzhale, d’après un autre destrier de Jangar."
 warhorse.0003.oyomaa: "Oyomaa, d’après la belle bête noire de Mengen Shigshirge."
 warhorse.0003.rakhsh: "Rakhsh, du #EMP Shahnameh#!, est un cheval qui a les épaules d’un lion et la force d’un éléphant."

 warhorse.0004.desc: "Un cheval doit être nommé comme la créature de base qu’il est."
 warhorse.0004.a: "Cheval de bataille."
 warhorse.0004.b: "Labbé."
 warhorse.0004.c: "Cheval fougueux."
 warhorse.0004.d: "Sabot Brillant."
 warhorse.0004.courser: "Coursier."

 warhorse.1001.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : M[ROOT.Char.Custom('FR_OnA')] fidèle [ROOT.Char.Custom('HorseStoryMareStallion')]"
 warhorse.1001.desc: "Un entraîneur de renom m’a approché après avoir entendu des rumeurs sur m[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')] et offre ses services.\n\n« Tout ce que je demande en retour, c’est une petite compensation. »"
 warhorse.1001.a: "[ROOT.Char.Custom('HorseStorySheHe')|U] doit acquérir de la force."
 warhorse.1001.b: "[ROOT.Char.Custom('HorseStorySheHe')|U] doit apprendre à se déplacer plus rapidement."
 warhorse.1001.c: "[ROOT.Char.Custom('HorseStorySheHe')|U] doit travailler son endurance."
 warhorse.1001.d: "[ROOT.Char.Custom('HorseStorySheHe')|U] doit devenir plus féroce."
 warhorse.1001.e: "Je ne suis pas intéressé[ROOT.Char.Custom('FR_E')]."
 warhorse.1001.e.tt: "#F « [THIS.Char.Custom('WarhorseStoryName')] n’a besoin que de moi comme entraîneu[THIS.Char.Custom('FR_RSe')] ! »#!"
 warhorse.1001.f: "C’est pour ça que je paie un grand écuyer !"
 warhorse.1001.f.tt: "Votre grand écuyer commence à entraîner [THIS.Char.Custom('WarhorseStoryName')]"
 warhorse.1001.f.failure: "Vous avez surestimé votre grand écuyer"
 warhorse.1001.f.failure.tt: "[m_horse.Custom('FR_le_Char_Pi')|U][m_horse.GetTitledFirstNameNoTooltip] échoue à entraîner [THIS.Char.Custom('WarhorseStoryName')]."

 warhorse.1002.desc: "[ROOT.Char.Custom('WarhorseStoryName')] s'est bien adapté à son entraînement, et les résultats se sont manifestés instantanément !"
 warhorse.1002.a: "Voilà de l'argent bien dépensé !"

 warhorse.1101.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : Journée ensoleillée"
 warhorse.1101.desc: "Tandis que je me dirige vers les poteaux d'attache, je suis accueilli[ROOT.Char.Custom('FR_E')] par les joyeux hennissements de [ROOT.Char.Custom('WarhorseStoryName')]. [ROOT.Char.Custom('HorseStorySheHe')|U] semble avoir hâte de se dégourdir les jambes par ce beau temps, et je ne peux qu’être d’accord."
 warhorse.1101.a: "Je dois saisir chaque instant pour m'exercer !"
 warhorse.1101.b: "La journée est trop belle pour ne pas être appréciée comme il se doit !"
 
 warhorse.1102.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : Une nouvelle amitié"
 warhorse.1102.desc: "Je donne libre cours à [ROOT.Char.Custom('WarhorseStoryName')], et observe les collines et les plaines défiler. Je peux sentir l'élan d'excitation parcourir son cou sous mes mains, et ne peux m'empêcher de partager cette émotion.\n\nAlors que nous ralentissons pour nous arrêter, tous deux fatigués et exaltés, je peux voir dans ses yeux à quel point [ROOT.Char.Custom('HorseStorySheHe')] est incroyablement intelligent, et combien nous sommes devenus proches.\n\nJ'ai trouvé un véritable ami en [ROOT.Char.Custom('WarhorseStoryName')|U]."
 warhorse.1102.a: "Nos destins sont désormais liés l'un à l'autre."

 warhorse.1201.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : m[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('HorseStoryMareStallion')] est malade"
 warhorse.1201.desc: "Alors que m[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')] se dirige vers moi en traînant d’une jambe et en pendant la tête, il ne fait aucun doute qu’[ROOT.Char.Custom('HorseStorySheHe')] est malade.\n\nLe dresseur m'assure qu'il existe un remède pour le mal qui l'afflige, mais son prix est élevé."
 warhorse.1201.a: "Aucun prix n'est trop élevé pour m[ROOT.Char.Custom('FR_OnA')] tendre [ROOT.Char.Custom('WarhorseStoryName')] !"
 warhorse.1201.b: "Quoi qu’il arrive, c’est la volonté [ROOT.Char.GetFaith.HighGodNamePossessive]."
 warhorse.1201.b_good: "[ROOT.Char.Custom('WarhorseStoryName')] s’en sort bien"
 warhorse.1201.b.tt: "[THIS.Char.Custom('HorseStorySheHe')|U] semble toutefois moins vous faire confiance"
 warhorse.1201.b_bad: "[ROOT.Char.Custom('WarhorseStoryName')] meurt de maladie"

 warhorse.1301.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : Passionné[horse_vassal.Custom('FR_E')] de chevaux"
 warhorse.1301.desc: "[horse_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] regarde [ROOT.Char.Custom('WarhorseStoryName')] de haut en bas, hochant la tête avec approbation.\n\n« C'est un magnifique [ROOT.Char.Custom('HorseStoryMareStallion')] que vous avez là, [ROOT.Char.Custom('FR_MonseigneurMadame')|U] ! Si vous me permettiez de le monter, j'en serais fort reconnaissant. »"
 warhorse.1301.a: "Profitez-en !"
 warhorse.1301.a.tt: "[THIS.Char.Custom('WarhorseStoryName')] est une monture féroce, et [horse_vassal.GetFirstNameNoTooltip] n’est pas connu[horse_vassal.Custom('FR_E')] pour ses prouesses. Va-t-[horse_vassal.Custom('FR_IlElle')] s’en sortir ?"
 warhorse.1301.b: "Personne ne monte [ROOT.Char.Custom('WarhorseStoryName')] à part moi !"

 warhorse.1401.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : Horreur équine"
 warhorse.1401.desc: "Alors que l'obscurité tombe, je me retrouve seul[ROOT.Char.Custom('FR_E')]. Le calme de la nuit uniquement rompu par le piétinement de m[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')]. Il y a quelque chose d'étrange dans ses yeux, quelque chose de...  menaçant.\n\n[ROOT.Char.Custom('HorseStorySheHe')|U] me suit du regard alors que je me retourne pour partir, ce qui me fait froid dans le dos."
 warhorse.1401.a: "C’est ridicule, ce n’est qu’un cheval."
 warhorse.1401.a.tt: "#F Mais alors pourquoi sentez-vous toujours ses yeux sur vous ?#!"
 warhorse.1401.b: "Ce cheval est sûrement maudit. Je m’en débarrasse."

 warhorse.1402.desc: "Les pieds contusionnés par ses sabots, les mains en sang à cause de ses morsures, le corps meurtri d’avoir été projeté... [ROOT.Char.Custom('WarhorseStoryName')] hennit joyeusement alors qu’[ROOT.Char.Custom('HorseStorySheHe')] m’a presque projeté sur la lance d’un soldat. Je ne sais pas combien de temps encore je pourrai endurer ça."
 warhorse.1402.a: "Je ne serai point vaincu[ROOT.Char.Custom('FR_E')] par un cheval !"
 warhorse.1402.b: "L'histoire de [ROOT.Char.Custom('WarhorseStoryName')] s'achève ici."
 
 warhorse.1499.desc: "Cela se produit alors que nous revenons tout juste d'une brève promenade à cheval, ce que j'ai redouté depuis que j'ai vu la malice dans les yeux de m[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')] pour la première fois. [ROOT.Char.Custom('HorseStorySheHe')|U] me désarçonne alors même que nous passons près d'un amas de roches acérées, et je tombe tête la première directement sur une arête. Perdu dans la douleur aveuglante, je n’entends que ses hennissements bruyants avant que tout ne finisse par disparaître..."
 warhorse.1499.a: "[ROOT.Char.Custom('WarhorseStoryName')]... pourquoi ?"
 
 warhorse.1501.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : Matinée avec un ami"
 warhorse.1501.desc: "La tension quotidienne du gouvernement pèse sur moi, et chaque jour mes pensées se tournent vers mon ami[ROOT.Char.Custom('FR_E')] [ROOT.Char.Custom('WarhorseStoryName')] et les moments délicieusement insouciants que nous passons à chevaucher. [ROOT.Char.Custom('HorseStorySheHe')|U] semble toujours disposé à faire une promenade, et je me demande si nous ne devrions pas faire de nos chevauchées matinales une routine."
 warhorse.1501.a: "Mon temps est mieux employé à m'entraîner avec mes chevaliers !"
 warhorse.1501.b: "Pourquoi pas ? Un souverain a aussi besoin de se délasser."
 
 warhorse.1502.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : Un nouveau poulain !"
 warhorse.1502.desc: "La rencontre de chasse entre [ROOT.Char.Custom('WarhorseStoryName')] et son compagnon s'est produite il y a près d'un an, et je sais depuis un moment qu'ils attendaient une naissance.\n\nCe matin, en entrant dans la cour, je peux voir un nouveau poulain courir avec hésitation, sous l'œil vigilant de ses parents.\n\nJe me demande ce qu'il convient de faire avec ce nouveau rejeton de Felaróf ?"
 warhorse.1502.a: "Il ferait une splendide monture pour mon héritier."
 warhorse.1502.b: "Mon épouse désire depuis longtemps un Meara pour monture."
 warhorse.1502.c: "Je le laisserai errer librement, et choisir un cavalier de son propre chef."
 
 warhorse.1503.t: "Mearas : Un Nouveau Poulain !"
 warhorse.1503.desc: "Répondant à la convocation de mon [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('event_liege'))], je [event_liege.Custom('FR_LeLa')] rencontre dans la cour de son château.\n\n« J'ai quelqu'un que je souhaite te présenter, le plus récent poulain de la lignée de Felaróf. Nos lignées ont été compagnes et amies depuis les jours d'Eorl, et je veux que tu perpétues cette tradition. »\n\nLe jeune poulain est magnifique et semble comprendre ce qui se passe. Il s'approche de moi, renifle ma main, et donne un hennissement approbateur. Il semble que j'aie maintenant un nouveau cheval !"
 warhorse.1503.a: "Quel don royal !"


 warhorse.8001.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : La fin d'une vie"
 warhorse.8001.desc: "M[ROOT.Char.Custom('FR_OnA')] fidèle [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')] a pris de l’âge. Sa foulée n'est plus aussi vive qu'autrefois, et la fougue dans ses yeux s'estompe.\n\nSi je veux préserver sa lignée, je devrais trouver une bonne alliance pour [ROOT.Char.Custom('FR_LuiElle')]."
 warhorse.8001.a: "Je trouverai un [ROOT.Char.Custom('HorseStoryOppositeMareStallion')] fort."
 warhorse.8001.b: "Chercher un [ROOT.Char.Custom('HorseStoryOppositeMareStallion')] agile."
 warhorse.8001.c: "L’aspect le plus important chez un [ROOT.Char.Custom('HorseStoryOppositeMareStallion')] est l’endurance."
 warhorse.8001.d: "Parcourir les terres à la recherche d’un [ROOT.Char.Custom('HorseStoryOppositeMareStallion')] féroce !"
 warhorse.8001.e: "Je vais lui permettre de finir ses derniers jours tranquillement."

 warhorse.8002.t: "[ROOT.Char.Custom('WarhorseStoryName')|U] : Le cycle de la vie"
 warhorse.8002.desc: "M[ROOT.Char.Custom('FR_OnA')] fidèle [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')] a péri, mais [ROOT.Char.Custom('HorseStorySheHe')] laisse derrière [ROOT.Char.Custom('FR_LuiElle')] un robuste poulain ! Je peux déjà voir sa personnalité chez ce jeune poulain. Mon ami est encore avec moi, en un sens."
 warhorse.8002.a: "Repose en paix, [ROOT.Char.Custom('WarhorseStoryName')]."

 warhorse.8003.desc: "Alors que je sors prendre l’air, j’apprends avec tristesse que m[ROOT.Char.Custom('FR_OnA')] fidèle [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')] a rendu l’âme pendant la nuit. [ROOT.Char.Custom('HorseStorySheHe')|U] laisse un vide dans mon cœur."
 warhorse.8003.a: "Oh [ROOT.Char.Custom('WarhorseStoryName')], tu vas me manquer !"
