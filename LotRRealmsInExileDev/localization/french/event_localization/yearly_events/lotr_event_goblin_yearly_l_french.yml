l_french:
 goblin_yearly.0001.t: "Intrus !"
 goblin_yearly.0001.desc: "Je discute des défenses de mes possessions avec mes courtisans quand soudain des bruits forts résonnent à travers mes salles. Des battements de tambours font écho en réponse : une alarme.\n\n« Des intrus ? Dans MES salles ? »\n\nJe me précipite aussitôt, empli de rage, vers l'endroit où je pensais que se trouvait la source du bruit... pour ne trouver que [goblin_char.GetName] dans une chambre vide se tenant à côté d'un puits.\n\n« Mon [ROOT.Char.GetLadyLord|U], je peux expliquer... il y avait un seau... sur le puits... et... je... »\n\nTandis que [goblin_char.GetName] tente d'expliquer la situation, les tambours de mon armée se rapprochent. Si la vérité éclate, quelqu'un devra payer pour avoir alarmé l'armée."
 goblin_yearly.0001.a: "Blâmer [goblin_char.GetName] pour la fausse alerte."
 goblin_yearly.0001.b: "#italic Il y a eu une grande bataille et j'ai tué tous les intrus à moi seul !#"
 goblin_yearly.0001.b.success: "Vous convainquez vos courtisans de votre force et de votre prouesse"
 goblin_yearly.0001.b.failure: "Vos courtisans ne sont pas dupes."
 goblin_yearly.0001.c: "#italic Ils se sont tous échappés ! Doublez les gardes et améliorez les défenses !#"
 goblin_yearly.0001.c.success: "Vous convainquez, ou peut-être terrorisez, vos courtisans de penser que les défenses doivent être améliorées"
 goblin_yearly.0001.c.failure: "Vos courtisans restent sceptiques"

 goblin_yearly.0002.t: "Un Combat pour le Butin"
 goblin_yearly.0002.desc: "Depuis leur retour d'un récent raid, [goblin_char_1.GetName] et [goblin_char_2.GetName] n'ont pas cessé d'être entendus. Depuis qu'ils sont revenus dans ces salles, ils se disputent pour savoir à qui appartient leur butin. Leur querelle commence à s'intensifier rapidement et un combat entre eux est imminent.\n\nJe pourrais simplement observer leur combat... ou je pourrais combattre l'un d'eux personnellement et prendre son butin pendant que l'autre s'enfuit avec sa part. Ou peut-être pourrais-je essayer de combattre les deux et prendre tout leur butin comme mien. Alternativement, je pourrais essayer de les convaincre que le butin m'appartient principalement à moi, puis également à eux deux."
 goblin_yearly.0002.a: "Pourquoi s'impliquer dans une querelle mesquine ?"
 goblin_yearly.0002.a.success: "[goblin_char_2.GetName] remporte le combat"
 goblin_yearly.0002.a.loss: "[goblin_char_1.GetName] remporte le combat"
 goblin_yearly.0002.b: "Le butin de [goblin_char_1.GetNamePossessive] m'appartient À MOI !"
 goblin_yearly.0002.b.success: "Je gagne le combat"
 goblin_yearly.0002.b.failure: "[goblin_char_1.GetName] gagne le combat"
 goblin_yearly.0002.c: "Le butin de [goblin_char_2.GetNamePossessive] sera À MOI !"
 goblin_yearly.0002.c.success: "Je gagne le combat"
 goblin_yearly.0002.c.failure: "[goblin_char_2.GetName] gagne le combat"
 goblin_yearly.0002.d: "Tout. Tout m'appartient À MOI !"
 goblin_yearly.0002.d.success: "Je gagne le combat"
 goblin_yearly.0002.d.failure: "Ils gagnent le combat et se partagent équitablement le butin"
 goblin_yearly.0002.e: "Je suis votre roi, alors que diriez-vous de me donner ce qui me revient de droit et de partager le reste entre vous."
 goblin_yearly.0002.e.success: "Je réussis à les convaincre de partager le butin"
 goblin_yearly.0002.e.failure: "Je ne parviens pas à les convaincre"
 goblin_yearly.0002.e.failure_1: "Ils ignorent mon conseil, et [goblin_char_2.GetName] gagne"
 goblin_yearly.0002.e.failure_2: "Ils ignorent mon conseil, et [goblin_char_1.GetName] gagne"

 goblin_yearly.0003.t: "Un Ennemi Barbu"
 goblin_yearly.0003.desc: "Alors que je suis assis dans mes salles, je n'arrive pas à sortir [dwarven_char.GetName] de ma tête. [dwarven_char.GetSheHe|U] siège dans ses répugnantes salles de pierre sur un ignoble trône d'or et boit dans ses coupes sa bière puante ! Ils pensent que les montagnes leur appartiennent. Immondes [dwarves|E], combien je déteste leur arrogance ! Je vais leur montrer.\n\n[dwarven_char.GetName] comprendra à quel point [dwarven_char.GetSheHe] avait tort quand j'empalerai sa tête sur une pique et la hisserai pour que tous la voient !"
 goblin_yearly.0003.a: "Apportez-moi la tête de [dwarven_char.GetNamePossessive] !"
 goblin_yearly.0003.b: "J'ai mieux à faire."

 goblin_yearly.0004.t: "Un Message Maléfique"
 goblin_yearly.0004.desc: "Alors que je dînais, [dwarf_courtier.GetName] s'est approché de moi avec un regard sévère et inquiet.\n\n« Mon [dwarven_char.GetLadyLord|U] [dwarven_char.GetFirstName], vos guerriers ont tué un groupe d'Orques. L'un d'eux portait un message. »\n\n[dwarf_courtier.GetName] place devant moi un morceau de peau, gravé de rangées de lettres noires.\n\n« Une promesse de paiement... pour votre tête, mon [dwarven_char.GetLadyLord|U]. Cette abominable créature [goblin_char.GetName] vous veut mort ! »"
 goblin_yearly.0004.a: "Le nombre d'ennemis s'accroît chaque jour."

 goblin_yearly.0005.t: "Décorations"
 goblin_yearly.0005.desc: "Alors que j'erre dans mes salles, [goblin_char.GetName] s'approche de moi.\n\n« Mon [ROOT.Char.GetLadyLord|U] [ROOT.Char.GetFirstName], vos salles sont grandes et vastes, mais pas assez terrifiantes. » dit [goblin_char.GetName], « Les visiteurs ne sont pas charmés par la cruauté de votre créativité et de votre imagination. Je suggère que nous changions cela, mon [ROOT.Char.GetLadyLord|U]. Cela frapperait de terreur le cœur de vos ennemis, sans parler que cela égayerait vraiment l'endroit ! »\n\nEn regardant à travers mes salles, j'en viens à la conclusion que [goblin_char.GetName] pourrait avoir raison. Mes salles pourraient être améliorées."
 goblin_yearly.0005.a: "[goblin_char.GetName] abattra une bête et me l'apportera."
 goblin_yearly.0005.a.success: "[goblin_char.GetName] réussit et abat une bête."
 goblin_yearly.0005.a.failure: "[goblin_char.GetName] échoue et se blesse."
 goblin_yearly.0005.b: "Je tuerai une bête féroce et sauvage et décorerai ma salle avec."
 goblin_yearly.0005.b.success: "J'abats la bête avec succès."
 goblin_yearly.0005.b.failure: "Je ne parviens pas à tuer la bête et me blesse."
 goblin_yearly.0005.c: "Je décorerai ma salle avec les restes de [goblin_char.GetNamePossessive]."
 goblin_yearly.0005.c.success: "J'abats [goblin_char.GetName]."
 artifact_goblin_skull_trinket_name: "Crâne de [goblin_char.GetNamePossessive]"
 artifact_goblin_skull_trinket_description: "Crâne de [goblin_char.GetNamePossessive] tranché par [ROOT.Char.GetName]"
 goblin_yearly.0005.c.failure: "[goblin_char.GetName] me vainc."
 goblin_yearly.0005.d: "Ma salle sera décorée avec le cadavre de mon prisonnier [prisoner_char.GetName]."
 artifact_prisoner_skull_trinket_name: "Crâne de [prisoner_char.GetNamePossessive]"
 artifact_prisoner_skull_trinket_description: "Crâne de [prisoner_char.GetNamePossessive] tranché par [ROOT.Char.GetName]"
 goblin_yearly.0005.e: "C'est bien comme c'est."

 goblin_yearly.0100.t: "Butin Volé"
 goblin_yearly.0100.desc: "Le butin est entassé devant nous, étincelant dans la lueur du feu. Je tends la main vers le coffre que j'ai gagné, mais [orc_potential_rival.GetName] abat son poing dessus.\n\n« À toi ? Ha ! Tu t'es planqué pendant que je saignais. Ce trésor est à moi ! »\n\nLa horde se rassemble, avide de sang. Ma rage bout plus fort que la forge."
 goblin_yearly.0100.a: "Garde ta vermine, chien."
 goblin_yearly.0100.b: "Prends-le... mais je réglerai la différence."

 goblin_yearly.0101.t: "L'Insulte du Festin"
 goblin_yearly.0101.desc: "La grande salle retentit de rires tandis que [orc_potential_rival.GetName] me pointe un os graisseux.\n\n« Tu t'appelles guerrier ? Même un Gobelin t'éviscèrerait dans le noir ! »\n\nLa bière éclabousse, les rires piquent plus que l'acier. Mes jointures blanchissent sur la coupe."
 goblin_yearly.0101.a: "Redis-le, lâche."
 goblin_yearly.0101.b: "Ça suffit ! Silence !"

 goblin_yearly.0102.t: "Un Duel qui Tourne Mal"
 goblin_yearly.0102.desc: "Le duel n'était qu'un jeu, un affrontement pour régler des mots, rien de plus. Mais quand la lame de [orc_potential_rival.GetName] m'a mis à terre, il s'est dressé au-dessus de moi en ricannant.\n\n« Rends-toi, vermisseau, » a-t-il sifflé, assez fort pour que la foule entende.\n\nLe respect meurt à cet instant. Il ne reste que le venin."
 goblin_yearly.0102.a: "Tu le regretteras."
 goblin_yearly.0102.b: "Prends ma bourse pour ton silence."

 goblin_yearly.0103.t: "La Raillerie du Conseil"
 goblin_yearly.0103.desc: "Dans la salle du conseil j'ai exposé mon plan avec soin, mais [orc_potential_rival.GetName] a éclaté d'un rire tonitruant. « Un plan bon pour des moutons, pas pour des Orques ! Le freluquet a-t-il perdu la tête ? »\n\nMême les gardes ont souri. L'humiliation coule comme du poison dans mes veines."
 goblin_yearly.0103.a: "Ris pendant que tu peux."
 goblin_yearly.0103.b: "Silence, ou je dissous ce conseil."

 goblin_yearly.0104.t: "Combat de Bêtes"
 goblin_yearly.0104.desc: "Nos bêtes de guerre se sont affrontées dans la cour aujourd'hui. La mienne a rugi, bondissant sur celle de [orc_potential_rival.GetName]. Quand la poussière s'est dissipée, sa bête gisait déchiquetée et convulsive.\n\nSa colère a croisé la mienne, crocs à nu. « Tu l'as dressée pour tuer ! Admets-le ! »\n\nJe n'ai rien dit, mais en vérité... cela m'a plu de voir sa bête tomber."
 goblin_yearly.0104.a: "Une bête prouve la valeur de son maître."
 goblin_yearly.0104.b: "Je la remplacerai par une autre."

 goblin_yearly.0105.t: "La Gloire Volée"
 goblin_yearly.0105.desc: "Sur le champ de bataille, c'est ma lame qui a fendu le crâne du champion ennemi. Pourtant à notre retour, [orc_potential_rival.GetName] a vanté la mise à mort devant tous, paradant avec le heaume tranché comme preuve.\n\n« Sans moi, tu aurais fini en charogne, » a-t-il craché quand je l'ai confronté.\n\nMa fureur bout plus fort que du sang frais."
 goblin_yearly.0105.a: "Voleur de gloire !"
 goblin_yearly.0105.b: "Garde-la. Je prendrai des pièces à la place."

 goblin_yearly.0106.t: "Accident d'Entraînement"
 goblin_yearly.0106.desc: "Nous nous sommes battus comme des bêtes dans une fosse. L'acier rugissait, le sang giclait, et quand sa lame a forcé ma garde, elle a mordu profond, se désaltérant à moi comme un loup affamé.\n\nPressant mon flanc ensanglanté, j'ai vu [orc_potential_rival.GetName] sourire. Pas un sourire de regret, mais de triomphe.\n\n« Tu vivras... mais plus faible qu'avant. »\n\nLa cicatrice s'effacera peut-être, mais pas la haine."
 goblin_yearly.0106.a: "Tu paieras pour ça."
 goblin_yearly.0106.b: "Je prendrai des pièces pour pardonner."

 goblin_yearly.0107.t: "Raid Saboté"
 goblin_yearly.0107.desc: "Notre raid s'est achevé dans le désastre. Trop de morts, trop d'abandonnés. Et les murmures me suivent, que [orc_potential_rival.GetName] a décroché au dernier moment, laissant ma horde saigner seule.\n\nIl nie, mais son sourire narquois le trahit.\n\n« Peut-être devrais-tu mener... moins audacieusement, » murmure-t-il."
 goblin_yearly.0107.a: "Je me souviendrai de cette trahison."
 goblin_yearly.0107.b: "Prends mon argent et étouffe-toi avec."

 goblin_yearly.0108.t: "Tribut Refusé"
 goblin_yearly.0108.desc: "Quand j'ai exigé le tribut, [orc_potential_rival.GetName] a craché par terre.\n\n« Je ne te dois rien. Ni or, ni sang, ni obéissance. »\n\nMa main s'est portée vers ma hache, la sienne vers la sienne. L'air entre nous était épais comme la fumée du combat."
 goblin_yearly.0108.a: "Alors tu me dois ta vie."
 goblin_yearly.0108.b: "Garde ta misérable monnaie."

 goblin_yearly.0109.t: "Humiliation à l'Entraînement"
 goblin_yearly.0109.desc: "Nous nous sommes battus dans le cercle, juste pour tester nos lames devant les jeunes. Mais [orc_potential_rival.GetName] m'a abattu, sa botte sur la nuque, écrasant mon visage dans la boue.\n\n« Vous voyez ça ? » a-t-il rugi. « Voilà la puissance de votre maître ! »\n\nLes jeunes ont ri comme des loups. Leurs rires résonneront dans mon crâne jusqu'à ce que je les en arrache avec son sang."
 goblin_yearly.0109.a: "Tu paieras cette honte."
 goblin_yearly.0109.b: "Prends ta victoire, chien."

 goblin_yearly.0131.t: "Bannière Souillée"
 goblin_yearly.0131.desc: "Ma bannière de guerre a été traînée dans la fange et hissée à l'envers sur la place du village. Les Orques riaient en passant, crachant dessus, sachant bien quelle main avait fait ça. Mon rival ose me railler aux yeux de tous. Dans notre monde, pareille insulte n'appelle qu'une réponse : la guerre sans fin."
 goblin_yearly.0131.a: "Son sang lavera ma bannière."
 goblin_yearly.0131.b: "Que la honte pourrisse en silence."

 goblin_yearly.0132.t: "L'Insulte au Festin"
 goblin_yearly.0132.desc: "Le brasier crépitait, la gnôle coulait à flots, et la salle puait la sueur et la chair rôtie. Mon rival a levé sa coupe bien haut en beuglant : « Un toast ! Aux guerriers qui ont des crocs ! Et à ceux qui n'ont pas le mordant pour les utiliser ! » Ses yeux brûlaient dans les miens tandis que la salle explosait de rires sauvages, les poings martelant les tables. Les festins orques se nourrissent de railleries, mais ce n'était pas une blague d'ivrogne. C'était un défi à mon sang."
 goblin_yearly.0132.a: "Je lui arracherai la langue du crâne."
 goblin_yearly.0132.b: "Avaler ça avec la gnôle."

 goblin_yearly.0133.t: "Tombe Profanée"
 goblin_yearly.0133.desc: "Mon camp de guerre a été pillé dans la nuit, non par des étrangers, mais par sa main. Mes armes, mes fourrures, mes trophées, déchirés et éparpillés dans la boue comme les restes d'un chien. Il veut que le clan me voie affaibli, dépouillé de ce que j'ai pris de droit. Pour un Orque, le pillage n'est pas de la richesse, c'est la preuve de la force. Et ma force gît maintenant en lambeaux."
 goblin_yearly.0133.a: "Je disperserai son crâne dans la boue."
 goblin_yearly.0133.b: "Ramasser ce qui reste, serrer les dents."

 goblin_yearly.0134.t: "La Lame Brisée"
 goblin_yearly.0134.desc: ""
 goblin_yearly.0134.a: "Je le briserai comme il l'a brisée."
 goblin_yearly.0134.b: ""

 goblin_yearly.0135.t: "Murmures de Faiblesse"
 goblin_yearly.0135.desc: "Partout dans mes halls j'entends le même venin : « Trop mou... trop lent... trop faible pour régner. » Il a empoisonné les oreilles avec des mensonges, transformé les rires en couteaux dans mon dos. Même ceux qui festoient à mon feu me lancent des sourires en coin, comme s'ils attendaient que ma force flanche.\n\nChez les Orques, la faiblesse c'est du sang dans l'eau. Une rumeur en engendre dix, et dix suffiront à fractionner une horde. Ce n'est pas une simple insulte, c'est une lame pressée contre mon règne même, attendant qu'on la pousse."
 goblin_yearly.0135.a: "Je lui arracherai la mâchoire."
 goblin_yearly.0135.b: "Grogner, mais s'éloigner."

 goblin_yearly.0136.t: "Trophées Dérobés"
 goblin_yearly.0136.desc: "Mes trophées, crânes arrachés à des ennemis, bannières lacérées dans des halls en flammes, peaux griffues de bêtes abattues de ma propre main, disparus. Plus tard je les ai retrouvés pendus dans son antre, hissés haut pour que tout Orque puisse les voir, comme s'il avait lui-même marqué ces victoires.\n\nIl boit sous eux, souriant narquoisement, me défiant d'agir. Les Orques vivent de leurs trophées, ils sont la preuve de chaque mise à mort, de chaque raid, de chaque victoire. Se les faire voler n'est pas une honte. C'est un vol de ma force même. Et la force réclame du sang."
 goblin_yearly.0136.a: "Je les reprendrai dans ses hurlements."
 goblin_yearly.0136.b: "Qu'il s'étouffe avec une fausse gloire."

 goblin_yearly.0137.t: "La Raillerie de la Chasse"
 goblin_yearly.0137.desc: "À la chasse, j'ai abattu une bête de ma propre main. Pourtant avant que je puisse la réclamer, mon rival s'est avancé, a éventré la carcasse et a beuglé : « Voyez comme il a besoin de moi pour finir sa mise à mort ! » Les chasseurs ont ri, les yeux brillants. Se faire railler à la chasse, c'est se faire railler en tant qu'Orque."
 goblin_yearly.0137.a: "Sa peau pendra à côté de celle de la bête."
 goblin_yearly.0137.b: "Rire avec eux, la bile dans la gorge."

 goblin_yearly.0138.t: "Défié en Conseil"
 goblin_yearly.0138.desc: "En conseil, tandis que nous débattions de la guerre, mon rival s'est levé et a rugi : « Pourquoi l'écouter ? Il n'a ni crocs ni force ! C'est moi qui devrais être chef, pas celui-là ! » Les autres Orques se sont agités, certains hochant même la tête. Ses mots n'étaient pas une simple insulte, c'était un défi."
 goblin_yearly.0138.a: "Il s'étranglera avec ces mots."
 goblin_yearly.0138.b: "L'ignorer, la fierté en sang."

 goblin_yearly.0139.t: "Sang Versé pour le Sport"
 goblin_yearly.0139.desc: "Nous avions bu profondément, la salle épaisse de gnôle et de fumée. Les chants ont commencé, poings martelant et crocs à nu, jusqu'à ce que quelqu'un nous pousse dans le cercle. Ces accrochages sont courants, ivres de rage et de rires. Mais mon rival a frappé avec plus que de la gnôle dans le ventre. Sa lame m'a mordu profond, et tandis que je saignais sur le sol il a ri en disant : « Je ne savais pas que c'était ton sang que je versais. »\n\nChez les Orques, les bagarres c'est des os brisés et de l'orgueil. Mais son entaille n'était pas un accident, c'était un avertissement."
 goblin_yearly.0139.a: "À partir de ce jour, nous sommes ennemis de sang."
 goblin_yearly.0139.b: "Tituber, le sang dans la barbe."

 goblin_yearly.0140.t: "Clan Méprisé"
 goblin_yearly.0140.desc: "Après le raid, tandis qu'on partageait le butin, mon rival s'est dressé devant la horde et a rugi : « Pourquoi le suivre ? Il ne ramène que des miettes, alors que moi je ramènerais des festins ! Ses ordres ne mènent qu'à des ventres vides ! »\n\nLes autres ont hurlé de dérision, crocs luisants, certains se frappant la poitrine en signe d'approbation. Ce n'était pas une petite insulte. Il a frappé ma capacité à mener des raids, à commander des guerriers, le cœur même du pouvoir orque."
 goblin_yearly.0140.a: "Je le briserai devant la horde."
 goblin_yearly.0140.b: "Laisser l'insulte brûler en silence."