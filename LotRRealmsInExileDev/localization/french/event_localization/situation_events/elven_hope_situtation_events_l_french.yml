l_french:

 elven_hope.0001.t: "La Longue Défaite"
 elven_hope.0001.desc: "#TOLKIENQUOTE: « J'ai vu trois âges à l'Ouest du monde, bien des défaites, et bien des victoires stériles. » #!\n\nDepuis leur Éveil au bord du lac [cuivienen|E] jusqu'au jour présent, les [elves|E] demeurent en [middleearth|E] depuis des temps immémoriaux. Ils ont été témoins d'innombrables triomphes et d'échecs sans nombre. Toujours plus lourd pèse sur eux le cours du monde, car les [elderdays|E] s'estompent et leur force décline. Nombreux sont ceux qui envisagent désormais de quitter la [middleearth|E] pour rejoindre les terres immortelles de [valinor|E], par-delà la Grande Mer.\n\nPourtant, tous ne tiennent pas la domination des [men|E] pour inéluctable ; beaucoup aiment encore la Terre du Milieu avec ferveur, en toute sa beauté et ses terreurs. Quand cet [age|E] viendra à son terme, quel destin sera réservé aux Elfes ? Accepteront-ils le Destin longuement pressenti, ou le défieront-ils, cherchant encore à faire de la Terre du Milieu une demeure belle et libre ?"  
 elven_hope.0001.istari.desc: "#TOLKIENQUOTE: « J'ai vu trois âges à l'Ouest du monde, bien des défaites, et bien des victoires stériles. » #!\n\nDepuis leur Éveil au bord du lac [cuivienen|E] jusqu'au jour présent, les [elves|E] demeurent en [middleearth|E] depuis des temps immémoriaux. Ils ont été témoins d'innombrables triomphes et d'échecs sans nombre. Toujours plus lourd pèse sur eux le cours du monde, car les [elderdays|E] s'estompent et leur force décline. Nombreux sont ceux qui envisagent désormais de quitter la [middleearth|E] pour rejoindre les terres immortelles de [valinor|E], par-delà la Grande Mer.\n\nPourtant, tous ne tiennent pas la domination des [men|E] pour inéluctable ; beaucoup aiment encore la Terre du Milieu avec ferveur, en toute sa beauté et ses terreurs.\n\nNous autres de l'Ordre des [istariconcept|E] sommes venus les guider et les soutenir du mieux que nous pouvons, ravivant leur [hope|E] par chacune de nos actions.\n\n#TOLKIENQUOTE:« Ce sont les petites choses, les gestes quotidiens des gens ordinaires, qui nous préservent du [alignment_evil|E]. De simple actes de bontés et d'amour. »#!" 
 elven_hope.0001.a: "Que les étoiles nous guident."
 
 elven_hope.0010.t: "[my_subregion.GetName]: [my_subregion.GetCurrentPhase.GetType.GetName]"
 elven_hope.0010.desc: "Tous les [elves|E] de [my_subregion.GetName] le ressentent. Voici les jours du déclin : nos semblables méditent de plus en plus sur les choix ultimes qui les attendent. L'[hope|El] s'est éteint, et la résignation emplit désormais le cœur de maints Elfes, la fin presque certaine. Le passage de l'[age|E] est proche ; les jours des Quendi en [my_subregion.GetName] s'amenuisent, à moins que quelque retournement caché du destin ne survienne.\n\n#weak [my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]#!"
 elven_hope.0010.a: "Nos jours s'effacent. La Mer nous appelle."
 elven_hope.0010.tt: "[my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]"
 
 elven_hope.0011.t: "[my_subregion.GetName]: [my_subregion.GetCurrentPhase.GetType.GetName]"
 elven_hope.0011.desc: "Les [elves|E] de [my_subregion.GetName] se lassent ; le monde nous dépasse de plus en plus, notre nombre et nos enfants s'amenuisent, et toujours davantage se retirent du monde ou le quittent. Notre force n'est pas encore tout à fait épuisée, mais elle décline, tout comme notre esprit. Si rien ne change, bientôt cela pourrait être irrémédiable.\n\n#weak [my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]#!"
 elven_hope.0011.a: "Le temps des Elfes est révolu."
 elven_hope.0011.tt: "[my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]"
 
 elven_hope.0012.t: "[my_subregion.GetName]: [my_subregion.GetCurrentPhase.GetType.GetName]"
 elven_hope.0012.desc: "Les [elves|E] de [my_subregion.GetName] perdurent. Si nous ne sommes plus ce que nous fûmes jadis, nous avons encore la force, et la volonté de la déployer ; nous ne croissons ni ne déclinons. Certains partent, mais d'autres gardent encore l'[hope|El] en l'avenir de [my_subregion.GetName]. Selon ce que l'avenir apportera, ce pourrait être l'amorce d'un renouveau, d'un déclin, ou d'une longue stase.\n\n#weak [my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]#!"
 elven_hope.0012.a: "De toute la force qu'il nous reste, nous poursuivrons le combat."
 elven_hope.0012.tt: "[my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]"

 elven_hope.0013.t: "[my_subregion.GetName]: [my_subregion.GetCurrentPhase.GetType.GetName]"
 elven_hope.0013.desc: "Une énergie tranquille vibre en [my_subregion.GetName] ; un sentiment de croissance, le sentiment que voici des jours de renouveau. De puissants arbres longtemps assoupis s'éveillent à présent, car le printemps est enfin venu, et puissent-ils durer longtemps. Les voix des [elves|E] s'élèvent désormais en chant ; d'abord pour célébrer, puis peut-être bientôt en toute puissance, pour édifier à nouveau de grandes choses et mettre les Ténèbres en déroute.\n\n#weak [my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]#!"
 elven_hope.0013.a: "Les Elfes ne fuiront point les ténèbres si tôt."
 elven_hope.0013.tt: "[my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]"

 elven_hope.0014.t: "[my_subregion.GetName]: [my_subregion.GetCurrentPhase.GetType.GetName]"
 elven_hope.0014.desc: "Un puissant hymne retentit en [my_subregion.GetName], une mélodie florissante résonnant depuis les profondeurs de l'histoire. Les Enfants des Étoiles rayonnent d'une lumière intérieure, portés par l'[hope|El] et des songes renouvelés. Notre nombre s'accroît, nos forges s'embrasent, nos tours s'élèvent hautes et belles. Ici, en [middleearth|E], nous ferons de cette terre un royaume aussi beau qu'Eldamar ou Cuiviénen jadis.\n\n#weak [my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]#!"
 elven_hope.0014.a: "Nous sommes la mémoire vivante des [elderdays|E]."
 elven_hope.0014.tt: "[my_subregion.GetName] est en [situation_phase|El] [my_subregion.GetCurrentPhase.GetType.GetName]"

 elven_hope.0020.tt: "[abandoned_county.GetName] fait désormais partie de la [wilderness|E]"
 elven_hope.0020.tt.desc: "Les habitants de [abandoned_county.GetName] ont navigué vers [valinor|E]"
 
 elven_hope.0021.t: "[county_being_abandoned.GetNameNoTier]: L'Appel de la Mer"
 elven_hope.0021.desc: "C'est tard dans la journée que [leaving_elf.GetName] me trouve, le chagrin peint sur son visage. « Des nouvelles me parviennent de [county_being_abandoned.GetNameNoTier], » m'explique-t-[leaving_elf.Custom('FR_IlElle')]. « Les derniers [elves|E] qui y demeuraient encore projettent de quitter leurs demeures et de chercher la Route Droite. »\n\nS'il est juste et légitime que chacun parmi les [elves|E] soit libre de naviguer vers [valinor|E] à l'heure de son choix, abandonner tout un [county|El] est une décision grave. Un dessein qui pourrait encore être évitable..."
 elven_hope.0021.a: "Je dois les convaincre de rester."
 elven_hope.0021.a.success: "Vos efforts convainquent les [elves|E] de rester"
 elven_hope.0021.a.failure: "Vos efforts sont vains"
 elven_hope.0021.a.tt: "Vous tentez de convaincre les [elves|E] de [county_being_abandoned.GetNameNoTier] de rester\n\n#weak Votre succès sera déterminé par une [skill|El] aléatoire. En cas de succès, [county_being_abandoned.GetNameNoTier] demeurera sous votre contrôle. En cas d'échec, le comté redeviendra à la [wilderness|E].#!"
 
 elven_hope.0022.t: "[leaving_vassal.GetFirstName]: Un Dernier Voyage"
 elven_hope.0022.desc: "[leaving_vassal.GetName] est venu[leaving_vassal.Custom('FR_E')] solliciter audience. « M[ROOT.Char.Custom('FR_OnA')][ROOT.Char.Custom('FR_SeigneurDame')], » dit-[leaving_vassal.Custom('FR_IlElle')], « l'heure est venue pour moi de passer vers l'Ouest et de chercher les rivages blancs de [valinor|E]. Les derniers habitants de [county_being_abandoned.GetNameNoTier] ont décidé de m'accompagner dans ce voyage ultime par-delà la Route Droite, et le domaine sera laissé vide. »\n\nS'il est juste et légitime que chacun parmi les [elves|E] soit libre de naviguer vers l'Ouest à l'heure de son choix, abandonner tout un [county|El] est une décision grave. Un dessein qui pourrait encore être évitable..."
 elven_hope.0022.a: "Je dois convaincre [leaving_vassal.GetFirstName] de rester."
 elven_hope.0022.a.success: "Vos efforts convainquent [leaving_vassal.GetFirstName] de rester"
 elven_hope.0022.a.failure: "Vos efforts sont vains"
 elven_hope.0022.a.tt: "Vous tentez de convaincre [leaving_vassal.GetFirstName] de rester#weak Votre succès sera déterminé par une [skill|El] aléatoire. En cas de succès, [leaving_vassal.GetName] demeurera en [middleearth|E] et [county_being_abandoned.GetNameNoTier] restera sous son contrôle. En cas d'échec, [leaving_vassal.GetName] naviguera vers [valinor|E] et [county_being_abandoned.GetNameNoTier] redeviendra à la [wilderness|E].#!"

 elven_hope.0030.t: "[my_elven_subregion.GetName]: Ombres qui s'attardent"
 elven_hope.0030.desc: "Les [elves|E] de [my_elven_subregion.GetName] ont longtemps combattu les Ténèbres en [middleearth|E], nourrissant l'[hope|El] que les ombres soient un jour vaincues pour de bon. Mais maintes fois, les puissances obscures ne tombent pas, elles se retirent dans l'ombre patientant des années durant pour regagner leur puissance et resurgir quand l'heure est propice.\n\nPour le bien des [elves|E], nous devons nous efforcer de sécuriser notre royaume et de combattre les [lingering_darkness|E] partout où nous les trouvons.\n\n#weak Il y a actuellement #N [my_elven_subregion.MakeScope.Var('evil_counties_per_subregion').GetValue]#! [counties|El] sous l'emprise du [alignment_evil|E] dans votre [situation_sub_region|El]."
 # \n\n$BULLET_WITH_TAB$ #N [my_elven_subregion.MakeScope.Var('evil_counts_in_subregion').GetValue]#! are [counts|E]\n$BULLET_WITH_TAB$ #N [my_elven_subregion.MakeScope.Var('evil_dukes_in_subregion').GetValue]#! are [dukes|E]\n$BULLET_WITH_TAB$ #N [my_elven_subregion.MakeScope.Var('evil_kings_in_subregion').GetValue]#! are [kings|E]\n$BULLET_WITH_TAB$ #N [my_elven_subregion.MakeScope.Var('evil_emperors_in_subregion').GetValue]#! are [emperors|E]\n$BULLET_WITH_TAB$ #N [my_elven_subregion.MakeScope.Var('evil_hegemons_in_subregion').GetValue]#! are [hegemons|E]#!"
 elven_hope.0030.a: "Nous devons refouler les Ténèbres."
 
 # elven_hope.0031.t: "See if this shows up"
 # elven_hope.0031.desc: "There are now #N [my_elven_subregion.MakeScope.Var('evil_rulers_in_subregion').GetValue]#! evil rulers in your [situation_sub_region|E]."
 # elven_hope.0031.a: "Okay"

 elven_hope.0100.t: "Songes de la Mer"
 elven_hope.0100.desc: "Ces derniers temps, le vent porte avec lui d'étranges mélancolies. Je me retrouve l'esprit à la dérive, attiré[ROOT.Char.Custom('FR_E')] vers l'Ouest, vers des rivages hors de ma portée. Et je ne suis point seul[ROOT.Char.Custom('FR_E')] en cela. Un désir tranquille s'éveille dans les cœurs de mon peuple. Ils parlent de la Mer non avec crainte, mais avec révérence. Certains commencent à rêver de vaisseaux, de voiles blanches, et de contrées vertes et lointaines entrevues dans le seul sommeil.\n\nJe marche parmi les arbres et le perçois dans leurs regards : la lumière du souvenir et la douleur sourde de ce qui a été perdu. Ils s'attardent au bord des rivières, le regard tourné vers l'Ouest dans un silence mélancolique. Des artisans façonnent des talismans à la forme des vagues ou des mouettes ; des ménestrels égrènent des mélodies qui font écho au rythme de la marée. Un changement s'est produit dans l'esprit du royaume, comme si la Mer nous appelait pour de bon.\n\nMais je dois me demander : que ferai-je de ce flot de désir ? Parlerai-je d'espoir et de dessein ici, en [middleearth|E] ? Ou bien préparerai-je les havres pour que des vaisseaux prennent la mer sous les étoiles ?"
 elven_hope.0100.a: "Un jour, nous voguerons tous vers les Terres Immortelles."
 elven_hope.0100.b: "Je ferai résonner un chant d'espoir que rien n'a encore éteint."
 elven_hope.0100.b.success: "Votre peuple reprend courage"
 elven_hope.0100.b.failure: "Votre chant rappelle à votre peuple tout ce qu'il a déjà perdu"

 elven_hope.0101.t: "Les Arbres ne chantent plus"
 elven_hope.0101.desc: "Il règne dans les bois un silence que je ne saurais ignorer. Les oiseaux semblent tous s'être tus, et la brise ne danse plus parmi les ramures avec sa légèreté d'antan. Les arbres eux-mêmes semblent retirés en eux-mêmes ; non pas morts, mais silencieux, comme à l'écoute de quelque chose qui ne vient plus. Je marche sous leurs ramures et perçois le poids du silence qui pèse sur moi.\n\nJe me souviens du temps où les feuilles bruissaient comme un éclat de rire et la forêt bourdonnait de vie. À présent, même les bosquets les plus anciens se dressent sans mouvement. Mon peuple n'en parle qu'à voix basse. Certains pensent que c'est du chagrin, d'autres disent que c'est la peur. Mais quelle qu'en soit la cause, ce n'est pas naturel. Quelque chose a changé, et la terre semble lasse.\n\nSi la terre elle-même commence à perdre sa voix, quel [hope|El] reste-t-il à ceux d'entre nous qui y demeurent ? Je dois décider si je dois éveiller mon peuple avec de nouveaux chants, ou écouter, comme le font les arbres, et tâcher de comprendre ce que le silence cherche à nous dire."
 elven_hope.0101.a: "Leurs chants reviendront avec le changement de saison."
 elven_hope.0101.b: "Je dois enquêter sur ce mystère."
 elven_hope.0101.b.success: "Vous découvrez la source du silence"
 elven_hope.0101.b.failure: "Vos recherches s'avèrent vaines"

 elven_hope.0102.t: "L'Enfant du Printemps"
 elven_hope.0102.desc: "Aujourd'hui, l'air semble plus chaud, la lumière plus douce, et dans mes halls, le rire retentit comme un chant. Un enfant est né parmi nous. Un enfant Elfe. Une telle naissance est si rare que nombreux parmi nous ne se souviennent plus de la dernière fois que cela s'est produit. C'est comme si le monde, longtemps étouffé sous le chagrin, avait expiré de joie.\n\nJe contemple l'enfant, si petit et si nouveau, et pourtant lié à une lignée antique qui remonte à travers les Âges. Un instant, je ne perçois nul fardeau, nul poids des années ; seulement l'émerveillement. Des chants résonnent parmi les arbres, et mon peuple se rassemble pour célébrer l'avenir et l'[hope|El] renaissant qu'a allumé cet heureux événement. Il y a quelque chose de sacré en cela, la sainteté de la vie et du renouveau, un défi tranquille à la désespérance.\n\nL'[hope|El] ne se présente point toujours avec le son des trompettes ou le souffle du triomphe. Parfois, il vient emmailloté de lin, avec des étoiles dans les yeux."
 elven_hope.0102.a: "Quelles heureuses nouvelles ! Une grande bénédiction, en vérité."
 elven_hope.0102.b: "Que la mère et l'enfant se reposent. Bien fait, [new_mother.GetFirstName]."
 elven_hope.0102.c: "Nous célébrerons cet heureux événement."

 elven_hope.0103.t: "Un Départ Nocturne"
 elven_hope.0103.desc: "L'heure est tardive, et pourtant je me retrouve arraché[ROOT.Char.Custom('FR_E')] à mon repos. Un courtisan arrive, livide et hors d'haleine, murmurant des mouvements au bord du rivage. Je le suis en silence, le cœur étreint d'une certitude informulée. Là, sous les étoiles voilées, un vaisseau se balance doucement dans le havre, son pont déjà chargé de silhouettes drapées dans le clair de lune. Ce sont des [elves|E] de mon royaume, qui se préparent à partir sans prendre congé.\n\nJe m'avance, et le silence s'empare d'eux. L'un se retourne pour me faire face : un ancien dont les conseils ont autrefois façonné nos chants, à présent muet. Ses yeux ne portent nul chagrin, mais la paix. Je ne pose nulle question. Je connais les réponses. La lassitude, le désir, l'appel de la Mer, cela les a conquis. Ils s'inclinent profondément, et je leur rends leur révérence, tandis que mon cœur crie comme les mouettes planant au-dessus.\n\nÀ la fin, je tourne le regard vers le vaisseau, offrant un dernier conseil à ceux que ces rivages ne sauraient plus retenir."
 elven_hope.0103.a: "Puissiez-vous trouver la Route Droite sans encombre."
 elven_hope.0103.b: "Demeurez encore quelques heures pour permettre des adieux convenables."
 elven_hope.0103.b.success: "Ils consentent à rester, ne fût-ce qu'un court moment"
 elven_hope.0103.b.failure: "Ils voient dans cette tentative une contrainte, et maudissent votre nom en partant"

 elven_hope.0104.t: "Le Lai des Proches Longtemps Perdus"
 elven_hope.0104.desc: "Cela commence dans le silence, une quiétude ancrée dans la révérence. [elder_courtier.GetFirstName], m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('elder_courtier'))], se tient devant nous, sa voix posée et grave, convoquant des mots qu'un [age|E] entier n'avait point entendus à voix haute. Ce chant est plus ancien qu'aucun enfant des années cadettes, tiré de la peine et de la gloire du [firstage|E]. Des noms longtemps évanouis de nos parchemins s'épanouissent à nouveau en mélodie, et la salle se fige telle la pierre.\n\nJe le sens s'éveiller en moi : l'attraction du souvenir, la douleur d'une perte qui transcende les vies. Les visages de ceux que j'aimais jadis surgissent sans y avoir été conviés, leur rire dissimulé dans les accords du lai. Bien que je sache ces moments révolus depuis longtemps, le temps de ce chant, je demeure à nouveau parmi eux. Les Premiers-Nés, fiers et radieux. Le monde tel qu'il était avant son brisement.\n\nQuand la dernière note s'éteint, le silence nous tient captifs. Puis un souffle, l'un après l'autre, et la salle expire. Je perçois des larmes dans les yeux de ceux qui se souviennent encore, et de l'émerveillement dans ceux qui ne se souviennent plus. L'[hope|El] ne se présente point toujours sous la forme d'une bannière ou d'une épée. Parfois, c'est un chant qui nous rappelle qui nous sommes."
 elven_hope.0104.a: "Grandes furent nos actions d'antan."
 elven_hope.0104.b: "Que le souvenir raffermisse notre résolution."
 elven_hope.0104.c: "Je ferai en sorte que ce chant résonne plus souvent."
 elven_hope.0104.c.success: "Le chant s'impose aussitôt comme un classique"
 elven_hope.0104.c.failure: "L'esprit du chant s'étiole dans la démarche, comme tant de choses avant lui"

 elven_hope.0105.t: "Un Monde Souillé par le Mal"
 elven_hope.0105.desc: "Les murmures me parviennent bien avant les messagers. Des rumeurs de sombres nouvelles ; d'ombres qui s'enroulent loin de nos frontières, mais qui se faufilent toujours plus près dans les pensées de mon peuple. Les noms de lieux autrefois paisibles portent désormais le parfum de la crainte, et même le vent semble hésiter en traversant les arbres.\n\nJe parcours les couloirs de ma demeure et le perçois : l'inquiétude silencieuse derrière chaque sourire, le regard méfiant tourné vers l'horizon. Des [elves|E] qui chantaient jadis librement se taisent à présent, leurs cœurs tournés vers une crainte lointaine. Nous en parlons peu, et pourtant la présence se fait sentir ; non pas seulement dans les récits, mais dans le frémissement des feuilles qui ne connaissaient jadis que la joie.\n\nCe mal peut se trouver bien au-delà de nos terres, mais son poids pèse sur nous tout autant. Je ne sais s'il nous atteindra, ou s'il s'estompera comme tant d'orages avant lui. Mais dans les cœurs de mes semblables, il a déjà laissé une marque ; que je dois m'efforcer de guérir avant qu'elle ne prenne racine trop profondément."
 elven_hope.0105.a: "Nous sommes une île dans la mer des ténèbres."
 elven_hope.0105.b: "Même dans un monde qui s'assombrit toujours, nous avons tenu."
 elven_hope.0105.b.success: "Et nous tiendrons encore"
 elven_hope.0105.b.failure: "Mais combien de temps avant que nous soyons submergés ?"

 elven_hope.0106.t: "L'Évanouissement de la Lumière"
 elven_hope.0106.desc: "Je passe sous les ramures d'un arbre d'une antiquité singulière, comme je l'ai fait depuis les premiers jours de mon règne. Ses feuilles, jadis d'un vert radieux même dans la lumière déclinante de l'automne, gisent à présent éparpillées en ternes amas sur la terre : tombées bien trop tôt, bien trop silencieusement. L'écorce est sèche au toucher, le chant de son esprit réduit à un murmure fragile. Certains de mon peuple disent que l'arbre est malade. D'autres ne parlent pas du tout, comme s'ils craignaient que nommer leur chagrin ne lui confère du pouvoir.\n\nLes érudits disent que de tels arbres ne meurent pas comme les plantes mortelles ; ils déclinent avec l'esprit de la terre, avec les cœurs de ceux qui demeurent à proximité. Je m'agenouille à ses racines, la main pressée contre la terre, et ne perçois ni pourriture, ni ver, ni poison. Seulement le silence. Ce n'est pas seulement cet arbre unique qui souffre, mais la totalité de notre race. Nous qui nous effaçons, peu à peu, de l'intérieur.\n\nCet arbre a résisté à travers les Âges, au feu et à l'ombre, à la joie et au chagrin. Et pourtant, même lui se penche à présent vers le sommeil. Je dois décider : le laisserai-je s'éteindre en silence, planter à nouveau, ou faire appel à ceux qui se souviennent encore des voies cachées du renouveau ? Quel que soit mon choix, je sais que le chagrin de l'arbre ne lui appartient pas. Il est nôtre."
 elven_hope.0106.a: "Une à une, toutes choses doivent s'éteindre."
 elven_hope.0106.b: "Nous planterons de nouvelles semences, et les soignerons avec soin."
 elven_hope.0106.b.success: "Le jeune arbre prend de la vigueur"
 elven_hope.0106.b.failure: "Le jeune arbre est dévoré par les insectes"
 
 elven_hope.0107.t: "Une Statue Brisée"
 elven_hope.0107.desc: "La statue gît en morceaux sur la pierre froide. Je me souviens d'elle depuis mes premières années : taillée dans le marbre blanc, sa surface lisse comme la clarté des étoiles, façonnée jadis par-delà la Grande Mer. On disait qu'elle reflétait l'instant présent autant que la mémoire, faisant écho à l'esprit de celui qui la contemplait. À présent, les fragments ne captent plus que la pâle lumière du matin, et je n'y vois rien que la perte.\n\nDes murmures se répandent comme du givre à travers la cour. Certains craignent que ce soit un signe ; un présage de déclin, dans le marbre brisé autant que dans l'esprit de la race elfique en nous. D'autres pensent que ce n'est qu'un objet, et que le pleurer lui confère plus de pouvoir qu'il n'en mérite. Pourtant je ne puis m'empêcher de me demander quelle force, quel moment, aurait pu provoquer une telle fracture.\n\nJe m'agenouille auprès des vestiges de la statue, et mes pensées sont lourdes. Était-ce un avertissement… ou une invitation ? La ruine, ou le renouveau ?"
 elven_hope.0107.a: "Qu'elle soit refaite. La beauté peut encore renaître."
 elven_hope.0107.a.success: "La nouvelle statue surpasse en beauté l'œuvre première"
 elven_hope.0107.a.failure: "La nouvelle statue n'est qu'une caricature déformée de l'œuvre première"
 elven_hope.0107.b: "Son heure est passée. Laissez les fragments là où ils sont tombés."
 elven_hope.0107.c: "Distribuez les morceaux à mon peuple en mémoire de nos épreuves."

 elven_hope.0108.t: "Liesse sous les Étoiles"
 elven_hope.0108.desc: "Ce soir, les halls résonnent de chants. Quelqu'un entonne une mélodie que je n'avais point entendue depuis des âges, et d'autres la rejoignent sans hésiter ; les voix s'entrelacent comme des fils d'argent dans l'air du soir. Les foyers flamboient, répandant une lumière d'ambre sur les longues tables et dans les yeux qui brillent. On y danse aussi, et les rires s'élèvent comme des oiseaux que l'on fait lever d'un coup.\n\nL'espace d'un instant, le fardeau glisse de nos épaules. La longue mémoire du chagrin, le silence qui hante ces murs, la meurtrissure du temps : tout s'efface sous les étoiles. Je regarde les plus jeunes [elves|E] entraînés dans les pas de danses plus anciennes que les montagnes, et je vois la lumière se rallumer dans les yeux des plus anciens d'entre nous.\n\nJe me surprends à sourire sans retenue, et sincèrement. Quel que soit le destin qui nous attend, quelle que soit l'ombre qui rampe au loin, nous sommes encore là. Encore à chanter, encore à danser, et encore en vie."
 elven_hope.0108.a: "Que leur liesse se prolonge jusqu'à l'aube."
 elven_hope.0108.b: "Je les rejoindrai et partagerai leur joie."
 elven_hope.0108.b.success: "Je suis accueilli avec une grande chaleur"
 elven_hope.0108.b.failure: "Ma présence trouble les convives, et la fête prend fin bientôt"
 elven_hope.0108.c: "Nous ne devons pas oublier le labeur qui nous attend encore."
 
 elven_hope.0109.t: "Une Belle Récolte"
 elven_hope.0109.desc: "Alors que je m'apprête à tenir cour devant le trône, [happy_courtier.GetName] s'approche de moi d'un air joyeux. «Les récoltes de votre royaume sont rentrées, m[ROOT.Char.Custom('FR_OnA')][ROOT.Char.Custom('FR_SeigneurDame')]. La saison nous a été généreuse, et nous avons été comblés par une abondante récolte.»\n\nMon cœur s'allège à cette nouvelle, car la nourriture, la boisson et de bonnes provisions sauront relever les esprits des [elves|E] confiés à ma garde. Il me revient de décider à présent comment distribuer au mieux cette récolte, comme je l'ai fait bien des fois déjà."
 elven_hope.0109.a: "Distribuez tout ce qui n'est pas urgent parmi le peuple."
 elven_hope.0109.b: "Rendons grâce à la Dame [yavannacharacter|E] pour ses bienfaits."
 elven_hope.0109.b.success: "Un grand arbre s'épanouit, un signe de bénédiction"
 elven_hope.0109.b.failure: "Nos actions de grâce semblent demeurer sans écho"
 elven_hope.0109.c: "Les surplus devraient aller au commerce et aux échanges."
 
 elven_hope.0110.t: "Succès de la Colonie"
 elven_hope.0110.desc: "Tandis que je me promène dans les clairières voisines, [colonist_courtier.GetName] s'approche de moi, portant un message. «Je vous apporte des nouvelles de [colony_county.GetName], mon m[ROOT.Char.Custom('FR_OnA')][ROOT.Char.Custom('FR_SeigneurDame')]. Les travaux avancent bien, et dépassent toutes nos espérances ; ils seront achevés bien plus tôt que prévu.»\n\nJ'incline la tête en signe d'approbation, et mon cœur s'allège. À mesure que mon royaume s'étend, l'[hope|El] renaît parmi ceux qui y demeurent. Je dois veiller à guider avec soin les colons de [colony_county.GetName], car leur ardeur au labeur et leur endurance brillent comme un flambeau de renouveau en des temps d'ombres grandissantes."
 elven_hope.0110.a: "Envoyez-leur toute l'aide dont ils ont besoin."
 elven_hope.0110.b: "Que leur diligence soit connue de tous."
 elven_hope.0110.b.success: "Notre peuple reprend courage et redouble d'ardeur"
 elven_hope.0110.b.failure: "Notre peuple s'abandonne à la complaisance"

 elven_hope.0111.t: "Un Ruisseau Souillé"
 elven_hope.0111.desc: "J'ai toujours chéri le chant d'un ruisseau particulier, qui court à travers [border_county.GetNameNoTier], aux confins de nos terres. Il chante les profondeurs de la terre, les grenouilles vertes et les fleurs sauvages.\n\nMais tandis que je m'y dirige une fois encore, je ne le reconnais plus. Tout ce que j'entends est un silence de mort, et lorsque je le rejoins, je comprends. L'eau est souillée par des arbres calcinés et abattus, et par les dépouilles en décomposition de bêtes sauvages massacrées. Ses rives ont été profanées avec une cruauté que j'ai peine à concevoir. C'est là véritablement une œuvre du [alignment_evil|E]."
 elven_hope.0111.a: "Avec le temps, le ruisseau se guérira."
 elven_hope.0111.b: "Nous le rendrons à ce qu'il était."
 elven_hope.0111.b.success: "Le ruisseau chante à nouveau avec joie"
 elven_hope.0111.b.failure: "Le ruisseau ne sera plus jamais le même"

 elven_hope.0112.t: "Une Mauvaise Récolte"
 elven_hope.0112.desc: "La terre n'a pas été généreuse cette saison. La nouvelle me parvient que la récolte de cette année fut maigre, et que les tables de mes sujets ne sont pas aussi garnies qu'à l'accoutumée. Bien que notre parenté n'ait guère besoin de nourriture pour subsister, les festins et le partage de nos mets nous apportent joie et allégresse, et s'en voir privé est bien triste chose.\n\nPourtant, que pouvons-nous faire ? Le monde change, et les années s'étirent, longues et lassantes. Mais nous sommes encore les Premiers-Nés, qui ont enduré bien des choses au cours de bien des Âges."
 elven_hope.0112.a: "Jusqu'au sol qui se retourne contre nous, à présent ?"
 elven_hope.0112.b: "Si mes sujets ne peuvent festoyer, il n'en sera pas autrement pour moi."
 elven_hope.0112.c: "Mes sujets festoieront comme il sied, quel qu'en soit le prix pour moi."
 elven_hope.0112.c.success: "Tous me remercient et font fête"
 elven_hope.0112.c.failure: "Je n'ai pas de quoi nourrir tout le monde"

 elven_hope.0113.t: "Un Spectacle Céleste"
 elven_hope.0113.desc: "Je suis en ma demeure tandis que les ombres du crépuscule s'étendent, quand [happy_courtier.GetName] fait irruption dans ma chambre et me fait signe avec des mots précipités et joyeux. Je n'ai pas le temps d'interroger avant qu'il parte en courant. Je le suis au dehors, hors de mon grand hall, et partout autour de moi des gens lèvent les yeux avec impatience.\n\nJ'aperçois un vol de près d'un millier d'oiseaux, à mon estime, leur nuée dansant et se tordant en d'amples mouvements de va-et-vient. Le vent est doux et frais, le monde silencieux hormis leur chant joyeux, et leurs mille voix montent et s'abaissent. Ainsi je lève les yeux vers un ciel peint de rose, et le soleil décline vers l'Ouest, se teintant d'or et de clarté, tandis que la lune d'argent pointe sa tête à l'est, accompagnée de quelques étoiles encore pâles. Le temps est oublié."
 elven_hope.0113.a: "Voici [Glossary('estel','estel_gloss')]."
 elven_hope.0113.b: "Qu'ils dansent au rythme de notre chant !"
 elven_hope.0113.b.success: "Le vol se joue avec nous pendant des heures"
 elven_hope.0113.b.failure: "Le vol s'effraie et s'envole"
 elven_hope.0113.c: "J'ai du labeur qui m'attend."

 elven_hope.0114.t: "Un Hiver Misérable"
 elven_hope.0114.desc: "Je suis assis sur mon trône tandis que mon dernier pétitionnaire s'en va, et quand on l'escorte hors de la salle je me recroqueville à nouveau, ramenant ma cape sur moi. Mes doigts sont froids comme le cristal, et mes joues semblent de glace. Le grand hall est froid et sombre, et il semble souvent qu'une brise naisse de nulle part pour nous transir.\n\nPourtant le froid n'est pas le pire. Non, c'est la morosité morne et pesante, plus lugubre que nul hiver de bien des années. Le ciel est gris et noir, et de jour comme de nuit les nuages ne laissent paraître ni étoile ni soleil.\n\nChaque fois que je mets le pied dehors, la tristesse me saisit, car les ombres sont longues et grises, et la chaleur du soleil et le scintillement des étoiles semblent de lointains souvenirs. Il fait sombre, et froid, et peut-être pire encore : sec. Point de neige qui tombe, point de pluie glacée. Le vent est sec et froid, et le ciel obscur."
 elven_hope.0114.a: "Le printemps semble une éternité à venir."
 elven_hope.0114.b: "Je rappellerai à mon peuple la chaleur de l'été."
 elven_hope.0114.b.success: "Vos paroles sont convaincantes"
 elven_hope.0114.b.failure: "Vous ne parvenez à convaincre personne"

 elven_hope.0115.t: "Un Été Étouffant"
 elven_hope.0115.desc: "Il fait chaud. Assis sur mon trône à écouter mes sujets, marchant au dehors, mangeant : il me semble que je suis en permanence en sueur. Chose étrange, cependant, l'air est aussi sec et sans vent. Nulle brise apaisante et fraîche qui donne l'impression de plonger dans un lac limpide, et point de pluie purificatrice. Il n'y a pas eu un nuage dans le ciel depuis des semaines.\n\nLes buissons se sont desséchés, l'herbe a pris la couleur du sable, et les feuilles abandonnent les arbres en révélant leurs branches nues. Des ruisseaux autrefois chantants se sont tus, laissant des lits asséchés jusqu'à l'os, tout comme des lacs autrefois profonds et grouillants de vie. Pire que tout peut-être, les oiseaux et les insectes se sont eux aussi tus. Ils sont partis en quête de refuge, d'ombre et d'eau, et il ne demeure plus qu'un silence immobile et étouffant."
 elven_hope.0115.a: "Combien de temps avant que la pluie nous soit accordée ?"
 elven_hope.0115.b: "Allons, cette saison sera passée en un clin d'œil !"
 elven_hope.0115.b.success: "Vos paroles sont convaincantes"
 elven_hope.0115.b.failure: "Vous ne parvenez à convaincre personne"

 elven_hope.0116.t: "Un Coin de Terre Oublié"
 elven_hope.0116.desc: "Tandis que je déambule dans mon domaine, j'emprunte des sentiers et des allées que je n'ai point fréquentés depuis longtemps. Je tourne et me retrouve en un lieu retiré et silencieux, qui, bien que proche de mon hall, ne m'est d'aucun souvenir. J'entends le faible murmure d'un ruisseau.\n\nPourtant mon attention est attirée par un pan de terre nue, sèche, oubliée et silencieuse, et je sens dans mon cœur une profonde pitié et une tristesse. J'observe, et dans mon esprit s'élève une vision ; j'entends le chant des oiseaux au printemps. Ce que cette terre nue pourrait être ! Quelles plantes et quelles fleurs odorantes pourraient y éclore, et quels arbrisseaux pourraient offrir ombre et refuge aux créatures rampantes de la terre, avec seulement quelques soins et un peu d'effort."
 elven_hope.0116.a: "Quelle sotte fantaisie."
 elven_hope.0116.b: "Au printemps, le parfum des fleurs douces s'élèvera ici."

 elven_hope.0117.t: "Un Jardin Florissant"
 elven_hope.0117.desc: "C'est un matin frais et beau, et la rosée pend encore aux feuilles. Je déambule sur quelques sentiers sinueux derrière mon hall, quand j'entends un gazouillis doux, mélodieux et croissant. Je le suis jusqu'à sa source, et j'aperçois devant moi mon jardin, celui-là même que j'avais planté il y a peu.\n\nDevant moi s'offre un tableau plus beau que tout ce que j'aurais pu espérer. Sur une branche basse d'un petit arbre, je distingue l'auteur de cette belle mélodie : un rouge-gorge à la poitrine d'un orange éclatant. Mais ce n'est pas tout. Dans les buissons sautillent de petits pinsons et des mésanges, et des papillons peints de bleu et de rouge volettent de fleur en fleur.\n\nJ'entends le coassement grave de quelques grenouilles, et les aperçois un instant bondir depuis leur ruisseau, vertes comme l'herbe de printemps. Dans l'herbe en contrebas glisse doucement une couleuvre partie pour quelque grande et épique chasse, et des sauterelles aux reflets écarlates stridulement depuis les hautes herbes majestueuses. Je ne puis m'empêcher de sourire, et contempler ce seul jardin me fait sentir l'espoir des Âges."
 elven_hope.0117.a: "Mon cœur s'apaise dans la joie."

 elven_hope.0118.t: "Un Jardin qui Dépérit"
 elven_hope.0118.desc: "Je longe de vieux sentiers qui serpentent derrière mon hall, pour aller visiter le jardin que j'avais planté en ce temps-là. Il s'était écoulé un certain temps depuis ma dernière visite, aussi avais-je décidé, en ce beau et doux matin, de lui rendre visite.\n\nMais lorsque je tourne le coin et l'aperçois, la consternation envahit mon cœur. Je n'entends plus le babillage du ruisseau, et toutes les plantes et tous les arbres que j'avais plantés à l'époque s'affaissent, certains ayant viré presque entièrement au brun. Des feuilles mortes jonchent le sol.\n\nIl n'est plus de chant des oiseaux, ni de stridulation des grillons et des sauterelles. Seulement le silence. Une profonde tristesse succède à la consternation."
 elven_hope.0118.a: "Quelle peine..."
 elven_hope.0118.b: "J'y ramènerai la vie !"
 elven_hope.0118.b.success: "Vous parvenez à restaurer le jardin"
 elven_hope.0118.b.failure: "Vos efforts pour restaurer le jardin échouent"

 elven_hope.0119.t: "Un Arbre en Flammes"
 elven_hope.0119.desc: "Je suis tiré du sommeil en pleine nuit par le fracas du tonnerre. Mes gardes sont visiblement saisis. J'attends un instant, avant de voir une lueur au dehors, suivie presque aussitôt du tonnerre. Cela ne pouvait signifier qu'une chose. Je me dirige hors du hall pour apprécier la situation.\n\nDes nuées d'orage roulent au-dessus, mais il ne pleut pas. Des éclairs zèbrent l'horizon, comme de minces doigts. Un pressentiment funeste m'étreint le cœur. Après chaque éclair, le ciel retentit et frémit, et des nuages noirs tourbillonnent en hauteur. Il ne faut guère longtemps pour que mon pressentiment se réalise.\n\nLe ciel est déchiré par une fissure blanche, qui s'achève en flamme. Elle disparaît aussitôt, mais la flamme, elle, demeure. Un grand et ancien arbre, aimé de notre peuple, est secoué, et le feu a pris dans sa cime. Ses branches tremblent, et des étincelles en tombent. S'il est à sauver, il nous faut agir sans tarder, bien que ce soit une entreprise incontestablement périlleuse."
 elven_hope.0119.a: "Nous ne pouvons prendre ce risque."
 elven_hope.0119.b: "Cet arbre est là depuis longtemps, et longtemps encore il pourra se dresser !"
 elven_hope.0119.b.success: "Vous éteignez le feu et sauvez l'arbre"
 elven_hope.0119.b.failure: "Vous ne pouvez sauver l'arbre"

 elven_hope.0120.t: "Le Paradis Perdu"
 elven_hope.0120.desc: "Il fait nuit quand je me lève, et j'entends le crépitement des flammes, qui devient assourdissant le temps que j'atteigne ma porte. En ouvrant les portes à la volée, je me retrouve face à un mur de flammes orangées, depuis lequel s'avance une silhouette noire comme le vide, irradiant malice et haine, parlant dans une langue vile et me faisant signe.\n\nJe soulève ma lame et la plante dans la silhouette sombre. Il s'ensuit un cri perçant avant qu'elle ne s'efface dans le néant, et tout retombe dans le silence. Devant moi s'étend [elven_capital.GetNameNoTier], mais tandis que j'avance, nulle trace de quiconque. Ni dans une maison, ni dans une rue, ni dans une tour de guet. Tout est silencieux. Un rugissement maléfique retentit derrière moi, et avant que je puisse réagir une lame me transperce le cœur.\n\nLe voile gris du monde se déroule, mais lorsque j'ouvre les yeux je vois autour de moi une contrée verte et belle, et des rivages blancs. Sur une colline d'émeraude se dresse une cité puissante de nacre, de marbre et de cristal étincelants. Les cors de Tirion sonnent, et leur son est aussi beau qu'une fontaine étincelant dans la lumière de l'aube printanière. Mais lorsque je me lève, je suis arraché à mon rêve, et c'est le matin en Terre du Milieu."
 elven_hope.0120.a: "Que Tirion soit béni, que l'Aman est belle !"
 elven_hope.0120.b: "Non ! La Terre du Milieu est ma demeure, dans la tristesse et l'espoir."
 elven_hope.0120.b.success: "Vos paroles sont convaincantes"
 elven_hope.0120.b.failure: "Vous ne parvenez à convaincre personne"
 
 elven_hope.0121.t: "Un Spectacle Vaillant"
 elven_hope.0121.desc: "Tandis que je déambule dans les marchés de [my_capital_county.GetNameNoTier], je tombe sur quelques-unes des sentinelles qui s'entraînent. Je m'arrête et les observe un moment, stupéfait par leur maîtrise et leur habileté au combat.\n\nParmi elles, [mighty_courtier.GetName] se distingue plus que tout autre, maniant la lame et le bouclier en une flurée de mouvements qu'il faut un regard d'elfe pour suivre. Si telle est la puissance des [elves|E] en leurs jours déclinants, quelle ne devait pas être celle des seigneurs des Eldar au [Concept('yearofthetreesage', 'Midi de Valinor')|E] ?\n\nJe trouve quelque réconfort en ce que, même en ces temps tardifs, de si vaillants combattants se trouvent encore parmi nous."
 elven_hope.0121.a: "Quel réconfort de voir pareille maîtrise déployée ainsi."
 
 elven_hope.0122.t: "Un Chant Inspirant"
 elven_hope.0122.desc: "Dans les jardins bien entretenus de [my_capital_county.GetNameNoTier], un chant s'élève. La curiosité m'attire, et lorsque j'arrive sur les lieux, j'aperçois quelques [elves|E] qui interprètent l'un des chants des Années des Arbres, quand les étoiles brillaient encore sans partage dans la nuit perpétuelle et douce.\n\n[musical_courtier.GetName] saisit le luth et commence à jouer tandis que le chant se poursuit. Je me retrouve immobile, sans qu'aucune pensée vienne troubler mon écoute. Quand le chant s'achève, je sens mon cœur allégé, et découvre que mes peines se sont, pour un temps, allégées."
 elven_hope.0122.a: "Nous devrions plus souvent chanter de tels chants."
 
 elven_hope.0123.t: "Des Impressions en Peinture"
 elven_hope.0123.desc: "Tandis que je quitte ma cour et me dirige vers mes appartements privés, [painting_courtier.GetName] me fait signe, tenant une peinture fraîchement achevée. «C'est mon présent pour vous», dit [painting_courtier.Custom('FR_IlElle')], en retournant la toile pour me montrer ce qui y est représenté.\n\nJe contemple une contrée verdoyante, nichée entre des falaises à l'escarpe abrupte de part et d'autre, et un soleil levant à l'horizon. «Un ouvrage magistral», dis-je tandis que son auteur me tend la peinture. «Je vous remercie de ce présent.»\n\nMon cœur s'allège tandis que je cherche un endroit sur les murs pour accrocher la peinture. Ce sont de petites choses comme celle-ci qui méritent que l'on se batte en un monde qui se fait froid."
 elven_hope.0123.a: "Je la chérirai."