 dwarven.0101.t: "Une Vie, Un Compagnon"
 dwarven.0101.desc.intro: "Mon épouse, [dead_character.GetTitledFirstName], a trépassé, laissant derrière elle une vie que nous avions bâtie ensemble. Les halls semblent plus froids maintenant, et pourtant la vie continue.\n\nParmi notre peuple, le mariage est rare et ne se prend pas à la légère. La plupart des [dwarves|E] traversent l'existence seuls, mais ceux qui trouvent un compagnon sont liés à vie. "
 dwarven.0101.desc.no.dwarven.remarriage: "Un tel lien n'est pas seulement d'amour, mais d'honneur et de permanence,  un Nain ne se marie qu'une fois, et nulle tradition ne permet une seconde union, même après la mort.\n\nBien que le chagrin puisse peser lourdement, je dois maintenant marcher seul. Chercher un autre serait aller contre les voies de notre peuple, et je sais bien qu'aucun Nain ne l'a jamais fait en conservant son honneur."
 dwarven.0101.desc.dwarven.remarriage.allowed: "De tels liens ne se mettent pas facilement de côté,  même dans la mort. La tradition veut qu'un Nain ne se remarie point, et ceux qui le font sont souvent vus avec une désapprobation silencieuse.\n\nPourtant, nulle loi ne l'interdit. Je dois décider s'il faut honorer la tradition et demeurer seul, ou chercher un autre compagnon, sachant que ce ne sera pas sans jugement."
 dwarven.0101.a: "Nul ne prendra la place de [dead_character.GetTitledFirstName], dans la vie ou dans la mémoire."
 dwarven.0101.b: "Que Mahal me pardonne, mais j'aspire de nouveau à la chaleur."

 dwarven_racial.1001.t: "Une Bonne Taille"
 dwarven_racial.1001.desc: "Je ferme la porte de mes appartements et tire le verrou. Ce genre de chose exige concentration et ne doit point être dérangé. Quelques moments de préparation suivent, m'assurant que les chandelles brûleront longtemps et régulièrement, ajustant le miroir et positionnant soigneusement le tabouret. Bientôt, je suis prêt à commencer.\n\nLe rituel débute par une évaluation minutieuse de l'état actuel de ma barbe. Elle pourrait certainement être pire, tout bien considéré. Un peu inégale, avec quelques poils égarés çà et là, mais rien d'irréparable. Je me mets au travail avec grand soin et discipline.\n\nChaque coup méticuleux de la lame est ponctué par une nouvelle application d'eau tiède, adoucissant le poil et assurant la précision. Le processus prend du temps, mais de telles tâches ne sont jamais destinées à être précipitées. Graduellement, la symétrie revient et les mèches rebelles s'alignent.\n\nEnfin, je me penche en arrière et étudie mon reflet. Dans l'ensemble, bien mieux. La barbe a maintenant une forme raffinée, sa dignité rehaussée. Je fais bien meilleure figure, et le processus fut relaxant, par-dessus le marché." 
 dwarven_racial.1001.a: "Je devrais faire cela plus souvent."

 dwarven_racial.1002.t: "Une Taille Fantastique"
 dwarven_racial.1002.desc: "Je verrouille la porte et prépare mes appartements pour la tâche qui m'attend. Je choisis le coussin le plus confortable pour mon tabouret de rasage, ajuste le miroir pour que la lumière de la lampe n'éblouisse pas mes yeux, et allume une chandelle parfumée pour faire bonne mesure.\n\nLa silhouette dans le miroir a connu de meilleurs jours, et je note le piteux état de ma barbe. Poils détachés en abondance et zones inégales partout. Je me mets au travail et m'installe bientôt dans un rythme régulier, alternant entre coups de rasoir et application d'eau apaisante et de sel gemme sur mon visage. Bientôt, je me perds dans la routine, et les fardeaux du jour se soulèvent de mes épaules.\n\nQuelque temps passe, mais finalement je pose mon rasoir pour examiner mon œuvre. Elle est majestueuse. Ma barbe pend maintenant fièrement, soignée à la perfection. Je parais des années plus jeune, sans en être moins sage pour autant. Je me sens plein d'énergie, prêt à affronter toute épreuve."
 dwarven_racial.1002.a: "J'ai l'air... royal."

 dwarven_racial.1003.t: "Une Bonne Taille ?"
 dwarven_racial.1003.desc: "Tandis que je ferme la porte de ma chambre, un sentiment familier de réconfort s'installe sur moi. Je m'assieds sur le tabouret près du miroir et porte mes yeux sur la silhouette qui me regarde. Mon regard est attiré vers l'impressionnante barbe sur mon menton. Quelques poils excessifs sortent cependant de mon nez, et elle semble un peu plus longue du côté gauche, vers l'oreille...\n\nJe prends délicatement mon rasoir et commence à tailler - quelques touffes ici, quelques mèches égarées là, juste un peu plus... maintenant m'occuper de ce bout là... quelques poils de trop, mais je vais juste égaliser...\n\nMes pensées s'estompent et mes yeux s'écarquillent. Je ne peux réparer ce que je viens de faire. J'ai coupé trop près de la peau, et maintenant toute une touffe de poils s'en va dans ma main. Je regarde le miroir et manque de crier d'horreur.\n\nLa seule façon de réparer le désastre que je me suis infligé serait de tout raser #italic entièrement#! ."
 dwarven_racial.1003.a: "Je ne peux faire cela ! Je ne pourrais jamais faire cela !"

 ### Balin events ###
 dwarven.0205.t: "Contemplant Kheled-zâram"
 dwarven.0205.desc.1: "Après avoir quitté les Grandes Portes, mes compagnons et moi descendons la vallée vers le lac long et tranquille. [Glossary('Kheled-zâram','kheled_zaram_gloss')], dans lequel [durin|E] contempla jadis, se dresse silencieux et immobile. Longuement nous le contemplons, méditant sur le sort de notre colonie et ce que devrait être notre prochaine action. Vois-je un soupçon des étoiles anciennes, serties dans une couronne puissante ? Un signe, ou peut-être un produit de mon esprit fatigué ?\n\nPourtant soudain la tranquillité est brisée par un bruit terrible. Nous nous levons de notre contemplation, et nous retournant, une terreur glaciale emplit nos veines. Remontant la vallée depuis le sud-est se trouve une bande d'[orcs|E], arcs et épées en main. J'aboie hâtivement des ordres de retraite dans les Portes. Pourtant bien que les [Dwarves|E] puissent être des sprinteurs, nous sommes rapidement assaillis ! Bien que nous levions nos haches et que notre armure arrête mainte flèche, ils sont simplement trop nombreux. Dans le chaos nous sommes séparés, et j'ignore qui vit et qui meurt. Puisse [mahalcharacter|E] avoir pitié de nous tous."
 dwarven.0205.desc.2: "Je vais seul, un [dwarf|E] âgé voûté par le stress et les soucis. Si ma barbe n'était déjà blanche, elle le serait assurément maintenant ! Jadis tout cela avait montré tant de promesses.\n\nDescendant la vallée, j'arrive enfin à Kheled-zâram, dans lequel [durin|E] contempla jadis, silencieux et immobile.\n\nContemplant ses profondeurs claires et froides, mon esprit se tourne, désespéré d'une solution. Vois-je un soupçon des étoiles anciennes, serties dans une couronne puissante ? Un signe, ou peut-être un produit de mon esprit fatigué ?\n\nPourtant soudain la tranquillité est brisée par un bruit terrible. Me levant, je vois depuis le sud-est une bande d'[orcs|E], remontant la vallée en courant ! Arcs et flèches sont dans leurs mains, et des wargs parmi leurs rangs. La glace emplit mes veines tandis que je me dirige vers les Grandes Portes. Pourtant bien que mon armure prenne maintes flèches, finalement une trouve une faille. Je tombe à genoux, à quelques pieds seulement de la Porte, mes loyaux compagnons se précipitant pour affronter l'ennemi.\n\nJe me sens défaillir. Puisse [mahalcharacter|E] avoir pitié de nous tous. Pardonne la folie d'un fils égaré."
 dwarven.0205.a: "Dáin... tu avais raison..."
 dwarven.0205.b: "Gah !"

 dwarven.0210.t: "La Bataille de Mazarbul"
 dwarven.0210.desc: "Bien que je vive, ce n'est pas sans blessure ni coût. Maints guerriers et amis qui me faisaient confiance gisent massacrés, aux Portes et dans les halls. Pourtant de plus mauvaises nouvelles sont à venir. La bande d'[orc|E] que nous avons vaincue, disent les éclaireurs, n'était que l'avant-garde d'une grande armée d'[orcs|E]. \n\nNous les avions cru défaits, mais il semble qu'ils ne faisaient qu'attendre leur heure. Je suis empli à la fois de terreur, de doute et d'auto-contrition pour ma folie ! Pourtant je ne le laisse pas paraître, car qui dirigera sinon moi ? Je suis le Seigneur de la [moria|E], et si aujourd'hui doit être mon jour de mort, alors je mourrai en tant que tel.\n\nLe visage sombre, mes loyaux partisans se mettent au travail, se préparant au pire."
 dwarven.0210.a: "Tambours. Tambours dans les profondeurs. Ils viennent."
 
 ## Introduction ###
 dwarven.1000.t: "Les Enfants de Mahal"
 dwarven.1000.desc: "Je suis né parmi les enfants de [mahalcharacter|E], enfants adoptifs d'[eru|E], les inébranlables [dwarves|E]. Notre père nous façonna en des temps sombres, et de ce fait, nous sommes plus robustes que les [conceptracemen|E] et plus résistants aux maladies et à la corruption.\n\nNous avons la vie longue et l'épanouissement tardif : nous considérons nos jeunes comme n'étant que des enfants jusqu'à l'âge de leur [majority|El] à 40 ans, et qu'il est inapproprié de se marier avant l'âge de 70 ans. Peu parmi nous se marient, et ceux qui le font, une seule fois. Les Nains des deux sexes portent barbe depuis la naissance, et un Nain sans barbe est objet de grande honte et moquerie.\n\nLe [khuzdul|E], notre langue sacrée conçue par le [Concept('mahalcharacter', 'Créateur')|E] lui-même, n'est jamais parlé devant des non-Nains et réservé au savoir ancien et aux assemblées solennelles. Dans la vie quotidienne nous adoptons la langue de nos plus proches voisins et partenaires commerciaux.\n\nBien que nous ne craignions pas le soleil comme les [orcs|E], nous sommes plus à l'aise sous terre, où nous taillons des halls dans la roche vivante. Maints de nos foyers ancestraux ont été détruits, et il est maintenant temps de les reconquérir !"
 dwarven.1000.a: "[Glossary('Baruk Khazâd !','baruk_khazad_gloss')] [Glossary('Khazâd ai-mênu !','khazad_ai_menu_gloss')]"

 ### Invite Dwarves to the White Mountains events ###
 dwarven.2000.t: "Les Rois des Royaumes Nains"
 dwarven.2000.desc: "Ma décision d'inviter des [dwarves|E] à s'établir dans les montagnes à mes frontières étant prise, je dois choisir auquel de leurs rois je vais soumettre mon offre.\n\nLes Nains ont coutume de se tenir entre eux et de demeurer dans leurs halls de pierre, mais même parmi les leurs, il en est peut-être qui souhaitent relever ce défi et s'élever jusqu'à devenir Seigneurs de ce nouveau royaume nain en leur propre nom.\n\nWhile je pèse mes options, quelques candidats viennent à l'esprit..."
 dwarven.2000.a: "J'écrirai à [ereborking.GetName]."
 dwarven.2000.a.tt: "[ereborking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.b: "C'est à [ironhillsking.GetName] que j'adresserai mon offre."
 dwarven.2000.b.tt: "[ironhillsking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.c: "[moriaking.GetName] doit être mon choix."
 dwarven.2000.c.tt: "[moriaking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.d: "Je prendrai contact avec [belegostking.GetName]."
 dwarven.2000.d.tt: "[belegostking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.e: "Envoyons une missive à [buzradumking.GetName]."
 dwarven.2000.e.tt: "[buzradumking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.f: "[barazimabulking.GetName] est le meilleur candidat."
 dwarven.2000.f.tt: "[barazimabulking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.g: "Je coucherai une lettre à l'intention de [blackflameking.GetName]."
 dwarven.2000.g.tt: "[blackflameking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.h: "Faisons parvenir un message à [greymountainsking.GetName]."
 dwarven.2000.h.tt: "[greymountainsking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.i: "J'écrirai à la cour de [gundabadking.GetName]."
 dwarven.2000.i.tt: "[gundabadking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.j: "Bien des royaumes nains ont chuté. Peut-être [whitemountainsking] peut-il les restaurer ?"
 dwarven.2000.j.tt: "L'errant [whitemountainsking] sera votre candidat parrainé"
 dwarven.2000.k: "J'ai entendu parler de [uldonaking.GetName], de ce Rhûn si lointain, prenons contact avec lui."
 dwarven.2000.k.tt: "[uldonaking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.l: "Je me tournerai vers [mabladdumking]."
 dwarven.2000.l.tt: "[mabladdumking.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.m: "Voyons ce que [longbeard_king.GetName] peut offrir."
 dwarven.2000.m.tt: "[longbeard_king.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.n: "Je choisis de contacter [broadbeam_king.GetName]."
 dwarven.2000.n.tt: "[broadbeam_king.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.o: "Que dire de [firebeard_king.GetName] ?"
 dwarven.2000.o.tt: "[firebeard_king.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.p: "Mon choix se portera sur [ironfist_king.GetName]."
 dwarven.2000.p.tt: "[ironfist_king.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.q: "Ce ne peut être que [blacklock_king.GetName]."
 dwarven.2000.q.tt: "[blacklock_king.GetName] devra désigner un candidat que vous pourrez parrainer"
 dwarven.2000.r: "Mon choix se porte sur [nogrodking.GetName]."
 dwarven.2000.r.tt: "[nogrodking.GetName] devra désigner un candidat que vous pourrez parrainer"
 
 dwarven.2001.t: "Une Invitation de [mountains_inviter.GetName]"
 dwarven.2001.desc.gundabad: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains demeurant à proximité de la montagne sacrée de [gundabad|E], s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] sous ces mêmes cimes !\n\nGundabad fut l'endroit où [durindeathless|E] s'éveilla, quand le monde était jeune et verdoyant, mais elle est depuis des millénaires un repaire grouillant d'[orcs|E]. Serait-il enfin temps que cela change ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.carndum: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des plaines d'[angmar|E], s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] sous les cimes qui s'élèvent au nord de ce pays !\n\nHormis les tout premiers jours du Troisième Âge, jamais les Nains n'ont demeuré sous ces sommets. Quelles richesses pourraient y être enfouies ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.mountgram: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des plaines d'[angmar|E], s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] au pic solitaire du Mont Gram !\n\nCe lieu fut longtemps infesté d'[orcs|E] et de [goblins|E] abjects qui menaient des raids en [eriador|E] à maintes reprises. Si des Nains venaient à s'en emparer, bien des bienfaits pourraient en découler.\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.greydelve: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains du Val d'Anduin septentrional, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [greymountains|E] occidentales !\n\nLes [longbeards|E] avaient demeuré dans ces montagnes de longues années avant d'en être chassés par le feu d'un [dragon|El]. L'heure serait-elle enfin venue de revenir ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.greymountains: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains demeurant au nord de la [mirkwood|E], s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [greymountains|E] orientales !\n\nLes [longbeards|E] avaient demeuré dans ces montagnes de longues années avant d'en être chassés par le feu d'un [dragon|lE]. L'heure serait-elle enfin venue de revenir ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.erebor: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains vivant à proximité du Long Lac, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] à la [lonelymountain|E] !\n\nCette montagne fut jadis le fier foyer des [longbeards|E], le peuple de Durin, jusqu'à ce que le malheur frappe et les chasse de leur demeure. L'heure est-elle venue de la reconquérir pour les Nains ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.ironhills: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains vivant dans les contreforts des [ironhills|E], s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans cette même région !\n\nLes Collines de Fer ont abrité des établissements nains depuis des millénaires, dès le mythique Premier Âge, et il semble qu'une présence naine y soit à jamais inséparable de la roche.\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.uldonaspine: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des plaines du Rhovanion, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans l'Épine d'Uldona !\n\nJadis riche forteresse des [ironfists|E], elle fut mise à sac par un Drac de feu et est devenue un nid souillé de [goblins|E]. Il semble que cela soit sur le point de changer...\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.moria: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains du [anduinvale|E] méridional, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] en [khazaddum|E] lui-même !!\n\nLes [longbeards|E] avaient demeuré dans ces montagnes pendant des millénaires avant d'en être chassés par la fureur du Fléau de Durin. L'heure serait-elle enfin venue de revenir ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.goblintown: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains du Val d'Anduin central, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les montagnes à proximité du Haut Col !\n\nLa Ville des Gobelins voisine a toujours tourmenté les voyageurs cherchant à traverser les [mistymountains|E]. N'est-il pas temps pour les Nains de mettre un terme définitif à la présence des [goblins|E] dans ces contrées ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.belegost: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des plaines de la Lune, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [bluemountains|E] septentrionales !\n\nTerre ancestrale des [broadbeams|E], cette chaîne de montagnes a vu la présence naine croître et décroître au fil des âges qui passent. N'est-il pas temps pour nos semblables de s'y relever une fois encore ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.nogrod: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains au sud des Collines des Tours, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [bluemountains|E] méridionales !\n\nTerre ancestrale des [firebeards|E], cette chaîne de montagnes a vu la présence naine croître et décroître au fil des âges qui passent. N'est-il pas temps pour nos semblables de s'y relever une fois encore ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.glitteringcaves: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des plaines du [rohan|E], s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [whitemountains|E] septentrionales !\n\nOr, jamais les Nains n'ont demeuré sous ces sommets. Qui saurait dire quelles richesses insoupçonnées pourraient être découvertes dans les Montagnes Blanches ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.whitemountains: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des plaines du [gondor|E], s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [whitemountains|E] méridionales !\n\nOr, jamais les Nains n'ont demeuré sous ces sommets. Qui saurait dire quelles richesses insoupçonnées pourraient être découvertes dans les Montagnes Blanches ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.barazimabul: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des jungles de Zajantak, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] au cœur des [yellowmountains|E] centrales !\n\nJadis colonisées par les [blacklocks|E] fuyant l'est, ces montagnes demeurent en grande partie indomptées. Qui sait quelles richesses dorment encore sous leurs cimes ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.easternyellows: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des jungles d'Ûsakan, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [yellowmountains|E] orientales !\n\nJadis colonisées par les [blacklocks|E] fuyant l'est, ces montagnes demeurent en grande partie indomptées. Qui sait quelles richesses dorment encore sous leurs cimes ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.southernyellows: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des plaines de Tumag, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [yellowmountains|E] méridionales !\n\nJadis colonisées par les [blacklocks|E] fuyant l'est, ces montagnes demeurent en grande partie indomptées. Qui sait quelles richesses dorment encore sous leurs cimes ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.blackflame: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des contreforts de la pointe sud-ouest des [yellowmountains|E], s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] aux confins mêmes de [thanihazad|E] !\n\nJadis colonisées par les [blacklocks|E] fuyant l'est, ces montagnes demeurent en grande partie indomptées. Qui sait quelles richesses dorment encore sous leurs cimes ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.md_west: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des confins de l'Extrême-Sud, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [yellowmountains|E] centrales !\n\nJadis colonisées par les [blacklocks|E] fuyant l'est, ces montagnes demeurent en grande partie indomptées. Qui sait quelles richesses dorment encore sous leurs cimes ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.md_central: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des confins de l'Extrême-Sud, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans l'ancienne capitale des [yellowmountains|E], Mablad-dûm !\n\nCette fière forteresse des [blacklocks|E] est tombée depuis longtemps. Serait-ce l'heure pour les Nains de revenir en triomphe ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.desc.md_east: "Un messager se présente à ma cour, porteur d'un message pour le moins inhabituel. [mountains_inviter.GetName], l'un des souverains des confins de l'Extrême-Sud, s'est proposé de parrainer l'établissement d'une colonie [dwarven|E] dans les [yellowmountains|E] les plus orientales !\n\nJadis colonisées par les [blacklocks|E] fuyant l'est, ces montagnes demeurent en grande partie indomptées. Qui sait quelles richesses dorment encore sous leurs cimes ?\n\nJe dois désigner un candidat digne de répondre à l'invitation de [mountains_inviter.GetFirstName], afin que le nouveau bastion nain soit en bonnes mains une fois achevé !"
 dwarven.2001.a: "Mon champion, [candidate1.GetName], est à la hauteur de cette tâche !"
 dwarven.2001.a.tt: "[candidate1.GetName] voyagera vers ces montagnes inhospitalières pour y établir une nouvelle colonie"
 dwarven.2001.b: "Je vous confie cette charge, [candidate2.GetFirstName]."
 dwarven.2001.b.tt: "[candidate2.GetFirstName] voyagera vers ces cimes inhospitalières pour y établir une nouvelle colonie"
 dwarven.2001.c: "Je crois [candidate3.GetName] le mieux taillé pour cette mission."
 dwarven.2001.c.tt: "[candidate3.GetName] voyagera vers ces cimes inhospitalières pour y établir une nouvelle colonie"
 dwarven.2001.d: "C'est une tâche pour [gimli.GetFirstName], fils de Glóin !"
 dwarven.2001.d.tt: "[gimli.GetName] voyagera vers ces cimes inhospitalières pour y établir une nouvelle colonie"
 dwarven.2001.e: "C'est une tâche pour [gamil.GetFirstName], disciple de Gimli !"
 dwarven.2001.e.tt: "[gamil.GetName] voyagera vers ces cimes inhospitalières pour y établir une nouvelle colonie"
 
 dwarven.2002.t: "Des Colons Nains Arrivent"
 dwarven.2002.desc: "En réponse à mon invitation récente à s'établir dans les montagnes proches de mon [realm|El], [mountainssettler.GetName] est arrivé à ma cour avec une petite troupe de [dwarves|E] intrépides.\n\nIls sollicitent mon soutien pour financer le nouveau bastion nain qu'ils entendent établir à [target_county.GetNameNoTier]. Si je les aide en cela, ils pourront développer leur nouveau royaume bien plus rapidement et y prospérer davantage..."
 dwarven.2002.a: "Je leur accorderai une somme fastueuse."
 dwarven.2002.a.tt: "La nouvelle colonie disposera de deux bâtiments supplémentaires hautement développés"
 dwarven.2002.b: "Finançons-les avec une somme convenable."
 dwarven.2002.b.tt: "La nouvelle colonie disposera de deux bâtiments supplémentaires"
 dwarven.2002.c: "Ils recevront une part de mon or en excédent."
 dwarven.2002.c.tt: "La nouvelle colonie disposera d'un bâtiment supplémentaire"
 dwarven.2002.d: "Des fonds ? Les autoriser à s'établir ici devrait suffire !"
 dwarven.2002.d.tt: "La nouvelle colonie ne disposera d'aucun bâtiment supplémentaire"
 
 dwarven.2004.t: "Les Montagnes Sont Colonisées"
 dwarven.2004.desc: "Une nouvelle réjouissante me parvient de la colonie [dwarven|E] dans les montagnes que j'ai parrainée. La construction est achevée, et le nouveau bastion nain de [target_county.GetNameNoTier] est désormais accompli !\n\nLe nouveau souverain nain, [mountainssettler.GetName], a pris seigneurie du nouveau domaine, et les Nains ont diligemment commencé à exploiter les mines de leur nouveau territoire. Que [ROOT.Char.GetFaith.HighGodName] leur accorde prompte réussite dans leurs entreprises !"
 dwarven.2004.a: "Bonne chance à nos nouveaux voisins !"
 dwarven.2004.a.tt: "[mountainssettler.GetName] devient votre [protectorate|El]"
 dwarven.2004.b: "Espérons qu'ils ne nous tiennent pas rigueur d'avoir refusé des fonds..."
 dwarven.2004.c: "Je me demande bien ce que [mountainssettler.GetFirstName] fera ensuite..."

 dwarven.2005.t: "Un Établissement Couronné de Succès"
 dwarven.2005.desc: "Une nouvelle réjouissante me parvient de la colonie [dwarven|E] récemment mise sur pied par [mountains_inviter.GetName]. La construction est achevée, et le nouveau bastion nain de [target_county.GetNameNoTier] est désormais accompli !\n\nLe nouveau souverain nain, [mountainssettler.GetName], a pris seigneurie du nouveau domaine, et les Nains ont diligemment commencé à exploiter les mines de leur nouveau territoire. Que [ROOT.Char.GetFaith.HighGodName] leur accorde prompte réussite dans leurs entreprises !"
 dwarven.2005.a: "Nous leur souhaitons bonne chance et la bénédiction de Mahal."
 dwarven.2005.b: "[mountainssettler.GetFirstName] me doit son allégeance !"
 dwarven.2005.c: "Je me demande bien ce que [mountainssettler.GetFirstName] fera ensuite..."

 ### Dwarven Reincarnation Events
 dwarven.5002.t: "Ressemblance avec [my_dorfdad.GetFirstNameNoTooltip]"
 dwarven.5002.desc: "Plus je grandis, plus je semble émuler [my_dorfdad.GetFirstName] tel qu'il est décrit dans les récits des [dwarves|E]. Tant en personnalité qu'en apparence, je semble avoir hérité de son caractère."
 dwarven.5002.durin: "Je rêve d'un Lac Sombre..."
 dwarven.5002.durin.tt: "Reflétant sept étoiles, serties comme une couronne."
 dwarven.5002.uri: "Je rêve de Feu..."
 dwarven.5002.uri.tt: "Brûlant dans une forge, chaud et furieux."
 dwarven.5002.dwalin: "Je rêve de Connaissance..."
 dwarven.5002.dwalin.tt: "Gardée en sécurité dans une voûte sous la terre."
 dwarven.5002.thrar: "Je rêve d'une Montagne..."
 dwarven.5002.thrar.tt: "À jamais inflexible, ferme et fière."
 dwarven.5002.sindri: "Je rêve d'Or..."
 dwarven.5002.sindri.tt: "Montagnes de richesses, toutes pour moi."
 dwarven.5002.thulin: "Je rêve d'un Dragon..."
 dwarven.5002.thulin.tt: "Son crâne monté au sommet d'un mur."
 dwarven.5002.bavor: "Je rêve de Sept Joyaux..."
 dwarven.5002.bavor.tt: "Ornant un collier magnifiquement ouvragé."
 dwarven.5002.fallback: "Je rêve d'un Marteau..."
 dwarven.5002.fallback.tt: "Levé haut par un artisan aux yeux tristes."
 
 dwarven.5003.t: "Témoignage de son Père-des-Nains"
 dwarven.5003.desc: "Le jeune [new_dorfdad.GetFirstName] semble suivre les traces du [dwarffather|E] et de son clan, [my_dorfdad.GetFirstNameNicknamed] ! Il devient un jeune [dwarf|E] prometteur.\n\nQue ce soit par nature ou éducation, la force du Peuple de [my_dorfdad.GetFirstNameNoTooltip] brille avec éclat en celui-ci."
 dwarven.5003.desc_mother: "La jeune [new_dorfdad.GetFirstName] semble suivre les traces de la [dwarfmother|E] et de son clan, [my_dorfdad.GetFirstNameNicknamed] ! Elle devient une jeune [dwarf|E] prometteuse.\n\nQue ce soit par nature ou éducation, la force du Peuple de [my_dorfdad.GetFirstNameNoTooltip] brille avec éclat en celui-ci."
 dwarven.5003.a: "Intéressant..."
 dwarven.5003.tt: "[new_dorfdad.GetFirstNameNoTooltip] gagne l'un des [personality_traits|El] de son ancêtre"
 
 dwarven.5100.t: "Rêves de [my_dorfdad.GetFirstNameNoTooltip]"
 dwarven.5100.desc: "Cela commença par des rêves et des souvenirs à demi-mémorisés, comme vus à travers un nuage. Tout au long de ma jeunesse, j'ai découvert de plus en plus sur moi-même. Maintenant j'en suis finalement sûr.\n\nJe suis [my_dorfdad.GetFirstNameNicknamed], l'un des sept [dwarffathers|E], rené par la bénédiction de [mahalcharacter|E] pour mener mon peuple une fois encore !"
 dwarven.5100.desc_mother: "Cela commença par des rêves et des souvenirs à demi-mémorisés, comme vus à travers un nuage. Tout au long de ma jeunesse, j'ai découvert de plus en plus sur moi-même. Maintenant j'en suis finalement sûre.\n\nJe suis [my_dorfdad.GetFirstNameNicknamed], l'un des sept [dwarfmothers|E], renée par la bénédiction de [mahalcharacter|E] pour mener mon peuple une fois encore !"
 dwarven.5100.a: "Je dois informer ma famille !"
 
 dwarven.5101.t: "[my_dorfdad.GetFirstNameNoTooltip] René" #Event could use better loc
 dwarven.5101.desc.intro: "La nouvelle m'est parvenue que [new_dorfdad.GetFirstName] est notre ancien [dwarffather|E], [my_dorfdad.GetFirstNameNicknamed] rené !\n\nBientôt, chaque "

 dwarven.5101.desc.longbeard: "[longbeard|E]"
 dwarven.5101.desc.firebeard: "[firebeard|E]"
 dwarven.5101.desc.broadbeam: "[broadbeam|E]"
 dwarven.5101.desc.blacklock: "[blacklock|E]"
 dwarven.5101.desc.ironfist: "[ironfist|E]"
 dwarven.5101.desc.stiffbeard: "[stiffbeard|E]"
 dwarven.5101.desc.stonefoot: "[stonefoot|E]"
 dwarven.5101.desc.fallback: "[dwarf|E]"
 dwarven.5101.desc.outro: "connaîtra la bonne nouvelle - notre père marche parmi nous une fois encore."
 dwarven.5101.a.close: "Mon propre [ROOT.Char.Custom2('RelationToMeShort', new_dorfdad )] !"
 dwarven.5101.a: "Notre père, rené encore !"
 dwarven.5101.a.tt: "Les [dwarffathers_pluralshort|E] réincarnés ont un traitement préférentiel en termes de [succession|El]."
 dwarven.5101.a.tt_mother: "Les [dwarfmothers_pluralshort|E] réincarnées ont un traitement préférentiel en termes de [succession|El]."

 dwarven.5102.t: "La Mort de [new_dorfdad.GetFirstNameNoTooltip]" #Event could use better loc
 dwarven.5102.desc: "[new_dorfdad.GetFirstNameNoTooltip], le [GetTrait('dwarf_father').GetName( GetNullCharacter )] réincarné de notre clan est décédé. Avec sa mort, les gens entrent dans une période de deuil collectif, attendant son retour éventuel."
 dwarven.5102.a: "Repose en paix, père."
 
 ### High King of Durin's Folk Trait events
 dwarven.6001.t: "Ukhzâd"
 dwarven.6001.desc.regular: "Après que mon prédécesseur ait unifié les montagnes du Peuple de Durin, notre lignée a gagné prestige et fierté au-delà de nos dirigeants d'antan.\n\nEn montant sur le trône, j'ai été reconnu comme le Gablâbâd de [durinsfolk|E].\n\nNul plus grand honneur ou responsabilité ne peut être accordé à un seul [ROOT.Char.GetWomanMan]. Je dois m'assurer de répondre aux attentes de mes sujets si je souhaite rester au pouvoir longtemps."
 dwarven.6001.a: "Mon temps ne fait que commencer !"

 dwarven.6002.t: "Un Nouveau Gablâbâd"
 dwarven.6002.desc: "Avec la perte de ma légitimité, je ne peux plus prétendre au titre de Gablâbâd. Le Royaume appartient maintenant à [new_holder.GetTitledFirstName]."
 dwarven.6002.a: "Ce n'est pas la fin !"
 
 ### Unite the Blue Mountains Events ###
 dwarven.6200.t: "Unir les Clans Occidentaux"
 dwarven.6200.desc: "Longtemps les clans des [broadbeams|E] et [firebeards|E] ont partagé les [bluemountains|E] comme leur foyer ancestral, et longtemps nous nous en sommes contentés. Mais maintenant, les choses ont changé.\n\nDes liens d'amitié indestructible et d'alliances inflexibles nous avons forgés, et nos forteresses d'antan ont été reconquises et restaurées dans leur ancienne gloire. Nos peuples sont plus proches que jamais. Avec mon ascension comme nouveau Gablâbâd des [bluemountains|E], j'appellerai maintenant à l'unité parmi tous les clans occidentaux, et les mènerai vers un avenir nouveau et plus radieux."
 dwarven.6200.a: "Envoyez un message à tous les seigneurs [dwarven|E] sous ces pics !"
 dwarven.6200.a.tt: "Vous contacterez tous les dirigeants nains indépendants des [bluemountains|E]"

 dwarven.6201.opening: "Robuste Seigneur de Clan,"
 dwarven.6201.desc: "[sender.GetTitledFirstName] vous appelle à jurer loyauté et amitié tandis que les clans des [bluemountains|E] aspirent à la vraie unité parmi tous les [dwarves|E] de l'ouest. Le temps est venu de s'unir !"
 dwarven.6201.a: "Nous jurons fidélité à vous, [sender.GetFirstName], Gablâbâd !"
 dwarven.6201.b: "Nous ne vous devons nulle loyauté !"
 
 dwarven.6202.opening: "Vrai Fils de Mahal,"
 dwarven.6202.desc: "Nous jurons volontiers fidélité à vous, [sender.GetTitledFirstName]. Tandis qu'un nouvel âge se lève sur tous les [dwarves|E] des [bluemountains|E], nous vous aiderons du mieux que nous pourrons. Ensemble nous tiendrons contre l'ombre qui se lève à l'Est."
 dwarven.6202.a: "Un choix sage en vérité."
 
 dwarven.6203.opening: "Faux prétendant,"
 dwarven.6203.desc: "Nous ne voyons aucune raison de changer le statu quo qui a duré des millénaires. Vous êtes seul dans cette entreprise."
 dwarven.6203.a: "Sots dénués d'esprit !"

 ### Nurunkizdin/Uldona Spine Events
 dwarven.6300.t: "Le Tailleur d'Ombres"
 dwarven.6300.desc: "Aujourd'hui est le jour.\n\nRassemblés autour de moi se trouvent des représentants de chaque guilde majeure, ainsi que les Maîtres de Guilde des guildes des Fabricants d'Outils et Tailleurs de Pierre. Sous nous, des foules de [dwarves|E] empressés encombrent les cavernes inférieures, avec les acclamations d'encore plus résonnant depuis les balcons au-dessus. La construction est presque achevée.\n\nCe sera Uzfelak, le joyau de [GetTitleByKey('k_nurunkizdin').GetNameNoTier]. Une grande tour, inversée, suspendue au toit de la montagne, où jadis demeuraient de vils [goblins|E]. À son nadir, une lampe de cristal, d'où la lumière brillera pour emplir ces halls longtemps obscurcis.\n\nConjointement, les Maîtres de Guilde me présentent un ciseau cérémoniel, subtilement gravé de filigrane d'or. 'Ce serait notre honneur, suzerain, si vous faconniez la pierre finale'. D'un dernier coup, ma marque est gravée, et la lampe allumée. La lumière, belle de mille façons, se répand sur chaque face rocheuse.\n\nLoin en bas, un cri pitoyable."
 dwarven.6300.a: "Voici ! Uzfelak, le Tailleur d'Ombres !"
 
 ### Shaving Events
 dwarven.9000.t: "Rasé net"
 dwarven.9000.cruel.desc: "« Oh, [recipient.GetFirstNameNoTooltip] », je soupire théâtralement. « Ne vous inquiétez point. Je ne suis pas ici pour prendre votre tête,  ou quoi que ce soit d'autre de valeur. Votre barbe fera parfaitement l'affaire. »"

 dwarven.9001.cruel.desc: "L'expression satisfaite sur son visage envoie un frisson le long de mon épine dorsale.\n\n« Ne vous inquiétez point. Je ne suis pas venu pour votre tête,  ou quoi que ce soit d'autre de valeur d'ailleurs. Votre barbe fera parfaitement l'affaire. »"
 dwarven.9001.compassionate.desc: "« [recipient.GetFirstNameNoTooltip], je veux que vous sachiez que je ne prends nul plaisir à ceci. Je suis forcé de vous faire raser. Pour la stabilité du royaume. »"
 dwarven.9001.a: "Quoi... ? Laissez-moi partir ! #emp Nooon !#!"

 dwarven.9002.t: "Barbu à nouveau"
 dwarven.9002.desc: "Il y a eu de longues années depuis que j'ai été honteusement rasé net. J'ai fait tout ce que je pouvais pour faire repousser ma barbe chérie plus vite, utilisé potions et lotions pour lui donner volume et brillance, et finalement, elle est présentable."
 dwarven.9002.a: "Je peux montrer mon visage en public sans honte une fois encore."

 dwarven.9500.t: "Le cours de ma vie"
 dwarven.9500.desc: "En vieillissant, je commence à méditer sur mon avenir. Le choix majeur qui se présente maintenant à moi est de chercher un compagnon ou de me concentrer avant tout sur mon artisanat. Il n'est pas inhabituel pour un [dwarf|E] de ne prendre nul compagnon et de se concentrer plutôt sur le perfectionnement de son art. Ou peut-être que celui que je désire ne m'accepterait pas, ou a choisi un autre ! Quelle qu'en soit la raison, il n'y a nulle honte dans l'un ou l'autre choix. Pourtant je dois garder à l'esprit l'héritage de ma maison et ma famille, afin qu'il ne se termine pas avec moi..."
 dwarven.9500.a: "Je chercherai un compagnon."
 dwarven.9500.b: "Mon artisanat m'appelle !"
 
 dwarven.9700.t: "La Montagne Solitaire est nôtre"
 dwarven.9700.desc.evil: "Trop longtemps les Nains maudits de la [lonelymountain|E] se sont assis gras et fiers sur leurs piles d'or, se cachant derrière les portes de leur grande Montagne. Ils ont résolument défendu leurs foyers, leurs haches acérées et leur armure quasi impénétrable. Plus maintenant.\n\nMaintenant la Montagne Solitaire est mise à nu, ses portes déchirées et ses halls rouges du sang nain. Les richesses des Nains : joyaux brillants, gemmes précieuses, armes finement sculptées, et or au-delà de toute mesure et chagrin ; tout est nôtre à prendre et piller. Longtemps beaucoup ont pensé ce royaume inconquérable, sauf par le feu du [dragon|E], mais je l'ai mis à nu."
 dwarven.9700.desc.good: "La chute d'Erebor choqua beaucoup, et ce fut une grande tragédie, semblable à la Désolation de Smaug. Pourtant, bien que la mémoire de cet échec demeure encore dans nos cœurs, le chagrin de la perte est maintenant remplacé par la joie et l'espoir. La Montagne Solitaire est nôtre une fois de plus, la souillure qui l'occupait entièrement nettoyée, et un Nain siège maintenant sur le trône. Tout comme le dragon maudit fut vaincu, ainsi furent ces occupants sauvages."
 dwarven.9700.a: "Hourra !"

 dwarven.9701.t: "La Chute d'Erebor"
 dwarven.9701.desc: "Erebor, joyau de mon peuple, est tombé. En un acte qui sera longtemps rappelé par le Peuple Nain, les portes de la Montagne Solitaire tombèrent, et les ennemis se déversèrent dans les halls scintillants des Nains. Tout comme quand Smaug le Doré brûla Dale et Erebor, d'innombrables sont à nouveau chassés en exil, et ils regardent en arrière vers leur patrie avec chagrin et peine, cherchant à y retourner un jour encore. Je ne peux laisser cette souillure polluer Erebor longtemps.\n\nNous reviendrons un jour, et nous aurons notre vengeance dans le sang. Tout comme Smaug tomba, vainquons la racaille qui souille notre foyer !"
 dwarven.9701.a: "Qu'ils craignent le retour des enfants de Mahal !"

 dwarven.9805.t: "Usurpation du trône"
 dwarven.9805.desc: "Peut-être le droit de m[king.Custom('FR_OnA')] [king.Custom('GetQueenKing')], [king.GetFirstName] de régner est-il arrivé à sa fin. Plutôt que de permettre à un dirigeant illégitime de maintenir sa place sur le trône, peut-être devrais-je placer un[ROOT.Char.Custom('FR_E')] nouv[ROOT.Char.Custom('FR_EauElle')] [ROOT.Char.Custom('GetQueenKing')] sur le trône ? En y pensant, pourquoi devrais-je même considérer placer quelqu'un d'autre sur le trône, quand je suis moi-même un candidat parfaitement capable ?\n\nPeut-être est-il temps que je prenne le contrôle de ma Maison, que je revendique le trône de mon peuple. Comment devrais-je m'y prendre cependant ? Par la menace d'épée ou de dague ? En étant un diplomate convaincant et [ROOT.Char.GetWomanMan] de famille ? [king.GetFirstNameNoTooltip] acceptera-t-[king.GetSheHe] mon règne, ou me résistera-t-[king.GetSheHe] ?\n\nAi-je vraiment le droit d'exiger cela de [king.Custom('FR_LuiElle')] ?"
 dwarven.9805.a: "Faites-lui savoir qu'il ne gouverne plus sur notre peuple"
 dwarven.9805.b: "Je ne peux faire cela, c'est de la trahison."

 dwarven.9806.t: "Un[ROOT.Char.Custom('FR_E')] nouv[ROOT.Char.Custom('FR_EauElle')] [claimant.Custom('GetQueenKing')] !?"
 dwarven.9806.desc: "Mon parent [claimant.GetWomanMan] [claimant.GetFirstName] a envoyé un message outrageant à mes halls ! [claimant.GetFirstName] prétend que mon règne sur notre peuple est illégitime, et qu'[claimant.GetSheHe] est le vrai dirigeant de notre Maison.\n\n[claimant.GetSheHe] me demande de m'écarter, de mettre de côté ma couronne et mon trône pour devenir inférieur à [claimant.Custom('FR_LuiElle')], ou [claimant.GetSheHe] me destituerai ! Le trône est mien de droit, mais vaut-il la peine de résister, quand je sais que ce faisant cela coûtera la vie à tant de mon peuple ? Quelle est la bonne chose pour un [ROOT.Char.Custom('GetQueenKing')] de faire, quand confronté à une telle trahison ?"
 dwarven.9806.a: "Si ce traître veut la guerre, alors [claimant.GetSheHe] l'aura !"
 dwarven.9806.b: "Je ne serai pas la cause de morts inutiles, je cède."

 dwarven.9807.t: "Ce sera la guerre !"
 dwarven.9807.desc: "J'ai reçu des nouvelles, [king.GetFirstName] a refusé mon offre et ne cédera pas pacifiquement le trône de notre peuple. Je ne veux nul effusion de sang, mais [king.GetSheHe] me force la main, car son règne ne doit plus continuer. Notre peuple souffre maintenant, à cause de son choix."
 dwarven.9807.a: "Il n'était pas nécessaire d'en arriver là, mon parent."

 dwarven.9808.t: "Un[ROOT.Char.Custom('FR_E')] nouv[ROOT.Char.Custom('FR_EauElle')] [claimant.Custom('GetQueenKing')]"
 dwarven.9808.desc: "J'ai reçu des nouvelles, [king.GetFirstName] a écouté mon offre et a choisi de céder pacifiquement le trône de notre peuple. Cela m'encourage qu'[king.GetSheHe] ait choisi de ne pas sacrifier les vies de notre peuple pour assouvir son propre ego.\n\nMon règne a commencé, et ma lignée assumera le trône après moi. En tant que nouv[ROOT.Char.Custom('FR_EauElle')] [claimant.Custom('GetQueenKing')], je dois maintenant décider comment je mènerai mon peuple dans ce nouvel âge. Que réserve l'avenir à mon règne ? Les mènerai-je vers un avenir radieux ou un âge glorieux ? Ou serai-je un[ROOT.Char.Custom('FR_E')] [claimant.Custom('GetQueenKing')] pire que tous ceux qui sont venus avant moi ?"
 dwarven.9808.a: "Un nouvel âge commence pour mon peuple !"

 dwarven.9809.t: "Une Couronne de victoire"
 dwarven.9809.desc: "Après avoir refusé mon offre de céder le trône pacifiquement, [king.GetFirstName] a échoué à même défendre sa revendication par la guerre, car [king.GetSheHe] a été vaincu.\n\nMon règne a commencé, et ma lignée assumera le trône après moi. En tant que nouv[ROOT.Char.Custom('FR_EauElle')] [claimant.Custom('GetQueenKing')], je dois maintenant décider comment je mènerai mon peuple dans ce nouvel âge. Que réserve l'avenir à mon règne ? Les mènerai-je vers un avenir radieux et glorieux ? Ou serai-je un[ROOT.Char.Custom('FR_E')] [claimant.Custom('GetQueenKing')] pire que tous ceux qui sont venus avant moi ?"
 dwarven.9809.a: "Un nouvel âge commence pour mon peuple !"

 dwarven.9810.t: "Humilié dans la défaite"
 dwarven.9810.desc: "Mon parent [claimant.GetWomanMan] [claimant.GetFirstName] m'a vaincu.\n\nJe n'ai combattu que pour protéger ce que [mahalcharacter|E] m'avait donné contre ce traître, et pourtant, sa faveur s'est retirée de mon visage. [claimant.GetFirstName] règne maintenant comme [claimant.Custom('GetQueenKing')], pour le meilleur ou pour le pire."
 dwarven.9810.a: "Je ne peux qu'espérer qu'ils ne ruineront pas ce que j'ai accompli."

 dwarven.9811.t: "Mon entreprise a échoué"
 dwarven.9811.desc: "[king.GetFirstName] gouverne encore notre peuple comme [king.Custom('GetQueenKing')], j'ai été vaincu.\n\n[mahalcharacter|E] se tient encore avec [king.Custom('FR_LuiElle')], c'était ma propre folie qui m'a mené à ce point, qui a tué notre peuple pour mes propres désirs égoïstes."
 dwarven.9811.a: "Désirer le trône d'autrui est sottise."

 dwarven.9999.t: "Un nom pour notre Peuple Unifié"
 dwarven.9999.desc: "Après de longues années passées dans des halls séparés, les clans des [dwarves|E] se dressent désormais unis sous une même bannière. Il est temps de choisir un nom pour ce nouveau royaume, un nom qui résonnera dans nos demeures pour des âges à venir."
 dwarven.9999.a: "Nous nous nommerons $h_mountains_mountains$."
 dwarven.9999.b: "En l'honneur de notre Faiseur, nous prendrons le nom de $h_mountains_mahal$."
 dwarven.9999.c: "Notre peuple a toujours été connu sous le nom de $h_mountains_khazad$."