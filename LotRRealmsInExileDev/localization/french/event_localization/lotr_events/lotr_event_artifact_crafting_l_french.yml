 artifact_crafting.0001.t: "Forger un artefact pourfendeur de dragon"
 artifact_crafting.0001.desc_intro: "Je me tiens devant la table où s'étalent les plans apportés par les forgerons de [county.GetNameNoTier].\nLes plans que j'ai commandés, le joyau de notre armurerie : un [artifact|E] pourfendeur de dragon !\n\n"
 artifact_crafting.0001.desc_black_arrow: "Une Flèche Noire !\nRéputée d'une légèreté et d'un tranchant redoutables. Les forgerons affirment qu'« elle percerait le cuir d'un dragon comme du parchemin ! » — bien que j'espère n'avoir jamais à éprouver cette affirmation, il est toujours possible qu'elle soit requise."
 artifact_crafting.0001.desc_windlance: "Un Carreau de Lance-Vent !\nLa Lance-Vent, la grande baliste conçue par les [longbeards|E] pour projeter d'immenses carreaux de métal. Un outil parfait pour occire les dragons assaillants et défendre un foyer — il ne lui faut que les grands Carreaux de Lance-Vent. Le joyau de mon armurerie, et le signe de la protection de mon royaume."
 artifact_crafting.0001.a: "Préparons-nous !"
 artifact_crafting.0001.b: "Le moment n'est pas propice"
 forged_slayer_artifact_cooldown: "Vous ne pourrez forger un autre artefact pourfendeur de dragon avant 20 ans"