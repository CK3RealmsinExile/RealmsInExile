 crafting_mechanic.1001.t: "Provision de métaux"
 crafting_mechanic.1001.desc: "Je médite sur les plans de mon prochain ouvrage, mais il me manque certaines ressources essentielles.\n\nOn murmure que [recipient.GetTitledFirstName] pourrait détenir ce que je cherche."
 crafting_mechanic.1001.mithril: "#U Mithril#! — pour sa légèreté légendaire et sa résistance sans pareille !"
 crafting_mechanic.1001.gold: "#U Or#! — pour sa beauté intemporelle et son opulence !"
 crafting_mechanic.1001.silver: "#U Argent#! — pour son éclat gracieux, semblable à la lueur de la Lune !"
 crafting_mechanic.1001.lead: "#U Plomb#! — pour sa résilience inflexible et sa densité !"
 crafting_mechanic.1001.copper: "#U Cuivre#! — pour sa chaleur vibrante et son élégance rustique !"
 crafting_mechanic.1001.tin: "#U Étain#! — pour son charme modeste et sa malléabilité !"
 crafting_mechanic.1001.iron: "#U Fer#! — pour sa force inébranlable et sa polyvalence !"
 crafting_mechanic.1001.gems: "Ce sont plutôt des gemmes que je recherche..."
 crafting_mechanic.1001.close: "À la réflexion, peut-être pas."

 crafting_mechanic.1002.t: "Provision de gemmes"
 crafting_mechanic.1002.desc: "Je médite sur les plans de mon prochain ouvrage, mais il me manque certaines ressources essentielles.\n\nOn murmure que [recipient.GetTitledFirstName] pourrait détenir ce que je cherche."
 crafting_mechanic.1002.diamond: "#U Diamants#! — pour leur rareté et leur éclat incomparable !"
 crafting_mechanic.1002.ruby: "#U Rubis#! — pour leur énergie vibrante et leur beauté ardente !"
 crafting_mechanic.1002.sapphire: "#U Saphirs#! — pour leur élégance sereine et leur noblesse !"
 crafting_mechanic.1002.emerald: "#U Émeraudes#! — pour leur charme verdoyant et leur splendeur intemporelle !"
 crafting_mechanic.1002.amethyst: "#U Améthystes#! — pour leur aura mystique et leur présence apaisante !"
 crafting_mechanic.1002.onyx: "#U Onyx#! — pour sa force ténébreuse et sa nature protectrice !"
 crafting_mechanic.1002.peridot: "#U Péridots#! — pour leur teinte verte joyeuse et leur harmonie avec la nature !"
 crafting_mechanic.1002.quartz: "#U Quartz#! — pour sa clarté et ses propriétés versatiles !"
 crafting_mechanic.1002.elven_gems: "#U Gemmes elfiques#! — pour la lumière resplendissante et la beauté du Premier Âge !"
 crafting_mechanic.1002.metals: "Ce sont plutôt des métaux que je recherche..."
 crafting_mechanic.1002.close: "$crafting_mechanic.1001.close$"

