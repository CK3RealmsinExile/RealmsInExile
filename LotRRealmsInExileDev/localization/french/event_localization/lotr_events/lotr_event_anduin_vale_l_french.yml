 anduin_vale.0102.t: "Le Royaume du Thane Suprême"
 anduin_vale.0102.desc: "Depuis des temps immémoriaux, les Hommes des Bois et leurs frères du [anduinvale|E] sont demeurés farouchement indépendants, tant des étrangers que les uns des autres. Ce n'est que dans les heures les plus sombres que ces tribus querelleuses ont élu un seul souverain, le Thane Suprême ou « Aledegan », pour unir leurs forces contre un ennemi commun.\n\nMais les temps ont changé. Sous votre dynastie, un grand royaume a été forgé, unissant le Val d'Anduin et les terres ancestrales des Hommes des Bois dans la grande forêt de Vertbois. Les peuples disparates du Bois et du Val ont tous reconnu votre autorité et le droit de vos héritiers à régner à jamais. Plus jamais votre peuple ne sera divisé, livré en proie aux orques prédateurs, aux wargs et à pire encore. Vous avez fondé le Royaume du Thane Suprême — l'Aladegana !"
 anduin_vale.0102.a: "Et je suis l'Aledegan !"
 anduin_vale.0102.a.tt: "Vous avez créé le titre impérial d'Aladegana."

 anduin_vale.0106.t: "Le Royaume des Éothéod restauré !"
 anduin_vale.0106.desc: "Pendant de longues années, mon peuple n'a été que l'ombre de sa puissance d'antan, menant des vies cachées dans les replis au pied des [greymountains|E]. Après le départ d'Eorl et de Leofr avec la majeure partie des Éothéod, les derniers survivants étaient trop faibles pour revendiquer le [anduinvale|E], et la pression des raids [goblin|E] et des usurpateurs Hommes des Bois a longtemps empêché tout espoir de résurgence.\n\nPourtant, sous ma conduite, les Framlins se sont ralliés, et une fois encore le Val septentrional est dominé par les vrais fils de Fram. Notre valeur a été prouvée à la pointe de l'épée, et le Royaume des Éothéod renaît à califourchon sur les sources du Grand Fleuve.\n\nParmi les plus hardis et les plus ambitieux de mon peuple, certains murmurent même que le Royaume du Nord restauré devrait affirmer sa suprématie sur les fils d'Eorl et de Leofr au sud..."
 anduin_vale.0106.a: "Le Royaume des Cavaliers est restauré !"
 anduin_vale.0106.a.tt: "Vous avez consolidé votre royaume et recréé le Royaume des Éothéod."
 
 anduin_vale.0107.t: "L'Intégration de Twainmantle"
 anduin_vale.0107.desc: "Les [greymountains|E] s'élèvent jusqu'au ciel, perçant les nuages. Elles sont indéniablement le domaine des [dwarves|E], tel le peuple robuste qui demeure à [nordinbad|E]. Mais Twainmantle est une région de collines ondoyantes, idéale pour élever nos précieux destriers endurants.\n\nDepuis longtemps nos ancêtres ont demeuré ici, à l'extrémité septentrionale du [anduinvale|E], et le temps est venu d'intégrer formellement ces contreforts à notre royaume. Tous ceux qui y vivent répondront aux Cavaliers qui règnent sur le Val — maintenant, et à jamais."
 anduin_vale.0107.a: "Que Twainmantle prenne sa juste place."

 
 ## Kultamieli Event Chain - T.A. 1349 ##
 
 anduin_vale.0110.t: "La Confédération s'effondre"
 anduin_vale.0110.desc: "Enfin, cette pathétique et misérable Confédération de Langwell a été mise en pièces. La mort des seigneurs les plus grands et les plus influents de leur petite coalition les a poussés à se retourner les uns contre les autres comme des chiens enragés, échangeant accusations et insultes ; et la discorde parmi eux fut enfin trop grande. Leurs serments de fraternité et de compagnonnage ont été oubliés et piétinés.\n\nLes Nordiques ont toujours été faibles et couards, guère plus que des chiots enragés mais édentés. Par ma volonté, leur chute a été hâtée, et ils tremblent de peur devant mon ombre, devant l'ombre du Septentrion, devant l'ombre d'[angmar|E]. Bientôt ils seront des esclaves, et rien de plus."
 anduin_vale.0110.a: "Le nord est mûr pour la cueillette."

 anduin_vale.0111.t: "L'Effondrement de la Confédération"
 anduin_vale.0111.desc: "Les dissensions et les luttes intestines parmi les seigneurs de la Confédération de Langwell ont enfin atteint un point de rupture. La mort des chefs les plus influents de la Confédération a engendré une grande paranoïa, et l'échange d'accusations et d'insultes entre alliés autrefois au moins nominaux est devenu plus venimeux et sauvage que jamais.\n\nLes serments ont été oubliés, d'anciens amis se retournent les uns contre les autres, et pour tous il est clair que la coalition s'est effondrée. La menace d'[angmar|E] plane toujours sur tout le nord, pourtant il semble que nous devions survivre seuls à la tempête qui vient, sans placer notre espoir en autrui."
 anduin_vale.0111.a: "Que pouvons-nous faire ?"

