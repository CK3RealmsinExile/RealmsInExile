 lotr_hegemony.0004.a: "Quelle infortune"
 
 lotr_hegemony.0005.title: "Dissolution de [GetTitleByKey('h_pharazain').GetNameNoTooltip]"
 lotr_hegemony.0005.desc: "En tant que membre d'une race non [human|El], je n'ai nulle prétention, réelle ou imaginaire, à régner sur un royaume qui prétend unir les [adunai|E]."
