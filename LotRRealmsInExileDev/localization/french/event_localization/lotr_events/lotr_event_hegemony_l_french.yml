 lotr_hegemony.0006.a: "Quelle infortune"
 
 lotr_hegemony.0007.title: "Dissolution des [GetTitleByKey('h_noldor').GetNameNoTooltip]"
 lotr_hegemony.0007.desc: "En tant que membre d'une race non [elven|El], je n'ai nulle prétention, réelle ou imaginaire, à avoir hérité du legs de Gil-galad."
 lotr_hegemony.0007.a: "Quelle infortune"