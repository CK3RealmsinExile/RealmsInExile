 lotr_hegemony.0002.title: "Dissolution des [GetTitleByKey('h_mountains').GetNameNoTooltip]"
 lotr_hegemony.0002.desc: "En tant que membre d'une race qui n'habite point les royaumes souterrains, je n'ai nulle prétention, réelle ou imaginaire, à en gouverner les royaumes à la manière d'un souverain issu de ce même peuple."
 lotr_hegemony.0002.a: "Quelle infortune"
 
 lotr_hegemony.0003.title: "Dissolution des [GetTitleByKey('h_reunited_kingdom').GetNameNoTooltip]"
 lotr_hegemony.0003.desc: "En tant que membre d'une race non [human|El], je n'ai nulle prétention, réelle ou imaginaire, à régner sur le royaume d'[elendil|E]."
 lotr_hegemony.0003.a: "Quelle infortune"
 
 lotr_hegemony.0004.title: "Dissolution de [GetTitleByKey('h_numenor_in_exile').GetNameNoTooltip]"
