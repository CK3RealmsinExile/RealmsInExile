l_french:

 elven.0150.t: "Un Émissaire des Faës"
 elven.0150.desc: "À l'aube de ce jour, un étranger a franchi le seuil de ma demeure. Il s'est présenté comme messager de la Dame Radieuse, émissaire de la Cour des Faës ! Il évoque l'ombre grandissante de [dolguldur|E] et nous offre protection ainsi que guidance dans notre lutte contre cette menace qui s'étend. Cependant, nombreux sont ceux de mon clan qui nourrissent des soupçons envers ce messager - fut-il véritablement dépêché par [foldewyncharacter|E] ?\n\nSi nous devenons sujets des Faës, nous pourrions raviver l'ancienne [claim|E] de mon clan sur [GetTitleByKey('d_drownholt').GetNameNoTier] ! Il m'incombe de décider du destin de mon peuple."
 elven.0150.a: "Nous remercierons la Dame Radieuse pour sa protection bienveillante."
 elven.0150.att: "Vous deviendrez un protectorat de la Dame de [dwimordene|E]."
 elven.0150.c: "Nous remercierons la Dame Radieuse pour sa protection bienveillante."
 elven.0150.c.tt: "Vous voyagerez vers [dwimordene|E] et la remercierez pour sa protection."
 elven.0150.b: "Nous sommes un peuple endurant, nous pouvons affronter l'ombre par nos propres forces."
 elven.0150.btt: "Vous déclinez l'offre de la Dame Radieuse et menez votre peuple en toute indépendance."
 
 elven.0151.t: "Les Leofrings s'inclinent"
 elven.0151.desc: "Mes émissaires reviennent des terres des Leofrings vers le sud, porteurs de nouvelles réjouissantes. Les souverains du Peuple de Leofr ont choisi avec sagesse et prêté serment de fidélité à la Dame Radieuse de [dwimordene|E], ainsi qu'ils me nomment désormais.\n\nForts du soutien du Bois Doré, ils sont maintenant libres de convaincre leurs frères demeurant sur les rives orientales de l'[anduin|E] de suivre cette voie, s'ils le désirent."
 elven.0151.a: "Une décision noble et avisée."
 elven.0151.a.tt: "Les Leofrings sont devenus votre protectorat"
 
 elven.0152.t: "Les Leofrings refusent"
 elven.0152.desc: "Mes émissaires reviennent des terres des Leofrings vers le sud, porteurs de nouvelles affligeantes. Les souverains du Peuple de Leofr ont choisi de rejeter notre gracieuse offre d'allégeance et souhaitent demeurer indépendants.\n\nC'est là une peine, car assurément nous aurions pu leur enseigner bien des choses et les protéger contre l'ombre qui s'élève maintenant à l'orient."
 elven.0152.a: "Je ne souhaitais que leur protection. Hélas."
 
 elven.0153.t: "Les Hommes du Celebrant Promettent leur Allégeance"
 elven.0153.desc: "Ce jour, [parthruler.GetWomanMan] est arrivé à ma cour. [parthruler.GetSheHe] s'est présenté comme [parthruler.GetFullName], chef de clan des [northmen|E] de Parth Celebrant.\n\n\"Je suis venu en [dwimordene|E] pour exprimer personnellement ma gratitude envers votre protection contre l'Ombre. De sombres rumeurs nous parviennent de Drownholt depuis quelque temps, évoquant de terribles actes et sacrifices accomplis au nom de leur nouveau dieu.\"\n\nDe plus, [parthruler.GetSheHe] expliqua qu'il y a quelques générations, son peuple demeurait encore en [GetTitleByKey('d_drownholt').GetNameNoTier], jusqu'à ce que les clans se divisent après un conflit de succession et qu'ils soient contraints de traverser l'[anduin|E].\n\nAlors que se répand la nouvelle que moi, la Dame Radieuse, suis devenue leur protectrice, la revendication du Clan Guthmunding s'est de nouveau renforcée, et ils souhaitent reconquérir leur antique demeure qui a sombré dans l'Ombre. Bien qu'ils soient peu nombreux, leur peuple a retrouvé un nouvel espoir et brûle d'ardeur au combat."
 elven.0153.a: "Ensemble, nous pourrons repousser les ténèbres."
 elven.0153.a.tt: "Les Leofrings sont devenus votre protectorat"
 
 elven.0154.t: "L'Ombre menaçante"
 elven.0154.desc: "Mes frontières méridionales étant désormais sécurisées et gardées par les fidèles Leofrings menés par [parthruler.GetName], mes pensées se tournent vers l'orient. Par-delà le grand fleuve [anduin|E] s'étendent les terres basses de [GetTitleByKey('d_drownholt').GetNameNoTier], où demeurent les Hommes depuis quelque temps déjà.\n\nAu-delà se dressent les rameaux sombres de [mirkwood|E] où sur l'Amon Lanc se dresse la fastueuse forteresse de [dolguldur|E]. Un mal jadis habitait ces ruines, jusqu'à ce que le Conseil Blanc le chasse de son siège, mais en ces années récentes, les ténèbres sont revenues.\n\nSi nous devons contenir les ombres grandissantes, nous devons aider les Hommes de Parth Celebrant afin qu'ils puissent s'emparer de Drownholt pour eux-mêmes, refusant ainsi les rives orientales du fleuve à l'ennemi..."
 elven.0154.a: "Convoquez l'Armée Dorée. Nous traversons l'Anduin !"
 elven.0154.b: "Des préparatifs restent encore à achever."
 elven.0154.b.tt: "Débloque une [decision|El] pour traverser l'Anduin ultérieurement"
 
 elven.0101.t: "Noces royales"
 elven.0101.desc: "Quand mon cher ami [mithrandircharacter|E] me donna l'Elessar, il prophétisa que je ne serais qu'une gardienne temporaire et qu'il passerait finalement à celui qui prendrait le nom de Pierre-des-Elfes.\n\nJ'ai entrevu ce jour dans mon miroir, quand ma petite-fille accomplirait son destin et épouserait [aragorn.GetFirstName].\n\nC'est pour moi un jour doux-amer : [arwen.GetFirstName] rayonne de bonheur visible, sa beauté plus radieuse que jamais, vivante image de Lúthien d'autrefois. Mais par cette union elle choisit le Don des [men|E], et sera à jamais séparée de moi."
 elven.0101.a: "Comme il fut prophétisé, la Pierre-des-Elfes ira à Elessar"
 elven.0101.b: "Je ne puis me résoudre à m'en séparer."
 
 elven.0102.t: "Noces royales"
 elven.0102.desc: "Dame Galadriel est arrivée avec Arwen pour la célébration nuptiale en [minastirith|E]. Quand vient son tour de nous féliciter, elle me remet la Pierre-des-Elfes, l'Elessar verte de la prophétie. Avec elle je guérirai mon peuple souffrant."
 elven.0102.a: "Voilà un présent royal !"

 elven.0104.t: "Vers d'admiration"
 elven.0104.desc: "En traversant le lieu des festivités, je croise [wedding_attending_elf.GetName], qui rayonne d'un bonheur sans mélange. « N'est-ce pas là l'occasion la plus joyeuse du siècle ? Non, que dis-je... le plus heureux événement de l'Âge ! »\n\nLa joie de [wedding_attending_elf.GetFirstName] est communicative, et un sourire s'esquisse sur mes lèvres. « Cela mérite d'être mis en vers, » me dis-je, tirant promptement un parchemin et une plume de mes affaires. Mais quel sujet choisir pour un tel poème ?"
 elven.0104.a: "Un poème en mémoire de cet heureux moment."
 elven.0104.b: "Un poème qui mettra en valeur mes dons pour la plume."

 # Eltariel Events
 elven.0200.t: "Renforts de la Dame"
 elven.0200.desc: "Tandis que ma compagnie commence à dresser le camp pour la nuit, un soudain mouvement dans les ombres sur le côté attire mon regard. Tirant ma lame, je me retourne vivement, prête à faire face à la nouvelle menace, mais des ombres ne surgit aucun ennemi, seulement trois visages familiers.\n\n« Bien trouvée, Eltariel, » m'accueillent les nouveaux venus. « Et bien rencontrés, en vérité. La Dame nous a envoyés à votre rencontre pour vous offrir son aide dans votre quête, si vous en avez besoin. »\n\n[rumilien.GetFirstName], [mirwen.GetFirstName] et [cuilebeth.GetFirstName] jouissent d'une grande estime parmi les Galadhrim, et seraient tout à fait à même de me prêter main-forte dans mes chasses. Mais d'un autre côté, deux groupes de chasse couvriraient un territoire plus vaste qu'un seul..."
 elven.0200.a: "Quelle joie de vous voir. Venez, rejoignez-nous."
 elven.0200.b: "Nous devrions nous séparer et chasser chacun de notre côté."
 elven.0200.alliance: "Vous gagnez une [alliance|E] mutuelle avec [rumilien.GetName]"
 
 #Enter/Leave realm events
 elven.0300.t: "La Chute de Caras Galadhon"
 elven.0300.desc: "L'odeur des #italic mallorn #! en flammes empeste lourdement l'atmosphère. [lorien|E], le royaume elfique du Bois Doré, a été mortellement blessé.\n\nNos ennemis ont surmonté tant nos défenses que l'antique protection déposée sur cette terre par la Dame des Galadhrim et se sont emparés de notre cité arboricole, brûlant et pillant à leur guise.\n\nCeux de notre peuple qui ne tombèrent point dans les combats ont pris la fuite, dispersés dans les bois de mallorn entourant les ruines fumantes..."
 elven.0300.a: "Ainsi s'effondre le cœur de l'elfinesse sur terre..."
 
 elven.0301.t: "Notre Cœur Elfique Ranimé"
 elven.0301.desc: "Des chants de victoire résonnent depuis les cimes tout alentour, et une grande joie emplit la terre. Caras Galadhon, siège souverain de [lorien|E], a été reconquise par notre peuple.\n\nDésormais, les Galadhrim s'attèleront au labeur ardu de restaurer la cité déchue en sa splendeur première. Les arbres doivent être replantés, et les haies, refaire leur croissance. Ce ne sera ni aisé ni rapide, mais nous mènerons cette tâche à son terme."
 elven.0301.a: "Caras Galadhon renaîtra de ses cendres."
 
 elven.0302.t: "La Chute de Lasgalen"
 elven.0302.desc: "Les grandes branches d'arbres aussi vieux que le monde gisent noires et brisées. Sur des lieues à la ronde, on ne voit que des souches cendrées, et la terre est lacérée et aride, car elle a versé toutes ses larmes. Les belles rivières, douces comme le printemps, ont rougi de sang et de corps sans vie, et bruni de fange et de créatures maudites.\n\nArandhrynd, capitale du Royaume Sylvestre depuis des âges, a été mise à nu, à l'image de Menegroth en des temps reculés. Les vastes salles taillées dans la roche vive, avec leurs corridors larges et sinueux, ont été livrées aux flammes ; arsenaux et salles et cuisines et caves et trésors ont été mis à sac ; et les belles choses en tout genre ont été profanées, dispersées et brisées."
 elven.0302.a: "Est-ce là le destin du Royaume Sylvestre ?"
 
 elven.0303.t: "Arandhrynd restaurée"
 elven.0303.desc: "Par la puissance et l'espoir des [elves|E], les anciennes et glorieuses salles d'Arandhrynd, jadis capitale du Royaume Sylvestre, ont été reconquises. Longtemps elles ont langui sous l'occupation, et bien des belles choses qui y demeuraient ont désormais disparu à jamais. Car des arbres aussi vieux que les montagnes ont péri, et des ruisseaux ont été souillés et profanés, et la terre porte encore de profondes blessures que seul un Âge entier ne saurait guérir.\n\nLes salles elles-mêmes portent leurs cicatrices. Les grandes portes de pierre sont fracassées et brisées, et les piliers de roche vive sont marqués, bien qu'en cela seulement l'ennemi ne soit point parvenu à ses fins.\n\nUn grand vide m'étreint lorsque j'entre, car nulle des belles et précieuses choses qui furent ici ne demeure. Les arbres et les plantes se sont flétris ou consumés, les lampes de cristal sont brisées, le trône qui se dressait jadis si haut est tordu et profané. C'est une vision de désolation.\n\nMais nous sommes les Premiers-Nés, et nous avons traversé bien des heures sombres ; et si cela devait prendre nombre d'années, ces salles se relèveront, et la lumière et le chant des oiseaux y reviendront."
 elven.0303.a: "La tâche est immense devant nous, mais célébrons ce jour."
 
 elven.0304.t: "La Chute de la vallée cachée"
 elven.0304.desc: "La dernière demeure accueillante en deçà de la mer a été mise à nu. [imladris|E], joyau du monde elfique, est en flammes. Bien que nous ayons combattu avec férocité et constance, l'ennemi a franchi le Bruinen en crue et submergé nos dernières défenses, et tous ceux qui n'avaient point fui furent taillés en pièces.\n\nOr la Vallée Cachée est maintenant dévastée et profanée. Les tomes et récits des Âges passés servent d'allume-feu, et les vastes bibliothèques et archives qui les abritaient ne sont plus qu'entrepôts et amoncellements d'armes. Les vues splendides qui rappelaient [numenor|E] par-delà la mer sont voilées de fumée et de cendre. Les hêtres et les chênes de la vallée ne sont plus que des souches abattues, et les ruisseaux coulent bruns de sang et de fange. Tout ce qui était beau ici est désormais perdu ou souillé. Fendeval est brisé."
 elven.0304.a: "Hélas pour [eldar|E]"
 
 elven.0305.t: "La Reconquête de Fendeval"
 elven.0305.desc: "[imladris|E] dévastée a été reconquise. La dernière demeure accueillante en deçà de la mer, qui si longtemps avait langui et été livrée au pillage, a été arrachée aux griffes de l'ennemi. Car nous avons déferlé sur le Bruinen qui, bien que souillé, ne dédaigna point notre passage, et avons enfin chassé l'ennemi de la vallée.\n\nMais la joie se mêle désormais au deuil ; car la vallée a changé, et elle portera longtemps les marques de ses blessures. Les demeures et les bibliothèques du savoir, jadis célèbres dans tout l'Ouest, ont été dévastées, peu ayant survécu aux flammes et à la destruction. De vastes salles dédiées aux festins et au chant ont été profanées. Et ce n'est rien encore de la Vallée Cachée elle-même, car jadis les bosquets verdoyants et les forêts de chênes et de hêtres qui se balançaient dans la brise rosée de l'aurore ont disparu, bannis au rang du souvenir, et il ne reste que des troncs brisés et la terre nue."
 elven.0305.a: "Il reste beaucoup à accomplir avant que Fendeval ne redevienne un havre de paix."
 
 elven.0306.t: "Mille Navires en flammes"
 elven.0306.desc: "Le soleil se couche à l'ouest et les ténèbres baignent les Havres. Depuis le [secondage|E] de [middleearth|E], les Havres Gris de [mithlond|E] ont tourné leurs regards vers l'Ouest, vers le Pays Elfique par-delà la mer, et depuis leurs quais, en deux Âges du monde, les [elves|E] ont pris la Route Droite. Cela n'est plus.\n\nEn ce qui pourrait bien être un coup fatal pour [eldar|E], le grand et antique port a chuté. Les navires se consument, et la fumée s'élève des quais. Le golfe de Lhûn coule rouge de sang, et demeures et docks ont été mis à sac.\n\nEt que sont désormais les Premiers-Nés ? Vers où s'enfuiront-ils, au crépuscule de l'Âge ? L'espoir nous a-t-il abandonnés, et notre dernière lumière s'est-elle éteinte ? Peut-être, ou peut-être point ; car ainsi périrent [gondolin|E] et Doriath et Nargothrond, et pourtant, bien que nous ayons enduré maintes peines et douleurs, nous avons survécu. Qui sait ce que l'avenir nous réserve..."
 elven.0306.a: "Les Havres Gris ont rougi de sang."
 
 elven.0307.t: "Les Havres Gris renouvelés"
 elven.0307.desc: "[mithlond|E] est revenu sous contrôle [elven|E]. Bien qu'il en ait coûté beaucoup de sang et de nombreuses vies, les Havres Gris ont été arrachés à l'ennemi, et ses docks et quais abritent à nouveau de fiers et beaux navires elfiques. L'air est salé et chargé de fumée.\n\nLa voie d'évasion est une fois encore ouverte. Bientôt, j'en suis sûr, des compagnies et des Elfes solitaires viendront ici avant de prendre la Route Droite vers l'ouest, par-delà les Mers Séparantes, vers [valinor|E]. Une fois encore le marteau résonnera nuit et jour tandis que les charpentiers de marine s'attèleront à leur ouvrage, le dernier qu'ils accompliront en [middleearth|E], et les fruits de leur dernier labeur cingleront haut et fiers vers le crépuscule déclinant.\n\nMais était-ce là tout ce pour quoi nous avons vaincu ? Non point un dernier cri de rage contre la lumière mourante, mais une simple digue contre le flot, la mort d'un Âge et le passage d'une race antique et vénérée. Je regarde autour de moi et vois encore des maisons en ruine, des docks calcinés et des arbres abattus ; et bien que les bannières elfiques flottent sur les murs et les tours d'argent, la désolation est indéniable. N'est-ce là que l'image de notre sort, fiers, mais déclinants ? Mais je lève les yeux, et dans le ciel de l'aurore, j'aperçois une unique étoile d'argent. Estel."
 elven.0307.a: "Une fois encore, des mains elfiques œuvrent sur des ouvrages elfiques."
 
 elven.0308.t: "La Chute de la Salle de Quartz"
 elven.0308.desc: "Les vétérans de Palisor ont trouvé leur maître, et les fées avec eux ; et les beaux étangs et les bosquets d'émeraude jadis cachés ont été dévastés. La grande porte de la Cava Mîrgalla, témoignage des œuvres conjuguées des fées et des [elves|E], forgée de quartz scintillant et d'arbres anciens unis en un seul, a été fracassée ; et bien des choses de grande valeur et beauté ont été emportées et saisies.\n\nBeaucoup ont fui le sac, Ainur et Premiers-Nés confondus, dans les forêts profondes et la jungle, là où les années s'accumulent aussi épaisses que les feuilles des arbres aussi anciens que le Monde. Que sont devenus nos semblables, dispersés et perdus ? Nous ne sommes pas allés vers l'Ouest, car nous sommes les Penni, et la mer ne nous appelle point. Mais peut-être est-ce notre destin ; et nous ne saurons plus l'éviter davantage. Est-il temps pour les Indociles d'écouter l'appel des [valargods|E]..."
 elven.0308.a: "...Ou [middleearth|E] demeurera-t-elle notre foyer, quand bien même le monde vieillit et se lasse ?"
 
 elven.0309.t: "La Restauration des Penni"
 elven.0309.desc: "Bien qu'il en ait coûté beaucoup de sang, nos demeures et nos salles ont enfin été reconquises des griffes souillantes de l'ennemi. Le sang a imprégné la terre, mais Nelornieth est à nouveau entre des mains elfiques. La salle de quartz a été reprise, et il ne subsiste plus un seul ennemi ; car ils ont fui hors de vue et de souci.\n\nPourtant, nous ne sommes plus sans tache. Des étangs et ruisseaux jadis immaculés et purs ont rougi, et les arbres anciens qui abritaient oiseaux et bêtes ont chuté, et la forêt elle-même est en deuil. La brise est mélancolique. Beaucoup parmi les fées, esprits de la forêt, ont également péri ; et il est peu probable qu'ils reviennent, car ils comptent parmi les Ainur qui prirent être avant qu'Eä ne fût créée.\n\nLa terre portera longtemps des blessures, peut-être à jamais. Des étangs et clairières cachées que nul n'avait jamais contemplés hormis les bêtes, les fées et les Elfes ont été souillés. Mais nous nous relèverons et guérirons. Nous sommes les Premiers-Nés. Nous avons le temps."
 elven.0309.a: "[middleearth|E] est notre foyer, et ici nous demeurerons jusqu'à la fin du monde."
 
 elven.0310.t: "La Destruction de Drêl"
 elven.0310.desc: "PLACEHOLDER"
 elven.0310.a: "PLACEHOLDER"
 
 elven.0311.t: "La Guérison de Drêl"
 elven.0311.desc: "PLACEHOLDER"
 elven.0311.a: "PLACEHOLDER"
 
 elven.0312.t: "La Chute de Tâlilan"
 elven.0312.desc: "Les [kinnlai|E] ont subi un coup dévastateur en ce jour. Notre demeure bien-aimée, Tâlilan, est tombée entre les mains de l'ennemi !\n\nTous ceux qui ont pu fuir ont laissé leurs demeures derrière eux, si déchirant que cela soit. Désormais le grand hall du roi est en flammes, souvenir fumant de notre défaite.\n\nMais tout n'est pas perdu ! Nous nous éclipserons et rassemblerons nos forces dans des vallées et clairières secrètes, jusqu'à ce que nous soyons prêts à revenir et à chasser ceux qui oseraient profaner nos forêts sacrées et nos demeures ancestrales !"
 elven.0312.a: "En temps voulu, nous frapperons à notre tour."
 
 elven.0313.t: "La Restauration de Tâlilan"
 elven.0313.desc: "Dans un heureux retournement de fortune, les [kinnlai|E] ont repris Tâlilan ! Les épées étincelantes à la main, le courage et l'espoir au cœur, nous avons chassé nos ennemis de nos terres natales ! Désormais, la restauration peut véritablement commencer.\n\nBien de ce qui rendait Tâlilan belle jadis a été défiguré, et il nous faudra de nombreuses années pour soigner les forêts, mais nous ne devons pas perdre espoir. Ce que des mains ténébreuses ont profané, nous pouvons le purifier et le restaurer, si le temps nous en est accordé..."
 elven.0313.a: "Cette terre doit être guérie."

