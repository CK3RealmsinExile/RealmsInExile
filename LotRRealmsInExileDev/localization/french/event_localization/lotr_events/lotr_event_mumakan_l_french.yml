 ### Emperor Sandamal - Our Path Forward (Victory) ###

 mumakan.0001.t: "Victoire de fer"
 mumakan.0001.desc: "Le messager s'agenouille devant moi sur le marbre du pavillon de commandement, et durant un long moment je ne dis rien, je regarde simplement la poussière sur ses bottes, la fatigue gravée dans les rides autour de ses yeux. Je comprends, avant qu'il prononce un seul mot, que c'en est fait : [GetTitleByKey('k_koronande').GetNameNoTier] est tombée. Non par le mariage, comme [GetScriptedCharacterByHistoryID('lineofmamakil18').GetFirstNameNicknamed] y parvint en son temps avec toute sa diplomatie et son génie patient, sans verser une goutte de sang, mais au terme de trente années d'une patience forgée dans l'acier, condensée en une campagne décisive et implacable. Je me souviens de la voix froide et mesurée de mon oncle m'enseignant que les empires ne se bâtissent point sur le sentiment. Je songe, et ce n'est pas la première fois, qu'il avait raison en cela, même s'il se trompait sur presque tout le reste. La victoire repose dans ma poitrine comme une pierre : lourde, froide, et réelle."
 mumakan.0001.a: "Le Lion de Fer a tenu la promesse de son nom."

 mumakan.0002.t: "L'Accueil du conquérant"
 mumakan.0002.desc: "La grande salle éclate en acclamations à mon entrée. Les chefs tribaux rugissent mon nom, les poètes de la cour entonnent déjà leurs strophes, et les bannières de la république conquise pendent comme des trophées aux voûtes où flottaient jadis les couleurs de mon père. Je reçois tout cela le dos droit et le visage impassible ; j'ai toujours fait face aux exigences de ce trône avec cette même maîtrise, qu'elles m'apportassent triomphe ou désastre. Ce fut [GetScriptedCharacterByHistoryID('lineofmamakil18').GetFirstNameNicknamed] qui, le premier, plia [GetTitleByKey('k_koronande').GetNameNoTier] à la volonté de [GetTitleByKey('e_mumakan').GetNameNoTier], et il y parvint par une fiancée et un banquet. Moi, je l'ai obtenu par le tranchant implacable du glaive. Ce que le glaive a conquis, seul le glaive peut le tenir, et je ne dois point oublier cette vérité, même tandis que ces hommes m'acclament.\n\nCes chefs qui murmuraient naguère la faiblesse de la dynastie crient aujourd'hui le plus fort. Je grave leurs visages dans ma mémoire, chacun d'eux. Ils acclament parce qu'ils espèrent une moisson de dépouilles. Je leur accorderai récompense suffisante pour les satisfaire, mais jamais assez pour les enhardir. L'ouvrage de l'empire n'est jamais achevé ; il ne fait que changer de forme."
 mumakan.0002.a: "Buvez à satiété ce soir ! La victoire commande que l'on célèbre."
 mumakan.0002.b: "Célébrez si vous le devez, mais ne confondez point une seule victoire avec la fin de notre lutte."

 mumakan.0003.t: "Une Rencontre avec $aameda$"
 mumakan.0003.desc: "Il arrive vêtu de soie couleur d'écume. Il s'incline exactement aussi bas que le protocole l'exige, et pas d'une fraction de plus ; c'est un homme qui a calculé chaque geste de son existence et conclu que la mesure précise de la déférence vaut davantage que son excès. [aameda.GetFirstName] parle avec magnificence, comme tous ceux de son espèce. Il parle de liens fraternels, du sang partagé entre les [GetCultureByKey('koronandi').GetName] et les [GetCultureByKey('mumakanil').GetName], et d'une parenté que la guerre a interrompue mais ne saurait détruire. Il n'a pas même tort, à proprement parler, ce qui le rend d'autant plus dangereux.\n\nJ'ai passé trente années dans une cour peuplée d'hommes qui sourient des lèvres tandis que leurs yeux calculent ; je connais cette sorte d'homme aussi bien que mon propre reflet dans le miroir. Il servira l'empire avec loyauté, je n'en doute point... jusqu'au moment précis où il lui sera plus avantageux de ne point le faire. Un serpent utile n'en est pas moins un serpent. Je le garderai près de moi, le surveillant à la manière d'un homme qui surveille le câble d'un pont dont il n'est pas certain qu'il tiendra."
 mumakan.0003.a: "Vos paroles sont aussi lisses que vos soies, mais mes yeux demeurent toujours ouverts."
 mumakan.0003.b: "Un homme d'un tel esprit 'fraternel' mérite une place de choix à mes côtés."

 mumakan.0004.t: "Échos de résistance"
 mumakan.0004.desc: "Les dépêches du gouverneur arrivent à présent en un flot régulier : des embuscades sur la route d'approvisionnement orientale, des anciens de villages qui se taisent lorsque les soldats les questionnent, et un magistrat retrouvé mort dans un fossé aux abords de [GetTitleByKey('c_korlan').GetNameNoTier]. Nul témoin, nul suspect, et tout un quartier qui prétend n'avoir rien entendu. Je n'en suis point surpris ; je ne les en estimerais guère s'ils s'étaient simplement pliés et avaient tout oublié. Un peuple qui a combattu aussi longtemps, qui a tant saigné pour une république qui lui donnait quelque chose en quoi croire, ne dépose point son orgueil avec ses armes. L'orgueil, une fois ravalé, empoisonne de l'intérieur.\n\nLa réponse de mon oncle à cela aurait été simple, brutale, et efficace à court terme. Mais à long terme, elle eût engendré la même haine qui finit par le rendre ingouvernable, la même haine qui m'a légué à la fois mon héritage et mon fardeau. Je ne me léguerai point ma propre ruine de cette façon. Il est d'autres moyens de clore une guerre que par le seul tranchant du glaive."
 mumakan.0004.a: "S'ils refusent la paix, qu'ils aient une ombre qu'ils ne peuvent frapper."
 mumakan.0004.b: "Cent amis servent mieux que mille esclaves ; tendons-leur la main, non le poing."

 ### Emperor Sandamal - Magnanimity (White Peace) ###

 mumakan.0011.t: "Paix malgré tout"
 mumakan.0011.desc: "Il est une humiliation particulière à saisir quelque chose des deux mains et de le sentir se dérober juste hors de portée. On ne vous l'a point arraché ni dérobé ; il est simplement hors d'atteinte, et l'on ne peut blâmer que la distance. Je signe les termes de cette paix blanche dans une tente qui sent la boue et la toile mouillée. Je garde mon visage entièrement impassible, car le visage d'un empereur appartient à son peuple, même lorsque son cœur n'est point à la tâche.\n\nLa victoire était dans ma main. J'en percevais les contours et en flairais la promesse dans les dernières dépêches. Puis les lignes d'approvisionnement rompirent, les pluies survinrent, et les chefs du nord se mirent à m'envoyer des silences éloquents en guise de tribut. Une guerre qui dévore l'empire n'est point une victoire, je l'ai toujours su. Mais le savoir ne rend point la signature plus aisée à supporter."
 mumakan.0011.a: "Nous accepterons cette paix. Je ne régnerai point sur un royaume de cendres et d'ossements."

 mumakan.0012.t: "L'Entrevue avec Ataraka"
 mumakan.0012.desc: "J'attendais un démagogue : le genre d'homme qui s'élève sur la chaleur d'une foule et s'éteint dès qu'elle se disperse, plein de feu et de rancœur mais creux en son cœur. Ce qui s'assit en face de moi était quelque chose pour quoi je ne m'étais point préparé. C'était un homme épuisé, un homme honnête ; celui à qui son peuple avait remis un fardeau impossible et qui l'avait porté sans broncher, sans jamais avoir sollicité cette charge. Il ne triompha point, ne se rengorgea point. Il lut les termes du traité avec le soin attentif de celui qui comprend que les mots ont du poids.\n\nLorsqu'il croisa enfin mon regard, j'y vis du chagrin, non du triomphe. Je constatai que je ne pouvais le haïr pour avoir tenu ce que je n'avais pu prendre. J'ai rencontré des rois, de grands généraux et des hommes qui prétendaient croire en la justice de leur cause ; j'ai appris à me méfier d'eux tous, car la conviction est si souvent un costume porté par-dessus l'ambition. Pourtant cet homme croyait, et cela lui avait tout coûté. Je reconnus ce prix, car j'en ai payé des variantes toute ma vie. Nous nous séparâmes sans chaleur ni froideur. Aucun de nous ne parla de la compréhension silencieuse qui passa entre nous dans ce dernier instant : qu'en un autre âge, ou en un autre monde, nous aurions pu être quelque chose l'un pour l'autre que des adversaires."
 mumakan.0012.a: "Allez en paix, Ataraka. Vous avez mérité un respect que peu d'hommes recevront jamais de moi."
 mumakan.0012.b: "Notre affaire ici est conclue. N'attendez point pareille clémence si nous devions nous rencontrer à nouveau."

 mumakan.0013.t: "La Légitimité ébranlée"
 mumakan.0013.desc: "Mes sujets sont prudents lorsqu'il s'agit d'exprimer leurs velléités de dissidence. Ils l'ont toujours été, ces chefs qui fléchissent le genou tout en aiguisant leurs couteaux. Pourtant les murmures ne sont plus aussi discrets qu'autrefois, et mon ouïe demeure excellente. Les dieux ont retiré leur faveur, disent-ils. Ils prétendent que la dynastie a été pesée et trouvée insuffisante, et que le Lion de Fer est vieux et ses dents émoussées. J'ai entendu ce chant particulier sous toutes ses variations et dans tous ses registres. J'ai survécu à tout homme qui l'ait jamais entonné.\n\nLe trône tient encore parce que je tiens encore. Il est une différence fondamentale entre un revers et une défaite, c'est une distinction que ces hommes, qui n'ont jamais gouverné rien de plus vaste qu'une vallée fluviale, ne peuvent saisir. Qu'ils murmurent. Je suis encore le Lion de Fer. Ils se souviendront de cette vérité lorsque leurs murmures parviendront enfin à mes oreilles, comme ils y parviennent inévitablement."
 mumakan.0013.a: "Qu'ils grognent dans l'ombre. Ils constateront que mes griffes sont aussi acérées que jamais."
 mumakan.0013.b: "Ce n'était qu'un recul temporaire. Je leur offrirai une victoire qui fera taire toutes les langues."

 mumakan.0014.t: "Le Fardeau de la patience"
 mumakan.0014.desc: "Le tribut des chefs Nâfarati arrive en retard, puis plus léger qu'il ne devrait l'être, puis plus du tout. Les dépêches des préfets du nord prennent ce ton particulier et mesuré qui signifie qu'ils rapportent le désastre aussi doucement que possible, ils espèrent que je ne châtierai point le messager pour la nouvelle. Cette campagne devait faire taire ces hommes. Elle devait démontrer, dans le langage le plus clair qui soit, que l'empire porte plus loin que l'ambition de toute tribu ou de tout chef qui se croit au-dessus du trône.\n\nAu lieu de cela, je leur ai donné un grief et un précédent. Les hommes enhardis sont les plus dangereux. Je ne puis les combattre à présent : le trésor ne le supporterait point et l'armée a besoin de reprendre souffle. Je dois être patient. La patience a toujours été ma plus grande arme et mes chaînes les plus lourdes. Elle m'a mené jusqu'ici, et je dois lui faire confiance pour me porter plus loin. Mais je suis las, et la patience est une compagne froide sur une longue route."
 mumakan.0014.a: "Cédons à leurs conditions pour l'heure. Le coût politique de la défiance est trop élevé."
 mumakan.0014.b: "Distribuons l'or du trésor. Nous devons assurer leur silence pour préserver nos réformes."

 ### Emperor Sandamal - Defeat / Last Days ###

 mumakan.0021.t: "L'Onde du désastre"
 mumakan.0021.desc: "Défaite. Le mot repose dans mon esprit comme une pierre tombée dans une eau tranquille. Je regarde les cercles se propager à partir de lui, chacun est une conséquence que j'ai déjà commencé à calculer. La cour, les chefs, et les provinces lointaines en ressentiront tous l'onde avant même que la nouvelle ne les ait atteints. Je n'avais jamais employé ce mot pour moi-même auparavant. Pas en trente années, pas au fil d'une douzaine de campagnes, et pas durant les années d'intrigue palatiale qui auraient brisé un homme avec moins de fer dans l'échine.\n\nEt pourtant le voilà, indéniable, prononcé par un messager avec de la poussière sur ses bottes et la peur dans les yeux. Je ne puis en contester l'arithmétique. Les armées de [GetTitleByKey('e_mumakan').GetNameNoTier] ont été brisées et chassées de [GetTitleByKey('k_koronande').GetNameNoTier]. L'homme qu'on m'avait dit être un inconnu m'a vaincu. L'empire se déplace sous moi, je le sens comme un marin sent le courant changer avant que la tempête n'arrive. Tout ce que j'ai mis trente années à construire est à présent, en cet instant, en péril véritable."
 mumakan.0021.a: "Impossible !"

 mumakan.0022.t: "La Dignité du vaincu"
 mumakan.0022.desc: "Ils me conduisirent à [GetTitleByKey('c_korlan').GetNameNoTier] pour la signature. Je compris que le choix était délibéré. C'était la cité conquise, la salle de l'ennemi, la table du vainqueur. J'entrai dans cette chambre le dos droit et le visage impassible. Le visage d'un empereur appartient à son empire même dans sa pire heure, en vérité, il appartient au peuple d'autant plus dans sa pire heure. [ataraka.GetFirstName] était assis en face de moi et ne triompha point. J'avais attendu une raillerie et l'aurais presque préférée. Un homme qui triomphe est facile à mépriser, et j'avais besoin de quelque chose de simple dans cette salle.\n\n[aameda.GetFirstName] présenta les termes avec un sourire ténu et mesuré, le sourire d'un homme qui joue depuis plus longtemps que quiconque dans la pièce et qui vient de confirmer son succès. Le traité qu'ils déposèrent devant moi liait Mûmakan en cent fils à la volonté de Kôronânde pour au moins une génération. Je pleurai alors pour la première fois depuis que j'étais enfant à regarder les hommes de mon père le porter hors de la salle d'audience. Je ne pleurai point pour moi-même. Je pleurai pour l'empire et pour les fils et les filles qui devront désormais naître dans l'ombre de ce jour, ils devront trouver quelque moyen de s'y tenir droits. Je signai le parchemin, mais je ne me courbai point. Cette dernière dignité est la mienne et celle de l'empire. Nul traité en quelque langue que ce soit ne peut nous l'ôter."
 mumakan.0022.a: "L'encre est sèche, mais mon âme demeure invaincue."

 mumakan.0023.t: "La Langue du prédateur"
 mumakan.0023.desc: "La cour est devenue un lieu de voix très prudentes et d'yeux très vifs. Chacun mesure son voisin. Chacun calcule ce que la défaite signifie pour celui qui est à ses côtés et, plus important, ce qu'elle signifie pour lui-même. Même les princes impériaux ont cessé de déguiser leurs ambitions sous le mince vernis de déférence qu'exige le protocole.\n\nJe connais cette cour. J'y ai grandi comme pupille, otage et héritier de rechange que personne n'espérait voir survivre. J'en ai appris la grammaire avant d'apprendre à me raser. Je comprends le langage de l'implication, le poids d'un silence éloquent et l'utilité des offres passées par des intermédiaires pour garder les mains propres. Je sais quoi faire lorsque les charognards se rassemblent, je l'ai toujours su. La question n'est pas de savoir si je puis les gérer ; c'est de savoir si le coût de cette gestion finira par excéder le prix de l'alternative."
 mumakan.0023.a: "Faire taire la voix la plus forte s'assurera que les autres se souviennent de leur place."
 mumakan.0023.b: "Offrons-leur de vaines promesses. La cupidité est bien plus facile à gérer que l'ambition."

 mumakan.0024.t: "La Vigile de l'Empereur"
 mumakan.0024.desc: "Il est une qualité particulière dans le silence d'une cour qui a pris sa décision. J'ai appris à l'entendre étant enfant. Je l'entendis en observant le visage de mon oncle lorsqu'il croyait que personne ne le regardait. Je le vis dans les serviteurs qui se déplaçaient un peu plus vite et les gardes qui se tenaient un peu plus droits. Je l'entendis dans les portes qui se refermaient avec un peu plus de fermeté qu'il n'était nécessaire.\n\nLa cour s'est apaisée de cette manière à présent, et je sais ce que cela signifie. Je le sais parce que j'y ai survécu auparavant. J'ai survécu aux hommes qui ont tué mon père. J'ai survécu aux années de cruauté délibérée de mon oncle. J'ai survécu à toutes les campagnes, toutes les trahisons et toutes les conspirations murmurées qui se croyaient assez habiles pour atteindre le trône. Qu'ils viennent, qui qu'ils soient et quoi qu'ils aient tramé. Je suis encore le Lion de Fer. Le Lion de Fer ne cède point, ne s'incline point et ne cille point."
 mumakan.0024.a: "Je suis encore le Lion de Fer. Qu'ils mettent ma force à l'épreuve s'ils l'osent."
 mumakan.0024.b: "Doublez la garde. La confiance est un luxe que je ne puis plus me permettre."

 mumakan.0025.t: "$aameda$ présente ses hommages"
 mumakan.0025.desc: "La lame me trouve entre la troisième et la quatrième côte. C'est un coup précis, l'ouvrage d'un homme à qui l'on a indiqué exactement où frapper, car la main qui l'a engagé n'acceptait rien de moins que la perfection. Je chancelle et l'assassin me retient presque doucement. Il me dépose sur le marbre comme si c'était une courtoisie et non un meurtre.\n\nAlors que mes genoux heurtent le sol froid de ma propre chambre, je le vois. Épinglé à l'intérieur du manteau de l'homme, là où seul un mourant pourrait être assez proche pour le lire, se trouve un petit carré de soie couleur d'écume, brodé aux armes de [GetScriptedCharacterByHistoryID('lineofaamediadvisor').GetDynastyName].\n\nLe marbre est froid. L'obscurité n'est pas sans douceur."
 mumakan.0025.a: "Ainsi s'achève le Lion de Fer..."

 mumakan.0026.t: "L'Ombre du Lion de Fer"
 mumakan.0026.desc: "[sandamal.GetFirstName] est mort. L'empire, qui tendit chaque fibre de son être à sa volonté pendant trente années et se maintint uni par la force de la patience de fer de cet homme seul, découvre à présent ce dont il est fait sans lui. Les princes qui fléchissaient naguère le genou se redressent. Ils tendent la main vers ce qu'ils ont toujours convoité : le pouvoir dans sa forme la plus égoïste et la plus indolente.\n\nLes provinces lointaines se sont tues à la manière d'hommes qui attendent de voir dans quel sens le vent se fixe avant d'engager leur allégeance à quelque camp. Voici le moment. Ce ne sont ni les batailles, ni les campagnes, ni les hautes délibérations stratégiques qui nous définissent à présent. C'est ceci, ici même, le pivot sur lequel tourne l'avenir de l'empire. Qui se meut en premier se meut avec l'élan du chaos. Qui se meut en dernier hérite de ce qui reste."
 mumakan.0026.a: "L'acier tranchera la succession. Au plus fort appartient le trône."

 mumakan.0027.t: "La Libération vengeresse"
 mumakan.0027.desc: "Ils franchissent la frontière non en conquérants, car ils sont trop habiles pour cela, ils se présentent en libérateurs. Leurs bannières proclament la liberté du peuple Mûmakanil du joug d'une dynastie défaillante. Je dois admettre que la rhétorique est bien construite. C'est ce qu'ils ont toujours fait le mieux à Kôronânde, et Ataraka surtout sait donner à un mot le tranchant d'une lame.\n\nLe pari de [sandamal.GetFirstName] s'est refermé sur lui-même. L'empire qu'il cherchait à renforcer par la conquête est à présent dévoré par le peuple même qu'il n'avait pu conquérir. C'est le genre d'ironie sur lequel les historiens écriront pendant des générations, du confort que procure la distance du temps, confort qui n'est point disponible pour ceux d'entre nous qui le vivent. Je me tiens à présent au bord d'un précipice. L'empire est épuisé. Je regarde l'horizon vers la mer, et je désespère."
 mumakan.0027.a: "Ralliez les forces qui restent. L'empire ne doit point tomber !"
 mumakan.0027.b: "#N Abandonnez vos postes ! Fuyez, fuyez pour vos vies !#!"

 mumakan.0028.t: "Le Sourire de la République"
 mumakan.0028.desc: "[ataraka.GetFirstName] était presque à la porte lorsqu'il se retourna. Ce qui suivit n'était pas l'homme d'État, le héros républicain, ni l'orateur qui avait mû dix mille hommes à combattre contre un empire. C'était simplement un homme qui avait, contre tout calcul raisonnable, survécu. Il ne put tout à fait contenir la chose. Il sourit, et il leva une main.\n\nAvec l'adieu le plus magnifiquement méprisant qu'il m'eût été donné de voir en trente ans à regarder de grands hommes quitter des salles, le sauveur de Kôronânde fit ses adieux à l'empire de Mûmakan. C'était un geste d'une aisance sans effort, une ultime moquerie de la lourde et ferme dignité que j'ai passé ma vie à maintenir. Puis il fut parti, il franchit la porte et s'en fut dans la poussière, vers sa république. Je constate, à ma propre considérable surprise, que je ne puis me résoudre à le haïr pour cela."
 mumakan.0028.a: "Un ultime affront, livré avec la grâce d'un maître."

 ### Ataraka II - Miracle at Korlan (Victory) ###

 mumakan.0031.t: "Le Retournement miraculeux"
 mumakan.0031.desc: "Je ne m'étais pas permis d'imaginer cela. Pas une fois, ni dans les camps de la jungle, ni dans la longue obscurité du siège. Je n'avais pas osé, durant ces petites heures où je gisais éveillé sous le poids des morts qui m'écrasait la poitrine. La survie de la république reposait sur des décisions dont je n'étais pas certain d'être assez sage pour les prendre. Je m'étais interdit le luxe de me figurer ce moment. Le voici pourtant, et je constate que je n'ai aucun réceptacle prêt pour le contenir.\n\nQuelque chose monte en moi comme l'eau qui sourd à travers la roche, ou le soleil après des années de ciel couvert. Je crois que le mot pour cela est joie. Une joie simple, immense et presque honteuse. Je ne puis l'arrêter et ne le veux point. Nous étions en infériorité absolue. Ils ont brûlé [GetTitleByKey('c_korlan').GetNameNoTier]. Ils pensaient que nous céderions, mais nous n'avons pas cédé. D'une façon impossible et magnifique, nous avons triomphé.\n\nLa république vit. Mon peuple est sauf. Je pense aux hommes qui se sont tenus dans la boue avec moi quand il n'y avait plus aucune bonne raison de tenir. Je veux les retrouver un à un, leur serrer la main et leur dire que nous l'avons fait. Nous avons accompli la chose impossible. Je ris, je crois. Je n'en ai point honte."
 mumakan.0031.a: "La république demeure. La voie de nos ancêtres est enfin sauvée !"

 mumakan.0032.t: "L'Empereur à genoux"
 mumakan.0032.desc: "L'empereur [sandamal.GetFirstName] se dresse devant nous, abattu par nos mains au terme de cette victoire que nul n'eût osé prévoir. Ce dépouilleur en puissance de notre république n'est en rien ce que j'avais imaginé. Il se tient avec le dernier semblant de dignité qu'il lui reste, pourtant je vois la flamme dans ses yeux. Ce même feu ardent que j'ai ressenti lorsque j'ai vu [GetTitleByKey('k_koronande').GetNameNoTier] mise à sac et défaite. Un frisson de pitié pour son royaume me traverse, mais le mépris l'étouffe aussitôt.\n\nQuels que soient les bienfaits que cet homme ait pu dispenser aux siens, il a laissé mon pays et ma famille en ruines. À mon côté, [aameda.GetFirstName] présente le traité. C'est un document de contrainte et de remboursement intégral pour chaque sacrilège commis. Il sera acquitté par cette génération et par la suivante. [sandamal.GetFirstNameNoTooltip] demeure immobile comme un vieux chêne. Même lorsque des larmes trahissent ses traits, il signe le parchemin. Il se redresse une dernière fois avant que sa dignité ne soit épuisée. [aameda.GetFirstNameNoTooltip] esquisse simplement un sourire bref et froid. Nulle pitié là-dedans, seulement l'attente. L'empire est signé et versé aux annales de l'histoire."
 mumakan.0032.a: "Quelque chose de grande valeur a été perdu en ce jour." # Fires 0034
 mumakan.0032.b: "Il n'est que la relique d'un âge mourant. Rien de précieux n'a péri." # Fires 0033 and 0028

 mumakan.0033.t: "La Dette des ravagés"
 mumakan.0033.desc: "J'étais prêt à laisser l'empereur brisé à quelque désastre provincial qui l'attendait. Puis j'ai repensé à ce qu'il a fait à mon pays. J'ai repensé à la destruction insensée et débridée. J'ai pensé aux choses que j'ai été contraint de faire, et à l'état de mon peuple. Brisé et saignant. Les pères, les mères et les enfants innocents, tous engloutis par la gueule d'une désolation qu'il nous a imposée. Un mépris plus grand que tout ce que j'ai jamais éprouvé s'empare soudain de moi. Il est plus lourd que ma joie et plus tranchant que mon deuil.\n\nJe me retourne, et j'arbore le sourire le plus outrancier et le plus cinglant de toute mon existence. Je n'ai plus aucune utilité pour le masque diplomatique ni pour les mots mesurés de l'homme d'État. Nous avons gagné. Il a naguère volé notre fierté, et je lui ai désormais montré la réalité de sa situation présente. Il ne peut que suffoquer dans le silence et la stupeur."
 mumakan.0033.a: "Qu'il s'étouffe de son propre silence." # Fires 0034

 mumakan.0034.t: "L'Œuvre des vivants"
 mumakan.0034.desc: "[GetTitleByKey('c_korlan').GetNameNoTier] gît en ruines. Le grand port est encore encombré des côtes noircies de sa flotte calcinée. Les palais sont éventrés jusqu'aux os et les rues portent ces cicatrices qui ne guérissent pas en une seule génération. La tâche qui s'ouvre devant moi est colossale et je ne l'insulterai pas en prétendant le contraire.\n\nCependant, je suis en vie pour l'affronter. Mon peuple est en vie. La république est en vie. Meurtrie au-delà de toute reconnaissance et dépouillée jusqu'à quelque chose de presque méconnaissable, mais elle vit. Tout ce qui vit peut être rebâti. Je contemple cette vérité non avec effroi, mais avec quelque chose qui ressemble fort à de la faim. J'ai passé des années à combattre pour la survie de la république. Désormais, je me bats enfin pour son épanouissement. Pierre à pierre, loi par loi, navire après navire. Je ne suis point las. Je retrousse mes manches, et j'en suis heureux."
 mumakan.0034.a: "Versons tout dans la cité. Nous devons consolider nos murailles et notre avenir."
 mumakan.0034.b: "Rebâtissons la flotte en premier. Notre commerce est le sang qui financera tout le reste."

 mumakan.0035.t: "Le Creuset de la liberté"
 mumakan.0035.desc: "La nouvelle arrive que [sandamal.GetFirstName] est mort. [GetTitleByKey('e_mumakan').GetNameNoTier], cette grande et implacable machine, a commencé à se déchirer de l'intérieur. [aameda.GetFirstName] surgit à mon coude comme il le fait toujours lorsqu'une porte s'ouvre. Il argumente de cette voix précisément calibrée qui est la sienne que l'heure est venue. Il entrevoit la véritable chance de la république. Il veut que nous portions nos prétentions au cœur des terres de l'empire pendant qu'il est trop occupé à saigner pour résister.\n\nJe l'écoute attentivement, car il n'a pas tort sur l'opportunité. La joie de la victoire n'a point fait de moi un insensé. Puis je regarde [GetTitleByKey('c_korlan').GetNameNoTier] qui se reconstruit. Je regarde vers l'est, en direction de la frontière, et je pense aux gens de Mûmakan. Ce sont des laboureurs, des artisans, des mères avec leurs enfants sur la hanche. Ils n'ont point choisi ce nouvel empereur. Ils n'ont pas choisi de vivre dans les ténèbres, pas plus que mon peuple n'a choisi d'être envahi. Je me pose la question pour laquelle j'ai bâti cette république. Le peuple ne mérite-t-il point de se gouverner lui-même ? Si j'ai bravé des chances impossibles parce que je croyais que nos gens devaient avoir ce droit, pourquoi ne pas l'étendre à tous sous cette lumière dorée ? Le grand conseil délibère devant moi. Des voix réclament la paix, d'autres la guerre. Je monte à la tribune et j'ajoute ma voix à la cacophonie."
 mumakan.0035.a: "Nous leur apporterons la liberté. Que l'empire se brise et que les peuples se lèvent."
 mumakan.0035.b: "La vengeance est le seul langage qu'ils comprennent. Nous deviendrons les maîtres désormais."
 mumakan.0035.b.tt: "La république sera réorganisée pour former le premier empire Kôronânde" #Max Cyn
 mumakan.0035.c: "Nous avons assez saigné. Qu'ils se consument entre eux pendant que nous regardons aux nôtres."

 ### Ataraka II - White Peace ###

 mumakan.0041.t: "Le Prix de la survie"
 mumakan.0041.desc: "La guerre se termine sans résolution. Ni triomphe ni désastre. Seulement le long soupir de deux peuples épuisés qui reculent du bord du précipice. [GetTitleByKey('k_koronande').GetNameNoTier] demeure libre. Elle est meurtrie et pillée. La moitié de ses tours est abattue et ses rues ne sont encore que des carcasses brûlées. La lumière a été voilée par le sang de ses fils, pourtant elle est libre.\n\nElle respire, et nous respirons tous avec elle. Nous ne sommes plus sous le joug de la guerre. L'aube est enfin venue, et pour cette fois elle porte l'espoir. Nous, les vivants, avons remporté un prix plus précieux dans la paix que tout ce qu'on eût jamais pu trouver dans la guerre. Nous avons nos vies. Nous avons notre liberté. Nous avons survécu."
 mumakan.0041.a: "Survivre est déjà une victoire. Que la guérison commence."

 mumakan.0042.t: "La Reconnaissance des Pairs"
 mumakan.0042.desc: "J'étais venu à cette rencontre en m'attendant à un monstre. Un Seigneur Sombre, ou quelque roi-tyran régnant sur une armée d'esclaves. L'histoire est rarement aussi simple. Devant moi se tient un homme. L'empereur est une âme fatiguée, enchaînée par le devoir. C'est un homme de qualité et de principes, qui se trouve pourtant de l'autre côté d'un fleuve de sang.\n\nPlus nous parlons, plus je me surprends à le respecter. C'est une réalisation amère, quand tant de douleur a été achetée pour si peu. Nous avons tous deux traversé la tempête. Désormais, enfin, aucun de nous n'est le maître. Nous nous regardons non comme vainqueur et vaincu, mais comme égaux. Le poids de nos royaumes respectifs pèse lourdement sur nos deux épaules. En cet instant de silence, l'inimitié du passé ressemble à un rêve lointain et épuisant."
 mumakan.0042.a: "Bâtissons une paix durable. Nous devons regarder ensemble vers l'avenir."
 mumakan.0042.b: "Je respecte l'homme, mais nos royaumes s'affronteront de nouveau. Nous devons tenir ferme."

 mumakan.0043.t: "S'Élever des cendres"
 mumakan.0043.desc: "[GetTitleByKey('c_korlan').GetNameNoTier] doit être rebâtie. Le port, les marchés et les cours de justice font tous partie d'une architecture complexe d'une civilisation qui a failli être réduite à néant. Durant de terribles mois, il sembla que tout allait être perdu. J'ai bâti toute ma carrière sur des choses que ceux qui avaient plus de prudence et moins de conviction prétendaient impossibles. J'ai toujours trouvé un moyen de leur prouver qu'ils avaient tort.\n\nLa république n'a point survécu à cette guerre pour être laissée inachevée. Je ne m'arrêterai point maintenant. Nous restaurerons la beauté et la fonction de notre capitale. Chaque pierre posée est un témoignage de notre survie."
 mumakan.0043.a: "Restaurons les murailles. Notre sécurité est le fondement de notre liberté."
 mumakan.0043.b: "Restaurons les marchés. La prospérité est la plus belle des revanches."

 mumakan.0044.t: "La Tempête qui s'annonce"
 mumakan.0044.desc: "[aameda.GetFirstName] m'écarte à l'instant précis où je préférerais ne pas être dérangé. Il parle de cette voix basse et posée qu'il réserve aux vérités qu'il n'a pas envie de devoir délivrer. Il dit que la paix ne fut qu'un simple acte de commodité plutôt que de conviction. Il prévient que [sandamal.GetFirstName] se réapprovisionne déjà et observe notre reconstruction avec l'attention patiente d'un homme qui a l'intention de revenir. Il me dit que nous devons bâtir notre puissance maintenant, pendant qu'il nous reste encore du temps.\n\nChaque instinct que je possède se rebiffe contre l'idée de le croire. La guerre est finie et les morts sont à peine enterrés. Je suis las jusqu'aux os d'une façon que je n'aurais pas cru possible. Pourtant j'ai appris à trop grand prix que [aameda.GetFirstName] ne parle bas que lorsqu'il est le plus certain. Je n'ai jamais profité de le congédier quand il a cet air-là dans les yeux."
 mumakan.0044.a: "Il a raison. Nous devons forger une armée digne de la république."
 mumakan.0044.b: "Non. Nous devons poursuivre la réconciliation. Rédigez une lettre à l'empereur."

 mumakan.0045.t: "La Bataille finale"
 mumakan.0045.desc: "Ils sont revenus. Une marée noire de bannières et d'étendards se dresse à l'horizon comme une tempête qui s'amasse. Les longues colonnes des soldats de [GetTitleByKey('e_mumakan').GetNameNoTier] progressent à travers les cols orientaux. C'est tout ce qu'[aameda.GetFirstName] m'avait annoncé, et davantage encore. Tout ce que nous avons bâti depuis le sac de la cité tient désormais en balance. Chaque muraille arrachée aux décombres et chaque navire lancé dans un espoir obstiné ont mené à cet instant. Chaque fils que la république a envoyé aux champs d'entraînement pour y saigner et suer a été préparé pour ce seul jour sur cette seule étendue de sol.\n\nNous avons fait tout ce qu'il était possible de faire. Les fils de [GetTitleByKey('k_koronande').GetNameNoTier] sont à leurs postes. Ils sont prêts et savent exactement ce qu'ils défendent. Quoi qu'il advienne sera décidé ici, et j'y serai au premier rang. J'en ai fini de décider du destin de mon peuple derrière des murailles de pierre. L'heure de la délibération est révolue. L'heure de l'acier a sonné."
 mumakan.0045.a: "Appelez les fils de la république ! Qu'ils se lèvent comme un seul homme !"
 mumakan.0045.b: "Lâchez les Mûmaks ! Ils ne passeront point !" #NO PASARÁN!

 ## Ataraka II - War Loss ##

 mumakan.0051.t: "La Fin de la République"
 mumakan.0051.desc: "Tout est accompli. Ainsi ne s’achèvent point les grandes choses dans les chants : nul dernier sursaut de défi, nul nom digne de mémoire. Non, la fin survint comme elle advient le plus souvent en ce monde : lente, implacable, dénuée de toute gloire. Jour après jour, l’inévitable se resserra, jusqu’à l’aube où les portes cédèrent enfin.\n\nLa république n’est plus. Elle fut l’œuvre à laquelle j’ai voué chaque heure de ma vie, la cause pour laquelle j’ai pris les armes, l’ultime foi qui demeurait lorsque le monde sombrait dans l’ombre. Et me voici en fuite. J’avais juré de ne jamais céder à pareille honte et pourtant je fuis, le visage battu par les embruns glacés.\n\nDerrière moi, à l’horizon, [GetTitleByKey('c_korlan').GetNameNoTier] se consume. Ses tours, ses cours, son port, tout est livré aux flammes. Même la rue où, il y a trente ans, je plaidai ma première cause est dévorée par l’incendie. Je n’emporte que ce qui subsiste : une poignée d’âmes fidèles et les braises d’une grandeur jadis éclatante.\n\nJe ne me retourne plus. Car si je le faisais, je sais que je ne pourrais poursuivre ma route."
 mumakan.0051.a: "Nous avons survécu, et tout le reste a péri."
 mumakan.0051.a.tt: "#N Toutes les réserves sont épuisées#!"

 mumakan.0052.t: "Le Dernier carré"
 mumakan.0052.desc: "Voici tout ce qui nous reste. Les dernières pièces arrachées à des trésors vidés, et les derniers hommes qui répondent encore à la bannière de la république. Mille raisons les poussent à nous abandonner, pourtant ils demeurent. [aameda.GetFirstName] a choisi une autre voie. Quant à moi, je mènerai les quelques forces qui me restent dans la profondeur verte et obscure.\n\nJe fuis, et ne m’arrête point. S’arrêter est chose que je n’ai point encore apprise, et que je n’apprendrai pas en ce jour.\n\nLa république gît, abattue et enchaînée. Son sang imprègne les mers du sud, de [GetTitleByKey('k_pel').GetNameNoTier] jusqu’à [GetTitleByKey('e_khy').GetNameNoTier]. Je ne suis point dupe : la bataille est perdue. Pourtant, mon pays ne portera jamais ses chaînes en silence. Jamais il ne sera véritablement conquis tant que vivent des [GetCultureByKey('koronandi').GetName].\n\nNous avons trouvé refuge dans une clairière dissimulée, au cœur touffu de la jungle. Là, la canopée épaisse dérobe nos feux aux éclaireurs de l’empire. Nous jaugeons notre sort, et comprenons enfin la vérité de notre nouvelle existence."
 mumakan.0052.a: "Nous avons à peine sauvé nos vies."
 mumakan.0052.a.tt: "#N Nulle réserve ne subsiste, nous combattons à mains nues.#!"
 mumakan.0052.b: "Nous avons fui, mais non sans blessures."
 mumakan.0052.b.tt: "#N Nulle réserve ne subsiste, nous combattons à mains nues.#!"
 mumakan.0052.c: "Nous avons fui, avec pour tout bien nos seules mains."
 mumakan.0052.c.tt: "#N Nulle réserve ne subsiste, nous combattons à mains nues.#!"
 mumakan.0052.d: "Une poignée de miliciens, voilà tout ce qu’il nous reste."
 mumakan.0052.d.tt: "#N Une poignée de miliciens, voilà tout ce qu’il nous reste.#!"
 mumakan.0052.e: "Une petite troupe se rallie encore à notre bannière."
 mumakan.0052.e.tt: "#N Une petite troupe se rallie encore à notre bannière.#!"
 mumakan.0052.f: "Une garnison digne de ce nom peut être levée."
 mumakan.0052.f.tt: "#N Une garnison digne de ce nom peut être levée.#!"
 mumakan.0052.g: "Assez d’armes pour soutenir une défense crédible."
 mumakan.0052.g.tt: "#N Assez d’armes pour soutenir une défense crédible.#!"
 mumakan.0052.h: "Une véritable armée commence à prendre forme."
 mumakan.0052.h.tt: "#N Une véritable armée commence à prendre forme.#!"
 mumakan.0052.i: "Nos réserves cachées révèlent une force redoutable."
 mumakan.0052.i.tt: "#N Nos réserves cachées révèlent une force redoutable.#!"
 mumakan.0052.j: "Les Mûmakil sont caparaçonnés, et la garde se rassemble en nombre."
 mumakan.0052.j.tt: "#N Les Mûmakil sont caparaçonnés, et la garde se rassemble en nombre.#!"
 mumakan.0052.k: "Chaque citoyen a pris les armes, la nation tout entière entre en guerre."
 mumakan.0052.k.tt: "#N Chaque citoyen a pris les armes, la nation tout entière entre en guerre.#!"

 ### General Mase - In the Emperor's Name ###
 mumakan.0071.t: "La Conclusion inéluctable"
 mumakan.0071.desc: "Le cœur des [GetCultureByKey('koronandi').GetName] ayant été réduit à néant, il ne pouvait en être autrement : leur sang s'est appauvri et leur résolution a fini par s'étioler. La conclusion inéluctable s'est désormais accomplie. Cette mascarade de guerre est terminée. Nous avons pris la victoire qui nous était due et réclamé ce qui nous était redevable. Commence à présent la tâche de rebâtir ce port en instrument de prospérité pour l'empire. Cette cité ne sera plus une sangsue se nourrissant de nos réserves. Les gros seigneurs-marchands ne pourront plus sucer [GetTitleByKey('e_mumakan').GetName] jusqu'à l'os pour s'engraisser des richesses mal acquises dont ils sont avides.\n\nMaintenant que nous avons repris tout ce qu'ils avaient dérobé, mes compagnons d'armes sont rentrés chez eux jouir des fruits de leur grande peine. Il me reste cependant un devoir à accomplir. C'est un grand honneur et un lourd fardeau que d'être les yeux et les mains de notre illustre empereur [GetScriptedCharacterByHistoryID('lineofmamakil125').GetFirstName]. En tant que premier gouverneur impérial de ces terres, je dois maintenir la paix du royaume. Je dois les préparer à rejoindre notre glorieux empire. Je regarde vers l'avenir et je fais le compte de ceux qui demeurent pour m'assister dans cette tâche finale."
 mumakan.0071.a: "La guerre est gagnée. Désormais nous gagnerons la paix."

 mumakan.0072.t: "L'Entrée dans les portes de Kôronânde"
 mumakan.0072.desc: "J'ai pris bien des villes. Je n'en ai jamais chevauché à travers une telle que celle-ci. Je ne suis pas un homme de passage. Je ne suis pas un conquérant qui repartira avant que la fumée ne se soit dissipée. Je suis l'homme qui sera encore là quand les saisons tourneront. Le peuple aligné dans les rues regarde en silence. Ce n'est pas le silence d'une armée vaincue. Ce n'est pas le silence d'un accueil. C'est le silence particulier d'un peuple qui a tout perdu. Il attend avec la patience attentive de ceux qui ont appris que la patience est tout ce qu'il leur reste. Il attend de voir ce qui vient ensuite.\n\nJe fais l'inventaire du soldat dans ma tête. Les portes ont besoin d'être réparées. La muraille du port présente une brèche large à y faire défiler un régiment. Les greniers ont été vidés. Puis un enfant dans la foule accroche mon regard. Il a peut-être sept ans et tient la main d'une femme. Il me regarde avec une expression que je ne saurais tout à fait déchiffrer et que je n'oublierai pas de sitôt. Quelque chose se déplace dans ma poitrine. Je range l'instant et je poursuis ma route. Il y a de l'ouvrage."
 mumakan.0072.a: "Évaluer les dégâts. Nous devons rétablir l'ordre immédiatement."
 mumakan.0072.b: "Laissez les hommes célébrer. Ils ont mérité leur butin."

 mumakan.0073.t: "L'Architecte des Ombres"
 mumakan.0073.desc: "[aameda.GetFirstName] apparaît précisément au moment et précisément à l'endroit où il est le plus utile. Il porte l'expression d'un homme qui attendait ces présentations depuis quelque temps et les trouve agréablement tardives. Il navigue dans les ruines de la vie politique de la république avec une aisance qui serait remarquable chez un homme qui l'aurait étudiée pendant des années. Chez un homme qui a contribué à la bâtir, c'est autre chose entièrement. Il m'offre ses services et ses nombreux contacts. Il me présente les familles survivantes de marchands et de prêteurs comme mille fils de soie et de fer, tous passant par ses mains. Il promet que si nous alignons nos intérêts, la cité répondra au moindre de mes désirs.\n\nJ'ai connu des hommes comme [aameda.GetFirstNameNoTooltip] dans chaque armée où j'ai servi. Ils sont affûtés et indispensables, mais ils ne se rallient à aucun drapeau qu'au leur propre. J'ai servi sous des hommes comme lui, ce qui est précisément ce que je m'étais juré de ne jamais refaire. Je ne suis pas convaincu qu'il mérite ma confiance. En revanche, je ne suis pas convaincu d'avoir le luxe de cette conviction."
 mumakan.0073.a: "Sa connaissance est trop précieuse pour être gaspillée. Faisons-le entrer dans le rang."
 mumakan.0073.b: "C'est un transfuge et une vipère. Tenons-le à distance respectable."

 mumakan.0074.t: "Le Retrait silencieux"
 mumakan.0074.desc: "Il s'incline. C'est une révérence parfaite et posée, du genre qu'il faut des années de pratique pour rendre naturelle. Il se retire sans argumenter. Son silence me trouble davantage qu'une protestation ne l'aurait fait. Ses yeux sont calmes, sombres et vaguement amusés avant qu'il ne se détourne. Il ressemble à un homme qui a déjà entendu cette réponse particulière et se trouve déjà à plusieurs coups d'avance.\n\nDans cet ultime instant, il m'a regardé comme un artisan regarde un outil qui porte une fêlure. Ce n'était pas tout à fait du mépris. C'était la déception précise d'un professionnel confronté à un problème qu'il avait prévu. Il quitte ma présence aussi silencieusement qu'une ombre qui recule devant le soleil. J'ai fait mon choix. J'espère seulement ne pas vivre assez longtemps pour voir le jour où il décidera que je ne suis plus un instrument utile à ses desseins."
 mumakan.0074.a: "Bon débarras."

 mumakan.0075.t: "Le Prix de l'Ordre"
 mumakan.0075.desc: "Il sourit. Ce n'est pas un geste chaleureux. Je ne crois pas que la chaleur soit un registre accessible à un homme comme lui. Pour sceller l'arrangement, il offre un cadeau. Il fournit un nom, une adresse et un homme qui constitue simultanément un appât utile pour le réseau de résistance et un ennemi personnel à lui. Il est entièrement transparent sur le fait qu'il tirera de cet arrangement des bénéfices directs et considérables.\n\nJe constate, non sans surprise, que cela me inspire du respect. Il y a une honnêteté chez l'homme qui ne prétend pas que ses intérêts et les miens sont la même chose, mais qui propose néanmoins un échange équitable. Je sais au moins exactement ce que je paie. Je l'écoute prononcer le nom. Je sais où nous devons commencer. La 'soie et le fer' qu'il m'avait promis sont désormais dans mes mains. Je verrai comme ils tranchent."
 mumakan.0075.a: "Alors commençons. Montre-moi où se terrent les rats."

 mumakan.0076.t: "L'Ennemi invisible"
 mumakan.0076.desc: "En dépit de toutes les mesures prises, les [GetCultureByKey('koronandi').GetName] refusent de se soumettre. Les patrouilles doublées, les couvre-feux et les lignes d'approvisionnement sécurisées en trois points séparés ne suffisent pas. Ils gagnent en audace. Des soldats sont retrouvés morts à leurs postes dans les heures grises du matin. Des convois de ravitaillement brûlent sur des routes qui étaient dégagées et tranquilles la veille encore. Trois hommes à qui je faisais confiance pour administrer les districts extérieurs ont simplement cessé de répondre aux dépêches.\n\nJ'ai mené des guerres difficiles. J'ai combattu sur des terrains ardus contre des chefs habiles qui avaient toutes les raisons de l'emporter. Pourtant je n'ai jamais combattu un peuple auparavant. Je n'ai jamais fait face à une nation tout entière sur sa propre terre, où chaque colline, chaque ruelle et chaque visage familier est un avantage qu'ils n'ont pas eu besoin de planifier. Je commence à comprendre pourquoi Sandamal m'avait promis une gouvernance plutôt qu'une simple victoire. C'est une bataille dont les lignes de front sont partout et dont l'ennemi est chacun."
 mumakan.0076.a: "Doubler les patrouilles. Nous devons maintenir l'ordre sans perdre notre discipline."
 mumakan.0076.b: "Peut-être [aameda.GetFirstNameNoTooltip] avait-il raison. Je ne puis régler cela par le seul acier."

 mumakan.0077.t: "Le Prix de l'orgueil"
 mumakan.0077.desc: "[aameda.GetFirstName] apparaît comme si la simple pensée d'être nécessaire suffisait à le convoquer. Il arbore un sourire entendu que j'en suis venu à détester activement. C'est le sourire d'un homme qui a attendu patiemment que la réalité fasse son argument à sa place. Il offre de nouveau ses services avec la bienveillance tranquille de quelqu'un qui n'a jamais véritablement douté de l'issue de cet entretien.\n\nJe le regarde un long moment. Je regarde sa personne soignée et composée. Je vois les robes impeccables et les mains posées. Puis je pense au soldat que j'ai perdu sur la route de [GetTitleByKey('c_korlan').GetNameNoTier] il y a deux nuits. Je m'étais fait un point d'honneur d'apprendre le nom de ce garçon, parce que je crois que c'est le moins qu'un chef doive à un mort. Je pense à mon orgueil et à ce qu'il m'a déjà coûté. Je pense à ce qu'il pourrait m'en coûter encore si je continue à ignorer les ombres de cette cité. Le soldat est mort pour mon entêtement. Je ne puis en laisser mourir un autre pour la même raison."
 mumakan.0077.a: "Je ne m'agenouillerai pas devant un transfuge. Hors de ma vue."
 mumakan.0077.b: "Aide-moi à en finir avec ça, espèce de vipère insupportable."

 mumakan.0078.t: "Les Adieux du maniganceur"
 mumakan.0078.desc: "[aameda.GetFirstName] hausse les épaules. C'est un haussement d'épaules magnifique, celui d'un homme qui a reçu cette réponse dans cent salles différentes de cent chefs différents et trouve chaque version également prévisible. Il part sans insister, parce que des hommes comme lui savent qu'insister est rarement nécessaire. Sur le seuil, il s'arrête. Sans se retourner, il formule une observation à voix basse, du ton d'un précepteur reprenant un élève prometteur mais obstiné.\n\nIl me dit que l'orgueil fait un piêtre bouclier contre les couteaux dans l'ombre. C'est une vérité que je sais déjà. La connaître ne rend pas plus aisé de le regarder s'en aller. Il me laisse à mes cartes et à mes tallies de morts. Je suis un soldat de l'empire et j'ai mes ordres. Si cette cité doit être tenue par le seul glaive, qu'il en soit ainsi. J'affûterai la lame jusqu'à ce qu'elle sécurise les rues ou qu'elle se brise entre mes mains."
 mumakan.0078.a: "Qu'il complote. Je tiendrai cette cité par le glaive seul."

 mumakan.0079.t: "Une Efficacité amère"
 mumakan.0079.desc: "Son suffisance est, si possible, pire que le précédent débâcle. C'est une suffisance posée et architecturale qui est manifestement porteuse depuis des années. Pourtant, en quelques jours seulement après notre accord, les embuscades commencent à se raréfier. Les grandes cessent en premier, puis les plus petites, jusqu'à ce que les routes retrouvent un calme qu'elles n'avaient plus connu depuis mon entrée dans la cité. Son renseignement se meut à travers Kôronânde comme l'eau dans la vieille pierre. Il trouve chaque fissure, chaque joint, chaque recoin obscur où un homme pourrait se terrer avant de devenir un problème. Il se meut plus vite que tout ce que j'aurais pu bâtir de toutes pièces avec le double des ressources.\n\nJe n'aime pas ce que cela implique sur celui qui connaît véritablement cette cité. Je n'aime pas ce que cela signifie pour celui qui la gouverne réellement. Cependant, j'ai toujours été un homme qui respecte les résultats, et ces résultats sont indéniables. Pour l'heure, nous travaillons ensemble. Je savourerai le silence sur les routes, même si je dois endurer la présence de l'homme qui l'a acheté pour moi."
 mumakan.0079.a: "Les résultats parlent d'eux-mêmes. Nous travaillerons ensemble pour l'instant."

 ### General Mase - White Peace ###

 mumakan.0081.t: "Le Mandat creux"
 mumakan.0081.desc: "L'ordre arrive du trône. Je dois accepter la paix blanche. La campagne se termine et les gains sont abandonnés. Le sang, les années et l'incendie de [GetTitleByKey('c_korlan').GetNameNoTier] sont rendus stratégiquement sans poids. Ce sont les calculs changeants d'un empire que j'ai servi toute ma vie sans jamais être véritablement invité à le comprendre.\n\nJe suis un soldat. Je l'ai toujours été, et un soldat obéit à son empereur. J'obéirai au mien. Je plie la dépêche et donne l'ordre de cesser le combat. Je ne laisse pas mon expression changer, parce que c'est aussi quelque chose que font les soldats. Cependant, l'obéissance et la dignité sont deux choses distinctes. Debout ici avec cet ordre entre les mains, je ne trouve pas aisément la seconde. Je me demande si mon empereur comprend ce qu'il m'a demandé d'avaler. Je conclus qu'il ne le comprend probablement pas. J'ai gagné la guerre pour qu'on me dise que la victoire était une erreur."
 mumakan.0081.a: "Je sers le trône et non mon amour-propre. J'obéirai."

 mumakan.0082.t: "Une Récompense agitée"
 mumakan.0082.desc: "L'Empereur est généreux. En lieu et place de la gouvernance qu'il m'avait promise, il m'offre de la terre. Un domaine tranquille dans une province paisible. Un endroit où je pourrais bâtir une maison et planter des cultures. Où je pourrais cesser enfin de me réveiller avant l'aube pour calculer des dispositions de troupes. Je comprends que c'est une offre équitable. Il n'y a rien de mal à la terre. La terre dure et la terre est réelle. J'ai assez dormi sur le sol froid pour connaître la valeur d'un toit.\n\nMais je ne suis pas né pour un toit. Je suis né dans les ruisseaux d'Amarû. Je m'en suis extirpé avec les seuls outils dont je disposais. Chaque pas que j'ai fait depuis lors a été en avant. L'idée de faire demi-tour maintenant et d'appeler ça une vie pèse dans ma poitrine comme une pierre que je ne puis déplacer. Le glaive est la seule chose que j'aie jamais véritablement comprise. Je ne crois pas en avoir terminé avec lui. Un soldat sans guerre n'est qu'un homme qui attend de s'éteindre. Je ne suis pas prêt à m'éteindre."
 mumakan.0082.a: "Je suis un soldat, pas un laboureur. Je refuse de m'établir."
 mumakan.0082.b: "J'accepte la terre. Cette guerre est terminée pour moi."

 ### General Mase - Defeat ###

 mumakan.0091.t: "Une Défaite foudroyante"
 mumakan.0091.desc: "Mon armée est brisée. Ce n'est pas quelque retraite tactique ordonnée qu'on pourrait habiller en repositionnement. Elle est véritablement brisée. Voilà à quoi ressemblent les choses quand elles ont été frappées assez fort et assez souvent pour qu'il n'y ait plus moyen de les reformer. Les [GetCultureByKey('koronandi').GetName] ont fait cela. Ils sont en guenilles et à demi affamés. Ce sont les défenseurs aux yeux creux d'une république qui n'avait aucune raison de vaincre. Pourtant ils ont vaincu quand même.\n\nIls ont tenu par quelque chose que je comprends mieux que je ne le voudrais. C'est l'entêtement particulier d'un peuple qui a décidé qu'il ne sera pas celui qui laisse tout finir. La gouvernance promise n'est plus que fumée. Je me tenais au bord de la plus grande chose que j'allais jamais accomplir. Un peuple trop obstiné pour admettre qu'il était vaincu a tendu le bras et me l'a arrachée. Je le respecte. Je le respecte comme on respecte un incendie. Totalement et depuis ce qu'il reste d'une distance sûre."
 mumakan.0091.a: "En retraite, et regroupement. Nous trouverons peut-être encore notre assise."

 mumakan.0092.t: "Le Verdict inconnu"
 mumakan.0092.desc: "La longue marche du retour s'ouvre devant moi. Elle a la saveur d'une sentence lue à voix haute. Chaque pas est un mot et la destination est un verdict que je ne puis encore connaître. Je pense à Sandamal. Il m'a confié la grande tâche de son règne et je dois trouver le moyen de me présenter devant lui quand cette marche sera achevée. Je pense aux hommes qui m'ont suivi jusqu'ici et qui ne me suivent pas en retour. Je récite leurs noms à voix basse en marchant. J'ai toujours cru que c'est le moins qu'un chef puisse faire pour ses morts.\n\nJe ne saurais dire ce qui m'attend au bout de ce chemin. Ce sera peut-être le jugement ou la clémence. Peut-être un tribunal ou une retraite courtoise dans l'obscurité. Les politiques de l'empire ont toujours été au-dessus de mon altitude particulière. Peu importe. J'ai affronté pire que l'incertitude. Je l'ai toujours affrontée de la même façon. Un pas à la fois, les yeux en avant, jusqu'à ce que ce soit terminé."
 mumakan.0092.a: "J'affronterai le jugement qui m'attend. Je sers le trône."
 mumakan.0092.b: "Je ne serai pas un agneau sacrifié. La frontière est vaste."

 mumakan.0093.t: "Le Trône vide"
 mumakan.0093.desc: "Sandamal est mort. L'empire se fissure le long de chaque couture à la fois. Cette immense et apparemment indestructible machine de guerre défaille. Chaque seigneur ambitieux de Mûmakan découvre soudainement que la loyauté est un concept flexible quand le trône est vacant. Chaque bras armé vaut son pesant d'or. Pour peut-être la première fois de ma carrière, je ne suis pas simplement utile. Je suis précieux. Il y a une différence entre ces deux choses qu'un homme d'Amarû apprend à sentir dans ses os.\n\nJe regarde les hommes qui me restent. Ils sont marqués par la bataille et loyaux au-delà de toute raison. Ils attendent ma parole comme ils l'ont toujours attendue. Je fais le compte de ce que je tiens réellement. C'est plus qu'il n'y paraît et moins qu'il ne m'en faudrait. C'est peut-être suffisant. J'ai passé toute ma vie à être utile à des hommes puissants. Il est peut-être temps de découvrir si je suis moi-même un homme puissant. Je me suis déjà extirpé des ténèbres. Je puis le faire encore."
 mumakan.0093.a: "Je sers le trône. Ma loyauté envers la charge demeure."
 mumakan.0093.b: "Laissons les princes se saigner mutuellement. Nous attendrons que la poussière retombe."
 mumakan.0093.c: "Un général avec une armée n'a nul besoin d'un empereur. Je revendiquerai ma propre terre."

 ### Ataraka Initial Story Chain ###
 # mumakan.0110 The Fall of Kôrlan from Ataraka's perspective
 # Aameda is with you as you look out into the bay, headed toward the inland fortress of Tânande.
 # 3 different responses, all lead to Aameda responding.

 mumakan.0110.t: "La Chute de Kôrlan"
 mumakan.0110.desc: "#Italic Le matin se lève, et l’aube apporte#! #Bold la mort.#!\n\nTu la vois, vacillante, telle une lune de sang au-dessus de la baie, aussi nette à l’aube qu’au cœur de la nuit. La flamme s’élève sur Kôrlan, vaste et terrible, et un silence livide, noir et sans vie, l’enveloppe. Elle brûle, et ton peuple brûle avec elle : ta république, ton fardeau, ton honneur, ton espérance.\n\nElle brûle comme tes yeux. Elle brûle comme ton cœur.\n\nLorsque le vent gonfle la voile de ton frêle esquif et t’apporte l’odeur de fumée, d’épices consumées, de chair brûlée, alors tu sais.\n\nL’œuvre de cent générations livrée aux flammes. Des millénaires de lois, de conseils et d’échanges ; les dix mille visages des [GetCultureByKey('koronandi').GetName], en leurs dix mille labeurs, tout cela n’est plus qu’offrande à la vaine cruauté d’un tyran."
 mumakan.0110.a: "Je contemple le bûcher de la république."
 mumakan.0110.b: "Les mots me font défaut."
 # cynical response
 mumakan.0110.c: "Ce qui est fait est fait."
 
 mumakan.0111.t: "L’Approche de $aameda$"
 mumakan.0111.desc: "[aameda.GetFirstName] est resté silencieux, mais ce silence n’a rien de paisible. Tu le lis dans sa posture : ses mains se crispent, ses mâchoires se serrent. Sa froide superbe, d’ordinaire inébranlable, s’est brisée. Le feu et la mort brûlent dans son regard, mêlés de désespoir et de haine.\n\nIl contemple les eaux un long moment, puis se tourne enfin vers toi.\n\n« Toi aussi, tu le ressens, Ataraka. » Sa voix est tendue. « Cette douleur... cette peine. Garde-les en toi. Elles seules nous soutiendront dans les jours à venir, et peut-être, par elles, verrons-nous encore une véritable victoire... »"
# you look back and think of your choices how did it come to this?
 mumakan.0111.a: "Je me souviens du chemin qui nous mena à ce jour funeste..."
 
 # mumakan.0112 You remembered the day that the emperor sent his first, last and final ultimatum.
 mumakan.0112.t: "La Proclamation de Sandamal"
 mumakan.0112.desc: "Le message nous parvint en un jour morne et sans éclat.\n\nUn messager, porteur d’un parchemin scellé du sceau impérial de l’empereur Sandamal, exigea audience devant le Grand Conseil. En mon for intérieur, je sus qu’aucun bien n’en sortirait. Déroulant le parchemin, l’émissaire parla d’une voix qui n’était pas la sienne.\n\n« Conseillers de Kôronânde, prêtez l’oreille à mes paroles et à ma dernière offre de clémence. Trop longtemps avez-vous prospéré sur le sang de mon peuple, puisant à notre force vitale tout en foulant aux pieds l’honneur de nos ancêtres. Cela cesse aujourd’hui.\n\nHumiliez-vous devant les héritiers légitimes du bienheureux Indur, et fléchissez le genou devant son trône : alors nul sang ne sera versé, et l’or rachètera vos fautes. Refusez et je n’aurai d’autre choix que de venger mon peuple par le fer. »\n\nÀ ces mots, le Conseil s’embrasa d’indignation face à une telle audace, à cette tentative éhontée d’extorsion. Les voix s’élevèrent, la ferveur enfla, et serments comme imprécations jaillirent, tous jurant de ne jamais ployer devant l’empereur."
 mumakan.0112.a: "Ainsi vint la guerre."
 
 # mumakan.0113 War was coming from the east, you had little time to prepare, but...
 mumakan.0113.t: "Le Conseil de guerre"
 mumakan.0113.desc: "L’émissaire à peine parti, le Conseil se tourna vers la guerre désormais imminente. Pourtant, la crainte était faible, Kôronânde n’était-elle pas riche au-delà de toute mesure ? Les murs de Kôrlan n’étaient-ils pas hauts et puissants ? Les fils de la république ne se tenaient-ils pas unis, contrairement aux peuples divisés de l’empire qui tonnaient à leurs portes ?\n\nMais au milieu des clameurs et des fanfaronnades, une voix de prudence parvint jusqu’à moi, celle de $aameda$, appelant à la vigilance, évoquant ce qu’il savait de l’empereur Sandamal et de ses serviteurs.\n\nBien que j’eusse voulu le reprendre, lui reprocher les politiques corrompues de sa faction qui nous avaient menés à ce précipice, je me contins. L’heure n’était pas aux querelles.\n\nHélas, le Conseil ne montra point pareille retenue : factions et rivalités éclatèrent, débattant du coût de la défense, des mercenaires à engager, des forces à convoquer. Finalement, une décision fut arrachée de justesse..."
 mumakan.0113.a: "Misons sur les Mûmakil pour affronter l’ennemi en rase campagne." # Spawns 4 Elephants, 2 citizen guard, 2 mangonels
 mumakan.0113.a.tt: "Vous gagnez 4 régiments de [GetMaA('war_mumak').GetName], 2 de [GetMaA('koronandi_citizen_guard').GetName] et 2 de [GetMaA('mangonel').GetName] en tant que [men_at_arms|El]"
 mumakan.0113.b: "Les fils de la république sont notre véritable force." # Spawns 2 Elephants, 4 citizen guard, 2 mangonels
 mumakan.0113.b.tt: "Vous gagnez 2 régiments de [GetMaA('war_mumak').GetName], 4 de [GetMaA('koronandi_citizen_guard').GetName] et 2 de [GetMaA('mangonel').GetName] en tant que [men_at_arms|El]"
 mumakan.0113.c: "Préparons la contre-offensive !" # Spawns 2 Elephants, 2 citizen guard, 4 mangonels
 mumakan.0113.c.tt: "Vous gagnez 2 régiments de [GetMaA('war_mumak').GetName], 2 de [GetMaA('koronandi_citizen_guard').GetName] et 4 de [GetMaA('mangonel').GetName] en tant que [men_at_arms|El]"

 # mumakan.0114 But it was too little too late... the army of Mûmakan was at your gates, so you...
 mumakan.0114.t: "La Campagne foudroyante"
 mumakan.0114.desc: "Toutes nos préparations furent vaines. Les armées de Mûmakan marchaient déjà avant même que l’émissaire de Sandamal ne prît la parole, et à peine nos défenses commençaient-elles à s’élever que les légions impériales surgirent de l’est.\n\nToute tentative pour les arrêter fut balayée avec une aisance déconcertante, comme si les forces de Kôronânde n’étaient que fétus de paille.\n\nFace à une telle avancée, l’assurance d’hier se mua en désespoir. La rapidité de l’ennemi répandit la terreur, une arme plus redoutable encore que l’acier."
 mumakan.0114.a: "Pourtant, nous devions lutter !"
 # cynical response
 mumakan.0114.b: "Aucune option ne pouvait être écartée." # cynical
 mumakan.0114.c: "Notre assurance fut notre perte."
 
 # mumakan.0115 The siege was bloody
 mumakan.0115.t: "Sang et Or"
 mumakan.0115.desc: "Le siège fut bref, somme toute. Les murs tinrent un temps, puis les grands Mûmakil finirent par les rompre, et la panique se répandit.\n\nLa multitude de Kôrlan devint sa perte : tous fuyaient les brèches, cherchant refuge dans leurs demeures ou sur les navires. Ce chaos ruina tout espoir de défense ordonnée, et les forces impériales surent en tirer parti.\n\nElles se ruèrent vers le port afin d’empêcher toute fuite. Peu de navires purent lever l’ancre avant que le premier ne soit livré aux flammes. Bientôt, les grands vaisseaux eux-mêmes devinrent le bûcher funèbre de la république, et l’incendie gagna toute la cité.\n\nMa propre épouse périt alors, ensevelie sous la pierre et le feu. Les palais des grandes familles furent pillés, leurs lignées massacrées ou réduites en chaînes. Les trésors innombrables de la république, de sang comme d’or, furent livrés à l’empire."
 mumakan.0115.a: "Un spectacle d’horreur."
 
 # mumakan.0116 There was little hope, hundreds died in the fires, you sought advice from Aameda.
 mumakan.0116.t: "La Fuite du conseil"
 mumakan.0116.desc: "Les conseillers cherchèrent alors à fuir, voyant la journée perdue. Ils ignorèrent mes appels au calme, à la raison. Mais leur fuite devait échouer.\n\nLe port étant tombé, la panique les gagna à leur tour. Les accusations fusèrent aussi vite que la peur. Certains tentèrent de rejoindre leurs domaines, d’autres les murs, d’autres encore le port malgré le danger. Tous périrent aussi aisément que le peuple qu’ils méprisaient jadis.\n\nSeule la garde du Conseil demeura, fidèle jusqu’au bout, tenant désespérément l’ennemi à distance.\n\nAu cœur de ce chaos, $aameda$ surgit à mes côtés et, d’une force inattendue, me tira à travers les rues tandis que nos gardes tombaient les uns après les autres.\n\n« La journée est perdue. Demain peut encore être gagné, mais il faut d’abord survivre. »"
 mumakan.0116.a: "Peut-être... mais comment ?"

 # mumakan.0117 Finally the city was falling, Aameda had a ship, you had to flee, but you had left with...
 mumakan.0117.t: "Le Plus long jour de Kôrlan"
 mumakan.0117.desc: "La cité est désormais presque entièrement tombée. Voir la perle des mers, le joyau de la république, réduite à la ruine embrasée me déchire le cœur.\n\n$aameda$ me conduisit enfin vers l’abri qu’il cherchait : une anse dissimulée donnant sur la baie, où une embarcation était déjà chargée à la hâte.\n\n« Une précaution ancienne, » dit-il à voix basse, « pour le jour où le Conseil devrait fuir. L’ordonna celui qui précéda mon prédécesseur... Que je vive assez pour la voir servir est une amertume profonde. »\n\nNous chargeâmes le navire à la hâte, puis prîmes la mer, échappant de peu aux forces ennemies. Tandis que je contemplais la ville en flammes, mes pensées se tournèrent vers..."
 # with glory and brave deeds
 mumakan.0117.a: "La vaillance des défenseurs."
 # with the final respect of your people
 mumakan.0117.b: "Le deuil des disparus."
 # knowledge of war cynical
 mumakan.0117.c: "La certitude que la guerre n’était point finie."
 
 # mumakan.0120 A Toast to the end of the republic
 # Essential scene: Aameda gives a thorough analysis of the situation.
 # They need time to evacuate what they can, build up civilian resistance, and delay as long as possible.
 # Option A: (Defensive Strategy)
 # Option B: We will fight to the bitter end (Offensive Strategy)
 # Option C: evacuate our resources to fight another day
 mumakan.0120.t: "Un Toast au Crépuscule du Monde"
 mumakan.0120.desc: "« Ainsi... » La voix de $aameda$ a retrouvé cette affabilité trompeuse qui dissimule ses pensées véritables. « Kôrlan est livrée aux flammes ; le Conseil, pour l’essentiel, gît mort ou enchaîné, tout comme nombre des plus anciennes et illustres maisons du royaume. »\n\nJe ravale mes mots, m’abstenant de commenter leur prétendue noblesse.\n\nIl poursuit, prenant de l’élan : « Le trésor a sans doute été pillé, hormis ce que nous portons ici. Les bourgs trembleront à la chute de la cité, et beaucoup se rendront au premier signe des armées de Sandamal. Il nous faudra avancer avec prudence, mais tant que nous combattons, la république ne saurait mourir. »\n\nIl se tourne vers moi, le regard aigu.\n\n« Vous en êtes le chef. Comment lutterons-nous, privés de nos plus grandes forces ? »"
 # Defensive Strategy
 mumakan.0120.a: "Nous ne pouvons les affronter en rase campagne."
 mumakan.0120.a.tt: "Vous adoptez une stratégie défensive fondée sur l’attrition, visant à user les forces d’occupation."
 # Offensive Strategy
 mumakan.0120.b: "Frappons sans attendre, tant qu’il nous reste encore des forces."
 mumakan.0120.b.tt: "Vous adoptez une stratégie offensive, misant tout sur une bataille décisive."

 # Evacuating things to the reserve
 mumakan.0120.c: "Ce n’est ni aujourd’hui, ni demain... mais un jour viendra."
 mumakan.0120.c.tt: "Vous gagnez une réserve de #P +1#! Ressources\nElles vous renforceront en exil, si la défaite survient."

### War Perspective Events (Ataraka) ###

# The following events describe the war from Ataraka's perspective at 1, 5, and 10 months. 
# Always a few options: keep potential exile laamp strengthened, or spend last reserves.

# mumakan.0131 1 month mark perspective event 
 mumakan.0131.t: "Les Restes se rassemblent"
 mumakan.0131.desc: "Certains en doutaient, pourtant, un mois après la chute de Kôrlan, nous tenons encore. La situation demeure précaire, mais le temps a permis à des soutiens épars de se regrouper. Messagers et vivres circulent de nouveau, et quelques cités autrefois craintives commencent à tendre la main.\n\nC’est là un signe encourageant mais il me faut désormais décider de l’usage de ces ressources retrouvées..."
 # Spends resources (and spawns extra troops) 
 mumakan.0131.a: "Nous devons lever davantage de soldats."
 # Spends resources (and grants extra siege modifier) 
 mumakan.0131.b: "Sans reprendre les cités, point de victoire possible."
 # continue evacuation / do not use resources 
 mumakan.0131.c: "Pas encore. Observons l’évolution des choses."
 mumakan.0131.c.tt: "Vous gagnez une réserve de #P +1#! Ressources"

 # mumakan.0132 8 month mark perspective event
 mumakan.0132.t: "La Lutte désespérée"
 mumakan.0132.desc: "Huit mois. J'ai vécu huit mois dans les collines et les jungles de l'arrière-pays. Je dors dans des grottes qui sentent la pierre mouillée et la vieille terre. Je mange ce que la terre et nos alliés qui s'amenuisent peuvent épargner. Je fais la guerre avec les outils du désespoir. L'embuscade. La retraite. L'obstruction. La patience. Nous tenons les espaces entre leurs poings qui se resserrent. Nous tenons les épaves. Nous tenons les endroits trop petits ou trop escarpés ou trop denses de jungle pour que leurs colonnes les atteignent sans saigner à chaque pas.\n\nHuit mois ont passé et nous n'avons pas cédé. Les éclaireurs de l'armée impériale rapportent à leurs commandants que la résistance se poursuit. J'ai commencé à les reconnaître à leur allure. Ils ont la lassitude particulière des hommes qui attendaient une courte campagne et se sont retrouvés enlisés dans une guerre qui ne veut pas finir. J'en tire une satisfaction sombre et privée. Je ne puis me permettre le luxe de m'y attarder.\n\n[aameda.GetFirstName] compte nos réserves avec un soin méticuleux. Il sait que les guerres sont gagnées par les bien approvisionnés plutôt que par les braves. Les chiffres qu'il me présente sont implacables. Nous survivons, mais la seule survie ne libérera pas la république. Je dois décider si je dépense le peu que nous avons pour forcer notre avantage fragile. L'alternative est de le garder précieusement contre les jours plus sombres que je sais venir."
 mumakan.0132.a: "Puisons dans nos réserves. Les feux de la résistance doivent être alimentés."
 mumakan.0132.a.tt: "Vous dépensez un stock de #N -1#! Ressources"
 mumakan.0132.b: "L'or peut acheter ce que la terre nous refuse."
 mumakan.0132.b.tt: "Vous dépensez une somme conséquente d'[gold|El]"

# mumakan.0133 15 month mark perspective event 
 mumakan.0133.t: "Anniversaire"
 mumakan.0133.desc: "Je n'ai cessé de me déplacer, de village en camp en village, traversant l'arrière-pays de jungle épaisse pour éviter la capture, coordonner la défense, insuffler la résistance. Mais en des jours comme celui-ci, c'est moi qui ai besoin de foi.\n\nJ'ai vu des horreurs que nul ne devrait jamais avoir à voir. J'ai vu un désespoir indicible dans la désolation et les ruines. Mais ce qui s'étend devant moi maintenant...\n\nAujourd'hui est un jour humide. Un jour brûlant. L'air épais et vicié s'entasse dans mes poumons et ma gorge. Il se mêle à l'odeur de brûlé et de maladie. Il étouffe chacun de mes pores. Il me soulève l'estomac comme rien d'autre ne l'a fait dans cette guerre maudite. Au-delà de la crête s'étend une vallée de poix, avec des os d'une blancheur crue, et des chiens affamés. Ils rongent les restes, arrachent les os... des os humains, des restes humains. Hommes, femmes, enfants - manants, miséreux et nobles...\n\n#N ne sont plus désormais que pâture pour les chiens.#!"
 mumakan.0133.a: "Je tente de vomir..."
 mumakan.0133.a.tt: "Mais votre estomac est vide."
 mumakan.0133.b: "Je tousse encore et encore et encore..."
 mumakan.0133.b.tt: "Mais vous ne parvenez toujours pas à respirer."
 # cynical option (requires global_var:ataraka_cynicism = 3) 
 mumakan.0133.c: "Il n'y a rien que nous puissions faire pour les morts."
 mumakan.0133.c.tt: "Et vous ne ressentez absolument rien."

 mumakan.0134.t: "Défense héroïque"
 mumakan.0134.desc: "Je ne sais comment, mais j'ai survécu deux années face à un ennemi qui me surpassait dix contre un. Autour du camp où vous avez élu résidence, les fils de la république m'entourent de toutes parts, meurtris et bandagés, leurs lances usées par les intempéries et leurs boucliers ébréchés, pourtant ils sourient. Car bien que la guerre dure depuis deux ans, ils combattent encore, comme je combats. [aameda.GetFirstName] me tapote l'épaule et m'invite à l'écart.\n\n« Ces hommes ont tant d'espoir, mais je crains qu'il ne dure guère », dit [aameda.GetFirstNameNoTooltip].\n\nIl se penche vers vous en baissant la voix : « Vous devriez cultiver cette source de moral pendant que vous le pouvez encore. Un homme qui espère est à la fois utile et obéissant, bien que cela puisse nous coûter l'efficacité de certaines dispositions. »\n\n[aameda.GetFirstNameNoTooltip] se tait, me laissant peser mes options : « Fournissez-moi les ressources nécessaires et je vous assure que les armées de la république se battront deux fois plus dur qu'auparavant. »"
 mumakan.0134.a: "Je vous fournirai ce dont vous avez besoin."
 mumakan.0134.a.tt: "Vous dépensez un stock de #N -1#! Ressources et #N 100 #!Marchandises de troc"
 mumakan.0134.b: "Non. Nous devons donner la priorité à nos dispositions."
 mumakan.0134.b.tt: "Vous gagnez un stock de #P +1#! Ressources"

 # mumakan.0135 38 month mark perspective event
 mumakan.0135.t: "Le Prix de la survie"
 mumakan.0135.desc: "Trois ans. J'ai passé trois ans à dormir dans la boue et à manger ce que la jungle offre. J'ai regardé des hommes que j'avais formés et avec lesquels j'avais saigné emportés hors du champ sur des civières faites de branches et de chiffons déchirés. Ce fut une guerre d'usure et d'ingratitude. Désormais [aameda.GetFirstName] vient me soumettre une proposition. Je savais qu'elle viendrait, dans ce lieu silencieux derrière mes côtes où je garde les vérités que je ne souhaite pas affronter.\n\nIl a trouvé des acheteurs. Ce sont des marchands Mûlamburil venus de ports lointains qui ne se soucient nullement de la république. Ils ne se soucient que du profit. Ils paieront généreusement pour ce qui reste du patrimoine de Kôrlan. Il me montre les bronzes sacrés de l'ancien temple. Il me montre les cartes stellaires de la guilde des navigateurs copiées à la main à travers cent générations. Il a même les anciens instruments de loi du Mur-des-Lois. Ce sont les pierres sur lesquelles furent inscrites pour la première fois les paroles de Tarasar. Voici notre héritage. Voici notre mémoire.\n\n[aameda.GetFirstNameNoTooltip] me dit qu'ils ne sont que des objets. Sa voix est plus douce que je ne l'attendais. Il sait exactement ce qu'il me demande. Il dit que les objets ne saignent pas et ne meurent pas de faim. Il dit qu'ils ne laissent pas des enfants sans père. Notre peuple fait les deux. Je regarde les reliques disposées devant moi. Je pense à Tarasar rennonçant à sa couronne pour que la république soit gouvernée par les sages. Je me demande ce qu'il dirait. Ce qu'il penserait de ses héritiers marchandant son patrimoine pour acheter des lances."
 mumakan.0135.a: "Vendre les trésors sacrés de Kôrlan pour des armes. La survie prime sur le patrimoine."
 mumakan.0135.a.tt: "Vous gagnez un stock de #P +2#! Ressources"
 mumakan.0135.b: "Offrir des monopoles commerciaux aux Mûlamburil en échange d'armes et de marchandises."
 mumakan.0135.b.tt: "Vous gagnez un stock de #P +1#! Ressources et #P 100#! Marchandises de troc"
 mumakan.0135.c: "Nous ne vendrons pas notre âme pour sauver notre peau."
 mumakan.0135.c.tt: "Vous dépensez un stock de #N -1#! Ressources"

 # mumakan.0136 50 month mark perspective event
 mumakan.0136.t: "Le Puits de la conscience"
 mumakan.0136.desc: "Quatre ans et deux mois. J'ai cessé de compter les jours. [aameda.GetFirstName] les compte pour moi dans le registre qu'il garde serré contre sa poitrine. Il a des colonnes de chiffres qui traduisent des vies humaines en arithmétique stratégique. J'ai changé en ces années. Je le sens dans la façon dont je tiens une lame désormais. J'évalue un village non pour ses gens mais pour sa défensibilité. J'écoute les rapports de pertes avec un calme qui aurait horrifié l'homme qui plaidait autrefois dans les cours de justice.\n\n[aameda.GetFirstNameNoTooltip] propose quelque chose qui lui fait hésiter à lui-même. C'est ainsi que je sais que c'est véritablement terrible. Nous retraitons lentement et méthodiquement pour gagner du temps. Il suggère de laisser derrière nous davantage que de la terre brûlée. Il me dit d'empoisonner les puits. Il ne croise pas mon regard. Il dit que si nous leur refusons l'eau, nous leur refusons la capacité de tenir ce qu'ils ont pris. Cela leur coûte des mois et des hommes. Cela leur coûte la volonté de continuer.\n\nJe lui dis que cela nous coûte aussi. Il marque une pause. Il dit que nous mourons déjà. Il me demande si nous mourrons en l'ayant rendu coûteux, ou si nous mourrons en l'ayant rendu facile. Je regarde mes mains. Ce sont des mains de juriste et de fils de tailleur. Je pense aux puits de mon enfance. Je me souviens de l'eau fraîche dans des jarres d'argile et des rires d'enfants autour du bassin. Je me demande ce que je suis en train de devenir. Je me demande si la république reconnaîtrait encore l'homme qui la sauve."
 mumakan.0136.a: "Empoisonner les puits. Qu'ils boivent la mort, même si nous devons faire de même."
 mumakan.0136.a.tt: "Vous gagnez un stock de #P +2#! Ressources au prix de #N Limite d'approvisionnement et Attrition accrue#!"
 mumakan.0136.b: "Dépenser les derniers deniers du trésor pour armer nos troupes restantes."
 mumakan.0136.b.tt: "Vous dépensez un stock de #N -1#! pour gagner #P 100#! Marchandises de troc"
 mumakan.0136.c: "Sauver ce que nous pouvons et préparer la fuite. Il n'y a point de honte à vivre."
 mumakan.0136.c.tt: "Vous gagnez un stock de #P +1#! Ressources"

 # mumakan.0137 The Human Cost
 mumakan.0137.t: "Le Prix humain"
 mumakan.0137.desc: "J'ai disputé bien des fois avec [aameda.GetFirstName]. Nous débattons de stratégie et de ressources. Nous débattons des limites morales que j'exige et qu'il juge désuètes. Mais c'est la première fois que je discute avec lui en sachant avec une certitude absolue que j'ai raison. Je sais aussi que avoir raison pourrait nous tuer.\n\nLes villages derrière nos lignes meurent de faim. Ce n'est pas la faim lente des rations réduites. C'est la faim désespérée et creuse qui rend la peau pareille à du papier et les yeux pareils à du verre. Les mères nourrissent leurs enfants d'une soupe d'écorce d'arbre et appellent ça un repas. La guerre a détruit les récoltes. Les impériaux ont saisi ce que le feu n'avait pas pris. Ce qui reste suffit à peine à maintenir mes soldats debout. Le conseil de [aameda.GetFirstNameNoTooltip] est clair et froid. Il dit que les réserves sont pour l'armée. Il dit que l'armée est pour la République. Il dit que la République ne peut être sauvée en nourrissant des gens qui ne peuvent pas combattre.\n\nJe l'écoute. Je comprends son raisonnement. Je comprends qu'il a probablement raison dans les mathématiques étroites et terribles de la survie. Puis je pense à ma mère. C'était la femme d'un épicier. Une femme qui gardait ses étagères garnies et ses voisins nourris à travers chaque saison de disette. Je pense à ce qu'elle dirait à un homme qui laissait des enfants mourir de faim pour que des soldats puissent manger. Je sais ce que je vais faire. Je le ferai même si cela me coûte la guerre."
 mumakan.0137.a: "Ouvrons les greniers. Nous devons nourrir tous ceux que nous pouvons."
 mumakan.0137.a.tt: "Vous avez perdu #N -100#! Marchandises de troc"
 mumakan.0137.b: "Évacuer les civils et pourvoir à leurs besoins en chemin."
 mumakan.0137.b.tt: "Vous gagnez #P 1#! Ressources pour #N -200#! Marchandises de troc"

 # mumakan.0138 The Death of the General
 mumakan.0138.t: "La Mort du général"
 mumakan.0138.desc: "[aameda.GetFirstName] arrive sous la tente de commandement à l'aube. Il porte l'expression particulière qu'il réserve aux nouvelles qui sont simultanément dévastatrices et utiles. Il y a un léger retroussement au coin de sa bouche et une lueur dans ses yeux qu'il ne supprime pas tout à fait. Son maintien me dit qu'il a déjà calculé chaque implication avant de daigner partager le renseignement avec moi.\n\nIl me dit simplement que le Général est mort. Il le dit comme s'il faisait une remarque sur le temps qu'il fait. J'attends, parce que les silences de [aameda.GetFirstNameNoTooltip] sont aussi calculés que ses mots. Il explique que ce sont les propres hommes du Général. La mutinerie a finalement pris racine. Il semble que des années de pourriture dans la jungle et de solde qui s'amenuise ont pesé sur eux. L'indignité d'avoir été déjoués par un peuple qu'on leur avait dit capituler en un mois a érodé jusqu'à la discipline Mûmakani. Il esquisse un léger sourire et appelle cela un dommage.\n\nJe devrais ressentir du triomphe. L'homme qui a brûlé Kôrlan et brisé ma République est mort. Il a fait de mon épouse un souvenir et de mon peuple des exilés dans leur propre terre. Il est mort et son armée se fragmente. Cependant, j'ai passé trop d'années dans cette guerre pour confondre une opportunité avec une victoire. Une bête blessée est dangereuse. Une armée sans chef l'est doublement. Certains déserteront tandis que d'autres se battront avec plus d'acharnement. Ils n'ont plus rien à perdre et la haine comblera le vide où la discipline régnait naguère. [aameda.GetFirstNameNoTooltip] me regarde penser. Son expression vire à l'anticipation aiguisée. Il attend mon ordre."
 mumakan.0138.a: "Préparer une contre-attaque pendant qu'ils sont affaiblis. Les ancêtres l'exigent !"
 mumakan.0138.a.tt: "Vous préparerez une contre-attaque pour frapper un Mûmakan affaibli."
 mumakan.0138.b: "La patience est notre arme la plus redoutable. Nous devons attendre qu'ils s'effondrent."
 mumakan.0138.b.tt: "Vous attendrez que Mûmakan s'effondre de l'intérieur."

 # mumakan.0139 Nafarati Revolt
 mumakan.0139.t: "La Tempête du Nord"
 mumakan.0139.desc: "La messagère est à demi morte d’épuisement lorsqu’elle nous retrouve. C’est une marchande [GetCultureByKey('mulamburil').GetName], qui, depuis longtemps, sert les desseins de [aameda.GetFirstName] par des voies que j’ai choisi de ne point trop sonder.\n\nLa nouvelle qu’elle apporte bouleverse la guerre en un instant : les [GetCultureByKey('nafarati').GetName] se sont soulevés.\n\nCe n’est ni escarmouche frontalière, ni querelle de tribut, mais une sécession totale. Les seigneurs du Nord ont proclamé leur indépendance face à un empire qui s’est vidé de son sang à vouloir nous anéantir. Le grand pari de Sandamal s’est défait de lui-même.\n\nEn écartant les Nâfarati de l’invasion de Kôronânde pour prouver que le trône pouvait se passer d’eux, il a démontré tout le contraire. Le trésor impérial est exsangue, et ses armées s’enlisent dans nos jungles. Les Nâfarati se sont détournés, emportant leurs guerriers, leurs terres et leurs ambitions. Ils ont laissé à l’empire son trône agonisant.\n\n[aameda.GetFirstName] rit déjà. Ce n’est point son amusement mesuré d’ordinaire, mais un rire brut, sincère, tel que jamais encore je ne l’avais entendu. Il me demande si je comprends ce que cela signifie. Pour une fois, nul calcul dans sa voix : seulement la joie farouche et incrédule d’un homme voyant la demeure de son ennemi s’embraser de l’intérieur.\n\nOui, je comprends. L’empire ne peut soutenir deux guerres à la fois. Reste à décider : frapper tandis que le fer est brûlant, ou laisser l’incendie achever notre œuvre."
 mumakan.0139.a: "Ils connaîtront ma colère."

 ### Sandamal War Perspective Events ###

 mumakan.0140.t: "La Chute de Kôronânde"
 mumakan.0140.desc: "La dépêche arrive à la cour portée par un cavalier dont le cheval est à demi mort sous lui. Je sais ce qu'elle contient avant même que le sceau ne soit brisé. L'urgence particulière d'un homme qui a chevauché sans s'arrêter raconte sa propre histoire. Je lis de telles histoires depuis trente ans. [GetTitleByKey('c_korlan').GetNameNoTier] est tombée. La grande cité portuaire a été emportée d'assaut. C'est le joyau qui a saigné mon empire pendant des générations par son étranglement sur le commerce méridional. Mon général a accompli ce dont chaque empereur depuis le départ de [GetScriptedCharacterByHistoryID('nazgul4').GetFirstNameNicknamed] a rêvé sans jamais oser le tenter. C'est le roturier que j'ai élevé de rien. C'est l'homme en qui j'ai placé une confiance que j'accorde à presque personne.\n\nJe m'accorde un souffle de satisfaction. Puis je mets la dépêche de côté. Je commence les calculs qui détermineront si cette victoire est le fondement de mon héritage ou le préambule à son effondrement. Les chefs tribaux attendront une récompense. Le trésor aura besoin d'être renfloué par le butin. Les [GetCultureByKey('nafarati').GetName] du nord ont délibérément été exclus de la campagne. Ils noteront à la fois la victoire et leur absence. Ils en tireront des conclusions que je devrai gérer avec soin. Une main ferme et une récompense généreuse sont requises. Un acte sévère pourra suivre si la nécessité l'exige. La guerre est gagnée. La paix est tout."
 mumakan.0140.a: "Enfin. La république s'incline devant le trône de Mûmakan."
 mumakan.0140.b: "Bien. Mais ne célébrez point avant que le dernier $koronandi$ ne se soit agenouillé."

 mumakan.0141.t: "Rapports du Front"
 mumakan.0141.desc: "Les dépêches du général [general.GetFirstName] ont toujours été un modèle de clarté militaire. Il rapporte les positions prises et les positions tenues. Il dresse la liste des forces déployées et des forces épuisées. Je les ai toujours lues avec l'appréciation d'un homme qui place la compétence au-dessus de toutes les vertus dorées réunies. Cette dépêche porte une note que je n'avais jamais vue de sa part. Une prudence est tissée à travers la confiance comme un fil sombre dans une étoffe claire.\n\nLa résistance se raffermit dans l'arrière-pays. Les bourgs ruraux auraient dû se rendre à la chute de [GetTitleByKey('c_korlan').GetNameNoTier]. Au lieu de cela, ils se sont tus. Ce n'est pas le silence de la soumission. C'est le silence dangereux d'un peuple qui décide comment combattre sans armée. Le général a déployé des patrouilles supplémentaires. Il a sécurisé les grandes routes. Il m'assure qu'il maîtrise parfaitement la situation.\n\nJ'ai gouverné pendant trente ans. J'ai appris que lorsqu'un homme compétent vous assure qu'il maîtrise parfaitement la situation, cela signifie qu'il fait face à quelque chose qui l'a surpris. Il ne souhaite pas encore le dire. Cela ne m'alarme point. Mon général est plus que capable. Les vestiges de la République ne peuvent soutenir longtemps une résistance sans leur capitale ni leur flotte. Je prends note de la dépêche. Je la classe dans la partie de mon esprit où je garde les choses qui pourront un jour requérir mon attention directe."
 mumakan.0141.a: "C'était prévisible, bien que le moment soit loin d'être idéal."
 mumakan.0141.b: "Le général a suffisamment d'hommes. C'est son épreuve."

 mumakan.0142.t: "L'Obstination du Sud"
 mumakan.0142.desc: "Seize mois. La campagne devait en durer trois. Peut-être quatre au plus si la météo tournait ou si les villes côtières se montraient loyales envers leur République. Au lieu de cela, je suis assis dans ma salle d'audience à [GetTitleByKey('c_amaru').GetNameNoTier]. Je lis des dépêches qui ont pris la cadence répétitive particulière d'une guerre qui a oublié comment finir.\n\nLes [GetCultureByKey('koronandi').GetName] ne veulent pas mourir. Je ne dis pas cela avec admiration. Je suis contraint d'en reconnaître une mesure réticente. J'ai la reconnaissance lasse d'un homme qui a étudié l'histoire assez longtemps pour connaître la vérité. Occuper un pays est un art très différent de le conquérir. Mon général tient les villes, les routes et les ports. La résistance tient les collines et les jungles. Elle tient la loyauté de chaque femme de laboureur qui cache une arme sous ses pierres de foyer. Ce ne sont plus des soldats que je combats désormais. C'est un peuple. Un peuple ne peut être défait par les mêmes moyens qu'une armée.\n\nLa cour s'impatiente. Les chefs tribaux ont acclamé à grand bruit la chute de [GetTitleByKey('c_korlan').GetNameNoTier]. À présent ils ont commencé à murmurer sur les coûts et la durée. Ils se plaignent de campagnes qui engloutirent leurs levées et ne retournent rien d'autre que de nouvelles dépêches. Je les fais taire pour l'heure avec le poids du trône et le souvenir de la victoire. Mais le souvenir s'efface. Même la patience d'un empereur a son architecture. Je sens les fissures se former."
 mumakan.0142.a: "Nous sommes engagés. La victoire est sûrement proche."
 mumakan.0142.b: "Ils ont prouvé leur trempe. Mais contre le ciel, cela ne suffira pas."

 mumakan.0143.t: "Le Poids de Cinq Ans"
 mumakan.0143.desc: "Cinq ans. Cette guerre devait être mon triomphe couronné. C'était l'acte qui aurait dû faire taire les murmures. Elle aurait dû prouver que la dynastie portait encore la faveur divine. Elle était destinée à montrer aux Nâfarati et à chaque tribu agitée que le trône impérial n'avait besoin d'aucun glaive que le sien. Elle est devenue à la place une meule autour du cou de l'empire. Je la sens nous entraîner vers le fond.\n\nLes dépêches du trésor n'arrivent plus avec des chiffres. Elles arrivent avec des excuses. Je reçois des explications soigneusement formulées sur les raisons pour lesquelles les chiffres ne sont pas ce qu'ils devraient être. Elles sont accompagnées de suggestions que je pourrais envisager d'autres moyens de financement. Les chefs tribaux ont dépassé le stade des murmures. Ils ont atteint ce silence pointu et particulier qui précède les exigences. Leurs exigences ne sont ni modestes ni négociables quand elles arrivent enfin. Ils veulent un paiement. Ils ont envoyé leurs fils et leurs levées dans une guerre de jungle qui a consumé cinq ans de leur force. Ils veulent une compensation. Ils n'ont pas tort de la vouloir. Ce fait rend leur désir d'autant plus dangereux.\n\nTrois choix s'offrent à moi et aucun n'est bon. C'est la condition naturelle du gouvernement impérial. J'ai accepté cette réalité il y a longtemps. Mais je suis las. Ce n'est pas la lassitude du corps, que j'ai depuis longtemps appris à maîtriser. C'est la lassitude de l'esprit. C'est un épuisement plus honnête et plus difficile à dissimuler."
 mumakan.0143.a: "Les payer sur le trésor. La loyauté doit s'acheter."
 mumakan.0143.b: "Leur promettre le pillage de Kôronânde. Que l'avidité alimente la campagne."
 mumakan.0143.c: "Leur rappeler qui est l'empereur. Le trône ne mendie pas."

 mumakan.0144.t: "La Guerre Sans Fin"
 mumakan.0144.desc: "La dépêche arrive. Elle ne vient pas du général [general.GetName] mais le concerne. Cette distinction change tout. [general.GetNameNoTooltip] est mort. Il n'est pas tombé au combat. La fièvre ne l'a pas emporté. Il n'a pas péri des mille cruautés ordinaires d'une campagne dans la jungle. Il a été tué par ses propres soldats. Ce sont les hommes qui l'ont suivi dans la brèche à Kôrlan. Après sept ans d'une guerre sans fin, ils ont décidé que leur patience a une limite que leur loyauté n'a pas.\n\nJe pose la dépêche. Je reste immobile un long moment. L'immobilité est ce que je fais quand le monde se dérobe sous moi. Il s'est dérobé bien des fois en trente ans. Je ne l'ai jamais encore laissé me voir trébucher. [general.GetNameNoTooltip] était mien. Je l'ai trouvé et je l'ai élevé. Je lui ai confié le plus grand commandement de l'empire et il a livré la plus grande victoire. Il est mort à présent dans une tente dans une jungle qui aurait dû être pacifiée depuis des années. Tué par les soldats mêmes que j'avais envoyés assurer son succès.\n\nLes [GetCultureByKey('nafarati').GetName] sont agités. Les chefs tribaux sont au-delà de l'agitation. Le trésor est une blessure qui ne se referme pas. Je dois maintenant trouver un autre commandant et une autre armée. Je dois trouver une autre raison pour que l'empire croie que cette guerre est autre chose que la lente consommation de tout ce que j'ai mis trente ans à bâtir. Je convoque mon conseil. Je ne les laisse pas voir mes mains trembler."
 mumakan.0144.a: "Nous ne pouvons nous arrêter maintenant ! Nous ne le devons pas !"

 mumakan.0145.t: "La Révolte des Nâfarati"
 mumakan.0145.desc: "Douze ans. La moitié d'une génération a été versée dans une jungle qui engloutit les armées. Elle ne rend rien d'autre qu'ossements et dépêches emplies de langage soigneux sur les combats qui se poursuivent et les situations qui évoluent. Douze ans ont passé depuis que j'ai regardé [GetTitleByKey('c_korlan').GetNameNoTier] brûler. Je croyais sincèrement et honnêtement que le plus dur était derrière moi. Désormais les [GetCultureByKey('nafarati').GetName] se sont révoltés.\n\nJ'aurais dû le voir venir. Je l'ai vu venir. J'en ai discerné la forme des années auparavant et senti la tension dans chaque tribut retardé. J'ai perçu l'absence significative des seigneurs de guerre du nord à ma cour. Je savais dans la partie froide et analytique de mon esprit qu'ils attendaient précisément ce moment. Le trône est surtendu. Le trésor est épuisé. L'armée a été saignée à blanc dans une campagne devenue plaie ouverte. Je les avais exclus de l'invasion de Kôronânde pour prouver que je n'avais pas besoin d'eux. J'ai prouvé à la place qu'ils n'ont aucune raison de demeurer en l'absence de la menace de la puissance impériale pour les retenir.\n\nL'empire ne peut combattre sur deux fronts. Tout empereur qui s'est jamais assis sur ce trône et a duré plus d'une saison le sait. La question se dresse devant moi. Elle est froide et immuable et exige une réponse que je ne souhait pas donner. Je dois décider quel front j'abandonne. Je suis encore le Lion de Fer. Mais le fer rouille quand on le laisse trop longtemps sous la pluie. Je crains que la pluie ne tombe depuis fort longtemps."
 mumakan.0145.a: "Ces misérables ! Ils croient pouvoir abattre ce que j'ai bâti ?"

 ### General War Perspective Events ###

 mumakan.0151.t: "Rapports du Front"
 mumakan.0151.desc: "Je rédige la dépêche à l'intention de l'empereur dans l'heure qui précède l'aube, à la lumière d'une seule lampe à huile. Je choisis chaque mot avec le soin d'un homme qui comprend qu'un rapport n'est pas simplement de l'information. C'est une architecture. Ce que je bâtis avec cette lettre déterminera ce que Sandamal attend. Ce qu'il attend déterminera ce qu'il envoie. Ce qu'il envoie décidera si j'achève cette campagne comme gouverneur d'une province conquise ou comme note de bas de page dans une histoire de dépassement impérial.\n\nLa résistance s'effondre. J'écris cela parce que c'est en grande partie vrai. Les vestiges organisés de l'armée de la République ont été dispersés dans l'arrière-pays. Leurs lignes d'approvisionnement sont coupées. Leur commandement se réduit à un juriste devenu rebelle et à quelque conseil de désespérés qu'il a réunis dans les collines. Je crois que les dernières braises s'éteindront en un mois ou deux. Je dois le croire. L'alternative est une pensée que je ne suis pas encore prêt à envisager. Je ne puis accepter d'être engagé dans une guerre contre un peuple plutôt que contre une armée. De telles guerres ne finissent pas comme ma formation me dit qu'elles devraient.\n\nJe scelle la dépêche et la confie à mon cavalier le plus rapide. Je sollicite des renforts minimaux. L'empereur lira de la confiance dans cette requête. La confiance est ce qu'il attend de moi. C'est elle qui a acheté ma commission et ma gouvernance et tout ce que j'ai arraché en me hissant depuis les ruisseaux de [GetTitleByKey('c_amaru').GetNameNoTier] pour l'atteindre."
 mumakan.0151.a: "Rapporter que la victoire est imminente. Solliciter des renforts minimaux."

 mumakan.0152.t: "La Patience de la Jungle"
 mumakan.0152.desc: "Seize mois sur le terrain. J'apprends une nouvelle forme de guerre. Ce n'est pas celle qu'on enseigne dans les camps d'entraînement. Aucun manuel tactique n'anticipe cela, parce qu'aucun manuel n'est écrit par un peuple qui préférerait mourir dans ses propres collines plutôt que de vivre sous la botte d'un empire.\n\nLes [GetCultureByKey('koronandi').GetName] ne combattent pas comme des soldats. Ils ne tiennent pas le terrain et ne disputent pas les carrefours. Ils ne forment pas de lignes de bataille où un commandant compétent peut faire peser la supériorité numérique. Ils disparaissent. Ils frappent depuis le couvert des arbres et s'évanouissent dans un terrain qu'ils connaissent depuis l'enfance. Ils combattent depuis derrière chaque haie et chaque fossé d'irrigation. Une patrouille repart et ne revient pas. Un convoi de ravitaillement brûle sur une route qui était sûre la veille. Un chef de village jure allégeance le matin et abrite une douzaine d'hommes en armes à la tombée de la nuit.\n\nJe tiens chaque ville, chaque route et chaque port. J'ai dix fois leur force. Pourtant chaque semaine mes soldats meurent dans l'obscurité verte de l'arrière-pays. Ils sont fauchés un à un par des gens qui auraient dû se rendre depuis des mois. Acculés, ils se battent avec une férocité qui donnerait à réfléchir à n'importe quel commandant chevronné. Ce ne sont pas des soldats. Ce sont des pères, des boutiquiers et des pêcheurs. Ils tuent mes hommes. Je dois changer d'approche ou cette jungle m'engloutira vivant."
 mumakan.0152.a: "Passer à une stratégie de siège. Les affamer jusqu'à la soumission."
 mumakan.0152.b: "Lancer des raids agressifs. Nous devons briser leur volonté."

 mumakan.0153.t: "La Pourriture s'Installe"
 mumakan.0153.desc: "Cinq ans. J'occupe ce poste depuis cinq ans. C'est plus long que toute campagne que j'aie jamais menée. Plus long que le temps que j'ai passé à me hisser de rien dans l'armée impériale. Je regarde le visage dans le bassin d'eau chaque matin et je vois un homme qui a vieilli d'une décennie en deux fois moins de temps. La jungle fait cela à un homme. Il y a la chaleur et l'humidité et l'obscurité verte infinie qui presse de toutes parts. Il y a la folie particulière de combattre un ennemi qui est partout et nulle part. Ils refusent de s'arrêter avec un entêtement que j'en suis venu à respecter comme on respecte la mer.\n\nL'armée pourrit. Cette pourriture ne vient pas de la maladie. La maladie prélève son tribut, comme elle le fait toujours dans le Sud. C'est le lent poison du manque de but. Il infecte les soldats qui ont oublié à quoi ressemble la victoire. Ils ont commencé à soupçonner qu'ils ne la reconnaîtront pas quand elle arrivera. La désertion augmente. Les suiveurs de camp se sont multipliés en une petite cité à part entière. Ils sont parasites et ingouvernables. Trois soldats ont été retrouvés morts la semaine dernière. Les officiers appellent ça une altercation. Moi j'appelle ça une mutinerie.\n\nIl me reste deux outils. La crainte et l'indulgence. La crainte les maintiendra dans les rangs mais les rendra cassants. L'indulgence les gardera en mouvement mais en fera des bêtes. Ni l'une ni l'autre n'est ce que je choisirais si j'avais le luxe du choix. Le luxe est une chose que j'ai laissée à [GetTitleByKey('c_amaru').GetNameNoTier] si tant est que je l'aie jamais possédé."
 mumakan.0153.a: "Exécuter les déserteurs. La dissidence ne sera tolérée sous aucune forme."
 mumakan.0153.b: "Qu'ils prennent leur solde sur le pays."

 mumakan.0154.t: "Le Prix de l'Ambition"
 mumakan.0154.desc: "J'entends le battant de toile avant de voir la lame. Sept ans de guerre dans la jungle ont rendu mes oreilles plus aiguisées que n'importe quel chien de palais. Entendre la menace et être capable de l'arrêter sont deux aptitudes différentes. La seconde requiert un corps plus jeune que celui que j'ai usé jusqu'aux tendons et aux cicatrices dans cet enfer vert.\n\nJe reconnais les visages. Je m'étais fait un point d'honneur de connaître chaque homme sous mon commandement. C'est le moins qu'un chef doive aux hommes qui le suivent. Un garçon des ruisseaux d'Amârû apprend tôt que la distance entre la loyauté et le meurtre n'est souvent rien de plus qu'un repas manqué ou une promesse brisée. Ce ne sont pas des rebelles. Ce ne sont pas des infiltrés [GetCultureByKey('koronandi').GetName]. Ce sont mes propres soldats. Les hommes que j'ai formés et conduits dans la brèche à Kôrlan. Les hommes qui ont acclamé mon nom quand les murailles sont tombées. Ils ont décidé dans l'arithmétique particulière des hommes épuisés et désespérés que je vaux plus mort que vif.\n\nJe pense à Sandamal qui m'a confié sa grande tâche. Je pense à la gouvernance qui m'avait été promise. Je pense à la vie que je bâtissais de rien. C'était la preuve qu'un homme de nulle part pouvait devenir quelque chose. Je pense à l'enfant dans la foule le jour où j'ai chevauché à travers les portes de Kôrlan. Je n'ai jamais oublié ce visage.\n\nLa lame vient. Je ne ferme pas les yeux."
 mumakan.0154.a: "C'est ainsi que cela se termine. Non pas au combat, mais trahi par mes propres hommes..."

 ## Decision Events ##
 mumakan.0200.t: "L'Héritage d'Amâv"
 mumakan.0200.desc: "Enfin, le royaume autrefois gouverné par [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName], premier Roi de tous les [men|E] de [GetTitleByKey('e_mumakan').GetName], a été reforjé des cendres de sa légende. Désormais, l'[GetTitleByKey('h_utter_south').GetName] se dressera jusqu'à la venue de la Fin des Temps !\n\nJe guiderai les terres du Sud vers un avenir nouveau et forgerai un chemin qui garantira que nul ne sera assez puissant pour se dresser sur la nôtre !"
 mumakan.0200.a: "L'ascension du Sud est accomplie."

 mumakan.0201.t: "Tâlilan Brûle"
 mumakan.0201.desc: "Mes armées ont brisé les derniers défenseurs de [GetTitleByKey('k_talilan').GetName], et les [elves|E] survivants ont fui. Leurs forêts brûlent... Bien ! Que ceci serve de leçon à tous ceux qui se dresseront sur ma route. Nul ne peut s'opposer à la puissance d'un conquérant !"
 mumakan.0201.a: "Bon débarras."

 mumakan.0202.t: "L'Ascension des Nâfarati"
 mumakan.0202.desc: "Voici un jour de gloire ! Nous avons taillé un [kingdom|E] qui nous est propre, où notre peuple pourra habiter et prospérer. Nul ne peut désormais nous refuser ce qui nous est dû par droit du sang et du fer !\n\nÉlevons un grand sanctuaire de guerre près de la [capital|El] pour commémorer ce jour de triomphe, et pour créer un terrain d'entraînement pour nos guerriers où ils pourront être formés et exercés dans l'art de la guerre. Bientôt, le son de leurs pieds en marche sera entendu dans tout l'Utter South !"
 mumakan.0202.a: "Gloire à Jî-Indûr !"

 mumakan.0203.t: "Le Palais de la Majesté"
 mumakan.0203.desc: "C'est achevé ! Le palais, si longtemps en construction, est terminé. Désormais, de blancs murs de marbre s'élèvent de la grande place de la capitale, et deux statues magnifiquement sculptées gardent l'entrée principale de l'édifice. À l'intérieur, de nombreuses chambres et salles, de quoi abriter en leur sein une petite ville entière !\n\nC'est en ce lieu que je me retirerai quand le fardeau de gouverner deviendra trop lourd à porter, et que je m'accorderai de précieux instants de paix et de silence. Revivifié, je reparaîtrai, et gouvernerai avec une sagesse et une prudence renouvelées, afin que les Royaumes Jumeaux continuent de prospérer sous ma main bienveillante."
 mumakan.0203.a: "Une chose magnifique en vérité."

 mumakan.0250.t: "Une Offrande aux Uvâg"
 mumakan.0250.desc: "Tremblant, je dépose le panier rempli de fruits et de viande séchée sur les pierres gravées aux pieds des montagnes qui se dressent vers le ciel. Du bétail a été conduit dans un enclos muraillé isolé à proximité, et nous l'y laisserons pour que les Uvâg le réclament.\n\nDu coin de l'œil, je perçois un mouvement. Je me retourne dans cette direction, rien. Non... n'était-ce pas une ombre là-bas, sous les rochers ? Je ne saurais l'assurer.\n\nComme je plains les âmes tourmentées de nos ancêtres, condamnées à errer pour toujours sur ces collines désolées. Par cette offrande, ils seront apaisés pour une décennie encore..."
 mumakan.0250.a: "Repartons."

 mumakan.0350.t: "L'Épreuve Finale"
 mumakan.0350.desc: "Le sable sous mes pieds est chaud tandis que le soleil du soir commence sa descente derrière moi, là où se trouve l'île. Je détourne le regard de sa lumière et fais face aux ténèbres qui s'étendent à l'est. Je ne me retourne pas vers ceux qui se tiennent avec moi sur la plage, car tous les mots ont depuis longtemps été dits. Ils connaissent nos traditions, comme je les connais.\n\nLa première vague touche mes jambes, mais je ne m'arrête pas. Bientôt, les eaux m'enlacent, et je commence à nager. Toujours vers l'est, le soleil couchant dans mon dos. Que ma force me porte loin, et qu'elle attire la faveur sur ceux qui doivent désormais gouverner Ambasôn."
 mumakan.0350.a: "Je nagerai jusqu'à ne plus pouvoir nager."

 #Elevating the Kingdom of Ambason & the Isles
 mumakan.0351.t: "La Promesse d'Amba Accomplie"
 mumakan.0351.desc: "Pendant des années, j'ai sillonné les voies d'eau du monde, razziez, pillant et ravageant. J'ai amassé plus d'or que la plupart des rois n'en verront jamais, et mon nom est maudit de $k_senga_muta$ à $e_khy$.\n\nJe suis, sans conteste, le plus infâme [founder.GetWomanMan] vivant, digne enfant d'Amba, et j'ai versé mon butin et ma réputation dans la colonisation et la fortification intensive de $c_ambason$.\n\nDésormais, après tous ces siècles, la promesse d'Amâv à sa fille Amba a enfin été tenue, et mon peuple revendique un royaume, ou une souveraineté, qui lui est propre..."
 mumakan.0351.a: "Amba me regarde avec fierté."
 mumakan.0351.c: "Je suis le [founder.GetLadyLord|U] du Sang et de l'Or !"
 mumakan.0351.b: "Enfin, mon rêve est accompli..."
 mumakan.0352.t: "$mumakan.0351.t$"
 mumakan.0352.desc: "C'est un secret de polichinelle depuis longtemps que [founder.GetFirstName] a refusé d'accepter ou de prendre quelque couronne que ce soit hormis une seule : [founder.GetPrimaryTitle.GetNameNoTier].\n\nSon cœur est fixé là-dessus depuis si longtemps que mon suzerain semble avoir consacré s[founder.Custom('FR_OnA')] vie à légitimer le pouvoir et l'autorité de s[founder.Custom('FR_OnA')] île natale.\n\nAprès d'innombrables raids, guerres et massacres en tout genre, [founder.Custom('FR_IlElle')] y a réussi.\n\nOn prétend que chaque joyau de s[founder.Custom('FR_OnA')] nouvelle couronne vient d'un raid différent. Certains à la cour chuchotent même qu'il reste des sertissures vides que [founder.GetTitledFirstNameNoTooltip] s'emploiera à remplir."
 mumakan.0352.a: "Pensez à tout l'or que nous allons amasser !"
 mumakan.0352.b: "Un #EMP [founder.GetTitleAsNameNoTooltip]#! ? [founder.GetSheHe|U] est pire qu'un baron brigand !"
 mumakan.0353.t: "$mumakan.0351.t$"
 mumakan.0353.desc: "Même le plus humble paysan de $k_senga_muta$ a entendu parler du monstrueux [founder.GetFirstName], Fléau des Mers, et de s[founder.Custom('FR_OnA')] quête de toute une vie pour faire reconnaître s[founder.Custom('FR_OnA')] royaume de rêve de pirates razziez.\n\nC'est une légende qui répand l'effroi parmi seigneurs et serfs, mais il semble que la frontière entre mythe et histoire se soit brouillée ces derniers temps.\n\nÀ compter de ce jour, #EMP [founder.GetTitleAsNameNoTooltip]#! [founder.GetFirstNameNoTooltip] a annoncé l'accomplissement de l'œuvre de s[founder.Custom('FR_OnA')] vie.\n\n$k_senga_muta$ compte un nouveau royaume sur ses rivages, et il est terrible à contempler."
 mumakan.0353.a: "[founder.GetSheHe|U] ne va pas nous razzia #EMP nous#!, non ?"
 mumakan.0353.b: "Rien de plus qu'un [founder.GetTitleAsNameNoTooltip] de Voleurs !"


 mumakan.0400.opening: "Au redoutable et puissant Sandamal de Mûmakan,"
 mumakan.0400.desc: "Vous nous avez surpassés. Nous nous inclinons devant votre suprême puissance. Épargnez-nous de nouveaux pillages et saccages, nous vous en supplions ! Nous nous soumettons à votre autorité et vous servirons fidèlement, si vous daignez nous accepter."
 mumakan.0400.a: "Point de paix. Seulement la guerre."
 mumakan.0400.b: "Soit... mais vous serez humiliés."
 mumakan.0400.b.tt: "Chaque souverain au sein de [GetTitleByKey('k_koronande').GetName] est vassalisé par #high you#!"

 mumakan.0401.opening: "À l'absurde Ataraka,"
 mumakan.0401.desc: "Si vous pensez que vos paroles venimeuses pourraient m'infléchir, détrompez-vous. La guerre continuera jusqu'à ce que toutes vos villes pitoyables ne soient plus que ruines brisées."
 mumakan.0401.a: "La peste soit de lui !"

 mumakan.0402.opening: "Au sage Ataraka,"
 mumakan.0402.desc: "Votre reddition est acceptée. Vous me servirez, mais non depuis Kôronânde. Vous gouvernerez à la place ces îles qui se dressent dans la baie. Veillez à y arriver en temps voulu."
 mumakan.0402.a: "Adieu, Kôronânde..."
 mumakan.0402.a.tt: "Chaque souverain au sein de [GetTitleByKey('k_koronande').GetName] est vassalisé par [sandamal.GetName]"