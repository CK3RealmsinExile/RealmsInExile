l_french:
 # Decision
 decision_kathasaptha_manuscript: "Étudier un manuscrit religieux"
 decision_kathasaptha_manuscript_tooltip: "Étudier un texte religieux important venant du [farharad|E]."
 decision_kathasaptha_manuscript_desc: "Autour de la [bayoftulwang|E], les frontières entre les traditions [adunaic|E] et [haradric|E] sont floues. En tant que dirigeant, il est recommandé d’étudier et d’interpréter des manuscrits issus de divers horizons."
 decision_kathasaptha_manuscript_confirm: "Choisir un manuscrit à étudier"
 decision_kathasaptha_manuscript_effect_tooltip_1: "Gagnez #V [GetPlayer.MakeScope.ScriptValue('medium_piety_gain')]#! de [piety|El] [piety_i|E] lorsque votre étude est terminée."
 decision_kathasaptha_manuscript_effect_tooltip_2: "Si vous possédez au moins #V [GetPlayer.MakeScope.ScriptValue('kathasaptha_manuscript_learning_req_value')]#! [learning|El] [learning_i|E], vous pouvez annoter personnellement votre copie du manuscrit pour gagner un supplément de #V [GetPlayer.MakeScope.ScriptValue('medium_prestige_gain')]#! de [prestige|El] [prestige_i|E]. Pendant ce temps, vous aurez le [modifier|El] [GetModifier('kathasaptha_annotating_manuscript').GetNameWithTooltip]."
 decision_kathasaptha_manuscript_select_text: "Autour de la [bayoftulwang|E], les lignes religieuses sont floues, et je suis attendu pour étudier des textes de divers horizons."
 kathasaptha_manuscript_PICK_TYPE: "$decision_kathasaptha_manuscript_confirm$"
 kathasaptha_manuscript_kathasaptha_name: "#Bold Kâthasaptha#!"
 kathasaptha_manuscript_kathasaptha_desc: "$kathasaptha_manuscript_kathasaptha_name$"
 kathasaptha_manuscript_kathasaptha_tooltip: "Une collection de décrets et de récits écrits fondamentaux pour le développement religieux de [bellakar|E].\n\nÉquipé, cet [artifact|El] réduit le coût en [gold_i|E] [or|E] pour l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName]."
 kathasaptha_manuscript_katpolozay_name: "#Bold Kât-Polozây#!"
 kathasaptha_manuscript_katpolozay_desc: "$kathasaptha_manuscript_katpolozay_name$"
 kathasaptha_manuscript_katpolozay_tooltip: "Le #bold Kât-Polozây#! est le chant et mythe de création sur lequel repose une grande partie de la théologie du Far Harad.\n\nÉquipé, cet [artifact|El] permet de gagner un supplément de [prestige|E] [prestige_i|E] lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName]."
 kathasaptha_manuscript_urenanvale_name: "#Bold Ûrê’n Avalê#!"
 kathasaptha_manuscript_urenanvale_desc: "$kathasaptha_manuscript_urenanvale_name$"
 kathasaptha_manuscript_urenanvale_tooltip: "Le #bold Ûrê’n Avalê#! (Ad. « Jour de la Renaissance ») examine une journée sainte importante observée à [bellakar|E].\n\nÉquipé, cet [artifact|El] permet de gagner de l'[opinion|El] [opinion_i|E] supplémentaires de chaque participant lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName]."
 kathasaptha_manuscript_bozishkolir_name: "#Bold Bôzish-Kôlir#!"
 kathasaptha_manuscript_bozishkolir_desc: "$kathasaptha_manuscript_bozishkolir_name$"
 kathasaptha_manuscript_bozishkolir_tooltip: "Le #bold Bôzish-Kôlir#! examine les similitudes et différences dans la représentation des dieux entre [farharad|E] et [bellakar|E].\n\nÉquipé, cet [artifact|El] permet de gagner un supplément de [piety|El] [piety_i|E] lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName]."
 kathasaptha_manuscript_gatarazay_name: "#Bold Gatar-Azây#!"
 kathasaptha_manuscript_gatarazay_desc: "$kathasaptha_manuscript_gatarazay_name$"
 kathasaptha_manuscript_gatarazay_tooltip: "Le #bold Gatar-Azây#! examine différentes versions orales de [legend_of_iunast|El].\n\nÉquipé, cet [artifact|El] permet de gagner un supplément de [legitimacy|El] [legitimacy_i|E] lors de l’[GetActivityType( 'activity_firstfruits_festival' ).GetName]."
 kathasaptha_manuscript_missingmountain_name: "#Bold La Montagne Disparue#!"
 kathasaptha_manuscript_missingmountain_desc: "$kathasaptha_manuscript_missingmountain_name$"
 kathasaptha_manuscript_missingmountain_tooltip: "Un texte [bellakari|E] déplorant la [downfall|El] et la perte du [meneltarma|E].\n\nÉquipé, cet [artifact|El] permet de réduire davantage le [stress|El] [stress_loss_i|E] lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName]."
 kathasaptha_manuscript_emissariesinnature_name: "#Bold Émissaires dans la Nature#!"
 kathasaptha_manuscript_emissariesinnature_desc: "$kathasaptha_manuscript_emissariesinnature_name$"
 kathasaptha_manuscript_emissariesinnature_tooltip: "Un livre sur les animaux sacrés autour de la [bayoftulwang|E], et leur relation avec les dieux.\n\nÉquipé, cet [artifact|El] permet de gagner un supplément d'[lifestyle_experience|E] lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName]."
 kathasaptha_manuscript_scoldingtheflames_name: "#Bold Réprimande des Flammes#!"
 kathasaptha_manuscript_scoldingtheflames_desc: "$kathasaptha_manuscript_scoldingtheflames_name$"
 kathasaptha_manuscript_scoldingtheflames_tooltip: "Une réprimande sévère contre les Aûdrat Vâtra, défendant une compréhension orthodoxe des dieux de [ray|E].\n\nÉquipé, cet artifact permet à son possesseur d’augmenter le [contrôle|E] [control_i] dans les [counties|El] du [domain|El] affectés par l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName]. Cet effet varie selon l'[activity_option|E] #V $lotr_firstfruits_fruit_alms_type$#!."
 kathasaptha_annotating_manuscript: "Annotation d’un manuscrit religieux"
 kathasaptha_annotating_manuscript_desc: "Ce personnage étudie et annote un manuscrit religieux provenant de la [bayoftulwang|E], consacrant un effort supplémentaire à formuler sa propre interprétation en marginalia."


 # Artifacts
 kathasaptha_manuscript_opening_desc: "L’un des nombreux textes religieux couramment distribués et étudiés autour de la [bayoftulwang|E].[GetPlayer.Custom('kathasaptha_manuscript_creator')]\n\n"
 kathasaptha_manuscript_creator_others_name: ""
 kathasaptha_manuscript_creator_self_name: "Cette version particulière comporte des annotations en [ROOT.Char.GetCulture.GetLanguage.GetName] par [ROOT.Char.GetTitledFirstName], ajoutant ses propres réflexions et interprétations."

 kathasaptha_artifact_kathasaptha_name: "Kâthasaptha"
 kathasaptha_artifact_kathasaptha_desc: "$kathasaptha_manuscript_opening_desc$Ce manuscrit est une collection de décrets et de récits écrits du règne du roi Zimrêbal Main-de-Fer de [bellakar|E], fondamental pour le développement religieux de la colonie. Il contient notamment les visions qu’il reçut de Ladnôca, le début de la pratique de l’ascension de l’Izindutârik et la formalisation du syncrétisme émergent du royaume.\n\n#EMP Équiper cet [artifact|El] réduit le coût en [gold|El] [gold_i|E] pour l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName].#!"
 kathasaptha_artifact_katpolozay_name: "Kât-Polozây"
 kathasaptha_artifact_katpolozay_desc: "$kathasaptha_manuscript_opening_desc$Ce manuscrit est une copie du #bold Kât-Polozây#!, le chant originel et mythe de création sur lequel repose une grande partie de la théologie de $far_harad_religion$. Cette copie contient uniquement l’hymne originel, sans le long code de loi et d’honneur ni les nombreux récits et matériaux supplémentaires que la totalité de l’écriture sacrée de [ray|E] inclurait.\n\n#EMP Équiper cet [artifact|El] augmente la durée du [county_modifier|E] [GetModifier('firstfruits_festival_county_modifier').GetNameWithTooltip] provenant de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName] de #P +20%#!.#!"
 kathasaptha_artifact_urenanvale_name: "Ûrê’n Avalê"
 kathasaptha_artifact_urenanvale_desc: "$kathasaptha_manuscript_opening_desc$Ce manuscrit examine les fondations théologiques du #bold Ûrê’n Avalê#! (Ad. « Jour de la Renaissance »), une journée sainte [bellakarean|E] instaurée par le roi Zimrêbal Main-de-Fer après sa première vision de Ladnôca. Suivant son exemple, les monarques Tumakveh ascendent l’Izindutârik en imitation des rois de [numenor|E] d’antan, offrant une prière à [Concept('eru','Êru')|E] en son sanctuaire.\n\n#EMP Équiper cet [artifact|El] permet de gagner de l'[opinion|El] [opinion_i|E] supplémentaires de chaque participant lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName].#!"
 kathasaptha_artifact_bozishkolir_name: "Bôzish-Kôlir"
 kathasaptha_artifact_bozishkolir_desc: "$kathasaptha_manuscript_opening_desc$Ce manuscrit est une copie du #bold Bôzish-Kôlir#!, un traité Bôzishnara examinant les similitudes et différences entre le panthéon traditionnel $far_harad_religion_adj$ et les [kolirgods|E] de la tradition [bellakari|E]. Il fut écrit par [GetScriptedCharacterByHistoryID('linedeyeypriestess1').GetFirstNameNicknamed], prêtresse [Concept('ray','Râyan')|E]. Lors d’une prière dans le [GetTitleByKey('d_briy_miyesec').GetNameNoTier], elle eut une vision de Ladnôca, lui révélant que sa tâche n’était pas de prêcher mais d’écouter. Elle parcourut la [bayoftulwang|E], interrogeant des gens de tous horizons sur leur conception des dieux, et rédigea finalement ses conclusions à [GetTitleByKey('b_tresti').GetNameNoTier], sous l’égide du Grand Chantre.\n\n#EMP Équiper cet [artifact|El] permet de gagner #P +20%#! de la [piety|El] [piety_i|E] supplémentaires lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName].#!"
 kathasaptha_artifact_gatarazay_name: "Gatar-Azây"
 kathasaptha_artifact_gatarazay_desc: "$kathasaptha_manuscript_opening_desc$Ce manuscrit est une copie du #bold Gatar-Azây#!, ouvrage du savant influent [manuscript_original_author.GetFirstNameNicknamed] de [GetTitleByKey('d_sarwa').GetNameNoTier]. Il compare différentes versions orales de [legend_of_iunast|El] racontées autour de la [bayoftulwang|E] et au-delà, et tente de reconstruire la version originale contée par Gatara, compagnon d’Iunást. Bien que les conclusions de l’auteur fassent débat, ce livre est devenu central dans les discussions théologiques du [farharad|E].\n\n#EMP Équiper cet [artifact|El] permet de réduire davantage le [stress|El] [stress_loss_i|E] lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName].#!"
 kathasaptha_artifact_missingmountain_name: "La Montagne Disparue"
 kathasaptha_artifact_missingmountain_desc: "$kathasaptha_manuscript_opening_desc$Ce manuscrit est l’une des reconstructions du #bold La Montagne Disparue#!, un texte religieux [bellakari|E] important rédigé peu après la [downfallofnumenor|E]. L’auteur, un marin nommé [GetScriptedCharacterByHistoryID('linesuldor9').GetFirstNameNicknamed], passa sa jeunesse à Númenor avant de quitter l’île lorsque [pharazon|E] prit le pouvoir. Dans ce livre, il déplore la perte du [meneltarma|E] et ses conséquences pour les fidèles des colonies, et fournit l’un des derniers témoignages directs des Trois Prières, telles qu’offertes par Tar-Palantir.\n\n#EMP Équiper cet [artifact|El] permet de gagner de la [legitimacy|El] [legitimacy_i|E] supplémentaires selon votre [piety_level|El] lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName].#!"
 kathasaptha_artifact_emissariesinnature_name: "Émissaires dans la Nature"
 kathasaptha_artifact_emissariesinnature_desc: "$kathasaptha_manuscript_opening_desc$Ce manuscrit examine les animaux sacrés de la [bayoftulwang|E] et les divinités qui leur sont associées. On y trouve notamment une longue section sur le rôle des chats comme émissaires de la déesse Îshtra, un lien qui se renforça au cours de la [thirdage|E].\n\n#EMP Équiper cet [artifact|El] permet de gagner un supplément d'[lifestyle_experience|E] lors de l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName].#!"
 kathasaptha_artifact_scoldingtheflames_name: "Réprimande des Flammes"
 kathasaptha_artifact_scoldingtheflames_desc: "$kathasaptha_manuscript_opening_desc$Ce manuscrit est un traité influent réprimandant sévèrement les Aûdrat Vâtra. Rédigé par un Chanteur éminent vers l’an [ageTA|E] 1750, il peut être vu comme une réponse aux sentiments pro-Vâtran gagnant en popularité à l’époque.\n\n#EMP Équiper cet [artifact|El] permet d’augmenter le [contrôle|E] [control_i] dans [counties|El] du [domain|El] affectés par l’[activity|El] [GetActivityType( 'activity_firstfruits_festival' ).GetName]. Cet effet varie selon l'[activity_option|E] #V $lotr_firstfruits_fruit_alms_type$#!.#!"

 # Event Custom Loc with lowercase 'the' where appropriate
 kathasaptha_artifact_subject_kathasaptha_name: "le Kâthasaptha"
 kathasaptha_artifact_subject_katpolozay_name: "le Kât-Polozây"
 kathasaptha_artifact_subject_urenanvale_name: "le Ûrê’n Avalê"
 kathasaptha_artifact_subject_bozishkolir_name: "le Bôzish-Kôlir"
 kathasaptha_artifact_subject_gatarazay_name: "le Gatar-Azây"
 kathasaptha_artifact_subject_missingmountain_name: "la Montagne Disparue"
 kathasaptha_artifact_subject_emissariesinnature_name: "Émissaires dans la Nature"
 kathasaptha_artifact_subject_scoldingtheflames_name: "Réprimande des Flammes"
 kathasaptha_artifact_subject_fallback_name: "le Manuscrit"

 # Events
 kathasaptha.0050.t: "Étude du manuscrit : [ROOT.Char.Custom('kathasaptha_manuscript_subject')|U]"
 kathasaptha.0050.desc.intro: "Dans la [ROOT.Char.GetFaith.GetName], il est courant pour les dirigeants d’étudier des textes religieux provenant de tout la [bayoftulwang|E], y compris ceux appartenant à d’autres croyances. Bien que nos convictions et pratiques diffèrent, la capacité de voir le monde à travers un prisme différent doit être considérée comme une force, et non comme un signe d’hostilité. En fin de compte, nous servons tous d’une manière ou d’une autre le [ROOT.Char.GetFaith.PantheonTerm].\n\n"
 kathasaptha.0050.desc.chaplain: "Mon [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('court_chaplain'))] [court_chaplain.GetFirstName], que j’ai chargé de se procurer une copie du #bold [ROOT.Char.Custom('kathasaptha_manuscript_subject')]#!, sujet de mon étude, s’approche : « Ma [ROOT.Char.GetLadyLord], j’ai obtenu cette copie du manuscrit pour votre usage. Vous n’êtes en aucun cas obligé de l’étudier au point que cela affecte vos autres devoirs, bien que cela augmenterait sûrement votre piété aux yeux de vos sujets. »"
 kathasaptha.0050.desc.fallback: "Le [ROOT.Char.GetFaith.PriestNeuter] que j’ai chargé de se procurer une copie du #bold [ROOT.Char.Custom('kathasaptha_manuscript_subject')]#!, sujet de mon étude, s’approche : « Ma [ROOT.Char.GetLadyLord], j’ai obtenu cette copie du manuscrit pour votre usage. Vous n’êtes en aucun cas obligé de l’étudier au point que cela affecte vos autres devoirs, bien que cela augmenterait sûrement votre piété aux yeux de vos sujets. »"
 kathasaptha.0050.a: "Je vais simplement le lire."
 kathasaptha.0050.b: "Je l’étudierai en profondeur !"
 kathasaptha.0050.tooltip: "L’étude du manuscrit peut prendre jusqu’à un an, après quoi vous obtiendrez un [artifact|El]."
 kathasaptha.0050.tooltip_2: "La qualité de l'[artifact|El] sera aléatoire."
 kathasaptha.0050.tooltip_3: "La qualité de l'[artifact|El] dépendra de votre [skill|El] en [learning|El] [learning_i|E]."

 kathasaptha.0051.t: "$kathasaptha.0050.t$ : Conclusion"
 kathasaptha.0051.desc.self: "Après de nombreux jours et semaines de contemplation apparemment sans fin, j’ai terminé mon étude du manuscrit – un aperçu fascinant des croyances de la [bayoftulwang|E]. Orné d’annotations personnelles et de marginalia, cet exemplaire du texte sacré inspirera mes successeurs et les aidera à comprendre ma pensée personnelle sur le sujet.\n\nCe manuscrit en particulier"
 kathasaptha.0051.desc.other: "Après de nombreux jours et semaines de contemplation apparemment sans fin, j’ai terminé mon étude du manuscrit – un aperçu fascinant des croyances de la [bayoftulwang|E]. Bien que je ne l’aie pas annoté, cet exemplaire du texte sacré demeure de valeur personnelle pour moi.\n\nCe manuscrit en particulier"
 kathasaptha.0051.a: "J’ai acquis une meilleure compréhension de mes croyances."

 kathasaptha.0051.desc.kathasaptha: "le #bold Kâthasaptha#!, une collection de décrets et de récits écrits du règne du roi [zimrezimrebal_long|E] de [bellakar|E], fondamental pour le développement religieux de la colonie. Il contient notamment les visions qu’il reçut de Ladnôca, le début de la pratique de l’ascension de l’Izindutârik et la formalisation du syncrétisme émergent du royaume."
 kathasaptha.0051.desc.katpolozay: "le #bold Kât-Polozây#!, le chant originel et mythe de création sur lequel repose une grande partie de la théologie $far_harad_religion$. Cette copie contient uniquement l’hymne originel, sans le long code de loi et d’honneur ni les nombreux récits et matériaux supplémentaires que la totalité de l’écriture sacrée de [ray|E] inclurait."
 kathasaptha.0051.desc.urenanvale: "le #bold Ûrê’n Avalê#!, un texte examinant les fondations théologiques du 'Jour de la Renaissance', une journée sainte [bellakarean|E] instaurée par le roi [zimrebal_long|E] après sa première vision de Ladnôca. Suivant son exemple, les monarques Tumakveh ascendent l’Izindutârik en imitation des rois de [numenor|E] d’antan, offrant une prière à [Concept('eru','Êru')|E] en son sanctuaire."
 kathasaptha.0051.desc.bozishkolir: "le #bold Bôzish-Kôlir#!, un traité Bôzishnara examinant les similitudes et différences entre le panthéon traditionnel $far_harad_religion_adj$ et les [kolirgods|E] de la tradition [bellakari|E]. Il fut rédigé par [GetScriptedCharacterByHistoryID('linedeyeypriestess1').GetFirstNameNicknamed], prêtresse [Concept('ray','Râyan')|E]. Lors d’une prière dans le [GetTitleByKey('d_briy_miyesec').GetNameNoTier], elle reçut une vision de Ladnôca, lui révélant que sa tâche n’était pas de prêcher mais d’écouter. Elle passa une grande partie de sa carrière à parcourir la [bayoftulwang|E], interviewant des gens de tous horizons sur leur conception des dieux, et rédigea finalement ses conclusions à [GetTitleByKey('b_tresti').GetNameNoTier], sous l’égide du Grand Chantre."
 kathasaptha.0051.desc.gatarazay: "le #bold Gatar-Azây#!, un livre de l’influent savant [manuscript_original_author.GetFirstNameNicknamed] de [GetTitleByKey('d_sarwa').GetNameNoTier]. Il compare différentes variantes orales de [legend_of_iunast|El] racontées autour de la [bayoftulwang|E] et au-delà, et tente de reconstruire la version originale contée par Gatara, compagnon d’Iunást. Bien que les conclusions de l’auteur fassent débat, le livre est devenu un élément central des discussions théologiques du [farharad|E]."
 kathasaptha.0051.desc.missingmountain: "le #bold La Montagne Disparue#!, un texte religieux [bellakari|E] important rédigé peu après la [downfallofnumenor|E]. L’auteur, [GetScriptedCharacterByHistoryID('linesuldor9').GetFirstNameNicknamed], passa sa jeunesse à Númenor avant de quitter l’île lorsque [pharazon|E] prit le pouvoir. Dans ce livre, il déplore la perte du [meneltarma|E] et ses conséquences pour les fidèles des colonies. Il fournit également l’un des derniers témoignages directs des Trois Prières, telles qu’offertes par Tar-Palantir."
 kathasaptha.0051.desc.emissariesinnature: "le #bold Émissaires dans la Nature#!, un texte examinant les animaux sacrés de la [bayoftulwang|E] et les divinités qui leur sont associées. On y trouve notamment une longue section sur le rôle des chats comme émissaires de la déesse Îshtra, un lien qui ne fit que se renforcer au cours de la [thirdage|E]."
 kathasaptha.0051.desc.scoldingtheflames: "le #bold Réprimande des Flammes#!, un traité influent réprimandant sévèrement les Aûdrat Vâtra. Rédigé par un Chanteur éminent vers l’an [ageTA|E] 1750, il peut être vu comme une réponse aux sentiments pro-Vâtran gagnant en popularité à l’époque."

 kathasaptha.0100.t: "$kathasaptha.0050.t$ : Annulation"
 kathasaptha.0100.desc: "Il y a quelque temps, j’avais commencé une étude personnelle d’un manuscrit provenant de la [bayoftulwang|E].\n\nJe crois désormais en [ROOT.Char.GetFaith.GetName], une foi qui ne pratique pas [GetFaithDoctrine('tenet_bellakari_syncretism').GetBaseName]. En conséquence, j’ai interrompu mes recherches et ma contemplation."
 kathasaptha.0100.a: "J’ai trouvé un nouveau chemin."