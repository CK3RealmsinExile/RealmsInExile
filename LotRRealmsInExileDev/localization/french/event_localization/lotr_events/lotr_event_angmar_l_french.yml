l_french:

 ## WITCH-KING EVENTS ##

 angmar.1001.t: "La Chute du Forodwaith Oriental"
 angmar.1001.desc: "NEEDS LOC Après une campagne éclair, les derniers vestiges des Balsharim ont été soumis. Ils ont été refaçonnés à l'image de leurs semblables et me serviront longtemps et fidèlement. Les terres du [forodwaith|E] oriental sont miennes, j'en ferai ce que bon me semble."
 angmar.1001.a: "C'est désormais l'Angmar occidental !"
 
 angmar.0501.t: "Pure insolence"
 angmar.0501.desc: "Mes espions me rapportent une nouvelle que je peine d'abord à croire véridique. [hwaldar.GetName], cet effronté imbécile de petit chef [hillman|E] qui avait chassé le dernier des rois Dúnedain défaillants du [rhudaur|E], a prêté allégeance... au Roi d'[arthedain|E].\n\nContenant ma juste colère face à cette trahison, je considère mon prochain mouvement avec soin. Il est clair que je ne puis laisser cette insolence impunie. Hwaldar a obtenu son trône en grande partie grâce à mon influence. Son règne ne tient que par mon soutien.\n\nEt pourtant, celui qui a uni les tribus querelleuses des Montagnards pourrait encore se révéler utile s'il reste en vie. Je dois décider avec soin de la meilleure façon de traiter cette situation."
 angmar.0501.a: "Je ne tolérerai point cette insolence. Préparez la guerre !"
 event_angmar_0501_a: "Vous obtenez une revendication sur le [GetTitleByKey('k_rhudaur').GetName] et lancez une invasion contre [hwaldar.GetFullName]."
 angmar.0501.b: "Il peut encore être persuadé de reconsidérer son choix insensé."
 event_angmar_0501_b: "Vous exigerez la soumission totale de [hwaldar.GetFullName]."
 
 angmar.0502.t: "Sa dernière chance gaspillée"
 angmar.0502.desc: "[hwaldar.GetFullName] a refusé mon offre miséricordieuse, me crachant au visage. Il n'est qu'une réponse à cette insolence.\n\nQue sonnent les cors de guerre ! Angmar sera déchaîné..."
 angmar.0502.a: "Préparez la guerre !"
 host_of_angmar: "Ost d'Angmar"
 
 angmar.0503.t: "Une sage décision"
 angmar.0503.desc: "[hwaldar.GetFullName] a sagement décidé de céder à mes exigences et a ployé le genou devant moi. Néanmoins, je ne puis laisser son insolence passée impunie...\n\nLe [GetTitleByKey('k_rhudaur').GetName] lui sera retiré, le réduisant à un simple Haut Chef. Je prendrai le contrôle direct de cette misérable terre et m'assurerai qu'il n'y ait plus de rébellions contre mon autorité."
 angmar.0503.a: "Le Rhudaur est mien !"
 
 angmar.0504.t: "Le Rhudaur s'étend"
 angmar.0504.desc: "Mes espions me rapportent des nouvelles encourageantes du sud. [hwaldar.GetFullName], le souverain [hillman|E] du [GetTitleByKey('k_rhudaur').GetName], a réussi à chasser les derniers Dúnedain de l'Angle de Mitheithel, entre les rivières Bruinen et Hoarwell.\n\nAyant prouvé son utilité, je me demande ce qu'il convient de faire du soi-disant Chef des Chefs, [hwaldar.GetFirstName]. Je pourrais le laisser poursuivre sa guerre contre les Dúnedain, mais il est ambitieux et volontaire. Cette victoire pourrait lui faire croire que son alliance avec [angmar|E] n'est plus nécessaire...\n\nPeut-être un rappel s'impose-t-il ?"
 angmar.0504.a: "J'exigerai un tribut du Chef des Chefs."
 event_angmar_0504_a: "Vous exigerez que [hwaldar.GetFullName] devienne votre tributaire."
 angmar.0504.b: "Je le laisserai libre de ses mouvements... pour l'instant."
 angmar.0505.t: "Tribut du Rhudaur"
 angmar.0505.desc: "Sage choix ! [hwaldar.GetFullName] a envoyé un émissaire, déclarant accepter de devenir mon tributaire.\n\nIl me sera d'une grande utilité à l'avenir. Désormais, je puis me concentrer sur ma guerre imminente contre les royaumes d'[arthedain|E] et de [cardolan|E]."
 angmar.0505.a: "La Couronne de Fer s'élève !"
 event_angmar_0505_a: "Vous obtenez le [GetTitleByKey('e_angmar').GetName]"
 
 angmar.0506.t: "Une exigence rejetée"
 angmar.0506.desc: "Un messager du [rhudaur|E] m'apporte la nouvelle que [hwaldar.GetFullName] a refusé de devenir mon tributaire. L'imbécile incapable !\n\nJe devrai surveiller de près l'ambitieux Chef des Chefs, de peur qu'il ne songe à se défaire davantage du joug d'[angmar|E].\n\nIl y a de l'agitation parmi ceux des chefs de [hwaldar.GetFirstName] qui ont commencé à suivre les croyances d'Angmar, et beaucoup parlent de rébellion ouverte contre leur Chef des Chefs.\n\nIl semblerait que le châtiment de Hwaldar soit déjà sur lui..."
 angmar.0506.a: "Qu'ils se querellent !"
 event_angmar_0506_a: "Les chefs les plus puissants se rebelleront contre [hwaldar.GetName]."
 
 angmar.0507.t: "Son plus grand échec"
 angmar.0507.desc: "Mes espions me rapportent des nouvelles frustrantes du sud. [hwaldar.GetName], l'autoproclamé Chef des Chefs, a échoué dans sa guerre contre les derniers Dúnedain du [rhudaur|E].\n\nSon échec est tel que je ne puis plus tolérer sa direction médiocre. Il est clair que les [hillmen|E] du Rhudaur doivent être administrés de plus... près.\n\nJ'en ferai des vassaux directs de la Couronne de Fer, avec effet immédiat."
 angmar.0507.a: "L'incompétence ne sera jamais tolérée !"
 event_angmar_0507_a: "Le [GetTitleByKey('k_rhudaur').GetName] est détruit, et ses chefs restants deviennent vos vassaux directs."
 
 ## MINOR CHARACTERS ##

 angmar.3050.t: "Un émissaire du Rhudaur"
 angmar.3050.desc: "Qu'est-ce donc ? Un messager des [hillmen|E] du sud ? J'ai pas confiance.\n\nBon ! Qu'il parle, s'il le faut. C'est qui ce [tull.GetName] ? Un petit arriviste qui cherche des alliés ?\n\nBah ! On fait pas de diplomatie ici ! Et pourtant... Peut-être que je devrais réfléchir à cette offre...\n\nD'un autre côté, j'aimerais bien lui arracher le cœur, à ce messager !"
 angmar.3050.a: "Soit ! Il aura son alliance."
 angmar.3050.b: "Non ! Déguerpis, messager, avant que je perde patience."
 angmar.3050.c: "Il ose ME donner des ordres ? Je prendrai ses terres et lui arracherai le cœur !"