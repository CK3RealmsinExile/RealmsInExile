 lotr_pet.0101.t: "Un Compagnon félin"
 lotr_pet.0101.desc.city_of_cats: "Devant moi se trouve un jeune chat, apporté par les serviteurs du temple d’Îshtra. Celui-ci a été spécialement élevé dans l’enceinte du temple et est d’une lignée exceptionnelle.\n\nLe petit serviteur de la déesse me regarde de ses grands yeux, léchant ses pattes avec une adorable innocence."
 lotr_pet.0101.desc: "Devant moi se trouve un chaton, apporté par mes serviteurs.\n\nIl me regarde de ses grands yeux, léchant ses pattes avec une adorable innocence."
 lotr_pet.0101.a: "J’ai toujours voulu un chat !"
 lotr_pet.0101.b: "Après réflexion..."