 mordor.1000.t: "La Longue paix"
 mordor.1000.desc: "Le [mordor|E] sommeille. Nous prenons notre temps et préparons cette terre pour le retour de notre maître, [sauroncharacter|E] qui se repose à [GetTitleByKey('c_amon_lanc').GetNameNoTier], rassemblant Sa force en secret.\n\nLe Mordor, en l'état actuel, est une terre divisée. Au nord, nous serviteurs de Sauron régnons sur les Orques sauvages et querelleurs, tandis qu'au sud, la force esclave des Núrniags nourrit nos armées. Pourtant il y a beaucoup d'œuvre à accomplir avant que la Tour Noire puisse s'élever à nouveau, et comme Seigneur des Neuf, il est de mon devoir de l'accomplir. Plusieurs voies se révèlent à moi.\n\nÀ l'ouest, les Intendants du [gondor|E] rassemblent leur force. Il y a de nombreux siècles j'ai pris Minas Ithil d'eux, et bien qu'ils n'aient lancé aucune tentative pour la reconquérir, ils posent encore une menace. Les défenses au [GetTitleByKey('c_morannon').GetNameNoTier] et à [GetTitleByKey('minas_ithil').GetNameNoTier] doivent être renforcées si nous devons nous prémunir contre toute menace extérieure, et leurs murailles noires seront un rempart contre les ennemis de Sauron.\n\nPourtant cette stratégie est entièrement défensive. Je pourrais me concentrer sur l'entraînement des tribus querelleuses d'[orcs|E] en une force de combat redoutable, mettant fin aux luttes intestines et favorisant une race digne du Mordor ; et ainsi cette nouvelle armée pourrait être à la fois la lance et le bouclier du Mordor.\n\nÀ l'ouest s'étend l'[GetTitleByKey('k_ithilien').GetNameNoTier], Jardin du Gondor, avec ses riches ressources de bois que nous pourrions piller.\n\nMa troisième option concerne [GetTitleByKey('k_nurn').GetNameNoTier], où demeurent les arrogants Núrniags. Les provisions rassemblées sur leurs champs d'esclaves sont essentielles, mais les humilier et adopter une approche plus directe de l'économie esclavagiste pourrait s'avérer bénéfique à long terme.\n\nEt Gorgorth recèle encore une puissance industrielle colossale, qui n’attend qu’une volonté ferme pour être libérée."
 mordor.1000.desc.a: "J'ai entrepris les premiers pas pour préparer le [mordor|E] au retour de [sauroncharacter|E], mais il pourrait y avoir davantage d'œuvre qui doit être accomplie.\n\nJe dois m'assurer que la Terre Sombre est prête pour son maître légitime !"
 mordor.1000.a: "Je forgerai les orques en une véritable force combattante !"
 mordor.1000.b: "Dépouillons l'Ithilien, Jardin du [gondor|e]."
 mordor.1000.c: "Renforçons nos défenses de peur que nos ennemis assiègent le Mordor."
 mordor.1000.d: "Les Núrniags doivent être humiliés et dépouillés de leur fierté."
 mordor.1000.e: "Les feux de l'industrie brûleront" 
 mordor.1000.f: "Nous avons accompli beaucoup. Envoyez mot au Maître..."
 breeding_orcs: "Programme d’Élevage"
 raids_on_ithilien: "Raids Accrus"
 building_defenses: "Construction de Défenses"
 managing_vassals: "Gestion des Vassaux"
 building_spree: "Folie de Construction"

 next_mission_effect: "Après un certain temps, une nouvelle tâche apparaîtra"

 mordor.1001.t: "Mordor fortifié"
 mordor.1001.desc: "Nos efforts n'ont point été vains. Chaque colline est maintenant surveillée, chaque entrée dans le [mordor|E] bien défendue.\n\nNous avons renforcé les fortifications et rassemblé les provisions de siège ; et les portes et murailles sont garnies des plus forts parmi les [orcs|E]. Les murailles noires de nos forteresses sont plus hautes que jamais, nos portes fortifiées de fer et d'acier. Nos murs ne seront point percés, nos garnisons ne faibliront point, nos terres ne seront souillées par nul autre que nous !\n\nMais aussi satisfait que je sois de ce récent succès, je ne peux oublier qu'il y a toujours davantage d'œuvre à accomplir. Bientôt je ferai mon prochain mouvement pour m'assurer que le Mordor est prêt pour le retour de son véritable Maître..."
 mordor.1001.a: "Nul n'entrera au Mordor sans être vu."
 
 mordor.1002.t: "Montée de l'armée de Morgul"
 mordor.1002.desc: "L’Armée de Morgul se tient prête. De longues années ont été consacrées à une sélection rigoureuse et à un entraînement implacable afin de forger les [orcs|E] du [mordor|E] en une force capable d’abattre les Seigneurs de l’Ouest lorsque l’ordre en sera donné. L’heure est venue de choisir mon arme principale, le cœur d’élite des armées du Seigneur Ténébreux.\n\nLourdement armés et cuirassés, les Uruks noirs sont plus puissants que tout autre orque. Les Caragors sont des wargs perfectionnés : vastes comme des chevaux, et presque aussi rusés que leurs maîtres. Enfin viennent les Olog-hai, grands trolls d’une trempe nouvelle, plus proches des Orques que leurs congénères obtus, féroces et durs comme la pierre elle-même. Lequel conduira le mieux mon ost contre les [dunedain|E] ?"
 mordor.1002.a: "Les Uruks ravageront le Gondor !"
 mordor.1002.b: "Les terribles Caragors ouvriront la marche !"
 mordor.1002.c: "Nul Homme ne saurait résister à la force des Olog-hai !"
 
 mordor.1003.t: "Núrn réorganisé"
 mordor.1003.desc: "Les Núrnîags ont de longue date administré leurs propres terres, prêtant peu d’attention aux volontés de Morgul et veillant davantage à leur abondance qu’à la production militaire. Mais les temps changent. Il est désormais requis qu’ils prennent pleinement part à l’effort commun, car les vastes fermes serviles de Núrn sont essentielles à l’approvisionnement de nos armées.\n\nNous pourrions les laisser poursuivre selon leurs usages, voire accroître leur autonomie dans la gestion de leurs fiefs. Toutefois, une main plus ferme pourrait tirer bien davantage de ces champs austères. Et du temps, nous en avons."
 mordor.1003.a: "La production croîtra en son heure."
 mordor.1003.b: "Une poigne plus dure apportera l’efficacité que j’exige."
 mordor.1003.c: "Les Núrnîags ont bien servi, qu’ils soient récompensés."
 mordor.1003.d: "Je dirigerai moi-même les travaux."
 mordor.1003.e: "Un lieutenant de confiance s’en chargera."
 
 mordor.1004.t: "L'Ithilien Brûle"
 mordor.1004.desc: "Des [orcs|E] porteurs de torches se répandent dans le prétendu Jardin du [gondor|E], incendiant et ravageant à leur gré. L'Ithilien est souillée un peu plus chaque jour.\n\nDe grands camps de bûcheronnage ont été établis, et le bois arraché aux forêts alimente les ateliers de siège d’Udûn. Bientôt, la machine de guerre orque deviendra véritablement irrésistible."
 mordor.1004.a: "Qu’Ithilien tout entière soit livrée aux flammes."

 mordor.1005.t: "Les Feux de l’industrie"
 mordor.1005.desc: "Gorgoroth fut jadis vide et désolée, mais plus désormais. D’innombrables brasiers y flambent, et bâtiments, forteresses et colonies surgissent à travers les plaines. Les forges et les armureries amassent les armes destinées à l’Armée de Morgul, tandis que les ateliers élèvent des murs toujours plus hauts et des tours toujours plus épaisses pour abriter des légions croissantes. Le Mordor foisonne désormais d’une activité fébrile, et une telle puissance ne saurait longtemps demeurer contenue..."
 mordor.1005.a: "Que les forges rugissent !"

 mordor.1010.t: "L'Appel du Mordor"
 mordor.1010.desc: "Au plus profond de la nuit il arrive des cieux sans étoiles. Sa bête ailée atterrit et s'incline devant moi, et le cavalier met pied à terre et fait de même. Je lui commande de parler.\n\n« J'apporte des nouvelles du [mordor|E], votre Excellence. » Dit-il, Khamûl, Second des Neuf.« Il est préparé pour vous, Seigneur, et prêt pour votre arrivée. La Tour Sombre est prête à s'élever à nouveau, à votre commandement. »\n\nEst-il temps pour moi de retourner au Mordor, et d'élever la Tour Noire une fois de plus, et de me révéler à tous ? Ou dois-je prendre mon temps, et attendre jusqu'à ce que l'heure soit meilleure pour mon arrivée ?"
 mordor.1010.a: "Il est temps de retourner au [mordor|E]."
 mordor.1010.b: "Le temps n'est pas encore venu..."

 mordor.1011.t: "Le Retour du Seigneur Sombre"
 mordor.1011.desc: "Le temps est venu. Le [mordor|E] a été suffisamment préparé pour le retour de son Maître légitime. Maintenant, Il approche.\n\nIl refaçonnera la Tour Sombre et Se proclamera ouvertement comme le Seigneur du Mordor. Que les flammes d'Orodruin éclatent à la vue de Sa venue, et que les Seigneurs de l'Ouest qui se sont dressés contre Sa puissance tremblent dans leurs halls et forteresses. Leur heure viendra bien assez tôt.\n\nQue la terre frémisse et rugisse à la venue de son seigneur légitime : [sauronthedarklordcharacter|E], Seigneur des Anneaux, Seigneur de la Terre !"
 mordor.1011.a: "Je passe la domination du Mordor à mon Maître."
 
 mordor.1012.t: "Destin du Roi-Sorcier"
 mordor.1012.desc: "Il est temps. « L'heure est venue, Mûrazôr, Premier des Neuf. »\n\nJe m'incline devant [sauroncharacter|E], assis sur son Trône Sombre dans le sanctuaire le plus intime de la Tour Noire.\n\n« Tes œuvres ont été bien forgées. Maintenant la Tour Sombre s'est élevée à nouveau, et un nouveau dessein j'ai établi pour toi. Minas Morgul, ta conquête, sera ta nouvelle demeure à mon service. De là mes armées tu commanderas, jusqu'à ce que vienne le temps où tu assailliras le [gondor|E] comme je l'ordonne. »\n\nJe m'incline, et regarde vers l'ouest, vers les murailles pâles de la lointaine Minas Morgul. Bientôt, nos ennemis tomberont devant l'ombre du Mordor.\n\n« Va maintenant, Mûrazôr, car ainsi j'ai décrété, » mon maître me congédie."
 mordor.1012.a: "Je dois me préparer pour la guerre."
 mordor.1012.b: "Mon Maître a maintenant beaucoup d'œuvre à accomplir..."
 
 mordor.1013.t: "Ordonner mon Royaume"
 mordor.1013.desc: "Cela a pris un âge entier, mais enfin, le [mordor|E] est mien une fois de plus. Et bien que [witchking.GetName] ait bien fait en préparant la terre pour mon retour, il reste encore quelques tâches pour moi-même à traiter.\n\nL'une d'entre elles concerne le sort de [GetTitleByKey('k_nurn').GetNameNoTier]. Le Roi-Sorcier a humilié les fiers Núrniags afin d'améliorer la productivité. Je pourrais renverser cette décision et restaurer leur lignée de Rois, assurant leur loyauté indéfectible... mais comme mon serviteur le plus fidèle l'a correctement souligné, cela mènerait à une certaine diminution des denrées alimentaires produites.\n\nJe pourrais également simplement maintenir le statu quo et administrer Núrn moi-même, ou adopter une approche encore plus radicale en liant ses dirigeants plus directement au cœur battant du Mordor - la Tour Sombre de Barad-dûr..."
 mordor.1013.a: "Núrn sera démantelé encore davantage."
 mordor.1013.b: "Je restaurerai les Núrniags comme Rois."
 mordor.1013.c: "Nous maintiendrons le statu quo."
 
 mordor.1014.t: "Le Destin de Dol Guldur"
 mordor.1014.desc: "Maintenant que Barad-dûr s'est élevé à nouveau et que je me suis fait connaître de tous, la question demeure de ce qu'il faut faire de ma précédente demeure de Dol Guldur. Beaucoup de terreur et d'ombre j'ai déchaîné de là sur les Elfes et hommes des bois de [mirkwood|E], et beaucoup de mon influence peut encore être vue clairement.\n\nCertains peuvent appeler sa possession directe irréalisable, mais je suis le Seigneur des Anneaux, Roi-Excellence, et mon Œil voit tout. Si je désire que Dol Guldur soit mien, je peux le rendre ainsi !\n\nPourtant mes Nazgûl ne sont-ils pas des extensions de ma volonté, comme les doigts de ma main ? Si je devais nommer l'un de mes Nazgûl là-bas, ils pourraient agir en mon nom et agir contre mon ennemi à distance, tandis que je concentre ma grande et glorieuse puissance contre le [gondor|E]."
 mordor.1014.a: "Dépêchez le Second des Neuf comme mon lieutenant là-bas."
 mordor.1014.b: "J'administrerai Dol Guldur directement d'ici."
 
 mordor.1015.t: "Le Nouveau maître de Dol Guldur"
 mordor.1015.desc: "Maintenant que le Second des Neuf réside et règne depuis Dol Guldur, je dois décider en quelle capacité il doit agir. Une plus grande autonomie pourrait laisser Dol Guldur plus vulnérable, pourtant j'aurai à dépenser moins de mes ressources pour le défendre.\n\nAlternativement, si tribut est payé au [mordor|E], alors ma force sera renforcée pour la longue guerre contre le [gondor|E] ; aux dépens de mon lieutenant et ses efforts contre les [elves|E] de [mirkwood|E] et [lothlorien|E]."
 mordor.1015.a: "Il aura libre cours, pour l'instant."
 mordor.1015.b: "Je lui accorde permission de brûler leurs forêts."
 mordor.1015.c: "Le temps n'est pas encore venu."
 mordor.1015.c.tt: "[khamul.GetName] reste votre [vassal|El]."
 
 mordor.1016.t: "Les Ténèbres de Dol Guldur"
 mordor.1016.desc: "Mon cœur s'agite dans la nuit, et me commande de regarder vers elle, dans le ciel noir sans étoiles. Je ne la vois point de mes yeux, mais je la sens dans mon cœur. Longtemps le mal a habité Dol Guldur, la Colline de Sorcellerie, jadis brillante et belle [GetTitleByKey('c_amon_lanc').GetNameNoTier]. Pourtant ceci est différent.\n\nDol Guldur a un nouveau seigneur maintenant ; plus le grand Ennemi lui-même, déguisé comme le Nécromancien ; mais l'un de ses lieutenants. Longtemps [sauroncharacter|E] avait demeuré en secret dans la Colline de Sorcellerie, et sa présence empoisonna [mirkwood|E], mais il ne nous assaillit point directement. Je crains que ce ne soit plus le cas, car la Tour Noire s'est élevée à nouveau, et à ce signe tous les serviteurs du [darklord|E] seront enhardis, et les Peuples Libres de [middleearth|E] feront face à une grande bataille."
 mordor.1016.a: "Dol Guldur sera un ennemi terrible..."
 
 mordor.1022.t: "Le Nécromancien Révélé"
 mordor.1022.desc: "Notre investigation d'[GetTitleByKey('c_amon_lanc').GetNameNoTier] a révélé une vérité que maints parmi nous ont craint si longtemps : Le Nécromancien de Dol Guldur n'est nul autre que [sauronthedarklordcharacter|El] lui-même, revenu de sa défaite durant la guerre de la [lastallianceshort|E] !\n\nHâtivement, nous nous préparons pour la guerre, car un tel mal ne peut être permis de demeurer si près de nos foyers et notre peuple. Nous devons arracher le contrôle de [dolguldur|E] de lui, et le mettre en fuite, si possible."
 mordor.1022.a: "Pour Vertbois le Grand !"
 
 mordor.1023.t: "Le Nécromancien Révélé"
 mordor.1023.desc: "Le temps est venu de me révéler. Je ne suis plus le Nécromancien.\n\nBien que ce déguisement m'ait bien servi, le monde a changé. Je l'envelopperai dans les ténèbres une fois de plus, maintenant que mes ennemis sont faibles et se croient en sécurité..."
 mordor.1023.a: "Les ombres se lèvent."
 
 mordor.1024.t: "Le Nécromancien Révélé"
 mordor.1024.desc.evil: "Les cieux s'assombrissent tandis que des nouvelles stupéfiantes m'atteignent depuis les ruines de Dol Guldur. Le Nécromancien qui y réside s'est révélé n'être nul autre que [sauronthedarklordcharacter|El] !\n\nCela doit signifier qu'il est prêt à faire la guerre aux [elves|E] haïs une fois de plus. Nous serons à ses côtés quand le temps viendra !"
 mordor.1024.desc.good: "En un tournant choquant des événements, le Nécromancien de Dol Guldur s'est révélé n'être nul autre que [sauronthedarklordcharacter|El], un fait que certains des Sages avaient longtemps soupçonné.\n\nSauron s'est déclaré ouvertement. Cela doit signifier qu'il a gagné assez de force pour apporter à nouveau la guerre à toute [middleearth|E]. Ce sont en vérité des jours sombres !"
 mordor.1024.a: "Nous devons nous préparer pour ce qui vient."

 mordor.2000.t: "Pouvoir"
 mordor.2000.desc: "Je suis [ROOT.GetCharacter.GetTitleAsNameNoTooltip] ! À travers les plaines dévastées et les trous puants à renifleurs de [ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], les [orcs|E], du plus grand orque-soldat au moindre des snaga, craignent MON nom !\n\nTandis que je me prélasse dans ma gloire comme le plus grand des orques du [GetTitleByKey('e_mordor').GetNameNoTierNoTooltip], [chancellor.GetNameNoTooltip] s'approche de moi, tordant ses mains et tête baissée. 'Ô grand [ROOT.GetCharacter.GetTitleAsNameNoTooltip], une humble suggestion de ce plus médiocre des Orques... devrions-nous envoyer des messagers aux autres Chefs-Orques de [GetTitleByKey('k_gorgoroth').GetNameNoTier], et leur dire de votre grandeur ?'\n\nUne suggestion curieuse. Peut-être ces asticots se cachant dans leurs trous inclineront-ils finalement leurs têtes puantes devant moi ! D'un autre côté, les [orcs|E] bruyants sont souvent réduits au silence par d'autres Orques, sans parler des Tarks de la Porte Noire !"
 mordor.2000.a: "Envoyez des cavaliers dans tout le Mordor ! Qu'importe si quelques-uns ne reviennent pas ?"
 mordor.2000.a.tt: "Le Guet du Mordor en entendra parler..."
 mordor.2000.a.success: "Vos voisins sont impressionnés"
 mordor.2000.a.success.toast: "Voisins impressionnés"
 soldier_orcs_of_mordor: "Soldats Orcs du Mordor"
 mordor.2000.a.failure: "Vos voisins sont agacés"
 mordor.2000.a.failure.toast: "Voisins agacés"
 scum_of_mordor: "Racaille du Mordor"
 mordor.2000.b: "Restons du côté sûr et silencieux..."
 rabble_of_mordor: "Foule du Mordor"

 mordor.2001.t: "Pouvoir..."
 mordor.2001.desc: "Des nouvelles sont parvenues à mes soldats et officiers d’un nouveau chef [orc|E] s’élevant dans les terres désolées de [GetTitleByKey('k_gorgoroth').GetNameNoTier]. Bien que les [Glossary('Yrch','orch_gloss')] n’aient jamais été une grande menace pour le [GetTitleByKey('d_watch_on_mordor').GetNameNoTierNoTooltip], ils ne doivent jamais être laissés à eux-mêmes. Et si [watch_on_mordor_target.GetTitledFirstName] a réussi à unir les forteresses Orc dispersées et les bandes errantes de [watch_on_mordor_target.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], alors [watch_on_mordor_target.GetSheHe] pourrait avoir l’ingéniosité et la force nécessaires pour rassembler tout [GetTitleByKey('e_mordor').GetNameNoTierNoTooltip] contre les [men|E] du [GetTitleByKey('e_gondor').GetNameNoTierNoTooltip], et tous les Peuples Libres en cas d’échec du [southkingdom|E].\n\nMais je n’ai pas oublié ma place. Je suis [ROOT.GetCharacter.GetTitleAsNameNoTooltip] de le [GetTitleByKey('d_watch_on_mordor').GetNameNoTierNoTooltip]. Je ne faillirai pas à mon devoir, car nous sommes la première et la principale défense contre l’Ombre dans la Terre des Ténèbres. Il m’appartient de décider comment gérer cette menace croissante..."
 mordor.2001.a: "Je vais me rendre à [ROOT.GetCharacter.GetLiege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], et demander de l’aide. Il n’y a aucune honte à cela..."
 mordor.2001.a.tt: "Vous allez voyager pour demander de l’aide"
 mordor.2001.b: "Nous nous préparerons pour l’instant, et vaincrons [watch_on_mordor_target.GetFirstNameNoTooltip] quand nous serons prêts."
 mordor.2001.b.success: "Vos voisins et suzerains sont impressionnés"
 mordor.2001.b.failure: "Votre autonomie passe inaperçue"
 mordor.2001.c: "Aucune aide n’est souhaitée, nous frapperons maintenant !"
 mordor.2001.c.success: "Vos voisins et suzerains sont éblouis par votre courage"
 mordor.2001.c.failure: "Votre bravoure reste ignorée"

 mordor.2002.t: "Aide venue de la patrie"
 mordor.2002.desc: "Je suis arrivé à la capitale de [gondor_liege.GetPrimaryTitle.GetBaseNameNoTier], la terre du peuple que je sers, et le foyer de ceux que je protège des [Glossary('Yrch','orch_gloss')] dans le [landofshadows|E]. Ici, je suis venu demander l’aide de mon suzerain, [gondor_liege.GetTitledFirstName], afin de me défendre contre la menace de [watch_on_mordor_target.GetTitledFirstName] et de ses [orcs|E]. Je ne peux qu’espérer que mes paroles ne tombent pas dans des oreilles fermées, et que mon bras soit renforcé par la bravoure et la force du peuple de [gondor_liege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]."
 mordor.2002.a: "Ô grand [gondor_liege.GetFirstNameNoTooltip], entendez ce plaidoyer..."

 mordor.2003.t: "Audience avec le Guet"
 mordor.2003.desc: "Bien que je sois seigneur de [ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTier], je garde des terres qui ne me sont pas propres, ces volontaires qui sont mes yeux, mes oreilles, et, si besoin, mes épées, forment le [GetTitleByKey('d_watch_on_mordor').GetNameNoTier], et ils défendent notre terre de la haine, de la malice et de la mort apportées par les [orcs|E] du [mordor|E]. Mais les sévères [men|E] du Guet ne sont pas sans besoins, et aujourd’hui [lord_commander.GetTitledFirstName], le chef de ces guerriers austères, est venu à moi avec une affaire de grande importance.\n\n« Ô grand [ROOT.GetCharacter.GetFirstNameNoTooltip], écoutez bien ce plaidoyer de votre humble serviteur [lord_commander.GetFirstNameNoTooltip]. L’Ombre s’élève dans le [GetTitleByKey('e_mordor').GetNameNoTierNoTooltip], et un nouveau seigneur Orc de ruse et de force s’est levé dans le [watch_on_mordor_target.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], son nom est [watch_on_mordor_target.GetFirstNameNicknamedRegnal]. Je crains que la force des Hommes du Guet ne suffise face à cette nouvelle menace. S’il vous plaît, [ROOT.Char.Custom('FormOfAddressForLiege')], prêtez-moi votre bras de fer et venez défendre [ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] avec les fils vaillants de le [GetTitleByKey('d_watch_on_mordor').GetNameNoTierNoTooltip] ! »\n\n[ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] ne peut se permettre des guerres inutiles, et le Guet dispose de bras armés en abondance. Mais peut-être qu’un exercice pour réprimer le Mal ne serait pas superflu..."
 mordor.2003.a: "Hélas, le [ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] ne peut vous aider."
 mordor.2003.b: "J’enverrai 30 cohortes de nos meilleurs !"
 watch_auxiliaries: "Auxiliaires du Guet du Mordor"
 mordor.2003.c: "La terre du Mordor est sombre, alors la lumière doit combattre unie !"

 mordor.2004.t: "Le Guet se tient"
 mordor.2004.desc.no_troop: "Je ne l’avais pas souhaité, mais je m’y attendais, [gondor_liege.GetPrimaryTitle.GetBaseNameNoTier] ne peut nous envoyer de soldats. Le Guet du Mordor doit tenir seule.\n\n"
 mordor.2004.desc.troop: "[gondor_liege.GetPrimaryTitle.GetBaseNameNoTier] nous a envoyé des soldats, trente cohortes des meilleurs archers et épéistes. Le Guet du Mordor est renforcée par [gondor_liege.GetPrimaryTitle.GetBaseNameNoTier], et je dois mettre cette nouvelle force à profit.\n\n"
 mordor.2004.desc: "Alors que je quitte [gondor_liege.GetPrimaryTitle.GetBaseNameNoTier], le domaine de mon suzerain [gondor_liege.GetTitledFirstName], je me prépare mentalement aux épreuves à venir. L’[orc|E] [watch_on_mordor_target.GetFirstName] ne restera pas inactif, je dois donc préparer mes soldats et maintenir le Guet debout. [gondor_liege.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] doit tenir !"
 mordor.2004.a: "Ainsi commence-t-il..."

 mordor.2005.t: "Le Guet combat"
 mordor.2005.desc: "[gondor_liege.GetTitledFirstName] m’a stupéfié ainsi que toute la cour, en proclamant que [gondor_liege.GetPrimaryTitle.GetBaseNameNoTier] se tiendra aux côtés de [GetTitleByKey('d_watch_on_mordor').GetNameNoTier] contre les [orcs|E] de [watch_on_mordor_target.GetTitledFirstName]. L’espoir renaît dans le cœur du Guet, et nul doute que [watch_on_mordor_target.GetFirstNameNoTooltip] regrette à présent sa proclamation audacieuse. La justice brillera sur tout le [GetTitleByKey('e_mordor').GetNameNoTierNoTooltip], et les [Glossary('Yrch','orch_gloss')] seront entièrement anéantis !"
 mordor.2005.a: "Ainsi commence-t-il !"

 mordor.2006.t: "Le Guet combat"
 mordor.2006.desc: "Des nouvelles me parviennent : [lord_commander.GetTitledFirstName] a préparé son tarks pour une offensive sur [ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTierNoTooltip]. Mais c’est #italic mon# [ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] ! Faites sonner les cloches ! Réveillez les soldats et la racaille ! Nous partons en guerre, et je retrouverai le puant [lord_commander.GetFirstNameNoTooltip] pour le dépouiller comme un cochon coincé !"
 mordor.2006.a: "Tranchez-les... écrasez-les... écorchez-les vivants !"

 mordor.2007.t: "Une Grande Horde"
 mordor.2007.desc: "Des éclaireurs haletants sont amenés devant moi, et de leurs paroles je découvre une vérité qui me glace jusqu’aux os. [lord_commander.GetTitledFirstName] a préparé son tarks pour une offensive sur [ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTierNoTooltip], et [lord_commander.GetSheHe] est rejoint par [gondor_liege.GetTitledFirstName] et son armée étincelante d’argent. Selon mes messagers, ils marcheront bientôt sur [ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTierNoTooltip].\n\nJe frissonne d’abord de peur, puis de rage ! C’est #italic mon# [ROOT.GetCharacter.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] ! Faites sonner les cloches ! Réveillez les soldats et la racaille ! Nous partons en guerre, et je retrouverai [lord_commander.GetFirstNameNoTooltip] et [gondor_liege.GetFirstNameNoTooltip] pour les afficher sur mes murs !"
 mordor.2007.a: "Tranchez-les... écrasez-les... écorchez-les vivants !"
 
 news_event.0042.t: "Le Mont Destin entre en éruption"
 news_event.0042.desc: "Durant des millénaires, la montagne volcanique au cœur du [mordor|E] est demeurée dormante, attendant le retour du véritable Seigneur du Mordor. Maintenant, en un retournement du sort inattendu même par les plus sages, [sauronthedarklordcharacter|El] a une fois de plus fait de la Terre des Ombres son domaine, proclamant ouvertement sa domination sur elle.\n\nLes feux du Mont Destin éclatent en une explosion violente tandis que Sauron commence à reconstruire sa Tour Sombre. Les ténèbres du Mordor commencent à se répandre et le [gondor|E] doit maintenant renforcer ses défenses orientales car elles seront bientôt mises à l'épreuve..."
 news_event.0042.a: "L'ombre du Mordor se lève une fois de plus..."
 news_event.0042.b: "Salut au Seigneur des Ténèbres du Mordor !"
 news_event.0042.c: "Un développement inattendu en vérité..."