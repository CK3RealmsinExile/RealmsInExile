 lotr_general.0001.t: "Une Nouvelle Oligarchie"
 lotr_general.0001.desc: "Notre [realm|El] entre dans une ère nouvelle. Désormais, un conseil de dirigeants choisis nous gouvernera et nous guidera, prenant ses décisions selon ce qui sert au mieux le bien commun. L'un d'entre nous sera élu pour être le premier parmi ses égaux ; un rôle - et un fardeau - que j'endosserai dès à présent.\n\nTravaillons maintenant tous ensemble dans l'harmonie afin que notre peuple puisse vivre dans la paix et la prospérité."
 lotr_general.0001.a: "Que le royaume prospère."

 lotr_general.0002.opening: "Honorable Vassal,"
 lotr_general.0002.desc: "Notre [realm|El] entre dans une ère nouvelle. Désormais, un conseil de dirigeants choisis nous gouvernera et nous guidera, prenant ses décisions selon ce qui sert au mieux le bien commun. L'un d'entre nous sera élu pour être le premier parmi ses égaux ; un rôle - et un fardeau - que j'endosserai dès à présent.\n\nTravaillons maintenant tous ensemble dans l'harmonie afin que notre peuple puisse vivre dans la paix et la prospérité."

 lotr_general.0003.opening: "Vassal honoré,"
 lotr_general.0003.desc: "Notre [realm|El] est entré dans un nouvel âge. Il apparaît désormais avec clarté que le commerce maritime constitue le cœur de notre puissance, et il convient que notre gouvernement s’y conforme.\n\nPlaçons donc la parole avant l’épée, et l’échange avant le conflit."

 lotr_general.0004.t: "La Primauté du commerce"
 lotr_general.0004.desc: "Notre [realm|El] est entré dans un nouvel âge. Il apparaît désormais avec clarté que le commerce maritime constitue le cœur de notre puissance, et il convient que notre gouvernement s’y conforme.\n\nPlaçons donc la parole avant l’épée, et l’échange avant le conflit."
