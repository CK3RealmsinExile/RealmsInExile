l_french:

 druedain.0100.t: "Les héritiers de Zîghi"
 druedain.0100.desc: "De nombreuses années se sont écoulées depuis la mort du grand chef Zîghi et depuis le chaos qui s'en est suivi. Le clan maléfique Ân Zûn qui assassina son fils et successeur, Adrîm, ainsi que de nombreux guerriers loyaux lors de l'une des pires trahisons jamais connues, fut le principal instigateur de cette catastrophe.\n\nNombreux sont ceux qui croyaient que le clan Buri Zîghi allait disparaite à jamais, même après que l'Adder noir dû arrêter sa marche sur Rast Vorn en raison d'une attaque audacieuse de Pôn du clan Ân Ghâwa. Bien que l'embuscade aie échoué, elle affaiblit le traître au poins qu'il ne put continuer quête de vengeance et annihiler notre clan de la surface de la [middleearth|E]...\n\nEt pourtant, aujourd'hui nous avons accompli ce que beaucoup pensaient impossible et reconquis le royaume de Zîghi, démontrant par la même être les vrais héritiers de ce grand guerrier. Une nouvelle aube s'est levée, pas seulement pour le clan Buri Zîghi mais pour tout le peuple Beffraen. Cependant, une menace s'élève dans les ombres de l'est, une menace qui, si elle n'est pas stoppée, pourrait bien signifier la fin de toute la [middleearth|E]..."
 druedain.0100.a: "Pour la gloire des héritiers de Zîghi !"

 druedain.0200.t: "La Route de l’Est"
 druedain.0200.desc: "Alors que les Hommes du Rây se rapprochent de nos frontières, la décision a été prise de rechercher les terres depuis longtemps abandonnées des Yatali-Gân dans la lointaine région de [GetTitleByKey('c_bru_kha').GetNameNoTier|U]. Tandis que les préparatifs pour ce long voyage sont en cours, je réalise que je dois encore décider si je souhaite conserver une emprise sur nos demeures actuelles, ou les abandonner entièrement.\n\nTout laisser derrière nous faciliterait la tâche de bâtir notre nouveau foyer à l’est, mais si je parvenais à contrôler à la fois les terres de l’est et de l’ouest, je pourrais peut-être les faire prospérer toutes deux..."
 druedain.0200.a: "Nous laissons tout derrière nous."
 druedain.0200.a.tt: "Vos [titles|El] dans le Sûza-Sûmar seront perdus, et vous gagnerez une nouvelle capitale assez développée à [GetTitleByKey('c_bru_kha').GetNameNoTier|U]"
 druedain.0200.b: "Que la plupart de mon peuple reste ici."
 druedain.0200.b.tt: "Vous conservez vos titres et gagnez [GetTitleByKey('c_bru_kha').GetNameNoTier|U] comme [colony|El]"

 druedain.0201.t: "Arrivée à Bru-Kha"
 druedain.0201.desc: "Le voyage fut long et ardu, mais enfin mes proches et moi nous tenons devant les murailles envahies par la végétation de [GetTitleByKey('c_bru_kha').GetNameNoTier|U]. Alors que nous commençons à décharger nos provisions et à nous installer dans nos nouvelles demeures, je pousse un long soupir de soulagement.\n\nIci, dans ces jungles profondes et oubliées, nous serons à l’abri des troubles du vaste monde."
 druedain.0201.a: "La paix, enfin."

 druedain.0300.t: "La Pierre Fidèle"
 druedain.0300.desc: "C’est fait. Après de longues heures de labeur, j’ai terminé de sculpter ma pierre de veille.\n\nIl demeure assis en silence, gardant fidèlement [ROOT.Char.GetCapitalLocation.GetName], même lorsque je serai parti. L’ouvrage est bien fait, et j’en suis satisfait.\n\nMaintenant, réjouissons-nous et célébrons !"
 druedain.0300.a: "Il partagera mes fardeaux."

 druedain.0301.t: "L’Arbre des Chagrins"
 druedain.0301.desc: "Un nouveau groupe de prisonniers pend désormais à l’Arbre des Chagrins, comme des fruits mûrs à un poirier. Leur sang nourrira l’Arbre et restaurera sa force. Il veillera de nouveau sur nous et protégera contre les Hommes de la Mer, les envahisseurs du Sud, et tous ceux qui oseraient troubler nos forêts."
 druedain.0301.a: "Le monde est à nouveau en ordre."

 druedain.1000.t: "Le Retour des Drughu"
 druedain.1000.desc: "Le message a été porté jusqu'aux lieux profonds, et les Drúedain ont répondu à l'appel.\n\nUne troupe de Drughu émerge de l'ombre des frondaisons à l'orée de la forêt, conduite par un chef de la vieille lignée de Ghân-buri-Ghân. C'est un peuple méfiant, trapu et silencieux, aux yeux enfoncés qui ne laissent rien échapper. Leur chef nous observe de ce même regard sans ciller que les antiques statues-Poukel fixent sur les sentiers de la forêt. Pourtant, avec le temps, il prend la parole, en mots hésitants qui portent le poids d'une longue mémoire.\n\nSon peuple est venu parce qu'un ami a répondu de vous — un ami dont la parole a du poids parmi les Drughu. Ils retourneront dans la forêt. Ils tailleront de nouvelles pierres-vigiles et entretiendront les vieux sentiers. Les bois profonds connaîtront à nouveau le pas des Drughu, demeurant sous notre protection comme ils demeurèrent jadis sous les Rois de [gondor|E] d'antan."
 druedain.1000.a: "Soyez les bienvenus. La Forêt du Drúadan vous est de nouveau confiée."