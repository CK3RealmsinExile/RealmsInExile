l_french:

 ### DOL AMROTH EVENTS ###
 swan_knights_force: "Chevaliers du Cygne"
 
 dol_amroth.0401.t: "L'Ordre du Cygne"
 dol_amroth.0401.desc: "Argent, scintillants et miroitants instruments de guerre argentés. Grands heaumes ailés et longues capes bleues, un Chevalier de Dol Amroth est un spectacle à contempler, lance tenue haute et menton plus haut encore, dignité renouvelée.\n\nVoilà ce que le reste du monde voit dans les chevaliers de Dor-en-Ernil, mais seul celui qui appartient à l'Ordre connaît la vérité. La chevalerie est morte, remplacée par la corruption et les liens du sang, et toutes les autres infortunes des hommes. Si l'Ordre du Cygne doit être réformé, alors le réformateur a certainement fort à faire. Les Réserves Amrothiennes devront être développées ; les anciens serments d'Edhellond respectés ; les régiments Gardiens-de-Mer devront être recréés ; et l'antique Ordre du Tirith Aear doit être reforgé. Ce n'est qu'après l'accomplissement de ces tâches que les [ROOT.Char.GetTitleAsNameNoTooltip]s de Dol Amroth pourront retrouver leur honneur. Un nouvel ordre, celui du Cygne d'Argent, s'élèvera à la place de l'ancien." 
 dol_amroth.0401.a: "Il y a beaucoup à faire."
 dol_amroth.0401.a.tt: "Déverrouille un ensemble de [decisions|El]"
 
 dol_amroth.0402.t: "Les Réserves Amrothiennes"
 dol_amroth.0402.desc: "Longtemps reléguées au rang le plus humble au sein de l'Ordre du Cygne, les soldats d'Amroth ont été, à bien des égards, ceux qui ont le mieux préservé l'esprit véritable de l'Ordre originel. Cependant, malgré cela, leurs rangs se sont tristement éclaircis, ce rôle étant considéré comme manquant d'honneur et de splendeur, et donc négligé.\n\nTravaillons à restaurer cette colonne vertébrale de nos forces dans sa juste puissance."
 dol_amroth.0402.a: "Sonnez les trompettes ! Que chaque homme connaisse le besoin de son [ROOT.Char.GetTitleAsNameNoTooltip] !"
 
 dol_amroth.0403.t: "Recrutement des Réserves Amrothiennes"
 dol_amroth.0403.desc: "En réponse à l'appel de leur [ROOT.Char.GetLadyLord], les hommes de Dol Amroth, du roturier au noble, se sont montrés dignes de grande estime. Ils ont mis de côté leurs rangs sociaux pour combattre côte à côte dans la milice amrothienne, s'entraînant longuement et endurant de grandes privations.\n\nCes soldats forment l'épine dorsale de nos forces d'élite, et que nul ne conteste leur honneur ou leur courage ! Nous veillerons à ce qu'ils soient dûment honorés pour leur dévouement et leur sacrifice."
 dol_amroth.0403.a: "Merveilleuse nouvelle ! Faites aligner les hommes dans la cour !"
 amrothian_reserves: "Réserves Amrothiennes" 
 
 dol_amroth.0404.t: "Les Hommes d'Edhellond"
 dol_amroth.0404.desc: "Edhellond, autrefois foyer du domaine elfique du même nom, est l'un des gouvernorats les plus nobles et les plus riches de Dor-en-Ernil. Ils s'efforcent d'imiter les tactiques elfiques en matière de guerre, contrairement au reste du [gondor|E], qui maintient une ferme tradition martiale héritée de l'époque de [numenor|E]. Leurs rangs au sein de l'Ordre sont restés vides, les serments non prononcés tandis que la corruption proliférait au sein de l'organisation. Nous devons renouveler nos anciens serments.\n\nS'ils pouvaient être réintégrés dans les armées du [ROOT.Char.GetTitleAsNameNoTooltip], ils pourraient servir de contingent puissant et innovant."
 dol_amroth.0404.a: "Envoyez notre cavalier le plus rapide rassembler les hommes !"
 
 dol_amroth.0405.t: "L'Arrivée des Hommes d'Edhellond"
 dol_amroth.0405.desc: "En réponse à la convocation du [ROOT.Char.GetTitleAsNameNoTooltip], les hommes d'Edhellond sont arrivés, portant leurs grands arcs et leurs destriers de race. Les rôdeurs de Nimrodel, fondés sur les traditions des [sindarelves|E], forment la plus grande partie de leur contingent, mais ils sont également accompagnés des Chevaliers d'Edhellond. Fait unique parmi les [gondorians|E], ces chevaliers utilisent l'arc et la flèche tout en chevauchant, leur permettant de harceler brutalement l'ennemi sans jamais risquer de se lancer dans une charge.\n\nLes armées du [ROOT.Char.GetTitleAsNameNoTooltip] ont été grandement ennoblies par leur ajout."
 dol_amroth.0405.a: "Ils serviront d'exemple pour le reste d'entre nous."
 edhellond_soldiers: "Soldats d'Edhellond"
 
 dol_amroth.0406.t: "Les Régiments Gardiens-de-Mer"
 dol_amroth.0406.desc: "Autrefois les égaux de Dor-en-Ernil face aux puissants marins de Pelargir, les régiments Gardiens-de-Mer combattaient sur les hautes mers et les côtes, triomphant des corsaires et gagnant de grands honneurs. Cependant, alors que Pelargir a gagné en importance en tant que cœur de la Marine Royale, cette division de garde s'est réduite à une force squelettique, maintenant tout au plus quelques vigies côtières.\n\nSi nous pouvions les développer à nouveau, ils nous serviraient encore comme de redoutables troupes de choc."
 dol_amroth.0406.a: "Commencez l'entraînement sur-le-champ !"
 
 dol_amroth.0407.t: "Les régiments tournés vers la Mer à destination de Tolfalas"
 dol_amroth.0407.desc: "Maniant de grandes lames à deux mains, les régiments Gardiens-de-Mer commencent au moins à ressembler à leurs jours de gloire. Portant de lourdes armures de plates et de puissantes épées, cette infanterie lourde et étincelante peut briser même les lignes ennemies les plus résistantes.\n\nAvec leur force retrouvée, Dol Amroth peut commencer à projeter à nouveau sa puissance sur les mers, et notre littoral n'a jamais été mieux défendu."
 dol_amroth.0407.a: "Les corsaires n'ont aucune chance."
 seaward_soldiers: "Régiment Gardien-de-Mer"
 
 dol_amroth.0408.t: "Reforger les Gardiens du Serment de Tirith Aear"
 dol_amroth.0408.desc: "Le Tirith Aear, ou 'Tour Gardienne-de-Mer' en [sindarin|E], est la grande tour de Dor-en-Ernil, jadis construite par les [elves|E] demeurant dans la région. Ce nom est également devenu celui des unités de garde d'élite qui protègent la tour, les Gardiens du Serment de Tirith Aear, l'élite des troupes Gardiennes-de-Mer. Tenus de prêter des serments de vertu et de vaillance, ces gardiens devraient être d'un caractère irréprochable. Mais de toutes les classes de l'ancien Ordre, celle-ci fut la plus corrompue, la position étant accordée en raison du sang, non de la vaillance. Il faudra de grands efforts pour la reconstruire dans sa gloire d'antan.\n\nNous commencerons par renvoyer ceux de l'ordre connus pour être corrompus, puis nous chercherons ceux dignes de ce grand honneur."
 dol_amroth.0408.a: "Sélectionnez uniquement les meilleurs soldats pour l'honneur de prêter les serments."
 
 dol_amroth.0409.t: "Le Tirith Aear Reforgés"
 dol_amroth.0409.desc: "Bien qu'il ait fallu un travail politique considérable pour renvoyer les membres corrompus de l'ordre, les Gardiens du serment de Tirith Aear commencent enfin à ressembler à un groupe digne de leur nom. Les nouveaux membres prennent leurs serments avec le plus grand sérieux, incarnant l'image de la vaillance et de la vertu chevaleresques.\n\nAvec eux en poste, le Tirith Aear est bien gardé, et ne tombera plus jamais en ruine. Les tailleurs de pierre ont réparé la tour, lui rendant sa beauté elfique et hissant à nouveau le drapeau des Princes au-dessus de la baie de Belfalas."
 dol_amroth.0409.a: "Cette tour fera l'envie du dol_amroth."
 tirith_aear_soldiers: "Gardiens du serment de Tirith Aear"
 
 dol_amroth.0410.t: "Réformer la Garde Royale du Cygne"
 dol_amroth.0410.desc: "L'élite de l'élite, la Garde Royale du Cygne est chargée de défendre le [ROOT.Char.GetTitleAsNameNoTooltip] de Dol Amroth à toute heure du jour. En temps de guerre, ils le suivent volontiers au combat, et si le besoin s'en fait sentir, ils donneraient leur vie pour leur [ROOT.Char.GetTitleAsNameNoTooltip] sans hésitation.\n\nLa politique ne déterminera plus les nominations à cet ordre des plus sacrés ! Seuls ceux au cœur le plus pur et à la plus grande vaillance seront autorisés à rejoindre ses rangs augustes."
 dol_amroth.0410.a: "Vertu inhérente, seuls les plus purs de cœur recevront cet honneur."
 
 dol_amroth.0411.t: "L'Ordre du Cygne d'Argent"
 dol_amroth.0411.desc: "Quintessence de la vaillance [numenorean|E], l'Ordre Royal du Cygne d'Argent est l'image de la noblesse des Hommes au faîte de leur vertu. D'une fibre morale incomparable et d'une grande habileté aux armes, seuls quelques élus sont jamais comptés parmi cet ordre des plus sacrés. Se voir offrir une telle chance est considéré comme un honneur sans prix dans les terres de Dol Amroth, et peu le refusent, car c'est à la fois un grand honneur et un devoir écrasant.\n\nAvec ces guerriers triés sur le volet, parangons de vaillance et d'habileté, le [ROOT.Char.GetTitleAsNameNoTooltip] n'a rien à craindre, car [ROOT.Char.GetSheHe] est gardé par les hommes les plus capables de tout Dor-en-Ernil.\n\nUn dernier choix demeure : envoyer davantage de [GetMaA('nimrodel_rangers').GetName] pour harceler nos ennemis à distance, ou sélectionner les meilleurs Chevaliers du Cygne pour devenir [GetMaA('talon_knights').GetName], bastion inébranlable face à tout ennemi ?"
 dol_amroth.0411.tt: "Une nouvelle [decision|El] est débloquée"
 dol_amroth.0411.a: "Les Chevaliers du Talon garderont nos remparts."
 dol_amroth.0411.b: "Les Éclaireurs de Nimrodel frapperont nos ennemis de loin !"
 royal_swan_guard_troops: "Chevaliers du Cygne d'Argent"
 unlock_talon_knights: "Peut recruter [GetMaA('talon_knights').GetName] comme [men_at_arms|El]"
 unlock_nimrodel_rangers: "Peut recruter [GetMaA('nimrodel_rangers').GetName] comme [men_at_arms|El]"
 
 dol_amroth.0412.t: "Une Tête de Pont en Harondor"
 dol_amroth.0412.desc: "Avec la reconquête de [GetTitleByKey('d_harfalas').GetNameNoTier], notre tête de pont dans [GetTitleByKey('k_harondor').GetNameNoTier] est désormais établie. Pour réduire les Corsaires à leur juste place une fois pour toutes, nous devons maintenant nous tourner vers le sud — vers les Bouches du Harnen, et au-delà vers [umbar|E].\n\nLe havre de [GetTitleByKey('c_mirlond').GetNameNoTier] se dresse directement sur notre chemin et doit être pris — pour Dol Amroth et pour [gondor|E]. Cela accompli, le Cygne d'Argent marchera plus avant vers le sud et fera tomber les murs de [GetTitleByKey('c_ramlond').GetNameNoTier] — puis [GetTitleByKey('c_umbar').GetNameNoTier] elle-même !"
 dol_amroth.0412.a: "La rétribution arrive !"
 dol_amroth.0412.tt: "Débloque une [decision|El] concernant les havres méridionaux"