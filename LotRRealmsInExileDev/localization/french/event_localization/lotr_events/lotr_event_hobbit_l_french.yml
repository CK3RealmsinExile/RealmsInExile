 ### Pipe-weed Smoking ###
 pipeweed_intro: "Pipe à fumer :"
 pipeweed_intro.desc: "Je m'installe confortablement dans mon fauteuil, ma fidèle bourse de [ROOT.Char.Custom('GetPipeWeedName')] à mes côtés, et j'allume ma pipe bien-aimée. Je me sens déjà bien plus détendu.\n\n"
 
 hobbit.0002.t: "$pipeweed_intro$ Un bon matin"
 hobbit.0002.t.subterranean: "$pipeweed_intro$ Tunnels calmes"
 hobbit.0002.desc.subterranean: "$pipeweed_intro.desc$L'air est doux et les galeries paisibles. Tandis que je me repose sur un banc de pierre, j'aperçois quelqu'un qui s'approche."
 hobbit.0002.desc.adventurer: "$pipeweed_intro.desc$Le matin est radieux, et les oiseaux chantent gaiement. Tandis que je m'étire au bord du chemin, j'aperçois quelqu'un qui s'approche."
 hobbit.0002.desc: "$pipeweed_intro.desc$C'est une magnifique matinée et les oiseaux gazouillent. Alors que je me détends dans mon jardin, j'aperçois une connaissance qui passe."
 hobbit.0002.a: "Bonjour !"
 hobbit.0002.a.orc: "Qu'est-ce que tu regardes, ordure ?"
 hobbit.0002.a.subterranean: "Ho !"
 hobbit.0002.tt: "Aweeeed"
 hobbit_gm1: "Vous souhaitez le bonjour au passant"
 hobbit_gm2: "C'est un bon matin, que vous le vouliez ou non"
 hobbit_gm3: "Vous vous sentez bien ce matin"
 hobbit_gm4: "C'est une matinée propice à être bon"
 hobbit_gm_ho: "Ho!"
 hobbit_gm_orc: "R-rien, chef!"
 
 hobbit.0003.t: "$pipeweed_intro$ Le Petit Creux"
 hobbit.0003.desc: "$pipeweed_intro.desc$Tandis que je suis assis là, je suis soudainement envahi par une terrible faim. - peut-être qu'une collation serait de mise ? Un peu de [ROOT.Char.Custom('GetExpensiveDessert')], peut-être ? Oui, ce serait absolument merveilleux ! Après avoir fait mon chemin jusqu'à la cuisine, je suis submergé par une soudaine vague de léthargie en réalisant que quelqu'un doit réellement cuisiner la nourriture !"
 hobbit.0003.desc.adventurer: "$pipeweed_intro.desc$Alors que je suis assis ici, une terrible faim me submerge soudain - une collation s'impose. Un(e) [ROOT.Char.Custom('GetExpensiveDessert')], peut-être ? Oui, ce serait absolument splendide ! Mais quand je me dirige vers la tente de cuisine, une soudaine poussée de léthargie me frappe en réalisant que quelqu'un doit réellement préparer la nourriture !"
 hobbit.0003.a: "[kitchen_savior.GetFirstName], aide-moi !"
 hobbit.0003.b: "Je suppose que je vais devoir me lever moi-même..."
 hobbit.0003.b.servants: "Serviteurs ! Votre [ROOT.Char.GetTitleAsNameNoTooltip] a faim !"

 hobbit.0004.t: "$pipeweed_intro$ Observation des nuages"
 hobbit.0004.desc: "$pipeweed_intro.desc$Aujourd'hui, je suis rejoint par mon/ma [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('cloudgazing_kid'))] [cloudgazing_kid.GetFirstName], qui joue dans le [sc_defender.Custom('GroundType')] devant moi. Après un moment, [cloudgazing_kid.GetSheHe] se détend, regardant le ciel au-dessus. Moi aussi, je laisse mon regard se promener sur le magnifique panorama devant nous, puis vers le ciel. C'est une journée ensoleillée, ponctuée de nuages blancs et duveteux."
 hobbit.0004.a: "Celui-là ressemble à [ROOT.Char.Custom('GetRandomCloudType')] !"
 hobbit.0004.a.tt: "Vous partagez un moment d'observation des nuages"

