 ### Hobbit Introduction Event ###
 hobbit.0010.t: "Un Hobbit du foyer et de la maison"
 hobbit.0010.desc: "Je suis un [hobbit|E], créature de plaisirs simples et de champs tranquilles. Bien que certains nous croient apparentés aux [men|E], nous préférons la paix de nos terriers aux cités de pierre du Grand Peuple. Nous sommes un petit peuple, ne dépassant pas quatre pieds, avec des pieds velus qui n'ont jamais connu la contrainte d'une chaussure. Si nous manquons peut-être de la taille des [elves|E] ou de la robustesse des [dwarves|E], nous possédons une constitution solide et une longévité qui conduit beaucoup d'entre nous au-delà de notre centième année.\n\nNous avons peu de goût pour les aventures ; ce sont des affaires désordonnées qui font arriver en retard au dîner. Nous gouvernons par tradition, mais sous nos gilets ornés se cache une résilience que beaucoup sous-estiment. Nous ne nous engageons pas facilement dans la [war|El], mais nous sommes farouches pour défendre nos foyers.\n\nNous atteignons notre [majority|El] à trente-trois ans, un temps de célébration et peut-être de quelques portions trop généreuses de diverses délicatesses. Qu'un Hobbit soit de noble naissance ou d'origine plus modeste, nous partageons tous un goût pour les jardins, le tabac à pipe, un garde-manger bien rempli et les enchevêtrements complexes de nos propres généalogies."
 hobbit.0010.a: "Paix et abondance !"

 ### Decision-based events ###
 #Integrate Westmarch
 hobbit.0100.t: "Intégrer [GetTitleByKey('c_dunglan').GetNameNoTier]"
 hobbit.0100.desc: "Durant de longues années, nous autres [hobbits|E] nous sommes contentés de vivre dans les anciennes frontières accordées par le vieux Roi à Norbury. Mais même dans la [shire|E] où le temps s'écoule lentement, les choses changent, et nous avons commencé à nous sentir à l'étroit dans les limites des anciens Quartiers. Certains des plus jeunes hobbits ont même commencé à se sentir aventureux, surtout ceux sans terre à labourer, et ont commencé à dériver vers l'ouest dans les fertiles contrées à l'ouest des Collines Blanches.\n\nArmés de charrues et de bêches, ils ont défriché des champs et creusé de nouveaux foyers dans les flancs des collines, veillés par les Tours Blanches qui, dit-on, leur portent chance. Mais les Hobbits aiment la formalité et le bon ordre, et des pétitions ont été rédigées appelant à ce que [GetTitleByKey('c_dunglan').GetNameNoTier] soit officiellement ajouté à la Comté. Désormais, l'autorité du Thain et du Maire s'étendra dans ce nouveau Quartier... même si, en réalité, chacun continuera de vaquer à ses occupations comme avant."
 hobbit.0100.a: "Pour le Marche de l'Ouest !"

 #Integrate Buckland
 hobbit.0101.t: "Intégrer [GetTitleByKey('c_buckland').GetNameNoTier]"
 hobbit.0101.desc: "[GetTitleByKey('c_buckland').GetNameNoTier] a toujours été une étrange anomalie, un royaume [hobbit|E] indépendant en dehors des anciennes frontières de la [shire|E] accordées par le Roi. Cela a parfois créé des difficultés de droit et de commerce, ni le Thain ni le Maire ne pouvant toujours exercer leurs droits sur les gens obstinés des Brandebouc. Mais les temps ont changé, et il est maintenant accepté que [GetTitleByKey('c_buckland').GetNameNoTier] est, et sera à jamais, une partie de la Comté.\n\nTout ce qui reste à faire est de rédiger les documents, de les sceller et de les archiver à Grand'Cave, après quoi chacun pourra se féliciter d'une journée de dur labeur et se retirer à la taverne pour un festin de célébration, avec force lampées de bière. Demain, il y a toutes les chances que tout le monde ait oublié que les choses aient jamais été différentes."
 hobbit.0101.a: "Enfin réunis."

 #Seize Bag End
 hobbit.0102.t: "S'emparer de Cul-de-Sac"
 hobbit.0102.desc: "À l'aube, votre bannière coiffe la petite colline verte au-dessus de [GetTitleByKey('c_hobbiton').GetNameNoTier]. Vos mercenaires entrent dans Cul-de-Sac, fixant des barres de fer aux linteaux et posant des grilles sur les volets ; la pelouse avant est balayée et une courte palissade s'élève. Le grand salon devient votre salle du conseil, la cave est empilée d'armes, le grenier aménagé en poste de guet, et des sentinelles arpentent le faîte du toit, tandis que des patrouilles parcourent les ruelles et qu'un couvre-feu strict tombe sur le village.\n\nLa défiance ouverte s'éteint rapidement, mais dans les coins encaissés et sous les avant-toits voûtés, des murmures de mécontentement se rassemblent, lents et obstinés comme des racines."
 hobbit.0102.a: "Ça, c'est mieux !"

 ### Introduction Events ###

 ### Flavor Events ###
 hobbit.200.t: "Une Découverte impensable"
 hobbit.200.desc: "Alors que je parcours les livres au fond de ma bibliothèque, un tome vert attire mon attention. Il semble fort ancien, et une fine couche de poussière obscurcit son titre. En le prenant et en essuyant la poussière, je parviens à lire les lettres dorées fanées :\n\n« DES MALAISES DU SECOND PETIT-DÉJEUNER »\n\nLe titre est choquant, et pourtant je me sens obligé de lire. Sa signification devient vite évidente. L'auteur y suggère de sauter divers repas ; de se limiter à seulement trois grands repas par jour.\n\nComment ce livre est entré dans ma collection, je l'ignore ; il est clairement ancien, et les lettres sont fanées. Ses idées sont fort étranges, et pour beaucoup, impensables !"
 hobbit.200.a: "Je crois que je vais simplement le remettre à sa place."
 hobbit.200.b: "Je vais jeter ce livre ridicule au feu, là où est sa place !"
 hobbit.200.c: "Je pourrais perdre un peu de poids..."
 hobbit.200.c.success.critical: "Sauter des repas vous fait des merveilles"
 hobbit.200.c.success: "Vous vous sentez légèrement mieux, mais rien d'extraordinaire"
 hobbit.200.c.failure: "Vous êtes laissé affamé et fatigué"
 hobbit.200.c.failure.critical: "Le changement drastique vous a laissé bien pire qu'avant"
 hobbit.200.d: "C'est révolutionnaire ! Je dois convaincre ma cour des mérites de cette idée !"
 hobbit.200.d.tt: "Cela ne fonctionnera définitivement, très certainement pas"