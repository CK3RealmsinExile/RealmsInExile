l_french:
 ### Anarike Events ###
 anarike.0050.t: "Une question de commandement"
 anarike.0050.desc: "J'ai assuré mon influence dans toutes les cités de Lynérie et convaincu leurs fiers dirigeants de s'unir pleinement, restaurant enfin l'illustre Ligue Lynérienne. Mais ce succès s'accompagne d'un fardeau : il m'incombe de désigner parmi eux celui qui dirigera cette nation restaurée.\n\nSi cette décision était laissée aux Lynériens eux-mêmes, ils retomberaient dans leurs querelles intestines en quelques jours, voire en quelques heures. En favorisant l'un d'entre eux, je puis garantir à la Lynérie stabilité et sécurité. Ensemble, nous forgerons notre nouvelle alliance pour le bien et la prospérité de l'Anarikê et de la Lynérie !"
 anarike.0050.a: "Mon choix se porte sur [lyneriaholder.GetName]."
 anarike.0050.a.tt: "[lyneriaholder.GetName] deviendra souverain de la Ligue Lynérienne"
 anarike.0050.b: "[twincitiesholder.GetName] a mon soutien."
 anarike.0050.b.tt: "[twincitiesholder.GetName] deviendra souverain de la Ligue Lynérienne"
 anarike.0050.c: "J'appuie [nymaraholder.GetName]."
 anarike.0050.c.tt: "[nymaraholder.GetName] deviendra souverain de la Ligue Lynérienne"
 anarike.0050.d: "Je fais confiance à [murnakholder.GetName] pour cela."
 anarike.0050.d.tt: "[murnakholder.GetName] deviendra souverain de la Ligue Lynérienne"
 anarike.0050.e: "Mon choix est [lynharholder.GetName]."
 anarike.0050.e.tt: "[lynharholder.GetName] deviendra souverain de la Ligue Lynérienne"
 
 anarike.0051.t: "L'Alliance des Portes de la Baie"
 anarike.0051.desc: "Avec [chosen_league_lord.GetName] établi souverain de la Ligue Lynérienne renforcée, notre alliance peut prospérer. L'Anarikê dominera l'orient, tandis que la Lynérie tiendra l'occident. Ensemble, nous sommes assez puissants pour prendre le contrôle de toutes les routes maritimes menant à la Baie d'Ormal et en sortant.\n\nRichesse et prospérité nous attendent ! Bientôt, nous pourrons mettre fin à nos tributs au Maître de [khy|E], restaurant l'Anarikê dans toute sa gloire."
 anarike.0051.a: "Que les scribes inscrivent ce jour dans nos annales."
 anarike.0051.a.tt: "Vous concluez une [alliance|E] avec [chosen_league_lord.GetName]"
 anarike.0052.t: "Une Baie unie"
 anarike.0052.desc: "Nous avons parcouru un long chemin. Maintes épreuves et tribulations sont derrière nous, et je m'élève à présent en souverain d'un nouvel empire !\n\nBientôt, chaque rivage qui s'abreuve aux eaux d'Ormal connaîtra mon nom et reconnaîtra mon autorité. De ce jour jusqu'à mon dernier souffle, je défendrai mon nouveau royaume et apporterai paix et stabilité à l'ensemble de la Baie d'Ormal !"
 anarike.0052.a: "Jour de gloire !"