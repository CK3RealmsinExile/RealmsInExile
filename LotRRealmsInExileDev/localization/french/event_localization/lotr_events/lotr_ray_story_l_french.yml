  ray_story.0129.t: "Une Offre Sanglante"
  ray_story.0129.desc: "Quand j'ai appris qu'un riche seigneur de [ray|e] était venu en personne négocier un soutien militaire, je me suis réjoui, et comme prévu, le soi-disant Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier] s'est présenté avec une offre véritablement intrigante.\n\n« La tribu de Delritha est forte et pleine de potentiel », me dit-il, « mais seule, son avenir est loin d'être assuré. Combattez pour moi, et je vous aiderai à assurer l'héritage de votre tribu dans sa nouvelle patrie en Sîrayn. Quand je prendrai le pouvoir sur le [GetTitleByKey('k_ray').GetNameNoTier], je combattrai comme votre allié et assurerai l'expansion de votre tribu dans les terres voisines ! » Mardat cesse de parler, et je dois faire mon choix. Ce marché vaut-il vraiment mon aide, ou n'est-ce rien de plus qu'un stratagème pour tirer avantage de moi et de mon peuple ?"
  ray_story.0129.a: "Votre offre est trop belle pour être refusée."
  ray_story.0129.a.effects: "À la prise de pouvoir de Mardat sur le [GetTitleByKey('k_ray').GetNameNoTier], il vous soutiendra dans une guerre pour conquérir le duché du [GetTitleByKey('d_silvesa').GetNameNoTier] en échange de votre soutien."
