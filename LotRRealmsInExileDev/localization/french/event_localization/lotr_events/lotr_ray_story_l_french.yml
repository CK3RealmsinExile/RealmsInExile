  ray_story.0127.b: "Votre offre est trop belle pour être refusée."
  ray_story.0127.b.effects: "À la prise de pouvoir de Mardat sur le [GetTitleByKey('k_ray').GetNameNoTier], il vous paiera 1000 pièces d'or en échange de votre soutien."
