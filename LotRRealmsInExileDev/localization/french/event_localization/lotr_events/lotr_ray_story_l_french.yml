l_french:

### Mardat Act 1 Events ###

#[GetFaithByKey('faith_ormal_pirate').GetAdherentNamePlural]
#[GetFaithByKey('faith_ormal_pirate').GetAdherentNamePlural]
#[GetFaithByKey('faith_vatra').GetAdherentNamePlural]
#[GetFaithByKey('faith_haruze').Get
#[GetFaithByKey('faith_ray').GetName]
#[GetFaithByKey('faith_vatra').GetName]

  ray_story.0001.t: "Le Serpent s'éveille"
  ray_story.0001.desc: "Si mes efforts pour convertir les masses à la [GetFaithByKey('faith_haruze').GetName] en [GetTitleByKey('d_suza_riy').GetNameNoTier] ont été couronnés de succès, mes ambitions pour [ray|e] même stagnent depuis trop longtemps. Je n'ai guère de soutien au sein du royaume et rares sont ceux qui me considéreraient comme un prétendant digne du sceptre...\n\nBien que me manquent les liens du sang et la haute naissance requis pour revendiquer le royaume par des voies légitimes, une autre voie s'offre à moi. Les ombres, l'intrigue et les complots pourraient bien être la clé de mon ascension. Tisser un réseau d'agents sera long et coûteux, mais dans quelques années, je pourrai véritablement m'emparer du royaume, car telle est la volonté de Khäz-gramaze."
  ray_story.0001.a: "Khäz-gramaze s'élèvera !"
  ray_story.0001.a.effects: "Vous commencez à tisser un réseau d'agents loyaux à votre or, sinon à votre cause."
  ray_story.0001.b: "Je dois procéder avec plus de prudence..."

  ray_story.0003.t: "Naissance d'un Serpent"
  ray_story.0003.desc: "Alors que mes horizons s'élargissent et que j'amorce enfin mon ascension vers le pouvoir après tant d'années de préparatifs, je me trouve de plus en plus dans le besoin d'agents loyaux, prêts à servir ma cause. Mes pensées vont à ma mère [mother.GetTitledFirstName], qui il y a tant d'années m'a porté au pouvoir sur [GetTitleByKey('d_suza_riy').GetNameNoTier].\n\nMon père, [father.GetTitledFirstName], était un homme des plus détestables et cruels, dénué de toute vertu et pécheur du plus haut ordre. Ses mensonges et ses paroles creuses l'avaient mené de [ray|e] jusqu'au lointain [GetTitleByKey('k_haruzan').GetNameNoTier], et bien qu'il parlât d'amour à ma mère, il n'était en vérité intéressé que par l'or, la boisson et les femmes faciles. Quand je n'étais encore qu'un enfant, ma mère me révéla la vérité et me fit entrer dans l'ombre de Khäz-gramaze, afin que je ne devienne pas un autre prince marchand, dépourvu d'honneur et esclave de mes pulsions les plus viles.\n\nÀ présent, notre rêve d'antan, quand nous avons renversé [father.GetFirstName] et l'avons fait torturer pour ses crimes contre le divin, commence à porter ses fruits. Y a-t-il véritablement encore une place pour [mother.GetTitledFirstName] dans mes ambitions, ou ai-je dépassé sa tutelle ?"
  ray_story.0003.a: "C'est #italic notre#! vengeance !"
  ray_story.0003.b: "Je n'ai nul besoin d'une vieille harpie mourante !"

  ray_story.0103.t: "Les Serpents se saluent"
  ray_story.0103.desc: "Dans le plus grand secret, j'ai préparé une délégation aussi imposante et prestigieuse que possible pour traverser la grande Mer de Dunes et établir le contact avec mes parents en [GetTitleByKey('k_haruzan').GetNameNoTier]. Leur royaume est le cœur battant de Khäz-gramaze, et nouer des liens avec lui ne pourra qu'améliorer ma position parmi les fidèles.\n\nJe doute que ce qu'ils m'enverront soit décisif dans mes efforts pour m'emparer de [ray|e], mais de simples mots peuvent avoir un grand impact s'ils viennent de la bonne source, et si le Grand Temple de Khäz-gramaze et le plus grand roi du [harad|e] ne sont pas la bonne source, alors il n'en existe point."
  ray_story.0103.a: "J'envoie mes émissaires et j'attends."

  ray_story.0104.t: "Le Pacte des Serpents"
  ray_story.0104.desc: "Bien que je m'attendisse à devoir patienter quelque temps avant le retour de mes émissaires du [GetTitleByKey('k_haruzan').GetNameNoTier], leur long voyage vers le nord puis le retour a pris presque une année. Mais malgré l'attente, je suis satisfait du résultat de mon entreprise. En effet, le Taskral du [GetTitleByKey('k_haruzan').GetNameNoTier] et le Grand Temple de Khäz-gramaze ont officiellement reconnu mon statut de roi légitime de [ray|e]. Si cette proclamation a courroucé les Kralyi, elle a grandement accru mon influence et a encore amélioré ma position parmi les fidèles.\n\nAvec la délégation de retour est venue une troupe forte de cinq cents cavaliers, de la plus haute qualité. Ces hommes sont des volontaires, venus pour assurer l'ascension de Khäz-gramaze dans les terres du [GetTitleByKey('k_ray').GetNameNoTier]."
  ray_story.0104.a: "Un grand pas vers mon ascension !"
  haruzan_troops_mardat: "Zélotes du Haruzan"

  ray_story.0105.t: "Le Serpent de Rây"
  ray_story.0105.desc: "Bien que je susse avoir des parents en [ray|e], je n'y avais jamais beaucoup songé ; la Mer de Dunes a toujours été une barrière trop grande pour toute relation profonde entre nous. Mais à présent, la situation semble avoir changé.\n\nMardat, l'un des grands seigneurs du [GetTitleByKey('k_ray').GetNameNoTier] et apparemment un fervent adepte de Khäz-gramaze, a envoyé des émissaires et une grande délégation dans mon royaume, cherchant à bâtir une alliance fondée sur notre parenté et notre foi commune. Il a également humblement demandé que le Grand Temple le reconnaisse comme le roi légitime du [GetTitleByKey('k_ray').GetNameNoTier] afin qu'il puisse apporter la vraie foi à son peuple.\n\nInutile de dire que ce développement est plutôt intéressant, mais cela vaut-il vraiment la peine de me mêler d'affaires si lointaines ?"
  ray_story.0105.a: "La cause de Mardat est juste !"
  ray_story.0105.a.effects: "Cela donnera à Mardat de l'influence et du prestige ainsi que l'aide de nombreux volontaires."
  ray_story.0105.b: "Cela ne nous concerne en rien !"
  ray_story.0105.b.effects: "Discréditer Mardat le mettra en colère et empêchera tout volontaire de lui venir en aide."

  ray_story.0106.t: "Serpent contre Serpent"
  ray_story.0106.desc: "Quand mes émissaires sont revenus du [GetTitleByKey('k_haruzan').GetNameNoTier] après leur long voyage, j'étais d'abord satisfait. Cependant, le Taskral du [GetTitleByKey('k_haruzan').GetNameNoTier], à mon grand choc et désarroi, a décidé que j'étais trop insignifiant pour mériter son attention.\n\nBien que je souhaite lui faire payer chèrement cet affront et lui faire regretter ses paroles, je ne puis me concentrer sur de telles futilités alors que je tente de m'installer comme Kralyi. Si je veux faire mien [ray|e], je dois retourner rapidement à mes machinations. Pourtant, il m'est douloureux de laisser ce traître à Khäz-gramaze s'en tirer après une telle démonstration d'arrogance."
  ray_story.0106.a: "Il paiera pour cela un jour..."

  ray_story.0107.t: "Départ pour Khorsâj"
  ray_story.0107.desc: "Bien que dissimuler mon départ à la surveillance que les Kralyi exercent sur [GetTitleByKey('c_bozisha_dar').GetNameNoTier] ne sera pas chose aisée, moi-même et une équipe de diplomates déguisés avons fait les préparatifs pour voyager jusqu'à Khorsâj, capitale de l'Ost-tempête.\n\nJe redoute déjà ma rencontre avec le Maréchal-tempête. Les Anbalûkkhôri ne sont peut-être plus les adorateurs de Malicìam qu'ils furent jadis, mais ils n'ont rien perdu de leur ancienne fierté. Avec l'aide de Khäz-gramaze, je suis certain que notre alliance se révélera décisive. Nulle autre puissance ne saurait assurer mon ascension comme l'Ost-tempête le peut. Pourtant, le Maréchal le sait fort bien, et pourrait tenter d'exiger bien plus qu'il n'est raisonnable pour son soutien..."
  ray_story.0107.a: "Je ravalerai ma fierté s'il le faut, du moins pour l'instant..."
  ray_story.0107.a.effects: "Vous entamez votre voyage vers Khorsâj."

  ray_story.0108.t: "Traiter avec l'Ost-tempête"
  ray_story.0108.desc: "Quand, après des heures d'attente manifestement inutile, je rencontre enfin le Maréchal-tempête, il me faut un grand effort pour ne pas exprimer mon mécontentement quant à la manière dont j'ai été traité. Comme je me présente devant le trône, le Maréchal m'adresse la parole : « Qu'est-ce qui t'amène ici, petit seigneur des barbares de [ray|e] ? Dis-moi ce que tu peux offrir à l'Ost-tempête et je te laisserai peut-être retourner entier auprès de tes hommes de tribu, si tel est mon bon plaisir. » Comme je voudrais faire taire cet imbécile arrogant, mais je ne puis...\n\n« Je suis venu chercher le soutien du grand Thôn an-Khârlôkh dans l'établissement d'une nouvelle dynastie régnante au [GetTitleByKey('k_ray').GetNameNoTier] », lui répondis-je, « Et il serait assurément dans l'intérêt de votre Ost de m'aider à prendre le contrôle de ses richesses et de ses armées... »"
  ray_story.0108.a: "Si vous m'aidez, je déchaînerai toute la puissance de Rây contre Bellakar !"
  ray_story.0108.a.effects: "Vous rejoindrez l'Ost-tempête dans son invasion du [GetTitleByKey('e_bellakar').GetNameNoTier] quand ils jugeront le moment venu, si le Maréchal-tempête accepte votre alliance."
  ray_story.0108.b: "Une fois que j'aurai revendiqué Rây, je vous enverrai une grande part de ses richesses en tribut."
  ray_story.0108.b.effects: "Si vous revendiquez le [GetTitleByKey('k_ray').GetNameNoTier], vous deviendrez le tributaire de l'Ost-tempête si le Maréchal-tempête accepte votre alliance."
  ray_story.0108.c: "...Vous savez quoi ! Je n'accepterai pas les insultes d'un païen arrogant !"
  ray_story.0108.c.effects: "Vous insultez le Maréchal-tempête et mettez fin à tout espoir de coopération entre vous."
  ray_story.0108.a.success: "#P Vous convainquez le Maréchal-tempête de soutenir votre cause. #!"
  ray_story.0108.a.fail: "#N Vous échouez à convaincre le Maréchal-tempête de soutenir votre cause. #!"
  ray_story.0108.b.success: "#P Vous convainquez le Maréchal-tempête de soutenir votre cause. #!"
  ray_story.0108.b.fail: "#N Vous échouez à convaincre le Maréchal-tempête de soutenir votre cause. #!"

  ray_story.0109.t: "Négociations avec Rây"
  ray_story.0109.desc: "Quand mes gardes m'ont dit qu'un seigneur de [ray|e] désirait me parler, j'ai été surpris. Cependant, quand j'ai posé les yeux sur ce « Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier] », j'ai su de quoi il serait question. « Qu'est-ce qui t'amène ici, petit seigneur des barbares du [GetTitleByKey('k_ray').GetNameNoTier] ? Dis-moi ce que tu peux offrir à l'Ost-tempête, et je te laisserai peut-être retourner entier auprès de tes hommes de tribu, si tel est mon bon plaisir. » Lui dis-je, sachant pertinemment qu'il cherche mon soutien pour prendre le pouvoir dans son royaume. Pourquoi sinon serait-il venu de si loin ?\n\n« Je suis venu chercher le soutien du grand Thôn an-Khârlôkh dans l'établissement d'une nouvelle dynastie régnante au [GetTitleByKey('k_ray').GetNameNoTier] », répond le prétendant, « Et il serait assurément dans l'intérêt de votre Ost de m'aider à prendre le contrôle de ses richesses et de ses armées... »\n\n« Aidez-moi, Maréchal-tempête, et je me joindrai à vous dans votre glorieuse conquête de l'exécrable [bellakar|e], ennemi éternel de mon peuple comme du vôtre. »"
  ray_story.0109.a: "C'est une offre trop belle pour être refusée."
  ray_story.0109.a.effects: "Si la situation au [GetTitleByKey('k_ray').GetNameNoTier] dégénère en guerre civile, vous soutiendrez Mardat et il se joindra à votre invasion du [GetTitleByKey('e_bellakar').GetNameNoTier] comme allié s'il s'est emparé du [GetTitleByKey('k_ray').GetNameNoTier] au moment où vous la lancerez."
  ray_story.0109.b: "Je n'ai nul besoin des soldats d'Hommes inférieurs !"
  ray_story.0109.b.effects: "Mardat s'en souviendra..."

  ray_story.0110.t: "Négociations avec Rây"
  ray_story.0110.desc: "Quand mes gardes m'ont dit qu'un seigneur de [ray|e] désirait me parler, j'ai été surpris. Cependant, quand j'ai posé les yeux sur ce « Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier] », j'ai su de quoi il serait question. « Qu'est-ce qui t'amène ici, petit seigneur des barbares du [GetTitleByKey('k_ray').GetNameNoTier] ? Dis-moi ce que tu peux offrir à l'Ost-tempête, et je te laisserai peut-être retourner entier auprès de tes hommes de tribu, si tel est mon bon plaisir. » Lui dis-je, sachant pertinemment qu'il cherche mon soutien pour prendre le pouvoir dans son royaume. Pourquoi sinon serait-il venu de si loin ?\n\n« Je suis venu chercher le soutien du grand Thôn an-Khârlôkh dans l'établissement d'une nouvelle dynastie régnante au [GetTitleByKey('k_ray').GetNameNoTier] », répond le prétendant, « Et il serait assurément dans l'intérêt de votre Ost de m'aider à prendre le contrôle de ses richesses et de ses armées... »\n\n« Aidez-moi, Maréchal-tempête, et je vous donnerai une grande part des richesses du [GetTitleByKey('k_ray').GetNameNoTier] en tribut, vous permettant de financer une grande armée contre [bellakar|e]. »"
  ray_story.0110.a: "C'est une offre trop belle pour être refusée."
  ray_story.0110.a.effects: "Si la situation au [GetTitleByKey('k_ray').GetNameNoTier] dégénère en guerre civile, vous soutiendrez Mardat et ferez du [GetTitleByKey('k_ray').GetNameNoTier] votre tributaire s'il revendique le trône."
  ray_story.0110.b: "Je n'ai nul besoin des marchandises tribales de Rây !"
  ray_story.0110.b.effects: "Mardat s'en souviendra..."

  ray_story.0111.t: "Négociations avec Rây ?"
  ray_story.0111.desc: "Quand mes gardes m'ont dit qu'un seigneur de [ray|e] désirait me parler, j'ai été surpris. Cependant, quand j'ai posé les yeux sur ce « Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier] », j'ai su de quoi il serait question. « Qu'est-ce qui t'amène ici, petit seigneur des barbares du [GetTitleByKey('k_ray').GetNameNoTier] ? Dis-moi ce que tu peux offrir à l'Ost-tempête, et je te laisserai peut-être retourner entier auprès de tes hommes de tribu, si tel est mon bon plaisir. » Lui dis-je, sachant pertinemment qu'il cherche mon soutien pour prendre le pouvoir dans son royaume. Pourquoi sinon serait-il venu de si loin ?\n\nÉtrangement, le seigneur barbare reste silencieux. Puis, à ma grande stupeur et amusement, il explose de colère. « Comment osez-vous me parler ainsi, misérable païen ! Je suis l'élu de Khäz-gramaze, le plus grand seigneur du [harad|e] Lointain. Un adorateur de Malicìam gras, paresseux et répugnant comme vous n'a aucun droit de me parler de la sorte ! » Avant que je puisse ordonner à mes gardes de l'emprisonner pour cet accès de colère insensée, Mardat s'est déjà enfui précipitamment avec ses suivants."
  ray_story.0111.a: "Je me suis peut-être fait un ennemi aujourd'hui..."
  ray_story.0111.a.effects: "Mardat a refusé de même considérer une alliance avec vous et sera probablement hostile à l'avenir."

  ray_story.0112.t: "Un Pacte avec Malicìam"
  ray_story.0112.desc: "Bien que j'eusse des doutes quant à la réponse du Maréchal-tempête, il s'est révélé être un homme raisonnable. J'ai réussi à m'assurer le soutien de l'Ost-tempête pour mes entreprises en [ray|e], faisant d'une prise de pouvoir violente un chemin bien plus sage et viable qu'il ne l'était auparavant.\n\nQuelle que soit la manière dont je choisis de défier les Kanivâtra, le soutien de l'Ost-tempête assure ma position et rend mon ascension au [GetTitleByKey('k_ray').GetNameNoTier] d'autant plus inévitable. Je perçois en cela l'œuvre de Khäz-gramaze s'assurant que les arrogants Anbalûkkhôri réalisent la valeur d'une alliance avec moi, et je suis envahi par le sentiment que leur peuple a véritablement abandonné Malicìam."
  ray_story.0112.a: "Avec la puissance de l'Ost-tempête et de Khäz-gramaze, je suis invincible !"
  ray_story.0112.a.effects: "L'Ost-tempête vous soutiendra dans une guerre civile au [GetTitleByKey('k_ray').GetNameNoTier]."

  ray_story.0113.t: "Discorde à Khorsâj"
  ray_story.0113.desc: "Alors que j'attendais la réponse du Maréchal-tempête, je craignais qu'il ne se montrât pas raisonnable, et j'avais raison de m'inquiéter. Dans ce qu'on ne peut décrire que comme de la folie, le Maréchal a refusé mes généreuses conditions d'alliance au motif que je n'étais rien de plus qu'un barbare insignifiant. Bien que j'aie d'abord été choqué par cette réponse, il m'est apparu que j'avais mal interprété la volonté de Khäz-gramaze.\n\nUn peuple corrompu par le vil contact et le culte de Malicìam ne peut jamais connaître la rédemption ! Tout m'apparaît si clairement à présent. Non seulement dois-je purger [ray|e] des non-croyants et détruire l'exécrable [bellakar|e], mais je dois aussi conquérir et soumettre les Anbalûkkhôri. Ils ont toujours été les ennemis du [GetTitleByKey('k_ray').GetNameNoTier] et des peuples fidèles du [harad|e], et doivent être anéantis comme les monstres qu'ils sont !"
  ray_story.0113.a: "Je n'attendais rien de plus de ces païens !"

  ray_story.0114.t: "Départ pour Pôwa"
  ray_story.0114.desc: "Bien que la plupart des Pôwans ne soient guère plus que de faibles tribus pacifiques, la tribu de Ne Sargoà est inhabituellement puissante. Contrairement aux autres tribus pôwanes, ils tiennent Shyra, la déesse païenne du carnage, comme la plus grande divinité du Panthéon Tayee. Bien que leurs croyances soient manifestement fausses, je perçois en elles un germe de la force de la vraie foi de Khäz-gramaze.\n\nAlors que je pars pour l'ouest de Pôwa, j'ai véritablement espoir que ces barbares seront de grands alliés de ma cause et m'aideront dans mon usurpation de [ray|e]. Quelques concessions commerciales ou privilèges mineurs suffiraient à faire de Ne Sargoà de loin la plus riche des tribus pôwanes, et je ne doute pas que leur chef le reconnaîtra."
  ray_story.0114.a: "J'espère trouver des alliés à Beghom."
  ray_story.0114.a.effects: "Vous voyagez vers Beghom, capitale de la tribu pôwane de Ne Sargoà."

  ray_story.0115.t: "Traiter avec Shyra"
  ray_story.0115.desc: "Quand je suis arrivé à Beghom pour rencontrer le chef local, j'ai été surpris d'être accueilli comme un invité d'honneur malgré la nature brutale de la tribu. Me présentant devant [powan_leader.GetTitledFirstName], j'ai entamé nos négociations.\n\n« Je suis Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier], parmi les grands seigneurs de [ray|e]. » Dis-je au chef. « La tribu de Ne Sargoà est forte et sa puissance ne cesse de croître à Pôwa. Cependant, elle demeure guère plus qu'une terre de barbares aux confins de la civilisation. Pourtant, je pourrais changer cela. Je convoite le trône du [GetTitleByKey('k_ray').GetNameNoTier], et si votre tribu m'aide dans ma quête, je vous apporterai des richesses au-delà de ce que vous pouvez imaginer. »"
  ray_story.0115.a: "Vous aurez le monopole de tout le commerce oriental."
  ray_story.0115.a.effects: "Une fois maître du [GetTitleByKey('k_ray').GetNameNoTier], vous accorderez à [powan_leader.GetTitledFirstName] le monopole de tout le commerce vers l'est depuis votre royaume."
  ray_story.0115.b: "Je vous donnerai des trésors innombrables."
  ray_story.0115.b.effects: "Si vous revendiquez le [GetTitleByKey('k_ray').GetNameNoTier], vous paierez au chef pôwan #N 500 pièces d'or#! à votre prise de pouvoir."
  ray_story.0115.c: "La bénédiction de Khäz-gramaze assurera votre prospérité !"
  ray_story.0115.c.effects: "Vous n'offrez rien de concret aux Pôwans hormis la bénédiction d'un dieu auquel ils ne croient pas. Cela a peu de chances de fonctionner."
  ray_story.0115.a.success: "#P Vous convainquez les Pôwans de rejoindre votre cause. #!"
  ray_story.0115.a.fail: "#N Vous échouez à convaincre les Pôwans de rejoindre votre cause. #!"
  ray_story.0115.b.success: "#P Vous convainquez les Pôwans de rejoindre votre cause. #!"
  ray_story.0115.b.fail: "#N Vous échouez à convaincre les Pôwans de rejoindre votre cause. #!"
  ray_story.0115.c.success: "#P Vous convainquez les Pôwans de rejoindre votre cause. #!"
  ray_story.0115.c.fail: "#N Vous échouez à convaincre les Pôwans de rejoindre votre cause. #!"
  powa_modifiers_later: "À votre prise de pouvoir, vous recevrez le [GetModifier('mardat_powa_trade_modifier').GetNameWithTooltip] tandis que [powan_leader.GetTitledFirstName] recevra le modificateur [GetModifier('powa_ray_trade_monopoly').GetNameWithTooltip]."

  ray_story.0116.t: "Les Richesses d'un Prétendant"
  ray_story.0116.desc: "Bien que mes éclaireurs m'eussent averti qu'un noble étranger de [ray|e] était venu dans mon royaume, je ne m'attendais pas à cela. L'homme qui s'est présenté à moi s'est nommé Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier], un grand seigneur de Rây, et il a demandé à discuter d'un accord secret avec moi.\n\nAprès que j'ai fait sortir mes serviteurs de la salle, il me présente sa proposition. « La tribu de Ne Sargoà est forte et sa puissance ne cesse de croître à Pôwa. » Me dit-il. « Cependant, elle demeure guère plus qu'une terre de barbares aux confins de la civilisation. Pourtant, je pourrais changer cela. Je convoite le trône du [GetTitleByKey('k_ray').GetNameNoTier], et si votre tribu m'aide dans ma quête, je vous apporterai des richesses au-delà de ce que vous pouvez imaginer. »\n\n« Si vous me souteniez », poursuit-il, « je vous accorderais le monopole de tout le commerce terrestre allant vers l'est depuis le [GetTitleByKey('k_ray').GetNameNoTier], assurant que votre tribu demeure riche pour des générations à venir. »"
  ray_story.0116.a: "Je ne puis refuser de si bonnes conditions."
  ray_story.0116.a.effects: "À la prise de pouvoir de Mardat sur le [GetTitleByKey('k_ray').GetNameNoTier], vous gagnerez un important modificateur économique qui accroîtra grandement vos richesses en échange de votre soutien."
  ray_story.0116.b: "Je peux déjà piller le [GetTitleByKey('k_ray').GetNameNoTier] pour tout l'or que je veux !"
  ray_story.0116.b.effects: "Cela nuira aux relations avec Mardat et mettra fin à toute chance de former une alliance."

  ray_story.0117.t: "Les Richesses d'un Prétendant"
  ray_story.0117.desc: "Bien que mes éclaireurs m'eussent averti qu'un noble étranger de [ray|e] était venu dans mon royaume, je ne m'attendais pas à cela. L'homme qui s'est présenté à moi s'est nommé Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier], un grand seigneur de Rây, et il a demandé à discuter d'un accord secret avec moi.\n\nAprès que j'ai fait sortir mes serviteurs de la salle, il me présente sa proposition. « La tribu de Ne Sargoà est forte et sa puissance ne cesse de croître à Pôwa. » Me dit-il. « Cependant, elle demeure guère plus qu'une terre de barbares aux confins de la civilisation. Pourtant, je pourrais changer cela. Je convoite le trône du [GetTitleByKey('k_ray').GetNameNoTier], et si votre tribu m'aide dans ma quête, je vous apporterai des richesses au-delà de ce que vous pouvez imaginer. »\n\n« Si vous me souteniez », poursuit-il, « je vous donnerais une grande part du trésor du [GetTitleByKey('k_ray').GetNameNoTier], qui contient plus de richesses que votre tribu n'en gagnerait autrement en des générations de prospérité. »"
  ray_story.0117.a: "Je ne puis refuser de si bonnes conditions."
  ray_story.0117.a.effects: "À la prise de pouvoir de Mardat sur le [GetTitleByKey('k_ray').GetNameNoTier], il vous paiera 500 pièces d'or en échange de votre soutien."
  ray_story.0117.b: "Je peux déjà piller le [GetTitleByKey('k_ray').GetNameNoTier] pour tout l'or que je veux !"
  ray_story.0117.b.effects: "Cela nuira aux relations avec Mardat et mettra fin à toute chance de former une alliance."

  ray_story.0118.t: "Le Pari d'un Prédicateur"
  ray_story.0118.desc: "Bien que mes éclaireurs m'eussent averti qu'un noble étranger de [ray|e] était venu dans mon royaume, je ne m'attendais pas à cela. L'homme qui s'est présenté à moi s'est nommé Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier], un grand seigneur de Rây, et il a demandé à discuter d'un accord secret avec moi.\n\nAprès que j'ai fait sortir mes serviteurs de la salle, il me présente sa proposition. « La tribu de Ne Sargoà est forte et sa puissance ne cesse de croître à Pôwa. » Me dit-il. « Cependant, elle demeure guère plus qu'une terre de barbares aux confins de la civilisation. Pourtant, je pourrais changer cela. Je convoite le trône du [GetTitleByKey('k_ray').GetNameNoTier], et si votre tribu m'aide dans ma quête, je vous apporterai des richesses au-delà de ce que vous pouvez imaginer. »\n\n« Si vous me souteniez », poursuit-il, « Khäz-gramaze, le plus grand des dieux du [harad|e] et de toute la terre, vous accorderait sa bénédiction ; et sûrement Shyra aussi approuverait le bain de sang que je prépare. »"
  ray_story.0118.a: "Vous exprimez manifestement la volonté des dieux !"
  ray_story.0118.a.effects: "Mardat ne vous offre aucune récompense concrète pour votre aide."
  ray_story.0118.b: "Je ne me battrai pas pour quelque prédicateur étranger !"
  ray_story.0118.b.effects: "Cela nuira aux relations avec Mardat et mettra fin à toute chance de former une alliance."

  ray_story.0119.t: "Pacte des Dieux de la Guerre"
  ray_story.0119.desc: "Bien que je craignisse que les barbares pôwans soient aveuglés par leur allégeance à Shyra dans leur choix, je suis heureux de constater qu'ils sont un peuple raisonnable. Le chef pôwan a sagement accepté de soutenir ma cause en [ray|e] et en profitera grandement. Bien que j'aie presque cru cela impossible, des peuples ayant peu ou pas de liens avec Khäz-gramaze peuvent encore être guidés par sa volonté !\n\nBien que le soutien de Ne Sargoà ne soit probablement pas décisif, il a encore renforcé ma position contre les Kanivâtra et a rapproché le jour de mon ascension plus que jamais."
  ray_story.0119.a: "Un grand pas vers ma victoire."
  ray_story.0119.a.effects: "Ne Sargoà vous soutiendra dans une guerre civile au [GetTitleByKey('k_ray').GetNameNoTier]."

  ray_story.0120.t: "Discorde à Beghom."
  ray_story.0120.desc: "Bien que j'eusse grand espoir que les Pôwans puissent être amenés sous la grande ombre de Khäz-gramaze et servir sa volonté, je ne suis pas choqué qu'ils aient follement rejeté mon offre. Leur chef a refusé toute tentative de diplomatie et pense manifestement qu'il y a plus à gagner pour Ne Sargoà à être hostile à [ray|e] plutôt qu'amical envers lui.\n\nBien que ce revers soit décevant, il n'a en rien détruit mes plans contre les Kanivâtra et sera probablement loin de suffire à empêcher mon inévitable ascension au pouvoir."
  ray_story.0120.a: "L'amitié avec ces païens n'était jamais véritablement une option."

  ray_story.0121.t: "Départ pour Delritha"
  ray_story.0121.desc: "Alors que je me prépare à partir pour Delritha, je suis plutôt confiant de pouvoir négocier une alliance avec les Nâfarati. Leur peuple a une longue tradition de service comme épées loyales pour les riches seigneurs de Sîrayn et de [ray|e], et je suis certain qu'ils seraient disposés à me servir pour le bon prix.\n\nPourtant, je m'inquiète de ce que sera ce prix. Même avec la faveur de Khäz-gramaze, je doute que les quelques milliers de soldats du chef se révèlent décisifs, mais si je faisais une offre assez généreuse, je pourrais attirer encore plus d'hommes à ma cause. Après tout, les Nâfarati sont une race guerrière, et n'ont rien d'étranger au combat pour l'or."
  ray_story.0121.a: "Tout dépend du prix qu'ils demandent..."
  ray_story.0121.a.effects: "Vous voyagez vers Junrik, capitale de Delritha, pour présenter votre offre d'alliance aux Nâfarati."

  ray_story.0122.t: "Le Coût de la Guerre"
  ray_story.0122.desc: "Quand je négocierai avec [nafarati_leader.GetTitledFirstName], deux voies générales s'offriront à moi pour établir une alliance. Je pourrais soit offrir aux Nâfarati de grandes quantités d'or, soit offrir mon soutien à l'expansion de leur propre royaume pour sceller des liens avec leur tribu.\n\nSi offrir de l'or me permettrait de mieux sécuriser ma position après ma prise de pouvoir, cela réduirait aussi les ressources dont je dispose pour sécuriser [ray|e]. D'un autre côté, offrir de soutenir Delritha dans l'acquisition de nouvelles terres créerait un allié puissant et requerrait relativement moins de ressources, mais au prix de disperser mes forces, surtout si les seigneurs du [GetTitleByKey('k_ray').GetNameNoTier] résistent à l'ombre glorieuse de Khäz-gramaze."
  ray_story.0122.a: "Je paierai en or."
  ray_story.0122.a.effects: "Vous pourrez choisir combien d'or offrir aux Nâfarati."
  ray_story.0122.b: "J'assurerai l'expansion des Nâfarati."
  ray_story.0122.b.effects: "Vous déciderez quel soutien militaire offrir aux Nâfarati."
  ray_story.0122.c: "Il verra que ma cause est juste !"
  ray_story.0122.c.effects: "Vous n'offrez rien aux Nâfarati ; il est peu probable qu'ils acceptent de vous aider."
  ray_story.0122.a.success: "#P Vous convainquez les Nâfarati de soutenir votre cause. #!"
  ray_story.0122.a.fail: "#N Vous échouez à convaincre les Nâfarati de soutenir votre cause. #!"

  ray_story.0123.t: "Paroles Creuses"
  ray_story.0123.desc: "Quand j'ai appris qu'un riche seigneur de [ray|e] était venu en personne négocier un soutien militaire, je me suis réjoui, pensant que ce serait assurément l'occasion parfaite de m'enrichir ou d'accroître mon pouvoir.\n\nPourtant, il n'en fut rien. Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier], comme il s'est présenté, a d'abord prétendu qu'il était disposé à nous offrir, à mes hommes et moi, de grandes récompenses pour notre service, mais en vérité ses paroles étaient creuses. En effet, quand vint le moment de parler paiement, il déclara ouvertement qu'il ne donnerait rien de plus que sa faveur si nous le servions.\n\nInutile de dire que je doute qu'il serve mes intérêts de m'allier à cet imbécile cupide."
  ray_story.0123.a: "Les récompenses sont maigres, mais j'accepte néanmoins."
  ray_story.0123.a.effects: "Vous acceptez de combattre pour Mardat bien qu'il ne vous offre aucune récompense."
  ray_story.0123.b: "Je ne me battrai pas pour cet imbécile !"
  ray_story.0123.b.effects: "Cela nuira à vos relations avec Mardat et mettra fin aux négociations d'alliance."

  ray_story.0124.t: "Le Prix d'une Armée"
  ray_story.0124.desc: "Ayant décidé de payer les services des Nâfarati en or, je dois maintenant décider combien je leur offrirai. Offrir trop peu d'or réduirait leur motivation à combattre pour moi et diminuerait grandement mes chances d'obtenir un soutien généralisé parmi les Nâfarati, mais offrir trop d'or déstabiliserait ma position après mon inévitable ascension car cela mènerait à un royaume sous-financé."
  ray_story.0124.a: "Je paierai le tarif des mercenaires et rien de plus."
  ray_story.0124.a.effects: "Vous offrez de payer à Delritha #N 300 pièces d'or#! à votre prise de pouvoir sur le [GetTitleByKey('k_ray').GetNameNoTier]. Cela a des chances raisonnables de réussir mais ne conduira pas à un soutien généralisé des Nâfarati."
  ray_story.0124.b: "J'offrirai un grand prix au chef."
  ray_story.0124.b.effects: "Vous offrez de payer à Delritha #N 600 pièces d'or#! à votre prise de pouvoir sur le [GetTitleByKey('k_ray').GetNameNoTier]. Cela vous gagnera presque certainement une alliance avec le chef et pourrait apporter un soutien plus large."
  ray_story.0124.c: "J'offre des richesses à tout homme qui combat pour moi !"
  ray_story.0124.c.effects: "Vous offrez de payer à Delritha #N 1000 pièces d'or#! à votre prise de pouvoir sur le [GetTitleByKey('k_ray').GetNameNoTier]. Cela vous gagnera assurément une alliance avec le chef ainsi qu'un soutien plus large de tous les guerriers nâfarati."
  ray_story.0124.d: "Tout cela est bien trop coûteux..."
  ray_story.0124.d.effects: "Vous choisirez une autre manière de conclure une alliance avec les Nâfarati."
  ray_story.0124.a.success: "#P Vous convainquez les Nâfarati de soutenir votre cause. #!"
  ray_story.0124.a.fail: "#N Vous échouez à convaincre les Nâfarati de soutenir votre cause. #!"
  ray_story.0124.b.success: "#P Vous convainquez les Nâfarati de soutenir votre cause. #!"
  ray_story.0124.b.fail: "#N Vous échouez à convaincre les Nâfarati de soutenir votre cause. #!"
  ray_story.0124.c.success: "#P Vous convainquez les Nâfarati de soutenir votre cause. #!"
  ray_story.0124.c.fail: "#N Vous échouez à convaincre les Nâfarati de soutenir votre cause. #!"
  ray_story.0124.b.success.crit: "#P Vous convainquez les Nâfarati de soutenir votre cause en grand nombre. #!"
  ray_story.0124.c.success.crit: "#P Vous convainquez les Nâfarati de soutenir votre cause en grand nombre. #!"

  ray_story.0125.t: "Une Offre en Or"
  ray_story.0125.desc: "Quand j'ai appris qu'un riche seigneur de [ray|e] était venu en personne négocier un soutien militaire, je me suis réjoui, et comme prévu, le soi-disant Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier] s'est présenté avec une offre intéressante.\n\n« La tribu de Delritha est forte et pleine de potentiel », me dit-il, « mais seule, son avenir est loin d'être assuré. Combattez pour moi, et je vous aiderai à assurer l'héritage de votre tribu dans sa nouvelle patrie en Sîrayn. Rassemblez vos hommes et votre peuple et combattez pour moi, et je vous donnerai des richesses au-delà de ce que vous pouvez imaginer ! »\n\nMardat cesse de parler, et je dois faire mon choix. Ce marché vaut-il vraiment mon aide, ou n'est-ce rien de plus qu'un stratagème pour tirer avantage de moi et de mon peuple ?"
  ray_story.0125.a: "Votre offre est trop belle pour être refusée."
  ray_story.0125.a.effects: "À la prise de pouvoir de Mardat sur le [GetTitleByKey('k_ray').GetNameNoTier], il vous paiera 300 pièces d'or en échange de votre soutien."
  ray_story.0125.b: "Mes hommes ne sont pas des mendiants !"
  ray_story.0125.b.effects: "Vous jugez l'offre de Mardat trop mauvaise pour être acceptée. Cela nuira aux relations avec Mardat et mettra fin à toute chance d'alliance."

  ray_story.0126.t: "Une Offre en Or"
  ray_story.0126.a: "J'accepte, et tous connaîtront votre très généreuse offre !"
  ray_story.0126.a.effects: "À la prise de pouvoir de Mardat sur le [GetTitleByKey('k_ray').GetNameNoTier], il vous paiera 500 pièces d'or en échange de votre soutien. De plus, Mardat recevra plusieurs milliers de soldats spéciaux."
