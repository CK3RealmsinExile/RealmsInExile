  ray_story.0130.t: "Une Offre Sanglante"
  ray_story.0130.a: "J'accepte, et tous connaîtront votre très généreuse offre !"
  ray_story.0130.a.effects: "À la prise de pouvoir de Mardat sur le [GetTitleByKey('k_ray').GetNameNoTier], il vous soutiendra dans une guerre pour conquérir l'intégralité du royaume du [GetTitleByKey('k_chennacatt').GetNameNoTier] en échange de votre soutien. De plus, Mardat recevra plusieurs milliers de soldats spéciaux."
  ray_story.0130.desc: "Quand j'ai appris qu'un riche seigneur de [ray|e] était venu en personne négocier un soutien militaire, je me suis réjoui, et comme prévu, le soi-disant Mardat du [GetTitleByKey('d_suza_riy').GetNameNoTier] s'est présenté avec une offre véritablement intrigante.\n\n« La tribu de Delritha est forte et pleine de potentiel », me dit-il, « mais seule, son avenir est loin d'être assuré. Combattez pour moi, et je vous aiderai à assurer l'héritage de votre tribu dans sa nouvelle patrie en Sîrayn. Quand je prendrai le pouvoir sur le [GetTitleByKey('k_ray').GetNameNoTier], je combattrai comme votre allié et assurerai l'expansion de votre tribu dans les terres voisines ! » Mardat cesse de parler, et je dois faire mon choix. Ce marché vaut-il vraiment mon aide, ou n'est-ce rien de plus qu'un stratagème pour tirer avantage de moi et de mon peuple ?"
  ray_story.0130.b: "Votre offre est trop belle pour être refusée."
  ray_story.0130.b.effects: "À la prise de pouvoir de Mardat sur le [GetTitleByKey('k_ray').GetNameNoTier], il vous soutiendra dans une guerre pour conquérir l'intégralité du royaume du [GetTitleByKey('k_chennacatt').GetNameNoTier] en échange de votre soutien."
  ray_story.0130.c: "Mes hommes ne sont pas des mendiants !"
  ray_story.0130.c.effects: "Vous jugez l'offre de Mardat trop mauvaise pour être acceptée. Cela nuira aux relations avec Mardat et mettra fin à toute chance d'alliance."

  ray_story.0131.t: "Pacte d'Or et de Sang"
  ray_story.0131.desc: "Comme prévu, les guerriers nâfarati de Delritha se sont montrés raisonnables. Leur chef a accepté de m'offrir un soutien militaire complet dans mes entreprises en [ray|e], et a juré de servir l'ombre de Khäz-gramaze.\n\nDéjà, certains mercenaires nâfarati commencent à s'intéresser à mon royaume, et je ne serais pas surpris si cette tendance se poursuivait. Par la grâce du Seigneur de la Terre, je me suis fait un allié qui pourrait se révéler au moins utile, sinon pleinement décisif.\n\nQu'ils me servent par loyauté envers leur « Indûr » étrangement pieux ou par simple désir de pouvoir, je sens que nos deux peuples pourraient œuvrer ensemble avec une grande efficacité."
  ray_story.0131.a: "La victoire est proche !"

  ray_story.0132.t: "Orgueil et Discorde"
  ray_story.0132.desc: "À mon grand agacement, les Nâfarati ont choisi de ne pas accepter mes généreuses conditions d'alliance. Bien que je sois certain qu'ils regretteront leur courte vue en temps voulu, je ne puis attendre aucune aide de Delritha dans ma lutte à venir pour le pouvoir.\n\nJ'aurais pensé que leur nature guerrière et leur avidité en auraient fait des alliés consentants, mais il semble que [nafarati_leader.GetTitledFirstName] soit trop orgueilleux pour voir la voie de la raison. Bien que ma victoire soit déjà assurée par la volonté de Khäz-gramaze, la trahison de ceux qui auraient dû être des alliés naturels la rendra plus âprement disputée que je ne l'avais anticipé."
  ray_story.0132.a: "Ces imbéciles regretteront leur orgueil !"

  ray_story.0133.t: "Le Premier Mouvement"
  ray_story.0133.desc: "Si je veux prendre le pouvoir en [ray|e], je dois commencer par installer un réseau d'espions et d'agents loyaux à la cour des Kralyi à [GetTitleByKey('c_bozisha_dar').GetNameNoTier]. Si je prends mon temps, je suis certain de pouvoir disposer d'un nombre suffisant de collaborateurs en une année ; pourtant je me demande s'il serait vraiment sage d'attendre si longtemps avant de faire le moindre mouvement.\n\nAssurément, il plairait à Khäz-gramaze de voir le [GetTitleByKey('k_ray').GetNameNoTier] tomber sous son ombre glorieuse aussi vite que possible. Un tel chemin, cependant, pourrait être plus risqué et pourrait bien mener les Kralyi à découvrir mon complot trop tôt. Le Seigneur de la Terre voudrait-il que je trame lentement dans l'ombre, ou voudrait-il que je frappe hardiment contre la lumière mourante ?"
  ray_story.0133.a: "Le [GetTitleByKey('k_ray').GetNameNoTier] tombera promptement car Khäz-gramaze est avec moi !"
  ray_story.0133.a.effects: "Vous tenterez de faire infiltrer la capitale rapidement par vos agents. Cela a de bonnes chances de fonctionner mais aura de graves conséquences en cas d'échec."
  ray_story.0133.a.success: "#P Vous réussissez à infiltrer la capitale. #!"
  ray_story.0133.a.failure: "#N Les Kralyi découvrent votre complot. #!"
  ray_story.0133.b: "Je prendrai mon temps et assurerai ma victoire."
  ray_story.0133.b.effects: "Vous prenez votre temps pour infiltrer lentement la capitale. Il faudra une année entière avant que vos machinations puissent commencer, mais les chances que votre complot soit découvert sont infimes."
  ray_story.0133.b.success: "#P Vous réussissez à infiltrer la capitale. #!"
  ray_story.0133.b.failure: "#N Les Kralyi découvrent votre complot. #!"

  ray_story.0134.t: "Pouvoir dans les Ombres"
  ray_story.0134.desc: "Mon complot pour infiltrer la capitale de [ray|e] s'est révélé un succès complet. Par la volonté de Khäz-gramaze, j'ai maintenant des yeux loyaux dans les ombres de [GetTitleByKey('c_bozisha_dar').GetNameNoTier]. Mes espions et collaborateurs n'attendent que mes ordres pour commencer à œuvrer à l'inévitable chute des Kanivâtra.\n\nBien que beaucoup reste à faire, le Seigneur des Ombres a clairement prouvé que le chemin que j'ai choisi était le bon.\n\nAvant de pouvoir porter mon coup décisif contre les Kralyi, je dois d'abord travailler à affaiblir la puissance du royaume et renforcer ma propre position en cherchant des alliés hors du [GetTitleByKey('k_ray').GetNameNoTier], qui ont peu de chances de jamais me trahir moi et ma cause. Je dois aussi œuvrer à un complot pour #italic éliminer #!les Kanivâtra afin qu'il n'y ait aucune résistance organisée contre mon ascension au pouvoir."
  ray_story.0134.a: "Mon ascension commence maintenant !"
  ray_story.0134.a.effects: "#P Vous pourrez maintenant commencer à comploter pour prendre le contrôle du [GetTitleByKey('k_ray').GetNameNoTier] par vos machinations. #!"

  ray_story.0135.t: "Trahison à l'Est"
  ray_story.0135.desc: "Bien que longtemps soupçonné de trahison ou du moins d'ambitions traîtresses, aucune preuve n'a jamais été trouvée que [mardat.GetTitledFirstName] avait le moindre plan de révolte contre le juste règne des Kanivâtra. Pourtant, il semble qu'il ait enfin commis une erreur. En effet, dans une démonstration flagrante d'incompétence arrogante, [mardat.GetTitledFirstName] a osé établir un réseau d'espions avec l'ordre explicite d'œuvrer à ma chute dans la capitale.\n\nEnfin, j'ai le droit et même le devoir d'agir alors qu'aucun de mes seigneurs n'envisagerait jamais véritablement de soutenir quelque traître profondément impopulaire. [mardat.GetTitledFirstName] ne se laissera pas abattre sans combattre, cependant. Son emprise sur [GetTitleByKey('d_suza_riy').GetNameNoTier] est bien trop enracinée pour que je puisse simplement le déposséder par ma seule parole. Bientôt, la guerre viendra en [ray|e], d'une manière ou d'une autre."
  ray_story.0135.a: "Je ne laisserai pas cette trahison impunie !"
  ray_story.0135.a.effects: "Une guerre civile pour le destin du [GetTitleByKey('k_ray').GetNameNoTier] contre [mardat.GetTitledFirstName] et ses alliés va commencer."
  ray_story.0135.b: "J'attendrai le bon moment pour frapper..."
  ray_story.0135.b.effects: "Vous pourrez déclarer la guerre contre [mardat.GetTitledFirstName] à tout moment futur par décision."

  #Dont mind the weird event order, I had forgotten about this event earlier
  ray_story.0162.t: "Silence Brisé"
  ray_story.0162.desc: "Dans une démonstration désastreuse d'incompétence totale de la part de mes agents, [ray_king.GetTitledFirstName] a été #italic d'une manière ou d'une autre#! informé de ma tentative d'établir un réseau d'espions dans la capitale. Bien entendu, cela constituant une haute trahison aux yeux de la loi, je suis maintenant officiellement un traître aux yeux du royaume, faisant s'évanouir toute chance de coup d'État réussi.\n\nSi je torturerai à mort jusqu'au dernier de ces incompétents qui m'ont coûté ce qui aurait dû être une mission d'infiltration parfaitement simple, cela ne change rien à la rétribution imminente et inévitable que [ray_king.GetTitledFirstName] tentera certainement d'abattre sur moi. Si Khäz-gramaze assure ma victoire, la guerre à venir sera assurément #italic âprement disputée#!..."
  ray_story.0162.a: "Ils paieront pour cette humiliation..."
  ray_story.0162.a.effects: "Une guerre civile pour le destin du [GetTitleByKey('k_ray').GetNameNoTier] va bientôt commencer."

  ray_story.0136.t: "Les Lames des Traîtres"
  ray_story.0136.desc: "Alors que mon complot pour prendre le pouvoir sur [ray|e] se poursuit, il devient clair que la pleine réalisation de mes grands desseins nécessitera le soutien de la garde de la capitale. Grâce à mes agents, j'ai pu apprendre beaucoup sur [guard_leader.GetTitledFirstName], capitaine de la garde de la ville. Le capitaine est peut-être un [GetFaithByKey('faith_vatra').GetAdherentNamePlural], mais il n'est pas trop ferme dans ses croyances et ses grandes ambitions pourraient bien faire de lui un excellent candidat pour trahir son suzerain.\n\nAvant de l'approcher, je dois décider d'une ligne de conduite pour tenter de le rallier à ma cause. Je pourrais simplement offrir de le corrompre avec de l'or et des trésors, mais il est probable que ma quête d'alliés laissera mes coffres plutôt vides. Alternativement, je pourrais lui offrir la seigneurie sur mes terres actuelles après mon ascension, puisque je règnerai sur le cœur du [GetTitleByKey('k_ray').GetNameNoTier] après ma victoire. Je pourrais aussi chercher à le convertir aux grandes ténèbres de Khäz-gramaze et le convaincre de rejoindre ma cause."
  ray_story.0136.a: "J'offrirai à [guard_leader.GetTitledFirstName] et ses hommes de grands trésors."
  ray_story.0136.a.effects: "Vous tentez de corrompre la garde de la capitale pour qu'elle serve vos intérêts."
  ray_story.0136.a.success: "#P Vous réussissez à corrompre les gardes. #!"
  ray_story.0136.a.failure: "#N Les gardes refusent votre offre et révèlent votre complot aux Kralyi. #!"
  ray_story.0136.b: "[guard_leader.GetTitledFirstName] recevra [GetTitleByKey('d_suza_riy').GetNameNoTier] pour sa loyauté."
  ray_story.0136.b.effects: "Vous offrez d'accorder au chef de la garde [GetTitleByKey('d_suza_riy').GetNameNoTier] à votre prise de pouvoir sur le [GetTitleByKey('k_ray').GetNameNoTier]."
  ray_story.0136.b.success: "#P Le chef de la garde accepte votre proposition. #!"
  ray_story.0136.b.failure: "#N Le chef de la garde refuse votre offre et révèle votre complot aux Kralyi. #!"
  ray_story.0136.c: "Il m'aidera de son plein gré après avoir appris la gloire de Khäz-gramaze."
  ray_story.0136.c.effects: "Vous tentez de convertir le chef de la garde au culte de Khäz-gramaze."
  ray_story.0136.c.success: "#P Les gardes sont ralliés à votre cause par la puissance de la foi. #!"
  ray_story.0136.c.failure: "#N Les gardes refusent votre offre et révèlent votre complot aux Kralyi. #!"

  ray_story.0137.t: "Un Poignard au Cœur de Rây"
  ray_story.0137.desc: "Quelque temps après avoir envoyé mon offre au capitaine, j'ai reçu confirmation de mes agents que la garde de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] me soutiendra dans mon complot contre les Kralyi. [guard_leader.GetTitledFirstName] s'est révélé être un homme raisonnable et je suis certain qu'il se montrera un allié utile dans un avenir proche.\n\nPar la volonté de Khäz-gramaze, ma puissance devient toujours plus grande dans les ombres de [ray|e]. Avec la garde désormais loyale envers moi, je peux commencer à véritablement préparer le royaume pour un grand coup d'État et une purge des Kanivâtra faibles et vieillissants. Bientôt, toutes les terres de la [bayoftulwang|E] entreront dans un nouvel âge et j'en serai le grand héraut au nom de l'Ombre."
  ray_story.0137.a: "Plus rien ne peut m'arrêter maintenant !"
  ray_story.0137.a.effects: "Vous pouvez maintenant commencer à élaborer les détails d'un coup d'État pour prendre le pouvoir au [GetTitleByKey('k_ray').GetNameNoTier]."

  ray_story.0138.t: "Crocs sur les Routes de l'Est"
  ray_story.0138.desc: "Bien que les routes commerciales qui traversent [GetTitleByKey('d_suza_riy').GetNameNoTier] aient longtemps enrichi ma famille et moi-même, il y a toujours plus d'argent à gagner. Le commerce est le sang vital de [ray|e] et mon domaine est en position parfaite pour le saigner. Il me suffirait d'engager quelques centaines d'hommes loyaux pour agir comme sbires et bandits afin d'extraire un péage bien plus grand des marchands et de ruiner tout espoir des Kralyi de prélever leur part des profits.\n\nCependant, je dois rester prudent. Si mon complot venait à être découvert, cela m'apporterait au minimum une grande honte et amènerait tout le royaume à me surveiller de près. Si une telle chose devait arriver, mon plan de prendre le contrôle du [GetTitleByKey('k_ray').GetNameNoTier] pourrait bien être compromis."
  ray_story.0138.a: "Ces fonds aideront grandement mes efforts."
  ray_story.0138.a.effects: "Vous engagerez des sbires pour profiter secrètement du pillage des lucratives routes commerciales de votre royaume."
  ray_story.0138.a.success: "#P Vos actions restent secrètes. #!"
  ray_story.0138.a.failure: "#N Les Kralyi apprennent votre complot. #!"
  ray_story.0138.b: "C'est bien trop risqué pour de si maigres récompenses."
  ray_story.0138.b.effects: "Vous choisissez de ne pas exploiter les routes commerciales de votre royaume."

  ray_story.0139.t: "Festin de Proies Dorées"
  ray_story.0139.desc: "Alors que mes agents loyaux arrivent avec le premier butin de marchandises pillées, je constate que mon complot pour extraire tout l'or possible des marchands de mon royaume a réussi. Je pourrai rapidement commencer à remplir mes coffres pour payer les grands coûts qu'entraînera l'acquisition d'alliés étrangers.\n\nEn plus de la puissance que m'apportent ces fonds supplémentaires, mes actes ont également contribué à réduire la légitimité des Kralyi ainsi qu'à grandement diminuer les taxes qu'ils extrayaient des grandes routes commerciales de [ray|e]. Bien que la criminalité rampante dans mes terres puisse me donner quelque peu mauvaise réputation, les profits de l'entreprise compensent largement ce revers tant que personne n'apprend mon implication."
  ray_story.0139.a: "Mes fonds sont maintenant assurés."
  ray_story.0139.a.effects: "Vous avez réussi à installer votre réseau de sbires loyaux pour extraire plus d'or des marchands de votre royaume pour les 5 prochaines années."

  ray_story.0140.t: "Le Prix d'une Entreprise Ratée"
  ray_story.0140.pay_option: "Bien que ma tentative d'extraire autant d'or que possible en relative discrétion des marchands qui traversent [GetTitleByKey('d_suza_riy').GetNameNoTier] semblât prometteuse, il apparaît que les Kralyi ont d'une manière ou d'une autre pris connaissance de mes agissements. Inutile de dire qu'ils sont grandement mécontents de mon comportement et ont exigé que je paie de lourdes réparations ou fasse face à des accusations de trahison.\n\nBien que je ne sois peut-être pas prêt à accomplir la volonté de Khäz-gramaze et à prendre [ray|e] en son nom, le coût des réparations ruinerait mon économie et retarderait grandement mes efforts. Si je devais me rebeller contre les Kralyi maintenant, cela signifierait assurément une guerre civile et bien que je ne doute pas que le Seigneur de la Nuit m'accorderait la victoire, elle serait âprement disputée."
  ray_story.0140.forced_rebellion: "Bien que ma tentative d'extraire autant d'or que possible en relative discrétion des marchands qui traversent [GetTitleByKey('d_suza_riy').GetNameNoTier] semblât prometteuse, il apparaît que les Kralyi ont d'une manière ou d'une autre pris connaissance de mes agissements. Inutile de dire qu'ils sont grandement mécontents et m'ont maintenant ouvertement marqué comme traître au royaume.\n\nBien que je ne sois peut-être pas prêt à accomplir la volonté de Khäz-gramaze et à prendre [ray|e] en son nom, je n'ai d'autre choix que d'agir maintenant ou de perdre à jamais toute chance de victoire. La guerre à venir sera rude, mais je n'ai d'autre choix que de détruire mes ennemis maintenant, quels qu'en soient les coûts, quels qu'en soient les risques."
  ray_story.0140.a: "Je paierai autant que les Kralyi l'exigent..."
  ray_story.0140.a.effects: "Vous ruinerez à la fois votre économie et votre réputation pour gagner du temps avant de frapper contre le [GetTitleByKey('k_ray').GetNameNoTier]."
  ray_story.0140.b: "Khäz-gramaze, mène-moi à la victoire !"
  ray_story.0140.b.effects: "Vous déclenchez immédiatement une guerre civile pour revendiquer le [GetTitleByKey('k_ray').GetNameNoTier], réduisant grandement l'atteinte à votre réputation."

  ray_story.0141.t: "Le Serpent Démasqué"
  ray_story.0141.desc: "Je sais depuis longtemps que mon vassal [mardat.GetTitledFirstName] était un homme radical et ambitieux, pourtant il a maintenant outrepassé les limites de ce qui est acceptable pour quiconque en [ray|e]. En effet, il a récemment été révélé comme le chef d'un vaste réseau de criminels exploitant brutalement les routes commerciales qui ont longtemps enrichi le royaume pour leur propre profit.\n\nAvec tant de dégâts causés, ce pourrait être le moment parfait pour moi de destituer un seigneur gênant, mais je pourrais aussi utiliser cette opportunité pour affaiblir la position de [mardat.GetTitledFirstName] sans guerre. Après tout, s'il devait rembourser tout son or pillé, il se retrouverait bien trop endetté pour véritablement constituer une menace."
  ray_story.0141.a: "Tout sera remboursé. Jusqu'à la dernière pièce."
  ray_story.0141.a.effects: "[mardat.GetTitledFirstName] peut payer des réparations, cependant, il est probable qu'il se rebelle maintenant plutôt que de faire face à de telles pertes."
  ray_story.0141.b: "Je ne laisserai pas cette trahison impunie !"
  ray_story.0141.b.effects: "Vous pourrez commencer une guerre pour le destin du [GetTitleByKey('k_ray').GetNameNoTier] contre [mardat.GetTitledFirstName] par décision."
  ray_story.0141.a.success: "#P [mardat.GetTitledFirstName] accepte vos conditions. #!"
  ray_story.0141.a.fail: "#N [mardat.GetTitledFirstName] se rebelle ouvertement contre votre règne et déclenche une guerre civile. #!"

  ray_story.0142.t: "Anarchie à l'Est"
  ray_story.0142.desc: "Les grandes routes commerciales de [ray|e] ont toujours été son plus grand trésor. Pourtant maintenant, dans un désastre économique d'une ampleur inédite, les routes commerciales orientales du royaume sont tombées dans une complète anarchie. De nombreux bandits et sbires, bien entraînés et implacables, ont commencé à infester les routes autrefois sûres tandis que les seigneurs locaux sont totalement incapables de les arrêter.\n\nBien qu'aucune cause claire à ce développement n'ait été trouvée, le plus grand centre d'activité criminelle est de loin [GetTitleByKey('d_suza_riy').GetNameNoTier], le royaume de [mardat.GetTitledFirstName]. Bien qu'il ait prétendu être complètement débordé, aucun signe réel ne montre qu'il fasse des efforts significatifs pour mettre fin au chaos dans son domaine."
  ray_story.0142.a: "Les temps à venir seront difficiles."
  ray_story.0142.a.effects: "L'effondrement des réseaux commerciaux du [GetTitleByKey('k_ray').GetNameNoTier] a ruiné votre économie et porté une grande honte à votre règne."

  ray_story.0143.t: "Un Prédicateur de l'Ombre"
  ray_story.0143.desc: "Après avoir convoqué tous les prêtres de Khäz-gramaze en [GetTitleByKey('d_suza_riy').GetNameNoTier] auprès de moi, j'ai choisi [preacher.GetTitledFirstName] pour convertir le peuple de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] à la vraie foi. Avec son aide et celle de mes agents, je pourrai commencer à répandre la [GetFaithByKey('faith_haruze').GetName] et accroître ma popularité dans la capitale. Prêt à agir, je dois maintenant choisir comment gérer le processus de conversion.\n\nJe pourrais envoyer [preacher.GetTitledFirstName] dans les rues de la ville pour un débat honnête, mais bien que je ne doute pas que certains verraient la vérité, ils ne seraient probablement pas nombreux.\n\nAlternativement, je pourrais faire en sorte que mes agents fassent de grands dons aux indigents de [GetTitleByKey('c_bozisha_dar').GetNameNoTier]. Bien que les chances de succès seraient certainement plus élevées que si mon prédicateur venait les mains vides, je dois considérer si c'est vraiment un investissement sage de mes fonds limités. Je pourrais aussi utiliser mes agents pour répandre l'Ombre par la terreur et la peur. Bien que cela ait de bonnes chances de succès, si les Kralyi venaient à l'apprendre, ils pourraient bien considérer cela comme une trahison."
  ray_story.0143.a: "Je suis sûr que le peuple de la capitale verra la vérité !"
  ray_story.0143.a.effects: "Vous décidez d'envoyer votre prédicateur avec rien d'autre que ses paroles."
  ray_story.0143.a.success_crit: "#P Le peuple de la capitale embrasse pleinement Khäz-gramaze. #!"
  ray_story.0143.a.success: "#P Vous réussissez à convertir beaucoup dans la capitale à votre foi. #! Les nouveaux convertis vous seront loyaux et aideront toute future tentative de coup d'État."
  ray_story.0143.a.failure: "#N Le peuple de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] rejette totalement la [GetFaithByKey('faith_haruze').GetName]. #!"
  ray_story.0143.b: "Le peuple connaîtra la prospérité que Khäz-gramaze apporte aux fidèles !"
  ray_story.0143.b.effects: "Vous décidez d'envoyer votre prédicateur avec de grands présents pour le peuple."
  ray_story.0143.b.success_crit: "#P Le peuple de la capitale embrasse pleinement Khäz-gramaze. #!"
  ray_story.0143.b.success: "#P Vous réussissez à convertir beaucoup dans la capitale à votre foi. #! Les nouveaux convertis vous seront loyaux et aideront toute future tentative de coup d'État."
  ray_story.0143.b.failure: "#N Le peuple de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] rejette totalement la [GetFaithByKey('faith_haruze').GetName]. #!"
  ray_story.0143.c: "Aucun prix n'est trop grand pour apporter les Ténèbres à la cité..."
  ray_story.0143.c.effects: "Vous décidez de faire terroriser le peuple depuis les ombres par vos agents pour inciter les gens à écouter votre prédicateur."
  ray_story.0143.c.success: "#P Vous réussissez à convertir beaucoup dans la capitale à votre foi. #! Les nouveaux convertis vous seront loyaux et aideront toute future tentative de coup d'État."
  ray_story.0143.c.failure: "#N Le peuple de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] rejette totalement la [GetFaithByKey('faith_haruze').GetName]. #!"
  ray_story.0143.c.failure_crit: "#N Les Kralyi apprennent votre tentative de terroriser la capitale pour la convertir à votre foi. Cela aura des conséquences. #!"

  ray_story.0144.t: "Zèle dans les Ombres"
  ray_story.0144.desc: "En une glorieuse victoire spirituelle pour la [GetFaithByKey('faith_haruze').GetName], de nombreux habitants de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] ont embrassé la vraie foi. Ces nouveaux convertis commencent déjà à réclamer que je prenne le pouvoir en [ray|e] et que je renverse l'ordre régnant des Kanivâtra. Maintenant, quand le moment sera venu, mes agents pourront rassembler les nombreux convertis de la ville pour se soulever et plonger la capitale dans le chaos.\n\nQuand mes agents seront prêts à exécuter mon plan pour décapiter le gouvernement du royaume, le peuple de la ville m'aidera à empêcher toute tentative de résister à ma prise de pouvoir, rendant ma victoire d'autant plus inévitable. Bien que cela seul ne me donnera pas le contrôle du [GetTitleByKey('k_ray').GetNameNoTier], cela me rapproche d'un pas de la victoire."
  ray_story.0144.a: "Nul ne peut résister à la volonté de Khäz-gramaze !"
  ray_story.0144.a.effects: "Vous êtes maintenant un pas plus proche de prendre le contrôle du [GetTitleByKey('k_ray').GetNameNoTier] par l'intrigue."

  ray_story.0145.t: "Les Échecs du Prédicateur"
  ray_story.0145.desc: "Dans un tournant des événements choquant et presque incroyable, le vil peuple de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] a osé rejeter les vérités de Khäz-gramaze. Une fois la cité mienne, je m'assurerai de les punir et de leur faire regretter leur adhésion insensée au faible et pitoyable Vâtra, mais pour l'instant je ne puis rien faire d'autre que rager contre ces hérétiques.\n\nBien que cette disgrâce retardera assurément mes plans, ce n'est en aucun cas leur fin. Tant que je pourrai sécuriser la cité par d'autres moyens que le soutien populaire, je pourrai encore détruire les Kanivâtra avant que quiconque en [ray|e] ne puisse m'arrêter."
  ray_story.0145.a: "Tous apprendront à s'incliner devant Khäz-gramaze en temps voulu."
  ray_story.0145.a.effects: "Vous perdez cette opportunité de faire avancer vos plans de prise de contrôle du [GetTitleByKey('k_ray').GetNameNoTier]."

  ray_story.0146.t: "Serpents dans les Rues"
  ray_story.0146.desc: "Dans un tournant des événements choquant, les prédicateurs fanatiques de la [GetFaithByKey('faith_haruze').GetName], qui furent quasi certainement envoyés par [mardat.GetTitledFirstName] du [GetTitleByKey('d_suza_riy').GetNameNoTier], ont réussi à convertir la majeure partie de la population de la capitale à leur foi. Ce n'est pas seulement une tache sur la droiture du règne des Kanivâtra mais aussi un développement inquiétant pour la stabilité de [ray|e].\n\nEn effet, si ces radicaux venaient à croître en puissance, ils pourraient fort bien tenter de mettre fin à la tolérance qui fait la prospérité du [GetTitleByKey('k_ray').GetNameNoTier] au mieux, et pourraient tenter de renverser la domination de Vâtra sur le royaume au pire."
  ray_story.0146.a: "Un mauvais présage, considérant le caractère de [mardat.GetTitledFirstName]..."

  ray_story.0147.t: "Un Prédicateur de Terreur"
  ray_story.0147.desc: "Il a récemment été porté à mon attention que des prédicateurs de la [GetFaithByKey('faith_haruze').GetName] ouvertement liés à [mardat.GetTitledFirstName] du [GetTitleByKey('d_suza_riy').GetNameNoTier] ont terrorisé la population de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] pour tenter de la convertir à leur foi radicale. Bien que l'implication de Mardat dans cette affaire soit un outrage, ce n'est pas en soi un motif d'arrestation.\n\nCependant, j'ai des soupçons sur les intentions de [mardat.GetTitledFirstName] ces derniers temps et cela pourrait fort bien n'être qu'un des nombreux vils complots qu'il a préparés hors de ma vue..."
  ray_story.0147.a: "[mardat.GetTitledFirstName] a révélé son vrai visage."
  ray_story.0147.a.effects: "Vous pourrez déclarer la guerre contre [mardat.GetTitledFirstName] par décision."

  ray_story.0148.t: "Outrage à la Capitale"
  ray_story.0148.desc: "Bien que j'eusse espéré que mes agents puissent user de leurs talents pour #italic convaincre #!le peuple de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] d'embrasser la [GetFaithByKey('faith_haruze').GetName], il apparaît que mes efforts ont complètement échoué. J'ai été informé que les Kralyi eux-mêmes ont découvert mon complot et qu'ils sont outrés que j'aie pu porter une telle attaque contre la liberté religieuse du royaume.\n\nBien que cet échec ne suffira pas à arrêter mon ascension à lui seul, je me demande maintenant si c'est la volonté de Khäz-gramaze que la vraie foi soit répandue par les mots. Après tout, s'il avait voulu que je convainque simplement les hérétiques de [ray|e], il n'aurait sûrement pas permis un tel désastre."
  ray_story.0148.a: "Ces imbéciles connaîtront ma colère !"
  ray_story.0148.a.effects: "Avec cet échec, les Kralyi pourront vous condamner pour vos actes de trahison."

  ray_story.0149.t: "L'Armada du Serpent"
  ray_story.0149.desc: "Si je veux véritablement prendre le pouvoir sur [ray|e] et sa grande capitale de [GetTitleByKey('c_bozisha_dar').GetNameNoTier], je devrai prendre le contrôle des havres de la cité. Bien que je puisse faire saboter les ports par mes agents et ainsi bloquer toute tentative de renforcer la cité par mer une fois qu'elle sera tombée, il serait bien préférable pour moi de bloquer les havres avec une flotte à moi.\n\nMon domaine de [GetTitleByKey('d_suza_riy').GetNameNoTier] se trouve loin à l'intérieur des terres et ne possède aucune marine véritable, mais mes agents ont trouvé un candidat prometteur pour servir mes intérêts sur les mers. [captain.GetTitledFirstName] est un puissant capitaine dans la marine du [GetTitleByKey('k_ray').GetNameNoTier] et selon mes sources, c'est un homme de grand vice et d'ambition. Si je lui offrais un pot-de-vin suffisant, je pourrais probablement le convaincre de ma cause. Pourtant, je dois aussi considérer que mes fonds ne sont pas illimités. Un homme de son caractère a certainement quelques scandales cachés qui n'attendent qu'à être utilisés comme chantage, après tout..."
  ray_story.0149.a: "Mes agents devraient trouver facilement de quoi le compromettre."
  ray_story.0149.a.effects: "Vous tentez de trouver quelque chose à utiliser comme chantage contre [captain.GetTitledFirstName]."
  ray_story.0149.a.success: "#P Vous trouvez le scandale que vous cherchiez. #!"
  ray_story.0149.a.failure: "#N Vos agents sont découverts par [captain.GetTitledFirstName]. #!"
  ray_story.0149.b: "Assez d'or devrait le rallier à ma cause."
  ray_story.01439.b.effects: "Vous offrez de corrompre [captain.GetTitledFirstName] pour gagner sa loyauté."
  ray_story.0149.b.success: "#P [captain.GetTitledFirstName] accepte votre offre. #!"
  ray_story.0149.b.failure: "#N [captain.GetTitledFirstName] rejette votre offre et révèle votre complot aux Kralyi. #!"
  ray_story.0149.c: "Je suis sûr de pouvoir le convaincre de rejoindre ma cause."
  ray_story.0149.c.effects: "Vous tentez de convaincre [captain.GetTitledFirstName] de rejoindre votre cause sans récompense claire."
  ray_story.0149.c.success: "#P [captain.GetTitledFirstName] est convaincu par vos efforts. #!"
  ray_story.0149.c.failure: "#N [captain.GetTitledFirstName] rejette votre offre et révèle vos plans aux Kralyi. #!"

  ray_story.0150.t: "Ombres dans les Havres"
  ray_story.0150.desc: "Comme je le pensais, mes agents ont été plus que capables de convaincre le capitaine de marine [captain.GetTitledFirstName] de rejoindre ma cause. Bien qu'il serve encore officiellement les Kralyi, mes agents ont commencé à travailler pour consolider la position de [captain.GetTitledFirstName] et l'aider à gravir les échelons du commandement naval afin que lorsqu'il sera nécessaire pour le blocus de [GetTitleByKey('c_bozisha_dar').GetNameNoTier], il soit assez puissant pour surpasser toutes les autres flottes près de la cité.\n\nAvec son soutien, il n'y aura aucun moyen pour les Kanivâtra et leurs alliés de fuir la cité par mer et tout espoir que leurs loyalistes reprennent la cité à court terme sera écrasé. Tant que les murs de la cité seront sécurisés, la chute de la cité maintenant assurerait mon ascension au pouvoir."
  ray_story.0150.a: "Khäz-gramaze régnera bientôt sur les havres..."
  ray_story.0150.a.effects: "Vous avez sécurisé une flotte pour bloquer les havres de [GetTitleByKey('c_bozisha_dar').GetNameNoTier], vous rapprochant de votre objectif de coup d'État au [GetTitleByKey('k_ray').GetNameNoTier]."

  ray_story.0151.t: "La Défiance du Capitaine"
  ray_story.0151.desc: "Bien que j'eusse espéré que [captain.GetTitledFirstName] rejoindrait ma cause, il apparaît que ma tentative de le rallier à mon camp a complètement échoué. En effet, [captain.GetTitledFirstName] a réaffirmé sa loyauté envers les Kralyi et est allé jusqu'à rapporter ma tentative de le rallier à la vermine des Kanivâtra.\n\nAvec ce contretemps agaçant, je devrai maintenant gaspiller nombre de mes agents pour tenter de maintenir un semblant de blocus sur les havres quand je tenterai ma prise de contrôle de la cité, et les Kralyi pourraient commencer à avoir de sérieux doutes sur mes ambitions. Avec le recul, je n'aurais pas dû croire en un marin, qui par sa nature est lié au vil Malicìam, mais j'avais pensé que Khäz-gramaze aurait accordé sa bénédiction à une entreprise en son honneur."
  ray_story.0151.a: "La mer a toujours tort, semble-t-il."
  ray_story.0151.a.effects: "Vous avez échoué à convaincre [captain.GetTitledFirstName] de rejoindre votre cause, perdant cette opportunité de faire avancer vos ambitions."

  ray_story.0152.t: "Le Serpent dans les Havres"
  ray_story.0152.desc: "Lorsque l'un de mes capitaines de flotte vint me trouver avec des nouvelles urgentes concernant quelque complot, mes pensées se portèrent aussitôt vers [mardat.GetTitledFirstName] — et j'avais raison de m'en méfier. En effet, j'ai reçu la preuve de sa tentative de convaincre l'un de mes capitaines de le soutenir dans quelque projet impliquant la flotte râyane.\n\nBien que cela ne soit en soi qu'un motif d'inquiétude mineure, les nombreux agissements suspects de Mardat m'ont conduit à soupçonner qu'il trame quelque chose depuis fort longtemps. Pour l'heure, cependant, je manque encore de preuves suffisantes pour agir sur mes doutes. Après tout, [mardat.GetTitledFirstName] de [GetTitleByKey('d_suza_riy').GetNameNoTier] demeure un puissant seigneur de mon royaume et il serait imprudent de l'antagoniser sans raison."
  ray_story.0152.a: "Je devrais le garder à l'œil..."
  ray_story.0152.a.effects: "Vous pourrez déclarer la guerre à [mardat.GetTitledFirstName] par décision."

  ray_story.0153.t: "Guerre du Serpent et du Soleil"
  ray_story.0153.desc: "Enfin, l'heure est venue pour moi de revendiquer [ray|e] pour moi-même. Je ne cacherai plus mes ambitions dans l'ombre ! Le règne faible et décadent de l'Âudrat Vâtra et de ses exécuteurs Kanivâtra touche désormais à sa fin.\n\nDéjà, les fidèles de Khäz-gramaze à travers [GetTitleByKey('d_suza_riy').GetNameNoTier] se préparent à la guerre et des émissaires ont été envoyés aux grandes puissances qui soutiendraient mon ascension. Bientôt, [GetTitleByKey('k_ray').GetNameNoTier] sera mien et je pourrai enfin le remodeler selon ma glorieuse vision, sous la guidance du Seigneur des Ombres."
  ray_story.0153.a: "Que tout Rây tremble devant ma puissance !"

  ray_story.0154.t: "Guerre du Soleil et du Serpent"
  ray_story.0154.desc: "Le jour que je redoutais depuis si longtemps est advenu. [mardat.GetTitledFirstName] de [GetTitleByKey('d_suza_riy').GetNameNoTier] a ouvertement proclamé son ambition de s'emparer de la souveraineté de [GetTitleByKey('k_ray').GetNameNoTier] et son désir de renverser l'Âudrat Vâtra, stabilisateur séculaire du royaume, au profit du [GetFaithByKey('faith_haruze').GetName], radical et fondamentaliste.\n\nBien que je puisse assurément vaincre Mardat seul, il est fort probable qu'il ait œuvré à bâtir des alliances avec les nombreuses puissances mineures et majeures qui entourent [GetTitleByKey('k_ray').GetNameNoTier]. Pourtant, je dois remporter cette guerre à tout prix, car si [mardat.GetTitledFirstName] obtenait la victoire, il s'assurerait d'exterminer les Kanivâtra jusqu'au dernier et plongerait le royaume dans un chaos sans précédent..."
  ray_story.0154.a: "Je n'ai d'autre choix que de survivre à la tempête qui vient..."

  ray_story.0155.t: "L'Appel aux Armes de Mardat"
  ray_story.0155.desc: "Bien que j'eusse presque oublié [mardat.GetTitledFirstName] après avoir accepté sa requête de soutien, j'ai désormais reçu un messager de sa part me demandant de le rejoindre dans ses efforts pour revendiquer [ray|e] par les armes. S'il devait remporter cette guerre, [mardat.GetTitledFirstName] pourrait s'avérer un atout précieux dans mes efforts pour détruire [bellakar|e] et établir la domination totale de la [bayoftulwang|e] par l'Ost-tempête.\n\nS'il est vrai qu'aider [mardat.GetTitledFirstName] pourrait se révéler un gouffre de ressources qui auraient pu servir à la chute de [GetTitleByKey('e_bellakar').GetNameNoTier], les richesses de [GetTitleByKey('k_ray').GetNameNoTier] compenseront largement les pertes dérisoires que les barbares de ces terres pourraient infliger à nos forces supérieures."
  ray_story.0155.a: "Rây sera mien, dussé-je régner par l'entremise d'une marionnette..."
  ray_story.0155.a.effects: "Vous rejoindrez Mardat dans la guerre civile pour l'installer comme nouveau souverain de [GetTitleByKey('k_ray').GetNameNoTier]."

  ray_story.0156.t: "L'Appel aux Armes de Mardat"
  ray_story.0156.desc: "Après le départ de [mardat.GetTitledFirstName], certains doutaient qu'il revînt véritablement nous offrir les richesses qu'il avait promises. Or, ils avaient tort. En effet, [mardat.GetTitledFirstName] a envoyé un messager dans nos terres, nous demandant d'honorer nos serments et de combattre pour l'installer comme nouveau souverain de [ray|e].\n\nLorsque nous reviendrons victorieux de cette grande guerre, nous rapporterons avec nous la gloire et les richesses inouïes de [GetTitleByKey('k_ray').GetNameNoTier], rendant ainsi notre propre terre puissante. Nul dans l'ouest du Sîrayn n'osera s'opposer à notre nouvelle force et notre tribu vivra comme les grands rois des côtes !"
  ray_story.0156.a: "Nos lames faucheront tous ceux qui s'opposent à notre ascension !"
  ray_story.0156.a.effects: "Vous rejoindrez Mardat dans la guerre civile pour l'installer comme nouveau souverain de [GetTitleByKey('k_ray').GetNameNoTier]."

  ray_story.0157.t: "L'Appel aux Armes de Mardat"
  ray_story.0157.desc: "Après nos tractations avec [mardat.GetTitledFirstName] de [GetTitleByKey('d_suza_riy').GetNameNoTier], beaucoup se demandaient si ses grandes promesses seraient tenues. Or Shyra a fait son œuvre et la guerre est venue à [ray|e]. [mardat.GetTitledFirstName], ou plus exactement son messager, est venu une fois de plus dans notre tribu pour nous demander de respecter notre serment de le soutenir dans sa guerre.\n\nNul ici n'a oublié les grandes promesses de [mardat.GetTitledFirstName] et si nous devions remporter cette guerre et obtenir notre dû, cela pourrait apporter la prospérité à notre tribu pour des générations."
  ray_story.0157.a: "La volonté de Shyra sera accomplie."
  ray_story.0157.a.effects: "Vous rejoindrez Mardat dans la guerre civile pour l'installer comme nouveau souverain de [GetTitleByKey('k_ray').GetNameNoTier]."

  ray_story.0158.t: "L'Humiliation de Vâtra"
  ray_story.0158.desc: "Depuis que j'ai commencé à comploter pour prendre le pouvoir à [ray|e], j'avais rêvé de ce jour. Enfin, le règne pathétique des Kanivâtra est totalement renversé et le faux dieu Vâtra avec eux. Désormais, tous dans [GetTitleByKey('k_ray').GetNameNoTier] devront apprendre à s'incliner devant Khäz-gramaze, le plus grand de tous les dieux, ou périr pour leur hérésie.\n\nAvec [ray_king_lost.GetFirstName] enfin mis à bas, je puis maintenant décider du sort de ce pathétique faux souverain. Je pourrais simplement le tuer et passer à d'autres projets, mais ce serait gâcher cette formidable occasion. Si je le souhaitais, je pourrais faire de la mort de l'ancien Kralyi un spectacle brutal et le début d'une purge plus large de tous les hérétiques de la capitale. Cependant, je pourrais aussi faire preuve de clémence envers le Kralyi. Bien qu'il m'en coûterait grandement, cela rendrait la transition du pouvoir moins brutale aux yeux des seigneurs qui sont jusqu'ici restés neutres."
  ray_story.0158.a: "Torturer [ray_king_lost.GetFirstName] à mort devrait suffire..."
  ray_story.0158.a.effects: "Vous décidez de ne tuer que l'ancien Kralyi, épargnant à la capitale une purge plus large."
  ray_story.0158.b: "Que périssent tous ceux qui rejettent Khäz-gramaze !"
  ray_story.0158.b.effects: "Vous massacrez tous les dissidents de la capitale, forçant son peuple à embrasser votre foi."
  ray_story.0158.c: "La clémence a ses avantages..."
  ray_story.0158.c.effects: "Vous décidez d'agir avec pragmatisme et d'épargner les hérétiques de la capitale, du moins pour l'instant."

  ray_story.0159.t: "La Chute de Rây"
  ray_story.0159.desc: "C'en est fait. Tout est fini. La chute des Kanivâtra n'est plus un simple cauchemar, c'est la froide réalité du monde. [mardat.GetFirstName] a tout remporté. Les fidèles de Khäz-gramaze sont en pleine ascension car nul dans [ray|e] n'a la force ni l'unité pour les renverser. J'entends les cris et les lamentations du peuple de la cité depuis ma cellule froide et sombre. Je suis seul, impuissant, réduit à un simple prisonnier attendant une mort assurément douloureuse.\n\nPourtant, peut-être subsiste-t-il encore de l'espoir. De l'espoir pour ma maison, de l'espoir pour le royaume. [heir.GetFirstName], héritier légitime de [GetTitleByKey('k_ray').GetNameNoTier], a réussi à fuir la capitale. Bien que je sois condamné, il reste peut-être encore quelque espoir pour ma lignée de perdurer, bien longtemps après cette grande chute..."
  ray_story.0159.a: "Ma vie m'est ôtée, mais mon espoir demeure."

  ray_story.0160.t: "Le Serpent Occis"
  ray_story.0160.desc: "[mardat.GetTitledFirstName], longtemps détracteur de mon règne et désormais traître déclaré, a enfin été mis à bas. Sa tentative condamnée de renverser la gloire de Vâtra au nom de son dieu nocturne dérisoire a été écrasée, et le règne des Kanivâtra a été restauré sans contestation dans [ray|e]. Avec [mardat.GetFirstName] pourrissant désormais dans mes geôles comme le traître qu'il est, son destin repose entre mes mains.\n\nCependant, la guerre civile s'est révélée coûteuse pour [ray|e]. Il faudra longtemps avant que les rebelles hérétiques de Khäz-gramaze disséminés à travers [GetTitleByKey('d_suza_riy').GetNameNoTier] puissent être entièrement éradiqués, et les ravages de la guerre ont réduit le flux commercial à travers le royaume. Malgré cela, le royaume surmontera cette crise, comme il a surmonté toutes celles des siècles passés."
  ray_story.0160.a: "Nul ne peut défier le règne des Kanivâtra !"

  ray_story.0161.t: "Le Sort des Traîtres"
  ray_story.0161.desc: "Comment ? Comment ! Comment cela a-t-il pu arriver !? Je suis l'élu de Khäz-gramaze, destiné à porter l'ombre sur [ray|e]. Comment ces marchands faibles, gras et décadents ont-ils pu vaincre la puissance et le zèle des fidèles ? Comment ces hommes qui ne connaissent d'autre dieu que l'or osent-ils m'emprisonner comme un vulgaire criminel ? Ils devraient s'incliner devant moi et implorer ma clémence !\n\nTraître, m'appellent-ils, eux qui ont renié la vérité de Khäz-gramaze et même les enseignements de leur propre dieu Vâtra ! Comment Khäz-gramaze a-t-il pu permettre cela ? Comment lui, Seigneur tout-puissant de la Terre, a-t-il pu me mener à ma chute ?"
  ray_story.0161.a: "Je vous le jure à tous, j'aurai ma vengeance !"

  ray_story.0163.t: "Le Coup d'État de Rây"
  ray_story.0163.desc: "Enfin, tous mes préparatifs sont achevés. Tout est prêt pour provoquer la chute du règne décadent et faible des Kanivâtra et de leur dérisoire faux dieu. Des années de machinations m'ont conduit à ce point et désormais, tout ce qui se dresse entre moi et mon ascension au pouvoir, c'est l'ordre donné à mes agents d'exécuter mes plans.\n\nPar la volonté de Khäz-gramaze, je sais que j'ai déjà vaincu, car il ne m'aurait pas conduit jusqu'ici si je n'étais pas destiné à établir sa domination sur [ray|e]. Bientôt, le pathétique [GetFaithByKey('faith_vatra').GetName] sera totalement renversé et tous ceux qui ont méprisé Khäz-gramaze seront occis comme les immondes hérétiques qu'ils sont !"
  ray_story.0163.a: "Le jour de mon avènement est venu !"
  ray_story.0163.a.success: "Vous réussissez votre coup d'État contre [GetTitleByKey('k_ray').GetNameNoTier] et renversez les Kanivâtra."
  ray_story.0163.a.fail: "Votre tentative de coup d'État échoue, plongeant le royaume dans une guerre civile ouverte."

### Mardat Act 2 Events ###


  ray_story.0201.t: "L'Heure de Payer"
  ray_story.0201.desc: "Maintenant que j'ai accompli ma victoire divinement accordée sur [ray|e], les puissances avec lesquelles j'ai négocié pour soutenir mon ascension viendront bientôt réclamer leur dû. Même avec mon avènement comme Kralyi, ma position demeure loin d'être assurée. Après tout, une grande partie du royaume est gouvernée par de vils hérétiques qui ne méritent rien d'autre que la mort.\n\nEn honorant mes serments, je pourrais solidifier mes pactes informels avec mes soutiens en véritables alliances officielles entre mon nouveau royaume et les leurs. Avec leur soutien continu, je suis certain que les rebelles hérétiques des terres périphériques seront bientôt occis comme les ennemis de Khäz-gramaze qu'ils sont."
  ray_story.0201.a: "Les coûts risquent d'être élevés, cependant..."
  ray_story.0201.a.effects: "Dans les jours à venir, des émissaires de vos soutiens viendront réclamer votre paiement et solidifier l'alliance entre vos royaumes."


  ray_story.0202.t: "Paiements aux Pôwa"
  ray_story.0202.desc: "Alors qu'une délégation de mes alliés pôwans de [GetTitleByKey('d_ne_sargoa').GetNameNoTier] arrive à [GetTitleByKey('c_bozisha_dar').GetNameNoTier], je prépare ma cour à les accueillir. Après les formalités d'usage, ils expriment leur joie et leur désir d'allier ouvertement nos deux royaumes après que je les aurai payés pour leurs services.\n\nAvec le soutien de ces guerriers pôwans, je pourrai renforcer davantage mon emprise sur [ray|e] et écraser toute opposition qui pourrait surgir ! Cependant, le coût de ce soutien pourrait s'avérer assez élevé, ce qui risque d'accroître l'instabilité à court terme..."
  ray_story.0202.a: "J'aurai besoin de ces alliés sous peu..."
  ray_story.0202.a.effects: "Vous offrirez à vos alliés pôwans le paiement promis pour leurs services."


  ray_story.0203.t: "Promesses contre Lames"
  ray_story.0203.desc: "Bien que les Nâfarati à mon service ne soient guère plus que des épées loyales, ils demeurent mes alliés. Comme on pouvait s'y attendre de soldats de leur espèce, ils ont envoyé un diplomate m'informer qu'ils souhaitent recevoir leur paiement promis si notre alliance doit perdurer à l'avenir.\n\nLes forces de [GetTitleByKey('d_delritha').GetNameNoTier] sont peut-être mineures pour l'instant, mais avec mon soutien, elles pourraient devenir une puissance majeure dans l'ouest de [GetTitleByKey('e_sirayn').GetNameNoTier]. Le coût pourrait être élevé, mais le soutien des guerriers de leur tribu pourrait s'avérer décisif pour écraser l'opposition au sein de [ray|e]."
  ray_story.0203.a: "Avoir plus de soldats est toujours utile..."
  ray_story.0203.a.effects: "Vous offrirez à vos alliés nâfarati le paiement promis pour leurs services."
  lotr_bozisha_miraz_nafarati_kingdom_desc: "Le chef des Nâfarati envahira tous les souverains du Chennacatt pour revendiquer leurs terres avec votre aide comme promis."


  ray_story.0204.t: "Émissaire du Maréchal-tempête"
  ray_story.0204.desc: "Lorsque l'émissaire des fiers Anbalûkkhôri de l'Ost-tempête arriva à [GetTitleByKey('c_bozisha_dar').GetNameNoTier], je craignis d'abord qu'ils ne viennent formuler quelque exigence déraisonnable envers mon royaume pour abuser de l'ascension d'un allié à [ray|e]. Pourtant, à ma surprise, ma conversation avec l'émissaire montra que l'Ost-tempête soutient véritablement mon règne sur [GetTitleByKey('k_ray').GetNameNoTier].\n\nBien qu'il m'ait coûté de m'allier à des hommes dont l'allégeance appartient au moins en partie à Malicìam, je dois maintenant reconnaître que c'est clairement la volonté de Khäz-gramaze que la puissance de [GetTitleByKey('k_ray').GetNameNoTier] et de [GetTitleByKey('k_an_balkumagan').GetNameNoTier] s'unisse pour anéantir l'éternellement haï [GetTitleByKey('e_bellakar').GetNameNoTier]."
  ray_story.0204.a: "Nul ne peut se dresser contre la puissance de nos royaumes !"
  ray_story.0204.a.effects: "Vous réaffirmez vos promesses envers l'Ost-tempête."
  stormhost_auxiliairies: "Auxiliaires de l'Ost-tempête"


  ray_story.0205.t: "Alliance avec Rây"
  ray_story.0205.desc: "Lorsque nous avons traité pour la première fois avec [mardat.GetFirstName], nous n'étions pas certains que nos promesses nous rapporteraient quoi que ce soit. Or avec l'avènement de [mardat.GetTitledFirstName] à la souveraineté de [ray|e], il est clair que nous avons eu raison de le soutenir dans ses projets. Mes émissaires sont maintenant revenus avec le paiement qui nous avait été promis pour notre alliance avec [mardat.GetTitledFirstName], et les richesses que nous allons gagner dépassent ce que beaucoup dans notre tribu pouvaient rêver.\n\nNotre œuvre n'est cependant pas achevée. Maintenant que nos royaumes sont alliés, nous devrons aider à soumettre l'opposition qui ne manquera pas de surgir contre la chute de [GetTitleByKey('k_ray').GetNameNoTier] aux mains d'une foi aussi radicale que le [GetFaithByKey('faith_haruze').GetName]."
  ray_story.0205.a: "Les lames de Shyra triompheront des ennemis de Rây !"
  ray_story.0205.a.effects: "Votre alliance informelle avec [mardat.GetTitledFirstName] deviendra une alliance complète et vous recevrez bientôt votre paiement promis de sa part."


  ray_story.0206.t: "Pacte d'Or et de Sang"
  ray_story.0206.desc: "Le nouveau [mardat.GetTitledFirstName] de [GetTitleByKey('k_ray').GetNameNoTier], notre allié et plus grand protecteur de nos épées loyales, est désormais en mesure de nous offrir notre récompense pour avoir soutenu son ascension au pouvoir. Grâce aux grandes richesses et à la puissance de [ray|e], les Nâfarati de [GetTitleByKey('d_delritha').GetNameNoTier] ne seront plus jamais une puissance insignifiante.\n\nBien que notre nouveau et puissant allié soit certain de nous apporter une aide et une puissance considérables, nous devons également continuer à lui offrir nos braves et vaillants soldats. Il reste bien des massacres à accomplir dans [GetTitleByKey('k_ray').GetNameNoTier] avant que [mardat.GetTitledFirstName] soit satisfait et que le [GetFaithByKey('faith_haruze').GetName] soit pleinement dominant dans le royaume."
  ray_story.0206.a: "L'âge d'or de notre peuple dans [GetTitleByKey('e_sirayn').GetNameNoTier] commence maintenant !"
  ray_story.0206.a.effects: "Votre alliance informelle avec [mardat.GetTitledFirstName] deviendra une alliance complète et vous recevrez bientôt votre paiement promis de sa part."


  ray_story.0207.t: "La Soumission de Rây"
  ray_story.0207.desc: "Avec l'ascension de mon subordonné et agent de longue date [mardat.GetFirstName] au pouvoir dans le royaume barbare de [GetTitleByKey('k_ray').GetNameNoTier], nous sommes désormais plus proches que jamais de la chute de [bellakar|e]. [ray|e] est une terre riche en ressources et sous la direction des Adunai, elle deviendra probablement un allié et sujet digne de mon royaume.\n\nCependant, [mardat.GetTitledFirstName] présente certains problèmes inhérents lorsqu'il s'agit de consolider son contrôle sur son nouveau royaume. En effet, rares sont ceux dans [GetTitleByKey('k_ray').GetNameNoTier] qui se réjouissent véritablement de voir un chef aussi radical accéder au pouvoir. Pour nous, cependant, cela n'est que positif, car le règne de Khäz-gramaze sur [GetTitleByKey('k_ray').GetNameNoTier] dépendra entièrement de notre soutien pour tenir."
  ray_story.0207.a: "Tous dans la [bayoftulwang|e] s'inclineront devant la tempête qui vient !"
  ray_story.0207.a.effects: "Votre alliance informelle avec [mardat.GetTitledFirstName] deviendra une alliance complète. Il vous offrira son soutien promis pour provoquer la chute de Bellakar."


  ray_story.0208.t: "Le Prix des Traîtres"
  ray_story.0208.desc: "Bien que j'eusse espéré que [guard_leader.GetFirstName] aurait oublié ma promesse de lui accorder [GetTitleByKey('d_suza_riy').GetNameNoTier] à mon avènement au pouvoir, il apparaît que c'était un vœu pieux. Comme tous les autres qui se sont présentés devant moi pour faire honorer mes promesses, l'ancien chef de la garde de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] est venu exiger que je lui accorde les titres promis comme récompense.\n\nCependant, contrairement aux autres puissances avec lesquelles j'ai négocié, il me serait fort aisé de simplement rejeter sa réclamation et refuser de lui offrir sa récompense. Après tout, que pourrait un simple roturier impuissant comme [guard_leader.GetFirstName] faire pour faire respecter mon serment maintenant que je règne sur [ray|e] ?"
  ray_story.0208.a: "J'ai besoin de seigneurs loyaux plus que de ces vieilles terres..."
  ray_story.0208.a.effects: "[guard_leader.GetFirstName] recevra [GetTitleByKey('d_suza_riy').GetNameNoTier] comme promis."
  ray_story.0208.b: "Qu'on chasse cet imbécile de ma cour !"
  ray_story.0208.b.effects: "Vous reniez [guard_leader.GetFirstName] et le bannissez de votre royaume pour son arrogance. Il n'oubliera pas, mais que pourrait-il faire, après tout ?"


  ray_story.0209.t: "Ceux qui Voudraient Occire le Serpent"
  ray_story.0209.desc1: "Dans une déclaration hautement séditieuse, [revolutionary.GetTitledFirstName] et [reactionary.GetTitledFirstName], les deux seigneurs les plus puissants et influents restant à [ray|e] après la chute des Kanivâtra, ont tous deux déclaré leur intention de s'opposer à mon règne. Il m'apparaît clairement qu'ils tenteront d'utiliser leur position de grands détracteurs officiels pour rassembler des soutiens dans une tentative d'établir un nouveau régime dans [GetTitleByKey('k_ray').GetNameNoTier].\n\nBien sûr, leur tentative est condamnée à échouer, car Khäz-gramaze m'a déjà accordé et assuré la victoire. Cependant, la voie vers la refonte du royaume sera sanglante et brutale. Ces figures de proue feront de parfaits exemples pour les imbéciles qui osent se dresser contre mon règne..."
  ray_story.0209.desc2: "Dans une déclaration hautement séditieuse, [reactionary.GetTitledFirstName], le seigneur le plus puissant et influent restant à [ray|e] après la chute des Kanivâtra, a déclaré son intention de s'opposer à mon règne. Il m'apparaît clairement qu'il tentera d'utiliser sa position de grand détracteur officiel pour rassembler des soutiens dans une tentative d'établir un nouveau régime dans [GetTitleByKey('k_ray').GetNameNoTier].\n\nBien sûr, sa tentative est condamnée à échouer, car Khäz-gramaze m'a déjà accordé et assuré la victoire. Cependant, la voie vers la refonte du royaume sera sanglante et brutale. Cette figure de proue fera un parfait exemple pour les imbéciles qui osent se dresser contre mon règne..."
  ray_story.0209.desc3: "Dans une déclaration hautement séditieuse, [revolutionary.GetTitledFirstName], le seigneur le plus puissant et influent restant à [ray|e] après la chute des Kanivâtra, a déclaré son intention de s'opposer à mon règne. Il m'apparaît clairement qu'il tentera d'utiliser sa position de grand détracteur officiel pour rassembler des soutiens dans une tentative d'établir un nouveau régime dans [GetTitleByKey('k_ray').GetNameNoTier].\n\nBien sûr, sa tentative est condamnée à échouer, car Khäz-gramaze m'a déjà accordé et assuré la victoire. Cependant, la voie vers la refonte du royaume sera sanglante et brutale. Cette figure de proue fera un parfait exemple pour les imbéciles qui osent se dresser contre mon règne..."
  ray_story.0209.a: "Comme c'est aimable de me montrer qui torturer à mort..."
  ray_story.0209.a.effects: "Vos ennemis se dévoilant désormais, la véritable guerre civile pour le destin de [GetTitleByKey('k_ray').GetNameNoTier] va maintenant commencer."


  ray_story.0210.t: "Le Joug du Serpent"
  ray_story.0210.desc: "Ce que beaucoup croyaient impensable vient de se produire. La dynastie millénaire des Kanivâtra dont la domination sur [ray|e] semblait éternelle s'est effondrée dans une violence sans précédent. Le tyran radical et zélé [mardat.GetTitledFirstName] règne désormais sur le royaume et déjà, il a commencé des purges aveugles de tous ceux qui n'embrassent pas son [GetFaithByKey('faith_haruze').GetName].\n\nCombien de temps avant que tout [GetTitleByKey('k_ray').GetNameNoTier] ne succombe à sa folie et sa cruauté ? Combien de temps avant que mon peuple et ma famille ne soient ceux qui périront sur les autels du Dieu de la Nuit ? Longtemps nous, fidèles de l'antique [GetFaithByKey('faith_ray').GetName], avons courbé l'échine, acceptant la domination apparemment invincible de Vâtra le destructeur. Or maintenant, le royaume a sombré dans le chaos total et l'invincibilité de ceux qui nous dominent semble moins vraie qu'elle ne l'a été depuis des siècles. L'heure est venue — maintenant ou jamais — nous frapperons ce tyran et libérerons [GetTitleByKey('k_ray').GetNameNoTier] du joug de ses dieux cruels !"
  ray_story.0210.a: "Nous n'avons rien à perdre sinon la mort !"
  ray_story.0210.a.effects: "Vous vous proclamez ennemi de [mardat.GetTitledFirstName] et jurez de libérer [GetTitleByKey('k_ray').GetNameNoTier] de sa tyrannie."
  ray_story.0210.b: "Peut-être la soumission nous apporterait-elle un meilleur sort..."
  ray_story.0210.b.effects: "Vous choisissez de ne pas affronter [mardat.GetTitledFirstName] et vous soumettez à son règne."


  ray_story.0211.t: "L'Ascension du Tyran-Crépuscule"
  ray_story.0211.desc: "Depuis des générations innombrables, les Kanivâtra, exécuteurs divinement choisis, ont maintenu paix et ordre à [ray|e]. Or maintenant, quelque usurpateur venu des confins, se faisant désormais appeler [mardat.GetTitledFirstName], a d'une façon ou d'une autre renversé les régents élus de Vâtra lui-même. Pire encore, cet usurpateur s'est révélé être un véritable fou, déclarant son intention de tuer tous ceux qui n'acceptent pas son Culte de Khäz-gramaze, marginal et radical.\n\nEn tant que doyen des véritables seigneurs de [GetTitleByKey('k_ray').GetNameNoTier], il m'incombe clairement de destituer ce tyran et de restaurer la domination de Vâtra sur ce royaume béni. Cependant, je dois également m'assurer que les terres frontalières soient dûment ramenées dans le giron. En effet, la folie de [mardat.GetTitledFirstName] a poussé nombre des seigneurs périphériques à la rébellion ouverte contre le concept même d'un Rây non gouverné par leur [GetFaithByKey('faith_ray').GetName] désuet."
  ray_story.0211.a: "Je jure que l'ordre reviendra à [GetTitleByKey('k_ray').GetNameNoTier] !"
  ray_story.0211.a.effects: "Vous vous proclamez ennemi de [mardat.GetTitledFirstName] et jurez de ramener l'ordre à [GetTitleByKey('k_ray').GetNameNoTier]."
  ray_story.0211.b: "Peut-être la soumission serait-elle plus sage..."
  ray_story.0211.b.effects: "Vous choisissez de ne pas affronter [mardat.GetTitledFirstName] et vous soumettez à son règne."


  ray_story.0212.t: "Le Destin de Bellakar"
  ray_story.0212.desc: "Le jour tant attendu est venu. [stormhost_emperor.GetTitledFirstName] a déclaré la guerre à [bellakar|e] avec l'intention claire de détruire ce royaume honni à jamais. Déjà, les grandes flottes de l'Ost-tempête ont été rassemblées et le plus grand ost Anbalûkkhôri depuis la Dernière Armada d'antan a été assemblé à [GetTitleByKey('c_khorsaj').GetNameNoTier].\n\nAvec le début de la grande invasion, l'heure est venue pour moi d'honorer ma promesse d'aider à l'anéantissement de [GetTitleByKey('e_bellakar').GetNameNoTier]. On m'a promis de vastes richesses et une part plus que généreuse du butin pillé par [stormhost_emperor.GetTitledFirstName] en récompense de mon aide dans son effort de guerre. Alors que de vils rebelles hérétiques continuent de sévir dans les marges de [GetTitleByKey('k_ray').GetNameNoTier], ces fonds pourraient s'avérer inestimables pour consolider ma position..."
  ray_story.0212.a: "Que Bellakar désespère dans mon sillage !"
  ray_story.0212.a.effects: "Vous rejoindrez l'invasion de Bellakar menée par [stormhost_emperor.GetTitledFirstName]."


  ray_story.0213.t: "Les Dépouilles de Bellakar"
  ray_story.0213.desc: "Avec [stormhost_emperor.GetTitledFirstName] à mes côtés, les armées de Khäz-gramaze ont enfin apporté la ruine absolue à l'éternellement haï royaume de [bellakar|e]. Ses grandes cités gisent en ruines, dépouillées de leurs antiques richesses volées, tandis que son peuple arrogant et fier n'est plus guère que des esclaves pour leur nouveau maître, notre grand allié, l'Ost-tempête.\n\nPresque chaque navire de la flotte de [GetTitleByKey('k_ray').GetNameNoTier] a été rempli du butin de cette grande conquête, comme l'avait promis [stormhost_emperor.GetTitledFirstName]. Que j'utilise ces richesses quasi infinies pour bâtir une armée capable d'écraser totalement les pitoyables rebelles des terres périphériques ou que je m'en serve pour corrompre quelques heureux élus à ma cause, ce grand trésor assurera mon règne sur [GetTitleByKey('k_ray').GetNameNoTier] presque aussi sûrement que les forces désormais hégémoniques de mes alliés."
  ray_story.0213.a: "Ma victoire est absolue !"


  ray_story.0214.t: "La Résilience de Bellakar"
  ray_story.0214.desc: "Par quelque vil caprice du destin, les forces haïes de [bellakar|e] ont vaincu les grandes armées de Khäz-gramaze lors de notre glorieuse invasion pour détruire leur royaume vil. Comment Khäz-gramaze a-t-il pu permettre une telle tragédie, me demandé-je ? L'invasion s'est révélée coûteuse, mais elle ne nous a rien rapporté et a causé des dommages irréversibles à mon image d'invincibilité au sein de [ray|e].\n\nCette invasion ratée n'a fait qu'enrager davantage les rebelles des terres périphériques. Ma position au sein de [GetTitleByKey('k_ray').GetNameNoTier] est plus faible que jamais et je devrai avancer prudemment si je veux éviter d'être renversé en ce moment de faiblesse."
  ray_story.0214.a: "Khäz-gramaze m'accordera ma revanche en temps voulu..."


  ray_story.0215.t: "Le Serpent qui Occit la Lune"
  ray_story.0215.desc: "Enfin, le méprisable royaume de [bellakar|e], qui se dressait fier et hautain comme maître du [harad|e] et grand exécuteur des vils caprices de Malicìam, est tombé. De ma main, les armées invincibles de Khäz-gramaze ont détruit leur plus grand ennemi, non seulement dans la [bayoftulwang|e] mais partout dans le Sud.\n\nLà où les Anbalûkkhôri faibles, gras et inutiles ont échoué maintes et maintes fois, la puissance inépuisable de la vraie foi a remporté la victoire absolue. [GetTitleByKey('e_bellakar').GetNameNoTier] est désormais à ma merci, et son méprisable peuple apprendra bientôt que je ne suis pas un maître clément envers ceux qui me résistent !"
  ray_story.0215.a: "Ma victoire ne saurait être plus complète !"


  ray_story.0216.t: "L'Achat de Zizâl"
  ray_story.0216.desc: "Récemment, il est venu à mon attention que les terres périphériques orientales de [ray|e] n'étaient pas entièrement sous mon contrôle. En effet, [GetTitleByKey('c_zizal').GetNameNoTier] et [GetTitleByKey('c_salibara').GetNameNoTier] sont apparemment tombés sous domination pôwane à un moment donné au cours des siècles passés de déclin Kanivâtra. Le chef pôwan local étant mon allié, il devrait être possible de négocier une vente du territoire pour le voir revenir à ses souverains légitimes."
  ray_story.0216.a: "Envoyez l'offre."
  ray_story.0216.b: "Je n'ai pas les finances pour cela."


  ray_story.0217.t: "La Vente de Zizâl"
  ray_story.0217.desc: "Assez étonnamment, j'ai récemment reçu une offre de mon allié [mardat.GetTitledFirstName] pour acheter les tribus périphériques de [GetTitleByKey('c_zizal').GetNameNoTier] et [GetTitleByKey('c_salibara').GetNameNoTier]. Selon lui, elles font partie des anciennes frontières de [ray|e] et, en tant que tel, c'est à lui qu'il reviendrait de les gouverner. Cependant, comme nous sommes alliés, il m'a offert une bonne somme si je lui cédais pacifiquement ce territoire."
  ray_story.0217.a: "J'accepte avec joie !"
  ray_story.0217.b: "Ces terres sont miennes !"


  ray_story.0218.t: "L'Accord pour Zizâl"
  ray_story.0218.yes.desc: "Comme prévu, mon allié pôwan de [GetTitleByKey('d_ne_sargoa').GetNameNoTier] a accepté de me céder le gouvernement des tribus de [GetTitleByKey('c_zizal').GetNameNoTier] et [GetTitleByKey('c_salibara').GetNameNoTier] pour une somme qui était très probablement assez excessive pour la valeur du territoire. Qu'importe, j'ai redressé l'un des nombreux torts des Kanivâtra aujourd'hui."
  ray_story.0218.no.desc: "Assez étonnamment, [powan_leader.GetTitledFirstName] a refusé mon offre généreuse d'acheter [GetTitleByKey('c_zizal').GetNameNoTier] et [GetTitleByKey('c_salibara').GetNameNoTier] à [GetTitleByKey('d_ne_sargoa').GetNameNoTier]. Bien que cela ne signifie pas la fin de notre alliance, c'est une grande tension sur nos relations."
  ray_story.0218.a: "Ces terres sont miennes !"


  ray_story.0219.t: "Bellakar Enchaîné"
  ray_story.0219.desc: "Avec l'anéantissement de l'haï [bellakar|e] enfin accompli, l'avenir de ce royaume et de son peuple repose désormais entièrement entre mes mains. Il n'est rien que je désire plus que d'apporter la gloire de la grande purge à ces terres païennes, longtemps corrompues par Malicìam, mais je dois également composer avec les réalités de la gouvernance de ma grande conquête. Trouver un soutien local sera difficile voire impossible et [GetTitleByKey('e_bellakar').GetNameNoTier] est une vaste terre, difficile à maintenir sous le joug même avec la poigne de fer la plus dure.\n\nBien que mon premier instinct soit simplement d'exterminer et de convertir de force suffisamment de la population pour maintenir la stabilité, il y aurait de grandes dépouilles à gagner en exploitant les richesses de ces terres conquises et en réduisant ses habitants en esclavage. Cependant, bien qu'ils soient peu nombreux, il en est parmi [GetTitleByKey('e_bellakar').GetNameNoTier] qui soutiendraient véritablement Khäz-gramaze. Parmi les Bellanarud longtemps opprimés, j'ai trouvé certains qui pourraient régner comme parfaits vassaux, m'épargnant le fardeau de gouverner des païens rebelles."
  ray_story.0219.a: "La purge ne connaîtra pas de fin !"
  ray_story.0219.b: "Il serait plus sage de jouir des dépouilles de la victoire..."
  ray_story.0219.c: "Je libérerai nos frères opprimés !"
  mardat_bellakar_destruction_effect: "Chaque comté de [GetTitleByKey('e_bellakar').GetNameNoTier] dans votre royaume obtient le modificateur [GetModifier('mardat_purge_county_modifier').GetNameWithTooltip] pendant 50 ans, #N perd 8 points de développement#! et a une #P chance de 50% de se convertir au [GetFaithByKey('faith_haruze').GetName].#!"
  mardat_bellakar_tributary_effect: "Chaque comté que vous avez conquis dans [GetTitleByKey('e_bellakar').GetNameNoTier] obtient le modificateur [GetModifier('mardat_purge_county_modifier').GetNameWithTooltip] pendant 50 ans, #N perd 5 points de développement#! et a une #P chance de 50% de se convertir au [GetFaithByKey('faith_haruze').GetName] et à la culture Bellanarud.#!"
  mardat_bellanarud_tributary: "[bellanarud_candidate.GetTitledFirstName] prendra le contrôle de vos terres conquises dans [GetTitleByKey('e_bellakar').GetNameNoTier] en tant que votre tributaire."
  mardat_minority_loses_opinion: "#N Chaque vassal d'une foi différente perd 50 points d'opinion envers vous.#!"


  ray_story.0220.t: "Avènement à Bellakar"
  ray_story.0220.desc: "Ayant été porté au pouvoir, je dois honorer ma part du marché et devenir tributaire."
  ray_story.0220.a: "Mon règne commence maintenant !"


  ray_story.0221.t: "La Main du Serpent"
  ray_story.0221.desc: "Mon règne sur [ray|e] étant enfin assuré, mes pensées se tournent désormais vers le sort de mon ancien domaine de [GetTitleByKey('d_suza_riy').GetNameNoTier]. Bien qu'il demeure le cœur du pouvoir de Khäz-gramaze dans le royaume, il est fort éloigné de [GetTitleByKey('c_bozisha_dar').GetNameNoTier], ancienne capitale et centre de [GetTitleByKey('k_ray').GetNameNoTier]. Il serait #italic malséant#! pour le Kralyi de régner depuis un lieu aussi reculé que [GetTitleByKey('c_suza_riy').GetNameNoTier] et, en tant que tel, je dois lui trouver un gardien digne de confiance. Mon frère, [brother.GetTitledFirstName], semble parfait pour cette tâche. De mes fidèles, nul n'est plus loyal que ma mère bien-aimée elle-même.\n\nJe me souviens encore de ce jour, il y a tant d'années, quand il se présenta devant moi — moi qui avais décrété que tous les bâtards de mon père haï devaient être mis à mort — bien qu'il fût de ce sang maudit. Je l'aurais tué sur-le-champ, mais il me fit hardiment une offre. Il m'avait amené sa propre mère et sa sœur, elle aussi née du péché, et me les donna en sacrifice, ne me demandant que de le laisser servir la volonté de Khäz-gramaze. Depuis ce jour, jamais [brother.GetTitledFirstName] ne s'est opposé à moi. Peut-être l'heure serait-elle venue de lui accorder sa récompense ultime..."
  ray_story.0221.a: "Toi aussi tu t'élèveras, mon frère."
  ray_story.0221.b: "Hmm ! Je puis trouver meilleur serviteur."


### Rebels of Rây Events ###


  ray_story.0301.t: "La Bataille du Peuple"
  ray_story.0301.desc: "De tous les coins de mon royaume, les innombrables bandes rebelles autrefois dispersées et désunies se sont rassemblées à ma cour pour discuter de la formation d'une vaste coalition en opposition à l'usurpateur [mardat.GetTitledFirstName]. Alors que les négociations débutent, il semble que je pourrai prendre la tête de ce mouvement assez aisément. Après tout, mon rang élevé et mon influence font de moi le candidat idéal.\n\nPourtant, alors qu'il semblait que mon projet ne rencontrerait aucune opposition, un jeune homme s'avança. Se présentant comme [rebel_leader.GetFirstName], chef de l'une des plus importantes bandes rebelles, il déclara devant l'assemblée que c'était à lui de prendre la direction du mouvement. En effet, selon lui, ce sont les nobles corrompus de haut rang qui ont provoqué cette crise. Malgré la fausseté évidente de ses propos, je sens qu'il a rallié nombre de l'assistance à sa cause. Je dois maintenant répliquer, ou risquer de perdre l'occasion de renforcer ma position."
  ray_story.0301.a: "Je suis un bien meilleur commandant que cet imbécile !"
  ray_story.0301.a.success: "Vous utilisez vos prouesses martiales et votre réputation pour convaincre l'assemblée."
  ray_story.0301.a.failure: "Vos paroles n'atteignent pas l'assemblée."
  ray_story.0301.b: "Peut-être qu'une généreuse largesse me gagnerait leurs cœurs."
  ray_story.0301.b.success: "Votre offre de paiement rallie les bandes rebelles à votre cause."
  ray_story.0301.b.failure: "Les rebelles refusent votre offre de paiement."
  ray_story.0301.c: "Peut-être pouvons-nous trouver un compromis..."
  ray_story.0301.c.success: "Vous convainquez les rebelles de vous suivre en échange d'une grande autonomie."
  ray_story.0301.c.failure: "Les rebelles refusent de négocier."
  ray_rebels: "Bandes rebelles unifiées"
  rebel_county_control_loss: "#N Chaque comté de votre royaume perdra 30 points de contrôle.#!"


  ray_story.0302.t: "Armées de la Foi"
  ray_story.0302.c.desc: "Bien qu'il y eût maintes difficultés dans le processus, j'ai pu rassembler les bandes rebelles éparses de mon royaume en une seule cause sous mon autorité. Les rares détracteurs de mon pouvoir qui demeurent au sein de mes nouvelles forces se font discrets, sachant pertinemment qu'ils n'ont aucun espoir de victoire sans mon soutien. En tant que grand chef officiel de la rébellion contre le vil [mardat.GetTitledFirstName], je puis désormais commencer à œuvrer ouvertement contre les purges de Khäz-gramaze.\n\nGrâce à mon charisme et mes prouesses militaires, mon autorité sur ma nouvelle faction d'opposition aux parvenus de Khäz-gramaze est absolue."
  ray_story.0302.p.desc: "Bien qu'il y eût maintes difficultés dans le processus, j'ai pu rassembler les bandes rebelles éparses de mon royaume en une seule cause sous mon autorité. Les rares détracteurs de mon pouvoir qui demeurent au sein de mes nouvelles forces se font discrets, sachant pertinemment qu'ils n'ont aucun espoir de victoire sans mon soutien. En tant que grand chef officiel de la rébellion contre le vil [mardat.GetTitledFirstName], je puis désormais commencer à œuvrer ouvertement contre les purges de Khäz-gramaze.\n\nBien que cela ait requis un investissement financier considérable, mon autorité sur ma nouvelle faction est assurée pour un avenir prévisible."
  ray_story.0302.a.desc: "Bien qu'il y eût maintes difficultés dans le processus, j'ai pu rassembler les bandes rebelles éparses de mon royaume en une seule cause sous mon autorité. Les rares détracteurs de mon pouvoir qui demeurent au sein de mes nouvelles forces se font discrets, sachant pertinemment qu'ils n'ont aucun espoir de victoire sans mon soutien. En tant que grand chef officiel de la rébellion contre le vil [mardat.GetTitledFirstName], je puis désormais commencer à œuvrer ouvertement contre les purges de Khäz-gramaze.\n\nMon pouvoir sur ce mouvement demeure cependant précaire, car les compromis significatifs que j'ai dû faire avec les chefs rebelles limitent grandement mon autorité."
  ray_story.0302.a: "Un grand pas vers la chute des Khäz-gramaze !"


  ray_story.0303.t: "La Défiance de l'Assemblée"
  ray_story.0303.desc: "Par un retournement de situation stupéfiant, les querelles mesquines et les discours tenus dans ma grande assemblée de chefs rebelles ont conduit à la dissolution complète de tout front uni au sein de mon royaume. Pire encore, les bandes rebelles à nouveau dispersées ont perdu toute foi en ma capacité à jamais mener une coalition digne de ce nom, anéantissant tout espoir de rassembler leurs forces éparses.\n\nMon échec signifie que [mardat.GetTitledFirstName] restera libre de terroriser le royaume, du moins pour l'instant. Cependant, tout espoir n'est pas perdu et je puis encore libérer [GetTitleByKey('k_ray').GetNameNoTier] de la folie de ses nouveaux maîtres."
  ray_story.0303.a: "La route sera rude..."
  ray_story.0303.b: "Je me demande ce que [rebel_leader.GetFirstName] va faire maintenant..."


  ray_story.0304.t: "Rassemblement des Ennemis"
  ray_story.0304.desc: "Sous la direction de [revolutionary.GetTitledFirstName], les bandes rebelles Kât Polozây autrefois dispersées et désunies qui erraient impuissantes dans les terres périphériques de [ray|e] se sont rassemblées en une seule force commune. Des centaines de paysans mécontents et de soldats de l'ancienne garde se regroupent en une seule armée, dotée de la force pour défier mes troupes.\n\nBien que cette racaille puisse s'avérer problématique, elle n'a pas la force d'oser marcher sur [GetTitleByKey('c_bozisha_dar').GetNameNoTier] et par la volonté de Khäz-gramaze, il en sera ainsi jusqu'à leur défaite inévitable."
  ray_story.0305.desc: "Sous la direction de [reactionary.GetTitledFirstName], les bandes rebelles [GetFaithByKey('faith_vatra').GetAdherentNamePlural] autrefois dispersées et désunies qui menaient une lutte futile pour me vaincre dans le cœur de [ray|e] se sont rassemblées en une seule force commune. Des centaines de paysans mécontents et de soldats de l'ancienne garde se regroupent en une seule armée, dotée de la force pour défier mes troupes.\n\nBien que cette racaille puisse s'avérer problématique, elle n'a pas la force d'oser marcher sur [GetTitleByKey('c_bozisha_dar').GetNameNoTier] et par la volonté de Khäz-gramaze, il en sera ainsi jusqu'à leur défaite inévitable."
  ray_story.0304.a: "Ces imbéciles mourront comme les autres !"


  ray_story.0306.t: "Bouclier de la Foi"
  ray_story.0306.desc: "Pour la première fois depuis que le vil [mardat.GetTitledFirstName] a usurpé le pouvoir sur [ray|e], mes terres sont véritablement en sécurité. Plus jamais les bandes fanatiques errantes de Khäz-gramaze déterminées à détruire ce qu'ils appellent hérésie à tout prix ne seront libres de terroriser mes terres ! Mes forces, désormais parmi les plus puissantes de [GetTitleByKey('k_ray').GetNameNoTier], ont pu sécuriser entièrement les frontières de mon royaume.\n\nAttirés par la perspective de trouver enfin une terre sûre dans le chaos qui a balayé le royaume, nombre des peuples fuyant ou déplacés de [GetTitleByKey('k_ray').GetNameNoTier] ont commencé à affluer vers mon royaume. Mon [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('steward'))] [steward.GetFirstName] me recommande de mettre ces gens au travail, pour reconstruire les parties de mes terres qui ont le plus souffert de la Purge. Cependant, mon [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('marshal'))] [marshal.GetFirstName] m'exhorte à me concentrer sur l'occasion de renforcer davantage ma puissance militaire."
  ray_story.0306.a: "Entraînez tout homme apte au combat que vous trouverez."
  ray_story.0306.a.success: "Vous réussissez à renforcer vos forces militaires."
  ray_story.0306.a.failure: "Vous perdez le contrôle de la population entrante."
  ray_story.0306.b: "Leurs mains habiles serviront le royaume."
  ray_story.0306.b.success: "Vous parvenez à apporter la prospérité économique."
  ray_story.0306.c: "Bloquez-leur l'entrée, la stabilité d'abord."
  refugee_dev_gain: "#P Chaque comté de votre royaume gagne 2 points de développement.#!"


  ray_story.0307.t: "Bastion d'Espoir"
  ray_story.0307.m.desc: "Mes efforts pour intégrer les victimes en détresse des purges dévastatrices de [mardat.GetTitledFirstName] ont, grâce à ma direction habile et réfléchie, été couronnés d'un succès retentissant. Les nouveaux habitants de mon royaume ont été maintenus sous contrôle et ont pu contribuer grandement à mon effort de guerre pour libérer [ray|e] de la tyrannie de Khäz-gramaze.\n\nMes nombreuses recrues fraîches, dévouées à reconquérir leurs foyers perdus et à venger leurs proches défunts, ont été intégrées harmonieusement à mes forces régulières. Bien que leur nombre soit quelque peu limité, elles me rapprochent toujours plus du pouvoir de renverser enfin l'usurpateur et de libérer [GetTitleByKey('k_ray').GetNameNoTier]."
  ray_story.0307.e.desc: "Mes efforts pour intégrer les victimes en détresse des purges dévastatrices de [mardat.GetTitledFirstName] ont, grâce à ma direction habile et réfléchie, été couronnés d'un succès retentissant. Les nouveaux habitants de mon royaume ont été maintenus sous contrôle et ont pu contribuer grandement à mon effort de guerre pour libérer [ray|e] de la tyrannie de Khäz-gramaze.\n\nCes nouvelles mains habiles ont apporté une grande prospérité à mon royaume ravagé par la guerre. Là où des villages avaient brûlé, ils en ont bâti de nouveaux, et là où nos routes avaient été détruites par crainte d'une incursion de Khäz-gramaze, elles ont été reconstruites. Grâce à leurs efforts, ma base économique est plus forte que jamais, me rapprochant toujours plus du renversement de l'usurpateur [mardat.GetTitledFirstName]."
  ray_story.0307.a: "Nos espoirs de victoire grandissent sans cesse !"


  ray_story.0308.t: "Chaos Derrière nos Murs"
  ray_story.0308.desc: "Malgré tous mes efforts, ma tentative d'intégrer les victimes en détresse de la sanglante purge de [mardat.GetTitledFirstName] a été un échec complet. Alors que de plus en plus de déplacés affluaient dans mon royaume, mes forces ont complètement perdu le contrôle de la situation. Bien que je ne puisse blâmer ces pauvres âmes de chercher la sécurité, ils ont tout de même apporté une grande instabilité à mes terres.\n\nBien que mes frontières demeurent protégées et à l'abri des forces de [mardat.GetTitledFirstName], mes pertes derrière ma frontière ont très bien pu aggraver ma position. La voie vers le rétablissement sera longue, mais quoi qu'il advienne, nous devons poursuivre notre combat !"
  ray_story.0308.a: "Tout espoir n'est pas perdu, pas encore..."


  ray_story.0309.t: "La Résilience des Rebelles"
  ray_story.0309.desc: "Bien que j'eusse cru mon emprise sur [ray|e] ferme et inébranlable, il semble que j'aie eu tort. En effet, [revolutionary.GetTitledFirstName] a réussi à égaler mes forces personnelles au sein de [GetTitleByKey('k_ray').GetNameNoTier]. Sous [CharYourHerHis(revolutionary)] protection, les hérétiques qui ont réussi à fuir ma grande purge ont commencé à se rassembler, renforçant [CharYourHerHis(revolutionary)] base de pouvoir.\n\nBien que ce bastion parvenu du [GetFaithByKey('faith_ray').GetName] au sein de mon royaume soit une mauvaise nouvelle, il est encore bien en mon pouvoir de l'écraser dans l'œuf, avant qu'il ne devienne assez puissant pour véritablement me défier."
  ray_story.0310.desc: "Bien que j'eusse cru mon emprise sur [ray|e] ferme et inébranlable, il semble que j'aie eu tort. En effet, [reactionary.GetTitledFirstName] a réussi à égaler mes forces personnelles au sein de [GetTitleByKey('k_ray').GetNameNoTier]. Sous [CharYourHerHis(reactionary)] protection, les hérétiques qui ont réussi à fuir ma grande purge ont commencé à se rassembler, renforçant [CharYourHerHis(reactionary)] base de pouvoir.\n\nBien que ce bastion parvenu des [GetFaithByKey('faith_vatra').GetAdherentNamePlural] au sein de mon royaume soit une mauvaise nouvelle, il est encore bien en mon pouvoir de l'écraser dans l'œuf, avant qu'il ne devienne assez puissant pour véritablement me défier."
  ray_story.0309.a: "Je prendrai un soin particulier à les anéantir."


  ray_story.0311.t: "Appel vers le Sud"
  ray_story.0311.desc: "Lorsque [mardat.GetTitledFirstName] a pris le pouvoir pour la première fois, la plupart de l'ordre des [GetFaithByKey('faith_vatra').GetAdherentNamePlural] croyait qu'il serait rapidement défait. En effet, bien que les Kanivâtra fussent partis, notre emprise sur le cœur de [ray|e] demeurait ferme. Ô combien nous avions tort... Bien trop vite, [mardat.GetTitledFirstName] a pu remodeler une grande partie de [GetTitleByKey('k_ray').GetNameNoTier] à son image dans une démonstration sanglante de pouvoir.\n\nIl m'apparaît désormais clairement que nous ne survivrons pas seuls à cette crise. L'heure semble venue de contacter [felira_duke.GetTitledFirstName] de [GetTitleByKey('d_felira').GetNameNoTier]. Un fidèle [GetFaithByKey('faith_vatra').GetAdherentNamePlural] et Bôzishnarûd, [CharYouSheHe(felira_duke)] est le candidat idéal pour un allié étranger à ma cause."
  ray_story.0311.a: "Envoyez le message."
  ray_story.0311.a.effects: "Vous enverrez un message à [felira_duke.GetTitledFirstName], demandant une alliance avec [CharYoursHerHis(felira_duke)] royaume."


  ray_story.0312.t: "Tractations Méridionales"
  ray_story.0312.desc: "Avant d'envoyer ma demande officielle d'alliance à [felira_duke.GetTitledFirstName], je prends le temps de considérer l'offre d'une incitation plus grande pour m'assurer que mon offre soit acceptée. Bien que la nécessité d'une telle alliance me semble évidente, [GetTitleByKey('d_felira').GetNameNoTier] est dans une position bien plus sûre que [ray|e].\n\nSi je dois offrir une récompense, deux options me viennent à l'esprit. Je pourrais offrir à [felira_duke.GetTitledFirstName] les territoires frontaliers longtemps disputés de [GetTitleByKey('c_dezful').GetNameNoTier] et [GetTitleByKey('c_baitu').GetNameNoTier], liant l'expansion de son royaume à mon succès. Une autre option serait d'offrir suffisamment d'or pour servir d'incitation, mais avec mes ressources limitées, il pourrait être imprudent de le dépenser ainsi. Quelle que soit la voie que je prenne, je dois peser mes options avec soin."
  ray_story.0312.a: "Nous céderons nos terres méridionales."
  ray_story.0312.success: "#P [felira_duke.GetTitledFirstName] accepte votre proposition.#!"
  ray_story.0312.failure: "#N [felira_duke.GetTitledFirstName] rejette votre proposition.#!"
  ray_story.0312.b: "Je puis certainement rassembler assez d'or pour convaincre [CharYouHerHim(felira_duke)]."
  ray_story.0312.c: "Cette lutte n'est pas une affaire d'opportunisme !"
  felira_reply_in_a_month: "Vous recevrez la réponse de [felira_duke.GetTitledFirstName] dans un mois."
  felira_give_land_after_victory: "Vous accorderez à [felira_duke.GetTitledFirstName] les territoires de [GetTitleByKey('c_dezful').GetNameNoTier] et [GetTitleByKey('c_baitu').GetNameNoTier] après avoir repris [GetTitleByKey('k_ray').GetNameNoTier]."


  ray_story.0313.t: "Fraternité des [GetFaithByKey('faith_vatra').GetAdherentNamePlural]"
  ray_story.0313.d.desc: "Depuis l'ascension au pouvoir du vil [mardat.GetTitledFirstName] à [ray|e], je n'ai reçu que des rapports et nouvelles toujours plus inquiétants du nord. En effet, il semble que nos parents [GetFaithByKey('faith_vatra').GetAdherentNamePlural] qui détenaient le pouvoir depuis longtemps dans [GetTitleByKey('k_ray').GetNameNoTier] se trouvent désormais face à une menace véritablement existentielle.\n\nÀ la lumière de cela, je ne fus pas surpris lorsqu'un messager envoyé par [reactionary.GetTitledFirstName] arriva à ma cour, demandant si ce n'est suppliant mon aide pour renverser l'usurpateur [mardat.GetTitledFirstName] et libérer [GetTitleByKey('k_ray').GetNameNoTier] de la tyrannie de Khäz-gramaze.\n\nPour adoucir [CharYoursHerHis(reactionary)] offre, [CharYouSheHe(reactionary)] a même proposé de me céder les territoires longtemps disputés de [GetTitleByKey('c_dezful').GetNameNoTier] et [GetTitleByKey('c_baitu').GetNameNoTier] et de les reconnaître officiellement comme parties de [GetTitleByKey('d_felira').GetNameNoTier]."
  ray_story.0313.g.desc: "Depuis l'ascension au pouvoir du vil [mardat.GetTitledFirstName] à [ray|e], je n'ai reçu que des rapports et nouvelles toujours plus inquiétants du nord. En effet, il semble que nos parents [GetFaithByKey('faith_vatra').GetAdherentNamePlural] qui détenaient le pouvoir depuis longtemps dans [GetTitleByKey('k_ray').GetNameNoTier] se trouvent désormais face à une menace véritablement existentielle.\n\nÀ la lumière de cela, je ne fus pas surpris lorsqu'un messager envoyé par [reactionary.GetTitledFirstName] arriva à ma cour, demandant si ce n'est suppliant mon aide pour renverser l'usurpateur [mardat.GetTitledFirstName] et libérer [GetTitleByKey('k_ray').GetNameNoTier] de la tyrannie de Khäz-gramaze.\n\nPour adoucir [CharYoursHerHis(reactionary)] offre, [CharYouSheHe(reactionary)] m'a offert une somme d'or considérable pour mon soutien malgré ses difficultés économiques actuelles."
  ray_story.0313.n.desc: "Depuis l'ascension au pouvoir du vil [mardat.GetTitledFirstName] à [ray|e], je n'ai reçu que des rapports et nouvelles toujours plus inquiétants du nord. En effet, il semble que nos parents [GetFaithByKey('faith_vatra').GetAdherentNamePlural] qui détenaient le pouvoir depuis longtemps dans [GetTitleByKey('k_ray').GetNameNoTier] se trouvent désormais face à une menace véritablement existentielle.\n\nÀ la lumière de cela, je ne fus pas surpris lorsqu'un messager envoyé par [reactionary.GetTitledFirstName] arriva à ma cour, demandant si ce n'est suppliant mon aide pour renverser l'usurpateur [mardat.GetTitledFirstName] et libérer [GetTitleByKey('k_ray').GetNameNoTier] de la tyrannie de Khäz-gramaze.\n\nCependant, [CharYouSheHe(reactionary)] ne m'a offert aucune récompense personnelle au-delà de notre alliance, invoquant son propre manque de ressources et la nature existentielle du conflit qui l'oppose à [mardat.GetTitledFirstName]."
  ray_story.0313.a: "Notre aide pourrait s'avérer décisive."
  ray_story.0313.b: "Cela ne vaut pas de m'attirer l'ire de [mardat.GetTitledFirstName]..."
  does_ally_ray: "Vous vous allierez à [reactionary.GetTitledFirstName] et soutiendrez [CharYoursHerHis(reactionary)] cause dans [GetTitleByKey('k_ray').GetNameNoTier]."


  ray_story.0314.t: "Réponse du Sud"
  ray_story.0314.y.desc: "Comme espéré, mes efforts pour m'allier à [felira_duke.GetTitledFirstName] ont été un succès complet. En effet, après une courte délibération, nos deux royaumes sont parvenus à un accord. Notre alliance étant scellée, ma position parmi les autres rebelles contre le règne de Khäz-gramaze s'est grandement renforcée. En effet, les [GetFaithByKey('faith_vatra').GetAdherentNamePlural], et même nombre de fidèles du [GetFaithByKey('faith_ray').GetName], me voient désormais comme le visage officiel de la rébellion et l'héritier de l'ancienne splendeur des Kanivâtra.\n\nAvec cette victoire diplomatique, je suis un pas plus près de pouvoir enfin libérer [ray|e] de [mardat.GetTitledFirstName] et ramener l'ordre et la paix dans notre royaume déchiré par la guerre. Bien que cela soit certain de m'attirer, ainsi qu'à [felira_duke.GetTitledFirstName], le courroux de l'usurpateur, notre position renforcée compense largement, du moins pour l'instant."
  ray_story.0314.n.desc: "Par un retournement de situation surprenant, [felira_duke.GetTitledFirstName], aveuglé par l'opportunisme, a refusé mon appel à l'alliance en cette heure la plus sombre pour nous [GetFaithByKey('faith_vatra').GetAdherentNamePlural]. Cette trahison, bien que non dévastatrice pour ma cause, est un grand revers vers la libération de [ray|e]. Bien que j'aie pu garder secrètes mes tractations méridionales vis-à-vis de [mardat.GetTitledFirstName], je dois encore avancer prudemment, car attirer toute son attention maintenant pourrait être dévastateur.\n\nBien que la cause des [GetFaithByKey('faith_vatra').GetAdherentNamePlural] perdure, nous devrons renverser l'usurpateur par nous-mêmes, incapables de compter sur l'aide de nos frères en la foi au-delà de nos frontières."
  ray_story.0314.a: "Ensemble, nous restaurerons la gloire des [GetFaithByKey('faith_vatra').GetAdherentNamePlural] !"
  ray_story.0314.b: "Nous sommes véritablement seuls..."


  ray_story.0315.t: "Intrus [GetFaithByKey('faith_vatra').GetAdherentNamePlural]"
  ray_story.0315.desc: "Osant se dresser contre ma volonté, [reactionary.GetTitledFirstName] a réussi à allier [CharYoursHerHis(reactionary)] pitoyables domaines de seigneur de guerre au royaume [GetFaithByKey('faith_vatra').GetAdherentNamePlural] de [GetTitleByKey('d_felira').GetNameNoTier] à la frontière méridionale de [ray|e]. Cette alliance non seulement renforce grandement la cause [GetFaithByKey('faith_vatra').GetAdherentNamePlural] qui semblait condamnée mais cimente également [reactionary.GetTitledFirstName] comme chef incontesté de leur faction.\n\nL'existence d'une telle alliance est évidemment inacceptable. À elle seule, [GetTitleByKey('d_felira').GetNameNoTier] n'est pas de taille face à la puissance de [GetTitleByKey('k_ray').GetNameNoTier], même si je dois composer avec les pitoyables rebelles qui voudraient me renverser. Bientôt, [felira_duke.GetTitledFirstName] apprendra à respecter ma volonté et mon courroux mais, pour l'instant, je devrai composer avec un bloc [GetFaithByKey('faith_vatra').GetAdherentNamePlural] plus puissant aux frontières de la capitale."
  ray_story.0315.a: "Aucun [GetFaithByKey('faith_vatra').GetAdherentNamePlural] ne sera épargné !"

  ray_story.0316.t: "Jaguar de l'Est"
  ray_story.0316.desc: "Si je dois renverser le haï [mardat.GetTitledFirstName] et ses détestables fidèles de Khäz-gramaze, j'aurai besoin de toute l'aide que je puis rassembler. Beaucoup se sont déjà rassemblés sous ma bannière, cherchant protection et direction en ces temps sombres mais, même maintenant, mon succès à libérer [ray|e] est loin d'être garanti.\n\nSi nous, fidèles du [GetFaithByKey('faith_ray').GetName], devons survivre, nous devrons véritablement nous unir. Mes parents Bôzishnarûd sont disposés à combattre et à rejoindre la cause, mais il y a bien d'autres fidèles dans le royaume. À la frontière orientale de [GetTitleByKey('k_ray').GetNameNoTier] se trouve la terre de [GetTitleByKey('d_gai').GetNameNoTier] dirigée par [gai_duke.GetTitledFirstName]. Si je pouvais allier [CharYoursHerHis(gai_duke)] tribu et placer [CharYoursHerHis(gai_duke)] peuple sous ma protection, tous les fidèles du [GetFaithByKey('faith_ray').GetName] au sein du royaume seraient unis sous un front commun."
  ray_story.0316.a: "Je ne nous laisserai pas mourir seuls !"
  ray_story.0316.a.effects: "Vous déciderez comment approcher [gai_duke.GetTitledFirstName]."


  ray_story.0317.t: "Le Seigneur de la Jungle"
  ray_story.0317.desc: "Bien qu'il me semble évident que [mardat.GetTitledFirstName] représente une menace bien trop grande pour nous pour considérer la situation avec des yeux opportunistes, je ne puis affirmer avec certitude que [gai_duke.GetTitledFirstName] perçoit notre situation avec la même clarté. En effet, [GetTitleByKey('d_gai').GetNameNoTier] est fort éloigné de la capitale et bien qu'il ait également souffert des purges, son peuple a pu opposer une résistance bien plus forte.\n\nPeut-être serait-il sage de considérer l'offre à [gai_duke.GetTitledFirstName] d'un véritable avantage pour soutenir ma cause et rejoindre mes efforts pour renverser les Khäz-gramaze et libérer [GetTitleByKey('k_ray').GetNameNoTier] pour le [GetFaithByKey('faith_ray').GetName]. Si je dois faire une telle offre, un choix évident serait de promettre à [gai_duke.GetTitledFirstName] [GetTitleByKey('d_suza_riy').GetNameNoTier], cœur des Khäz-gramaze, comme récompense. Cependant, je pourrais aussi offrir à [CharYoursHerHis(gai_duke)] tribu une véritable indépendance et liberté vis-à-vis de [GetTitleByKey('k_ray').GetNameNoTier] comme récompense véritablement grande."
  ray_story.0317.a: "Sûza-Rîy sera leur."
  ray_story.0317.b: "Ils jouiront de notre protection en tant que peuple libre."
  ray_story.0317.c: "Je suis certain que [gai_duke.GetTitledFirstName] est assez sage pour comprendre..."
  ray_story.0317.success: "#P [gai_duke.GetTitledFirstName] accepte votre offre d'alliance.#!"
  ray_story.0317.failure: "#N [gai_duke.GetTitledFirstName] refuse votre offre d'alliance.#!"
  gai_title_effect: "[gai_duke.GetTitledFirstName] recevra le [GetTitleByKey('d_suza_riy').GetName] si vous reprenez [GetTitleByKey('k_ray').GetNameNoTier] aux Khäz-gramaze."
  gai_independence_effect: "[gai_duke.GetTitledFirstName] deviendra un protectorat indépendant de votre royaume si vous reprenez [GetTitleByKey('k_ray').GetNameNoTier] aux Khäz-gramaze."
  gai_reply_in_10_days: "Vous recevrez la réponse de [gai_duke.GetTitledFirstName] dans 10 jours."


  ray_story.0318.t: "Appels de l'Ouest"
  ray_story.0318.i.desc: "En ces temps de purges et de carnage, c'est un spectacle rare en vérité de voir des messagers de l'ouest porteurs de bonnes nouvelles. Pourtant, [revolutionary.GetTitledFirstName] a, semble-t-il, décidé de rétablir le contact entre [GetTitleByKey('d_gai').GetNameNoTier] et le reste de [ray|e], cherchant une alliance entre nos royaumes face à la dévastation croissante des purges de [mardat.GetTitledFirstName].\n\nLa défaite des Khäz-gramaze, qui n'ont apporté que terreur non seulement à mon peuple mais à tous dans [GetTitleByKey('k_ray').GetNameNoTier], est évidemment une cause qui m'est chère. Bien que l'offre d'alliance de [revolutionary.GetTitledFirstName] semblât déjà tentante en soi, [CharYouSheHe(revolutionary)] a offert à mon royaume une pleine liberté vis-à-vis du reste de [GetTitleByKey('k_ray').GetNameNoTier] en tant que protectorat si [CharYouSheHe(revolutionary)] réussissait à renverser les Khäz-gramaze."
  ray_story.0318.ti.desc: "En ces temps de purges et de carnage, c'est un spectacle rare en vérité de voir des messagers de l'ouest porteurs de bonnes nouvelles. Pourtant, [revolutionary.GetTitledFirstName] a, semble-t-il, décidé de rétablir le contact entre [GetTitleByKey('d_gai').GetNameNoTier] et le reste de [ray|e], cherchant une alliance entre nos royaumes face à la dévastation croissante des purges de [mardat.GetTitledFirstName].\n\nLa défaite des Khäz-gramaze, qui n'ont apporté que terreur non seulement à mon peuple mais à tous dans [GetTitleByKey('k_ray').GetNameNoTier], est évidemment une cause qui m'est chère. Bien que l'offre d'alliance de [revolutionary.GetTitledFirstName] semblât déjà tentante en soi, [CharYouSheHe(revolutionary)] m'a offert la souveraineté de [GetTitleByKey('d_suza_riy').GetNameNoTier] comme compensation pour mes efforts si [CharYouSheHe(revolutionary)] réussissait à renverser les Khäz-gramaze."
  ray_story.0318.n.desc: "En ces temps de purges et de carnage, c'est un spectacle rare en vérité de voir des messagers de l'ouest porteurs de bonnes nouvelles. Pourtant, [revolutionary.GetTitledFirstName] a, semble-t-il, décidé de rétablir le contact entre [GetTitleByKey('d_gai').GetNameNoTier] et le reste de [ray|e], cherchant une alliance entre nos royaumes face à la dévastation croissante des purges de [mardat.GetTitledFirstName].\n\nLa défaite des Khäz-gramaze, qui n'ont apporté que terreur non seulement à mon peuple mais à tous dans [GetTitleByKey('k_ray').GetNameNoTier], est évidemment une cause qui m'est chère. L'offre d'alliance de [revolutionary.GetTitledFirstName] semble tentante, mais je dois aussi penser à mon propre peuple. Puis-je vraiment me permettre d'étirer les forces de [GetTitleByKey('d_gai').GetNameNoTier] à travers tout [GetTitleByKey('k_ray').GetNameNoTier] en ces temps difficiles ?"
  ray_story.0318.b: "Ma tribu et mon peuple passent en premier..."
  ray_story.0318.a: "Nous ne combattrons pas seuls !"
  gai_purge_title_effect: "#P Vous recevrez le [GetTitleByKey('d_suza_riy').GetName] si [revolutionary.GetTitledFirstName] prend le pouvoir dans [GetTitleByKey('k_ray').GetNameNoTier] en remerciement de votre alliance.#!"
  gai_purge_independence_effect: "#P Vous deviendrez un protectorat indépendant plutôt qu'un vassal de [GetTitleByKey('k_ray').GetNameNoTier] si [revolutionary.GetTitledFirstName] prend le pouvoir en remerciement de votre alliance.#!"
  does_ally_gai: "Vous vous alliez à [revolutionary.GetTitledFirstName]."


  ray_story.0319.t: "Le Jaguar Répond"
  ray_story.0319.y.desc: "Comme je l'espérais, [gai_duke.GetTitledFirstName] a accepté de rejoindre mes efforts pour renverser [mardat.GetTitledFirstName] et libérer [ray|e] pour le [GetFaithByKey('faith_ray').GetName] en tant qu'allié. Mettant fin à son long isolement, [GetTitleByKey('d_gai').GetNameNoTier] participe une fois de plus ouvertement aux affaires de [GetTitleByKey('k_ray').GetNameNoTier], sa tribu contrainte de sortir de son isolement par les méfaits des Khäz-gramaze.\n\nAvec nous, fidèles du [GetFaithByKey('faith_ray').GetName], debout ensemble enfin comme un front commun uni, la chute de [mardat.GetTitledFirstName] est plus proche que jamais. Le jour où nous serons prêts approche sans cesse et quand il viendra, j'espère qu'il apportera le destin des Khäz-gramaze. Nous ne sommes plus divisés, nous nous tenons ensemble désormais, comme un seul peuple et une seule foi en opposition existentielle aux méfaits de l'usurpateur [mardat.GetTitledFirstName]."
  ray_story.0319.n.desc: "À ma stupeur, [gai_duke.GetTitledFirstName] a refusé de mettre fin à l'isolement de [CharYoursHerHis(gai_duke)] tribu pour rejoindre la lutte commune contre [mardat.GetTitledFirstName] pour le destin de [ray|e]. Cette démonstration de fierté tribale mal placée pourrait bien nous coûter notre victoire finale et la libération de [GetTitleByKey('k_ray').GetNameNoTier], bien que notre destin ne soit pas encore véritablement scellé.\n\nMalgré les revers, nous devons poursuivre notre lutte et notre guerre, de peur d'être anéantis par la purge et ses ravages. La menace de Khäz-gramaze est plus grande que jamais mais [GetTitleByKey('d_gai').GetNameNoTier] restera caché, cherchant à prétendre que son destin n'est pas lié à celui de [GetTitleByKey('k_ray').GetNameNoTier]."
  ray_story.0319.a: "Que [mardat.GetTitledFirstName] nous craigne depuis son trône !"
  ray_story.0319.b: "Nous étions divisés, espérons que nous ne serons pas conquis..."


  ray_story.0320.t: "Coalition Orientale"
  ray_story.0320.desc: "Osant se dresser contre ma volonté, [revolutionary.GetTitledFirstName] et [gai_duke.GetTitledFirstName] se sont tous deux ouvertement déclarés alliés dans leur lutte insensée pour mettre fin au règne de Khäz-gramaze sur [ray|e]. Par ce geste, la terre longtemps isolationniste de [GetTitleByKey('d_gai').GetNameNoTier] a fait un retour audacieux dans la politique de la capitale.\n\nAvec les grands royaumes hérétiques du [GetFaithByKey('faith_ray').GetName] désormais unis contre mon règne, je devrai considérer mon prochain mouvement avec soin. Leur alliance doit être écrasée dès que possible, bien sûr, mais tant qu'ils se tiennent ensemble, leurs forces seront bien plus difficiles à véritablement vaincre. Je suis certain que leur coalition sera incapable de mettre véritablement fin à mon règne, mais elle serait tout à fait en mesure de tenter de conquérir les terres centrales et au moins tenter de me destituer."
  ray_story.0320.a: "Je leur ferai payer..."


  ray_story.0321.t: "La Voie de la Lune"
  ray_story.0321.desc: "Bien que la route sera longue et rude, l'heure est venue pour moi de quitter [ray|e]. Si je dois faire l'impression nécessaire sur [bellakar_emperor.GetTitledFirstName] pour convaincre [CharYouHerHim(bellakar_emperor)] de m'aider dans ma lutte contre les Khäz-gramaze, je n'ai d'autre choix que de me présenter en personne. Nos anciens liens sont bien trop fragiles et ma position bien trop incertaine.\n\nTant que [tim.GetTitledFirstName] règne, aucun de nos royaumes n'est en sécurité. Les Khäz-gramaze, déjà terribles envers leur propre peuple, seront assurément véritablement abominables envers leurs ennemis jurés. Combien de temps encore [bellakar|e] pourrait-il endurer si un autre poignard était pointé vers son cœur, s'il était véritablement laissé seul dans une mer d'ennemis ? Pourtant, je sais que la menace est bien plus grande pour moi que pour [bellakar_emperor.GetTitledFirstName], du moins pour l'instant, et que [CharYouSheHe(bellakar_emperor)] a déjà de rudes batailles à mener..."
  ray_story.0321.a: "Espérons que [CharYouSheHe(bellakar_emperor)] comprend la gravité de la situation..."
  ray_story.0321.a.effects: "Vous voyagerez vers [GetTitleByKey('c_nilulonde').GetNameNoTier] pour demander l'aide de [GetTitleByKey('e_bellakar').GetNameNoTier]."


  ray_story.0322.t: "Cœur d'Espoir"
  ray_story.0322.desc: "Étant arrivé à [GetTitleByKey('c_nilulonde').GetNameNoTier] et ayant demandé une audience avec [bellakar_emperor.GetTitledFirstName], je pourrai bientôt plaider pour l'aide de [bellakar|e] dans la libération de [ray|e]. Bien que je sois certain que dans un monde parfait [bellakar_emperor.GetTitledFirstName] verrait la nécessité d'aider ma cause, je ne puis être sûr qu'il en sera ainsi en pratique.\n\nSi je devais demander trop, je pourrais très bien me heurter à un refus et me retrouver sans aucun moyen d'obtenir l'aide dont j'ai si désespérément besoin. Il serait peut-être plus sage d'éviter de trop demander et de me contenter de ce que [GetTitleByKey('e_bellakar').GetNameNoTier] peut aisément m'accorder, afin d'avoir au moins une aide contre les Khäz-gramaze. Cependant, la situation dans [GetTitleByKey('k_ray').GetNameNoTier] demeure critique et le plein soutien bellakaze pourrait très bien assurer le renversement de [tim.GetTitledFirstName]."
  ray_story.0322.a: "Nos royaumes seront de véritables alliés !"
  ray_story.0322.a.effects: "Vous tenterez de convaincre [bellakar_emperor.GetTitledFirstName] de former une alliance complète entre vos royaumes."
  ray_story.0322.b: "Nous n'aurions besoin que de quelques auxiliaires..."
  ray_story.0322.b.effects: "Vous tenterez de convaincre [bellakar_emperor.GetTitledFirstName] de financer un groupe d'auxiliaires pour aider votre cause."
  ray_story.0322.c: "Même un simple don d'or suffirait..."
  ray_story.0322.c.effects: "Vous tenterez de convaincre [bellakar_emperor.GetTitledFirstName] de vous accorder une grande somme d'or pour financer votre cause."
  ray_bellakar_yes_t: "#P Vous convainquez [bellakar_emperor.GetTitledFirstName] de soutenir votre cause.#!"
  ray_bellakar_no_t: "#N Vous échouez à convaincre [bellakar_emperor.GetTitledFirstName] de soutenir votre cause.#!"
  ray_bellakar_alliance_yes: "Vous vous alliez à [bellakar_emperor.GetTitledFirstName]."


  ray_story.0323.t: "Désespoir de l'Est"
  ray_story.0323.desc.a: "Aux temps anciens, [ray|e] et [bellakar|e] étaient de grands alliés. Pourtant, après sa chute sous l'ombre et l'ascension, notre lien avec notre vieil allié oriental fut brisé. Depuis des millénaires maintenant, nos relations avec [GetTitleByKey('k_ray').GetNameNoTier] sont au mieux froides, la seule chose nous rapprochant étant l'éternel endiguement de [GetTitleByKey('k_an_balkumagan').GetNameNoTier].\n\nCependant, il semble que les temps changent. Avec l'ascension au pouvoir des Khäz-gramaze dans [GetTitleByKey('k_ray').GetNameNoTier], beaucoup y ont vu l'achèvement de la chute complète du royaume dans l'ombre. Heureusement, il semble qu'il y ait encore de l'espoir. En effet, [revolutionary.GetTitledFirstName], chef de la résistance contre les Khäz-gramaze et les [GetFaithByKey('faith_vatra').GetAdherentNamePlural], est venu dans ma capitale, demandant mon soutien pour la libération de sa patrie. Il cherche mon soutien complet et indéfectible contre tous nos ennemis communs, restaurant l'ancien lien entre nos royaumes."
  ray_story.0323.desc.s: "Aux temps anciens, [ray|e] et [bellakar|e] étaient de grands alliés. Pourtant, après sa chute sous l'ombre et l'ascension, notre lien avec notre vieil allié oriental fut brisé. Depuis des millénaires maintenant, nos relations avec [GetTitleByKey('k_ray').GetNameNoTier] sont au mieux froides, la seule chose nous rapprochant étant l'éternel endiguement de [GetTitleByKey('k_an_balkumagan').GetNameNoTier].\n\nCependant, il semble que les temps changent. Avec l'ascension au pouvoir des Khäz-gramaze dans [GetTitleByKey('k_ray').GetNameNoTier], beaucoup y ont vu l'achèvement de la chute complète du royaume dans l'ombre. Heureusement, il semble qu'il y ait encore de l'espoir. En effet, [revolutionary.GetTitledFirstName], chef de la résistance contre les Khäz-gramaze et les [GetFaithByKey('faith_vatra').GetAdherentNamePlural], est venu dans ma capitale, demandant mon soutien pour la libération de sa patrie. Il m'a demandé de financer et de lui envoyer des volontaires de mon royaume pour renforcer ses forces et aider au renversement des Khäz-gramaze."
  ray_story.0323.desc.g: "Aux temps anciens, [ray|e] et [bellakar|e] étaient de grands alliés. Pourtant, après sa chute sous l'ombre et l'ascension, notre lien avec notre vieil allié oriental fut brisé. Depuis des millénaires maintenant, nos relations avec [GetTitleByKey('k_ray').GetNameNoTier] sont au mieux froides, la seule chose nous rapprochant étant l'éternel endiguement de [GetTitleByKey('k_an_balkumagan').GetNameNoTier].\n\nCependant, il semble que les temps changent. Avec l'ascension au pouvoir des Khäz-gramaze dans [GetTitleByKey('k_ray').GetNameNoTier], beaucoup y ont vu l'achèvement de la chute complète du royaume dans l'ombre. Heureusement, il semble qu'il y ait encore de l'espoir. En effet, [revolutionary.GetTitledFirstName], chef de la résistance contre les Khäz-gramaze et les [GetFaithByKey('faith_vatra').GetAdherentNamePlural], est venu dans ma capitale, demandant mon soutien pour la libération de sa patrie. Il est venu chercher mon soutien complet et indéfectible contre tous nos ennemis communs, restaurant l'ancien lien entre nos royaumes." #He is bad practice but I am unsure how to make it capitalized otherwise
  ray_story.0323.a: "Je ne permettrai pas à l'Ombre de s'étendre davantage !"
  ray_story.0323.a.effects: "Vous acceptez d'aider [revolutionary.GetTitledFirstName]."
  ray_story.0323.b: "Je dois d'abord me soucier de mon royaume..."
  ray_story.0323.b.effects: "Vous refusez d'aider [revolutionary.GetTitledFirstName]."
  bellakar_ally_ray_bellakar_pov: "Vous vous alliez à [revolutionary.GetTitledFirstName]."
  bellakar_volunteers: "Volontaires Bellakaze"


  ray_story.0324.t: "Tractations avec la Lune"
  ray_story.0324.desc.y: "Comme je l'espérais, le sage [bellakar_emperor.GetTitledFirstName] a perçu la gravité de ma situation et a accepté de soutenir ma cause à [ray|e], soulignant notre désir commun de voir les Bôzishnarûd libérés de l'Ombre. Les Khäz-gramaze, dans leur orgueil et leur fanatisme, ont finalement réussi à s'attirer le courroux des défenseurs de l'ordre dans la [bayoftulwang|e]. Avec l'aide de [bellakar|e], je suis certain que la libération de [GetTitleByKey('k_ray').GetNameNoTier] par mes forces réussira en temps voulu.\n\nBientôt, [tim.GetTitledFirstName] tombera. Ce simple fait suffit à insuffler un grand zèle et une grande vigueur à mes hommes et à mon peuple épuisés, le véritable espoir revenant dans leurs cœurs meurtris. Parmi les autres chefs rebelles, ma position est plus forte que jamais. Rares sont ceux qui oseraient maintenant contester mon autorité incontestée parmi les ennemis des Khäz-gramaze."
  ray_story.0324.desc.n: "Par un retournement de situation inquiétant, [bellakar_emperor.GetTitledFirstName] a refusé de m'offrir, ainsi qu'à ma cause, toute aide, invoquant la situation critique de [CharYourHerHis(bellakar_emperor)] royaume et [CharYourHerHis(bellakar_emperor)] besoin de sécuriser ses propres frontières. Sans aucun soutien de [bellakar|e], je suis une fois de plus contraint de concentrer mes efforts sur le rassemblement d'alliés au sein même de [ray|e], car aucune autre puissance ne pourrait véritablement assurer ma victoire.\n\nJe dois maintenant retourner dans mon royaume, honteux et sans espoir, mon peuple contraint d'apprendre que nul ne viendra à son aide. Pour l'instant, le règne de Khäz-gramaze sur [GetTitleByKey('k_ray').GetNameNoTier] semble destiné à durer bien plus longtemps, car nul au-delà de ses frontières ne réalise la menace que [tim.GetTitledFirstName] représenterait si [CharYouSheHe(tim)] consolidait son pouvoir."
  ray_story.0324.a: "Ensemble, nous renverserons l'Ombre !"
  ray_story.0324.b: "Nous n'avons pas de sauveur, seulement notre propre force..."
  bellakar_ally_ray_ray_pov: "Vous vous alliez à [bellakar_emperor.GetTitledFirstName]."


  ray_story.0325.t: "Intrus Bellakaze"
  ray_story.0325.desc: "Dans une démonstration audacieuse mais peu surprenante de sa puissance vile, le royaume haï de [bellakar|e] et son souverain vil [bellakar_emperor.GetTitledFirstName] ont offert leur soutien au chef rebelle [revolutionary.GetTitledFirstName]. Cette offre d'aide représente un grand danger pour mon règne car l'intervention bellakaze contre moi sera assurément rapide et massive. Avec cette alliance, [revolutionary.GetTitledFirstName] n'a peut-être pas gagné la lutte pour le pouvoir mais [CharYouSheHe(revolutionary)] est désormais plus proche que jamais d'y parvenir.\n\nMa réponse doit être rapide, décisive et imparable. Je ne puis m'attarder maintenant, de peur que mon règne ne soit renversé par le vil [GetFaithByKey('faith_ray').GetName]. Par la grâce de Khäz-gramaze, je suis certain que j'aurai encore ma victoire mais elle sera durement gagnée."
  ray_story.0325.a: "[bellakar_emperor.GetTitledFirstName] s'agenouillera et suppliera en temps voulu..."


  ray_story.0326.t: "La Plus Haute des Citadelles"
  ray_story.0326.desc: "Ayant décidé d'investir des ressources considérables dans [GetTitleByKey('c_tresti').GetNameNoTier] et la Haute Citadelle de Kâtri, je dois maintenant décider comment les investir. Considérant le chaos que traverse [ray|e], concentrer une grande quantité de puissance militaire dans la plus grande cité de mon domaine semble sage. En effet, il est impératif non seulement pour ma survie mais pour celle de tous les fidèles du [GetFaithByKey('faith_ray').GetName] que nous bâtissions les forces capables de renverser les Khäz-gramaze et de libérer le royaume de leur tyrannie.\n\nCependant, il existe d'autres moyens de gagner une guerre que par la pure force militaire. Alors que de plus en plus dans [GetTitleByKey('k_ray').GetNameNoTier] sombrent dans le désespoir, rares sont ceux qui investissent encore véritablement dans leur économie tandis que les nombreux réfugiés qui ont fui la purge font de parfaits ouvriers. Je pourrais également investir ces fonds pour renforcer l'image de la Haute Citadelle. Bien que cela ne soit pas d'utilité immédiate dans la lutte pour le destin du royaume, cela unifierait davantage les rebelles sous mon autorité."
  ray_story.0326.a: "Bâtissez-moi une armée digne d'Inuàst !"
  ray_story.0326.b: "La Citadelle sera un bastion de prospérité."
  ray_story.0326.c: "Nul n'ignorera la primauté de Kâtri !"
  katri_success: "#P Vos investissements sont couronnés de succès.#!"
  katri_failure: "#N Vos investissements échouent à atteindre des résultats significatifs.#!"
  lost_building_slots_500_gold: "Note - Si vous n'avez pas suffisamment d'emplacements de bâtiments pour construire les deux bâtiments dans [GetTitleByKey('b_tresti').GetNameNoTier], vous serez remboursé de #P 500 pièces d'or#! par bâtiment perdu."


  ray_story.0327.t: "Kâtri Reforgé"
  ray_story.0327.desc.mil: "Comme je l'espérais, mon grand investissement dans [GetTitleByKey('c_tresti').GetNameNoTier] et la Haute Citadelle a été couronné d'un grand succès. Les camps militaires et forges de guerre nouvellement construits bourdonnent d'activité alors que de nouvelles recrues rejoignent mes forces chaque jour. Pour les peuples apeurés et désespérés de [ray|e], une telle démonstration de puissance militaire de la part des ennemis de leurs oppresseurs Khäz-gramaze est certaine d'apporter l'espoir."
  ray_story.0327.desc.eco: "Comme je l'espérais, mon grand investissement dans [GetTitleByKey('c_tresti').GetNameNoTier] et la Haute Citadelle a été couronné d'un grand succès. Le peuple de la Cité Sainte, œuvrant comme un seul homme, a bâti un phare de prospérité au milieu du chaos et de la destruction des purges de Khäz-gramaze. L'espoir d'un avenir radieux, où le royaume pourrait véritablement être reconstruit, semble se répandre à travers mes terres tandis que le désespoir de [ray|e] commence à se dissiper."
  ray_story.0327.desc.dip: "Comme je l'espérais, mon grand investissement dans [GetTitleByKey('c_tresti').GetNameNoTier] et la Haute Citadelle a été couronné d'un grand succès. Partout où je regarde, je vois davantage de temples, de statues et de grandes œuvres de la foi du [GetFaithByKey('faith_ray').GetName]. Le peuple, se rassemblant autour du clergé renouvelé de la Cité Sainte, retrouve espoir en un avenir radieux tandis que ma position parmi l'opposition aux Khäz-gramaze s'est clairement grandement renforcée."
  ray_story.0327.desc.fail: "Malgré mon grand investissement, il apparaît que mes efforts pour revitaliser [GetTitleByKey('c_tresti').GetNameNoTier] se sont soldés par un échec embarrassant et coûteux. Mes grands fonds et ressources, épargnés sur le peu qui pouvait l'être en ces temps difficiles, ont été gaspillés ou perdus par des officiels corrompus tandis que les ouvriers ordinaires n'ont obtenu aucun résultat. Inutile de dire que c'est terrible pour ma position et pourrait bien condamner ma cause à l'insignifiance."
  ray_story.0327.a: "La Haute Citadelle se dresse fièrement."
  ray_story.0327.b: "Quel terrible gâchis..."


  ray_story.0328.t: "L'Éveil de Rây"
  ray_story.0328.desc.vatra: "Enfin, l'heure est venue. [ray|e], royaume élu de Vâtra, sera libéré de l'infâme hérésie Khäz-gramaze ! La longue nuit et la tyrannie du règne de [mardat.GetTitledFirstName] s'achèvent à l'instant même où la seconde aube de Vâtra se lève sur [GetTitleByKey('k_ray').GetNameNoTier]. Nous combattrons. Nous combattrons jusqu'au dernier homme, jusqu'à ce que le dernier mort soit vengé et que les Khäz-gramaze soient si totalement anéantis qu'ils ne puissent jamais renaître.\n\nDéjà, mon appel aux armes résonne à travers [GetTitleByKey('k_ray').GetNameNoTier] tandis que les bannières loyales et les armées de Vâtra se joignent à ma grande guerre, prêtes à accomplir l'anéantissement total des Khäz-gramaze."
  ray_story.0328.desc.ray: "Enfin, l'heure est venue. Pendant des siècles, les [GetFaithByKey('faith_ray').GetName], fidèles de la vraie foi de [ray|e], ont été contraints de vivre sous le joug des dieux les plus ténébreux. D'abord ce fut Vâtra le destructeur et les Kanivâtra — et bien qu'ils ne fussent point des oppresseurs cruels, ils nous maintinrent sous leur tutelle durant d'innombrables générations. Pourtant, ce n'est pas contre eux que nous combattons aujourd'hui, mais contre la plus grande terreur que [GetTitleByKey('k_ray').GetNameNoTier] ait jamais connue : celle des Khäz-gramaze.\n\nSous mes bannières, ceux qui furent jadis brisés et résignés combattent désormais avec espoir et bravoure. Pour notre patrie, nous combattrons. Pour l'honneur des morts, pour nos foyers perdus, nous combattrons. Il n'y aura point de paix — pas avant que [mardat.GetTitledFirstName] ne soit traîné devant moi dans les chaînes !"
  ray_story.0328.a: "Maintenant ou jamais — nous combattons comme un seul !"


  ray_story.0329.t: "Pour le Seigneur de la Nuit"
  ray_story.0329.desc: "Dans un élan de folie téméraire, [attacker.GetTitledFirstName] a osé se révolter contre le règne divin de [defender.GetTitledFirstName], élu de Khäz-gramaze. Bien que le grand et très illustre [defender.GetTitledFirstName] soit, naturellement, plus que capable d'écraser cette racaille hérétique de [CharYourHerHis(defender)] propre main, il y aurait grande gloire à se joindre à sa défense. Certes, la neutralité pourrait être acceptable, bien qu'elle risque de mener à une issue moins que souhaitable si les choses venaient à dégénérer..."
  ray_story.0329.a: "Je ferai mon devoir."
  ray_story.0329.a.effects: "Vous rejoignez [defender.GetTitledFirstName] contre les rebelles."
  ray_story.0329.b: "Cette guerre n'est pas la mienne..."


  ray_story.0330.t: "Rây Endure"
  ray_story.0330.desc: "L'heure est venue. [attacker.GetTitledFirstName], chef incontesté de la résistance contre la tyrannie Khäz-gramaze sur [ray|e], vient de déclarer ouvertement la guerre à [defender.GetTitledFirstName] pour libérer le royaume de [CharYourHerHis(defender)] règne de terreur sanglant. Tandis que de plus en plus nombreux se rallient à la cause, il m'apparaît clairement que l'on attend de moi que je déclare mon soutien et que je me joigne à cette grande rébellion — pourtant une part de moi doute encore. Si les rebelles venaient à perdre cette guerre et que j'y étais impliqué, cela scellerait assurément toute chance de survivre aux purges qui pourraient encore m'épargner..."
  ray_story.0330.a: "Je refuse d'attendre la mort sans rien faire !"
  ray_story.0330.a.effects: "Vous rejoignez la guerre contre [defender.GetTitledFirstName] du côté des rebelles."
  ray_story.0330.b: "Je survivrai seul..."


  ray_story.0331.t: "La Grande Rébellion"
  ray_story.0331.desc: "Par une déclaration audacieuse, [defender.GetTitledFirstName] a osé prendre ouvertement les armes contre mon règne sur [ray|e]. Longtemps divisés, les petits seigneurs rebelles et les bandes armées qui ont entravé mes efforts pour accomplir ma grande purge se sont rassemblés en une force unique et unie. Déjà, ils ont entamé leur marche vers [GetTitleByKey('c_bozisha_dar').GetNameNoTier]. [defender.GetTitledFirstName] a juré qu'[defender.GetSheHe] ne mettrait pas fin à cette guerre avant d'avoir totalement anéanti les Khäz-gramaze en [GetTitleByKey('k_ray').GetNameNoTier], quel qu'en soit le prix.\n\nBien que je sache ma victoire assurée grâce à la faveur de Khäz-gramaze, je m'inquiète que la guerre à venir soit durement disputée. Ensemble, les rebelles surpassent de loin mes propres forces loyales en nombre — mais un soldat de la vraie foi peut assurément vaincre bien des hérétiques au combat."
  ray_story.0331.a: "Leurs morts seront... #italic douloureuses#! !"


  ray_story.0332.t: "Le Serpent, Terrassé"
  ray_story.0332.desc: "Comment ? Comment ! COMMENT ?! Je ne peux pas perdre ! Je suis l'élu de Khäz-gramaze, celui qui apporte l'ombre divine au [harad|e] ! C'est impossible ! Impossible ! Comment as-tu pu souhaiter cela, ô grand Khäz-gramaze ? Comment ! J'avais vaincu. [ray|e] était mien, sans défense, mûr pour une glorieuse purge et un renouveau sous Khäz-gramaze. Comment ces imbéciles aveugles et pitoyables, incapables de voir au-delà de leurs dieux inférieurs, ont-ils pu me vaincre !\n\nJe les tuerai tous ! Je le jure ! Tous ces rebelles, jusqu'au dernier hérétique et païen maudit, je les massacrerai ! Ceux qui ont osé me mettre aux fers connaîtront ma puissance ! Je les briserai, les torturerai, savourerai chacun de leurs hurlements tandis que la vie quittera leur corps, humiliés et condamnés à une souffrance éternelle !"
  ray_story.0332.a: "Mourez, mourez, MOUREZ !"


  ray_story.0333.t: "Le Serpent Immortel"
  ray_story.0333.desc: "La guerre est terminée, et j'ai vaincu. Tandis qu'[attacker.GetTitledFirstName] est traîné enchaîné devant moi, j'ordonne à mes hommes de se préparer pour les célébrations à venir. Enfin, les vils hérétiques de [ray|e] ont été anéantis ! Leurs chefs pourrissent désormais dans mes cachots, attendant le jour de leur exécution publique — qui sera assurément douloureuse. Bien que quelques petits seigneurs demeurent dispersés à travers le royaume, imposer mon autorité n'est plus qu'une affaire de nettoyage des dernières poches de résistance.\n\nNul en [GetTitleByKey('k_ray').GetNameNoTier] n'ose plus défier mon règne. Bientôt, mes hommes seront envoyés à travers le royaume, frappant les repaires rebelles désormais sans défense et massacrant quiconque s'y cache. Mes alliés se sont rassemblés à [GetTitleByKey('c_bozisha_dar').GetNameNoTier] et déjà ils parlent de proclamer une nouvelle grande dynastie de [GetTitleByKey('k_ray').GetNameNoTier], sous l'ombre divine de Khäz-gramaze."
  ray_story.0333.a: "Que les célébrations commencent dans le sang !"
  ray_story.0333.b: "Même à présent, la clémence pourrait être utile..."
  sieze_all_rebel_leader_titles: "Vous saisirez tous les titres de [attacker.GetTitledFirstName]."


  ray_story.0334.t: "Rây Libéré"
  ray_story.0334.desc.vatra: "Enfin, après tant de pertes et de souffrances, la terre divine de [ray|e] appartient de nouveau aux [GetFaithByKey('faith_vatra').GetAdherentNamePlural]s. L'ordre Khäz-gramaze gît désormais brisé et défait, ses chefs usurpateurs enfermés dans mes cachots. Le long crépuscule de la purge est enfin révolu. Le soleil se lève sur une seconde aube, car il est désormais clair que ce seront moi et ma lignée qui remplacerons les Kanivâtra comme maison élue de Vâtra.\n\nTandis que les préparatifs de mon couronnement en tant que Kralyi commencent, je dois encore prendre une décision capitale avant que tout ceci ne soit véritablement terminé. [defender.GetTitledFirstName], enfin renversé, est maintenu en sécurité dans mes cachots. Nombreux sont ceux qui réclament son exécution, en châtiment de sa trahison envers les Kanivâtra et de ses crimes contre le peuple du royaume. Pourtant, certains croient qu'épargner [defender.GetTitledFirstName] aiderait à normaliser la situation en [GetTitleByKey('k_ray').GetNameNoTier]."
  ray_story.0334.desc.ray: "Des siècles d'oppression et de déclin m'ont mené jusqu'à ce moment. Enfin, [ray|e] est libre. Libre de Vâtra le destructeur, libre de Khäz-gramaze le seigneur des ombres. Les [GetFaithByKey('faith_ray').GetName] ont enduré bien des épreuves, trop d'épreuves, mais à travers la douleur et le chagrin nous nous sommes reconstruits, et pour la première fois depuis d'innombrables générations, nous sommes en ascension. Déjà, nombreux parmi le peuple se sont mis à m'appeler du nom d'Iunást, comparant ma chute de [defender.GetTitledFirstName] à celle de Vâtra dans la [legend_of_iunast|E].\n\nAvant qu'un nouvel ordre puisse advenir en [GetTitleByKey('k_ray').GetNameNoTier], cependant, un dernier choix doit être fait. [defender.GetTitledFirstName], le tyran sanguinaire qui ordonna et dirigea les purges, le fou qui mena les fanatiques Khäz-gramaze, doit maintenant voir [defender.GetHerHis] destin décidé. Nombreux parmi le peuple réclament [defender.GetHerHis] exécution, châtiment plus que mérité pour [defender.GetHerHis] crimes — pourtant certains de mes alliés appellent à la retenue pour faciliter le retour à la normalité au sein du royaume."
  ray_story.0334.a: "[defender.GetTitledFirstName] mourra pour que [GetTitleByKey('k_ray').GetNameNoTier] puisse vivre !"
  ray_story.0334.b: "Je ne verserai point le sang en vain."


  ray_story.0335.t: "La Mâchoire du Serpent"
  ray_story.0335.desc: "J'ai perdu, [ray|e] a perdu. Peu importe la puissance de la coalition rebelle, peu importe avec quelle acharnement ou quel désespoir nous avons combattu, nous avons été vaincus par les armées de [defender.GetTitledFirstName]. L'armée des ombres a marché profondément dans nos terres, nos liens forgés par le désespoir brisés en morceaux face à l'écrasante puissance Khäz-gramaze. Nul ne demeure pour défendre le petit peuple du royaume. Qu'ils soient [GetFaithByKey('faith_vatra').GetAdherentNamePlural] ou [GetFaithByKey('faith_ray').GetName], tous partageront les mêmes souffrances, la même douleur et le même destin funeste.\n\nPour l'heure, je pourris dans les cachots de [GetTitleByKey('c_bozisha_dar').GetNameNoTier], attendant le jour prochain de mon exécution. J'ai la chance d'être le premier à mourir, mais je connais mon geôlier. Ma mort sera douloureuse, si horriblement douloureuse..."
  ray_story.0335.a: "Et ainsi le Serpent dévore tout..."


  ray_story.0336.t: "L'Ombre Se Dissipe"
  ray_story.0336.desc: "Après tant de souffrances, la paix est enfin revenue en [ray|e]. Les Khäz-gramaze, sans chef, démoralisés et, pour beaucoup, n'étant loyaux à la foi que pour le pouvoir ou la sécurité qu'elle leur procurait, ont commencé à abandonner la foi en masse. Pour la grande majorité d'entre eux, ils se tournent vers l'autorité — vers moi — pour choisir quelle foi suivre. Ces nombreux nouveaux convertis apporteront assurément à mon règne une stabilité et une unité depuis longtemps absentes de [GetTitleByKey('k_ray').GetNameNoTier], tandis que le royaume s'unit dans la foi pour la première fois depuis des siècles.\n\nCependant, quelques poches de Khäz-gramaze véritablement fanatiques demeurent, dispersées à travers le royaume, guettant toute opportunité de semer le trouble ou de lancer quelque tentative désespérée de reconquête. Le retour de la paix ne signifie pas non plus le retour de la prospérité. La terre est encore ravagée, les purges ayant laissé des destructions indicibles dans leur sillage. Il faudra de longues années avant que [GetTitleByKey('k_ray').GetNameNoTier] ne soit plus qu'une ombre de ce qu'il fut jadis, mais la voie vers notre renouveau est claire."
  ray_story.0336.a: "Vient maintenant le temps d'un repos vigilant."
  khaz_gramaze_die_out: "#P Chaque comté Khäz-gramaze au sein de votre royaume a 95% de chances de se convertir à votre foi.#!"


  ray_story.0337.t: "Le Prix de la Liberté"
  ray_story.0337.desc: "Avec mon accession au pouvoir sur [ray|e], le moment semble venu de tenir mes promesses. [felira_duke.GetTitledFirstName], à qui j'avais promis une grande partie de l'arrière-pays méridional de [GetTitleByKey('k_ray').GetNameNoTier], a envoyé des émissaires à [GetTitleByKey('c_bozisha_dar').GetNameNoTier] exigeant que je cède le territoire à [CharYourHerHis(felira_duke)] royaume.\n\nJe n'ai guère d'autre choix que d'accepter, car refuser ses exigences maintenant ferait de moi un parjure de la pire espèce pour avoir trahi un allié juré. En vérité, cette perte importe peu comparée à l'aide qu'elle m'a value, bien qu'elle entame quelque peu le prestige de [GetTitleByKey('k_ray').GetNameNoTier]."
  ray_story.0337.a: "Officialisez le transfert."


  ray_story.0338.t: "Le Butin du Jaguar"
  ray_story.538.desc.t: "Avec mon accession au pouvoir en [ray|e], [gai_duke.GetTitledFirstName] a agi conformément à ma promesse de [CharYouHerHim(gai_duke)] accorder [GetTitleByKey('d_suza_riy').GetNameNoTier] en récompense de [CharYourHerHis(gai_duke)] aide à la libération du royaume. Je dois maintenant honorer mon serment, sous peine de passer pour un parjure aux yeux d'un grand allié de ma cause.\n\nLes braves gens de [GetTitleByKey('d_gai').GetNameNoTier] méritent amplement cette récompense pour leur bravoure durant la guerre de libération de notre peuple. Il ne me reste plus qu'à reconnaître officiellement l'expansion de [GetTitleByKey('d_gai').GetNameNoTier], mettant fin à toute incertitude quant à l'avenir de ces terres."
  ray_story.538.desc.i: "Avec mon accession au pouvoir en [ray|e], je dois maintenant honorer ma promesse envers [gai_duke.GetTitledFirstName] de [CharYouHerHim(gai_duke)] accorder l'indépendance en tant que seigneur protégé du royaume. [GetTitleByKey('d_gai').GetNameNoTier] ayant longtemps été à la périphérie du royaume, cette perte n'est nullement écrasante, et revenir sur ma parole maintenant ferait de moi un parjure de la pire espèce.\n\nLes nombreuses voix au sein de [GetTitleByKey('d_gai').GetNameNoTier] qui ont longtemps réclamé la liberté de leur peuple ont enfin été entendues, et le temps où il n'était qu'une partie de [GetTitleByKey('k_ray').GetNameNoTier] est désormais véritablement révolu."
  ray_story.0338.a: "Une juste récompense pour leurs luttes."
  ray_story.0338.b: "Jamais nous n'oublierons notre parenté."
 
  ### Vâtalinar Content - Serpent in the Shadows ###


  # Even 401 is part of Exiles Content
  ray_story.0402.t: "Le Serpent dans les Ombres"
  ray_story.0402.desc: "Sans savoir pourquoi, quelque chose au plus profond de moi m'inquiète jusqu'au tréfonds de l'âme, comme si je percevais quelque terrible présage. Presque chaque nuit, d'étranges cauchemars sanglants m'assaillent : [GetTitleByKey('c_bozisha_dar').GetNameNoTier] en flammes, ma famille massacrée sous mes yeux tandis que je suis emporté par une silhouette drapée de ténèbres pures.\n\nJ'ai consulté de nombreux prêtres, bien sûr, mais aucun n'a su déchiffrer le sens de mes rêves, hormis le funeste présage qu'ils représentent. Chaque jour qui passe, je m'interroge davantage. Qui se cache derrière cela ? Qui est l'usurpateur drapé d'Ombre ? Si ces rêves sont véridiques, peut-être le traître est-il déjà parmi nous, guettant l'heure de frapper. Je ne puis laisser de tels doutes sans réponse, mais une part de moi commence à craindre de sombrer dans la folie..."
  ray_story.0402.a: "Je capturerai cette ombre, quel qu'en soit le prix !"
  ray_story.0402.b: "C'est de la folie !"
  ray_begin_investigation: "Vous allez entreprendre une enquête dans tout le royaume pour débusquer toute tentative de trahison."


  ray_story.0403.t: "Plonger le Regard dans l'Ombre"
  ray_story.0403.desc: "Tandis que je me retire avec mes alliés les plus dignes de confiance, nous commençons à élaborer notre plan pour découvrir la véritable nature du complot qui se trame dans les ombres du royaume. Beaucoup de travail nous attend, mais il n'est point d'autre moyen d'assurer la survie de ma maison.\n\n"
  ray_story.0403.desc.crime: "Peut-être pourrais-je, avec mes agents, user de ma considérable richesse et de mon pouvoir pour plonger moi-même dans les bas-fonds criminels de la capitale.\n\n"
  ray_story.0403.desc.army: "Il serait peut-être sage d'enquêter sur l'armée du royaume, cherchant à débusquer tout sympathisant du complot parmi ses rangs.\n\n"
  ray_story.0403.desc.lords: "Une enquête drastique mais probablement nécessaire sur les seigneurs du royaume pourrait donner de grands résultats, car le maître des ombres se trouve vraisemblablement parmi eux."
  ray_story.0403.a: "Je ferai la lumière sur les bas-fonds."
  ray_story.0403.b: "Je fouillerai mes forces jusqu'au dernier homme."
  ray_story.0403.c: "Je décapiterai ce complot sur-le-champ !"
  vatalinar_investigate_criminals: "Vous décidez de concentrer vos efforts sur l'enquête dans les bas-fonds criminels du royaume, cherchant tout lien entre eux et le maître des ombres."
  vatalinar_investigate_army: "Vous décidez de concentrer vos efforts sur l'enquête au sein de votre armée ainsi que de la garde de la capitale, cherchant tout signe du complot."
  vatalinar_investigate_lords: "Vous décidez de concentrer vos efforts sur l'enquête parmi les seigneurs de votre royaume, cherchant à identifier le maître des ombres parmi leurs rangs. Cela pourrait bien se retourner contre vous..."


  ray_story.0404.t: "La Voix des Ombres"
  ray_story.0404.desc: "Mes efforts pour enquêter dans les bas-fonds criminels de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] ont, semble-t-il, porté leurs fruits. Après une recherche relativement aisée, mes agents ont pu retrouver [informant.GetTitledFirstName], chef du plus grand réseau d'informateurs de la capitale. Un homme si bien renseigné doit assurément savoir #italic quelque chose#! sur le complot, bien qu'il ne soit peut-être pas disposé à trahir facilement un bon commanditaire.\n\nMes agents sont prêts. Je pourrais, à tout moment, les envoyer frapper le repaire de [informant.GetTitledFirstName] et le traîner devant moi pour un interrogatoire en bonne et due forme. Malgré cela, je dois me rappeler que [informant.GetTitledFirstName] est un informateur, un homme qui vit de la vente d'informations précieuses. Assurément, un tel homme aimerait avoir un commanditaire aussi riche que moi — pourtant le maître des ombres a peut-être su lui faire une offre qu'il ne pouvait refuser. Une part de moi se demande si je ne vais peut-être pas trop loin, si tout ceci n'est qu'une obsession insensée, mais mon instinct ne saurait me trahir..."
  ray_story.0404.a: "J'obtiendrai ce que je veux de [informant.GetTitledFirstName]..."
  ray_story.0404.b: "Nous pouvons sûrement parvenir à un arrangement."
  ray_story.0404.c: "Assez de cette folie !"
  vatalinar_investigate_pull_out: "Vous abandonnerez votre quête pour sonder les ombres du royaume, du moins pour l'instant..."
  ray_story.crime.success: "#P Vous parvenez à faire progresser votre enquête.#!"
  ray_story.crime.fail: "#N Votre plan échoue.#!"


  ray_story.0405.t: "Les Ombres des Bas-Fonds"
  ray_story.0405.desc: "Malgré tous mes efforts, il semble désormais que mon enquête dans les bas-fonds criminels de la capitale soit terminée, que je le veuille ou non. En effet, ma piste prometteuse pour obtenir des informations semble s'être refroidie, aucune nouvelle piste ne s'offrant à moi et à mes loyalistes. Revers après revers ont rendu toute poursuite de l'enquête un gaspillage de ressources précieuses.\n\nPour l'instant, il semble sage de réorienter mes efforts ailleurs. Malgré tous mes efforts, le complot perdure, toujours dissimulé derrière un épais voile d'ombres, guettant son heure pour frapper. Quand ce jour viendra, je serai prêt — ou je tomberai et me retrouverai totalement anéanti. Je dois maintenant retourner à mes devoirs de souverain, de peur de perdre davantage d'influence et d'autorité sur le royaume, renforçant d'autant le pouvoir du complot."
  ray_story.0405.a: "Je #italic capturerai#! cette ombre !"
  vatalinar_failed_criminal_investigation: "#N Vous n'avez pas réussi à trouver de preuve ou d'information décisive sur le complot durant votre enquête dans les bas-fonds criminels de la capitale.#!"


  ray_story.0406.t: "Faire Parler une Ombre"
  ray_story.0406.desc: "Tandis que mes agents amènent [informant.GetTitledFirstName] devant moi, je commence à réfléchir à la manière de mener l'interrogatoire à venir. Je suis certain que [informant.GetTitledFirstName] détient des informations importantes dans ma quête pour démasquer le complot et son insaisissable maître des ombres, même s'il ne le sait peut-être pas lui-même. Si je veux obtenir quoi que ce soit de lui, cependant, je devrai gérer cette situation au mieux de mes capacités.\n\nUn interrogatoire standard est, bien sûr, tout à fait envisageable dans les circonstances actuelles, car [informant.GetTitledFirstName] n'est peut-être pas véritablement loyal au maître des ombres — mais peut-être qu'une longue séance de torture rendrait ses paroles plus sincères s'il était un agent loyal. Pourtant, peut-être qu'aucune de ces voies n'est la plus sage. En effet, c'est la vie d'un informateur de vendre des informations au plus offrant, et dans sa position actuelle, il n'aurait guère d'autre choix que d'accepter mon offre."
  ray_story.0406.a: "Il parlera en temps voulu, j'en suis certain."
  ray_story.0406.b: "Je ne reculerai devant rien pour obtenir une réponse..."
  ray_story.0406.c: "Il parlera pour le juste prix..."
  ray_story.0406.d: "Je ne peux pas faire cela !"
  vatalinar_pull_out_end: "#N N'ayant trouvé aucune preuve décisive ni information utile, abandonner cette voie maintenant réduira considérablement vos chances de vaincre le complot.#!"


  ray_story.0407.t: "Frappe Contre les Ombres"
  ray_story.0407.desc: "Enfin, je tiens une piste solide sur les membres du maudit complot. En effet, ayant #italic convaincu#! l'informateur de parler, je connais désormais l'emplacement du centre d'opérations d'un réseau d'espionnage hautement suspect. J'ai su dans mon cœur, à l'instant où j'ai appris son existence : ces hommes sont des agents du maître des ombres, œuvrant à faire avancer ses desseins au sein de la capitale.\n\nCependant, je dois encore agir avec prudence. Je suis certain que le complot a prévu des plans exactement pour cette éventualité. S'il peut être tentant de tenter un raid militaire direct sur leur quartier général, ils s'y sont assurément préparés, rendant l'opération bien plus difficile qu'elle ne le serait autrement. Il serait peut-être plus sage de jouer le maître des ombres à son propre jeu et d'infiltrer son propre réseau d'espions, car il ne s'attendrait sûrement pas à ce qu'un autre œuvre dans les ombres pour sa perte."
  ray_story.0407.a: "Je suis le #italic Kralyi#!, pas quelque intrigant !"
  ray_story.0407.b: "La voie des ombres m'apportera la victoire."
  ray_story.0407.c: "Même maintenant, il n'est pas trop tard pour faire marche arrière..."
  ray_story.crime.success.last: "#P Vous parvenez à découvrir l'identité du maître des ombres.#!"
  ray_story.crime.fail.last: "#N Vous échouez à démasquer le maître des ombres.#!"


  ray_story.0408.t: "Le Serpent, Sans Ombre"
  ray_story.0408.desc: "Enfin, le maître des ombres a été démasqué. Mes agents l'ont confirmé — il n'est autre que [mardat.GetTitledFirstName] de [GetTitleByKey('d_suza_riy').GetNameNoTier]. Enfin, j'ai des preuves. Je le savais depuis le début. Je ne suis pas fou, ni perdu, ni paranoïaque. J'ai raison ! Cela me semble si évident maintenant. Bien sûr que c'était [mardat.GetTitledFirstName], qui d'autre cela aurait-il pu être en vérité ? Nul autre n'aurait l'arrogance, l'ambition et la démence d'oser frapper contre les Kanivâtra, après tout.\n\nL'heure est enfin venue. Le complot est désormais mis à nu devant moi, prêt à être brisé et défait tandis que je sauve ma bien-aimée [ray|e] des cruelles ambitions des Khäz-gramaze. Le royaume entier va maintenant connaître la trahison de [mardat.GetTitledFirstName] tandis que je prépare mes forces pour écraser le complot une fois pour toutes."
  ray_story.0408.a: "Jamais plus je ne tremblerai devant [mardat.GetFirstName] !"
  vatalinar_succeeded_criminal_investigation: "#P Vous avez réussi à identifier le chef du complot !#!"


  ray_story.0409.t: "Lumière de Vâtra"
  ray_story.0409.desc: "D'une manière ou d'une autre, le pathétique et insignifiant [ray_king.GetTitledFirstName] a trouvé des preuves accablantes de mon complot pour renverser l'ordre [GetFaithByKey('faith_vatra').GetAdherentNamePlural] de [ray|e]. Il va sans dire qu'[CharYouSheHe(ray_king)] n'est guère satisfait et dispose maintenant de la justification parfaite pour agir contre moi. Bien qu'aucune réponse officielle n'ait encore émané de [GetTitleByKey('c_bozisha_dar').GetNameNoTier], je dois me préparer à la lutte pour le pouvoir à venir. Ce n'est qu'une question de temps avant que les [GetFaithByKey('faith_vatra').GetAdherentNamePlural]s ne tentent de me démettre du pouvoir, après tout.\n\nQuel que soit le temps qu'il me restait, il est désormais épuisé. Je dois préparer mes forces et rassembler tous les alliés possibles, quels que soient les risques, le prix ou les conséquences. La guerre à venir décidera du destin et de la foi de [GetTitleByKey('k_ray').GetNameNoTier] — une guerre dont, par la volonté de Khäz-gramaze, je sortirai vainqueur, quel qu'en soit le prix."
  ray_story.0409.a: "Les dés sont jetés..."
  vatalinar_may_act: "#N [ray_king.GetTitledFirstName] peut maintenant déclencher la guerre civile de [CharYourHerHis(ray_king)] propre initiative.#!"


  ray_story.0410.t: "Des Serpents Parmi les Boucliers"
  ray_story.0410.desc: "Le joueur le plus important dans toute tentative de coup d'État du maître des ombres est la garde de la cité de [GetTitleByKey('c_bozisha_dar').GetNameNoTier]. Tant qu'elle reste loyale, le pouvoir du complot à l'intérieur des murs de la capitale demeure limité, le contraignant à n'œuvrer que depuis les ombres. Étant donné le rôle critique de la garde, il est quasi certain que le complot tentera au moins d'en prendre le commandement.\n\nPourtant, je dois être prudent. Si je frappe les pions du maître des ombres trop tôt, il n'aura peut-être pas encore pris contact avec la garde — ce qui exposerait mes efforts et garantirait qu'il reste sur ses gardes. Au-delà de cette préoccupation, je dois aussi réfléchir à la manière d'inspecter la garde et ses chefs. Bien qu'une enquête standard soit toujours possible, elle pourrait facilement échouer. Peut-être un meilleur choix serait-il une restructuration de toute la garde, désorganisant toute tentative de résistance du complot et garantissant une enquête aisée."
  ray_story.0410.a: "Recherchez #italic tout#! comportement suspect."
  ray_story.0410.b: "Aucun prix n'est trop élevé pour ma sécurité..."
  ray_story.0410.c: "Je devrais plutôt concentrer mes efforts sur la flotte..."
  ray_story.0410.d: "Il est bien trop tôt pour une action si radicale..."
  vatalinar_investigate_army_pull_out: "Vous abandonnerez votre enquête pour l'instant. #N Vous pourrez reprendre cette voie mais devrez attendre #italic 3 ans#! avant de pouvoir mener une nouvelle enquête.#!"
  vatalinar_army_other_choice: "Vous décidez de tenter d'enquêter sur la flotte plutôt que sur la garde de la capitale."
  vatalinar_army_mardat_must_have_guard: "#N Si le maître des ombres n'a pas pris le contrôle de la garde, cette enquête échouera quoi qu'il arrive !#!"
  ray_story.army.success: "#P Votre enquête révèle l'identité du maître des ombres.#!"
  ray_story.army.fail: "#N Votre enquête ne parvient pas à trouver de résultats concluants.#!"


  ray_story.0411.t: "Serpents de Mer"
  ray_story.0411.desc: "Bien que moins importantes que la garde de la cité pour la défense de [GetTitleByKey('c_bozisha_dar').GetNameNoTier], les vastes forces navales de [ray|e] demeurent un atout critique pour contrôler la capitale. Il est quasi certain que le complot s'intéresse au moins à obtenir un contrôle limité sur la flotte avant de lancer une tentative de coup d'État pour véritablement pouvoir tenir la capitale.\n\nPourtant, je ne suis pas certain que certains parmi mes capitaines aient osé rejoindre le complot. Une tentative précoce de vaincre le maître des ombres ici pourrait seulement le rendre plus prudent à l'avenir. Bien qu'inspecter mes officiers par l'espionnage ou des inspections soit une option évidente pour débusquer les traîtres, elle pourrait fort bien se solder par un échec. Au lieu de cela, il serait peut-être plus sage d'entreprendre une restructuration et une purge en bonne et due forme de mes officiers navals pour isoler tout rebelle potentiel, divisant le complot pour mieux le conquérir."
  ray_story.0411.a: "Qu'aucun capitaine ne demeure sans surveillance."
  ray_story.0411.b: "N'épargnez aucune dépense pour une flotte loyale."
  ray_story.0411.c: "Se concentrer sur la garde de la capitale serait peut-être plus sage..."
  vatalinar_army_mardat_must_have_navy: "#N Si le maître des ombres n'a pas d'alliés dans la flotte, cette enquête échouera quoi qu'il arrive !#!"
  vatalinar_army_other_choice_2: "Vous décidez de tenter d'enquêter sur la garde de la capitale plutôt que sur la flotte."


  ray_story.0412.t: "Des Ombres Sous les Armes"
  ray_story.0412.navy_fail: "Malgré les meilleurs efforts de mes agents, aucun lien concret entre le complot et l'un quelconque de mes capitaines n'a été trouvé. Bien que nous n'ayons aucun moyen de savoir si le maître des ombres avait des alliés qui ont simplement réussi à rester cachés ou si nous avons frappé trop tôt, de nouvelles recherches dans la flotte semblent désormais vaines maintenant que le complot sait qu'elles pourraient venir.\n\nPourtant, tout espoir de découvrir le maître des ombres n'est pas perdu. En effet, il est possible qu'il ait concentré ses efforts sur la garde de la capitale plutôt que sur la flotte, expliquant l'absence de tout lien entre eux. Il me semble clair que la meilleure voie à suivre est de poursuivre mon enquête. Après tout, toute chance de révéler ce complot vaut mieux qu'aucune."
  ray_story.0412.guard_fail: "Malgré les meilleurs efforts de mes agents, aucun lien concret entre le complot et la garde de la cité de [GetTitleByKey('c_bozisha_dar').GetNameNoTier] n'a été trouvé. Bien que nous n'ayons aucun moyen de savoir si le maître des ombres avait des alliés qui ont simplement réussi à rester cachés ou si nous avons frappé trop tôt, de nouvelles recherches dans la garde semblent désormais vaines maintenant que le complot sait qu'elles pourraient venir.\n\nPourtant, tout espoir de découvrir le maître des ombres n'est pas perdu. En effet, il est possible qu'il ait concentré ses efforts sur la flotte du royaume plutôt que sur la garde de la capitale, expliquant l'absence de tout lien entre eux. Il me semble clair que la meilleure voie à suivre est de poursuivre mon enquête. Après tout, toute chance de révéler ce complot vaut mieux qu'aucune."
  ray_story.0412.true_fail: "Peu importe avec quelle acharnement moi et mes agents avons inspecté mes forces, nous avons totalement échoué à trouver un quelconque lien entre elles et un complot. Si le maître des ombres s'est déjà trouvé des alliés parmi mes hommes, il m'est désormais quasi impossible de jamais le découvrir, tandis que tout lien futur sera établi avec bien plus de précaution à la suite de mes enquêtes.\n\nMa position semble désormais moins sûre que jamais, et l'avenir de [ray|e] incertain. La capitale est désormais sans défense face aux machinations du complot. Tout ce dont le maître des ombres aurait besoin pour me renverser maintenant, ce sont les bons alliés et un peu de chance..."
  ray_story.0412.a: "Le complot a sûrement infiltré la flotte !"
  ray_story.0412.b: "Le complot a sûrement infiltré la garde de la capitale !"
  ray_story.0412.c: "Que pouvons-nous faire maintenant ?"
  vatalinar_army_fail_completion: "#N Vous n'avez pas réussi à trouver de preuve ou d'information décisive sur le complot durant votre enquête sur vos forces militaires.#!"
  vatalinar_navy_choice: "Vous pourrez décider comment mener l'enquête sur la flotte."
  vatalinar_guard_choice: "Vous pourrez décider comment mener l'enquête sur la garde de la cité de [GetTitleByKey('c_bozisha_dar').GetNameNoTier]."


  ray_story.0413.t: "Dernière Chance de Renoncer"
  ray_story.0413.desc: "L'heure est venue. Quelles que soient les conséquences, quelles que soient les répercussions, je #italic trouverai#! le maître des ombres ! Trop longtemps ai-je été contraint de trembler devant mes propres sujets, craignant que l'un d'eux ne mène un complot assez puissant pour usurper mon règne. Pourtant, mon maître-espion [spymaster.GetTitledFirstName] semble plus qu'inquiet à ce sujet. En effet, [CharYouSheHe(spymaster)] insiste pour que nous soyons prudents dans l'enquête à venir, afin de ne pas provoquer une rébellion générale contre mon règne.\n\nPour la plupart dans le royaume, une annonce de l'existence d'un quelconque grand complot contre moi sans la moindre preuve ressemblerait assurément à la tentative d'un Kralyi paranoïaque de justifier une tyrannie mesquine. Je pourrais fort bien perdre le contrôle de la situation, ouvrant la porte au coup d'État exact du maître des ombres que j'essaie de prévenir..."
  ray_story.0413.a: "Ils #italic plieront#! devant ma volonté !"
  ray_story.0413.b: "Je devrais être prudent à ce sujet..."
  ray_story.0413.c: "C'est une solution bien trop radicale..."
  vatalinar_lords_tyrant_investigation: "#N Cette voie pourrait fort bien se solder par un désastre complet, il serait sage de la garder en dernier recours.#!"
  vatalinar_lords_sneaky_investigation: "#N Vos chances de révéler le maître des ombres par la simple intrigue sont #italic faibles#!.#!"
  vatalinar_lords_go_back_to_choices: "Vous pourrez choisir une autre cible pour votre enquête."
  
  ray_story.0414.t: "Jeter les Dés"
  ray_story.0414.desc: "Mon plan est enfin prêt. J'ordonnerai à mes agents d'arrêter, d'interroger et d'enquêter sur chacun de mes vassaux jusqu'à ce que je trouve le maître des ombres. Je ne me cacherai plus, attendant une chance de révéler le complot par la voie des ombres ! Je suis Kralyi, mon règne et mon autorité sont absolus. Quiconque osera résister à mon enquête sera marqué comme le traître qu'il est et sera anéanti aux côtés du maudit complot.\n\nAujourd'hui, le maître des ombres tombe. Après cette démonstration de pouvoir, nul n'osera plus jamais se dresser contre moi. Qu'ils me traitent de fou dans mon dos s'ils le souhaitent — ils seront bien trop effrayés pour risquer leur position dans une tentative vouée à l'échec de me renverser. Aujourd'hui est le jour où ma lutte prend fin, le jour où le royaume est libéré de la menace des ombres !"
  ray_story.0414.a: "Je suis le #italic Kralyi#! et nul ne peut me défier !"
  ray_story.0414.b: "Non... non. Cette folie prend fin maintenant..."
  vatalinar_lords_last_warning: "#N Si vous échouez à révéler le maître des ombres maintenant, le chaos laissera la porte ouverte pour qu'il s'empare du royaume par un coup d'État. #italic Si vous échouez ici, vous mourrez très probablement !#!"
  ray_story_lords.success: "#P Vous découvrez qui parmi les seigneurs est le maître des ombres.#!"
  ray_story_lords.fail: "#N Vous échouez à découvrir qui parmi les seigneurs est le maître des ombres.#!"


  ray_story.0415.t: "Jeter et Mourir"
  ray_story.0415.desc: "Le jour s'achève, et j'ai perdu mon pari. Peu importe mes efforts, peu importe mon acharnement, j'ai échoué à trouver la moindre preuve de l'existence du complot. Le chaos engloutit désormais le royaume tandis que mes sujets crient leur indignation face à ma prétendue tyrannie. Il semble n'y avoir aucun moyen de les raisonner, les feux de la révolution semblant toujours plus proches.\n\nPourtant, ce ne sont pas mes vassaux enragés qui m'inquiètent le plus, mais le complot. Le royaume a sombré dans un chaos total, le peu de partisans qui me restaient dispersés et se croyant trahis. Aux yeux du royaume, je suis un roi fou. Je le sens, au plus profond de moi — bientôt le maître des ombres frappera contre moi, et il ne restera plus personne pour me défendre. Tandis que mon règne s'effondre sous mes yeux, tout ce que je puis faire est d'adresser une dernière prière à Vâtra et espérer qu'un miracle survienne..."
  ray_story.0415.a: "Pourquoi gâcher mes dernières années par la folie, ô Vâtra ?"


  ray_story.0416.t: "Le Pari de l'Ombre"
  ray_story.0416.desc: "Bien qu'une part de moi en souffre, je dois reprendre mes esprits. [spymaster.GetTitledFirstName] a raison. Ce serait folie de tout risquer pour une simple chance d'en finir avec le complot maintenant. Plutôt que de m'engager dans quelque plan insensé digne des plus grands tyrans, je ferai enquêter sur mes seigneurs par des moyens plus conventionnels.\n\nBien que les espions et agents locaux ne soient guère grandioses, ils sont souvent plus efficaces et comportent peu de risques, surtout pour quelqu'un de mon rang. Assez tôt, j'espère que le chef du complot qui hante ma vie sera révélé devant le monde. Le maître des ombres, celui qui m'obsède depuis si longtemps, connaîtra ma haine des traîtres un jour, même si ce n'est pas aujourd'hui."
  ray_story.0416.a: "Faites passer le mot à mes agents."
  ray_story.0416.b: "Ce n'est pas le moment pour cela..."


  ray_story.0417.t: "Seigneur Parmi les Ombres"
  ray_story.0417.desc: "Il semble que, malgré les meilleurs efforts de mes loyalistes, le maître des ombres demeure hors de notre portée. Quelle que soit l'ardeur de leurs recherches, ils n'ont pas réussi à trouver de preuves qu'un quelconque seigneur du royaume nourrisse des ambitions ou des plans de trahison. Si beaucoup considéreraient cela comme rassurant, c'est de mauvais augure pour moi car le complot se cache assurément encore parmi nos rangs.\n\nJe ne puis dire que je ne commence pas à douter de l'existence même de ce complot, ou s'il ne s'agit que d'un rêve insensé de mon esprit vieillissant. Assurément, nous aurions trouvé quelque chose, n'importe quoi, à ce stade s'il y avait quelque chose à trouver. Ces pensées sont dangereuses, cependant. Si le maître des ombres est un aussi grand intrigant que je le crains, il pourrait bien être capable de se dissimuler mieux que je ne pourrais jamais l'imaginer..."
  ray_story.0417.a: "Je ne puis m'arrêter maintenant !"


  ray_story.0418.t: "Le Soleil Fou"
  ray_story.0418.desc: "[ray_king.GetTitledFirstName], clairement rongé par une paranoïa sans cesse croissante, a plongé le royaume dans un chaos total. En effet, [CharYourHerHis(ray_king)] tentative de découvrir quelque « complot » contre [CharYourHerHis(ray_king)] en faisant retenir en otages les seigneurs du royaume par [CharYourHerHis(ray_king)] agents ne s'est #italic pas bien passée#!. Si c'était le cas, je ne serais plus au pouvoir à l'heure qu'il est, n'est-ce pas ?\n\nCe chaos m'offre une grande opportunité pour moi et mes plans. En effet, rares sont ceux qui soutiendraient un roi fou ou offriraient grande résistance à [CharYourHerHis(ray_king)] chute. Plus que jamais, les portes de la capitale, de [ray|e], s'ouvrent devant moi. Tout ce que je dois faire maintenant est de tendre la main et d'abattre sur le royaume le courroux de Khäz-gramaze."
  ray_story.0418.a: "Je frapperai maintenant, tandis que [ray_king.GetTitledFirstName] est à terre."
  ray_story.0418.b: "Il est encore bien trop tôt pour frapper..."
  mardat_chaos_coup_chance: "Grâce au chaos qui s'est emparé du royaume, vos chances de succès pour votre coup d'État sont de #P [GetPlayer.MakeScope.ScriptValue('lotr_mardat_coup_odds_of_success')]%.#!"


  ray_story.0419.t: "Lutte du Serpent et du Soleil"
  ray_story.0419.desc: "Avec le téméraire [ray_king.GetTitledFirstName] ayant découvert mon complot pour le renverser, je savais que ce jour viendrait tôt ou tard. Par une déclaration audacieuse, [ray_king.GetTitledFirstName] a officiellement déclaré son intention de me démettre du pouvoir par la force, quel qu'en soit le prix.\n\nJe suis, bien sûr, plus que prêt à l'affronter au combat et c'est l'occasion parfaite pour moi de revendiquer la totalité de [ray|e] pour moi-même. Avec Khäz-gramaze à mes côtés, je me sais invincible. Assez tôt, les [GetFaithByKey('faith_vatra').GetAdherentNamePlural]s seront enfin renversés et le royaume sera libéré de leur pourriture et de leur faiblesse !"
  ray_story.0419.a: "Assez tôt, [ray_king.GetTitledFirstName] sera à ma merci..."


  ray_story.0420.t: "Lutte du Soleil et du Serpent"
  ray_story.0420.desc: "Le jour est venu pour les grandes forces des Kanivâtra de mettre enfin un terme aux vils complots et machinations du maudit [mardat.GetTitledFirstName]. Trop longtemps ai-je fermé les yeux sur sa folie et sa cruauté, le laissant comploter ma chute depuis les ombres. Plus jamais ! Mes armées sont prêtes et bientôt je porterai cette guerre jusqu'en [GetTitleByKey('d_suza_riy').GetNameNoTier] même.\n\nPourtant, je m'inquiète encore. [mardat.GetTitledFirstName] est peut-être faible seul, mais il a eu des années pour se préparer exactement à cette situation. Bien que cela ne restera pas longtemps un mystère, cette guerre pourrait être bien plus difficile que beaucoup parmi mes loyalistes ne le soupçonnent..."
  ray_story.0420.a: "J'apporterai la justice à [mardat.GetTitledFirstName], quelle que soit la dureté de la lutte !"


  ### Kanivâtra Exiles ###


  ray_story.0401.t: "Le Crépuscule Tombe"
  ray_story.0401.desc: "Quand [GetTitleByKey('c_bozisha_dar').GetNameNoTier] est tombée aux mains de [mardat.GetTitledFirstName], j'ai fui. J'ai fui pour mon héritage, pour ma famille, pour mon droit de naissance — c'est ce que je me répète. En vérité, j'ai fui pour sauver ma vie. La capitale, ma capitale, gît désormais entre les mains des Khäz-gramaze et je suis impuissant à la reprendre. Moi qui étais le prince le plus riche du [harad|e] il y a un jour à peine, je me retrouve fugitif échoué dans les terres sauvages, ne possédant plus que les quelques joyaux que j'ai pu rassembler, ma famille et mes gardes les plus loyaux.\n\nPourtant, tant que je respire encore, je n'abandonnerai point ma quête. Je vengerai mon père, je reprendrai [ray|e] et le libérerai de la tyrannie Khäz-gramaze ! Je ne suis pas le dernier des Kanivâtra, le dernier rejeton de la lignée élue de Vâtra. Je serai la seconde aube et je ne connaîtrai point de repos jusqu'à ce que [mardat.GetTitledFirstName] soit traîné devant moi et mis à mort sur ces mêmes terrains d'exécution où il a torturé mon père jusqu'à la mort !"
  ray_story.0401.a: "Un jour, les Khäz-gramaze pleureront à l'évocation de mon nom !"
  ray_story.0401.b: "Je reprends tout ce qui m'appartient !"


  ray_story.0421.t: "Droit de Naissance du Soleil"
  ray_story.0421.desc: "Bien que quelques jours seulement se soient écoulés depuis la fin du règne Kanivâtra sur [ray|e], mon esprit commence à se détourner du deuil de notre chute pour se tourner vers l'avenir de ma maison. Tant que nous demeurerons en [GetTitleByKey('k_ray').GetNameNoTier], nous ne serons guère plus que des fugitifs, fuyant le règne cruel des nouveaux suzerains Khäz-gramaze du royaume. Il serait peut-être sage de fuir, vers l'ouest ou l'est, et de laisser les terres des Kanivâtra derrière nous jusqu'à ce que j'aie bâti la puissance nécessaire pour orchestrer une glorieuse reconquête.\n\nPourtant, malgré les risques que cela comporte, il existe aussi un avenir pour nous au sein de [GetTitleByKey('k_ray').GetNameNoTier]. Déjà, [mardat.GetTitledFirstName] s'est révélé un tyran sanguinaire et impitoyable, répandant sa foi à un coût terrible pour ses nouveaux sujets. En ces temps de chaos, assurément les puissances [GetFaithByKey('faith_vatra').GetAdherentNamePlural] restantes du royaume se rallieraient derrière leur légitime Kralyi. Parmi elles, la plus puissante est de loin [reactionary.GetTitledFirstName], qui pourrait se révéler [CharYouHerHim(reactionary)]self un allié précieux."
  ray_story.0421.a: "Je refuse de me résigner à l'exil et à la misère !"
  ray_story.0421.b: "Nous partirons et survivrons, quel qu'en soit le prix..."
  ray_exile_continue_quest: "Vous vous rendrez dans le royaume de [reactionary.GetTitledFirstName], cherchant à vous allier pour renverser [mardat.GetTitledFirstName]."


  ray_story.0422.t: "Le Soleil Couché"
  ray_story.0422.desc: "Bien que la route fût rude et ses épreuves nombreuses, j'ai atteint la capitale de [reactionary.GetTitledFirstName] sans qu'aucun des hommes de [mardat.GetTitledFirstName] ne me rattrape. Pourtant, quand je me regarde, je ne vois point un roi mais un mendiant. Moi et les miens, réduits à des silhouettes maigres et épuisées, ne portant guère plus que des haillons. Il m'a fallu tout mon talent et mon charisme, ainsi que ma connaissance approfondie des intrigues de cour, ne serait-ce que pour obtenir une audience avec [reactionary.GetTitledFirstName].\n\nQuand [reactionary.GetTitledFirstName] m'a vu, cependant, j'ai su qu'[CharYouSheHe(reactionary)] m'avait reconnu. Je l'ai vu [CharYouHerHim(reactionary)] me regarder, pitié, avidité et ambition dans [CharYourHerHis(reactionary)] yeux. Tandis que j'attends [CharYourHerHis(reactionary)] réponse, je ne puis que prier Vâtra que ma vie n'ait pas été épargnée par l'ambition de l'un pour succomber à celle d'un autre..."
  ray_story.0422.a: "Beaucoup sera décidé aujourd'hui..."


  ray_story.0423.t: "Le Roi des Exilés"
  ray_story.0423.desc: "Quand on m'a dit qu'un mendiant prétendait être l'héritier perdu des Kanivâtra, j'ai, bien sûr, chassé le messager de la pièce en riant. Pourtant, message après message et révélation étrange après révélation étrange, j'ai commencé à douter que ce [exile.GetWomanMan] sauvage puisse véritablement être celui qu'il prétendait être.\n\nQuand je l'ai vu [CharYouHerHim(exile)], cependant, j'ai immédiatement reconnu [exile.GetTitledFirstName] pour ce qu'[CharYouSheHe(exile)] était. L'opportunité qui s'offre à moi ne m'échappe point. En effet, si je devais officiellement me déclarer protecteur du légitime Kralyi, ma position au sein de la résistance [GetFaithByKey('faith_vatra').GetAdherentNamePlural] ne manquerait pas de grandement s'accroître. Je n'aurais qu'à céder quelque propriété mineure aux exilés pour les maintenir en place et sous surveillance, servant de parfaits pantins pour légitimer mon pouvoir sur l'ensemble de [ray|e]. Pourtant, [exile.GetTitledFirstName] pourrait aussi représenter un grand danger pour ma position et mon pouvoir futur. En effet, avec les Kanivâtra encore en vie, ils seraient toujours une épine dans mon flanc si je venais à régner sur un [GetTitleByKey('k_ray').GetNameNoTier] libéré. Il serait si facile d'éliminer la menace maintenant..."
  ray_story.0423.a: "Je suis à jamais votre loyal #italic serviteur#!, Kralyi."
  ray_story.0423.b: "Gardes ! Tuez ce paysan !"


  ray_story.0424.t: "Le Soleil Perdure"
  ray_story.0424.desc: "Dès que [reactionary.GetTitledFirstName] a commencé à parler, j'ai su que ma vie était épargnée, du moins pour l'instant. « Ah, Kralyi [root_scope.GetFirstName] ! Je suis stupéfait de vous voir encore en vie, mon cher. Avec la capitale en ruines et l'ancien Kralyi renversé, j'avais cru les jours des Kanivâtra révolus. Quelle joie d'avoir tort ! »\n\nSes paroles sont aimables, pourtant je sais ce qui va suivre. « Je suis certain que vous êtes épuisé, mon suzerain, » poursuit [reactionary.GetTitledFirstName]. « Je possède un domaine à la campagne où vous et votre famille pourriez vous retirer. C'est paisible et loin des tourments de la guerre. Un endroit parfait pour demeurer jusqu'à ce que le chaos qui s'est emparé de la capitale se dissipe. » L'offre de [reactionary.GetTitledFirstName] est celle d'une cage dorée, enchaîné et impuissant. Pourtant, que puis-je espérer d'autre en de telles circonstances ? Si je dois avoir une chance de reprendre [ray|e] un jour, je dois commencer quelque part. Un pantin, exhibé pour la gloire et le prestige, conserve plus d'influence qu'un hors-la-loi loin des cours et du pouvoir, après tout."
  ray_story.0424.a: "La fortune pourrait encore nous sourire..."


  ray_story.0425.t: "L'Exil N'est Plus"
  ray_story.0425.desc: "Après un mois passé dans la prison dorée de [reactionary.GetTitledFirstName], je me trouve enfin en position d'agir librement à nouveau. Aujourd'hui, je dois prononcer un discours galvanisant devant le peuple de [GetTitleByKey('c_ramadi').GetNameNoTier] ainsi que les forces armées du royaume. Bien que je sois censé parler de mon soutien éternel à [reactionary.GetTitledFirstName] comme mon régent au nom des Kanivâtra et de sa grande générosité à nous accueillir, cela pourrait fort bien être l'occasion parfaite de me libérer de mes chaînes dorées.\n\nEn effet, en tant que légitime Kralyi, avec des siècles d'héritage derrière moi, mes paroles portent grand poids. Si au lieu de louer [reactionary.GetTitledFirstName], je [CharYouHerHim(reactionary)] déclarais publiquement et ouvertement illégitime, je pourrais utiliser le chaos résultant pour m'emparer du pouvoir. Pourtant, une telle manœuvre comporte de grands risques. Si je venais à échouer, je serais assurément surveillé de bien plus près et le peu de liberté qui me reste serait certainement révoqué..."
  ray_story.0425.a: "Soldats de [GetTitleByKey('d_riyeshara').GetNameNoTier], écoutez mes paroles !"
  ray_exiles_military_speech: "Vous tentez de convaincre les armées de [reactionary.GetTitledFirstName] de vous porter au pouvoir."
  ray_exiles_speech.success: "#P Vous parvenez à émerger au sommet du chaos.#!"
  ray_exiles_speech.fail: "#N Vos paroles sont impuissantes face à [reactionary.GetTitledFirstName].#!"
  ray_story.0425.b: "Que tous les [GetFaithByKey('faith_vatra').GetAdherentNamePlural]s m'écoutent !"
  ray_exiles_popular_speech: "Vous tentez de convaincre le petit peuple de vous porter au pouvoir."
  ray_story.0425.c: "Il serait insensé de tout risquer maintenant..."
  ray_exiles_back_down: "Vous ne saisissez pas cette opportunité de vous emparer du pouvoir."


  ray_story.0426.t: "L'Aube Vengeresse"
  ray_story.0426.desc: "Contre toute attente, je suis de nouveau en ascension. [reactionary.GetTitledFirstName], qui avait espéré faire de moi rien de plus qu'un pion dans [CharYourHerHis(reactionary)] jeu de pouvoir, a désormais subi le courroux et la rétribution des Kanivâtra. Plus jamais je ne m'agenouillerai comme un mendiant ! Plus jamais je ne serai un simple pantin ou un exilé impuissant !\n\nDéjà, la nouvelle de la réapparition de l'héritier légitime des Kanivâtra s'est répandue à travers tout [ray|e]. De grandes armées rebelles se rassemblent dans mon nouveau domaine de [GetTitleByKey('d_riyeshara').GetNameNoTier] tandis que presque tous les membres de la résistance [GetFaithByKey('faith_vatra').GetAdherentNamePlural] me reconnaissent comme leur chef légitime.\n\nBientôt, l'heure de ma vengeance viendra. [mardat.GetTitledFirstName], le serpent usurpateur assez arrogant pour rêver de terrasser le soleil de Vâtra, tombera, et la vengeance sera mienne ! Que tous se souviennent de ce jour comme celui de mon avènement, comme le jour où les Kanivâtra sont revenus de leur doom certain, comme le jour où, pour la première fois, [mardat.GetTitledFirstName] a su que sa fin était proche !"
  ray_story.0426.a: "Jamais Vâtra ne nous a abandonnés !"
  ray_exiles_free_rebel_consolidate: "#P En tant qu'héritier des Kanivâtra, votre position de chef de la résistance [GetFaithByKey('faith_vatra').GetAdherentNamePlural] est incontestée et incontestable. En conséquence, vous recevez gratuitement les avantages de la consolidation du mouvement rebelle sous votre autorité.#!"


  ray_story.0427.t: "À l'Ombre du Soleil"
  ray_story.0427.desc: "Tandis que tout s'effondre autour de moi, je peine à croire ce que je vois. Mes hommes et mon peuple loyal sont dans les rues, outrés et exigeant ma destitution. Il semble que, dans ma tentative d'asseoir ma légitimité, j'aie sous-estimé [kanivatra.GetTitledFirstName]. En effet, ayant perdu tout semblant de contrôle sur mon royaume, [kanivatra.GetTitledFirstName] a pu usurper mon rôle de Rîwa de [GetTitleByKey('d_riyeshara').GetNameNoTier].\n\nTandis que ma vie et mes ambitions s'effondrent sous mes yeux, je me vois contraint de me replier aux confins de mon royaume, dépossédé du siège ancestral que moi et mes ancêtres avons longtemps tenu. Je ne puis m'empêcher de regretter de ne pas avoir tué [kanivatra.GetTitledFirstName] quand j'en avais encore la chance. Si j'avais su ce qui adviendrait, je n'aurais pas été si clément envers les Kanivâtra déchus..."
  ray_story.0427.a: "J'ai volé trop près du soleil..."


  ray_story.0428.t: "Le Soleil Traître"
  ray_story.0428.desc: "Dans une manifestation flagrante de trahison ingrate, [kanivatra.GetTitledFirstName] a tenté ce qu'on ne peut décrire que comme un coup d'État contre mon règne. En effet, lors de ce qui devait être un simple discours où [CharYouSheHe(kanivatra)] se présenterait [CharYouHerHim(kanivatra)]self devant mes sujets, [kanivatra.GetTitledFirstName] a au contraire tenté d'exciter une foule en colère et de me faire déposer !\n\nUn tel comportement est non seulement inacceptable mais montre à quel point [kanivatra.GetTitledFirstName] se soucie peu de connaître [CharYourHerHis(kanivatra)] place et de jouer [CharYourHerHis(kanivatra)] rôle de pantin loyal. Face à une telle résistance, je n'ai d'autre choix que de placer cet arrogant imbécile en résidence surveillée permanente. Pour [CharYourHerHis(kanivatra)] #italic sécurité#!, bien sûr..."
  ray_story.0428.a: "Maintenant, revenons à des affaires plus pressantes..."


  ray_story.0429.t: "Second Crépuscule"
  ray_story.0429.desc: "Aussi grandes que fussent mes paroles, il semble que [GetTitleByKey('d_riyeshara').GetNameNoTier] était bien plus loyal à [reactionary.GetTitledFirstName] que je ne l'aurais imaginé. Le peu de partisans que j'avais rassemblés furent rapidement défaits par la garde de la cité tandis que moi-même fus emmené dans une cellule pour ma #italic sécurité#!.\n\nJe suis désormais entouré de gardes, impuissant à agir de quelque manière que ce soit pour reprendre mon droit de naissance, réduit au pantin que [reactionary.GetTitledFirstName] avait voulu faire de moi. Tandis que je suis escorté vers mon domaine sous claire menace de représailles, je n'ai d'autre choix que d'abandonner ma quête. Les jours des Kanivâtra sont révolus et, quoi qu'il advienne de [ray|e], nous ne règnerons plus jamais sur lui..."
  ray_story.0429.a: "Le soleil se couche désormais, pour ne plus jamais se lever..."


  ray_story.0430.t: "Courroux du Soleil"
  ray_story.0430.desc: "D'une manière ou d'une autre, [reactionary.GetTitledFirstName], présumé mort et héritier du vil ordre ancien Kanivâtra de [ray|e], a non seulement réussi à échapper à mes forces mais aussi à se hisser au pouvoir sur la puissante terre [GetFaithByKey('faith_vatra').GetAdherentNamePlural] de [GetTitleByKey('d_riyeshara').GetNameNoTier]. Déjà, de grandes armées rebelles ont commencé à se rassembler sous la direction du soi-disant souverain légitime de [GetTitleByKey('k_ray').GetNameNoTier].\n\nDésormais, avec un chef voué à exercer une vengeance jurée contre moi à tout prix, la résistance [GetFaithByKey('faith_vatra').GetAdherentNamePlural] est plus féroce que jamais. Bien qu'elle demeure faible et rongée par la décadence, la corruption et l'avidité, cette racaille représente une menace potentiellement dangereuse pour la capitale de par sa position. Le temps venu, Khäz-gramaze m'accordera assurément la victoire, pourtant la lutte sera bien plus rude que je ne l'avais d'abord imaginé."
  ray_story.0430.a: "Il semble que je ne manquerai jamais d'hommes à tuer..."