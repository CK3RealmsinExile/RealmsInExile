  ray_story.0127.a: "J'accepte, et tous connaîtront votre très généreuse offre !"
  ray_story.0127.a.effects: "À la prise de pouvoir de Mardat sur le [GetTitleByKey('k_ray').GetNameNoTier], il vous paiera 1000 pièces d'or en échange de votre soutien. De plus, Mardat recevra plusieurs milliers de soldats spéciaux."
