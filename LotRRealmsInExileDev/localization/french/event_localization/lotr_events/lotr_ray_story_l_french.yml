  ray_story.0128.t: "Le Prix d'une Armée"
  ray_story.0128.desc: "Ayant décidé de payer les services des Nâfarati par un soutien militaire, je dois maintenant décider ce que je leur offrirai. Offrir trop peu de soutien réduirait leur motivation à combattre pour moi et diminuerait grandement mes chances d'obtenir un soutien généralisé parmi les Nâfarati. Pourtant, offrir trop déstabiliserait ma position après mon inévitable ascension car cela disperserait mes forces."
  ray_story.0128.a: "Je les aiderai à vaincre quelques tribus mineures."
  ray_story.0128.a.effects: "Vous offrez d'aider Delritha à conquérir le duché du [GetTitleByKey('d_silvesa').GetNameNoTier] à votre prise de pouvoir sur le [GetTitleByKey('k_ray').GetNameNoTier]. Cela a des chances raisonnables de réussir mais ne conduira pas à un soutien généralisé des Nâfarati."
  ray_story.0128.b: "J'offre à Delritha l'intégralité du [GetTitleByKey('k_chennacatt').GetNameNoTier] !"
  ray_story.0128.b.effects: "Vous offrez d'aider Delritha à conquérir l'intégralité du royaume du [GetTitleByKey('k_chennacatt').GetNameNoTier] à votre prise de pouvoir sur le [GetTitleByKey('k_ray').GetNameNoTier]. Cela vous gagnera presque certainement une alliance avec le chef et pourrait apporter un soutien plus large."
  ray_story.0128.c: "Tout cela est bien trop risqué..."
  ray_story.0128.c.effects: "Vous choisirez une autre manière de conclure une alliance avec les Nâfarati."
  nafarati_troops_mardat: "Ost de Guerre Nâfarati"
  ray_story.0128.a.success: "#P Vous convainquez les Nâfarati de soutenir votre cause. #!"
  ray_story.0128.a.fail: "#N Vous échouez à convaincre les Nâfarati de soutenir votre cause. #!"
