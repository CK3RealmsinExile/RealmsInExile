l_french:

 ### LotR artefact Events ###

 ### Morgul knife self-destruct event
 
 lotr_artifact.0001.t: "Une lame mystérieuse"
 lotr_artifact.0001.desc: "Je viens de saisir une dague de facture inconnue, et un sentiment de terreur glaciale m'envahit à son contact. Elle est longue et cruelle, sa lame sombre et terne couverte de runes maléfiques. Comme je l'élève vers la lumière pour mieux l'examiner, la lame se vaporise soudain en une volute de fumée nauséabonde, comme si ses ténèbres avaient été consumées par la lumière d'Anor."
 lotr_artifact.0001.a: "Je suis soulagé d'être débarrassé d'une arme si maudite."
 
 ### Elven artifact burns evil characters
 
 lotr_artifact.0002.t: "L'œuvre des Elfes"
 lotr_artifact.0002.desc: "Cet artefact que je viens d'acquérir est indubitablement l'œuvre de cette race maudite et perfide, les Elfes. Je ne puis nier qu'il possède une certaine beauté, et je ne puis m'empêcher de le prendre en main pour admirer ma nouvelle possession."
 lotr_artifact.0002.a: "Cela brûle ! Cette chose maudite m'a brûlé !"
 
 ### Plundering Thorin's tomb ?
 
 lotr_artifact.0030.t: "Pilleur de tombes — Erebor"
 lotr_artifact.0030.desc.dwarf: "Depuis longtemps [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstName], fils de [GetScriptedCharacterByHistoryID( 'lineofdurin82' ).GetFirstName], fils de [GetScriptedCharacterByHistoryID( 'lineofdurin81' ).GetFirstName], Roi sous la Montagne, repose dans son tombeau de pierre, serrant contre sa poitrine le plus grand trésor d'[erebor|E], l'[arkenstone|E]. À sa ceinture pend la légendaire épée [Glossary('Orcrist','orcrist_gloss')], forgée à [gondolin|E] aux Âges révolus.\n\nMon désir de m'emparer de ces artefacts et de les mettre au service de mon peuple est grand, mais je serais tenu pour sacrilège par tous les Nains."
 lotr_artifact.0030.desc.orc: "Enfin nous avons châtié les hideux [dwarves|E] et pendu leurs têtes tranchées par la barbe à nos étendards. Dans les profondeurs gît la dépouille de [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstNameRegnal], celui qu'ils appelaient « Lécudechesne ». La brillante [arkenstone|E] et la détestée Mordeuse sont enterrées avec lui. Les Nains me haïront de les prendre, mais ne me haïssent-ils point déjà ?"
 lotr_artifact.0030.desc: "Au plus profond d'[erebor|E], dans le tombeau de pierre de [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstNameNicknamedRegnal], serrant contre sa poitrine le plus grand trésor de la montagne, l'[arkenstone|E]. À sa ceinture pend la légendaire épée [Glossary('Orcrist','orcrist_gloss')], forgée à [gondolin|E] aux Âges révolus.\n\nLes [dwarves|E] me haïraient de piller ces reliques, mais elles me seraient fort utiles."
 lotr_artifact.0030.a: "Trop de tracas, je les laisse où ils sont."
 lotr_artifact.0030.b.dwarf: "Malgré ce que pensent mes frères, ces reliques sont plus utiles aux vivants."
 lotr_artifact.0030.b: "Elles valent bien quelque rancune."
 lotr_artifact.0030.c.orc: "L'Arkenstone est à moi ! La Mordeuse, il faudra s'en débarrasser."
 lotr_artifact.0030.c: "Que m'importe l'avis des Nains ? Qui trouve garde !"
 
 ### Returning Thorin's artifacts
 
 lotr_artifact.0031.t: "Ceci appartient aux morts"
 lotr_artifact.0031.desc.intro: "J'ai en ma possession "
 lotr_artifact.0031.desc.orcrist: "la légendaire lame gondolindrine [Glossary('Orcrist','orcrist_gloss')]"
 lotr_artifact.0031.desc.arkenstone: "l'[arkenstone|E] d'[erebor|E]"
 lotr_artifact.0031.desc.both: "$lotr_artifact.0031.desc.orcrist$ ainsi que $lotr_artifact.0031.desc.arkenstone$"
 lotr_artifact.0031.desc.dwarf: ", pillées dans le tombeau de [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstNameNicknamed], au plus profond de la [lonelymountain|E]. Cet affront au peuple nain fut terrible et n'a jamais été oublié. Le tombeau doit être restauré !"
 lotr_artifact.0031.desc: ", pillées dans le tombeau de [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstNameNicknamed], au plus profond de la [lonelymountain|E]. Les [dwarves|E] pleurent encore ce jour et souhaitent que le tombeau soit restauré et rendu au repos."
 lotr_artifact.0031.desc.not_erebor: "Si je restituais ces trésors perdus à leur légitime gardien, nul doute qu'il m'en serait très reconnaissant."
 lotr_artifact.0031.desc.erebor: "Si je restituais ces trésors perdus au tombeau, mes sujets se réjouiraient."
 lotr_artifact.0031.a: "C'est vrai, cependant je les préfère à ma Cour."
 lotr_artifact.0031.b.dwarf: "Je les restituerai, afin que Thorin puisse reposer en paix."
 lotr_artifact.0031.b: "Je les restituerai aux Nains."
 lotr_artifact.0031.c: "Le tombeau de Thorin sera restauré dans toute sa gloire."

 ### Searching for Thorin's artifacts
 
 lotr_artifact.0032.t: "Fouiller chaque recoin"
 lotr_artifact.0032.desc.intro: "Mon peuple est en colère : depuis l'infâme pillage du tombeau sacré de [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstNameNicknamed], nous n'avons toujours pas recouvré"
 lotr_artifact.0032.desc.orcrist: "la légendaire lame gondolindrine [Glossary('Orcrist','orcrist_gloss')]"
 lotr_artifact.0032.desc.arkenstone: "l'[arkenstone|E] d'[erebor|E]"
 lotr_artifact.0032.desc.both: "ni $lotr_artifact.0031.desc.orcrist$ ni $lotr_artifact.0031.desc.arkenstone$"
 lotr_artifact.0032.desc.outro: ".\n\nJ'ai convoqué mon conseil pour organiser une expédition de recherche. Je devrais envoyer mes espions sur-le-champ, bien sûr. Mais pour plus d'efficacité, ils devraient sans doute être accompagnés d'ambassadeurs. Et des gardes ne devraient-ils pas les escorter également ?"
 lotr_artifact.0032.a: "Envoyez les espions seuls, j'ai confiance en leur habileté."
 lotr_artifact.0032.a.tt: "Vous aurez une faible chance de retrouver les artefacts s'ils sont perdus, et une chance correcte de trouver leur détenteur, s'il existe."
 lotr_artifact.0032.b: "Mes diplomates leur ouvriront des portes."
 lotr_artifact.0032.b.tt: "Vous aurez une chance correcte de retrouver les artefacts s'ils sont perdus, et trouverez leur détenteur avec certitude, s'il existe."
 lotr_artifact.0032.c: "Ne m'avez-vous pas entendu ? J'ai dit #b tout le monde#! !"
 lotr_artifact.0032.c.tt: "Vous aurez une très bonne chance de retrouver les artefacts s'ils sont perdus, et trouverez leur détenteur avec certitude, s'il existe."
 lotr_artifact.0032.d: "Peut-être n'avons-nous pas tant besoin de ces artefacts, après tout."

 ### Spymaster returns from searching for Thorin's artifacts

 lotr_artifact.0033.t: "Rapport de l'expédition"
 lotr_artifact.0033.desc.intro: "Mon maître-espion [spymaster.GetTitledFirstName] pénètre dans ma salle du trône,"
 lotr_artifact.0033.intro.artifact: "un large sourire aux lèvres. [ROOT.Char.Custom('FormOfAddressForLiege')|U], d'excellentes nouvelles !\n\n"
 lotr_artifact.0033.intro.owner: "un sourire satisfait aux lèvres. [ROOT.Char.Custom('FormOfAddressForLiege')|U], j'ai des nouvelles pour vous.\n\n"
 lotr_artifact.0032.desc.intro.failure: "le visage sombre. [ROOT.Char.Custom('FormOfAddressForLiege')|U], je crains que nous ne revenions les mains vides.\n\n"
 lotr_artifact.0033.orcrist.found: "Nos agents reviennent avec [Glossary('Orcrist','orcrist_gloss')], l'épée de [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstNameNicknamed] !"
 lotr_artifact.0033.orcrist.owner: "Nous avons découvert que [Glossary('Orcrist','orcrist_gloss')], l'épée de [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstNameNicknamed], est en possession de nul autre que [orcrist_owner.GetTitledFirstName] !"
 lotr_artifact.0033.orcrist.failure: "Nous n'avons trouvé aucune trace de [Glossary('Orcrist','orcrist_gloss')], l'épée de [GetScriptedCharacterByHistoryID( 'lineofdurin83' ).GetFirstNameNicknamed]."
 lotr_artifact.0033.arkenstone.found: "Nous avons recouvré l'[arkenstone|E] !"
 lotr_artifact.0033.arkenstone.owner: "Nous avons établi que [arkenstone_owner.GetTitledFirstName] détient actuellement l'[arkenstone|E] !"
 lotr_artifact.0033.arkenstone.failure: "Malgré tous nos efforts, nos espions n'ont pu localiser l'[arkenstone|E]."
 lotr_artifact.0033.a: "Voilà d'excellentes nouvelles !"
 lotr_artifact.0033.b: "Quelle déception."
 
 ### Aragorn receives Arnor's regalia
 
 lotr_artifact.0040.t: "Les insignes du royaume perdu d'Arnor"
 lotr_artifact.0040.desc.intro: "Des messagers arrivent à ma Cour."
 lotr_artifact.0040.desc.default: "Je reconnais aussitôt mes frères adoptifs, [GetScriptedCharacterByHistoryID( 'lineofelrond2' ).GetFirstName] et [GetScriptedCharacterByHistoryID( 'lineofelrond3' ).GetFirstName], et les accueille chaleureusement. Elladan sourit :\n\n« Félicitations, [ROOT.Char.GetFirstNameNoTooltip], pour avoir restauré votre royaume. Mon cœur se réjouit, et je viens porteur de présents de notre père : les insignes d'Arnor, conservés en sûreté à Imladris depuis la chute d'[arvedui|E]. Puissent-ils mieux vous servir que leur dernier propriétaire. »"
 lotr_artifact.0040.desc.alt: "En tant que messager de [elrond_substitute.GetTitledFirstName], j'accueille chaleureusement [messenger.GetTitledFirstName]. [messenger.GetFirstNameNoTooltip] sourit :\n\n« Félicitations, [ROOT.Char.GetFirstNameNoTooltip], pour avoir restauré votre royaume. Mon cœur se réjouit, et je viens porteur de présents de m[messenger.Custom2('FR_RelationToMe_OnA', SCOPE.sC('elrond_substitute'))] : les insignes d'Arnor, conservés en sûreté à Imladris depuis la chute d'[arvedui|E]. Puissent-ils mieux vous servir que leur dernier propriétaire. »"
 lotr_artifact.0040.desc.narsil: "\n\n« M[messenger.Custom2('FR_RelationToMe_OnA', SCOPE.sC('elrond_substitute'))] vous accorderait une autre faveur : si vous lui confiez les fragments de l'épée d'[GetScriptedCharacterByHistoryID( 'lineofelendil' ).GetFirstNameNicknamed], [elrond_substitute.Custom('FR_IlElle')] veillera à ce qu'elle soit reforgée. »"
 lotr_artifact.0040.a: "Mille mercis. Prenez-les, je vous prie."
 lotr_artifact.0040.b.narsil_kept: "Je préférerais garder les fragments auprès de moi, merci."
 lotr_artifact.0040.b: "Je vous suis profondément reconnaissant."
 
 ### Aragorn receives Anduril
 
 lotr_artifact.0041.t: "La Lame reforgée"
 lotr_artifact.0041.desc: "Enfin [messenger.GetFirstNameNoTooltip] revient, tenant une épée dans un fourreau serti de joyaux. Comme je la tire, elle brille telle une flamme dans la lumière du soleil couchant.\n\n« Je te rebaptise Andúril, Flamme de l'Ouest. Je pressens que nous verrons ensemble bien des batailles ! »"
 lotr_artifact.0041.desc.default_outro: "\n\nJe remercie chaleureusement les frères Semi-Elfes et les invite à la table royale."
 lotr_artifact.0041.desc.alt_outro: "\n\nJe [messenger.Custom('FR_LeLa')] remercie chaleureusement et l'invite à la table royale."
 lotr_artifact.0041.a: "La Lame n'est plus brisée."

 ### Elrond offers to reforge Anduril
 
 lotr_artifact.0042.t: "La Lame qui fut Brisée"
 lotr_artifact.0042.desc: "Des messagers arrivent à ma Cour. En tant qu'envoyé de [elrond_substitute.GetTitledFirstName], j'accueille chaleureusement [messenger.GetTitledFirstName]. [messenger.GetFirstNameNoTooltip] sourit :\n\n« Félicitations, [ROOT.Char.GetFirstNameNoTooltip], pour avoir restauré le royaume d'[elendil|E]. En ces temps sombres, alors que Sauron est de retour dans la Tour Sombre, nous nous unirons ou nous périrons. M[messenger.Custom2('FR_RelationToMe_OnA', SCOPE.sC('elrond_substitute'))] vous accorderait une faveur : si vous lui confiez les fragments de [narsil|E], [elrond_substitute.Custom('FR_IlElle')] veillera à ce qu'elle soit reforgée. »"
 
 ### Gold sickness
 
 lotr_artifact.0020.t: "De l'or à foison, par-delà le chagrin et le deuil"
 lotr_artifact.0020.desc: "Depuis que mon Anneau est en ma possession, ma richesse s'est considérablement accrue. Je me surprends à passer de plus en plus de temps dans mon trésor, perdu dans la contemplation des couleurs et des reflets changeants de l'or.\n\nIl m'apparaît qu'une chose si belle ne peut être que d'origine divine et qu'elle doit être protégée à tout prix de quiconque chercherait à la dérober."
 lotr_artifact.0020.a: "C'est mon or et personne ne me le prendra !"
 lotr_artifact.0020.b: "Non, je ne laisserai pas l'Anneau s'emparer de ma raison !"

 ### Finding Durin's artifacts
 lotr_artifact.0003.t: "Les reliques de l'Immortel"
 lotr_artifact.0003.desc_both: "Assis sur mon trône, je m'occupe des affaires courantes de tout souverain. Mais bientôt une agitation s'élève, et l'air lui-même semble différent.\n\nUn cor résonne dans les profondeurs — non pas un cor d'[orc|E] ou de [goblins|E], mais un cor [dwarven|E]. Revenant des ténèbres profondes de [GetTitleByKey('c_durins_hall').GetNameNoTier], un convoi de mineurs et de soldats que j'avais envoyés s'aventurer plus loin dans les vestiges de l'antique [khazaddum|E]. À leur tête, mon Maréchal, qui apporte avec révérence deux objets enveloppés de tissu noir. Le silence règne, l'attente est palpable.\n\nJ'écarte l'un des voiles et m'est révélé le Heaume de Durin d'antan, quasiment intact, bien qu'il soit tombé avec [GetScriptedCharacterByHistoryID('lineofdurinVI').GetFirstNameNicknamedRegnal] lorsqu'il passa dans l'ombre et les flammes. Je le pose fièrement sur ma tête, et il est léger comme une capuche. Puis j'ôte le second voile et là scintille la Hache de Durin, ouvragée et incrustée de [metal_mithril|E] étincelant, et je la prends en main et la brandie avec fierté. Les salles résonnent d'acclamations assourdissantes."
 lotr_artifact.0003.desc_axe: "Assis sur mon trône, je m'occupe des affaires courantes de tout souverain. Mais bientôt une agitation s'élève, et l'air lui-même semble différent.\n\nUn cor résonne dans les profondeurs — non pas un cor d'[orc|E] ou de [goblins|E], mais un cor [dwarven|E]. Revenant des ténèbres profondes de [GetTitleByKey('c_durins_hall').GetNameNoTier], un convoi de mineurs et de soldats que j'avais envoyés s'aventurer plus loin dans les vestiges de l'antique [khazaddum|E]. À leur tête, mon Maréchal, qui apporte avec révérence un objet enveloppé de tissu noir. Le silence règne, l'attente est palpable.\n\nJ'écarte le voile et là scintille la Hache de Durin, ouvragée et incrustée de [metal_mithril|E] étincelant, et je la prends en main et la brandie avec fierté. Les salles résonnent d'acclamations assourdissantes."
 lotr_artifact.0003.desc_helm: "Assis sur mon trône, je m'occupe des affaires courantes de tout souverain. Mais bientôt une agitation s'élève, et l'air lui-même semble différent.\n\nUn cor résonne dans les profondeurs — non pas un cor d'[orc|E] ou de [goblins|E], mais un cor [dwarven|E]. Revenant des ténèbres profondes de [GetTitleByKey('c_durins_hall').GetNameNoTier], un convoi de mineurs et de soldats que j'avais envoyés s'aventurer plus loin dans les vestiges de l'antique [khazaddum|E]. À leur tête, mon Maréchal, qui apporte avec révérence un objet enveloppé de tissu noir. Le silence règne, l'attente est palpable.\n\nJ'écarte le voile et m'est révélé le Heaume de Durin d'antan, quasiment intact, bien qu'il soit tombé avec [GetScriptedCharacterByHistoryID('lineofdurinVI').GetFirstNameNicknamedRegnal] lorsqu'il passa dans l'ombre et les flammes. Je le pose fièrement sur ma tête, et il est léger comme une capuche. Les salles résonnent d'acclamations assourdissantes."
 lotr_artifact.0003.a: "Par la grâce de Mahal, je suis le descendant et Seigneur de Khazad-dûm !"
 
 ### Bestowing heirloom
 
 lotr_artifact.0010.t: "Selon la tradition"
 lotr_artifact.0010.desc: "L'heure est venue. M[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('heir'))] [heir.GetTitledFirstName] a atteint l'âge adulte, et [heirloom_artifact_1.GetNameNoTooltip] devrait lui revenir de droit.\n\nJe convoquerai les pairs du royaume pour la cérémonie."
 lotr_artifact.0010.a: "J'ai confiance que tu t'en montreras digne."
 lotr_artifact.0010.b: "[heirloom_artifact_1.GetNameNoTooltip] est à moi, rien qu'à moi !"
 
 lotr_artifact.0011.t: "Selon la tradition"
 lotr_artifact.0011.desc: "M[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('parent'))] m'a convoqué dans sa grande salle. Tous les pairs du royaume sont présents pour assister à la cérémonie. Alors que je m'agenouille devant le trône, [parent.GetTitledFirstName] élève [heirloom_artifact_1.GetNameNoTooltip] bien haut pour que tous le voient et le dépose dans mes mains tendues."
 lotr_artifact.0011.a: "Je te rendrai fier, m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('parent'))]."
 
 lotr_artifact.0012.t: "Tradition bafouée"
 lotr_artifact.0012.desc: "M[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('parent'))] m'a convoqué dans sa grande salle. Tous les pairs du royaume sont présents pour assister à la cérémonie. Alors que je m'agenouille devant le trône, [parent.GetTitledFirstName] élève [heirloom_artifact_1.GetNameNoTooltip] bien haut pour que tous le voient, avant qu'un rictus ne déforme son visage.\n\n« Tu n'en es pas digne, m[parent.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('ROOT.Char'))]. Je garderai cet héritage pour moi jusqu'à ce que tu aies prouvé ta valeur. »"
 lotr_artifact.0012.a: "M[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('parent'))] sait ce qui est juste, j'imagine."
 lotr_artifact.0012.b: "Je n'oublierai pas un tel affront !"
 
 lotr_artifact.0013.t: "Sombres nouvelles"
 lotr_artifact.0013.desc: "Un messager pénètre dans ma grande salle, le visage grave. « [ROOT.Char.Custom('FormOfAddressForLiege')|U], je suis porteur de tristes nouvelles : [dead_heir.GetTitledFirstName], votre [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dead_heir'))], a trépassé. »\n\n« Voici [heirloom_artifact.GetNameNoTooltip] qu'[dead_heir.Custom('FR_IlElle')] portait toujours sur [dead_heir.Custom('FR_LuiElle')]. »\n\nLe regard vide, je contemple le trésor posé sur mes genoux."
 lotr_artifact.0013.a: "J'aurais souhaité ne jamais le tenir à nouveau."

 lotr_artifact.0014.t: "Un héritage à choisir"
 lotr_artifact.0014.desc: "J'ai décidé de léguer un héritage aux successeurs de [primary_title.GetBaseNameNoTierNoTooltip], qui sera leur à perpétuité. Parmi mon vaste trésor, quel artefact devrais-je choisir ?"
 lotr_artifact.0014.a: "Une arme magnifique."
 lotr_artifact.0014.b: "De glorieux insignes."
 lotr_artifact.0014.c: "Une belle couronne."
 lotr_artifact.0014.d: "Une armure étincelante."
 lotr_artifact.0014.e: "Quelque chose de plus discret, peut-être."
 lotr_artifact.0014.f: "À la réflexion, c'est une idée saugrenue."
 
 lotr_artifact.0015.t: "Un héritage à choisir"
 lotr_artifact.0015.desc: "Mon choix d'artefact à léguer à m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('heir'))] [heir.GetTitledFirstName] est fait, mais quel objet précis lui conviendrait le mieux ?"
 lotr_artifact.0015.a: "[artifact_1.GetNameNoTooltip] est certainement splendide."
 lotr_artifact.0015.b: "[artifact_2.GetNameNoTooltip] ferait un magnifique présent."
 lotr_artifact.0015.c: "[artifact_3.GetNameNoTooltip] serait le meilleur choix."
 lotr_artifact.0015.d: "Qu'y a-t-il d'autre ?"
 lotr_artifact.0015.e: "Peut-être ai-je choisi trop hâtivement."
 
 lotr_heirloom_artifact_modifier: "Artefact patrimonial"
 lotr_heirloom_artifact_desc: "[heirloom_artifact.GetDesc]\n\nCet artefact est traditionnellement porté par les héritiers de [primary_title.GetBaseName]."