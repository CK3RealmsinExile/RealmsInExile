l_french:
 wander_terilaen.1001.t: "Visite des Royaumes des Hommes : Le Départ"
 wander_terilaen.1001.desc: "Cela fait quelque temps que j'ai quitté ma forêt, et de nouveau je désire vivre comme les [conceptracemen|E], du moins pour un temps. Dans ce dessein, je me suis mis en route vers [destination_terilaen.GetName].\n\nEn traversant des forêts antiques, je médite sur la fuite du temps. Il semble presque s'immobiliser ici, dans les terres boisées des Elfes. Le monde des Hommes, cependant, change à vive allure. Ceux que j'ai rencontrés lors de mes voyages passés ont vieilli ou sont déjà partis au-delà.\n\nJe chéris le temps que je passe parmi les Hommes toujours changeants, car je sais qu'à mon retour, mon royaume sera encore tel que je l'ai laissé."
 wander_terilaen.1001.a: "Je partirai."
 wander_terilaen.1001.a.tt: "Vous vous rendrez à [destination_terilaen.GetName]"

 wander_terilaen.1010.t: "Visite des Royaumes des Hommes : Médecin"
 wander_terilaen.1010.desc: "Alors que j'explorais [destination_terilaen.GetName], j'ai rencontré un médecin en quête d'un assistant. Il fut impressionné par ma connaissance des herbes et m'engagea sur-le-champ.\n\nJe passe désormais mes journées à appliquer des onguents sur les patients, à trier remèdes et herbes, et à assister mon employeur dans le traitement des malades. Bien que je possède une grande maîtrise des arts de la guérison, elle s'applique surtout à mes congénères [elves|E]. Les maladies des Hommes et leur traitement me sont nouveaux. Le médecin s'est montré empressé de combler cette lacune, et en retour je lui offre des conseils tirés de ma longue expérience."
 wander_terilaen.1010.a: "J'ai beaucoup appris."

 wander_terilaen.1011.t: "Visite des Royaumes des Hommes : Attaqué !"
 wander_terilaen.1011.desc: "Traversant les rues de [destination_terilaen.GetName], je me retrouve soudain cerné par une bande de [conceptracemen|E] à l'air peu recommandable. Je suis sans armes, et eux brandissent couteaux et gourdins.\n\nQue je les aie offensés d'une façon ou d'une autre, qu'ils cherchent simplement le sport, ou qu'ils veuillent me détrousser, ou tout cela à la fois, je ne saurais dire. Ce que je sais, c'est qu'ils ont l'intention de me faire du mal."
 wander_terilaen.1011.a: "Les repousser !"
 wander_terilaen.1011.a.failure: "Vous vous faites rouer de coups !"
 wander_terilaen.1011.b: "Fuir !"

 wander_terilaen.1012.t: "Visite des Royaumes des Hommes : Une Naissance !"
 wander_terilaen.1012.desc: "En arrivant à [destination_terilaen.GetName], je vois un homme désespéré courir dans les rues. Il appelle un médecin. Je lui demande ce qui se passe ; il me répond que sa femme enceinte connaît des complications lors de son accouchement, et il craint que les compétences de la sage-femme ne suffisent pas. Il pense qu'il va perdre sa femme et son enfant.\n\nJe le suis jusqu'à sa demeure, et en approchant j'entends les cris. La sage-femme m'apprend que le bébé n'est pas en bonne position, et que la mère est déjà épuisée par son long travail. Il ne sera pas aisé de sauver les deux."
 wander_terilaen.1012.a: "Je ferai de mon mieux pour aider."
 wander_terilaen.1012.a.sucess: "Tout se passe bien !"
 wander_terilaen.1012.a.failure: "L'enfant est mort-né"

 wander_terilaen.1013.t: "Visite des Royaumes des Hommes : Un Entretien"
 wander_terilaen.1013.desc: "Je me rends dans les salles du pouvoir de [destination_terilaen.GetTitle.GetNamePossessive]. J'y rencontre [destination_terilaen.GetCounty.GetTitle.GetHolder.GetName], sous prétexte d'être un sage voyageur, désireux de conseiller le seigneur et d'améliorer la vie de son peuple.\n\nJe puis soit le laisser développer ses politiques et sa gouvernance, soit tenter de guider la conversation vers l'amélioration des conditions de vie du peuple de [destination_terilaen.GetName]."
 wander_terilaen.1013.a: "Parlons de s[destination_terilaen.GetCounty.GetTitle.GetHolder.Custom('FR_OnA')] gouvernement."
 wander_terilaen.1013.b: "Parlons de la vie de ces gens."
 wander_terilaen.1013.b.success: "[destination_terilaen.GetCounty.GetTitle.GetHolder.GetSheHe|U] vous écoute !"
 wander_terilaen.1013.b.failure: "Vous êtes ignoré"

 wander_terilaen.1014.t: "Visite des Royaumes des Hommes : Un Lépreux"
 wander_terilaen.1014.desc: "Aux abords de [destination_terilaen.GetName], un spectacle attristant s'offre à moi. Un lépreux, chassé par ses semblables qui l'évitent désormais.\n\nJe m'assieds auprès de l'homme, et il me demande si je suis au courant de son mal, et si oui, pourquoi je m'approche. Je lui souris et lui dis que je suis un guérisseur, versé dans le remède de cette maladie. Il me supplie de le guérir, si c'est ma volonté."
 wander_terilaen.1014.a: "Ce l'est."
 wander_terilaen.1014.a.success: "Il est guéri !"
 wander_terilaen.1014.a.failure: "Vous échouez à le guérir"

 wander_terilaen.1015.t: "Visite des Royaumes des Hommes : Ménestrel"
 wander_terilaen.1015.desc: "Cette fois, j'ai décidé non de travailler parmi les [conceptracemen|E], mais de jouer pour eux. Les gens de [destination_terilaen.GetName] semblent apprécier mes mélodies, et chaque fois que je chante ou joue, un cercle d'auditeurs se forme.\n\nJe n'interprète pas seulement des chants locaux, mais aussi des lais et des récits des Âges passés, peu connus des Hommes de cette contrée. J'en ai même inspiré certains à chanter avec moi, et nos duos et chœurs sont plus joyeux que tout ce qu'une seule personne pourrait espérer."
 wander_terilaen.1015.a: "La musique nous unit tous."
 wander_terilaen.1015.a.success: "L'espoir est ravivé !"

 wander_terilaen.1016.t: "Visite des Royaumes des Hommes : Charpentier"
 wander_terilaen.1016.desc: "Je suis venu en tant que charpentier, et à ce titre une famille dans le besoin de [destination_terilaen.GetName] m'a sollicité. Ils ont besoin de réparer leur toit, les fuites sont le moindre de leurs problèmes, me disent-ils : cela fait si longtemps qu'il n'a pas été entretenu qu'ils ont commencé à craindre qu'il leur tombe sur la tête. Ils ont mis de côté une somme honnête pour payer ce service, et me l'offrent.\n\nCela représente quelques jours de dur labeur, mais c'est du bon travail pour ce qui semble être de braves gens. Je le ferai."
 wander_terilaen.1016.a: "Je ferai un travail honnête."
 wander_terilaen.1016.b: "Avec plaisir, et point besoin de payer."
 wander_terilaen.1016.b.success: "Ils vous remercient"

 wander_terilaen.1017.t: "Visite des Royaumes des Hommes : Tisserand"
 wander_terilaen.1017.desc: "J'offre mes services de tisserand dans les environs de [destination_terilaen.GetName]. Bientôt un marchand vient me trouver, il désire quelque chose d'unique et de beau, à accrocher dans sa demeure grandiose.\n\nIl me dit qu'il aimerait une tapisserie artistique retraçant l'histoire de ce lieu, mais me laisse faire ce que mon cœur désire, de peur que l'œuvre ne perde de son art."
 wander_terilaen.1017.a: "Je tisserai l'histoire de ce lieu."
 wander_terilaen.1017.b: "Je tisserai une scène de Cuiviénen."
 wander_terilaen.1017.b.success: "C'est une belle pièce"
 wander_terilaen.1017.b.failure: "Elle est mal reçue"

 wander_terilaen.1018.t: "Visite des Royaumes des Hommes : Un Champion"
 wander_terilaen.1018.desc: "Explorant [destination_terilaen.GetName], j'entends le raclement du métal et des cris de joute. J'arrive sur les lieux et vois un homme robuste manier aisément une épée de bois contre ses adversaires, plusieurs jeunes hommes également armés de bois. En m'approchant, le champion me regarde avec curiosité, jaugeant ma force. Il m'interpelle :\n\n« Nouvenu venu ! Un bout d'essai ? »"
 wander_terilaen.1018.a: "C'est bon pour l'exercice."

 wander_terilaen.1019.t: "Visite des Royaumes des Hommes : Suivi"
 wander_terilaen.1019.desc: "Depuis les derniers jours de mon voyage vers [destination_terilaen.GetName], une alarme s'est mise à grandir dans mon cœur. Quelqu'un me suit. Je ne sais ni qui c'est, ni ce qu'il veut, ni comment il peut filer un membre des [quendi|E].\n\nC'est assurément un fin chasseur, qui m'a remarqué et pris de curiosité... Espérons-le..."
 wander_terilaen.1019.a: "Tenter de le trouver."
 wander_terilaen.1019.a.success: "Vous l'apercevez avant qu'il ne fuie"
 wander_terilaen.1019.a.failure: "Vous ne trouvez personne"

 wander_terilaen.1020.t: "Visite des Royaumes des Hommes : Des Hommes en Folie"
 wander_terilaen.1020.desc: "En approchant de la place publique de [destination_terilaen.GetName], j'aperçois des gens attroupés autour d'un petit groupe de [conceptracemen|E]. Ils maudissent le soleil, les étoiles et la lune, ils prêchent que la lumière fait ressortir les péchés dans le cœur des gens. Ils désirent un monde de ténèbres, où l'humanité vivrait seule en paix.\n\nCe sont là de mauvaises paroles, nées de la douleur et de la folie dans le cœur de ces pauvres hommes."
 wander_terilaen.1020.a: "Je vais tenter de les faire entendre raison."
 wander_terilaen.1020.a.success: "Ils vous écoutent"
 wander_terilaen.1020.a.failure: "Ils continuent de crier"

 wander_terilaen.1021.t: "Visite des Royaumes des Hommes : Un Homme en Deuil"
 wander_terilaen.1021.desc: "En traversant les rues de [destination_terilaen.GetName], j'entends des sanglots tout proches. Un homme robuste pleure ostensiblement au bord de la route. Manifestement ivre. Quelques personnes l'observent de loin, certaines avec moquerie, d'autres avec pitié. Je m'approche et lui demande comment je puis l'aider. Il me répond qu'il n'est rien en mon pouvoir, car son fils unique est mort et disparu.\n\nJe m'assieds à ses côtés et prends sa main. Si seulement les [conceptracemen|E] pouvaient comprendre à quel point leurs vies sont véritablement fascinantes, ils estimeraient le Destin un mince prix à payer.\n\n« Gardez-vous de sombrer dans le désespoir, brave homme », je lui dis enfin."
 wander_terilaen.1021.a: "L'Homme héritera du monde."
 wander_terilaen.1021.a.success: "Il est réconforté"
 wander_terilaen.1021.a.failure: "Il s'en va"

 wander_terilaen.1022.t: "Visite des Royaumes des Hommes : Un Lynchage"
 wander_terilaen.1022.desc: "J'entends un grand tumulte dans les rues de [destination_terilaen.GetName] ! De loin j'aperçois des gens traîner un homme qui se débat à travers les rues. La foule le roue de coups sans cesse pour le réduire à l'obéissance, elle est bestiale.\n\nQuel que soit le crime que cet homme ait commis, ce n'est pas ainsi qu'on le traite, la foule ne peut être discutée, ni raisonnée, c'est une marée de fureur. Dieu, cet homme n'est peut-être même pas coupable ! Lorsque je les rejoins, l'homme a déjà été pendu."
 wander_terilaen.1022.a: "Quelle violence, quel spectacle terrible."

 wander_terilaen.1023.t: "Visite des Royaumes des Hommes : Un Homme Sage"
 wander_terilaen.1023.desc: "Dans un quartier misérable de [destination_terilaen.GetName], je vois un spectacle rare. Assis en bord de rue, vêtu de haillons, repose un Homme véritablement sage, ses yeux me regardent depuis des profondeurs cachées de savoir et de curiosité. Je songe, non pour la première fois, quelle terrible honte que l'Homme se soit rendu si éphémère, si déchu.\n\nJe m'agenouille auprès de l'homme et lui glisse quelques pièces.\n\n« Quel visage singulier vous avez, jeune homme, » me dit-il, « Vieux et jeune, triste et heureux, semblable aux fées. »"
 wander_terilaen.1023.a: "Cette conversation s'annonce des plus intéressantes."
 wander_terilaen.1023.a.success: "Foi Renouvelée !"

 wander_terilaen.1024.t: "Visite des Royaumes des Hommes : Une Taverne"
 wander_terilaen.1024.desc: "Ce soir je ferai fête avec les [conceptracemen|E]. Il y a ici à [destination_terilaen.GetName] une taverne particulièrement réputée où je souhaitais me rendre.\n\nEn entrant, je suis accueilli par des éclats de rires. Un bouffon local chante une chanson grivoise et les hommes s'en délectent. À mesure que la soirée avance, un brave gaillard me remarque et réclame une chanson, je chante quelques vieilles rimes légères du commun des mortels. Ils les trouvent amusantes.\n\nEnsuite je noue un bon rapport avec les hommes, ivres comme ils sont. Je demeure surtout silencieux et les laisse parler, quand quelqu'un me pose une question, j'en pose une en retour, ils rient et me maudissent joyeusement."
 wander_terilaen.1024.a: "C'était fort plaisant."

 wander_terilaen.1025.t: "Visite des Royaumes des Hommes : Une Bibliothèque"
 wander_terilaen.1025.desc: "Dans une maison de pierre abandonnée de [destination_terilaen.GetName], j'ai trouvé un beau trésor. Une petite bibliothèque de livres poussiéreux d'un âge révolu, laissés à moisir dans un coin.\n\nEn les cataloguant, j'ai identifié trois collections dignes d'étude, mais hélas je ne puis les emporter toutes."
 wander_terilaen.1025.a: "La collection sur la médecine."
 wander_terilaen.1025.b: "La collection sur l'escrime."
 wander_terilaen.1025.c: "La collection de poésie."

 wander_terilaen.1026.t: "Visite des Royaumes des Hommes : Une Demeure"
 wander_terilaen.1026.desc: "Travaillant comme charpentier à [destination_terilaen.GetName], j'ai été approché par un boutiquier qui a entendu parler de la qualité de mon ouvrage. Il souhaite que je dirige une équipe pour lui bâtir une demeure entièrement neuve pour lui et sa famille au cours des semaines à venir.\n\nLa rémunération est bonne, le travail est intéressant, et la maison n'est pas si grande qu'elle m'attarderait trop. Je suis enthousiaste."
 wander_terilaen.1026.a: "J'espère qu'elle tiendra."
 wander_terilaen.1026.a.success: "Vous avez appris quelque chose !"

 wander_terilaen.1027.t: "Visite des Royaumes des Hommes : Un Vieux Guérisseur"
 wander_terilaen.1027.desc: "Passant du bon temps à observer les hommes dans une taverne de [destination_terilaen.GetName], j'aperçois un vieil homme qui sirote tranquillement sa bière. Ses mains ont manifestement été teintées au fil des années par les herbes, je vois qu'il est un vieux guérisseur.\n\nJe m'approche et lui propose de payer sa boisson. Il me remercie avec solennité. J'engage une conversation légère, guidant toujours vers son domaine d'expertise, espérant en apprendre davantage."
 wander_terilaen.1027.a: "Un sujet des plus intéressants."
 wander_terilaen.1027.a.success: "Ses paroles sont inspirantes."

 wander_terilaen.1028.t: "Visite des Royaumes des Hommes : Un Récital"
 wander_terilaen.1028.desc: "Ce soir il se passe quelque chose de merveilleux à [destination_terilaen.GetName], un ménestrel renommé des [conceptracemen|E] passe par la cité et donne un récital public de poésie du commun.\n\nC'est assurément une belle occasion d'observer un homme de talent à l'œuvre, et peut-être d'apprendre quelques poèmes."
 wander_terilaen.1028.a: "Quelle agréable soirée."
 wander_terilaen.1028.a.success: "Encore un !"

 wander_terilaen.1029.t: "Visite des Royaumes des Hommes : Attaqué ?"
 wander_terilaen.1029.desc: "Descendant une rue de [destination_terilaen.GetName], j'entends soudain des cris stridents de guerre ! En un instant, me voilà cerné par une bande entière d'enfants brandissant épées de bois et bâtons. Un gamin me lance une épée et m'enjoint de me défendre. On dirait que c'est là leur chef.\n\nJe m'y prête de bonne grâce. Ils ne cherchent pas à me blesser, mais ils sont féroces. Même quand je les désarme et les écarte, ils reviennent à la charge de tous côtés. Si j'étais véritablement un homme, je sporterais assurément quelques bleus demain. Au bout d'une heure environ, je viens finalement à bout des plus tenaces."
 wander_terilaen.1029.a: "De coriaces petits diables."
 wander_terilaen.1029.a.success: "Les enfants sont une bénédiction..."

 wander_terilaen.1030.t: "Visite des Royaumes des Hommes : Une Pièce de Théâtre"
 wander_terilaen.1030.desc: "Cette fois je suis venu comme chanteur à [destination_terilaen.GetName], ce matin, un acteur m'a demandé si j'accepterais de jouer dans une pièce.\n\nÀ ma surprise, ce n'est pas une comédie, mais une pièce sérieuse, une tragédie du commun des mortels. Une écriture des plus intéressantes, je ne l'avais pas encore croisée, ce doit être une œuvre nouvelle.\n\nJe passe l'après-midi à répéter et au soir je me sens prêt pour mon rôle secondaire. Bon nombre de gens sont venus profiter du spectacle."
 wander_terilaen.1030.a: "Merde !"

 wander_terilaen.1031.t: "Visite des Royaumes des Hommes : Un Vol"
 wander_terilaen.1031.desc: "Une nuit, traversant les rues de [destination_terilaen.GetName], je suis un groupe suspect de [conceptracemen|E] qui rôdent. Il est intéressant d'observer l'élément criminel des sociétés humaines, un concept si imparfait, né de l'obscurité dans leurs cœurs. La violence contre ses frères, la cupidité, l'ambition sans direction.\n\nJe les vois s'approcher d'un vieillard bien mis. C'est un vol, j'en suis certain. Et pourtant le vieillard a rendu sa bourse, jusqu'à ses chaussures, mais ils le menacent encore.\n\nSoudain l'un d'eux frappe le vieil homme. Comme un autre tire son épée, je m'interpose, saisissant ma dague."
 wander_terilaen.1031.a: "C'en est trop."

 wander_terilaen.1032.t: "Visite des Royaumes des Hommes : Un Mourant"
 wander_terilaen.1032.desc: "En sortant d'une boutique de poterie de [destination_terilaen.GetName], j'entends de douloureux gémissements venant de l'une des maisons. Je frappe à la porte, mais personne ne répond.\n\nJ'entre et trouve un jeune homme allongé dans son lit, mourant avant son heure d'une fièvre très forte. Je vois sa respiration faiblir, et la rougeur qui s'étend sur son visage indique une infection grave et généralisée. Je ne serai peut-être pas en mesure de le sauver, mais je pourrai apprendre sur la maladie en essayant."
 wander_terilaen.1032.a: "Essayer quand même, je le ferai."

 wander_terilaen.1033.t: "Visite des Royaumes des Hommes : Un Ivrogne"
 wander_terilaen.1033.desc: "Cette nuit, je passais par une taverne de [destination_terilaen.GetName] quand un paysan ivre m'aborda.\n\n« Messire ! » lance-t-il. « Vous m'avez l'air d'un homme avisé, perspicace. Seriez-vous d'humeur à partager quelques pensées ? »\n\n« Mon pauvre ami, je ne suis qu'un charpentier, » lui dis-je, amusé. « Et pourtant, un charpentier n'est-il pas accoutumé à manier des choses pleines d'échardes ? Rudes et blessants, les hommes peuvent l'être. Et pourtant, doux comme l'eau. Tâchez d'être moins plein d'échardes et moins lisse : voilà mon conseil. »"
 wander_terilaen.1033.a: "Il a l'air si perplexe."
 wander_terilaen.1033.a.success: "Oh, attendez ! Il comprend !"

 wander_terilaen.1034.t: "Visite des Royaumes des Hommes : Une Foule en Colère"
 wander_terilaen.1034.desc: "Je parcours les rues de [destination_terilaen.GetName] lorsqu'un grand tumulte éclate quelque part à proximité. Je cours dans sa direction et vois des gens lancer des pierres sur une femme. Ils hurlent des accusations. Je cours vers elle et crie à la foule de cesser. Elle cesse bien de lancer des pierres, mais tente à présent de m'écarter violemment.\n\n« Gens mauvais ! Arrêtez sur-le-champ cette folie ! Vous faites ici plus de mal que tout ce que cette femme aurait pu faire, car vous abandonnez vos raisons individuelles au profit de la volonté meurtrière de la foule ! Et ainsi tant de ceux qui veulent faire le bien tombent dans le mal, car la foule ne peut se remettre en question, elle n'est qu'un corps aveugle et violent. »"
 wander_terilaen.1034.a: "La foule considère mes paroles."
 wander_terilaen.1034.a.success: "Elle se calme !"

 wander_terilaen.1035.t: "Visite des Royaumes des Hommes : Un Soldat"
 wander_terilaen.1035.desc: "Assis près des portes de [destination_terilaen.GetName], j'aperçois un soldat d'âge mûr qui s'ennuie en jouant avec sa lance. Je l'approche et entame une conversation qui s'approfondit peu à peu depuis de menues banalités.\n\nÀ la fin, il m'a raconté bien des histoires de guerre et personnelles, beaucoup sur son entraînement et son quotidien de soldat, et sur ses voyages à travers ces contrées. Des choses des plus intéressantes."
 wander_terilaen.1035.a: "Une page de plus pour le journal."

 wander_terilaen.1099.t: "Visite des Royaumes des Hommes : Le Retour"
 wander_terilaen.1099.desc: "J'ai vécu bien des choses dans les terres des [conceptracemen|E], mais l'heure est venue de rejoindre mon royaume.\n\nSi j'aime mes voyages, je suis roi des [cuind|E] et dois retourner à mon devoir."
 wander_terilaen.1099.a: "Il est temps de rejoindre les miens."
 wander_terilaen.1099.a.tt: "Vous rejoignez votre capitale"