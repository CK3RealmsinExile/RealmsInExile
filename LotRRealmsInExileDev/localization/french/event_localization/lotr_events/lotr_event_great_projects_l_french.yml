 ### MODIFIERS ###

 dwarven_decorated_ceilings_dynasty_modifier: "$great_project_type_dwarven_capital_02_contribution_decorated_ceilings$"
 dwarven_decorated_ceilings_dynasty_modifier_desc: "Une association magnifique de formes et d'ornements, les plafonds sculptés de cette dynastie résonnent chez leurs contemplateurs sur un plan spirituel."

 dwarven_dynastic_statues_modifier: "$great_project_type_dwarven_capital_03_contribution_dynastic_statues$"
 dwarven_dynastic_statues_modifier_desc: "Les effigies des rois Nains, taillées dans la roche vive, inspirent les citoyens à œuvrer avec plus d'ardeur et d'efficacité."
 dwarven_gilded_ceilings_dynasty_modifier: "$great_project_type_dwarven_capital_03_contribution_gilded_ceilings$"
 dwarven_gilded_ceilings_dynasty_modifier_desc: "Les plafonds dorés apportés à la capitale naine comptent parmi les plus grands accomplissements de cette dynastie."
 
 dwarven_great_mirrors_province_modifier: "$great_project_type_dwarven_capital_04_contribution_great_mirrors$"
 dwarven_great_mirrors_province_modifier_desc: "Les grands miroirs dirigent la lumière vers les jardins souterrains comme vers les places de la cité."
 dwarven_contributor_great_mirrors_reward_province_effect_tt: "La propriété de [province.GetName] gagne [GetModifier('dwarven_great_mirrors_province_modifier').GetNameWithTooltip]"
 dwarven_contributor_great_mirrors_reward_effect_tt: "La propriété de [owner.GetCapitalLocation.GetName] gagne [GetModifier('dwarven_great_mirrors_province_modifier').GetNameWithTooltip]"
 dwarven_carven_pillars_modifier: "$great_project_type_dwarven_capital_04_contribution_carven_pillars$"
 dwarven_carven_pillars_modifier_desc: "Ces piliers sculptés confèrent solennité et beauté à la capitale naine qui les abrite."
 dwarven_bejeweled_ceilings_dynasty_modifier: "$great_project_type_dwarven_capital_04_contribution_bejeweled_ceilings$"
 dwarven_bejeweled_ceilings_dynasty_modifier_desc: "Les gemmes qui scintillent à la lueur des lanternes illuminent la voûte comme autant d'étoiles, un nouvel accomplissement pour cette dynasty."

 dwarven_waterways_defense_modifier: "$great_project_type_dwarven_capital_05_contribution_waterways$"
 dwarven_waterways_defense_modifier_desc: "Ces canaux, outre qu'ils favorisent le commerce et les travaux de construction, contribuent également à tenir à distance les étrangers et leur engeance."
 dwarven_pillar_forest_modifier: "$great_project_type_dwarven_capital_05_contribution_pillar_forest$"
 dwarven_pillar_forest_modifier_desc: "Une impressionnante forêt de piliers qui conte l'histoire d'une illustre dynastie naine."
 dwarven_bejeweled_reliefs_modifier: "$great_project_type_mandala_capital_05_contribution_bejeweled_reliefs$"
 dwarven_bejeweled_reliefs_modifier_desc: "Les joyaux incrustés dans les délicats reliefs brillent vivement à la lumière des lampes et impressionnent grandement courtisans et diplomates étrangers."

 lotr_great_project.2000.t.base: "Reconstruction d'Arnor"
 lotr_great_project.2000.t.second: "$lotr_great_project.1000.t.base$ : La Gloire de [project_location.GetNameNoTooltip]"
 lotr_great_project.2000.desc.base: "Les premières pierres sont déplacées, et les décombres des âges commencent à se dégager. Les halls effondrés sont déblayés, les blocs brisés emportés, et d'antiques routes rouvertes pour la première fois depuis des générations.\n\nLes cicatrices du délabrement demeurent partout, mais des décombres émergent les fondations de l'architecture arnorienne. Des feux sont allumés de nouveau, des échafaudages dressés, et le rythme régulier du labeur résonne à travers les rues. Ce lieu n'est plus abandonné, il revient à la vie."
 lotr_great_project.2000.desc.second: "La cité s'éveille et bourdonne de vie. Les halls rebâtis résonnent de la voix des poètes, les tavernes et marchés du murmure des mille voix d'un peuple prospère.\n\nTandis que mon regard suit de luisantes flèches vers le ciel, j'entends le rire des enfants courant dans les jardins et jouant avec les fontaines et les oiseaux aux mille couleurs qui les peuplent."
 lotr_great_project.2000.a.first: "Nous ferons de ces ruines un foyer."
 lotr_great_project.2000.a.second:  "Tel est mon #EMP véritable#! dessein."

 lotr_great_project.2010.t: "Récompenses de la Capitale"
 lotr_great_project.2010.desc: "L'envoyé de m[ROOT.Char.Custom2('FR_RelationToMe_OnA', overlord_scope)], [overlord_scope.GetTitledFirstName], me rejoint en ce petit matin : « [ROOT.Char.Custom('FormOfAddressForLiege')|U] ! La capitale en [project_location.GetNameNoTooltip] a enfin atteint son terme !\n\n« Notre gracieux [overlord_scope.GetTitleAsNameNoTooltip] m'a dépêché ici pour vous témoigner s[overlord_scope.Custom('FR_OnA')] reconnaissance pour vos généreuses contributions à cette fin ! » Les yeux de l'émissaire brillent d'une ardeur passionnée lorsque [envoy.Custom('FR_IlElle')] retrace la vision des délicates flèches, des arches et des canaux qui parent la cité d'une splendeur hors du commun.\n\nJe hoche la tête, satisfait de ma contribution à cette cause..."
 lotr_great_project.2010.a: "Transmettez mes salutations."

