 lotr_great_project.1000.t.base: "Capitale"
 lotr_great_project.1000.t.second: "$lotr_great_project.1000.t.base$ : Déblaiement des Ruines de [project_location.GetNameNoTooltip]"
 lotr_great_project.1000.t.third:  "$lotr_great_project.1000.t.base$ : Reconstruction de [project_location.GetNameNoTooltip]"
 lotr_great_project.1000.t.fourth: "$lotr_great_project.1000.t.base$ : Restauration de [project_location.GetNameNoTooltip]"
 lotr_great_project.1000.t.final:  "$lotr_great_project.1000.t.base$ : La Gloire de [project_location.GetNameNoTooltip]"
 lotr_great_project.1000.desc.second: "Les premières pierres sont déplacées, et les décombres des âges commencent à se dégager. Les halls effondrés sont déblayés, les blocs brisés emportés, et d'antiques passages rouverts pour la première fois depuis des générations.\n\nLes cicatrices de la ruine demeurent partout, mais sous les décombres, les ossements d'une grande creusée tiennent bon. Des feux sont allumés de nouveau, des échafaudages dressés, et le rythme régulier du labeur résonne à travers la pierre. Ce lieu n'est plus abandonné, il revient à la vie."
 lotr_great_project.1000.desc.third: "La creusée s'éveille et bourdonne d'activité. Les halls rebâtis relient des chambres jadis isolées, et de solides fondations remplacent ce que le temps et le désastre avaient emporté.\n\nDemeures, ateliers et entrepôts s'élèvent avec méthode. Le son du marteau sur l'enclume porte à travers les couloirs, et la capitale commence à ressembler moins à un chantier qu'à une cité."
 lotr_great_project.1000.desc.fourth: "L'ordre revient dans les profondeurs des halls. De grands axes sont élargis et renforcés, lumière et eau guidées avec soin à travers la roche par d'ingénieuses œuvres d'art.\n\nLa capitale n'est plus seulement fonctionnelle. L'ornement et le dessein y reviennent, honorant beauté et force à parts égales. À parcourir ces halls désormais, on en ressent le propos. Taillés non seulement pour durer, ils inspirent maintenant avec la même puissance."
 lotr_great_project.1000.desc.final: "Les derniers travaux sont achevés. Les halls se dressent en triomphe du savoir-faire [dwarven|E]. La pierre en a été soigneusement façonnée, les couloirs renforcés, et chaque recoin sert à la fois la fonction et la fierté.\n\nSes ateliers bourdonnent d'industrie, demeures et entrepôts sont pleins, et ses défenses sont solides. Marchands, artisans et gardes se meuvent dans la creusée avec un sentiment de fierté et d'émerveillement. Cette capitale a été pleinement reconquise, témoignage de ce que les Nains peuvent accomplir quand labeur, expertise et détermination s'unissent."
 lotr_great_project.1000.a.second: "Nous ferons de ces ruines un foyer."
 lotr_great_project.1000.a.third:  "Voilà qui avance..."
 lotr_great_project.1000.a.fourth: "Tel est mon #EMP véritable#! dessein."
 lotr_great_project.1000.a.final:  "C'est là un digne hommage à Mahal."

 lotr_great_project.1010.t: "Récompenses de la Capitale"
 lotr_great_project.1010.desc: "L'envoyé de m[ROOT.Char.Custom2('FR_RelationToMe_OnA', overlord_scope)], [overlord_scope.GetTitledFirstName], me rejoint en ce petit matin : « [ROOT.Char.Custom('FormOfAddressForLiege')|U] ! La capitale en [project_location.GetNameNoTooltip] a enfin atteint son terme !\n\n« Notre gracieux [overlord_scope.GetTitleAsNameNoTooltip] m'a dépêché ici pour vous témoigner s[overlord_scope.Custom('FR_OnA')] reconnaissance pour vos généreuses contributions à cette fin ! » Les yeux de l'émissaire brillent d'une ardeur passionnée lorsque [envoy.Custom('FR_IlElle')] retrace la vision des délicates flèches, des arches et des canaux qui parent la creusée d'une splendeur hors du commun.\n\nJe hoche la tête, satisfait de ma contribution à cette cause..."
 lotr_great_project.1010.a: "Transmettez mes salutations."


