 black_horses_of_rohan: "Étalon Noir du Rohan"
 black_horses_of_rohan_desc: "Ce personnage est monté sur l’un des grands chevaux du Rohan."
 black_horses_of_rohan_sauron: "Étalons Noirs du Rohan"
 black_horses_of_rohan_sauron_desc: "Ce personnage a acquis de nombreux chevaux du Rohan pour gonfler les rangs de ses forces."
 sold_horses_to_sauron: "Vendu des Chevaux à Sauron"
 sold_horses_to_sauron_desc: "Ce personnage a volontairement vendu des chevaux au Seigneur Sombre Sauron et ne peut plus être entièrement digne de confiance."
 raiding_rohan: "Pillage du Rohan"
 raiding_rohan_desc: "Ce personnage a envoyé des Orcs piller le Rohan et voler ses troupeaux."
 orc_raids_from_mordor: "Raids d’Orcs"
 orc_raids_from_mordor_desc: "#TOLKIENQUOTE Le Seigneur de la Terre Noire souhaitait nous acheter des chevaux à grand prix, mais nous l’avons refusé, car il fait un mauvais usage des bêtes. Alors il envoya des Orcs pillards, qui emportent ce qu’ils peuvent, choisissant toujours les chevaux noirs : il en reste maintenant peu. Pour cette raison, notre querelle avec les Orcs est amère.#!"
 recovering_from_orc_raid: "Rétablissement après les Raids d’Orcs"
 recovering_from_orc_raid_desc: "Cette région se remet des raids d’Orcs qui ont emporté une grande partie de ses troupeaux et ravagé de nombreux foyers."
