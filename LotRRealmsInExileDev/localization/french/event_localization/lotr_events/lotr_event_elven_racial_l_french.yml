 ### Childbirth ###
 current_fea: "#V Fëa Actuel : [GetPlayer.GetPrimarySpouse.MakeScope.Var('more_children_willingness').GetValue|0]#!"
 fea_cost_5: "#N Modification Fëa : -5#!"
 fea_cost_10: "#N Modification Fëa : -10#!"
 fea_cost_15: "#N Modification Fëa : -15#!"

 elven_racial.0001.t: "Deux âmes unies"
 elven_racial.0001.desc: "[ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] et moi avons pris la décision sacrée de concevoir un enfant. La période d'éducation d'un enfançon compte parmi les périodes les plus béatifiques de l'existence d'un Elfe en Arda, et nous sentons que l'heure est venue. Comme nos âmes furent liées en une seule par le mariage, maintenant nos corps ne font qu'un également, et notre amour se manifeste dans notre descendance."
 elven_racial.0001.a: "Enveloppons-nous dans la splendeur de l'amour !"
 
 elven_racial.0002.t: "Une nouvelle vie"
 elven_racial.0002.desc: "Une nouvelle vie a été créée par [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] et moi. C'est un don précieux, encore fragile et se développant dans le sein maternel. Nous devrons prendre grand soin et nourrir notre enfant avec bienveillance, le soutenant et le nourrissant de notre propre fëa, jusqu'à ce que vienne l'heure de sa naissance."
 elven_racial.0002.a: "Puisse son fëa croître en force !"
 
 elven_racial.0003.t: "Concentrer notre Fëa (1)"
 elven_racial.0003.desc: "Notre enfant grandit, mais avec un effort plus grand, il pourrait croître plus fort encore. Devrions-nous nous consacrer plus entièrement à la tâche de le nourrir ?"
 elven_racial.0003.a: "Nous pouvons toujours faire davantage !"
 elven_racial.0003.b: "Notre enfant possède toute la substance dont il a besoin."
 
 elven_racial.0004.t: "Concentrer notre Fëa (2)"
 elven_racial.0004.desc: "Notre enfant grandit, mais avec un effort encore plus grand, il pourrait croître plus fort. Devrions-nous nous consacrer plus entièrement à la tâche de le nourrir ?"
 elven_racial.0004.a: "Nous pouvons toujours faire davantage !"
 elven_racial.0004.b: "Notre enfant possède toute la substance dont il a besoin."
 
 elven_racial.0005.t: "Concentrer notre Fëa (3)"
 elven_racial.0005.desc: "Notre enfant grandit, mais avec un effort plus grand encore, il pourrait croître plus fort. Devrions-nous nous consacrer plus entièrement à la tâche de le nourrir ?"
 elven_racial.0005.a: "Nous pouvons toujours faire davantage !"
 elven_racial.0005.b: "Notre enfant possède toute la substance dont il a besoin."
 
 elven_racial.0006.t: "Un Enfant naît"
 elven_racial.0006.desc: "Tandis que je berce notre nouveau-né dans mes bras, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] se blottit contre moi et sourit d'une joie pure.\n\n\"Comment le nommerons-nous ?\"\n\nLe nom que j'avais toujours à l'esprit était [child.GetFirstNameNoTooltip]... Mais maintenant que je le vois, ce nom convient-il encore ?"
 elven_racial.0006.a: "Un nom magnifique !"
 
 elven_racial.0007.t: "Jumeaux"
 elven_racial.0007.desc: "À ma joyeuse surprise, nous avons été bénis de deux vies plutôt qu'une ! Tandis que je berce nos nouveau-nés dans mes bras, [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] se blottit contre moi et sourit d'une joie pure.\n\n\"Comment les nommerons-nous ?\"\n\nBonne question ! Quels noms me semblent les plus appropriés ?"
 elven_racial.0007.a: "Vraiment une bénédiction de [ROOT.Char.GetFaith.HighGodName] !"
 
 elven_racial.0008.t: "Une Famille accomplie"
 elven_racial.0008.desc: "Tandis que je tiens mon nouveau-né dans mes bras, mon très cher [ROOT.Char.GetPrimarySpouse.GetFirstNameNoTooltip] enroule son bras autour de moi dans une étreinte chaleureuse.\n\n\"Notre famille est accomplie, ne penses-tu pas, mon amour ?\""
 elven_racial.0008.a: "Je ne saurais demander davantage."

### Maintenance ###

 elven_racial.0102.t: "Les Elfes Immortels"
 elven_racial.0102.desc: "Les [elves|E] ont demeuré en [middleearth|E] durant maints âges, depuis qu'ils s'éveillèrent près des eaux claires de [cuivienen|E]. De puissantes victoires aux défaites vaillantes, les fortunes des Premiers-Nés ont crû et décliné tandis que passaient les âges du monde.\n\nTiens, je m'en souviens si clairement, comme si c'était hier - mes premières années durant..."
 elven_racial.0102.a: "...l'ère du déclin, le [thirdage|E]."
 elven_racial.0102.a.tt: "Votre âge se situe entre 120 et 3000 ans."
 elven_racial.0102.b: "...le long été du [secondage|E]."
 elven_racial.0102.b.tt: "Votre âge se situe entre 3000 et 6440 ans."
 elven_racial.0102.c: "...la haute bravoure du [firstage|E]."
 elven_racial.0102.c.tt: "Votre âge se situe entre 6440 et 7030 ans."
 elven_racial.0102.d: "...la lumière stellaire avant le lever du Soleil, les [yearofthetreesage|E]."
 elven_racial.0102.d.tt: "Votre âge est défini à 7031 ans"
 elven_racial.0102.e: "Je ne devrais pas me montrer si prétentieux, à [ROOT.Char.GetAge] ans je ne suis pratiquement qu'un bambin encore !"
 elven_racial.0102.e.tt: "Votre âge demeure celui défini dans le créateur de souverain"

### CBs ###

 elven_racial.0200.t: "La Fureur des Elfes"
 elven_racial.0200.desc: "Descendant de leurs halls cachés et altiers, les [elves|E] sous [attacker.GetFirstNameNoTooltip] marchent maintenant sur nous, désirant éliminer ce qu'ils perçoivent comme une menace sinistre. C'est principalement notre foi, [ROOT.Char.GetFaith.GetName] qui les dresse contre nous, car ils y perçoivent l'adoration de leurs plus anciens ennemis.\n\nSi nous nous repentions sincèrement et rejetions la foi de [ROOT.Char.GetFaith.GetName], alors ils montreraient assurément clémence et miséricorde. Naturellement, une telle trahison de la foi provoquerait sûrement la colère de nombreuses personnes..."
 elven_racial.0200.a: "Nous ne suivrons plus les voies sombres de [ROOT.Char.GetFaith.GetName] !"
 elven_racial.0200.toast.t: "[defender.GetFirstNameNoTooltip] Cède"
 elven_racial.0200.b: "Que les immortels viennent connaître la mort, alors."
 
 elven_racial.0201.t: "Une Guerre de convictions"
 elven_racial.0201.desc: "Un messager arrive à ma cour, porteur de nouvelles funestes. Une bande d'aventuriers errants, menée par [attacker.GetName], a rassemblé ses guerriers, prêts à marcher contre mon royaume même ! C'est principalement notre foi, [ROOT.Char.GetFaith.GetName] qui les dresse contre nous, car ils y perçoivent une dangereuse adoration des ténèbres et de la malice.\n\nSi nous nous repentions sincèrement et rejetions la foi de [ROOT.Char.GetFaith.GetName], alors ils montreraient assurément clémence et miséricorde. Naturellement, une telle trahison de la foi provoquerait sûrement la colère de nombreuses personnes..."
 elven_racial.0201.a: "Nous ne suivrons plus les voies sombres de [ROOT.Char.GetFaith.GetName] !"
 elven_racial.0201.toast.t: "[defender.GetFirstNameNoTooltip] Cède"
 elven_racial.0201.b: "Que ces 'aventuriers' viennent connaître la mort, alors."

 elven_racial.0202.t: "Le Renversement du flot"
 elven_racial.0202.desc: "Mon chancelier, [elven_chancellor.GetName] m'est venu avec un message..."
 elven_racial.0202.a: "L'heure est venue de retourner en [renewal_title.GetNameNoTier]."
 elven_racial.0202.b: "Que d'autres portent ce fardeau."

### Schemes ###

 elven_racial.0300.t: "Éconduit"
 elven_racial.0300.desc: "[target.GetName] m'a rejeté."
 elven_racial.0300.a: "Les Elfes restent entre eux..."
 
### Introduction ###

 elven_racial.0500.t: "La Grâce des Premiers-Nés"
 elven_racial.0500.desc: "Je naquis parmi les enfants aînés d'Eru, les immortels [elves|E]. En tant que tel, je ne suis point soumis aux vicissitudes des mortels.\n\nNous ne souffrons point de maladies ou de vieillesse et ne pouvons mourir que de blessures graves ou d'une terrible affliction de l'âme.\n\nNous ne nous [Concept('marry', 'marions')|E] que par amour et croyons que le fëa des [soulmates|El] s'entremêle dans ce processus sacré. Pour nous, avoir un enfant est une [decision|El] consciente, et nous n'en élèverons qu'un à la fois jusqu'à ce qu'il atteigne sa [majority|El] à l'âge de 50 ans.\n\nAucun de notre peuple n'a épousé un enfant des [conceptracemen|E] depuis les héros légendaires des Edain, au [firstage|E], et nul ne le fera à nouveau à moins qu'[eru|E] ne l'ordonne.\n\nNous régnons depuis nos [elven_refuges|E], et rarement nos armées quittent-elles nos demeures, si ce n'est pour reconquérir nos terres envahies, assister un voisin assailli par les forces du Mal, ou purifier les terres des adorateurs du [darklord|E]."
 elven_racial.0500.a: "[Glossary('Mae govannen','mae_govannen_gloss')]."

# Widowhood
 elven_racial.0700.t: "Séparés par la Mort"
 elven_racial.0700.desc: "Contre toute attente, mon époux [dead_character.GetFirstNameNoTooltip] est mort et s[dead_character.Custom('FR_OnA')] esprit a fui s[dead_character.Custom('FR_OnA')] corps.\n\nParmi les [eldar|E], le mariage n'est pas seulement union des [Glossary('hröa','hroa_gloss')] mais aussi de l'immortel [Glossary('fëa','fea_gloss')], une fusion du corps et de l'âme pour l'éternité. Nous espérons aussi qu'un jour nous nous retrouverons en [valinor|E], quand notre séjour dans les [hallsofmandos|E] sera achevé.\n\nAinsi, les [eldar|E] ne se remarient point, et lorsque cette règle fut brisée une unique fois #E [Concept('feanor','ce qui suivit')]#! fut chargé de douleur." #TODO - Add Statue of Finwe and Miriel concept for here
 elven_racial.0700.a: "Adieu [dead_character.GetFirstNameNoTooltip], nous nous reverrons un jour !"

### Sailing West ###

 elven_racial.1000.t: "La Route de l'Ouest"
 elven_racial.1000.a.desc: "Durant de nombreuses années j'ai demeuré sur ce rivage-ci, et les feuilles ont crû comme les années qui se ramifient. Pourtant il y a toujours eu une inquiétude en mon cœur, un désir inassouvi pour ma demeure lointaine à l'Ouest. Maintenant enfin l'heure est venue d'agir selon ce désir, quittant les chagrins et souvenirs de la [middleearth|E] pour la promesse de [valinor|E].\n\n"
 elven_racial.1000.cirdan.desc: "Longtemps j'ai veillé sur les Havres Gris, mais enfin ma garde s'achève, et je suis libre de partir sur le Dernier Navire."
 elven_racial.1000.amroth.desc: "Longtemps j'ai veillé sur ce havre des [elves|E], et envoyé maints navires sur les eaux. Maintenant du moins mon propre temps est venu de partir moi-même et naviguer vers l'ouest depuis le Havre de Cobas."
 elven_racial.1000.edhellond.desc: "Au sud se trouve Edhellond, havre des Sindar sur les côtes du Gondor. Là sur la Baie de Belfalas je pourrais acquérir un navire pour me porter par-delà la mer."
 elven_racial.1000.mithlond.desc: "Je pourrais aller encore vers l'ouest jusqu'aux Havres Gris, dans la terre du Lindon longuement gardée. Là demeure Círdan le Charpentier de Nefs, les gardant jusqu'à ce que le Dernier Navire appareille."
 elven_racial.1000.coast.desc: "À l'écart de tout havre proche ou lointain, je pourrais aller à la côte par moi-même en contemplation silencieuse, pour construire mon propre navire avant de naviguer vers l'ouest."
 elven_racial.1000.b.desc: "Vers la mer je vais, chercher l'Ouest, et champs et montagnes à jamais bénis. J'entends l'appel, et long voyage s'étend devant moi."
 elven_racial.1000.a: "Je me dirigerai vers [GetTitleByKey('c_mithrhulond').GetNameNoTier]"
 elven_racial.1000.b: "Je me dirigerai vers [GetTitleByKey('c_edhellond').GetNameNoTier]"
 elven_racial.1000.c: "Je construirai mon propre navire"
 elven_racial.1000.a.tt: "Vous commencez à voyager vers [GetTitleByKey('c_mithrhulond').GetNameNoTier]"
 elven_racial.1000.b.tt: "Vous commencez à voyager vers [GetTitleByKey('c_edhellond').GetNameNoTier]"
 elven_racial.1000.c.tt: "Vous commencez à voyager vers [sailing_point.GetName]"

 elven_racial.1001.t: "Les Havres"
 elven_racial.1001.desc: "Bien que beaucoup de mon peuple naviguent vers l'ouest depuis l'un de nos havres, tous ne partent pas d'un port établi. Par chance ou par choix je suis parvenu au rivage, et ici j'ai construit mon propre navire.\n\n C'est un vaisseau simple, mais suffisant pour chevaucher les mers amicales sur la Voie Droite. L'ouvrage est achevé, et tandis que je procède aux vérifications finales je sens plus que jamais l'appel des sirènes des vagues.\n\n"
 elven_racial.1001.cirdan.desc: "Enfin, mon labeur s'achève. Longtemps j'ai veillé sur ce havre, demeurant près des rivages gris jusqu'à ce que le Dernier Navire appareille. Mon service s'est finalement conclu, et je suis en paix : libre de naviguer vers l'ouest, libre de quitter ce havre, et sur les vagues une dernière fois. [middleearth|E] n'a plus besoin de moi, et je puis accomplir mon plus grand désir."
 elven_racial.1001.amroth.desc: "Longtemps j'ai demeuré près de la mer, gardant ce havre silencieux. Ce fut un temps fructueux, et je chéris les relations que j'ai bâties avec ceux qui sont passés par ce havre. Fructueux aussi fut mon partenariat avec les [dunedain|E] du [gondor|E], et je sais que je laisse ce site en mains dignes de confiance. Pourtant enfin l'heure est venue de partir enfin, et laisser ce havre vide et silencieux, naviguant vers l'Ouest pour de meilleurs havres encore."
 elven_racial.1001.edhellond.desc: "Je suis venu à Edhellond, le havre des Sindar. Fondé par les Falathrim fuyant le sac de Brithombar et Eglarest, il a longtemps fourni un havre sûr dans les terres méridionales.\n\nPlus silencieux que Mithlond, Edhellond est presque plus refuge que port, avec maints elfes choisissant de vivre ici des années après avoir d'abord cherché la mer. Mon chemin me mène au-delà de la cité presque silencieuse vers le front de mer, où un petit navire blanc git à l'ancre prêt à me conduire par-delà la mer."
 elven_racial.1001.mithlond.desc: "Comme je viens aux havres, [guide.GetName] s'avance pour me saluer. Fort grand il est, sa barbe est longue, et il est gris et vieux, sauf que ses yeux sont vifs comme les étoiles. Il nous regarde et s'incline, nous menant dans les havres. Là gît un navire blanc sur le quai, approvisionné et préparé pour notre voyage vers l'ouest."
 elven_racial.1001.a: "Tout est maintenant prêt"

 elven_racial.1002.t: "La Voie Droite"
 elven_racial.1002.desc: "Enfin je monte à bord, et les voiles sont hissées, et le vent souffle, et lentement le navire glisse sur le long gué gris d'abord. Et le navire va dans la Haute Mer et passe vers l'Ouest, jusqu'à ce qu'enfin, par une nuit de pluie, je sente un doux parfum dans l'air et entende le son du chant venant par-dessus l'eau.\n\nEt alors il semble que le rideau de pluie grise se change tout en verre argenté et se retire, et je contemple des rivages blancs, et au-delà d'eux un pays vert lointain sous un lever de soleil rapide."
 elven_racial.1002.a: "Enfin !"
 sail_to_valinor: "Vous arrivez en [valinor|E]"

 elven_racial.1003.t: "Adieu, Amis"
 elven_racial.1003.desc: "Tandis que je me prépare à partir vers l'ouest, mon héritier [sad_heir.GetName] vient me voir partir. [sad_heir.Custom('FR_IlElle')|U] peut à peine contenir son chagrin tandis que je pars, mais nous savons que cette séparation, si douce-amère soit-elle, n'est pas éternelle. [sad_heir.Custom('FR_LuiElle')|U] aussi prendra un jour la Voie Droite vers l'ouest pour me rejoindre en [valinor|E].\n\nJe tourne le dos à ce qui fut ma demeure durant de nombreux yéni, et regarde au loin ma demeure lointaine par-delà la mer. Le désir-de-mer s'élève en moi, et je suis prêt à partir immédiatement."
 elven_racial.1003.a: "Adieu, amis ! J'entends l'appel."
 elven_racial.1003.b: "J'ai encore trop à accomplir !"
 elven_racial.1003.b.tt: "Vous retournez chez vous"

 elven_racial.1004.t: "[elf_trying_to_depart.GetFirstName] : L'Appel de la Mer"
 elven_racial.1004.desc: "De troublantes nouvelles me parviennent concernant les projets de [elf_trying_to_depart.GetName] de faire voile vers les Terres immortelles de [valinor|E]. Si tous les [elves|E] sont libres de gagner les havens quand ils se lassent de la [middleearth|E], chaque elfe qui quitte ces rivages amoindrit la force de notre peuple qui s'attarde encore ici et ose défier les ténèbres.\n\nDevrais-je tenter de dissuader [elf_trying_to_depart.GetFirstName] de ce voyage et de convaincre [elf_trying_to_depart.Custom('FR_LuiElle')] de rester ?"
 elven_racial.1004.a: "Il est encore de l'espoir en [middleearth|E]. Reste, [elf_trying_to_depart.GetFirstName]."
 elven_racial.1004.b: "Ta lassitude sera guérie dans l'Ouest béni."
 elven_racial.1004.a.tt.success: "Vos paroles sont convaincantes"
 
 ### Wander the Forests ###
 
 elven_racial.1201.t: "Errer dans les forêts : Le Départ"
 elven_racial.1201.desc: "L'appel de la forêt me fait signe, et avec une petite suite à mes côtés, je pars vers les profondeurs boisées de [destiny_forest_province.GetName]. Les arbres altiers se dressent comme d'antiques sentinelles, leurs feuilles bruissant doucement dans le vent comme partageant leur sagesse intemporelle.\n\nTandis que nous cheminons, le monde autour de nous s'apaise, et un calme serein emplit l'air. Nulle hâte, nul fardeau, seulement la tranquille compagnie de la nature et le silencieux réconfort trouvé dans son étreinte."
 elven_racial.1201.a: "Partons."
 elven_racial.1201.a.tt: "Vous voyagerez vers les bois de [destiny_forest_province.GetName]"
 
 elven_racial.1210.t: "Errer dans les forêts : Un Cerf Blessé"
 elven_racial.1210.desc: "Tandis que nous nous aventurons à travers les bois de [destiny_forest_province.GetName], nous tombons sur un cerf blessé, sa stature jadis fière maintenant effondrée sur le sol forestier. La créature gît dans l'agonie, son souffle peu profond et laborieux, la douleur évidente dans chaque contraction de son corps. Ses yeux, bien que voilés de souffrance, gardent une force silencieuse, comme résistant à l'inévitable.\n\nLa forêt semble pleurer avec lui, l'air lourd et immobile, tandis que la lutte de la vie et de la mort se déroule devant nous."
 elven_racial.1210.a: "Hélas ! Toutes choses chères passeront."
 elven_racial.1210.b: "Je dois tenter de le guérir."
 
 elven_racial.1211.t: "Errer dans les forêts : Lumière Stellaire sous les Rameaux"
 elven_racial.1211.desc: "Tandis que j'erre dans les forêts antiques de [destiny_forest_province.GetName], le murmure des feuilles semble parler dans une langue plus ancienne que le temps lui-même. Au-dessus, les étoiles percent la canopée comme les yeux des Valar, leur lumière filtrant à travers les branches pour me toucher, fraîche et sereine.\n\nChaque rayon se ressent comme une bénédiction d'Elbereth elle-même, un silencieux rappel que même dans les ombres les plus profondes, la lumière des étoiles guidera et protégera. En cet instant, je me sens à la fois petit et infini, partie de quelque chose d'éternel."
 elven_racial.1211.a: "En sécurité je suis sous les lumières d'Elbereth."
 elven_racial.1211.b: "Quelle sagesse révèlent nos chères étoiles ?"
 
 elven_racial.1212.t: "Errer dans les forêts : La Jeune Pousse"
 elven_racial.1212.desc: "Dans un coin sombre et morne de la forêt de [destiny_forest_province.GetName], où les arbres se dressent hauts et épais, projetant de longues ombres sur le sol, un seul rayon de lumière perce la canopée au-dessus. Il illumine une jeune pousse, ses tendres feuilles tremblant dans la douce brise.\n\nPour un bref instant, la morosité environnante est repoussée, comme si le cœur même de la forêt retenait son souffle en révérence. La pousse se dresse comme un symbole de la résilience de la vie, une lueur d'espoir parmi les arbres anciens et durables."
 elven_racial.1212.a: "Même dans les parties les plus mornes de la forêt, la vie prospère."
 elven_racial.1212.b: "Je prendrai soin de ce jeune être moi-même."

 elven_racial.1213.t: "Errer dans les forêts : Aperçu d'un Plumage Rare"
 elven_racial.1213.desc: "Dans une clairière silencieuse de la forêt de [destiny_forest_province.GetName], un oiseau rare volette, son plumage brillant une merveille fugace parmi les arbres anciens. Son chant est doux mais clair, un son rarement entendu même par ceux qui connaissent bien les bois. Pour un bref instant, tous les soucis du monde semblent s'élever, emportés sur le vol délicat de l'oiseau.\n\nUne telle vision est souvent prise comme un bon présage, un rappel que beauté et espoir perdurent même dans les plus anciens des lieux."
 elven_racial.1213.a: "Même les forêts les plus anciennes recèlent de nouvelles promesses."
 elven_racial.1213.b: "Un signe de beaux jours encore à venir."

 elven_racial.1214.t: "Errer dans les forêts : Réjouissances Enivrées"
 elven_racial.1214.desc: "Tandis que je chemine à travers les bois sereins de [destiny_forest_province.GetName], les rires de mes semblables atteignent mes oreilles bien avant que je ne les voie. Un groupe d'Elfes, leurs pas chancelants et leurs visages empourprés, titubent à travers les arbres, chantant des mélodies liliales, loin de leur composition habituelle.\n\nL'air autour d'eux est épais du parfum du vin et de la joie insouciante. Ils me saluent avec de larges sourires, m'offrant une coupe, m'exhortant à rejoindre leurs réjouissances."
 elven_racial.1214.a: "Je me joindrai aux festivités."
 elven_racial.1214.b: "Ce n'est point ainsi qu'un Elfe devrait se comporter."
 
 elven_racial.1215.t: "Errer dans les forêts : Réconfort de Varda"
 elven_racial.1215.desc: "Tandis que ma suite et moi passons silencieusement à travers les clairières et prairies paisibles de [destiny_forest_province.GetName], je me trouve levant les yeux vers le ciel plus souvent qu'il ne m'est habituel. La nuit est tombée, et au-delà de la canopée verte au-dessus, les lumières les plus chères connues des [elves|E] sont apparues : les étoiles de [vardacharacter|E].\n\nJe demeure silencieux. Mes chagrins toujours présents se relâchent un moment tandis que la lumière stellaire brille sur mon visage.\n\n\"Après tout ce qui s'est passé, je suis encore ici,\" réalisé-je. \"Et je puis encore avoir un rôle à jouer en ce monde.\""
 elven_racial.1215.a: "Tant que les étoiles brillent encore, j'endurerai."
 elven_racial.1215.b: "Je... je comprends maintenant... je dois forger une nouvelle voie."
 
 elven_racial.1216.t: "Errer dans les forêts : Un Festin dans les Bois"
 elven_racial.1216.desc: "La lumière filtre à travers la haute canopée d'émeraude de [destiny_forest_province.GetName], et de puissantes branches oscillent dans la brise, sur laquelle se porte le chant des oiseaux. Les troncs élevés semblent s'incliner à notre venue. Je prends une profonde inspiration, et l'air semble digne du Taniquetil.\n\n\"Apportez les tables !\"\n\nAvec diligence mes serviteurs apportent les tables et les dressent dans le verre vert, et puis vient la nourriture.\n\nFruits, mûrs et charnus, vibrants comme des joyaux ; champignons drapés de sauce savoureuse ; pain frais et aromatique ; assiettées de légumes succulents et savoureux ; et bols d'argent emplis d'une sorte de ragoût orange fumant."
 elven_racial.1216.a: "J'ai grand faim."
 elven_racial.1216.a.tt: "Vous tenez un banquet dans les bois de [destiny_forest_province.GetName]"

 elven_racial.1217.t: "Errer dans les forêts : Allégresse Partout"
 elven_racial.1217.desc: "Nous festoyons sous le ciel azur en [destiny_forest_province.GetName], les rameaux des arbres nous jetant dans une ombre fraîche. Le trille des cigales accompagne notre allégresse.\n\nLa nourriture est presque aussi bonne que les environs. Nous mangeons copieusement, buvons du vin frais, et nous réjouissons. Le pain est tendre mais croustillant, arrosé d'huile ; les champignons et légumes sont succulents et d'une saveur éblouissante ; le ragoût est nourrissant et fumé ; et les fruits sont doux comme l'été.\n\nBientôt tout ce qui reste, ce sont miettes et restes. La compagnie est joyeuse, si un peu léthargique, et je m'adosse et écoute le chant des oiseaux. La vraie béatitude est un ventre plein."
 elven_racial.1217.a: "Un rassemblement joyeux en vérité !"
 
 elven_racial.1218.t: "Errer dans les forêts : Un Banquet Perturbé"
 elven_racial.1218.desc: "Nous festoyons sous le ciel azur en [destiny_forest_province.GetName], les rameaux des arbres nous jetant dans une ombre fraîche. Le trille des cigales accompagne notre allégresse. Et juste comme je sens une sensation de grande relaxation m'envahir, une voix rude interrompt l'allégresse.\n\n\"D-désolé, bonnes gens, mais, nous nous sommes perdus dans cette forêt, et... nous avons faim et avons perdu notre chemin,\" dit [uninvited_traveler.GetName], menant un petit groupe d'hommes en haillons droit dans notre clairière festive.\n\nLes Elfes tout autour halètent de choc. En quelques secondes, tous les yeux se tournent vers moi, attendant une décision de ma part. Devrions-nous permettre cette intrusion ? Ou laisser ces intrus derrière ?"
 elven_racial.1218.a: "Éteignez les lumières et retirons-nous de ce lieu."
 elven_racial.1218.b: "Très bien... ils peuvent partager notre allégresse."
 
 elven_racial.1219.t: "Errer dans la forêt : Ennemis Maudits"
 elven_racial.1219.desc: "Ayant pénétré dans les bois de [destiny_forest_province.GetName], il ne faut pas longtemps à ma suite pour trouver des traces troublantes. Les sous-bois ont été piétinés par des pieds chaussés de fer, et quelques arbres ont été abattus.\n\n\"Maudite soit leur soif immonde de destruction !!\" m'exclamé-je, tandis qu'un cri d'alarme retentit de l'avant. Les profanateurs de la forêt ont été repérés : une bande errante d'[orcs|E]. Mes suivants me regardent, attendant une décision rapide sur ce qu'il faut faire..."
 elven_racial.1219.a: "Aux armes ! N'en laissez aucun vivant !"
 elven_racial.1219.a.success: "Vous massacrez les orques"
 elven_racial.1219.a.failure: "Vous êtes blessé dans les combats"
 elven_racial.1219.b: "Nous devons fuir !"
 elven_racial.1215.c: "Que l'[hope|El] renaisse sous la beauté des lumières d’Elbereth."

 elven_racial.1220.t: "Errer dans la forêt : Un Espoir Ranimé"
 elven_racial.1220.desc: "Ma suite et moi avons suivi les sentiers forestiers de [destiny_forest_province.GetName] depuis quelque temps maintenant, et j'ai remarqué une certaine atmosphère de morosité éclipsant toute allégresse et chant. Demandant une courte halte dans une clairière isolée, je me tourne pour m'adresser aux [elves|E] présents.\n\nSi je dois les inspirer et restaurer l'espoir dans leurs cœurs, je dois choisir mes mots avec soin. D'autre part, je pourrais dire des mots rassurants à chacun d'eux, accroissant ma position auprès d'eux."
 elven_racial.1220.a: "Je restaurerai l'espoir aux abattus."
 elven_racial.1220.b: "Je dirai des mots d'encouragement à mes serviteurs."

 elven_racial.1221.t: "Errer dans la forêt : Un Moment Paisible"
 elven_racial.1221.desc: "Ce fut une merveilleuse promenade à travers les forêts vibrantes de [destiny_forest_province.GetName]. Marchant près d'[elven_spouse.GetFirstName], mon cher compagnon, je réalise combien j'apprécie sa compagnie.\n\nJe ralentis mon pas, permettant à notre suite de nous dépasser jusqu'à ce que nous deux seulement demeurions. Regardant profondément dans les yeux d'[elven_spouse.GetFirstName], je puis voir l'amour que j'ai pour [elven_spouse.Custom('FR_LuiElle')] se refléter à l'intérieur.\n\nDoucement je l'étreins et nous demeurons en silence un moment, trouvant réconfort dans la compagnie l'un de l'autre."
 elven_racial.1221.a: "C'est une nuit spéciale, mon cher, ne penses-tu pas ?"
 elven_racial.1221.b: "Parlons, toi et moi, comme nous le faisions en nos jeunes jours."

 elven_racial.1222.t: "Errer dans la forêt : Galant comme les Seigneurs-Elfes"
 elven_racial.1222.desc: "Tandis que nous traversons les bois tranquilles de [destiny_forest_province.GetName], nous arrivons dans une petite clairière sous la lumière du soleil chaud de midi. Ma suite commence à s'installer pour une petite pause de notre errance, mais je me sens agité et incapable de m'asseoir.\n\nMon [marshal|El], [elven_marshal.GetName], s'approche de moi. \"Mon seigneur, un peu d'exercice apaiserait-il vos pensées troublées ?\" suggère-t-[elven_marshal.GetSheHe], m'offrant une lame."
 elven_racial.1222.a: "J'ai toujours aimé combattre sous les arbres."
 elven_racial.1222.b: "Très bien alors. Préparez-vous !"
 elven_racial.1222.c: "Apprenons l’art du voile et de la dissimulation."

 elven_racial.1223.t: "Un Murmure sur le Vent"
 elven_racial.1223.desc: "Tandis que la lumière tachetée filtre à travers la canopée d'émeraude au-dessus, une douce brise agite les feuilles. Puis j'entends une voix appelant mon nom, faible, mélodique, et indubitablement claire. Elle dérive entre les arbres comme un rêve à demi remémoré, me faisant signe depuis les profondeurs de la forêt.\n\nC'est fort inhabituel. Quelle pourrait être la source de cette voix ? Tandis que je me tourne vers elle, je vois [chaplain.GetName] m'observer avec une expression désapprobatrice..."
 elven_racial.1223.a: "Je suivrai cette voix. Peut-être est-ce un message..."
 elven_racial.1223.b: "Ce n'est point lieu pour chasser les fantômes. Restons sur le sentier !"
 
 elven_racial.1224.t: "Échos d'un Âge perdu depuis longtemps"
 elven_racial.1224.desc: "Notre sentier nous mène devant une ruine antique. Couverte de mousse et de lierre, les pierres que nous avons rencontrées parlent de leur passé illustre. Le style est indubitablement Elfique : délicat, élégant, et d'une beauté à fendre le cœur.\n\nJe trace de mes doigts des gravures effacées, leurs significations obscurcies par le temps. D'antiques colonnes gisent brisées parmi les racines, et des statues érodées regardent silencieusement à travers les sous-bois enchevêtrés. On dit que maints de ces lieux furent abandonnés quand les Premiers-Nés se retirèrent vers l'Ouest.\n\nPeut-être fut-ce jadis une salle de musique, ou un sanctuaire de tradition. Me tenant parmi sa grâce qui s'effrite, je puis presque entendre des voix dans le vent, chantant, riant, pleurant."
 elven_racial.1224.a: "Ces vieilles pierres... il y a encore de la sagesse ici."
 elven_racial.1224.b: "Que leur mémoire perdure au-delà de la pierre."
 elven_racial.1224.c: "Que la forêt reconquière ce dont elle se souvient."
 
 elven_racial.1225.t: "Errer dans la forêt : Un Tournant"
 elven_racial.1225.desc: "Au fur et à mesure que nos errances nous entraînent toujours plus loin dans les forêts de [destiny_forest_province.GetName], je me sens peu à peu dériver à l'arrière, perdu dans mes pensées.\n\nLes [elves|E] de la [middleearth|E] sont menacés par la [Concept('longlongdefeat','Long Defeat')|E], et par les Ombres qui croissent tandis que notre propre puissance commence à décliner. Et à chaque saison qui passe, davantage de Premiers-Nés font voile vers l'Ouest, vers les havens, pour ne plus jamais fouler ces rivages.\n\nSerait-il temps de changer de cap ? Serait-ce à moi de renverser ce destin ?"
 elven_racial.1225.a: "Je me battrai pour tout Elvendom."
 elven_racial.1225.b: "Non. Je suis ce que je suis. Et cela suffit."
 
 elven_racial.1226.t: "Errer dans la forêt : Des Vivres égarés"
 elven_racial.1226.desc: "Au plus profond des forêts denses de [destiny_forest_province.GetName], mon escorte tombe sur une cache de caisses, emplies de provisions laissées là par les voyageurs et les coureurs qui sillonnent parfois ces terres. Les denrées se gâteront d'ici quelques semaines, et il ne semble guère probable que quiconque vienne les récupérer.\n\nCe serait assurément du gaspillage que de laisser ces réserves enfouies dans les bois, mais que faire d'elles ?"
 elven_racial.1226.a: "Les vendre au village le plus proche."
 elven_racial.1226.b: "Veiller à ce qu'elles soient mises à bon usage."

 elven_racial.1227.t: "Errer dans la forêt : Une Topaze dans la mousse"
 elven_racial.1227.desc: "Mon escorte et moi errons dans les forêts de [destiny_forest_province.GetName], le murmure d'un ruisseau proche porté par la brise. La lumière filtre à travers la canopée, et sous nos pas la terre brune cède à la mousse verte. Du coin de l'œil, j'aperçois un éclair jaune et me retourne.\n\nPerchée sur un tronc se tient une salamandre de belle taille, longue à peu près comme ma main, mouchetée de jaune et de noir. Je m'en approche et elle me regarde de ses yeux bruns aux larges pupilles noires. Sa peau est satinée, son cou court, sa queue épaisse et longue. Je vois son minuscule corps se soulever à chaque souffle."
 elven_racial.1227.a: "Quelle charmante créature !"
 elven_racial.1227.b: "Ramenons-la, je voudrais l'étudier."

 elven_racial.1228.t: "Errer dans la forêt : Un Chœur du matin"
 elven_racial.1228.desc: "L'aube se lève sur [destiny_forest_province.GetName], et les arbres se balancent dans la brise matinale. Des rais de lumière dorée percent la canopée comme des aiguilles d'or, et l'air est frais. Mon escorte et moi faisons halte au bord d'un mince ruisseau, et en quelques instants, nous sommes accueillis d'un concert tout particulier.\n\nDes oiseaux de toutes sortes chantent pour saluer l'aube, et ce sont cent mélodies à la fois, chacune plus douce que la précédente. Il y a les sifflements des rouges-gorges et les mélodies turbulentes des étourneaux ; des trilles, des gazouillis et des cris aigus se mêlent ; c'est une véritable cacophonie. Quel chant pourrait être plus beau ?"
 elven_racial.1228.a: "Profitons de l'instant et reposons-nous."
 elven_racial.1228.b: "Combien de ces appels saurais-je reconnaître, je me demande ?"

 elven_racial.1229.t: "Errer dans la forêt : Un Étrange visiteur"
 elven_racial.1229.desc: "À l'errance dans [destiny_forest_province.GetName], tout est comme à l'ordinaire : la brise souffle, l'herbe est douce, les arbres se balancent avec douceur, et les oiseaux chantent dans la canopée. #italic Attendez#!. Je m'immobilise soudain. Un cri inconnu vient de résonner, et mes yeux scrutent les arbres.\n\nIl ne faut guère de temps pour en repérer la source, qui se dissimule fort mal. C'est un oiseau comme je n'en ai jamais vu, si ce n'est peut-être dans des ouvrages lointains : il porte un bec immense et vivace, peint de rouge, de vert, d'orange et de bleu, plus grand encore que sa tête ; le reste de son visage et de sa gorge est jaune ; ses pattes sont bleues ; et le reste de son corps est noir. Il nous observe, et s'approche à petits pas.\n\n« Il vient de loin, c'est certain, » dit l'un de mes compagnons, « et il est blessé, qui plus est ! Le pauvre, qui sait depuis combien de temps il n'a rien mangé ! »"
 elven_racial.1229.a: "Un bel oiseau, mais il faut laisser la nature suivre son cours."
 elven_racial.1229.b: "Au moins, donnons-lui quelque chose à manger."
 elven_racial.1229.c: "Il ne survivra jamais ici, nous devons nous en occuper nous-mêmes !"

 elven_racial.1230.t: "Errer dans la forêt : Un Renard mort"
 elven_racial.1230.desc: "Notre promenade dans les forêts de [destiny_forest_province.GetName] se déroule sans heurts, mais une brise m'apporte une faible et âcre odeur. Je la suis promptement pour en trouver la source, et au détour d'un petit tertre, je découvre un spectacle à la fois malheureux et attristant.\n\nÀ l'abri d'un arbre abattu gisent les restes d'une renarde, vieille d'une semaine peut-être. Une grande part de sa fourrure est en décomposition, les mouches bourdonnent alentour, et les vers grouillent dans sa chair. Des parties de son squelette sont visibles. Je puis seulement espérer que sa mort fut prompte, et qu'elle ne souffrit point trop longtemps."
 elven_racial.1230.a: "Ainsi va la nature."
 elven_racial.1230.b: "Offrons-lui au moins une sépulture digne."

 elven_racial.1231.t: "Errer dans la forêt : Une Source douce"
 elven_racial.1231.desc: "Il est midi lorsque nous tombons sur un ruisseau dans les forêts de [destiny_forest_province.GetName]. En portant l'eau à mes lèvres, je suis frappé par sa douceur et sa fraîcheur, et aussitôt m'envahit l'envie d'en trouver la source. Mon escorte et moi entamons alors notre remontée, enjambant maints troncs abattus et pierres couvertes de mousse, et c'est au crépuscule rosé que nous découvrons enfin l'origine du ruisseau.\n\nNichée au milieu d'un bouquet de fougères et d'arbustes, encerclée de galets et de rochers glissants, une source unique bouillonne. Sa surface s'agite tandis que l'eau sourd de la terre. Dans un éclair gris et orangé, je vois un rouge-gorge descendre s'y désaltérer."
 elven_racial.1231.a: "Que chacun goûte à ses eaux !"
 elven_racial.1231.b: "Nous ne troublerons point ce lieu serein."

 elven_racial.1232.t: "Errer dans la forêt : Repos bien mérité"
 elven_racial.1232.desc: "Entrant dans les bois de [destiny_forest_province.GetName] à l'aube, je demande à mes compagnons de poursuivre leur chemin, et que je ne ferai que me reposer un court instant. Ayant aperçu un tronc baigné de soleil, j'allai m'y asseoir, laissant la brise et le soleil caresser ma peau. Les yeux clos, j'entendis le chant des oiseaux, le frémissement des feuilles et des herbes, le murmure des ruisseaux et des sources, et les allées et venues des insectes, des serpents et des lézards sous les broussailles. Je perçus l'odeur de la pluie et l'éclosion de fleurs lointaines, portées par le vent. Je sentis ma lassitude me quitter.\n\nJ'ouvris les yeux et c'était le crépuscule. Mes compagnons étaient revenus, mais n'avaient point voulu me tirer du sommeil. Et je leur en sus gré."
 elven_racial.1232.a: "Je ne savais pas que j'avais besoin de ce repos."

 
 elven_racial.1299.t: "Errer dans la forêt : Retour à la cour"
 elven_racial.1299.desc: "Mon temps d'errance sous les arbres est arrivé à son terme. Les affaires de la cour et les obligations envers les miens attendent mon retour, et la forêt ne peut plus accaparer toute mon attention, du moins pour le moment. Il est temps de regagner ma place dans le royaume."
 elven_racial.1299.a: "Mon errance s'achève, pour l'heure."
 elven_racial.1299.a.tt: "Vous rejoignez votre capitale"

 elven_racial.1401.t: "Patrouille aux frontières : Le Départ"
 elven_racial.1401.desc: "L'aube se lève, pâle et silencieuse, tandis que je me prépare à parcourir les frontières de [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTier]. Il est courant pour les souverains [elven|E] de prendre part activement aux défenses du royaume, et je ne fais pas exception. Nulle menace ouverte ne s'est encore manifestée, et pourtant je ressens l'appel familier de la vigilance qui me pousse en avant.\n\nLa présence apaisante de mes compagnons et sentinelles s'assembiant autour de moi m'ancre dans mes pensées avant que je ne franchisse le seuil de mes halls et m'élance vers les terres sauvages. Pour nous, la vigilance est tissée dans notre être même, mémoire des âges passés, promesse de garder ce qui demeure de beauté.\n\nJe jette un dernier regard vers l'horizon tranquille, puis guide mon parti en avant. Quoi qu'il nous attende par-delà la frontière, danger ou paix, nous allons à sa rencontre avec une résolution sereine."
 elven_racial.1401.a: "Suivez-moi !"
 elven_racial.1401.a.tt: "Vous vous rendrez à [patrol_target_county.GetNameNoTier]"
 elven_racial.1401.tt_1: "[knight1.GetName] rejoint votre patrouille"
 elven_racial.1401.tt_2: "[knight2.GetName] rejoint votre patrouille"

 elven_racial.1403.t: "Patrouille aux frontières : Des Ennemis maudits"
 elven_racial.1403.desc: "Alors que notre patrouille nous conduit dans la région de [border_patrol_province.GetName], il ne faut guère de temps à mon groupe pour trouver des traces inquiétantes. Les sous-bois ont été piétinés par des pieds ferrés, et des arbres ont été abattus à la hache.\n\n« Maudite soit leur soif vile de destruction ! » je murmure, tandis qu'un cri d'alerte retentit en avant. Les intrus ont été repérés : une bande errante d'[orcs|E]. Mes chevaliers se tournent vers moi, dans l'attente d'une décision prompte..."
 
 elven_racial.1404.t: "Patrouille aux frontières : Des Maraudeurs Orques"
 elven_racial.1404.desc: "Alors que ma patrouille fouille les marches de [border_patrol_province.GetName], une odeur âcre et sans équivoque me parvient sur le vent. Je lève la main, et les gardes-marches derrière moi font silence. Les arbres murmurent de violence, leur chant effiloché par la peur, et avant même d'apercevoir les silhouettes en avant, je sais que nous ne sommes pas seuls.\n\nNous franchissons une faible crête, et les voilà : une bande d'[orcs|E] maraudeurs, assez hardis pour s'aventurer aussi près de nos terres. Ils avancent avec une brutalité délibérée, traînant leur butin, laissant derrière eux broussailles fracassées et terre foulée. Leur rire rauque blesse mon ouïe, un affront à toute oreille elfique.\n\nMa main se pose sur le pommeau de ma lame, et une résolution sereine s'installe en moi comme un manteau. C'est pour cela que nous veillons, nuit après nuit. Je respire une fois, stable et clair, et me prépare à décider comment nous allons affronter cette menace."
 elven_racial.1404.a: "[knight1.GetFirstName], frappez fort et juste."
 elven_racial.1404.b: "[knight2.GetFirstName], vous mènerez l'assaut."
 elven_racial.1404.c: "Je réglerai moi-même cette menace."
 elven_racial.1404.a.duel_success: "[knight1.GetName] défait les Orques"
 elven_racial.1404.a.duel_failure: "Vous êtes contraints de reculer"
 elven_racial.1404.b.duel_success: "[knight2.GetName] défait les Orques"
 elven_racial.1404.b.duel_failure: "Vous êtes contraints de reculer"
 elven_racial.1404.c.duel_success: "Vous défaites les Orques"
 elven_racial.1404.c.duel_failure: "Vous êtes contraints de reculer"
 elven_racial.1404.success.toast.t: "Les forces orques se dispersent"
 elven_racial.1404.failure.toast.t: "Votre charge échoue"
 
 elven_racial.1405.t: "Patrouille aux frontières : Le Village [human_villager.GetCulture.GetCollectiveNounNoTooltip]"
 elven_racial.1405.desc: "Le vent tourne alors que nous traversons [border_patrol_province.GetName], portant avec lui une faible odeur de feu de foyer et de terre labourée, un village d'[men|E] [human_villager.GetCulture.GetCollectiveNoun]. Je guide mes compagnons vers les hauteurs, et là, niché entre de bas coteaux, il repose. De minces volutes de fumée s'élèvent des cheminées ; des silhouettes se meuvent lentement parmi les champs, ignorantes de regards posés sur elles.\n\nLes terres autour de nous sont tranquilles, sans Ombre ni malveillance. Et pourtant les gardes-marches sont inquiets, craignant que notre soudaine apparition ne sème l'alarme ou n'attire une attention indésirable sur notre propre royaume. J'observe le village un moment encore. Une partie de moi se demande quelles nouvelles ces gens pourraient porter, et si notre conseil leur serait utile. Une autre partie me conseille le silence et la distance, ce vieil instinct de progresser sans être vu..."
 elven_racial.1405.a: "Je m'approcherai d'eux ouvertement, car ils n'ont rien à craindre."
 elven_racial.1405.b: "Nous observons de loin ; notre présence doit demeurer inconnue."

 elven_racial.1406.t: "Patrouille aux frontières : Le Camp ennemi"
 elven_racial.1406.desc: "Une mince colonne de fumée grasse se tord au-dessus de la canopée de [border_patrol_province.GetName], et aussitôt mes sens s'aiguisent. Au-delà d'un enchevêtrement de ronces s'étend un camp orque : abris grossiers, équipements épars, et un foyer qui couve de braises fétides. Leurs gardes paressent sans discipline, l'attention émoussée par l'oisiveté.\n\nJe fais signe de garder le silence, et mes compagnons se fondent dans les sous-bois comme le crépuscule qui tombe. De notre poste d'observation, j'observe les Orques se quereller, manger, somnoler - sans la moindre idée de la proximité de leur fin, tapie dans l'obscurité. Ils sont trop nombreux pour une attaque frontale, mais le camp lui-même est un modèle de négligence. Des cordes pendent librement, des armes traînent sans surveillance, et leurs réserves sont empilées à l'air libre, sans garde.\n\nUne certitude tranquille s'installe en moi. Il nous faut agir vite et sans bruit. La voie est claire : ce campement ne menacera plus nos frontières à l'aube."
 elven_racial.1406.a: "J'enverrai [knight1.GetName] les saboter."
 elven_racial.1406.a.duel_success: "[knight1.GetName] s'infiltre sans être détecté et sabote les réserves orques, semant le chaos dans leurs rangs"
 elven_racial.1406.a.duel_failure: "Malgré le talent de [knight1.GetName], il est repéré et s'échappe de justesse, alertant les Orques de vos intentions"
 elven_racial.1406.b: "Je confierai cette tâche à [knight2.GetName]."
 elven_racial.1406.b.duel_success: "[knight2.GetName] perturbe habilement les communications orques, semant confusion et désordre"
 elven_racial.1406.b.duel_failure: "[knight2.GetName] est repéré au cours de la tentative de sabotage, mettant votre mission en péril"
 elven_racial.1406.c: "Je mènerai moi-même la mission."
 elven_racial.1406.c.duel_success: "Vous parvenez à vous glisser entre les gardes orques et à mettre le feu à leurs réserves"
 elven_racial.1406.c.duel_failure: "Votre tentative de sabotage est remarquée, vous forçant à une retraite précipitée."
 elven_racial.1406.success.toast.t: "Le camp orque est plongé dans le chaos"
 elven_racial.1406.failure.toast.t: "Votre tentative de sabotage est déjouée"

 elven_racial.1407.t: "Patrouille aux frontières : Un Calme serein"
 elven_racial.1407.desc: "Le chemin de [border_patrol_province.GetName] nous porte à travers une étendue de terres sauvages intactes, et à chaque pas que je fais, le monde semble respirer en harmonie autour de nous. Nulle odeur de malveillance ne chevauchent le vent, nul rameau brisé ne trahit un danger tapi. Je n'entends que le doux chœur des feuilles, remué par une brise patiente.\n\nPendant un moment, on pourrait croire que les tourments du vaste monde ont été tenus à l'écart par quelque grâce invisible. Je respire profondément, laissant le silence s'installer dans mes pensées. Ce sont ces instants qui me rappellent pourquoi nous montons cette garde.\n\nNous ne cherchons pas seulement à affronter les Ombres, mais à protéger la paix fragile qui perdure en des lieux tels que celui-ci. Pour l'heure, les frontières sommeillent sans être menacées, et je reprends ma marche avec un cœur renouvelé."
 elven_racial.1407.a: "Tout va bien dans le royaume."
 
 elven_racial.1408.t: "Patrouille aux frontières : Un Troll errant"
 elven_racial.1408.desc: "Alors que ma compagnie et moi patrouillons la frontière près de [border_patrol_province.GetName], nous découvrons bientôt les traces d'un unique [troll|El] en maraude. Suivant la piste, nous trouvons promptement notre proie. Devant nous se dresse un [troll|El] des montagnes, grand et massif.\n\nLa créature n'a pas encore conscience de notre présence, mais les Trolls représentent une grave menace pour les voyageurs et les villages, et je me rappelle qu'ils se changent en pierre à la lumière du soleil.\n\nJe m'avance, résolu à affronter le Troll non par l'épée, mais par les mots. Un combat pourrait causer de graves blessures, voire la mort, mais si je puis tenir le Troll occupé par mes paroles jusqu'aux premières lueurs du jour, nul sang n'aura besoin d'être versé."
 elven_racial.1408.a: "[knight1.GetFirstName], occupez-le avec une devinette !"
 elven_racial.1408.duel_success: "Le Troll ne s'en aperçoit pas avant qu'il ne soit trop"
 elven_racial.1408.duel_failure: "Le Troll s'agite et attaque"
 elven_racial.1408.b: "[knight2.GetFirstName], demandez-lui quel est son plat préféré !"
 elven_racial.1408.c: "Je vais tenter de le distraire avec une chanson saugrenue !"
 elven_racial.1408.success.toast.t: "Le Troll s'est pétrifié"
 elven_racial.1408.failure.toast.t: "Vous ne parvenez pas à occuper le Troll assez longtemps"
 
 elven_racial.1409.t: "Patrouille aux frontières : Un Voyageur paisible"
 elven_racial.1409.desc: "Alors que nous suivons un sentier sinueux en [border_patrol_province.GetName], une silhouette solitaire se dessine en avant. Le voyageur est léger de pied, encapuchonné, et se déplace avec une grâce qu'aucun mortel ne saurait feindre. Avant même que l'errant ne s'approche davantage, je lève la main pour ralentir la patrouille.\n\nL'inconnu marque une pause à notre approche, les yeux brillants sous l'ombre du capuchon. Nulle peur dans sa posture, seulement la curiosité et une reconnaissance tranquille, comme si notre rencontre n'était qu'un fil de plus tissé dans la tapisserie de la route. Je lui adresse un bref salut, et l'errant y répond d'une légère inclination de la tête.\n\nJe ne perçois aucune Ombre entre nous, seulement la résilience silencieuse de qui a marché seul de longues lieues. Peut-être porte-t-il des nouvelles de havens lointains, peut-être voyage-t-il simplement là où la mémoire le guide. Quelle qu'en soit la raison, cette rencontre ressemble à une bénédiction bienvenue sur notre veille."
 elven_racial.1409.a: "Échangeons des nouvelles, puis reprenons notre patrouille."
 elven_racial.1409.b: "Cheminons un moment ensemble, ami. La route est plus douce en compagnie."
 
 elven_racial.1410.t: "Patrouille aux frontières : L'Ancienne Pierre de chemin"
 elven_racial.1410.desc: "Alors que nous patrouillons le long du sentier tranquille de [border_patrol_province.GetName], un éclat de pierre pâle attire mon regard sous un rideau de lierre. J'arrête la compagnie et m'approche, écartant les feuilles pour révéler une surface patinée gravée de lignes sinueuses.\n\nC'est une ancienne pierre de chemin d'art elfique, érigée ici bien avant que la plupart de ceux qui foulent aujourd'hui ces terres n'aient jamais vu le jour. La mousse s'accroche à ses runes, mais les formes demeurent familières, murmurant des routes jadis parcourues par des parents vigilants.\n\nUne douce brise agite les branches au-dessus, dispersant la lumière du soleil sur le visage de la pierre. Une résolution sereine s'installe dans mon cœur. La route peut changer, les gardes-marches peuvent passer, mais le dessein demeure. Sous le bout de mes doigts, la pierre est fraîche et immuable. Je trace les sigils à peine visibles, marqueurs de distance, de chemins sûrs, de postes de guet qui n'existent peut-être plus que dans la mémoire..."
 elven_racial.1410.a: "Je vais tenter de l'étudier."
 elven_racial.1410.a.duel_success: "Vous parvenez à trouver un sens dans les runes"
 elven_racial.1410.a.duel_failure: "Votre tentative de déchiffrer les runes échoue"
 elven_racial.1410.success.toast.t: "Découvert l'origine de la pierre de chemin"
 elven_racial.1410.failure.toast.t: "Votre patrouille reprend sa marche"
 elven_racial.1410.b: "Qu'elle continue de veiller ici, sans être troublée."
 
 elven_racial.1411.t: "Patrouille aux frontières : Village abandonné"
 elven_racial.1411.desc: "Nous émergeons de la lisière dans une clairière où un village se dressait jadis, et pourtant nulle voix ne nous accueille. Le vent agite des volets branlants et de la paille éparpillée, portant avec lui la faible odeur attardée d'un feu de foyer depuis longtemps éteint.\n\nMes compagnons échangent des regards inquiets. Même sans trouver la moindre trace, je sens que ce lieu a été déserté depuis un certain temps. Nulle trace de combat ni de fuite, seulement l'absence. Ce qui a chassé ces gens l'a fait en silence, laissant derrière lui un vide qui bourdonne dans l'air immobile.\n\nUn poids s'installe sur ma poitrine tandis que je m'arrête au cœur du village. Je baisse brièvement la tête, offrant un vœu silencieux aux âmes qui appelèrent jadis ce lieu leur demeure. Puis je rassemble ma patrouille. Que nous trouvions des réponses ou ne portions que des questions avec nous, nous ne pouvons demeurer longtemps dans cet écho de vies disparues."
 elven_racial.1411.a: "Nous devons découvrir ce qui s'est passé ici."
 elven_racial.1411.a.duel_success: "Vous trouvez la réponse"
 elven_racial.1411.success.toast.t: "Le village a été abandonné il y a des années"
 elven_racial.1411.a.duel_failure: "Vous ne parvenez pas à en discerner la raison"
 elven_racial.1411.failure.toast.t: "Un malaise se répand parmi votre compagnie"
 elven_racial.1411.b: "Nous devons continuer."
 elven_racial.1411.c: "Fouillons le village pour ce qui peut encore servir."
 
 elven_racial.1412.t: "Patrouille aux frontières : Emplacement idéal"
 elven_racial.1412.desc: "Alors que la journée s'étire, le paysage de [border_patrol_province.GetName] s'ouvre, révélant une éminence de terre douce surplombant un ruisseau tranquille. Le sol est ici ferme et sec, abrité sur trois côtés par de grands pins dont les branches se nouent comme des sentinelles.\n\nMa patrouille s'éploie instinctivement, sondant la configuration du terrain. Le ruisseau court clair et froid, offrant une source d'eau commode. Des pistes de gibier serpentent à proximité sans se presser trop près. En parcourant le périmètre, je perçois presque l'écho de ce qui pourrait être, un feu de veille brûlant stable, des tentes nichées sous les ramures, un refuge pour ceux qui gardent ces frontières.\n\nJe marque une pause au sommet de l'éminence, embrassant du regard l'étendue : les terres sauvages s'étendent calmes et ininterrompues dans toutes les directions. Un lieu d'équilibre, de force tranquille. Et riche en ressources naturelles."
 elven_racial.1412.a: "Établissons notre camp ici."
 elven_racial.1412.b: "Nous devons poursuivre, il n'y a pas de temps à perdre."
 elven_racial.1412.c: "Fourragerons pour des vivres, puis nous continuons."
 
 elven_racial.1413.t: "Patrouille aux frontières : Des intrus"
 elven_racial.1413.desc: "Nous contournons un tournant du sentier en [border_patrol_province.GetName] et trouvons là un petit groupe de [men|E], des voyageurs las à en juger par l'allure, les manteaux lourds de poussière, les visages creusés par de longues lieues. Ils sursautent à notre approche, mais ne fuient point. Leur chef s'avance à la place, les mains ouvertes à s[trespasser_leader.Custom('FR_OnA')] côtés, une supplique muette dans s[trespasser_leader.Custom('FR_OnA')] yeux.\n\nJe sens le frémissement de ma patrouille derrière moi, un sursaut de prudence tempéré de curiosité. Les mortels s'approchent rarement aussi près sans raison. Leurs chariots ne portent ni armes ni bannières, seulement les modestes biens de familles sur la route. Certains bercent des enfants ; d'autres s'appuient sur des bâtons de marche polis par l'usage. Il est clair qu'ils cherchent à pénétrer sur nos terres, un refuge contre des épreuves qu'ils ne peuvent plus fuir. Leurs raisons sont sincères, et pourtant les frontières que nous gardons ne s'ouvrent pas aisément, même à ceux dans le besoin.\n\nLes repoussons-nous avec douceur, comme c'est notre coutume ? Insistons-nous pour qu'ils partent sur-le-champ si les mots échouent ? Ou leur accordons-nous miséricorde et guidance, au risque d'attirer d'autres regards dans leur sillage ?"
 elven_racial.1413.a: "Je vais les convaincre de faire demi-tour."
 elven_racial.1413.a.duel_success: "Vous convainquez les voyageurs"
 elven_racial.1413.success.toast.t: "Les [men|E] décident de s'établir ailleurs"
 elven_racial.1413.a.duel_failure: "Vous ne parvenez pas à convaincre les [men|E]"
 elven_racial.1413.failure.toast.t: "Vous êtes contraints de les expulser par la force"
 elven_racial.1413.b: "Ils doivent être écartés par la force."
 elven_racial.1413.c: "Échangeons nouvelles et vivres avec eux."
 elven_racial.1413.d: "Autorisons-les à s'établir dans la région."
 
 elven_racial.1414.t: "Patrouille aux frontières : Des Traces évanouies"
 elven_racial.1414.desc: "Alors que nous progressons le long du chemin de [border_patrol_province.GetName], quelque chose de subtil retient mon regard : une légère ligne dans la terre, à moitié reclamée par la mousse et le temps. Je m'arrête, m'accroupis pour écarter les aiguilles tombées. Dessous gît la trace d'un sentier si ancien que la terre elle-même semble l'avoir oublié. L'air autour de lui se fait différent, comme si la mémoire elle-même s'y attardait, attendant que quelqu'un la remarque.\n\nQui a marché ici en dernier, je me demande ? Un Elfe, un Homme, ou quelque chose de bien plus ancien encore ? La terre se tait, gardant ses secrets ; et pourtant je sens s'éveiller en moi une douce curiosité, une attraction qui tire aux lisières de mes pensées. Les autres de ma patrouille se rassemblent, murmurant doucement tandis qu'ils ressentent la même étrangeté.\n\nSi nous suivons ce sentier oublié, qui sait où il pourrait mener ? Pouvons-nous nous permettre pareil détour et pareille distraction ? Et pourtant, le laisser derrière nous, c'est laisser un autre fragment du monde sombrer plus profondément dans l'oubli..."
 elven_racial.1414.a: "Suivons ces traces."
 elven_racial.1414.a.tt: "Vous enquêtez sur la piste à peine visible..."
 elven_racial.1414.lost.toast.t: "Vous vous perdez dans les terres sauvages"
 elven_racial.1414.neutral.toast.t: "Vous ne trouvez rien de notable"
 elven_racial.1414.orcs.toast.t: "Vous trouvez et abattez des traînards orques"
 elven_racial.1414.loot.toast.t: "Vous trouvez un trésor"
 elven_racial.1414.artifact_desc: "Une broche [elven|E] perdue pendant des siècles, redécouverte dans les terres sauvages."
 elven_racial.1414.b: "Nous n'avons pas de temps pour cela."
 
 elven_racial.1415.t: "Patrouille aux frontières : Des Nains errants"
 elven_racial.1415.desc: "Notre patrouille s'est déroulée jusqu'ici sans grand incident, mais alors qu'un des éclaireurs envoyés en avant revient précipitamment vers nous, les choses semblent avoir changé. « Des [dwarves|E] sur la route devant nous, » rapporte l'éclaireur. « Une caravane de marchands itinérants, à ce qu'il me semble. »\n\nCroiser des Nains errants n'est pas chose inhabituelle en bien des parties de la [middleearth|E], et ils causent rarement des troubles avec les [elves|E]. Je fais signe à mes compagnons de rengainer leurs armes, et nous approchons les Nains lentement, sans manifester d'hostilité. « Bien rencontré, » je salue leur chef, qui incline la tête. « Certes. Je suis [dwarven_merchant.GetName]. À votre service. »\n\nAlors que les deux groupes font halte, je dois décider comment procéder avec cette rencontre."
 elven_racial.1415.a: "Nous échangerons des nouvelles avec eux et reprendrons notre route."
 elven_racial.1415.b: "Voyons s'ils ont quelque chose à troquer."
 elven_racial.1415.c: "Nous devrions nous ravitailler en vivres."
 elven_racial.1415.b.copper: "Obtenu un minéral de Cuivre"
 elven_racial.1415.b.iron: "Obtenu un minéral de Fer"
 elven_racial.1415.b.ruby: "Obtenu un minéral de Rubis"
 elven_racial.1415.b.diamond: "Obtenu un minéral de Diamant"
 
 elven_racial.1416.t: "Patrouille aux frontières : Des Aventuriers de contrées lointaines"
 elven_racial.1416.desc: "Nous franchissons une faible crête, et là, sous la lumière filtrée de la canopée, j'aperçois un petit groupe de voyageurs progressant le long de la lisière du bois. Leurs manteaux portent les couleurs du lointain [gondor|E], usés par les intempéries mais sans équivoque, et leurs bottes sont lourdes de la poussière d'une longue route. Lorsqu'ils nous aperçoivent, ils s'immobilisent aussitôt, les mains glissant vers leurs garde-mains par instinct méfiant, avant de reconnaître qui se tient devant eux.\n\nJe guide ma patrouille en avant, mains ouvertes, offrant un salut en Langue Commune. Les [men|E] se détendent peu à peu, même si la lassitude s'accroche à eux comme une seconde peau. La voix de leur chef porte un mélange d'humilité et de fierté, des cœurs vaillants, je songe, même s'ils comprennent peu des terres qu'ils foulent à présent.\n\nLeur présence représente une occasion pour nous d'œuvrer ensemble à repousser les Ombres, si tel est notre choix..."
 elven_racial.1416.a: "Demandez-leur des nouvelles de l'étranger."
 elven_racial.1416.b: "Nous pourrions faire usage de combattants d'expérience, pour un temps."
 elven_racial.1416.c: "Une alliance d'Hommes et d'Elfes, comme aux âges depuis longtemps révolus."
 elven_racial.1416.alliance: "Vous concluez une alliance mutuelle avec [gondorian_adventurer.GetFirstName]"
 
 elven_racial.1417.t: "Patrouille aux frontières : Un Éléphanteau solitaire"
 elven_racial.1417.desc: "Notre patrouille s'est déroulée sans la moindre apparition de voyageurs ni d'ennemis, et je commence à me détendre. Le soleil brille, et un vent tiède me caresse le visage. Je ferme les yeux un bref instant, savourant la pure quiétude des lieux. C'est alors que le garde-marche de tête nous interpelle.\n\n« Il a dû être séparé de sa mère, » dit l'elfe en désignant ce qui se trouve devant nous. Là, j'aperçois quelque chose d'insolite : ce qui semble être un jeune Mûmak, à peine âgé d'un an. Il trotte d'un pas maussade dans une prairie herbeuse, sans émettre le moindre son.\n\n« En effet, » je conviens. « Mais où sa mère pourrait-elle se trouver ? Un sort funeste l'aurait-il frappée ? » L'éléphanteau s'immobilise en prenant conscience de notre présence. Son regard croise le mien. Est-ce là... un appel à l'action ? »"
 elven_racial.1417.a: "Nous ne pouvons nous attarder ici. Laissons-le."
 elven_racial.1417.b: "Emmenons le jeune animal jusqu'au camp."
 elven_racial.1417.c: "Cherchons sa mère."
 
 elven_racial.1499.t: "Patrouille aux frontières : La Fin du devoir"
 elven_racial.1499.desc: "Ma patrouille aux frontières est arrivée à son terme. Les affaires de la cour et les obligations envers les miens attendent mon retour.\n\nLes patrouilles le long de la frontière reprendront, en temps voulu. Mais à présent je dois regagner ma place dans le royaume."
 elven_racial.1499.a: "La patrouille achevée, il est temps de rentrer."
 elven_racial.1499.a.tt: "Vous rejoignez votre capitale"
 elven_racial.1499.a.tt.laamp: "Vous rejoignez votre [camp|El]"
