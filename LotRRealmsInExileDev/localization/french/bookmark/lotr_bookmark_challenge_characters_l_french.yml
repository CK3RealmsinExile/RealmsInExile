l_french:

 ### War of the Ring ###

 # Erwigiar
 challenge_character_erwigiar: "Erwigiar des Framlings"
 challenge_character_erwigiar_desc: "Chef des Eotheod qui demeurèrent dans la Vallée septentrionale de l'Anduin, Erwigiar dirige un peuple diminué, ombre de leurs parents du Rohan.\n\n#bold Autrefois, Framsburg était la capitale d'un puissant royaume. Pourrez-vous lui rendre sa gloire d'antan ?#!"

  # Saebert
 challenge_character_saebert: "Seigneur Sæbert des Collines"
 challenge_character_saebert_desc: "Peu d'hommes de l'ancien Rhovanion subsistent. Mais Sæbert en est un, pillard de grand renom. Il est moins honorable que ses ancêtres, mais tout aussi fort qu'eux.\n\n#bold Sæbert pourra-t-il reconquérir les terres de ses aïeux ?#!"

  # Gimilkhâd
 challenge_character_gimilkhad: "Ar-Gimilkhâd"
 challenge_character_gimilkhad_desc: "Chef des Ar-Adûnâim, Gimilkhâd prétend être le souverain légitime de tous les Númenóréens. Exilé sur un rocher stérile, ces prétentions semblent condamnées à rester lettre morte.\n\n#bold Mais peut-être Gimilkhâd prouvera-t-il que ses revendications ne relèvent pas de la folie, mais de la prophétie ?#!"

  # Berúthiel
 challenge_character_beruthiel: "Dame Berúthiel"
 challenge_character_beruthiel_desc: "Enfant des rues devenue reine, Berúthiel tisse une puissante toile pour le demeurer.\n\n#bold Tiraillée entre ses amants, Berúthiel pourra-t-elle maintenir son royaume d'ombre, ou la lumière du jour révélera-t-elle tous ses méfaits ?#!"

  # Gyürüchill
 challenge_character_gyuruchill: "Katajan Gyürüchill des Tedjin"
 challenge_character_gyuruchill_desc: "L'un des plus puissants seigneurs Tedjin, Gyürüchill II approche de sa fin. Pourtant, de grands changements s'annoncent, qu'il ne vivra peut-être pas assez longtemps pour voir.\n\n#bold Les Tedjin sont à la croisée des chemins - quelle voie emprunterez-vous ?#!"

  # Kalafar
 challenge_character_kalafar: "Kalafar de Chelkar"
 challenge_character_kalafar_desc: "Livant dans les terres arides du sud du [mordor|E], le peuple de Kalafar constitue le dernier bastion des anciennes traditions dans une terre imprégnée d'ombre.\n\n#bold Avec des ennemis de tous côtés, Chelkar pourra-t-il rester fidèle à lui-même, ou sombrera-t-il aussi dans les ténèbres ?#!"
 
  # Azruthôr III 
 challenge_character_azruthor: "Bârunkhôr Azruthôr III"
 challenge_character_azruthor_desc: "Traditionaliste convaincu, Azruthôr III est le dernier seigneur à défendre les anciennes coutumes de Bellakar.\n\n#bold Azruthôr laissera-t-il enfin mourir le passé, ou s'y accrochera-t-il obstinément ?#!"

  # Fishi 
 challenge_character_fishi: "Fishi la Guérisseuse-Sorcière"
 challenge_character_fishi_desc: "Ermite, Fishi guide son peuple depuis les profondeurs recluses de son marécage. Mais de sombres rumeurs circulent quant à sa véritable nature.\n\n#bold Fishi pourra-t-elle survivre à l'examen minutieux de ses suzerains théoriques, ou son temps est-il compté ?#!"

  # Szoranh 
 challenge_character_szoranh: "Szoranh, le Dragon au Bout du Monde"
 challenge_character_szoranh_desc: "Vagabond venu du lointain Vûlmaw, Szoranh a vu l'opportunité de faire fortune et de se faire un nom.\n\n#bold Isolé au bout du monde, Szoranh s'élèvera-t-il, ou tombera-t-il ?#"
 
  # Eldberk
 challenge_character_eldberk: "Izbâd Eldberk de Nogrod"
 challenge_character_eldberk_desc: "Exilé volontaire de Buzra-dûm, Eldberk est rongé par la frustration. Pourtant, il l'a canalisée dans une tentative courageuse (ou insensée) de reconquérir l'ancien Nogrod.\n\n#bold Eldberk surmontera-t-il sa colère, ou détruira-t-il tout ce qu'il a cherché à bâtir ?#"
 
  # Lanthir
 challenge_character_lanthir: "Aran Lanthir des Penni"
 challenge_character_lanthir_desc: "Depuis longtemps, Lanthir guide son peuple depuis la sécurité de ses salles isolées.\n\n#bold Mais alors que le monde tourne et que les âges passent, l'isolement peut-il encore protéger les Penni ?#"
 
  # Keiseimu
 challenge_character_keiseimu: "Khûdriag Keiseimu de Khand"
 challenge_character_keiseimu_desc: "Traditionaliste, le Khûdriag Keiseimu est à un pas de reconquérir le trône de son grand-père comme seigneur de tout Khand.\n\n#bold Mais sa prudence se révélera-t-elle fatale, si Vangaris le devance ?#"
 
  # Astarel
 challenge_character_astarel: "Matriarche Astarel"
 challenge_character_astarel_desc: "Dame des Ibarad, Astarel est une puissante matriarche des Logath. Son peuple est désuni, mais peut-être cela peut-il changer.\n\n#bold Astarel pourra-t-elle rassembler son peuple querelleur, ou est-ce sans espoir ?#"
 
  # Argân
 challenge_character_axe_that_walks: "Argân, la Hache qui Marche"
 challenge_character_axe_that_walks_desc: "La 'Hache qui Marche' est maintenant très âgée et a livré maintes batailles. Mais peut-être reste-t-il du temps pour un ultime grand voyage.\n\n#bold Où vous mènera la route avant que le temps d'Argân ne s'épuise ?#"
 
  # Creusa
 challenge_character_creusa: "Creusa, Sorcière de Grand'Peur"
 challenge_character_creusa_desc: "Imprégnée de magie noire, la Sorcière de Forêt Noire a beaucoup sacrifié au service du Seigneur Ténébreux.\n\n#bold Sans frères ni enfants, quel héritage pourrez-vous forger avant que la magie de Creusa ne réclame son dû ?#"
 
  # Konnen
 challenge_character_konnen: "Chef Konnen Korzun"
 challenge_character_konnen_desc: "Avec des écailles pour peau, Konnen est l'un des derniers bastions de son peuple.\n\n#bold Konnen peut-il espérer défendre son peuple contre l'empiètement des Haradrim et des Gondoriens ?#"
 
 # Dasin II
 challenge_character_dasin: "Dasin de Pezarsan"
 challenge_character_dasin_desc: "Issu d'une succession contestée, Dasin II se retrouve maintenant assiégé sur deux fronts différents.\n\n#bold Face à de telles probabilités, pourrez-vous garantir l'indépendance de Pezarsan ?#"
 
  # Timnir
 challenge_character_timmir: "Timmir, l'Incapable"
 challenge_character_timmir_desc: "Jadis puissant chef dont l'habile diplomatie assurait l'indépendance de son peuple, la vieillesse a finalement rattrapé Timmir.\n\n#bold Malgré son esprit ruiné, l'héritage de Timmir pourra-t-il être préservé ?#"
 
  # Ôn-Ikanna
 challenge_character_on_ikanna: "Chef Ôn-Ikanna des Honnin"
 challenge_character_on_ikanna_desc: "Géant parmi son peuple, Ôn-Ikanna annonce peut-être un nouveau départ.\n\n#bold Autrefois, les Honnin gouvernaient tout Rây. Ôn-Ikanna pourra-t-il les mener à le faire à nouveau ?#"
 
  # Rayo
 challenge_character_rayo: "Autarb Rayo de la Mer de Dunes"
 challenge_character_rayo_desc: "Homme patient dans les sables du désert, Rayo connaît le pouvoir d'une lame - et ce qu'elle peut lui apporter.\n\n#bold La lame de Rayo sera-t-elle celle de la libération, de l'héroïsme ou de la conquête ?#"
 
  # Bêlzagar
 challenge_character_belzagar: "Zibdin Bêlzagar"
 challenge_character_belzagar_desc: "Maître d'une forteresse à l'angle du monde, le royaume de Bêlzagar est très jeune selon les standards nains.\n\n#bold Mais alors que s'élève le chaos de l'âge qui tourne, le plus jeune bastion des Barbes-Noires pourra-t-il rester fort ?#"
 
  # Aglarin 
 challenge_character_aglarin: "Dame-Corsaire Aglarin"
 challenge_character_aglarin_desc: "L'une des héritières d'un grand roi-pirate, Aglarin et ses frères se disputent maintenant le destin du cap de Mardruak.\n\n#bold Qui sera le roi (ou la reine) des pirates ?#"
 
  # Borghal
 challenge_character_borghal: "Autarb Borghal des Jelut"
 challenge_character_borghal_desc: "Le plus puissant des chefs Jelut, Borghal reste néanmoins un acteur mineur dans les grandes affaires du Harad.\n\n#bold Mais doit-il en être ainsi ? Borghal peut-il amener les Jelut à des sommets inégalés depuis des générations ?#"
 
  # Saelraed
 challenge_character_saelaed: "Sælræd des Leofrings"
 challenge_character_saelaed_desc: "Sælræd ne détient qu'une moitié des anciens domaines de sa famille, et de l'autre côté de l'Anduin, ses parents sont tombés dans l'ombre.\n\n#bold Avec l'aide de Dame Foldewyn, Sælræd pourra-t-il réunifier les terres de sa famille ?#"
 
  # Radômor 
 challenge_character_radomor: "Radômor, la Lame-féroce"
 challenge_character_radomor_desc: "Épéiste sans égal, Radômor s'est lancé dans une ambitieuse conquête pour unifier son peuple et la jungle de Zajantak.\n\n#bold Radômor réussira-t-il, ou des puissances plus grandes et tumultueuses briseront-elles sa lame ?#"
 
  # Rorimac 
 challenge_character_rorimac: "Maître Rorimac du Pays de Bouc"
 challenge_character_rorimac_desc: "Maître du Pays de Bouc, Rorimac existe techniquement indépendamment du Thain de la Comté.\n\n#bold Les Vieilbouc dirigeaient autrefois tous les Hobbits - quelle voie les Brandebouc emprunteront-ils ?#"
 
  # Legolas
 challenge_character_legolas: "Legolas du Royaume Sylvestre"
 challenge_character_legolas_desc: "En tant que capitaine des frontières méridionales du Royaume Sylvestre, il est du devoir du Prince Legolas, fils de Thranduil, de protéger les elfes qui habitent la seule partie de forêt de Grand'Peur qui reste libre de la souillure de Dol Guldur. \n\n#bold Ces derniers temps, les orques ont commencé à se répandre depuis les montagnes de Grand'Peur, et menacent de s'aventurer au nord dans la patrie elfique...#"
 
  # Théodred 
 challenge_character_theodred: "Second Maréchal Théodred"
 challenge_character_theodred_desc: "Il incombe au Second Maréchal de la Marche de défendre l'Ouestfolde, la province la plus occidentale du Rohan. Tenu par le vaillant Théodred, fils du Roi, l'Ouestfolde a connu ces derniers temps des raids d'hommes sauvages, terrorisant la population. \n\n#bold Le Prince Théodred pourra-t-il rétablir l'ordre et découvrir la véritable signification derrière ces pillages ?#"
 
  # Jangi
 challenge_character_jangi: "Jangi Ezparo"
 challenge_character_jangi_desc: "Pendant des siècles, les Apayrabandâ ont semé la terreur parmi les habitants des rives de la baie d’Ormal, harcelant les marchands et pillant les tombes. Jusqu’à l’avènement de l’hégémonie Côdyan. L’occupation de Anarikê et la domination navale qui s’ensuivit ont vu la confrérie des pirates persécutée et les voies maritimes surveillées, dans le but de retrouver sa prospérité d’antan. La situation n’a fait qu’empirer après la libération d’Anarikê par un [khy|E] ressurgissant, lorsque la Confrérie a perdu son statut de symbole de la résistance maritime.\n\nLe Mahin Sanglant, nommé d'après une jeune fille oubliée depuis longtemps, à la persuasion violente, est le tout dernier navire de la toute dernière flotte des Apayrabandâ, chassé de son refuge lors de la campagne finale des Vûlmaw's visant à éradiquer les Apayrabandâ une fois pour toutes. En tant que dernier des Apayrabandâ, il a décidé de retourner avec son maigre équipage dans la Baie d’Ormal, bouclant ainsi l'histoire des Apayrabandâ. Une dernière quête de trésor avant que le soleil ne se couche pour toujours sur les Apayrabandâ !"

  # Bo Lagg
 challenge_character_bo_lagg_the_butcher: "Bo Lagg le Boucher"
 challenge_character_bo_lagg_the_butcher_desc: "Monstre des Montagnes, Bo Lagg a égorgé maints bergers sans défense, mais n'a point encore fait ses preuves contre un adversaire digne de ce nom.\n\n#bold Le Boucher demeurera-t-il un pillard de bas étage, ou soumettra-t-il tout Chennacatt sous sa bannière ensanglantée?#"
 
  # Hamshi 
 challenge_character_hamshi: "Aknajhan Hamshi de Harshandatt"
 challenge_character_hamshi_desc: "Lors d'âges passés, les Muraniens régnaient sur le puissance royaume de Harshandatt. Aujourd'hui, leurs derniers descendants luttent pour repousser à la fois la vague des Núari venus de Sîrayn et celle des adeptes de la déesse Soleil venus de [khy|E].\n\nHamshi de Xyrenath est le dernier d'une vieille lignée. C’est un souverain grave et consciencieux qui a passé sa longue vie à veiller sur la Vallée des Nhazadhs, lieu de repos des défunts divins. En tant que mystique Haracktish, il se considère moins comme un souverain que comme le gardien de la mémoire, protecteur des tombes, et serviteur des ancêtres.\n\nMais le temps pèse lourdement sur Hamshi, et son fougueux fils Kator est désormais prêt à prendre les rênes. Alors que les dernières braises de Harshandatt commencent à vasciller, continuera-t-il à protéger consciencieusement ce qui reste, ou forgera-t-il un nouvel héritage à partir des cendres."

  # Gabar
 challenge_character_gabar: "Grand Chef Gabar de Silvesa"
 challenge_character_gabar_desc: "Fils moindre d'ancêtres plus glorieux, Gabar fait face aux menaces de toutes parts. Les Orques déferlent du sud, les tribus belliqueuses pressent à l'ouest, et de vastes armées s'amassent en Isra, vers l'orient.\n\n#bold Le Seigneur de Tartaust survivra-t-il à cette tempête, ou sera-t-il balayé par l'ombre grandissante?#"
 
  # Vîshrakh
 challenge_character_vishrakh_the_scribe: "Vîshrakh le Scribe"
 challenge_character_vishrakh_the_scribe_desc: "Vîshrakh dissimule son existence parmi des ruines plus anciennes encore que lui-même, en quête de savoirs interdits qui ne devraient point être exhumés.\n\n#bold Percera-t-il les secrets obscurs des Nazgûl, ou sa propre couardise causera-t-elle sa perte?#"
 
  # Scutsparg
 challenge_character_boss_scutsparg: "Boss Scutsparg du Masque"
 challenge_character_boss_scutsparg_desc: "Scutsparg a mis la main sur un Masque gravé de symboles que nul ne saurait nommer. Bien que son dessein demeure mystérieux, une pulsion irrésistible le pousse à le revêtir.\n\n#bold Découvrira-t-il la vérité cachée du Masque, ou sera-t-il asservi par la volonté qui l'habite?#"
 
  # Adrahil II
 challenge_character_adrahil: "Prince Adrahil de Dol Amroth"
 challenge_character_adrahil_desc: "#TOLKIENQUOTE: “Et en dernier, le plus fier, venait Imrahil, Prince de Dol Amroth, avec des bannières dorées portant son emblème du Navire et du Cygne d'Argent, et une compagnie de chevaliers en armure complète montant des chevaux gris ; et derrière eux sept cents hommes d'armes, grands comme des seigneurs, aux yeux gris, aux cheveux sombres, chantant tandis qu'ils avançaient.”#!\n\nAdrahil II, Prince de [dol_amroth|E], se dresse tel un bastion inébranlable contre les incursions des Corsaires et des [haradrim|E] venus du sud. Mais alors que s'approche le crépuscule de ses années, il incombe à son fils, le vaillant Imrahil, de porter haut la bannière du Cygne d'Argent face à la marée de ténèbres qui s'annonce."
 
  # Vangaris
 challenge_character_vangaris: "Khûdriag Vangaris de Khand"
 challenge_character_vangaris_desc: "Vangaris incarne la méritocratie brutale du [khand|E], où les forts s'élèvent et les faibles doivent suivre dans leur sillage ou être écrasés sous leurs pas. D'orphelin affamé errant dans les ruelles de Sturlûrza Khand, Vangaris s'est hissé jusqu'à devenir seigneur de tout le Bas-Khand. Mais dans son cœur, rien n'est jamais suffisant pour celui qui fut jadis contraint de mendier des restes.\n\nTandis que ceux de plus ancienne lignée, au Khand comme ailleurs, contemplent Vangaris avec dédain, lui continuera de combattre, jusqu'à ce qu'il soit enfin en sécurité et que son cœur trouve la paix qu'il désire ardemment. Et peu lui importe qui il devra affronter pour l'obtenir."
 
  # Wulfgar
 challenge_character_wulfgarbrynjarsson: "Wulfgar Brynjarsson"
 challenge_character_wulfgarbrynjarsson_desc: "L'un des descendants de Wulf, jadis roi du [rohan|E] et du Pays de Dun, Wulfgar est un homme noble et solitaire, préoccupé avant tout par la sûreté et la sécurité de son peuple. Mais ses tentatives pour forger une alliance bénéfique avec les Forgoil ont été contrecarrées en tous points par le [wizard|E] d'[isengard|E].\n\nAlors que les rumeurs se multiplient sur les pillards Hommes Sauvages qui franchissent toujours plus l'Isen, laissant la dévastation dans leur sillage, Wulfgar doit choisir d'affronter soit le courroux de Théoden, soit celui de [sarumancharacter|E]."

  # Mouth of Sauron
 challenge_character_mouth_of_sauron: "La Bouche de Sauron"
 challenge_character_mouth_of_sauron_desc: "#TOLKIENQUOTE “Le cavalier était tout de noir vêtu, et noir était son casque imposant; pourtant, ce n'était pas un Spectre de l'Anneau, mais un homme vivant. Le Lieutenant de la Tour de Barad-dûr il était, et son nom n'apparaissaît dans aucun récit; si longtemps que lui-même l'avait oublié, et il dit: ‘Je suis la Bouche de Sauron.’“#!\n\nUn renégat du Gondor, le Lieutenant de la Tour Sombre prend désormais le commandement de la Vallée d'Udûn, la préparant à la guerre. Son maître s'apprête à frapper l'Ouest qu'il hait, et la Bouche de Sauron sera prête lorsque le marteau s’abattra sur les Royaumes des Peuples Libres."

  # Aykaafak 
 challenge_character_aykaafak: "Reine Aykaafak de Ambasôn"
 challenge_character_aykaafak_desc: "Puissantes sont les femmes-guerrières de l'île de Ambasôn, dont la lignée remonte à Amba, la plus jeune fille du légendaire Amâv. Redoutables pillardes et pirates qui hantent l'océan Rómenaer, les Ambasôna cherchent désormais à fonder le royaume qui leur a été promis il y a plusieurs siècles..."

  # Zina-Konatl
 challenge_character_zina: "Roi Zina-Konatl des Nafarati"
 challenge_character_zina_desc: "Zina-Konatl de la tribu guerrière des Nâfarati, récemment couronné roi, est un homme rusé. Il y a maintenant longtemps que son peuple aspire à une plus grande indépendance vis-à-vis de leurs suzerains mûmakanil, mais le souverain du royaume, Sandamal, ne s’est pas montré aussi indulgent que les Nâfarati l’auraient souhaité. Car Sandamal visait à restreindre le pouvoir des tribus et à restituer la couronne, suscitant le ressentiment des Nâfarati face à la réduction de leurs privilèges, qui commencèrent à agir de manière plus indépendante.\n\nZina-Konatl lança sa propre grande campagne contre Drenikan, et après cinq ans de siège brutal, Taru Makar finit par tomber, ses murs incendiés et sa population passée au fil de l'épée par l'armée envahissante. Ces victoires remportées en leur propre nom enhardirent davantage les Nâfarati, qui commencèrent même à mener des raids dans certaines parties de Tûktan, et poussèrent l'empereur à ordonner l'invasion de Kôronânde, qui est désormais enfin en cours.\n\nObservant avec attention son suzerain, Zina-Konatl n'a plus qu'à attendre que l'occasion se présente. Un moment de faiblesse, et le soulèvement des Nâfarati sera en marche..."

  # Bruka 
 challenge_character_bruka: "Bruka le Saignant"
 challenge_character_bruka_desc: "Dans les tunnels et les galleries les plus à l'est des Montagnes Jaunes vivent les tribus des gobelins Graveurs de Marques, les premiers êtres à avoir creusé ces terres anciennes. Ils ont été asservis par les Orques, plus puissants, lorsque Sauron a été vaincu lors de la Guerre de la Dernière Alliance, et ils souffrent de ce joug depuis des générations.\n\nAujourd’hui, le Roi Gobelin Bruka s’apprête à briser la domination des Rukhas-hai, dans le but de créer un royaume libre pour les Graveurs de Marques."

  # Ozag
 challenge_character_ozag: "Ozag le Seigneur du Feu"
 challenge_character_ozag_desc: "Gobelin rusé, Ozag s'est emparé du Trône Ardent au nord du puissant volcan Ranghâshya dès qu'il a su manier les pouvoirs magiques que les ténèbres lui avaient conférés. Aujourd'hui, il aspire à un pouvoir encore plus important, s’étant révolté contre son seigneur faible, le défaillant Blûdbag.\n\nOzag parviendra-t-il à se hisser au sommet de la hiérarchie orque des Montagnes Jaunes et à plonger les plaines qui entourent les sommets dans une nouvelle obscurité rappelant l’époque de Khorahil le Nazgûl?"

 ### Long Winter ###
 
  # Nomid
 challenge_character_nomid: "Shazda Nomîd des Asdriags"
 challenge_character_nomid_desc: "Shazda Nomîd était un peu une sorte de conquérant dans sa jeunesse, pas un grand conquérant, remarquez, mais assez doué. Aujourd'hui à son âge, ces sujets autrefois loyaux se sont soulevés pour se libérer de son joug, et ses anciens ennemis y voient une occasion de se venger.\n\n#bold Nomîd parviendra-t-il à maintenir son héritage, ou sera-t-il simplement le dernier à tomber au cours des Années de Sang?#"

  # Thorne
 challenge_character_thorne: "Troisième Maréchal Thorne"
 challenge_character_thorne_desc: "Le Maréchal Thorne est un homme rusé, analysant chaque situation à son propre avantage.\n\n#bold Alors que le Rohan semble de plus en plus voué à entrer en guerre, comment Thorne pourrait-il tirer les ficelles du destin à son avantage ?#"

  # Fréalaf
 challenge_character_frealaf: "Premier Maréchal Fréaláf"
 challenge_character_frealaf_desc: "Fréaláf Hildeson est le neveu du Roi Helm du Rohan, et une étoile montante des Rohirrim. À seulement 28 ans d'âge, il a déjà été nommé Premier Maréchal de la Marche, un poste prestigieux pour quelqu'un d'aussi jeune. On dit qu'il tient de son défunt père, Fréared, un soldat gondorien et conseiller de confiance du Roi Gram.\n\n#bold Mais des troubles s'annoncent pour le Riddermark, et la loyauté et le dévouement de Fréaláf's envers son roi vont être mis à l'épreuve.#"

  # Cerith
 challenge_character_cerith: "Chef Cerith du Dunland"
 challenge_character_cerith_desc: "Cerith est le seigneur du peuple de Dunfearan, l'un des nombreux chefs divisés du Dunland. Mais contrairement aux autres, il est allié au Seigneur Freca de la Marche de l'Ouest, un vassal du détesté Forgoil. Cerith sera bientôt propulsé sous les feux de la rampe, car Freca doit faire face à des défis au Rohan et aura besoin de son aide.\n\n#bold Cerith soutiendra-t-il ses proches en difficulté, ou forgera-t-il son propre destin, libre de toute influence de leur part?#"

  # Gurnow
 challenge_character_gurnow: "Maire Gurnow de Tharbad"
 challenge_character_gurnow_desc: "Gurnow n'est guerre plus qu'un voyou de haut rang, malgré toutes ses prétentions de grandeur, pourtant, dans les veines de sa femme coule le dernier sang noble de Tharbad.\n\n#bold Gurnow parviendra-t-il à maintenir l'unité de sa ville en déclin, ou le froid finira-t-il par le mettre à genoux?#"

  # Eltariel
 challenge_character_eltariel: "Eltariel, Lame de Galadriel"
 challenge_character_eltariel_desc: "De nombreux hommes qui habitent les vallées et les plaines du [rhovanion|E] disent que la Dame de [lothlorien|E] possède un immense pouvoir qui s'étend bien au-delà des limites de la Bois Doré. Rares sont ceux qui savent quelle vérité se cache derrière ces mythes. Bien qu’il existe un pouvoir caché au sein de Lórien, les autres outils dont dispose la Dame sont de nature bien plus naturelle.\n\nL'un d'entre eux est la Lame de Galadriel. Chasseuse, assassin, vengeuse - elle endossera toutes ces apparences pour défendre la Lothlórien. Les lames d'Eltariel sont aussi tranchantes que mortelles, et de nombreux ennemis ont été fauchés par elles avec une efficacité impitoyable."

  # Azrunêth
 challenge_character_azruneth: "Azrunêth de la Flotte des Ombres"
 challenge_character_azruneth_desc: "Fondée par une bande de corsaires chevronnés et transformée en une petite armada de navires de raids rapides, la Flotte des Ombres a terrorisé les côtes occidentales de [belegaer_sea|E] depuis des années.\n\nAvec la mort inattendue de son dernier Seigneur-corsaire, l'ombre d'un doute s'est installé quant à l'unique enfant et héritière de ce souverain, sa fille Azrunêth. Une femme pouvait-elle vraiment diriger une redoutable flotte de corsaires belliqueux et de pillards?\n\nLes derniers mois ont prouvé que c'était bien le cas. Les raids et le butin ont été nombreux, et des chants de marins sont déjà entonnés à la gloire de la nouvelle commandante de la Flotte des Ombres.\n\nMais les ambitions d'Azrunêth vont bien au-delà. Elle rêve depuis toujours d'unifier les Îles Sacrées et de forger un véritable royaume pirate; un refuge pour tous ceux qui se sentent chez eux à bord d'un navire..."

  # Shelepinn
 challenge_character_shelepinn: "Reine-en-Exil Shelepinn"
 challenge_character_shelepinn_desc: "Les Kinn-Lai sont un peuple divisé. Lors d'âges passés il y a bien longtemps, ils se sont déchirés après la mort de leur premier Roi. Shelepinn, sa fière fille, ne supportait pas de voir l’ancien royaume de Tâlilan gouverné par un autre, elle s’est donc exilée avant que le sang ne soit versé.\n\nAu cœur des jungles sauvages d’Ûsakan, elle vit depuis des générations avec ses quelques partisans, n’entretenant que peu ou pas de contacts avec ses proches de l’autre côté de la baie, gouvernés par son neveu, Dâlavin. Mais le monde change; des ombres se lèvent, même dans l'Extrême Sud de la Terre du Milieu. L'heure est-elle venue pour les Kinn-lai de se réunir enfin?"

  # Vimana 
 challenge_character_vimana: "Vimana, Oracle de Usakân"
 challenge_character_vimana_desc: "Voilà déjà longtemps que les Ûsakani sont maintenus en esclavage et divisés, contraints de mener une existence misérable dans des repaires de la jungle, encerclés de toutes parts par l’ombre envahissante. Pour Vimana Masamâvin, ce n’est pas là le destin des fils et des filles Amâv. Il a vu, dans le vol des oiseaux et dans la chute des feuilles, une vérité divine: les Ûsakani resteront à jamais faibles, à jamais la proie d'ennemis cruels, s'ils restent divisés.\n\nÛsakan doit s'unir, mais ça ne sera pas facile. Dans le chaos provoqué par les raids de Radnag, des bandits se sont emparés des routes du nord, bloquant toute voie d'attaque contre la menace orque, et il reste à voir si l'on peut faire confiance aux esprits de la forêt qui habitent au sud et à l'ouest..."

  # Bogho
 challenge_character_bogho: "Bogho la Tempête"
 challenge_character_bogho_desc: "Dans les terres désertiques d'Abrakhân, une tempête s'est levée. Balayant toutes les tribus dispersées des Arani et rassemblant tous les guerriers qui subsistent encore dans les ruines d'Abrakhân, la Tempête, le Roi Bogho de Darsalân, a forgé un nouveau royaume des Haradrim - mais son royaume résistera-t-il à l'épreuve du temps? Ou bien s'effondrera-t-il, comme tant d'autres nations éphémères des Haradrim avant lui?"

  # Narmin
 challenge_character_narmin: "Narmin du Joug Côdyan"
 challenge_character_narmin_desc: "Puissante sur les mers est Côdya, joyau de l'Océan oriental; le tumultueux Rómenaer. Ses navires ont navigué vers l’ouest et ont surpassé Anarikê, et aujourd’hui, même les cités-États de Lyneria et Thaamutasenga lui versent leur tribut.\n\nLe gouverneur occidental de Côdya est Narmin, un homme de grand mérite. Mais sera-t-il à la hauteur de sa haute fonction, ou le Joug Côdyan sera-t-il brisé sous son mandat?"