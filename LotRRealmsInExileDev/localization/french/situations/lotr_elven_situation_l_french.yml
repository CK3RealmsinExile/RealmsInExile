 elven_hope_situation_sub_region_lindon_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak Lindon s'étend entre les Montagnes Bleues et la Mer, ultime vestige de Beleriand émergé des flots. De ses ports et de ses havres, les Hauts Elfes ont cinglé vers l'Occident pour rejoindre le Royaume Béni, ou veillé sur les contrées déclinantes de la Terre du Milieu.#!"
 elven_hope_situation_sub_region_rivendell_lorien_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak Nichés dans les profondes vallées des Montagnes de Brume et les bois dorés de Lothlórien, ces deux royaumes sont des havres de savoir, de chant et de mémoire. Là, les Eldar préservent la sagesse et la beauté des Jours Anciens face aux ombres qui avancent.#!"
 elven_hope_situation_sub_region_lasgalen_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak Autrefois nommée Vertbois le Grand, cette vaste forêt s'étend des monts de la Forêt de Grand'Peur jusqu'à la Rivière Courante. Bien que les ombres en hantent les profondeurs depuis longtemps, les Elfes des bois en gardent les clairières à l'arc et à la lance.#!"
 elven_hope_situation_sub_region_bay_of_ormal_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak La Baie d'Ormal est un domaine des Hommes, et les Elfes n'y ont jamais demeuré, pour autant qu'ils s'en souviennent. La grande mer orientale y dessine une vaste baie, animée d'un constant va-et-vient de négoce et de diplomatie.#!"
 elven_hope_situation_sub_region_utter_south_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak À l'extrême sud de la Terre du Milieu s'étendent les terres des Kinn-lai, l'une des tribus des Avari. Ils demeurent sur les rives de la Baie d'Usakan, qui s'ouvre sur les mers méridionales.#!"
 elven_hope_situation_sub_region_thani_hazad_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak La grande forêt de Drêl est le domaine des Cuind, l'un des rameaux des Elfes Avarin. Ils y ont demeuré depuis longtemps en harmonie avec les Hommes du Thâni-Hazâd.#!"
 elven_hope_situation_sub_region_bay_of_tulwang_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak Sumarieth fut jadis un domaine des tribus Avarin. Ils y vécurent en étroite fraternité avec les Drúedain des forêts profondes, et leur enseignèrent beaucoup.#!"
 elven_hope_situation_sub_region_haradwaith_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak Rares furent les Elfes à traverser les contrées brûlantes du Haradhwaith et la Mer de Dunes aride, sans jamais y établir royaumes ni demeures pérennes.#!"
 elven_hope_situation_sub_region_nelornieth_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak Sur les rivages de la Mer Intérieure de Rhûn s'étend l'antique forêt de Nelornieth, demeure du peuple Avarin des Penni. On les trouve encore en ces lieux, l'œil attentif sur les royaumes des Hommes qui les encerclent.#!"
 elven_hope_situation_sub_region_eastern_rhovanion_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak Les vastes plaines du Rhovanion sont un pays de chevaux et de troupeaux, rarement foulé des Premiers-Nés. Les arbres et les forêts y sont clairsemés, et seules quelques tribus d'Hommes peuplent la solitude des steppes.#!"
 elven_hope_situation_sub_region_mumakan_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak Mûmakan et Shâyn composent les confins orientaux de l'Extrême-Sud. Au-dessus d'eux se dressent les pics vertigineux des Montagnes Jaunes, infestées d'Orques et de Gobelins.#!"
 elven_hope_situation_sub_region_eriador_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak L'Eriador fut jadis gouverné par le Haut Roi des Noldor, Gil-galad, et parcouru de façon éparse par des groupes d'Elfes errants. Seul aux abords du lac Nenuial établirent-ils des demeures plus durables, pour un temps.#!"
 elven_hope_situation_sub_region_gondor_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak À Edhellond, sur la Baie de Belfalas, demeuraient jadis de nombreux Elfes, bâtisseurs de navires et gardiens de leurs havres antiques. Tandis que déclinait la puissance du Gondor, beaucoup choisirent de traverser les Mers Séparantes."
 elven_hope_situation_sub_region_mordor_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak La Terre des Ombres est un lieu obscur, absolument hostile à toute âme de bonne volonté. Longtemps corrompue et tourmentée par le Seigneur Sombre, sa malveillance et son mal ne s'en laisseront point chasser aisément."
 #SITUATION_SUB_REGION_TOOLTIP_DESC: "This [situation_sub_region|E] belongs to [SituationSubRegion.GetSituation.GetName]\n\nCurrent Phase: [SituationSubRegion.GetCurrentPhase.GetName|V]"
 
