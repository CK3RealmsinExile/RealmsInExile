l_french:

 # Basics
 situation_elven_hope_situation: "La Longue Défaite"
 situation_type_elven_hope_situation: "La Longue Défaite"
 situation_type_elven_hope_situation_desc: "#TOLKIENQUOTE: \"J'ai vu trois Âges dans l'Occident du monde, et bien des défaites, et bien des victoires stériles.\" #!\n\nLes [elves|E] demeurent en [middleearth|E] depuis les temps les plus anciens. Depuis leur Éveil sur les rives de [cuivienen|E] jusqu'à ce jour, ils ont été témoins de triomphes sans nombre et de défaites plus nombreuses encore. Toujours plus profondément les tiraille la marche du monde, car les [elderdays|E] s'effacent et leur puissance s'étiole. Nombreux sont ceux qui envisagent désormais de quitter [middleearth|E] pour rejoindre les terres immortelles de [valinor|E], par-delà les Mers Séparantes.\n\nPourtant, tous n'admettent point que la Domination des [men|E] soit inéluctable ; nombreux sont ceux qui aiment encore [middleearth|E] avec ferveur, en toute sa beauté et ses terreurs. Lorsque cet [age|E] s'éteindra enfin, quel destin écherra aux [elves|E] ? Accepteront-ils leur Destin depuis longtemps pressenti, ou le défiront-ils, cherchant encore à établir en [middleearth|E] une demeure belle et libre ?\n\n#high [hope|E] est la ressource centrale qui régit l'évolution des [Concept('situation_phase','phases de situation')|E] dans La Longue Défaite. Il peut être gagné ou perdu selon l'issue des événements, des décisions et des guerres."
 situation_elven_hope_situation_desc: "$situation_type_elven_hope_situation_desc$"

