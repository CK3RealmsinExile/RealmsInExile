 situation_elven_fading_desc: "Un temps de ténèbres s'abat sur nous. Désormais, nombreux sont les [elves|E] qui se hâtent vers les havres pour quitter [middleearth|E] à jamais."
 situation_elven_waning_desc: "L'heure des [elves|E] approche de son terme, et rares sont parmi nous ceux qui possèdent encore la volonté de résister."
 situation_elven_enduring_desc: "Bien que peu nombreux, les [elves|E] conservent quelque force pour affronter la tempête qui approche."
 situation_elven_renewing_desc: "Ayant retrouvé leur [hope|E] et leur ardeur, les [elves|E] sont prêts à reconquérir leur héritage."
 situation_elven_thriving_desc: "Un temps de vaillance et de liesse est venu, comme si le printemps des [elves|E] brillait à nouveau."
 
