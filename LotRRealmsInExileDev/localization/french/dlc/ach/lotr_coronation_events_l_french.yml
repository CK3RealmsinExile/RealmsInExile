l_french:

 court_maintenance.0011.throne_needed.tooltip: "Certaines [activity_options|El] de [coronation|El] nécessitent un [artifact|El] #V Throne#!"
 
 coronation_events.6100.desc_dwarven: "La lumière d'un millier de lanternes emplit la pièce tandis qu'un murmure s'élève parmi les Chanteurs de pierre rassemblés — les mots, lents et immémoriaux du Khuzdul résonnent contre la roche vivante et, alors que les voix s'élèvent en un chant solennel, les murs eux-mêmes se mettent à vibrer en sympathie, jusqu'à ce que toute la montagne chante; sa voix m'appelant à me lever en tant que [host.GetTitleAsName].\n\nLe marteau et les pinces de l'artisan sont placés entre mes mains, et un pendentif d'argent en forme d'enclume est suspendu à mon cou.\n\n#EMP « Gloire à Mahal et à sa création !» #! s'écrient les personnes rassemblées."
 coronation_events.6100.desc_dwarven_guest: "La lumière d'un millier de lanternes emplit la pièce tandis qu'un murmure s'élève parmi les Chanteurs de pierre rassemblés — les mots, lents et immémoriaux du Khuzdul résonnent contre la roche vivante et, alors que les voix s'élèvent en un chant solennel, les murs eux-mêmes se mettent à vibrer en sympathie, jusqu'à ce que toute la montagne chante; sa voix appelant [host.GetFirstNameNoTooltipRegnal] à s'élever en tant que [host.GetTitleAsName].\n\nLe marteau et les tenailles de l'artisan sont placés entre [host.GetHerHis] mains, et un pendentif en argent en forme d'enclume est suspendu à son cou.\n\n#EMP « Gloire à Mahal et à sa création ! »#! s'écrient les personnes rassemblées."

 coronation_events.6102.desc_elf_beginning: "Mais... Je ne suis pas seul. De la plus petite vallée à la plus grande tour, partout des chants mélodieux s'élèvent dans le ciel nocturne — des chants anciens, "
 coronation_events.6102.desc_elf_calaquendi: "du Beleriand qui fut, du Valinor par-delà les Mers Déchaînées, "
 coronation_events.6102.desc_elf_lomiquendi:  "du Beleriand qui fut, du Doriath sous les étoiles, "
 coronation_events.6102.desc_elf_avari: "du Cuivienen qui fut, de Palisor et de l'amitié des Premiers Hommes, "
 coronation_events.6102.desc_elf_low_ending: "et chants de nostalgie pour des jours meilleurs pour les Elfes de la Terre du Milieu.\n\nJe m'assieds sur le trône en simple [host.GetTitleAsName], et non comme [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Car le temps des titres si élevés est révolu et, bien que l'espoir n'ait point entièrement abandonné mon peuple, je ne suis pas encore digne de tels honneurs. Pourtant, l'heure viendra. Tous m'appellent à guider le peuple [host.GetPrimaryTitle.GetAdjective] vers un avenir meilleur, d'actes dignes d'être chantés !"
 coronation_events.6102.desc_elf_high_ending: "et des chants d'espoir alors que mon peuple aperçoit enfin des raisons de croire en de meilleurs jours pour les Elfes de la Terre du Milieu. Comme si les chants de milliers de personnes détruisaient cette grande [host.Custom('ResidenceBuilding')], #EMP la réduisant en ruines!#!\n\nJe prends le trône non pas en tant qu'Elfe, mais en tant que [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Tous m'appellent à mener le peuple [host.GetPrimaryTitle.GetAdjective] vers un avenir meilleur, rempli d'actes dignes d'être chantés !"


 coronation_events.6102.desc_elf_guest_beginning: "Mais... [host.Custom(FR_IlElle)] n'accomplit pas le rite seul[host.Custom('FR_E')] ! De la plus petite vallée à la plus haute tour, partout des chants mélodieux s'élèvent dans le ciel nocturne — des chants anciens, "
 coronation_events.6102.desc_elf_low_guest_ending: "et chants de nostalgie pour des jours meilleurs pour les Elfes de la Terre du Milieu.\n\nJe m'assieds sur le trône en simple [host.GetTitleAsName], et non comme [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Car le temps des titres si élevés est révolu et, bien que l'espoir n'ait point entièrement abandonné mon peuple, je ne suis pas encore digne de tels honneurs. Pourtant, l'heure viendra. Tous m'appellent à guider le peuple [host.GetPrimaryTitle.GetAdjective] vers un avenir meilleur, d'actes dignes d'être chantés !"
 coronation_events.6102.desc_elf_high_guest_ending: "et des chants d'espoir alors que son peuple aperçoit enfin des raisons de croire en de meilleurs jours pour les Elfes de la Terre du Milieu. Comme si les chants de milliers de personnes détruisaient cette grande [host.Custom('ResidenceBuilding')], #EMP la réduisant en poussière!#!\n\n[host.GetFirstNameNoTooltipRegnal] prend le trône non pas en tant qu'Elfe, mais en tant que [host.GetPrimaryTitle.GetTierAsNameNoTooltip|l]. Tous l'appellent à mener le peuple [host.GetPrimaryTitle.GetAdjective] vers un avenir meilleur, rempli d'actes dignes d'être chantés !"

 coronation_events.6130.elf_intro_host: "Les grands chants ont été entonnés et les hauts faits de nos anciens contés, et ainsi se rassemblent les porteurs des eaux bénies par la lumière des étoiles de Varda."
 coronation_events.6130.elf_intro_guest: "Les grands chants ont été entonnés et les hauts faits de nos anciens contés, et ainsi se rassemblent autour de [host.GetHerHim] les porteurs des eaux bénies par la lumière des étoiles de Varda."
 coronation_events.6130.anointing_elf_host: "conduit mes consécrants. Des cruches d'or s'écoulent les eaux vivifiantes. En douces ondées lumineuses, elles se répandent sur mon corps et m'apportent les doux souvenirs de [cuivienen|E] sous les étoiles.\n\n"
 coronation_events.6130.anointing_elf_guest: "conduit les consécrants. Des cruches d'or s'écoulent les eaux vivifiantes. En douces ondées lumineuses, elles se répandent sur [host.GetFirstNameNoTooltip].\n\n"
 coronation_events.6130.ending_elf_host: "Par [vardacharacter|E] et [manwecharacter|E], par [ROOT.Char.GetFaith.WaterGodName], par [host.GetFaith.FertilityGodName], je suis honoré[ROOT.Char.Custom('FR_E')] en tant que [host.GetTitleAsName]."
 coronation_events.6130.ending_elf_guest: "Par [vardacharacter|E] et [manwecharacter|E], par [host.GetFaith.WaterGodName], par [host.GetFaith.FertilityGodName], [host.GetFirstNameNoTooltip] est honoré[host.Custom('FR_E')] en tant que [host.GetTitleAsName]."