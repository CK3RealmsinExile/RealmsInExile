l_french:
 lotr_can_have_brigands_camp_purpose_trigger.tt.explanation: "Vous #bold ne devez pas#! être un [elf|E] ou un [wizard|E] dont la foi appartient à la [religious_family|El] [GetReligionFamily('rf_eruhini').GetName] ou à la [doctrine|El] [GetFaithDoctrine('doctrine_echoes_of_the_ainur').GetBaseName]"

 ORC_AUTHORITY_LEVEL_1: "Vous ne disposez #bold PAS#! des lois [GetLaw('orc_authority_1').GetName] ou [GetLaw('orc_authority_3').GetName]"
 orc_authority_2_level_requirement: "$ORC_AUTHORITY_LEVEL_1$"
 ORC_AUTHORITY_LEVEL_2: "Vous ne disposez #bold PAS#! des lois [GetLaw('orc_authority_2').GetName] ou [GetLaw('orc_authority_4').GetName]"
 orc_authority_3_level_requirement: "$ORC_AUTHORITY_LEVEL_2$"
 ORC_AUTHORITY_LEVEL_3: "Vous ne disposez #bold PAS#! des lois [GetLaw('orc_authority_3').GetName] ou [GetLaw('orc_authority_5').GetName]"
 orc_authority_4_level_requirement: "$ORC_AUTHORITY_LEVEL_3$"

 ORC_AUTHORITY_IS_ON_COOLDOWN: "L'Autorité Orque a été modifiée récemment\n    @alert_icon! #alert_trial Peut être changée de nouveau après le [GetCurrentDateWithDiff( GetVarTimeRemaining( CHARACTER.MakeScope, 'orc_authority_cooldown') )]#!"
 LOTR_I_LACK_LAW_ALLOWING_TITLE_REVOCATION_ORCISH: "Vous ne détenez pas l'Autorité Orque [GetLaw('orc_authority_2').GetName] ou supérieure"

 camp_purpose_rangers: "Rôdeurs"
 camp_purpose_rangers_effects: "$EFFECT_LIST_BULLET$Ouvre l'accès aux [ranger_task_contracts|El]\n$EFFECT_LIST_BULLET$Permet de trouver davantage de [task_contracts|El] de [prowess|El], [intrigue|El] et [martial|El]\n$EFFECT_LIST_BULLET$Déverrouille les [camp_buildings|El] :\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_ranger_gear').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_reserve_provisions').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_reserve_water').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_perimeter_extra_watch').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_lockwagon').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_martial_study').GetName]#!\n$EFFECT_LIST_BULLET$Permet d'accéder à certains [officers|El] d'exception :\n$BULLET_WITH_TAB$[GetCourtPositionType('master_of_spoils_camp_officer').GetName()] #weak (Déverrouillé via $proving_grounds_lockwagon_domicile_building$)#!\n\n#B Les personnages d'[alignment|El] [alignment_neutral|El] ne sont pas éligibles à cette vocation #!\n\n#WEAK « Rôdeurs », voilà comment ils nous nomment — éclaireurs, gardiens des frontières, guerriers de l'ombre : peu de hauts faits demeurent hors de notre portée.#!"
 camp_purpose_mercenaries_or_rangers_tt: "Vous devez détenir l'[camp_purpose|El] [GetLaw('camp_purpose_mercenaries').GetName] ou [GetLaw('camp_purpose_rangers').GetName]"