l_french: 
 mumakan_religion: "Mûmakani"
 mumakan_religion_adj: "Mûmakani"
 mumakan_religion_desc: "Les croyances des vastes terres des Mûmakil, les Mûmakani, s'attachent à un vaste panthéon d'esprits et de divinités, dont les détails précis varient selon la tribu et le lieu."
 mumakan_religion_adherent: "Mûmakani"
 mumakan_religion_adherent_plural: "Mûmakani"
 ### Faiths of Mûmakan ###
 # Vector Note: Mûmathûmûr, High-king of the Gods, is, depending on the interpretation and the clan, either analogous to Manwe, Eru, or Morgoth

 ### Mûmakan ###
 faith_amav: "Codes d'Amâv"
 faith_amav_adj: "Amâvien"
 faith_amav_adherent: "Amâvien"
 faith_amav_adherent_plural: "Amâviens"
 faith_amav_desc: "Croyance traditionnelle du Mûmakan, l'Amâvianisme révère le patriarche du sud, le Dieu-Roi Amâv. Il fut le premier chef et roi du peuple qui deviendrait plus tard les Mûmakani, et l'on dit que sa royauté régna sur l'intégralité du sud en un âge d'or depuis sa capitale dans la cité sainte d'Amarû. Il édicta les lois et coutumes fondatrices qui lient la région depuis d'innombrables générations. En vérité, beaucoup de fidèles tiennent qu'il était la forme incarnée de Mûmathûmûr, le Haut-Roi des Dieux, venu guider les [men|E] et leur accorder une part du sang des Dieux. Même pour ceux qui ne partagent point cette croyance, Amâv demeure le patron et dieu de l'humanité, leur protecteur et avocat divin.\n\nL'on dit qu'Amâv eut cent enfants de ses nombreuses épouses, et qu'il assigna à chaque fils et fille leur propre tribu parmi son peuple à gouverner et mener, prophétisant qu'un jour, l'un d'eux engendrerait un héritier qui bâtirait sur tout ce qu'il avait édifié. Après quoi, dit-on, il s'évanouit dans les cieux en un grand éclair de lumière, ne laissant derrière lui que sa couronne, que seuls ses héritiers prophétisés pouvaient porter sans grande douleur. Le partage du royaume d'Amâv est à l'origine des diverses coutumes politiques des clans et tribus du Mûmakan — certaines filles établirent des matriarches, certains fils des patriarches, d'autres des traditions de seigneurie par acclamation et élection.\n\nLes anciens Amâviens, contrairement aux adeptes des codes de $Ji_Indur$, tiennent que le véritable héritier d'Amâv n'est point encore venu, et attendent le jour de son avènement."

 faith_indur: "Codes de $Ji_Indur$"
 faith_indur_adj: "Indûrisme"
 faith_indur_adherent: "Indûriste"
 faith_indur_adherent_plural: "Indûristes"
 faith_indur_desc: "L'Indûrisme tire son nom de $Ji_Indur$, le second Dieu-Roi du Mûmakan, qui prétendit (et beaucoup crurent) être la seconde venue du Dieu-Roi Amâv. Indûr, comme Amâv avant lui, unifia le peuple sous un roi vigoureux et puissant. Mais là où Amâv était légendaire pour sa joie et sa largesse, Indûr était dur et bref, se proclamant profondément déçu par les querelles et les conflits parmi son peuple. Il réunifia le Mûmakan pour la première fois depuis Amâv, proclamant qu'il les mènerait vers un nouvel âge glorieux, unis sous les auspices de la conquête et du code martial.\n\nHistoriquement, la prétention d'Indûr au statut d'héritier d'Amâv fut fortement contestée. Bien qu'Indûr ait unifié les tribus dispersées une fois encore, ses campagnes agressives pour étendre l'empire de son peuple dans toutes les directions finirent par attirer le courroux de [numenor|e], et plus précisément d'Ar-Pharazôn, qui écrasa l'empire à la bataille de Kôrlan. Par la suite, Indûr disparut, et beaucoup perdirent foi en ses paroles et son credo, malgré son long règne, ne le proclamant plus Amâv revenu.\n\nToutefois, ces croyances connurent des résurgences au [thirdage|E] lorsque $Ji_Indur$ revint une fois encore régner sur l'Extrême-Sud."

 faith_mumathumur: "Mûmathûmûrisme"
 faith_mumathumur_adj: "Mûmathûmûrisme"
 faith_mumathumur_adherent: "Mûmathûmûriste"
 faith_mumathumur_adherent_plural: "Mûmathûmûristes"
 faith_mumathumur_old: "Ancien Mûmathûmûrisme"
 faith_mumathumur_old_adj: "Ancien Mûmathûmûriste"
 faith_mumathumur_old_adherent: "Ancien Mûmathûmûriste"
 faith_mumathumur_old_adherent_plural: "Anciens Mûmathûmûristes"
 faith_mumathumur_desc: "La plus ancienne foi du Mûmakan, le Mûmathûmûrisme vénère le dieu du même nom, Mûmathûmûr. Révéré comme « le Créateur Suprême, Seigneur et Père des Hommes, et Maître de la Terre », il est considéré comme le roi des Dieux. Il lui appartient à la fois de récompenser et de punir. Ce n'est point un dieu indulgent, châtiant durement ceux qui se rebellent ou vont à l'encontre de ses volontés. Toutefois, il récompense ceux qui le suivent et respectent ses ordres et préceptes, accordant pouvoir, honneurs et prestige. Les grands Mûmakil sont considérés comme ses bêtes sacrées — doux et très puissants jusqu'à ce qu'ils soient poussés à la colère, auquel cas nul ne peut leur résister et les forêts sont piétinées sous leurs pas.\n\nParmi les fidèles d'Amâv, l'on croit que la dureté de Mûmathûmûr fut tempérée par la miséricorde et la patience d'Amâv — que ce soit en raison de son expérience incarnée, ou parce qu'il agit comme intercesseur divin entre l'humanité et le Premier Roi."

 mumak: "Mûmak"
 mumakil: "Mûmakil"

 faith_mumakil: "Sagesse des $mumakil$"
 faith_mumakil_adj: "$mumak$isme"
 faith_mumakil_adherent: "$mumak$iste"
 faith_mumakil_adherent_plural: "$mumak$istes"
 faith_mumakil_old: "Ancienne $faith_mumakil$"
 faith_mumakil_old_adj: "Ancien $faith_mumakil_adj$"
 faith_mumakil_old_adherent: "Ancien $faith_mumakil_adherent$"
 faith_mumakil_old_adherent_plural: "Anciens $faith_mumakil_adherent_plural$"
 faith_mumakil_desc: "Lorsque les Akanali franchirent pour la première fois les [yellowmountains|E], ils découvrirent qu'ils n'étaient point les seuls habitants de ces terres. Les puissants $mumakil$ avaient demeuré dans le sud à travers les années crépusculaires, et erraient au loin, seigneurs de la plaine et de la jungle. Les $akanali$ reconnurent leur sagesse et leur force, déclarant ces grandes bêtes messagères des dieux et couronneuses de rois.\n\nQuelques-uns pourtant virent la vérité — les $mumakil$ n'étaient pas de simples émissaires et hérauts, mais des dieux eux-mêmes, bien plus sages et bien plus puissants que tout homme ou esprit. Pourvus d'une mémoire ancienne, d'une puissance corporelle sans égale, et d'une étrange compréhension du langage de tous les hommes et bêtes, les $mumakil$ prirent ces rares croyants sous leur protection, les guidant dans les voies de leur nouvelle terre et leur transmettant la sagesse des jours anciens. Dans la coopération et la révérence, ces hommes prospérèrent, car les $mumakil$ aidaient leurs récoltes et leurs foyers, leurs récits et leurs chants, pour un bref temps heureux dans la jeunesse du monde.\n\nDans les jours ultérieurs, les deux lignées s'éloignèrent, et de plus en plus d'hommes ne virent dans les $mumakil$ guère plus que des bêtes à exploiter, les poussant contre leur gré à la guerre et détruisant leurs royaumes. Pourtant, quelques-uns révèrent encore les anciens seigneurs et tiennent l'enchaînement ou le massacre de tout $mumak$ pour une grave offense, s'efforçant de préserver l'amour et la guidance qui existaient jadis entre eux."
 
 faith_lakaba: "Culte de $mumakan_hunter_god_name$" #Lakaba
 faith_lakaba_adj: "$mumakan_hunter_god_name$"
 faith_lakaba_adherent: "Chasseur"
 faith_lakaba_adherent_plural: "Chasseurs"
 faith_lakaba_old: "Ancien $faith_lakaba$"
 faith_lakaba_old_adj: "Ancien $faith_lakaba_adj$"
 faith_lakaba_old_adherent: " Ancien $faith_lakaba_adherent$"
 faith_lakaba_old_adherent_plural: "Anciens $faith_lakaba_adherent_plural$"
 faith_lakaba_desc: "Dans les temps anciens et lointains du $e_mumakan$, $mumakan_hunter_god_name$ le chasseur était révéré en second après $mumakan_high_god_name$. Seigneur des bêtes sauvages et patron des guerriers habiles, c'est à lui que l'on adressait des suppliques pour des chasses fructueuses et la victoire au combat. À ses favoris, il accordait les pouvoirs des bêtes qu'ils avaient vaincues, la force du lion, la vue du faucon, ou la célérité de la gazelle. L'on murmurait même que quelques élus obtenaient la sagesse des $mumakil$, et la compréhension du langage de toute créature vivante.\n\nRépandu parmi les guerriers de $k_tuktan$ et $k_mumakan$ avant la codification du culte d'$amav$, le culte de $mumakan_hunter_god_name$ sombra lentement dans l'obscurité, mais Son héritage perdure dans les nombreux cultes guerriers ultérieurs parmi les $akanali$."

 faith_duraki: "Culte de $mumakan_god_duraki_name$" #Duraki
 faith_duraki_adj: "Dûrakisme"
 faith_duraki_adherent: "Dûrakite"
 faith_duraki_adherent_plural: "Dûrakites"
 faith_duraki_old: "Ancien $faith_duraki$"
 faith_duraki_old_adj: "Ancien $faith_duraki_adj$"
 faith_duraki_old_adherent: " Ancien $faith_duraki_adherent$"
 faith_duraki_old_adherent_plural: "Anciens $faith_duraki_adherent_plural$"
 faith_duraki_desc: "Né parmi le peuple longtemps opprimé d'$e_usakan$, le $faith_duraki$ accorde une grande importance aux esprits qu'ils nomment $mumakan_god_duraki_name$. Pour d'autres, ce sont des dieux de la guerre, de la chasse ou de la force, mais pour leurs dévots, ils incarnent l'indépendance, la liberté et l'autonomie. Parmi eux, l'on compte généralement $mumakan_god_hudari_name$, dispensateur de force, $mumakan_warrior_spirit_god_name$ le guerrier, et leur chef $mumakan_hunter_god_name$, seigneur de la chasse et patron des rebelles et de la justice. Certains y ajoutent $mumakan_war_god_name$, le porteur de destruction, et $mumakan_rage_spirit_god_name$, l'esprit de la rage, considérant leurs aspects moins nobles comme essentiels pour véritablement maintenir la liberté.\n\nLa force et la guidance de ces esprits brisent les chaînes de leurs adeptes et accordent protection contre ceux qui chercheraient à les asservir de nouveau. Il n'est point étonnant que leur culte se soit répandu parmi les opprimés et les dépossédés du $e_mumakan$, car la vaillance des $mumakan_god_duraki_name$ brûle toujours comme une lumière pour ceux qui sont dans les ténèbres."

 faith_sederi: "Culte d'Ascuru Hudari"
 faith_sederi_adj: "Ascuru Hudari"
 faith_sederi_adherent: "Ascuru Hudari"
 faith_sederi_adherent_plural: "Ascuru Hudari"
 faith_sederi_old: "Ancien Culte d'Ascuru Hudari"
 faith_sederi_old_adj: "Ancien Ascuru Hudari"
 faith_sederi_old_adherent: "Ancien Ascuru Hudari"
 faith_sederi_old_adherent_plural: "Anciens Ascuru Hudari"
 faith_sederi_desc: "Le Culte d'Ascuru Hudari révère la formidable divinité connue sous le nom d'Hudari, le Dieu des Luttes. Selon leurs traditions orales sacrées, Hudari les guida hors du royaume oppressif de Tantûrak, brisant leurs chaînes de tyrannie avec l'aide de ses fidèles serviteurs, les [kinnlai|E]. Ensemble, ils traversèrent les redoutables [yellowmountains|E] en quête de sanctuaire et des légendaires « Terres Libres de l'Ouest ».\n\nLes [adunai|E] des terres où ils s'établirent virent une ressemblance entre Hudari et le [valagod|E] [tulkascharactershort|E], en raison de sa personnification de la résilience, de la force d'âme et de l'esprit indomptable nécessaire pour surmonter l'adversité. Il est un phare d'espoir et d'inspiration pour ses fidèles dévots, qui se tournent vers lui en toutes choses."

 faith_koronande: "Codes de Kôronânde"
 faith_koronande_adj: "Kôronândien"
 faith_koronande_adherent: "Citoyen"
 faith_koronande_adherent_plural: "Citoyens"
 faith_koronande_old: "Anciens $faith_koronande$"
 faith_koronande_old_adj: "Ancien $faith_koronande_adj$"
 faith_koronande_old_adherent: "Ancien $faith_koronande_adherent$"
 faith_koronande_old_adherent_plural: "Anciens $faith_koronande_adherent_plural$"
 faith_koronande_desc: "Les Codes de Kôronânde, également connus comme les Coutumes des Ancêtres chez les Kôronândi, désignent le mélange de rites religieux et de traditions culturelles qui les gouvernent. Le peuple de $k_koronande$ fut parmi les premiers des $akanali$ à s'établir dans de grandes cités, et avec cet établissement vint le besoin d'un plus grand ordonnancement de la société.\n\nL'on dit que les premières Lois, les plus anciennes et fondement de tout ce qui suivit, vinrent du grand $mumakan_high_god_name$, complétées par les décrets de son incarnation Amâv. Dans les longues années qui suivirent, d'autres grands Diseurs-de-Lois, bénis par la sagesse des Dieux, naquirent, se levant pour répondre aux grandes questions de leur époque. Les Codes sont cette loi, tant écrite que coutumière, qui lie tout le peuple en un accord divin. Bien qu'ils ne soient point immuables, ils évoluent lentement, prudents par nature, emplis de révérence envers les Dieux et la sagesse des ancêtres du peuple. Exécuter fidèlement ces lois est le plus grand honneur, l'acte le plus pieux, et les suivre le plus grand devoir. Leur étude et leur débat sont la tâche des hommes de sagesse, et d'eux l'on peut régner en justice."

 faith_hathor: "Maison du Grand Hathor"
 faith_hathor_adj: "Hathoriste"
 faith_hathor_adherent: "Hathoriste"
 faith_hathor_adherent_plural: "Hathoristes"
 faith_hathor_old: "Ancienne Maison du Grand Hathor"
 faith_hathor_old_adj: "Ancienne Maison de Hathor"
 faith_hathor_old_adherent: "Ancien Hathoriste"
 faith_hathor_old_adherent_plural: "Anciens Hathoristes"
 faith_hathor_desc: "Hathor le Guerrier est le protecteur et sauveur de son peuple. Bien qu'il soit grand et puissant, il est aussi bienveillant et miséricordieux, car il secourut les Hathorim des profondeurs de la mer lie-de-vin et les abrita d'Akawa, les emportant hors des eaux mortelles vers sa propre terre. Là, il les abrita et pourvut à leurs besoins, leur accordant la défense de la dense jungle et la guidance de ceux qui connurent les premiers cette terre. Désormais en sécurité dans les bras du puissant Hathor, son peuple cherche à imiter sa force, son courage et sa résilience, sachant que quoi qu'il advienne ils sont en sûreté, défendus par leur indomptable Hathor.\n\nLes Hathorim nourrissent une méfiance traditionnelle envers les [sea_peoples|E], les craignant comme les serviteurs maléfiques du dieu de la mer Akawa."

 faith_tyar: "Tyarisme"
 faith_tyar_adj: "Tyarisme"
 faith_tyar_adherent: "Tyariste"
 faith_tyar_adherent_plural: "Tyaristes"
 faith_tyar_old: "Ancien $faith_tyar$"
 faith_tyar_old_adj: "Ancien $faith_tyar_adj$"
 faith_tyar_old_adherent: "Ancien $faith_tyar_adherent$"
 faith_tyar_old_adherent_plural: "Anciens $faith_tyar_adherent_plural$"
 faith_tyar_desc: "Dans les terres septentrionales de $k_dushera$, le panthéon traditionnel $mumakani$ fut supplanté par le culte de Tyar. Seigneur des Montagnes et Dispensateur de Richesses, il est le patron de tous ceux qui créent, qu'ils soient forgerons, fermiers ou mères. Il accorde habileté et richesse à ceux qui l'implorent à ses sanctuaires sur les pentes, bénissant leurs œuvres ou leurs récoltes, mais si sa colère est éveillée, les collines déverseront leur feu et frapperont tout sans discernement."

 faith_gan: "Majarisme"
 faith_gan_adj: "Majarim"
 faith_gan_adherent: "Maimak"
 faith_gan_adherent_plural: "Maimaki"
 faith_gan_old: "Ancien $faith_gan$"
 faith_gan_old_adj: "Ancien $faith_gan_adj$"
 faith_gan_old_adherent: "Ancien $faith_gan_adherent$"
 faith_gan_old_adherent_plural: "Anciens $faith_gan_adherent_plural$"
 faith_gan_desc: "Dans les terres reculées de $k_gan$, les grandes divinités des $mumakan_religion_adherent_plural$ exercent moins d'influence. La croyance s'est plutôt focalisée sur le culte des [Glossary('Majari','majari_gloss')], qui à leur mort demeurent près de leurs proches, veillant sur eux tant qu'ils sont remémorés. Ces esprits habitent le monde naturel, et l'on dit qu'occasionnellement les plus grands d'entre eux peuvent pour un temps reprendre forme et marcher incognito parmi les hommes.\n\nDe leurs ancêtres, les [Glossary('Maimaki','maimaki_gloss')] tirent leurs codes et coutumes, au premier rang desquels une forte tradition de droit d'hospitalité et de soin envers les indigents et les voyageurs. Ces préceptes évolueraient en les diverses croyances d'$e_shayn$, qui toutes partagent une profonde révérence pour leurs ancêtres ou le monde naturel."

 faith_uvag: "Apaisement des Uvâg"
 faith_uvag_adj: "Uvâgisme"
 faith_uvag_adherent: "Uvâgiste"
 faith_uvag_adherent_plural: "Uvâgistes"
 faith_uvag_old: "Ancien $faith_uvag$"
 faith_uvag_old_adj: "Ancien $faith_uvag_adj$"
 faith_uvag_old_adherent: "Ancien $faith_uvag_old_adherent$"
 faith_uvag_old_adherent_plural: "Anciens $faith_uvag_old_adherent_plural$"
 faith_uvag_desc: "Depuis leur avènement en tant que peuple, la vie des Drenim fut toujours entrelacée aux Montagnes Jaunes. L'émergence des [goblins|E] Graveurs-de-Marques, que les Drenim en vinrent à appeler les Uvâg, de leurs profondeurs aurait un profond impact sur leurs pratiques spirituelles.\n\nSous le couvert de la nuit, les Uvâg dérobaient le bétail des Drenim, et occasionnellement des Drenim eux-mêmes, laissant derrière eux de mystérieuses marques gravées dans les pierres. Peuple superstitieux, les Drenim en vinrent à associer les Uvâg aux esprits tourmentés de leurs ancêtres, condamnés à arpenter le monde en corps corporels la nuit venue. Pour repousser les attaques, les Drenim érigèrent leurs propres structures de pierre sur leurs collines, y laissant des sacrifices d'animaux en offrande aux damnés. Lorsqu'ils revenaient au matin, les animaux avaient disparu et de nouvelles marques apparaissaient sur les pierres. De cette manière, les Drenim parvinrent à une forme de symbiose avec les « Uvâg », qui apprirent à identifier leurs patrons [mannish|E] et brûlaient joyeusement les villages de tout étranger qui osait poser le pied sur leurs terres."

 faith_degi: "Épreuves de Degi"
 faith_degi_adj: "Degi"
 faith_degi_adherent: "Chercheur"
 faith_degi_adherent_plural: "Chercheurs"
 faith_degi_old: "Anciennes $faith_degi$"
 faith_degi_old_adj: "Ancien $faith_degi_adj$"
 faith_degi_old_adherent: "Ancien $faith_degi_adherent$"
 faith_degi_old_adherent_plural: "Anciens $faith_degi_adherent_plural$"
 faith_degi_desc: "Loin dans l'est d'$e_shayn$, les peuples des jungles ont développé une profonde révérence pour leur terrain natal, délaissant les grands panthéons cosmiques des étrangers. Ils tiennent la forêt elle-même, qu'ils nomment Degi, pour leur dieu, un suzerain dur mais juste. À travers les dangers de la jungle et les menaces venues de l'extérieur, il affine et éprouve son peuple, jugeant dignes de sa bénédiction et de la générosité de son domaine ceux qui survivent. Maints secrets recèle son royaume, connaissance des bêtes et des plantes, de la terre et du ciel, dévoilée à ceux qui s'en montrent dignes. Peu de culte il exige sinon une reconnaissance silencieuse, car simplement endurer ses épreuves est révérence suffisante."

 faith_amba: "Force des Reines"
 faith_amba_adj: "Ambaïte"
 faith_amba_adherent: "Guerrière"
 faith_amba_adherent_plural: "Guerrières"
 faith_amba_old: "Ancienne $faith_amba$"
 faith_amba_old_adj: "Ancien $faith_amba_adj$"
 faith_amba_old_adherent: "Ancienne $faith_amba_adherent$"
 faith_amba_old_adherent_plural: "Anciennes $faith_amba_adherent_plural$"
 faith_amba_desc: "Amba était jadis la plus jeune fille d'Amâv, fière et brave, qui désirait l'épée plus que tout époux. Allant vers son puissant père, elle exigea de lui un royaume à elle, dans lequel elle pourrait être son propre maître. Il lui accorda l'île d'Amujici, à condition qu'elle occît le grand serpent de mer du même nom qui en gardait les eaux. Armée seulement d'une petite dague, elle se mit en route et lutta avec la bête durant sept jours et sept nuits, avant qu'enfin elle ne fût vaincue, et que son grand corps ne formât un pont vers sa nouvelle terre, désormais nommée $b_skand_ambason$. Son nouveau royaume assuré, d'autres femmes de même inclination la rejoignirent et bâtirent une société matriarcale et martiale où ses adeptes imitent son exemple : féroces, indépendantes et autonomes."

 faith_buradwa: "Humeurs de la Mer"
 faith_buradwa_adj: "Bûradwan"
 faith_buradwa_adherent: "Pêcheur"
 faith_buradwa_adherent_plural: "Pêcheurs"
 faith_buradwa_old: "Anciennes $faith_buradwa$"
 faith_buradwa_old_adj: "Ancien $faith_buradwa_adj$"
 faith_buradwa_old_adherent: "Ancien $faith_buradwa_adherent$"
 faith_buradwa_old_adherent_plural: "Anciens $faith_buradwa_adherent_plural$"
 faith_buradwa_desc: "Les $akanali$ ont toujours craint la mer, la jugeant capricieuse et changeante, prompte à occire ceux qu'elle nourrissait jadis. Pourtant, sur les côtes de Shayn, certains vivent néanmoins sur ses rivages et ont appris en quelque mesure à la comprendre. Ils parlent de plusieurs esprits qui demeurent parmi les vagues, et de leurs querelles et réconciliations découlent les humeurs toujours changeantes de la mer. $mumakan_ocean_god_name$, seigneur de la tempête et des vagues, est le plus grand d'entre eux, mais il se soucie peu des hommes et des créatures de la mer, et ne répond ni aux prières ni aux supplications. Ceux qui vivent le long du rivage trouveraient meilleur secours auprès de son frère plus doux, $mumakan_god_buradwa_name$, maître de la pluie, qui prête l'oreille à ceux qui implorent son aide, envoyant des pluies douces et de tendres brises. Vers $mumakan_god_yangya_name$, épouse de $mumakan_ocean_god_name$, ils peuvent aussi se tourner, car à elle appartiennent les bêtes des profondeurs et les plantes le long du rivage, la générosité de la vie parmi les vagues tumultueuses. Bien que l'océan demeure incertain, il ne recèle point seulement la crainte mais aussi l'opportunité, si $mumakan_god_buradwa_name$ accorde ses calmes et $mumakan_god_yangya_name$ ses troupeaux."

 faith_mubadar: "Rage de $mumakan_war_god_name$"
 faith_mubadar_adj: "$mumakan_war_god_name$an"
 faith_mubadar_adherent: "Berserker"
 faith_mubadar_adherent_plural: "Berserkers"
 faith_mubadar_old: "Ancienne $faith_mubadar$"
 faith_mubadar_old_adj: "Ancien $faith_mubadar_adj$"
 faith_mubadar_old_adherent: "Ancien $faith_mubadar_adherent$"
 faith_mubadar_old_adherent_plural: "Anciens $faith_mubadar_adherent_plural$"
 faith_mubadar_desc: "Parmi certains guerriers de $Ji_Indur$, un culte encore plus extrême s'est élevé, révérant $mumakan_war_god_name$, le seigneur de la guerre et de la destruction, premier serviteur de $Ji_Indur$. Ses pratiquants croient qu'avec une préparation, une cérémonie et un sacrifice appropriés, ils peuvent devenir des conduits pour $mumakan_war_god_name$, déchaînant sa colère et sa ruine sur leurs ennemis au combat. Oints d'huiles et de peintures, sans peur face au danger, les $faith_mubadar_adherent_plural$ de $mumakan_war_god_name$ sont les armes les plus redoutées sur les champs de bataille du sud. Tandis qu'ils ne jurent que par leur mode de vie martial et la puissance qu'il confère, ceux qu'ils affrontent prétendent qu'il ne s'agit que d'un prétexte pour assouvir leurs instincts sadiques."