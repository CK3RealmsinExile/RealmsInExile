l_french:
 ################################
 ### Southern Orcish Religion ###
 ################################

 southern_orcish_religion: "Orque Méridional"
 southern_orcish_religion_adj: "Orque Méridional"
 southern_orcish_religion_desc: "Longtemps éloignés des Seigneurs Sombres du nord, les Orques de l'Extrême-Sud ne conservent qu'une ombre de ce souvenir. Leurs panthéons regorgent de myriades d'esprits ténébreux et de démons dignes à la fois de révérence et de crainte."
 southern_orcish_religion_adherent: "Orque"
 southern_orcish_religion_adherent_plural: "Orques"

 volcano_cult: "Ost d'Ulkhásh"
 volcano_cult_adj: "Ulkháshukh"
 volcano_cult_adherent: "Ulkháshul"
 volcano_cult_adherent_plural: "Ulkháshuli"
 volcano_cult_desc: "Les [orcs|E] des [yellowmountains|E] vouent une grande révérence et une grande crainte aux montagnes de feu qui parsèment leurs terres. Selon leurs récits, ces montagnes de feu furent d'abord élevées par le dieu de la guerre Ulkhásh, comme arme pour détruire ses éternels ennemis, les vils [dwarves|E]. Bien que ses flammes aient porté un coup terrible aux [blacklocks|E], fracassant leur demeure montagnarde, Ulkhásh fut occis avant que sa victoire ne pût être pleinement réalisée.\n\nCes montagnes bénies par Ulkhásh sont désormais sauvages et imprévisibles, aussi susceptibles de frapper les enfants d'Ulkhásh que leurs légitimes ennemis. Les Ulkháshuli offrent des sacrifices réguliers à ces sommets, soit pour apaiser temporairement les flammes, soit pour hâter leur éruption, tandis que les plus dévots inhalent les vapeurs volcaniques dans l'espoir d'acquérir une vision prophétique. Les Ulkháshuli croient qu'avec suffisamment de sacrifices, chaque montagne entrera un jour en éruption, détruisant les Nains et obscurcissant à jamais le soleil maudit dans le ciel."

 orc_spider_cult: "Culte d'Enânagosnî" #MERP prodigy of Ungoliant. Legend blended with Ungoliant's
 orc_spider_cult_adj: "Enânagosnî"
 orc_spider_cult_adherent: "Cultiste d'Enânagosnî"
 orc_spider_cult_adherent_plural: "Cultistes d'Enânagosnî"
 orc_spider_cult_desc: "Dans les recoins les plus ténébreux des [yellowmountains|E], la nourriture est souvent plus rare que la lumière. Les [orcs|E] d'ici parlent d'Enânagosnî, une antique déesse-araignée d'une terrible malveillance. L'on dit qu'Enânagosnî creusa les premiers tunnels sous la montagne et but la lumière qui les emplissait. Elle enfanta les premières ombres et donna ainsi aux Orques un foyer. Bien que la nourriture fût rare, elle enseigna aux premiers Cultistes à tisser des toiles et à fabriquer des pièges. Malgré tous ses dons, cependant, la déesse-araignée est capricieuse. Elle dévora maints Orques, tous ceux qu'elle pouvait attraper, et, toujours plus affamée, se tourna au-delà des tunnels pour se repaître du monde extérieur. Bien que les Cultistes d'Enânagosnî craignent son retour éventuel, ils révèrent néanmoins ses enseignements."
 
 faith_marketcher: "Rites des Dâyanûshu"
 faith_marketcher_adj: "Dâyanûshu"
 faith_marketcher_adherent: "Ritualiste"
 faith_marketcher_adherent_plural: "Ritualistes"
 faith_marketcher_desc: "Depuis que les premiers [goblins|E] se glissèrent dans les [yellowmountains|E] orientales, il y a de longs éons, ils ont connu une vérité : le monde extérieur est une prison. Les grands espaces, sous le soleil brûlant et les étoiles maudites, sont le royaume des terrifiants Dâyanûshu — des esprits malveillants acharnés à dominer la volonté des vivants.\n\nDes rituels constants sont nécessaires pour tenir les Dâyanûshu à distance. Des stalagmites particulièrement acérées sont choisies et gravées de runes protectrices. Des sacrifices sont ensuite placés au sommet de ces épines, leur sang s'écoulant à travers chaque ligne soigneusement sculptée. Les plus élaborés de ces rituels peuvent impliquer des mosaïques de sang tentaculaires, aux motifs aussi complexes que macabres." 
 
 faith_murghuri: "Commandement des Murghúri"
 faith_murghuri_adj: "Murghúrhuli"
 faith_murghuri_adherent: "Murghúrhul"
 faith_murghuri_adherent_plural: "Murghúrhuli"
 faith_murghuri_desc: "Parmi les [orcs|E] des Montagnes Jaunes, l'on raconte en chuchotements feutrés les récits des Murghúri, un démon d'antique pouvoir. Çà et là il erre, drapé dans la nuit la plus noire, rassemblant des serviteurs pour obéir à son noir commandement. Ceux qui refusent les Murghúri sont voués à la servitude et à la mort, tandis que ceux qui rejoignent son ost sont couverts de butin et gratifiés de faveurs mystiques.\n\nLe Murghúrhuli est un cas unique de syncrétisme accidentel, le culte des « Murghúri » étant, en vérité, une fusion de deux cultes sauroniques distincts, dédiés respectivement aux [ringwraith|E]s [khorahil|E] et $Ji_Indur$. Bien que l'hybridation des deux en une seule foi n'ait nullement été intentionnelle, leur fusion finit par servir les intérêts sauroniques dans la région, permettant à l'un ou l'autre Nazgûl de tirer profit des gains réalisés par l'autre." 
 
 faith_peltripper: "Praukîb-kai"
 faith_peltripper_adj: "Praukîbzûr"
 faith_peltripper_adherent: "Praukîbzu"
 faith_peltripper_adherent_plural: "Praukîbzûr"
 faith_peltripper_desc: "Les récits de démons et d'esprits ont longtemps proliféré parmi les [orcs|E] et [goblins|E] superstitieux de l'Extrême-Sud. Bien que les qualités exactes de ces êtres varient d'une tribu à l'autre et d'un récit à l'autre, ils sont presque universellement considérés comme des entités malveillantes, apaisées seulement par des actes d'incroyable violence ou de généreux tributs.\n\nLa plupart des cultes s'accordent à dire que le plus grand tribut que l'on puisse offrir est de mourir glorieusement au combat, une croyance qui a forgé une attitude unique parmi les croyants. Les adeptes s'efforcent de mériter une mort légendaire, ou à défaut, d'accumuler assez de butin pour rassasier les appétits voraces de leurs dieux capricieux."