l_french:

 hakimian_religion: "Hakîmian"
 hakimian_religion_adj: "Hakîmien"
 hakimian_religion_desc: "Depuis les jours anciens, une foi longtemps négligée aurait perduré, murmurée à voix basse parmi les Hommes des Ténèbres du Sud et de l'Est — du moins le prétend-on. Elle plonge ses racines dans l'antique Voix qui s'adressa jadis à l'humanité à son aurore, et que celle-ci rejeta ensuite pour suivre le Grand Homme. Cette Voix, ils la nommèrent Hakîma, « Celui qui Parla », et ils n'oublièrent point son jugement sur leur chute. Ceux qui, rares entre tous, se souviennent de cette vérité s'efforcent, dans le secret et souvent en vain, de se repentir et de mener des vies droites et nobles. Peut-être un jour entendront-ils de nouveau la Voix de Hakîma."
 hakimian_religion_adherent: "Hakîmien"
 hakimian_religion_adherent_plural: "Hakîmiens"

 faith_hakimian: "Hakîmian"
 faith_hakimian_adj: "Hakîmien"
 faith_hakimian_adherent: "Hakîmien"
 faith_hakimian_adherent_plural: "Hakîmiens"
 faith_hakimian_desc: "Les Hakîmiens sont ces Hommes du Sud et de l'Est qui préservèrent le plus fidèlement la vérité de l'aurore des Hommes — et de leur chute. Car tandis que les Edain marchaient vers l'Occident, gagnant lumière et vérité, ceux qui se repentirent de leurs péchés mais demeurèrent à l'Est furent bien peu nombreux. Leurs frères déchus les jugèrent fanatiques, contempteurs des Dieux voués à détruire leurs temples. Persécutés sans merci, ils se cachèrent et furent oubliés. Les Sages eux-mêmes, s'ils en eurent jamais connaissance, les tinrent pour un mythe, un récit de consolation suggérant que l'Est et le Sud n'avaient point sombré tout entiers dans les ténèbres du mal ou de l'ignorance.\n\nBien peu — si peu — de Hakîmiens survécurent, leurs épreuves sans mesure et leurs souffrances innombrables. Mais leur foi fut leur rempart et leur étoile, alors même que tous leurs frères les reniaient et les nommaient fanatiques. Les Hakîmiens demeurent fidèles à cet espoir : qu'un jour la Voix leur parlera de nouveau."