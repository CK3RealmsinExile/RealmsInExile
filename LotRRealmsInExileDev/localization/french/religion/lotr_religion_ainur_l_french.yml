 ### Ainur Religion ###
 ainur_religion: "Ainur"
 ainur_religion_adj: "Ainur"
 ainur_religion_desc: "Les croyances et pratiques des [ainurgods|E] qui pénétrèrent dans le monde."
 
 faith_ainur: "Aþâraphelûn"
 faith_ainur_adj: "Aþâraphelûn"
 faith_ainur_adherent: "Ainu"
 faith_ainur_adherent_plural: "Ainur"
 faith_ainur_desc: "La gouvernance du Monde et des Enfants fut la charge confiée aux [ainurgods|E] par [iluvatar|E] lui-même. Bien qu'imparfaits parfois, les Ainur s'efforcent de se montrer dignes des attentes du Créateur, et de régner avec équité et justice.\n\nAþâraphelûn est l'un des rares mots connus du Valarin, la langue des [powersgods|E], réputée imprononçable pour quiconque n'appartient pas aux Ainur. Il se traduit par « Demeure Consacrée » — le monde d'[ardaconcept|E], que les Ainur façonnèrent durant la [greatsong|E] sous la conduite d'[eruiluvatar|E]."