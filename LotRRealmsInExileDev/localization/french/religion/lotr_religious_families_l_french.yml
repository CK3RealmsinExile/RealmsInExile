 forces_of_evil_religion_adherent_plural: "Forces du Mal"
 forces_of_evil_religion_desc: "Les Forces du Mal désignent les croyances viles et cruelles qui embrassent les Seigneurs Sombres et leurs enseignements, aspirant au pouvoir et à la domination sur tous les êtres vivants — les ennemis implacables des Peuples Libres."
  
