 # Free Peoples Religious Family
 rf_eruhini: "Enfants d'[iluvatar|E]"
 religion_group_eruhini: "Eruhíni"
 religion_group_eruhini_adj: "Eruhíni"
 religion_group_eruhini_adherent: "Enfant d'[iluvatar|E]"
 religion_group_eruhini_adherent_plural: "Enfants d'[iluvatar|E]"
 rf_eruhini_desc: "« Lorsque nous vous nommons "Enfants d'Eru", nous ne parlons point à la légère. Nous proclamons que vous êtes nos parents, d'une parenté bien plus étroite que celle qui lie toutes les autres créatures d'[ardaconcept|E], et nous-mêmes à elles. »\n\nLes Enfants d'[iluvatar|E], également Híni Ilúvataro ou Eruhíni, sont les deux races des Elfes et des Hommes. Leur existence, ainsi que l'Univers dans lequel ils devaient vivre, fut conçue dans la Musique des [ainurgods|E], mais les Ainur n'eurent aucune part à leur création. Ilúvatar seul leur donna l'être, et ils possédaient des fëar (esprits) de même nature que les Ainur, quoique bien moins puissants."

 free_peoples_religion: "Eruhíni"
 free_peoples_religion_desc: "« Lorsque nous vous nommons "Enfants d'Eru", nous ne parlons point à la légère. Nous proclamons que vous êtes nos parents, d'une parenté bien plus étroite que celle qui lie toutes les autres créatures d'[ardaconcept|E], et nous-mêmes à elles. »\n\nLes Enfants d'[iluvatar|E], également Híni Ilúvataro ou Eruhíni, sont les deux races des Elfes et des Hommes. Leur existence, ainsi que l'Univers dans lequel ils devaient vivre, fut conçue dans la Musique des [ainurgods|E], mais les Ainur n'eurent aucune part à leur création. Ilúvatar seul leur donna l'être, et ils possédaient des fëar (esprits) de même nature que les Ainur, quoique bien moins puissants."
 free_peoples_religion_adj: "Eruhíni"
 free_peoples_religion_adherent: "Enfant d'[iluvatar|E]"
 free_peoples_religion_adherent_plural: "Enfants d'[iluvatar|E]"

 free_peoples: "Peuples Libres"
 free_peoples_adj: "des Peuples Libres"
 free_peoples_adherent: "des Peuples Libres"
 free_peoples_adherent_plural: "des Peuples Libres"
 free_peoples_desc: "Les Peuples Libres de la Terre du Milieu étaient ceux qui n'étaient point sous la domination de Sauron." # The Battle for Middle-earth is fought for the freedom of all people. All races not under the enslavement of Morgoth or Sauron are represented.

