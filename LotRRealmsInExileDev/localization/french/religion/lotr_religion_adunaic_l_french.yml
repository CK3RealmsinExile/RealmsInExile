l_french:
 adunai_religion: "Adûnaïque"
 adunai_religion_adj: "Adûnaïque"
 adunai_religion_desc: "Les Adûnâi descendent des [black_numenoreans|E] et des [kingsmen|E], qui en vinrent à rejeter l'ordre spirituel tel que transmis par les [elves|E] et les [avaloigods|E]. Leurs croyances embrassent un vaste éventail de pratiques et de doctrines, mais un fil commun les unit : la nature bénie de l'héritage [numenorean|E] — adûnaïque."
 adunai_religion_adherent: "Adûnâ"
 adunai_religion_adherent_plural: "Adûnâi"
 
 ### BLACK NÚMENÓREAN ###
 faith_kings_men_numenorean: "Ârûwânai"
 faith_kings_men_numenorean_adj: "Ârûwânai"
 faith_kings_men_numenorean_adherent: "Ârûwân"
 faith_kings_men_numenorean_adherent_plural: "Ârûwânai"
 faith_kings_men_numenorean_desc: "Les [kingsmen|E] (Ad. [Glossary('Ârûwânai','aruwanai_gloss')]) naquirent d'abord comme faction politique au sein de la Cour [numenorean|E], mais le temps les transforma en bien davantage. Les [numenoreans|E], aspirant à la vie éternelle dans leur félicité, en vinrent à s'irriter de l'[banofthevalar|E]. De même, ils commencèrent à jalouser les [eldar|E], dont la vie éternelle leur revenait de droit, estimaient-ils, par leur ancêtre Azrubêl, Eärendil l'Étoile du Matin. Ils jugèrent que les [avaloigods|E] leur refusaient le choix de leur Destin par malveillance, non par impuissance. Avec le temps, cette conviction s'enracina : c'était l'[conceptmankind|E], non les [ainurgods|E] ni les [elves|E], qui était la véritable héritière du monde, et leur heure était venue. Et parmi les Hommes, les [numenoreans|E] étaient les plus purs, les plus dignes — ainsi sombrèrent-ils dans l'hédonisme et la tyrannie.\n\nEnvers [erutheone|El], les vues des Ârûwânai divergeaient grandement. Beaucoup conservaient quelque vestige de leur ancienne révérence, le tenant pour le seul vrai Dieu de l'Humanité, face aux Valar inféodés aux [elves|E]. Mais tout autant en vinrent à douter de lui ou à lui en vouloir, car il semblait silencieux, réticent à secourir ou amender sa création.\n\nAu lendemain immédiat de la [downfallofnumenor|E], les Ârûwânai maintinrent leur loyauté envers le roi légitime, Ar-Pharazôn. Ainsi ne revendiquèrent-ils aucune royauté, mais fondèrent des oligarchies vouées à gouverner jusqu'au retour du roi légitime. Cependant, à mesure que le [thirdage|E] progressait et que l'évidence d'un non-retour s'imposait, l'idéologie des Ârûwânai évolua pour accepter tout monarque [adunai|E] « légitime »."
 
 agannalumaba_aru: "Agannâlumâbâ Âru"
 faith_pharazon: "Culte de l'$agannalumaba_aru$"
 faith_pharazon_adj: "$agannalumaba_aru$"
 faith_pharazon_adherent: "Pharazonôhin"
 faith_pharazon_adherent_plural: "Pharazonôhini"
 faith_pharazon_desc: "L'[Glossary('$agannalumaba_aru|q$','agannalumaba_aru_gloss')] désigne le culte voué à [GetScriptedCharacterByHistoryID( 'lineofelros28' ).GetTitledFirstNameNicknamed] en tant que dieu-roi immortel.\n\nCette foi proclame que [pharazon_golden|E] triompha dans sa guerre contre les [valargods|E], mais qu'au terme de l'affrontement, les [undyinglands|E] et [anadune|E] (désormais elle aussi terre sacrée et éternelle) furent retirées du monde, et le chemin perdu pour ceux restés en arrière. [GetScriptedCharacterByHistoryID( 'lineofelros28' ).GetTitledFirstName] prit place sur son trône en tant que nouveau Grand Dieu, Arminalêth rebâtie de ses ruines en glorieuse cité-temple et siège de sa puissance. Depuis la nouvelle [anadune|E] Éternelle, l'$agannalumaba_aru$ veille sur tous ses peuples abandonnés, et aspire à les guider vers la gloire et la vie éternelle en son nouveau royaume.\n\nPour atteindre cette fin, les hommes de moindre lignée doivent être offerts en son nom. Que le sang coule dans les temples, soutenant ce monde brisé par la grâce de l'$agannalumaba_aru$ — jusqu'au jour glorieux où les dignes s'élèveront dans son royaume éternel."

 ### An-Balkûmagân ###
 faith_anballukhor: "Batân an-Aphan"
 faith_anballukhor_adj: "Batân an-Aphan"
 faith_anballukhor_adherent: "Aphaniste"
 faith_anballukhor_adherent_plural: "Aphanistes"
 faith_anballukhor_desc: "Au lendemain de la [downfallofnumenor|E], bien des croyances anciennes furent ébranlées. Du chaos et des tourments des premiers siècles du [thirdage|E] émergea une nouvelle doctrine en [anbalkumagan|E], connue sous le nom de Batân an-Aphan, ou « Voie de la Félicité ».\n\nReconnaissant la nature éphémère de l'existence et la nécessité d'en tirer le meilleur parti, les Aphanistes recherchent des joies et des plaisirs toujours plus grands — qu'ils tiennent pour le bien suprême de cette vie, dont la valeur morale est évidente. Ceux qui embrassent l'ascèse en quête de vertu se font du tort sans raison.\n\nSelon la vision aphaniste du monde, certains sont prédestinés à la prospérité, et ce sont les [adunai|E]. Gratifiés d'années plus nombreuses en ce monde, leurs jours de jouissance prolongés, ils ont reçu un mandat divin de rechercher des joies toujours plus intenses, des beautés plus parfaites. Quel qu'en soit le prix. En conséquence, leurs rangs comptent parmi les plus grands hédonistes et les tyrans les plus cruels et égoïstes que les Hommes aient engendrés."

 ### Thâni-Hazâd ###
 faith_thani_hazad: "Khôrî an-Anûwî"
 faith_thani_hazad_adj: "Khôrî an-Anûwî"
 faith_thani_hazad_adherent: "Khôr"
 faith_thani_hazad_adherent_plural: "Khôrî"
 faith_thani_hazad_desc: "Les Khôrî an-Anûwî, ou « Seigneurs des Hommes », désignent la philosophie politico-religieuse dominante pratiquée par les [adunai|E] de l'ancienne Principauté de [zimrathani|E].\n\nEn son cœur, elle professe que les [adunai|E], en tant que peuple le plus avancé, le plus raffiné et le plus béni de l'[conceptmankind|E], détiennent un mandat divin pour gouverner et ordonner le monde au profit de tous. À la différence de leurs frères plus rapaces, les adeptes des Khôrî an-Anûwî soutiennent que ce mandat n'est pas inconditionnel — leur domination s'accompagne de responsabilités : régner avec droiture et équité, même si parfois avec sévérité, sur leurs parents « plus simples »."

 faith_gimileth: "Nadrôth 'nSapthân-lâi"  #Wake of the Wise-Folk
 faith_gimileth_adj: "'nSapthân-lâi"
 faith_gimileth_adherent: "Sapthân"
 faith_gimileth_adherent_plural: "Sapthânî"
 faith_gimileth_desc: "Courant assez rare dans la pensée adûnaïque, l'école du Nadrôth 'nSapthân-lâi est peut-être la plus proche des Fidèles d'antan parmi les Hommes du Roi. Signifiant « le Sillage du Peuple-Sage », cette école met l'accent sur une notion de continuité et de mandat divins — Êru a désigné une succession de gardiens et de maîtres du monde, destinés à régner puis à s'effacer tour à tour. Vinrent d'abord les Avalôi, qui façonnèrent le monde et enseignèrent les Nimîr. À leur tour, les Nimîr revinrent en Terre du Milieu et élevèrent la race des Hommes, leurs propres disciples devenant les [adunai|E]. Ainsi les [adunai|E] reçurent-ils le mandat de régner et de former la génération suivante, répandant lumière et guidance dans leur sillage — d'où le nom de l'école.\n\nCertains adeptes soutiennent que l'Akallabêth fut le châtiment pour avoir oublié ce fait au profit de la domination, et un rappel — les ères des Avalôi et des Nimîr ne furent point éternelles, et celle des [adunai|E] ne le sera pas davantage.\n\nBien qu'elle ne soit pas exempte de paternalisme culturel, l'école du Nadrôth 'nSapthân-lâi demeure peut-être la plus proche, parmi les [adunai|E], des intentions originelles des Númenóréens, venus en Terre du Milieu comme enseignants et amis des Hommes."
 
 ### Tanturak ###
 path_of_zigur: "Batân an-Zigûr"
 path_of_zigur_adj: "Zigûrun"
 path_of_zigur_adherent: "Zigûrun"
 path_of_zigur_adherent_plural: "Zigûrunî"
 path_of_zigur_desc: "La Voie du Magicien (ou Sorcier), ainsi qu'elle est connue, est un credo adûnaïque qui professe qu'une puissance gît en ce monde, attendant d'être saisie, dissimulée par ceux qui redoutaient la venue des Hommes. Mais le voile d'ignorance fut levé par le Magicien, le Sorcier, Zigûrun le Sage, dispensateur de savoir, dispensateur de dons ! Le plus puissant de tous est-il, car il découvrit la vérité de la magie, et comment plier le monde à sa propre volonté. Nul ne peut égaler sa puissance, mais par son enseignement, même des êtres moindres peuvent s'élever et devenir maîtres de multitudes."