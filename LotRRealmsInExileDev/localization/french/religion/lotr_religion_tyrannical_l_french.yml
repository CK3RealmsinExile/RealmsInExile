l_french:
 ###########################
 ### Tyrannical Religion ###
 ###########################
 
 tyrannical_religion: "Tyrannique"
 tyrannical_religion_adj: "Tyrannique"
 tyrannical_religion_desc: "À leur racine, tous les credos des ténèbres sont des credos de Tyrans, qui mettent en avant leur propre culte par-dessus tout. Même s'ils ne prétendent point être Morgoth ou l'un de ses héritiers, ils sont les dépositaires de son orgueil et de son désir de domination, à défaut d'autre chose."
 tyrannical_religion_adherent: "Tyran"
 tyrannical_religion_adherent_plural: "Tyrans"

 white_hand_cult: "Culte de la Main Blanche"
 white_hand_cult_adj: "de la Main Blanche"
 white_hand_cult_adherent: "Serviteur de la Main Blanche"
 white_hand_cult_adherent_plural: "Serviteurs de la Main Blanche"
 white_hand_cult_desc: "Une nouvelle puissance s'élève. Les Jours Anciens sont révolus. Les Jours du Milieu s'achèvent. Les Jours Nouveaux commencent. Et c'est [sarumancharacter|E] qui ordonnera cette ère nouvelle vers la paix et la prospérité. Lui seul possède la sagesse pour ordonner le monde.\n\nLe Culte de la Main Blanche est un culte de la personnalité qui souligne l'incapacité des souverains ordinaires à ordonner convenablement leur propre vie ou celle de leurs peuples. Ils ont besoin d'un guide, et en tant que plus grand des Sages, ce rôle revient de droit à Saruman, le plus puissant des [istariconcept|E].\n\nLes fidèles de la Main Blanche forment un mélange hétéroclite d'Uruk-hai et d'[conceptracemen|E], unis dans leur dessein de placer toute la [middleearth|E] sous la domination de Saruman. On les reconnaît aisément au Symbole de la Main Blanche, souvent grossièrement peint sur leurs boucliers et armures. Les plus dévots et les plus zélés le portent tatoué de façon permanente sur le front, la poitrine ou le dos.\nLes croyances exactes des Fidèles de la Main Blanche varient grandement selon les peuples. Beaucoup ne suivent ce culte que par pragmatisme et voient en Saruman une pâle imitation du véritable Seigneur Sombre, mais certains croient sincèrement que la Main Blanche apportera le salut à tous."
 k_the_white_hand: "Conseil de la Main Blanche"

 faith_dwarven_balrog_cult: "Harûsu Khuzru" # Flames of Fury
 faith_dwarven_balrog_cult_adj: "Harûsu Khuzru"
 faith_dwarven_balrog_cult_adherent: "Serviteur du Harûs" # Servant of the Flames (Flames in this context being a poetic way of referring to the Balrog)
 faith_dwarven_balrog_cult_adherent_plural: "Serviteurs du Harûs"
 faith_dwarven_balrog_cult_desc: "Le Harûsu Khuzru (ou les Flammes de la Fureur) soutient que le [balrog|E] de la [moria|E], plutôt qu'un démon, est les flammes de la terre faites chair, un émissaire de [mahalcharacter|E] ! Les fidèles croient que le jugement du Balrog fut provoqué par l'indolence et la paresse des anciens rois de [khazaddum|E].\n\nSi les fidèles acceptent son jugement et se repentent, il les épargnera et leur apportera une prospérité inimaginable, aux [dwarves|E]. Il leur suffit d'accepter sa domination et de le servir fidèlement..."