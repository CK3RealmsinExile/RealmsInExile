l_french:
 ### Elven Religion ###
 elven_religion: "Elfique"
 elven_religion_desc: "Les [elves|E] n'ont généralement ni temples ni clergé, mais pratiquent une forme de dévotion plus holistique et constante, invoquant les [valargods|E] pour les secourir. Ils prononcent le nom d'[erutheone|El] très rarement, le jugeant trop sacré pour tout usage hormis les plus solennels."
 elven_religion_adj: "Elfique"
 elven_religion_adherent: "Elfe"
 elven_religion_adherent_plural: "Elfes"

 #Elven Faiths localization
 faith_eldar: "Eldavaitalë" # Faith of the Eldar
 faith_eldar_adj: "Eldavaitalëa" # Faith of the Eldar
 faith_eldar_adherent: "Elda"
 faith_eldar_adherent_plural: "Eldar"
 faith_eldar_desc: "La foi des [eldar|E] ([quenya|E] : Eldavaitalë) est empreinte de solennité, sans temples ni ostentation. Aux pieds des [valargods|E], ils apprirent la vérité divine du monde et de l'[ainulindale|E]. Ils respectent et révèrent les [powersgods|E], et les invoquent pour les secourir, mais ne les adorent point — l'adoration est réservée à [erutheone|El] seul, et Son nom est jugé trop sacré pour tout usage hormis les vœux les plus solennels." 

 faith_arimaite_creed: "Credo Arimaitelië" # Arimaitë - 'Supremely Skilled', lië - 'folk, people' = 'The Supremely Skilled and Gifted Folk'
 faith_arimaite_creed_adj: "Credo Arimaitelië"
 faith_arimaite_creed_adherent: "Arimaitequén"
 faith_arimaite_creed_adherent_plural: "Arimaitelië"
 faith_arimaite_creed_desc: "#TOLKIENQUOTE « À Cuiviénen coulaient des eaux douces sous des étoiles sans nuages, et de vastes terres s'étendaient alentour, où un peuple libre pouvait cheminer. Là elles gisent encore et nous attendent, nous qui dans notre folie les avons abandonnées. »#!\n\nBien qu'il ne s'agisse pas véritablement d'une foi, le « Credo Arimaitelië », ainsi que le nommèrent certains érudits ultérieurs, représentait un certain courant de pensée chez les Noldor, et particulièrement les Noldor exilés. Il tire son nom de la philosophie de ses adeptes — que par leur art, le plus grand parmi tous les Enfants d'Eru, le monde sera enrichi et rendu bienheureux, et qu'ils seront véritablement libres.\n\nCes Elfes soutiennent que si les Valar règnent sur Aman, la Terre du Milieu est le patrimoine des Eldar. Ce sont les terres où ils s'éveillèrent et dont [eru|E] leur confia la maîtrise, où ils peuvent bâtir des royaumes véritablement leurs. Les Eldar ne doivent point se terrer en Valinor, leur dessein inaccompli. Ils doivent édifier des royaumes en Terre du Milieu, la relevant de sa ruine et l'élevant vers de plus hauts sommets par leur savoir. Par leurs mains, toute la Terre du Milieu pourrait encore devenir aussi belle que Valinor.\n\nDe tels Elfes ne souffriront la seigneurie de nul autre que les leurs, et s'offusquent de toute notion suggérant que le destin des Eldar en leurs terres natales serait voué à l'Effacement. Ils voient en de tels discours une forme de désespoir et de résignation, qu'il faut combattre en persévérant malgré les revers. Austères peuvent-ils sembler aux autres races, car ils sont très fiers, mais ils ne sont ni déraisonnables ni cruels. Simplement très certains de la justesse de leur mission."

 faith_nandorin: "Daetha Tauron"
 faith_nandorin_adj: "Daetha Tauron"
 faith_nandorin_adherent: "Tauroniste"
 faith_nandorin_adherent_plural: "Tauronistes"
 faith_nandorin_desc: "Bien qu'ils n'aient jamais achevé le [greatjourney|E], les [elves|E] Nandorin du [greenwoodshort|E], de [lorien|E] et du [anduinvale|E] s'y engagèrent. Durant cette longue marche, ils ne contemplèrent qu'une seule des [powersgods|E] — [tauroncharacter|E], le Grand Cavalier, le Chasseur. Dans sa vigilance, il les protégea, s'entretint avec eux, les guidant sur leur [greatjourney|E] vers l'ouest.\n\nAinsi, bien qu'ils connussent toutes les Puissances, Tauron occupait une place de faveur et d'adoration particulière parmi les Nandor, peut-être seulement égalée par Elbereth, celle qui alluma les étoiles.\n\nDans leur vie spirituelle, les Nandor développèrent des traditions de chasses sacrées et de festivals, miroirs des chasses de Tauron quand le monde était jeune."

 faith_moriquendi: "Moriquendi"
 faith_moriquendi_adj: "Moriquendi"
 faith_moriquendi_adherent: "Moriquende"
 faith_moriquendi_adherent_plural: "Moriquendi"
 faith_moriquendi_desc: "Les [moriquendielves|E] sont les Elfes qui demeurèrent dans les ténèbres de la Terre du Milieu, délaissant la lumière de [valinor|E] pour la paix sous les étoiles. Ayant refusé l'appel des [valargods|E] à quitter [cuivienen|E], ils ne révèrent pas les [ainurgods|E] de la même manière que les [caliquendielves|E], tournant plutôt leur dévotion principalement vers [iluvatar|E].\n\nEn général, ils ne sont guère portés sur la religion apparente, avec peu de sacrements ou de prières, se contentant de participer avec gratitude à la création d'Ilúvatar, par laquelle il se révèle à eux plutôt que par l'enseignement ou le dogme."

