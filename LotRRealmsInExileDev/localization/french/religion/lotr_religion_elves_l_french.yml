 faith_feanturi: "Trinité des Fëanturi"
 faith_feanturi_adj: "Fëanturiens"
 faith_feanturi_adherent: "Disciple des Fëanturi"
 faith_feanturi_adherent_plural: "Disciples des Fëanturi"
 faith_feanturi_desc: "Cette foi révère les [Glossary('Fëanturi','feanturi_gloss')] par-dessus tous — [mandoscharacter|E], [loriencharacter|E], et leur sœur [niennacharacter|E]. Il arrive que les épouses de Mandos et Lórien, [vairecharacter|E] et [estecharacter|E], soient également considérées comme Fëanturi, ce qui élève la trinité en une pentarchie dans cette pratique.\n\nIls sont révérés et respectés pour leur influence et leur guidance dans les matières éphémères et incorporelles — les affaires de l'esprit et de l'âme. Vers ces [powersgods|E] se tournent les fidèles, espérant percevoir les vérités de ce qui est spirituel et atteindre une illumination introuvable dans le domaine physique.\n\nLa forme corporelle, bien qu'un don, n'est pas considérée comme nécessaire par les fidèles, et beaucoup parmi eux tiennent l'Effacement pour un don de valeur égale.\n\nLes [hallsofmandos|E] sont considérées par les fidèles comme une terre sainte, un havre de l'esprit à l'abri du reste du monde physique, y compris [valinor|E]."

 faith_penni: "Ti Linnalen oPhalammara"
 faith_penni_adj: "Lhinnalen"
 faith_penni_adherent: "Linna" # Singer
 faith_penni_adherent_plural: "Linnai" # Singers
 faith_penni_desc: "Vivant parmi les fées et esprits mineurs, les [penni|E] ont développé une vision du monde quelque peu singulière, connue sous le nom de [Glossary('Lhinnalen','lhinnalen_gloss')]. Mettant l'accent sur la notion du monde comme Chant incarné, les Penni poursuivent l'illumination en tentant de percevoir et de comprendre la Musique. Ils croient qu'ainsi, l'on peut trouver sa place dans la [greatsong|E], et donc atteindre paix et sérénité, quoi qu'il advienne. Cela leur permet à la fois une plus grande confiance dans le cours du monde, ainsi qu'une forme de résignation — si le monde fut déjà écrit, pourquoi lutter vainement contre lui ? Ce qui sera, sera — cela fut décrété dès l'origine, de la première strophe jusqu'au coda final."

 faith_cuind: "Athaleñi"
 faith_cuind_adj: "Athaleñi"
 faith_cuind_adherent: "Athalen"
 faith_cuind_adherent_plural: "Athaleñi"
 faith_cuind_desc: "La foi Athaleñi, chérie par les [elves|E] [cuind|E], est une tapisserie sereine entremêlée de révérence envers [eru|E] et les vénérés [valargods|E], avec une dévotion particulière vouée à [estecharacter|E]. Dans cette tradition sacrée, les Elfes Cuind trouvent un profond accomplissement spirituel par l'art nourricier de la guérison, s'efforçant d'apaiser les souffrances et la lassitude qui affligent leurs semblables et le monde autour d'eux.\n\nEstë, la douce gardienne du repos et du renouveau, occupe une place chérie dans le cœur des fidèles, servant de lumière guide dans leur quête pour soulager la souffrance et favoriser l'harmonie. Inspirés par sa présence sereine, les sites les plus sacrés des Elfes Cuind se nichent dans l'étreinte paisible de lacs ombragés d'arbres, où les eaux murmurantes font écho aux apaisants murmures du toucher guérisseur d'Estë.\n\nAu sein de leurs sanctuaires verdoyants, les Elfes Cuind s'adonnent à des rites informels et de joyeuses célébrations, tissant ensemble fêtes communautaires et méditations solitaires en hommage à leurs divins patrons. Par ces rituels, ils s'efforcent de cultiver une existence harmonieuse, œuvrant à minimiser souffrance et conflit tout en nourrissant les liens de parenté et de tranquillité qui définissent leur noble foi."

 faith_kinnlai_tree: "Lênglîtal Olon-lai" # Memory-tending of Trees
 faith_kinnlai_tree_adj: "Olonglîtal" # Tree-tending
 faith_kinnlai_tree_adherent: "Glîtam" #Tender
 faith_kinnlai_tree_adherent_plural: "Glîtam-lai" #Tenders
 faith_kinnlai_tree_desc: "La vitalité du monde naturel inspire les [kinnlai|E] depuis longtemps. Ils soutiennent que la splendeur d'[eruthecreator|E] se trouve dans les subtilités des multiples systèmes de vie, et nulle part ne sont-ils plus complexes ou nombreux que dans la vie des jungles qui dominent l'Extrême-Sud. Les nombreux arbres de la région, la couvrant d'est en ouest d'une dense canopée, forment un témoignage vivant, les arbres se souvenant et transmettant les récits des années. Les plus anciens de ces arbres sont précieusement gardés, et soigneusement entretenus par tous les [Glossary('Glîtam-lai','glitamlai_gloss')].\n\nLa perte de ces anciens est une tragédie, et en abattre un intentionnellement est considéré comme un acte grave. Certains arbres doivent tomber, cela fait partie du cycle de toute vie — mais la destruction gratuite, tant de la mémoire que de l'écosystème complexe qui fait écho à la vision du créateur, doit être sévèrement punie."

 faith_kinnlai_martial: "Astald Maktal"
 faith_kinnlai_martial_adj: "Astald Maktalak"
 faith_kinnlai_martial_adherent: "Disciple d'Astald Maktal"
 faith_kinnlai_martial_adherent_plural: "Disciples d'Astald Maktal"
 faith_kinnlai_martial_desc: "Aux jours anciens, les [elves|E] étaient la proie des serviteurs de [morgothcharacter|E], emmenés dans les profondeurs de l'enfer même. Pourtant à la fin, les [powersgods|E] surgirent, et par la force prévalurent, enchaînant le mal et libérant les Elfes de son ombre. Les disciples se souviennent des récits qu'on leur conta d'[astald_maktal|E], le Guerrier Vaillant, dont le rire mettait le mal en fuite et dont la force brisait les armées. Ami loyal, il se délecte des exploits de prouesse et de force, prompt à l'action et vivant chaque jour pleinement.\n\nLes Disciples d'Astald Maktal s'efforcent d'imiter les voies de leur maître. La lutte est considérée comme une activité sacrée, ainsi qu'une méthode courante de résolution des différends. Les jeux et autres épreuves d'habileté et de force constituent une pierre angulaire tant rituelle que culturelle. Selon la légende, les plus pieux peuvent même lutter avec leur maître (bien que la tradition reste frustrant vague sur la question de savoir si cela se produit en rêves, en visions, ou dans la réalité) ou l'un de ses disciples aînés, et une école singulière de combat à mains nues naquit de ces duels supposés."


 faith_conversion_cost_forces_of_evil: "Conversion à l'adoration des Ténèbres"