 #########################
 ### Melkoric Religion ###
 #########################

 melkoric_religion: "Melkorique"
 melkoric_religion_adj: "Melkorique"
 melkoric_adherent: "Melkoriste"
 melkoric_adherent_plural: "Melkoristes"
 melkoric_religion_desc: "Le culte de Melkor, le plus puissant des Ainur, autoproclamé Roi Ancien d'Arda."
 
 dark_worship: "Culte des Ténèbres"
 dark_worship_adj: "du Culte des Ténèbres"
 dark_worship_adherent: "Adorateur des Ténèbres"
 dark_worship_adherent_plural: "Adorateurs des Ténèbres"
 dark_worship_desc: "Foi originelle et primordiale que Morgoth alluma dans le cœur des hommes à Hildórien, le Culte des Ténèbres se caractérise à parts égales par la crainte et la vénération.\n\nEn son cœur, pourtant, règne une terreur indicible des Ténèbres dévorantes — la Mort — dont seul Morgoth pouvait libérer les Hommes, car lui seul était plus puissant qu'elle et que son Maître.\n\nLe Culte des Ténèbres ne souffrait nul autre dieu que le Seigneur Sombre, avec le Vide pour seule alternative à son règne."

 melkorite: "Mulkhêrhili"
 melkorite_adj: "Mulkhêrhili"
 melkorite_adherent: "Enfant de Mulkhêr"
 melkorite_adherent_plural: "Enfants de Mulkhêr"
 melkorite_desc: "[mulkhercharacter|E] créa l'[conceptmankind|E] à Son image : forte, belle et immortelle. De surcroît, Il façonna le monde pour qu'elle l'habite. Mais les vils [avaloigods|E], jaloux des œuvres de Mulkhêr et de sa noblesse, dérobèrent l'immortalité à l'humanité. Se glissant vers leur forteresse-terre de l'Extrême-Occident, ils firent les [eledaim|E] à leur image comme Mulkhêr l'avait fait avec l'humanité. Ainsi les Avalôi usurpèrent-ils la place légitime de l'humanité par leurs fantoches, et avec le temps cette traîtrise renversa Mulkhêr lui-même, le bannissant par-delà le monde. Mais le Grand Seigneur reviendra, les torts du monde seront redressés, les faux maîtres renversés, et la domination de l'Humanité adviendra enfin.\n\nLe culte de [morgothcharacter|E] fut introduit à [numenor|E] par la traîtrise de [sauroncharacter|E], et ne fut pratiqué qu'après la reddition et la captivité de Sauron. Sauron en devint le Grand Prêtre au Grand Temple d'[armenelos|E], prêchant son message de sombre salut aux [numenoreans|E] apeurés. Après l'[akallabeth|E], le culte perdura quelque temps dans certaines colonies [adunaic|E] méridionales de la [middleearth|E], avant de s'éteindre presque entièrement au début du [thirdage|E]."
 
 commands_of_szrel: "Commandements de Szrel"
 commands_of_szrel_adj: "de Szrel"
 commands_of_szrel_adherent: "Fidèle de Szrel"
 commands_of_szrel_adherent_plural: "Fidèles de Szrel"
 commands_of_szrel_desc: "La foi de la Tyrannie de Szreldor naquit comme une corruption cruelle du panthéon traditionnel du Rhûn par Szrel « le Cruel » — un homme à l'image des serviteurs de Morgoth d'antan. Avec le temps, les traditions du panthéon furent érodées, remplacées par des rituels de sombres sacrifices qui se complaisent dans l'infliction de la torture et de la souffrance.\n\nAprès de nombreuses générations successives de Tyrans, les Fidèles de Szrel ne révéraient plus aucun dieu, mais le Vide lui-même — dont les plus zélés d'entre eux cherchent à éviter la cruelle étreinte, s'efforçant par des actes de tyrannie toujours plus grands de contacter un jour le Seigneur des Ténèbres.\n\nLe Culte des Ténèbres ne souffrait nul autre dieu que le Seigneur Sombre, avec le Vide pour seule alternative à son règne."