 #################################
 ####### Anduinic Religion #######
 #################################
 anduinic_religion: "Anduinique"
 anduinic_religion_adj: "Anduinique"
 anduinic_religion_desc: "Les [northmen|E] traditionnels de l'Anduin comptent parmi leur peuple ceux qui ont perdu les traditions religieuses et le savoir des [dwarves|E], des [elves|E] ou des [faithful|E]. Ils demeurent une culture plus superstitieuse et fruste, croyant souvent en des esprits malveillants et se méfiant parfois des Elfes, mais ils sont endurants et loyaux."
 anduinic_religion_adherent: "Anduinien"
 anduinic_religion_adherent_plural: "Anduiniens"

 faith_nefrea: "La Présence de Nefréa"
 faith_nefrea_adj: "Nefréan"
 faith_nefrea_adherent: "Asservi"
 faith_nefrea_adherent_plural: "Asservis"
 faith_nefrea_desc: "La vie dans le Nord est amère et glaciale. Ses habitants ont longtemps subi les extorsions des seigneurs orques de Gundabad, les maigres récoltes arrachées à une terre ingrate, et l'omniprésence menaçante du froid. Le Porte-Mort rôde à chaque instant. Il est imprévisible, capricieux, et sans justice, et le plus que ses asservis puissent espérer est qu'il les épargne un jour de plus. Les rites et les prières ne servent point à invoquer la protection de leur divinité, mais à se défendre de son regard glacé.\n\nOpprimés par la vie elle-même, les asservis de Nefréa sont devenus sombres et pessimistes, mêlant l'antique souvenir de Morgoth et de Mandos, de mort et de destin funeste. Ils ont peu d'amis, et assurément aucune puissance protectrice, sinon pourquoi le Porte-Mort les traquerait-il ainsi ?"

 faith_framling: "Liffrea"
 faith_framling_adj: "Liffréan"
 faith_framling_adherent: "Fidèle de Béma"
 faith_framling_adherent_plural: "Fidèles de Béma"
 faith_framling_desc: "Dans leur long isolement, les rares [eothed|E] demeurés dans les hautes contrées du [anduinvale|E] devinrent par nécessité un peuple endurci. Dans ce Nord rude, l'antique figure centrale de [bemacharacter|E] en vint à assimiler nombre des autres dieux traditionnels des [northmen|E] et des conceptions des [valargods|E], devenant sinon le Dieu unique, du moins le seul d'importance à être invoqué.\n\nAimant envers Son peuple, implacable envers ceux qui le menaceraient, le Seigneur des Chevaux se tient vigilant et inébranlable, gardien du Nord."

 faith_fey_court: "Cour Féerique de Foldewyn"
 faith_fey_court_adj: "Cour Féerique"
 faith_fey_court_adherent: "Venu-Après" #Corrupted idea from the elvish term
 faith_fey_court_adherent_plural: "Venus-Après"
 faith_fey_court_old: "Ancienne Cour Féerique"
 faith_fey_court_old_adj: "Ancienne Cour Féerique"
 faith_fey_court_old_adherent: "Ancien Venu-Après"
 faith_fey_court_old_adherent_plural: "Anciens Venus-Après"
 faith_fey_court_desc: "La vénération des Leofrings s'articule autour du roi et de la reine des Fées, [bemacharacter|E] et [foldewyncharacter|E]. Béma a toujours été un ami de l'humanité et enseigna aux Leofrings l'art de chevaucher, leur offrant leurs troupeaux. Il est bienveillant et prompt au pardon, bien que souvent errant et absent. Tandis que Béma vagabonde au loin, son épouse Foldewyn, puissante de son propre chef, règne sur les fées en sa cour de lumière stellaire.\n\nDemeurant dans la forêt de brume, les Leofrings croient que Foldewyn est d'humeur capricieuse, fière, et lente à pardonner les erreurs de [conceptmankind|E]. Sa faveur est périlleuse à acquérir, bien que riche une fois obtenue ; car rares sont ceux qui reviennent de sa forêt, et jamais inchangés. Les prêtresses intercèdent auprès de ses fées au nom de l'humanité, espérant gagner sa faveur plutôt que son courroux. Si son courroux s'éveille, il est dit que des hommes s'avancent dans la brume, ensorcelés, pour n'être jamais revus."

 faith_midde_court: "La Cour du Milieu"
 faith_midde_court_adj: "Cour du Milieu"
 faith_midde_court_adherent: "Marcheur-du-Milieu"
 faith_midde_court_adherent_plural: "Marcheurs-du-Milieu"
 faith_midde_court_old: "L'Ancienne Cour du Milieu"
 faith_midde_court_old_adj: "Ancienne Cour du Milieu"
 faith_midde_court_old_adherent: "Ancien Arpenteur"
 faith_midde_court_old_adherent_plural: "Anciens Arpenteurs"
 faith_midde_court_desc: "Si la majorité des fidèles Leofrings consacrent leur énergie spirituelle à exalter l'une des deux cours féeriques exclusivement, certains rejettent cette dichotomie.\n\nPlutôt que de voir la Cour Lumineuse et la Cour Ténébreuse comme diamétralement opposées, ils les considèrent toutes deux comme des reflets inséparables de la nature humaine, l'ombre et la lumière, l'une ne pouvant exister sans la présence de l'autre.\n\nLes adeptes de cette vision du monde se nomment « Marcheurs-du-Milieu » et cherchent à tracer une voie d'équilibre et de compromis entre les tribus rivales, avec le grand espoir de voir un jour la Reine des Fées et la Fée Sombre réconciliées et unies en une seule « Cour du Milieu »."

 faith_withered_court: "La Cour Flétrie"
 faith_withered_court_adj: "Cour Flétrie"
 faith_withered_court_adherent: "Ombre"
 faith_withered_court_adherent_plural: "Ombres"
 faith_withered_court_old: "L'Ancienne Cour Flétrie"
 faith_withered_court_old_adj: "Ancienne Cour Flétrie"
 faith_withered_court_old_adherent: "Ancienne Ombre"
 faith_withered_court_old_adherent_plural: "Anciennes Ombres"
 faith_withered_court_desc: "Jadis, le Roi des Fées Sombres régnait sur une cour de crépuscule, rivale de celle de son frère [bemacharacter|E]. Son règne était solitaire mais équitable, depuis ses salles sous les collines. Mais sa puissance n'égalait point celle de son frère, et lui et son peuple se flétrirent, et ses salles, autrefois verdoyantes et belles, devinrent désolation. Les fées sombres se relevèrent sous une apparence terrifiante, pleines de rancœur envers les vivants qui prospéraient tandis qu'elles dépérissaient.\n\nDésormais, les ténèbres émanent de cette colline, une malveillance suffocante pour quiconque oserait s'en approcher. Les fées sans repos ont pris des formes tourmentées et sinistres. Des mains osseuses se tendent pour saisir les vivants et s'approprier notre vie. Seuls de grands sacrifices peuvent les apaiser, de peur que la malveillance de leur roi redoutable ne s'abatte sur nous et que notre ruine n'advienne."
