l_french:
 ### Dwarven Religion ###
 dwarven_religion: "Naine"
 dwarven_religion_desc: "Les [dwarves|E] vouent une vénération particulière au [valagod|E] [aulecharacter|E], leur créateur, tout en honorant l'ensemble des [valargods|E]."
 dwarven_religion_adj: "Naine"
 dwarven_religion_adherent: "Nain"
 dwarven_religion_adherent_plural: "Nains"
 
 faith_khazad: "Khazâd"
 faith_khazad_adj: "Khazâd"
 faith_khazad_adherent: "Khuzd"
 faith_khazad_adherent_plural: "Khazâd"
 faith_khazad_desc: "L'antique foi des [dwarves|E] s'ordonne autour du culte de [mahalcharacter|E], leur créateur et père. Les Nains vénèrent également leur histoire et l'honneur familial avec une profonde dévotion, honorant la mémoire de leurs ancêtres par l'érection de tombeaux grandioses et de mausolées funéraires, retournant ainsi à la terre dont ils furent tirés.\n\nLes Nains tiennent que Mahal les rassemble après la mort en des halles séparées, dans l'attente de la Bataille Ultime, après quoi ils rebâtiront le monde à ses côtés, leur place parmi les Enfants d'[iluvatar|E] enfin assurée."

 faith_eastern_khazad: "Mazaru Mahal"
 faith_eastern_khazad_adj: "Mazaru Mahal"
 faith_eastern_khazad_adherent: "Omzir"
 faith_eastern_khazad_adherent_plural: "Omziri"
 faith_eastern_khazad_desc: "Fort semblables à leurs parents de l'Ouest, les clans [dwarven|E]s de l'Est vénèrent le [valagod|E] [aulecharacter|E], qu'ils nomment [mahalcharacter|E]. Par une divergence notable d'avec la tradition, les adeptes du Mazaru Mahal, les [Glossary('Omziri','omziri_gloss')], tiennent également qu'à travers toute la [middleearth|E] se trouvent divers ateliers de Mahal, où il œuvra lorsque le monde était jeune. Ils croient que chacun des lieux d'éveil des [dwarffathers|E] compte parmi ces ateliers, et que d'autres existent encore.\n\nIls soutiennent en outre que s'il y eut des ateliers, il dut y avoir des outils. Ces outils sont vénérés comme reliques sacrées de leur créateur, et constituent des héritages non pas seulement de maisons, mais de citadelles et de clans entiers, transmis de génération en génération dans la révérence et l'honneur. Ce qui relève de la vraie relique ou de la contrefaçon fait l'objet de disputes entre les clans depuis des temps immémoriaux."

 faith_firebeards: "Khathzâ-zûl" # 'Eternal Memory' These Firebeards have not forgotten a single transgression and reclusively grumble away from the surface world
 faith_firebeards_adj: "Khathzâ-zûl"
 faith_firebeards_adherent: "Mazalikûn" # 'They who continue to remember'
 faith_firebeards_adherent_plural: "Mazalikân"
 faith_firebeards_desc: "Les fidèles de la [Glossary('Khathza-zûl','khathza_zul_gloss')] sont ces [firebeards|E] qui gardent mémoire de chaque transgression, réelle ou supposée, commise envers leur maison. Vivant reclus dans les profondeurs de Buzrâ-dûm, on les trouve principalement au cœur même de la citadelle de la flamme rebelle, là où s'étendent les Cavernes du Couchant. Ces [Glossary('Mazalikân','mazalikan_gloss')] sont réputés pour leur adhésion rigidement orthodoxe aux enseignements originels de [mahalcharacter|E].\n\nQu'il s'agisse des [elves|E] de [lindon|E] pour avoir retenu le [nauglamir|E], précieux collier forgé par les Nains de [nogrod|E] serti d'un [silmaril|E], de l'épouse même de leur créateur [yavannacharacter|E] pour avoir envoyé ses sauvages [ents|E] massacrer les [firebeards|E] qui s'étaient emparés du collier auprès des Elfes de Doriath, ou même de leurs propres parents. Ceux qui ne tiennent pas les Mebelkhags pour responsables sont tout aussi coupables que n'importe quel Elfe."

 faith_broadbeams: "Kemnêl-mesêm" # In an artistic sense 'All the bounties of the earth', literally 'all the jewels of the earth'
 faith_broadbeams_adj: "Kemnêl-mesêm"
 faith_broadbeams_adherent: "Bazunâl" # 'They who garden, harvest, cultivate', whether gold or jewels
 faith_broadbeams_adherent_plural: "Bazunâli"
 faith_broadbeams_desc: "Les [dwarves|E] des [bluemountains|E] ont vécu aux côtés des [elves|E] du [beleriand|E], puis de [lindon|E], depuis des temps immémoriaux. L'échange, l'influence, voire une certaine amitié étaient inévitables, et les [broadbeams|E] ainsi que nombre de [firebeards|E] développèrent par ces dialogues une compréhension plus profonde de la nature de leur père et créateur [mahalcharacter|E], ainsi que de son épouse [yavannacharacter|E] ([khuzdul_short|E] [Glossary('Kaminzabdûna','kaminzadbuna_gloss')]).\n\nSi tous les Nains traitent les trésors de la pierre, les splendeurs de la roche vive et la magnificence des cavernes ruisselantes de gemmes avec respect et gravité, rares sont ceux parmi eux qui respectent véritablement les autres dons que la terre peut offrir, ce qui est vert et ce qui croît.\n\nCeux qui suivent les enseignements de la [Glossary('Kemnêl-mesêm','kemnel_mesem_gloss')], les [Glossary('Bazunâli','bazunal_gloss')], vouent une profonde vénération aux présents de Mahal, qu'il s'agisse de joyaux inestimables ou de simples plantes, percevant que tout participe du grand chant de la terre."   

 faith_ironfists: "Ozbih Ozil"
 faith_ironfists_adj: "Ozbih Ozil"
 faith_ironfists_adherent: "Ozbiran"
 faith_ironfists_adherent_plural: "Ozbirani"
 faith_ironfists_desc: "Forgée dans l'exil après la [warofiron|E], la foi de l'[Glossary('Ozbih Ozil','ozbih_ozil_gloss')] naquit parmi les [ironfists|E] dispersés, qui avaient perdu leurs foyers, leurs parents, et jusqu'au souvenir de ce qui fut.\n\nDurant leur longue errance, les Poings-de-Fer en vinrent à considérer la mémoire comme leur seule vraie richesse. Nombre des [Glossary('Ozbirani','ozbirani_gloss')] tenaient des journaux en cryptogrammes familiaux de [khuzdul|E], consignant ce qu'ils avaient perdu et le peu qu'ils possédaient encore. Avec le temps, ces écrits devinrent des archives, et dans les citadelles plus prospères, de véritables bibliothèques. Parmi les dispersés, les récits furent plutôt transmis par tradition orale grâce aux [Glossary('Ozokhlitnân','ozokhlitnan_gloss')], lorsque porter de tels fardeaux n'était point possible.\n\nDe ce besoin de se souvenir naquit une vénération pour [vairecharacter|E] (Kh. [Glossary('Bebanuknar','bebanuknar_gloss')]), qui préserve toutes choses telles qu'elles furent, sans faveur ni omission. Bien que ces fidèles honorent toujours [mahalcharacter|E], c'est Vairë qui parle à leur épreuve.\n\nPour les croyants, l'oubli est une trahison. Mal se souvenir, c'est déshonorer les morts. La mémoire est un héritage, et seul ce qui est remémoré perdure."

 faith_stiffbeards: "Id-Ahlâth Darâg" # 'The Tombs of Divine Strength' 
 faith_stiffbeards_adj: "Id-Ahlâth"
 faith_stiffbeards_adherent: "Mabiratadnûn"
 faith_stiffbeards_adherent_plural: "Mabiratadnân" # 'They who remain'
 faith_stiffbeards_desc: "Toutes les Maisons [dwarven|E]es gardent foi en les légendaires Halles de [mahalcharacter|E], royaume sacré en [valinor|E] où les enfants de Mahal demeureront jusqu'à la fin du monde, pour se lever à nouveau et le rebâtir à ses côtés. Parmi ceux qui suivent l'[Glossary('Id-Ahlâth Darâg','id_ahlath_darag_gloss')], on croit que ces halles sacrées ne sont pas seulement un dernier lieu de repos, mais les lieux mêmes où naquirent les sept [dwarffathers|E].\n\nCette foi est la plus profondément enracinée parmi les [stiffbeards|E] du Grand Nord, où les [Glossary('Mabiratadnân','mabiratadnan_gloss')] maintiennent une tradition sacrée voulant que les morts soient ramenés au lieu de naissance de leur maison, quelle que soit la distance. Cela se manifeste le plus clairement dans les pèlerinages solennels vers [Glossary('Kibiltumun','kibiltumun_gloss')], la grande nécropole au sein de [Glossary('Kibilzahar','kibilzahar_gloss')], où des générations de défunts reposent en des sépultures aux veines d'argent. Une telle dévotion a façonné un peuple marqué par une opiniâtreté et une immobilité extraordinaires.\n\nLa quasi-totalité du [thulinsfolk|E] est demeurée dans sa patrie ancestrale depuis avant la première aube, insensible au temps comme aux calamités. Même les rares qui ont fui les hordes incessantes des ennemis du Nord doivent, en fin de compte, entreprendre une dernière fois le long voyage vers leur foyer."

 faith_blacklocks: "Khathzâ Hubnel" # Eternal Vengeance
 faith_blacklocks_adj: "Khathzâ Hubnel"
 faith_blacklocks_adherent: "Id-Ahabûn" # They who avenge
 faith_blacklocks_adherent_plural: "Id-Ahabân" # They who avenge
 faith_blacklocks_desc: "#italic "Chantez, ô Montagnes. Chantez la rage des fils de [thrar|E], et la grande vengeance. Chantez le Mensonge, et le sang des parents versé, qui ne peut trouver le repos avant que [Concept('sauroncharacter', 'le Trompeur')|E] et ses œuvres ne soient défaits."#!\n\nAprès la [warofthelie|E], Nargubraz fut scellée, et nombre des [blacklocks|E] partirent en marche. Car ils avaient versé le sang de leurs parents, souillant la terre même et les halles de leurs ancêtres. Ce n'est qu'une fois leurs péchés expiés, le Trompeur et toutes ses œuvres défaits, que les morts pourraient enfin reposer en paix. Tel est le credo des [Glossary('Id-Ahabân','id_ahaban_gloss')], aussi connus comme les [axesofnargubraz|E], ennemis jurés de Sauron. Car il les trompa et les mena au malheur, et désormais ils porteront à leur tour le malheur à tous ceux qui lui accorderaient aide ou secours."

 faith_allfather_dwarf: "Amdâru Sulladad" # Mercy of the All-father
 faith_allfather_dwarf_adj: "Amdâru Sulladad"
 faith_allfather_dwarf_adherent: "Mamaddârûn"
 faith_allfather_dwarf_adherent_plural: "Mamaddârân" # They who have mercy
 faith_allfather_dwarf_desc: "Rite occulte en marge des traditions [dwarven|E]es, l'[Glossary('Amdâru Sulladad','amdaru_sulladad_gloss')] ne place pas au premier rang la vénération de [mahalcharacter|E], comme il est coutume parmi eux, mais celle de [Glossary('Sulladad','sulladad_gloss')] lui-même.\n\nLes fidèles accordent une importance particulière au fait que Mahal seul ne put créer les Nains — et que lorsque cela lui fut révélé par Sulladad, il s'apprêta dans l'abattement à détruire ses créations, accablé et découragé, tant en lui-même qu'en elles. Ce n'est que par la grâce de Sulladad que les Nains furent rachetés de l'anéantissement ; car il perçut dans une création imparfaite quelque chose de bon et digne d'être sauvé.\n\nLes [Glossary('Mamaddârân','mammadaran_gloss')] font ainsi preuve d'une grande patience, tenant que les imperfections sont normales en toutes choses. La miséricorde et le pardon sont des vertus cardinales, car c'est par elles seules que le monde brisé peut espérer être guéri. Non par la haine, mais en voyant la beauté même dans les choses brisées."

 faith_gold_worship: "Sang du Créateur"
 faith_gold_worship_adj: "Sang de Mahal Doré"
 faith_gold_worship_adherent: "Enfant de l'Or"
 faith_gold_worship_adherent_plural: "Enfants de l'Or"
 faith_gold_worship_desc: "L'or. Cette belle, cette merveilleuse substance. Son éclat seul est preuve suffisante de sa valeur, de son prix incomparable.\n\nPourtant, il est bien plus qu'un simple métal. Il est en vérité le sang même de [mahalcharacter|E], coulant dans les veines de la terre qui forme ses halles, dissimulé aux yeux de ceux qui ne voient que la surface des choses et non la vérité. Il est digne de respect, que dis-je, de vénération ! À être thésaurisé et gardé, non point dispersé aux indignes et aux ignorants. Qu'ils aient des pièces d'argent et de cuivre — mais l'or… celui-ci n'appartient de droit qu'aux enfants de Mahal, qui seuls comprennent sa vraie valeur."

 ### Mainstream and Heretical doctrines

 doctrine_dwarven_branches_name: "Vénération de Mahal"
 doctrine_dwarven_branches_desc: "Soutenons-nous la voix des anciens, pour préserver la parole du Créateur — ou sont-ce en vérité eux qui se sont égarés et corrompus ?" 
 doctrine_major_branch_dwarven_name: "Voie des Pères"
 doctrine_major_branch_dwarven_desc: "Bien que nous puissions différer sur certaines particularités de pratique, nous autres Khazâd de la voie principale ne nous accordons-nous pas sur les principes fondamentaux de loyauté envers Mahal ?"
 doctrine_heretic_branch_dwarven_name: "Voie des Fils"
 doctrine_heretic_branch_dwarven_desc: "Nos pères ont perdu leur chemin. Les $religion_group_eruhini_adherent_plural$ nous traitent d'hérétiques, de bannis et de séditieux. Bien que rien ne nous lie sinon leur mépris, la droiture dicte notre résistance et leur dédain endurcit nos cœurs."
 doctrine_parameter_hostility_override_doctrine_heretic_branch_dwarven: "Considère les [faiths|E] de la $doctrine_heretic_branch_dwarven_name$ comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"
 doctrine_parameter_hostility_override_doctrine_major_branch_dwarven: "Considère les [faiths|E] de la $doctrine_major_branch_dwarven_name$ comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V]"



