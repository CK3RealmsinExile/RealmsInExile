l_french:
 #######################
 ### Orcish Religion ###
 #######################
 
 orcish_religion: "Orque"
 orcish_religion_adj: "Orque"
 orcish_religion_desc: "Les Orques hors de l'influence des Seigneurs Sombres présentent un vaste éventail de croyances, mais sont généralement dominés par des traits communs de force et de brutalité impitoyable."
 orcish_religion_adherent: "Orque"
 orcish_religion_adherent_plural: "Orques"

 way_of_strength: "Pardahûnúk" #Black Speech for 'arising in might'
 way_of_strength_adj: "Pardahûnúk"
 way_of_strength_adherent: "Orque"
 way_of_strength_adherent_plural: "Orques"
 way_of_strength_desc: "Rejetant le service au [darklord|E], le Pardahûnúk désigne les [orcs|E] qui nourrissent plutôt le désir de prendre cette place eux-mêmes. Ce n'est point véritablement une religion, mais bien davantage une philosophie très fruste, née autant du dépit et de l'instinct que d'une quelconque vision du monde plus large.\n\nEn bref, la voici : les faibles serviront les forts. Il n'est point de profondeurs où l'on ne puisse sombrer au nom de la saisie du pouvoir, pour devenir son propre seigneur et maître. Avec le temps, même les plus forts trébuchent et leurs ennemis les occisent ; alors un nouvel orque prendra sa place au sommet, et le cycle recommence. Ceci est un cycle éternel, que les Orques perpétueront jusqu'à la fin du monde."

 cult_of_the_ulukai: "Culte de l'Ulûkai" 
 cult_of_the_ulukai_adj: "Ulûkai"
 cult_of_the_ulukai_adherent: "Cultiste Ulûkai"
 cult_of_the_ulukai_adherent_plural: "Cultistes Ulûkai"
 cult_of_the_ulukai_desc: "Lorsque [gundabad|E] tomba sous les hordes des [orcs|E], leur chef portait l'Ulûkai, un grand joyau noir, l'un des plus grands trésors du trésor d'[angband|E]. Le joyau exsudait une aura qui faisait écho à la salle du trône d'Angband, et en vérité au Seigneur Sombre [morgothcharacter|E] lui-même, émettant une lumière perverse corrompue par les longues années de sa domination. Par droit de porter le joyau, Skorg, premier seigneur de Gundabad, revendiqua le titre d'Ashdurbúk (Souverain Unique) du Nord. Car le Joyau appelait les ténèbres aux ténèbres, et la force à la force, et Skorg devint redoutable et puissant par sa grâce, bien que toujours plus cruel, et les orques le craignaient et le révéraient. Détenir l'Ulûkai, c'est être embrassé par les Ténèbres, porter la bénédiction et la malédiction de leur Seigneur. Lorsque Skorg fut enseveli dans les profondeurs les plus profondes de Gundabad, il emporta avec lui l'Ulûkai, et ceux qui cherchent à revendiquer le manteau d'Ashdurbúk doivent braver seuls les profondeurs obscures pour le ramener à la lumière du soleil.\n\nL'Ulûkai et le tombeau de Skorg furent ensuite perdus. Avec eux, le culte de l'Ulûkai et de Skorg, premier Ashdurbúk, s'effaça dans l'histoire."
 cult_of_the_ulukai_faith_head: "Ashdurbúk"
 
 faith_balrog_cult: "Culte de la Flamme Noire"
 faith_balrog_cult_adj: "Ghâshûli"
 faith_balrog_cult_adherent: "Ghâshûl"
 faith_balrog_cult_adherent_plural: "Ghâshûli"
 faith_balrog_cult_desc: "Dans les profondeurs de la [moria|E], nombre de [goblins|E] locaux se sont adonnés à une forme fruste de culte du feu, probablement inspiré par le Fléau de Durin, le [balrog|E] qui erre parfois dans leurs salles en ruine. Les rituels primitifs des Ghâshûli (« Serviteurs de la Flamme ») varient grandement d'une tribu à l'autre, mais la philosophie fondamentale demeure la même — les [orcs|E] sont naturellement attirés par le service de l'être le plus puissant, et la Flamme Noire, la force dévorante du feu, est manifestement l'être le plus puissant de tous. Peut-être son culte pourrait-il apaiser la Flamme-qui-Marche, éviter sa colère ou même gagner sa faveur.\n\nLe Fléau de Durin lui-même semble largement indifférent au culte que lui vouent les habitants et agit davantage comme une force de la nature que comme une divinité."
 
 faith_deep_cult: "Cultes des Profondeurs"
 faith_deep_cult_adj: "Cultes des Profondeurs"
 faith_deep_cult_adherent: "Cultiste des Profondeurs"
 faith_deep_cult_adherent_plural: "Cultistes des Profondeurs"
 faith_deep_cult_desc: "Dans les profondeurs les plus ténébreuses, loin sous le monde, certains [goblins|E] se sont mis à vénérer les ombres elles-mêmes et ce qui s'y tapit. Ils sont les murmures inaudibles qui vous hantent dans le noir, ils sont le souffle ténu qui hérisse les cheveux sur votre nuque, et ils sont les choses dans le coin de votre œil. Près de la surface, leur influence est à peine perceptible, mais plus l'on descend, plus elle croît. Leur domaine est l'obscurité impénétrable au fond du monde, là où leur pouvoir est le plus grand.\n\nLes adorateurs des Profondeurs fuient souvent la lumière, car elle obstrue les autres sens. Ils se complaisent dans leur propre paranoïa, cultivée par une vie passée dans les ténèbres éternelles."
 
 faith_goblin_town: "Culte du Grand Gras"
 faith_goblin_town_adj: "Grand Gras"
 faith_goblin_town_adherent: "Cultiste du Gras"
 faith_goblin_town_adherent_plural: "Cultistes du Gras"
 faith_goblin_town_desc: "Parmi les [goblins|E] chétifs et voûtés des Montagnes de Brume, il existe une révérence pour les forts et les bien nourris. En particulier, ils vouent une vénération au mythique « Grand Gras », l'exemplaire de leur race. D'une corpulence et d'une taille immenses, sa force surpasse celle des [trolls|E], son garde-manger est plus riche que celui d'un roi [dwarf|E]. Tous les Gobelins l'admirent et désirent être lui. Le servir, c'est connaître l'abondance, et s'opposer à lui, c'est connaître la famine."
 
 dragon_cult: "Cultes du Dragon"
 dragon_cult_adj: "Cultes du Dragon"
 dragon_cult_adherent: "Cultiste du Dragon"
 dragon_cult_adherent_plural: "Cultistes du Dragon"
 dragon_cult_desc: "Dans les recoins reculés des [greymountains|E], les [orcs|E] en vinrent avec le temps à vénérer les [dragons|E] qui y demeuraient, par crainte et révérence de leur force. Les croyances de ces cultes particuliers varient grandement en raison de leur isolement, mais certaines sont communes à la plupart : les Dragons sont des tyrans faits de chair et de flamme, destinés à régner sur le monde, et ils brûleront tous ceux qui s'opposent à eux. La popularité de ces cultes crût et décrût grandement au fil du temps, mais avec le déclin puis l'extinction des derniers Grands Dragons à la fin du [thirdage|E], ils ont commencé à perdre de leur attrait."