l_french: 
 narne_religion: "Narnewerte"
 narne_religion_adj: "Narne"
 narne_religion_desc: "Les Narne sont ceux d'ascendance Apysaic qui les premiers se séparèrent du groupe principal, voyageant vers le sud et l'est jusqu'aux terres bordant la Baie d'Ormal. Longtemps séparés de leurs parents, ils développèrent un système de croyances entièrement unique, fondé sur le culte du Père-Ciel et de la Mère-Terre."
 narne_religion_adherent: "Narne"
 narne_religion_adherent_plural: "Narne"

 faith_eropye: "Eropye"
 faith_eropye_adj: "de l'Eropye"
 faith_eropye_adherent: "Narne"
 faith_eropye_adherent_plural: "Narne"
 faith_eropye_old: "Ancien Eropye"
 faith_eropye_old_adj: "de l'Ancien Eropye"
 faith_eropye_old_adherent: "Ancien Narne"
 faith_eropye_old_adherent_plural: "Anciens Narne"
 faith_eropye_desc: "L'Eropye est l'équilibre et l'harmonie divins de la nature, de la création et de la destruction — incarnés par Deghom et Dyewôs, la terre et le ciel. Deghom fit naître le monde, et d'elle naquit l'Humanité. Son époux Dyewôs règne à présent depuis les Cieux, et déchirera le monde en son dernier jour, rassemblant une fois encore l'Humanité dans l'étreinte divine. Jusqu'à ce temps, leurs enfants doivent vivre en paisible harmonie, étudiant et veillant sur le monde et ses habitants, mortels comme esprits."

 faith_jeiwos: "Jeiwôs-Pête"
 faith_jeiwos_adj: "de Jeiwôs"
 faith_jeiwos_adherent: "Jeiwerta"
 faith_jeiwos_adherent_plural: "Jeiwerte"
 faith_jeiwos_desc: "Jeiwôs le Père règne sur les cieux et la terre, guidant et défendant ses enfants. Son règne est juste et équitable, et l'on peut discerner sa volonté par la sagesse et la clairvoyance. Il appelle son peuple à l'hospitalité, à la générosité et à la raison, car nul ne devrait rejeter l'un de ses semblables.\n\nParmi les Elinse des collines, le culte du ciel omniprésent prit la préséance, et son appel à la sagesse et à l'hospitalité a profondément influencé leur mode de vie."

 faith_degom: "Degom-Mête"
 faith_degom_adj: "de Degom"
 faith_degom_adherent: "Degomwerta"
 faith_degom_adherent_plural: "Degomwerte"
 faith_degom_old: "Ancien Degom-Mête"
 faith_degom_old_adj: "de l'Ancien Degom"
 faith_degom_old_adherent: "Ancien Degomwerta"
 faith_degom_old_adherent_plural: "Anciens Degomwerte"
 faith_degom_desc: "Degom la Mère enfanta l'Humanité, et désormais dans sa bienveillance elle l'abrite et la secourt. D'elle viennent santé et moisson, et ainsi doit-elle être révérée et protégée.\n\nNée dans les fertiles terres fluviales du [khy|E], la dévotion envers Degom privilégie le terrestre, et ses fidèles attribuent leurs abondantes récoltes et leur climat tempéré à l'assistance de Degom."

 faith_codya: "Lâseswerte"
 faith_codya_adj: "Lâses"
 faith_codya_adherent: "Werta"
 faith_codya_adherent_plural: "Werte"
 faith_codya_desc: "À Côdya, le culte traditionnel des esprits et des dieux des Narne s'est mêlé aux pratiques des Lôkhaw. De cette union est né un simple culte des dieux domestiques, qui protègent ou affligent foyer, échoppe ou navire. Ils sont simplement un fait de la vie, à récompenser ou apaiser par des prières et de modestes sacrifices, mais d'importance cosmique négligeable. Les cieux et la terre sont gouvernés par la logique et la raison, et une étude approfondie est requise pour comprendre leurs grands rouages, soustraits à l'influence des Hommes comme des dieux."
 
