 tenet_unreformed_syncretism_name: "Traditions populaires syncrétiques"
 tenet_unreformed_syncretism_desc: "Qui sommes-nous pour affirmer que les traditions d'autrui sont fausses ? Il ne nous appartient guère de leur faire la leçon sur des coutumes qu'ils pratiquent depuis des siècles : nous devrions plutôt nous instruire discrètement de leurs usages."
