 tenet_eastern_syncretism_desc: "Il y a beaucoup à apprendre de la manière dont les différentes religions dharmiques se tolèrent mutuellement. Leurs fidèles ne suivent peut-être pas la vraie foi, mais cela n'en fait point des êtres maléfiques."
