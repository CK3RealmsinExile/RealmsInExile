 # Additional Tenets
 tenet_ritual_cannibalism_name: "Cannibalisme rituel"
 tenet_ritual_cannibalism_desc: "L'humanité a reçu la bénédiction de l'étincelle divine. La chair humaine est donc sacrée, une présence à savourer, non à ensevelir ou à consumer par les flammes."
 doctrine_parameter_cannibalism_legal: "Le trait [GetTrait('cannibal').GetName( GetNullCharacter )] n'est plus considéré comme [criminal|E]"

 tenet_exaltation_of_pain_name: "Exaltation de la Douleur"
 tenet_exaltation_of_pain_desc: "La douleur est l'émotion universelle, la violence le langage universel. Infliger la douleur à autrui, c'est lui accorder une bénédiction ; recevoir la douleur soi-même, c'est recevoir la grâce."
 doctrine_parameter_torturing_prisoners_grants_piety: "Torturer des [prisoners|E] rapporte de la [piety|E] au lieu d'en coûter"
 doctrine_parameter_reduced_stress_from_torture: "Les fidèles résistent aux effets néfastes de la torture subie"
 doctrine_parameter_self_mutilation_active: "Permet la [decide|E] Pratiquer l'Automutilation, qui rapporte de la [piety|E] au prix du [trait|E] [GetTrait('wounded_1').GetName( GetPlayer )]"
 self_mutilation_active_name: "[GetFaithDoctrine('tenet_exaltation_of_pain').GetBaseName]"
 self_mutilation_minor_piety_gain_tt: "[THIS.Char.GetShortUIName|U] gagne [piety_i]#P [THIS.ScriptValue('minor_piety_gain')]#! grâce à [CharYourHerHis(THIS.Char)] [core_tenet|E] [GetFaithDoctrine('tenet_exaltation_of_pain').GetBaseName]"
 self_mutilation_medium_piety_gain_tt: "[THIS.Char.GetShortUIName|U] gagne [piety_i]#P [THIS.ScriptValue('medium_piety_gain')]#! grâce à [CharYourHerHis(THIS.Char)] [core_tenet|E] [GetFaithDoctrine('tenet_exaltation_of_pain').GetBaseName]"
 self_mutilation_major_piety_gain_tt: "[THIS.Char.GetShortUIName|U] gagne [piety_i]#P [THIS.ScriptValue('major_piety_gain')]#! grâce à [CharYourHerHis(THIS.Char)] [core_tenet|E] [GetFaithDoctrine('tenet_exaltation_of_pain').GetBaseName]"

 tenet_sacred_shadows_name: "Mensonges sacrés"
 tenet_sacred_shadows_desc: "Le mensonge est l'art le plus profond qui soit. Ceux qui parviennent à convaincre autrui de leurs mensonges sont saints. Ceux qui réussissent à se mentir à eux-mêmes sont invincibles."
 doctrine_parameter_piety_gain_from_successful_intrigue_schemes: "Les fidèles gagnent de la piété en accomplissant avec succès des [schemes|E] d'[intrigue|E]"
 doctrine_parameter_adherents_more_likely_to_join_schemes: "Les fidèles sont plus enclins à devenir agents dans les [schemes|E] d'autres personnages"

 tenet_pursuit_of_power_name: "Quête du Pouvoir"
 tenet_pursuit_of_power_desc: "Ce qui est juste et ce qui ne l'est pas demeure éphémère, défini par ceux qui détiennent actuellement le pouvoir. La quête du pouvoir est donc la seule cause véritablement vertueuse."

 tenet_pastoral_isolation_name: "Isolement pastoral"
 tenet_pastoral_isolation_desc: "Tout ce que nous désirons, c'est qu'on nous laisse en paix. Nos pratiques nous appartiennent, et ne regardent pas plus autrui que les leurs ne nous concernent."
 doctrine_parameter_unattractive_for_character_conversions: "Les [characters|E], mais non les [counties|E], sont plus enclins à se laisser convertir hors de cette [faith|E]"

 tenet_natural_primitivism_name: "Primitivisme naturel"
 tenet_natural_primitivism_desc: "La civilisation est contre nature, une tentative futile et blasphématoire de l'homme pour imposer l'ordre à une création intrinsèquement désordonnée. Nous embrassons le naturisme et vivons comme [ROOT.Faith.PantheonTerm] l'a voulu, sauvages et libres."
 doctrine_parameter_naked_adherents_active: "Les fidèles ne portent point de vêtements"
 doctrine_parameter_natural_primitivism_law_cost_increase: "Coût des lois : #N +50 %#!"
 doctrine_parameter_unlock_jizya_contract: "Permet le [vassal_contract|E] et le [tax_decree|E] Taxer les Mécréants"
 

 #FP3 tenets

 tenet_communal_possessions_name: "Biens communautaires"
 tenet_communal_possessions_desc: "[ROOT.Faith.HighGodName] nous destinait à tous une part égale des ressources de ce monde. Nous devrions tout posséder en commun et redistribuer les richesses dérobées par les puissants." 
 doctrine_parameter_piety_from_gifts_active: "Les fidèles gagnent de la [piety|E] en envoyant des [gifts|E] et en cédant des [artifacts|E]"
 doctrine_parameter_piety_from_marrying_lowborn_active: "Les souverains gagnent de la [piety|E] en épousant des [characters|E] de [lowborn|E] extraction"

 tenet_sacrificial_ceremonies_name: "Cérémonies sacrificielles"
 tenet_sacrificial_ceremonies_desc: "Le sacrifice humain, volontaire comme involontaire, nous rapproche du divin. Il est coutumier et vertueux de se porter volontaire pour le sacrifice cérémoniel, tout comme il est vertueux de sacrifier ceux qui ont commis des crimes impardonnables envers les dieux."
 
 tenet_megaliths_name: "Constructions mégalithiques"
 tenet_megaliths_desc: "Le culte ne devrait point se pratiquer dans les seuls confins d'un temple, ces constructions primitives de l'homme qui le détournent des créations divines qui l'entourent. Nous embrassons la pierre et le ciel ouvert, disposant les pierres que le créateur nous a données de manières qui lui plaisent et nous rapprochent du divin."
 doctrine_parameter_can_build_megaliths: "Permet la construction de mégalithes dans les domaines de [temple|E] et de grands mégalithes dans les capitales de duché."
 province_is_of_a_megalith_faith_tt: "Ce [county|E] doit suivre une [faith|E] qui croit en la signification des mégalithes."

 tenet_fp3_fedayeen_name: "Fedayins"
 tenet_fp3_sacred_murder_name: "Meurtre sacré"
 tenet_fp3_fedayeen_desc: "Lorsque la guerre ordinaire ne peut prévaloir, il est de notre devoir devant [ROOT.Faith.HighGodNameAlternate] de détruire [ROOT.Faith.HighGodHerHis|U] ennemis par l'infiltration et la tromperie. Nous ne devons craindre ni la mort ni la douleur, et donner ardemment notre vie pour la cause suprême." 
 doctrine_parameter_master_assassin_court_position_unlocked: "Permet la [court_position|E] #V [GetCourtPositionType( 'master_assassin_court_position' ).GetName()]#!"
 doctrine_parameter_death_is_glory: "Probabilité de mort ou de blessure au [battle|E] : #N +10 %#!"
 doctrine_parameter_sanctioned_assassinations: "Aucune perte de [piety|e] pour avoir tué des personnages d'une [faith|E] différente par des [schemes|E] de [GetScheme('murder').GetTypeName]"
 
 # EP3 Tenets
 tenet_household_gods_name: "Dieux du Foyer"
 tenet_household_gods_desc: "Nous révérons nos #EMP Lâsese#! et #EMP Jîweya#! — les esprits protecteurs qui veillent sur nos demeures. Ils seront apaisés et invoqués pour la santé et la prospérité, et en retour rassasiés de prières et de libations."

 # BP3 Parameter
 doctrine_parameter_allows_brewery: "$allows_brewery$ pour les [temple_holdings|E]"

 # TGP
 immaterial_harmony_name: "Harmonie immatérielle"
 special_doctrine_immaterial_harmony_name: "Harmonie immatérielle"
 special_doctrine_immaterial_harmony_desc: "Il n'existe nul conflit entre nos traditions et les enseignements du Bouddha ou des sages. On peut pratiquer l'une ou l'autre, voire toutes à la fois, sans difficulté spirituelle."
 doctrine_parameter_hostility_override_special_doctrine_immaterial_harmony: "Considère, et est considérée par, les [faiths|E] possédant la doctrine spéciale $special_doctrine_immaterial_harmony_name$ comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] plutôt que $hostility_astray_tooltippable$, $hostility_hostile_tooltippable$ ou $hostility_evil_tooltippable$"

 tenet_extinction_of_dharma_name: "Extinction du Dharma"
 tenet_extinction_of_dharma_desc: "Les démons marchent sur terre sous l'apparence des pieux et des dévots ; quiconque en occit un fait un pas vers la bouddhéité, quiconque en occit dix fait dix pas vers la bouddhéité."

 tenet_cranial_trophies_name: "Trophées crâniens"
 tenet_cranial_trophies_desc: "La tête est le réceptacle de la quintessence de son propriétaire. En la tranchant et en extrayant son contenu, nous pouvons nous approprier cette puissante énergie spirituelle."
 doctrine_parameter_killing_bestows_heads: "Il est possible d'obtenir un [artifact|E] Trophée crânien en [executing|E] un autre personnage, en le terrassant en [single_combat_duel|E] ou en le tuant au [battle|E]"
 doctrine_parameter_decapitation_steals_prestige_as_piety: "En obtenant un [artifact|E] Trophée crânien, le tueur gagne également de la [piety|E] proportionnelle au [prestige|E] du défunt"

 tenet_benevolent_governance_name: "Gouvernance bienveillante"
 tenet_benevolent_governance_desc: "Ceux qui gouvernent les masses ont le devoir moral de promouvoir ce qui est bien et d'abjurer ce qui est mal. Ce n'est qu'en adhérant à ce principe qu'un souverain peut être véritablement juste."
 tenet_filial_piety_name: "Piété filiale"
 tenet_filial_piety_desc: "La piété filiale et l'obéissance envers ses aînés sont fondamentales pour l'accomplissement de la bonté humaine. Quand nos parents sont en vie, nous les servons avec rectitude ; quand ils meurent, nous les ensevelissons avec rectitude, puis nous leur rendons un culte avec rectitude."
 tenet_harmonious_society_name: "Société harmonieuse"
 tenet_harmonious_society_desc: "Tout doit être équilibré : les individus, la nature, la société. Le Fils du Ciel donne le tempo et nous suivons son chant."
 doctrine_parameter_sway_scheme_better: "[scheme_success_chance|E] du [schemes|E] [GetScheme('sway').GetTypeName] : [success_chance_i]#P +15 %#!"
 doctrine_parameter_sway_scheme_piety: "Les [schemes|E] de [GetScheme('sway').GetTypeName] réussis ciblant votre [liege|E] ou vos [vassals|E] rapportent de la [piety_i][piety|E]"
 doctrine_parameter_more_often_zealots: "Les [vassals|E] sont plus enclins à adopter la [vassal_stance|E] [GetVassalStance( 'zealot' ).GetTextIcon][GetVassalStance( 'zealot' ).GetName]"
 tenet_harmonious_society_sway_boon: "Votre [faith|E] possède [GetFaithDoctrine('tenet_harmonious_society').GetBaseName] : $VALUE|+0=$"
 tenet_pursuit_of_knowledge_name: "Quête du Savoir"
 tenet_pursuit_of_knowledge_desc: "Ceux qui sont naturellement dotés du savoir dès la naissance sont les plus éminents. Ceux qui recherchent le savoir de leur plein gré viennent ensuite. Ceux qui sont obtus et ne cherchent point à apprendre sont les plus bas des hommes."
 doctrine_parameter_inspections_unlocked_and_costs_piety: "Permet l'[activity|E] [GetActivityType('activity_survey').GetName] pour un coût en [piety|E]"
 doctrine_parameter_inspection_gives_devotion: "Accomplir l'[activity|E] [GetActivityType('activity_survey').GetName] rapporte de l'[piety_experience|E]"
 doctrine_parameter_better_study_scheme: "[scheme_success_chance|E] du [schemes|E] [GetScheme('study_confucian_classics').GetTypeName] : [success_chance_i]#P +15 %#!"

 doctrine_parameter_parents_get_hooks_on_children: "Les parents obtiennent automatiquement des [perpetual_hooks|E] sur leurs [children|E]"

 tgp_local_shrines_patronized: "Sanctuaires locaux parrainés"
 
 tenet_sacred_destruction_name: "Destruction sacrée"
 tenet_sacred_destruction_desc: "Il ne peut y avoir de création sans destruction. Pour que quelque chose de neuf commence, quelque chose d'ancien doit s'achever."
 doctrine_parameter_successful_sieges_give_piety: "Remporter un [siege|E] offensif rapporte de la [piety|E] et détruit davantage de [development|E] du [county|E]"
 successful_sieges_give_piety_toast: "Dogme $tenet_sacred_destruction_name$"
 
 tenet_preservation_name: "Préservation"
 tenet_preservation_desc: "Création, protection, transformation. La vertu naît de la construction, de bâtir quelque chose et de le voir prospérer."
 building_temples_gives_development_toast: "Dogme $tenet_preservation_name$"
 doctrine_parameter_building_temples_gives_development: "Construire dans un [church_holding|E] ou un [temple_citadel_holding|E] augmente le [development|E] du [county|E]"
 doctrine_parameter_monastic_schools_allowed_in_every_holding_type: "Permet la construction de la lignée de [buildings|E] #V $building_type_monastic_schools_01$#! dans tous les [holding_types|E]"
 
 doctrine_parameter_mountain_trait_bonuses: "Certains [commander_traits|E] et [personality_traits|E] bénéficient de bonus supplémentaires en montagne"
 desert_mountains_holding_construction_piety_cost: "Coût de construction de [holding|E] en $desert_mountains$"
 mountains_holding_construction_piety_cost: "Coût de construction de [holding|E] en $mountains$"