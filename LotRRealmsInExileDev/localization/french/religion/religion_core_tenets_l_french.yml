l_french:
 doctrine_core_tenets_name: "Préceptes"
 tenets_name: "Préceptes"

 #Abrahamic Tenets
 tenet_communion_name: "Communion"
 tenet_communion_desc: "Nos rituels ne sont point simplement symboliques — ils invoquent la présence même du divin. Ceux qui ne peuvent ou ne veulent se joindre à nous dans leur pratique ne sauraient être de vrais croyants."
 doctrine_parameter_seek_indulgences_active: "Les personnages peuvent #V Solliciter des Indulgences#! auprès de leur [head_of_faith|E] pour payer de l'[gold|E] en échange de [piety|E]"
 doctrine_parameter_seek_indulgences_active_2: "Les personnages ayant commis des actes [criminal|E]s peuvent #V Solliciter des Indulgences#! pour obtenir le pardon à la place"
 doctrine_parameter_excommunication_active: "Les [heads_of_faith|E] spirituels peuvent [excommunicate|E] d'autres personnages de leur [faith|E]"
 tenet_excommunicated: "[GetTrait('excommunicated').GetName( GetNullCharacter )]"

 tenet_armed_pilgrimages_name: "Pèlerinages Armés"
 tenet_armed_pilgrimages_desc: "Nos pèlerins voyagent à travers le monde pour visiter nos lieux saints sacrés — nous prendrons volontiers les armes pour les protéger de quiconque voudrait leur nuire."
 doctrine_parameter_cheaper_holy_wars_active: "Déclarer des [holy_wars|E] coûte #P -20%#! de [piety|E] en moins aux [rulers|E] de cette [faith|E]"
 doctrine_parameter_great_holy_wars_active: "S'il en existe un, le [head_of_faith|E] peut déclarer une [great_holy_war|E] lorsque la [faith|E] possède une haute [fervor|E]"
 doctrine_parameter_ghw_no_hof_conversion_buffs_active: "S'il n'existe pas de [head_of_faith|E], les adhérents obtiennent un bonus à la [councillor_task|E] [convert_county|E] par [holy_site|E] contrôlé"
 doctrine_parameter_pilgrimage_decision_active: "Les personnages de cette [faith|E] obtiennent un bonus supplémentaire à l'accomplissement réussi d'un [pilgrimage|E]"

 tenet_monasticism_name: "Monachisme"
 tenet_monasticism_desc: "Les plaisirs de la bonne chère et de la boisson ne servent qu'à nous distraire du service au divin. Nous isoler dans des monastères reculés est le meilleur moyen d'éviter ces tentations."
 doctrine_parameter_take_vows_active: "Les [courtiers|E] peuvent Prononcer les Vœux et devenir [GetTrait('devoted').GetName( GetNullCharacter )]"

 tenet_divine_marriage_name: "Mariage Divin"
 tenet_divine_marriage_xwedodah: "Xwedodah"
 tenet_divine_marriage_desc: "En épousant un proche parent, nous imitons les unions sacrées des premiers êtres de la création. Les bonnes qualités se transmettront dans notre lignée, et ainsi nous gagnons pureté et faveur dans la bataille éternelle contre le mal."
 doctrine_parameter_divine_marriage_opinion: "Les adhérents mariés à un membre de la [close_family|E] bénéficient de $VALUE|0+=$ d'[opinion|E] de la part des [vassals|E] de la même [faith|E]"
 doctrine_parameter_divine_marriage_piety_gain_active: "Le bonus de mariage [GetFaithDoctrine('doctrine_monogamy').GetBaseName] accorde également une grande quantité de [piety|E] si vous épousez un membre de la [close_family|E]"
 
 tenet_pacifism_name: "Pacifisme"
 tenet_pacifism_desc: "La violence est un acte abhorré qui ne mène qu'à la souffrance, la douleur et le regret. En œuvrant à l'éviter autant que possible, nous pouvons bâtir des sociétés plus fortes et plus sûres pour les fidèles."
 doctrine_parameter_holy_wars_forbidden: "Ne peut déclarer de [holy_wars|E] ni effectuer de [raid|E]"
 doctrine_parameter_pacifist_opinion_active: ""
 pacifist_opinion_active_opinion_name: "Pacifiste également"
 pacifist_opinion_active_county_opinion_name: "Comté Pacifiste également"
 doctrine_parameter_opinion_of_pacifist_opinion_active: "[opinion|E] envers les autres Pacifistes : $VALUE|+=0$"
 doctrine_parameter_piety_from_long_peace: "Les dirigeants en paix depuis au moins deux ans voient leur [piety|E] modifiée de $VALUE|+$ chaque mois"
 PIETY_LONG_PEACE: "Longue Paix"

 tenet_vows_of_poverty_name: "Vœux de Pauvreté"
 tenet_vows_of_poverty_desc: "L'argent corrompt le cœur des hommes et les éloigne de la vraie foi. Nous devons fuir l'acquisition de richesses matérielles pour nous concentrer sur ce qui importe vraiment."
 doctrine_parameter_vows_of_poverty_active: "Les [rulers|E] peuvent [decide|E] de faire un Vœu de Pauvreté, réduisant le revenu mensuel de [tax|E] mais augmentant le gain mensuel de [piety|E]"

 tenet_human_sacrifice_name: "Sacrifice Humain"
 tenet_human_sacrifice_desc: "Le meilleur moyen de prouver notre dévotion est par l'acte de sacrifice. Le sacrifice le plus précieux que nous puissions offrir est le sacrifice de la vie humaine."
 doctrine_parameter_human_sacrifice_active: "Les [executions|E] rapportent de la [piety|E] au lieu d'en coûter\n$EFFECT_LIST_BULLET$Les [executions|E] ne coûtent jamais de [prestige|E] en cas de [sharing_power|E]"
 doctrine_parameter_flower_war_cb_active: "Octroie le [casus_belli|E] de [flowery_war|E] contre les royaumes voisins"

 tenet_gruesome_festivals_blot_name: "Blót"
 tenet_gruesome_festivals_name: "Fêtes Macabres"
 tenet_gruesome_festivals_desc: "Nous naissons tous dans le sang. Nous survivons par le sang de notre bétail, de notre famille, de nos ennemis. Il est naturel que [ROOT.Faith.PantheonTerm] exigent leur juste part."
 gruesome_festivals_active_name: "capacité d'accomplir de grands sacrifices"
 doctrine_parameter_gruesome_festivals_active: "Peut tenir de grands sacrifices environ une fois par décennie pour l'[opinion|E] des sujets et des [county_opinion|E] de même [faith|E]"

 tenet_volcanic_veneration_name: "Vénération Volcanique"
 tenet_volcanic_veneration_desc: "Il est peu de choses plus divines que la terre nouvelle jaillissant des fosses ardentes de notre foyer. Nous passons nos vies au bord du désastre, à jamais à la merci de [ROOT.Faith.PantheonTerm]."
 tenet_cthonic_redoubts_name: "Redoutes Chthoniennes"
 tenet_cthonic_redoubts_desc: "Il n'est point de meilleur abri que les racines de la Terre, point de forteresse plus solide que ses épines saillantes, point de pèlerinage plus sacré que ses sentiers cachés. Nous contemplons la Création depuis ces sommets altiers et ressentons le véritable poids du Divin."
 doctrine_parameter_easier_to_convert_faith_in_mountains: "Vitesse de [convert_county|E] en [terrain|E] montagneux : #P +[EmptyScope.ScriptValue('easier_to_convert_faith_in_mountains_bonus_loc_control')|0]%#!"
 doctrine_parameter_easier_to_convert_culture_in_same_faith_mountains: "Vitesse de [promote_culture|E] en [terrain|E] montagneux de même [faith|E] : #P +[EmptyScope.ScriptValue('promote_culture_easier_to_convert_culture_in_same_faith_mountains_bonus_loc_control')|0]%#!"
 doctrine_parameter_harder_to_convert_faith_away_in_mountains: "Vitesse hostile de [convert_county|E] en [terrain|E] montagneux : #P [EmptyScope.ScriptValue('harder_to_convert_faith_away_in_mountains_malus_loc_control')|0]%#!"

 tenet_consolamentum_name: "Endura"
 tenet_consolamentum_name_alternate: "Suicide Rituel"
 tenet_consolamentum_desc: "Lorsque nous vieillissons ou tombons malades, nous accomplissons un rituel pour purifier notre âme du péché. Une fois cela fait, nous mettons fin à notre vie rapidement et définitivement, afin que le péché n'ait point l'occasion de nous infester de nouveau."
 doctrine_parameter_consolamentum_active: "Les adhérents peuvent [decide|E] de mettre fin à leur vie lorsqu'ils sont âgés, incapables ou proches de la mort ; ce faisant, ils n'encourent aucune des pénalités normales du suicide"

 tenet_gnosticism_name: "Gnosticisme"
 tenet_gnosticism_desc: "Par la connaissance, l'étincelle divine qui repose en tout être humain peut être libérée et retourner à sa source céleste dans le royaume des esprits."
 doctrine_parameter_hostility_override_tenet_gnosticism: "Considère les autres [faiths|E] gnostiques et dualistes comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] au lieu de $hostility_hostile_tooltippable$ ou $hostility_evil_tooltippable$"
 doctrine_parameter_hostility_override_special_doctrine_is_gnostic_faith: ""
 doctrine_parameter_granting_titles_gives_stress: "Céder des [titles|E] soulage une quantité proportionnelle de [stress|E]"

 tenet_mendicant_preachers_name: "Prédicateurs Mendiants"
 tenet_mendicant_preachers_desc: "Nos missionnaires voyagent au loin sans rien d'autre que les vêtements qu'ils portent sur le dos. Ils vivent de la générosité de ceux qu'ils visitent et partagent la connaissance de la vraie foi en retour."
 doctrine_parameter_mendicant_preachers_conversion_active: "Vitesse de Conversion des Comtés : #P +33#!"

 tenet_communal_identity_name: "Identité Communautaire"
 tenet_communal_identity_desc: "Notre foi et notre culture sont intrinsèquement liées. Cette pratique renforce les liens de notre communauté, bien qu'elle tende à exclure les étrangers."
 doctrine_parameter_same_communal_identity_opinion_active: "#P +10#! d'[opinion|E] avec les personnages de la même [faith|E]"
 doctrine_parameter_same_culture_conversion_bonus_active: "Vitesse de Conversion dans les [counties|E] de ma [culture|E] : #P +50%#!"
 doctrine_parameter_same_faith_promote_culture_bonus_active: "Vitesse de Promotion de Culture dans les [counties|E] de ma [faith|E] : #P +50%#!"
 doctrine_parameter_other_culture_conversion_penalty_active: "Vitesse de Conversion dans les [counties|E] d'une [culture|E] différente : #N -50%#!"

 tenet_pentarchy_name: "Ecclésiarcat"
 tenet_pentarchy_alternate_name: "La Pentarchie"
 tenet_pentarchy_desc: "Nos Lieux Saints sont plus que de simples endroits sacrés — ce sont les sièges mêmes du pouvoir d'où nos chefs religieux gouvernent."

 tenet_aniconism_name: "Aniconisme"
 tenet_aniconism_desc: "Le culte des images taillées a aveuglé bien trop de gens à la vérité divine. Nous chasserons toutes les icônes de nos lieux saints afin que nos fidèles ne tombent point dans ce piège."
 doctrine_parameter_reforging_artifacts_costs_piety: "Les [rulers|E] de cette [faith|E] doivent dépenser de la [piety|E] pour [reforge|E] ou [repair|E] des [artifacts|E]"
 doctrine_parameter_destroying_artifacts_is_pious: "Les [rulers|E] de cette [faith|E] peuvent détruire des [artifacts|E] contre de la [piety|E]"
 destroying_artifacts_is_not_pious_tt: "Votre [faith|E] ne peut détruire d'[artifacts|E] contre de la [piety|E]"
 artifact_is_rarer_than_masterwork_tt: "Cet [artifact|E] possède une [rarity|E] supérieure à Chef-d'œuvre"

 tenet_alexandrian_catechism_name: "Catéchisme Alexandrin"
 tenet_alexandrian_catechism_desc: "L'École Catéchétique d'Alexandrie avait une longue tradition d'encourager les théologiens à penser de manière critique et à remettre en question le statu quo.\n\nMalgré la destruction physique de l'école, nous perpétuons ces traditions."
 tenet_islamic_rationalism_name: "Théologie Rationnelle" #LOTR
 tenet_islamic_rationalism_desc: "Nous avons une longue tradition d'encourager les fidèles à penser de manière critique et à remettre en question le statu quo. Ce n'est que par la raison seule que nous pouvons espérer comprendre notre place dans le monde et distinguer le bien du mal." #LOTR
 #tenet_islamic_rationalism_name: "Islamic Rationalism"
 #tenet_islamic_rationalism_desc: "Since [ROOT.Faith.HighGodNameAlternate] is just and wise, [ROOT.Faith.HighGodNameSheHe|U] cannot go against reason or disregard the wellbeing of [ROOT.Faith.HighGodHerHis|U] creation. Only through unaided reason can we hope to comprehend our part in [ROOT.Faith.HighGodHerHis|U] great work, and separate good from evil."

 tenet_hedonistic_name: "Hédoniste"
 tenet_hedonistic_desc: "Le divin a empli ce monde d'une abondance de plaisirs pour que nous les savourions et en jouissions — ne point y prendre part, c'est mépriser l'œuvre même de la création."
 doctrine_parameter_piety_from_feasts_active: "Organiser un(e) [GetActivityType('activity_feast').GetName] rapporte de la [piety|E]"
 doctrine_parameter_piety_from_festivals_active: "[AddLocalizationIf( HasDlcFeature( 'all_under_heaven' ), 'doctrine_parameter_piety_from_festivals_active_auh')]" # Only show if you have AUH
 doctrine_parameter_piety_from_festivals_active_auh: "Organiser un(e) [GetActivityType('activity_festival').GetName] rapporte de la [piety|E]"

 tenet_carnal_exaltation_name: "Exaltation Charnelle"
 tenet_carnal_exaltation_desc: "Les plaisirs de la chair sont sublimes d'une manière qui transcende les autres expériences terrestres, nous rapprochant du divin. Nous devrions glorifier nos désirs charnels et chercher les occasions de les assouvir."

 tenet_polyamory_name: "Polyamour"
 tenet_polyamory_desc: "Notre amour mutuel devrait être aussi inconditionnel que l'amour [ROOT.Faith.FertilityGodNamePossessive] pour nous. Nous devons rejeter les notions dépassées selon lesquelles une personne posséderait les affections d'une autre."
 doctrine_parameter_no_unfaithfulness_penalty_active: "Les adhérents ne reçoivent pas de pénalités d'[opinion|E] ni de [imprisonment_reasons|E] envers leur conjoint ou les amants de leur conjoint pour des relations extraconjugales"

 tenet_unrelenting_faith_name: "Foi Inébranlable"
 tenet_unrelenting_faith_desc: "Nos convictions sont fortes, et nous combattrons et mourrons volontiers pour notre foi. Peu importe à quel point les chances sont contre nous, nous ne nous rendrons point."
 tenet_unrelenting_faith_zandik_name: "Rébellion Vertueuse"
 tenet_unrelenting_faith_zandik_desc: "Nous ne souhaitons de mal à nulle âme, ni à nulle chose, mais si nos voies sont menacées, nous les défendrons avec une férocité implacable." 

 tenet_rite_name: "Rite"
 tenet_rite_desc: "Nos croyances ne diffèrent pas tant de celles de notre foi-mère... pourquoi nous quereller sur les détails alors que nous nous accordons sur les points majeurs de doctrine, et, surtout, sur l'autorité ultime d'arbitrage ?"
 doctrine_parameter_maintains_head_of_faith_on_creation: "Les nouvelles [faiths|E] conservent leur ancien [head_of_faith|E] à la création"
 doctrine_parameter_ecumenical_christians_keep_ecumenism: "[GetPlayer.Custom('GetRiteEcumenismFullOrEmpty')]"
 GetRiteEcumenismFullOrEmpty_full: "Les [faiths|E] chrétiennes avec  le conservent à la création"
 GetRiteEcumenismFullOrEmpty_empty: ""

 #Muslim Tenets
 tenet_struggle_submission_name: "Lutte et Soumission"
 tenet_struggle_submission_desc: "La volonté divine est la source de tout bien, ainsi une bonne existence repose sur la soumission à cette volonté, exprimée par la lutte pour l'accomplir."
 doctrine_parameter_bonus_holy_war_piety_active: "La [piety|E] et l'[piety_experience|E] obtenues en remportant des [holy_wars|E] sont augmentées de #P 50%#!"

 tenet_religious_legal_pronouncements_name: "Droit Religieux"
 tenet_religious_legal_pronouncements_hisbah: "Hisbah"
 tenet_religious_legal_pronouncements_fatwa: "Fatwa"
 tenet_religious_legal_pronouncements_halakha: "Halakha"
 tenet_religious_legal_pronouncements_desc: "La frontière entre arguments théologiques et juridiques est mince, et les qualités spirituelles peuvent et doivent être considérées dans les règlements séculiers."
 doctrine_parameter_temporal_condemnation_enabled: "Les dirigeants avec une haute [learning|E] peuvent condamner leurs [vassals|E] [sinful|E]. Plus un vassal est Pécheur, moins son dirigeant a besoin d'Érudition pour le condamner.\n$EFFECT_LIST_BULLET$Les vassaux condamnés sont considérés comme des [criminals|E] et peuvent voir leurs titres révoqués"
 doctrine_parameter_religious_legal_pronouncements_law_cost_reduction: "Coûts des Lois : #P -10%#!"
 tenet_religious_legal_pronouncements_cost_tooltip: "Droit Religieux : #P -10%#!"
 tenet_religious_fatwa_cost_tooltip: "Fatwa : #P -10%#!"
 tenet_religious_halakha_cost_tooltip: "Halakha : #P -10%#!"

 tenet_false_conversion_sanction_name: "Fausses Conversions Sanctionnées"
 tenet_temporal_condemnation_taqiya: "Taqiya"
 tenet_anusim: "Anusim"
 tenet_false_conversion_sanction_desc: "Si votre vie est menacée, il est acceptable de professer une fausse foi, tant que vous gardez la vérité dans votre cœur."
 doctrine_parameter_sanctioned_false_conversion: "Résistance à la Conversion : #P +30%#!\n$EFFECT_LIST_BULLET$Les [characters|E] et les [counties|E] peuvent parfois se reconvertir à cette [faith|E] s'ils ont été égarés"

 tenet_tax_nonbelievers_name: "Taxer les Non-Croyants"
 tenet_tax_nonbelievers_desc: "Le service militaire est réservé aux fidèles, tandis qu'une taxe est prélevée sur les non-croyants pour la protection qui leur est offerte."
 tenet_tax_nonbelievers_jizya_name: "Jizya"

 tenet_literalism_name: "Littéralisme"
 tenet_literalism_desc: "Nos textes sacrés énoncent clairement l'intention divine, et l'interprétation humaine est de valeur limitée."
 doctrine_parameter_literalist_debate_enabled: "Peut débattre avec d'autres seigneurs du royaume au prix d'[opinion|E], pour gagner ou perdre de la [piety|E]"

 tenet_legalism_name: "Légalisme"
 tenet_legalism_desc: "Nos lois sont le fruit de générations de sagesse et de dévotion, et y adhérer est par sa nature même pieux. Un pécheur, quel qu'il soit, ne sera jamais au-dessus de la loi."
 doctrine_parameter_legalism_reduced_faction_virtues: "Les [vassals|E] et les [counties|E] sont moins susceptibles de rejoindre des [factions|E] contre un dirigeant [virtuous|E]"
 doctrine_parameter_legalism_increased_faction_sins: "Les [vassals|E] et les [counties|E] sont plus susceptibles de rejoindre des [factions|E] contre un dirigeant [sinful|E]"
 doctrine_parameter_legalism_modified_law_costs: "Réduit les coûts des lois de #P -10%#! pour chaque [virtue|E] d'un dirigeant"
 doctrine_parameter_legalism_modified_law_costs_2: "Augmente les coûts des lois de #N 10%#! pour chaque [sin|E] d'un dirigeant"
 doctrine_parameter_legalism_trust_just_leader_active: "Les [electors|E] sous des types de [succession|E] élective sont plus susceptibles de voter pour le choix de leur [liege|E] si leur Suzerain est $trait_just$"
 tenet_legalism_law_cost_tooltip: "[legalism|E] :\n   Mes péchés et vertus affectent ceci de : [SCOPE.ScriptValue('legalism_law_cost_modifier')|-0%]"
 
 tenet_reincarnation_name: "Réincarnation"
 tenet_reincarnation_desc: "Nous avons vécu maintes vies avant celle-ci, et continuerons d'en vivre maintes autres après. Chaque mort n'est que le commencement de quelque chose de nouveau."
 tenet_reincarnation_zoroastrian_name: "Raj'a"
 tenet_reincarnation_zoroastrian_desc: "Tout comme les dieux peuvent s'incarner dans des corps humains, nous aussi pouvons renaître. Les bons sont récompensés par des formes de beauté et de pureté, et peuvent ultimement devenir des anges de pure lumière."
 doctrine_parameter_reincarnation_resistance_to_conversion: "Résistance à la Conversion des Comtés : #P +20%#!"
 doctrine_parameter_reincarnation_events_active: "Les enfants ont une chance d'être considérés comme la réincarnation d'un ancêtre, accordant des bonus de [piety|E] et d'[opinion|E]"

 tenet_esotericism_name: "Ésotérisme"
 tenet_esotericism_kabbalah: "Kabbale"
 tenet_esotericism_desc: "Les grands mystères du divin dépassent peut-être la compréhension mortelle, mais ce n'est point une excuse pour l'ignorance. Leur existence même nous oblige à rechercher la connaissance et la compréhension du monde qui nous entoure."
 doctrine_parameter_tenet_esotericism_mystic_education: "Les enfants avec le [education_focus|E] [learning|E] peuvent acquérir le trait [GetTrait('lifestyle_mystic').GetName( GetNullCharacter )] s'ils réussissent bien leurs études."
 tenet_esotericism_kabbalah_desc: "Les enseignements de la Kabbale rendent accessible à la compréhension mortelle la relation entre le Dieu éternel, la nature de l'infini connue sous le nom d'Ein Sof, et la création de Dieu. La Kabbale forme la base de tout mysticisme judaïque, et les pratiquants de la Kabbale s'engagent souvent avec d'autres écoles juives."
 tenet_religious_kabbalah_cost_tooltip: "Kabbale : #P -10%#!"
 
#Eastern Tenets
 tenet_adaptive_name: "Adaptative"
 tenet_adaptive_desc: "L'adhérence dogmatique aux anciennes restrictions ne fait que nuire aux fidèles. Tant que nous restons fidèles aux croyances fondamentales de notre foi, nous pouvons adapter nos lois au monde qui nous entoure."
 doctrine_parameter_tenet_adaptive_conversion_resistance: "Résistance à la Conversion des Comtés : #P +30%#!"
 doctrine_parameter_reduced_vassal_religion_discontent:1 "Les [vassals|E] infidèles sont moins susceptibles de rejoindre les [factions|E] d'Indépendance et Populistes"
 doctrine_parameter_immaterial_harmony_conversion_cost_reduced: "Coût en [piety_i|E][piety|E] pour se convertir à une autre [faith|E] avec cette [doctrine|E] : #P -50%#!"
 doctrine_parameter_immaterial_harmony_buddhist_take_vows: "Les [faiths|E] [GetReligionByKey('buddhism_religion').GetAdjective] peuvent utiliser l'[interaction|E] #V $take_vows_interaction$#!"

 tenet_inner_journey_name: "Voyage Intérieur"
 tenet_inner_journey_desc: "Ce n'est qu'en se comprenant soi-même que l'on peut comprendre le monde. Le voyage de découverte de soi est important car il est long et difficile."
 doctrine_parameter_meditation_mechanics_active: "Les personnages peuvent [decide|E] de Méditer en Réclusion, réduisant le [stress|E] et acquérant possiblement des intuitions théologiques"

 tenet_dharmic_pacifism_name: "Pacifisme Dharmique"
 tenet_dharmic_pacifism_desc: "Nous faisons tous partie de l'ordre cosmique. La violence contre quoi que ce soit est violence contre tout, soi-même y compris."

 tenet_bhakti_name: "Dieux Patrons" #LotR
 tenet_bhakti_patron_god_name: "Dieux Patrons"
 tenet_bhakti_desc: "Les mortels ne peuvent atteindre la pleine gloire du divin, mais en choisissant un unique aspect de la divinité à imiter, vénérer et auquel se consacrer, nous pouvons nous en approcher plus que ne le permettrait autrement."
 doctrine_parameter_select_personal_god_active:1 "Les dirigeants peuvent [decide|E] de choisir un avatar personnel à vénérer, obtenant un bonus associé"

 tenet_asceticism_name: "Ascétisme"
 tenet_asceticism_desc: "Les poursuites matérialistes nous aveuglent à la vérité divine. Ce n'est qu'en nous consacrant à vivre des vies simples sans luxe que nous pouvons atteindre l'illumination spirituelle."

 tenet_ritual_hospitality_name: "Hospitalité Rituelle"
 tenet_ritual_hospitality_alternate_name: "Pūjā"
 tenet_ritual_hospitality_desc: "L'hospitalité est l'une des plus grandes vertus que l'humanité puisse manifester. Les hôtes dans nos demeures, qu'ils soient mortels ou divins, doivent toujours être traités avec le plus grand honneur et respect."
 doctrine_parameter_host_honored_guests_active: "Les [rulers|E] peuvent accueillir d'autres personnages comme Hôte d'Honneur, dépensant de la [piety|E] en échange d'une meilleure [opinion|E]"

 #Pagan tenets
 tenet_warmonger_name: "Belliciste"
 tenet_warmonger_desc: "Foi et guerre vont de pair. Celui qui refuse de combattre au nom du divin ne saurait être appelé un vrai croyant."
 doctrine_parameter_conquest_cb_enabled: "Les [rulers|E] disposent d'un [casus_belli|E] de Conquête contre les dirigeants voisins"
 doctrine_parameter_faith_can_raid: "Permet le [raiding|E] des [counties|E] étrangers pour le butin"
 doctrine_parameter_invasion_cb_enabled: "Les [rulers|E] prestigieux peuvent utiliser un [casus_belli|E] d'Invasion une fois par vie (ou tous les 100 ans)" #LotR
 doctrine_parameter_great_holy_wars_active_if_reformed: "S'il en existe un, le [head_of_faith|E] peut déclarer des [great_holy_wars|E], à condition que cette [faith|E] soit [organized|E]"

 tenet_ancestor_worship_name: "Culte des Ancêtres"
 tenet_ancestor_worship_desc: "Nos ancêtres veillent sur nous depuis l'au-delà, nous guidant et nous montrant la voie. Pour cela, nous devons les respecter et les honorer."

 tenet_adorcism_name: "Adorcisme"
 tenet_adorcism_desc: "Les esprits de ce monde peuvent accomplir de grandes œuvres de bien comme de mal. En les honorant et les respectant, nous ne pouvons qu'espérer qu'ils nous feront du bien et du mal à nos ennemis."
 doctrine_parameter_spirit_possession_active: "Active la [decision|E] « Solliciter l'Aide des Esprits »"

 #Lotr
 #doctrine_parameter_deep_worship_active: "Enables the 'Journey into the Dark' [decision|E]"

 tenet_ritual_celebrations_name: "Célébrations Rituelles"
 tenet_ritual_celebrations_desc: "Le culte du divin est quelque chose à exalter et à partager avec notre communauté. Organiser de grandes fêtes pour honorer et louer le divin nous rassemble tous."
 doctrine_parameter_mandatory_feast_attendance: "Les [vassals|E] sont plus susceptibles d'assister à vos Festins. Ceux qui refusent tout de même de venir perdront de la [piety|E] pour cela."

 tenet_sky_burials_name: "Funérailles Célestes"
 tenet_sky_burials_desc: "Les morts ne devraient point être emprisonnés sous terre — il vaut bien mieux leur permettre d'être consumés par les oiseaux charognards, où dans un dernier acte de générosité ils peuvent nourrir le monde qui les a nourris."
 doctrine_parameter_sky_burials_active: "Les [rulers|E] peuvent offrir à leurs ancêtres des Funérailles Célestes, gagnant de la [piety|E] et satisfaisant leurs [vassals|E]\n$EFFECT_LIST_BULLET$Le [duchy_building|E] [GetBuilding('charnel_grounds_01').GetName] peut être construit"
 can_build_towers_of_silence_active_name: "capacité d'utiliser le [duchy_building|E] [GetBuilding('tower_of_silence_01').GetName]"
 doctrine_parameter_can_build_towers_of_silence_active: "Les [vassals|E] peuvent construire le [duchy_building|E] [GetBuilding('tower_of_silence_01').GetName] pour renforcer le zèle du [county|E] — #EMP si#! la [faith|E] de leur [liege|E] ne pratique pas $tenet_sky_burials_name$"

 tenet_sacred_childbirth_name: "Naissance Sacrée"
 tenet_sacred_childbirth_alternate_name: "Kūdikis Lemti"
 tenet_sacred_childbirth_desc: "Les étuves où les mères accouchent doivent être purifiées et préparées avec les rituels appropriés, afin d'encourager le divin à nous accorder sa bénédiction lors de l'enfantement."
 doctrine_parameter_safer_childbirths_active: "Les mères sont #P moins susceptibles#! de mourir en couches"
 doctrine_parameter_healthier_children_active: "Les enfants sont #P moins susceptibles#! d'être maladifs ou mort-nés"
 doctrine_parameter_piety_from_childbirth_active: "Les mères et les pères gagnent de la [piety|E] à la naissance de leur enfant"
 piety_from_childbirth_toast: "Naissance Sacrée"

 tenet_sanctity_of_nature_name: "Sainteté de la Nature"
 tenet_sanctity_of_nature_desc: "Le monde naturel est la création du divin, et nous n'en sommes que les hôtes. Nous devons respecter et honorer chaque arbre, chaque animal, et même le sol lui-même."
 # This parameter does nothing; it's just here to flag the tenet's nature silently so we can reference it without directly tagging the tenet.
 doctrine_parameter_believes_in_harmony_with_nature_invisible: ""

 tenet_mystical_birthright_name: "Droit de Naissance Propice"
 tenet_mystical_birthright_alternate: "Táltos Születés"
 tenet_mystical_birthright_desc: "Chacun de nous naît avec un destin, le plus important étant celui du Táltos — ceux qui sont choisis dès la naissance pour manier des pouvoirs magiques et devenir de grands guides spirituels."
 doctrine_parameter_mystic_birthright_active: "Les enfants peuvent rarement naître avec le trait [GetTrait('lifestyle_mystic').GetName( GetNullCharacter )]"

 tenet_astrology_name: "Astrologie"
 tenet_astrology_desc: "Le ciel nocturne est notre fenêtre sur le royaume du divin. Les grands secrets et mystères du monde y sont inscrits, ouverts à tous ceux qui savent où regarder."
 doctrine_parameter_divine_the_stars_active: "Permet aux adhérents de Sonder les Étoiles et prédire leur avenir"
 tenet_divination_name: "Divination"
 tenet_divination_desc: "Le destin des mortels et l'avenir du monde sont inscrits dans les étoiles et dans des signes cachés, et par des rituels, des rêves et des présages, les praticiens habiles peuvent deviner ces secrets auprès des esprits de l'au-delà."

 tenet_sun_worship_name: "Culte du Soleil"
 tenet_sun_worship_desc: "Le porteur de lumière, le donneur de vie, la flamme éternelle — il règne haut dans le ciel comme le véritable souverain du monde."
 doctrine_parameter_summer_festivals_active: "Organiser des Festins durant les mois d'été rapporte de la [piety|E]"
 doctrine_parameter_trial_by_sun_active: "Les [criminals|E] emprisonnés peuvent être condamnés à une Épreuve du Soleil"

