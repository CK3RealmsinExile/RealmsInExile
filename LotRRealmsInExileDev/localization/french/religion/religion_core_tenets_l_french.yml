 tenet_christian_syncretism_name: "Syncrétisme chrétien"
 tenet_christian_syncretism_desc: "Jésus de Nazareth n'était peut-être pas de nature divine, mais il demeure une figure vertueuse et respectable. Nous devrions honorer et respecter ses enseignements."
