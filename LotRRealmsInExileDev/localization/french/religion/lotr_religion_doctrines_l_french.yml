 # Additional Gender Doctrine Levels

 doctrine_gender_male_orientated_name: "Prédominance masculine"
 doctrine_gender_male_orientated_desc: "S'il nous paraît évident que les hommes doivent mener, en particulier dans les affaires publiques, ce serait folie que d'ignorer le talent là où il se manifeste. Une femme douée peut surpasser un homme de la plus haute lignée, et nous devons mettre un tel talent à profit."

 doctrine_gender_female_orientated_name: "Prédominance féminine"
 doctrine_gender_female_orientated_desc: "Les hommes, bien que souvent impétueux et violents, peuvent accomplir de grandes choses si leur énergie et leur ardeur sont canalisées vers des fins utiles. Bien que le véritable pouvoir doive demeurer aux mains des femmes, nous devons nous efforcer d'intégrer et de guider les hommes de talent qui se trouvent parmi nous."

 doctrine_parameter_equal_council: "Hommes et femmes peuvent être nommés [chancellors|E], [stewards|E] et [marshals|E]"

 # Additional Clerical Function Doctrine 

 doctrine_clerical_function_lore_masters_name: "Maîtres du Savoir"
 doctrine_clerical_function_lore_masters_desc: "Nos [ROOT.Faith.PriestNeuterPlural] ont pour charge de rassembler et de préserver la connaissance du passé, afin qu'elle puisse guider notre présent."

 # Additional Consanguinity Doctrine

 doctrine_consanguinity_divine_name: "Mariage Divin"
 doctrine_consanguinity_divine_desc: "Le sang du divin coule dans les veines de nos rois et reines. Préserver la pureté de nos lignées est le meilleur moyen d'assurer que le règne de notre maison perdure pour les siècles à venir."

 # Syncretism Doctrines

 is_freepeople_faith_name: "Peuples Libres"
 special_doctrine_is_freepeople_faith_name: "Enseignements des Sages"
 special_doctrine_is_freepeople_faith_desc: "À notre grand chagrin, une grande partie du monde demeure dans les ténèbres, ignorante de la vérité des Puissances et de l'ordre juste du monde. Cependant, avec patience et une main bienveillante, nous pouvons guider ceux qui le désirent hors des ténèbres vers la lumière, comme Oromë mena les Eldar de Cuiviénen à Valinor quand le monde était jeune."

 is_adulation_of_the_dark_faith_name: "Foi d'État Sauronique"
 special_doctrine_is_adulation_of_the_dark_faith_name: "Foi d'État Sauronique"
 special_doctrine_is_adulation_of_the_dark_faith_desc: "Cette foi est l'une des religions officielles des domaines de [sauroncharacter|E], le Seigneur des Anneaux. En tant que telle, elle jouit d'un statut privilégié au sein de son empire comme de ceux de ses serviteurs."
 #OLD: Praise his name, Melkor, the one true Elder King, righteous sovereign of Eä and all its peoples! All rightful authority and power belong to him, and to his chosen lieutenants, and dominion of all the world is in their hands. Those who show the wisdom to humbly offer Him their submission shall be granted a place in His order, and those that do not... shall be destroyed.

 is_survival_of_the_strong_faith_name: "Loi du Plus Fort"
 special_doctrine_is_survival_of_the_strong_faith_name: "Loi du Plus Fort"
 special_doctrine_is_survival_of_the_strong_faith_desc: "Ce monde n'a nul grand dessein, nulle grande vérité. Le fait est simple : l'état naturel du monde est le chaos. Seuls les forts peuvent dompter la tempête et la chevaucher vers la gloire et la puissance. Dépouille-toi de ta faiblesse et jette-toi dans la mêlée."

 doctrine_influence_name: "Alignement" 
 doctrine_echoes_of_the_ainur_name: "Échos des Ainur"
 doctrine_echoes_of_the_ainur_desc: "En notre peuple résonne l'écho d'une vérité cosmique, si atténué et déformé soit-il. Il existe un ordre dans le monde, juste, équitable et bon. Nous ne désirons point de vastes dominations, mais nous défendrons les nôtres, et notre paix, jusqu'au bout."
 doctrine_a_people_apart_name: "Un Peuple à Part"
 doctrine_a_people_apart_desc: "Nul besoin de nous mêler des affaires des autres peuples. Nous avons nos propres dieux et nos propres traditions, et n'avons que faire des leurs."
 doctrine_dominion_of_the_dark_name: "Domination des Ténèbres"
 doctrine_dominion_of_the_dark_desc: "Il est une vérité simple, trop souvent ignorée, au sujet de notre monde. La puissance est l'arbitre ultime de toute chose ; quiconque prétend le contraire se leurre, au mieux. À travers tous les Âges, les Ténèbres ont perduré, puissantes et redoutables, et leurs promesses sont douces et bienveillantes. Ne devrions-nous point reconnaître ce fait, et offrir notre humble soumission ?"
 INCOMPATIBLE_WITH_INFLUENCE: "Incompatible avec la [doctrine|E] d'[alignment|E] sélectionnée."