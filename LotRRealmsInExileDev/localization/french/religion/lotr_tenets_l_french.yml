l_french:

 # Dwarven Eru Patron
 tenet_primacy_of_sulladad_name: "Primauté de Sulladad"
 tenet_primacy_of_sulladad_desc: "Dans cette foi [dwarven|E], [eruiluvatar|E], qu'ils nomment [Glossary('Sulladad','sulladad_gloss')], est l'objet premier de la vénération et du culte, au-dessus de tous les autres, plutôt que la vénération de [Glossary('Mahal','mahal_gloss')], qui est l'usage de la plupart des pratiques naines." #Old desc:In this faith, [eruiluvatar|E], the Allfather and [Concept('creation', 'Creator')|E] of all, is worshipped above all others. The faithful reject the veneration of [valargods|E] and [maiargods|E], holding that only Eru shaped the world and all within it. Reflection, humility, and obedience to His design are central virtues, and all things are judged by their harmony with the true [Concept('musicoftheainur', 'Music')|E].

 # Ainur Patrons
 tenet_primacy_of_manwe_name: "Primauté de Manwë"
 tenet_primacy_of_manwe_desc: "En cette foi, le Vala [manwecharactershort|E] demeure une source d'inspiration et de vénération inépuisable, et l'accent est mis sur la seigneurie légitime et les standards inflexibles de gouvernance royale. Les fidèles proclament leurs prières à haute voix, sachant que les vents porteront leurs suppliques vers l'[elderkingcharacter|E] en son palais d'[ilmarin|E] depuis les hauteurs sacrées du Taniquetil." #Old Desc: Manwë Súlimo, the Elder King, is the supreme ruler of all Arda, the viceregent of Eru in the world incarnate, and Lord of the Breath of Arda. The winds, airs and birds are his servants, and his presence is felt wherever the four winds blow. His palace, Ilmarin, sits upon the peak of Taniquetil, where the four winds bring all things said upon Arda to his ear. Of all the Ainur, he is said to be closest to the mind of Illuvatar. As the Elder King, he is the natural patron of kings and righteous rulers.
 tenet_primacy_of_varda_name: "Primauté de Varda"
 tenet_primacy_of_varda_desc: "En cette foi, la Valie [vardacharactershort|E] occupe une position de grandeur incomparable. Les adeptes de cette croyance chérissent les étoiles avec une dévotion profonde et se dressent comme ennemis zélés des Ténèbres, brandissant la lumière stellaire contre l'obscurité qui rampe." #Old Desc: Varda Elentári is the wife of Manwë, Queen of the Ainur, the Kindler, she who made the stars, most dearly beloved of the Valar amongst the Eldar. Beautiful beyond all words, light is her dominion, and everywhere the light of the stars shine she sees from her throne in the palaces of Ilmarin upon Taniquetil. From the beginning, she had been the most implacable foe of Morgoth, and she perceives most keenly the true nature of others. The very mention of her name is a curse upon evil, and she most amongst the powers is called upon for aid and strength in dire times. Amongst all the Powers, she might be said to be the true patron to any that stands resolute against the tide of Darkness.
 tenet_primacy_of_ulmo_name: "Primauté d'Ulmo"
 tenet_primacy_of_ulmo_desc: "En cette foi, le Vala [ulmocharacter|E] occupe une place de révérence suprême dans les cœurs des fidèles. Marins, navigateurs, et peuples côtiers se sentent en sécurité et protégés sous l'égide bienveillante d'Ulmo, dont les eaux portent leurs embarcations vers des rivages sûrs." #Old Desc: Ulmo is the lord of the seas and waters of Arda. His power dwells in the oceans and the rivers, and he is the most deeply instructed in the art of music, with it being said that an echo of the Music of the Ainur can be heard in the deeps of the ocean. He seldom involves himself in the councils of the Powers, preferring his undersea domains. Of all the Powers, he feels most keenly the pains of the Children through his waters, and alone of the Powers has never abandoned them. He is friend and patron foremost to those that dwell near his domain, coastal peoples, fishermen, and sailors.
 tenet_primacy_of_yavanna_name: "Primauté de Yavanna"
 tenet_primacy_of_yavanna_desc: "En cette foi, la Valie [yavannacharactershort|E] occupe une place d'importance capitale, avec un accent mis sur la coexistence harmonieuse et la cultivation respectueuse du monde naturel. À travers la terre florissante et généreuse, les sectateurs de Yavanna se réjouissent et louent leur patronne divine dans leurs chants de gratitude." #Old Desc: Yavanna Kementári is the Queen of the Earth, the Giver of Fruits – in her domain lies all things which grow. She made the Two Trees after the destruction of the Lamps made by her husband, Aulë, and from her pleas for protection of her plants were born the Onodrim. Yavanna is the Power responsible for the bounty of the fields, and she rejoices in the growing of plants. She despairs in their destruction, counting them her children, although she begrudgingly accepts that the Children coming into their dominion shall do such. She is the patroness of the farmer and all agrarian workers.
 tenet_primacy_of_aule_name: "Primauté d'Aulë"
 tenet_primacy_of_aule_desc: "En cette foi, le Vala [aulecharacter|E] constitue une figure centrale de vénération, et les adeptes de cette croyance ressentent une connexion intense avec la terre et ses mystères profonds. Artisans et créateurs jouissent d'un respect immense, et le désir d'apprendre embrase férocement les cœurs des sectateurs d'Aulë dans leur quête de connaissance." #Old Desc: Aulë the Smith is the greatest craftsmen of the Ainur, the one who wrought the foundations of the earth and rose up the mountains. He rejoices in the making of things, but seeks not their dominion, rejoicing in collaboration and the teaching of others. The minerals and jewels of the earth are of his design, ornamentation of the greater creation. Aulë is the patron, teacher, and friend of all who desire to make without destruction or dominion, lord of craftsmen and builders.
 tenet_dwarffathers_name: "Pères des Nains"
 tenet_dwarffathers_desc: "En cette foi, [mahalcharacter|E] est vénéré comme le Créateur qui [dwarfcreationmade|E] les [dwarves|E] dans les profondeurs secrètes du monde. Premiers parmi ses créations se dressent les sept [dwarffathers|E], les premiers-nés de leur race et fondateurs des sept clans nains légendaires. De cette origine sacrée découle la tradition persistante du culte ancestral, par laquelle la mémoire des clans est préservée et leur unité maintenue à travers les âges."
 doctrine_parameter_sacred_mining: "Accomplir une [GetActivityType('activity_mining').GetName] [activity|El] procure de la [piety_i][piety|El]"
 doctrine_parameter_mining_traits_more_pious: "Le [trait|E] [GetTrait('lifestyle_miner').GetName( GetNullCharacter )] est considéré comme [piety_i][pious|E]"
 doctrine_parameter_smith_traits_more_pious: "Le [trait|E] [GetTrait('lifestyle_artifact_crafting').GetName( GetNullCharacter )] est considéré comme [piety_i][pious|E]"
 tenet_primacy_of_the_feanturi_name: "Primauté des Fëanturi"
 tenet_primacy_of_the_feanturi_desc: "Dans cette foi transcendante, les [valargods|E] des [Glossary('Fëanturi','feanturi_gloss')] — [mandoscharacter|E], [irmocharactershort|E], ainsi que leur sœur vénérée [niennacharacter|E] — sont révérés comme les maîtres suprêmes des domaines spirituels, parfois honorés aux côtés de leurs épouses respectives, [vairecharacter|E] et [estecharacter|E]. Le rôle de chaque Valar dans les matières de l'esprit est exalté par-dessus toute autre fonction : Mandos règne sur la prophétie divine et guide les âmes des trépassés vers leur destinée éternelle ; Irmo veille sur les songes révélateurs et dispense la guérison spirituelle aux cœurs meurtris ; Nienna octroie la force intérieure, l'endurance face à l'adversité et la sagesse née de la compassion ; Vairë préserve la mémoire sacrée des temps révolus ; et Estë accorde le repos spirituel réparateur aux âmes lasses de leur fardeau terrestre."
 tenet_primacy_of_nienna_name: "Primauté de Nienna"
 tenet_primacy_of_nienna_desc: "En cette foi, la Valie [niennacharacter|E] façonne profondément leur compréhension du monde, encourageant la pitié sincère, la bonté désintéressée, et la générosité envers tous les êtres. Si le monde doit connaître la tristesse, alors réparons-le ensemble, et aimons-nous les uns les autres dans notre compassion partagée." #Old Desc:Nienna Núri, the Lady of Mercy, is the mourner who cries tears for the world and its pains. In her is the ability to be steadfast in sorrow, courageous in grief, and to understand that such pain is natural, and that those that suffer should be comforted. In her is the pity, and the hope, that changes the world, the pity that the more jaded would call folly, the pity and hope that keeps believing that there is good that can be found and redeemed, even in deep darkness. She is the comforter of the bereaved and the deceased, the advocate for the condemned. All who suffer are her charge, and those that follow her take on a similarly heavy burden.
 tenet_primacy_of_irmo_name: "Primauté d'Irmo"
 tenet_primacy_of_irmo_desc: "En cette foi, le Vala [irmocharactershort|E], également connu sous le nom de Lórien, est aimé et chéri par-dessus tout. En réponse à la piété des fidèles, Irmo les bénit de visions de ses jardins guérisseurs, où les âmes fatiguées peuvent trouver le repos éternel et la paix." #Old Desc: Irmo Fëanturi, known perhaps better as Lórien the Dreamer, Lord of Desires, is lord of the Gardens of Lórien and guider of dreams and visions. His gardens are respites of healing and safety from the woes and pains of the world, and though rare, might be found by a blessed few amongst Men and Elves. Irmo is the patron of spirits and dreams but accepts all who need rest and healing into his gardens.
 tenet_primacy_of_mandos_name: "Primauté de Mandos"
 tenet_primacy_of_mandos_desc: "En cette foi, le Vala [mandoscharacter|E] constitue une ombre omniprésente planant perpétuellement sur ses pratiquants. Bien que Mandos ne soit patron que des morts, ses sectateurs se tournent vers lui pour obtenir aide dans le déchiffrement des visions qu'ils ne peuvent comprendre par leurs propres moyens." #Old Desc: Námo Fëanturi, more commonly known as Mandos the Doomsman, is lord of the Halls of the Dead and pronouncer of Fate. Of all the Powers, Námo sees most clearly the Song in its entirety, the possible futures and the wangling ties of destiny that bind Arda together. He is the grimmest of the Powers and speaks rarely, and usually only at the prompting of Manwë his king. Mandos is patron to none but the dead, but those of powerful foresight might feel a small kinship to the Doomsman and the heavy weight he bears.
 tenet_primacy_of_este_name: "Primauté d'Estë"
 tenet_primacy_of_este_desc: "En cette foi, la Valie [estecharacter|E] représente une assurance silencieuse que les torts du monde peuvent être apaisés, et que toutes les blessures peuvent être guéries par le temps et l'effort persévérant. Les guérisseurs jouissent d'un respect immense parmi les fidèles qui reconnaissent en eux les instruments de sa grâce." #Old Desc: Estë the Gentle is the wife of Irmo, and with him she is the great healer of the Valar. In her is the power to heal wounds and weariness of the world, though she cannot heal a heart which does not wish to heal. She is kindly in her manner, desiring to mend the wrongs of the world and ends its hurts. She is the patron of healers.
 tenet_primacy_of_vaire_name: "Primauté de Vairë"
 tenet_primacy_of_vaire_desc: "En cette foi, la Valie [vairecharacter|E] inspire les fidèles dans leur quête inlassable de comprendre et d'apprendre des leçons de l'histoire, tissant leurs propres récits dans la grande tapisserie du temps." #Old Desc: Vairë is the wife of Namo of Mandos, and to her is charged the task of recording all the history of Arda, beginning to end, through her weavings. The halls of Mandos are draped in these tapestries, and the halls grow ever bigger as the Story grows in time and depth. She herself does not interfere with the Story, and thus, with the living, but loremasters and scholars look to her for inspiration and guidance.
 tenet_primacy_of_orome_name: "Primauté d'Oromë"
 tenet_primacy_of_orome_desc: "En cette foi, le Vala [oromecharactershort|E] exerce une influence puissante, les adeptes se modelant sur le Grand Cavalier dans leur mode de vie. La chasse et l'équitation ont pris une nature presque sacrée parmi les pratiquants de cette foi, devenant des actes de vénération et de communion spirituelle." #Old desc: Oromë Aldaron, the Great Rider, is the lord of wild beasts, the hunt, horses, riders, and dogs. He rejoices in the hunt, both of animals and of evil. He alone roamed Middle-Earth during the Sleep of Yavanna, and he found the first Eldar at its end and led them to Valinor. He is terrible in his wrath, and his horn strikes terror into all evil that hears it. Those that hear it know that the end was upon them, for none can escape the bow of Oromë once he has set it to strike down evil. He is the patron of horsemen and hunters, and dear friend to archers and foes of the Darkness.
 tenet_primacy_of_tulkas_name: "Primauté de Tulkas"
 tenet_primacy_of_tulkas_desc: "En cette foi, le Vala [tulkascharactershort|E] inspire un esprit de compétition ardente, les fidèles se délectant dans les démonstrations de force et de rapidité qui honorent sa mémoire. La lutte constitue un passe-temps populaire, tout comme les concours de force qui rassemblent les communautés dans la joie." #Old Desc: Tulkas Astaldo was the last of the Ainur to descend into Arda, in order to aid his kin in their war against the Black Foe. Tulkas delights in deeds of prowess and strength, such as wrestling and fighting. But for all his warlike behaviour, he is far from dreadful; he laughs heartily in sports and war alike. He is a hardy friend, slow to anger but also slow to forgive. He should not be sought for counsel, for he lives in the present, not mindful of the lessons of the past. He is patron to warriors and those that engage in sports and contests of strength.
 tenet_primacy_of_vana_name: "Primauté de Vána"
 tenet_primacy_of_vana_desc: "En cette foi, la Valie [vanacharacter|E] inspire les jeunes par sa jeunesse éternelle qui ne se flétrit jamais. Parmi ceux qui révèrent Vána, règne la croyance que chaque génération possède son temps naturel propre et tenter de résister à cela constitue un tort à la fois aux jeunes et aux anciens dans l'ordre cosmique." #Old Desc: Vána the Ever-Young is the wife of Oromë, and she rejoices in the noontide of life and its fullness. Those that follow her tend to emulate the importance of the fullness of life, desiring to make the most of their youths and resentful of those that cling to power into old age, denying the younger generation their chance.
 tenet_primacy_of_nessa_name: "Primauté de Nessa"
 tenet_primacy_of_nessa_desc: "En cette foi, la Valie [nessacharacter|E] inspire un esprit de festivité et de réjouissance qui emplit les cœurs de joie. Émulant Nessa dans ses pas gracieux, les fidèles dansent avec allégresse, embrassant la plénitude de la vie et le don précieux de la paix au rythme du tambour sacré." #Old Desc: Nessa the Dancer is the wife of Tulkas and sister to Oromë. She is fleet-footed as a deer, and is a dancer without peer, dancing with the Eldar upon the plains of Valimar. She and those that venerate her rejoice in peace and the festival, the dance and the drum.
 tenet_veneration_of_the_makarnea_name: "Vénération des Makarnea"
 tenet_veneration_of_the_makarnea_desc: "Les Makarnea, ceux aux Mains-Rouges, sont le frère et la sœur Makar et Meássë. Puissants parmi les Maiar, ils avaient aux premiers jours prêté l'oreille à Melkor, avant de le rejeter pour se ranger aux côtés des Valar.\n\nToutefois, ils demeurent quelque peu à l'écart — se réjouissant de la bataille, de la guerre, de la lutte et de la discorde comme nul autre parmi les Ainur. Ils se forgèrent de grands corps à la chevelure rouge comme le sang. Ceux qui les suivent émulent leur ardeur à vivre, et embrassent la lutte et le conflit comme le creuset où se forgent croissance et sens."

 # Free Peoples Tenets 
 tenet_elven_meditation_name: "Grâce des Premiers-Nés" #placeholder
 tenet_elven_meditation_desc: "Les [elves|E] furent les premiers et les plus anciens des Enfants d'Ilúvatar, considérés comme la race la plus belle et la plus sage d'[ardaconcept|E]. Ils vouent une profonde vénération à la nature et à la vie, et considèrent comme leur devoir de les protéger."  #placeholder
 tenet_birthright_eldar_name: "Droit d'aînesse des Eldar"
 tenet_birthright_eldar_desc: "Les [eldar|E], premiers et plus anciens des Enfants d'Ilúvatar, sont les gardiens de l'ordre naturel du monde. Ils doivent être les guides — et les censeurs s'il le faut — des venus-après. Ils n'abandonneront point les terres de leur naissance, ni leur droit d'aînesse."
 tenet_great_song_name: "Adoration de la Grande Chanson"
 tenet_great_song_desc: "Parmi les [avari|E], la [greatsong|E] revêt depuis longtemps une importance bien plus grande que chez leurs cousins [eldar|E]. Dans certaines pratiques avarines, la vénération de la Grande Chanson a engendré toute une série de rituels en son honneur."
 doctrine_parameter_characters_are_better_court_musicians: "Les [characters|E] de cette [faith|El] sont plus performants lorsqu'ils occupent le poste de cour #high [GetCourtPositionType('court_musician_court_position').GetName]#!"
 doctrine_parameter_pious_court_musicians: "[SelectLocalization( HasDlcFeature( 'royal_court' ), 'doctrine_parameter_pious_court_musicians_has_dlc', 'doctrine_parameter_pious_court_musicians_no_dlc' )]"
 doctrine_parameter_pious_court_musicians_has_dlc: "Débloque le poste de cour #V [GetCourtPositionType('court_musician_court_position').GetName]#! un [title_tier|E] plus tôt\n$EFFECT_LIST_BULLET$Le poste de cour #V [GetCourtPositionType('court_musician_court_position').GetName]#! augmente la [piety_i][piety|El] mensuelle"
 doctrine_parameter_pious_court_musicians_no_dlc: "" # Intentionally empty

 tenet_workshops_of_the_maker_name: "Ateliers du Créateur"
 tenet_workshops_of_the_maker_desc: "[mahalcharacter|E] possédait de nombreux ateliers où il œuvra lorsque le monde était jeune. En certains d'entre eux furent placés les sept [dwarffathersshort|E], et d'autres demeurèrent également, car le Créateur travailla en maintes contrées pour les préparer à la venue des peuples doués de parole. Ces ateliers revêtent une grande importance spirituelle, et les outils qu'il y laissa sont tenus pour des reliques sacrées, patrimoine et héritage de notre peuple."
 tenet_druedain_isolation_name: "Isolement des Drúedain"
 tenet_druedain_isolation_desc: "Les Drûath n'ont nul désir de s'étendre ou de conquérir les terres d'autres peuples. Ils se contentent de la vie qu'ils mènent, vivant en communion avec la nature et les esprits qui les entourent. Toutefois, ils combattront avec acharnement pour défendre leurs forêts et leurs foyers — aussi affrontez leurs flèches empoisonnées à vos risques et périls !"
 tenet_gift_of_men_name: "Le Don des Hommes"
 tenet_gift_of_men_desc: "Il est dans la nature des [men|E] de mourir et de passer au-delà du monde, pour découvrir ce qui se trouve par-delà et créer des choses nouvelles. Telle est la providence que nous accorda [eruiluvatar|E], et nous avons été uniquement bénis de pouvoir choisir l'heure de notre départ, dans la paix et non le désespoir. Déposons nos couronnes et transmettons le sceptre à nos enfants dans la plénitude de leurs jours. Nous devons dire adieu, mais non dans la peine, confiants en la bienveillance d'[eru|E], et que nous serons réunis à la Fin."
 tenet_memory_of_akallabeth_name: "Mémoire de l'Akallabêth"
 tenet_memory_of_akallabeth_desc: "Rien de ce que nous créons n'égalera jamais la splendeur du midi de [numenor|E], mais dans notre mémoire elle demeure, belle et radieuse. Les leçons de l'[akallabeth|E] ne seront jamais oubliées tant que les [realms_in_exile|E] perdureront."
 doctrine_parameter_lotr_numenor_blood_bonuses: "Les [traits|E] du [bloodofnumenor|E] confèrent des bonus supplémentaires au gain de [piety|El] et de [legitimacy|El]"
 tenet_bellakari_syncretism_name: "Syncrétisme Bellakari"
 tenet_bellakari_syncretism_desc: "Qu'ils disent Îshtra ou [nessacharacter|E], Arom ou [oromecharactershort|E], il est entendu parmi nous que nous désignons les mêmes [powersgods|E]. Le peuple de [bellakar|E] et des contrées environnantes ne sera pas divisé par des conflits de [faith|El], quand nous réalisons qu'en fin de compte, nous contons la même histoire, simplement en des langues différentes."
 doctrine_parameter_hostility_override_tenet_bellakari_syncretism: "Toutes les [faiths|E] possédant la [core_tenet|El] #high Syncrétisme Bellakari#! sont considérées comme $hostility_astray_tooltippable$."
 doctrine_parameter_lotr_unlock_firstfruits_activity: "Donne accès à l'[activity|El] [GetActivityType('activity_firstfruits_festival').GetName]"
 doctrine_parameter_unlock_decision_kathasaptha_manuscript: "Débloque la [decision|El] #V $decision_kathasaptha_manuscript$#!"

 tenet_cult_of_saints_name: "Culte des Saints"
 tenet_cult_of_saints_desc: "Cette [faith|El] vénère un grand nombre de saints. Ces grands hommes et femmes de sainteté furent bénis par [erutheone|E] lui-même et accomplirent de grands miracles en son nom. En raison de leur dévotion, ils sont grandement révérés."

 tenet_seasonal_festivities_name: "Festivités saisonnières"
 tenet_jultyde_name: "Yultyde"
 tenet_yuletide_name: "Yuletide"
 tenet_midwinter_name: "Festivités du Cœur de l'hiver"
 tenet_seasonal_festivities_desc: "Les peuples des [westlands|E] célèbrent diverses fêtes saisonnières, souvent selon des traditions différentes d'une région à l'autre."
 tenet_jultyde_desc: "Les [northmen|E] du [rhovanion|E] sont réputés pour leur amour de Yultyde, une fête du cœur de l'hiver célébrée pour accueillir la nouvelle année.\n\nQuelle plus grande joie que de passer du temps avec sa famille et ses voisins ? Les liens d'amitié sont célébrés par des cérémonies communautaires d'échange de présents, et quiconque cherche refuge contre le froid mordant du dehors est bienvenu auprès du foyer chaleureux."
 tenet_yuletide_desc: "Aux premiers temps de leur histoire connue, les [hobbits|E] passèrent beaucoup de temps avec les [northmen|E], et lorsqu'ils arrivèrent en [eriador|E], ils apportèrent avec eux la fête du cœur de l'hiver de Yuletide.\n\nQuelle plus grande joie que de passer du temps avec sa famille et ses voisins ? Les liens d'amitié sont célébrés par des cérémonies communautaires d'échange de présents, et quiconque cherche refuge contre le froid mordant du dehors est bienvenu auprès du foyer chaleureux."
 tenet_midwinter_desc: "De nombreux peuples à travers les [westlands|E] célèbrent quelque forme de fête du cœur de l'hiver pour accueillir la nouvelle année.\n\nQuelle plus grande joie que de passer du temps avec sa famille et ses voisins ? Les liens d'amitié sont célébrés par des cérémonies communautaires d'échange de présents, et quiconque cherche refuge contre le froid mordant du dehors est bienvenu auprès du foyer chaleureux."
 doctrine_parameter_lotr_unlock_yuletide_activity: "Donne accès à l'[activity|El] [GetActivityType('activity_yule').GetName]"

 tenet_hobbit_wandering_name: "La Route Sinueuse"
 tenet_hobbit_wandering_desc: "La route se poursuit sans fin, descendant du seuil où elle commence. Bien loin devant, la route est allée, et je dois suivre, si je le puis."
 
 # People of Darkness Tenets
 tenet_sacred_waters_name: "Eaux Sacrées"
 tenet_sacred_waters_desc: "L'eau. La grande dispensatrice de vie, purificatrice du corps et de l'âme. Notre peuple reconnaît sa nature essentielle et lui voue la vénération qu'elle mérite véritablement."  
 tenet_long_vengeance_name: "La Longue Vengeance"
 tenet_long_vengeance_desc: "Notre peuple a longtemps été la proie des puissants — nos terres prises, nos enfants réduits en servitude, opprimés sous le fouet et le collier. Eh bien, c'en est fini ! Les dieux se tiennent à nos côtés, et notre heure est enfin venue. Notre vengeance, longuement préparée, s'accomplira enfin ! Repoussons nos ennemis, jusqu'à ce que chaque tort soit redressé, chaque iniquité rendue au triple — notre peuple sera libre et prospère !"
 tenet_slave_raiding_name: "Raids esclavagistes"
 tenet_slave_raiding_desc: "Il y a grande richesse à gagner en partant razziez pour des esclaves. Pillons et profitons de la faiblesse des autres, et ainsi fortifions-nous !" 
 doctrine_parameter_raiding_active_desc: "Les fidèles peuvent mener des [raids|E] et gagner richesse et gloire en mettant à sac les terres ennemies."
 tenet_pirate_traditions_name: "Traditions pirates"
 tenet_pirate_traditions_desc: "Yo ho, yo ho, la vie de pirate pour moi !\n\nDepuis des temps immémoriaux, notre peuple a pris la mer en quête de butin et de pillage. Nous sommes la terreur des hautes mers, et partout où nos voiles sont aperçues, les peuples tremblent de peur."
 doctrine_parameter_pirate_traditions_active_desc: "Les autres [faiths|E] possédant ce [trait|E] sont considérées comme [Astray|E]."
 tenet_chelkar_revolt_name: "Héritage de la Grande Révolte"
 tenet_chelkar_revolt_desc: "Il y a bien des années, le peuple de Chelkar se souleva pour défendre les anciennes coutumes contre la tyrannie des Haruze et de leur Roi-Serpent. À ce jour, ils maintiennent une vigilance sévère, chaque Chelkari connaissant son devoir envers la foi."
 tenet_unforgetting_name: "Mémoire implacable"
 tenet_unforgetting_desc: "Nous n'oublions pas aisément ceux qui nous ont fait tort. Et bien que d'innombrables générations se soient écoulées, nous ne pardonnons jamais."
 tenet_unquiet_waters_name: "Eaux Inquiètes"
 tenet_unquiet_waters_desc: "Les eaux sombres du monde troublent votre esprit. Il y a un mal dans ces profondeurs qui ne dort point."
 tenet_blood_of_the_ancestors_name: "Sang des Ancêtres"
 tenet_blood_of_the_ancestors_desc: "Nos aïeux veillent sur nous depuis l'au-delà, nous guidant et nous montrant la voie. Pour cela, nous devons les respecter et les honorer."
 tenet_ancestor_worship_scions_of_anadune_name: "Héritiers d'Anadûnê"
 tenet_ancestor_worship_scions_of_anadune_desc: "La splendeur et la puissance d'[anadune|E] étaient sans égales, et même des siècles après l'[akallabeth|E], son héritage perdure en ses enfants. Nous sommes les héritiers de cet héritage, et nous honorerons nos aïeux comme il se doit."
 tenet_ancestor_worship_scions_of_westernesse_name: "Héritiers d'Occidentale"
 tenet_ancestor_worship_scions_of_westernesse_desc: "La grâce et la splendeur d'[westernesse|E] étaient sans égales, et même longtemps après sa corruption et sa [downfall|E], nous n'oublierons point la leçon de cette tragédie. Notre héritage est celui des Fidèles et de leur lutte contre les ténèbres grandissantes, et nous les révérerons pour leur bravoure face à la persécution."
 tenet_right_of_the_hall_name: "Droit de la Halle"
 tenet_right_of_the_hall_desc: "Ceux qui franchissent le seuil de la halle, qu'ils soient amis ou ennemis, se voient accorder l'honneur d'entrer dans la même paix avec laquelle ils se sont approchés."
 
 tenet_adunaic_birthright_name: "Droit d'aînesse des Adûnâi"
 tenet_adunaic_birthright_desc: "Les [adunai|E], héritiers de la plus grande nation que ce monde ait jamais connue, sont nés avec un glorieux destin. Toute la [middleearth|E] est notre héritage, pour en faire ce que bon nous semble, et sous notre règne elle prospérera. Que tous connaissent et reconnaissent cette vérité."
 tenet_adunaic_mandate_name: "Mandat des Adûnâi"
 tenet_adunaic_mandate_desc: "Les [adunai|E] se tiennent par nature au-dessus de tous les [men|E] de la [middleearth|E], investis d'un mandat d'ordonner le monde pour le bien de tous. Pourtant, cette position élevée s'accompagne de responsabilités : régner avec équité, même si avec fermeté ; guider et élever ceux qui nous sont inférieurs ; faire preuve de grâce, de retenue et de patience."
 doctrine_parameter_adunaic_propaganda_active_desc: "Les fidèles peuvent améliorer leurs [skills|El] et manipuler l'histoire en #high Parrainant la Propagande Adûnaïque#!"
 doctrine_parameter_conversion_buff_adunai_religion: "Vitesse de conversion dans les [counties|El] suivant déjà la [religion|E] [GetReligionByKey('adunai_religion').GetName] : #P +30%#!"
 doctrine_parameter_conversion_nerf_outside_numenorean_group: "Vitesse de conversion dans les [counties|El] hors du [heritage_group|E] #V [numenorean|E]#! : #N -50%#!"
 doctrine_parameter_unlock_taxnonbelievers_contract: "Débloque le [vassal_contract|E] et le [tax_decree|E] Taxer les Non-croyants"
 COURT_CHAPLAIN_CONVERSION_ADUNAIC_BIRTHRIGHT_PENALTY_MODIFIER: "[councillor.GetFaith.GetName] — [GetFaithDoctrine('tenet_adunaic_birthright').GetBaseName]"
 COURT_CHAPLAIN_CONVERSION_ADUNAIC_MANDATE_PENALTY_MODIFIER: "[councillor.GetFaith.GetName] — [GetFaithDoctrine('tenet_adunaic_mandate').GetBaseName]"
 COURT_CHAPLAIN_CONVERSION_ADUNAIC_BIRTHRIGHT_BONUS_MODIFIER: "[councillor.GetFaith.GetName] — [GetFaithDoctrine('tenet_adunaic_birthright').GetBaseName]"
 COURT_CHAPLAIN_CONVERSION_ADUNAIC_MANDATE_BONUS_MODIFIER: "[councillor.GetFaith.GetName] — [GetFaithDoctrine('tenet_adunaic_mandate').GetBaseName]"

 tenet_dune_covens_name: "Covens de Sorcières" #juke note: set up to be used as a generic witch coven tenet
 tenet_dune_covens_desc: "Le monde fonctionne de manières mystérieuses, abritant bien des secrets et d'étranges pouvoirs. Il est naturel de chercher ces pouvoirs, d'apprendre de l'ombre et de s'y délecter."
 doctrine_parameter_summon_witch_active: "Octroie une [decision|El] pour recruter une [GetTrait('witch').GetName( GetNullCharacter )] à votre cour."
 tenet_pathtreaders_name: "Le Grand Chemin"
 tenet_pathtreaders_desc: "Tout comme le Soleil suit sa course à travers le firmament, nous devons suivre la nôtre. Voyager, c'est faire l'expérience du monde dans toute sa splendeur, et c'est donc aussi une forme de vénération."
 doctrine_parameter_lotr_traveler_rewards: "Le trait [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )] confère des bonus supplémentaires"
 tenet_corsairs_name: "Fils du Rivage" #placeholder
 tenet_corsairs_desc: "Sur les côtes du [belegaer_sea|E], beaucoup sont contraints de se tourner vers la piraterie pour subsister. La vie de corsaire est rude sur les hautes mers. Mais pour ceux qui savent frapper promptement et se replier dans les ombres, de grandes opportunités les attendent."
 doctrine_parameter_faith_can_raid_overseas: "Débloque la capacité de [raid|El] outre-mer, si vous pouvez déjà [raid|El]"
 doctrine_parameter_lotr_extra_raid_loot: "Gagnez 20% de votre butin en [piety|El] lors des [raiding|El]"
 doctrine_parameter_lotr_harder_to_convert: "Il est plus difficile d'exiger la [demand_conversion|E] des fidèles"
 
 tenet_tamska_main_name: "Ânji Tamskul" # The Tamska System
 tenet_tamska_main_desc: "Les [tamska|E], ou Grandes Reines, sont les souveraines légitimes de notre peuple, investies par l'autorité divine. Dotées d'essence divine, elles guideront toujours notre peuple sur le chemin du salut, car elles sont les incarnations des dieux eux-mêmes. Par des rituels et des cérémonies, les Tamski rendent hommage à la Tamska, recherchant sa guidance et ses bénédictions dans tous les aspects de la vie. Notre foi est profondément tissée dans la trame de notre société, façonnant nos coutumes, nos traditions et notre identité collective en tant que peuple uni sous l'autorité divine des Grandes Reines."
 doctrine_parameter_lotr_tamska_hof: "Le [temporal_head_of_faith|E] utilise la [succession_law|E] spéciale [GetLaw('tamska_elective_succession_law').GetName]."
 lotr_faith_conversion_cost_conversion_blocked_tamska_hof: "Vous êtes la [tamska|E] et la [faith|El] choisie ne possède pas la [core_tenet|El] [GetFaithDoctrine('tenet_tamska_main').GetBaseName]"
 lotr_faith_creation_blocked_tamska_hof: "Vous êtes la [tamska|E] et la nouvelle [faith|El] ne possède pas la [core_tenet|El] [GetFaithDoctrine('tenet_tamska_main').GetBaseName]"
 doctrine_parameter_lotr_hold_court_piety_reward: "Tenir Cour octroie une récompense supplémentaire en [piety|El]"
 hold_court_gain_piety_tooltip: "Vous gagnerez de la [piety|El]"

 tenet_sirayn_syncretism_name: "Panthéon Tayee"
 tenet_sirayn_syncretism_desc: "Aucun des dieux de la vallée de Sîresha n'est plus valide qu'un autre. Bien que chaque personne puisse choisir de se vouer à une divinité particulière, nous partageons tous fondamentalement la même [faith|El]."
 doctrine_parameter_hostility_override_tenet_sirayn_syncretism: "Toutes les [faiths|E] possédant la [core_tenet|El] [GetFaithDoctrine('tenet_sirayn_syncretism').GetBaseName] sont considérées comme $hostility_astray_tooltippable$."
 doctrine_parameter_unlock_tayee_shrine_decision: "Débloque la [decision|El] #V $decision_sponsor_tayee_holy_building$#!"

 tenet_vidavan_name: "Vidavan"
 tenet_vidavan_desc: "Le [vidavan|E] est un ensemble de réformes instituées par Dahnâ l'Illuminateur après la chute de la troisième dynastie de [khy|E], dite la Sombre, qui interdisent strictement le culte ou la vénération des Zatozdâ ou Angrimâyn sous quelque forme que ce soit.\n\nEn outre, la loi réforma le culte autocéphale du reste du panthéon khyan, formant la [congregation_for_the_divine_ranks|e] pour réguler le culte sous l'autorité finale du clergé d'Arien. Cette organisation était composée des grands-prêtres des diverses divinités khyans traditionnelles au sein de l'Empire de Khy, et exigeait également qu'ils soient ordonnés membres du clergé d'Arien (ou qu'ils bénéficient d'une dispense spéciale de leur part), afin d'empêcher le culte de Zatozdâ de prospérer dans leurs rangs.\n\nLes sacrifices d'animaux traditionnels furent également lourdement réglementés et réduits, et l'accent fut plutôt mis sur l'engagement personnel et la prière. Bien qu'elles n'aient pas entièrement réussi à freiner l'autonomie des cultes traditionnels, les réformes façonnèrent considérablement la religion dans les années à venir, renforçant le rôle du clergé et militarisant ses fidèles."
 doctrine_parameter_easier_to_convert_faith_in_same_religion: "Il est plus facile de convertir les [faith|El] dans les [counties|El] de la même [religion|E]"
 lotr_vidavan_faith_conversion_desc: "Votre [faith|El] possède la [core_tenet|El] [GetFaithDoctrine('tenet_vidavan').GetBaseName]"

 tenet_spread_the_light_name: "Répandre la Lumière"
 tenet_spread_the_light_desc: "Il est bel et bon de se maîtriser soi-même — de vivre droit et moralement, de mépriser la corruption et de dominer ses pulsions. Mais si cela ne s'accompagne d'une volonté de défier les ténèbres et le mal dans le monde au-delà, alors c'est en fin de compte creux.\n\nEn chaque personne brûle la vraie lumière, attendant d'être attisée en un phare pour que le monde la voie. Allez de l'avant, et répandez la lumière — et ne craignez point les ténèbres."
 doctrine_parameter_can_evangelize: "Peut prendre la [decision|El] [GetDecisionWithKey('evangelize_the_slavs_decision').GetName]"

 tenet_mumakani_berserkers_name: "Rage Divine"
 tenet_mumakani_berserkers_desc: "À travers les [ROOT.Faith.GetAdherentNamePluralNoTooltip], [ROOT.Faith.WarGodName|U] dirige [ROOT.Faith.WarGodHerHis|U] rage divine et abat [ROOT.Faith.WarGodHerHis|U] courroux sur [ROOT.Faith.WarGodHerHis|U] ennemis."
 doctrine_parameter_allows_berserkers: "Les personnages peuvent acquérir le [trait|E] [GetTrait('berserker').GetName( GetNullCharacter )]" 

 tenet_jungle_trials_name: "Épreuves de la Jungle"
 tenet_jungle_trials_desc: "La jungle elle-même est le juge ultime de la valeur, et ceux qui survivent à ses épreuves sont bénis par-delà les autres hommes."
 doctrine_parameter_jungle_trait_bonuses:0 "Certains [commander_traits|E] et [personality_traits|E] confèrent des bonus supplémentaires en Jungle"
 doctrine_parameter_lotr_jungle_trait_bonuses: "Les [traits|E] [GetTrait('lifestyle_hunter').GetName( GetNullCharacter )], [GetTrait('lifestyle_herbalist').GetName( GetNullCharacter )], [GetTrait('calm').GetName( GetNullCharacter )], [GetTrait('patient').GetName( GetNullCharacter )], [GetTrait('jungle_stalker').GetName( GetNullCharacter )] et [GetTrait('lifestyle_traveler').GetName( GetNullCharacter )] confèrent de d'[learning|El] supplémentaire."
 doctrine_parameter_wasteland_pilgrimage_allowed: "Les fidèles peuvent effectuer un [pilgrimage|El] vers les [holy_sites|E] en [wilderness|El]"

 tenet_hathorim_isolation_name: "Bouclier d'Hathor"
 tenet_hathorim_isolation_desc: "Notre dieu nous a sauvés des maux de la mer et nous a conduits en notre terre sainte. Nous n'avons plus à nous soucier des affaires au-delà, sauf si elles cherchent à souiller notre foyer."
 doctrine_parameter_no_sailing: "Les personnages de cette [faith|El] n'ont pas accès au contenu lié à la mer, et le [trait|E] [GetTrait('lifestyle_mariner').GetName( GetNullCharacter )] subit des #N malus#!."

 tenet_holy_hunts_name: "Chasses Sacrées"
 tenet_holy_hunts_desc: "Par la chasse, nous nous rapprochons au plus près de [ROOT.Faith.HighGodName], foulant [ROOT.Faith.HighGodHerHis|U] terre, apprenant de [ROOT.Faith.HighGodHerHis|U] créatures et partageant [ROOT.Faith.HighGodHerHis|U] largesse."
 doctrine_parameter_chance_to_gain_prowess_during_all_hunts: "Occire une bête lors d'une [GetActivityType('activity_hunt').GetName] peut conférer de la [prowess_i][prowess|e] et de la [martial_i][martial|El]"
 doctrine_parameter_more_frequent_hunts_faith: "$culture_parameter_more_frequent_hunts$"

 tenet_communal_celebrations_name: "Célébrations Communautaires"
 tenet_communal_celebrations_desc: "La bonne chère, le vin et les belles choses se partagent au mieux entre amis. La réputation de l'hôte dépend de la qualité de sa table et de la magnificence de ses présents."

 # Forces of Evil Tenets
 tenet_dark_tower_subjugation_name: "Assujettissement sous la Tour Sombre"
 tenet_dark_tower_subjugation_desc: "La Tour Sombre exige un lourd tribut de tous ceux qui vivent au sein de l'[empire|E] [sauronthedarklordcharacter|E] — tous doivent payer leur juste dû pour l'accomplissement des desseins du Grand Œil !"
 
 tenet_orcish_infighting_name: "Querelles Intestines Orques"
 tenet_orcish_infighting_desc: "La société [orcish|E] est chose vile et brutale. Les forts s'élèvent au sommet, mais même alors, ils ne peuvent dormir en paix, car leurs subordonnés guettent sans cesse une occasion de les supplanter. Les [orcs|E] pillent, ravagent et détruisent, incapables de rien créer par eux-mêmes, leurs pires ennemis étant eux-mêmes."
 tenet_melkor_worship_name: "Culte de Melkor"
 tenet_melkor_worship_desc: "Gloire à [melkorcharacter|E], seigneur légitime de toute la création ! Offrons-lui des sacrifices en son nom, afin qu'il nous récompense d'une vie sans fin dans les cercles du monde."
 tenet_encroaching_shadow_name: "L'Ombre Rampante"
 tenet_encroaching_shadow_desc: "Les ombres consument tout avec le temps... royaumes, souvenirs, joie. Leur assaut est inlassable et silencieux, usant lentement leurs ennemis comme l'eau ronge la pierre. Et parfois elles plongent leurs ennemis dans les ténèbres d'un seul coup, éteignant toute lumière et tout espoir."
 tenet_dark_worship_syncretism_name: "Le Culte des Ténèbres"
 tenet_dark_worship_syncretism_desc: "Le Culte des Ténèbres, ou « Moriaistale » en quenya, « Dungortist » en sindarin et « Boshfai » en melkian, fut la vénération perpétuée à travers les âges, par les [men|E], les [orcs|E] et des êtres plus sombres encore, sous diverses formes de sagas chamaniques, de cultes et de sanctuaires, d'un Seigneur Sombre en tant qu'être divin suprême. Ledit Seigneur Sombre était considéré comme la plus haute forme d'autorité, souvent de manière hautement tyrannique."
 tenet_dragon_boshfai_name: "Boshfai du Dragon"
 tenet_dragon_boshfai_desc: "Le Boshfai du Dragon, ou « révérence », est une pratique répandue parmi certaines tribus [orcish|E]. Ces Orques vivent généralement aux abords de l'antre d'un puissant [dragon|El], le défendent et lui paient tribut ; en retour, ils bénéficient de la protection de son ombre, car qui serait assez fou pour attaquer des terres où demeure un puissant dragon ?"

 tenet_deep_worship_name: "Terreur Sans Nom"
 tenet_deep_worship_desc: "Loin, très loin sous les creusées les plus profondes des Nains, le monde est rongé par des choses sans nom. Demeurer dans les ténèbres profondes, c'est connaître intimement cette terreur, et l'embrasser tout entière."

 tenet_desperate_wards_name: "Protections Désespérées"
 tenet_desperate_wards_marketcher_name: "Marques Gravées"
 tenet_desperate_wards_desc: "En tout temps, des forces maléfiques assaillent notre peuple, cherchant à le corrompre et l'asservir. Seule la gravure minutieuse de protections peut garder les fidèles à l'abri des terreurs qui rôdent au-delà de nos murs."
 
 tenet_dark_trophies_ulukai_name: "Révérence de l'Ulûkai"
 tenet_dark_trophies_name: "Trophées Sombres"
 tenet_dark_trophies_ulukai_desc: "L'Ulûkai appelle les ténèbres vers les ténèbres, et la force vers la force. Seuls ceux qui prouvent leur puissance aux yeux de tous sont dignes de la bénédiction du joyau sombre."
 tenet_dark_trophies_desc: "La force croît à chaque victoire. Il est juste que nous exposions les trophées de ces victoires légendaires."
 
 tenet_orc_raiding_name: "Nampat"
 tenet_orc_raiding_desc: "Vivre, c'est piller. Mourir est chose naturelle. Prends tant que la prise est bonne, et fais de ta mort une légende."

 tenet_offbrand_tulkas_name: "Conflit Sacro-Saint" # Not too happy with the name but we can change it idk
 tenet_offbrand_tulkas_desc: "La survie est une lutte continuelle contre la nature, les ennemis et le monde lui-même. Mais cette vérité primordiale n'est pas une tragédie dont il faut s'affliger, mais bien une part fondamentale et chérie de l'existence — par un effort acharné, quiconque peut surmonter l'adversité et triompher.\n\nDans la pratique, défis et joutes amicales sont chose commune dans cette foi, bien qu'ils puissent parfois devenir âpres et féroces. Le thème récurrent d'un « Dieu des Luttes » semble fortement inspiré de celui du [valagod|E] [tulkascharactershort|E]."
 # Other LOTR Tenets
 tenet_gold_veneration_name: "Vénération de l'Or"
 tenet_gold_veneration_desc: "Les fidèles de cette foi tiennent que l'or est, en lui-même, d'origine divine, digne de vénération et de convoitise. Ils amassent et gardent jalousement leur or, ne permettant qu'à ceux de même tempérament de poser le regard sur leurs grands trésors, dans lesquels ils croient que demeurent des éclats du divin."
 doctrine_parameter_piety_loss_from_gifts_active: "Les fidèles perdent de la [piety|El] en envoyant des [gifts|E] et en cédant des [artifacts|El]"
 
 NEED_MORE_HOLY_SITES: "Vous devez détenir directement au moins 3 [holy_sites|E]."
 # tenet_sagas_of_the_northmen_name: "Sagas of the Northmen"
 # tenet_sagas_of_the_northmen_desc: "Though the tellings change as the seasons and the land, we can still recognize the myths of our ancestors in those of our distant kin. Regardless of the names within them, or the differences of the details, we can see that the spirit within embody the same messages and truths."