 faith_dunlending_turthalis_old_adherent: "Ancien Fidèle de Tûrthalis"
 faith_dunlending_turthalis_old_adherent_plural: "Anciens Fidèles de Tûrthalis"
 faith_dunlending_turthalis_desc: "Les Fidèles de Tûrthalis vénèrent l'antique esprit Tûrthalis des brumes, protecteur des clans. Lorsque la lune trône fièrement dans le ciel, que le brouillard est à son plus épais et que les collines se taisent, il peut venir apporter conseil, résolution et détermination. Ils forment le groupe le plus nombreux parmi les [dunlendings|E] et sont réputés pour leur fervente vénération des ancêtres, mais aussi pour leur hospitalité.\n\nQuiconque insulte les ancêtres, offense les esprits ou fait du mal à un hôte sous leur toit, le courroux de Tûrthalis le retrouvera pour lui rendre justice."
 
 faith_dunlending_khrabnazerh: "Khrabnazerh"
 faith_dunlending_khrabnazerh_adj: "Khrabnazerh"
 faith_dunlending_khrabnazerh_adherent: "Fidèle de Khrabnazerh"
 faith_dunlending_khrabnazerh_adherent_plural: "Fidèles de Khrabnazerh"
 faith_dunlending_khrabnazerh_old: "Ancien Khrabnazerh"
 faith_dunlending_khrabnazerh_old_adj: "Ancien Khrabnazerh"
 faith_dunlending_khrabnazerh_old_adherent: "Ancien Fidèle de Khrabnazerh"
 faith_dunlending_khrabnazerh_old_adherent_plural: "Anciens Fidèles de Khrabnazerh"
 faith_dunlending_khrabnazerh_desc: "Les Fidèles de Khrabnazerh vénèrent l'esprit Khrabnazerh des orages de montagne, qui apparaît sous la forme d'un Crebain à l'œil crevé ou à une seule patte aux heures fatidiques ou dans les rêves. Lorsque les cieux sont noirs comme la nuit, que les pluies sont denses comme le bois et que les tonnerres rugissent comme des cris, il peut venir apporter la guerre, la mort et parfois des présents.\n\nSes adorateurs sont prompts à la colère et réputés pour entretenir de vieilles rancunes au fil des générations. Cela engendre maintes querelles entre les différents clans, et les escarmouches mineures sont monnaie courante.\n\nHors du Pays de Dun, on les connaît surtout comme de féroces mercenaires et pillards." #and for their smell
 
 faith_dunlending_luta_ies: "Luta-Ies"
 faith_dunlending_luta_ies_adj: "Luta-Ies"
 faith_dunlending_luta_ies_adherent: "Fidèle de Luta-Ies"
 faith_dunlending_luta_ies_adherent_plural: "Fidèles de Luta-Ies"
 faith_dunlending_luta_ies_old: "Ancien Luta-Ies"
 faith_dunlending_luta_ies_old_adj: "Ancien Luta-Ies"
 faith_dunlending_luta_ies_old_adherent: "Ancien Fidèle de Luta-Ies"
 faith_dunlending_luta_ies_old_adherent_plural: "Anciens Fidèles de Luta-Ies"
 faith_dunlending_luta_ies_desc: "Les Fidèles de Luta-Ies vénèrent l'horrible Luta-Ies, un esprit ténébreux qui demeure dans les profondeurs du Loch Thiar, leur lac sacré. Ils forment de loin le groupe le plus restreint et le plus reclus des [dunlendings|E]. On les connaît surtout pour leurs grandes cérémonies sacrificielles, durant lesquelles ils laissent leurs offrandes dériver vers le milieu du lac. Ils croient que s'ils cessent leurs sacrifices, le Luta-Ies les dévorera tous.\n\nLa rumeur veut qu'ils éprouvent une terreur mortelle de l'Océan — selon la légende, un roi tenta jadis de contraindre un prêtre de Luta-Ies à monter sur un navire marchand, mais en embarquant, il découvrit que celui-ci s'était tranché la gorge."

 faith_dunlending_white_hand: "Mysticisme de la Main Blanche"
 faith_dunlending_white_hand_adj: "Main Blanche"
 faith_dunlending_white_hand_adherent: "Fidèle de la Main Blanche"
 faith_dunlending_white_hand_adherent_plural: "Fidèles de la Main Blanche"
 faith_dunlending_white_hand_old: "Ancien Mysticisme de la Main Blanche"
 faith_dunlending_white_hand_old_adj: "Ancienne Main Blanche"
 faith_dunlending_white_hand_old_adherent: "Ancien Fidèle de la Main Blanche"
 faith_dunlending_white_hand_old_adherent_plural: "Anciens Fidèles de la Main Blanche"
 faith_dunlending_white_hand_desc: "Bien que son règne fût bref, le Magicien Blanc laissa une empreinte profonde sur les [dunlendings|E]. Son culte s'effondra peu après sa disparition, mais bientôt maints mythes et légendes entourant ses exploits naquirent parmi les Dunlandais qu'il avait laissés derrière lui. Sa figure se scinda globalement en celle du Sage Blanc, un grand mystique qui enseigna aux Dunlandais la voie de la Main Blanche, un puissant esprit qui unit les Dunlandais pour un temps. Le culte de la Main Blanche perdura même après la chute de la Tour Noire, bien qu'il soit désormais révéré aux côtés d'esprits dunlandais plus traditionnels tels que Tûrthalis."
 
 faith_gwathuirim_dynion: "Récits des Faeraign"
 faith_gwathuirim_dynion_adj: "Faeraign"
 faith_gwathuirim_dynion_adherent: "Fidèle des Faeraign"
 faith_gwathuirim_dynion_adherent_plural: "Fidèles des Faeraign"
 faith_gwathuirim_dynion_old: "Anciens Récits des Faeraign"
 faith_gwathuirim_dynion_old_adj: "Ancien Faeraign"
 faith_gwathuirim_dynion_old_adherent: "Ancien Fidèle des Faeraign"
 faith_gwathuirim_dynion_old_adherent_plural: "Anciens Fidèles des Faeraign"
 faith_gwathuirim_dynion_desc: "Les croyances de l'Enedhwaith sont souvent simples, liées aux esprits de la terre qui les entoure. Particulièrement importants près des régions côtières et des rivières, les Faeraign (Esprits-des-Eaux) revêtent une grande importance pour ceux qui vivent à proximité. On croit que leur faveur (ou défaveur) peut faire la différence entre ruine et prospérité, festin ou famine. Divers rites et rituels servent à communiquer avec ces esprits et à les apaiser.\n\nLes esprits du Gwathló, de l'Isen et de la Grande Mer sont les plus importants des Faeraign. Bien qu'ils soient connus sous de nombreux noms différents, leur culte se retrouve à travers tout l'Enedhwaith."

 faith_saralain: "Mòrdhamoraire"
 faith_saralain_adj: "Mòrdhamoraire"
 faith_saralain_adherent: "Mòrdhamorarien"
 faith_saralain_adherent_plural: "Mòrdhamorariens"
 faith_saralain_old: "Ancien Mòrdhamoraire"
 faith_saralain_old_adj: "Ancien Mòrdhamoraire"
 faith_saralain_old_adherent: "Ancien Mòrdhamorarien"
 faith_saralain_old_adherent_plural: "Anciens Mòrdhamorariens"
 faith_saralain_desc: "Durant leurs siècles d'allégeance aux Dúnedain d'Arnor, il était inévitable que les hommes de Saralain adoptent des éléments de la culture et des croyances de leurs suzerains. C'est ainsi que naquit la vénération des Mòrdhamoraire, ou Grands Seigneurs.\n\nLe culte des Mòrdhamoraire fusionne essentiellement la connaissance qu'ont les Dúnedain des Valar avec les anciennes croyances populaires des Daen ancestraux, en mettant l'accent sur l'importance de la vertu et de la vaillance, même face au désespoir. Il en résulte une croyance en un ensemble de puissants esprits souverains, mais si l'on prête l'oreille aux contes et légendes, bien des histoires plus... savoureuses et intrigantes leur sont attribuées, que l'on ne trouve ni dans les sources dúnedaines ni dans les sources elfiques."

 faith_daen_gaoth: "Ascension de Gaoth"
 faith_daen_gaoth_adj: "Gaothdûn"
 faith_daen_gaoth_adherent: "Fidèle Gaothdûn"
 faith_daen_gaoth_adherent_plural: "Fidèles Gaothdûn"
 faith_daen_gaoth_old: "Ancienne Ascension de Gaoth"
 faith_daen_gaoth_old_adj: "Ancien Gaothdûn"
 faith_daen_gaoth_old_adherent: "Ancien Fidèle Gaothdûn"
 faith_daen_gaoth_old_adherent_plural: "Anciens Fidèles Gaothdûn"
 faith_daen_gaoth_desc: "Là-haut, dans les montagnes et les collines de l'Andrast, les Andrastim ont évolué quelque peu différemment des autres peuples [daen|E]. Eux aussi vénèrent les esprits de la nature qui les entourent, mais les leurs se trouvent sur les plus hauts sommets des [whitemountains|E]. C'est là qu'ils gravissent pour s'accorder au vent, au sel et au ciel, et c'est là qu'ils portent leurs morts pour qu'ils soient consumés par les éléments. Une fois leurs os nettoyés, ils sont transportés dans leurs tombeaux au pied des montagnes."

 faith_daen_coentis: "Panthéon de Gobha"
 faith_daen_coentis_adj: "Gobhachdûn"
 faith_daen_coentis_adherent: "Fidèle Gobhachdûn"
 faith_daen_coentis_adherent_plural: "Fidèles Gobhachdûn"
 faith_daen_coentis_old: "Ancien Panthéon de Gobha"
 faith_daen_coentis_old_adj: "Ancien Gobhachdûn"
 faith_daen_coentis_old_adherent: "Ancien Fidèle Gobhachdûn"
 faith_daen_coentis_old_adherent_plural: "Anciens Fidèles Gobhachdûn"
 faith_daen_coentis_desc: "Les peuples [daen|E] des [whitemountains|E] vénèrent traditionnellement un panthéon flou et fluctuant de dieux et d'esprits de la nature, mené par le Père-de-la-Montagne, un géant nommé Gobha. Il y a fort longtemps, ils bâtirent de grands tombeaux pour abriter les os de leurs ancêtres, mais ce culte funéraire est tombé en grande défaveur par crainte des spectres ténébreux hantant les anciens tertres. À sa place, la vénération des esprits de la nature en est venue à dominer de nouveau leur théologie, car ils demeurent dans chaque rivière, montagne et colline."
 
 faith_daen_sauron: "Culte de Marec"
 faith_daen_sauron_adj: "Marecdûn"
 faith_daen_sauron_adherent: "Fidèle Marecdûn"
 faith_daen_sauron_adherent_plural: "Fidèles Marecdûn"
 faith_daen_sauron_old: "Ancien Culte de Marec"
 faith_daen_sauron_old_adj: "Ancien Marecdûn"
 faith_daen_sauron_old_adherent: "Ancien Fidèle Marecdûn"
 faith_daen_sauron_old_adherent_plural: "Anciens Fidèles Marecdûn"
 faith_daen_sauron_desc: "À la fin du [secondage|E], un prophète se leva parmi les [daen|E] des [whitemountains|E]. Il leur parla de Marec, le roi de tous les [men|E], qui les protégerait de la cruauté des [sea_peoples|E]. Marec supplanta bientôt leurs divinités et esprits traditionnels, et ses guerriers s'entraînent pour le jour de son avènement, où il viendrait repousser les Peuples de la Mer d'où ils étaient venus.\n\nParallèlement à ces traditions martiales, un culte funéraire complexe se développa. Les ancêtres sont révérés dans de grands tombeaux creusés profondément dans les Montagnes Blanches."
 
 faith_donan: "Kôbah-Kaz"
 faith_donan_adj: "Kôbah-Kazi"
 faith_donan_adherent: "Kôbah-Kaza"
 faith_donan_adherent_plural: "Kôbah-Kazi"
 faith_donan_old: "Ancien Kôbah-Kaz"
 faith_donan_old_adj: "Ancien Kôbah-Kaz"
 faith_donan_old_adherent: "Ancien Kôbah-Kaza"
 faith_donan_old_adherent_plural: "Anciens Kôbah-Kazi"
 faith_donan_desc: "Repoussés dans des refuges reculés, les gens de Donan sont une race endurcie. Leur foi est demeurée largement inchangée au fil des années qui passent, obstinée et réticente à évoluer malgré toutes les pressions exercées contre eux. Dans la croyance Donan, deux Grands Bels (esprits) tiennent la primauté — Kôbah et Kaz — aux côtés d'autres esprits moindres.\n\nKôbah, connu comme l'Ancien Dieu de la Montagne, est l'aîné, seigneur de la terre et maître des hommes dans les arts de l'artisanat. Kaz est le seigneur du ciel ouvert, et ce furent ses vents qui murmurèrent les premiers mots aux oreilles de l'humanité, et ainsi naquit la parole. Encore aujourd'hui, on croit que naissent des enfants qui possèdent un lien ténu avec ces anciens et puissants esprits. Ces bénis nés-de-l'esprit sont capables d'entendre l'antique enseignement de Kôbah gronder à travers la terre, et d'implorer les vents de parler au bienveillant Kaz au nom de leur peuple."
 
 faith_nurn_good: "Les Dons d'Ivann"
 faith_nurn_good_adj: "Ivannique"
 faith_nurn_good_adherent: "Ivannien"
 faith_nurn_good_adherent_plural: "Ivanniens"
 faith_nurn_good_old: "Les Anciens Dons d'Ivann"
 faith_nurn_good_old_adj: "Ancien Ivannique"
 faith_nurn_good_old_adherent: "Ancien Ivannien"
 faith_nurn_good_old_adherent_plural: "Anciens Ivanniens"
 faith_nurn_good_desc: "Longtemps les caprices cruels de [shakhburz|E] ont dicté la vie de la classe servile, principalement [daen|E], de [nurn|E], et longtemps ils ont souffert les conséquences de sa colère, mais plus jamais ! Désormais, les hommes libres du Núrn n'auront plus à subir le fouet de ses surveillants, car ils ont été délivrés des chaînes de l'esclavage et sont maintenant libres de vénérer qui ils souhaitent.\n\nLes Dons d'[ivanncharacter|E] forment une foi assez idyllique, instillant des valeurs communautaires profondes et une révérence pour la nature et sa grande beauté, que la déesse Ivann aurait conçue comme un présent pour ses enfants accablés."