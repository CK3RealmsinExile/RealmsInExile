 talataerim_religion: "Talathrim"
 talataerim_religion_adj: "Talathrim"
 talataerim_religion_desc: "Les peuples des plaines balayées par les vents du centre de la [middleearth|E], les Talathrim, vénèrent une grande diversité de panthéons locaux et d'esprits."
 talataerim_religion_adherent: "Talahriste"
 talataerim_religion_adherent_plural: "Talathrim"

### Rhun ###
 faith_rhun_pantheistic: "Panthéon de Rhûn"
 faith_rhun_pantheistic_adj: "Rhûnnique"
 faith_rhun_pantheistic_adherent: "Rhûnnique"
 faith_rhun_pantheistic_adherent_plural: "Rhûnniques"
 faith_rhun_pantheistic_desc: "L'antique foi de [rhun|E] s'enracine dans un vaste panthéon de dieux et d'esprits absorbés des vagues successives de peuples ayant migré dans la région. De ce fait, les croyances varient souvent selon les contrées, certains esprits étant privilégiés par rapport à d'autres en des lieux particuliers.\n\nAu cœur de cette foi se trouve un panthéon divin central, avec deux dieux progéniteurs primordiaux : Kôr-Sharhaigûn, dieu des Ténèbres, et Hûr-Iriga, dieu de la Lumière. Ils sont co-éternels, venus à l'existence d'un même instant. Mais Kôr-Sharhaigûn désirait l'immobilité et le sommeil éternel, tandis que Hûr-Iriga désirait emplir le cosmos de chant et de lumière, d'émotion et de changement. Leurs visions s'affrontèrent au sein du vide primordial, et de leur affrontement naquirent les autres dieux, et le monde lui-même, forgé de leur puissance mêlée. Les deux sombrèrent dans un profond sommeil, leurs forces presque épuisées jusqu'au Dernier Jour, quand tous les êtres vivants devront choisir quelle vision suivre — à moins qu'une troisième voie ne puisse être trouvée...\n\nEn leur absence, le monde fut laissé à leurs enfants, parmi lesquels sont comptés les Dieux, les Esprits et les Mortels. En toutes choses désormais, lumière et ombre sont entremêlées, en plus ou moins grande mesure, et nul ne peut exister sans l'autre. Ceux qui nient cela se renient eux-mêmes."
 
 faith_rhun_araw_triumvirate: "Triumvirat d'Araw"
 faith_rhun_araw_triumvirate_adj: "Arawnique"
 faith_rhun_araw_triumvirate_adherent: "Arawnien"
 faith_rhun_araw_triumvirate_adherent_plural: "Arawniens"
 faith_rhun_araw_triumvirate_desc: "Trinité divine longtemps vénérée parmi les cultures des plaines du centre de la [middleearth|E] : Araw et ses fils, Pael et Vadan.\n\nAraw est le chasseur suprême, celui qui enseigna aux Hommes ses méthodes et répandit ses Aurochs à travers le monde, que les hommes chassent pour en tirer prospérité. Ses fils sont chacun maîtres de leur propre voie de la chasse — Pael est un archer sans pareil, tandis que Vadan est un cavalier digne de rivaliser avec son auguste père."

 faith_phaon_afod: "Patrimoine de Phaon-Afod"
 faith_phaon_afod_adj: "Phaon-Afod"
 faith_phaon_afod_adherent: "Phaonite"
 faith_phaon_afod_adherent_plural: "Phaonites"
 faith_phaon_afod_old: "Ancien Phaon-Afod"
 faith_phaon_afod_old_adj: "Ancien Phaon-Afod"
 faith_phaon_afod_old_adherent: "Ancien Phaonite"
 faith_phaon_afod_old_adherent_plural: "Anciens Phaonites"
 faith_phaon_afod_desc: "Toutes les interactions entre Orientais et [northmen|E] n'ont pas abouti au sang versé et à la haine. Le commerce, la coexistence, voire l'amour se sont révélés possibles. Lorsque cela advient, une rencontre des esprits et des fois est presque inévitable. En particulier, les Orientais en vinrent à considérer l'ancien dieu [northmen|E] Afodfréa comme identique à leur propre dieu Phaon, Dieu du Soleil, de l'Été et de la Paternité. Phaon et Afodfréa incarnaient tous deux le guerrier et l'énergie masculine positive — la force de protéger, de guider et de mener. Le culte de Phaon-Afod devint un moyen d'unir les deux communautés, puisant rites et traditions dans chacune.\n\nHélas, tandis que l'influence de [sauroncharacter|E] croissait à nouveau, les Orientais et les Nordiques redevinrent d'amers ennemis, et avec cela, le culte de Phaon-Afod sombra dans l'oubli."

 faith_logath: "Culte des Dasimayai"
 faith_logath_adj: "Dasimayaïque"
 faith_logath_adherent: "Enfant des Dasimayai"
 faith_logath_adherent_plural: "Enfants des Dasimayai"
 faith_logath_old: "Ancien Culte des Dasimayai"
 faith_logath_old_adj: "Ancien Dasimayaïque"
 faith_logath_old_adherent: "Ancien Enfant des Dasimayai"
 faith_logath_old_adherent_plural: "Anciens Enfants des Dasimayai"
 faith_logath_desc: "Dasimayai signifie approximativement, pour les Logath, « les deux parents », et désigne les fondements de leur foi. Pour les Logath, il existe deux esprits primordiaux, bien que beaucoup d'autres existent. Ce sont Lilra, déesse-mère de l'Humanité et matriarche du divin, et son époux Mahlic. Ensemble, les deux façonnèrent le monde, la sagesse de Lilra offrant guidance et direction à l'énergie de Mahlic. Leurs labeurs achevés, ils choisirent de se reposer, laissant le monde à leurs innombrables enfants, dont l'humanité fait partie."

 faith_kerkassk: "Kerkasskisme"
 faith_kerkassk_adj: "Kerkassk"
 faith_kerkassk_adherent: "Kerkasskien"
 faith_kerkassk_adherent_plural: "Kerkasskiens"
 faith_kerkassk_desc: "Le Dieu-des-Plaines de [rhun|E], Kerkassk est le gardien des morts, le défenseur contre tous les esprits malfaisants, et la divinité suprême des Orientais de Rhûn. Pour les Orientais de Rhûn, les mondes physique et spirituel sont étroitement liés, les actions dans l'un affectant l'autre. Les fidèles de Kerkassk tiennent qu'il mène avec vigilance une guerre en leur nom dans le monde des esprits, s'efforçant d'empêcher la domination des ambitieuses Puissances de l'Ouest et de leurs suivants. Cependant, pour remporter cette victoire dans le monde spirituel, les fils de Rhûn doivent se tenir unis dans les guerres du monde physique, avec vaillance et la volonté de placer leur foi dans la force et la vision de Kerkassk. Cette vision se manifeste par ses prêtres et ses propres descentes occasionnelles dans le monde physique.\n\nBien qu'ils aient été occis il y a longtemps, Kerkassk est secondé par les [dragons|E] qui combattirent si férocement l'Ouest, refusant même dans la mort de courber la tête. Pour cette raison, les dragons sont élevés en symboles de défi et de puissance, inflexibles et inébranlables face à quiconque.\n\nNé dans les steppes rhûnniques vers les années 1400, le culte de Kerkassk émergea des profonds sentiments de ressentiment et de faiblesse des Igath et Ioriags de Rhûn après les campagnes décisives de Romendacil II."
 
### Khand ###
 faith_khandish_sauronic: "Tûmrakhi"
 faith_khandish_sauronic_adj: "Tûmrakhi"
 faith_khandish_sauronic_adherent: "Tûmrakhien"
 faith_khandish_sauronic_adherent_plural: "Tûmrakhiens"
 faith_khandish_sauronic_desc: "En la terre de [khand|E], il n'est qu'un seul vrai Dieu, au-dessus de tous les autres — Tûmrakhi. Oh, d'autres esprits peuvent exister, de plus ou moins grande puissance, mais ce ne sont pas de vrais dieux, pas dignes de sacrifice et d'honneur, de louange et de vénération — pas comme l'est Tûmrakhi.\n\nEt Tûmrakhi a choisi les hommes de Khand comme son peuple élu, ainsi le tiennent les Variags, auxquels ont été promises sa bénédiction et sa guidance divines. Ils répandront Son nom jusqu'aux confins ultimes de la terre.\n\nLongtemps subverti par Sauron, l'ancien panthéon de Khand a été presque entièrement effacé de l'histoire. À sa place, Sauron-Tûmrakhi règne en maître suprême sur la vie spirituelle des belliqueux Variags. Ceux qui sont parvenus à unifier les clans variags par le passé ont été reconnus comme Khûdriag-Ata, Rois-Dieux, choisis, exaltés et bénis d'une étincelle de Tûmrakhi lui-même."

### Tedjin ###
 faith_easterling_war: "Culte de Maladûm"
 faith_easterling_war_adj: "Maladûmite"
 faith_easterling_war_adherent: "Fidèle de Maladûm"
 faith_easterling_war_adherent_plural: "Fidèles de Maladûm"
 faith_easterling_war_old: "Ancien Culte de Maladûm"
 faith_easterling_war_old_adj: "Ancien Maladûmite"
 faith_easterling_war_old_adherent: "Ancien Fidèle de Maladûm"
 faith_easterling_war_old_adherent_plural: "Anciens Fidèles de Maladûm"
 faith_easterling_war_desc: "Maladûm, l'antique dieu de la guerre des Orientais, Ancêtre des [dragons|E], exalte la force et la vaillance conquise par d'honorables conquêtes. Le dieu de la guerre est dur mais juste en ses desseins ; tous ceux qui vivent et meurent par l'épée sont entre ses mains et sous son autorité. On dit que les guerriers dignes sont appelés en ses halles, mis à part des autres dieux, où ils peuvent s'entraîner, festoyer et se ceindre en vue du jour où viendra la Bataille Ultime. Ce jour-là, le droit de régner sera prouvé découler avant tout de la force.\n\nAutre foi indigène que [sauroncharacter|E] a manipulée à son propre usage, le culte de Maladûm se trouve le plus communément parmi les Tedjin et les Balcoth."

