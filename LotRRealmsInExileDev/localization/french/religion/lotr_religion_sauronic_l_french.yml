l_french:
 #########################
 ### Sauronic Religion ###
 #########################

 sauronic_religion: "Sauronique"
 sauronic_religion_adj: "Sauronique"
 sauronic_religion_desc: "Après que [morgothcharacter|E] fut précipité dans le [thevoid|E] à la fin de la [warofwrath|E], [sauroncharacter|E] demeura le plus puissant de ses lieutenants à avoir échappé à la justice des Valar. Il se présenta d'abord comme l'héritier de Morgoth, puis comme un dieu d'égale stature (voire supérieure) à Morgoth, ou même qu'il était Morgoth lui-même."
 sauronic_religion_adherent: "Sauronite"
 sauronic_religion_adherent_plural: "Sauronites"

 lidless_eye: "Culte de l'Œil sans Paupière"
 lidless_eye_adj: "de l'Œil sans Paupière"
 lidless_eye_adherent: "Serviteur de l'Œil sans Paupière"
 lidless_eye_adherent_plural: "Serviteurs de l'Œil sans Paupière"
 lidless_eye_desc: "Dissimulé dans Sa forteresse, le Seigneur du [mordor|E] voit tout. Son regard perce nuées, ombres, terre et chair. Un œil, sans paupière, ceint de flammes. Un Dieu sur la [middleearth|E] — tous Le révéreront : [sauroncharacter|E] le Grand, Seigneur de la Terre !\n\nReligion d'État officielle de l'empire de Sauron, le Culte de l'Œil sans Paupière porte bien des noms, mais toutes ses variantes gravitent autour de la soumission et de la reconnaissance de l'autorité divine de Sauron, le Seigneur de la Terre. Ses sacrements sont administrés par des prêtres-[sorcerer|E]s formés aux arts de Morgul, et le grand prêtre est l'Intendant de Barad-dûr, la [themouthofsauronshort|E]."
 lidless_eye_faith_head: "Seigneur Sombre"

 faith_nurniag: "Culte de l'Œil de Núrn"
 faith_nurniag_adj: "de l'Œil de Núrn"
 faith_nurniag_adherent: "Intendant"
 faith_nurniag_adherent_plural: "Intendants"
 faith_nurniag_desc: "Régnant sur le [nurn|E], les pratiquants Núrniag du Culte de l'Œil de Núrn comptent parmi les plus loyaux serviteurs humains du [lordofmordor|E]. Ils se repaissent des fruits de Ses conquêtes, qui leur procurent des esclaves pour travailler leurs vastes plantations. Quand Il ne fait point la guerre, les jeunes et aventureux pratiquants de cette sombre croyance partent en raids esclavagistes pour honorer leur Seigneur et s'assurer gloire et richesse pour eux-mêmes et leurs familles.\n\nPour ceux qui pratiquent cette foi, la fertilité des terres de Núrn est Son don envers eux — les cendres de Sa forge personnelle, l'[orodruin|E], se mêlant aux eaux qui se sont accumulées dans le bassin qu'Il a Lui-même creusé. Il est leur Roi et leur Dieu, et ils Lui offrent de somptueux tributs, assez pour nourrir Ses vastes armées, le tout extrait des cadavres ensanglantés de leurs légions d'esclaves."

 faith_nurn_slave: "Joug de Shakhbúrz"
 faith_nurn_slave_adj: "du Joug de Shakhbúrz"
 faith_nurn_slave_adherent: "Snaga"
 faith_nurn_slave_adherent_plural: "Snagas"
 faith_nurn_slave_desc: "Imposé de force à la classe servile principalement [daen|E] du [nurn|E], le « culte » de [shakhburz|E] — tel qu'on leur a appris à Le nommer — est celui d'un dieu de cruauté incarnée, punissant un peuple vil et pécheur pour les fautes de ses ancêtres. Pour leur manque de foi, pour leur rébellion et leurs querelles contre Lui, ils sont condamnés à peiner éternellement pour Sa gloire. C'est tout ce qui retient Sa main de leur destruction totale, tout ce qui les préserve de l'anéantissement complet pour leurs transgressions contre Sa « gloire ».\n\nMalgré cette oppression profonde et systématique, un espoir subsiste encore chez quelques élus : qu'un jour ils puissent être libérés du fardeau qu'ils portent."

 sons_of_sauron: "Shakhbúrzdâgi"
 sons_of_sauron_adj: "Shakhbúrzdâgi"
 sons_of_sauron_adherent: "Rejeton de Shakhbúrz"
 sons_of_sauron_adherent_plural: "Rejetons de Shakhbúrz"
 sons_of_sauron_desc: "#I'L'Âge des Hommes est révolu, le temps des Orques est venu !'#!\n\nLes [orcs|E] du [mordor|E], ayant connu la vie sous la puissance grande et terrible de [shakhburz|E], considèrent toutes les autres [conceptraces|E] avec haine, convoitant leurs terres et leurs richesses. Selon leur conception, le monde appartient de droit à la race orque, puisqu'ils sont les plus forts, les plus grands de ceux qui servent Shakhbúrz.\n\nLes pratiques des Shakhbúrzdâgi sont une forme plus grossière, plus primitive du culte d'État du Mordor, vers laquelle les orques autrement orthodoxes tendent à retourner sans une #italic guidance#! appropriée."
 
 red_eye_cult: "Naukdshu-Fai" 
 red_eye_cult_adj: "Naukdshu-Fai"
 red_eye_cult_adherent: "Sectateur Naukdshu-Fai"
 red_eye_cult_adherent_plural: "Sectateurs Naukdshu-Fai"
 red_eye_cult_desc: "Le regard du Grand Œil est la source de la sagesse, le creuset de l'entendement, le livre où sont cachés les secrets des magies profondes ! Les orques inférieurs se ratatinent et se brisent sous sa lumière ardente, mais nous la comprenons pour la gloire qu'elle est ! Nous sommes indignes de son regard — mais nous pouvons nous en montrer dignes. Nous devons travailler plus dur, créer des magies toujours plus grandes, forger des armes plus puissantes pour le grand dessein de l'Œil !\n\nLe Naukdshu-Fai (Culte de l'Œil Rouge) est un groupe [orcish|E] marginal obsédé par la [sorcery|E] et la « bénédiction » d'être transpercé par le regard du Grand Œil. Pour leurs divagations fanatiques, ils furent finalement chassés dans les collines par leurs congénères plus sains d'esprit (selon les critères orques). Fondé par un chaman orque particulièrement zélé qui avait acquis quelques bribes de textes de sorcellerie, ils désirent prouver leur valeur à [sauroncharacter|E], dans l'espoir qu'il les bénisse et reconnaisse leurs enseignements."

 faith_angmar_evil: "Culte du Roi de l'Hiver" # Alternatively, Murazîran
 #faith_angmar_evil_adj: "Cult of the Winter King" # Murazîran
 faith_angmar_evil_adj: "du Roi de l'Hiver"
 faith_angmar_evil_adherent: "Serviteur du Roi de l'Hiver" # Murazîran
 faith_angmar_evil_adherent_plural: "Serviteurs du Roi de l'Hiver" # Murazîrans
 faith_angmar_evil_desc: "Dans les terres de l'hiver, respect et hommage doivent être rendus à leur Roi par-dessus tout. Il commande au blizzard et aux bêtes sauvages, et ce n'est que par la supplication et l'obéissance qu'il peut être apaisé et la calamité évitée. Tous les autres dieux doivent s'incliner devant lui, car sa puissance est manifeste et éclatante.\n\nLe culte du [witchkingshort|E] d'[angmar|E] fut son instrument religieux pour assurer la docilité de son royaume. Ajout tardif au panthéon Angmarrim, le Roi de l'Hiver (également connu sous le nom de Murazîra) est le Dieu-Roi incarné du monde, qui commande aux éléments et aux forces naturelles. La glace et la tempête sont son domaine par excellence, et les autres dieux lui sont subordonnés. Sévère et exigeant, le seul moyen de prévenir son courroux est de le servir loyalement."