l_french:
 
 #Hobbits and Bree-folk shared faith
 hobbit_religion: "Periannath"
 hobbit_religion_desc: "Les [hobbits|E], les Briennais et tous les [men|E] de la région, bien qu'issus de cultures distinctes, partagent un mode de vie simple et communautaire, enraciné dans la gratitude, l'hospitalité et la chaleur du foyer. Tous révèrent les saisons de la terre, sans pour autant pratiquer de religion organisée. Leurs fêtes saisonnières, leurs modestes échanges de présents et leurs chants de célébration les unissent dans un commun respect des cycles de la nature, entretenant une harmonie durable et une bienveillance mutuelle entre les peuples."
 hobbit_religion_adj: "Perian"
 hobbit_religion_adherent: "Perian"
 hobbit_religion_adherent_plural: "Periannath"

 faith_hobbit: "Âtre et Moisson" #Placeholder until we get a better idea?
 faith_hobbit_adj: "de l'Âtre et de la Moisson"
 faith_hobbit_adherent: "Fidèle de l'Âtre"
 faith_hobbit_adherent_plural: "Fidèles de l'Âtre"
 faith_hobbit_desc: "Les [hobbits|E], les Briennais et tous les [men|E] de la région mènent des vies simples et communautaires, fondées sur la gratitude, l'hospitalité et le réconfort du foyer.\n\nLes Hobbits sont un peuple superstitieux, riche en légendes de [trolls|E], d'esprits de la nature et de fées, mais leurs songes effleurent rarement les grandes questions. Les plus instruits d'entre eux, s'ils évoquent une puissance supérieure, parlent sans doute de [yavannacharactershort|E]. C'est elle qui assure l'abondance des moissons et la richesse des champs.\n\nDe même, parmi les Briennais et les autres peuples de la région, [eruiluvatar|E] est vénéré comme le Créateur unique, mais on Le nomme ou L'invoque rarement à voix haute. Le sacré se trouve dans les saisons : miches de pain, cidre fraîchement pressé et offrandes de fleurs sauvages sont déposés aux simples pierres levées de la communauté. De la [shire|E] voisine, ils ont adopté des traditions telles que l'amour des fêtes saisonnières, l'échange de petits présents sculptés et le chant de couplets chaleureux et festifs.\n\nEnsemble, ces pratiques partagées témoignent d'un profond respect pour les cycles de la nature et renforcent les liens entre Hobbits et Hommes. Leurs célébrations communes nourrissent un sentiment durable d'appartenance, d'harmonie et de bienveillance mutuelle entre les communautés."
 
 faith_hobbit_wandering: "Voies de l'Errance"
 faith_hobbit_wandering_adj: "de l'Errance"
 faith_hobbit_wandering_adherent: "Errant"
 faith_hobbit_wandering_adherent_plural: "Errants"
 faith_hobbit_wandering_desc: "Jadis, les [hobbits|E] des Terres Sauvages menaient une vie nomade. Bien qu'ils s'établissent parfois, ils ne se liaient à aucune terre en particulier et reprenaient la route quand bon leur semblait. Leurs migrations les menèrent loin, en quête de havres sûrs et de champs fertiles.\n\nLes Voies de l'Errance sont un ensemble informel de coutumes transmises par tradition orale, destinées à assurer la sécurité des Errants sur les longues routes du [rhovanion|E] et de l'[eriador|E]. Jamais dogmatiques, ces pratiques sont éminemment pragmatiques, affinées au fil de nombreuses générations de voyages en terres périlleuses.\n\nLargement abandonnées après l'établissement de la [shire|E], ces Voies furent parfois embrassées par les Hobbits les plus hardis, en quête d'aventure en des contrées lointaines."