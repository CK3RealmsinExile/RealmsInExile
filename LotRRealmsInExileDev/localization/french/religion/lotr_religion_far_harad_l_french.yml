 ### East Harad ###
 faith_garauda: "Culte de Graudyn"
 faith_garauda_adj: "de Graudyn"
 faith_garauda_adherent: "Graudyn"
 faith_garauda_adherent_plural: "Graudyni"
 faith_garauda_old: "Ancien Culte de Graudyn"
 faith_garauda_old_adj: "de l'Ancien Graudyn"
 faith_garauda_old_adherent: "Ancien Graudyn"
 faith_garauda_old_adherent_plural: "Anciens Graudyni"
 faith_garauda_desc: "Source de perplexité de longue date pour les érudits étrangers, Graudyn est le seigneur des chèvres. Dans la grande cosmologie des [haradrim|E], il est à peine mentionné, et pourtant son culte demeure l'un des plus durables de tout le Harad Lointain, ses préceptes de vie simple, de résilience tenace et d'aimable hospitalité envers les étrangers lui valant une grande admiration dans les contrées les plus rudes du Harad.\n\nImportation antique du Sîrayn, le culte de Graudyn fut adopté avec enthousiasme par les Haradrim vivant dans les terres âpres et rocailleuses du sud-ouest de la Mer de Dunes. Au Sîrayn, le culte a depuis longtemps décliné jusqu'à disparaître, mais au Harad il a perduré, tout comme les vaillantes chèvres dont il est le maître."

 faith_kanra: "Kanrâ"
 faith_kanra_adj: "de Kanrâ"
 faith_kanra_adherent: "Fidèle de Kanrâ"
 faith_kanra_adherent_plural: "Fidèles de Kanrâ"
 faith_kanra_desc: "Aux temps anciens, les eaux de vie coulaient à travers le monde entier, et ceux qui en buvaient accédaient à la vie éternelle. Mais le cataclysme survint, et les eaux furent perdues, emprisonnées dans les profondeurs de la terre — ne laissant aux vivants que sel et sable, le soleil impitoyable pour seul juge.\n\nD'innombrables générations passèrent dans le désespoir, l'eau que l'on trouvait étant salée et fétide comparée à celle qui avait été perdue. Nul ne pouvait la retrouver, enfouie dans la terre hors de portée des hommes. Du moins jusqu'à la venue de Badharkân.\n\nÂme austère et exigeante, semblant née du désert lui-même, il creusa profondément sous la terre. Après de longues années, il découvrit les eaux perdues, but abondamment et accéda à la vie éternelle. Remontant à la surface, il choisit les élus parmi le peuple et les mena à son royaume souterrain, où la vie était aisée, la nourriture somptueuse, et l'eau coulait à flots.\n\nÀ ceux qui restèrent, il donna une loi qui, si elle était suivie, garantirait qu'il les emmènerait un jour eux aussi vers les terres bénies. Aux pécheurs, il infligea un blâme, décrétant qu'ils devraient peiner à récolter le sel et extraire l'eau pour les justes. Ainsi les fidèles s'efforcent-ils de mener des vies droites selon les décrets du Roi des Profondeurs, de peur de tomber en disgrâce pour avoir gaspillé ses bienfaits qui remontent encore à la surface."

 faith_arysis: "Culte de Rasayn"
 faith_arysis_adj: "de Rasayn"
 faith_arysis_adherent: "Rasaynite"
 faith_arysis_adherent_plural: "Rasaynites"
 faith_arysis_desc: "Déesse mineure des rivières dans le panthéon [haradric|E], le Culte de Rasayn a néanmoins trouvé un foyer en Arysis. Bien que vénérée par intermittence par d'autres peuples haradriques, pour le peuple d'Arysis, dont les principales sources d'eau sont les rivières qui traversent le désert, elle est leur patronne.\n\nSelon la tradition locale, Rasayn était l'une des suivantes de Ladnôca, mais lorsque Vâtra porta la guerre aux dieux, Rasayn fut profondément affligée et s'enfuit vers l'est, où elle érigea un refuge pour abriter autant d'êtres vivants qu'elle put rassembler, et elle fit jaillir les eaux de la terre pour les sustenter. L'[mankind|E], qui avait également fui, trouva en ses idéaux une parenté d'esprit, et elle leur fit jurer de s'abstenir de toute violence en cette terre, et elle les bénit tous.\n\nDans la pratique, les fidèles de Rasayn viennent aux rivières qu'elle a offertes à l'humanité pour être purifiés de leurs péchés, confessant leurs torts les uns envers les autres et envers la déesse en présence de leur communauté. Les eaux accueillent et baignent tous ceux qui viennent, sans égard pour leur rang ou leur croyance. Toutes les rivières leur sont sacrées, car ils les considèrent comme des conduits du pouvoir divin de Rasayn et comme les sources de la vie elle-même, à garder et préserver pures."