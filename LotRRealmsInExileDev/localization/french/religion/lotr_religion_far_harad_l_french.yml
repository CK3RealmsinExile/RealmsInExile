l_french:
 far_harad_religion: "Harad Lointain"
 far_harad_religion_adj: "du Harad Lointain"
 far_harad_religion_desc: "Les [haradrim|E] du [farharad|E] vénèrent un antique panthéon enraciné dans l'épopée divine du Kât-Polozây, et dont les préceptes furent par la suite codifiés dans [legend_of_iunast|E]."
 far_harad_religion_adherent: "Haradrim"
 far_harad_religion_adherent_plural: "Haradrim"

 ###########################
 ### Faiths of Far Harad ###
 ###########################

 ### Bellakar ###
 faith_ishtra: "Culte d'Îshtra"
 faith_ishtra_adj: "d'Îshtra"
 faith_ishtra_adherent: "Îshtraïte"
 faith_ishtra_adherent_plural: "Îshtraïtes"
 faith_ishtra_desc: "Îshtra, déesse de l'Amour et incarnation de l'Étoile du Matin, occupe le troisième rang parmi les dieux dans l'épopée divine des [haradrim|E], le Kât-Polozây — après sa sœur Ladnôca et leur père Nâdi-manyê, Seigneur des Vents.\n\nElle s'efforce de maintenir une neutralité prudente dans le grand conflit qui oppose sa sœur Ladnôca à Vâtra, dieu du Soleil. La discorde entre les Dieux comme parmi les [conceptracemen|E] l'afflige profondément, et elle n'aspire qu'à retrouver les jours anciens où le monde baignait dans la paix et l'abondance — mais les ambitions de Vâtra sont inextinguibles, et elle se consacre donc à enseigner aux Hommes l'importance de l'amour et de la pitié envers leurs semblables.\n\nSi la paix entre les Dieux demeure hors d'atteinte, que la paix entre les Hommes suffise."

 faith_ladnoca: "Culte de Ladnôca"
 faith_ladnoca_adj: "de Ladnôca"
 faith_ladnoca_adherent: "Ladnôcan"
 faith_ladnoca_adherent_plural: "Ladnôcans"
 faith_ladnoca_desc: "Ladnôca, Déesse-Mère de l'[mankind|E], Reine du Ciel Nocturne et incarnation de la Lune, n'est surpassée que par son père Nâdi-manyê, Seigneur des Vents et roi des Dieux, dans l'épopée divine des [haradrim|E], le Kât-Polozây. Aux côtés de son père, elle maintient l'équilibre cosmique et veille à la justice temporelle.\n\nElle est l'épouse de Vâtra, mais tous deux sont depuis longtemps séparés — car Vâtra, dans son ardente ambition et sa soif de domination, occit Nâdi-manyê et chercha à soumettre les Cieux tout entiers à son autorité. Mais Ladnôca rallia le panthéon contre lui, et lors d'une bataille cataclysmique, la demeure des Dieux sur terre fut anéantie, et ils devinrent des esprits qui brûlent encore dans le ciel. Depuis lors, tous deux dansent dans les cieux, sans que l'un ne parvienne à l'emporter sur l'autre. Le courroux de Vâtra calcine le [harad|E] jusqu'à l'aridité, et seule Ladnôca apporte un répit aux souffrances de l'[conceptmankind|E] par son don de la nuit et du sommeil, trêve bénie après le jour brûlant.\n\nLes érudits des [dunedain|E] estiment que Ladnôca serait un amalgame corrompu de [vardacharactershort|E], [estecharacter|E], [ariencharacter|E], et peut-être d'un [tilioncharacter|E] transposé au féminin."

 faith_iunast: "Culte héroïque d'Iunást"
 faith_iunast_adj: "d'Iunást"
 faith_iunast_adherent: "Iunástan"
 faith_iunast_adherent_plural: "Iunástani"
 faith_iunast_desc: "Héros légendaire des [haradrim|E] du Lointain, [GetScriptedCharacterByHistoryID( 'lineiunast1' ).GetFirstName] incarne la vaillance et la force des [conceptracemen|E]. Son périple, transmis dans [legend_of_iunast|E], constitue l'un des mythes fondateurs les plus importants du [farharad|E] et demeure partie intégrante de leur religion.\n\nTout au long du [thirdage|E], de nombreux cultes voués à la vénération du héros Iunást ont fleuri autour de la [bayoftulwang|E]. Ladnôca et les autres dieux y occupent souvent un rôle plus distant, et dans la pratique, les prières s'adressent plus communément à Iunást lui-même, ainsi qu'à divers héros locaux. Ses fidèles se consacrent fréquemment à combattre le mal et à s'opposer au règne des tyrans. Les tournois de prouesses martiales sont chose commune parmi les dévots d'Iunást."

 ### Bozisha-Miraz ###
 faith_ray: "Kât-Polozây"
 faith_ray_adj: "du Kât-Polozây"
 faith_ray_adherent: "Enfant des Dieux"
 faith_ray_adherent_plural: "Enfants des Dieux"
 faith_ray_desc: "C'est en [ray|E] qu'est préservée l'antique épopée divine des [haradrim|E], le Kât-Polozây. À l'aube des temps, le monde était gouverné par les Dieux depuis leurs palais altiers, au sommet de la plus haute montagne de la création. En ces jours, le monde entier était luxuriant et verdoyant, quand Nâdi-manyê régnait sur les flancs de la montagne. Mais le temps vint où Vâtra porta la guerre aux palais célestes, et la montagne fut rasée quand il occit Nâdi-manyê. Les corps mortels des Dieux périrent dans la grande bataille, et ils devinrent des esprits ; alors Ladnôca rallia tous les Dieux. Même ceux qui avaient auparavant prêté l'oreille à Vâtra se rangèrent à ses côtés et renversèrent Vâtra.\n\nDans sa rage et sa fureur, incapable de nuire à son épouse en raison de leurs vœux de mariage, Vâtra tourna son courroux contre la terre qui avait été la dot de Ladnôca. Là où s'étendaient jadis d'immenses forêts et des terres fertiles, il ne resta plus qu'un désert désolé. Ladnôca ne put sauver qu'une infime partie du monde de sa fureur. Ses larmes arrosent les terres de [ray|E], et en ce pays furent rassemblés les derniers vestiges de l'[conceptmankind|E]. De leur nombre surgit [iunast|E], qui accomplit ce que Ladnôca ne pouvait faire, et bannit Vâtra. Il libéra l'Humanité de la tyrannie de Vâtra, bien que les terres calcinées n'oublieraient jamais le courroux du dieu. Il fut alors adopté comme fils de Ladnôca et prit sa place parmi les dieux."

 faith_vatra: "Aûdrat Vâtra"
 faith_vatra_adj: "de l'Aûdrat Vâtra"
 faith_vatra_adherent: "Fidèle de Vâtra"
 faith_vatra_adherent_plural: "Fidèles de Vâtra"
 faith_vatra_desc: "Vâtra, dieu du Feu et incarnation du Soleil, est dans la cosmologie traditionnelle des [haradrim|E] le grand rebelle et ennemi de Ladnôca, ambitieux et capricieux, celui qui occit le Seigneur des Vents. Mais ses acolytes content une tout autre histoire. Dans le récit vâtran de la grande épopée, le Dieu-Soleil fut au contraire désigné par Nâdi-manyê comme son successeur avant son départ du monde, lorsqu'il gagna l'Au-Delà pour rejoindre les Dieux qui l'avaient précédé. Telle était la succession naturelle des Générations Divines. Mais Ladnôca, amère d'avoir été écartée par son père au profit de son époux, sema la dissension au sein du panthéon et incita à la révolte contre le roi légitime.\n\nL'histoire s'achève de manière similaire au récit traditionnel des Haradrim — la rébellion triomphe, mais pour les Vâtrans, c'est une tragédie, non un triomphe. Ils croient qu'un jour, le Dieu-Soleil reprendra sa place légitime et humiliera le panthéon ainsi que son épouse. Alors l'ordre divin véritable sera enfin restauré et la paix règnera sur toutes les terres. Le soleil et la lune ne s'affronteront plus, et les souffrances des Hommes prendront fin.\n\nL'Aûdrat Vâtra a depuis longtemps été subverti par [sauroncharacter|E] à ses propres fins."

 faith_tulwang: "Culte de Kîrab-Sarâda"
 faith_tulwang_adj: "de Kîrab-Sarâda"
 faith_tulwang_adherent: "Kîrab-Sarâda"
 faith_tulwang_adherent_plural: "Kîrab-Sarâda"
 faith_tulwang_desc: "Le Culte de Kîrab-Sarâda était une religion répandue parmi les [haradrim|E] du Lointain, à Tûlwang et en [anbalkumagan|E]. Ses croyances fondamentales sont enracinées dans le texte du même nom, préservé depuis le début du [secondage|E]. Ces écrits décrivent les vastes multitudes de dieux et d'esprits qui habitent toute chose, mais ils portent aussi un regard extrêmement sombre sur la mort et l'au-delà. L'au-delà y est dépeint comme un lieu gris et terne, exempt de souffrance mais aussi de joie, où règnent le silence et vos propres pensées jusqu'à ce que vous aspiriez à la délivrance du néant.\n\nLe dieu de la mort Tûlimi est donc grandement redouté dans cette foi, et il règne une ardente volonté de survivre et d'accomplir autant que possible de son vivant. Vâtra a gagné en importance au fil des années, une croyance s'étant formée selon laquelle le Dieu-Soleil détiendrait peut-être les secrets de la vie éternelle, un moyen d'échapper aux salles lugubres."

