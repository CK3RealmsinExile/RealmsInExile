l_english: 
 
 great_project_type_mandala_capital_02_contribution_brick_desc: "More cannot be created from nothing. We will provide the [great_project|E] with all the brick it needs to complete work on the capital."

 great_project_type_mandala_capital_02_contribution_shallow_pools_desc: "Water features are essential for providing cool but also to provide pleasant sights."

 great_project_type_mandala_capital_02_contribution_work_force_desc: "Great labor is needed for great feats! We must supply more manpower for the [great_project|E] to finish renovations on this capital."

 great_project_type_mandala_capital_02_contribution_decorative_tiles_desc: "Let us indulge and add decorative tiles to the roofs. Escalating edges. Intricate carving. More magnificence to please the eye."

 great_project_type_mandala_capital_03_contribution_work_force_desc: "To reach perfection, we must labor hard. More men are needed to build the capital, and our contribution would be richly rewarded."

 great_project_type_mandala_capital_05_contribution_marble_foundation_desc: "The finest marble shall be offered for the capital, that it may rest on the most elegant foundations."

 great_project_type_mandala_capital_05_contribution_work_force_desc: "We shall provide laborers of every skill, from the humblest peasant to the wisest scholar, drawn from every corner of the realm, to assist in the construction of the great city."

 great_project_type_mandala_capital_05_contribution_bejeweled_reliefs_desc: "Fathers of Dwarves shall adorn our walls, projecting wisdom as they stride, complete with their marvelous bejeweled attires."