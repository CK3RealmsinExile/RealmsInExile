l_english:

 ### War of the Ring ###

 # Erwigiar
 challenge_character_erwigiar: "Erwigiar of the Framlings"
 challenge_character_erwigiar_desc: "Leader of those of the Éothéod who remained in the northern [anduinvale|E], High Chieftain Erwigiar leads a diminished people, a shadow of their now distant kin in [rohan|E].\n\n#bold Once, Framsburg was the capital of a mighty realm. Can you make it so once again?#!"

  # Saebert
 challenge_character_saebert: "Lord Sæbert of the Hills"
 challenge_character_saebert_desc: "Few of the men of [rhovanion|E] of old remain. But one such is Sæbert, a raider of no small renown. He is less honorable than his forefathers, but he is strong as they.\n\n#bold Can Sæbert reclaim the lands of his forefathers, even with the aid of the shadows that lurk in the forests to the north?#!"

  # Gimilkhâd
 challenge_character_gimilkhad: "Ar-Gimilkhâd"
 challenge_character_gimilkhad_desc: "Leader of the Ar-Adûnâim, Gimilkhâd claims to be the rightful leader of all Númenóreans. Exiled on a barren rock, it seems these claims will remain just that.\n\n#bold But perhaps Gimilkhâd can prove his claims are not insanity, but prophecy?#!"

  # Berúthiel
 challenge_character_beruthiel: "Lady Berúthiel"
 challenge_character_beruthiel_desc: "A distinguished lady from a branch-family of the ruling house of [umbar|E], Berúthiel has spun a mighty web to ensure the Princes of the land remain within her grasp.\n\n#bold Pulled between lovers, can Berúthiel maintain her shadow kingdom, or will the light of day reveal all her misdeeds?#!"

  # Gyürüchill
 challenge_character_gyuruchill: "Katajan Gyürüchill of the Tedjin"
 challenge_character_gyuruchill_desc: "One of the most powerful Tedjin lords, Gyürüchill II is near to his end. Yet great changes are coming, which he may not live to see.\n\n#bold The Tedjin are at a crossroads - what path shall you take?#!"

  # Kalafar
 challenge_character_kalafar: "Kalafar of Chelkar"
 challenge_character_kalafar_desc: "Living in the dry lands south of [mordor|E], Kalafar's people are the secret last holdouts of the old ways in a land steeped in shadow.\n\n#bold With foes on all sides, can Chelkar maintain its secret faith, or will it too fall into darkness?#!"
 
  # Azruthôr III 
 challenge_character_azruthor: "Bârunkhôr Azruthôr III"
 challenge_character_azruthor_desc: "A staunch traditionalist, Azruthôr III is the last lord who stands for the ancient ways in [bellakar|E].\n\n#bold Shall Azruthôr let the past die at last, or will he stubbornly cling to it?#!"

  # Fishi 
 challenge_character_fishi: "Fishi the Witch-Doctor"
 challenge_character_fishi_desc: "A hermit, Fishi leads her people from the reclusive depths of her swamp. But dark rumors circle as to her true nature.\n\n#bold Can Fishi survive the scrutiny of her theoretical overlords, or is her time running out?#!"

  # Szoranh 
 challenge_character_szoranh: "Szoranh, the Dragon at World's End"
 challenge_character_szoranh_desc: "A wanderer from far off Vûlmaw, Szoranh saw a chance to make a fortune and a name for himself.\n\n#bold Isolated at world's end, will Szoranh rise, or fall?#"
 
  # Eldberk
 challenge_character_eldberk: "Izbâd Eldberk of Nogrod"
 challenge_character_eldberk_desc: "A self-made exile from Buzrâ-dûm, Eldberk feels great frustration. Yet he has funneled it into a brave (or foolish) attempt to reclaim ancient Nogrod.\n\n#bold Shall Eldberk rise above his anger, or destroy all he sought to build?#"
 
  # Lanthir
 challenge_character_lanthir: "Aran Lanthir of the Penni"
 challenge_character_lanthir_desc: "Long has Lanthir led his people from the security of his isolated halls.\n\n#bold Yet as the world turns and the ages pass, can isolation protect the [penni|E] any longer?#"
 
  # Keiseimu
 challenge_character_keiseimu: "Khûdriag Keiseimu of Khand"
 challenge_character_keiseimu_desc: "A traditionalist, Khûdriag Keiseimu is one step closer to reclaiming his grandfather's throne as lord of all Khand.\n\n#bold Yet will caution prove fatal, when the southern champion Vangaris beats him to the punch?#"
 
  # Astarel
 challenge_character_astarel: "Matriarch Asterel"
 challenge_character_astarel_desc: "Lady of the matriarchical Ibarad tribes, Asterel is a potent leader of the Logath Confederation. Her people are disunited, but perhaps that can be changed.\n\n#bold Can Asterel bring together her squabbling people, or is it hopeless?#"
 
  # Argân
 challenge_character_axe_that_walks: "Argân, the Axe That Walks"
 challenge_character_axe_that_walks_desc: "The 'Axe That Walks' is now very old, and has fought many battles. But perhaps there is time left for one final grand journey.\n\n#bold Where shall the road lead you before Argân's time runs out?#"
 
  # Creusa
 challenge_character_creusa: "Creusa, Sorceress of Mirkwood"
 challenge_character_creusa_desc: "Steeped in dark magic, the Sorceress of Mirkwood has given much in the service of the dark lord.\n\n#bold With neither siblings or children, what legacy can you carve before Creusa's magic exacts its toll?#"
 
 # Konnen
 challenge_character_konnen: "Chieftain Konnen Korzun"
 challenge_character_konnen_desc: "With scales for flesh, Konnen is one of the last redoubts of his people.\n\n#bold Can Konnen hope to defend his people against the encroachment of Haradrim and Gondorians?#"
 
  # Dasin II
 challenge_character_dasin: "Dasin of Pezarsan"
 challenge_character_dasin_desc: "Rising in a disputed succession, Dasin II now finds himself besieged on two different fronts.\n\n#bold Against such odds, can you ensure Pezarsan's independence?#"
 
  # Timnir
 challenge_character_timmir: "Timmir, the Incapable"
 challenge_character_timmir_desc: "Once a mighty leader whose deft diplomacy ensured his people's independence, Timmir's old age has finally caught up with him.\n\n#bold Despite his ruined mind, can Timmir's legacy be maintained?#"
 
  # Ôn-Ikanna
 challenge_character_on_ikanna: "Chieftain Ôn-Ikanna of the Honnin"
 challenge_character_on_ikanna_desc: "A giant among his people, Ôn-Ikanna perhaps heralds a new start.\n\n#bold Once, the Honnin ruled all of Rây. Can Ôn-Ikanna lead them to do so again?#"
 
  # Rayo
 challenge_character_rayo: "Autarb Rayo of the Dune Sea"
 challenge_character_rayo_desc: "A patient man in the desert sands, Rayo knows the power of a blade - and what it can bring him.\n\n#bold Shall Rayo's blade be one of liberation, heroism, or conquest?"
 
  # Bêlzagar
 challenge_character_belzagar: "Zibdîn Bêlzagar of Blackflame"
 challenge_character_belzagar_desc: "Master of a hold at the corner of the world, Bêlzagar's realm is very young by Dwarvish standards.\n\n#bold But as the chaos of the turning age rises, can the youngest hold of the Blacklocks stand strong?#"
 
  # Aglarin 
 challenge_character_aglarin: "Corsair-Lady Aglarin"
 challenge_character_aglarin_desc: "One of the heirs to a great pirate-king, Aglarin and her brothers now squabble over the fate of the cape of Mardruak.\n\n#bold Who will be the king (or queen) of the pirates?#"
 
  # Borghal
 challenge_character_borghal: "Autarb Borghal of the Jelut"
 challenge_character_borghal_desc: "Mightiest of the Jelut chiefs, Borghal still remains a minor player in the grand affairs of Harad.\n\n#bold Yet must that be so? Can Borghal bring the Jelut to heights not seen in generations?#"
 
  # Saelraed
 challenge_character_saelaed: "Sælræd of the Leofrings"
 challenge_character_saelaed_desc: "Sælræd holds but one half of his family's ancient domains, and across the Anduin, his kin have fallen to the shadow.\n\n#bold With the aid of the Lady Foldewyn, can Sælræd make his family's lands whole once more?#"
 
  # Radômor 
 challenge_character_radomor: "Radômor, the Fierce-blade"
 challenge_character_radomor_desc: "A swordsman with few peers, Radômor has embarked on an ambitious conquest to unify his people and the jungle of Zajantak.\n\n#bold Can Radômor succeed, or will greater, more tempestuous powers snap his blade?#"
 
  # Rorimac 
 challenge_character_rorimac: "Master Rorimac of Buckland"
 challenge_character_rorimac_desc: "Master of Buckland, Rorimac technically exists independent of the Thain of the Shire.\n\n#bold The Oldbucks once led all Hobbits - what path shall the Brandybucks take?#"
 
  # Legolas
 challenge_character_legolas: "Legolas of the Woodland Realm"
 challenge_character_legolas_desc: "As captain of the southern borders of the Woodland Realm, it is the duty of Prince Legolas, son of Thranduil, to keep safe those Elves who dwell in the only part of Mirkwood that remains free of the taint of Dol Guldur. \n\n#bold In recent days, Orcs have begun to spread from the mountains of Mirkwood, and threaten to trespass north into the Elven homeland...#"
 
  # Théodred 
 challenge_character_theodred: "Second Marshal Théodred"
 challenge_character_theodred_desc: "It is the duty of the Second Marshal of the Riddermark to defend the Westfold, Rohan's westernmost province. Held by valiant Théodred, son of the King, the Westfold has seen wildman raids in recent days, terrifying the populace. \n\n#bold Can Prince Théodred restore order and discover the true meaning behind the pillaging?#"

  # Jangi
 challenge_character_jangi: "Jangi Ezparo"
 challenge_character_jangi_desc: "For centuries, the Apayrabandâ struck fear into the hearts of the denizens of the shores of the Bay of Ormal, harassing traders and pillaging tombs. That was until the rise of the Côdyan hegemony. Their occupation of Anarikê and subsequent naval dominance saw the brotherhood of pirates persecuted and the seaways policed in a bid to return to the prosperity of years gone by. Things only worsened after the liberation of Anarikê by a resurgent [khy|E], when the Brotherhood lost its status as a symbol of maritime resistance.\n\nThe Bloody Mahin, named for some long-forgotten maiden of violent persuasion, is the very last ship of the very last Apayrabandâ fleet, driven forth from it's haven during the Vûlmaw's final campaign to eradicate the Apayrabandâ once and for all. As the last of the Apayrabandâ, he resolved to return with his meagre crew to the Bay of Ormal, bringing the tale of the Apayrabandâ full circle. One last quest for treasure before the sun sets on the Apayrabandâ forever!"
 
  # Bo Lagg
 challenge_character_bo_lagg_the_butcher: "Bo Lagg the Butcher"
 challenge_character_bo_lagg_the_butcher_desc: "The Monster of the Mountain, Bo Lagg has slain many a helpless shepherd, but has yet to prove himself against a real threat.\n\n#bold Will the Butcher remain a two-bit raider, or shall he bring all of Chennacatt beneath his bloody banner?#"
 
  # Hamshi 
 challenge_character_hamshi: "Aknajhan Hamshi of Harshandatt"
 challenge_character_hamshi_desc: "In ages past, the Muranians ruled the mighty realm of Harshandatt. Now, their last scions struggle to hold back the tide of both the Núari from Sîrayn as well as the Sun-goddess cultists from [khy|E].\n\nHamshi of Xyrenath is the last of an old breed. A grave and dutiful ruler who has spent his long life tending to the Valley of the Nhazadhs, resting place of the divine dead. As a Haracktish mystic, he sees himself less as sovereign and more as steward of memory, guardian of tombs, and servant to the ancestors.\n\nYet time weighs heavy upon Hamshi, and his fiery son Kator now stands ready to take the reins. As the last embers of Harshandatt glow ever fainter, will he continue to dutifully guard what remains, or forge a new legacy from the ashes."
 
  # Gabar
 challenge_character_gabar: "High Chief Gabar of Silvesa"
 challenge_character_gabar_desc: "A lesser son of greater sires, Gabar faces threats in all directions. Orcs to the south, belligerent tribes to the west, and vast armies massing in Isra, to the east.\n\n#bold Can the Lord of Tartaust weather this storm, or will he be swept away by the shadow?#"

  # Vîshrakh
 challenge_character_vishrakh_the_scribe: "Vîshrakh the Scribe"
 challenge_character_vishrakh_the_scribe_desc: "Vîshrakh has hidden his life away in ruins even more ancient than he, in search of forbidden knowledge.\n\n#bold Will he unlock the secrets of the Nazgûl, or will he fall victim to his own cowardice?#"
 
  # Scutsparg
 challenge_character_boss_scutsparg: "Boss Scutsparg of the Mask"
 challenge_character_boss_scutsparg_desc: "Scutsparg has come into possession of a Mask etched with symbols no one can name. Though its purpose is unknown, he feels an overwhelming urge to wear it.\n\n#bold Will he uncover the Mask's hidden truth, or be claimed by the will behind it?#"

  # Adrahil II
 challenge_character_adrahil: "Prince Adrahil of Dol Amroth"
 challenge_character_adrahil_desc: "#TOLKIENQUOTE: “And last and proudest, came Imrahil, Prince of Dol Amroth, with gilded banners bearing his token of the Ship and the Silver Swan, and a company of knights in full harness riding grey horses; and behind them seven hundreds of men at arms, tall as lords, grey-eyed, dark-haired, singing as they came.”#!\n\nAdrahil II, Prince of [dol_amroth|E], stands as a bastion against Corsair and [haradrim|E] incursions from the south, but as he nears his twilight years it falls upon his son, the gallant Imrahil, to carry forth the banner of the Silver Swan against the coming tide of darkness."

  # Vangaris
 challenge_character_vangaris: "Khûdriag Vangaris of Khand"
 challenge_character_vangaris_desc: "Vangaris is a testament to the brutal meritocracy of [khand|E], where the strong rise and the weak must follow in their wake or be crushed underfoot. From a starving orphan in the streets of Sturlûrza Khand, Vangaris has risen to become the lord of all Lower Khand. But in his heart, it is never quite enough for one who was once forced to beg for scraps. \n\nWhile those of older lineages in Khand and abroad might look down upon Vangaris with disdain, he will continue to fight, until he is at last secure, and his heart finally has the peace it craves. And he does not care who he will have to fight for it."

  # Wulfgar
 challenge_character_wulfgarbrynjarsson: "Wulfgar Brynjarsson"
 challenge_character_wulfgarbrynjarsson_desc: "One of the descendants of Wulf, once-king of [rohan|E] and Dunland, Wulfgar is a noble and solitary man, concerned foremost with the safety and security of his people. But his attempts at seeking a beneficial alliance with the Forgoil have been frustrated at all points by the [wizard|E] in [isengard|E]. \n\nWith rumours that Wildmen raiders are ever more raiding over the Isen, leaving devastation in their wake, Wulfgar must choose to face either the wrath of Théoden or that of [sarumancharacter|E]." #Character from BfME: The Age of the Ring, written by Mathijs.
 
  # Mouth of Sauron
 challenge_character_mouth_of_sauron: "The Mouth of Sauron"
 challenge_character_mouth_of_sauron_desc: "#TOLKIENQUOTE “The rider was robed all in black, and black was his lofty helm; yet this was no Ringwraith but a living man. The Lieutenant of the Tower of Barad-dûr he was, and his name is remembered in no tale; for he himself had forgotten it, and he said: ‘I am the Mouth of Sauron.’“#!\n\nA renegade of Gondor, the Lieutenant of the Dark Tower now takes up command of the Vale of Udûn, readying it for war. His master will soon strike against the hated West, and the Mouth of Sauron will be ready when the hammer falls upon the Realms of the Free Peoples."
 
  # Aykaafak 
 challenge_character_aykaafak: "Queen Aykaafak of Ambasôn"
 challenge_character_aykaafak_desc: "Mighty are the warrior-women of the isle of Ambasôn, tracing back their lineage to Amba, youngest daughter of the legendary Amâv. Fearsome raiders and pirates that haunt the Rómenaer ocean, the Ambasôna now seek to carve out the kingdom that was promised to them all those centuries ago..."
 
  # Zina-Konatl
 challenge_character_zina: "King Zina-Konatl of the Nafarati"
 challenge_character_zina_desc: "Zina-Konatl of the warlike Nâfarati, recently crowned as king, is a cunning man. Long have his people desired greater independence from their mûmakanil overlords, but the realm's ruler, Sandamal, was not quite so lenient as the Nâfarati had wished. For Sandamal sought to curb the power of the tribes and restore it to the crown, inviting resentment to the curtailment of their privileges by the Nâfarati, who began to act even more independently.\n\nZina-Konatl launched his own great campaign into Drenikan, and after five years of brutal siege, Taru Makar finally fell, its walls burned and its people put to the sword by the invading host. These victories in their own name further emboldened the Nâfarati, who began even to raid parts of Tûktan, and pushed the emperor to order the invasion of Kôronânde, which is now finally underway.\n\nEyeing his overlord carefully, Zina-Konatl needs only wait for the opportunity to arise. A moment of weakness, and the Nâfarati uprising will be underway..."
 
  # Bruka 
 challenge_character_bruka: "Bruka the Bleeder"
 challenge_character_bruka_desc: "In the easternmost tunnels and warrens of the Yellow Mountains dwell the Mark-etcher Goblin tribes, the first beings to delve these ancient lands. They were subjugated by the larger Orcs when Sauron was defeated in the War of the Last Alliance, and have chafed under this yoke for generations.\n\nNow, Goblin-king Bruka is poised to break the domination of the Rukhas-hai, attempting to carve out a free realm for the Mark-etchers."
 
  # Ozag
 challenge_character_ozag: "Ozag the Firelord"
 challenge_character_ozag_desc: "A crafty Goblin, Ozag claimed the Burning Throne to the north of the mighty Ranghâshya volcano as soon as he learned to wield the sorcerous powers that the darkness granted to him. Now, he seeks an ever greater power, having risen in revolt against his weak overlord, the failing Blûdbag.\n\nCan Ozag rise to the very top of the Yellow Mountain's Orcish hierarchy, and blanket the lowlands that surround the peaks in a new darkness reminiscient of the days of Khorahil the Nazgûl?"

 ### Long Winter ###
 
  # Nomid
 challenge_character_nomid: "Shazda Nomîd of the Asdriags"
 challenge_character_nomid_desc: "Shazda Nomîd was a bit of a conqueror in his youth, not a great one, mind you, but good enough. Now in his age those once loyal subjects have risen up to throw off his yoke, and his old enemies see a chance for vengeance.\n\n#bold Can Nomîd hold his legacy together, or shall he just be the latest to fall in the Years of Blood?#"

  # Thorne
 challenge_character_thorne: "Third Marshal Thorne"
 challenge_character_thorne_desc: "Marshal Thorne is a cunning man, examining each situation to his own benefit.\n\n#bold As Rohan grows more and more likely to fall into war, how might Thorne spin the threads of fate in his favour?#"

  # Fréalaf
 challenge_character_frealaf: "First Marshal Fréaláf"
 challenge_character_frealaf_desc: "Fréaláf Hildeson is the nephew of King Helm of Rohan, and a rising star of the Rohirrim. Only 28 years of age, he has already been appointed as First Marshal of the Mark, a prestigious position for one so young. Men say he takes after his late father Fréared, a renowned Gondorian soldier and trusted advisor of King Gram.\n\n#bold Yet troubles come for the Riddermark, and Fréaláf's loyaly and devotion to his king will be tested.#"

  # Cerith
 challenge_character_cerith: "Chief Cerith of Dunland"
 challenge_character_cerith_desc: "Cerith is lord of the people of Dunfearan, just another of the divided chieftens of Dunland. But unlike the rest, he is allied to Lord Freca of the Westmarch, a vassal of the hated Forgoil. Soon Cerith will be thrust into the limelight, as Freca faces challenges in Rohan and will have need of his aid.\n\n#bold Will Cerith support his troubled kin, or forge his own destiny free from their influence?#"

  # Gurnow
 challenge_character_gurnow: "Mayor Gurnow of Tharbad"
 challenge_character_gurnow_desc: "Gurnow is little more than an elevated thug, for all his protestatons of grandeur, yet in his wife flows the last of the noble blood of Tharbad.\n\n#bold Can Gurnow keep his dwindling city together, or shall the cold bring him to his knees?#"

  # Eltariel
 challenge_character_eltariel: "Eltariel, Blade of Galadriel"
 challenge_character_eltariel_desc: "Many men that dwell in the vales and plains of [rhovanion|E] say that the Lady of [lothlorien|E] possesses great power that reaches far beyond the bounds of the Golden Wood. Few know what truth lies behind such myths. While there is a hidden power within Lórien, other tools at the Lady's disposal are of much more natural character.\n\nOne of these is the Blade of Galadriel. Huntress, assassin, avenger - all these guises she will take on for the defense of Lothlórien. Eltariel's blades are as sharp as they are deadly, and many foes have been felled by them with ruthless efficiency."

  # Azrunêth
 challenge_character_azruneth: "Azrunêth of the Fleet of Shadows"
 challenge_character_azruneth_desc: "Established by a band of skilled corsairs and forged into a small armada of fast raider ships, the Fleet of Shadows has terrorized the western coasts of the [belegaer_sea|E] for years.\n\nWith the unforseen death of its latest Corsair-lord, a shadow of doubt was cast upon said ruler's only child and heir, his daugher Azrunêth. Could a woman really lead a fearsome fleet of warlike corsairs and plunderers?\n\nRecent months have proven this to be true. Raiding and loot have been plenty, and sea-shanties are already being sung about the Fleet of Shadows' newest commander.\n\nBut Azrunêth's goals lie otherwise. It has been a dream of hers to unite the Sacred Isles and forge a true pirate kingdom; a haven for any and all who feels at home aboard a ship..."
 
  # Shelepinn
 challenge_character_shelepinn: "Queen-in-Exile Shelepinn"
 challenge_character_shelepinn_desc: "The Kinn-Lai are a people divided. In ages long past, they were sundered after the death of their first King. Shelepinn, his proud daughter, could not bear to see the ancient realm of Tâlilan ruled by another, and thus went into exile, ere blood could be shed.\n\nWithin the wild jungles of Ûsakan, she has dwelt with her few followers for generations, holding little to no contact with her kin across the bay, ruled by her nephew, Dâlavin. But the world is changing; shadows are rising, even in the Utter South of Middle-earth. Has the time come for the Kinn-lai to finally reunite?"
 
  # Vimana 
 challenge_character_vimana: "Vimana, Oracle of Usakân"
 challenge_character_vimana_desc: "Long have the Ûsakani been kept enslaved and divided, made to eke out a meager living in jungle hideouts, surrounded on all sides by the encroaching shadow. For Vimana Masamâvin, this is no fate for the sons and daughters of Amâv. He has seen, in the flights of birds and in the patterns of falling leaves, a divine truth: that the Ûsakani will forever be weak, forever be the prey of vicious foes, should they remain divided.\n\nÛsakan must be united, but it will not be easy. In the chaos stirred by Radnag's raids, bandits seized the roads north, blocking any avenue of attack against the orcish menace, and if the forest sprites that dwell to the south and the west can be trusted remains to be seen..."
 
  # Bogho
 challenge_character_bogho: "Bogho the Tempest"
 challenge_character_bogho_desc: "In the desert lands of Abrakhân, a storm has risen. Sweeping across all the scattered tribes of the Arani and gathering up all the fighting men that yet remain in the ruins of Abrakhân, the Tempest, King Bogho of Darsalân, has forged a new realm of the Haradrim - but can his kingdom stand the test of time? Or will it fall, like so many other short-lived nations of the Haradrim before it?"
 
  # Narmin
 challenge_character_narmin: "Narmin of the Côdyan Yoke"
 challenge_character_narmin_desc: "Mighty in sea-power is Côdya, jewel of the Eastern Ocean; the stormy Rómenaer. Its ships have sailed west and overcame Anarikê, and now even the city-states of Lyneria and Thaamutasenga pay their tribute.\n\nCôdya's western governor is Narmin, a man of high merit. But can he prove to be worthy of his high station, or will the Côdyan Yoke be broken on his watch?"