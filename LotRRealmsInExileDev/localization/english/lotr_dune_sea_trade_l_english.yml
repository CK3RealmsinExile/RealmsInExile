 activity_RICE_bozo_local_pilgrimage_host_desc: "\n$BULLET_WITH_TAB$Gain [piety_i|E][piety|E]\n$BULLET_WITH_TAB$Lose [stress_loss_i|E] [stress|E]\n$BULLET_WITH_TAB$[GetTrait('pilgrim').GetName( GetNullCharacter )] [trait|E] / [GetTrait('pilgrim').GetName( GetNullCharacter )] [trait_level_track_xp|E]"
 
 # Buildings
 building_type_kjhana_forest_01: "Kjhana Forests" # Based on RICE Argan Forests. Originally Xana in Khy doc. Connection to d_naishan is Realms lore
 building_type_kjhana_forest_01_desc: "The Kjhana is a fruit tree unique to northern $k_mejhanir$, with a wide variety of practical uses."
 building_kjhana_forest_01: "Kjhana Forests"
 building_kjhana_forest_01_desc: "The Kjhana is a special tree endemic to certain regions in northern $k_mejhanir$. For centuries, locals have used the Kjhana tree and its small red fruit for firewood, food, oil, sap, and more. The tree also attract goats, who climb it to eat its fruit; when these fruit are spit out or excreted, they are much easier to process. The sap and bark have excellent healing properties, and regular consumption of the former combined with oil refined from the fruits makes the locals seemingly immune to most plagues and infections."
 building_kjhana_forest_02: "Kjhana Groves"
 building_kjhana_forest_02_desc: "Kjhana trees are now being managed in a more systematic and organized manner in this region, allowing for locals to acquire greater profit from its products given its rarity. The medicine produced from the oil and sap of the tree is exported to generate additional wealth for the region."
 building_kjhana_forest_03: "Kjhana Gardens"
 building_kjhana_forest_03_desc: "Kjhana forests can be found throughout this region, maintained by entire villages for a variety of purposes, ranging from local use to export to foreign markets. As such, the trees are bringing in much wealth, and the locals enjoy the increased benefits of the trees themselves."
 
 building_type_arsasan_mints_01: "$building_arsasan_mints_01$"
 building_type_arsasan_mints_01_desc: "$building_arsasan_mints_01_desc$"
 building_arsasan_mints_01: "Arsasan Mints"
 building_arsasan_mints_01_desc: "For [trans_haradric_merchants|E] involved in the trade of gold, Arsasak is usually the next place they visit after a night of respite in the Oasis of Maresh. Local rulers have capitalized on the large amount of gold flowing through here to turn Maresh into a major minting center. The coins produced here are renowned throughout [harad|E] for their quality, and feature a hole so they may be worn on a string. The strings cost extra, of course."
 
 building_type_selena_mud_masons_01: "$building_selena_mud_masons_01$"
 building_type_selena_mud_masons_01_desc: "$building_selena_mud_masons_01_desc$"
 building_selena_mud_masons_01: "Mason's Guild of Selena"
 building_selena_mud_masons_01_desc: "The mason's guild of Selena are highly renowned for their skills in [mud_masonry|E], honed to perfection over many generations. Their knowledge, which has sacred dimensions, is greatly respected across the region."
 building_selena_mud_masons_02: "Temple-City of Selena"
 building_selena_mud_masons_02_desc: "Through the tireless efforts of the mason's guild, Selena has been transformed into a marvellous walled temple-city, each spire a testament to its' builders' skill in [mud_masonry|E]."
 selena_mud_masons_effect_desc: "$unlocks_building_desc$Unlocks the #V $RICE_bozo_mud_masons_decision$#! [decision|E] even if your [culture|E] does not have the [GetCultureTradition('tradition_mud_masons').GetName] [tradition|E]\n\nImproves the #V $RICE_bozo_mud_masons_decision$#! [decision|E] if your [culture|E] already has access to it"

 # Game Concepts
 game_concept_maresh_prosperity: "Maresh's Prosperity"
 game_concept_maresh_prosperity_desc: "The [county|E] of Maresh always has a [county_modifier|E], called $game_concept_maresh_prosperity$, that represents its economic and political influence as one of the most important trade centers of [harad|E], serving as a nexus for [trans_haradric_merchants|E].\n\nThere are several levels to this modifier, and in order to increase its level, you need to take various [decisions|E] to improve Maresh. These decisions require you to\n\n$BULLET_WITH_TAB$#V $RICE_sus_resolve_conflicts_in_maresh$#!\n$BULLET_WITH_TAB$#V $RICE_sus_establish_maresh_mints$#!\n$BULLET_WITH_TAB$#V $RICE_sus_divert_and_dam_ziz_river$#!\n$BULLET_WITH_TAB$#V $RICE_sus_wall_the_oasis$#!\n\nDepending on the start date, some or most of these may already have been completed. Besides increasing $game_concept_maresh_prosperity$, these decisions provide various benefits as well."
 game_concept_trans_haradric_merchant: "Trans-Haradric Merchant"
 game_concept_trans_haradric_merchants: "Trans-Haradric Merchants"
 game_concept_trans_haradric_trade: "Trans-Haradric Trade"
 game_concept_trans_haradric_merchants_desc: "If you own territory in [GetGeographicalRegion('middleearth_harad').GetName], there is a chance a $game_concept_trans_haradric_merchant$ will spawn in your [court|E] every now and then. You can choose to make use of their connections, which grants you a [character_modifier|E] boosting your [income|E] as well as granting other bonuses, depending on which region of [harad|E] they come from (either [nearharad|E], [farharad|E], Khy, or Sîrayn). You can get these bonuses even if you do not invite them into your court.\n\nThe #V $lotr_haradrim_legacy_track_name$#! dynasty track has a couple [dynasty_perks|E] that improve this mechanic. The first one in the track, #V $lotr_haradrim_legacy_1_name$#!, increases the chances these events trigger. The third, #V $lotr_haradrim_legacy_3_name$#!, unlocks a [decision|E], #V Network with Trans-Haradric Merchants#!, which increases the chances of these events triggering even more for a short duration of time, while providing other economic bonuses."
 game_concept_namalo: "Namâlo"
 game_concept_namalo_desc: "The Namâlo were a group of merchants who played a major role in the economy of Sîrayn of the [thirdage|E]. Originally a group of merchants charged with managing the spice trade with [farharad|E], they were a composite of several peoples of Sîrayni origin, and the term had different meanings in different contexts.\n\nOnce a [ruler|E] who controls the spice trade of Sîrayn takes the [decision|E] to #V $RICE_bozo_establish_namalo_decision$#!, Namâlo content is unlocked through the #V $innovation_namalo$#! [innovation|E].\n\nThis [innovation|E] is gained in a few ways:\n$BULLET_WITH_TAB$Discovering the [innovation|E] normally\n$BULLET_WITH_TAB$The #V $RICE_bozo_establish_namalo_decision$#! [decision|E]\n$BULLET_WITH_TAB$Integrating them into local Communities via [decision|E]\n\nThe latter allows you to gain the [innovation|E] an [era|E] early.\n\nBesides its base benefits, the [innovation|E] has other advantages, too. For instance, it unlocks the [decision|E] to $RICE_bozo_namalo_synergy_decision$, which can provide your [counties|E] with useful bonuses."
 game_concept_mud_masonry: "Mud Masonry"
 game_concept_mud_mason: "Mud Mason"
 game_concept_mud_masons: "Mud Masons"
 game_concept_mud_masons_desc: "The $tradition_mud_masons_name$ [tradition|E], available to certain [cultures|E] in Sîrayn, enables a [decision|E] to $RICE_bozo_mud_masons_decision$, which grants you a [character_modifier|E] which reduces the cost and time to construct [buildings|E].\n\nIf you control the [county|E] of $c_selena$, you do not need the [tradition|E] to access the [decision|E], and the [decision|E] gives you more powerful versions of the [modifiers|E] in question"

 # Traits
 trait_lifestyle_trans_haradric_merchant: "Trans-Haradric Merchant"
 trait_lifestyle_trans_haradric_merchant_desc: "This character is a [trans_haradric_merchant|E] along the Dune Sea trade routes criss-crossing [harad|E]. They have experience in the arts of trade, travel, and negotiation."
 trait_lifestyle_trans_haradric_merchant_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a [trans_haradric_merchant|E] along the Dune Sea trade routes criss-crossing [harad|E]. [ROOT.GetCharacter.GetSheHe|U] has experience in the arts of trade, travel, and negotiation."
 trait_lifestyle_trans_haradric_merchant_2: "Accomplished Trans-Haradric Merchant"
 trait_lifestyle_trans_haradric_merchant_2_desc: "This character is a prominent [trans_haradric_merchant|E] leading caravans along the Dune Sea trade routes of [harad|E]. Capable in business, they have earned themselves quite a bit of gold."
 trait_lifestyle_trans_haradric_merchant_2_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a prominent [trans_haradric_merchant|E] leading caravans along the Dune Sea trade routes of [harad|E]. Capable in business, [ROOT.GetCharacter.GetSheHe] has earned [ROOT.GetCharacter.GetHerselfHimself] quite a bit of gold."
 trait_lifestyle_trans_haradric_merchant_3: "Renowned Trans-Haradric Merchant"
 trait_lifestyle_trans_haradric_merchant_3_desc: "This character is a renowned [trans_haradric_merchant|E] leading caravans along the Dune Sea trade routes of [harad|E]. Considered one of the great traders of the day, they have made quite a fortune."
 trait_lifestyle_trans_haradric_merchant_3_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a renowned [trans_haradric_merchant|E] leading caravans along the Dune Sea trade routes of [harad|E]. Considered one of the great traders of the day, [ROOT.GetCharacter.GetSheHe] has made quite a fortune."
 trait_track_lifestyle_trans_haradric_merchant: "$trait_trans_haradric_merchant$"
 trait_track_lifestyle_trans_haradric_merchant_desc: "From savannas to deserts and forests, [harad|E] is a bountiful land, with many opportunities for the wise and cunning, who know its peoples, kingdoms, and markets well."

 # Cultural Traditions
 tradition_RICE_masters_of_the_river_name: "Masters of the River"
 tradition_RICE_masters_of_the_river_desc: "This culture has been proclaimed by outsiders as 'Masters of the River' or 'Masters of the Waters' for their expertise in fishing and navigating the Niger River and its tributaries. It is said they possess a natural understanding of the Niger River that few others have." #PLACEHOLDER
 tradition_mud_masons_name: "Mud Masons"
 tradition_mud_masons_desc: "The masons of this culture are renowned for constructing elaborate architecture from mud. They are organized into guilds with a complex hierarchal structure, which enforces traditional religious rituals associated with their work and ensures their ancient masonry skills are passed down from generation to generation in the proper manner."
 culture_parameter_unlock_rice_mud_mason_decision: "Unlocks the [decision|E] to #V Employ Sîrayni [mud_masons|E]#! to reduce the cost and time to construct [buildings|E] even further, for those who are of this [culture|E] or rule over [counties|E] of this [culture|E]"
 culture_parameter_unlock_trans_haradric_travel_option: "$RICE_trans_haradric_travel_perk_effect$"
 culture_parameter_unlock_trans_haradric_merchant_decision: "$RICE_trans_haradric_decision_unlocked_desc$"
 culture_parameter_unlock_trans_haradric_merchant_better_chances: "$RICE_trans_haradric_trade_legacy_1_effect$"
 tradition_trans_haradric_traders_name: "Gold, Salt and Spice" #Originally Gold Dust Traders
 tradition_trans_haradric_traders_desc: "The people of this culture are heavily involved in the [trans_haradric_trade|E] network of Inner [harad|E]. No matter their role in the trade, they are major actors in the commercial, political, and cultural networks that surround [GetGeographicalRegion('middleearth_harad_dunesea').GetName], and are known for trading in gold, spices, salt, slaves, and other products."


 # Modifiers
 lodenuly_date_farms_modifier: "Date Farms of the Lódenûly Valley"
 lodenuly_date_farms_modifier_desc: "The [GetTitleByKey('d_lodenuly').GetNameNoTier] valley serves as the date basket of [GetGeographicalRegion('middleearth_harad_bayoformal_khy').GetName], producing bountiful amounts of succulent dates. Said to be the sweetest in the whole world, great varieties of dates have been grown here for generations, some with recorded trees of ancestry comparable to noble houses. Some even believe that these dates are the key to eternal youth, a myth vigorously perpetuated by the orchards' owners."
 lodenuly_date_longevity_modifier: "Lódenûlyan Longevity"
 lodenuly_date_longevity_modifier_desc: "This character is aging remarkably gracefully. There are some rumors that this is due to their consumption of the juicy dates of [GetTitleByKey('d_lodenuly').GetNameNoTier]. It is a common folk belief that these dates can grant eternal youth, though this remains unattested."
 
 maresh_prosperity_0: "[maresh_prosperity|E]: Poor (0)"
 maresh_prosperity_0_desc: "Ever since the death of its ruthless yet capable leader Abu Muntasir in 823 CE, Maresh has suffered from political instability. His descendants have squabbled among themselves, and the city's people, a diverse group, constantly shift their allegiance from one heir to another. As a result, the region's economy and standard of life are in decline."
 maresh_prosperity_1: "[maresh_prosperity|E]: Low (1)"
 maresh_prosperity_1_desc: "Maresh's future look promising as its people work together to develop the city's infrastructure and expand its trade networks across the Sahara. Though it will take time, the city is on the right track."
 maresh_prosperity_2: "[maresh_prosperity|E]: Medium (2)"
 maresh_prosperity_2_desc: "The people of Maresh are doing well as the economy expands rapidly. Traders are starting to flock to the city, and a number of learned and skilled people of all backgrounds have settled here."
 maresh_prosperity_3: "[maresh_prosperity|E]: High (3)"
 maresh_prosperity_3_desc: "Times are good in Maresh. As a major conduit for trade in Arysis, myriads of traders pass through the city regularly, and it is quickly becoming a major center for learning."
 maresh_prosperity_4: "[maresh_prosperity|E]: Grand (4)"
 maresh_prosperity_4_desc: "The city of Maresh is truly the envy of the world. Few would contest anyone who claims that Maresh is one of the most abundant and influential metropolises along the Dune Sea trade routes."
 maresh_prosperity_5: "[maresh_prosperity|E]: Unmatched (5)"
 maresh_prosperity_5_desc: "Maresh has become a beacon of [Concept('haradrim', 'Haradron')|E] civilization, where peoples from all across the great deserts meet. It has grown far beyond the wildest imagination of its founders, to the point of nessecitating significant irrigational infrastructure to keep its people hydrated. Visible from many miles away, its spires and towers welcome all into this shining jewel of an oasis."
 RICE_sus_ziz_hydraulics: "Expanded Water Resources in Maresh"
 RICE_sus_ziz_hydraulics_desc: "A number of hydraulic infrastructure projects by the Rysis River, such as dams, canals, and more, have expanded the pool of water available to the inhabitants of Maresh and connected various local bodies of waters like the Rysis River itself to springs across the oasis."
 RICE_sus_ziz_hydraulics_person: "Coordinated Hydraulics Projects along the Rysis"
 RICE_sus_ziz_hydraulics_person_desc: "This leader did their part in planning and managing a number of important hydraulics projects along the Rysis River, such as dams, canals, diverting the Rysis, and more. The river is a crucial part of the geography of the city of Maresh, a major economic center in Arysis."
 RICE_sus_currently_trans_haradric_networking: "Networking with Trans-Haradric Merchants"
 trans_haradric_trade_deal_nearharad_merchants: "Promoting [trans_haradric_trade|E] with Merchants from [nearharad|E]"
 trans_haradric_trade_deal_farharad_merchants: "Promoting [trans_haradric_trade|E] with Merchants from [farharad|E]"
 trans_haradric_trade_deal_khy_merchants: "Promoting [trans_haradric_trade|E] with Merchants from Khy"
 trans_haradric_trade_deal_sirayn_merchants: "Promoting [trans_haradric_trade|E] with Merchants from Sîrayn"
 RICE_sus_wall_tafilalt: "Walls and Gates of Tafilalt Oasis"
 RICE_sus_wall_tafilalt_desc: "A network of impressive walls and gates surround much of the Tafilalt Oasis, stretching beyond even the city of Maresh at the center. Such fortifications help protect the trade coming through here."
 RICE_sus_lamta_leather: "Troops Equipped with Lamta Hide Shields and Armor"
 arani_outposts_modifier: "Arani Outposts"
 arani_outposts_modifier_desc: "A small community of Arani tribesmen has settled the area. They now protect the local trade routes from bandits and escort merchant caravans."
 new_qanat_modifier: "New Qanat Recently Built"
 local_qanat_repaired_modifier: "Local Qanat Repaired"
 local_qanat_expanded_modifier: "Local Qanat Expanded"
 repaired_qanat_character_modifier: "Provided Funds to Repair a Local Qanat"
 expanded_qanat_character_modifier: "Provided Funds to Expand a Local Qanat"
 RICE_sus_ksar_maintenance_issues: "Dilapidated Ksars"
 RICE_sus_ksar_maintenance_issues_desc: "Locals do not have enough resources and money to maintain several #italic ksars#! (fortified villages) in this region. As a result, local trade routes are more susceptible to bandits and raiders."
 maresh_canal_issues: "Problems with the Mekhor"
 maresh_canal_issues_desc: "Locals currently do not have enough resources to adequately maintain the Mekhor, Maresh's central canal, that is essential for providing clean water and assisting in improving the land's fertility."
 maresh_goldsmiths: "Goldsmiths Recently Set Up Shop In Maresh"
 maresh_glazed_ceramics: "High Demand for Glazed Ceramics from Maresh"
 kjhana_oil_gift: "Kjhana Oil"
 kjhana_oil_gift_desc: "This character has access to a flask of Kjhana Oil, a powerful medicinal substance made from the fruit and sap of the rare Kjhana tree. The Kjhana only grows in [GetTitleByKey('d_naishan').GetNameNoTier], a remote region of northern Harshandatt."
 maresh_newly_arrived_settlers: "New Settlers in Maresh"
 maresh_newly_arrived_settlers_desc: "Groups of adventurers, exiles, merchants, refugees, religious dissidents, and others have gathered from many faraway lands to settle in the burgeoning oasis of Maresh. Though they are a ragtag band of outcasts and misfits, they bring a wide range of perspectives and skills to their new home. It will be hard at first for them to coexist peacefully, but if they can learn to work together, there is little doubt that they can plant the seeds for Maresh's future prosperity!"
 
 RICE_bozo_mud_masons_general_modifier: "Employing Mud Masons (General $game_concept_holdings$)"
 RICE_bozo_mud_masons_general_modifier_desc: "This character has a contract with a local guild of Sîrayni [mud_masons|E] for projects related to the construction and maintenance of various [buildings|E] across all [holding_types|E]."
 RICE_bozo_mud_masons_castle_modifier: "Employing Mud Masons ($game_concept_castle_holdings$)"
 RICE_bozo_mud_masons_castle_modifier_desc: "This character has a contract with a local guild of Sîrayni [mud_masons|E] for projects related to the construction and maintenance of [buildings|E] within their [castle_holdings|E]."
 RICE_bozo_mud_masons_city_modifier: "Employing Mud Masons ($game_concept_city_holdings$)"
 RICE_bozo_mud_masons_city_modifier_desc: "This character has a contract with a local guild of Sîrayni [mud_masons|E] for projects related to the construction and maintenance of [buildings|E] within their [city_holdings|E]."
 RICE_bozo_mud_masons_church_modifier: "Employing Mud Masons ($game_concept_church_holdings$)"
 RICE_bozo_mud_masons_church_modifier_desc: "This character has a contract with a local guild of Sîrayni [mud_masons|E] for projects related to the construction and maintenance of [buildings|E] within their [church_holdings|E]."
 RICE_bozo_mud_masons_settlement_modifier: "Employing Mud Masons ($game_concept_settlement_holdings$)"
 RICE_bozo_mud_masons_settlement_modifier_desc: "This character has a contract with a local guild of Sîrayni [mud_masons|E] for projects related to the construction and maintenance of [buildings|E] within their [settlement_holdings|E]."
 RICE_bozo_mud_masons_general_modifier_jenne: "Employing Mud Masons of Selena (General $game_concept_holdings$)"
 RICE_bozo_mud_masons_general_modifier_jenne_desc: "This character has a contract with the illustrious [mud_masons|E] guild of the ancient city of Selena, for projects related to the construction and maintenance of various [buildings|E] across all [holding_types|E]."
 RICE_bozo_mud_masons_castle_modifier_jenne: "Employing Mud Masons of Selena ($game_concept_castle_holdings$)"
 RICE_bozo_mud_masons_castle_modifier_jenne_desc: "This character has a contract with the illustrious [mud_masons|E] guild of the ancient city of Selena, for projects related to the construction and maintenance of [buildings|E] within their [castle_holdings|E]."
 RICE_bozo_mud_masons_city_modifier_jenne: "Employing Mud Masons of Selena ($game_concept_city_holdings$)"
 RICE_bozo_mud_masons_city_modifier_jenne_desc: "This character has a contract with the illustrious [mud_masons|E] guild of the ancient city of Selena, for projects related to the construction and maintenance of [buildings|E] within their [city_holdings|E]."
 RICE_bozo_mud_masons_church_modifier_jenne: "Employing Mud Masons of Selena ($game_concept_church_holdings$)"
 RICE_bozo_mud_masons_church_modifier_jenne_desc: "This character has a contract with the illustrious [mud_masons|E] guild of the ancient city of Selena, for projects related to the construction and maintenance of [buildings|E] within their [church_holdings|E]."
 RICE_bozo_mud_masons_settlement_modifier_jenne: "Employing Mud Masons of Selena ($game_concept_settlement_holdings$)"
