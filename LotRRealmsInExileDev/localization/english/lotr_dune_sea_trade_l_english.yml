 RICE_bozo_establish_namalo_decision: "Yield the Spice Trade to the Namâlo"
 RICE_bozo_establish_namalo_decision_tooltip: "Recognize and promote the [namalo|E] to facilitate the spice trade with [farharad|E]"
 RICE_bozo_establish_namalo_decision_desc: "A group of merchants called the [namalo|E] are slowly gaining influence in [GetGeographicalRegion('middleearth_harad_bayoformal_sirayn').GetName]. If we officially recognized them, and tasked them with managing the spice trade through their merchant networks, we could mutually benefit, as they can transport our spices into [farharad|E] and beyond."
 RICE_bozo_establish_namalo_decision_effect_tooltip_1: "Other [cultures|E] in [GetGeographicalRegion('middleearth_harad').GetName] can now unlock the #V $innovation_namalo$#! [innovation|E] if their [culture_head|E] takes the [decision|E] to #V Integrate Namâlo into Local Communities#!"
 RICE_bozo_establish_namalo_decision_effect_tooltip_2: "The #V $innovation_namalo$#! [innovation|E] in turn unlocks the [decision|E] to #V $RICE_bozo_namalo_synergy_decision$#!"
 RICE_bozo_establish_namalo_decision_confirm: "The spice must flow!"
 RICE_bozo_bring_in_namalo: "Integrate Namâlo into [ROOT.Char.GetCulture.GetNameNoTooltip] Communities"
 RICE_bozo_bring_in_namalo_tooltip: "The [namalo|E] could help our communities greatly."
 RICE_bozo_bring_in_namalo_desc: "The [namalo|E] merchants originally controlled the spice trade from Sîrayn, but they have diversified their business over the years by expanding into other lands, to trade in many other goods. We should take the initiative to have them integrate [ROOT.Char.GetCulture.GetName] communities into their networks."
 RICE_bozo_bring_in_namalo_effect_tooltip_1: "[THIS.Char.GetCulture.GetName] [rulers|E] will now be able to access other [namalo|E] mechanics, like the [decision|E] to $RICE_bozo_namalo_synergy_decision$"
 RICE_bozo_bring_in_namalo_confirm: "The Namâlo are welcome in [ROOT.Char.GetCulture.GetNameNoTooltip] lands!"
 RICE_bozo_namalo_synergy_decision: "Synergize with the Namâlo"
 RICE_bozo_namalo_synergy_decision_tooltip: "The [namalo|E] could contribute much to our civilization."
 RICE_bozo_namalo_synergy_decision_desc: "The [namalo|E] have embedded themselves in [ROOT.Char.GetCulture.GetName] communities for quite some time now. [ROOT.Char.GetPrimaryTitle.GetNameNoTier] benefits much from their mercantile enterprise, but if we can find other opportunities to work with the [namalo|E], we could benefit even more!"
 RICE_bozo_namalo_synergy_decision_effect_tooltip_1: "You will choose between different types of synergy"
 RICE_bozo_namalo_synergy_decision_effect_tooltip_2: "Every [county|E] you directly own in [GetPlayer.GetCapitalLocation.GetCounty.GetTitle.GetDeJureLiege.GetNameNoTier] gets a [county_modifier|E] depending on what type of synergy you choose, and a small, random amount of [development_growth|E]"
