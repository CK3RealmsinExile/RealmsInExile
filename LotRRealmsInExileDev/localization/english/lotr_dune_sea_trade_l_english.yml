 RICE_bozo_establish_wangara_decision: "Create Namâlo Gold Monopoly"
 RICE_bozo_establish_wangara_decision_tooltip: "Allow the [namalo|E] to establish a monopoly over Mali's gold mines to maximize profit."
 RICE_bozo_establish_wangara_decision_desc: "A group of Mande-speaking merchants called the [namalo|E] are gaining much influence over the gold mines of [GetGeographicalRegion('middleearth_harad').GetName]. If we help them create a monopoly over the gold mines, we could mutually benefit, as they also seek to expand their business elsewhere as well."
 RICE_bozo_establish_wangara_decision_effect_tooltip_1:1 "Other [cultures|E] in [GetGeographicalRegion('middleearth_harad').GetName] can now unlock the $innovation_RICE_wangara$ [innovation|E] if their [culture_head|E] or a powerful [ruler|E] takes the [decision|E] to $RICE_bozo_bring_in_wangara$"
 RICE_bozo_establish_wangara_decision_effect_tooltip_2:1 "The $innovation_RICE_wangara$ [innovation|E] in turn unlocks the [decision|E] to $RICE_bozo_wangara_synergy_decision$"
 RICE_bozo_establish_wangara_decision_confirm: "The gold must flow!"
 RICE_bozo_wangara_mine_req: "You own at least #V 2#! [counties|E] that have the [GetBuilding('mali_mines_01').GetName] [building|E] or its upgrades"
 RICE_bozo_bring_in_wangara: "Integrate Namâlo into [ROOT.Char.GetCulture.GetNameNoTooltip] Communities"
 RICE_bozo_bring_in_wangara_tooltip: "The [namalo|E] could help our communities greatly."
 RICE_bozo_bring_in_wangara_desc: "The [namalo|E] merchants originally controlled Mali's gold mines, but they have diversified their business over the years by expanding into other lands, to trade in goods besides gold. We should take the initiative to have them integrate [ROOT.Char.GetCulture.GetName] communities into their networks."
 RICE_bozo_bring_in_wangara_effect_tooltip_1:1 "[THIS.Char.GetCulture.GetName] [rulers|E] will now be able to access other [namalo|E] mechanics, like the [decision|E] to $RICE_bozo_wangara_synergy_decision$"
 RICE_bozo_bring_in_wangara_confirm: "The Namâlo are welcome in [ROOT.Char.GetCulture.GetNameNoTooltip] lands!"
 RICE_bozo_wangara_synergy_decision: "Synergize with the Namâlo"
 RICE_bozo_wangara_synergy_decision_tooltip: "The [namalo|E] could contribute much to our civilization."
 RICE_bozo_wangara_synergy_decision_desc: "The [namalo|E] have embedded themselves in [ROOT.Char.GetCulture.GetName] communities for quite some time now. [ROOT.Char.GetPrimaryTitle.GetNameNoTier] benefits much from their mercantile enterprise, but if we can find other opportunities to work with the [namalo|E], we could benefit even more!"
