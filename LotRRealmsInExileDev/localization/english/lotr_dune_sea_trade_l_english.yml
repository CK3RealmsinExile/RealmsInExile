l_english:

 # Misc
 RICE_not_tribal_government_req: "Your [government|E] is not [GetGovernment( 'tribal_government' ).GetName]"
 maresh_prosperity_1_requirement_desc: "[sijilmasa_prosperity|E] must be #M 1 or higher#!"
 maresh_prosperity_2_requirement_desc: "[sijilmasa_prosperity|E] must be #M 2 or higher#!"
 maresh_prosperity_3_requirement_desc: "[sijilmasa_prosperity|E] must be #M 3 or higher#!"
 maresh_prosperity_4_requirement_desc: "[sijilmasa_prosperity|E] must be #M 4"
 RICE_sus_sijilmasa_mint_decision_requirement_desc: "Can only be constructed by taking the [decision|E] to #V $RICE_sus_establish_sijilmasa_mints$#!, which requires taking another decision to #V $RICE_sus_establish_sijilmasa_mints$#!"
 RICE_trans_saharan_merchants_option: "Dune Sea Merchants"
 RICE_trans_saharan_merchants_option_desc: "Although traveling with a large caravan of merchants might slow the journey down, there is safety in numbers. These traders are experienced in traversing the diverse landscapes of Africa, and traveling with them might offer the chance for an occasional business opportunity!"
 RICE_transharadric_geographical_req: "You own a [county|E] or [domicile|E] in [GetGeographicalRegion('middleearth_harad').GetName]"
 RICE_trans_saharan_trade_region: "Dune Sea Trade Region"
 innovation_RICE_wangara: "Namâlo Networks"
 innovation_RICE_wangara_desc: "The Namâlo are a group of influential merchants who operate across West Africa. By integrating them into our communities, they can improve the flow of trade in our territories and connect us with faraway lands."
 RICE_trans_saharan_decision_unlocked_desc: "Unlocks the [decision|E] to Network with [trans_saharan_merchants|E]"
 RICE_wangara_decision_desc: "Unlocks the [decision|E] to Synergize with the [namalo|E]"
 RICE_wangara_decision_done_req_text: "The [decision|E] to $RICE_bozo_establish_wangara_decision$ must be taken by whoever controls the $building_type_mali_mines_01$"
 death_sacrificed_to_ancestor: "was sacrificed at the burial of an ancestor"
 death_sacrificed_to_ancestor_killer:1 "was sacrificed at the burial of [TARGET_CHARACTER.GetUINamePossessive] ancestor"
 RICE_you_are_culture_head_req:1 "You are the [culture_head|E]"
 tapama_djenepo:1 "Tapama Djenepo"
 ghw_region_the_sahel:1 "The Sahel"
 culture_in_harshandatt_trigger_desc:1 "At least #V 4#! [counties|E] of this [culture|E] are in [GetGeographicalRegion('middleearth_harad_bayoformal_harshandatt').GetName]"
 activity_RICE_bozo_local_pilgrimage_host_desc:1 "\n$BULLET_WITH_TAB$Gain [piety_i|E][piety|E]\n$BULLET_WITH_TAB$Lose [stress_loss_i|E] [stress|E]\n$BULLET_WITH_TAB$[GetTrait('pilgrim').GetName( GetNullCharacter )] [trait|E] / [GetTrait('pilgrim').GetName( GetNullCharacter )] [trait_level_track_xp|E]"
 
 # Buildings
 building_type_RICE_sus_argan_forest_01:0 "Argan Forests"
 building_type_RICE_sus_argan_forest_01_desc:0 "Argan is a kind of tree unique to southern Morocco, with a wide variety of practical uses."
 building_RICE_sus_argan_forest_01:0 "Argan Forests"
 building_RICE_sus_argan_forest_01_desc:0 "Argan is a special tree endemic to certain regions in southern Morocco. For centuries, locals have used the argan tree and its fruit for firewood, food, oil, and more. The tree also attract goats, who climb it to eat its fruit; when these fruit are spit out or excreted, they are much easier to process."
 building_RICE_sus_argan_forest_02:0 "Argan Groves"
 building_RICE_sus_argan_forest_02_desc:0 "Argan trees are now being managed in a more systematic and organized manner in this region, allowing for locals to acquire greater profit from its products given its rarity."
 building_RICE_sus_argan_forest_03:0 "Argan Gardens"
 building_RICE_sus_argan_forest_03_desc:0 "Argan forests can be found throughout this region, maintained by entire villages for a variety of purposes, ranging from local use to export to foreign markets. As such, the trees are bringing in much wealth."
 
 building_type_RICE_sus_sijilmasan_mints_01: "$building_RICE_sus_sijilmasan_mints_01$"
 building_type_RICE_sus_sijilmasan_mints_01_desc: "$building_RICE_sus_sijilmasan_mints_01_desc$"
 building_RICE_sus_sijilmasan_mints_01: "Arsasan Mints"
 building_RICE_sus_sijilmasan_mints_01_desc: "For [trans_saharan_merchants|E] involved in the trade of gold, Arsasak is usually the next place they visit after a night of respite in the Oasis of Maresh. Local rulers have capitalized on the large amount of gold flowing through here to turn Sijilmasa into a major minting center. The coins produced here are renowned throughout [harad|E] for their quality, and feature a hole so they may be worn on a string. The strings cost extra, of course."
 
 building_type_selena_mud_masons_01: "$building_selena_mud_masons_01$"
 building_type_selena_mud_masons_01_desc: "$building_selena_mud_masons_01_desc$"
 building_selena_mud_masons_01: "Mason's Guild of Selena"
 building_selena_mud_masons_01_desc: "The mason's guild of Selena are highly renowned for their skills in [mud_masonry|E], honed to perfection over many generations. Their knowledge, which has sacred dimensions, is greatly respected across the region."
 building_selena_mud_masons_02: "Temple-City of Selena"
 building_selena_mud_masons_02_desc: "Through the tireless efforts of the mason's guild, Selena has been transformed into a marvellous walled temple-city, each spire a testament to its' builders' skill in [mud_masonry|E]."
 selena_mud_masons_effect_desc: "$unlocks_building_desc$Unlocks the #V $RICE_bozo_mud_masons_decision$#! [decision|E] even if your [culture|E] does not have the [GetCultureTradition('tradition_RICE_african_mud_masons').GetName] [tradition|E]\n\nImproves the #V $RICE_bozo_mud_masons_decision$#! [decision|E] if your [culture|E] already has access to it"

 # Game Concepts
 game_concept_sijilmasa_prosperity: "Maresh's Prosperity"
 game_concept_sijilmasa_prosperity_desc: "The [county|E] of Maresh always has a [county_modifier|E], called $game_concept_sijilmasa_prosperity$, that represents its economic and political influence as one of the most important trade centers of [harad|E], serving as a nexus for [trans_saharan_merchants|E].\n\nThere are several levels to this modifier, and in order to increase its level, you need to take various [decisions|E] to improve Maresh. These decisions require you to\n\n$BULLET_WITH_TAB$#V $RICE_sus_resolve_conflicts_in_sijilmasa$#!\n$BULLET_WITH_TAB$#V $RICE_sus_establish_sijilmasa_mints$#!\n$BULLET_WITH_TAB$#V $RICE_sus_divert_and_dam_ziz_river$#!\n$BULLET_WITH_TAB$#V $RICE_sus_wall_the_oasis$#!\n\nDepending on the start date, some or most of these may already have been completed. Besides increasing $game_concept_sijilmasa_prosperity$, these decisions provide various benefits as well."
 game_concept_trans_saharan_merchant: "Dune Sea Merchant"
 game_concept_trans_saharan_merchants: "Dune Sea Merchants"
 game_concept_trans_saharan_merchants_desc: "If you own territory in [GetGeographicalRegion('middleearth_harad').GetName], there is a chance a $game_concept_trans_saharan_merchant$ will spawn in your [court|E] every now and then. You can choose to make use of their connections, which grants you a [character_modifier|E] boosting your [income|E] as well as granting other bonuses, depending on which cultural or ethnic group they come from (either Berber, Arab, West African, or Jewish). You can get these bonuses even if you do not invite them into your court.\n\nThe #V Dune Sea Trade#! dynasty track has a couple [dynasty_perks|E] that improve this mechanic. The first one in the track, #V Ships of the Desert#!, increases the chances these events trigger. The third, #V Gold and Salt#!, unlocks a [decision|E], #V Network with Dune Sea Merchants#!, which increases the chances of these events triggering even more for a short duration of time, while providing other economic bonuses."
 game_concept_namalo: "Namâlo"
 game_concept_namalo_desc: "The Namâlo were a group of Bellanarûd merchants who played a major role in medieval and early modern African economic history. They were a composite of several Mande-speaking peoples, and the term had different meanings in different contexts.\n\nOnce a [ruler|E] who controls the gold mines of West Africa takes the [decision|E] to $RICE_bozo_establish_wangara_decision$, Namâlo content is unlocked through the $innovation_RICE_wangara$ [innovation|E]. This [innovation|E] is gained in a few ways: either naturally through the normal process of gaining an [innovation|E]; through the [decision|E] to $RICE_bozo_establish_wangara_decision$; or through a [decision|E] to Integrate the Namâlo into the Communities of your [culture|E]. The latter two allow you to gain the [innovation|E] an [era|E] early.\n\nBesides its base benefits, the [innovation|E] has other advantages, too. For instance, it unlocks the [decision|E] to $RICE_bozo_wangara_synergy_decision$, which can provide your [counties|E] with useful bonuses."
 game_concept_mud_masonry: "Mud Masonry"
 game_concept_mud_mason: "Mud Mason"
 game_concept_mud_masons: "Mud Masons"
 game_concept_mud_masons_desc: "The $tradition_RICE_african_mud_masons_name$ [tradition|E], available to certain [cultures|E] in Sîrayn, enables a [decision|E] to $RICE_bozo_mud_masons_decision$, which grants you a [character_modifier|E] which reduces the cost and time to construct [buildings|E].\n\nIf you control the [county|E] of $c_selena$, you do not need the [tradition|E] to access the [decision|E], and the [decision|E] gives you more powerful versions of the [modifiers|E] in question"

 # Traits
 trait_RICE_trans_saharan_merchant: "Dune Sea Merchant"
 trait_RICE_trans_saharan_merchant_desc: "This character is a prominent merchant along the Dune Sea trade routes criss-crossing [harad|E]. They have experience in the arts of trade, travel, and negotiation."
 trait_RICE_trans_saharan_merchant_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] is a prominent merchant along the Dune Sea trade routes criss-crossing [harad|E]. [ROOT.GetCharacter.GetSheHe|U] has experience in the arts of trade, travel, and negotiation."
 trait_RICE_trans_saharan_merchant_2: "Renowned Dune Sea Merchant"
 trait_RICE_trans_saharan_merchant_2_desc: "$trait_RICE_trans_saharan_merchant_desc$"
 trait_RICE_trans_saharan_merchant_2_character_desc: "$trait_RICE_trans_saharan_merchant_character_desc$"
 trait_RICE_trans_saharan_merchant_3: "Legendary Dune Sea Merchant"
 trait_RICE_trans_saharan_merchant_3_desc: "$trait_RICE_trans_saharan_merchant_desc$"
 trait_RICE_trans_saharan_merchant_3_character_desc: "$trait_RICE_trans_saharan_merchant_character_desc$"
 trait_track_RICE_trans_saharan_merchant: "$trait_RICE_trans_saharan_merchant$"
 trait_track_RICE_trans_saharan_merchant_desc: "From savannas to deserts and forests, [harad|E] is a bountiful land, with many opportunities for the wise and cunning, who know its peoples, kingdoms, and markets well."

 # Cultural Traditions
 tradition_RICE_masters_of_the_river_name: "Masters of the River"
 tradition_RICE_masters_of_the_river_desc: "This culture has been proclaimed by outsiders as 'Masters of the River' or 'Masters of the Waters' for their expertise in fishing and navigating the Niger River and its tributaries. It is said they possess a natural understanding of the Niger River that few others have." #PLACEHOLDER
 tradition_RICE_african_mud_masons_name: "Mud Masons"
 tradition_RICE_african_mud_masons_desc: "The masons of this culture are renowned for constructing elaborate architecture from mud. They are organized into guilds with a complex hierarchal structure, which enforces traditional religious rituals associated with their work and ensures their ancient masonry skills are passed down from generation to generation in the proper manner."
 culture_parameter_unlock_rice_sogo_ba_masquerade: "Unlocks the [decision|E] to Hold the Sogo Ba Masquerade"
 culture_parameter_unlock_rice_african_mud_mason_decision: "Unlocks the [decision|E] to Employ Sîrayni [mud_masons|E] to reduce the cost and time to construct [buildings|E] even further, for those who are of this [culture|E] or rule over [counties|E] of this [culture|E]"
 culture_parameter_unlock_rice_trans_saharan_merchant_decision: "$RICE_trans_saharan_decision_unlocked_desc$"
 culture_parameter_unlock_rice_trans_saharan_merchant_better_chances: "$RICE_trans_saharan_trade_legacy_1_effect$"
 culture_parameter_unlock_rice_wangara_era_early: "Unlocks the [decision|E] to Integrate [namalo|E] Merchant Communities, and thus gain access to the $innovation_RICE_wangara$ [innovation|E] and [namalo|E] mechanics, earlier in the $culture_era_early_medieval$ rather than the $culture_era_high_medieval$ [era|E]"
 tradition_RICE_gold_dust_traders_name: "Gold, Salt and Spice" #Originally Gold Dust Traders
 tradition_RICE_gold_dust_traders_desc: "The people of this culture are heavily involved in the transport and trade network of Inner [harad|E]. No matter their role in the trade, they are major actors in the commercial, political, and cultural networks that surround [GetGeographicalRegion('middleearth_harad_dunesea').GetName], and are known for trading in gold, spices, salt, slaves, and other products."


 # Modifiers
 acadeh_date_farms_modifier: "Date Farms of Acâdoki Valley"
 acadeh_date_farms_modifier_desc: "The Acâdoki river valley serves as the date basket of Khy, producing bountiful amounts of succulent dates. Said to be the sweetest in the whole world, great varieties of dates have been grown here for generations, some with recorded trees of ancestry comparable to noble houses."
 RICE_sus_sijilmasa_prosperity_0: "[sijilmasa_prosperity|E]: Poor (0)"
 RICE_sus_sijilmasa_prosperity_0_desc: "Ever since the death of its ruthless yet capable leader Abu Muntasir in 823 CE, Maresh has suffered from political instability. His descendants have squabbled among themselves, and the city's people, a diverse group, constantly shift their allegiance from one heir to another. As a result, the region's economy and standard of life are in decline."
 RICE_sus_sijilmasa_prosperity_1: "[sijilmasa_prosperity|E]: Low (1)"
 RICE_sus_sijilmasa_prosperity_1_desc: "Maresh's future look promising as its people work together to develop the city's infrastructure and expand its trade networks across the Sahara. Though it will take time, the city is on the right track."
 RICE_sus_sijilmasa_prosperity_2: "[sijilmasa_prosperity|E]: Medium (2)"
 RICE_sus_sijilmasa_prosperity_2_desc: "The people of Maresh are doing well as the economy expands rapidly. Traders are starting to flock to the city, and a number of learned and skilled people of all backgrounds have settled here."
 RICE_sus_sijilmasa_prosperity_3: "[sijilmasa_prosperity|E]: High (3)"
 RICE_sus_sijilmasa_prosperity_3_desc: "Times are good in Maresh. As a major conduit for trade in the western Maghreb, myriads of traders pass through the city regularly, and it is quickly becoming a major center for learning."
 RICE_sus_sijilmasa_prosperity_4: "[sijilmasa_prosperity|E]: Grand (4)"
 RICE_sus_sijilmasa_prosperity_4_desc: "The city of Maresh is truly the envy of the world. Few would contest anyone who claims that Maresh is one of the most abundant and influential metropolises along the Dune Sea trade routes."
 RICE_sus_sijilmasa_prosperity_4: "[sijilmasa_prosperity|E]: Unmatched (4)"
 RICE_sus_sijilmasa_prosperity_4_desc: "Maresh has become a beacon of [Concept('haradrim', 'haradron')|E] civilization, where peoples from all across the great deserts meet. It has grown far beyond the wildest imagination of its founders, to the point of nessecitating significant irrigational infrastructure to keep its people hydrated. Visible from many miles away, its spires and towers welcome all into this shining jewel of an oasis."
 RICE_sus_ziz_hydraulics: "Expanded Water Resources in Maresh"
 RICE_sus_ziz_hydraulics_desc: "A number of hydraulic infrastructure projects by the Rysis River, such as dams, canals, and more, have expanded the pool of water available to the inhabitants of Maresh and connected various local bodies of waters like the Rysis River itself to springs across the oasis."
 RICE_sus_ziz_hydraulics_person: "Coordinated Hydraulics Projects along the Rysis"
 RICE_sus_ziz_hydraulics_person_desc: "This leader did their part in planning and managing a number of important hydraulics projects along the Rysis River, such as dams, canals, diverting the Rysis, and more. The river is a crucial part of the geography of the city of Maresh, a major economic center in the western Maghreb."
 RICE_sus_currently_trans_saharan_networking: "Networking with Dune Sea Merchants"
 RICE_sus_apprentice_trans_saharan_merchant: "Dune Sea Merchant"
 RICE_sus_apprentice_trans_saharan_merchant_desc: "This character was originally a merchant who did business along the Dune Sea trade routes of North Africa and the Sahel."
 RICE_sus_experienced_trans_saharan_merchant: "Accomplished Dune Sea Merchant"
 RICE_sus_experienced_trans_saharan_merchant_desc: "This character was originally a merchant who did business along the Dune Sea trade routes of North Africa and the Sahel. Capable in business, they were able to earn for themselves quite a bit of gold during this time."
 RICE_sus_master_trans_saharan_merchant: "Renowned Dune Sea Merchant"
 RICE_sus_master_trans_saharan_merchant_desc: "This character was originally a merchant who did business along the Dune Sea trade routes of North Africa and the Sahel. Considered one of the great traders of the day, they amassed quite a fortune during that time."
 RICE_sus_trade_deal_arab_merchants: "Promoting Dune Sea Trade with Arab Merchants"
 RICE_sus_trade_deal_berber_merchants: "Promoting Dune Sea Trade with Haruze Merchants"
 RICE_sus_trade_deal_jewish_merchants: "Promoting Dune Sea Trade with Arani Merchants"
 RICE_sus_trade_deal_west_african_merchants: "Promoting Dune Sea Trade with Bellanarûd Merchants"
 RICE_sus_wall_tafilalt: "Walls and Gates of Tafilalt Oasis"
 RICE_sus_wall_tafilalt_desc: "A network of impressive walls and gates surround much of the Tafilalt Oasis, stretching beyond even the city of Maresh at the center. Such fortifications help protect the trade coming through here."
 RICE_sus_lamta_leather: "Troops Equipped with Lamta Hide Shields and Armor"
 RICE_sus_growing_ksar: "Expanding Ksar"
 RICE_sus_growing_ksar_desc: "One of the #italic ksars#! (fortified villages) in this region has grown significantly recently. It is protecting local trade routes and deterring raiders."
 RICE_sus_new_foggara: "New Foggara Recently Built"
 RICE_sus_repaired_local_foggara: "Local Foggara Repaired"
 RICE_sus_expanded_local_foggara: "Local Foggara Expanded"
 RICE_sus_repaired_local_foggara_character: "Provided Funds to Repair a Local Foggara"
 RICE_sus_expanded_local_foggara_character: "Provided Funds to Expand a Local Foggara"
 RICE_sus_ksar_maintenance_issues: "Dilapidated Ksars"
 RICE_sus_ksar_maintenance_issues_desc: "Locals do not have enough resources and money to maintain several #italic ksars#! (fortified villages) in this region. As a result, local trade routes are more susceptible to bandits and raiders."
 RICE_sus_midrariya_issues: "Problems with the Mekhor"
 RICE_sus_midrariya_issues_desc: "Locals currently do not have enough resources to adequately maintain the Mekhor, Maresh's central canal, that is essential for providing clean water and assisting in improving the land's fertility."
 RICE_sus_sijilmasa_goldsmiths: "Goldsmiths Recently Set Up Shop In Maresh"
 RICE_sus_sijilmasa_glazed_ceramics: "High Demand for Glazed Ceramics from Maresh"
 RICE_sus_eating_amlu: "Eating Lots of Amlu"
 RICE_sus_eating_amlu_desc: "This character’s cooks have a large stock of argan oil, which they mix with honey, and almonds that have been toasted and crushed, to create a tasty spread called #italic Amlu#!."
 RICE_sus_sijilmasa_newly_arrived_settlers: "New Settlers in Maresh"
 RICE_sus_sijilmasa_newly_arrived_settlers_desc: "Groups of adventurers, exiles, merchants, refugees, religious dissidents, and others have gathered from many faraway lands to settle in the burgeoning oasis of Maresh. Though they are a ragtag band of outcasts and misfits, they bring a wide range of perspectives and skills to their new home. It will be hard at first for them to coexist peacefully, but if they can learn to work together, there is little doubt that they can plant the seeds for Maresh's future prosperity!"
 
 RICE_bozo_mud_masons_general_modifier: "Employing Mud Masons (General $game_concept_holdings$)"
 RICE_bozo_mud_masons_general_modifier_desc: "This character has a contract with a local guild of Sîrayni [mud_masons|E] for projects related to the construction and maintenance of various [buildings|E] across all [holding_types|E]."
 RICE_bozo_mud_masons_castle_modifier: "Employing Mud Masons ($game_concept_castle_holdings$)"
 RICE_bozo_mud_masons_castle_modifier_desc: "This character has a contract with a local guild of Sîrayni [mud_masons|E] for projects related to the construction and maintenance of [buildings|E] within their [castle_holdings|E]."
 RICE_bozo_mud_masons_city_modifier: "Employing Mud Masons ($game_concept_city_holdings$)"
 RICE_bozo_mud_masons_city_modifier_desc: "This character has a contract with a local guild of Sîrayni [mud_masons|E] for projects related to the construction and maintenance of [buildings|E] within their [city_holdings|E]."
 RICE_bozo_mud_masons_church_modifier: "Employing Mud Masons ($game_concept_church_holdings$)"
 RICE_bozo_mud_masons_church_modifier_desc: "This character has a contract with a local guild of Sîrayni [mud_masons|E] for projects related to the construction and maintenance of [buildings|E] within their [church_holdings|E]."
 RICE_bozo_mud_masons_general_modifier_jenne: "Employing Mud Masons of Selena (General $game_concept_holdings$)"
 RICE_bozo_mud_masons_general_modifier_jenne_desc: "This character has a contract with the #italic barey ton#!, or guild, of [mud_masons|E] from the ancient city of Selena, for projects related to the construction and maintenance of various [buildings|E] across all [holding_types|E]."
 RICE_bozo_mud_masons_castle_modifier_jenne: "Employing Mud Masons of Selena ($game_concept_castle_holdings$)"
 RICE_bozo_mud_masons_castle_modifier_jenne_desc: "This character has a contract with the #italic barey ton#!, or guild, of [mud_masons|E] from the ancient city of Selena, for projects related to the construction and maintenance of [buildings|E] within their [castle_holdings|E]."
 RICE_bozo_mud_masons_city_modifier_jenne: "Employing Mud Masons of Selena ($game_concept_city_holdings$)"
 RICE_bozo_mud_masons_city_modifier_jenne_desc: "This character has a contract with the #italic barey ton#!, or guild, of [mud_masons|E] from the ancient city of Selena, for projects related to the construction and maintenance of [buildings|E] within their [city_holdings|E]."
 RICE_bozo_mud_masons_church_modifier_jenne: "Employing Mud Masons of Selena ($game_concept_church_holdings$)"
 RICE_bozo_mud_masons_church_modifier_jenne_desc: "This character has a contract with the #italic barey ton#!, or guild, of [mud_masons|E] from the ancient city of Selena, for projects related to the construction and maintenance of [buildings|E] within their [church_holdings|E]."
 RICE_bozo_recently_moved_Jenne: "Jenne Recently Relocated"
 RICE_bozo_recently_moved_Jenne_desc: "The old city of Selena has been abandoned, and a new city rebuilt in a location not too far from the previous site. This has reinvigorated the town's economy and connections with other trade entrepots."
 RICE_bozo_visited_tapama_djenepo_tomb: "Visited the Tomb of Tapama Djenepo"
 RICE_bozo_visited_tapama_djenepo_tomb_desc: "This character recently visited the tomb of Tapama Djenepo in Selena. According to legend, she was sacrificed so that the city could be built."
 RICE_bozo_wangara_political_synergy: "Namâlo Bureaucrats"
 RICE_bozo_wangara_political_synergy_desc: "This character has recently incorporated a number of [namalo|E] into their realm's administration."
 RICE_bozo_wangara_political_synergy_county: "Namâlo Political Synergy"
 RICE_bozo_wangara_political_synergy_county_desc: "Authorities have recently taken steps to integrate more [namalo|E] into the local administration and political networks of this region's communities."
 RICE_bozo_wangara_commercial_synergy: "Namâlo Business"
 RICE_bozo_wangara_commercial_synergy_desc: "This character has recently cooperated with the [namalo|E] to encourage trade in their realm."
 RICE_bozo_wangara_commercial_synergy_county: "Namâlo Commercial Synergy"
 RICE_bozo_wangara_commercial_synergy_county_desc: "Authorities have recently taken steps to assist the [namalo|E] with expanding their business operations and mercantile networks in this region's communities."
 RICE_bozo_wangara_cultural_synergy: "Namâlo Scholarship"
 RICE_bozo_wangara_cultural_synergy_desc: "This character has recently associated with [namalo|E] of scholarly background in their realm."
 RICE_bozo_wangara_cultural_synergy_county: "Namâlo Cultural Synergy"
 RICE_bozo_wangara_cultural_synergy_county_desc: "Authorities have recently taken steps to patronize [namalo|E] of scholarly background to improve the state of learning, religion, and art in this region's communities."
 RICE_bozo_new_mud_mason_contract: "New Mud Mason Contract"
 RICE_bozo_extra_protection_mud_masons: "Extra Protection from Mud Masons' Rituals"
 RICE_bozo_engaged_with_local_religious_practices: "Engaged with Local Religious Practices"

 # Decisions
 maresh_decision_header:0 "#M Maresh:#! "
 RICE_sus_resolve_conflicts_in_sijilmasa: "Resolve Maresh's Long-Standing Conflicts"
 RICE_sus_resolve_conflicts_in_sijilmasa_tooltip: "Civil strife has plagued the oasis of Maresh for too long!"
 RICE_sus_resolve_conflicts_in_sijilmasa_desc: "For many moons, Maresh has suffered constant factionalism and civil war. Many locals are growing tired of this, and I believe it is time to establish a more permanent peace. We need a system to resolve the conflicts between the many different peoples and caravans that meet at this nexus of Dune Sea Trade."
 RICE_sus_resolve_conflicts_in_sijilmasa_effect_tooltip: "The level of [sijilmasa_prosperity|E] increases"
 RICE_sus_resolve_conflicts_in_sijilmasa_effect_tooltip_2: "Unlocks the [decisions|E] to #V $RICE_sus_establish_sijilmasa_mints$#!, #V $RICE_sus_divert_and_dam_ziz_river$#!, and #V $RICE_sus_wall_the_oasis$#!"
 RICE_sus_resolve_conflicts_in_sijilmasa_confirm: "Gather prominent locals - it's time to meet."
 
 RICE_sus_establish_sijilmasa_mints: "Establish the Mints of Maresh"
 RICE_sus_establish_sijilmasa_mints_tooltip: "Order the construction of mints to produce coins."
 RICE_sus_establish_sijilmasa_mints_desc: "Maresh lies between the Maghreb on one hand, and West Africa where massive amounts of gold are mined, making it an excellent candidate for a future mint."
 RICE_sus_establish_sijilmasa_mints_effect_tooltip: "$RICE_sus_resolve_conflicts_in_sijilmasa_effect_tooltip$"
 RICE_sus_establish_sijilmasa_mints_effect_tooltip_2: "Can now build the [GetBuilding('RICE_sus_sijilmasan_mints_01').GetName] [special_building|E] in [GetTitleByKey('b_arsasak').GetNameNoTier]"
 RICE_sus_establish_sijilmasa_mints_requirement: "Your [dynasty|E] has unlocked the [GetDynastyPerk('lotr_haradrim_legacy_2').GetName] [dynasty_perk|E]"
 RICE_sus_establish_sijilmasa_mints_confirm: "Make preparations to do this."

 RICE_sus_divert_and_dam_ziz_river: "Divert and Dam the Rysis River"
 RICE_sus_divert_and_dam_ziz_river_tooltip: "Controlling the flow of the Rysis River may have its advantages."
 RICE_sus_divert_and_dam_ziz_river_desc: "The inhabitants of Maresh have continuously expanded its water resources over the years. Now, my engineers have presented new ideas for several hydraulic projects that would allow us to better control the Rysis River that flows through Maresh. This will maximize arable land and provide even more water to the locals."
 RICE_sus_divert_and_dam_ziz_river_effect_tooltip: "$RICE_sus_resolve_conflicts_in_sijilmasa_effect_tooltip$"
 RICE_sus_divert_and_dam_ziz_river_confirm: "Let's coordinate these efforts."
 piety_loss_because_of_sacred_waters_effect: "This may upset those whose [faith|E] has the [GetFaithDoctrine('tenet_sacred_waters').GetBaseName] [core_tenet|E]"

 RICE_sus_network_with_trans_saharan_merchants: "Network with Dune Sea Merchants"
 RICE_sus_network_with_trans_saharan_merchants_tooltip: "Build better relations with local traders"
 RICE_sus_network_with_trans_saharan_merchants_desc: "Many merchants travel along the Dune Sea trade routes in our territories, so we should take time to network with them. Building fruitful relationships with interested, ambitious merchants can benefit us both."
 RICE_sus_network_with_trans_saharan_merchants_effect_tooltip: "There is a high chance that a [trans_saharan_merchant|E] will spawn in your court and offer you a business deal in the next 5 years for as long as the [character_modifier|E] lasts (or until a merchant spawns). This chance varies depending on your [traits|E], [skills|E], and other factors."
 RICE_sus_network_with_trans_saharan_merchants_confirm: "It's time to network!"
 RICE_network_trans_saharan_decision_region_requirement: "Own a [county|E] in [GetGeographicalRegion('middleearth_harad').GetName]"
 RICE_sus_network_dynasty_perk_requirement: "Your [dynasty|E] has unlocked the [GetDynastyPerk('lotr_haradrim_legacy_3').GetName] [dynasty_perk|E]"
 RICE_sus_trade_networks_decision_once_requirement: "Has not taken this [decision|E] yet"

 RICE_sus_wall_the_oasis: "Wall the Maresh Oasis"
 RICE_sus_wall_the_oasis_tooltip: "We need adequate defenses around the Maresh area."
 RICE_sus_wall_the_oasis_desc: "Although Maresh's defenses are nothing to scoff at, they can be improved even further. Locals are recommending that we expand the city's fortifications to surround much of the Maresh Oasis."
 RICE_sus_wall_the_oasis_effect_tooltip: "$RICE_sus_resolve_conflicts_in_sijilmasa_effect_tooltip$"
 RICE_sus_wall_the_oasis_requirement: "Your [dynasty|E] has unlocked the [GetDynastyPerk('lotr_haradrim_legacy_3').GetName] [dynasty_perk|E]"
 RICE_sus_wall_the_oasis_confirm: "It shall be done."
 RICE_sus_attract_settlers_to_sijilmasa: "Attract Settlers to Maresh"
 RICE_sus_attract_settlers_to_sijilmasa_tooltip: "Maresh is a promising location for trade...."
 RICE_sus_attract_settlers_to_sijilmasa_desc: "Lately, various conflicts have driven many people from elsewhere to flee to [GetTitleByKey('k_arysis').GetNameNoTier]. Perhaps I can encourage some of these adventurers, merchants, refugees, and more to settle in Maresh. Despite their differences, their diverse perspectives can help the city grow and prosper. The oasis shows much promise as a potential trade center, so dominating the Dune Sea trade routes in this manner would be quite advantageous!" 
 RICE_sus_attract_settlers_to_sijilmasa_effect_tooltip_1: "Unlocks the [sijilmasa_prosperity|E] mechanic for [GetTitleByKey('c_maresh').GetNameNoTier]"
 RICE_sus_attract_settlers_to_sijilmasa_effect_tooltip_2: "$RICE_sus_resolve_conflicts_in_sijilmasa_effect_tooltip_2$"
 RICE_sus_attract_settlers_to_sijilmasa_confirm: "Let's do this!"
 RICE_sus_attract_settlers_to_sijilmasa_req: "Your [dynasty|E] has unlocked the [GetDynastyPerk('lotr_haradrim_legacy_1').GetName] [dynasty_perk|E]"
