 RICE_bozo_mud_masons_decision_desc: "The [GetPlayer.GetCulture.GetName] people have a long tradition of [mud_masonry|E]. I can, and should, call upon the guild of [mud_masons|E] in my realm to assist me with various construction projects. Their architectural and spiritual knowledge will ensure our buildings stand the test of time!"
