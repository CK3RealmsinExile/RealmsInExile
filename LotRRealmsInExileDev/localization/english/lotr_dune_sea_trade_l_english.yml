 # Decisions
 maresh_decision_header: "#M Maresh:#! "
 maresh_prosperity_capital_shift_tt: "Due to the rising prominence of [GetTitleByKey('c_maresh').GetNameNoTier] as a regional center of trade, it will replace [old_capital.GetNameNoTier] as the [de_jure|E] [capital|E] of [GetTitleByKey('k_arysis').GetNameNoTier]"
 RICE_sus_resolve_conflicts_in_maresh: "Resolve Maresh's Long-Standing Conflicts"
 RICE_sus_resolve_conflicts_in_maresh_tooltip: "Civil strife has plagued the oasis of Maresh for too long!"
 RICE_sus_resolve_conflicts_in_maresh_desc: "For many moons, Maresh has suffered constant factionalism and civil war. Many locals are growing tired of this, and I believe it is time to establish a more permanent peace. We need a system to resolve the conflicts between the many different peoples and caravans that meet at this nexus of [trans_haradric_trade|E]."
 RICE_sus_resolve_conflicts_in_maresh_effect_tooltip: "The level of [maresh_prosperity|E] #P increases#!"
 RICE_sus_resolve_conflicts_in_maresh_effect_tooltip_2: "Unlocks the [decisions|E] to #V $RICE_sus_establish_maresh_mints$#!, #V $RICE_sus_divert_and_dam_ziz_river$#!, and #V $RICE_sus_wall_the_oasis$#!"
 RICE_sus_resolve_conflicts_in_maresh_confirm: "Gather prominent locals - it's time to meet."
 
 RICE_sus_establish_maresh_mints: "Establish the Mints of Maresh"
 RICE_sus_establish_maresh_mints_tooltip: "Order the construction of mints to produce coins."
 RICE_sus_establish_maresh_mints_desc: "Maresh is an important nexus of Dune Sea trade. Merchants from [nearharad|E], [bellakar|E], the [ray|E], Khy and Sîrayn all meet here, transporting great quantities of gold. Combined with the rich copper deposits in the hills of Arysis, this makes [GetTitleByKey('b_arsasak').GetNameNoTier] an excellent candidate for a future mint."
 RICE_sus_establish_maresh_mints_effect_tooltip: "Can now construct the [GetBuilding('arsasan_mints_01').GetName] [special_building|E] in [GetTitleByKey('b_arsasak').GetNameNoTier]"
 RICE_sus_establish_maresh_mints_effect_tooltip_2: "$RICE_sus_resolve_conflicts_in_maresh_effect_tooltip$"
 RICE_sus_establish_maresh_mints_dynasty_perk_req: "Your [dynasty|E] has unlocked the [GetDynastyPerk('lotr_haradrim_legacy_2').GetName] [dynasty_perk|E]"
 RICE_sus_establish_maresh_mints_copper_mine_req: "A #V $building_type_copper_mines_01$#! must be built somewhere in [GetGeographicalRegion('middleearth_harad_dunesea_arysis').GetName] as part of your [realm|E]"
 RICE_sus_establish_maresh_mints_confirm: "Lets lay the groundwork."

 RICE_sus_divert_and_dam_ziz_river: "Divert and Dam the Rysis River"
 RICE_sus_divert_and_dam_ziz_river_tooltip: "Controlling the flow of the Rysis River may have its advantages."
 RICE_sus_divert_and_dam_ziz_river_desc: "The inhabitants of Maresh have continuously expanded its water resources over the years. Now, my engineers have presented new ideas for several hydraulic projects that would allow us to better control the Rysis River that flows through Maresh. This will maximize arable land and provide even more water to the locals, though some may resent me for it for religious reasons."
 RICE_sus_divert_and_dam_ziz_river_effect_tooltip: "$RICE_sus_resolve_conflicts_in_maresh_effect_tooltip$"
 RICE_sus_divert_and_dam_ziz_river_confirm: "Let's coordinate these efforts."
 piety_loss_because_of_sacred_waters_effect: "This may upset those whose [faith|E] has the [GetFaithDoctrine('tenet_sacred_waters').GetBaseName] [core_tenet|E]"

 RICE_sus_wall_the_oasis: "Wall the Maresh Oasis"
 RICE_sus_wall_the_oasis_tooltip: "We need adequate defenses around the Maresh area."
 RICE_sus_wall_the_oasis_desc: "Although Maresh's defenses are nothing to scoff at, they can be improved even further. Locals are recommending that we expand the city's fortifications to surround much of the Maresh Oasis."
 RICE_sus_wall_the_oasis_effect_tooltip: "$RICE_sus_resolve_conflicts_in_maresh_effect_tooltip$"
 RICE_sus_wall_the_oasis_requirement: "Your [dynasty|E] has unlocked the [GetDynastyPerk('lotr_haradrim_legacy_3').GetName] [dynasty_perk|E]"
 RICE_sus_wall_the_oasis_confirm: "It shall be done."
 RICE_sus_attract_settlers_to_maresh: "Attract Settlers to Maresh"
 RICE_sus_attract_settlers_to_maresh_tooltip: "Maresh is a promising location for trade...."
 RICE_sus_attract_settlers_to_maresh_desc: "Lately, various conflicts have driven many people from elsewhere to flee to [GetTitleByKey('k_arysis').GetNameNoTier]. Perhaps I can encourage some of these adventurers, merchants, refugees, and more to settle in Maresh. Despite their differences, their diverse perspectives can help the city grow and prosper. The oasis shows much promise as a potential trade center, so dominating the Dune Sea trade routes in this manner would be quite advantageous!" 
 RICE_sus_attract_settlers_to_maresh_effect_tooltip_1: "Unlocks the [maresh_prosperity|E] mechanic for [GetTitleByKey('c_maresh').GetNameNoTier]"
 RICE_sus_attract_settlers_to_maresh_effect_tooltip_2: "$RICE_sus_resolve_conflicts_in_maresh_effect_tooltip_2$"
 RICE_sus_attract_settlers_to_maresh_confirm: "Let's do this!"
 RICE_sus_attract_settlers_to_maresh_req: "Your [dynasty|E] has unlocked the [GetDynastyPerk('lotr_haradrim_legacy_1').GetName] [dynasty_perk|E]"

