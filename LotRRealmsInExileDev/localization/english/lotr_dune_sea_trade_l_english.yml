 trans_haradric_merchants_option: "Trans-Haradric Merchants"
 trans_haradric_merchants_option_desc: "Although travelling with a large caravan of [trans_haradric_merchants|E] might slow the journey down, it comes with lucrative benefits. These traders are experienced in traversing the diverse landscapes of [harad|E], and travelling with them might offer the chance for an occasional business opportunity!"
 RICE_transharadric_geographical_req: "You own a [county|E] or [domicile|E] in [GetGeographicalRegion('middleearth_harad').GetName]"
 RICE_trans_haradric_trade_region: "Trans-Haradric Trade Region"
 innovation_namalo: "Namâlo Networks"
 innovation_namalo_desc: "The [namalo|E] are a group of influential merchants originating in Sîrayn who operate across [harad|E]. By integrating them into our communities, they can improve the flow of trade in our territories and connect us with faraway lands."
 RICE_trans_haradric_decision_unlocked_desc: "Unlocks the [decision|E] to #V Network with [trans_haradric_merchants|E]#!"
 RICE_namalo_decision_desc: "Unlocks the [decision|E] to #V Synergize with the [namalo|E]#!"
 RICE_namalo_decision_done_req_text: "A [ruler|E] in [GetGeographicalRegion('middleearth_harad_bayoformal_sirayn').GetName] must take the #V $RICE_bozo_establish_namalo_decision$#! [decision|E]"
