 # Events
 sus.0001.t: "$travel_event_prefix$ African Trade"
 sus.0001.desc: "By traveling together with [merchant.GetFirstName] and [merchant.GetHerHis] merchant caravans, I have come across business opportunities that I would not have otherwise.\n\nWhile in [ROOT.Char.GetCurrentLocation.GetName], we were able to secure a favorable trade deal with merchants we met there. I could accept the deal as is, or risk it and haggle to get even more out of the other merchants, but they might refuse and the deal might fall through."
 sus.0001.a: "The original agreement is fine."
 sus.0001.b: "I'll haggle to try to get more."
 sus.0001.b.failure: "Your haggling #N fails#!!"
 sus.0001.b.success: "Your haggling #P succeeds#!!"
 RICE_trans_saharan_merchant_trait_gain_tooltip: "#weak You previously secured #V [GetPlayer.MakeScope.Var('RICE_trans_saharan_merchant_success_count').GetValue]#! successful trade deals along African trade routes. The more deals you conclude, the higher the chances of gaining the [GetTrait('RICE_trans_saharan_merchant').GetName( GetNullCharacter )] [trait|E].#!"
 RICE_trans_saharan_number_of_successes_tooltip: "#weak You previously secured #V [GetPlayer.MakeScope.Var('RICE_trans_saharan_merchant_success_count').GetValue]#! successful trade deals along African trade routes.#!"
 sus.0010.t: "A New Day for Maresh?"
 sus.0010.desc: "Although [abu_muntasir.GetTitledFirstName], also known as #V Abu Muntasir#!, was a ruthless leader in [GetTitleByKey('c_maresh').GetNameNoTier], he was an effective one, who kept the people of the oasis city united, and brought it to its economic and cultural zenith. Alas, since his passing many years ago, [GetTitleByKey('c_maresh').GetNameNoTier] has been beset by decade after decade of conflict; not only have his descendants been lacking, but Mareshns - divided by religion and culture - have also turned on one another.\n\nUntil now.\n\nWe are tired of this senseless bickering. Whether through guile, wealth, might, or some combination thereof, I have convinced various parties in these feuds to sit together and negotiate a tenuous peace. Despite our differences, we call this oasis home, and our varied perspectives can, once again, lay the foundation for the city’s strength."
 sus.0010.a: "We can, and must, rebuild [GetTitleByKey('c_maresh').GetNameNoTier]."
 sus.0011.t: "A New Day for Maresh?"
 sus.0011.desc: "A long time ago, when the ruthless but capable [abu_muntasir.GetTitledFirstName], also known as #V Abu Muntasir#!, ruled [GetTitleByKey('c_maresh').GetNameNoTier], the city was the envy of other oases in the western Sahara. In this outpost of #italic Dar al-Islam#!, a motley group of peoples of different sects and cultures came together to build a prosperous city. With his death, however, the city fell on hard times, beset by civil war and sectarian strife.\n\nSome claim, however, that things are changing now, and [GetTitleByKey('c_maresh').GetNameNoTier] is slowly but surely returning to its former glory. [maresh_ruler.GetTitledFirstName] has brought together various parties in these feuds to sit together and negotiate a tenuous peace. However, it remains yet to be seen whether [maresh_ruler.GetHerHis] achievement will be enough to restore the oasis’ power, or if it has weakened enough to be an easy target for other rising powers in the region…."
 sus.0011.a: "We’ll have to see what lies in store for [GetTitleByKey('c_maresh').GetNameNoTier]."
 sus.0012.t: "Maresh's Mint"
 sus.0012.desc: "[GetTitleByKey('c_maresh').GetNameNoTier] lies at a rather strategic location, at least economically speaking. A lot of Dune Sea trade passes through the city, which means a lot of gold mined in West Africa makes its way here, not to mention the local silver deposits nearby. I and other leaders in [GetTitleByKey('c_maresh').GetNameNoTier] have laid the groundwork for a mint to be established here. Created from Bellanarûd gold and local silver, these coins will be used throughout North Africa and beyond."
 sus.0012.a: "This will raise the city’s standing around the world."
 sus.0013.t: "Maresh's Mint"
 sus.0013.desc: "Ever since it was first founded a long time ago, [GetTitleByKey('c_maresh').GetNameNoTier] has been an important stop along the Dune Sea trade routes in the western part of the Maghreb. A lot of gold mined in West Africa flows through it, and it is also located near a number of local silver mines. As such, it is little surprise that [maresh_ruler.GetTitledFirstName] has taken the initiative to establish a mint in [GetTitleByKey('c_maresh').GetNameNoTier], that utilizes this gold and silver. Already, word is spreading fast about the quality of coins minted here."
 sus.0013.a: "[GetTitleByKey('c_maresh').GetNameNoTier] prospers, but this also makes it a lucrative target for ambitious warlords."
 sus.0014.t: "Hydraulic Projects along the Rysis"
 sus.0014.desc: "The settlement of [GetTitleByKey('c_maresh').GetNameNoTier] lies along the Rysis River, and for centuries, there have been a number of local hydraulics projects to expand the city’s water supply. At the urging of several local leaders, I have decided to invest in coordinating these engineering projects and spearheading new ones in order to maximize the potential water resources available. These projects range from dams, canals, underground pipes, and diverting the Rysis itself, among other things."
 sus.0014.a: "After all, water gives life in these arid lands."
 sus.0015.t: "Hydraulic Projects along the Rysis"
 sus.0015.desc: "[GetTitleByKey('c_maresh').GetNameNoTier], one of the great settlements of the western Maghreb, has long relied on the Rysis River and other nearby water sources for its water needs. Now, [maresh_ruler.GetTitledFirstName] is overseeing a great expansion of the city’s water resources - bolstering any existing hydraulic projects, and implementing new ones. This will provide even more good water to the city’s inhabitants, and allow it to grow and prosper for generations to come."
 sus.0015.a: "The city’s prosperity grows by the day."
 sus.0016.t: "Walls around Maresh"
 sus.0016.desc: "Although [GetTitleByKey('c_maresh').GetNameNoTier] itself has some defensive networks built over the years, there are many smaller suburbs, farms, and market areas stretching beyond the city’s core into the rest of the Tafilalt Oasis where the city is located. Some of these outside areas are somewhat protected by smaller #italic ksars#!, various fortified villages, but I and other community leaders have decided a more permanent and lasting form of protection is needed.\n\nAs such, I have ordered the construction of a wall around much of the oasis itself, with several gates serving as the entryway into Maresh. These majestic fortifications, befitting a prosperous oasis like Maresh, shall serve to protect, intimidate, and inspire."
 sus.0016.a: "Good!"
 sus.0017.t: "Walls around Maresh"
 sus.0017.desc: "For generations, [GetTitleByKey('c_maresh').GetNameNoTier] has served as a gateway of sorts that connected West Africa and the Sahara with the rest of Morocco. However, for quite some time now, locals have felt like the area’s existing defenses were inadequate.\n\nThus, under the direction of [maresh_ruler.GetTitledFirstName] and other community leaders, a more substantial system of defenses - including a wall and several large gates - have been built to surround much of the Tafilalt Oasis where Maresh lies. Maresh is now better protected, and visitors can gaze in awe at the mighty defenses that protect this prosperous oasis."
 sus.0017.a: "Interesting…."
 sus.0018.t: "A Dune Sea Entrepot"
 sus.0018.desc: "Recently, large numbers of people have come from elsewhere to the remote deserts of Arysis. Some are refugees or fugitives, exiled from their homelands whether through force or a desire to escape chaos. Others are remnants of religious dissidents dubbed heretics by their enemies. Yet others are adventurers, mercenaries, and daring merchants, who seek wealth and fame on the fickle roads of [harad|E].\n\nI have made efforts to recruit and entice many of these people and their families to settle in [GetTitleByKey('c_maresh').GetNameNoTier]. Although the Great Sand Sea has seen its fair share of adventurous caravaneers hoping to make a fortune by crossing the dangerous Mirror of Fire in the past, trade is now steadily increasing between [GetGeographicalRegion('middleearth_harad_bayoformal_khy').GetName] and [GetGeographicalRegion('middleearth_harad_near_harnen').GetName], and [GetTitleByKey('c_maresh').GetNameNoTier] is quickly becoming a major stopping point for [trans_saharan_merchants|E] along these trade networks. Mark my words - generations from now, [GetTitleByKey('c_maresh').GetNameNoTier] will prosper beyond our wildest imaginations!"
 sus.0018.a: "With their diverse perspectives and skills, these settlers will help the city flourish."
 sus.0019.t: "A Dune Sea Entrepot"
 sus.0019.desc: "Conflicts from elsewhere have recently driven many people to seek their fortunes in Arysis. Large numbers of these people, ranging from war refugees to religious dissidents to adventurers and merchants, have decided to settle in [GetTitleByKey('c_maresh').GetNameNoTier] thanks to efforts by [maresh_ruler.GetTitledFirstName] to attract them there.\n\nAlthough the Great Sand Sea has seen its fair share of adventurous caravaneers hoping to make a fortune by crossing the dangerous Mirror of Fire in the past, trade is now steadily increasing between [GetGeographicalRegion('middleearth_harad_bayoformal_khy').GetName] and [GetGeographicalRegion('middleearth_harad_near_harnen').GetName], and [GetTitleByKey('c_maresh').GetNameNoTier] is quickly becoming a major stopping point for [trans_saharan_merchants|E] along these trade networks. It is clear that the foresighted [maresh_ruler.GetFirstName] knows that it is important for [maresh_ruler.GetHerHim] to invest in this region, and lay the foundations for a potential glorious future."
 sus.0019.a: "Perhaps [GetTitleByKey('c_maresh').GetNameNoTierNoTooltip] will become a commercial entrepot one day."
 sus.0030.t: "A Dune Sea Arab Merchant"
 sus.0030.desc.intro_networker: "Recently, I’ve made efforts to reach out and network with merchants who do business along the Dune Sea trade routes that criss-cross the Sahara desert and connect the Mediterranean and Sahel regions. My efforts have not been in vain, as I have acquainted myself with one such merchant named [RICE_trans_saharan_merchant_spawn.GetFullName]."
 sus.0030.desc.intro_normal: "For centuries, merchants have criss-crossed the Sahara desert along the Dune Sea trade routes that connect the Mediterranean and the Sahel to exchange trade goods ranging from gold and salt to slaves, ivory, and kola nuts. I have recently acquainted myself with one such merchant named [RICE_trans_saharan_merchant_spawn.GetFullName]."
 sus.0030.desc: "\n\n[RICE_trans_saharan_merchant_spawn.GetFirstNameNoTooltip], who is [RICE_trans_saharan_merchant_spawn.GetCulture.GetName], hails from one of the many Arab communities that dot the region. Traders like [RICE_trans_saharan_merchant_spawn.GetHerHim] have connections with other Arab merchants throughout the Middle East, India, and beyond.\n\nAnyways, following some discussions, [RICE_trans_saharan_merchant_spawn.GetSheHe] has offered to network me with other Arab merchant communities to promote the growth of trade in my realm. I am even considering employing [RICE_trans_saharan_merchant_spawn.GetHerHim] at my court so that we can work closely together in the future."
 sus.0030.a: "After we're done here, would you like to join my court, [RICE_trans_saharan_merchant_spawn.GetFirstName]?"
 sus.0030.b: "A good deal. It was a pleasure working with you, [RICE_trans_saharan_merchant_spawn.GetFirstName]."
 sus.0030.c: "Thinking it over, I'm not interested in doing this."
 sus.0031.t: "A Dune Sea Bellanarûd Merchant"
 sus.0031.desc: "\n\n[RICE_trans_saharan_merchant_spawn.GetFirstNameNoTooltip], who is [RICE_trans_saharan_merchant_spawn.GetCulture.GetName], hails from one of the many Bellanarûd communities that dot the region. Gold and salt are their primary goods they deal in, though they trade many things.\n\nAnyways, following some discussions, [RICE_trans_saharan_merchant_spawn.GetSheHe] has offered to network me with other Bellanarûd merchant communities to promote the growth of trade in my realm. I am even considering employing [RICE_trans_saharan_merchant_spawn.GetHerHim] at my court so that we can work closely together in the future."
 sus.0031.a: "xxxxx"
 sus.0032.t: "A Dune Sea Haruze Merchant"
 sus.0032.desc: "\n\n[RICE_trans_saharan_merchant_spawn.GetFirstNameNoTooltip], who is [RICE_trans_saharan_merchant_spawn.GetCulture.GetName], hails from one of the many Haruze communities that dot the region. The Haruze tribes indigenous to North Africa have played an important role in the flourishing of the region’s trade.\n\nAnyways, following some discussions, [RICE_trans_saharan_merchant_spawn.GetSheHe] has offered to network me with other Haruze merchant communities to promote the growth of trade in my realm. I am even considering employing [RICE_trans_saharan_merchant_spawn.GetHerHim] at my court so that we can work closely together in the future."
 sus.0032.a: "xxxxx"
 sus.0033.t: "A Dune Sea Arani Merchant"
 sus.0033.desc: "\n\n[RICE_trans_saharan_merchant_spawn.GetFirstNameNoTooltip], who is [RICE_trans_saharan_merchant_spawn.GetCulture.GetName], hails from one of the many Arani communities that dot the region. Though dispersed across North Africa and Eurasia, these Arani communities have strong ties with one another.\n\nAnyways, following some discussions, [RICE_trans_saharan_merchant_spawn.GetSheHe] has offered to network me with other Arani merchant communities to promote the growth of trade in my realm. I am even considering employing [RICE_trans_saharan_merchant_spawn.GetHerHim] at my court so that we can work closely together in the future."
 sus.0050.t: "Dates of Draa"
 sus.0050.desc: "Today I am enjoying some dates from the [draa_county.GetNameNoTier] river valley. The area is known for its abundance of dates of all kinds. Just savoring their delicious sweetness makes me feel like I'm in paradise!"
 sus.0050.a: "Let me grab a few more to eat, or maybe a lot more!"
 sus.0051.t: "Tajine"
 sus.0051.desc.is_berber: "Ah, #italic tajine#!. One of the great delicacies of [ROOT.Char.GetCulture.GetName] cuisine enjoyed by all. The serving of this meat and vegetable stew I am eating today is even more delicious than it already is normally."
 sus.0051.desc.is_not_berber: "Ah, #italic tajine#!. One of the great delicacies from the cuisine of North Africa, enjoyed by all. The serving of this meat and vegetable stew I am eating today is even more delicious than it already is normally."
 sus.0051.a: "Maybe I’m in a good mood?"
 sus.0052.t: "Lamta Hides"
 sus.0052.desc: "Recently, I have acquainted myself with some merchants selling leather and hides, in particular the hardy #italic lamta#! hide made from North African antelopes. They are so tough that they are used to make shields and armor. Anyways, these merchants say they are willing to sell me some of their stock of hides for a good price. It would do well to provide some of my troops with protection made from this…."
 sus.0052.a: "I think I’ll pass. My troops are fine as is."
 sus.0052.b: "Yes, I will buy some of your hides."
 sus.0052.c: "Surely you can give me a better price."
 sus.0053.t: "Expanding Ksar"
 sus.0053.desc: "One of the nearby #italic ksars#! has grown to such a degree that it is considered something of a defensive bulwark along a local trade route. These fortified villages are essential in protecting the Dune Sea trade routes that cross the desert."
 sus.0053.a: "It means more caravans will pass through safely, I hope!"
 sus.0054.t: "New Foggara"
 sus.0054.desc: "A new #italic foggara#! has been constructed nearby under the direction of some local leaders. These channels, some underground, have been in use across North Africa for centuries, and distribute much needed water - typically from rivers or springs - to drier parts of the settled regions. We can expect the area that this #italic foggara#! serves to expand in terms of its agricultural productivity."
 sus.0054.a: "Let us hope this #italic foggara#! will do what it's designed to do."
 sus.0055.t: "An Imposing Ksar"
 sus.0055.desc: "I am visiting one of the #italic ksars#! in an arid region of my realm today. These kinds of fortified villages, typically made from adobe and occasionally stone, have been built over centuries to safeguard the locals and any traders passing through.\n\nAs I inspect the structure in all its grandness, I am impressed with the seamless way all the buildings are attached to each other, from the houses to the granaries to the shops, baths, and local [ROOT.Char.GetFaith.HouseOfWorship]."
 sus.0055.a: "This place seems so imposing! Only a fool would dare attack it."
 sus.0055.b: "With such a secure community, I'm sure people here live well."
 sus.0056.t: "Foggara Repairs"
 sus.0056.desc: "I just received a report from an official that one of the nearby #italic foggaras#! has recently dried up. These water channels or aqueducts have been used in the region for centuries, so there are many of them, some used and some unused like this one. Although this one is not essential per se, it supplements another #italic foggara#! nearby, and lending some funds to repair it to be functional again might be a nice gesture."
 sus.0056.a: "If it's not needed, then why bother?"
 sus.0056.b: "A good idea. Let's get the repairs going."
 sus.0056.c: "I'll not only repair it, but fund building another."
 sus.0057.t: "Ksar Maintenance"
 sus.0057.desc: "I’ve received an alarming report from an official that several of the nearby #italic ksars#! are in need of dire repairs. These fortified villages, common in the Maghreb, are typically made of raw earth, and are thus susceptible to the elements - wind, rain, and more - meaning they require constant maintenance.\n\nWhile the locals are able to continuing maintaining their #italic ksars#! as needed, their time and resources can be limited. As these villages are important in protecting local trade routes and ensuring order and stability in the area, my official tells me it would be prudent to assist the locals by providing them the resources and manpower from elsewhere that they do not necessarily have here."
 sus.0057.a: "If they can do it themselves, I don’t see the need to divert resources to them."
 sus.0057.b: "It’s crucial these remain in good shape - I’ll provide the resources as suggested."
 sus.0058.t: "Inside a Ksar"
 sus.0058.desc: "I am paying a visiting to one of the larger #italic ksars#! in my realm today. These fortified settlements, consisting of interconnected and attached adobe structures and alleyways, have served as a bedrock of the trade routes in North Africa, protecting the areas they are in from bandits and invaders. As I walk through the winding streets, I almost enter one when my guides accompanying me warn me not to turn that way.\n\n“That’s where… #italic those#! kinds of outsiders live,” one tells me, when I ask why. “The ones who do the unclean jobs. We haven’t pooled together the funds to erect a gate to separate them from more respectable folk, so we apologize.”"
 sus.0058.a: "It’s no matter. You know who’s who, and it’s good to enforce boundaries."
 sus.0058.b: "They still live here, so I’ll visit them to see how they’re doing too. It’s only just."
 sus.0058.c: "Not enough funds for the gate, you say? What if I were to lend some help?"
 sus.0059.t: "Mekhor"
 sus.0059.desc: "Today I am inspecting the #italic Mekhor#!, the old, main canal that flows directly [GetTitleByKey('c_maresh').GetNameNoTier]. At the end of the canal is a sizable oasis with the same name. Anyhow, this canal has been an important source of water and used for a variety of purposes, such as irrigating nearby agriculture for centuries.\n\nI listen carefully as some of the specialists in charge of maintaining the canal explain some of the current issues with ensuring the canal remains in good condition. Apparently, they are worried about the state of the canal in the next few years, and are requesting I provide some additional resources - more than already allocated - to assist with the canal’s continued operation."
 sus.0059.a: "I believe the existing resources are sufficient. The city has other needs."
 sus.0059.b: "Very well, you shall have those resources - put them to good use!"
 sus.0060.t: "Coins of Maresh"
 sus.0060.desc: "A visiting traveler has told me about how people back in his homeland speak highly of the coins produced by the mints of [GetTitleByKey('c_maresh').GetNameNoTier].\n\n“Truly,” he says, “the coins minted here are of the highest quality. It’s no wonder they’re used all over the world!”"
 sus.0060.a: "We take great pride in this, my friend."
 sus.0061.t: "Goldsmiths"
 sus.0061.desc: "A lot of gold from West Africa passes through [GetTitleByKey('c_maresh').GetNameNoTier] to markets elsewhere in the Mediterranean. As a result, there is a sizeable community of goldsmiths in the city who have practiced their craft for a long time. A few have settled down here recently, bolstering the existing community of artisans, and helping to enhance the city’s splendor by taking commissions from some of the local elites."
 sus.0061.a: "Perhaps I’ll have time to commission something myself one of these days."
 sus.0062.t: "Mareshn Ceramics"
 sus.0062.desc: "A lot of valuable commodities come from West Africa and pass through [GetTitleByKey('c_maresh').GetNameNoTier] to markets in the Mediterranean. However, one cannot say that the city doesn’t export its own products that are in high demand among the people of West Africa. Glazed ceramics from Maresh, for example, have been greatly praised by many in the more southern regions, and recently there has been something of a boom in the business, with our artisans being able to sell more at better prices than before."
 sus.0062.a: "That’s nice to hear!"
 sus.0063.t: "Goats and Argan"
 sus.0063.desc: "I am visiting some of the argan forests in my realm today. One of the local women is explaining to me how the goats, who climb the trees to eat the fruits and nuts, are most useful in extracting the argan plant’s valuable seeds, which are used to make oils, food, and more. Traditionally, women like her have been the ones usually working with these argan trees.\n\n“Some people think it’s the goat feces that is the key to this all,” the woman laughs, “but it’s actually the cud that helps us crack the argan nuts. It’s dirty business, my [ROOT.Char.GetLadyLord], but we women are proud of our work.”"
 sus.0063.a: "If it works, it works."
 sus.0064.t: "Amlu"
 sus.0064.desc: "Today I passed through a village in my realm that is known for its great argan forests. The locals gifted me some argan oil to commemorate the occasion. One common use of this oil, which I look forward to, is to make #italic amlu#!, a spread made combining the argan with honey, and almonds that have been toasted and crushed."
 sus.0064.a: "I look forward to seeing how my cooks will make use of this!"
 
 
 bozo.0010.t: "The Mud Masons"
 bozo.0010.desc: "I have contacted the mud masons’ guild in my realm, notifying them about various building projects I want them to be involved in. As keepers of sacred knowledge, the [ROOT.Char.GetFaith.GetAdjective] rituals they perform during architectural work will also bless our buildings and protect them from harm.\n\n"
 bozo.0010.desc.culture: "We [ROOT.Char.GetCulture.GetCollectiveNoun] possess an innate understanding of mud masonry that outsiders simply do not. I am confident in these masons’ ability to harness the [ROOT.Char.GetCulture.GetNameNoTooltip] wisdom passed down for generations.\n\n"
 bozo.0010.desc.castle: "Anyways, I want the masons to focus on constructing new buildings or maintaining existing ones in my [castle_holdings|E]. We need to ensure our walls and defenses are strong!"
 bozo.0010.desc.city: "Anyways, I wish for the masons to focus on constructing new buildings or maintaining existing ones in my [city_holdings|E]. Their hard work will ensure our settlements continue to prosper."
 bozo.0010.desc.church: "Anyways, I indicated to the masons that I want them to focus on constructing new buildings or maintaining existing ones in my [church_holdings|E]. [ROOT.Char.GetFaith.HighGodName] will surely be pleased with this!"
 bozo.0010.desc.general: "Anyways, I instructed the masons to focus constructing new buildings or maintaining existing ones in a variety of my [holdings|E]. There is a lot of work that needs to be done throughout my realm."
 bozo.0010.a: "Their hard work is essential to our community."
 
 bozo.0012.t: "Burying My [ROOT.Char.Custom2('RelationToMe', ROOT.Var('RICE_ghana_burial_ancestor').Char)|U]"
 bozo.0012.desc: "As is our [ROOT.Char.GetCulture.GetName] tradition, I have ordered the construction of a large dome, made out of acacia wood, to bury [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetFirstName]. The structure is almost complete, and I am thus making preparations for the burial ceremony.\n\nTypically, we sacrifice servants and slaves alongside [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetFirstNameNoTooltip] in the dome. The [ROOT.Char.GetFaith.GetAdjective] [ROOT.Char.GetFaith.PriestNeuterPlural] have provided me a list of servants and slaves to sacrifice for the occasion."
 bozo.0012.desc.sacrifice: "\n\nHowever, the [ROOT.Char.GetFaith.PriestNeuterPlural] have, in their wisdom, also suggested a few members of my court who could also be sacrificed. Such things would please [ROOT.Char.GetFaith.PantheonTerm], they argue."
 bozo.0012.a: "[candidate_1.GetFirstName] will be a worthy sacrifice to [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetFirstNameNoTooltip]."
 bozo.0012.b: "The sacrifice of [candidate_2.GetFirstName] will please [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetFirstNameNoTooltip]."
 bozo.0012.c: "Let us sacrifice [candidate_3.GetFirstName] to honor [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetFirstNameNoTooltip]."
 bozo.0012.d: "I hope sacrificing servants and slaves will work for [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetFirstNameNoTooltip]!"
 bozo.0012.sacrifice_tooltip: "Instead of the default [piety_i|E] #P [GetPlayer.MakeScope.ScriptValue('major_piety_value')|0]#!, you will gain double that."
 bozo.0013.t: "$bozo.0012.t$"
 bozo.0013.desc: "It is the day of [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetFirstNamePossessive] burial. I and my entire court accompany [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetHerHis] body as we bring it inside the dome of acacia wood that we have erected. We place the body on a bed with cushions, and surround it with many ornaments, weapons, and utensils, so that [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetFirstNameNoTooltip] can feast and drink in the afterlife.\n\nAfter this, we sacrifice many slaves and servants by immuring them in the tomb. We then cover the dome with mats and curtains, placing as much earth as we can on top of the tomb, so that it becomes a small hill surrounded by a trench.\n\nFollowing this, we sacrifice victims and pour libations of fermented drinks to [ROOT.Var('RICE_ghana_burial_ancestor').Char.GetFirstNameNoTooltip] and our other ancestors."
 bozo.0013.desc.sacrifice: "Among the sacrificial victims is [sacrificial_victim.GetFirstName], who I and the [ROOT.Char.GetFaith.GetAdjective] [ROOT.Char.GetFaith.PriestNeuterPlural] felt was a good candidate for this occasion."
 bozo.0013.a: "May you rest in peace, dear [ROOT.Char.Custom2('RelationToMe', ROOT.Var('RICE_ghana_burial_ancestor').Char)]."
 bozo.0014.t: "xxxxx"
 bozo.0014.desc: "xxxxx"
 bozo.0014.a: "xxxxx"
 bozo.0015.t: "Working with the Namâlo"
 bozo.0015.desc: "The Namâlo merchants, whose reach stretches across much of [GetGeographicalRegion('middleearth_harad_west').GetName], have integrated themselves into our [ROOT.Char.GetCulture.GetName] communities for many years now, connecting us with other peoples in the region. We are used to working with the Namâlo on a daily basis, particularly in mercantile matters, but I sensed an opportunity for further mutually beneficial arrangements with them.\n\n"
 bozo.0015.desc.political: "The Namâlo have skills in management and letters that could serve me well. I’ve brought on some as officials in my administration, and will use their networks to govern my territories more efficiently and ensure the enforcement of my laws."
 bozo.0015.desc.commercial: "The Namâlo, of course, are most famous for their extensive trade networks that already bring much wealth to my territories. By working together, we can further encourage trade to bring even #italic more#! wealth here."
 bozo.0015.desc.cultural: "The Namâlo are quite educated in general (one has to be to be an excellent trader, after all), and I seek their aid in intellectual matters. Their knowledge of law, language, and all manner of learning, will cultivate my realm’s culture."
 bozo.0015.a: "Their contributions are most appreciated."
 
 bozo.0020.t: "Rise of the Namâlo"
 bozo.0020.desc: "For many years, a group of Mande-speaking traders known as the #italic Namâlo#! have been increasing their involvement in the Bellanarûd gold trade. In particular, they have focused on controlling the flow of gold from Mali’s mines.\n\nIn a bid to fully monopolize their control over this gold, they have reached a deal with [wangara_founder.GetTitledFirstName], who rules over the majority of these mines.\n\nThere is no denying that the #italic Namâlo#! are becoming one of the most influential merchant conglomerates in the region, thanks to their mastery over the gold trade, combined with their diverse ethnic origins that gives them much flexibility in their dealings with others. Now, their leaders are even starting to look beyond the gold trade, seeking to expand their political, commercial, and cultural networks by settling amongst the communities of various African peoples."
 bozo.0020.a: "We will watch them with great interest."
 bozo.0020.tooltip: "[cultures|E] in [GetGeographicalRegion('middleearth_harad_west').GetName] can now unlock the $innovation_RICE_wangara$ [innovation|E] if their [culture_head|E] or a powerful [ruler|E] takes the [decision|E] to $RICE_bozo_bring_in_wangara$. The [innovation|E] in turn unlocks the [decision|E] to $RICE_bozo_wangara_synergy_decision$, among other bonuses."
 bozo.0021.t: "The Namâlo Come to the [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]"
 bozo.0021.desc: "The Namâlo are a group of Mande-speaking merchants who originally controlled the gold mines of Mali, but have, over the years, have expanded their operations to other regions of Africa, as well as to other products such as salt, slaves, kola nuts, and more.\n\nUntil recently, the Namâlo network had limited connections with [ROOT.Char.GetCulture.GetName] communities. Thanks to [wangara_inviter.GetFirstName], a prominent [wangara_inviter.GetCulture.GetNameNoTooltip] [wangara_inviter.GetTitleAsNameNoTooltip], this is no longer the case.\n\n[wangara_inviter.GetFirstNameNoTooltip] has reached out to the Namâlo, inviting them to settle among the [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]. In doing so, the [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] will be better integrated into the Namâlo’s existing political, commercial, and cultural networks across [GetGeographicalRegion('middleearth_harad_west').GetName]."
 bozo.0021.a: "Both sides will benefit from this!"
 bozo.0021.tooltip: "With the integration of the [namalo|E] into their communities, [GetPlayer.GetCulture.GetName] [rulers|E] now have access to the [decision|E] to $RICE_bozo_wangara_synergy_decision$."
 

 bozo.0050.t: "The Mud Masons"
 bozo.0050.desc: "A structure in my residence is in dire need of repairs, as its stability has recently suffered greatly. It is built in the typical [ROOT.Char.GetCulture.GetName] manner, using our traditional mudbricks.\n\nAnyways, I have contacted the local mud masons’ guild about doing repairs. A master mason, after inspecting the area, says it should be no trouble to reinforce the existing mud structure, but after consulting with some [ROOT.Char.GetFaith.GetAdjective] [ROOT.Char.Custom('DefaultPriestTitlePlural')], says it is clear that the malevolent forces of [ROOT.Char.GetFaith.DevilName] are present here.\n\nThe day the repairs are supposed to begin, the same master mason, along with several of his fellow masons and apprentices, bury several blessed relics next to the structure, before saying various incantations and prayers. “Benedictions are as important as the mud bricks themselves,” the mason told me afterwards."
 bozo.0050.a: "Thank you for your hard work, regardless."
 bozo.0051.t: "Secrets of the Mud Masons"
 bozo.0051.desc: "Mud masons are an ubiquitous part of [ROOT.Char.GetCulture.GetName] society. It is they who build and maintain many of the buildings we use everyday.\n\nI am out on the road today, and pass by some mud masons who are in the process of constructing a large house for one of the locals. I observe them for some time as they perform daily blessing rituals.\n\nI cannot help but try to eavesdrop on their [ROOT.Char.GetFaith.GetAdjective] recitations and prayers, yet I cannot make out any clear words. Alas, the mud masons are notoriously protective of their secret knowledge, and never reveal it to outsiders. I have heard that some masons even hide the secrets they learned from their masters from other fellow masons!"
 bozo.0051.a: "Their secrets must be powerful!"
 bozo.0051.b: "Maybe these rituals are all for show."
 bozo.0052.t: "A New Contract for Mud Masonry"
 bozo.0052.desc: "Most [ROOT.Char.GetCulture.GetName] families have a contract with a master mud mason, who is responsible for doing regular maintenance on the mud structures that make up many of our buildings.\n\nAlas, the master mason who my family had contracted out to for many years recently passed away. Traditionally, contracts pass from the master mason to his apprentice, who is typically a relative.\n\nI am in fact familiar with the new master mason, having observed him at work before. I have great confidence in his abilities, and he likewise assures me he will continue to honor his kinsman’s legacy by working hard to maintain my family’s buildings."
 bozo.0052.a: "I am sure you will do well."
 bozo.0053.t: "Protection for the Mud Buildings"
 bozo.0053.desc: "I need to construct a small structure in my residence complex, and have employed a number of [ROOT.Char.GetCulture.GetName] masons to do the job. As expected, they perform a number of sacrifices, prayers, and other rituals before they start.\n\nHowever, the head mason informs me that the site could use some extra protection from benevolent spirits. If it is fine with me, I need to acquire some grain and animal bones, for the masons to bury them at the corners of the future building."
 bozo.0053.a: "We have enough protection already."
 bozo.0053.b: "It doesn’t hurt to be extra careful."
 bozo.0053.c: "I don’t condone non-[ROOT.Char.GetFaith.GetReligion.GetAdjective] heathen practices!"


