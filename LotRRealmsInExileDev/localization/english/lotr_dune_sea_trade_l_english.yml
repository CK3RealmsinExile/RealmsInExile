 RICE_bozo_tapama_djenepo_decision: "Visit the Tomb of Tapama Djenepo"
 RICE_bozo_tapama_djenepo_decision_tooltip: "The sacrifice of Tapama Djenepo should not be forgotten."
 RICE_bozo_tapama_djenepo_decision_desc: "According to the legends of Selena, the current city could only be built thanks to the sacrifice of a virgin girl known as Tapama Djenepo. I should venerate her at her tomb."
 RICE_bozo_tapama_djenepo_decision_confirm: "Let's go to the tomb!"
