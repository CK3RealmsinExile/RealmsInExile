 RICE_sus_network_with_trans_haradric_merchants: "Network with Trans-Haradric Merchants"
 RICE_sus_network_with_trans_haradric_merchants_tooltip: "Build better relations with local traders"
 RICE_sus_network_with_trans_haradric_merchants_desc: "Many merchants travel along the Dune Sea trade routes in our territories, so we should take time to network with them. Building fruitful relationships with interested, ambitious [Concept('haradrim', 'Haradron')|E] merchants can benefit us both."
 RICE_sus_network_with_trans_haradric_merchants_effect_tooltip: "There is a high chance that a [trans_haradric_merchant|E] will spawn in your court and offer you a business deal in the next 5 years for as long as the [character_modifier|E] lasts (or until a merchant spawns). This chance varies depending on your [traits|E], [skills|E], and other factors."
