l_english:

 ### MODIFIERS ###

 dwarven_decorated_ceilings_dynasty_modifier: "$great_project_type_dwarven_capital_02_contribution_decorated_ceilings$"
 dwarven_decorated_ceilings_dynasty_modifier_desc: "A magnificent combination of shapes and features, the decorated ceilings of this dynasty resonate with its onlookers."

 dwarven_dynastic_statues_modifier: "$great_project_type_dwarven_capital_03_dynastic_statues$"
 dwarven_dynastic_statues_modifier_desc: "The solemn likeness of the ruling dynasty, inspiring the citizens to work harder and more efficiently."

 dwarven_gilded_ceilings_dynasty_modifier: "$great_project_type_dwarven_capital_03_contribution_gilded_ceilings$"
 dwarven_gilded_ceilings_dynasty_modifier_desc: "The gilded ceilings contributed to its capital city is one of this dynasty's crowning achievements."
 
 dwarven_great_mirrors_province_modifier: "$great_project_type_dwarven_capital_04_contribution_great_mirrors$"
 dwarven_great_mirrors_province_modifier_desc: "$great_project_type_dwarven_capital_04_contribution_light_shafts_desc$"
 dwarven_contributor_great_mirrors_reward_province_effect_tt: "Holding of [province.GetName] gains [GetModifier('dwarven_great_mirrors_province_modifier').GetNameWithTooltip]"
 dwarven_great_mirrors_province_modifier_reward_effect_tt: "Holding of [owner.GetCapitalLocation.GetName] gains [GetModifier('dwarven_great_mirrors_province_modifier').GetNameWithTooltip]"

 dwarven_carven_pillars_modifier: "$great_project_type_mandala_capital_04_contribution_bell_stupas$"
 dwarven_carven_pillars_modifier_desc: "These carven pillars is a sublime addition to the local great hall."
 dwarven_bejeweled_ceilings_dynasty_modifier: "$great_project_type_dwarven_capital_04_contribution_bejeweled_ceilings$"
 dwarven_bejeweled_ceilings_dynasty_modifier_desc: "The gemstones flickering in the lamplight make it seem the stars themselves rest among the pillars of these great halls — yet another achievement for this dynasty."

 dwarven_waterways_defense_modifier: "$great_project_type_dwarven_capital_05_contribution_waterways$"
 dwarven_waterways_defense_modifier_desc: "These great waterways, in addition to connecting the city districts, also help to keep outsiders and their ilk at bay."

 dwarven_pillar_forest_modifier: "$great_project_type_dwarven_capital_05_contribution_pillar_forest$"
 dwarven_pillar_forest_modifier_desc: "An impressive forest of stone, this one tells the tale of a renowned Dwarven dynasty."