 ### Situtation Flavor Events###
 
 angmar_wars.2001.t: "Orc Raids!"
 angmar_wars.2001.desc: "Coming out of the [mistymountains|e], orcs have long been a plague on [eriador|e] since the [elderdays|e] and their raiders have once again struck at our realm. this time raiding [disaster_county.GetNameNoTier]. Its now up to us to decide on how to respond."
 angmar_wars.2001.a: "Rally the Troops!"
 angmar_wars.2001.b: "[marshal.GetName], I trust this task to you."
 biulding_destroyed: "A random [building|e] will be downgraded or destoryed"
 
 angmar_wars.2002.t: "Bandit Raids!"
 angmar_wars.2002.desc: "[eriador|E] is a dangerous place, since the fragmentation of [arnor|E] there has been a lack of cooperation between local lords and the sucessor states, allowing cross border bandit raids being a fact of life, this time raiders have be spotted moving towards [disaster_county.GetNameNoTier]. Now it is time to decide how to respond."
 angmar_wars.2002.a: "Rally the Troops!"
 angmar_wars.2002.b: "[marshal.GetName], I trust this task to you."
 angmar_wars.2002.c: "If its money they want, give it to them."
 
 angmar_wars.2003.t: "The Young Shephard"
 angmar_wars.2003.desc: "As we are surveying the ashes of the village following the raid. a young boy approaches. He was a shephard tending to his flock in the area around the village. As I watched he approched a burned house and burst into tears as he saw the bodies of the young couple and two kids my soilders still haven't buried. Its obvioius what happened, what isn't obvious is how I should respond"
 angmar_wars.2003.a: "He'll stay at court, no child deserves to be an orphan"
 angmar_wars.2003.b: "Send him to the royal estates, they can make good use of him there"
 
 angmar_wars.2004.t: "Peasants Abandon Frontier"
 angmar_wars.2004.desc: "[eriador|e] has been a land in decline since the fragmentation of [arnor|E]. every year more of our sons and daughters die in the [angmar_wars|E] and every year more and more of our lands lie abandoned. as the wilderness encroaches the people on our frontiers retreat back to safer ground in the interior, this year the people of [county1.GetNameNoTier] have decided to move to [county2.GetNameNoTier]. we can either let them move or we can force them to stay in the area."
 angmar_wars.2004.a: "Let them relocate"
 angmar_wars.2004.b: "Make them stay"
 biulding_destroyed_county_1: "A random [building|e] will be downgraded or destoryed in the [county1.GetName]"
 biulding_add_county_2: "A random [building|e] will be created or upgraded in the [biuld_prov.GetName]"

