l_english:

 angmar_wars.0001.t: "The Angmar Wars"
 angmar_wars.0001.desc: "#TOLKIENQUOTE 'It was at the begining of the reign of Malvegil of Arthedain that evil came to Arnor. for at that time the realm fo Angmar arose in the North beyond the Ettenmoors. Its lands lay on both sies of the Mountains, and there were gathered many evil men, and Orcs, and other fell creatures. The lord of that land was known as the Witch-king, but it was not known until later that he was indeed the chief of the Ringwraiths, who came north with the purpose of destroying the Dúnedain in Arnor, seeing hope in their disunion, while Gondor was strong.'#!\n\n#QUOTEDCHARACTER - The Lord of the Rings, Appendix A#!"
 angmar_wars.0001.a: "Arnor must endure!"
 angmar_wars.0001.b: "The [dunedain|E] shall fall!"
 angmar_wars.0001.c: "We will defend our lands!"

