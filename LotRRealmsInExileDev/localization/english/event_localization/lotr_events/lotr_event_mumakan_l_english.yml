 ### Emperor Sandamal - Our Path Forward (Victory) ###

 mumakan.0001.t: "The War is Won"
 mumakan.0001.desc: "Sandamal receives word that Kôronânde has fully capitulated and his generals hold the republic."
 mumakan.0001.a: "The Iron Lion has proven his name true."

 mumakan.0002.t: "A Hero's Welcome"
 mumakan.0002.desc: "The imperial court erupts in celebration as Sandamal's gamble pays off and the tribes renew their oaths and admiration, he has done the impossible, he has won Kôronânde for the empire, something which not even great Ji-Indur and only the great emperor Matara the Wise has done."
 mumakan.0002.a: "Accept the adulation of the court with measured dignity."
 mumakan.0002.b: "Remind them that the work of empire is never finished."

 mumakan.0003.t: "A Meeting with Aamedi"
 mumakan.0003.desc: "Always in the right place at the right time, the $koronandi$ Aamedi appears before Sandamal to sign the treaty of surrender. Meeting his opponent's mettle with oily pragmatism, he notes that they are family, however distant, much like the $koronandi$ and the Mûmakanil. He prays their relationship might be as fraternal as their shared histories."
 mumakan.0003.a: "Warn them he will be watching them all, fraternal or not."
 mumakan.0003.b: "Court him, he may prove more dangerous as a foe."

 mumakan.0004.t: "Reports of Resistance"
 mumakan.0004.desc: "Despite the victory, $koronandi$ partisans continue to ambush supply lines and the governor reports unrest."
 mumakan.0004.a: "Win through force and guile"
 mumakan.0004.b: "Win them over with concessions - 100 friends serve better than 100 slaves."

 ### Emperor Sandamal - Magnanimity (White Peace) ###

 mumakan.0011.t: "White Peace"
 mumakan.0011.desc: "Neither side can press the advantage further and exhaustion forces both armies to the table."
 mumakan.0011.a: "We will accept this peace. lest this war end in utter ruin for both our realms"

 mumakan.0012.t: "The Meeting with Ataraka"
 mumakan.0012.desc: "Sandamal meets the battered but unbroken leader of Kôronânde to formalize terms of the stalemate. He is not at all what you expect, he is a kind man and a kind person, not some greedy prince, nor some grasping demagogue, or even a warrior, here is a good man, that has fought because it was his duty, much like you, trying to turn the wheel of history in a better direction, you should have hatred for him, for in his resistance he has doomed your own kingdom, but he has saved his. It is a misfortune and in the end you don't blame him. He was doing his duty, as were you. They share a couple of words, and come to an agreement, you would have liked to work together and maybe in the days to come it may still happen perhaps through peace, perhaps through war.
 mumakan.0012.a: "Offer a final respect, in him you have found an equal in honor and in skill."
 mumakan.0012.b: "Stare him down and leave without a word - let him wonder what comes next."

 mumakan.0013.t: "The Loss of Legitimacy"
 mumakan.0013.desc: "The tribal leaders and generals openly question whether the dynasty has lost divine favour after failing to take Kôronânde."
 mumakan.0013.a: "Remind them who sits the throne - I am still the Iron Lion."
 mumakan.0013.b: "Promise a greater campaign to come - this was merely a setback."

 mumakan.0014.t: "Trouble at Home"
 mumakan.0014.desc: "Emboldened by the stalemate, several tribal chiefs in the north begin withholding tribute and the Nafarati grow restless."
 mumakan.0014.a: "We must make concessions, we no longer have the political capital to continue."
 mumakan.0014.b: "Buy their loyalty with gold - we cannot afford yet another war, nor can we let go of our reforms."

 ### Emperor Sandamal - Defeat / Last Days ###

 mumakan.0021.t: "Defeat from the Jaws of Victory"
 mumakan.0021.desc: "The unthinkable has happened - the armies of Mûmakan have been broken and driven from Kôronânde in humiliation."
 mumakan.0021.a: "Impossible!"

 mumakan.0022.t: "Our Greatest Humiliation"
 mumakan.0022.desc: "Ataraka has come, and you are to meet him to his capital, to his table to beg for scraps, he has entirely humiliated you, your army, your nation, all shall fall into despair, you speak to him, he seems a great man, a masterful leader, this war has made him, and you know looking at him, talking to him he is a good man, perhaps the best in a generation, for he has best you. you have a conversation, it is terse, this war has gone on for a lifetime it seems. Aamedi gets to business, he presents the terms, eyewatering terms, you cry for the first time since you were a child for this treaty, your failure shall bond Mûmakan in a hundred threads to be little more than a pleasure slave to Kôronânde to be used to their every thirsting whim. and yet, you have no choice, they have destroyed your armies, they have brought the entire empire low. This war cannot go on, lest your nation fall apart before their victorious armies and Amarû itself befall the same fate as their Kôronânde."

 mumakan.0022.a: "You sign bitterly, and stand unbent, it will be your last dignity, it will be the nation's last dignity"

 mumakan.0023.t: "Tensions are Endless"
 mumakan.0023.desc: "The court is a nest of vipers now, with imperial princes whispering of succession and tribal leaders demanding answers."
 mumakan.0023.a: "Tighten the grip - execute the loudest dissenter as a warning."
 mumakan.0023.b: "Attempt to placate them with vast promises and high positions."

 mumakan.0024.t: "The Last Days of Our Emperor"
 mumakan.0024.desc: "Sandamal senses the walls closing in but refuses to bend - he has survived worse."
 mumakan.0024.a: "I am still the Iron Lion - let them come!"
 mumakan.0024.b: "Double the palace guard and trust no one."

 mumakan.0025.t: "Aamedi Sends His Regards"
 mumakan.0025.desc: "A poisoned blade in the dark - Sandamal the Iron Lion falls to an assassin's hand, his empire cracking behind him."
 mumakan.0025.a: "So ends the Iron Lion..."

 mumakan.0026.t: "The Crisis of Greatest Proportions"
 mumakan.0026.desc: "With Sandamal dead, the empire fractures as princes and tribal warlords scramble for the throne."
 mumakan.0026.a: "Seize the throne before anyone else can - strength is all that matters now."
 mumakan.0026.b: "Convene the tribal council and seek a mandate - legitimacy will outlast force."

 mumakan.0027.t: "The War of National Revenge"
 mumakan.0027.desc: "Kôronânde, sensing the chaos, launches a devastating counter-invasion into the heartlands of Mûmakan. They claim to come to liberate the people of Mûmakan from the tyranny and incompetence of the emperors."
 mumakan.0027.a: "Rally whatever forces remain - the empire must not fall!"
 mumakan.0027.b: "There is no winning, they have found us hopeless, destitute, #high they shall come and kill us all #! #N Abandon your posts! Flee, flee for your lives!#!"

 mumakan.0028.t: "Childish Behavior"
 mumakan.0028.desc: "Before Ataraka leaves, he turns around, and flipps the bird, with the an such a salacious smirk that it alone could conquer the world twice over" 
 mumakan.0028.a: "Why I never!"

 ### Ataraka II - Miracle at Korlan (Victory) ###

 mumakan.0031.t: "The Miraculous Victory"
 mumakan.0031.desc: "Against all odds, Kôronânde has driven the invaders from its shores and the republic still stands."
 mumakan.0031.a: "The republic endures - the way of the forefathers endures!"

 mumakan.0032.t: "The Meeting before the Wall-Upon-Law"
 mumakan.0032.desc: "The emperor stands before us, laid low before us, by our hands we have won this impossible victory. This would be king, this would be ji-indur, this would be despoiler of our republic, is not at all what Ataraka thought he would be. Here he stands with the last dignity he can muster but ataraka can see it in his eyes, they are burning, the same burning ataraka felt before the sight of Kôronânde butchered and undone. Ataraka will feel pity for arguing about the realm they both lead, but he also feels contempt. Whatever good this emperor would have done for his realm, he still has left Kôronânde in ruins, left Ataraka's family in ruins, left their people in ruins, and now they are ruined both. Besides you, Aamedi, have drafted the treaty of peace, it is a document binding, for the damage they have done, the sacrilege they have done, will be repaid by this generation, and the next, and the next. Sandamal stands as still as an old oak as he signs he looks more tired than ever, Aamedi simply smiles, a terse smile, there is no pity in his eyes, only expectation. Thus Sandomal has signed his empire away, into the annals of history..."
 mumakan.0032.a: "... And Something great of worth has been lost"  #fires 0034
 mumakan.0032.b: "... And nothing of worth was lost"  # Fires 0033 fliping bird and the other flipping the bird event 0028

 mumakan.0033.t: "Fliping the Bird"
 mumakan.0033.desc: "You were content to leave the broken emperor before you to whatever provincial disaster he shall soon be faced with. But after all he did to your country, senseless, unshackled, destruction. After what you had to do, the horrible things you had to do- you have a better idea. A much, much, better idea.\n\n You turn and you muster the most egregious, most lambasting grin you could and with a swift gesture you flip the bird towards the emperor of Mûmakan, you've won, and he can do nothing but gasp in surprise."
 mumakan.0033.a: "Well I Never!" #fires 0034

 mumakan.0034.t: "Rebuilding"
 mumakan.0034.desc: "Korlan lies in ruins but the spirit of the $koronandi$ is unbroken - now comes the long work of restoration."
 mumakan.0034.a: "Pour everything into rebuilding the city and its defenses."
 mumakan.0034.b: "Focus on rebuilding the fleet - our trade is our lifeblood."

 mumakan.0035.t: "The Great Debate"
 mumakan.0035.desc: "News arrives that Sandamal is dead and Mûmakan descends into civil war - Aamedi argues this is the republic's moment to strike."
 mumakan.0035.a: "Press claims to their very heartlands - let the empire shatter piece by piece"
 mumakan.0035.b: "We will take revenge! The republic shall be reorganized INTO THE FIRST KORONADI EMPIRE" #Max Cyn
 mumakan.0035.c: "We have bled enough - rebuild and let them destroy themselves."

 ### Ataraka II - White Peace ###

 mumakan.0041.t: "We Have Survived"
 mumakan.0041.desc: "The war ends without resolution and Kôronânde remains free - battered, but free."
 mumakan.0041.a: "Survival is its own victory."

 mumakan.0042.t: "A Meeting with the Emperor"
 mumakan.0042.desc: "Ataraka meets with the emperor of Mûmakan expecting his foe to be some dark lord, some tyrant king with an army of slaves, but history rarely is so black and white, ahead of him is a man, the emperor, and he is much more a tired old man of duty, a good man, though on the other side. The more he talks to the more he respects, though so much pain has been bought for so little, they have both survived, and now finally, no one is the master, for both ataraka and sandamal consider each other as equals."
 mumakan.0042.a: "Be conciliatory to build a lasting peace. We must look to the future."
 mumakan.0042.b: "Project strength, you know this is only a temporary respite."

 mumakan.0043.t: "Rise from Ruins"
 mumakan.0043.desc: "Korlan must be rebuilt from the desolation and salt of the sack, and the republic's institutions restored."
 mumakan.0043.a: "Rebuild walls"
 mumakan.0043.b: "Rebuild markets"

 mumakan.0044.t: "War is on the Horizon"
 mumakan.0044.desc: "Aamedi pulls you aside again, no matter what Sandamal Says, you must not trust him, that Sandamal is already planning a second campaign and the republic must prepare, which he will gladly get to doing once he 'has the proper resources.'"
 mumakan.0044.a: "We must build an army worthy of the republic!" 
 mumakan.0044.b: "No, we must pursue peace and reconciliation! Pen a letter to Sandamal!" 

 mumakan.0045.t: "The Final Battle"
 mumakan.0045.desc: "The Empire has returned to end our republic once and for all, we done all we can, and we are ready"
 mumakan.0045.a: "Call upon the sons of the republic, en mass!"
 mumakan.0045.b: "Our War Mumaks Shall turn them back, they shall not pass!"


 ## Ataraka II - War Loss ##

 mumakan.0051.t: "The End of the Republic"
 mumakan.0051.desc: "Kôronânde has fallen and Ataraka must flee across the sea to preserve any hope of restoration."
 mumakan.0051.a: "We have escaped but with little more than our bare hands."
 mumakan.0051.a.tt: "#N No reserves remain - we fight with bare hands.#!"

 mumakan.0052.t: "The End of the Republic"
 mumakan.0052.desc: "Ataraka makes his final stand with whatever reserves remain - every resource saved now buys blood and steel."

 mumakan.0052.a: "We have barely escaped with our lives" # Add trait maimed
 mumakan.0052.a.tt: "#N No reserves remain - we fight with bare hands.#!" 
 mumakan.0052.b: "We have escaped but have been injured!" # Add trait wounded
 mumakan.0052.b.tt: "#N No reserves remain - we fight with bare hands.#!"
 mumakan.0052.c: "We have eescaped but with little more than our bare hands."
 mumakan.0052.c.tt: "#N No reserves remain - we fight with bare hands.#!"
 mumakan.0052.d: "A handful of militia is all we can muster."
 mumakan.0052.d.tt: "#N A handful of militia is all we can muster.#!"
 mumakan.0052.e: "A small warband rallies to the banner."
 mumakan.0052.e.tt: "#N A small warband rallies to the banner.#!"
 mumakan.0052.f: "A proper garrison can be fielded."
 mumakan.0052.f.tt: "#N A proper garrison can be fielded.#!"
 mumakan.0052.g: "Enough arms for a credible defense."
 mumakan.0052.g.tt: "#N Enough arms for a credible defense.#!"
 mumakan.0052.h: "A real army begins to take shape."
 mumakan.0052.h.tt: "#N A real army begins to take shape.#!"
 mumakan.0052.i: "Our hidden stockpiles yield a formidable host."
 mumakan.0052.i.tt: "#N Our hidden stockpiles yield a formidable host.#!"
 mumakan.0052.j: "The Mumakil are saddled and the guard assembled in force."
 mumakan.0052.j.tt: "#N The Mumakil are saddled and the guard assembled in force.#!"
 mumakan.0052.k: "Every citizen has been armed - this is a nation at war."
 mumakan.0052.k.tt: "#N Every citizen has been armed - this is a nation at war.#!"

 ### General Mase - In the Emperor's Name ###
 mumakan.0071.t: "The Foregone Conclusion"
 mumakan.0071.desc: "With the desolation of the heart of the Koronandi, it was only a matter of until their blood would stale and their resolve anemic. Now #Italic the Foregone Conclusion#! has been realised, this farce of a war is over and we have taken in our rightful victory, what we are owed. Now begins the task of rebuilding this sublime porte into a tool for all of the empire's prosperity. No longer shall this city be a leech taking succour from our stomachs. No longer shall the fat merchant-lords of this city suck the [GetTitleByKey('e_mumakan').GetName] dry for the ill-gotten wealth they lust for. \n\nNow that we have reclaimed all that they stole, my fellow soldiers have returned home to enjoy the fruits of their great labour. But there yet one duty I must fulfill, it is a great honor and a great burden, to be eyes and hands of our great emperor [GetScriptedCharacterByHistoryID('lineofmamakil125').GetFirstName] as the first imperial governor of this land - to keep the peace of the realm, and to make it ready to join our great empire. I must look to the future and I take account all those who are left to do this final task."
 mumakan.0071.a: "It is time to win the peace."
 
 mumakan.0072.t: "Entering The City of Kôronânde"
 mumakan.0072.desc: "The general rides through the shattered gates of Korlan as its people watch in silence and fear."
 mumakan.0072.a: "Survey the damage and begin establishing order."
 mumakan.0072.b: "Let the soldiers celebrate - they have earned their plunder."

 mumakan.0073.t: "Meeting with Aamedi"
 mumakan.0073.desc: "Aamedi is always in the right place in the right time, and always with the right offer, long has his family been an ally of Mûmakan (he claims) but the general is not convinced in the slightest, he has met and danced with men such as he, little more than a user, Aamedi says a user he may be, but he also may be used, it would be unwise to not utilize his skills. He asks him a question about power, and the general answers, but Aamedi corrects him, he claims the republic is a very different animal to ride than what he is used to, he claims the republic is still republic of men, a republic of princes, but Aamedi claims that indeed there are those who are bastards, and the honorable and the ugly and the fine, but here in the republic every person is in themselves a prince and unlike any prince that he has ever tried to lead. But he wants the hard stuff, the information on the rebellion that is surely brewing, every vein of this republic ran through him, he would allow him to tap it, if he was given a modicum of power and to take advantage of the chaos."
 mumakan.0073.a: "Aamedi can be counted upon - his knowledge is too valuable to waste."
 mumakan.0073.b: "Aamedi cannot be trusted - I know men like him would sooner backstab me once it was useful to him."

 mumakan.0074.t: "You Rebuff Him"
 mumakan.0074.desc: "Aamedi bows smoothly and withdraws, but his eyes promise that the general will regret this decision."
 mumakan.0074.a: "Good riddance."

 mumakan.0075.t: "An Accord with Aamedi"
 mumakan.0075.desc: "Aamedi smiles thinly and gives him a gift, he provides a name, a location, and a man, he will contact them and set them up, bait for the bigger prize, and enemies of his. though admittedly he would benefit directly and quite profitably, they are a known quantity for the resistance."
 mumakan.0075.a: "Then let us begin - show me where the rats hide."

 mumakan.0076.t: "Resistance, Endless Resistance"
 mumakan.0076.desc: "Despite all efforts, the $koronandi$ refuse to submit and ambushes grow bolder by the week."
 mumakan.0076.a: "Double the patrols, but keep them in good order, these people are fellow subjects now!"
 mumakan.0076.b: "Perhaps Aamedi was right after all..."

 mumakan.0077.t: "Aamedi Says I Told You So"
 mumakan.0077.desc: "Aamedi appears as if summoned, wearing that infuriating knowing smile, and offers his services once more."
 mumakan.0077.a: "I will not crawl to a turncoat - get out of my sight."
 mumakan.0077.b: "...Fine, you insufferable snake - help me end this."

 mumakan.0078.t: "Aamedi's Response"
 mumakan.0078.desc: "Aamedi shrugs and departs,pride makes a poor shield against knives in the dark."
 mumakan.0078.a: "Let him scheme - I will hold this city by the sword alone."

 mumakan.0079.t: "Aamedi's Response"
 mumakan.0079.desc: "Aamedi's smugness is unbearable, but within days the ambushes decrease as his intelligence network takes effect."
 mumakan.0079.a: "The results speak for themselves - for now, we work together."

 ### General Mase - White Peace ###

 mumakan.0081.t: "Dishonor Before Death"
 mumakan.0081.desc: "The general is ordered to accept a white peace - everything he fought for rendered meaningless by the princes and worst of all the emperor."
 mumakan.0081.a: "Swallow my pride and obey - I serve the throne, not my ego."

 mumakan.0082.t: "The Peace of Death"
 mumakan.0082.desc: "The general must choose between clinging to his wandering commission or accepting land and settling into obscurity."
 mumakan.0082.a: "Refuse to settle - I am a soldier, not a farmer."
 mumakan.0082.b: "Accept the land and a quiet life - this war is over for me."

 ### General Mase - Defeat ###

 mumakan.0091.t: "Our Greatest Defeat"
 mumakan.0091.desc: "The general's army is shattered and scattered, and the promised governorship has turned to ash."
 mumakan.0091.a: "Fall back and regroup - there may yet be a chance."

 mumakan.0092.t: "No Roads Left to Us"
 mumakan.0092.desc: "Defeated and disgraced, the general faces the long march home with nothing to show for years of blood."
 mumakan.0092.a: "Await the emperor's instruction and face whatever judgment awaits."
 mumakan.0092.b: "Disappear into the frontier - better exile than execution."

 mumakan.0093.t: "Return or No Return?"
 mumakan.0093.desc: "With Sandamal dead, the general must decide where his sword and his ambition point next."
 mumakan.0093.a: "Side with the new emperor - loyalty to the throne endures."
 mumakan.0093.b: "Remain aloof - let the princes bleed each other before choosing a side."
 mumakan.0093.c: "Claim your own in the chaos - a general with an army needs no emperor."

 ### Ataraka Initial Story Chain ###

 # mumakan.0110 The Fall of Kôrlan from Ataraka's perspective
 # Aamedi is with you as you look out into the bay, headed toward the inland fortress of Tânande.
 # 3 different responses, all lead to Aamedi responding.
 mumakan.0110.t: "The Fall of Kôrlan"
 mumakan.0110.desc: "#Italic The morning rises, and dawn brings#! #Bold death.#! \n\nYou can see it, flickering like a blood moon upon the bay as clear in the morning as in the night, the fire rises over Kôrlan, great and terrible, a black and listless sallow silence. It burns, and your people burn with it, your republic, your burden, your honor, your hope. It burns like your eyes. It burns like your heart. As the wind catches the sail of your lonesome vessel and carries to you the scent of smoke, of burning spice, of burning flesh, you know.\n\nThe labor of a hundred generations in flame. Thousands of years of law, council, and trade, the ten thousand faces of the Kôronândrim in their ten thousand labors, all of it now the offering of a tyrant's vanity."
 mumakan.0110.a: "I gaze now upon the pyre of the republic."
 mumakan.0110.b: "There are no words."
 # cynical response
 mumakan.0110.c: "What is done is done."

 # mumakan.0111 Aamedi's response is the same no matter what you said.
 mumakan.0111.t: "Aamedi's Reply"
 mumakan.0111.desc: "Aamedi has been very quiet, but it is not a peaceful silence. You can see it in his posture. His hands clench, and his teeth grind. His normal haughty implacability has been shattered. Fire and death blaze in his eyes, tinted with despair and hate alike. He gazes across the waters, before at last turning to you.\n\n"You feel it as well, Ataraka." His voice is tight. "You feel this pain, this sorrow. Hold onto it. It alone shall sustain us in the long days ahead, and by it we might yet see a true victory..."
 # you look back and think of your choices how did it come to this?
 mumakan.0111.a: "I remember the road that led us to this dark day..."

 # mumakan.0112 You remembered the day that the emperor sent his first, last and final ultimatum.
 mumakan.0112.t: "The Proclamation of Sandamal"
 mumakan.0112.desc: "It was a dreary day the message came.\n\nA messenger bearing a scroll sealed with the imperial seal of Emperor Sandamal demanded to speak to the Great Council, and in my heart I knew it could be nothing good. Unfurling the scroll, the emissary spoke with the Emperor's voice.\n\n"To the councilors of Kôronânde, hear my words, and the final offer of leniency. Long have you glutted on the blood of my people, drawing of our lifeblood and spitting on the honor of our ancestors. No longer. Humble yourselves before the rightful heirs of the blessed Indur, and genuflect before his throne, and there need not be blood, for gold shall pay the weregild of your sins. Refuse, and I shall be left with no other recourse but to avenge my people with steel."\n\nThe council immediately erupts in outrage at the sheer gall, the blatant attempts to extort money from them. Words quickly build, a fervor reaching pitch, oaths and curses streaming from the councilors as they swear to never kneel before the Emperor."
 mumakan.0112.a: "And so it was war."

 # mumakan.0113 War was coming from the east, you had little time to prepare, but...
 mumakan.0113.t: "The War Council"
 mumakan.0113.desc: "When the emissary had departed, the Council turned to the matter of the now looming war. Yet there was little fear then - for was not Kôronânde rich beyond imagining? Were Kôrlan's walls not mighty and tall? The sons of the republic stood united, unlike the long divided savages of the empire now ranting threats at their gates.\n\nYet amidst the fervor and boasting, one voice of caution quietly caught my ear - Aamedi speaking of caution, of having heard many things about the Emperor Sandamal and of those in his employ. And though I then wished to snap at him, to castigate how his very faction's policies and blatant corruption led to this precipice, I mastered myself. It was not the time. Not when the republic potentially hung by a thread.\n\nYet in spite of my own resolution, I found little such in the council - factions quickly splitting apart, debating the cost of the defense, who should be hired, who shall be summoned. Yet at the last, the council narrowly decided on their measures..."
 mumakan.0113.a: "We must focus on Mumakil to face the empire in the field." # Spawns 4 Elephants, 2 citizen guard, 2 mangonels THESE SHOULD BE A TOOLTIP
 mumakan.0113.b: "The Republic's sons are our strength." # Spawns 2 Elephants, 4 citizen guard, 2 mangonels
 mumakan.0113.c: "We must prepare for the counterattack!" # Spawns 2 Elephants, 2 citizen guard, 4 mangonels

 # mumakan.0114 But it was too little too late... the army of Mûmakan was at your gates, so you...
 mumakan.0114.t: "The Lightning Campaign"
 mumakan.0114.desc: "Yet the preparations were all for naught. The armies of Mûmakan were marching ever ere Sandamal's emissary spoke with us, and scarcely had our defenses started to be erected when the imperial armies came down out of the east. Any attempts to prevent them were turned aside with ease, as if the armies of Kôronânde were but small nuisances.\n\nBefore such a campaign, hopes fell suddenly from the heady confidence of but a day ago. Sandamal's host had spread despair by the speed of their advance, and that was a weapon more terrible than steel."
 mumakan.0114.a: "Yet still we had to try!"
 # cynical response
 mumakan.0114.b: "No option was left off the table!" # cynical
 mumakan.0114.c: "Our confidence was our folly."

 # mumakan.0115 The siege was bloody
 mumakan.0115.t: "Blood and Gold"
 mumakan.0115.desc: "The siege did not last long, all things considered. The walls held for a time, but the great Mumakil at last breached it, and from there panic spread. The many people of Kôrlan now became its undoing, as they ran from the broken wall, desperate to find safety in home or upon ship. The chaos slowed any hopes of a successful defensive action, and the imperial forces were not blind. They swiftly made for the harbor, seeking to deny any escape. Only a few ships successfully cast off before the first was set aflame, the great ships kindling for the funeral pyre of the republic. And the fire spread, until not just the port but the entire city was wreathed in terrible flame. My own wife was lost then, caught beneath crumbling stone and blazing hall. The proud palaces of the great families were spared not. They were looted, the families slaughtered or set in chains, made to serve the victorious. The countless treasures of the republic, both of blood and gold, taken for the empire's own."
 mumakan.0115.a: "It was a scene of hell."

 # mumakan.0116 There was little hope, hundreds died in the fires, you sought advice from Aamedi.
 mumakan.0116.t: "Flight of the Council"
 mumakan.0116.desc: "The councilors sought to flee then, seeing the hopelessness of the day, paying me no heed despite my calls for calm, for a plan. But a flight was not to be. Not for them. With the harbor taken, panic at last spread even into them, blame spreading just as quickly. Some attempted to make for their estates, others to the walls to flee overland. Still others tried to make for the harbors despite the danger. They died as easily as the masses they once had held in contempt.\n\nThe council guard remained behind, loyal to the last, holding the imperial forces at bay desperately.\n\nIt was in this chaos that Aamedi emerged beside me, and with a surprising strength, pulled me through the streets, our guards slowly dwindling.\n\n"The day is lost. Tomorrow may yet still be won, but victory first requires survival.""
 mumakan.0116.a: "Perhaps, but how?"

 # mumakan.0117 Finally the city was falling, Aamedi had a ship, you had to flee, but you had left with...
 mumakan.0117.t: "Kôrlan's Longest Day"
 mumakan.0117.desc: "The city has all but fallen now. It burned my heart to see the pearl of the seas, the jewel of the republic, set to torch and ruin this way.\n\nAamedi finally led me to the spot he sought - a  hidden alcove letting out into the bay, with a small boat even then being loaded hastily with supplies.\n\n"It is an old contingency," he said quietly, "for a day when the Council may have to flee. My predecessor's predecessor ordered it constructed... that I would live to see it used is a bitter chalice."\n\nWe hastily loaded the boat with what it could bear, before departing, narrowly avoiding the invading hosts. As I watched the burning city, all I could think about was..."
 # with glory and brave deeds
 mumakan.0117.a: "The valour of the defenders."
 # with the final respect of your people
 mumakan.0117.b: "Sorrow for those lost."
 # knowledge of war cynical
 mumakan.0117.c: "That the war was not over yet."

 # mumakan.0120 A Toast to the end of the republic
 # Essential scene: Aamedi gives a thorough analysis of the situation.
 # They need time to evacuate what they can, build up civilian resistance, and delay as long as possible.
 # Option A: (Defensive Strategy)
 # Option B: We will fight to the bitter end (Offensive Strategy)
 # Option C: evacuate our resources to fight another day
 mumakan.0120.t: "A Toast at World's End"
 mumakan.0120.desc: ""So." Aamedi's voice has managed to regain the casual, genial mien that hid all he truly felt. "Kôrlan has been set to flame; in all likelihood, much of the council now lies dead or in chains, as well as many of the noblest and storied houses of the realm."\n\nI bite my tongue to refrain from commenting on the purported nobility of such... storied houses.\n\nHe continues on, gathering momentum like a rolling boulder. "It is likely that the treasury has been plundered and carted off, save the little we have on this ship. The rural towns will be shaking in terror, with the city fallen. I expect many shall surrender at the first sign of Sandamal's host. We will need to tread carefully, but while we fight on, the republic is not dead."\n\nHe turns to me more fully, his eyes no longer blazing but intense in focus. "You are the leader of the republic. How shall we fight now with our greatest resources lost?""
 # Defensive Strategy
 mumakan.0120.a: "We cannot hope to face them on the open field."
 mumakan.0120.a.tt: "You will pursue a path concentrating on defensive tactics and attrition, wearing down the occupying imperial forces."
 # Offensive Strategy
 mumakan.0120.b: "We must strike now while we still have some strength, however scattered."
 mumakan.0120.b.tt: "You will pursue a path concentrating on offensive tactics, gambling all on a single decisive battle to expel the invaders."
 # Evacuating things to the reserve
 mumakan.0120.c: "We will not fight today. Nor tomorrow. But perhaps someday."
 mumakan.0120.c.tt: "You gain a stockpile of #P +1#! Resources. These will strengthen you in exile, if defeated."



 ### War Perspective Events (Ataraka) ###

 # The following events describe the war from Ataraka's perspective at 1, 5, and 10 months.
 # Always a few options: keep potential exile laamp strengthened, or spend last reserves.

 # mumakan.0131 1 month mark perspective event
 mumakan.0131.t: "The Remnants Rally"
 mumakan.0131.desc: "Some doubted, but a month after the sack of Kôrlan, we have managed to hold out. It is still a most precarious thing, but it is time that has allowed for scattered remnants of support to begin to gather. Messengers and supplies are starting to move, and some previously spooked towns have begun to tentatively reach out.\n\nIt is a promising sign, but now I need to decide on what to do with these newfound resources..."
 # Spends resources (and spawns extra troops)
 mumakan.0131.a: "We must acquire more soldiers!"
 mumakan.0131.a.tt: "Spawn 1000 levies"
 # Spends resources (and grants extra siege modifier)
 mumakan.0131.b: "We cannot prevail if we cannot reclaim the cities."
 mumakan.0131.b.tt: "Gain a siege modifier"
 # continue evacuation / do not use resources
 mumakan.0131.c: "Not yet. Let us wait and see how things develop."
 mumakan.0131.c.tt: "You gain a stockpile of #P +1#! Resources."

 # mumakan.0132 8 month mark perspective event
 mumakan.0132.t: "The Desperate Struggle"
 mumakan.0132.desc: "Having survived 8 months of war, our survival is no longer considered a sheer fluke."
 # spend resources to continue war
 mumakan.0132.a: "spend resources to continue war"
 mumakan.0132.a.tt: "You spend a stockpile of #N -1#! Resources."
 # spend money to continue war
 mumakan.0132.b: "spend money to continue war"
 mumakan.0132.b.tt: "200 gold should cover the costs"

 # mumakan.0133 15 month mark perspective event
 mumakan.0133.t: "Anniversary"
 mumakan.0133.desc: "I have been moving from village to camp to village, crossing through the dense jungled hinterland to avoid capture, to coordinate defense, to inspire resistance. But on days like these, it is now I, who am in need of faith. \n\nI have seen horrors that no one should ever have to see. I have seen indescribable despair in destitution and ruin. But what lies before me now... \n\nToday is a humid day. A hot day. The dense stale air stuffs my lungs and throat. It mixes with the stench of burnt sick. It chokes my every orifice. It makes my stomach lurch, like nothing else has, in this accursed war. Beyond the ridge, is a valley of pitch, with stark white bones, and starving dogs. They gnaw at the remains, tear the bone apart, human bones, human remains. Men, women, children - knacker, knave, and noble... \n\n#N are now all food for the dogs.#!"
 mumakan.0133.a: "I try to wretch..."
 mumakan.0133.a.tt: "But your stomach is empty."
 mumakan.0133.b: "I cough over and over and over..."
 mumakan.0133.b.tt: "But you still can't breathe"
 # cynical option (requires global_var:ataraka_cynicism = 3)
 mumakan.0133.c: "There is nothing we can do for the dead"
 mumakan.0133.c.tt: "And you feel nothing at all."

 mumakan.0134.t: "Heroic Defense"
 mumakan.0134.desc: "I do not know how, but I have survived two years against a foe that out-numbered mine ten to one. Around the camp you have been residing, the sons of the republic are all around me, they are battered and they are bandaged, their spears weathered and shields chipped, yet they are smiling. For though the war has been two years in the making, they still fight, as do I. Aamedi taps my shoulder and invites me aside \n\n "These Men have such hope, but I fear it may not last" says Aamedi. \n\n He leans in towards you lowering his voice "You should cultivate that source of Morale while you still can. A man with hope is both useful and obedient, though it may cost us the effectiveness of certain contingencies." \n\n Aamedi goes silent letting me consider my options "Provide me with the necessary resources and I assure you the armies of the republic shall fight twice as hard as before.""
 mumakan.0134.a: "I will provide you with what you need."
 mumakan.0134.a.tt: "You spend a stockpile of #N -1#! Resources and #N 100 #!Barter Goods"
 mumakan.0134.b: "No, We must prioritize our contingencies."
 mumakan.0134.b.tt: "You gain a stockpile of #P +1#! Resources."

 mumakan.0135.t: "38 Month Mark"
 mumakan.0135.desc: "Three years of war and Aamedi proposes selling state treasures and ancient relics to foreign merchants for arms."
 mumakan.0135.a: "Sell the sacred treasures of Korlan for weapons - survival trumps heritage."
 mumakan.0135.a.tt: "You gain a stockpile of #P +2#! Resources!"
 mumakan.0135.b: "Offer trade monopolies to the Mulamburil in exchange for arms and goods."
 mumakan.0135.b.tt: "You gain a stockpile of #P +1#! Resources! #P 100#! Barter Goods."
 mumakan.0135.c: "We will not sell our soul to save our skin."
 mumakan.0135.c.tt: "You spend a stockpile of #N -1#!"

 mumakan.0136.t: "50 Month Mark"
 mumakan.0136.desc: "Over four years of siege warfare have left Ataraka hollowed out, and Aamedi suggests methods that would shame the forefathers."
 mumakan.0136.a: "Poison the wells behind our retreat - let them drink death - even if we must do so as well."
 mumakan.0136.a.tt: "You gain a stockpile of #P +2#! Resources! At to cost of #N Supply Limit and Greater Attrition#!"
 mumakan.0136.b: "Spend the last of the treasury to arm our remaining troops."
 mumakan.0136.b.tt: "You spend a stockpile of #N -1#! to gain #P 100#! Barter Goods."
 mumakan.0136.c: "Save what we can and prepare to flee - there is no shame in living."
 mumakan.0136.c.tt: "You gain a stockpile of #P +1#! Resources"

 mumakan.0137.t: "The Human Cost"
 mumakan.0137.desc: "After years of a war to the death, the $koronandi$ are breaking - Despite Amedi warning against it, without relief our people will die, and die in thousands, tens of thousands."
 mumakan.0137.a: "We must feed whom ever we can with our own stores."
 mumakan.0137.a.tt: "You have lost #N -100#! Barter Goods."
 mumakan.0137.b: "We must evacuate whom ever we can, and provide for them."
 mumakan.0137.b.tt: "You gain #P 1#! Resources! For #N -200#! Barter Goods"

 mumakan.0138.t: "The Death of the General"
 mumakan.0138.desc: "Years in and the Mûmakani army is rotting from within - their famed general's grip slips as Aamedi reports he is dead with the slightest smile."
 mumakan.0138.a: "Launch a counterattack while they are weakened - the forefathers demand it!"
 mumakan.0138.a.tt: "PLACEHOLDER_TT"
 mumakan.0138.b: "Aamedi says patience - we must prioritize our contingencies"
 mumakan.0138.b.tt: "PLACEHOLDER_TT"

 mumakan.0139.t: "Nafarati Revolt" 
 mumakan.0139.desc: "Now thats a wonderful Idea!"
 mumakan.0139.a: "Good gravy!"

 ### Sandamal War Perspective Events ###

 mumakan.0140.t: "Fall of Kôronânde"
 mumakan.0140.desc: "Sandamal receives a triumphant report that Korlan has been sacked and the republic is crumbling."
 mumakan.0140.a: "At last - the republic bends before the throne of Mûmakan."
 mumakan.0140.b: "Good, but do not celebrate until the last $koronandi$ kneels."

 mumakan.0141.t: "Reports from the Front"
 mumakan.0141.desc: "A dispatch arrives from the front - the general reports swift progress but warns of stiffening resistance."
 mumakan.0141.a: "Though this was expected this isn't great"
 mumakan.0141.b: "The general has enough men - this is his test."

 mumakan.0142.t: "16 Month Mark"
 mumakan.0142.desc: "Over a year in and the war drags on, they have proven more tenacious than we've expected, still their capital is in ruins, victory will soon be at hand, the last resistance will be crushed, soon... very soon."
 mumakan.0142.a: "We are committed - victory is surely near."
 mumakan.0142.b: "They have proven their mettle - but against the sky, it will not be enough"

 mumakan.0143.t: "65 Month Mark"
 mumakan.0143.desc: "Five years of war have drained the treasury and the tribal chiefs demand compensation for their continued service."
 mumakan.0143.a: "Pay them from the imperial treasury - loyalty must be bought."
 mumakan.0143.b: "Promise them plunder from Kôronânde - let greed fuel the campaign."
 mumakan.0143.c: "Refuse and remind them who is emperor - the throne does not beg."

 mumakan.0144.t: "The Forever War"  #85 months
 mumakan.0144.desc: "Seven years in and the general has been killed by his own mutinous soldiers - the campaign is collapsing. The Nafarati... they are becoming restless."
 mumakan.0144.a: "Appoint a new commander and send what ever fresh troops we can scrounge up - we cannot stop now, we must not!."

 mumakan.0145.t: "The Nafarati Revolt" #12 years
 mumakan.0145.desc: "This war is nearly twelve years old, half a generation has passed since Kôronânde has fallen and still, STILL they do not die, and worst of all the Nafarati have become so embittered by this long campaign that they have revolted!"
 mumakan.0145.a: "Damn it all!"

 ### General War Perspective Events ###

 mumakan.0151.t: "Reports from the Front"
 mumakan.0151.desc: "The general drafts an optimistic report to the emperor, confident the resistance will crumble within weeks."
 mumakan.0151.a: "Report that victory is imminent and request minimal reinforcements."

 mumakan.0152.t: "16 Month Mark"
 mumakan.0152.desc: "Over a year in the field they are still fighting despite the loss of their capital, despite all he holds in disdain, when cornered they fight more viciously than any lion."
 mumakan.0152.a: "Shift to a siege strategy - starve them into submission."
 mumakan.0152.b: "Launch aggressive raids to break their will."

 mumakan.0153.t: "65 Month Mark"
 mumakan.0153.desc: "Five years in and despair sweeps the camp while desertion rises - the general must make brutal choices."
 mumakan.0153.a: "Execute deserters publicly to maintain discipline."
 mumakan.0153.b: "Allow camp followers and looting to keep morale afloat."

 mumakan.0154.t: "85 Month Mark"
 mumakan.0154.desc: "In the seventh year, the general is found dead in his tent - his own soldiers have had enough."
 mumakan.0154.a: "So this is how it ends - not in battle, but betrayed by my own men."

 ## Decision Events ##
 mumakan.0200.t: "The Legacy of Amâv"
 mumakan.0200.desc: "At long last, the realm once ruled by [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName], first King of all [men|E] of the [GetTitleByKey('e_mumakan').GetName], has been reforged from the ashes of its legend. Now, the [GetTitleByKey('h_utter_south').GetName] shall stand until the end of time comes!\n\nI shall guide the southern lands into a new future and forge a path that ensures that there will be nobody strong enough to stand in our way!"
 mumakan.0200.a: "The rise of the South is complete."
 
 mumakan.0201.t: "Talilan Burns"
 mumakan.0201.desc: "My armies have broken the last defenders of [GetTitleByKey('k_talilan').GetName], and the remaining [elves|E] have fled. Their forests burn... Good! Let his be a lesson to all who stand in my way. None can oppose the might of a conqueror!"
 mumakan.0201.a: "Good riddance."
 
 mumakan.0202.t: "The Rise of the Nafarati"
 mumakan.0202.desc: "It is a glorious day indeed! We have carved out a [kingdom|E] of our own, for our people to dwell in - and to prosper. Now, none can deny us that what is owed to us by right of blood and iron!\n\nLet us raise a grand war-shrine near the [capital|E] to commemorate this triumphant day, and to create a staging ground for our warriors where they can train and be drilled in the art of war. Soon, the sound of their marching feet shall be hear all over the Utter South!"
 mumakan.0202.a: "Glory to Ji-Indur!"
 
 mumakan.0203.t: "The Palace of Majesty"
 mumakan.0203.desc: "It is finished! The palace, so long in the making, has been completed. Now, white marble walls rise from the central plaza of the capital, and two beautifully crafted statues guard the main entrance to the building itself. Inside, there are many chambers and rooms - enough to house an entire small town by itself!\n\nWithin this structure I shall retire when the burden of ruling becomes too heavy to bear, and I shall be granted a few precious moments of peace and quiet. Reinvigorated, I shall reemerge, and rule with renewed wisdom and prudence, so the Twin Realms may continue to flourish under my gentle hand."
 mumakan.0203.a: "A magnificent thing indeed."

 mumakan.0250.t: "An Offering to the Uvâg"
 mumakan.0250.desc: "Trembling, I set down the basket filled with fruits and dried meat on the etched stones at the feet of the towering mountains. Livestock has been driven into a secluded walled area nearby, and we shall leave them there for the Uvâg to claim.\n\nIn the corner of my eye, I spy movement. As I spin in the direction, there is nothing. No - was that a shade over there, beneath the rocks? I cannot be sure.\n\nHow I pity the tortured souls of our ancestors, cursed to walk these bleak hills forevermore. With this offering, they shall be appeased for another decade..."
 mumakan.0250.a: "Let us return."

 mumakan.0350.t: "The Final Test"
 mumakan.0350.desc: "The sand beneath my feet feels warm as the evening sun begins its descent behind me, where the isle lies. I turn away from its light and face the darkness that lies to the east. I do not turn back to those standing on the beach with me, for all the words have long been said. They know our traditions, as do I.\n\nThe first wave touches my legs, but I do not stop. Soon, the waters embrace me, and I begin to swim. Onwards to the east, the setting sun behind me. May my strength carry me far, and bring favor upon those that must now rule Ambason."
 mumakan.0350.a: "I will swim until I can swim no more."

 #Elevating the Kingdom of Ambason & the Isles
 mumakan.0351.t: "A Kingdom of Pirates"
 mumakan.0351.desc: "For years, I have plied the waterways of the world, reaving, raiding, and razing. I have stolen more gold than most kings will ever see, and my name is cursed from $k_senga_muta$ to $e_khy$.\n\nI am, without question, the most infamous [founder.GetWomanMan] alive, Scourge of the Seas, and have poured my loot and reputation into the heavy settling and fortification of the $c_ambason$.\n\nPeople across the world decry me as the most evil pirate that they've ever heard of.\n\nBut they #EMP have#! heard of me."
 mumakan.0351.a: "I am the [founder.GetLadyLord|U] of Blood and Gold!"
 mumakan.0351.b: "At last, my dream is achieved..."
 mumakan.0352.t: "$mumakan.0351.t$"
 mumakan.0352.desc: "For years, it's been an open secret that [founder.GetFirstName] refused to accept or take any crown save one: [founder.GetPrimaryTitle.GetNameNoTier].\n\n[founder.GetHerHis|U] heart has been set on this so long that my liege seemed to have dedicated [founder.GetHerHis] life to legitimizing the power and authority of [founder.GetHerHis] island home.\n\nAfter uncounted raids, wars, and general slaughters, [founder.GetSheHe]'s succeeded.\n\nSupposedly each jewel in [founder.GetHerHis] new crown was taken from a different raid. Some at court whisper even that there are yet empty sockets for [founder.GetTitledFirstNameNoTooltip] to fill."
 mumakan.0352.a: "Just think of all the gold we're going to make!"
 mumakan.0352.b: "A #EMP [founder.GetTitleAsNameNoTooltip]#!? [founder.GetSheHe|U]'s worse than a robber baron!"
 mumakan.0353.t: "$mumakan.0351.t$"
 mumakan.0353.desc: "Even the lowliest peasant in $k_senga_muta$ has heard of the monstrous [founder.GetFirstName], Scourge of the Seas, and [founder.GetHerHis] life-long quest to win recognition for [founder.GetHerHis] dream realm of reaving pirates.\n\nIt's a legend that strikes fear into lordling and lowly serf alike, but it seems the line between myth and history has blurred of late.\n\nAs of today #EMP [founder.GetTitleAsNameNoTooltip]#! [founder.GetFirstNameNoTooltip] announced [founder.GetHerHis] life's work to be completed.\n\n$k_senga_muta$ counts a new kingdom on its shores, and it is terrible to behold."
 mumakan.0353.a: "[founder.GetSheHe|U]'s not going to raid #EMP us#!, right?"
 mumakan.0353.b: "No more than a [founder.GetTitleAsNameNoTooltip] of Thieves!"

 
 mumakan.0400.opening: "To the fearsome and mighty Sandamal of Mûmakan,"
 mumakan.0400.desc: "You have bested us. We yield to your supreme might. Please spare us further plundering and sacking! We shall submit to your rule and serve you well, if you will have us."
 mumakan.0400.a: "There is no peace. Just war."
 mumakan.0400.b: "Very well... but you shall be humbled."
 mumakan.0400.b.tt: "Every ruler within the [GetTitleByKey('k_koronande').GetName] is subjugated by #high you#!"
 
 mumakan.0401.opening: "To the preposterous Ataraka,"
 mumakan.0401.desc: "If you think your poisonous words could sway me, think again. The war will continue, until all of your pitiful cities are broken ruins."
 mumakan.0401.a: "A pox upon him!"
 
 mumakan.0402.opening: "To the wise Ataraka,"
 mumakan.0402.desc: "Your surrender is accepted. You shall serve me - but not from Kôronânde. Instead, you will govern those islands out there in the bay for me. See that you arrive there in due time."
 mumakan.0402.a: "Farewell, Kôronânde..."
 mumakan.0402.a.tt: "Every ruler within the [GetTitleByKey('k_koronande').GetName] is subjugated by [sandamal.GetName]"