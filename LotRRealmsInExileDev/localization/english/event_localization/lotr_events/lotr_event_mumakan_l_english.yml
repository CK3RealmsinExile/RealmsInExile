 ### Emperor Sandamal - Our Path Forward (Victory) ###

 mumakan.0001.t: "The War is Won"
 mumakan.0001.desc: "The messenger kneels before me on the marble floor of the command pavilion, and for a long moment I say nothing - I simply look at the dust on his boots, the exhaustion in the lines around his eyes. I understand before he speaks a word that it is finished: [GetTitleByKey('k_koronande').GetNameNoTier] has fallen. Not through marriage, as [GetScriptedCharacterByHistoryID('lineofmamakil18').GetFirstNameNicknamed] managed in his age with all his diplomacy and his careful, bloodless genius, but through thirty years of grinding patience forged into a single, decisive campaign of conquest. I remember my uncle's cold, measured voice telling me that empires are not built on sentiment. I think, not for the first time, that he was right about that, even if he was wrong about nearly everything else. The victory sits in my chest like a stone: heavy, cold, and real."
 mumakan.0001.a: "The Iron Lion has proven his name true."

 mumakan.0002.t: "A Hero's Welcome"
 mumakan.0002.desc: "The great hall erupts as I enter. The tribal chiefs roar my name, the court poets already chant their verses, and the banners of the conquered republic hang like trophies from the vaulted ceiling where my father's colors once flew. I receive it all with a straight back and a still face; I have always met the dictates of this throne with such composure, whether they brought triumph or disaster. It was [GetScriptedCharacterByHistoryID('lineofmamakil18').GetFirstNameNicknamed] who first bent [GetTitleByKey('k_koronande').GetNameNoTier] to [GetTitleByKey('e_mumakan').GetNameNoTier]'s will, yet he achieved it with a bride and a banquet. I have secured it through the relentless edge of the sword. What is won by the blade must be held by the blade, and I must not forget that truth even as these men cheer.\n\nThose chiefs who once whispered of dynastic weakness now shout the loudest. I mark their faces, every one of them; they cheer because they expect a harvest of spoils. I will grant them reward enough to satisfy, but never enough to embolden. The work of empire is never finished; it only changes its shape."
 mumakan.0002.a: "Drink your fill tonight! A celebration is in order."
 mumakan.0002.b: "Celebrate if you must, but do not mistake a single victory for the end of our struggle."

 mumakan.0003.t: "A Meeting with Aameda"
 mumakan.0003.desc: "He arrives in silk the color of sea-foam. He bows exactly as low as protocol demands and not a fraction lower; he is a man who has calculated every gesture of his life and found that the precise measurement of deference is worth more than its excess. [aameda.GetName] speaks beautifully, as all his kind do. He speaks of fraternal bonds, of the shared blood between the [GetCultureByKey('koronandi').GetName] and the [GetCultureByKey('mumakanil').GetName], and of a kinship that war has interrupted but cannot destroy. He is not even wrong, technically, which is what makes him dangerous.\n\nI have spent thirty years in a court full of men who smile with their mouths while calculating with their eyes; I know this manner of man as well as I know my own reflection. He will serve the empire loyally, I have no doubt; right until the moment it serves him better not to. A useful serpent is still a serpent. I will keep him close, watching him as a man watches the rope of a bridge he does not entirely trust to hold."
 mumakan.0003.a: "Your words are as smooth as your silks, but my eyes are always open."
 mumakan.0003.b: "A man of such 'fraternal' spirit deserves a prominent place at my side."

 mumakan.0004.t: "Reports of Resistance"  # AI Place Holder - Please Replace
 mumakan.0004.desc: "The governor's dispatches arrive in a steady stream now - ambushes on the eastern supply road, village elders who go silent when the soldiers ask questions, a magistrate found dead in a ditch outside [GetTitleByKey('c_korlan').GetNameNoTier] with no witnesses and no suspects and an entire neighborhood that claims to have heard nothing. I am not surprised; I would think less of them if they simply folded and forgot. A people who fought this long, who bled this much for a republic that gave them something to believe in - they do not lay down their pride with their weapons, and pride, once swallowed, poisons from within. My uncle's answer to this would have been simple and brutal and, in the short term, effective - and in the long term, it would have bred the same hatred that eventually made him unmanageable, the same hatred that gave me my inheritance and my burden. I will not inherit my own ruin in the same fashion; there are other ways to end a war."
 mumakan.0004.a: "Win through force and guile"
 mumakan.0004.b: "Win them over with concessions - 100 friends serve better than 100 slaves."

 ### Emperor Sandamal - Magnanimity (White Peace) ###

 mumakan.0011.t: "White Peace"  # AI Place Holder - Please Replace
 mumakan.0011.desc: "There is a particular humiliation in reaching for something with both hands and finding it has moved just beyond your fingers - not snatched away, not stolen, simply out of reach, and there is no one to blame but the distance. I sign the terms of the white peace in a tent that smells of mud and wet canvas, and I keep my face entirely still, because the face of an emperor belongs to his empire even when his heart does not. I had victory within my grasp - I could see it, could smell it, could trace its outline in the final dispatches before the supply lines broke and the rains came and the northern chiefs began sending me their pointed silences instead of their tribute. A war that devours the empire is no victory, I know this - I have always known this - and yet the knowing of it does not make the signing any easier to bear."
 mumakan.0011.a: "We will accept this peace. lest this war end in utter ruin for both our realms"

 mumakan.0012.t: "The Meeting with Ataraka"  # AI Place Holder - Please Replace
 mumakan.0012.desc: "I expected a demagogue - the kind of man who rises on the heat of a crowd and burns out when the crowd disperses, full of fire and grievance and nothing underneath. What sat across the table from me was something I had not prepared for: a tired man, a decent man, a man who had been handed an impossible burden by his people and had carried it without flinching and without ever, it seemed to me, having asked for it in the first place. He did not gloat. He did not preen. He read the treaty terms with the careful attention of a man who has spent his life reading documents and understanding that the words matter - and when he looked up and met my eyes, there was grief in him, not triumph, and I found I could not hate him for winning what I could not take. I have met kings and I have met great generals and I have met men who believed, truly believed, in the righteousness of their cause - and I have learned to distrust most of them, because belief, in my experience, is often a costume worn over ambition. But this man believed, and it cost him everything to believe it, and I recognized that cost, because I have paid variations of it my entire life. We parted without warmth and without coldness, and I do not think either of us said aloud the thing that passed between us in that last moment - that in another age, another world, we might have been something to each other other than opponents."
 mumakan.0012.a: "Offer a final respect, in him you have found an equal in honor and in skill."
 mumakan.0012.b: "Stare him down and leave without a word - let him wonder what comes next."

 mumakan.0013.t: "The Loss of Legitimacy"  # AI Place Holder - Please Replace
 mumakan.0013.desc: "They are careful about it - they have always been careful about it, these men, these chiefs who bend the knee and sharpen their knives at the same time - but the whispers are not as quiet as they once were, and I have excellent hearing. The gods have withdrawn their favor, they say; the dynasty has been weighed and found wanting; the Iron Lion is old and his teeth are dull. I have heard this particular song before, in every variation, in every register, and I have outlasted every man who sang it - because the throne still stands, because I still stand, and because there is a difference between a setback and a defeat that these men, who have never governed anything larger than a river valley, cannot quite grasp. Let them whisper. I am still the Iron Lion. They will remember that when the whispers reach me, as they always do."
 mumakan.0013.a: "Remind them who sits the throne - I am still the Iron Lion."
 mumakan.0013.b: "Promise a greater campaign to come - this was merely a setback."

 mumakan.0014.t: "Trouble at Home"  # AI Place Holder - Please Replace
 mumakan.0014.desc: "The tribute from the Nâfarati chieftains arrives late, and then lighter than it should be, and then not at all - and the dispatches from the northern prefects take on that particular careful tone that means they are reporting disaster as gently as possible, hoping I will not punish the messenger for the message. This campaign was supposed to silence these men - was supposed to demonstrate, in the clearest possible language, that the empire's reach exceeds the ambition of any one tribe or any one chief who fancies himself above the weight of the throne. Instead I have given them a grievance and a precedent, and emboldened men are the most dangerous kind. I cannot fight them now - the treasury will not sustain it and the army needs to breathe - and so I must be patient, which has always been my greatest weapon and my heaviest chains. Patience has brought me this far. I must trust it to carry me further - but I am tired, and patience is a cold companion on a long road."
 mumakan.0014.a: "We must make concessions, we no longer have the political capital to continue."
 mumakan.0014.b: "Buy their loyalty with gold - we cannot afford yet another war, nor can we let go of our reforms."

 ### Emperor Sandamal - Defeat / Last Days ###

 mumakan.0021.t: "Defeat from the Jaws of Victory" # AI Place Holder - Please Replace
 mumakan.0021.desc: "Defeat. The word sits in my mind like a stone dropped into still water - and I watch the rings spread outward from it, each one a consequence I have already begun to calculate, the court and the chiefs and the tribes and the distant provinces all feeling the ripple before the news has even reached them. I have never used that word for myself before - not in thirty years, not in a dozen campaigns, not in the years of palace intrigue that would have broken a man with less iron in his spine. And yet here it is, undeniable, spoken by a messenger with dust on his boots and fear in his eyes, and I cannot argue with the arithmetic of it: the armies of Mûmakan have been broken and driven from Kôronânde, and the man I was told was a nobody has bested me. The empire is shifting beneath me - I can feel it, the way a sailor feels the current change before the storm arrives - and everything I have spent thirty years building is now, in this moment, in genuine peril."
 mumakan.0021.a: "Impossible!"

 mumakan.0022.t: "Our Greatest Humiliation"  # AI Place Holder - Please Replace
 mumakan.0022.desc: "They brought me to [GetTitleByKey('c_korlan').GetNameNoTier] for the signing, which I understood was deliberate - the conquered city, the enemy's hall, the victor's table - and I walked into that chamber with my back straight and my face still, because the face of an emperor belongs to his empire even in its worst hour, especially in its worst hour. Ataraka sat across from me and he did not gloat either, which I had expected and almost would have preferred, because a gloating man is easy to despise and I needed something easy in that room. Aameda presented the terms with a thin, careful smile - the smile of a man who has been playing a longer game than anyone else in the room and has just confirmed it - and the treaty they laid before me bound Mûmakan in a hundred threads to Kôronânde's prosperity and to Kôronânde's will, for a generation at least. I wept, then, for the first time since I was a boy watching my father's retainers carry him out of the audience chamber - not for myself, but for the empire and for all the sons and daughters who must now be born into the shadow of this day and find some way to stand upright in it. I signed. I did not unbend. That last dignity is mine, and the empire's, and no treaty in any language can strip it from either of us."
 mumakan.0022.a: "You sign bitterly, and stand unbent, it will be your last dignity, it will be the nation's last dignity"

 mumakan.0023.t: "Tensions are Endless"  # AI Place Holder - Please Replace
 mumakan.0023.desc: "The court has become a place of very careful voices and very quick eyes - everyone measuring everyone else, everyone calculating what the defeat means for the man beside them and what it means for themselves, and the imperial princes have stopped disguising their ambitions with the usual thin coat of deference that protocol demands. I know this court. I grew up in it as a ward and a hostage and a spare heir that nobody expected to survive, and I learned its grammar before I learned to shave - the language of implication, of pointed silence, of offers made through intermediaries so that no one's hands appear dirty. I know what to do when the wolves gather. I have always known. The question is not whether I can manage them - it is whether I can manage them before the managing costs more than the alternative."
 mumakan.0023.a: "Tighten the grip - execute the loudest dissenter as a warning."
 mumakan.0023.b: "Attempt to placate them with vast promises and high positions."

 mumakan.0024.t: "The Last Days of Our Emperor"  # AI Place Holder - Please Replace
 mumakan.0024.desc: "There is a particular quality to silence in a court that has decided something - I learned to hear it as a child, watching my uncle's face when he thought no one was looking, watching the servants move a little faster and the guards stand a little straighter and the doors close a little more firmly than they needed to. The court has gone quiet in that way now, and I know what it means. I know, because I have survived it before - survived the men who killed my father, survived my uncle's years of deliberate cruelty, survived every campaign and every betrayal and every whispered conspiracy that thought itself clever enough to reach the throne. Let them come, whoever they are, whatever they have arranged - I am still the Iron Lion, and the Iron Lion does not bend, and does not bow, and does not blink."
 mumakan.0024.a: "I am still the Iron Lion - let them come!"
 mumakan.0024.b: "Double the palace guard and trust no one."

 mumakan.0025.t: "Aameda Sends His Regards"  # AI Place Holder - Please Replace
 mumakan.0025.desc: "The blade finds me between the third and fourth rib — a precise stroke, the work of a man who has been told exactly where to place it, because the hand that hired him would accept nothing less than precision. I stagger, and the assassin catches me almost gently, lowering me to the marble as if this were a courtesy and not a killing, and as my knees strike the cold floor of my own chamber I see it: pinned to the inside of the man's cloak, where only the dying would ever be close enough to read it, a small square of sea-foam silk embroidered with the Aameda crest... \n\nThe marble is very cold. The darkness is not unkind."
 mumakan.0025.a: "So ends the Iron Lion..."

 
 mumakan.0026.t: "The Crisis of Greatest Proportions"  # AI Place Holder - Please Replace
 mumakan.0026.desc: "Sandamal is dead - and the empire, which bent every sinew to his will for thirty years and held together by the particular force of that one man's iron patience, is now discovering what it is made of without him. The princes who bent the knee are standing straight and reaching for what they always wanted. Power, Selfish, indolent, Power. The distant provinces have gone quiet in the manner of men who are waiting to see which way the wind settles before they commit their allegiance to any direction. This is the moment - not the battles, not the campaigns, not the high deliberations of strategy - this, right here, is the hinge on which the empire's future turns. Whoever moves first, moves with the momentum of chaos; and whoever moves last inherits whatever is left."
 mumakan.0026.a: "Strength in arms is all that matters now."

 mumakan.0027.t: "The War of National Revenge"  # AI Place Holder - Please Replace
 mumakan.0027.desc: "They come across the border not as conquerors - they are too clever for that - but as liberators, with banners that proclaim the freedom of the Mûmakanil people from the yoke of a failed dynasty, and I will admit that the rhetoric is well-crafted, because rhetoric is what they have always done best in Kôronânde, and Ataraka above all knows how to make a word land like a blade. Sandamal's gamble has come full circle: the empire he sought to strengthen through conquest is now being consumed by the very people he could not conquer, and the irony of it is the kind that historians will write about for generations in the comfortable distance of time, which is not a comfort available to those of us who are living it. I stand now at the edge of a precipice, the empire is exausted, and I look at the horizon towards the sea and despair."
 mumakan.0027.a: "Rally whatever forces remain - the empire must not fall!"
 mumakan.0027.b: "There is no winning this, they have found us hopeless, destitute, #high they shall come and kill us all #! #N Abandon your posts! Flee, flee for your lives!#!"

 mumakan.0028.t: "One Final Gesture" # AI Place Holder - Please Replace
 mumakan.0028.desc: "He was nearly to the gate when he turned around - and what followed was not the statesman, not the republican hero, not the orator who had moved ten thousand men to stand and fight against an empire - it was simply a man who had, against every reasonable calculation, survived, and who could not quite contain the fact of it. He grinned. He raised a hand. With the most magnificently contemptuous farewell I have ever witnessed in thirty years of watching great men leave rooms, the savior of Kôronânde bid goodbye to the empire of Mûmakan - and then he was gone, through the gate, into the dust, back to his republic. I find, to my own considerable surprise, that I cannot bring myself to hate him for it." 
 mumakan.0028.a: "Why I never!"

 ### Ataraka II - Miracle at Korlan (Victory) ###

 mumakan.0031.t: "The Miraculous Victory" # AI Place Holder - Please Replace
 mumakan.0031.desc: "I had not let myself imagine this. Not once, not in the jungle camps, not in the long dark of the siege, not in any of the small hours when I lay awake with the weight of the dead on my chest and the republic's survival resting on decisions I was not certain I was wise enough to make. I had forbidden myself the luxury of picturing this moment - and now it is here, and I find I have no ready container for it. Something is rising in me like water coming up through stone, like the sun after years of overcast, and I think the word for it is joy - simple, enormous, embarrassing joy - and I cannot stop it and I do not want to. We were utterly out numbered. They burned [GetTitleByKey('c_korlan').GetNameNoTier]. They thought we would break, and we did not break, and somehow - impossibly, ridiculously, magnificently - we have won. The republic lives. My people are safe. I think of the men who stood in the mud with me when there was no good reason left to stand, and I want to find every one of them and shake their hands and tell them: we did it. We did the impossible thing. I am laughing, I think. I am not ashamed of it." 
 mumakan.0031.a: "The republic endures - the way of the forefathers endures!"

 mumakan.0032.t: "The Meeting before the Wall-Upon-Law"
 mumakan.0032.desc: "The emperor stands before us, laid low before us, by our hands we have won this impossible victory. This would be king, this would be Jî-Indûr, this would be despoiler of our republic, is not at all what I thought he would be. Here he stands with the last dignity he can muster but Ataraka can see it in his eyes, they are burning, the same burning Ataraka felt before the sight of Kôronânde butchered and undone. I will feel pity for arguing about the realm they both lead, but he also feels contempt. Whatever good this emperor would have done for his realm, he still has left Kôronânde in ruins, left my family in ruins, left their people in ruins, and now they are ruined both. Besides me, Aameda he presents the treaty of peace, it is a document binding and payment in full, for the damage they have done, the sacrilege they have done. It will all be repaid by this generation, and the next, and the next. Sandamal stands as tall and as still an old oak. With tears betryaing his features, He signs the treaty before him, standing tall one last time, before the last of his dignity is spent. When I look at him now, He seems more tired than ever. Aameda simply smiles, a terse smile, there is no pity in his eyes, only expectation. Thus Sandomal has signed his empire away, into the annals of history..."
 mumakan.0032.a: "... And Something great of worth has been lost"  #fires 0034
 mumakan.0032.b: "... And nothing of worth was lost"  # Fires 0033 flipping bird and the other flipping the bird event 0028

 mumakan.0033.t: "Flipping the Bird"
 mumakan.0033.desc: "I was content to leave the broken emperor before me to whatever provincial disaster he shall soon be faced with. But after all he did to my country. All the senseless, unshackled, destruction. After what I had to do, the things I had to do, all my people, broken, and bloodied, all the fathers and mothers the children, innocent, consumed by the maw of their imposed desolation - I suddenly feel spite greater than any thing else in my heart, greater than my joy, greater than my grief, or pity. \n\n I turn and I muster the most egregious, most lambasting grin I possibly have in all of my life and with a swift gesture I raise a fist, then flip the bird towards the emperor of Mûmakan, We have won, he has taken out dignity and I now pay him in kind, and he can do nothing but gasp in surprise."
 mumakan.0033.a: "Well I Never!" #fires 0034

 mumakan.0034.t: "Rebuilding" # AI Place Holder - Please Replace
 mumakan.0034.desc: "[GetTitleByKey('c_korlan').GetNameNoTier] lies in ruins - the great harbor still choked with the blackened ribs of her burned fleet, the palaces gutted to their bones, her streets bearing the kind of scars that do not heal in a single generation. The work ahead is enormous, and I will not insult it by calling it anything else. But I am alive to face it. My people are alive. The republic is alive - battered past recognition, yes, stripped down to something almost unrecognizable, but alive - and everything that lives can be rebuilt, and I find I face that truth not with dread but with something very close to hunger. I have spent years fighting for the republic's survival. Now at last I get to fight for its flourishing. Stone by stone, law by law, ship by ship - I am not tired of it. I roll up my sleeves and I am glad." 
 mumakan.0034.a: "Pour everything into rebuilding the city and its defenses."
 mumakan.0034.b: "Focus on rebuilding the fleet - our trade is our lifeblood."

 mumakan.0035.t: "The Great Debate"  # AI Place Holder - Please Replace (Though with extensive edits)
 mumakan.0035.desc: "Word arrives that Sandamal is dead - and that Mûmakan, that great and grinding machine, has begun to tear itself apart from within. Aameda materializes at my elbow, as he always does when a door opens somewhere, and argues in that precisely calibrated voice of his that this is the moment - the republic's true opportunity, the chance to press our claims into the heartland while the empire is too busy bleeding to resist. I listen to him carefully, because he is not wrong about the opportunity, and because the joy of victory has not made me a fool. Then I look out at [GetTitleByKey('c_korlan').GetNameNoTier] rebuilding, then I look east towards the border and beyond, and I think of the people of Mûmakan - the farmers and the craftsmen and the mothers with children on their hips - who did not choose this new emperor, who did not choose to live in darkness, any more than my people chose to be invaded, and I ask myself the question I built this republic to answer: should not the people deserve to govern themselves? I fought the long odds because I believed should that our people should have that right, why not extend that golden liberty to all? The great council debates before me, some voices shout for peace, some for war. I stand up to the podium and give my voice to this cacophany.” 
 mumakan.0035.a: "Press claims to their very heartlands - let the empire shatter piece by piece."
 mumakan.0035.b: "We will take our revenge! They will NEVER threaten us again.”  
 mumakan.0035.b.tt: "The republic shall be reorganized into the first Kôronânde empire" #Max Cyn
 mumakan.0035.c: "We have bled enough - rebuild and let them destroy themselves."

 ### Ataraka II - White Peace ###


 mumakan.0041.t: "We Have Survived" # AI Place Holder - Please Replace 
 mumakan.0041.desc: "The war ends without resolution - no triumph, no disaster, only the long exhale of two exhausted peoples stepping back from the edge. Kôronânde remains free: battered, plundered, half her towers brought low, her streets still a burned out shell, all the light has been obscured by the blood of her sons, but it is free, it is breathing, we are all breathing, no more the yoke of war, now the dawn has come, and just this once, it brings hope. For we the living have won a prize more precious in peace than ever in war. Our Lives, Our Freedom. Our Survival…" # AI Place Holder - Please Replace
 mumakan.0041.a: "... And survival is its own victory."

 mumakan.0042.t: "A Meeting with the Emperor" # AI Place Holder - Please Replace 
 mumakan.0042.desc: "Ataraka meets with the emperor of Mûmakan expecting his foe to be some dark lord, some tyrant king with an army of slaves, but history rarely is so black and white, ahead of him is a man, the emperor, and he is much more a tired old man of duty, a good man, though on the other side. The more he talks to the more he respects, though so much pain has been bought for so little, they have both survived, and now finally, no one is the master, for both Ataraka and Sandamal consider each other as equals."
 mumakan.0042.a: "Be conciliatory to build a lasting peace. We must look to the future."
 mumakan.0042.b: "Project strength, you know this is only a temporary respite."

 mumakan.0043.t: "Rise from Ruins" # AI Place Holder - Please Replace 
 mumakan.0043.desc: "[GetTitleByKey('c_korlan').GetNameNoTier] must be rebuilt - the harbor and the markets and the courts of law, all the intricate architecture of a civilization that was, for a terrible stretch of months, brought nearly to nothing. I have made my entire career constructing things that those with more caution and less conviction said could not be built, and I have always found a way to prove them wrong in the end. The republic did not survive this war to be left half-finished. I will not stop now." # AI Place Holder - Please Replace
 mumakan.0043.a: "Rebuild walls"
 mumakan.0043.b: "Rebuild markets"

 mumakan.0044.t: "War is on the Horizon" # AI Place Holder - Please Replace 
 mumakan.0044.desc: "Aameda draws me aside - as he always does, at exactly the moment I would prefer not to be drawn - and speaks in that low, deliberate voice he reserves for truths he wishes he did not have to deliver. He says the peace was a simple act of convinience, not a conviction; that Sandamal is already resupplying, already watching our reconstruction with the patient attention of a man who intends to return; that we must build our strength now, while we still have the time to do it. Every instinct I have argues against believing him - the war is over, the dead are barely buried, and I am tired in my bones in a way I had not thought possible. But I have learned, at too great a cost, that Aameda speaks quietly only when he is most certain - and I have never yet profited from dismissing him when he is certain." # AI Place Holder - Please Replace
 mumakan.0044.a: "We must build an army worthy of the republic!" 
 mumakan.0044.b: "No, we must pursue peace and reconciliation! Pen a letter to Sandamal!" 

 mumakan.0045.t: "The Final Battle" # AI Place Holder - Please Replace 
 mumakan.0045.desc: "They have returned - the black horde on the horizon banners and colors and a sea of men and spears, the long columns of Mûmakan's soldiers moving through the passes of the east, everything Aameda warned me of and more. Everything we built in the years since the sack - every wall raised from rubble, every ship launched with raw timber and stubborn hope, every son the republic has sent to the training ground to bleed and sweat and learn - it all comes down to this single day on this single ground. We have done everything that could be done. The sons of Kôronânde are at their posts, and they are ready, and they know what they are defending. Whatever comes next will be decided here, and I will stand at the front of it - I am done deciding things from behind walls." # AI Place Holder - Please Replace
 mumakan.0045.a: "Call upon the sons of the republic, en mass!"
 mumakan.0045.b: "Our War Mumaks Shall turn them back, they shall not pass!" #NO PASARÁN! 

 ## Ataraka II - War Loss ##

 mumakan.0051.t: "The End of the Republic"
 mumakan.0051.desc: "It is over - not the way great things end in songs, with one last defiant stand and a name worth remembering, but in the grinding, unglamorous way that most things truly end: incrementally, inevitably, until the morning comes when the gates simply do not hold. The republic - the thing I have poured every hour of my life into, the thing I took up arms to preserve, the thing I believed in when I could not bring myself to believe in anything else - is gone, and I am running, which is something I swore I would never do and am doing now with the sea spray cold on my face. Behind me on the horizon, [GetTitleByKey('c_korlan').GetNameNoTier] burns: her towers, her courts, her harbor, the street where I argued my first case thirty years ago before a judge who told me I had too much passion for the law. I carry whatever is left - a handful of loyal souls, the embers of something that was once magnificent - and I do not look back again, because if I do I will not be able to stop." # AI Place Holder - Please Replace
 mumakan.0051.a: "We have escaped but with little more than our bare hands."
 mumakan.0051.a.tt: "#N No reserves remain - we fight with bare hands.#!"

 mumakan.0052.t: "The Final Stand" # AI Place Holder - Please Replace
 mumakan.0052.desc: "This is everything we have left - the last coin scraped from empty treasuries, the last men who will still answer the republic's banner when they have every reason in the world not to. Aameda has left, and I shall go into exile with the forces few I have left. I am running, and I do not stop, because stopping is a thing I have not yet learned and do not intend to learn today. The republic lays fallen and chained, her blood soaks the southern seas from Pel to Khy. I am not a fool, I know the day is lost - but my country will not remain in chains quietly, and it will not remain so, as long as we free koronadi live. As we make it to safety in a hidden clearing in the dense jungle. We asses our situation and we come to realize…" # AI Place Holder - Please Replace

 mumakan.0052.a: "We have barely escaped with our lives" # Add trait maimed
 mumakan.0052.a.tt: "#N No reserves remain - we fight with bare hands.#!" 
 mumakan.0052.b: "We have escaped but have been injured!" # Add trait wounded
 mumakan.0052.b.tt: "#N No reserves remain - we fight with bare hands.#!"
 mumakan.0052.c: "We have escaped but with little more than our bare hands."
 mumakan.0052.c.tt: "#N No reserves remain - we fight with bare hands.#!"
 mumakan.0052.d: "A handful of militia is all we can muster."
 mumakan.0052.d.tt: "#N A handful of militia is all we can muster.#!"
 mumakan.0052.e: "A small warband rallies to the banner."
 mumakan.0052.e.tt: "#N A small warband rallies to the banner.#!"
 mumakan.0052.f: "A proper garrison can be fielded."
 mumakan.0052.f.tt: "#N A proper garrison can be fielded.#!"
 mumakan.0052.g: "Enough arms for a credible defense."
 mumakan.0052.g.tt: "#N Enough arms for a credible defense.#!"
 mumakan.0052.h: "A real army begins to take shape."
 mumakan.0052.h.tt: "#N A real army begins to take shape.#!"
 mumakan.0052.i: "Our hidden stockpiles yield a formidable host."
 mumakan.0052.i.tt: "#N Our hidden stockpiles yield a formidable host.#!"
 mumakan.0052.j: "The Mûmakil are saddled and the guard assembled in force."
 mumakan.0052.j.tt: "#N The Mûmakil are saddled and the guard assembled in force.#!"
 mumakan.0052.k: "Every citizen has been armed - this is a nation at war."
