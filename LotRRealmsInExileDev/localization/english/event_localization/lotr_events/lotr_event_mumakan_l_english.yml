 ### General Mase - In the Emperor's Name ###
 mumakan.0071.t: "The Foregone Conclusion"
 mumakan.0071.desc: "With the desolation of the heart of the Koronandi, it was only a matter of until their blood would stale and their resolve anemic. Now #Italic the Foregone Conclusion#! has been realised, this farce of a war is over and we have taken in our rightful victory, what we are owed. Now begins the task of rebuilding this sublime porte into a tool for all of the empire's prosperity. No longer shall this city be a leech taking succour from our stomachs. No longer shall the fat merchant-lords of this city suck the [GetTitleByKey('e_mumakan').GetName] dry for the ill-gotten wealth they lust for. \n\nNow that we have reclaimed all that they stole, my fellow soldiers have returned home to enjoy the fruits of their great labour. But there yet one duty I must fulfill, it is a great honor and a great burden, to be eyes and hands of our great emperor [GetScriptedCharacterByHistoryID('lineofmamakil125').GetFirstName] as the first imperial governor of this land - to keep the peace of the realm, and to make it ready to join our great empire. I must look to the future and I take account all those who are left to do this final task."
 mumakan.0071.a: "It is time to win the peace."
 
 mumakan.0072.t: "Entering the City of Kôronânde" # AI Place Holder - Please Replace
 mumakan.0072.desc: "I have taken many cities. I have never ridden into one like this - not as a man passing through, not as a conqueror leaving before the smoke clears, but as the man who will still be here when the seasons turn. The people lining the street watch in silence - not the silence of a defeated army, not the silence of welcome, but the particular silence of a people who have lost everything and are waiting, with the careful patience of those who have learned that patience is all they have left, to see what comes next. I run the soldier's accounting in my head: the gates need repair, the harbor wall has a breach wide enough to march through, the granaries have been stripped. Then a child in the crowd catches my eye - perhaps seven years old, holding a woman's hand, watching me with an expression I cannot quite read and will not quickly forget. Something shifts in my chest. I file it away and ride on." # AI Place Holder - Please Replace
 mumakan.0072.a: "Survey the damage and begin establishing order."
 mumakan.0072.b: "Let the soldiers celebrate - they have earned their plunder."

 mumakan.0073.t: "Meeting with Aameda" # AI Place Holder - Please Replace
 mumakan.0073.desc: "He appears at precisely the moment and in precisely the place where he is most useful, wearing the expression of a man who has been expecting this introduction for some time and finds it pleasantly overdue. He navigates the ruins of the republic's political life with a fluency that would be impressive in a man who had studied it for years; in a man who helped build it, it is something else entirely. He offers me his services, his many contacts, the surviving families of merchants and moneylenders - a thousand strings of silk and iron, all of it running through his hands. He promises that if we align our interests, the city shall answer to my every beck and call, as it does for him.\n\n I have known men like Aameda in every army I have served - sharp, indispensable, and aligned with no flag but their own - and I have worked under men like Aameda, which is something I have promised myself I would not do again. I am not convinced he can be trusted. I am not convinced I have the luxury of that conviction."
 mumakan.0073.a: "Aameda can be counted upon - his knowledge is too valuable to waste."
 mumakan.0073.b: "Aameda cannot be trusted - I know men like him would sooner backstab me once it was useful to him."

 mumakan.0074.t: "You Rebuff Him" # AI Place Holder - Please Replace 
 mumakan.0074.desc: "He bows - a perfect, unhurried bow, the kind that takes years of practice to make look effortless - and withdraws without argument, which I find more unsettling than argument would have been. His eyes before he turns are calm and dark and faintly amused, in the way of a man who has heard this particular answer before and is already several moves beyond it. He looked at me, in that last moment, the way a craftsman looks at a tool with a hairline crack in it: not with contempt exactly, but with the particular disappointment of a professional confronting a foreseeable problem." # AI Place Holder - Please Replace
 mumakan.0074.a: "Good riddance."

 mumakan.0075.t: "An Accord with Aameda" # AI Place Holder - Please Replace
 mumakan.0075.desc: "He smiles - not warmly; I do not think warmth is a register available to him - and offers, by way of sealing the arrangement, a gift: a name, a location, and a man who is simultaneously useful bait for the larger resistance network and, not coincidentally, a personal enemy of Aameda's. He is entirely transparent about the fact that he will benefit from this arrangement in ways that are direct and probably considerable. I find, unexpectedly, that I respect this - the honesty of a man who does not pretend that his interests and yours are the same thing, but offers you a fair trade anyway. At least you know what you are paying for. I listen to the name. I know where to start."
 mumakan.0075.a: "Then let us begin - show me where the rats hide."

 mumakan.0076.t: "Resistance, Endless Resistance" # AI Place Holder - Please Replace
 mumakan.0076.desc: "Despite every measure - the doubled patrols, the curfews, the supply chain secured at three separate points - the [GetCultureByKey('koronandi').GetName] refuse to submit, and they are getting bolder. Soldiers are found dead at their posts in the grey hours of the morning; supply wagons burn on roads that were clear and quiet the day before; three men I trusted to manage the outer districts have simply stopped responding to dispatch. I have fought hard wars. I have fought wars in difficult terrain, against skilled commanders, against men who had every reason to win and every resource to do it with. I have never fought a people before - an entire people, in their own land, for whom every hill and alley and familiar face is an advantage they did not need to plan. I begin to understand why Sandamal promised me a governorship rather than simply a victory." 
 mumakan.0076.a: "Double the patrols, but keep them in good order, these people are fellow subjects now!"
 mumakan.0076.b: "Perhaps Aameda was right after all..."

 mumakan.0077.t: "Aameda Says I Told You So" # AI Place Holder - Please Replace
 mumakan.0077.desc: "He appears - as if the very thought of being needed is sufficient to summon him - wearing that knowing smile I have come, in these weeks, to actively dislike, the smile of a man who has been waiting patiently for reality to make his argument for him. He offers his services again with the unhurried benevolence of someone who has never genuinely doubted the outcome of this conversation. I look at him for a long moment - at the neat, careful person of him, the pressed robes, the composed hands - and I think of the soldier I lost on the [GetTitleByKey('c_korlan').GetNameNoTier] road two nights ago, whose name I had made a point of learning because I believe that is the least a commander owes a dead man. I think about pride, and what it has cost me, and what it might cost me further." # AI Place Holder - Please Replace
 mumakan.0077.a: "I will not crawl to a turncoat - get out of my sight."
 mumakan.0077.b: "...Fine, you insufferable snake - help me end this."

 mumakan.0078.t: "Aameda's Response - Pride Before Policy" # AI Place Holder - Please Replace
 mumakan.0078.desc: "He shrugs - the magnificent shrug of a man who has received this answer in a hundred different rooms from a hundred different commanders and found each version equally predictable - and departs without pressing the point, because men like Aameda know that pressing is rarely necessary. At the door, without turning, he offers a quiet observation in the tone of a tutor correcting a promising but obstinate student: that pride makes a poor shield against knives in the dark, which is a thing I already know, and knowing it does not make watching him walk away any easier." # AI Place Holder - Please Replace
 mumakan.0078.a: "Let him scheme - I will hold this city by the sword alone."

 mumakan.0079.t: "Aameda's Response - Results" # AI Place Holder - Please Replace
 mumakan.0079.desc: "His smugness is, if anything, worse than this debacle - a settled, architectural smugness that has clearly been load-bearing for years. But within days of our accord, the ambushes begin to taper: first the large ones, then the smaller ones, until the roads are quiet in a way they have not been since I rode through the gates. His intelligence moves through Kôronânde the way water moves through old stone - finding every crack, every seam, every dark place where a hidden man might shelter before he becomes a problem - and it moves faster than anything I could have built from scratch with twice the resources. I do not like what this implies about who truly knows this city, and what it means for who is truly governing it. But I have always been a man who respects results, and the results are undeniable. For now - for now - we work together."
 mumakan.0079.a: "The results speak for themselves - for now, we work together."

 ### General Mase - White Peace ###

 mumakan.0081.t: "Dishonor Before Death" # AI Place Holder - Please Replace
 mumakan.0081.desc: "The order arrives from the throne: accept the white peace - the campaign ends, the gains are surrendered, the blood and the years and the burning of [GetTitleByKey('c_korlan').GetNameNoTier] rendered strategically weightless by the shifting calculations of an empire I have spent my life serving but was never truly asked to understand. I am a soldier. I have always been a soldier, and a soldier obeys his emperor, and I will obey mine - I fold the dispatch and give the order to stand down and I do not allow my expression to change, because that is also something soldiers do. But obedience and dignity are different things, and standing here with this order in my hand, I find I cannot easily locate the latter. I wonder if my emperor understands what he has asked me to swallow. I conclude, probably, that he does not." # AI Place Holder - Please Replace
 mumakan.0081.a: "Swallow my pride and obey - I serve the throne, not my ego."

 mumakan.0082.t: "The Peace of After" # AI Place Holder - Please Replace
 mumakan.0082.desc: "The emperor is generous: land, in lieu of the governorship he promised - a quiet holding in a peaceful province, somewhere I could build a house and plant something and stop waking before dawn to run numbers on troop dispositions. I understand that it is a fair offer. There is nothing wrong with land; land endures, land is real, and I have slept on cold ground often enough to know the value of a roof. But I was not born for a roof - I was born in the gutters of Amarû, and I clawed my way out of them with the only tools I had, and every step I have taken since has been forward, and the idea of turning around now and calling it a life sits in my chest like a stone I cannot shift. The sword is the only thing I have ever truly understood. I do not think I am finished with it yet." # AI Place Holder - Please Replace
 mumakan.0082.a: "Refuse to settle - I am a soldier, not a farmer."
 mumakan.0082.b: "Accept the land and a quiet life - this war is over for me."

 ### General Mase - Defeat ###

 mumakan.0091.t: "Our Greatest Defeat" # AI Place Holder - Please Replace
 mumakan.0091.desc: "My army is shattered - not broken in some orderly tactical retreat that can be dressed up as a repositioning, but genuinely shattered, the way things are when they have been hit hard enough and often enough that there is no reforming them. The [GetCultureByKey('koronandi').GetName] did this - those ragged, half-starved, hollow-eyed defenders of a bombed-out republic who had no business winning and won anyway, who held together by something I understand better than I would like to admit: the particular stubbornness of people who have decided they will not be the ones to let it end. The promised governorship is smoke. I stood at the edge of the greatest thing I was ever going to accomplish, and a people too stubborn to know they were beaten reached up and took it from me. I respect that. I respect it the way you respect a fire - completely, and from what remains of a safe distance." # AI Place Holder - Please Replace
 mumakan.0091.a: "Fall back and regroup - there may yet be a chance."

 mumakan.0092.t: "No Roads Left to Us" # AI Place Holder - Please Replace
 mumakan.0092.desc: "The long march home is before me, and it has the feel of a sentence being read aloud - each step a word, the destination a verdict I cannot yet know. I think of Sandamal, who trusted me with the great task of his reign and whose face I will have to find some way to stand before when this march is done. I think of the men who followed me here, who are not following me back, and I recite their names quietly as I walk because I have always believed that is the least a commander can do for the dead. Whether what waits for me at the end of this road is judgment or mercy, a tribune or a courteous retirement into obscurity, I cannot say - the empire's politics have always been above my particular altitude. It does not matter. I have faced worse things than uncertainty, and I have always faced them the same way: one step at a time, eyes forward, until it is over." # AI Place Holder - Please Replace
 mumakan.0092.a: "Await the emperor's instruction and face whatever judgment awaits."
 mumakan.0092.b: "Disappear into the frontier - better exile than execution."

 mumakan.0093.t: "Return or No Return?" # AI Place Holder - Please Replace
 mumakan.0093.desc: "Sandamal is dead, and the empire - that immense, grinding, seemingly indestructible engine I gave thirty years of my life to - is fracturing along every seam at once, every ambitious lord in Mûmakan suddenly discovering that loyalty is a flexible concept when the throne sits empty. Every sword arm is suddenly worth its weight in thrones, which means for perhaps the first time in my career I am not merely useful but valuable, and there is a difference between those two things that a man from Amarû learns to feel in his bones. I look at the men still with me - battle-worn, loyal past the point of reason, waiting on my word the way they have always waited - and I take stock of what I actually hold, which is more than it appears, and less than I need, and possibly enough. I have spent my whole life being useful to powerful men. It may be time to discover whether I am a powerful man myself." # AI Place Holder - Please Replace
 mumakan.0093.a: "Side with the new emperor - loyalty to the throne endures."
 mumakan.0093.b: "Remain aloof - let the princes bleed each other before choosing a side."
 mumakan.0093.c: "Claim your own in the chaos - a general with an army needs no emperor."

 ### Ataraka Initial Story Chain ###
 # mumakan.0110 The Fall of Kôrlan from Ataraka's perspective
 # Aameda is with you as you look out into the bay, headed toward the inland fortress of Tânande.
 # 3 different responses, all lead to Aameda responding.

 mumakan.0110.t: "The Fall of Kôrlan"
 mumakan.0110.desc: "#Italic The morning rises, and dawn brings#! #Bold death.#! \n\nYou can see it, flickering like a blood moon upon the bay as clear in the morning as in the night, the fire rises over Kôrlan, great and terrible, a black and listless sallow silence. It burns, and your people burn with it, your republic, your burden, your honor, your hope. It burns like your eyes. It burns like your heart. As the wind catches the sail of your lonesome vessel and carries to you the scent of smoke, of burning spice, of burning flesh, you know.\n\nThe labor of a hundred generations in flame. Thousands of years of law, council, and trade, the ten thousand faces of the [GetCultureByKey('koronandi').GetName] in their ten thousand labors, all of it now the offering of a tyrant's vanity."
 mumakan.0110.a: "I gaze now upon the pyre of the republic."
 mumakan.0110.b: "There are no words."
 # cynical response
 mumakan.0110.c: "What is done is done."
 
 # mumakan.0111 Aameda's response is the same no matter what you said.
 mumakan.0111.t: "Aameda's Reply"
 mumakan.0111.desc: "Aameda has been very quiet, but it is not a peaceful silence. You can see it in his posture. His hands clench, and his teeth grind. His normal haughty implacability has been shattered. Fire and death blaze in his eyes, tinted with despair and hate alike. He gazes across the waters, before at last turning to you.\n\n"You feel it as well, Ataraka." His voice is tight. "You feel this pain, this sorrow. Hold onto it. It alone shall sustain us in the long days ahead, and by it we might yet see a true victory..."
 # you look back and think of your choices how did it come to this?
 mumakan.0111.a: "I remember the road that led us to this dark day..."
 
 # mumakan.0112 You remembered the day that the emperor sent his first, last and final ultimatum.
 mumakan.0112.t: "The Proclamation of Sandamal"
 mumakan.0112.desc: "It was a dreary day the message came.\n\nA messenger bearing a scroll sealed with the imperial seal of emperor Sandamal demanded to speak to the Great Council, and in my heart I knew it could be nothing good. Unfurling the scroll, the emissary spoke with the emperor's voice.\n\n"To the councilors of Kôronânde, hear my words, and the final offer of leniency. Long have you glutted on the blood of my people, drawing of our lifeblood and spitting on the honor of our ancestors. No longer. Humble yourselves before the rightful heirs of the blessed Indur, and genuflect before his throne, and there need not be blood, for gold shall pay the weregild of your sins. Refuse, and I shall be left with no other recourse but to avenge my people with steel."\n\nThe council immediately erupts in outrage at the sheer gall, the blatant attempts to extort money from them. Words quickly build, a fervor reaching pitch, oaths and curses streaming from the councilors as they swear to never kneel before the emperor."
 mumakan.0112.a: "And so it was war."
 
 # mumakan.0113 War was coming from the east, you had little time to prepare, but...
 mumakan.0113.t: "The War Council"
 mumakan.0113.desc: "When the emissary had departed, the Council turned to the matter of the now looming war. Yet there was little fear then - for was not Kôronânde rich beyond imagining? Were Kôrlan's walls not mighty and tall? The sons of the republic stood united, unlike the long divided savages of the empire now ranting threats at their gates.\n\nYet amidst the fervor and boasting, one voice of caution quietly caught my ear - Aameda speaking of caution, of having heard many things about the emperor Sandamal and of those in his employ. And though I then wished to snap at him, to castigate how his very faction's policies and blatant corruption led to this precipice, I mastered myself. It was not the time. Not when the republic potentially hung by a thread.\n\nYet in spite of my own resolution, I found little such in the council - factions quickly splitting apart, debating the cost of the defense, who should be hired, who shall be summoned. Yet at the last, the council narrowly decided on their measures..."
 mumakan.0113.a: "We must focus on Mûmakil to face the empire in the field." # Spawns 4 Elephants, 2 citizen guard, 2 mangonels THESE SHOULD BE A TOOLTIP
 mumakan.0113.b: "The Republic's sons are our strength." # Spawns 2 Elephants, 4 citizen guard, 2 mangonels
 mumakan.0113.c: "We must prepare for the counterattack!" # Spawns 2 Elephants, 2 citizen guard, 4 mangonels
 
 # mumakan.0114 But it was too little too late... the army of Mûmakan was at your gates, so you...
 mumakan.0114.t: "The Lightning Campaign"
 mumakan.0114.desc: "Yet the preparations were all for naught. The armies of Mûmakan were marching ever ere Sandamal's emissary spoke with us, and scarcely had our defenses started to be erected when the imperial armies came down out of the east. Any attempts to prevent them were turned aside with ease, as if the armies of Kôronânde were but small nuisances.\n\nBefore such a campaign, hopes fell suddenly from the heady confidence of but a day ago. Sandamal's host had spread despair by the speed of their advance, and that was a weapon more terrible than steel."
 mumakan.0114.a: "Yet still we had to try!"
 # cynical response
 mumakan.0114.b: "No option was left off the table!" # cynical
 mumakan.0114.c: "Our confidence was our folly."
 
 # mumakan.0115 The siege was bloody
 mumakan.0115.t: "Blood and Gold"
 mumakan.0115.desc: "The siege did not last long, all things considered. The walls held for a time, but the great Mûmakil at last breached it, and from there panic spread. The many people of Kôrlan now became its undoing, as they ran from the broken wall, desperate to find safety in home or upon ship. The chaos slowed any hopes of a successful defensive action, and the imperial forces were not blind. They swiftly made for the harbor, seeking to deny any escape. Only a few ships successfully cast off before the first was set aflame, the great ships kindling for the funeral pyre of the republic. And the fire spread, until not just the port but the entire city was wreathed in terrible flame. My own wife was lost then, caught beneath crumbling stone and blazing hall. The proud palaces of the great families were spared not. They were looted, the families slaughtered or set in chains, made to serve the victorious. The countless treasures of the republic, both of blood and gold, taken for the empire's own."
 mumakan.0115.a: "It was a scene of hell."
 
 # mumakan.0116 There was little hope, hundreds died in the fires, you sought advice from Aameda.
 mumakan.0116.t: "Flight of the Council"
 mumakan.0116.desc: "The councilors sought to flee then, seeing the hopelessness of the day, paying me no heed despite my calls for calm, for a plan. But a flight was not to be. Not for them. With the harbor taken, panic at last spread even into them, blame spreading just as quickly. Some attempted to make for their estates, others to the walls to flee overland. Still others tried to make for the harbors despite the danger. They died as easily as the masses they once had held in contempt.\n\nThe council guard remained behind, loyal to the last, holding the imperial forces at bay desperately.\n\nIt was in this chaos that Aameda emerged beside me, and with a surprising strength, pulled me through the streets, our guards slowly dwindling.\n\n"The day is lost. Tomorrow may yet still be won, but victory first requires survival.""
 mumakan.0116.a: "Perhaps, but how?"
 
 # mumakan.0117 Finally the city was falling, Aameda had a ship, you had to flee, but you had left with...
 mumakan.0117.t: "Kôrlan's Longest Day"
 mumakan.0117.desc: "The city has all but fallen now. It burned my heart to see the pearl of the seas, the jewel of the republic, set to torch and ruin this way.\n\nAameda finally led me to the spot he sought - a  hidden alcove letting out into the bay, with a small boat even then being loaded hastily with supplies.\n\n"It is an old contingency," he said quietly, "for a day when the Council may have to flee. My predecessor's predecessor ordered it constructed... that I would live to see it used is a bitter chalice."\n\nWe hastily loaded the boat with what it could bear, before departing, narrowly avoiding the invading hosts. As I watched the burning city, all I could think about was..."
 # with glory and brave deeds
 mumakan.0117.a: "The valour of the defenders."
 # with the final respect of your people
 mumakan.0117.b: "Sorrow for those lost."
 # knowledge of war cynical
 mumakan.0117.c: "That the war was not over yet."
 
 # mumakan.0120 A Toast to the end of the republic
 # Essential scene: Aameda gives a thorough analysis of the situation.
 # They need time to evacuate what they can, build up civilian resistance, and delay as long as possible.
 # Option A: (Defensive Strategy)
 # Option B: We will fight to the bitter end (Offensive Strategy)
 # Option C: evacuate our resources to fight another day
 mumakan.0120.t: "A Toast at World's End"
 mumakan.0120.desc: ""So." Aameda's voice has managed to regain the casual, genial mien that hid all he truly felt. "Kôrlan has been set to flame; in all likelihood, much of the council now lies dead or in chains, as well as many of the noblest and storied houses of the realm."\n\nI bite my tongue to refrain from commenting on the purported nobility of such... storied houses.\n\nHe continues on, gathering momentum like a rolling boulder. "It is likely that the treasury has been plundered and carted off, save the little we have on this ship. The rural towns will be shaking in terror, with the city fallen. I expect many shall surrender at the first sign of Sandamal's host. We will need to tread carefully, but while we fight on, the republic is not dead."\n\nHe turns to me more fully, his eyes no longer blazing but intense in focus. "You are the leader of the republic. How shall we fight now with our greatest resources lost?""
 # Defensive Strategy
 mumakan.0120.a: "We cannot hope to face them on the open field."
 mumakan.0120.a.tt: "You will pursue a path concentrating on defensive tactics and attrition, wearing down the occupying imperial forces."
 # Offensive Strategy
 mumakan.0120.b: "We must strike now while we still have some strength, however scattered."
 mumakan.0120.b.tt: "You will pursue a path concentrating on offensive tactics, gambling all on a single decisive battle to expel the invaders."

 # Evacuating things to the reserve
 mumakan.0120.c: "We will not fight today. Nor tomorrow. But perhaps someday."
 mumakan.0120.c.tt: "You gain a stockpile of #P +1#! Resources. These will strengthen you in exile, if defeated."

### War Perspective Events (Ataraka) ###

# The following events describe the war from Ataraka's perspective at 1, 5, and 10 months. 
# Always a few options: keep potential exile laamp strengthened, or spend last reserves.

# mumakan.0131 1 month mark perspective event 
 mumakan.0131.t: "The Remnants Rally" 
 mumakan.0131.desc: "Some doubted, but a month after the sack of Kôrlan, we have managed to hold out. It is still a most precarious thing, but it is time that has allowed for scattered remnants of support to begin to gather. Messengers and supplies are starting to move, and some previously spooked towns have begun to tentatively reach out.\n\nIt is a promising sign, but now I need to decide on what to do with these newfound resources..." 
 # Spends resources (and spawns extra troops) 
 mumakan.0131.a: "We must acquire more soldiers!" 
 mumakan.0131.a.tt: "Spawn 1000 levies" 
 # Spends resources (and grants extra siege modifier) 
 mumakan.0131.b: "We cannot prevail if we cannot reclaim the cities." 
 mumakan.0131.b.tt: "Gain a siege modifier" 
 # continue evacuation / do not use resources 
 mumakan.0131.c: "Not yet. Let us wait and see how things develop." 
 mumakan.0131.c.tt: "You gain a stockpile of #P +1#! Resources."

 # mumakan.0132 8 month mark perspective event
 mumakan.0132.t: "The Desperate Struggle" # AI Place Holder - Feel Free to Replace
 mumakan.0132.desc: "Eight months. I have lived eight months in the hills and jungles of the hinterland, sleeping in caves that smell of wet stone and old earth, eating what the land and our dwindling allies can spare, making war with the tools of the desperate - ambush, retreat, denial, patience. We hold the spaces between their tightening fists, the flotsam, the places too small or too steep or too thick with jungle for their columns to reach without bleeding for every step.\n\nEight months, and we have not broken. The scouts from Sandamal's host - I have started to recognize them by their bearing, the particular weariness of men who expected a short campaign and find themselves mired in something that will not end - report back to their commanders that the resistance continues. That we continue. I take a grim and private satisfaction in that, though I cannot afford the luxury of dwelling on it.\n\nAameda has been counting our stores with the meticulous care of a man who knows that wars are won not by the brave but by the supplied, and the numbers he presents to me are stark. We are surviving, but survival alone will not free the republic. The question is whether I spend what little we have now to press our fragile advantage, or whether I hold it close against the darker days I know are coming."
 mumakan.0132.a: "spend resources to continue war"
 mumakan.0132.a.tt: "You spend a stockpile of #N -1#! Resources."
 mumakan.0132.b: "spend money to continue war"
 mumakan.0132.b.tt: "200 gold should cover the costs"

# mumakan.0133 15 month mark perspective event 
 mumakan.0133.t: "Anniversary" 
 mumakan.0133.desc: "I have been moving from village to camp to village, crossing through the dense jungled hinterland to avoid capture, to coordinate defense, to inspire resistance. But on days like these, it is now I, who am in need of faith. \n\nI have seen horrors that no one should ever have to see. I have seen indescribable despair in destitution and ruin. But what lies before me now... \n\nToday is a humid day. A hot day. The dense stale air stuffs my lungs and throat. It mixes with the stench of burnt sick. It chokes my every orifice. It makes my stomach lurch, like nothing else has in this accursed war. Beyond the ridge, is a valley of pitch, with stark white bones, and starving dogs. They gnaw at the remains, tear the bone apart, human bones, human remains. Men, women, children - knacker, knave, and noble... \n\n#N are now all food for the dogs.#!" 
 mumakan.0133.a: "I try to wretch..." 
 mumakan.0133.a.tt: "But your stomach is empty." 
 mumakan.0133.b: "I cough over and over and over..." 
 mumakan.0133.b.tt: "But you still can't breathe" 
 # cynical option (requires global_var:ataraka_cynicism = 3) 
 mumakan.0133.c: "There is nothing we can do for the dead" 
 mumakan.0133.c.tt: "And you feel nothing at all."

 mumakan.0134.t: "Heroic Defense" 
 mumakan.0134.desc: "I do not know how, but I have survived two years against a foe that out-numbered mine ten to one. Around the camp you have been residing, the sons of the republic are all around me, they are battered and they are bandaged, their spears weathered and shields chipped, yet they are smiling. For though the war has been two years in the making, they still fight, as do I. Aameda taps my shoulder and invites me aside \n\n "These Men have such hope, but I fear it may not last" says Aameda. \n\n He leans in towards you lowering his voice "You should cultivate that source of Morale while you still can. A man with hope is both useful and obedient, though it may cost us the effectiveness of certain contingencies." \n\n Aameda goes silent letting me consider my options "Provide me with the necessary resources and I assure you the armies of the republic shall fight twice as hard as before."" 
 mumakan.0134.a: "I will provide you with what you need." 
 mumakan.0134.a.tt: "You spend a stockpile of #N -1#! Resources and #N 100 #!Barter Goods" 
 mumakan.0134.b: "No, We must prioritize our contingencies." 
 mumakan.0134.b.tt: "You gain a stockpile of #P +1#! Resources."

 # mumakan.0135 38 month mark perspective event
 mumakan.0135.t: "The Price of Survival" # AI Place Holder - Feel Free to Replace
 mumakan.0135.desc: "Three years. Three years of sleeping in the mud, of eating what the jungle gives and being grateful for it, of watching men I trained and bled beside carried off the field on litters made of branches and torn cloth. Three years of this grinding, thankless, necessary war - and now Aameda comes to me with a proposition that I knew, in the quiet place behind my ribs where I keep the truths I do not wish to face, was always coming.\n\nHe has found buyers. Foreign merchants - Mulambiril traders, men from distant ports who care nothing for the republic or the empire and care very much for profit - who will pay handsomely for what remains of Kôrlan's legacy. The sacred bronzes of the old temple. The star-charts of the navigators' guild, copied by hand across a hundred generations. The ancient instruments of law from the Wall-Upon-Law, the very stones on which Tarasar's words were first inscribed. Heritage. Memory. Identity.\n\n'They are objects,' Aameda says, and his voice is gentler than I expect, which means he knows exactly what he is asking of me. 'Objects do not bleed. Objects do not starve. Objects do not leave children without fathers.' He pauses. 'Our people do.'\n\nI look at the relics laid before me, and I think of Tarasar relinquishing his crown so that the republic might be governed by the wise rather than the born. I wonder what he would say, seeing his heirs haggling over his legacy to buy spears."
 mumakan.0135.a: "Sell the sacred treasures of [GetTitleByKey('c_korlan').GetNameNoTier] for weapons - survival trumps heritage."
 mumakan.0135.a.tt: "You gain a stockpile of #P +2#! Resources!"
 mumakan.0135.b: "Offer trade monopolies to the Mulamburil in exchange for arms and goods."
 mumakan.0135.b.tt: "You gain a stockpile of #P +1#! Resources! #P 100#! Barter Goods."
 mumakan.0135.c: "We will not sell our soul to save our skin."
 mumakan.0135.c.tt: "You spend a stockpile of #N -1#!"

 # mumakan.0136 50 month mark perspective event
 mumakan.0136.t: "The Bitter Calculus" # AI Place Holder - Feel Free to Replace
 mumakan.0136.desc: "Four years and two months. I have stopped counting the days; Aameda counts them for me, in that ledger he keeps close to his chest, the one with the columns of figures that translate human lives into strategic arithmetic. I have changed in these years - I can feel it in the way I hold a blade now, in the way I assess a village not for its people but for its defensibility, in the way I listen to casualty reports with a stillness that would have horrified the man who once argued cases before the bench in Kôrlan's courts of law.\n\nAameda proposes something that makes even him hesitate before speaking it aloud, which is how I know it is truly terrible. We are retreating - slowly, methodically, giving ground to buy time - and he suggests that we leave behind more than scorched earth.\n\n'The wells,' he says, not meeting my eyes. 'If we deny them water, we deny them the ability to hold what they have taken. It costs them months. It costs them men. It costs them the will to continue.'\n\n'It costs us too,' I say.\n\n'Yes.' A pause. 'But we are already dying, Ataraka. The question is whether we die having made it costly, or whether we die having made it easy.'\n\nI look at my hands - a lawyer's hands, a tailor's son's hands - and I think of the wells of my childhood, the cool water drawn up in clay pots, the laughter of children around the basin. I think of what I am becoming, and whether the republic I am fighting to save would even recognize the man who saves it."
 mumakan.0136.a: "Poison the wells behind our retreat - let them drink death - even if we must do so as well."
 mumakan.0136.a.tt: "You gain a stockpile of #P +2#! Resources! At to cost of #N Supply Limit and Greater Attrition#!"
 mumakan.0136.b: "Spend the last of the treasury to arm our remaining troops."
 mumakan.0136.b.tt: "You spend a stockpile of #N -1#! to gain #P 100#! Barter Goods."
 mumakan.0136.c: "Save what we can and prepare to flee - there is no shame in living."
 mumakan.0136.c.tt: "You gain a stockpile of #P +1#! Resources"

 # mumakan.0137 The Human Cost
 mumakan.0137.t: "The Human Cost" # AI Place Holder - Feel Free to Replace
 mumakan.0137.desc: "I have argued with Aameda many times. We argue about strategy, about resources, about the moral boundaries I insist on and he considers quaint. But this is the first time I have argued with him and known, with absolute certainty, that I am right and that being right may kill us.\n\nThe villages behind our lines are starving. Not the slow hunger of short rations - the desperate, hollowed hunger that turns skin to paper and eyes to glass, that makes mothers feed their children tree-bark soup and call it dinner. The war has destroyed the harvest; the imperials seized what the fire did not take, and what remains is barely enough to keep my soldiers standing. Aameda's counsel is clear and cold and strategically sound: the stores are for the army, the army is for the republic, and the republic cannot be saved by feeding people who cannot fight.\n\nI listen to him. I understand his reasoning. I understand that he is probably correct in the narrow, terrible mathematics of survival.\n\nThen I think of my mother - a grocer's wife, a woman who kept her shelves stocked and her neighbors fed through every lean season - and I think of what she would say to a man who let children starve so that soldiers might eat. And I know what I will do, even if it costs me the war."
 mumakan.0137.a: "We must feed whom ever we can with our own stores."
 mumakan.0137.a.tt: "You have lost #N -100#! Barter Goods."
 mumakan.0137.b: "We must evacuate whom ever we can, and provide for them."
 mumakan.0137.b.tt: "You gain #P 1#! Resources! For #N -200#! Barter Goods"

 # mumakan.0138 The Death of the General
 mumakan.0138.t: "The Death of the General" # AI Place Holder - Feel Free to Replace
 mumakan.0138.desc: "Aameda arrives in the command tent at dawn with the particular expression he reserves for news that is simultaneously devastating and useful - a slight lift at the corner of his mouth, a brightness in the eyes that he does not quite suppress, and a stillness in his bearing that tells me he has already calculated every implication before deigning to share the intelligence with me.\n\n'The general is dead,' he says. Simply. As though remarking on the weather.\n\nI wait, because Aameda's silences are as calculated as his words.\n\n'His own men,' he continues. 'Mutiny. It seems years of jungle rot and dwindling pay and the particular indignity of being outwitted by a people they were told would surrender in a month have finally eroded even Mûmakani discipline.' The slightest smile. 'Such a pity.'\n\nI should feel triumph. The man who burned Kôrlan, who shattered my republic, who made my wife a memory and my people exiles in their own land - he is dead, and his army is fracturing. But I have spent too many years in this war to mistake an opportunity for a victory. A wounded beast is dangerous; a leaderless army, doubly so. Some will desert. Others will fight harder, with nothing left to lose and hatred to fill the void where discipline once stood.\n\nAameda watches me think, and when I look up, his expression has shifted - anticipation now, sharp and barely contained. He is waiting for my order."
 mumakan.0138.a: "Launch a counterattack while they are weakened - the forefathers demand it!"
 mumakan.0138.a.tt: "PLACEHOLDER_TT"
 mumakan.0138.b: "Aameda says patience - we must prioritize our contingencies"
 mumakan.0138.b.tt: "PLACEHOLDER_TT"

 # mumakan.0139 Nafarati Revolt
 mumakan.0139.t: "The Northern Storm" # AI Place Holder - Feel Free to Replace
 mumakan.0139.desc: "The messenger is half-dead with exhaustion when they find us - a Mulambiril trader who has been running intelligence for Aameda through channels I chose long ago not to inquire about too closely. The news she carries is the kind that changes the shape of a war in a single breath.\n\nThe Nâfarati have revolted.\n\nNot a border skirmish, not a dispute over tribute - a full secession, the northern warlords declaring their independence from an empire that has bled itself white trying to crush us. Sandamal's great gamble has come undone: he excluded the Nâfarati from the invasion of Kôronânde to prove the throne did not need them, and in doing so proved precisely the opposite. Now, with the imperial treasury drained and the army mired in our jungles, the Nâfarati have simply... walked away. Taken their soldiers, their lands, their loyalty, and their ambitions, and told the empire that it can keep its dying throne.\n\nAameda is already laughing - not his usual careful, measured amusement, but something raw and genuine that I have never heard from him before. 'Do you understand what this means?' he says, and for once there is no calculation in his voice, only the wild, incredulous joy of a man watching his enemy's house catch fire from within.\n\nI understand. The empire cannot fight on two fronts. The question now is whether we strike while the iron is white-hot, or whether we let the fire do our work for us."
 mumakan.0139.a: "Good gravy!"

 ### Sandamal War Perspective Events ###

 mumakan.0140.t: "Fall of Kôronânde" # AI Place Holder - Feel Free to Replace
 mumakan.0140.desc: "The dispatch arrives at court borne by a rider whose horse is half-dead beneath him, and I know before the seal is broken what it contains - the particular urgency of a man who has ridden without rest tells its own tale, and I have been reading such tales for thirty years. Kôrlan has fallen. The great harbor-city, the jewel that has bled my empire for generations through its stranglehold on the southern trade, has been taken by storm. My general - the commoner I raised from nothing, in whom I placed a trust I extend to almost no one - has delivered what every emperor since the departure of Jî-Indûr III has dreamed of and none has dared attempt.\n\nI allow myself one breath of satisfaction. One. Then I set the dispatch aside and begin the calculations that will determine whether this victory is the making of my legacy or merely the preamble to its unraveling. The tribal chiefs will expect reward. The treasury will need replenishment from the spoils. The Nâfarati in the north, deliberately excluded from the campaign, will note both the victory and their absence from it, and draw conclusions I will need to manage carefully.\n\nA firm hand, a generous reward, and a harsh deed if needs must. The war is won. The peace is everything."
 mumakan.0140.a: "At last - the republic bends before the throne of Mûmakan."
 mumakan.0140.b: "Good, but do not celebrate until the last $koronandi$ kneels."

 mumakan.0141.t: "Reports from the Front" # AI Place Holder - Feel Free to Replace
 mumakan.0141.desc: "The general's dispatches have always been a model of military clarity - the positions taken, the positions held, the forces deployed, the forces spent - and I have always read them with the appreciation of a man who values competence above all the gilded virtues combined. But this dispatch carries a note I have not seen from him before: a caution threaded through the confidence like a dark strand in bright cloth.\n\nResistance, he writes, is stiffening in the hinterlands. The rural towns that should have surrendered at the fall of Kôrlan have instead gone silent - not the silence of submission, but the dangerous silence of a people deciding how to fight without an army. He has deployed additional patrols. He has secured the major roads. He is, he assures me, in complete control of the situation.\n\nI have governed for thirty years, and I have learned that when a competent man assures you he is in complete control, it means he is dealing with something that has surprised him and does not yet wish to say so. This does not alarm me - my general is more than capable, and the remnants of the republic cannot sustain resistance for long without their capital, their treasury, or their fleet. But I make a note of the dispatch, and I file it in the part of my mind where I keep the things that may one day require my direct attention."
 mumakan.0141.a: "Though this was expected this isn't great"
 mumakan.0141.b: "The general has enough men - this is his test."

 mumakan.0142.t: "The Stubborn South" # AI Place Holder - Feel Free to Replace
 mumakan.0142.desc: "Sixteen months. The campaign was supposed to last three - four at the outside, if the weather turned or the coastal towns proved more loyal to the republic than their trade ledgers suggested. Instead, I sit in my audience chamber in Amârû reading dispatches that have taken on the particular repetitive cadence of a war that has forgotten how to end.\n\nThe [GetCultureByKey('koronandi').GetName] will not die. I say this not with admiration - though I am forced to admit a grudging measure of it - but with the weary recognition of a man who has studied history long enough to know that occupying a country is a very different art from conquering one. My general holds the cities, the roads, the harbors. The resistance holds the hills, the jungles, the loyalty of every farmer's wife who hides a weapon beneath her hearth-stones. These are not soldiers I am fighting now - they are a people, and a people cannot be defeated by the same means as an army.\n\nThe court grows restless. The tribal chiefs, who cheered so loudly at the fall of Kôrlan, have begun to murmur about costs and duration and the particular inconvenience of campaigns that eat their levies and return nothing but more dispatches requesting more levies. I silence them, for now, with the weight of the throne and the memory of victory. But memory fades, and patience - even an emperor's patience - has its architecture, and I can feel the cracks forming."
 mumakan.0142.a: "We are committed - victory is surely near."
 mumakan.0142.b: "They have proven their mettle - but against the sky, it will not be enough"

 mumakan.0143.t: "The Weight of Five Years" # AI Place Holder - Feel Free to Replace
 mumakan.0143.desc: "Five years. The war that was meant to be my crowning triumph - the act that silenced the whispers, that proved the dynasty still bore divine favor, that showed the Nâfarati and every other restless tribe that the imperial throne needed no one's sword but its own - has become a millstone around the empire's neck, and I can feel it dragging.\n\nThe treasury dispatches no longer arrive with figures; they arrive with apologies, carefully worded explanations of why the figures are not what they should be, accompanied by suggestions that I might consider alternative means of funding. The tribal chiefs have moved past murmuring into the particular pointed silence that precedes demands, and their demands, when they come, are neither modest nor negotiable. They want payment. They have sent their sons and their levies into a jungle war that has consumed five years of their strength, and they want compensation, and they are not wrong to want it - which makes their wanting no less dangerous.\n\nI have three choices before me, and none of them are good, which is the natural condition of imperial governance and one I accepted long ago. But I am tired - not the tiredness of the body, which I have long since learned to master, but the tiredness of the mind, which is a more honest exhaustion and a harder one to hide."
 mumakan.0143.a: "Pay them from the imperial treasury - loyalty must be bought."
 mumakan.0143.b: "Promise them plunder from Kôronânde - let greed fuel the campaign."
 mumakan.0143.c: "Refuse and remind them who is emperor - the throne does not beg."

 mumakan.0144.t: "The Forever War" # AI Place Holder - Feel Free to Replace
 mumakan.0144.desc: "The dispatch arrives not from my general but about him, and the distinction is the kind that changes everything.\n\nGeneral Mase is dead. Not fallen in battle, not taken by fever, not lost to the thousand mundane cruelties of a jungle campaign - killed by his own soldiers, men who followed him through the breach at Kôrlan and who have now, after seven years of a war without end, decided that their patience has a limit their loyalty does not.\n\nI set the dispatch down and I sit very still for a long time, because stillness is what I do when the world shifts beneath me, and it has shifted many times in thirty years and I have never yet let it see me stumble. Mase was mine - I found him, I raised him, I gave him the greatest command in the empire and he delivered the greatest victory - and now he is dead in a tent in a jungle that should have been pacified years ago, killed by the very soldiers I sent to ensure his success.\n\nThe Nâfarati are restless. The tribal chiefs are beyond restless. The treasury is a wound that will not close. And now I must find another commander, another army, another reason for the empire to believe that this war is anything other than the slow consumption of everything I spent thirty years building.\n\nI summon my council. I do not let them see my hands shake."
 mumakan.0144.a: "we cannot stop now, we must not!."

 mumakan.0145.t: "The Nâfarati Revolt" # AI Place Holder - Feel Free to Replace
 mumakan.0145.desc: "Twelve years. Half a generation poured into a jungle that swallows armies and returns nothing but bones and dispatches full of careful language about 'continued fighting' and 'evolving situations.' Twelve years since I watched Kôrlan burn and thought - truly, honestly thought - that the hardest part was over.\n\nAnd now the Nâfarati have revolted.\n\nI should have seen it. I did see it - I saw the shape of it years ago, felt the tension in every delayed tribute and every pointed absence from court, knew in the cold analytical part of my mind that the northern warlords were waiting for exactly this kind of moment: the throne overextended, the treasury drained, the army bled white in a campaign that has become the empire's open wound. I excluded them from the invasion of Kôronânde to prove I did not need them. Instead, I have proved that without the threat of imperial strength to hold them, they have no reason to remain.\n\nThe empire cannot fight on two fronts. I know this. Every emperor who has ever sat this throne and lasted more than a season knows this. The question that sits before me now - cold, immovable, demanding an answer I do not wish to give - is which front I abandon.\n\nI am still the Iron Lion. But iron, left too long in the rain, rusts - and I fear that the rain has been falling for a very long time."
 mumakan.0145.a: "Damn it all!"

 ### General War Perspective Events ###

 mumakan.0151.t: "Reports from the Front" # AI Place Holder - Please Replace
 mumakan.0151.desc: "I write the dispatch to the emperor in the hour before dawn, by the light of a single oil lamp, choosing every word with the care of a man who understands that a report is not merely information - it is architecture. What I build with this letter will determine what Sandamal expects, and what he expects will determine what he sends, and what he sends will determine whether I finish this campaign as the governor of a conquered province or as a footnote in a history of imperial overreach.\n\nThe resistance is crumbling. I write this, and it is mostly true - the organized remnants of the republic's army have been scattered into the hinterlands, their supply lines severed, their leadership reduced to a lawyer-turned-rebel and whatever council of the desperate he has scraped together in the hills. A month, perhaps two, and the last embers will gutter and die. I believe this. I must believe it, because the alternative - that I am engaged in a war against a people rather than an army, and that such wars do not end the way my training tells me they should - is a thought I am not yet prepared to entertain.\n\nI seal the dispatch and hand it to my fastest rider. I request minimal reinforcements. The emperor will read confidence in this, and confidence is what he needs from me, because confidence is what purchased my commission and my governorship and everything I have clawed my way up from the gutters of Amârû to reach."
 mumakan.0151.a: "Report that victory is imminent and request minimal reinforcements."

 mumakan.0152.t: "The Jungle's Patience" # AI Place Holder - Please Replace
 mumakan.0152.desc: "Sixteen months in the field, and I am learning a new kind of warfare - the kind they do not teach in the camps where I trained, the kind that no tactical manual anticipates, because no manual is written by a people who have decided, collectively and without formal consultation, that they would rather die in their own hills than live under an empire's boot.\n\nThe [GetCultureByKey('koronandi').GetName] do not fight the way soldiers fight. They do not hold ground or contest crossroads or form lines of battle where a competent commander can bring superior numbers to bear. They disappear. They strike from tree-cover and vanish into terrain they have known since childhood. They fight from behind every hedgerow, every irrigation ditch, every granary wall. A patrol goes out and does not come back. A supply wagon burns on a road that was secure yesterday. A village headman swears fealty in the morning and shelters a dozen armed men by nightfall.\n\nI hold every city, every road, every harbor. I have ten times their strength. And yet every week my soldiers die in the green dark of the hinterland, picked off by people who should have surrendered months ago and who fight, when cornered, with a viciousness that would give any seasoned commander pause. These are not soldiers. They are fathers, shopkeepers, fishermen - and they are killing my men.\n\nI need to change my approach, or this jungle will eat me alive."
 mumakan.0152.a: "Shift to a siege strategy - starve them into submission."
 mumakan.0152.b: "Launch aggressive raids to break their will."

 mumakan.0153.t: "The Rot Sets In" # AI Place Holder - Please Replace
 mumakan.0153.desc: "Five years. I have held this posting for five years - longer than any campaign I have ever fought, longer than I spent clawing my way up from nothing in the imperial army, longer than I care to admit to the face I see in the water basin each morning, a face that has aged a decade in half the time. The jungle does that to a man. The heat, the damp, the endless green dark pressing in from every side, the particular madness of fighting an enemy that is everywhere and nowhere and refuses, with a stubbornness I have come to respect in the way one respects the sea, to simply stop.\n\nThe army is rotting. Not from disease - though disease takes its toll, as it always does in the south - but from the inside, from the slow poison of purposelessness that infects soldiers who have forgotten what victory looks like and begun to suspect they will not recognize it when it arrives. Desertion is rising. The camp followers have multiplied into a small city of their own, parasitic and ungovernable. Three soldiers were found dead last week in circumstances the officers are calling 'altercation' and I am calling mutiny.\n\nI have two tools left: fear and indulgence. Fear will hold them in line but make them brittle. Indulgence will keep them moving but make them animals. Neither is what I would choose if I had the luxury of choice, but luxury is a thing I left behind in Amârû, if I ever possessed it at all."
 mumakan.0153.a: "Execute deserters publicly to maintain discipline."
 mumakan.0153.b: "Allow camp followers and looting to keep morale afloat."

 mumakan.0154.t: "Betrayal" # Ai Written - Feel Free to repace
 mumakan.0154.desc: "I hear the tent flap move before I see the blade - seven years of jungle warfare have made my ears sharper than any palace hound's - but hearing it and being able to stop it are different skills, and the second requires a younger body than the one I have worn down to sinew and scar tissue in this green hell.\n\nI know the faces. I know them because I made a point of knowing every man under my command, because that is the least a commander owes the men who follow him, and because a boy from the gutters of Amârû learns early that the distance between loyalty and murder is often nothing more than a missed meal or a broken promise. These are not rebels. These are not [GetCultureByKey('koronandi').GetName] infiltrators. These are my own soldiers - men I trained, men I led through the breach at Kôrlan, men who cheered my name when the walls fell - and they have decided, in the particular arithmetic of exhausted and desperate men, that I am worth more dead than alive.\n\nI think of Sandamal, who trusted me with his great task. I think of the governorship that was promised, the life I was building from nothing, the proof that a man from nowhere could become something. I think of the child in the crowd on the day I rode through Kôrlan's gates, the one whose face I never forgot.\n\nThe blade comes. I do not close my eyes."
 mumakan.0154.a: "So this is how it ends - not in battle, but betrayed by my own men."
 
 ## Decision Events ##
 mumakan.0200.t: "The Legacy of Amâv"
 mumakan.0200.desc: "At long last, the realm once ruled by [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName], first King of all [men|E] of the [GetTitleByKey('e_mumakan').GetName], has been reforged from the ashes of its legend. Now, the [GetTitleByKey('h_utter_south').GetName] shall stand until the end of time comes!\n\nI shall guide the southern lands into a new future and forge a path that ensures that there will be nobody strong enough to stand in our way!"
 mumakan.0200.a: "The rise of the South is complete."
 
 mumakan.0201.t: "Tâlilan Burns"
 mumakan.0201.desc: "My armies have broken the last defenders of [GetTitleByKey('k_talilan').GetName], and the remaining [elves|E] have fled. Their forests burn... Good! Let his be a lesson to all who stand in my way. None can oppose the might of a conqueror!"
 mumakan.0201.a: "Good riddance."
 
 mumakan.0202.t: "The Rise of the Nafarati"
 mumakan.0202.desc: "It is a glorious day indeed! We have carved out a [kingdom|E] of our own, for our people to dwell in - and to prosper. Now, none can deny us that what is owed to us by right of blood and iron!\n\nLet us raise a grand war-shrine near the [capital|E] to commemorate this triumphant day, and to create a staging ground for our warriors where they can train and be drilled in the art of war. Soon, the sound of their marching feet shall be hear all over the Utter South!"
 mumakan.0202.a: "Glory to Jî-Indûr!"
 
 mumakan.0203.t: "The Palace of Majesty"
 mumakan.0203.desc: "It is finished! The palace, so long in the making, has been completed. Now, white marble walls rise from the central plaza of the capital, and two beautifully crafted statues guard the main entrance to the building itself. Inside, there are many chambers and rooms - enough to house an entire small town by itself!\n\nWithin this structure I shall retire when the burden of ruling becomes too heavy to bear, and I shall be granted a few precious moments of peace and quiet. Reinvigorated, I shall reemerge, and rule with renewed wisdom and prudence, so the Twin Realms may continue to flourish under my gentle hand."
 mumakan.0203.a: "A magnificent thing indeed."

 mumakan.0250.t: "An Offering to the Uvâg"
 mumakan.0250.desc: "Trembling, I set down the basket filled with fruits and dried meat on the etched stones at the feet of the towering mountains. Livestock has been driven into a secluded walled area nearby, and we shall leave them there for the Uvâg to claim.\n\nIn the corner of my eye, I spy movement. As I spin in the direction, there is nothing. No - was that a shade over there, beneath the rocks? I cannot be sure.\n\nHow I pity the tortured souls of our ancestors, cursed to walk these bleak hills forevermore. With this offering, they shall be appeased for another decade..."
 mumakan.0250.a: "Let us return."

 mumakan.0350.t: "The Final Test"
 mumakan.0350.desc: "The sand beneath my feet feels warm as the evening sun begins its descent behind me, where the isle lies. I turn away from its light and face the darkness that lies to the east. I do not turn back to those standing on the beach with me, for all the words have long been said. They know our traditions, as do I.\n\nThe first wave touches my legs, but I do not stop. Soon, the waters embrace me, and I begin to swim. Onwards to the east, the setting sun behind me. May my strength carry me far, and bring favor upon those that must now rule Ambasôn."
 mumakan.0350.a: "I will swim until I can swim no more."

 #Elevating the Kingdom of Ambason & the Isles
 mumakan.0351.t: "Amba's Promise Fulfilled"
 mumakan.0351.desc: "For years, I have plied the waterways of the world, reaving, raiding, and razing. I have claimed more gold than most kings will ever see, and my name is cursed from $k_senga_muta$ to $e_khy$.\n\nI am, without question, the most infamous [founder.GetWomanMan] alive, true daughter of Amba, and have poured my loot and reputation into the heavy settling and fortification of the $c_ambason$.\n\nNow, after all these centuries, Amâv's promise to his daughter Amba has finally been fulfilled, and my people lay claim to a kingdom - or queendom - of their own..."
 mumakan.0351.a: "Amba is watching me with pride."
 mumakan.0351.c: "I am the [founder.GetLadyLord|U] of Blood and Gold!"
 mumakan.0351.b: "At last, my dream is achieved..."
 mumakan.0352.t: "$mumakan.0351.t$"
 mumakan.0352.desc: "For years, it's been an open secret that [founder.GetFirstName] refused to accept or take any crown save one: [founder.GetPrimaryTitle.GetNameNoTier].\n\n[founder.GetHerHis|U] heart has been set on this so long that my liege seemed to have dedicated [founder.GetHerHis] life to legitimizing the power and authority of [founder.GetHerHis] island home.\n\nAfter uncounted raids, wars, and general slaughters, [founder.GetSheHe]'s succeeded.\n\nSupposedly each jewel in [founder.GetHerHis] new crown was taken from a different raid. Some at court whisper even that there are yet empty sockets for [founder.GetTitledFirstNameNoTooltip] to fill."
 mumakan.0352.a: "Just think of all the gold we're going to make!"
 mumakan.0352.b: "A #EMP [founder.GetTitleAsNameNoTooltip]#!? [founder.GetSheHe|U]'s worse than a robber baron!"
 mumakan.0353.t: "$mumakan.0351.t$"
 mumakan.0353.desc: "Even the lowliest peasant in $k_senga_muta$ has heard of the monstrous [founder.GetFirstName], Scourge of the Seas, and [founder.GetHerHis] life-long quest to win recognition for [founder.GetHerHis] dream realm of reaving pirates.\n\nIt's a legend that strikes fear into lordling and lowly serf alike, but it seems the line between myth and history has blurred of late.\n\nAs of today #EMP [founder.GetTitleAsNameNoTooltip]#! [founder.GetFirstNameNoTooltip] announced [founder.GetHerHis] life's work to be completed.\n\n$k_senga_muta$ counts a new kingdom on its shores, and it is terrible to behold."
 mumakan.0353.a: "[founder.GetSheHe|U]'s not going to raid #EMP us#!, right?"
 mumakan.0353.b: "No more than a [founder.GetTitleAsNameNoTooltip] of Thieves!"

 
 mumakan.0400.opening: "To the fearsome and mighty Sandamal of Mûmakan,"
 mumakan.0400.desc: "You have bested us. We yield to your supreme might. Please spare us further plundering and sacking! We shall submit to your rule and serve you well, if you will have us."
 mumakan.0400.a: "There is no peace. Just war."
 mumakan.0400.b: "Very well... but you shall be humbled."
 mumakan.0400.b.tt: "Every ruler within the [GetTitleByKey('k_koronande').GetName] is subjugated by #high you#!"
 
 mumakan.0401.opening: "To the preposterous Ataraka,"
 mumakan.0401.desc: "If you think your poisonous words could sway me, think again. The war will continue, until all of your pitiful cities are broken ruins."
 mumakan.0401.a: "A pox upon him!"
 
 mumakan.0402.opening: "To the wise Ataraka,"
 mumakan.0402.desc: "Your surrender is accepted. You shall serve me - but not from Kôronânde. Instead, you will govern those islands out there in the bay for me. See that you arrive there in due time."
 mumakan.0402.a: "Farewell, Kôronânde..."
 mumakan.0402.a.tt: "Every ruler within the [GetTitleByKey('k_koronande').GetName] is subjugated by [sandamal.GetName]"