 ### Emperor Sandamal - Our Path Forward (Victory) ###

 mumakan.0001.t: "The War is Won"
 mumakan.0001.desc: "The messenger kneels before me on the marble floor of the command pavilion, and for a long moment I say nothing - I simply look at the dust on his boots, the exhaustion in the lines around his eyes. I understand before he speaks a word that it is finished: [GetTitleByKey('k_koronande').GetNameNoTier] has fallen. Not through marriage, as [GetScriptedCharacterByHistoryID('lineofmamakil18').GetFirstNameNicknamed] managed in his age with all his diplomacy and his careful, bloodless genius, but through thirty years of grinding patience forged into a single, decisive campaign of conquest. I remember my uncle's cold, measured voice telling me that empires are not built on sentiment. I think, not for the first time, that he was right about that, even if he was wrong about nearly everything else. The victory sits in my chest like a stone: heavy, cold, and real."
 mumakan.0001.a: "The Iron Lion has proven his name true."

 mumakan.0002.t: "A Hero's Welcome"
 mumakan.0002.desc: "The great hall erupts as I enter. The tribal chiefs roar my name, the court poets already chant their verses, and the banners of the conquered republic hang like trophies from the vaulted ceiling where my father's colors once flew. I receive it all with a straight back and a still face; I have always met the dictates of this throne with such composure, whether they brought triumph or disaster. It was [GetScriptedCharacterByHistoryID('lineofmamakil18').GetFirstNameNicknamed] who first bent [GetTitleByKey('k_koronande').GetNameNoTier] to [GetTitleByKey('e_mumakan').GetNameNoTier]'s will, yet he achieved it with a bride and a banquet. I have secured it through the relentless edge of the sword. What is won by the blade must be held by the blade, and I must not forget that truth even as these men cheer.\n\nThose chiefs who once whispered of dynastic weakness now shout the loudest. I mark their faces, every one of them. They cheer because they expect a harvest of spoils. I will grant them reward enough to satisfy, but never enough to embolden. The work of empire is never finished; it only changes its shape."
 mumakan.0002.a: "Drink your fill tonight! A celebration is in order."
 mumakan.0002.b: "Celebrate if you must, but do not mistake a single victory for the end of our struggle."

 mumakan.0003.t: "A Meeting with Aameda"
 mumakan.0003.desc: "He arrives in silk the color of sea-foam. He bows exactly as low as protocol demands and not a fraction lower; he is a man who has calculated every gesture of his life and found that the precise measurement of deference is worth more than its excess. [aameda.GetFirstName] speaks beautifully, as all his kind do. He speaks of fraternal bonds, of the shared blood between the [GetCultureByKey('koronandi').GetName] and the [GetCultureByKey('mumakanil').GetName], and of a kinship that war has interrupted but cannot destroy. He is not even wrong, technically, which is what makes him dangerous.\n\nI have spent thirty years in a court full of men who smile with their mouths while calculating with their eyes; I know this manner of man as well as I know my own reflection. He will serve the empire loyally, I have no doubt; right until the moment it serves him better not to. A useful serpent is still a serpent. I will keep him close, watching him as a man watches the rope of a bridge he does not entirely trust to hold."
 mumakan.0003.a: "Your words are as smooth as your silks, but my eyes are always open."
 mumakan.0003.b: "A man of such 'fraternal' spirit deserves a prominent place at my side."

 mumakan.0004.t: "Reports of Resistance"
 mumakan.0004.desc: "The governor's dispatches arrive in a steady stream now: ambushes on the eastern supply road, village elders who fall silent when the soldiers ask questions, and a magistrate found dead in a ditch outside [GetTitleByKey('c_korlan').GetNameNoTier]. There were no witnesses, no suspects, and an entire neighborhood that claims to have heard nothing. I am not surprised; I would think less of them if they simply folded and forgot. A people who fought this long, who bled this much for a republic that gave them something to believe in, do not lay down their pride with their weapons. Pride, once swallowed, poisons from within.\n\nMy uncle's answer to this would have been simple, brutal, and effective in the short term. Yet in the long term, it would have bred the same hatred that eventually made him unmanageable; the same hatred that gave me both my inheritance and my burden. I will not inherit my own ruin in such a fashion. There are other ways to end a war than by the sword alone."
 mumakan.0004.a: "If they will not have peace, let them have a shadow they cannot strike."
 mumakan.0004.b: "A hundred friends serve better than a thousand slaves; offer them a hand, not a fist."

 ### Emperor Sandamal - Magnanimity (White Peace) ###

 mumakan.0011.t: "A Peaceful Resolution"
 mumakan.0011.desc: "There is a particular humiliation in reaching for something with both hands and finding it has moved just beyond your fingers. It was not snatched away or stolen; it is simply out of reach, and there is no one to blame but the distance. I sign the terms of this white peace in a tent that smells of mud and wet canvas. I keep my face entirely still, for the face of an emperor belongs to his people even when his heart is not in the task.\n\nI had victory within my grasp. I could see its shape and smell its promise in the final dispatches. Then the supply lines broke, the rains came, and the northern chiefs began sending me pointed silences instead of their tribute. A war that devours the empire is no victory, I have always known this. Yet, the knowing of it does not make the signing any easier to bear."
 mumakan.0011.a: "We will accept this peace. I will not rule over a kingdom of ash and bone."

 mumakan.0012.t: "The Meeting with Ataraka"
 mumakan.0012.desc: "I expected a demagogue: the kind of man who rises on the heat of a crowd and burns out once the mob disperses, full of fire and grievance but hollow underneath. What sat across the table from me was something I had not prepared for. He was a tired man, a decent man; one who had been handed an impossible burden by his people and had carried it without flinching, never once having asked for the task. He did not gloat, nor did he preen. He read the treaty terms with the careful attention of one who understands that words matter.\n\nWhen he finally met my eyes, I saw grief in him, not triumph. I found I could not hate him for holding what I could not take. I have met kings, great generals, and men who claimed to believe in the righteousness of their cause; I have learned to distrust them all, for belief is so often a costume worn over ambition. Yet this man believed, and it had cost him everything. I recognised that cost, for I have paid variations of it my entire life. We parted without warmth or coldness. Neither of us spoke of the silent understanding that passed between us in that final moment: that in another age, or another world, we might have been something to each other other than opponents."
 mumakan.0012.a: "Go in peace, Ataraka. You have earned a respect few men shall ever receive from me."
 mumakan.0012.b: "Our business here is concluded. Do not expect such mercy should we meet again."

 mumakan.0013.t: "The Loss of Legitimacy"
 mumakan.0013.desc: "My subjects are careful about stating their intents of dissent. They have always been careful, these chiefs who bend the knee while sharpening their knives. Yet the whispers are no longer as quiet as they once were, and my hearing remains excellent. The gods have withdrawn their favour, they say. They claim the dynasty has been weighed and found wanting, and that the Iron Lion is old and his teeth are dull. I have heard this particular song before in every variation and every register. I have outlasted every man who ever sang it.\n\nThe throne still stands because I still stand. There is a fundamental difference between a setback and a defeat. It is a distinction that these men, who have never governed anything larger than a river valley, cannot quite grasp. Let them whisper. I am the Iron Lion still. They shall remember that truth when their murmurs finally reach my ears, as they inevitably do."
 mumakan.0013.a: "Let them mutter in the shadows. They shall find my claws are sharp as ever."
 mumakan.0013.b: "This was but a temporary retreat. I shall give them a victory that silences every tongue."

 mumakan.0014.t: "The Weight of Patience"
 mumakan.0014.desc: "The tribute from the Nâfarati chieftains arrives late, then lighter than it should be, and then not at all. The dispatches from the northern prefects take on that particular, careful tone that means they are reporting disaster as gently as possible. They hope I shall not punish the messenger for the message. This campaign was intended to silence these men. It was meant to demonstrate, in the clearest possible language, that the empire's reach exceeds the ambition of any one tribe or chief who fancies himself above the throne.\n\nInstead, I have given them a grievance and a precedent. Emboldened men are the most dangerous kind. I cannot fight them now, as the treasury will not sustain it and the army needs to breathe. I must be patient. Patience has always been my greatest weapon and my heaviest chains. It has brought me this far, and I must trust it to carry me further. Yet I am tired, and patience is a cold companion on a long road."
 mumakan.0014.a: "Yield to their terms for now. The political cost of defiance is too high."
 mumakan.0014.b: "Distribute the gold from the treasury. We must secure their silence to save our reforms."

 ### Emperor Sandamal - Defeat / Last Days ###

 mumakan.0021.t: "The Ripple of Ruin"
 mumakan.0021.desc: "Defeat. The word sits in my mind like a stone dropped into still water. I watch the rings spread outward from it. Each one is a consequence I have already begun to calculate. The court, the chiefs, and the distant provinces shall all feel the ripple before the news has even reached them. I have never used that word for myself before. Not in thirty years, not in a dozen campaigns, and not in the years of palace intrigue that would have broken a man with less iron in his spine. \n\nYet here it is, undeniable, spoken by a messenger with dust on his boots and fear in his eyes. I cannot argue with the arithmetic of it. The armies of [GetTitleByKey('e_mumakan').GetNameNoTier] have been broken and driven from [GetTitleByKey('k_koronande').GetNameNoTier]. The man I was told was a nobody has bested me. The empire is shifting beneath me. I can feel it in the way a sailor feels the current change before the storm arrives. Everything I have spent thirty years building is now, in this moment, in genuine peril."
 mumakan.0021.a: "Impossible!"

 mumakan.0022.t: "The Dignity of the Defeated"
 mumakan.0022.desc: "They brought me to [GetTitleByKey('c_korlan').GetNameNoTier] for the signing. I understood the choice was deliberate. It was the conquered city, the enemy's hall, and the victor's table. I walked into that chamber with my back straight and my face still. The face of an emperor belongs to his empire even in its worst hour. Indeed, it belongs to the people especially in its worst hour. [ataraka.GetFirstName] sat across from me and he did not gloat. I had expected a taunt and almost would have preferred it. A gloating man is easy to despise, and I needed something easy in that room.\n\n[aameda.GetFirstName] presented the terms with a thin, careful smile. It was the smile of a man who has been playing a longer game than anyone else in the room and has just confirmed his success. The treaty they laid before me bound Mûmakan in a hundred threads to the will of Kôronânde for at least a generation. I wept then for the first time since I was a boy watching my father's retainers carry him out of the audience chamber. I did not weep for myself. I wept for the empire and for the sons and daughters who must now be born into the shadow of this day. They must find some way to stand upright in it. I signed the parchment but I did not stoop. That last dignity is mine and the empire's. No treaty in any language can strip it from us."
 mumakan.0022.a: "The ink is dry, but my spirit remains unbroken."

 mumakan.0023.t: "The Predator's Tongue"
 mumakan.0023.desc: "The court has become a place of very careful voices and very quick eyes. Everyone is measuring his neighbour. Each man is calculating what the defeat means for the person beside him and, more importantly, what it means for himself. Even the imperial princes have stopped disguising their ambitions with the usual thin coat of deference that protocol demands.\n\nI know this court. I grew up here as a ward, a hostage, and a spare heir that nobody expected to survive. I learned its grammar before I learned to shave. I understand the language of implication, the weight of a pointed silence, and the utility of offers made through intermediaries to keep one's hands clean. I know what to do when the scavengers gather. I have always known. The question is not whether I can manage them. It is whether the cost of that management will eventually exceed the price of the alternative."
 mumakan.0023.a: "Silencing the loudest voice will ensure the others remember their place."
 mumakan.0023.b: "Offer them hollow promises. Greed is far easier to manage than ambition."

 mumakan.0024.t: "The Emperor's Vigil"
 mumakan.0024.desc: "There is a particular quality to the silence in a court that has made its decision. I learned to hear it as a child. I heard it while watching my uncle's face when he thought no one was looking. I saw it in the servants who moved a little faster and the guards who stood a little straighter. I heard it in the doors that closed a little more firmly than they needed to.\n\nThe court has gone quiet in that way now, and I know what it means. I know because I have survived it before. I survived the men who killed my father. I survived my uncle's years of deliberate cruelty. I have survived every campaign, every betrayal, and every whispered conspiracy that thought itself clever enough to reach the throne. Let them come, whoever they are and whatever they have arranged. I am still the Iron Lion. The Iron Lion does not yield, does not bow, and does not blink."
 mumakan.0024.a: "I am the Iron Lion still. Let them test my strength if they dare."
 mumakan.0024.b: "Double the guard. Trust is a luxury I can no longer afford."

 mumakan.0025.t: "Aameda Sends His Regards"
 mumakan.0025.desc: "The blade finds me between the third and fourth rib. It is a precise stroke, the work of a man who has been told exactly where to strike, for the hand that hired him would accept nothing less than perfection. I stagger and the assassin catches me almost gently. He lowers me to the marble as if this were a courtesy and not a killing.\n\nAs my knees strike the cold floor of my own chamber, I see it. Pinned to the inside of the man's cloak, where only the dying would ever be close enough to read it, is a small square of sea-foam silk. It is embroidered with the [GetScriptedCharacterByHistoryID('lineofaamediadvisor').GetDynastyName] crest.\n\nThe marble is very cold. The darkness is not unkind."
 mumakan.0025.a: "So ends the Iron Lion..."
 
 mumakan.0026.t: "The Iron Lion's Shadow"
 mumakan.0026.desc: "[sandamal.GetFirstName] is dead. The empire, which bent every sinew to his will for thirty years and held together by the force of that one man's iron patience, is now discovering what it is made of without him. The princes who once bent the knee are standing straight. They are reaching for what they have always craved: power in its most selfish and indolent form.\n\nThe distant provinces have gone quiet in the manner of men who are waiting to see which way the wind settles before they commit their allegiance to any side. This is the moment. It is not the battles, the campaigns, or the high deliberations of strategy that define us now. This, right here, is the hinge on which the future of the empire turns. Whoever moves first moves with the momentum of chaos. Whoever moves last inherits whatever is left."
 mumakan.0026.a: "Steel shall decide the succession. To the strongest belongs the throne."

 mumakan.0027.t: "A Vengeful Liberation"
 mumakan.0027.desc: "They come across the border not as conquerors, for they are too clever for that. Instead, they come as liberators. Their banners proclaim the freedom of the Mûmakanil people from the yoke of a failed dynasty. I must admit the rhetoric is well-crafted. Rhetoric is what they have always done best in Kôronânde, and Ataraka above all knows how to make a word land like a blade.\n\n[sandamal.GetFirstName]'s gamble has come full circle. The empire he sought to strengthen through conquest is now being consumed by the very people he could not conquer. It is the kind of irony that historians will write about for generations from the comfortable distance of time. That is not a comfort available to those of us who are living through it. I stand now at the edge of a precipice. The empire is exhausted. I look at the horizon towards the sea and I despair."
 mumakan.0027.a: "Rally whatever forces remain. The empire must not fall!"
 mumakan.0027.b: "#N Abandon your posts! Flee, flee for your lives!#!"

 mumakan.0028.t: "The Grin of the Republic"
 mumakan.0028.desc: "[ataraka.GetFirstName] was nearly to the gate when he turned around. What followed was not the statesman, the republican hero, or the orator who had moved ten thousand men to fight against an empire. It was simply a man who had, against every reasonable calculation, survived. He could not quite contain the fact of it. He grinned and he raised a hand.\n\nWith the most magnificently contemptuous farewell I have ever witnessed in thirty years of watching great men leave rooms, the saviour of Kôronânde bid goodbye to the empire of Mûmakan. It was a gesture of effortless ease, a final mockery of the heavy, iron dignity I have spent my life maintaining. Then he was gone. He passed through the gate and into the dust, back to his republic. I find, to my own considerable surprise, that I cannot bring myself to hate him for it." 
 mumakan.0028.a: "A final insult, delivered with the grace of a master."

 ### Ataraka II - Miracle at Korlan (Victory) ###

 mumakan.0031.t: "The Miraculous Turnaround"
 mumakan.0031.desc: "I had not let myself imagine this. Not once, not in the jungle camps, and not in the long dark of the siege. I did not dare during the small hours when I lay awake with the weight of the dead on my chest. The survival of the republic rested on decisions I was not certain I was wise enough to make. I had forbidden myself the luxury of picturing this moment. Now it is here, and I find I have no ready container for it.\n\nSomething is rising in me like water coming up through stone or the sun after years of overcast. I think the word for it is joy. It is a simple, enormous, and embarrassing joy. I cannot stop it and I do not want to. We were utterly outnumbered. They burned [GetTitleByKey('c_korlan').GetNameNoTier]. They thought we would break, but we did not break. Somehow, impossibly and magnificently, we have won.\n\nThe republic lives. My people are safe. I think of the men who stood in the mud with me when there was no good reason left to stand. I want to find every one of them and shake their hands and tell them that we did it. We did the impossible thing. I am laughing, I think. I am not ashamed of it." 
 mumakan.0031.a: "The republic endures. The way of our forefathers is safe at last!"

 mumakan.0032.t: "The Emperor Brought Low"
 mumakan.0032.desc: "The emperor [sandamal.GetFirstName] stands before us, laid low by our hands in this impossible victory. This would-be despoiler of our republic is not at all what I imagined. He stands with the last dignity he can muster, yet I see the fire in his eyes. It is the same burning I felt when I saw [GetTitleByKey('k_koronande').GetNameNoTier] butchered and undone. I feel a flicker of pity for the realm, but it is quickly stifled by contempt.\n\nWhatever good this man might have done for his own, he left my country and my family in ruins. Beside me, [aameda.GetFirstName] presents the treaty. It is a document of binding and payment in full for every sacrilege committed. It will be repaid by this generation and the next. [sandamal.GetFirstNameNoTooltip] stands as still as an old tree. Even as tears betray his features, he signs the parchment. He stands tall one last time before his dignity is spent. [aameda.GetFirstNameNoTooltip] simply smiles a terse, cold smile. There is no pity there, only expectation. The empire is signed away into the annals of history."
 mumakan.0032.a: "Something of great worth has been lost this day." # Fires 0034
 mumakan.0032.b: "He is a relic of a dying age. Nothing of worth was lost." # Fires 0033 and 0028

 mumakan.0033.t: "The Debt of the Ravaged"
 mumakan.0033.desc: "I was content to leave the broken emperor to whatever provincial disaster now awaits him. Yet I remembered what he did to my country. I remembered the senseless and unshackled destruction. I thought of the things I was forced to do and the state of my people. They are broken and bloodied. The fathers, the mothers, and the innocent children were all consumed by the maw of a desolation he imposed upon us. I suddenly feel a spite greater than anything else in my heart. It is heavier than my joy and sharper than my grief.\n\nI turn and I muster the most egregious and lambasting grin of my life. I have no more use for the diplomatic mask or the measured words of a statesman. We have won. He once stole our pride and now I have shown him the reality of his current situation. He can do nothing but gasp in silence and surprise."
 mumakan.0033.a: "Let him choke on his own silence." # Fires 0034

 mumakan.0034.t: "The Labour of the Living"
 mumakan.0034.desc: "[GetTitleByKey('c_korlan').GetNameNoTier] lies in ruins. The great harbour is still choked with the blackened ribs of her burned fleet. The palaces are gutted to their bones and the streets bear the kind of scars that do not heal in a single generation. The work ahead is enormous and I will not insult it by calling it anything else.\n\nHowever, I am alive to face it. My people are alive. The republic is alive. It is battered past recognition and stripped down to something almost unrecognizable, but it lives. Everything that lives can be rebuilt. I find I face that truth not with dread but with something very close to hunger. I have spent years fighting for the survival of the republic. Now at last I get to fight for its flourishing. Stone by stone, law by law, and ship by ship. I am not tired. I roll up my sleeves and I am glad." 
 mumakan.0034.a: "Pour everything into the city. We must secure our walls and our future."
 mumakan.0034.b: "Rebuild the fleet first. Our trade is the lifeblood that will fund all else."

 mumakan.0035.t: "The Crucible of Liberty"
 mumakan.0035.desc: "Word arrives that [sandamal.GetFirstName] is dead. [GetTitleByKey('e_mumakan').GetNameNoTier], that great and grinding machine, has begun to tear itself apart from within. [aameda.GetFirstName] materialises at my elbow as he always does when a door opens. He argues in that precisely calibrated voice of his that this is the moment. He sees the true opportunity of the republic. He wants us to press our claims into the heartland while the empire is too busy bleeding to resist.\n\nI listen to him carefully because he is not wrong about the opportunity. The joy of victory has not made me a fool. Then I look out at [GetTitleByKey('c_korlan').GetNameNoTier] as it is rebuilt. I look east towards the border and I think of the people of Mûmakan. They are farmers and craftsmen and mothers with children on their hips. They did not choose this new emperor. They did not choose to live in darkness any more than my people chose to be invaded. I ask myself the question I built this republic to answer. Should the people not deserve to govern themselves? If I fought the long odds because I believed our people should have that right, why not extend that golden liberty to all? The great council debates before me. Some voices shout for peace and some for war. I stand at the podium and add my voice to the cacophony." 
 mumakan.0035.a: "We shall bring them liberty. Let the empire shatter and the people rise."
 mumakan.0035.b: "Revenge is the only language they understand. We shall become the masters now.”  
 mumakan.0035.b.tt: "The republic shall be reorganised into the first Kôronânde empire" #Max Cyn
 mumakan.0035.c: "We have bled enough. Let them consume themselves while we look to our own."

 ### Ataraka II - White Peace ###

 mumakan.0041.t: "The Price of Survival"
 mumakan.0041.desc: "The war ends without resolution. There is no triumph and no disaster. There is only the long exhale of two exhausted peoples stepping back from the edge. [GetTitleByKey('k_koronande').GetNameNoTier] remains free. She is battered and plundered. Half her towers are brought low and her streets are still burned out shells. The light has been obscured by the blood of her sons, yet she is free.\n\nShe is breathing and we are all breathing with her. We are no longer under the yoke of war. The dawn has finally come and just this once it brings hope. We the living have won a prize more precious in peace than could ever be found in war. We have our lives. We have our freedom. We have survived."
 mumakan.0041.a: "Survival is its own victory. Let the healing begin."

 mumakan.0042.t: "The Recognition of Peers"
 mumakan.0042.desc: "I came to this meeting expecting a monster. I expected a dark lord or a tyrant king who ruled an army of slaves. History is rarely so simple. Before me stands a man. The emperor is a tired soul bound by duty. He is a man of quality and principle, yet he stands on the other side of a river of blood.\n\nThe more we speak, the more I find myself respecting him. It is a bitter realization when so much pain has been bought for so little. We have both survived the storm. Now, finally, neither of us is the master. We look at one another not as victor and vanquished, but as equals. The weight of our respective realms rests heavily on both our shoulders. In this moment of quiet, the enmity of the past feels like a distant and exhausting dream."
 mumakan.0042.a: "Let us build a lasting peace. We must look to the future together."
 mumakan.0042.b: "I respect the man, but our realms will clash again. We must stand firm."

 mumakan.0043.t: "Rise from the Ashes"
 mumakan.0043.desc: "[GetTitleByKey('c_korlan').GetNameNoTier] must be rebuilt. The harbour, the markets, and the courts of law are all part of an intricate architecture of a civilisation that was brought nearly to nothing. For a terrible stretch of months, it seemed all would be lost. I have made my entire career constructing things that those with more caution and less conviction said could not be built. I have always found a way to prove them wrong in the end.\n\nThe republic did not survive this war to be left half-finished. I will not stop now. We shall restore the beauty and the function of our capital. Every stone laid is a testament to our survival."
 mumakan.0043.a: "Restore the walls. Our safety is the foundation of our freedom."
 mumakan.0043.b: "Restore the markets. Prosperity is the best revenge."

 mumakan.0044.t: "The Gathering Storm"
 mumakan.0044.desc: "[aameda.GetFirstName] draws me aside at exactly the moment I would prefer not to be disturbed. He speaks in that low and deliberate voice he reserves for truths he wishes he did not have to deliver. He says the peace was a simple act of convenience rather than conviction. He warns that [sandamal.GetFirstName] is already resupplying and watching our reconstruction with the patient attention of a man who intends to return. He tells me we must build our strength now while we still have the time.\n\nEvery instinct I have argues against believing him. The war is over and the dead are barely buried. I am tired in my bones in a way I had not thought possible. Yet I have learned at too great a cost that [aameda.GetFirstName] speaks quietly only when he is most certain. I have never yet profited from dismissing him when he has that look in his eyes."
 mumakan.0044.a: "He is right. We must build an army worthy of the republic." 
 mumakan.0044.b: "No. We must pursue reconciliation. Pen a letter to the emperor." 

 mumakan.0045.t: "The Final Battle"
 mumakan.0045.desc: "They have returned. A black tide of banners and colours sits on the horizon like a gathering storm. The long columns of [GetTitleByKey('e_mumakan').GetNameNoTier]'s soldiers are moving through the eastern passes. It is everything [aameda.GetFirstName] warned me of and more. Everything we have built in the years since the sack now hangs in the balance. Every wall raised from the rubble and every ship launched with stubborn hope has led to this moment. Every son the republic sent to the training grounds to bleed and sweat has been prepared for this single day on this single stretch of ground.\n\nWe have done everything that could be done. The sons of [GetTitleByKey('k_koronande').GetNameNoTier] are at their posts. They are ready and they know exactly what they are defending. Whatever comes next will be decided here and I will stand at the front of it. I am done deciding the fate of my people from behind stone walls. The time for deliberation has passed. The time for steel has begun."
 mumakan.0045.a: "Call upon the sons of the republic! Let them stand as one!"
 mumakan.0045.b: "Unleash the Mûmaks! They shall not pass!" #NO PASARÁN! 

 ## Ataraka II - War Loss ##

 mumakan.0051.t: "The End of the Republic"
 mumakan.0051.desc: "It is over. This is not the way great things end in songs. There was no last defiant stand and no name worth remembering. Instead, it ended in the grinding and unglamorous way that most things truly end. It was incremental and inevitable until the morning came when the gates simply did not hold.\n\nThe republic is gone. This was the thing I poured every hour of my life into. It was the thing I took up arms to preserve and the only thing I believed in when the world grew dark. Now I am running. I swore I would never do it, yet I am doing it now with the sea spray cold on my face. Behind me on the horizon, [GetTitleByKey('c_korlan').GetNameNoTier] burns. Her towers, her courts, and her harbour are all in flames. Even the street where I argued my first case thirty years ago is consumed. I carry whatever is left. It is a handful of loyal souls and the embers of something that was once magnificent. I do not look back again. If I do, I know I will not be able to stop."
 mumakan.0051.a: "We have escaped, but we have nothing left but our lives."
 mumakan.0051.a.tt: "#N All reserves are exhausted#!"

 mumakan.0052.t: "The Final Stand"
 mumakan.0052.desc: "This is everything we have left. We have the last coin scraped from empty treasuries and the last men who will still answer the banner of the republic. They have every reason in the world to abandon us, yet they stay. [aameda.GetFirstName] has gone his own way. I shall lead what few forces I have left into the deep green dark. I am running and I do not stop. Stopping is a thing I have not yet learned and I do not intend to learn it today.\n\nThe republic lies fallen and chained. Her blood soaks the southern seas from [GetTitleByKey('k_pel').GetNameNoTier] to [GetTitleByKey('e_khy').GetNameNoTier]. I am not a fool. I know the day is lost. However, my country will not remain in chains quietly. It will never truly be conquered so long as we free [GetCultureByKey('koronandi').GetName] live. We have reached the safety of a hidden clearing in the dense heart of the jungle. Here the canopy is thick enough to hide our fires from the empire's scouts. We assess our situation and we come to realise the truth of our new existence."
 mumakan.0052.a: "We have barely escaped with our lives." # Add trait maimed
 mumakan.0052.a.tt: "#N No reserves remain - we fight with bare hands.#!" 
 mumakan.0052.b: "We have escaped but have been injured!" # Add trait wounded
 mumakan.0052.b.tt: "#N No reserves remain - we fight with bare hands.#!"
 mumakan.0052.c: "We have escaped but with little more than our bare hands."
 mumakan.0052.c.tt: "#N No reserves remain - we fight with bare hands.#!"
 mumakan.0052.d: "A handful of militia is all we can muster."
 mumakan.0052.d.tt: "#N A handful of militia is all we can muster.#!"
 mumakan.0052.e: "A small warband rallies to the banner."
 mumakan.0052.e.tt: "#N A small warband rallies to the banner.#!"
 mumakan.0052.f: "A proper garrison can be fielded."
 mumakan.0052.f.tt: "#N A proper garrison can be fielded.#!"
 mumakan.0052.g: "Enough arms for a credible defense."
 mumakan.0052.g.tt: "#N Enough arms for a credible defense.#!"
 mumakan.0052.h: "A real army begins to take shape."
 mumakan.0052.h.tt: "#N A real army begins to take shape.#!"
 mumakan.0052.i: "Our hidden stockpiles yield a formidable host."
 mumakan.0052.i.tt: "#N Our hidden stockpiles yield a formidable host.#!"
 mumakan.0052.j: "The Mûmakil are saddled and the guard assembled in force."
 mumakan.0052.j.tt: "#N The Mûmakil are saddled and the guard assembled in force.#!"
 mumakan.0052.k: "Every citizen has been armed - this is a nation at war."
 mumakan.0052.k.tt: "#N Every citizen has been armed - this is a nation at war.#!"

 ### General Mase - In the Emperor's Name ###
 mumakan.0071.t: "The Foregone Conclusion"
 mumakan.0071.desc: "With the heart of the [GetCultureByKey('koronandi').GetName] laid waste, it was only a matter of time before their blood grew stale and their resolve became anaemic. Now the foregone conclusion has been realised. This farce of a war is over. We have taken our rightful victory and claimed what we are owed. Now begins the task of rebuilding this port into a tool for the prosperity of the empire. No longer shall this city be a leech taking succour from our stores. No longer shall the fat merchant-lords suck the [GetTitleByKey('e_mumakan').GetName] dry for the ill-gotten wealth they lust after.\n\nNow that we have reclaimed all they stole, my fellow soldiers have returned home to enjoy the fruits of their great labour. Yet there is one duty I must still fulfil. It is a great honour and a heavy burden to be the eyes and hands of our great emperor [GetScriptedCharacterByHistoryID('lineofmamakil125').GetFirstName]. As the first imperial governor of this land, I must keep the peace of the realm. I must make it ready to join our glorious empire. I look to the future and I take account of all who remain to assist me in this final task."
 mumakan.0071.a: "The war is won. Now we shall win the peace."
 
 mumakan.0072.t: "Entering the Gates of Kôronânde"
 mumakan.0072.desc: "I have taken many cities. I have never ridden into one like this. I am not a man passing through. I am not a conqueror who will leave before the smoke clears. I am the man who will still be here when the seasons turn. The people lining the street watch in silence. It is not the silence of a defeated army. It is not the silence of a welcome. It is the particular silence of a people who have lost everything. They wait with the careful patience of those who have learnt that patience is all they have left. They wait to see what comes next.\n\nI run the soldier's accounting in my head. The gates need repair. The harbour wall has a breach wide enough to march through. The granaries have been stripped. Then a child in the crowd catches my eye. He is perhaps seven years old and holding a woman's hand. He watches me with an expression I cannot quite read and will not quickly forget. Something shifts in my chest. I file the moment away and ride on. There is work to be done."
 mumakan.0072.a: "Survey the damage. We must establish order immediately."
 mumakan.0072.b: "Let the men celebrate. They have earned their plunder."

 mumakan.0073.t: "The Architect of Shadows"
 mumakan.0073.desc: "[aameda.GetFirstName] appears at precisely the moment and in precisely the place where he is most useful. He wears the expression of a man who has been expecting this introduction for some time and finds it pleasantly overdue. He navigates the ruins of the republic's political life with a fluency that would be impressive in a man who had studied it for years. In a man who helped build it, it is something else entirely. He offers me his services and his many contacts. He presents the surviving families of merchants and moneylenders like a thousand strings of silk and iron, all running through his hands. He promises that if we align our interests, the city shall answer to my every beck and call.\n\nI have known men like [aameda.GetFirstNameNoTooltip] in every army I have served. They are sharp and indispensable, yet they are aligned with no flag but their own. I have worked under men like him before, which is something I promised myself I would never do again. I am not convinced he can be trusted. However, I am not convinced I have the luxury of that conviction."
 mumakan.0073.a: "His knowledge is too valuable to waste. Bring him into the fold."
 mumakan.0073.b: "He is a turncoat and a viper. Keep him at arm's length."

 mumakan.0074.t: "The Quiet Withdrawal"
 mumakan.0074.desc: "He bows. It is a perfect and unhurried bow of the kind that takes years of practice to make look effortless. He withdraws without argument. I find his silence more unsettling than a protest would have been. His eyes are calm and dark and faintly amused before he turns away. He looks like a man who has heard this particular answer before and is already several moves beyond it.\n\nIn that last moment, he looked at me the way a craftsman looks at a tool with a hairline crack in it. It was not exactly contempt. It was the particular disappointment of a professional confronting a foreseeable problem. He leaves my presence as quietly as a shadow retreating from the sun. I have made my choice. I only hope I do not live to see the day he decides I am no longer a useful instrument of his design."
 mumakan.0074.a: "Good riddance."

 mumakan.0075.t: "The Price of Order"
 mumakan.0075.desc: "He smiles. It is not a warm gesture. I do not think warmth is a register available to a man like him. By way of sealing the arrangement, he offers a gift. He provides a name, a location, and a man who is simultaneously useful bait for the resistance network and a personal enemy of his own. He is entirely transparent about the fact that he will benefit from this arrangement in ways that are direct and considerable.\n\nI find, unexpectedly, that I respect this. There is honesty in a man who does not pretend that his interests and mine are the same thing, yet offers a fair trade regardless. At least I know exactly what I am paying for. I listen as he speaks the name. I know where we must begin. The 'silk and iron' he promised is now in my hands. I shall see how well it cuts."
 mumakan.0075.a: "Then let us begin. Show me where the rats hide."

 mumakan.0076.t: "The Invisible Enemy"
 mumakan.0076.desc: "Despite every measure, the [GetCultureByKey('koronandi').GetName] refuse to submit. The doubled patrols, the curfews, and the supply lines secured at three separate points are not enough. They are getting bolder. Soldiers are found dead at their posts in the grey hours of the morning. Supply wagons burn on roads that were clear and quiet only the day before. Three men I trusted to manage the outer districts have simply stopped responding to dispatch.\n\nI have fought hard wars. I have fought in difficult terrain against skilled commanders who had every reason to win. Yet I have never fought a people before. I have never faced an entire nation in their own land where every hill, alley, and familiar face is an advantage they did not need to plan. I begin to understand why Sandamal promised me a governorship rather than simply a victory. This is a battle where the front lines are everywhere and the enemy is everyone." 
 mumakan.0076.a: "Double the patrols. We must maintain order without losing our discipline."
 mumakan.0076.b: "Perhaps [aameda.GetFirstNameNoTooltip] was right. I cannot solve this with steel alone."

 mumakan.0077.t: "The Price of Pride"
 mumakan.0077.desc: "[aameda.GetFirstName] appears as if the very thought of being needed is sufficient to summon him. He wears a knowing smile that I have come to actively dislike. It is the smile of a man who has been waiting patiently for reality to make his argument for him. He offers his services again with the unhurried benevolence of someone who never genuinely doubted the outcome of this conversation.\n\nI look at him for a long moment. I look at the neat and careful person of him. I see the pressed robes and the composed hands. Then I think of the soldier I lost on the road to [GetTitleByKey('c_korlan').GetNameNoTier] two nights ago. I had made a point of learning that boy's name because I believe it is the least a commander owes a dead man. I think about my pride and what it has already cost me. I think about what it might cost me further if I continue to ignore the shadows in this city. The soldier died for my stubbornness. I cannot allow another to do the same."
 mumakan.0077.a: "I will not crawl to a turncoat. Get out of my sight."
 mumakan.0077.b: "Help me end this, you insufferable snake."

 mumakan.0078.t: "The Conniver's Farewell"
 mumakan.0078.desc: "[aameda.GetFirstName] shrugs. It is the magnificent shrug of a man who has received this answer in a hundred different rooms from a hundred different commanders. He finds each version equally predictable. He departs without pressing the point because men like him know that pressing is rarely necessary. At the door, he stops. Without turning, he offers a quiet observation in the tone of a tutor correcting a promising but obstinate student. \n\nHe tells me that pride makes a poor shield against knives in the dark. It is a truth I already know. Knowing it does not make watching him walk away any easier. He leaves me to my maps and my tallies of the dead. I am a soldier of the empire and I have my orders. If this city must be held by the sword alone, then so be it. I shall sharpen the blade until it either secures the streets or breaks in my hand."
 mumakan.0078.a: "Let him scheme. I shall hold this city by the sword alone."

 mumakan.0079.t: "A Bitter Efficacy"
 mumakan.0079.desc: "His smugness is, if anything, worse than the previous debacle. It is a settled and architectural smugness that has clearly been load-bearing for years. Yet within days of our accord, the ambushes begin to taper. First the large ones cease, then the smaller ones, until the roads are quiet in a way they have not been since I first rode through the gates. His intelligence moves through Kôronânde the way water moves through old stone. It finds every crack, every seam, and every dark place where a hidden man might shelter before he becomes a problem. It moves faster than anything I could have built from scratch with twice the resources.\n\nI do not like what this implies about who truly knows this city. I do not like what it means for who is truly governing it. However, I have always been a man who respects results and these results are undeniable. For now, we work together. I shall enjoy the silence on the roads, even if I must endure the presence of the man who bought it for me."
 mumakan.0079.a: "The results speak for themselves. We shall work together for now."

 ### General Mase - White Peace ###

 mumakan.0081.t: "The Hollow Mandate"
 mumakan.0081.desc: "The order arrives from the throne. I am to accept the white peace. The campaign ends and the gains are surrendered. The blood, the years, and the burning of [GetTitleByKey('c_korlan').GetNameNoTier] are rendered strategically weightless. These are the shifting calculations of an empire I have spent my life serving but was never truly asked to understand. \n\nI am a soldier. I have always been a soldier, and a soldier obeys his emperor. I will obey mine. I fold the dispatch and give the order to stand down. I do not allow my expression to change because that is also something soldiers do. However, obedience and dignity are different things. Standing here with this order in my hand, I find I cannot easily locate the latter. I wonder if my emperor understands what he has asked me to swallow. I conclude that he probably does not. I have won the war only to be told that the victory was a mistake."
 mumakan.0081.a: "I serve the throne and not my ego. I shall obey."

 mumakan.0082.t: "A Restless Reward"
 mumakan.0082.desc: "The Emperor is generous. In lieu of the governorship he promised, he offers me land. It is a quiet holding in a peaceful province. It is somewhere I could build a house and plant crops. I could finally stop waking before dawn to run numbers on troop dispositions. I understand that it is a fair offer. There is nothing wrong with land. Land endures and land is real. I have slept on the cold ground often enough to know the value of a roof.\n\nBut I was not born for a roof. I was born in the gutters of Amarû. I clawed my way out of them with the only tools I had. Every step I have taken since has been forward. The idea of turning around now and calling this a life sits in my chest like a stone I cannot shift. The sword is the only thing I have ever truly understood. I do not think I am finished with it yet. A soldier without a war is merely a man waiting to fade. I am not ready to fade."
 mumakan.0082.a: "I am a soldier, not a farmer. I refuse to settle."
 mumakan.0082.b: "I accept the land. This war is over for me."

 ### General Mase - Defeat ###

 mumakan.0091.t: "A Shocking Defeat"
 mumakan.0091.desc: "My army is shattered. This is not some orderly tactical retreat that can be dressed up as a repositioning. It is genuinely shattered. This is how things look when they have been hit hard enough and often enough that there is no reforming them. The [GetCultureByKey('koronandi').GetName] did this. They are ragged and half-starved. They are the hollow-eyed defenders of a republic who had no business winning. Yet they won anyway.\n\nThey held together by something I understand better than I would like to admit. It is the particular stubbornness of a people who have decided they will not be the ones to let it end. The promised governorship is smoke. I stood at the edge of the greatest thing I was ever going to accomplish. A people too stubborn to know they were beaten reached up and took it from me. I respect that. I respect it the way you respect a fire. I respect it completely and from what remains of a safe distance."
 mumakan.0091.a: "Fall back and regroup. We may yet find our footing."

 mumakan.0092.t: "The Unknown Verdict"
 mumakan.0092.desc: "The long march home is before me. It has the feel of a sentence being read aloud. Each step is a word and the destination is a verdict I cannot yet know. I think of Sandamal. He trusted me with the great task of his reign and I must find a way to stand before him when this march is done. I think of the men who followed me here who are not following me back. I recite their names quietly as I walk. I have always believed that is the least a commander can do for the dead.\n\nI cannot say what waits for me at the end of this road. It may be judgment or mercy. It may be a tribune or a courteous retirement into obscurity. The politics of the empire have always been above my particular altitude. It does not matter. I have faced worse things than uncertainty. I have always faced them the same way. I take one step at a time with my eyes forward until it is over."
 mumakan.0092.a: "I shall face whatever judgement awaits. I serve the throne."
 mumakan.0092.b: "I will not be a sacrificial lamb. The frontier is wide."

 mumakan.0093.t: "The Empty Throne"
 mumakan.0093.desc: "Sandamal is dead. The empire is fracturing along every seam at once. This immense and seemingly indestructible war machine is failing. Every ambitious lord in Mûmakan is suddenly discovering that loyalty is a flexible concept when the throne sits empty. Every sword arm is worth its weight in gold. For perhaps the first time in my career, I am not merely useful. I am valuable. There is a difference between those two things that a man from Amarû learns to feel in his bones.\n\nI look at the men still with me. They are battle-worn and loyal past the point of reason. They wait on my word the way they have always waited. I take stock of what I actually hold. It is more than it appears and less than I need. It is possibly enough. I have spent my whole life being useful to powerful men. It may be time to discover whether I am a powerful man myself. I have climbed out of the dark before. I can do so again."
 mumakan.0093.a: "I serve the throne. My loyalty to the office endures."
 mumakan.0093.b: "Let the princes bleed each other. We shall wait for the dust to settle."
 mumakan.0093.c: "A general with an army needs no emperor. I shall claim my own land."

 ### Ataraka Initial Story Chain ###
 # mumakan.0110 The Fall of Kôrlan from Ataraka's perspective
 # Aameda is with you as you look out into the bay, headed toward the inland fortress of Tânande.
 # 3 different responses, all lead to Aameda responding.

 mumakan.0110.t: "The Fall of Kôrlan"
 mumakan.0110.desc: "#Italic The morning rises, and dawn brings#! #Bold death.#! \n\nYou can see it, flickering like a blood moon upon the bay as clear in the morning as in the night, the fire rises over Kôrlan, great and terrible, a black and listless sallow silence. It burns, and your people burn with it, your republic, your burden, your honor, your hope. It burns like your eyes. It burns like your heart. As the wind catches the sail of your lonesome vessel and carries to you the scent of smoke, of burning spice, of burning flesh, you know.\n\nThe labor of a hundred generations in flame. Thousands of years of law, council, and trade, the ten thousand faces of the [GetCultureByKey('koronandi').GetName] in their ten thousand labors, all of it now the offering of a tyrant's vanity."
 mumakan.0110.a: "I gaze now upon the pyre of the republic."
 mumakan.0110.b: "There are no words."
 # cynical response
 mumakan.0110.c: "What is done is done."
 
 # mumakan.0111 Aameda's response is the same no matter what you said.
 mumakan.0111.t: "Aameda's Approach"
 mumakan.0111.desc: "[aameda.GetFirstName] has been very quiet, but it is not a peaceful silence. You can see it in his posture. His hands clench, and his teeth grind. His normal haughty implacability has been shattered. Fire and death blaze in his eyes, tinted with despair and hate alike. He gazes across the waters, before at last turning to you.\n\n"You feel it as well, Ataraka." His voice is tight. "You feel this pain, this sorrow. Hold onto it. It alone shall sustain us in the long days ahead, and by it we might yet see a true victory..."
 # you look back and think of your choices how did it come to this?
 mumakan.0111.a: "I remember the road that led us to this dark day..."
 
 # mumakan.0112 You remembered the day that the emperor sent his first, last and final ultimatum.
 mumakan.0112.t: "The Proclamation of Sandamal"
 mumakan.0112.desc: "It was a dreary day the message came.\n\nA messenger bearing a scroll sealed with the imperial seal of emperor Sandamal demanded to speak to the Great Council, and in my heart I knew it could be nothing good. Unfurling the scroll, the emissary spoke with the emperor's voice.\n\n"To the councilors of Kôronânde, hear my words, and the final offer of leniency. Long have you glutted on the blood of my people, drawing of our lifeblood and spitting on the honor of our ancestors. No longer. Humble yourselves before the rightful heirs of the blessed Indur, and genuflect before his throne, and there need not be blood, for gold shall pay the weregild of your sins. Refuse, and I shall be left with no other recourse but to avenge my people with steel."\n\nThe council immediately erupts in outrage at the sheer gall, the blatant attempts to extort money from them. Words quickly build, a fervor reaching pitch, oaths and curses streaming from the councilors as they swear to never kneel before the emperor."
 mumakan.0112.a: "And so it was war."
 
 # mumakan.0113 War was coming from the east, you had little time to prepare, but...
 mumakan.0113.t: "The War Council"
 mumakan.0113.desc: "When the emissary had departed, the Council turned to the matter of the now looming war. Yet there was little fear then - for was not Kôronânde rich beyond imagining? Were Kôrlan's walls not mighty and tall? The sons of the republic stood united, unlike the long divided savages of the empire now ranting threats at their gates.\n\nYet amidst the fervor and boasting, one voice of caution quietly caught my ear - Aameda speaking of caution, of having heard many things about the emperor Sandamal and of those in his employ. And though I then wished to snap at him, to castigate how his very faction's policies and blatant corruption led to this precipice, I mastered myself. It was not the time. Not when the republic potentially hung by a thread.\n\nYet in spite of my own resolution, I found little such in the council - factions quickly splitting apart, debating the cost of the defense, who should be hired, who shall be summoned. Yet at the last, the council narrowly decided on their measures..."
 mumakan.0113.a: "We must focus on Mûmakil to face the empire in the field." # Spawns 4 Elephants, 2 citizen guard, 2 mangonels
 mumakan.0113.a.tt: "You will gain 4 stacks of [GetMaA('war_mumak').GetName], 2 stacks of [GetMaA('koronandi_citizen_guard').GetName] and 2 stacks of [GetMaA('mangonel').GetName] as [men_at_arms|E]" # Spawns 4 Elephants, 2 citizen guard, 2 mangonels
 mumakan.0113.b: "The republic's sons are our strength." # Spawns 2 Elephants, 4 citizen guard, 2 mangonels
 mumakan.0113.b.tt: "You will gain 2 stacks of [GetMaA('war_mumak').GetName], 4 stacks of [GetMaA('koronandi_citizen_guard').GetName] and 2 stacks of [GetMaA('mangonel').GetName] as [men_at_arms|E]" # Spawns 2 Elephants, 4 citizen guard, 2 mangonels THESE SHOULD BE A TOOLTIP
 mumakan.0113.c: "We must prepare for the counterattack!" # Spawns 2 Elephants, 2 citizen guard, 4 mangonels
 mumakan.0113.c.tt: "You will gain 2 stacks of [GetMaA('war_mumak').GetName], 2 stacks of [GetMaA('koronandi_citizen_guard').GetName] and 4 stacks of [GetMaA('mangonel').GetName] as [men_at_arms|E]" # Spawns 2 Elephants, 2 citizen guard, 4 mangonels THESE SHOULD BE A TOOLTIP
 
 # mumakan.0114 But it was too little too late... the army of Mûmakan was at your gates, so you...
 mumakan.0114.t: "The Lightning Campaign"
 mumakan.0114.desc: "Yet the preparations were all for naught. The armies of Mûmakan were marching ever ere Sandamal's emissary spoke with us, and scarcely had our defenses started to be erected when the imperial armies came down out of the east. Any attempts to prevent them were turned aside with ease, as if the armies of Kôronânde were but small nuisances.\n\nBefore such a campaign, hopes fell suddenly from the heady confidence of but a day ago. Sandamal's host had spread despair by the speed of their advance, and that was a weapon more terrible than steel."
 mumakan.0114.a: "Yet still we had to try!"
 # cynical response
 mumakan.0114.b: "No option was left off the table!" # cynical
 mumakan.0114.c: "Our confidence was our folly."
 
 # mumakan.0115 The siege was bloody
 mumakan.0115.t: "Blood and Gold"
 mumakan.0115.desc: "The siege did not last long, all things considered. The walls held for a time, but the great Mûmakil at last breached it, and from there panic spread. The many people of Kôrlan now became its undoing, as they ran from the broken wall, desperate to find safety in home or upon ship. The chaos slowed any hopes of a successful defensive action, and the imperial forces were not blind.\n\nThey swiftly made for the harbor, seeking to deny any escape. Only a few ships successfully cast off before the first was set aflame, the great ships kindling for the funeral pyre of the republic. And the fire spread, until not just the port but the entire city was wreathed in terrible flame.\n\nMy own wife was lost then, caught beneath crumbling stone and blazing hall. The proud palaces of the great families were spared not. They were looted, the families slaughtered or set in chains, made to serve the victorious. The countless treasures of the republic, both of blood and gold, taken for the empire's own."
 mumakan.0115.a: "A truly horrid scene."
 
 # mumakan.0116 There was little hope, hundreds died in the fires, you sought advice from Aameda.
 mumakan.0116.t: "Flight of the Council"
 mumakan.0116.desc: "The councilors sought to flee then, seeing the hopelessness of the day, paying me no heed despite my calls for calm, for a plan. But a flight was not to be. Not for them. With the harbor taken, panic at last spread even into them, blame spreading just as quickly. Some attempted to make for their estates, others to the walls to flee overland. Still others tried to make for the harbors despite the danger. They died as easily as the masses they once had held in contempt.\n\nThe council guard remained behind, loyal to the last, holding the imperial forces at bay desperately.\n\nIt was in this chaos that Aameda emerged beside me, and with a surprising strength, pulled me through the streets, our guards slowly dwindling.\n\n"The day is lost. Tomorrow may yet still be won, but victory first requires survival.""
 mumakan.0116.a: "Perhaps, but how?"
 
 # mumakan.0117 Finally the city was falling, Aameda had a ship, you had to flee, but you had left with...
 mumakan.0117.t: "Kôrlan's Longest Day"
 mumakan.0117.desc: "The city has all but fallen now. It burned my heart to see the pearl of the seas, the jewel of the republic, set to torch and ruin this way.\n\nAameda finally led me to the spot he sought - a  hidden alcove letting out into the bay, with a small boat even then being loaded hastily with supplies.\n\n"It is an old contingency," he said quietly, "for a day when the Council may have to flee. My predecessor's predecessor ordered it constructed... that I would live to see it used is a bitter chalice."\n\nWe hastily loaded the boat with what it could bear, before departing, narrowly avoiding the invading hosts. As I watched the burning city, all I could think about was..."
 # with glory and brave deeds
 mumakan.0117.a: "The valour of the defenders."
 # with the final respect of your people
 mumakan.0117.b: "Sorrow for those lost."
 # knowledge of war cynical
 mumakan.0117.c: "That the war was not over yet."
 
 # mumakan.0120 A Toast to the end of the republic
 # Essential scene: Aameda gives a thorough analysis of the situation.
 # They need time to evacuate what they can, build up civilian resistance, and delay as long as possible.
 # Option A: (Defensive Strategy)
 # Option B: We will fight to the bitter end (Offensive Strategy)
 # Option C: evacuate our resources to fight another day
 mumakan.0120.t: "A Toast at World's End"
 mumakan.0120.desc: ""So." Aameda's voice has managed to regain the casual, genial mien that hid all he truly felt. "Kôrlan has been set to flame; in all likelihood, much of the council now lies dead or in chains, as well as many of the noblest and storied houses of the realm."\n\nI bite my tongue to refrain from commenting on the purported nobility of such... storied houses.\n\nHe continues on, gathering momentum like a rolling boulder. "It is likely that the treasury has been plundered and carted off, save the little we have on this ship. The rural towns will be shaking in terror, with the city fallen. I expect many shall surrender at the first sign of Sandamal's host. We will need to tread carefully, but while we fight on, the republic is not dead."\n\nHe turns to me more fully, his eyes no longer blazing but intense in focus. "You are the leader of the republic. How shall we fight now with our greatest resources lost?""
 # Defensive Strategy
 mumakan.0120.a: "We cannot hope to face them on the open field."
 mumakan.0120.a.tt: "You will pursue a path concentrating on defensive tactics and attrition, wearing down the occupying imperial forces."
 # Offensive Strategy
 mumakan.0120.b: "We must strike now while we still have some strength, however scattered."
 mumakan.0120.b.tt: "You will pursue a path concentrating on offensive tactics, gambling all on a single decisive battle to expel the invaders."

 # Evacuating things to the reserve
 mumakan.0120.c: "We will not fight today. Nor tomorrow. But perhaps someday."
 mumakan.0120.c.tt: "You gain a stockpile of #P +1#! Resources\nThese will strengthen you in exile, if defeated."

### War Perspective Events (Ataraka) ###

# The following events describe the war from Ataraka's perspective at 1, 5, and 10 months. 
# Always a few options: keep potential exile laamp strengthened, or spend last reserves.

# mumakan.0131 1 month mark perspective event 
 mumakan.0131.t: "The Remnants Rally" 
 mumakan.0131.desc: "Some doubted, but a month after the sack of Kôrlan, we have managed to hold out. It is still a most precarious thing, but it is time that has allowed for scattered remnants of support to begin to gather. Messengers and supplies are starting to move, and some previously spooked towns have begun to tentatively reach out.\n\nIt is a promising sign, but now I need to decide on what to do with these newfound resources..." 
 # Spends resources (and spawns extra troops) 
 mumakan.0131.a: "We must acquire more soldiers!" 
 # Spends resources (and grants extra siege modifier) 
 mumakan.0131.b: "We cannot prevail if we cannot reclaim the cities." 
 # continue evacuation / do not use resources 
 mumakan.0131.c: "Not yet. Let us wait and see how things develop." 
 mumakan.0131.c.tt: "You gain a stockpile of #P +1#! Resources"

 # mumakan.0132 8 month mark perspective event
 mumakan.0132.t: "The Desperate Struggle"
 mumakan.0132.desc: "Eight months. I have lived eight months in the hills and jungles of the hinterland. I sleep in caves that smell of wet stone and old earth. I eat what the land and our dwindling allies can spare. I make war with the tools of the desperate. Ambush. Retreat. Denial. Patience. We hold the spaces between their tightening fists. We hold the flotsam. We hold the places too small or too steep or too thick with jungle for their columns to reach without bleeding for every step.\n\nEight months have passed and we have not broken. The scouts from the imperial host report back to their commanders that the resistance continues. I have started to recognise them by their bearing. They have the particular weariness of men who expected a short campaign and found themselves mired in a war that will not end. I take a grim and private satisfaction in that. I cannot afford the luxury of dwelling on it.\n\n[aameda.GetFirstName] has been counting our stores with meticulous care. He knows that wars are won by the supplied rather than the brave. The numbers he presents to me are stark. We are surviving but survival alone will not free the republic. I must decide whether to spend what little we have to press our fragile advantage. The alternative is to hold it close against the darker days I know are coming."
 mumakan.0132.a: "Draw from our stockpiles. The fires of resistance must be fed."
 mumakan.0132.a.tt: "You spend a stockpile of #N -1#! Resources"
 mumakan.0132.b: "Gold can buy what the land denies us."
 mumakan.0132.b.tt: "You spend a sizable sum of [gold|E]"

# mumakan.0133 15 month mark perspective event 
 mumakan.0133.t: "Anniversary" 
 mumakan.0133.desc: "I have been moving from village to camp to village, crossing through the dense jungled hinterland to avoid capture, to coordinate defense, to inspire resistance. But on days like these, it is now I, who am in need of faith. \n\nI have seen horrors that no one should ever have to see. I have seen indescribable despair in destitution and ruin. But what lies before me now... \n\nToday is a humid day. A hot day. The dense stale air stuffs my lungs and throat. It mixes with the stench of burnt sick. It chokes my every orifice. It makes my stomach lurch, like nothing else has in this accursed war. Beyond the ridge, is a valley of pitch, with stark white bones, and starving dogs. They gnaw at the remains, tear the bone apart, human bones, human remains. Men, women, children - knacker, knave, and noble... \n\n#N are now all food for the dogs.#!" 
 mumakan.0133.a: "I try to wretch..." 
 mumakan.0133.a.tt: "But your stomach is empty." 
 mumakan.0133.b: "I cough over and over and over..." 
 mumakan.0133.b.tt: "But you still can't breathe" 
 # cynical option (requires global_var:ataraka_cynicism = 3) 
 mumakan.0133.c: "There is nothing we can do for the dead" 
 mumakan.0133.c.tt: "And you feel nothing at all."

 mumakan.0134.t: "Heroic Defense" 
 mumakan.0134.desc: "I do not know how, but I have survived two years against a foe that out-numbered mine ten to one. Around the camp you have been residing, the sons of the republic are all around me, they are battered and they are bandaged, their spears weathered and shields chipped, yet they are smiling. For though the war has been two years in the making, they still fight, as do I. [aameda.GetFirstName] taps my shoulder and invites me aside \n\n "These Men have such hope, but I fear it may not last" says [aameda.GetFirstNameNoTooltip]. \n\n He leans in towards you lowering his voice "You should cultivate that source of morale while you still can. A man with hope is both useful and obedient, though it may cost us the effectiveness of certain contingencies." \n\n[aameda.GetFirstNameNoTooltip] goes silent letting me consider my options "Provide me with the necessary resources and I assure you the armies of the republic shall fight twice as hard as before."" 
 mumakan.0134.a: "I will provide you with what you need." 
 mumakan.0134.a.tt: "You spend a stockpile of #N -1#! Resources and #N 100 #!Barter Goods" 
 mumakan.0134.b: "No, We must prioritize our contingencies." 
 mumakan.0134.b.tt: "You gain a stockpile of #P +1#! Resources"

 # mumakan.0135 38 month mark perspective event
 mumakan.0135.t: "The Price of Survival"
 mumakan.0135.desc: "Three years. I have spent three years sleeping in the mud and eating what the jungle gives. I have watched men I trained and bled beside carried off the field on litters made of branches and torn cloth. This has been a grinding and thankless war. Now [aameda.GetFirstName] comes to me with a proposition. I knew this was coming in the quiet place behind my ribs where I keep the truths I do not wish to face.\n\nHe has found buyers. These are Mûlambûril traders from distant ports who care nothing for the republic. They care only for profit. They will pay handsomely for what remains of the legacy of Kôrlan. He shows me the sacred bronzes of the old temple. He shows me the star-charts of the navigators' guild copied by hand across a hundred generations. He even has the ancient instruments of law from the Wall-Upon-Law. These are the stones on which the words of Tarasar were first inscribed. This is our heritage. This is our memory.\n\n[aameda.GetFirstNameNoTooltip] tells me they are merely objects. His voice is gentler than I expect. He knows exactly what he is asking of me. He says that objects do not bleed or starve. He says they do not leave children without fathers. Our people do both. I look at the relics laid before me. I think of Tarasar relinquishing his crown so that the republic might be governed by the wise. I wonder what he would say. I wonder what he would think of his heirs haggling over his legacy to buy spears."
 mumakan.0135.a: "Sell the sacred treasures of Kôrlan for weapons. Survival trumps heritage."
 mumakan.0135.a.tt: "You gain a stockpile of #P +2#! Resources"
 mumakan.0135.b: "Offer trade monopolies to the Mûlamburil in exchange for arms and goods."
 mumakan.0135.b.tt: "You gain a stockpile of #P +1#! Resources and #P 100#! Barter Goods"
 mumakan.0135.c: "We will not sell our soul to save our skin."
 mumakan.0135.c.tt: "You spend a stockpile of #N -1#! Resources"

 # mumakan.0136 50 month mark perspective event
 mumakan.0136.t: "The Well of Conscience"
 mumakan.0136.desc: "Four years and two months. I have stopped counting the days. [aameda.GetFirstName] counts them for me in the ledger he keeps close to his chest. He has columns of figures that translate human lives into strategic arithmetic. I have changed in these years. I can feel it in the way I hold a blade now. I assess a village not for its people but for its defensibility. I listen to casualty reports with a stillness that would have horrified the man who once argued cases in the courts of law.\n\n[aameda.GetFirstNameNoTooltip] proposes something that makes even him hesitate. This is how I know it is truly terrible. We are retreating slowly and methodically to buy time. He suggests that we leave behind more than scorched earth. He tells me to poison the wells. He does not meet my eyes. He says that if we deny them water, we deny them the ability to hold what they have taken. It costs them months and men. It costs them the will to continue.\n\nI tell him it costs us too. He pauses. He says we are already dying. He asks whether we die having made it costly or whether we die having made it easy. I look at my hands. These are a lawyer's hands and a tailor's son's hands. I think of the wells of my childhood. I remember the cool water in clay pots and the laughter of children around the basin. I wonder what I am becoming. I wonder if the republic would even recognise the man who saves it."
 mumakan.0136.a: "Poison the wells. Let them drink death even if we must do so as well."
 mumakan.0136.a.tt: "You gain a stockpile of #P +2#! Resources at the cost of #N Supply Limit and Greater Attrition#!"
 mumakan.0136.b: "Spend the last of the treasury to arm our remaining troops."
 mumakan.0136.b.tt: "You spend a stockpile of #N -1#! to gain #P 100#! Barter Goods"
 mumakan.0136.c: "Save what we can and prepare to flee. There is no shame in living."
 mumakan.0136.c.tt: "You gain a stockpile of #P +1#! Resources"

 # mumakan.0137 The Human Cost
 mumakan.0137.t: "The Human Cost"
 mumakan.0137.desc: "I have argued with [aameda.GetFirstName] many times. We argue about strategy and resources. We argue about the moral boundaries I insist on and he considers quaint. But this is the first time I have argued with him and known with absolute certainty that I am right. I also know that being right may kill us.\n\nThe villages behind our lines are starving. This is not the slow hunger of short rations. It is the desperate and hollowed hunger that turns skin to paper and eyes to glass. Mothers feed their children tree-bark soup and call it dinner. The war has destroyed the harvest. The imperials seized what the fire did not take. What remains is barely enough to keep my soldiers standing. The counsel of [aameda.GetFirstNameNoTooltip] is clear and cold. He says the stores are for the army. He says the army is for the Republic. He says the Republic cannot be saved by feeding people who cannot fight.\n\nI listen to him. I understand his reasoning. I understand that he is probably correct in the narrow and terrible mathematics of survival. Then I think of my mother. She was a grocer's wife. She was a woman who kept her shelves stocked and her neighbours fed through every lean season. I think of what she would say to a man who let children starve so that soldiers might eat. I know what I will do. I will do it even if it costs me the war."
 mumakan.0137.a: "Open the granaries. We must feed whomever we can."
 mumakan.0137.a.tt: "You have lost #N -100#! Barter Goods"
 mumakan.0137.b: "Evacuate the civilians and provide for them on the march."
 mumakan.0137.b.tt: "You gain #P 1#! Resources! For #N -200#! Barter Goods"

 # mumakan.0138 The Death of the General
 mumakan.0138.t: "The Death of the General"
 mumakan.0138.desc: "[aameda.GetFirstName] arrives in the command tent at dawn. He carries the particular expression he reserves for news that is simultaneously devastating and useful. There is a slight lift at the corner of his mouth and a brightness in his eyes that he does not quite suppress. His bearing tells me he has already calculated every implication before deigning to share the intelligence with me.\n\nHe tells me simply that the General is dead. He says it as though he is remarking on the weather. I wait because the silences of [aameda.GetFirstNameNoTooltip] are as calculated as his words. He explains that it was the General's own men. Mutiny has finally taken hold. It seems years of jungle rot and dwindling pay have taken their toll. The indignity of being outwitted by a people they were told would surrender in a month has eroded even Mûmakani discipline. He offers a slight smile and calls it a pity.\n\nI should feel triumph. The man who burned Kôrlan and shattered my Republic is gone. He made my wife a memory and my people exiles in their own land. He is dead and his army is fracturing. However, I have spent too many years in this war to mistake an opportunity for a victory. A wounded beast is dangerous. A leaderless army is doubly so. Some will desert while others will fight harder. They have nothing left to lose and hatred will fill the void where discipline once stood. [aameda.GetFirstNameNoTooltip] watches me think. His expression shifts to sharp anticipation. He is waiting for my order."
 mumakan.0138.a: "Prepare a counterattack while they are weakened. The forefathers demand it!"
 mumakan.0138.a.tt: "You will prepare a counterattack to strike back at a weakened Mûmakan."
 mumakan.0138.b: "Patience is our greatest weapon. We must wait for them to unravel."
 mumakan.0138.b.tt: "You will wait for Mûmakan to collapse from the inside."

 # mumakan.0139 Nafarati Revolt
 mumakan.0139.t: "The Northern Storm"
 mumakan.0139.desc: " The messenger is half-dead with exhaustion when they find us. She is a [GetCultureByKey('mulamburil').GetName] trader who has been running intelligence for [aameda.GetFirstName] through channels I chose long ago not to enquire about too closely. The news she carries changes the shape of the war in a single breath. The [GetCultureByKey('nafarati').GetName] have revolted.\n\nThis is not a border skirmish or a dispute over tribute. It is a full secession. The northern warlords have declared their independence from an empire that has bled itself white trying to crush us. The great gamble of Sandamal has come undone. He excluded the Nâfarati from the invasion of Kôronânde to prove the throne did not need them. In doing so he proved precisely the opposite. The imperial treasury is drained and the army is mired in our jungles. The Nâfarati have simply walked away. They have taken their soldiers and their lands and their ambitions. They have told the empire that it can keep its dying throne.\n\n[aameda.GetFirstName] is already laughing. It is not his usual careful or measured amusement. It is something raw and genuine that I have never heard from him before. He asks if I understand what this means. For once there is no calculation in his voice. There is only the wild and incredulous joy of a man watching his enemy's house catch fire from within. I understand. The empire cannot fight on two fronts. I must decide whether to strike while the iron is white-hot or let the fire do our work for us."
 mumakan.0139.a: "They shall know my wrath!"

 ### Sandamal War Perspective Events ###

 mumakan.0140.t: "Fall of Kôronânde"
 mumakan.0140.desc: "The dispatch arrives at court borne by a rider whose horse is half-dead beneath him. I know what it contains before the seal is broken. The particular urgency of a man who has ridden without rest tells its own tale. I have been reading such tales for thirty years. [GetTitleByKey('c_korlan').GetNameNoTier] has fallen. The great harbour-city has been taken by storm. This is the jewel that has bled my empire for generations through its stranglehold on the southern trade. My general has delivered what every emperor since the departure of [GetScriptedCharacterByHistoryID('nazgul4').GetFirstNameNicknamed] has dreamed of and none has dared attempt. He is the commoner I raised from nothing. He is the man in whom I placed a trust I extend to almost no one.\n\nI allow myself one breath of satisfaction. Then I set the dispatch aside. I begin the calculations that will determine whether this victory is the making of my legacy or the preamble to its unravelling. The tribal chiefs will expect reward. The treasury will need replenishment from the spoils. The [GetCultureByKey('nafarati').GetName] in the north were deliberately excluded from the campaign. They will note both the victory and their absence from it. They will draw conclusions I will need to manage carefully. A firm hand and a generous reward are required. A harsh deed may follow if needs must. The war is won. The peace is everything."
 mumakan.0140.a: "At last. The republic bends before the throne of Mûmakan."
 mumakan.0140.b: "Good, but do not celebrate until the last $koronandi$ kneels."

 mumakan.0141.t: "Reports from the Front"
 mumakan.0141.desc: "The dispatches from general [general.GetFirstName] have always been a model of military clarity. He reports the positions taken and the positions held. He lists the forces deployed and the forces spent. I have always read them with the appreciation of a man who values competence above all the gilded virtues combined. This dispatch carries a note I have not seen from him before. There is a caution threaded through the confidence like a dark strand in bright cloth.\n\nResistance is stiffening in the hinterlands. The rural towns should have surrendered at the fall of [GetTitleByKey('c_korlan').GetNameNoTier]. Instead they have gone silent. This is not the silence of submission. It is the dangerous silence of a people deciding how to fight without an army. The general has deployed additional patrols. He has secured the major roads. He assures me that he is in complete control of the situation.\n\nI have governed for thirty years. I have learnt that when a competent man assures you he is in complete control, it means he is dealing with something that has surprised him. He does not yet wish to say so. This does not alarm me. My general is more than capable. The remnants of the Republic cannot sustain resistance for long without their capital or their fleet. I make a note of the dispatch. I file it in the part of my mind where I keep the things that may one day require my direct attention."
 mumakan.0141.a: "This was expected, though the timing is less than ideal."
 mumakan.0141.b: "The general has enough men. This is his test."

 mumakan.0142.t: "The Stubborn South"
 mumakan.0142.desc: "Sixteen months. The campaign was supposed to last three. Perhaps four at the outside if the weather turned or the coastal towns proved loyal to their Republic. Instead I sit in my audience chamber in [GetTitleByKey('c_amaru').GetNameNoTier]. I read dispatches that have taken on the particular repetitive cadence of a war that has forgotten how to end.\n\nThe [GetCultureByKey('koronandi').GetName] will not die. I do not say this with admiration. I am forced to admit a grudging measure of it. I have the weary recognition of a man who has studied history long enough to know the truth. Occupying a country is a very different art from conquering one. My General holds the cities and the roads and the harbours. The resistance holds the hills and the jungles. They hold the loyalty of every farmer's wife who hides a weapon beneath her hearth-stones. These are not soldiers I am fighting now. They are a people. A people cannot be defeated by the same means as an army.\n\nThe court grows restless. The tribal chiefs cheered loudly at the fall of [GetTitleByKey('c_korlan').GetNameNoTier]. Now they have begun to murmur about costs and duration. They complain about campaigns that eat their levies and return nothing but more dispatches. I silence them for now with the weight of the throne and the memory of victory. But memory fades. Even the patience of an emperor has its architecture. I can feel the cracks forming."
 mumakan.0142.a: "We are committed. Victory is surely near."
 mumakan.0142.b: "They have proven their mettle. But against the sky it will not be enough."

 mumakan.0143.t: "The Weight of Five Years"
 mumakan.0143.desc: "Five years. This war was meant to be my crowning triumph. It was the act that should have silenced the whispers. It should have proved the dynasty still bore divine favour. It was intended to show the Nâfarati and every other restless tribe that the imperial throne needed no sword but its own. Instead it has become a millstone around the neck of the empire. I can feel it dragging us down.\n\nThe treasury dispatches no longer arrive with figures. They arrive with apologies. I receive carefully worded explanations of why the figures are not what they should be. These are accompanied by suggestions that I might consider alternative means of funding. The tribal chiefs have moved past murmuring. They have entered the particular pointed silence that precedes demands. Their demands are neither modest nor negotiable when they finally arrive. They want payment. They have sent their sons and their levies into a jungle war that has consumed five years of their strength. They want compensation. They are not wrong to want it. That fact makes their wanting no less dangerous.\n\nI have three choices before me and none of them are good. This is the natural condition of imperial governance. I accepted this reality long ago. But I am tired. This is not the tiredness of the body which I have long since learnt to master. It is the tiredness of the mind. That is a more honest exhaustion and a harder one to hide."
 mumakan.0143.a: "Pay them from the treasury. Loyalty must be bought."
 mumakan.0143.b: "Promise them plunder from Kôronânde. Let greed fuel the campaign."
 mumakan.0143.c: "Remind them who is emperor. The throne does not beg."

 mumakan.0144.t: "The Forever War"
 mumakan.0144.desc: "The dispatch arrives. It is not from general [general.GetName] but about him. That distinction changes everything. [general.GetNameNoTooltip] is dead. He did not fall in battle. He was not taken by fever. He was not lost to the thousand mundane cruelties of a jungle campaign. He was killed by his own soldiers. These were the men who followed him through the breach at Kôrlan. After seven years of a war without end they have decided that their patience has a limit that their loyalty does not.\n\nI set the dispatch down. I sit very still for a long time. Stillness is what I do when the world shifts beneath me. It has shifted many times in thirty years. I have never yet let it see me stumble. [general.GetNameNoTooltip] was mine. I found him and I raised him. I gave him the greatest command in the empire and he delivered the greatest victory. Now he is dead in a tent in a jungle that should have been pacified years ago. He was killed by the very soldiers I sent to ensure his success.\n\nThe [GetCultureByKey('nafarati').GetName] are restless. The tribal chiefs are beyond restless. The treasury is a wound that will not close. Now I must find another commander and another army. I must find another reason for the empire to believe that this war is anything other than the slow consumption of everything I spent thirty years building. I summon my council. I do not let them see my hands shake."
 mumakan.0144.a: "e cannot stop now! We must not!"

 mumakan.0145.t: "The Nâfarati Revolt"
 mumakan.0145.desc: "Twelve years. Half a generation has been poured into a jungle that swallows armies. It returns nothing but bones and dispatches full of careful language about continued fighting and evolving situations. It has been twelve years since I watched [GetTitleByKey('c_korlan').GetNameNoTier] burn. I truly and honestly thought the hardest part was over. Now the [GetCultureByKey('nafarati').GetName] have revolted.\n\nI should have seen it. I did see it. I saw the shape of it years ago and felt the tension in every delayed tribute. I felt the pointed absence of the northern warlords from my court. I knew in the cold analytical part of my mind that they were waiting for exactly this moment. The throne is overextended. The treasury is drained. The army has been bled white in a campaign that has become an open wound. I excluded them from the invasion of Kôronânde to prove I did not need them. Instead I have proved that they have no reason to remain without the threat of imperial strength to hold them.\n\nThe empire cannot fight on two fronts. Every emperor who has ever sat this throne and lasted more than a season knows this. The question sits before me now. It is cold and immovable and demands an answer I do not wish to give. I must decide which front I abandon. I am still the Iron Lion. But iron rusts when it is left too long in the rain. I fear that the rain has been falling for a very long time."
 mumakan.0145.a: "These wretches! They think they can tear down what I have built?"

 ### General War Perspective Events ###

 mumakan.0151.t: "Reports from the Front"
 mumakan.0151.desc: "I write the dispatch to the emperor in the hour before dawn by the light of a single oil lamp. I choose every word with the care of a man who understands that a report is not merely information. It is architecture. What I build with this letter will determine what Sandamal expects. What he expects will determine what he sends. What he sends will decide whether I finish this campaign as the governor of a conquered province or as a footnote in a history of imperial overreach.\n\nThe resistance is crumbling. I write this because it is mostly true. The organised remnants of the Republic's army have been scattered into the hinterlands. Their supply lines are severed. Their leadership is reduced to a lawyer turned rebel and whatever council of the desperate he has scraped together in the hills. I believe the last embers will gutter and die in a month or two. I must believe it. The alternative is a thought I am not yet prepared to entertain. I cannot accept that I am engaged in a war against a people rather than an army. Such wars do not end the way my training tells me they should.\n\nI seal the dispatch and hand it to my fastest rider. I request minimal reinforcements. The emperor will read confidence in this request. Confidence is what he needs from me. It is what purchased my commission and my governorship and everything I have clawed my way up from the gutters of [GetTitleByKey('c_amaru').GetNameNoTier] to reach."
 mumakan.0151.a: "Report that victory is imminent. Request minimal reinforcements."

 mumakan.0152.t: "The Jungle's Patience"
 mumakan.0152.desc: "Sixteen months in the field. I am learning a new kind of warfare. This is not the kind they teach in the training camps. No tactical manual anticipates this because no manual is written by a people who would rather die in their own hills than live under an empire's boot.\n\nThe [GetCultureByKey('koronandi').GetName] do not fight the way soldiers fight. They do not hold ground or contest crossroads. They do not form lines of battle where a competent commander can bring superior numbers to bear. They disappear. They strike from tree-cover and vanish into terrain they have known since childhood. They fight from behind every hedgerow and every irrigation ditch. A patrol goes out and does not come back. A supply wagon burns on a road that was secure yesterday. A village headman swears fealty in the morning and shelters a dozen armed men by nightfall.\n\nI hold every city and every road and every harbour. I have ten times their strength. Yet every week my soldiers die in the green dark of the hinterland. They are picked off by people who should have surrendered months ago. When cornered they fight with a viciousness that would give any seasoned commander pause. These are not soldiers. They are fathers and shopkeepers and fishermen. They are killing my men. I need to change my approach or this jungle will eat me alive."
 mumakan.0152.a: "Shift to a siege strategy. Starve them into submission."
 mumakan.0152.b: "Launch aggressive raids. We must break their will."

 mumakan.0153.t: "The Rot Sets In"
 mumakan.0153.desc: "Five years. I have held this posting for five years. This is longer than any campaign I have ever fought. It is longer than I spent clawing my way up from nothing in the Imperial army. I look at the face in the water basin each morning and I see a man who has aged a decade in half the time. The jungle does that to a man. There is the heat and the damp and the endless green dark pressing in from every side. There is the particular madness of fighting an enemy that is everywhere and nowhere. They refuse to stop with a stubbornness I have come to respect in the way one respects the sea.\n\nThe army is rotting. This rot is not from disease. Disease takes its toll as it always does in the south. This is the slow poison of purposelessness. it infects soldiers who have forgotten what victory looks like. They have begun to suspect they will not recognise it when it arrives. Desertion is rising. The camp followers have multiplied into a small city of their own. They are parasitic and ungovernable. Three soldiers were found dead last week. The officers are calling it an altercation. I am calling it mutiny.\n\nI have two tools left. I have fear and I have indulgence. Fear will hold them in line but it will make them brittle. Indulgence will keep them moving but it will make them animals. Neither is what I would choose if I had the luxury of choice. Luxury is a thing I left behind in [GetTitleByKey('c_amaru').GetNameNoTier] if I ever possessed it at all."
 mumakan.0153.a: "Execute the deserters. Dissent will not be tolerated in any form."
 mumakan.0153.b: "Let them take their pay from the land."

 mumakan.0154.t: "The Price of Ambition"
 mumakan.0154.desc: "I hear the tent flap move before I see the blade. Seven years of jungle warfare have made my ears sharper than any palace hound. Hearing the threat and being able to stop it are different skills. The second requires a younger body than the one I have worn down to sinew and scar tissue in this green hell.\n\nI know the faces. I made a point of knowing every man under my command. That is the least a commander owes the men who follow him. A boy from the gutters of Amârû learns early that the distance between loyalty and murder is often nothing more than a missed meal or a broken promise. These are not rebels. These are not [GetCultureByKey('koronandi').GetName] infiltrators. These are my own soldiers. They are the men I trained and led through the breach at Kôrlan. They are the men who cheered my name when the walls fell. They have decided in the particular arithmetic of exhausted and desperate men that I am worth more dead than alive.\n\nI think of Sandamal who trusted me with his great task. I think of the governorship that was promised. I think of the life I was building from nothing. This was the proof that a man from nowhere could become something. I think of the child in the crowd on the day I rode through the gates of Kôrlan. I never forgot that face.\n\nThe blade comes. I do not close my eyes."
 mumakan.0154.a: "So this is how it ends. Not in battle but betrayed by my own men..."
 
 ## Decision Events ##
 mumakan.0200.t: "The Legacy of Amâv"
 mumakan.0200.desc: "At long last, the realm once ruled by [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName], first King of all [men|E] of the [GetTitleByKey('e_mumakan').GetName], has been reforged from the ashes of its legend. Now, the [GetTitleByKey('h_utter_south').GetName] shall stand until the end of time comes!\n\nI shall guide the southern lands into a new future and forge a path that ensures that there will be nobody strong enough to stand in our way!"
 mumakan.0200.a: "The rise of the South is complete."
 
 mumakan.0201.t: "Tâlilan Burns"
 mumakan.0201.desc: "My armies have broken the last defenders of [GetTitleByKey('k_talilan').GetName], and the remaining [elves|E] have fled. Their forests burn... Good! Let his be a lesson to all who stand in my way. None can oppose the might of a conqueror!"
 mumakan.0201.a: "Good riddance."
 
 mumakan.0202.t: "The Rise of the Nâfarati"
 mumakan.0202.desc: "It is a glorious day indeed! We have carved out a [kingdom|E] of our own, for our people to dwell in - and to prosper. Now, none can deny us that what is owed to us by right of blood and iron!\n\nLet us raise a grand war-shrine near the [capital|E] to commemorate this triumphant day, and to create a staging ground for our warriors where they can train and be drilled in the art of war. Soon, the sound of their marching feet shall be hear all over the Utter South!"
 mumakan.0202.a: "Glory to Jî-Indûr!"
 
 mumakan.0203.t: "The Palace of Majesty"
 mumakan.0203.desc: "It is finished! The palace, so long in the making, has been completed. Now, white marble walls rise from the central plaza of the capital, and two beautifully crafted statues guard the main entrance to the building itself. Inside, there are many chambers and rooms - enough to house an entire small town by itself!\n\nWithin this structure I shall retire when the burden of ruling becomes too heavy to bear, and I shall be granted a few precious moments of peace and quiet. Reinvigorated, I shall reemerge, and rule with renewed wisdom and prudence, so the Twin Realms may continue to flourish under my gentle hand."
 mumakan.0203.a: "A magnificent thing indeed."

 mumakan.0250.t: "An Offering to the Uvâg"
 mumakan.0250.desc: "Trembling, I set down the basket filled with fruits and dried meat on the etched stones at the feet of the towering mountains. Livestock has been driven into a secluded walled area nearby, and we shall leave them there for the Uvâg to claim.\n\nIn the corner of my eye, I spy movement. As I spin in the direction, there is nothing. No - was that a shade over there, beneath the rocks? I cannot be sure.\n\nHow I pity the tortured souls of our ancestors, cursed to walk these bleak hills forevermore. With this offering, they shall be appeased for another decade..."
 mumakan.0250.a: "Let us return."

 mumakan.0350.t: "The Final Test"
 mumakan.0350.desc: "The sand beneath my feet feels warm as the evening sun begins its descent behind me, where the isle lies. I turn away from its light and face the darkness that lies to the east. I do not turn back to those standing on the beach with me, for all the words have long been said. They know our traditions, as do I.\n\nThe first wave touches my legs, but I do not stop. Soon, the waters embrace me, and I begin to swim. Onwards to the east, the setting sun behind me. May my strength carry me far, and bring favor upon those that must now rule Ambasôn."
 mumakan.0350.a: "I will swim until I can swim no more."

 #Elevating the Kingdom of Ambason & the Isles
 mumakan.0351.t: "Amba's Promise Fulfilled"
 mumakan.0351.desc: "For years, I have plied the waterways of the world, reaving, raiding, and razing. I have claimed more gold than most kings will ever see, and my name is cursed from $k_senga_muta$ to $e_khy$.\n\nI am, without question, the most infamous [founder.GetWomanMan] alive, true daughter of Amba, and have poured my loot and reputation into the heavy settling and fortification of the $c_ambason$.\n\nNow, after all these centuries, Amâv's promise to his daughter Amba has finally been fulfilled, and my people lay claim to a kingdom - or queendom - of their own..."
 mumakan.0351.a: "Amba is watching me with pride."
 mumakan.0351.c: "I am the [founder.GetLadyLord|U] of Blood and Gold!"
 mumakan.0351.b: "At last, my dream is achieved..."
 mumakan.0352.t: "$mumakan.0351.t$"
 mumakan.0352.desc: "For years, it's been an open secret that [founder.GetFirstName] refused to accept or take any crown save one: [founder.GetPrimaryTitle.GetNameNoTier].\n\n[founder.GetHerHis|U] heart has been set on this so long that my liege seemed to have dedicated [founder.GetHerHis] life to legitimizing the power and authority of [founder.GetHerHis] island home.\n\nAfter uncounted raids, wars, and general slaughters, [founder.GetSheHe]'s succeeded.\n\nSupposedly each jewel in [founder.GetHerHis] new crown was taken from a different raid. Some at court whisper even that there are yet empty sockets for [founder.GetTitledFirstNameNoTooltip] to fill."
 mumakan.0352.a: "Just think of all the gold we're going to make!"
 mumakan.0352.b: "A #EMP [founder.GetTitleAsNameNoTooltip]#!? [founder.GetSheHe|U]'s worse than a robber baron!"
 mumakan.0353.t: "$mumakan.0351.t$"
 mumakan.0353.desc: "Even the lowliest peasant in $k_senga_muta$ has heard of the monstrous [founder.GetFirstName], Scourge of the Seas, and [founder.GetHerHis] life-long quest to win recognition for [founder.GetHerHis] dream realm of reaving pirates.\n\nIt's a legend that strikes fear into lordling and lowly serf alike, but it seems the line between myth and history has blurred of late.\n\nAs of today #EMP [founder.GetTitleAsNameNoTooltip]#! [founder.GetFirstNameNoTooltip] announced [founder.GetHerHis] life's work to be completed.\n\n$k_senga_muta$ counts a new kingdom on its shores, and it is terrible to behold."
 mumakan.0353.a: "[founder.GetSheHe|U]'s not going to raid #EMP us#!, right?"
 mumakan.0353.b: "No more than a [founder.GetTitleAsNameNoTooltip] of Thieves!"

 
 mumakan.0400.opening: "To the fearsome and mighty Sandamal of Mûmakan,"
 mumakan.0400.desc: "You have bested us. We yield to your supreme might. Please spare us further plundering and sacking! We shall submit to your rule and serve you well, if you will have us."
 mumakan.0400.a: "There is no peace. Just war."
 mumakan.0400.b: "Very well... but you shall be humbled."
 mumakan.0400.b.tt: "Every ruler within the [GetTitleByKey('k_koronande').GetName] is subjugated by #high you#!"
 
 mumakan.0401.opening: "To the preposterous Ataraka,"
 mumakan.0401.desc: "If you think your poisonous words could sway me, think again. The war will continue, until all of your pitiful cities are broken ruins."
 mumakan.0401.a: "A pox upon him!"
 
 mumakan.0402.opening: "To the wise Ataraka,"
 mumakan.0402.desc: "Your surrender is accepted. You shall serve me - but not from Kôronânde. Instead, you will govern those islands out there in the bay for me. See that you arrive there in due time."
 mumakan.0402.a: "Farewell, Kôronânde..."
 mumakan.0402.a.tt: "Every ruler within the [GetTitleByKey('k_koronande').GetName] is subjugated by [sandamal.GetName]"