l_english:
 wander_terilaen.1001.t: "Visit the Realms of Men: Setting Out"
 wander_terilaen.1001.desc: "It has been some time since I have left my forest, and I again wish to live as [conceptracemen|E] do, at least temporarily. For this purpose I have set out to travel to [destination_terilaen.GetName].\n\nAs I travel through ancient forests I contemplate the passing of time. It almost seems to stand still here, in the wooded lands of elves. The world of Men, however, changes quickly. Those I met in my past travels have grown old or already passed beyond.\n\nI treasure the time I live among Men ever-changing, for I know that when I return home, my realm will still be as I left it."
 wander_terilaen.1001.a: "I will depart."
 wander_terilaen.1001.a.tt: "You will travel to [destination_terilaen.GetName]"

 wander_terilaen.1010.t: "Visit the Realms of Men: Physician"
 wander_terilaen.1010.desc: "While I was exploring [destination_terilaen.GetName] I met a physician in need of an assistant. They were impressed by my knowledge of herbs and hired me on the spot.\n\nNow I spend my days applying salves to patients, organizing remedies and herbs and assisting my employer in treating the sick. Though I possess great knowledge of the healing arts, it is mostly applicable to my fellow [elves|E]. The maladies of Men and their treatement are new to me. The physician has been eager to correct this gap in my skills and likewise I offer advice stemming from my long years of experience."
 wander_terilaen.1010.a: "I have learned much."

 wander_terilaen.1011.t: "Visit the Realms of Men: Attacked!"
 wander_terilaen.1011.desc: "Walking through the streets of [destination_terilaen.GetName], I am suddenly surrounded by a gang of foul looking [conceptracemen|E]. I am unarmed, and they wield knives and clubs.\n\nWhether I have offended them in some way, or they just want some sport, or mean to rob me, or all of those together, I know not. What I know is that they mean to hurt me."
 wander_terilaen.1011.a: "Fight them off"
 wander_terilaen.1011.b: "Flee!"

 wander_terilaen.1012.t: "Visit the Realms of Men: A Birth!"
 wander_terilaen.1012.desc: "Arriving at [destination_terilaen.GetName] I see a desperate man running through the streets. He calls for a doctor. I ask him what is the matter, he answers me his pregnant wife is having complications in her labour, and he fears the midwife's abilities are not enough. He thinks he will lose both his wife and child.\n\nI follow him to his house, and as I approach I hear the screams. I learn from the midwife that the baby is not in the right position, and the mother is already exhausted by her long labours. It will not be easy to save both."
 wander_terilaen.1012.a: "I will do my best to help"

 wander_terilaen.1013.t: "Visit the Realms of Men: A Talk"
 wander_terilaen.1013.desc: "I make my way to the [destination_terilaen.GetTitle.GetNamePossessive] halls of power. Here I meet [destination_terilaen.GetCounty.GetTitle.GetHolder.GetName], under the pretense of being a wise wandering man, eager to counsel the lord and better the lives of his people.\n\nI can either indulge him as he talks about his policies and governance, or try to steer the conversation towards the betterment of the lives of the people of [destination_terilaen.GetName]"
 wander_terilaen.1013.a: "Let's talk about [destination_terilaen.GetCounty.GetTitle.GetHolder.GetHerHis] rule"
 wander_terilaen.1013.b: "Let's talk about these people's lives"

 wander_terilaen.1014.t: "Visit the Realms of Men: A Leper"
 wander_terilaen.1014.desc: "On the outskirts of [destination_terilaen.GetName] there is a sad sight. A leper, cast out by his brethren, who now avoid him.\n\nI sit by the side of the man, and he asks if I am aware of his affliction, and if I am, why do I approach. I smile at him and say I am a healer, knowleadgeable on the cure of this disease. He beseeches me to cure him, if I will."
 wander_terilaen.1014.a: "I will"

 wander_terilaen.1015.t: "Visit the Realms of Men: Minstrel"
 wander_terilaen.1015.desc: "This time I have decided not to work among [conceptracemen|E], but to play for them. The people of [destination_terilaen.GetName] seem to appreciate my tunes and whenever I sing or play a crowd of listeners will form.\n\nI perform not only local songs but also the lays and tales of Ages past, which are seldom known by the Men of this region. I have even inspired some to sing with me, and our duets and choirs are more merry than any single person could hope to be."
 wander_terilaen.1015.a: "Music unifies us all."

 wander_terilaen.1016.t: "Visit the Realms of Men: Carpenter"
 wander_terilaen.1016.desc: "I have come as a carpenter, and as such I was approached by an impoverished family from [destination_terilaen.GetName]. They need to fix their roof, the leaks are the least of their problems, they tell me, it's been so long since it has had maintenance that they have begun to worry that it might fall on their heads. They have saved up a fair amount to pay for such service, and they offer it to me.\n\nIt means a few days of hard work, but it's good work for what seems like good people. I will do it."
 wander_terilaen.1016.a: "I will do an honest job"
 wander_terilaen.1016.b: "I would be glad, no need for pay"

 wander_terilaen.1017.t: "Visit the Realms of Men: Weaver"
 wander_terilaen.1017.desc: "I offer my services as a weaver around [destination_terilaen.GetName]. Soon a merchant comes to me, he desires something unique and beautiful, to hang on his grandiose home.\n\nHe tells me he would like an artistic tapestry retelling the history of this place, but bides me do what my heart desire, lest the piece loses artistry."
 wander_terilaen.1017.a: "I will weave the history of this place"
 wander_terilaen.1017.b: "I will weave a scene from Cuiviénen"

 wander_terilaen.1018.t: "Visit the Realms of Men: A Champion"
 wander_terilaen.1018.desc: "While exploring [destination_terilaen.GetName], I hear the rasping of metal and sporting shouts. I arrive at the scene to see a strong man wielding a wooden sword easily dealing with his opponents, several young men also wielding wooden swords. As I approach, the champion looks at me curiously, discerning my strength. He calls at me:\n\n"Newcomer! Fancy a go?""
 wander_terilaen.1018.a: "It's good exercise"

 wander_terilaen.1019.t: "Visit the Realms of Men: Followed"
 wander_terilaen.1019.desc: "For the last days of my journey to [destination_terilaen.GetName] a warning has been growing in my heart. Someone follows me. I know not who they are, or what they want, or how they can follow me, one of the [quendi|E].\n\nA fine hunter it must be, who noticed me and got curious... Hopefully..."
 wander_terilaen.1019.a: "Try to find him"

 wander_terilaen.1020.t: "Visit the Realms of Men: Insane Men"
 wander_terilaen.1020.desc: "As I approach the public square of [destination_terilaen.GetName], I notice people crowding around a small group of [conceptracemen|E]. They curse the sun, and the stars and the moon, they preach that light brings out the sins in people's hearts. They desire a dark world, where mankind is left alone to live in peace.\n\nThese are evil words, brought on by pain and madness in these poor men hearts."
 wander_terilaen.1020.a: "I shall try to make them see reason"

 wander_terilaen.1021.t: "Visit the Realms of Men: A Grieving Man"
 wander_terilaen.1021.desc: "As I walk through the streets of [destination_terilaen.GetName] I hear sobs coming from nearby. A strong man is conspicuously crying by the side of the road. Clearly drunk. A few people watch from a distance, some mockingly, some with pity. I approach him and ask how I may help. He tells me there is nothing I can do, for his only son is now dead and gone.\n\nI sit beside him, and take his hand. If only [conceptracemen|E] could understand how truly fascinating their lives are, they would think the doom a small price to pay.\n\n"Fall not into despair" I finally tell him"
 wander_terilaen.1021.a: "Man shall inherit the world"

 wander_terilaen.1022.t: "Visit the Realms of Men: A Lynching"
 wander_terilaen.1022.desc: "I hear a great commotion on the streets of [destination_terilaen.GetName]! From far away I see people dragging a struggling man through the streets. The mob constantly beats him back into submission, they are feral.\n\nWhatever the crime this man has comitted this is not the way to deal with it, the mob cannot be argued with, or reasoned, they are an angry tide. Gods this man might not even be guilty! By the time I reach them the man has been hanged already."
 wander_terilaen.1022.a: "Such violence, what a terrible sight"

 wander_terilaen.1023.t: "Visit the Realms of Men: A Wise Man"
 wander_terilaen.1023.desc: "On an impoverished neighborhood of [destination_terilaen.GetName], I see a rare sight. Sitting by the side of the street, wearing rags, rests a truly wise Man, his eyes look at me from hidden depths of knowledge and curiosity. I think, not for the first time, what a terrible shame it is that man has made himself so ephemeral, so fallen.\n\nI kneel besides the man and give him a few coins.\n\n"What a peculiar face you have, young man' He says to me 'Old and young and sad and happy, fae-like""
 wander_terilaen.1023.a: "This will be an interesting conversation"

 wander_terilaen.1024.t: "Visit the Realms of Men: A Tavern"
 wander_terilaen.1024.desc: "Tonight I shall make merry with [conceptracemen|E]. There's a especially good tavern here in [destination_terilaen.GetName] that I have been meaning to go.\n\nAs I enter, I am greeted by the sound of laughters. Some local fool is singing a bawdy song and the men are really enjoying it. As the night goes on a nice fellow takes notice of me and asks for a song, I sing a couple of old whimsical mannish rhymes. They find them funny.\n\nAfterwards I strike a good rapport with the men, drunk as they are. I stay mostly silent and let them talk, when someone asks me a question I ask one back, they laugh and swear at me."
 wander_terilaen.1024.a: "That was fun"

 wander_terilaen.1025.t: "Visit the Realms of Men: A Library"
 wander_terilaen.1025.desc: "At an abandoned stone house of [destination_terilaen.GetName] I have found quite a treasure. A small library of dusty books from an age past, left to rot, sit by a corner.\n\nAs I catalogued them, I have identified three collections that would be worthy of study, but unfortunately I cannot take all three with me."
 wander_terilaen.1025.a: "The collection on medicine"
 wander_terilaen.1025.b: "The collection on swordplay"
 wander_terilaen.1025.c: "The collection of poetry"

 wander_terilaen.1026.t: "Visit the Realms of Men: A House"
 wander_terilaen.1026.desc: "While working as a carpenter at [destination_terilaen.GetName], I have been approached by a shopkeeper that heard about the quality of my work. He wants me to lead a team that will build a whole new home for him and his family over the next weeks.\n\nThe pay is good, the work is interesting, and the house is not so big that it would delay me overlong. I am excited."
 wander_terilaen.1026.a: "I hope it stands"

 wander_terilaen.1027.t: "Visit the Realms of Men: An Old Healer"
 wander_terilaen.1027.desc: "While enjoying my time observing men on a tavern in [destination_terilaen.GetName] I notice an old man, nursing his beer. His hands have clearly been stained over the years by herbs, I can see he is an old healer.\n\nI approach him and offer to pay for his drink. He thanks me solemnly. I make light conversation, but always steering it towards his expertise, hoping to learn more."
 wander_terilaen.1027.a: "Interesting subject"

 wander_terilaen.1028.t: "Visit the Realms of Men: A Recital"
 wander_terilaen.1028.desc: "Tonight there is something wonderful happening in [destination_terilaen.GetName], a famous minstrel of [conceptracemen|E] is passing through the city, and performing a public recital of mannish poetry.\n\nIt is certainly a great opportunity to watch a talented man at work, and maybe learn a few poems."
 wander_terilaen.1028.a: "What a nice night out"

 wander_terilaen.1029.t: "Visit the Realms of Men: Attacked?"
 wander_terilaen.1029.desc: "Coming down a street in [destination_terilaen.GetName] I suddenly hear shrill cries of war! Quickly I have been surrounded by a whole gang of children wielding wooden swords and sticks. One kid throws me a swords, and bids me defend. It seems that's their leader.\n\nI give the little rascals their play. They are not out to hurt me, but they are vicious. Even as I disarm and toss them aside, they keep coming back and attacking me from all sides. If I were truly a man, I would surely sport a few bruises tomorrow. After about an hour I finally tire the hardiest among them out."
 wander_terilaen.1029.a: "Tenacious brats"

 wander_terilaen.1030.t: "Visit the Realms of Men: A Play"
 wander_terilaen.1030.desc: "This time I have come as a singer to [destination_terilaen.GetName], this morning an actor asked if I was willing to perform in a play.\n\nTo my surprise it is not a comedy, it's a serious play, a middle men tragedy. Very interesting writting, I had yet not encountered it, it might be a new one.\n\nI spend the afternoon rehearsing and by the evening I feel ready for my supporting role. Quite a few people have come to enjoy the show."
 wander_terilaen.1030.a: "Break a leg"

 wander_terilaen.1031.t: "Visit the Realms of Men: A Robbery"
 wander_terilaen.1031.desc: "One night, walking through the streets of [destination_terilaen.GetName], I follow a suspicious group of [conceptracemen|E] as they roam the streets. It is interesting observing the criminal element of mannish societies, such a flawed concept, arisen from the darkness in their hearts. Violence against brothers, greed, undirected ambition.\n\nI see them coming up to a well dressed old man. This is a robbery, I am sure. And yet, the old man has given up his coin and even his shoes but they still threathen him.\n\nSuddenly one of them hits the old man. As another draws his sword, I step in, wielding my dagger."
 wander_terilaen.1031.a: "This is too much"

 wander_terilaen.1032.t: "Visit the Realms of Men: A Dying Man"
 wander_terilaen.1032.desc: "Coming out of a pot shop in [destination_terilaen.GetName] I hear painful groans coming from one of the houses. I knock on the door but there is no answer.\n\nI enter and find a young man laid down in his bed, dying before his time with a very strong fever. I see his breathing is failing, and the redness accross his face indicates a very strong, widespread infection. I may not be able to save him, but I can learn about the disease while I try."
 wander_terilaen.1032.a: "Still, try I shall"

 wander_terilaen.1033.t: "Visit the Realms of Men: A Drunk"
 wander_terilaen.1033.desc: "This night I was passing through a tavern in [destination_terilaen.GetName] when a drunken peasant came up to me.\n\n"Sir" he says "You seem like one of great wisdom, and eloquent knowledge. Would you be caring to share a tidbit?"\n\n"My poor man, I am but a carpenter" I say, amused "And yet, is a carpenter not used to handle splintery things? Stubborn and hurtful, man can be. And still, smooth as water. Look to be less splintery and less smooth, this is my advice.""
 wander_terilaen.1033.a: "He looks so confused"

 wander_terilaen.1034.t: "Visit the Realms of Men: An Angry Mob"
 wander_terilaen.1034.desc: "I am walking the streets of [destination_terilaen.GetName] as I hear a great commotion starting somewhere near. I run towards it, and I see people throwing stones at a woman. They shout accusations at her. I run towards her and call for the crowd to stop. They do stop throwing stones, but they now try to violently pull me away.\n\n"Evil people! Stop at once this madness! Here you do more evil than any this woman might have done, for you give up your individual reasons in favour of the murderous crowd's will! And so many wanting to do good fall to evil, for the crowd cannot question itself, it is a dumb and violent body.""
 wander_terilaen.1034.a: "The crowd considers my words"

 wander_terilaen.1035.t: "Visit the Realms of Men: A Soldier"
 wander_terilaen.1035.desc: "Sitting by the gates of [destination_terilaen.GetName], I notice a bored middle aged soldier fiddling with his spear. I approach him and start a conversation that slowly grows from small talk.\n\nBy the end he has told me much from his war and personal stories, a whole lot about his training and day to day as a soldier, and about his travels through these lands. All very interesting stuff."
 wander_terilaen.1035.a: "Another page for the journal"

 wander_terilaen.1099.t: "Visit the Realms of Men: Returning Home"
 wander_terilaen.1099.desc: "I have experienced much in the lands of [conceptracemen|E], but it is now time to return to my realm.\n\nMuch as I love my travels, I am king of the [cuind|E] and must return to my duty."
 wander_terilaen.1099.a: "It is time for me to return to my kindred."
 wander_terilaen.1099.a.tt: "You return to your capital"