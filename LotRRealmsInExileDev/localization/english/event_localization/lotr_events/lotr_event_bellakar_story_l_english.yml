l_english:

 bellakar_story.0101.t: "A Dream of the North"
 bellakar_story.0101.desc: "I once more find myself in a dream, though this is different from the ones I have had of late. I am in a forest, wearing simple clothes but of good make. In the distance I can hear a voice ringing through the trees, as moonlight breaks through the canopy. \n\n"King of [GetTitleByKey('e_bellakar').GetNameNoTier], the hour is nigh, when the fate of the faithful shall be decided at last. The house of Silmalondë shall play its part, as it did once before, but heed well my warning - victory shall come from a hope unseen, and from the north comes the Line of Kings..." \n\nThe starlight grows to blinding levels, yet before it overwhelms me, I can make out a tall, grim figure in the forest canopy. I awaken to find myself in a cold sweat, only able to half-remember what it was I saw."
 bellakar_story.0101.a: "...From the North shall come the Line of the Kings?"
 
 bellakar_story.0102.t: "Heed the Dream?"
 bellakar_story.0102.desc: "Ever since I awoke from that most strange dream, it has haunted my mind. From the North shall come the Line of the Kings? Victory from hope unseen? What kings are these, and what victory shall be won? It would seem that somewhere in the forgotten North, perhaps in the land of [gondor|e], a great war for the fate of this world is to come, and that it will be a northern king that shall bring victory \n\nThe only such kings I can think of are those of our long-ago allies, the house of Elendil. Long has it been since we have had any sort of dealings with the heirs of Elendil, and from what I know, the Stewards now rule in Gondor. Yet the dream remains. Could they need our aid, as once we aided Elendil and fought before the gates of the Dark Lord himself? \n\nYet my own land is not unthreatened - it would alarm my vassals if I should push for a northward expedition on little more than a dream..."
 bellakar_story.0102.a: "Ladnôca has spoken to me, as she once spoke to Zimrêbal himself!"
 bellakar_story.0102.b: "Gondor must fend for itself, whatever should come for it."
 bellakar_northward_focus: "You decide to focus your efforts on renewing contact with the free peoples of the North, hoping to stand as a southern bulwark against the Dark Lord."
 bellakar_southward_focus: "You decide to focus your efforts on the defense and consolidation of the realm, seeking to reclaim your lost hinterlands and destroy the forces of evil to your realm's south."
 bellakar_important_choice: "#N This choice will determine what parts of the story you will have access to. Make sure to chose wisely.#!"

 isles_corsairs: "Turncoat Corsairs of the Lonely Isles"
 bellakar_story.0103.t: "Law in the Isles"
 bellakar_story.0103.desc: "Thanks to my efforts, the long distracting corsair threat to western [bellakar|e] has, at last, been ended. My well trained men and navies easily overwhelming the disorganised and lawless men that guarded the hidden pirate coves. \n\nYet, the arrival of law and order is not seen so keenly by the locals. The isles are poor, their lands barren and unfit for farming or raising beast and livestock. The corsairs and their raids were the only source of wealth in those lands, and nearly the entire economy depended on loot from abroad. I, of course, cannot allow such practices to continue, but if I do not act now the region is sure to fall into utter despair."

 bellakar_story.0103.a: "There is no place for these outlaws!"
 bellakar_story.0103.b: "Perhaps they would join my navy..."
 bellakar_story.0103.a.effects: "You crush every pirate haven and hang any former corsairs who do not comply"
 bellakar_story.0103.b.effects: "You integrate the former corsairs into your naval forces at the cost of gold and dishonnor."

 bellakar_story.0104.t: "Call to the Highlands"
 bellakar_story.0104.desc: "With my declaration of the official reintegration of the plateaus of central [bellakar|e] into the realm, the time has come for me to send out my envoys to the Urud-Udil and negociate their terms of integration. Such a move is likely to be a contraversial issue among their numbers, their confederation having long faught for its independence. \n\nThough I only wish to protect them and to bring back its ancient prosperity to the land, it is likely many will see me as little more than a power-hungry foreigner. It would be wise, then, to let the tribes make their demands for their submission upon receiving my message, so that they understand I only wish to further their interests as natural subjects of [GetTitleByKey('e_bellakar').GetNameNoTier]."
 bellakar_story.0104.a: "Even the furthest tribes shall hear my call!"
 bellakar_story.0104.a.effects: "Each member of the Urud-Udil will make their demands before submitting to your rule."

 bellakar_story.0105.opening: "[bellakar_emperor.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0105.desc: "The days where the lords of the Urud-Udil had no choice but to fend for themselves are over. As ruler of [GetTitleByKey('e_bellakar').GetNameNoTier], it is my duty to care for all the peoples of my lands, yours included. Make me your demand, and if I deem it reasonable I will be glad to welcome you as a loyal vassal."
 bellakar_story.0105.a: "Guarantee my power and I will kneel."
 bellakar_story.0105.b: "A sizeable investment would be sure to win my loyalty."
 bellakar_story.0105.c: "Of course, my liege."
 bellakar_story.0105.d: "I will not bow to a foreign tyrant!"
 bellakar_story.0105.a.effects: "You will receive #P #italic title revocation protection#!#! and #P #italic religious rights#!#! upon becoming [bellakar_emperor.GetTitledFirstName]'s vassal."

 bellakar_story.0106.opening: "[urud_udil.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0106.desc.yay: "Your words are wise, my liege and your rule is just. I would be glad to see my people enjoy the freedoms and prosperity of your great realm. All I ask in return is that me and my lands are treated with the utmost importance they deserve. I am sure that you understand my concerns and will be willing to make the necessary compromises..."

 bellakar_story.0106.desc.nay: "I am sorry but I must refuse your terms of vassalage. Our people have little to no ties to your great capital and fiefdoms and have no need for your protection. Though we may once have been subjects of [GetTitleByKey('e_bellakar').GetNameNoTier], those days have long passed. I hope we may come to a better agreement someday, but it will not be today..."
 bellakar_story.0106.a: "Your lands will prosper under my rule, I promise it."
 bellakar_story.0106.b: "You have no power to make such demands..."
 bellakar_story.0106.c: "I will need to handle this..."