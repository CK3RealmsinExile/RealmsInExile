l_english:

 ### Intro ###

 bellakar_story.0101.t: "A Dream of the North"
 bellakar_story.0101.desc: "I once more find myself in a dream, though this is different from the ones I have had of late. I am in a forest, wearing simple clothes but of good make. In the distance I can hear a voice ringing through the trees, as moonlight breaks through the canopy. \n\n"King of [GetTitleByKey('e_bellakar').GetNameNoTier], the hour is nigh, when the fate of the faithful shall be decided at last. The house of Silmalondë shall play its part, as it did once before, but heed well my warning - victory shall come from a hope unseen, and from the north comes the Line of Kings..." \n\nThe starlight grows to blinding levels, yet before it overwhelms me, I can make out a tall, grim figure in the forest canopy. I awaken to find myself in a cold sweat, only able to half-remember what it was I saw."
 bellakar_story.0101.a: "...From the North shall come the Line of the Kings?"
 
 bellakar_story.0102.t: "Heed the Dream?"
 bellakar_story.0102.desc: "Ever since I awoke from that most strange dream, it has haunted my mind. From the North shall come the Line of the Kings? Victory from hope unseen? What kings are these, and what victory shall be won? It would seem that somewhere in the forgotten North, perhaps in the land of [gondor|e], a great war for the fate of this world is to come, and that it will be a northern king that shall bring victory \n\nThe only such kings I can think of are those of our long-ago allies, the house of Elendil. Long has it been since we have had any sort of dealings with the heirs of Elendil, and from what I know, the Stewards now rule in Gondor. Yet the dream remains. Could they need our aid, as once we aided Elendil and fought before the gates of the Dark Lord himself? \n\nYet my own land is not unthreatened - it would alarm my vassals if I should push for a northward expedition on little more than a dream..."
 bellakar_story.0102.a: "Ladnôca has spoken to me, as she once spoke to Zimrêbal himself!"
 bellakar_story.0102.b: "Gondor must fend for itself, whatever should come for it."
 bellakar_northward_focus: "You decide to focus your efforts on renewing contact with the free peoples of the North, hoping to stand as a southern bulwark against the Dark Lord."
 bellakar_southward_focus: "You decide to focus your efforts on the defense and consolidation of the realm, seeking to reclaim your lost hinterlands and destroy the forces of evil to your realm's south."
 bellakar_important_choice: "#N This choice will determine what parts of the story you will have access to. Make sure to chose wisely.#!"

 ### Southwards ###

 isles_corsairs: "Turncoat Corsairs of the Lonely Isles"
 bellakar_story.0103.t: "Law in the Isles"
 bellakar_story.0103.desc: "Thanks to my efforts, the long distracting corsair threat to western [bellakar|e] has, at last, been ended. My well trained men and navies easily overwhelming the disorganised and lawless men that guarded the hidden pirate coves. \n\nYet, the arrival of law and order is not seen so keenly by the locals. The isles are poor, their lands barren and unfit for farming or raising beast and livestock. The corsairs and their raids were the only source of wealth in those lands, and nearly the entire economy depended on loot from abroad. I, of course, cannot allow such practices to continue, but if I do not act now the region is sure to fall into utter despair."

 bellakar_story.0103.a: "There is no place for these outlaws!"
 bellakar_story.0103.b: "Perhaps they would join my navy..."
 bellakar_story.0103.a.effects: "You crush every pirate haven and hang any former corsairs who do not comply"
 bellakar_story.0103.b.effects: "You integrate the former corsairs into your naval forces at the cost of gold and dishonnor."

 bellakar_story.0104.t: "Call to the Highlands"
 bellakar_story.0104.desc: "With my declaration of the official reintegration of the plateaus of central [bellakar|e] into the realm, the time has come for me to send out my envoys to the Urud-Udil and negociate their terms of integration. Such a move is likely to be a contraversial issue among their numbers, their confederation having long faught for its independence. \n\nThough I only wish to protect them and to bring back its ancient prosperity to the land, it is likely many will see me as little more than a power-hungry foreigner. It would be wise, then, to let the tribes make their demands for their submission upon receiving my message, so that they understand I only wish to further their interests as natural subjects of [GetTitleByKey('e_bellakar').GetNameNoTier]."
 bellakar_story.0104.a: "Even the furthest tribes shall hear my call!"
 bellakar_story.0104.a.effects: "Each member of the Urud-Udil will make their demands before submitting to your rule."

 bellakar_story.0105.opening: "[bellakar_emperor.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0105.desc: "The days where the lords of the Urud-Udil had no choice but to fend for themselves are over. As ruler of [GetTitleByKey('e_bellakar').GetNameNoTier], it is my duty to care for all the peoples of my lands, yours included. Make me your demand, and if I deem it reasonable I will be glad to welcome you as a loyal vassal."
 bellakar_story.0105.a: "Guarantee my power and I will kneel."
 bellakar_story.0105.b: "A sizeable investment would be sure to win my loyalty."
 bellakar_story.0105.c: "Of course, my liege."
 bellakar_story.0105.d: "I will not bow to a foreign tyrant!"
 bellakar_story.0105.a.effects: "You will receive #P #italic title revocation protection#!#! and #P #italic religious rights#!#! upon becoming [bellakar_emperor.GetTitledFirstName]'s vassal."

 bellakar_story.0106.opening: "[urud_udil.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0106.desc.yay: "Your words are wise, my liege, and your rule is just. I would be glad to see my people enjoy the freedoms and prosperity of your great realm. All I ask in return is that me and my lands are treated with the utmost importance they deserve. I am sure that you understand my concerns and will be willing to make the necessary compromises..."
 bellakar_story.0106.desc.nay: "I am sorry but I must refuse your terms of vassalage. Our people have little to no ties to your great capital and fiefdoms and have no need for your protection. Though we may once have been subjects of [GetTitleByKey('e_bellakar').GetNameNoTier], those days have long passed. I hope we may come to a better agreement someday, but it will not be today..."
 bellakar_story.0106.a: "Your lands will prosper under my rule, I promise it."
 bellakar_story.0106.b: "You have no power to make such demands..."
 bellakar_story.0106.c: "I will need to handle this..."

 bellakar_story.0107.t: "Southward Ruin"
 bellakar_story.0107.desc: "As renewed confrontation with the forces of [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier] seens more and more inevitable, it has become clear that simply sitting on our forteresses and waiting for the storm to reach us will not be enough to ensure the safety of [bellakar|e]'s people. \n\nThe Fariyîn, from their position on the border of my foe's realm, would make for great allies in our efforts to strengthen our position. However, while I may be able to provide enough gold to fund these operations, their success will lay in the hands of my Fariyîn ally, [zajantak_chief.GetTitledFirstName]."
 bellakar_story.0107.a: "May [storm_marshal.GetTitledFirstName] suffer his foes' wrath..."
 bellakar_story.0107.success_big: "#P Every county ruled by [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier] within the lands of [GetTitleByKey('e_bozisha_miraz').GetNameNoTier] will receive the [GetModifier('bellakar_zanjantak_raiding').GetNameWithTooltip] modifier for #bold 5 years#!#!"
 bellakar_story.0107.success_mid: "#P Every county ruled by [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier] within [GetTitleByKey('k_zajantak').GetNameNoTier], [GetTitleByKey('d_dalyan').GetNameNoTier] or [GetTitleByKey('d_khorsaj').GetNameNoTier] will receive the [GetModifier('bellakar_zanjantak_raiding').GetNameWithTooltip] modifier for #bold 5 years#!#!"
 bellakar_story.0107.failure: "#N [storm_marshal.GetTitledFirstName]'s forces defeat [zajantak_chief.GetTitledFirstName]'s#!"

 bellakar_story.0108.opening: "[zajantak_chief.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0108.desc.big: "My men and I have found unexpected success in our campaign against our shared foe of [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier]. We have laid waste to all its lands within the great bounds of [GetTitleByKey('e_bozisha_miraz').GetNameNoTier], returning to our lands with newfound riches."
 bellakar_story.0108.desc.mid: "My men and I have succeeded in our expedition into the lands of the [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier]. We have laid waste to its lands within the reach of our homes in [GetTitleByKey('k_zajantak').GetNameNoTier]."
 bellakar_story.0108.a: "Even [GetTitleByKey('c_khorsaj').GetNameNoTier] is shaken..."

 bellakar_story.0109.opening: "[zajantak_chief.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0109.desc: "Despite my best efforts, my forces have been unable to crack the tough defenses of [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier]. I must withdraw my forces back into [GetTitleByKey('k_zajantak').GetNameNoTier], at least for now."
 bellakar_story.0109.a: "[storm_marshal.GetTitledFirstName] will fail someday..."

 bellakar_story.0110.opening: "[sender.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0110.desc: "Our shared foe of [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier] has been allowed to sit in peace for far too long! I have gathered great funds and resources for your use, so that you and your men may raid deep into its borders and plunder great riches in doing so."
 bellakar_story.0110.a: "I will not cower before the challenge!"
 bellakar_story.0110.b: "I cannot face the wrath of [storm_marshal.GetTitledFirstName]..."

 bellakar_story.0111.opening: "[marshal.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0111.desc.big: "Our forces have caused more damage to the cities of [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier] than any could have forseen. Our men now return to their homes with more plunder than many have seen in their whole lives. You will receive your fair share of the loot, of course."
 bellakar_story.0111.desc.mid: "Our forces have scored a great victory against those of [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier]. We have sacked many of their cities and returned with great plunder for you and your men."
 bellakar_story.0111.a: "This calls for celebration!
 
 bellakar_story.0112.opening: "[marshal.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0112.desc: "Despite the bravery of our men, our raiders sent into [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier] have been defeated by [storm_marshal.GetTitledFirstName]'s forces. I fear it may be long until such an opportunity comes again..."
 bellakar_story.0112.a: "Perhaps victory shall come another day..."

 bellakar_story.0113.opening: "[zajantak_chief.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0113.desc: "Though your offer of support in an attack against [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier] is interesting, I must think of my realm and people first. I am in no position to face the wrath of [storm_marshal.GetTitledFirstName], after all."
 bellakar_story.0113.a: "At least they sent my gold back..."

 bellakar_story.0114.t: "Barbarian Flames"
 bellakar_story.0114.desc: "Somehow, a petty Fariyîn warband has succeeded in raiding into my lands. Led by [zajantak_chief.GetTitledFirstName], their raiders overcame our defenses and laid waste to many of our lands. Those tribes are weak, I know it, yet somehow they have scored a great victory against us. Perhaps a foreign power may have offered them its support? \n\nNo matter their origin, these barbarian hordes have left much of my realm in utter ruin. Indeed, nearly every town beyond the bounds of [GetTitleByKey('k_an_balkumagan').GetNameNoTier] saw some figthing and many were plundered. I fear it may take years for the realm to fully recover..."
 bellakar_story.0114.a: "I will crush them #italic all!#!"
 stormhost_pov_big_raid: "#N Every ruled county within [GetTitleByKey('e_bozisha_miraz').GetNameNoTier] has received the [GetModifier('bellakar_zanjantak_raiding').GetNameWithTooltip] modifier for #bold 5 years.#!#!"
 stormhost_pov_mid_raid: "#N Every ruled county within [GetTitleByKey('k_zajantak').GetNameNoTier], [GetTitleByKey('d_dalyan').GetNameNoTier] or [GetTitleByKey('d_khorsaj').GetNameNoTier] has received the [GetModifier('bellakar_zanjantak_raiding').GetNameWithTooltip] modifier for #bold 5 years.#!#!"

 bellakar_story.0115.t: "Chain-Breaking Armada"
 bellakar_story.0115.desc: "After so many years of suffering the constant threat of [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier] on our southern shores, the time has finally come to for us to make a great strike of our own. No more will we hide behind our fleets and castles! No more will we await for the Storm to come hit our shores! \n\nToday, we strike out against the shadow, returning to our homes only when the last of the storm legions have been crushed and until the long enslaved men of [GetTitleByKey('k_tulwang').GetNameNoTier] are, at last, freed from their chains!"
 bellakar_story.0115.a: "May the yoke of evil pass into history."

 bellakar_story.0116.t: "The Great Armada"
 bellakar_story.0116.desc: "Though [bellakar|e] had spent the past generations in a long and quiet decline into irrelevance, [bellakar_emperor.GetTitledFirstName] has put an end to this trend with terrifying efficiency. The armadas of [GetTitleByKey('e_bellakar').GetNameNoTier] are ready, its forces somehow having built a worthy invasion force before we had the time to build our own. \n\nThe Bellakari may be many, but they are weak and decadent city-folk. Their untrained hoplites and pitiful native auxiliaries are sure to break upon our shining blades and armors. We will drive back these invaders and put them in their place!"
 bellakar_story.0116.a: "Their hordes shall break like water upon rock."

 bellakar_story.0117.t: "Storm-Breaker"
 bellakar_story.0117.desc: "At last, our war of destruction against the vile [GetTitleByKey('e_thon_an_kharlokh').GetName] has come to an end. Once more, the Southern Dragon passes into history as its great and arrogant hosts meet their doom at the hands of the free peoples of [bellakar|e]. \n\nYet, my role is not over. The ruin of our eternal foe has freed the oppressed native peoples of [GetTitleByKey('k_tulwang').GetNameNoTier] who now come to me to speak of the fate of their people. My choice today will determine the fate of an entire people..."
 bellakar_story.0117.a: "I am no tyrant. [GetTitleByKey('k_tulwang').GetNameNoTier] shall be a free land!"
 bellakar_story.0117.b: "They may govern themselves but tribute #italic will#! be paid."
 bellakar_story.0117.c: "I will not forsake my conquests!"
 bellakar_tulwangi_protectorate: "Any held territory within [GetTitleByKey('e_bozisha_miraz').GetNameNoTier] (beyond the bounds of [GetTitleByKey('d_sarwa').GetNameNoTier]) will be transferred to [tulwangi_leader.GetTitledFirstName] who will become your #V protectorate#!."
 bellakar_tulwangi_tributary: "Any held territory within [GetTitleByKey('e_bozisha_miraz').GetNameNoTier] (beyond the bounds of [GetTitleByKey('d_sarwa').GetNameNoTier]) will be transferred to [tulwangi_leader.GetTitledFirstName] who will become your [tributary|e]."
 
 bellakar_story.0118.opening: "[bellakar_emperor.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0118.desc: "As per our agreement, you are now a free ruler under Bellakari supervision."
 bellakar_story.0118.a: "At last, we are free!"

 bellakar_story.0119.t: "Bonds Against Shadow"
 bellakar_story.0119.desc: "After some searching, I have been able to identify the main leader of resistance against Khäz-gramaze tyranny over [ray|e]: [revolutionary.GetTitledFirstName]. [CharYoursHerHis(revolutionary)] loyalists seek to reestablish a free [GetTitleByKey('k_ray').GetNameNoTier] and rid the kingdom of both the Khäz-gramaze and the Vâtrans of old. \n\nIt seems clear to me that our interests are aligned: both of our realms stand to profit from the fall of [mardat.GetTitledFirstName] and his dark forces. All I would need to ensure a victory for the forces of good in [GetTitleByKey('k_ray').GetNameNoTier] may be the approval of [revolutionary.GetTitledFirstName]..."
 bellakar_story.0119.a: "I shall not let the shadow divide us!"
 bellakar_story.0119.a.effects: "A war against [GetTitleByKey('k_ray').GetNameNoTier] to overthrow [mardat.GetTitledFirstName] is sure to begin soon."
 bellakar_story.0119.b: "It would only be fair that I be compensated for my efforts..."
 bellakar_story.0119.b.success: "#P [revolutionary.GetTitledFirstName] accepts to become your [tributary|e] in exchange for your support#!"
 bellakar_story.0119.b.failure: "#N [revolutionary.GetTitledFirstName] refuses your offer#!"

 bellakar_story.0120.opening: "[bellakar_emperor.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0120.desc.tribute: "I have heard of your struggle against [mardat.GetTitledFirstName] and his Khäz-gramaze enforcers and I know it to be just. If you were to promise to pay me a well deserved tribute after your rise, I would be more than willing to aid you in the liberation of [GetTitleByKey('k_ray').GetNameNoTier]."
 bellakar_story.0120.desc.free: "I have heard of your struggle against [mardat.GetTitledFirstName] and his Khäz-gramaze enforcers and I know it to be just. I would be more than willing to aid you in the liberation of [GetTitleByKey('k_ray').GetNameNoTier] and the destruction of the."
 bellakar_story.0120.a: "Such an opportunity will not present itself again..."
 ray_war_starts: "You will declare a great war against [mardat.GetTitledFirstName] alongside fellow rebels and with the aid of [GetTitleByKey('e_bellakar').GetNameNoTier]."
 bellakar_story.0120.b: "I have no need of foreign steel!"

 bellakar_story.0121.opening: "[attacker.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0121.desc: "I am glad to hear of your generous offer to aid me and my people to win our freedom. Together, we will have victory where we may have known defeat alone!"
 bellakar_story.0121.a: "Ready my men!"

 bellakar_story.0122.opening: "[revolutionary.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 bellakar_story.0122.desc: "I have no need of your help or your shackles. [GetTitleByKey('k_ray').GetNameNoTier] will be liberated under my own terms."
 bellakar_story.0122.a: "Disappointing"

 bellakar_story.0123.opening: "[bellakar_emperor.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0123.desc: "As per your promise, I expect tribute from [GetTitleByKey('k_ray').GetNameNoTier] to begin reaching my lands soon."
 bellakar_story.0123.a: "I must honor my promises."

 bellakar_story.0124.t: "Merchant's Laments"
 bellakar_story.0124.desc: "Though [GetCultureByKey('bozishnarud').GetName] caravans reaching as far as the capital is no rare sight, I can sense that things are different this time. These "merchants" have brought with them their families and far too few goods to justify such a large expedition. These men are refugees, that much is clear as day, and from them rumors have begun to spread of a great terror rising in [ray|e]. \n\nVillages and cities burn, destroyed in the name of the holy fury of the dark god Khäz-gramaze. A new power has risen to our east, one sure to wish to bring about the downfall of [bellakar|e]. If we do not act, this already dire situation may grow even further out of control..."
 bellakar_story.0124.a: "Yet, I must tend to my own borders..."
 bellakar_story.0124.a.effects: "You have gained access to a decision to intervene against the [GetFaithByKey('faith_haruze').GetName] in [GetTitleByKey('k_ray').GetNameNoTier] and free the land from the tyranny of the Shadow."

 ### Northwards ###

 bellakar_story.0201.t: "The Northern March"
 bellakar_story.0201.desc: "If I am to seriously start preparations for a great campaign to reach the lands of far off [gondor|e], I will have no choice but to first secure the [GetTitleByKey('k_felaya').GetName], through which goes the only land path north from [bellakar|e]. For many years, me and [felaya_king.GetTitledFirstName] of [GetTitleByKey('k_felaya').GetNameNoTier] have negotiated the progressive reintegration of his realm into [GetTitleByKey('e_bellakar').GetNameNoTier], of which it had once been a province. \n\nWith the strong bonds that already tie us together, all it may take is a well-worded ultimatum and some favourable terms to secure [felaya_king.GetTitledFirstName] as a collaborator for my plans in the North."
 bellakar_story.0201.a: "Send my demands!"
 bellakar_story.0201.b: "It may be wiser to keep my focus south..."
 bellakar_switch_to_south_focus: "You abandon your quest to reach Gondor and instead focus on the immediate problems your realm faces. #N You may not go back on this choice.#!"
 bellakar_story.0201.a.success: "#P [felaya_king.GetTitledFirstName] accepts your demands#!"
 bellakar_story.0201.a.failure: "#N [felaya_king.GetTitledFirstName] refuses your demands#!"

 bellakar_story.0202.opening: "[felaya_king.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0202.desc: "Your generous terms of vassalage are the best that I could have hoped for. I would be happy to call you my liege."
 bellakar_story.0202.a: "Onwards! To [GetTitleByKey('k_mardruak').GetNameNoTier]!"
 bellakar_story.0202.a.effects: "#P You gain access to decisions to continue your campaign further north.#!"

 bellakar_story.0203.opening: "[felaya_king.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 bellakar_story.0203.desc: "Your demands to see [GetTitleByKey('k_felaya').GetNameNoTier] integrated into your realm are deeply concerning. The days where [GetTitleByKey('e_bellakar').GetNameNoTier] ruled over my people have long passed. We will fight for our freedom, if we must."
 bellakar_story.0203.a: "I have no choice but to declare war..."
 bellakar_story.0203.b: "This plan was always madness anyways..."

 bellakar_story.0204.opening: "[bellakar_emperor.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0204.desc: "The time for long debates over [GetTitleByKey('k_felaya').GetNameNoTier]'s integration into [GetTitleByKey('e_bellakar').GetNameNoTier] have passed. I intend to start a great campaign northwards, aiming to reach the far off lands of Gondor. Join my forces as a rightful subject of [GetTitleByKey('e_bellakar').GetNameNoTier] or you will face my marching armies in open battle."
 bellakar_story.0204.a: "If the terms are good enough..."
 bellakar_story.0204.b: "Unnaceptable!"
 bellakar_story.0204.b.effects: "#N This choice will almost certainly lead to war with [bellakar_emperor.GetTitledFirstName]!#!"
 felaya_vassal_terms: "As a vassal of [bellakar_emperor.GetTitledFirstName], you will have the following vassal contract: #V protected title revocation, guaranteed council position, religious rights, low vassal taxes and low vassal levies.#!"

 bellakar_story.0205.t: "Pact of Wisdoms"
 bellakar_story.0205.desc: "In my eyes, [tedjin_king.GetTitledFirstName], leader of the [GetFaithByKey('faith_path_of_wisdom').GetName] reformers of [GetTitleByKey('k_tedjin').GetNameNoTier], and I share a common goal: the victory of the forces of light over those of shadow. Though in normal circumstances even a [GetFaithByKey('faith_path_of_wisdom').GetName] led confederacy would surely have refused to give in to my goals of securing the [GetCultureByKey('tedjin').GetName] as an invasion path to reach first [GetTitleByKey('k_umbar').GetName] and then [gondor|e] \n\nBut these are not normal times. [GetTitleByKey('k_tedjin').GetNameNoTier] stands on the brink of civil war, nearer to collapse than it had ever been since its founding. For [tedjin_king.GetTitledFirstName], any offer of foreign support may be vital to keeping power no matter the cost to his independence."
 bellakar_story.0205.a: "I may never get such an opportunity again..."
 bellakar_story.0205.a.success: "#P [tedjin_king.GetTitledFirstName] becomes your [tributary|e], gaining your support in the coming Tedjin Civil War#!"
 bellakar_story.0205.a.failure: "#N [tedjin_king.GetTitledFirstName] refuses your offer, taking you down the path of war against [GetTitleByKey('k_tedjin').GetNameNoTier]#!"

 bellakar_story.0206.opening: "[tedjin_king.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 bellakar_story.0206.desc: "Your offer to aid against the forces of the reactionary threat is greatly appreciated! I would be glad to bind our realms together into one single force, ready to challenge the Shadow wherever it may arise."
 bellakar_story.0206.a: "Great news!"

 bellakar_story.0207.opening: "[tedjin_king.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 bellakar_story.0207.desc: "I am not so weak as to reduce myself to a mere puppet of [GetTitleByKey('e_bellakar').GetNameNoTier]. If you wish to conquer my people, you will do so by the strength of your arms, not by some treaty!"
 bellakar_story.0207.a: "And by the strength of my arm I shall conquer..."
 bellakar_story.0207.b: "Now is not the time to strike..."

 bellakar_story.0208.t: "Cost of Victory"
 bellakar_story.0208.desc: "As tensions with the reactionaries continue to rise, the list of powers willing to make one offer or another to ensure their favoured side of the coming wars achieves a victory grows ever larger. That is why, when [bellakar_emperor.GetTitledFirstName] of [GetTitleByKey('e_bellakar').GetNameNoTier] sends out a message offering terms of alliance between our realms, I am far from surprised. \n\nYet, when I read the demands made, I find myself wondering if even the assured victory [GetTitleByKey('e_bellakar').GetName]'s support would grant me is worth such heavy concessions. [bellakar_emperor.GetTitledFirstName] makes several intimidating demands, demands that would upend both the sovereignty of my people and my own prestige, in the name of some grand campaign against the rising power of the Shadow in the North. It is clear to me: I must submit or face the wrath of [bellakar|e] in these already hard times..."
 bellakar_story.0208.a: "I must put aside my ambitions, for the good of all..."
 bellakar_story.0208.b: "If I am to kneel, it will be as a fallen king!"
 bellakar_story.0208.b.effects: "#N This decision is sure to lead to war against [bellakar_emperor.GetTitledFirstName].#!"

 bellakar_story.0209.t: "Justice's Armada"
 bellakar_story.0209.desc: "At last, the day where [bellakar|e] rids itself of the eternal threat of the corsairs of [GetTitleByKey('k_mardruak').GetNameNoTier] has come! No more shall our people despair at their sight or our ships be destroyed by their greedy hands! My men are ready and the time for war has come. \n\nSoon, the corsair-lords will have fallen and the road to continue my march northwards will be opened. With them gone, [GetTitleByKey('k_umbar').GetNameNoTier] shall stand alone as a naval power between me and [gondor|e] until it too falls to my forces and faces the hand of justice brought upon it for its crimes."
 bellakar_story.0209.a: "There is still a war to be waged before that day comes, however..."
 bellakar_story.0209.a.effects: "You declare #V war#! one all independent rulers in #V [GetTitleByKey('k_mardruak').GetNameNoTier]#! that follow the #V [GetFaithByKey('faith_corsair').GetName].#!"

bellakar_story.0211.t: "Corsair's Doom"
bellakar_story.0211.desc: "At last, the time for the destruction of the vile haven of [GetTitleByKey('k_umbar').GetNameNoTier] has come. Their corsairs, who have long terrorized the seas, shall soon know justice for their crimes beyond count. For the first time in history, [bellakar|e] marches north: ready to crush its foes. \n\nWith the land route from [GetTitleByKey('k_mardruak').GetNameNoTier] secured, the naval might of [GetTitleByKey('k_umbar').GetNameNoTier] will be of no use: their navy unable to strike out against my forces away from the shores. In a land war, what hopes of victory do the sea-kings of the haven have?"
bellakar_story.0211.a: "Onwards! To victory!"

bellakar_story.0212.t: "The Southern King's Wrath"
bellakar_story.0212.desc: "As many feared, the recent campaigns of expansion led by the conqueror [bellakar_emperor.GetTitledFirstName] of [GetTitleByKey('e_bellakar').GetNameNoTier] have reached the borders of [GetTitleByKey('k_umbar').GetNameNoTier]. A great incursion from the south has begun, attacking from [bellakar|e]'s new dominions in [GetTitleByKey('k_umbar').GetNameNoTier]. \n\nIt seems clear to most that this war is existential in nature: [bellakar_emperor.GetTitledFirstName] having openly declared his ambition to raze our beloved haven to the ground in his mad conquest spree. Though we will fight to the bitter end for our freedom, the coming war is sure to bring great ruin to our lands."
bellakar_story.0212.a: "We will not bow to this tyrant!"

bellakar_story.0213.t: "Fate of the North"
bellakar_story.0213.desc: "At last, the dark haven of [GetTitleByKey('k_umbar').GetNameNoTier] has fallen to the righteous forces of [bellakar|e]. For the first time in generations, the [belegaer_sea|e] is free from the threat of the corsairs: the seas now lying fully under the control of the forces of Light. \n\nAlready, I have been able to make first contact with [gondor_ruler.GetTitledFirstName] in [gondor|e], revealing that [CharYoursHerHis(gondor_ruler)] position was far worse than I could have imagined. [sauron.GetTitledFirstName] has returned: his dominion greater and more terrible than it had ever been. Alone, [gondor|e] will fall, that much is certain. Yet, with my help, perhaps the doom of the West may yet be averted...\n\n"
bellakar_story.0213.desc.steward: "Yet, even now, there is no sign of the returned king I had seen in my dreams. Perhaps, he resides even further to the north... Nonetheless, I cannot go on some wild errand to find him. If [gondor|e] is to survive these dark times, it will need my full support."
bellakar_story.0213.desc.king: "Already, I have heard word of a king having returned to the lands of [gondor|e], sure to be the one spoken of in my dream. Now more than ever before, my attention must be fully brought to the North: less all fall into Shadow once and for all."
bellakar_story.0213.a: "For now, I must renew our ties of old."
bellakar_story.0213.a.effects: "#P You have gained access to several decisions to renew [bellakar|e]'s' ancient ties to [gondor|e].#!"



