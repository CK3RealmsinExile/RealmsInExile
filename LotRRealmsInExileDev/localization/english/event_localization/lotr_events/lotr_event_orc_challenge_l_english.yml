l_english:


 orc_challenge.0001.t: "Fight the Power"
 orc_challenge.0001.desc: "Armed with determination, sword in hand, I make my way to my lord's chambers in [duel_location.GetBaseNameNoTierNoTooltip]. Throwing open the door I find the quail-hearted [chief.GetTitledFirstName] surrounded by a group of of Orcs, each wearing hulking black armor, with sharp and gleaming swords hanging from their flanks. With a snarl they all turn to me.\n\n #emphasis "[chief.GetTitledFirstName], I have come for you! Your rule is coming to an end. I challenge you to a duel to the death, in the name of [ROOT.GetCharacter.GetFaith.HighGodName]...#!"
 orc_challenge.0001.a: "#EMP The Challenge has been issued!#!"
 orc_challenge.0001.a.tt: "[chief.GetFirstName] is bound to face me."

 orc_challenge.0002.t: "Fight the Power"
 orc_challenge.0002.desc: "As I speak with my commanders about old battles, an enraged figure emerges from the shadows and enters my room.\n\nAs [pretender.GetSheHe] approaches, I recognise that it is [pretender.GetTitledFirstName]. [pretender.GetSheHe|U] drives [pretender.GetHerHis] sword into the ground and bellows:\n\n #emphasis "[chief.GetTitledFirstName], I have come for you! Your rule is coming to an end. I challenge you to a duel to the death according to the traditions of [ROOT.GetCharacter.GetFaith.HighGodName]#!."\n\nEvery eye in the room turns to me, and their gazes are like daggers. The challenge has been issued, and I must give an answer..."

 orc_challenge.0002.a: "I accept!"
 orc_challenge.0002.a.tt: "You accept the duel to the death."
 orc_challenge.0002.b: "I accept, but I will choose the weapons..."
 orc_challenge.0002.b.tt: "You prepare poison for the hilt of your opponent's weapon."
 orc_challenge.0002.c: "I accept, I just hope you don't regret it between now and tomorrow..."
 orc_challenge.0002.c.tt: "You prepare a bribe for your rival."
 orc_challenge.0002.d: "Take this scum out of my sight!"
 orc_challenge.0002.d.tt: "You reject the duel."

 orc_challenge.0003.t: "A Generous Sum"
 orc_challenge.0003.desc: "[chief.GetFirstName] accepts the challenge, summoning me to the fighting pit for the next day. I smell his fear, and I shall make short work of him. But I retire for the night, eager for the bloody morning.\n\nYet back in my quarters, as I whet my sword, a messenger knocks at my door:\n\n"My lord, [chief.GetTitledFirstName] sends you a gift to reconsider the challenge. There is still time to avoid this fight..."\n\nHe tosses a pouch, which I grasp and open, revealing glimmering and gleaming gold and silver. Its shine makes my mouth water! But is it enough to get me to back down, like some sort of putrid old toothless mutt?"
 orc_challenge.0003.a: "That damnable coward [chief.GetSheHe] will die tomorrow, I'll make sure of it!"
 orc_challenge.0003.a.tt: "You reject the bribe."
 orc_challenge.0003.b: "Maybe I was a bit hasty..."
 orc_challenge.0003.b.tt: "You accept the bribe and withdraw the challenge."
 orc_challenge.0003.bribe_accepted.t: "Bribe Accepted"
 
 orc_challenge.0004.t: "A Dirty Coward"
 orc_challenge.0004.desc: "The wretched warg-wise [chief.GetTitledFirstName] has kicked me out of [chief.GetHerHis] quarters. [chief.GetHerHis] cowardice is greater than I expected!\n\nEven so, my defiance has not been in vain, for now everyone knows of [chief.GetFirstName]'s weakness, and it won't be long until we rise up against [chief.GetHerHim]."
 orc_challenge.0004.a: "[chief.GetHerHis] time is running out, war is looming over [chief.GetHerHim]."
 orc_challenge.0004.a.tt: "The challenge has been rejected."

 orc_challenge.0005.t: "The Mantle of Leadership"
 orc_challenge.0005.desc.a: "I stand covered in the black blood of [sc_loser.GetTitledFirstName], the fiend lying on the floor, flies already gathering to lay their maggots in him. The scum didn't stand a chance against me, and anybody who thinks they can get one up on me will do well to remember [sc_loser.GetTitledFirstName]'s fate! Nobody can question my hold on my titles and lands now.\n\nMy vassals have seen my wrath and recognised my strength.\n\nMy dominion over these lands has been secured for years to come."
 orc_challenge.0005.desc.b: "I stand covered in the black blood of [sc_loser.GetTitledFirstName], the fiend rotting on the floor. All the riches and lands the unworthy cur once hoarded now belong to me!\n\nNow, [chief.GetHerHis] vassals have accepted my leadership and recognised my strength. Let anybody who dares to challenge me remember how I achieved my place — over the bloody corpse of [chief.GetHerHis].\n\nLet all the land know, a new chief rises, and I'm coming for what belongs to me!"
 orc_challenge.0005.a: "The strongest is the one who must rule!"
 orc_challenge.0005.a.tt: "I have won the Death Match."
