l_english:
 
# Challenger decides on whether to accept the challenge
 orc_government_events.0002.t: "The Challenge Is Answered"
 orc_government_events.0002.desc: "The old ruler is dead, laying before me, already rotting. Weak, unworthy, warranting no further consideration. By right I am now leader, but only after I defeat the rest of the challengers. I turn, grasping my weapon tight, and the warband gathers eagerly. On each of their faces I see ambition and greed, but [orc_fighting_ruler.GetTitledFirstName] is the first to step forth.\n\nThe drums pound, and the crowd's rhythmic chanting is as the whip of a master, driving one forth through all weariness\n\nThe strongest, the fiercest, shall come out on top; the strongest shall claim their throne."
 orc_government_events.0002.a: "I will prove my strength."
 orc_government_events.0002.b: "This is madness. I will not die for pride."
 orc_government_events.0002.c: "There are other ways to win this fight…"

# Starting event of duel process. Go along, or say "Screw it, LAAMP here I come!"
 orc_government_events.0004.t: "The Succession Duel"
 orc_government_events.0004.desc: "The corpse of the former ruler is warm, blood seeping from their wounds into the sand, their putrid stench filling the ring. The smell of rot. He lies splayed and broken. But it is not over. I do not waste a glance on the corpse, but instead stare ahead, at the throng of challengers that push forth against each other.\n\n[defending_ruler.MakeScope.Var('challenger_count').GetValue|0] warriors pound their weapons against their shields, each eager to claim the throne through blood and bone. The room echoes with the howl of the crowd, eager for more.\n\nI could stand and fight — at least then I could see the satisfaction leave these creatures' eyes as they lay dying — or choose to be safe, walk away from the throne, and live as a lesser Orc."
 orc_government_events.0004.a: "Let them come. I will break every challenger."
 orc_government_events.0004.a.tt: "You decide to fight the challengers"
 orc_government_events.0004.b: "The throne is not worth it. Let one of them take it."
 orc_government_events.0004.c: "Thrones are for idle cowards. I shall face the wild as a true Orc."

# Orc challenger reconsiders whether they're willing to fight the current ruler
 orc_government_events.0049.t: "Doubt Before the Duel"
 orc_government_events.0049.desc: "The crowd erupts in an ear-rending and ecstatic screech as yet another challenger falls to the ground, joining an ever-growing pile of dead or dying. Foul fetor chokes the air, and flies buzz impatiently about. I am next up, face-to-face with [defending_ruler.GetTitledFirstName].\n\n[defending_ruler.GetSheHe] stands ready; scarred, armed, and it is evident [defending_ruler.GetHerHis] bloodlust is far from sated. I gaze into the beaming eyes, filled with rage and glee at once, and I see in [defending_ruler.GetHerHis] deep grin rows of off-coloured but sharp fangs.\n\nBacking down would bring shame… but living to fight another day has its appeal."
 orc_government_events.0049.a: "I'll wipe that bloody smile off your face!"
 orc_government_events.0049.b: "Sod this, I'm off!"

# Attempt to bribe the orc challenger. 
 orc_government_events.0050.t: "Sweet, Sweet Silver"
 orc_government_events.0050.desc: "[orc_fighting_ruler.GetTitledFirstName] step forth, a ferocious look on his face. He is nigh drooling as he cuts the air with his sword, stepping forward sharply. My muscles are tired, but as I brush against the pouch hanging at my waste, brimming with coins, and idea flits through my head..\n\nOrcs surely love blood and respect strength, but they love gold and silver with an almost equal zeal. If the right gifts are offered, perhaps [orc_fighting_ruler.GetTitledFirstName] might decide that I offer a fair bargain."
 orc_government_events.0050.a: "Offer rich spoils and future plunder."
 orc_government_events.0050.a.higher_stewardship_successful: "The bribe works."
 orc_government_events.0050.a.higher_stewardship_fail: "The offer is laughed at, and the bribe is rejected."
 orc_government_events.0050.b: "Promise land and titles after the duel."
 orc_government_events.0050.b.stewardship_successful: "The challenger accepts."
 orc_government_events.0050.b.stewardship_fail: "The challenger mocks the offer."
 orc_government_events.0050.c: "What a preposterous thought!"

# Attempt to blackmail the orc challenger.
 orc_government_events.0051.t: "A Secret Weapon"
 orc_government_events.0051.desc: "[orc_fighting_ruler.GetTitledFirstName] marches forth with enthusiasm and a smug, confident smile on his face. He holds himself high and proud, driven on by the roars of the crowd. Yet I am acutely aware a secret [orc_fighting_ruler.GetSheHe] harbours, something would which would invite mockery at best and death at worst.\n\nI would wager much that [orc_fighting_ruler.GetSheHe] would not want this secret to be laid bare for all to know. Perhaps I could use this to my advantage, and watch [orc_fighting_ruler.GetHerHis] haughty grin disappear."
 orc_government_events.0051.a: "Threaten to expose their shame."
 orc_government_events.0051.a.blackmail_successful: "The challenger nervously backs down."
 orc_government_events.0051.a.blackmail_fail: "They snarl and dare you to speak."
 orc_government_events.0051.b: "Blackmail alone would not work, but perhaps an extra incentive might help."
 orc_government_events.0051.b.blackmail_and_stewardship_successful: "Fear and greed together break their will."
 orc_government_events.0051.b.blackmail_and_stewardship_fail: "They spit at your offer."
 orc_government_events.0051.c: "I don't need dirty tricks, I'll break 'em myself."

# An upstart orc jumps the line, and now challenges the main challenger so they can get to you quicker. You look on (intervene/let it play out)
 orc_government_events.0052.t: "An Impetous Upstart"
 orc_government_events.0052.desc: "The crowd's roar of shock is deafening, and all eyes look upwards as another Orc, [upstart_orc.GetName], leaps into the pit, snarling, sword in hand. [upstart_orc.GetSheHe] bares [upstart_orc.GetHerHis] tusks at [orc_fighting_ruler.GetName], whos is taken aback and enraged.\n\n\"Out of the bleedin' way, you worms!\" the upstart growls, before turning to me. \"You're mine, maggot-spawn! I'll crack your skull like a brittle acorn, and drink your brains out as if they were grog — may thats all they are! Either way, your throne's mine.\"\n\n.[upstart_orc.GetName], however, steps forth, and growls. There is only one spot in the line, and either is willing to kill for it."
 orc_government_events.0052.a: "Let them tear each other apart.
 orc_government_events.0052.a.success: "[upstart_orc.GetName] slays [orc_fighting_ruler.GetName] in a brutal clash!"
 orc_government_events.0052.a.success.tt: "[upstart_orc.GetName] will fight you as the next #V challenger#!"
 orc_government_events.0052.a.failure: "[orc_fighting_ruler.GetName] cuts down [upstart_orc.GetName] without mercy."
 orc_government_events.0052.a.failure.tt: "[orc_fighting_ruler.GetName] will fight you as the next #V challenger#!"
 orc_government_events.0052.b: "I'll take you both!"
 orc_government_events.0052.b.tt: "You choose to fight both at once"
 orc_government_events.0052.b.tt.2: "Killing both challengers will cause other challengers to #bold reconsider#! whether they want to fight you"

# You've won!
 orc_government_events.0500.t: "Rule by Fear Alone"
 orc_government_events.0500.desc: "There are no more challengers remaining. A pile of twitching corpses lay before me, from underneath which seeps a mixture of foul fluids into the sand. The flies descend to claim my prize, and I look above at the crowd.\n\nI raise my weapon and the very walls shudder with their cheers and roars and chants, and they stomp the ground. I bend and paint my face with the black blood of the fallen, and take a deep breath. I smell at once pride, awe, and fear... and of course all the rotting corpses. I feel the sand beneath me shudder in triumph, and fire burns in my blood."
 # No one challenged you! You're just an insane orc. Your rule is already bloody scary!
 orc_government_events.0500.desc.unchallenged: "I step into the circle, weapon raised, and roar my challenge to any who would dare take my throne. The air is heavy with sweat and the blood of past duels, and the sweet stench of grog. I stamp and slash, my sword cutting through thick air.\n\nNo one moves. I smell their fear, their terror, their cowardice. Slowly I lower my blade.\n\nEach of the warband averts their eyes, but the brief glimpses of their pale yellow eyes give me enough satisfaction. My repuation has done my killing for me, and the silence is louder than any battle cry."
 orc_government_events.0500.a: "Good. Let them remember who rules here."

 orc_government_events.orc_challenger_not_persuaded: "[orc_fighting_ruler.GetName] still wants to fight"