l_english:
 
# Challenger decides on whether to accept the challenge
 orc_government_events.0002.t: "The Challenge Is Answered"
 orc_government_events.0002.desc: "With the old ruler dead, the warband gathers in a circle of snarls and iron. [orc_fighting_ruler.GetTitledFirstName] steps forward, eyes locked on [defending_ruler.GetTitledFirstName].\n\nThe drums pound. The challengers wait.\n\nThe law of the strong is clear: only blood decides who leads."
 orc_government_events.0002.a: "Face them all. I will prove my strength."
 orc_government_events.0002.b: "This is madness. I will not die for pride."
 orc_government_events.0002.c: "There are other ways to win this fight…"

# Starting event of duel process. Go along, or say "Fuck it, LAAMP here I come!"
 orc_government_events.0004.t: "The Succession Duel"
 orc_government_events.0004.desc: "The corpse of the former ruler is barely cold when the challengers step forward.\n\n[defending_ruler.MakeScope.Var('challenger_count').GetValue|0] warriors pound their weapons against their shields, each eager to claim the throne through blood and bone. The crowd howls for violence.\n\nYou can stand and fight — or walk away from the throne and live as a lesser orc."
 orc_government_events.0004.a: "Let them come. I will break every challenger."
 orc_government_events.0004.a.tt: "You decide to fight the challengers"
 orc_government_events.0004.b: "The throne is not worth my blood. Let one of them take it."
 orc_government_events.0004.c: "I renounce the throne. From this day on, I am LAAMP."

# Orc challenger reconsiders whether they're willing to fight the current ruler
 orc_government_events.0049.t: "Doubt Before the Duel"
 orc_government_events.0049.desc: "The warband roars for blood, but [orc_fighting_ruler.GetTitledFirstName] hesitates. [defending_ruler.GetTitledFirstName] stands ready — scarred, armed, and hungry for victory.\n\nBacking down would bring shame… but living to fight another day has its appeal."
 orc_government_events.0049.a: "No turning back. The duel goes on."
 orc_government_events.0049.b: "This fight is death. I will step aside."

# Attempt to bribe the orc challenger. 
 orc_government_events.0050.t: "Bribe the Challenger"
 orc_government_events.0050.desc: "Orcs respect strength — but they respect spoils too.\n\nIf the right gifts are offered, [orc_fighting_ruler.GetTitledFirstName] might decide that dying for the throne is a poor bargain."
 orc_government_events.0050.a: "Offer rich spoils and future plunder."
 orc_government_events.0050.a.higher_stewardship_successful: "The bribe works — greed wins over glory."
 orc_government_events.0050.a.higher_stewardship_fail: "The offer is laughed at. Weak coin for a strong throne."
 orc_government_events.0050.b: "Promise land and titles after the duel."
 orc_government_events.0050.b.stewardship_successful: "The challenger hesitates… and accepts."
 orc_government_events.0050.b.stewardship_fail: "Fine words. Empty promises."
 orc_government_events.0050.c: "Forget this. I will not bargain with a dog."

# Attempt to blackmail the orc challenger.
 orc_government_events.0051.t: "Blackmail the Challenger"
 orc_government_events.0051.desc: "Among the warbands, every warrior hides weakness — secrets that would invite mockery, exile, or death.\n\nYou know something about [orc_fighting_ruler.GetTitledFirstName]. The question is whether it is sharp enough to cut their courage."
 orc_government_events.0051.a: "Threaten to expose their shame."
 orc_government_events.0051.a.blackmail_successful: "Fear wins. The challenger backs down."
 orc_government_events.0051.a.blackmail_fail: "They snarl and dare you to speak."
 orc_government_events.0051.b: "Blackmail them — and sweeten the threat with coin."
 orc_government_events.0051.b.blackmail_and_stewardship_successful: "Fear and greed together break their will."
 orc_government_events.0051.b.blackmail_and_stewardship_fail: "They spit at your offer. The duel will happen."
 orc_government_events.0051.c: "Enough schemes. I will face them steel to steel."

# An upstart orc jumps the line, and now challenges the main challenger so they can get to you quicker. You look on (intervene/let it play out)
 orc_government_events.0052.t: "Blood in the Circle"
 orc_government_events.0052.desc: "The warband snarls as a younger, reckless orc shoves past the waiting challengers. [upstart_orc.GetName] bares their tusks at [orc_fighting_ruler.GetName].\n\n\"Out of the way,\" the upstart growls. \"Your skull is mine. Then the throne is next.\"\n\nThe circle tightens. Two beasts, one spot in the line to die for the throne."
 orc_government_events.0052.a: "Let them tear each other apart."
 orc_government_events.0052.a.success: "[upstart_orc.GetName] slays [orc_fighting_ruler.GetName] in a brutal clash!"
 orc_government_events.0052.a.success.tt: "[upstart_orc.GetName] will fight you as the next #V challenger#!"
 orc_government_events.0052.a.failure: "[orc_fighting_ruler.GetName] cuts down [upstart_orc.GetName] without mercy."
 orc_government_events.0052.a.failure.tt: "[orc_fighting_ruler.GetName] will fight you as the next #V challenger#!"
 orc_government_events.0052.b: "Enough waiting. I will face them both!"
 orc_government_events.0052.b.tt: "Insert yourself into the fight, proclaiming you'll fight both orcs"
 orc_government_events.0052.b.tt.2: "Killing both challengers will cause other challengers to #bold reconsider#! whether they want to fight you"

# No one challenged you! You're just an insane orc. Your rule is already bloody scary!
 orc_government_events.0500.t: "Rule by Fear Alone"
 orc_government_events.0500.desc: "You step into the circle, weapon raised, and roar your challenge to any who would dare take your throne.\n\nNo one moves.\n\nThe warband averts their eyes. The silence is louder than any battle cry."
 orc_government_events.0500.desc.unchallenged: "You bellow for challengers, eager for blood and proof of your right to rule.\n\nNone answer.\n\nYour reputation alone has done the killing for you."
 orc_government_events.0500.a: "Good. Let them remember who rules here."

 orc_government_events.orc_challenger_not_persuaded: "[orc_fighting_ruler.GetName] still wants to fight"