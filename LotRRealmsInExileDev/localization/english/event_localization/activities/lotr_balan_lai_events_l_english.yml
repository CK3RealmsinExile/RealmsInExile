##														##
## 		Expel Member Intent 		##
##														##

 balan_lai.2401.t: "The Desperate Bribe"
 balan_lai.2401.desc: "[intent_character.GetTitledFirstName], the one whose seat at the council is in jeopardy, approaches me with the look of a hunted animal. They know their expulsion requires unanimous support, and my vote is the pivot upon which their fate turns.\n\n\"[ROOT.Char.GetFirstName],\" they whisper, shaking, \"I can make you rich. Or I can owe you a favor that will last a lifetime. Just... let me stay.\""
 balan_lai.2401.a: "The treasury could use the weight."
 balan_lai.2401.b: "I want you in my pocket forever."
 balan_lai.2401.c: "Your time here is done. Get out of my sight."

 balan_lai.2402.t: "The Domino Effect"
 balan_lai.2402.desc: "[pacifist.GetTitledFirstName] is pacing the halls, wringing their hands. They believe that expelling a member sets a dangerous precedent. \"First we remove [intent_character.GetTitledFirstName], then who is next? Me? You?\"\n\nTheir panic is spreading to other councilors. If I do not calm them, the vote to expel will fail simply out of fear of the future."
 balan_lai.2402.a: "The limb is gangrenous; it must be cut."
 balan_lai.2402.a.success: "[pacifist.GetTitledFirstName] calms down."
 balan_lai.2402.a.failure: "[pacifist.GetTitledFirstName] does not calm down"
 balan_lai.2402.b: "Look at the ledgers! They are bleeding us dry!"
 balan_lai.2402.b.success: "Convinced them with facts."
 balan_lai.2402.b.failure: "You fail to convince them with facts."
 balan_lai.2402.c: "Perhaps you are right to be afraid."

 balan_lai.2403.t: "Carving the Carcass"
 balan_lai.2403.desc: "The vote has not even passed, yet [proposer.GetTitledFirstName] is already planning the partition of [intent_character.GetTitledFirstNamePossessive] lands. They pull me aside, unrolling a map of the [intent_character.GetTitledFirstNamePossessive] border territories.\n\n\"When we kick them out, they will be vulnerable,\" [proposer.GetTitledFirstName] says. \"Support the expulsion, and I will ensure the council recognizes a claim of yours on one of their counties.\""
 balan_lai.2403.a: "A fine addition to my domain. Agreed."
 balan_lai.2403.b: "I am not a vulture. I vote based on law."

 balan_lai.2404.t: "Mutually Assured Destruction"
 balan_lai.2404.desc: "[intent_character.GetTitledFirstName] corners me. The desperation is gone, replaced by a cold, steely resolve. They lean in close, their breath hot on my ear.\n\n\"I know what you did,\" they hiss, referencing a dark secret I thought buried. \"If I am expelled from this council, I will have nothing left to lose. I will scream your secret to the winds before I leave these doors.\""
 balan_lai.2404.a: "You wouldn't dare... but I cannot risk it."
 balan_lai.2404.b: "Do your worst. I will not be blackmailed."

 balan_lai.3001.t:0 "Banishment"
 balan_lai.3001.desc:1 "The chamber is silent as I prepare to rise, my heart heavy with the weight of what I am about to propose. Expelling [banishment_target.GetTitledFirstName] from the [balan_lai|E] is no small matter; it requires the unanimous consent of the entire council, and such a decision could forever alter our delicate balance.\n\nI can feel the tension in the air, the weight of expectation, and the potential for division. The choice is mine alone: to press forward with the proposal and risk fracturing our unity, or to hold back, seeking another path to resolve the discord within our ranks."
 balan_lai.3001.a:0 "This must be done, no matter the cost."
 balan_lai.3001.b:0 "Perhaps it’s wiser to wait..."
