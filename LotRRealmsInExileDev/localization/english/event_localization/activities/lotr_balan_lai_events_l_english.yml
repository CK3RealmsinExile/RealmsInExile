## 	Request Defense Funding Intent 	##
##								  	              ##

 balan_lai.2001.t: "The Inflated Ledger"
 balan_lai.2001.desc: "The council chambers are abuzz with talk of the [proposer.GetTitledFirstNamePossessive] request for gold. While the threat to their borders may be real, I cannot help but notice the scroll they have been brandishing contains some rather exorbitant figures regarding the cost of stone and labor.\n\nI manage to corner [proposer.GetTitledFirstName] near the wine table. They clutch the ledger tightly to their chest, eyes darting nervously. A quick audit of those numbers might reveal if they are truly desperate for defense, or simply desperate to line their own pockets."
 balan_lai.2001.a: "Let me see those figures. All of them."
 balan_lai.2001.a.success: "You discover the fraud."
 balan_lai.2001.a.failure: "[proposer.GetTitledFirstName] is offended by your accusation."
 balan_lai.2001.b: "I will support you, for a standard consultation fee."
 balan_lai.2001.c: "The [balan_lai|E] must stand united. You have my trust."

 balan_lai.2002.t: "Collateral for Coin"
 balan_lai.2002.desc: "Discussions have stalled. Several council members are sympathetic to the need for defenses, but they simply do not trust [proposer.GetTitledFirstName] to use the funds wisely. The atmosphere is tense until a murmur suggests a solution: collateral.\n\nIf [proposer.GetTitledFirstName] were to send a child to be a ward—effectively a hostage—in the court of a skeptic, the gold would surely flow. [proposer.GetTitledFirstName] looks to me to mediate this sensitive arrangement."
 balan_lai.2002.a: "A ward is a small price for safety. Send your child."
 balan_lai.2002.b: "I will vouch for the military necessity myself."
 balan_lai.2002.b.success: "The council accepts your word over the collateral."
 balan_lai.2002.b.failure: "You are mocked for your naivety."
 balan_lai.2002.c: "This squabbling is beneath us."

 balan_lai.2003.t: "The Mercenary Question!"
 balan_lai.2003.desc: "The proposal details the hiring of the 'Black Iron Company' to man the border forts. [skeptic_marshal.GetTitledFirstName], a purist when it comes to warfare, is loudly denouncing the plan. \"Mercenaries run at the first sign of blood!\" [skeptic_marshal.GetSheHe] shouts, spitting on the floor.\n\nIf the funding is to pass, this argument must be settled. The council turns to me, awaiting a decisive opinion on the reliability of sellswords."
 balan_lai.2003.a: "Mercenaries are loyal to gold, and we have plenty."
 balan_lai.2003.b: "I care not who holds the sword, only that it is sharp."

 balan_lai.2004.t: "The Phantom Threat"
 balan_lai.2004.desc: "#debug 2004#!"
 balan_lai.2004.a: "#debug 2004#!"

 balan_lai.2005.t: "Borderline Claims"
 balan_lai.2005.desc: "[voter.GetTitledFirstName] pulls me aside with a sly grin. They are willing to vote for the defense funding, but there is a catch. They hold a claim on a county that currently belongs to the [proposer.GetTitledFirstName].\n\n\"Convince [proposer.GetTitledFirstName] to transfer that title to me,\" [voter.GetSheHe] whispers, \"and they shall have all the defense funding they desire.\" It is a heavy price to pay for a vote."
 balan_lai.2005.a: "It is a fair trade. Land for safety."
 balan_lai.2005.b: "I will support your claim directly, [voter.GetFirstName]."
 balan_lai.2005.c: "This is extortion. I will have no part in it."

