l_english:

 festival.004.hobbit.desc: "Guests gather around the festival garden, eagerly chatting about wishes they have made for the days and years to come.\n\nBeneath the soft glow of the stars, I pause for a moment, soaking in the merry atmosphere and the faint sounds of the festival all around me, and it occurs to me that I, too, might have a wish to make."
 festival.004.e: "I wish for filled coffers and for many happy meals."
 
 festival.008.hobbit.desc: "The air itself seems to vibrate with the whistling of the flutes and the thrum of the drums, while young [hobbits|E] dance merrily - some have even climbed the tables to do so.\n\nIt is their joyful display that pleases both mind and spirits, and I begin to think of things to come. Of good harvests, bountiful meals, and some well-earned rest after a hard day's work."
 
 festival.010.d: "A local delicacy, of course!"
 
 festival.014.hobbit.t: "These Days of Happiness"
 festival.014.hobbit.desc: "Today is the day for our planned festival! Every invited [hobbit|E] is arriving, each beaming with excitement and joy. Soon, the festivities shall begin in earnest, and what a grand occasion it shall be!"
 festival.014.b: "I look forward to the banquet!"
 
 festival.018.hobbit.t: "A Need for a Drink"
 festival.018.hobbit.desc: "Ah, what a merry evening it is indeed! As far as the eye can see, joyful hobbits are having a truly wondrous time. But suddenly, a commotion appears. As I investigate the noise, I come across [possessed_priestess.GetFirstName], a young lass I've not seen before.\n\n"Please, something to drink, quickly!" she begs, handing me her empty cup. How peculiar indeed! Have the supplies already run dry? Or is [possessed_priestess.GetFirstName] having difficulties with finding the wine barrels, right over there?"
 festival.018.d: "Here, let me bring you a drink."
 
 festival.019.d: "Well, it should be some good fun for all guests!"
 
 festival.101.hobbit.t: "A Certain Scent"
 festival.101.hobbit.desc: "Well before one sees [target_character.GetName] one can certainly #italic smell#! [target_character.GetHerHim]. While perfumes are not unheard of in the Shire, their effects are seldom intended to be perceived at a hundred feet from the wearer.\n\nPerhaps a discreet note is in order, although a whisper in another ear might ensure this foible will endure long after the scent has faded."
 
 festival.103.hobbit.desc: "As I stroll across the festival grounds, I hear a loud voice.\n\nMy verses are #italic exquisite#!! Why, only a fortnight ago, [target_character2.GetName] put my poetic prowess to the test, and was humbled by my artistry!" [target_character.GetFirstName] boasts.\n\nI do not recall any rumour of [target_character.GetHerHis] possessing any skill with poetry, but bolstering [target_character.GetHerHis] claim could find me in good stead. Though, putting a braggart in [target_character.GetHerHis] place is hard to resist..."
 
 festival.104.hobbit.desc: "Every gathering has its ebb and flow, and one must be wary of its currents lest one finds oneself stranded.\n\nWhen [target_character3.GetFirstName] turns to greet [target_character4.GetFirstName], I suddenly find myself adrift in the crowd, bereft of conversation.\n\nSome ways away, I see [target_character.GetFirstName] and [target_character2.GetFirstName] looking pointedly in my direction, but is such a gesture meant to be an invitation?"