l_english:

 zantaka_event_chain.0101.t: "The Council Bends"
 #zantaka_event_chain.0101.desc: "Though the high and mighty Oligarchs of [GetTitleByKey('k_lyneria').GetNameNoTier] pride themselves on the meritocracy of their republics, the thought that they would elect a concubine of low birth to the rank that she would deserve is laughable. It would be #italic improper#! to have a council-master not born a son of one of the rich and ancient families, after all. In their eyes, one like me should stay silent, accept their orders and suffer anything for their pleasure. \n\nToday, however, that cruel and callous order comes crashing down. The Sylaara, they who had maintained order among the merchants for generations, are utterly destroyed. Overnight, the republic has fallen into anarchy as every Oligarch dreams of taking the role of council-master for themselves. Of course, I am prepared for this. For the past twelve years, I have built a network of spies, hidden from the gaze of any other, and have gathered a list of every murder, broken vow, embezzlement and illegal deal made by the oligarchs that make up the council. \n\nWhen, this morning, the council will gather to elect its new master, the way will be open for me openly denounce these crimes. Unless I receive the votes I deserve, of course..."
 zantaka_event_chain.0101.desc: "Though the high and mighty Oligarchs of [GetTitleByKey('k_lyneria').GetNameNoTier] pride themselves on the meritocracy of their republics, in truth there is no place for those of #italic low#! birth or riches among their ranks. My whole life, I have been forced to bow before lesser men and women and obey their every command, even when their idiocy could not be clearer to me. In their eyes, my only role was to stay silent, look pretty and suffer #italic anything#! for their pleasure. \n\nYet, there is some advantage to be found in being nothing to your foes. Over the past twelve years, I have been free to act within the highest spheres of power whitout any noticing my moves: all assuming I did nothing more than satisfy my master's desires. My long efforts have seen me at the head of the largest network of spies and informants in [GetTitleByKey('c_pelorna').GetNameNoTier]. So very few among the councils are free of dirt and shame, their privilge having gone to their lustful and arrogant heads. \n\nWith the Sylaara dead, the Oligarchs kept quiet with not-so-subtle blackmail and a few mercenaries purchased with the #italic borrowed#! city treasure, I am sure that tommorow's election will see me win the power I have always deserved."
 zantaka_event_chain.0101.a: "Let them try to stop me now!"

 zantaka_event_chain.0102.t: "Citizen Pride"
 #zantaka_event_chain.0102.desc: "With my rule now being established, if not popular, one would think that this would be the time for celebration. Indeed, the council knows that any attempt to remove me would bring it down with me, as their crimes would come to ligth and their reputation would plummet. In time, they will learn to bow to my will, as all servants must, but quiet hatred and words of rebellion will do for now. \n\nTo my surprise, however, it is not only the great Oligarchs that seem to detest the thought of the orphan of a tavern girl rising to power over their city. Even common citizens have taken to mocking me and resisting my rule, no matter my obvious skill as ruler. \n\nMy rule over [GetTitleByKey('c_pelorna').GetNameNoTier] seems to grow less secure by the day, every open act of defiance seemingly bringing about another. If I am to survive the coming months, years or perhaps simply weeks, I will need to put these detractors down and remind them that I am not a some arrogant concubine but their rightful master."
 zantaka_event_chain.0102.desc: "Though the opposition was fierce, the Council has ultimately agreed to allow my rise to power, officially citing my close ties with the #italic mysteriously#! dead Sylaara as the reason behind their choice. Of course, my extensive list of daming blackmail, mercenary support or gods-forbid my #italic skills as ruler#! had #italic nothing#! to do with it. Though the opposition to my rule remains fierce and hard to handle, the council found itself with no other choice than to declare me its master. \n\nTo my surprise, however, the anger at my rise goes beyond dissatisfied Oligarchs. Indeed, even the common citizens voice loud and open complaints at my rise: insulting my low birth, declaring me good for nothing but pleasing men or insisting that I should abandon politics and sell my body like my lowly mother. Beyond this trend being #italic deeply#! insulting, it is a major threat to my power. The council only pretends to listen to me out of fear of public outrage at the discovery of their secrets. If I were seen as nothing more than a lying usurper, no evidence would convince the masses of my claims, leaving the door open for it to remove me. If I am to survive the coming years or perhaps simply months, I #italic must#! put an end to this dissent."
 zantaka_event_chain.0102.a: "I will not fail now!"
 zantaka_strife_begins: "#N If, within the next 3 years, you do not either have the #italic aspiring#! level of legitimacy, the #italic established#! level of fame or #italic 100 control#! in [GetTitleByKey('c_pelorna').GetNameNoTier] #italic you will be removed from power!#!#!"

 zantaka_event_chain.0103.t: "Will of the People"
 zantaka_event_chain.0103.desc: "Though many a city council have been held in the past years of my rule, this one is different. I feel a tension in the air, as though something terrible was to happen today. I am shocked when [council_leader.GetTitledFirstName], an arrogant smile on his face, declares that the issue to be debated today is #italic my#! trial for the murder of the Sylaara. How could that incompetent slob have discovered #italic that#!! The murders were perfect! Of course, my motive would be clear but my position should protect me from such baseless accusations. Thanks to what can only be the work of some traitor among the thin ranks of my agents, [council_leader.GetTitledFirstName] has gathered enough evidence to make a serious case against me. \n\nSome among the council pretend to be shocked, others look with at me with disdain. It is clear I will not receive a fair trial, though in such circumstances even that may not have saved me. Unanimously, I am declared guilty of murder, of regicide and of treason against the city. As the guard comes to take me to the dungeons, [council_leader.GetTitledFirstName] stops them. "I will #italic take care#! of her myself." he tells them before turning to me "I had given you a hand, Zantaka, never forget that. What you would not share with me I will take...""
 zantaka_event_chain.0103.a: "I will see you dead, #italic pig#!!"

 zantaka_event_chain.0104.t: "A New Order"
 zantaka_event_chain.0104.desc: "At long last, my power over [GetTitleByKey('c_pelorna').GetNameNoTier] is secure. The council, faced with my clear skill as ruler and rising standing in proper society, now has no choice but to begrudgingly accept my rule. Those that once thought of me as an arrogant upstart to reduce to submission now find themselves forced to recognize me for the leader that I was born to be. Across the whole of [GetTitleByKey('k_lyneria').GetNameNoTier], my name is known and spoken with fear among the mighty, they who would stand to lose so much if their own victims and servants were to rise as I have. \n\nWhen I look at where I am now, even I can scarcely fathom how high I have risen. Yet, so very few have my luck or skill. The scars of my youth remain deep within me, I who was one of the lucky few to achieve the oft dreamt of "escape" of service in the courts of power. Yet even that proved little more than a gilded prison, a place of pain, torment and humiliation for the pleasure of callous masters. My struggle has been a hard one, my victory taken from the cold, dead hands of the cruel order that came before me. My dreams, once nothing more than the delusions of a poor orphaned girl, can finally come to be. The cruel masters of this world will finally know justice and #italic terror!#!"
 zantaka_event_chain.0104.a: "#italic Such is the Wrath of Vilaneem!#!"
 zantaka_reforms_begin: "Having secured your authority over [GetTitleByKey('c_pelorna').GetNameNoTier], you will now be free to bring about reform within your lands and seek to expand your power in [GetTitleByKey('k_lyneria').GetNameNoTier] at large."

 zantaka_event_chain.0105.t: "A Kingmaker's Deal"
 zantaka_event_chain.0105.desc: "After yet another tedious meeting with the city council, I am surprised to see [council_leader.GetTitledFirstName], my main rival among the Oligarchs, come see me. Before I can ask him anything, he grabs my arm and begins to talk. "Zantaka" he says, ommiting to adress me by my title "Let me speak plainly. Your position is untenable. Your fall is not a matter of #italic if#! but of #italic when#!. Yet, I may just be able to find an arragement that #italic pleases#! the both of us. My wife has recently passed away, you see and it would bring me great pleasure to have a woman of your... #italic quality#! by my side... and in my bed, of course." \n\nI almost reject this insulting proposal as soon as I hear it, yet I refrain at the last moment. Reigning in the council on my own, with nothing but enemies on all sides, is sure to be difficult, even for a woman as skilled as me. Yet, is this alliance truly worth selling my body and soul to another for? As I hesitate, [council_leader.GetTitledFirstName] leans into to me, his eyes filled the desire I see in far too many. "If my offer interests you, meet me in my chambers tonight. I trust you will live up to your #italic reputation#!...""
 zantaka_event_chain.0105.a: "No more am I in the business of sleeping with #italic pigs#!!"
 zantaka_event_chain.0105.b: "I have endured far worse to get here..."
 zantaka_marriage_no: "You refuse [council_leader.GetTitledFirstName]'s offer, hoping to secure your rule by yourself and enact your vision over [GetTitleByKey('c_pelorna').GetNameNoTier] free of any ties to the old order."
 zantaka_marriage_yes: "You submit yourself to [council_leader.GetTitledFirstName], serving as his wife and abandonning your newfound freedom to ensure your hold on power at all costs."



