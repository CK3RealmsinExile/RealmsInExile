l_english:
 
 seregul.9998.t: "It should have been me!"
 seregul.9998.desc: "My peers of the [balan_lai|E] have seen fit to elect [leader.GetFullName] as our next leader. This is outrageous! I have the seniority, the experience, the blood, and the vision to lead us to a new era. Ever have the western Princes, spoiled by their rich lands and tame population, looked down on me and mine. I have not forgotten how they broke the Concordant in 3000 T.A., to humiliate me, and left me to deal with the secessionists myself.\n\nI may yet not be ready to act, but this new humiliation will not be forgotten either."
 seregul.9998.a: "The Balân-Lâi forsakes me."

 seregul.9999.t: "Much to Do"
 seregul.9999.desc: "$k_pel$ has shattered! I am beset on all sides by traitors and opportunists. They demand that I be removed if they are to return peacefully to adûnaic rule. The vile secessionist scum! What is the state if not an extension of it's ruler?\n\nI shall crush them and a new $k_pel$ will be born. One where the Prince does not serve the interests of his lessers. This is the opportunity to change the humiliating condition of our kingdom.\n\nAll that is left is to choose where the first blow will fall.\n#X You have 10 years to stabilize or the realm #bold will#! break further!#!"
 seregul.9999.a: "Focus South."
 seregul.9999.b: "Focus East."
 seregul.9999.c: "Focus West."
 seregul.9999.d: "Why focus?!"

 seregul.0001.t: "The Fate of a Rival"
 seregul.0001.desc: "The villanous rake, [mayor.GetFullName], has meddled in my domestic affairs. I am ashamed to admit, even to myself, that he has seduced my wife, and yet it can be no secret to me when all my realm knows. For she has bore him a bastard, and for years now has cared for the child.\n\nFor years I have kept my anger to myself. The city of Barasi was too valuable to lose over personal reasons, too strong to bend to my will, my council would say.\n\nWell, now the lecherous villain makes so bold as to deny my authority over the city of Barasi, this twofold betrayal shall not go unanswered. The city will bend, sooner or later, but I cannot bear any longer knowing this man walks free under the sun in his defiance."
 seregul.0001.a: "I need him dead."
 seregul.0001.b: "I want him in my power."
 seregul.0001.c: "Who needs subtlety? To war!"

 seregul.0002.t: "A Disloyal Wife"
 seregul.0002.desc: "Now that the fate of the lecherous [mayor.GetFullName] has been decided, I must decide what to do with the faithless [wife.GetFirstName].\n\nShe does not love me, and neither I love her. The kindness and affection we may have felt as a young couple has long dissipated, and was utterly forgotten when she bore her half-blooded bastard.\n\nI would be within my right to imprison her, though I am told it may fuel my vassal's accusations of tyranny. Another, quieter option would be to arrange her death. And yet, she might still prove a useful tool against her lover..."
 seregul.0002.desc.b: "Now that the fate of the lecherous [mayor.GetFullName] has been decided, I must decide what to do with the faithless [wife.GetFirstName].\n\nShe does not love me, and neither I love her. The kindness and affection we may have felt as a young couple has long dissipated, and was utterly forgotten when she bore her half-blooded bastard.\n\nI would be within my right to imprison her, though I am told it may fuel my vassal's accusations of tyranny. Another, quieter option would be to arrange her death."
 seregul.0002.a: "She cannot be trusted anymore."
 seregul.0002.b: "I want her dead!"
 seregul.0002.c: "She must prove her loyalty."
 seregul.0002.d: "I refuse to even think about this."

 seregul.0003.t: "A Shameful Blot"
 seregul.0003.desc: "My wife's affair is almost sorted, now all that is left to decide is the fate of the child. This living proof of my wife's faithlessness, my vassal's villainess, and my own humiliation.\n\nI must consider my move. The child must not allowed to go free, that much is clear. This little token of disrespect might grow to be a pretender, as it carries the royal blood.\n\nSo I must bring him into my power one way or another. His mother asks that he be legitimized as an [wife.GetDynastyName], and promises he shall be raised to be a most loyal courtier. I do not trust her, somehow."
 seregul.0003.a: "Seize the child."
 seregul.0003.b: "He must die."
 seregul.0003.c: "Actually, I shall be magnanimous."
 
 seregul.0004.t: "Focus South: Confronting the City"
 seregul.0004.desc: "The city of Barasi stands against me. As the richest city in $k_pel$, it has always acted haughtily towards it's Prince. This was tolerated, by my ancestors and then by me. But now the city has sealed it's doom and things will not again be what they were for Barasi, for they have broken away from the kingdom and it's leaders are guilty of treason.\n\nI will take bend the city to my will. Either through war or subtler ways. The city might be rich, but they will have no market to sell or food to buy if I enforce a complete economic rupture between us. They will starve and eventually they will break, and come crawling back to my nurturing arms."
 seregul.0004.a: "To war!"
 seregul.0004.b: "We will strangle their economy."
 seregul.0004.c: "They will fall soon enough."

 seregul.0005.t: "The Fall of Barasi"
 seregul.0005.desc: "As predicted, the economy of the proud city of Barasi has collapsed once they were cut off from my realm. The city starves and the merchants grow ever more fearful that they may be reduced to poverty.\n\nThe proud oligarchs are at last broken, and now they sue me for peace, and deliver themselves to my mercy. My chancellor tells me the few that still wished to project strength in the negotiations have been excluded from the talks by their peers.\n\nThe city is finally utterly at my mercy. Victory."
 seregul.0005.desc.b: "Barasi has fallen. Conquered and looted, the citizens flee and there's none left who wills to stand against my might. This proud city is broken. The oligarchs who haven't fled now sue me for peace.\n\nI do wish to take the city for myself, but that would no doubt anger my native vassals. If not me, a loyalist shall rule it. I will not have any more defiance from this now broken city.\n\nThe choice is between one of mine or one of theirs."
 seregul.0005.a: "It is mine!"
 seregul.0005.b: "[potential_oligarchic_vassal.GetFirstNameNoTooltip] will rule it in my name."
 seregul.0005.c: "For the sake of peace, [local_oligarchic_vassal.GetFirstNameNoTooltip] will rule."

 seregul.0006.t: "The Chaialla" 
 seregul.0006.desc.a: "The Chaialla are not as elusive as one might expect, though they mostly keep to themselves, they have had much contact with the tribes of Pél, and live openly as a simple farming folk. They have long had ties with the kharadûnaic rule of Pél, even enjoying a seat on the native council.\n\nBut [chaialla_ruler.GetFullName] has indeed not kept to himself, he broke away with the other secessionists after the treasonous Council of 3000 T.A., and has since been collaborating with Barasi against myself.\n\nWith the fall of Barasi they are left vunerable.\n\nBy rights I should crush them, and bring civilized rule over their little lands, but my council, as always, preaches caution, and tell me we could have a deal to restablish old ties."
 seregul.0006.a: "We'll crush them."
 seregul.0006.b: "They must pay tribute at least."
 seregul.0006.c: "I demand they bend the knee."
 seregul.0006.b.tt.tributary: "[chaialla_ruler.GetFirstNameNoTooltip] was successfully convinced to become a [tributary|E]"
 seregul.0006.b.tt.protectorate: "[chaialla_ruler.GetFirstNameNoTooltip] has negotiated into becoming a [protectorate|E]"
 seregul.0006.b.tt.nothing: "[chaialla_ruler.GetFirstNameNoTooltip] has denied our offers!"
 seregul.0006.c.tt.vassal: "[chaialla_ruler.GetFirstNameNoTooltip] became your vassal!"

 seregul.0101.t: "Focus East: Tensions in the East"
 seregul.0101.desc.a: "In the turmoil after the Council of 3000 T.A. the easternmost lands of Pél have fallen to opportunists.\n\nNearer at hand there is the Bandit King, a charismatic and merry man who, if the rumours are true, worships dark gods. He has rallied quite a force around him and comfortably stands in defiance against me. Further away the Magrin warlord Opeyemi has seized the land for his tribe. I hear he is a competent general, but has no friends in his homeland.\n\nI must bend them to my will somehow, but their armies might be too much for Pél to handle. There is no love between them, and that offers me a couple of possibilities. I could ally with one to take out the other, or I could try and manipulate them to fight each other..."
 seregul.0101.a: "Play them against each other."
 seregul.0101.b: "Ally with the Bandit King."
 seregul.0101.c: "Ally with the Magrin."
 seregul.0101.d: "I will just crush them."
 seregul.0101.a.tt.success: "The fools go to war against one another!"
 seregul.0101.a.tt.failure: "Disaster! They have seen through it and allied!"

 seregul.0102.t: "A Band of Merry Men"
 seregul.0102.desc.a: "The Bandit King may have bought himself some time, but now I shall end his freedom once and for all.\n\nIf he desires to keep his rule he will have to swear fealty to me. This will be an ultimatum, and if he refuses war. But if I do not judge it wise to keep this scum in power, war it will still be, either with the help of the Magrin of the east, or by myself."
 seregul.0102.desc.b: "The Bandit King may have bought himself some time, but now I shall end his freedom once and for all.\n\nIf he desires to keep his rule he will have to swear fealty to me. This will be an ultimatum, and if he refuses war. But if I do not judge it wise to keep this scum in power, war it will still be and by my own might I will end him."
 seregul.0102.desc.c: "In the turmoil after the Council of 3000 T.A. the easternmost lands of Pél have fallen to opportunists.\n\nNearer at hand there is the Bandit King, a charismatic and merry man who, if the rumours are true, worships dark gods. He has rallied quite a force around him and comfortably stands in defiance against me.\n\nDealing with him will not be easy. I might be able to convince him to bend the knee, if I sweeten the pot enough... Or I could ally with the Magrin adventurer Opeyemi if I promise he will keep the lands."
 seregul.0102.a: "He must swear his fealty."
 seregul.0102.b: "I will ally with the Magrin."
 seregul.0102.c: "That pathethic rabble? An army?"
 seregul.0102.a.tt.success: "He has accepted!"

 seregul.0103.t: "An Ancient Threat"
 seregul.0103.desc.a: "The Twin Realms of Mag and Tumag for centuries ruled the natives of Pél, until a coalition of rebels ousted them. They then sought the [balan_lai|E] for protection, who had long given up any claims on Pél. Thus it was that the Princes of Pél began, protectors of the realm against the barbarian threat of Mag and Tumag.\n\nMy subjects are no better, but the Magrin cannot be tolerated to settle in, they could bring a great force with them. This adventurer might become the vanguard of a real invasion. He must bend or die."
 seregul.0103.a: "Repel the invaders!"
 seregul.0103.b: "One last chance to acknowledge me."

 seregul.0201.t: "Focus West: The Cuind protectorate"
 seregul.0201.desc: "The [cuind|E] have guaranteed the independence of our western secessionist! [toya.GetFullName] is a peaceful ruler, and I had previously counted on [toya.GetHerHis] support as someone who will not take aggressive moves regardless of how much I push the council.\n\nI was clearly wrong, for [toya.GetSheHe] had dealings with the [elves|E]! Now [GetTitleByKey('c_mokuba').GetNameNoTier] counts itself safe from Pél, under the protection of a powerful and elusive elven King. But I shall not give up my realm so easily.\n\nI hear this elven King to be a lover of [mankind|E], I may be able to trick him into releasing [toya.GetFirstNameNoTooltip] back into my arms. Otherwise, I could organize my armies for a speedy campaign, in the hope that the elves will move slower."
 seregul.0201.a: "I can convince the Cuind King."
 seregul.0201.a.tt.success: "He agreed to release [GetTitleByKey('c_mokuba').GetNameNoTier]"
 seregul.0201.b: "We just need to be quick!"

 seregul.0202.t: "Negotiating with the Elves"
 seregul.0202.desc.a: "Our previous attempt did not work. I shall come again to talk to [terilaen.GetFirstName]. Hopefully I can deceive him on the sicerity of my humbleness, when I could not make him believe my promises previously. I am betting that this elf is a forgiving person.\n\nThis is my last resource. We must need conquer it in war if the talks fail."
 seregul.0202.desc.b: "The [cuind|E] have guaranteed the independence of our western secessionist! [toya.GetFullName] is a peaceful ruler, and I had previously counted on [toya.GetHerHis] support as someone who will not take aggressive moves regardless of how much I push the council.\n\nI was clearly wrong, for [toya.GetSheHe] had dealings with the [elves|E]! Now [GetTitleByKey('c_mokuba').GetNameNoTier] counts itself safe from Pél, under the protection of a powerful and elusive elven King. But I shall not give up my realm so easily.\n\nI hear this elven King to be a lover of [mankind|E], I may be able to trick him into releasing [toya.GetFirstNameNoTooltip] back into my arms."
 seregul.0202.a: "I will try."

 seregul.0251.t: "Five Years to Stabilize!"
 seregul.0251.desc: "The disastrous Council of 3000 T.A. has deeply wounded my image. I am seen as an inefectual leader who pushed his vassals into mutiny and now fails to rein them back in. Of course it is all propaganda spread by those who would like to see me fail. I have tried guiding the natives, and they slapped my hand away like the treasonous savages they are.\n\nStill, I need to show I can unite the realm again. The heartlands of Pél might have restrained from secessionism, but most love me not, and might still try to break away if I do not mend the realm. Already I see them conspiring. I need to fix this.\n#X You have five more years to stabilize!#!"
 seregul.0251.a: "I will stabilize!"

 seregul.0252.t: "Pél Shatters Again!"
 seregul.0252.desc: "Disaster! [rebel_leader.GetFullName] has apparently met yesterday in secret with most of the native leaders of Pél.\n\nI have today been given a letter, apparently sent by this secret meeting of the Council to many across the kingdom, which says:\n\n"The tyrant seating in the throne of Pél has turned the kingdom into a defunct state. It is no longer in the interests of the Council that the Kharadûnâi should continue their rule over our land. Therefore it is the unanimous decision of this assembly that all should take arms and help topple this deadwood state."\n\nAs more reports come in, they seem to have all joined."
 seregul.0252.a: "In this fire a new Pél will be reborn yet!"

 seregul.0253.t: "The West is not Coming!"
 seregul.0253.desc: "An envoy has arrived in haste from $c_mispir$ during the night. The [balan_lai|E] sends word that, having convened, they will keep with their decision in 3000 T.A. and will be offering no help for the current rebellion.\n\nI will wager they see this as my end, and their fear and jealousy of me can now finally rest easy knowing I am tied up on this war for the foreseeable future.\n\nI shall never forget this betrayal."
 seregul.0253.a: "They fear me!"

 seregul.0254.t: "Pél is Lost!"
 seregul.0254.desc.a: "The unthinkable has happened! The natives have destroyed the kharadunaic state of Pél.\n\nI still hold $d_arpel$, and, as such, in spite of their betrayal, I am still a Prince of the [balan_lai|E]. The road will be long but I must rebuild my kingdom, recover my status, and have my revenge on those that toppled me.\n\nMy vengeance may be slow in coming, but it will be all the more complete then."
 seregul.0254.desc.b: "The unthinkable has happened! The natives have destroyed the kharadunaic state of Pél.\n\nI have even lost my standing as a Prince of the [balan_lai|E]. The road will be long and painful but I must rebuild my kingdom, recover my status, and have my revenge on those that toppled me.\n\nMy vengeance may be slow in coming, but it will be all the more complete then."
 seregul.0254.a: "I shall win yet."

 seregul.0255.t: "Woe to the Vanquished"
 seregul.0255.desc: "Naturally I have won.\n\nThe war has devasted the countryside, and even the capital has seen it's fair share of fighting, but now it is over.\n\nThe natives broken, the rebels in chains, and I triumphant.\n\nTime for a new Pél to rise."
 seregul.0255.a: "Now who's getting hanged?"

 seregul.0301.t: "Thinking to the Future"
 seregul.0301.desc: "I have known for a while that I cannot trust the other Princes of the [balan_lai|E]. Although I am clearly next in line for the leadership, the current head, [phorakon.GetFirstName], has always shown me disdain, while showing favoritism to [imrazor.GetFirstName].\n\nThis is clearly a political move, born out of the arrogant old man's malice towards me. He creates this idea that [imrazor.GetFirstNameNoTooltip] is clearly the next successor, in spite of there being an older, more experienced, smarter candidate that the majority of Princes would normally vote for, me.\n\nHis decision to abandon me to the current native mutiny is clearly his way to undermine my image and make me look incompetent for the other Princes.\n\nNow I ponder on how I should behave towards the Princes of Balân-Lâi."
 seregul.0301.a: "As their leader."
 seregul.0301.b: "As a friend."

 seregul.0302.t: "A Letter on the Desk"
 seregul.0302.desc: "Today as I went into my study, I was greeted by a peculiar sight. A letter, placed squarely in the center of the desk, sealed with black wax.\n\nAs I question my guards and servants, I discover no one has seen anyone entering my study this morning. A quite eery feeling grows on me.\n\nIt must be the work of spies, surely. A well planned plot, to place this letter on my desk... Or could it have a more sinister explanation? Sorcery? Wights?\n\nI stop thinking on it, living in fear does me no good. I should just open it, or get rid of it."
 seregul.0302.a: "Open it."
 seregul.0302.a.tt: "It is written in a rather thin and long hand..."
 seregul.0302.b: "Burn it."
 seregul.0302.b.tt: "#help This choice will lock you out of content#!"

 seregul.0303.t: "To the beleaguered ruler of Pél, Seregul"
 seregul.0303.desc: "I have followed closely the difficult situation you find yourself in. The natives are treasonous by nature, and ever looking to topple rightful [adunaic|E] rule. We must stand together against insurrection, or rather all lose our realms.\nFor this very reason it was such a surprise that none of your apparent friends has stirred to help you. The [stormhost|E] will, of course, for we must overcome such differences as we might have in these times, you need only ask. We will require nothing in return but what you desire already, to take what ought to be yours by might of arms. Your peers will give you nothing but disdain out of their own will, you know that to be true."
 seregul.0303.a: "Accept!"
 seregul.0303.a.tt: "#P You will receive aid from the Stormhost and a new casus belli against the Balan-Lâi.#!"
 seregul.0303.b: "Bring the letter to the Balân-Lâi."
 seregul.0303.b.tt: "#P Bringing this to the Balân-Lâi will greatly improve your standing among the Princes.#!"

 seregul.0304.t: "Bringing the Issue to the Balan Lai"
 seregul.0304.toast: "Seregul has exposed the Stormhost's plot!"
 seregul.0304.desc: "I have come to [seregul_destination.GetNameNoTier] to deliver the treasonous letter to [seregul_destination.GetHolder.GetFirstName]. During the travel I often wondered if this was the best course of action. I do not like [seregul_destination.GetHolder.GetHerHim], but standing against the [balan_lai|E] would be madness. And this way, I may yet curry some favour. Even if they are still set against me, they will always have to recognize I am a steadfast member of our alliance.\n\nAs [seregul_destination.GetHolder.GetFirstName] reads the letter his eyes grow wide. Rage, fear, maybe a mixture? I cannot read [seregul_destination.GetHolder.GetHerHim].\n\n[seregul_destination.GetHolder.GetSheHe|U] puts the letter down and looks at me with a milder expression. "You did good bringing me this, Seregul. This will unite the Balân-Lâi against our old enemy. But how shall we act?""
 seregul.0304.a: "I have a plan."
 seregul.0304.b: "I am sure you will figure it out."
 seregul.0304.b.tt: "The Balân-Lâi will decide how to act against the Storm Host, you will be notified."

 seregul.0305.t: "How to Address the Stormhost"
 seregul.0305.desc.a: "I have been granted leadership by the [balan_lai|E] on the matter of dealing with the Stormhost.\n\nThough powerful when united, we are a disjointed force, hard to coordinate, with too many heads. That would suggest that the best course of action would be to wait for a moment of weakness of the Storm Marshal.\n\nI know he has his eyes turned north, and covets the riches of [bellakar|E]. A secret alliance with that old Númenórean colony would certainly spell the end of the [stormhost|E], unexpectedly at war with at both north and south borders. But there are other ways, like my own kingdom, theirs certainly count with a fair share of secessionists, the Marshal rules with an iron fist.\n\nOtherwise, I could claim [anbalkumagan|E] for myself, and strike when I see fit."
 seregul.0305.desc.b: "Seregul has brought to us the vile letter from the Storm Marshal. A dagger drenched in honey. The Marshal promised Seregul gifts and help if he were to betray the [balan_lai|E].\n\nThankfully Seregul has shown no appetite for the honey, for a coordinated attack from the east and north would have wounded us at the very least.\n\nNow the [stormhost|E] has the Balân-Lâi's attention, and we mean to wound it back. We need only decide on a course of action.\n\nThey have their eyes turned on [bellakar|E], and we could offer that old Númenórean realm our friendship in secret, and destroy our enemy when the time comes. Or we could choose to attack from the inside, and ally with disgruntled forces subjugated by the Stormhost. And yet, I could simply claim [anbalkumagan|E] for myself, and strike when I see fit."
 seregul.0305.a: "Ally with Bellakar."
 seregul.0305.b: "Forment Rebellion."
 seregul.0305.c: "Direct action."

 seregul.0306.t: "An Offer of Alliance"
 seregul.0306.desc: "An envoy from the [balan_lai|E] requests audience! The envoy tells my court he wishes to discuss a matter of alliance! It is so rare for new things to happen, especially coming from the [sevenlands|E], that I have to contain my own gasp.\n\n Although we have economic ties with the Princes, and both sides try to maintain a healthy, cordial, relationship, we have barely had formal diplomatic ties in our histories.\n\nThe envoy proceeds to explain that the [stormhost|E] has sought one of the Princes, to undermine the Balân-Lâi. The Prince, [seregul.GetFirstNameNoTooltip], has instead in secret brought this letter to his peers, and the Balân-Lâi has decided, seeing as the [storm_marshal.GetFullName] desires to attack Bellakar, to offer us their aid in that eventual war.\n\nIt is up to me to decide whether and how this tie shall be established."
 seregul.0306.a: "I will gladly accept mutual defense."
 seregul.0306.b: "A personal alliance."
 seregul.0306.c: "We don't need them."

 seregul.0307.t: "Bellakar Accepts!"
 seregul.0307.desc: "[niluhin.GetFullName] has accepted our generous offer!\n\nWhen the time comes, [bellakar|E] will call the Princes of the [balan_lai|E] to crush the [stormhost|E]."
 seregul.0307.a: "We will be there."

 seregul.0308.t: "Bellakar: Full Alliance"
 seregul.0308.desc: "[niluhin.GetFullName], rather than depend on the Princes whims to come to his aid if and when the time comes that the [stormhost|E] shall attack his realm, has proposed a direct alliance with me.\n\nThis is great news! Though far away, [bellakar|E] could help my personal ambitions!"
 seregul.0308.a: "Wonderful!"

 seregul.0309.t: "Bellakar Rejects Us!"
 seregul.0309.desc: "For whatever reason, [niluhin.GetFullName] has rejected our proposal! Maybe [niluhin.GetSheHe] feared that were secret strings or plots attached to our magnanimous proposal. Maybe [niluhin.GetSheHePossessive] is less rational than we thought. We will never know [niluhin.GetHerHis] reasons.\n\n We must look for another way to weaken the [stormhost|E]."
 seregul.0309.a: "Let us review our options."

 seregul.0310.t: "On Incinting Rebellion"
 seregul.0310.desc: "I have decided that we should forment instability within the [stormhost|E]. As an artificial state conjured by a dark power, it lacks some of the organic foundations a realm such as our Princedoms, even Pél, have.\n\nIt fills such a hole with dread, dividing their subjects to keep them weak, tempting and threatening their nobles. Ever projecting a merciless, ruthless, image of itself onto it's subject's and it's neighbour's hearts.\n\nWe shall look for disgruntlement and make such a subject feel they have the support of a realm the Storm Marshall fears. They will feel that they are no longer alone, and under our protection, and then, when they rise up, we may decide how to act against a distracted enemy."
 seregul.0310.a: "The Nobles."
 seregul.0310.b: "The Slaves."

 seregul.0311.t: "An Offer of Rebellion"
 seregul.0311.desc: "A discreet letter was delivered to me today. In it is the seal of the [balan_lai|E], ever our enemies to the south.\n\nToday they offer me friendship! They describe a neutered plot against their lands by the [storm_marshal.GetTitleAsName].\n\nThey now desire to hurt him in retaliation, and have elected to promote my claim to [storm_marshal.GetFirstNamePossessiveNoTooltip] throne.\n\nDo I desire it, or will I remain loyal?"
 seregul.0311.a: "Yes."
 seregul.0311.a.tt: "When the war against Bellakar starts, you will have a chance to break free."
 seregul.0311.b: "I am loyal!"

 seregul.0312.t: "$k_an_balkumagan$ has accepted"
 seregul.0312.desc: "[ab_ruler.GetFullName] has taken our money, and accepted the offer. There is no saying when, and if, he will attack his liege. But we have sown some discord there."
 seregul.0312.a: "Okay."

 seregul.0313.t: "$k_an_balkumagan$ refuses!"
 seregul.0313.desc: "[ab_ruler.GetFullName] remains silent. He will not accept our offer. We won't be able to try any more covert instabilization of the [stormhost|E] either, due to the risk of them having brought our letter to the [storm_marshal.GetTitleAsName]."
 seregul.0313.a: "Damn."
 
 seregul.0314.t: "Bellakar Calls for Aid!"
 seregul.0314.desc: "[join_war.GetName] has started! [bellakar|E] calls for the aid promised by the [balan_lai|E]. How will [princedom.GetNameNoTier] answer?"
 seregul.0314.a: "We will be there."
 seregul.0314.b: "We will not answer."

 seregul.0315.t: "The Time has Come!"
 seregul.0315.desc: "Years ago we promised the [balan_lai|E] that when the [stormhost|E] stirred to war against [bellakar|E], we would attack our masters and seek independence. Now is the time. But have we changed our mind?"
 seregul.0315.a: "No! We want to be free!"
 seregul.0315.b: "Yes... Now is not the time."

 seregul.0401.t: "Writing Back"
