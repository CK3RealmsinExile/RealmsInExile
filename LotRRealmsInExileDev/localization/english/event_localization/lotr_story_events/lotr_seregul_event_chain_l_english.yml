 lotr_seregul_events.9999.t: "Much to Do"
 lotr_seregul_events.9999.desc: "$k_pel$ has shattered! I am beset on all sides by traitors and opportunists. They demand that I be removed, if they are to return peacefully to adûnaic rule. The vile secessionist scum! What is the state if not an extension of it's ruler?\n\nI shall crush them and a new $k_pel$ will be born. One where the Prince does not serve the interests of his lessers. This is the opportunity to change the humiliating condition of our kingdom.\n\nAll that is left is to choose where the first blow will fall."
 lotr_seregul_events.9999.a: "Focus South."
 lotr_seregul_events.9999.b: "Focus East."
 lotr_seregul_events.9999.c: "Focus West."
 lotr_seregul_events.9999.d: "Why focus?!"

 lotr_seregul_events.0001.t: "The Fate of a Rival"
 lotr_seregul_events.0001.desc: "The villanous rake, [mayor.GetFullName], has meddled in my domestic affairs. I am ashamed to admit, even to myself, that he has seduced my wife, and yet it can be no secret to me when all my realm knows. For she has bore him a bastard, and for years now has cared for the child.\n\nFor years I have kept my anger to myself. The city of Barasi was too valuable to lose over personal reasons, too strong to bend to my will, my council would say.\n\nWell, now the lecherous villain makes so bold as to deny my authority over the city of Barasi, this twofold betrayal shall not go unanswered. The city will bend, sooner or later, but I cannot bear any longer knowing this man walks free under the sun in his defiance."
 lotr_seregul_events.0001.a: "I need him dead."
 lotr_seregul_events.0001.b: "I want him in my power."
 lotr_seregul_events.0001.c: "Who needs subtlety? To war!"

 lotr_seregul_events.0002.t: "A Disloyal Wife"
 lotr_seregul_events.0002.desc: "Now that the fate of the lecherous [mayor.GetFullName] has been decided, I must decide what to do with the faithless [wife.GetFullNameNoTitle].\n\nShe does not love me, and neither I love her. The kindness and affection we may have felt as a young couple has long dissipated, and was utterly forsaken when she bore her half-blooded bastard.\n\nI would be within my right to imprison her, though I am told it may fuel my vassal's accusations of tyranny. Another, quieter option would be to arrange her death. And yet, she might still prove a useful tool against her lover..."
 lotr_seregul_events.0002.desc.b: "Now that the fate of the lecherous [mayor.GetFullName] has been decided, I must decide what to do with the faithless [wife.GetFullNameNoTitle].\n\nShe does not love me, and neither I love her. The kindness and affection we may have felt as a young couple has long dissipated, and was utterly forsaken when she bore her half-blooded bastard.\n\nI would be within my right to imprison her, though I am told it may fuel my vassal's accusations of tyranny. Another, quieter option would be to arrange her death."
 lotr_seregul_events.0002.a: "She cannot be trusted anymore."
 lotr_seregul_events.0002.b: "I want her dead!"
 lotr_seregul_events.0002.c: "She must prove her loyalty."
 lotr_seregul_events.0002.d: "I refuse to even think about this."

