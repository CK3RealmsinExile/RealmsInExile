l_english:
 
 lotr_seregul_events.9998.t: "It should have been me!"
 lotr_seregul_events.9998.desc: "My peers of the [balan_lai|E] have seen fit to elect [leader.GetFullName] as our next leader. This is outrageous! I have the seniority, the experience, the blood, and the vision to lead us to a new era. Ever have the western Princes, spoiled by their rich lands and tame population, looked down on me and mine. I have not forgotten how they broke the Concordant in 3000 T.A., to humiliate me, and left me to deal with the secessionists myself.\n\nI may yet not be ready to act, but this new humiliation will not be forgotten either."
 lotr_seregul_events.9998.a: "The Balân-Lâi forsakes me."

 lotr_seregul_events.9999.t: "Much to Do"
 lotr_seregul_events.9999.desc: "$k_pel$ has shattered! I am beset on all sides by traitors and opportunists. They demand that I be removed if they are to return peacefully to adûnaic rule. The vile secessionist scum! What is the state if not an extension of it's ruler?\n\nI shall crush them and a new $k_pel$ will be born. One where the Prince does not serve the interests of his lessers. This is the opportunity to change the humiliating condition of our kingdom.\n\nAll that is left is to choose where the first blow will fall.\n#X You have 10 years to stabilize or the realm #bold will#! break further!#!"
 lotr_seregul_events.9999.a: "Focus South."
 lotr_seregul_events.9999.b: "Focus East."
 lotr_seregul_events.9999.c: "Focus West."
 lotr_seregul_events.9999.d: "Why focus?!"

 lotr_seregul_events.0001.t: "The Fate of a Rival"
 lotr_seregul_events.0001.desc: "The villanous rake, [mayor.GetFullName], has meddled in my domestic affairs. I am ashamed to admit, even to myself, that he has seduced my wife, and yet it can be no secret to me when all my realm knows. For she has bore him a bastard, and for years now has cared for the child.\n\nFor years I have kept my anger to myself. The city of Barasi was too valuable to lose over personal reasons, too strong to bend to my will, my council would say.\n\nWell, now the lecherous villain makes so bold as to deny my authority over the city of Barasi, this twofold betrayal shall not go unanswered. The city will bend, sooner or later, but I cannot bear any longer knowing this man walks free under the sun in his defiance."
 lotr_seregul_events.0001.a: "I need him dead."
 lotr_seregul_events.0001.b: "I want him in my power."
 lotr_seregul_events.0001.c: "Who needs subtlety? To war!"

 lotr_seregul_events.0002.t: "A Disloyal Wife"
 lotr_seregul_events.0002.desc: "Now that the fate of the lecherous [mayor.GetFullName] has been decided, I must decide what to do with the faithless [wife.GetFirstName].\n\nShe does not love me, and neither I love her. The kindness and affection we may have felt as a young couple has long dissipated, and was utterly forgotten when she bore her half-blooded bastard.\n\nI would be within my right to imprison her, though I am told it may fuel my vassal's accusations of tyranny. Another, quieter option would be to arrange her death. And yet, she might still prove a useful tool against her lover..."
 lotr_seregul_events.0002.desc.b: "Now that the fate of the lecherous [mayor.GetFullName] has been decided, I must decide what to do with the faithless [wife.GetFirstName].\n\nShe does not love me, and neither I love her. The kindness and affection we may have felt as a young couple has long dissipated, and was utterly forgotten when she bore her half-blooded bastard.\n\nI would be within my right to imprison her, though I am told it may fuel my vassal's accusations of tyranny. Another, quieter option would be to arrange her death."
 lotr_seregul_events.0002.a: "She cannot be trusted anymore."
 lotr_seregul_events.0002.b: "I want her dead!"
 lotr_seregul_events.0002.c: "She must prove her loyalty."
 lotr_seregul_events.0002.d: "I refuse to even think about this."

 lotr_seregul_events.0003.t: "A Shameful Blot"
 lotr_seregul_events.0003.desc: "My wife's affair is almost sorted, now all that is left to decide is the fate of the child. This living proof of my wife's faithlessness, my vassal's villainess, and my own humiliation.\n\nI must consider my move. The child must not allowed to go free, that much is clear. This little token of disrespect might grow to be a pretender, as it carries the royal blood.\n\nSo I must bring him into my power one way or another. His mother asks that he be legitimized as an [wife.GetDynastyName], and promises he shall be raised to be a most loyal courtier. I do not trust her, somehow."
 lotr_seregul_events.0003.a: "Seize the child."
 lotr_seregul_events.0003.b: "He must die."
 lotr_seregul_events.0003.c: "Actually, I shall be magnanimous."
 
 lotr_seregul_events.0004.t: "Focus South: Confronting the City"
 lotr_seregul_events.0004.desc: "The city of Barasi stands against me. As the richest city in $k_pel$, it has always acted haughtily towards it's Prince. This was tolerated, by my ancestors and then by me. But now the city has sealed it's doom and things will not again be what they were for Barasi, for they have broken away from the kingdom and it's leaders are guilty of treason.\n\nI will take bend the city to my will. Either through war or subtler ways. The city might be rich, but they will have no market to sell or food to buy if I enforce a complete economic rupture between us. They will starve and eventually they will break, and come crawling back to my nurturing arms."
 lotr_seregul_events.0004.a: "To war!"
 lotr_seregul_events.0004.b: "We will strangle their economy."
 lotr_seregul_events.0004.c: "They will fall soon enough."

 lotr_seregul_events.0005.t: "The Fall of Barasi"
 lotr_seregul_events.0005.desc: "As predicted, the economy of the proud city of Barasi has collapsed once they were cut off from my realm. The city starves and the merchants grow ever more fearful that they may be reduced to poverty.\n\nThe proud oligarchs are at last broken, and now they sue me for peace, and deliver themselves to my mercy. My chancellor tells me the few that still wished to project strength in the negotiations have been excluded from the talks by their peers.\n\nThe city is finally utterly at my mercy. Victory."
 lotr_seregul_events.0005.desc.b: "Barasi has fallen. Conquered and looted, the citizens flee and there's none left who wills to stand against my might. This proud city is broken. The oligarchs who haven't fled now sue me for peace.\n\nI do wish to take the city for myself, but that would no doubt anger my native vassals. If not me, a loyalist shall rule it. I will not have any more defiance from this now broken city.\n\nThe choice is between one of mine or one of theirs."
 lotr_seregul_events.0005.a: "It is mine!"
 lotr_seregul_events.0005.b: "[potential_oligarchic_vassal.GetFirstNameNoTooltip] will rule it in my name."
 lotr_seregul_events.0005.c: "For the sake of peace, [local_oligarchic_vassal.GetFirstNameNoTooltip] will rule."

 lotr_seregul_events.0006.t: "The Chaialla" 
 lotr_seregul_events.0006.desc.a: "The Chaialla are not as elusive as one might expect, though they mostly keep to themselves, they have had much contact with the tribes of Pél, and live openly as a simple farming folk. They have long had ties with the kharadûnaic rule of Pél, even enjoying a seat on the native council.\n\nBut [chaialla_ruler.GetFullName] has indeed not kept to himself, he broke away with the other secessionists after the treasonous Council of 3000 T.A., and has since been collaborating with Barasi against myself.\n\nWith the fall of Barasi they are left vunerable.\n\nBy rights I should crush them, and bring civilized rule over their little lands, but my council, as always, preaches caution, and tell me we could have a deal to restablish old ties."
 lotr_seregul_events.0006.a: "We'll crush them."
 lotr_seregul_events.0006.b: "They must pay tribute at least."
 lotr_seregul_events.0006.c: "I demand they bend the knee."
 lotr_seregul_events.0006.b.tt.tributary: "[chaialla_ruler.GetFirstNameNoTooltip] was successfully convinced to become a [tributary|E]"
 lotr_seregul_events.0006.b.tt.protectorate: "[chaialla_ruler.GetFirstNameNoTooltip] has negotiated into becoming a [protectorate|E]"
 lotr_seregul_events.0006.b.tt.nothing: "[chaialla_ruler.GetFirstNameNoTooltip] has denied our offers!"
 lotr_seregul_events.0006.c.tt.vassal: "[chaialla_ruler.GetFirstNameNoTooltip] became your vassal!"

 lotr_seregul_events.0101.t: "Focus East: Tensions in the East"
 lotr_seregul_events.0101.desc.a: "In the turmoil after the Council of 3000 T.A. the easternmost lands of Pél have fallen to opportunists.\n\nNearer at hand there is the Bandit King, a charismatic and merry man who, if the rumours are true, worships dark gods. He has rallied quite a force around him and comfortably stands in defiance against me. Further away the Magrin warlord Opeyemi has seized the land for his tribe. I hear he is a competent general, but has no friends in his homeland.\n\nI must bend them to my will somehow, but their armies might be too much for Pél to handle. There is no love between them, and that offers me a couple of possibilities. I could ally with one to take out the other, or I could try and manipulate them to fight each other..."
 lotr_seregul_events.0101.a: "Play them against each other."
 lotr_seregul_events.0101.b: "Ally with the Bandit King."
 lotr_seregul_events.0101.c: "Ally with the Magrin."
 lotr_seregul_events.0101.d: "I will just crush them."
 lotr_seregul_events.0101.a.tt.success: "The fools go to war against one another!"
 lotr_seregul_events.0101.a.tt.failure: "Disaster! They have seen through it and allied!"

 lotr_seregul_events.0102.t: "A Band of Merry Men"
 lotr_seregul_events.0102.desc.a: "The Bandit King may have bought himself some time, but now I shall end his freedom once and for all.\n\nIf he desires to keep his rule he will have to swear fealty to me. This will be an ultimatum, and if he refuses war. But if I do not judge it wise to keep this scum in power, war it will still be, either with the help of the Magrin of the east, or by myself."
 lotr_seregul_events.0102.desc.b: "The Bandit King may have bought himself some time, but now I shall end his freedom once and for all.\n\nIf he desires to keep his rule he will have to swear fealty to me. This will be an ultimatum, and if he refuses war. But if I do not judge it wise to keep this scum in power, war it will still be and by my own might I will end him."
 lotr_seregul_events.0102.desc.c: "In the turmoil after the Council of 3000 T.A. the easternmost lands of Pél have fallen to opportunists.\n\nNearer at hand there is the Bandit King, a charismatic and merry man who, if the rumours are true, worships dark gods. He has rallied quite a force around him and comfortably stands in defiance against me.\n\nDealing with him will not be easy. I might be able to convince him to bend the knee, if I sweeten the pot enough... Or I could ally with the Magrin adventurer Opeyemi if I promise he will keep the lands."
 lotr_seregul_events.0102.a: "He must swear his fealty."
 lotr_seregul_events.0102.b: "I will ally with the Magrin."
 lotr_seregul_events.0102.c: "That pathethic rabble? An army?"
 lotr_seregul_events.0102.a.tt.success: "He has accepted!"

 lotr_seregul_events.0103.t: "An Ancient Threat"
 lotr_seregul_events.0103.desc.a: "The Twin Realms of Mag and Tumag for centuries ruled the natives of Pél, until a coalition of rebels ousted them. They then sought the [balan_lai|E] for protection, who had long given up any claims on Pél. Thus it was that the Princes of Pél began, protectors of the realm against the barbarian threat of Mag and Tumag.\n\nMy subjects are no better, but the Magrin cannot be tolerated to settle in, they could bring a great force with them. This adventurer might become the vanguard of a real invasion. He must bend or die."
 lotr_seregul_events.0103.a: "Repel the invaders!"
 lotr_seregul_events.0103.b: "One last chance to acknowledge me."

 lotr_seregul_events.0201.t: "Focus West: The Cuind protectorate"
 lotr_seregul_events.0201.desc: "The [cuind|E] have guaranteed the independence of our western secessionist! [toya.GetFullName] is a peaceful ruler, and I had previously counted on [toya.GetHerHis] support as someone who will not take aggressive moves regardless of how much I push the council.\n\nI was clearly wrong, for [toya.GetSheHe] had dealings with the [elves|E]! Now [GetTitleByKey('c_mokuba').GetNameNoTier] counts itself safe from Pél, under the protection of a powerful and elusive elven King. But I shall not give up my realm so easily.\n\nI hear this elven King to be a lover of [mankind|E], I may be able to trick him into releasing [toya.GetFirstNameNoTooltip] back into my arms. Otherwise, I could organize my armies for a speedy campaign, in the hope that the elves will move slower."
 lotr_seregul_events.0201.a: "I can convince the Cuind King."
 lotr_seregul_events.0201.a.tt.success: "He agreed to release [GetTitleByKey('c_mokuba').GetNameNoTier]"
 lotr_seregul_events.0201.b: "We just need to be quick!"

 lotr_seregul_events.0202.t: "Negotiating with the Elves"
 lotr_seregul_events.0202.desc.a: "Our previous attempt did not work. I shall come again to talk to [terilaen.GetFirstName]. Hopefully I can deceive him on the sicerity of my humbleness, when I could not make him believe my promises previously. I am betting that this elf is a forgiving person.\n\nThis is my last resource. We must need conquer it in war if the talks fail."
 lotr_seregul_events.0202.desc.b: "The [cuind|E] have guaranteed the independence of our western secessionist! [toya.GetFullName] is a peaceful ruler, and I had previously counted on [toya.GetHerHis] support as someone who will not take aggressive moves regardless of how much I push the council.\n\nI was clearly wrong, for [toya.GetSheHe] had dealings with the [elves|E]! Now [GetTitleByKey('c_mokuba').GetNameNoTier] counts itself safe from Pél, under the protection of a powerful and elusive elven King. But I shall not give up my realm so easily.\n\nI hear this elven King to be a lover of [mankind|E], I may be able to trick him into releasing [toya.GetFirstNameNoTooltip] back into my arms."
 lotr_seregul_events.0202.a: "I will try."

 lotr_seregul_events.0251.t: "Five Years to Stabilize!"
 lotr_seregul_events.0251.desc: "The disastrous Council of 3000 T.A. has deeply wounded my image. I am seen as an inefectual leader who pushed his vassals into mutiny and now fails to rein them back in. Of course it is all propaganda spread by those who would like to see me fail. I have tried guiding the natives, and they slapped my hand away like the treasonous savages they are.\n\nStill, I need to show I can unite the realm again. The heartlands of Pél might have restrained from secessionism, but most love me not, and might still try to break away if I do not mend the realm. Already I see them conspiring. I need to fix this.\n#X You have five more years to stabilize!#!"
 lotr_seregul_events.0251.a: "I will stabilize!"

 lotr_seregul_events.0252.t: "Pél Shatters Again!"
 lotr_seregul_events.0252.desc: "Disaster! [rebel_leader.GetFullName] has apparently met yesterday in secret with most of the native leaders of Pél.\n\nI have today been given a letter, apparently sent by this secret meeting of the Council to many across the kingdom, which says:\n\n"The tyrant seating in the throne of Pél has turned the kingdom into a defunct state. It is no longer in the interests of the Council that the Kharadûnâi should continue their rule over our land. Therefore it is the unanimous decision of this assembly that all should take arms and help topple this deadwood state."\n\nAs more reports come in, they seem to have all joined."
 lotr_seregul_events.0252.a: "In this fire a new Pél will be reborn yet!"

