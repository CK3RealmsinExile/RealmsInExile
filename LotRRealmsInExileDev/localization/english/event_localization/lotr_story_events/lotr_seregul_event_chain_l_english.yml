 lotr_seregul_events.0007.t: "It should have been me!"
 lotr_seregul_events.0007.desc: "My peers of the [balan_lai|E] have seen fit to elect [leader.GetFullName] as our next leader. This is outrageous! I have the seniority, the experience, the blood, and the vision to lead us to a new era. Ever have the western Princes, spoiled by their rich lands and tame population, looked down on me and mine. I have not forgotten how they broke the Concordant in 3000 T.A., to humiliate me, and left me to deal with the secessionists myself.\n\nI may yet not be ready to act, but this new humiliation will not be forgotten either."
 lotr_seregul_events.0007.a: "The Balân-Lâi forsakes me."

