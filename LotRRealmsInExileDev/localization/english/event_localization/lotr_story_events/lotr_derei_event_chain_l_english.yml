l_english:

  lotr_derei_event.1000.t: "Seeking Advice"
  lotr_derei_event.1000.desc: "I have come into my rule. Now it is solely up to me to decide what is best for the people of [GetTitleByKey('d_gimileth').GetNameNoTier], and what paths I should tread. It is a terrifying prospect. Even though [terilaen.GetFirstName] indeed raised me to rule, the reality of it is overwhelming.\n\nI do not believe I should waste my life reactively dealing with small matters without a plan. A wise ruler plans for the future, follows a path, but my instincts tell me they cannot be trusted, and my heart remains silent."
  lotr_derei_event.1000.a: "I need guidance."
  
  lotr_derei_event.1001.t: "The Halls of the Cuind"
  lotr_derei_event.1001.desc: "As I enter this great city of the [cuind|E], after days of travel through the deep forest, I see my mentor in his majesty. A rare sight for [conceptracemen|E]. I ask him the questions that have troubled my mind, who am I to become? How am I to rule? How to deal with the other Princes?\n\n"My young pupil, advice you shall have, as you wish it - guidance too, and my admonishments you know already. I am your tutor, and mayhaps even your friend; yet I am not of Men, regardless of the long years of my study. I cannot decree your dreams, nor what you should seek to make of this life…\n\nA noble heart is the one who desires to bring light upon this darkening world, but is a noble heart not part of the nobility? Have you had enough play and games? Your peers haven't. Intrigue and charm they have played for centuries. How does a young man become an adult among children? How does a noble heart avoid the trappings of nobility? Maybe they can't. This is your riddle to solve. You are dismissed, my dear ward.""
  lotr_derei_event.1001.a: "Much to think about..."

  lotr_derei_event.1002.t: "Seek the Princes: The City of Ûrulôni"
  lotr_derei_event.1002.desc: "This great and ancient city serves as the seat for the most prestigious princely family of the [balan_lai|E], the Imrazôrhin. Descended in direct line from the great Imrazôr, Prince of Zimrathâni, grandson of Ar-Zimrathôn, King of [numenor|E]. Here I meet his heir, [phorakon.GetName].\n\nThe old man treats me with a kindly, almost fatherly, demeanor, but he falls short of friendliness. This is a man long used to petitioners, to being above his peers, the first among equals. Arrogance tempered by generosity. I can learn something here."
  lotr_derei_event.1002.a: "The old man can be swayed."
  lotr_derei_event.1002.a.success: "You grow closer"
  lotr_derei_event.1002.b: "I must learn as much as I can."

  lotr_derei_event.1003.t: "Seek the Princes: The Jewel of the South"
  lotr_derei_event.1003.desc: "I have come to Karasalas to meet with [arimith.GetName], the beautiful Princess sometimes called the Jewel of the Southlands. This is a land of forests and plains, with many prosperous farms. It is quite beautiful.\n\nAs I am allowed into her council chamber, she is still dealing with some small matters. I am struck by her competence, bearing great knowledge on even the smaller matters of her realm and suggesting practical action with as few words as possible. Here is a hard working, disciplined ruler. I can't help but admire her.\n\n As she finally turns her attention to me, it is with a keen but distant look. Quite opposite from Phorakôn. The old man talked as a father and listened as a jaded king, this princess gives me her full attention but no warmth."
  lotr_derei_event.1003.a: "I must make an effort to connect with her."
  lotr_derei_event.1003.b: "Let's talk about governance."

  lotr_derei_event.1004.t: "Seek the Princes: The Heir Apparent"
  lotr_derei_event.1004.desc: "Today I meet possibly the most famous Prince of the [balan_lai|E], [imrazor.GetFirstName], Prince of Alsarias. His recent charm offensive to marry Arimîth has stirred the Balân-lâi, some Princes to his defense and others to condemn it as a cynical power play. Terilaen seemed to believe it was honest love. This is a man who has the will to mold the status quo. I have been invited for a private dinner with him.\n\nAs we drink, eat and talk, I find that he is an impressive man. Hard working, charismatic and unmatchably eager. I can see that this man is truly and wholly a Prince, I can see why he is the uncontested candidate to succeed Phorakôn.\n\nAs he talks he can easily navigate through political interests, witty remarks and seemingly genuine care for me and my people. I am greatly enjoying my time."
  lotr_derei_event.1004.a: "What a pleasant man."

  lotr_derei_event.1005.t: "Seek the Princes: The Citadel"
  lotr_derei_event.1005.desc: "The great Citadel of Azaridêth makes an impressive sight against the mountains. The land is rich with farmlands and trade, and bustling with activity. And yet, here is the seat of the most reclusive Prince of the [balan_lai|E], [karaag.GetFirstName]. I make my way to the castle only to find his apologetic seneschal, he tells me Karaag regretfully won't be able to make it to our meeting today.\n\nSating my curiosity and gregariousness is certainly the least of his priorities, but still to deny one of his peers a formal meeting can surely be seen as an insult. Imrazôr had warned me that Karaag never takes a meeting he can avoid, this Prince is not concerned with ruling, only his workshop."
  lotr_derei_event.1005.a: "I will wait and follow him if he appears."
  lotr_derei_event.1005.b: "Nonsense, I will just talk to his household."

  lotr_derei_event.1006.t: "Seek the Princes: The Great Port"
  lotr_derei_event.1006.desc: "In [GetTitleByKey('c_inzilloni').GetNameNoTier] is the busiest commercial port of the [thanihazad|E]. This old númenórean city has developed itself into a great commercial center, with a powerful merchant class and the greatest merchantile fleet. Here I am to meet it's Prince, [arthazroc.GetFirstName], a man of sinister reputation.\n\nHe meets me with politeness, but his keen eyes seek weakness. I fear he will find it. He entertains my talk for a while but gives no worthy answers. This is a subtle man, used to getting what he wants through manipulation. I stop talking and, as a spider who feels prey in his web, he stirs. He apologizes for answering my questions vaguely, but claims to be distracted over his recent troubles with the merchants, he proceeds to explain he lacks the funds to buy out the business of a particularly troublesome merchant, and if his problems were dealt with he could grant me another audience."
  lotr_derei_event.1006.a: "Offer to talk to this merchant's competition."
  lotr_derei_event.1006.b: "I will pay the old spider."

  lotr_derei_event.1007.t: "Seek the Princes: The Giant"
  lotr_derei_event.1007.desc: "I have come to the frontier princedom of [GetTitleByKey('d_holzoreth').GetNameNoTier] to meet Prince [daroc.GetFirstName]. This is a relatively dry land, with some forests and jungles spread about. It is heavily militarized, as the threat of invasions from [GetTitleByKey('k_an_balkumagan').GetNameNoTier] has always loomed over it. As I approach the castle I see a regiment of [blacklocks|E] drilling.\n\n This land's Prince is a strong man, from a long line of warrior. He is certainly imposing, every inch a warrior, his limp only seems like an enemy to defeat at every step. This is a man of drive and physical power.\n\nHe talks to me as a practical man, but with a softer side, he looks at me not completely without kindness and will sometimes make jokes."
  lotr_derei_event.1007.a: "Try to get on the softer side."
  lotr_derei_event.1007.b: "Ask about life on the frontier."

  lotr_derei_event.1008.t: "Seek the Princes: The Antagonist"
  lotr_derei_event.1008.desc: "My desire to meet all the Princes has brought me at last to the odd princedom of the [balan_lai|E], [GetTitleByKey('k_pel').GetNameNoTier]. Once I pass through the mountains and hills, I find this is a flat land with plenty of good farmland. I have not seen an [adunai|E] for days.\n\nI meet [seregul.GetName] at his castle. He welcomes me politely but I feel that something bothers him. He answers most of my questions calmly, but once I start inquiring about the unique political situation of Pél, the native council, he gets angry.\n\n"You dare mention those traitors to me? The moment I offered to guide them, they rebelled. A strong hand was always needed, I see that now. For too long we have allowed them to grow unchecked. They invited us to this land because they were weak, and yet they resent me showing them the way. I shall shed their blood yet, and make them an example of what Pél does to secessionists."\n\nSo this is the Prince of Pél, a hot-headed fool."
  lotr_derei_event.1008.a: "Yikes."

  lotr_derei_event.1009.t: "Seek the Princes: The Capital"
  lotr_derei_event.1009.desc: "The great city of [GetTitleByKey('c_mispir').GetNameNoTier] serves as the seat of the [balan_lai|E], far too important a city to belong to any prince without tipping the scales of power, and needing to stay neutral as the common court of the Princes, Mispir is held by a steward, elected from the local oligarchy.\n\nToday I meet [title:c_mispir.GetTitle.GetHolder.GetName] to learn about the governance of the greatest city of the [thanihazad|E] and to reflect upon my travels, and try to glean meaning from them."
  lotr_derei_event.1009.a: "I have learned much in my travels."