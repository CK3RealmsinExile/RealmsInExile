l_english:

  lotr_derei_event.1000.t: "Seeking Advice"
  lotr_derei_event.1000.desc: "I have come into my rule. Now it is solely up to me to decide what is best for the people of [GetTitleByKey('d_gimileth').GetNameNoTier], and what paths I should tread. It is a terrifying prospect. Even though [terilaen.GetFirstName] indeed raised me to rule, the reality of it is overwhelming.\n\nI do not believe I should waste my life reactively dealing with small matters without a plan. A wise ruler plans for the future, follows a path, but my instincts tell me they cannot be trusted, and my heart remains silent."
  lotr_derei_event.1000.a: "I need guidance"
  
  lotr_derei_event.1001.t: "The Halls of the [cuind|E]"
  lotr_derei_event.1001.desc: "As I enter this great city of the [elves|E], after days of travel through the deep forest, I see my mentor in his majesty. A rare sight for [conceptracemen|E]. I ask him the questions that have troubled my mind, who am I to become? How am I to rule? How to deal with the other Princes?\n\n'My young pupil, advice you shall have, as you wish it - guidance too, and my admonishments you know already. I am your tutor, and mayhaps even your friend; yet I am not of Men, regardless of the long years of my study. I cannot decree your dreams, nor what you should seek to make of this life…\n\nA noble heart is the one who desires to bring light upon this darkening world, but is a noble heart not part of the nobility? Have you had enough play and games? Your peers haven't. Intrigue and charm they have played for centuries. How does a young man become an adult among children? How does a noble heart avoid the trappings of nobility? Maybe they can't. This is your riddle to solve. You are dismissed, my dear ward.'"
  lotr_derei_event.1001.a: "Much to think about"