l_english:

  derei.1000.t: "Seeking Advice"
  derei.1000.desc: "I have come into my rule. Now it is solely up to me to decide what is best for the people of [GetTitleByKey('d_gimileth').GetNameNoTier], and what paths I should tread. It is a terrifying prospect. Even though [terilaen.GetFirstName] indeed raised me to rule, the reality of it is overwhelming.\n\nI do not believe I should waste my life reactively dealing with small matters without a plan. A wise ruler plans for the future, follows a path, but my instincts tell me they cannot be trusted, and my heart remains silent."
  derei.1000.a: "I need guidance."
  
  derei.1001.t: "The Halls of the Cuind"
  derei.1001.desc: "As I enter this great city of the [cuind|E], after days of travel through the deep forest, I see my mentor in his majesty. A rare sight for [conceptracemen|E]. I ask him the questions that have troubled my mind, who am I to become? How am I to rule? How to deal with the other Princes?\n\n"My young pupil, advice you shall have, as you wish it - guidance too, and my admonishments you know already. I am your tutor, and mayhaps even your friend; yet I am not of Men, regardless of the long years of my study. I cannot decree your dreams, nor what you should seek to make of this life…\n\nA noble heart is the one who desires to bring light upon this darkening world, but is your noble heart not part of the nobility? Have you had enough play and games? Your peers haven't. Intrigue and charm they have played for centuries. How does a young man become an adult among children? How does a noble heart avoid the trappings of nobility? Maybe they can't. This is your riddle to solve. You are dismissed, my dear ward.""
  derei.1001.a: "Much to think about..."

  derei.1002.t: "Seek the Princes: The City of Ûrulôni"
  derei.1002.desc: "This great and ancient city serves as the seat for the most prestigious princely family of the [balan_lai|E], the Imrazôrhîn. Descended in direct line from the great Imrazôr, Prince of Zimrathâni, grandson of Ar-Zimrathôn, King of [numenor|E]. Here I meet his heir, [phorakon.GetName].\n\nThe old man treats me with a kindly, almost fatherly, demeanor, but he falls short of friendliness. This is a man long used to petitioners, to being above his peers, the first among equals. Arrogance tempered by generosity. I can learn something here."
  derei.1002.a: "The old man can be swayed."
  derei.1002.a.success: "The old man warms up to you"
  derei.1002.a.failure: "He barely listens"
  derei.1002.b: "I must learn as much as I can."
  derei.1002.b.success: "He gives you many good tips"
  derei.1002.b.failure: "You made the wrong questions!"

  derei.1003.t: "Seek the Princes: The Jewel of the South"
  derei.1003.desc: "I have come to Karasalas to meet with [arimith.GetName], the beautiful Princess sometimes called the Jewel of the Southlands. This is a land of forests and plains, with many prosperous farms. It is quite beautiful.\n\nAs I am allowed into her council chamber, she is still dealing with some small matters. I am struck by her competence, bearing great knowledge on even the smaller matters of her realm and suggesting practical action with as few words as possible. Here is a hard working, disciplined ruler. I can't help but admire her.\n\nAs she finally turns her attention to me, it is with a keen but distant look. Quite opposite from Phorakôn. The old man spoke as a father and listened as a jaded king, this princess gives me her full attention but no warmth."
  derei.1003.a: "I must make an effort to connect with her."
  derei.1003.a.success: "She enjoys the talk"
  derei.1003.a.failure: "She looks bored"
  derei.1003.b: "Let's talk about governance."
  derei.1003.b.success: "She has many good ideas for Gimilêth"
  derei.1003.b.failure: "She is confused by your questions"

  derei.1004.t: "Seek the Princes: The Heir Apparent"
  derei.1004.desc: "Today I meet possibly the most famous Prince of the [balan_lai|E], [imrazor.GetFirstName], Prince of Alsarias. His recent charm offensive to marry Arimîth has stirred the Balân-lâi, some Princes to his defense and others to condemn it as a cynical power play. Terilaen seemed to believe it was honest love. Regardless, this is a man who has the will to mold the status quo. I have been invited for a private dinner with him.\n\nAs we drink, eat and talk, I find that he is an impressive man. Hard working, charismatic and unmatchably eager. I can see that this man is truly and wholly a Prince, and I can see why he is the uncontested candidate to succeed Phorakôn.\n\nAs he talks he can easily navigate through political interests, witty remarks and seemingly genuine care for me and my people. I am greatly enjoying my time."
  derei.1004.a: "What a pleasant man."
  derei.1004.a.success: "You develop a quick bond!"
  derei.1004.a.failure: "You have a perfectly nice talk"

  derei.1005.t: "Seek the Princes: The Citadel"
  derei.1005.desc: "After an unpleasant treck through the wetlands of [GetTitleByKey('d_gimilurush').GetNameNoTier], I have arrived at the great Citadel of Azaridêth. It makes an impressive sight against the mountains. The land is rich with farmlands and trade, and bustling with activity. And yet, here is the seat of the most reclusive Prince of the [balan_lai|E], [karaag.GetFirstName]. I make my way to the castle only to find his apologetic seneschal, who tells me Karaag regretfully won't be able to attend our meeting today.\n\nSating my curiosity is certainly the least of his priorities, but still to deny one of his peers a formal meeting can surely be seen as an insult. Imrazôr had warned me that Karaag never takes a meeting he can avoid. This Prince is not concerned with ruling, only with his workshop."
  derei.1005.a: "I will wait and follow him if he appears."
  derei.1005.a.success: "He begs you to not reveal his secrets"
  derei.1005.a.failure: "He eludes you"
  derei.1005.b: "Nonsense, I will just talk to his household."
  derei.1005.b.success: "You learn much about the Prince's tactics"
  derei.1005.b.failure: "You fail to learn anything useful"

  derei.1006.t: "Seek the Princes: The Great Port"
  derei.1006.desc: "In [GetTitleByKey('c_inzilloni').GetNameNoTier] is the busiest commercial port of the [thanihazad|E]. This old númenórean city has developed itself into a great commercial center, with a powerful merchant class and the greatest mercantile fleet in the Seven Lands. Here I am to meet it's Prince, [arthazroc.GetFirstName], a man of sinister reputation.\n\nHe meets me with politeness, but his keen eyes seek weakness. I fear he will find it. He entertains my talk for a while but gives no worthy answers. This is a subtle man, used to getting what he wants through manipulation.\n\nI stop talking and, as a spider who feels prey in his web, he stirs. He apologizes for answering my questions vaguely, but claims to be distracted over his recent troubles with the merchants. He proceeds to explain he lacks the funds to buy out the business of a particularly troublesome merchant, and if his problems were dealt with he could grant me another audience."
  derei.1006.a: "Offer to talk to this merchant's competition."
  derei.1006.a.success: "Arthazroc is impressed"
  derei.1006.a.failure: "The merchants swindle you!"
  derei.1006.b: "I will pay the old spider."
  derei.1006.b.success: "He entertains you with tales of his old plots"

  derei.1007.t: "Seek the Princes: The Giant"
  derei.1007.desc: "I have come to the frontier princedom of [GetTitleByKey('d_holzoreth').GetNameNoTier] to meet Prince [daroc.GetFirstName]. This is a relatively dry land, with some forests and jungles spread about. It is heavily militarized, as the threat of invasions from [GetTitleByKey('k_an_balkumagan').GetNameNoTier] has always loomed over it. As I approach the castle I see a regiment of [blacklocks|E] drilling.\n\nThis land's Prince is a strong man, from a long line of warriors. He is certainly imposing, every inch a warrior, his limp only seems like an enemy to defeat at every step. This is a man of drive and physical power.\n\nHe talks to me as a practical man, but with a softer side; he is very open and every so often sneaks a joke in his speech."
  derei.1007.a: "Try to get on the softer side."
  derei.1007.a.success: "He is a friendly man!"
  derei.1007.a.failure: "The meeting is awkward"
  derei.1007.b: "Ask about life on the frontier."
  derei.1007.b.success: "He has much to say about it"

  derei.1008.t: "Seek the Princes: The Antagonist"
  derei.1008.desc: "My desire to meet all the Princes has brought me at last to the odd princedom of the [balan_lai|E], [GetTitleByKey('k_pel').GetNameNoTier]. Once I pass through the mountains and hills, I find this is a flat land with plenty of good farmland. I have not seen an [adunai|E] for days.\n\nI meet [seregul.GetName] at his castle. He welcomes me politely but I feel that something bothers him. He answers most of my questions calmly, but once I start inquiring about the unique political situation of Pél, the native council, he gets angry.\n\n"You dare mention those traitors to me? The moment I offered to guide them, they rebelled. A strong hand was always needed, I see that now. For too long we have allowed them to grow unchecked. They invited us to this land because they were weak, and yet they resent me showing them the way. I shall shed their blood yet, slowly, and make them an example of how Pél deals with treason."\n\nSo this is the Prince of Pél, a hot-headed fool."
  derei.1008.a: "Yikes."
  derei.1008.a.success: "You navigate the meeting successfully"
  derei.1008.a.failure: "The meeting is a disaster"

  derei.1009.t: "Seek the Princes: The Capital"
  derei.1009.desc: "The great city of [GetTitleByKey('c_mispir').GetNameNoTier] serves as the seat of the [balan_lai|E]. Far too important a city to belong to any prince without tipping the scales of power, and needing to stay neutral as the common court of the Princes, Mispir is held by a steward, elected from the local oligarchy.\n\nToday I meet [GetTitleByKey('c_mispir').GetHolder.GetName] to learn about the governance of the greatest city of the [thanihazad|E] and to reflect upon my travels, and try to glean meaning from them.\n\nFrom friendly Imrazôr and old fatherly Phorakôn to petty Seregul. From Karaag, running from power, to Arthazroc, grasping it however he can, I have met a wide variety of rulers.\n\nI have come to believe that the greatest trap a ruler can fall to is alienation, like Seregul and Karaag. To avoid that a ruler should be diligent and not rest upon his achivements, but strive to work harder, like Daroc and Amirith. Also, a Prince must be accessible and friendly, like Imrazôr."
  derei.1009.a: "Plenty to reflect on the journey back home."
  derei.1009.a.success: "You have learned much"

  derei.1010.t: "An Escapee!"
  derei.1010.desc: "The recent occupation of the southern tip of the Drêl peninsula by pirates has caused fear and displaced some of the local population for the more established tribes in the north. Few have made so bold as to flee into our forest. And those that did were turned away. But today envoys from [GetTitleByKey('d_cuindore').GetHolder.GetFirstName] have arrived, escorting a young human girl.\n\nShe has a strong look on her face, but she cannot hide the fear. I smile at her and bid her to sit in the grass beside me. I ask for her story and she tells it after a moment of hesitation, gaining confidence as the tale goes on.\n\nIt is a terrible tale. Her parents executed and their only child taken captive. When she saw her chance to escape she blindly ran into our forest, too scared to consider the elusive [elves|E].\n\nAs she finishes telling of her encounter with Nimloth, she thanks me for the kindness of the [cuind|E], and asks what shall become of her."
  derei.1010.a: "She should live among mankind."
  derei.1010.a.tt: "You will send Âmâli to live in Derei's court, he will treat her kindly"
  derei.1010.b: "I can make an exception for her."
  derei.1010.b.tt: "Âmâli will be cared for in Drêl, she's a competent young woman"

  derei.1011.t: "An Envoy from Terilaen"
  derei.1011.desc: "Around noon I arrive at the gates of my fortress to receive two elves come from the south. I immediately notice that the girl is not an elf at all, though dressed as one, but a very pretty [derei_wife.GetCulture.GetName] woman.\n\nThe elf explains that the girl has escaped from the occupied region on the tip of the Cape of Drêl, from the Vulmaw pirates that now rule there. He says that [GetTitleByKey('k_drel').GetHolder.GetFirstName] in his wisdom has chosen my fortress as her temporary home, and trusts I shall take care of her until she is fully healed and rested and knows where she wants to go. I know such a request should be honoured with my best hospitality.\n\nWe say farewell to the elf and I invite her in for lunch. [derei_wife.GetFirstName] has an earnest, but cautious, look in her beautiful brown eyes. I feel pulled towards this woman. I'm eager to hear her voice so I ask for tales of her land, what is life like down there, how could one help, what do the people want. She enjoys talking! And is very curious about many things, especially about Terilaen and the Cuind. We talk for the whole day as the conversation shifts into our childhoods, hopes and dreams. By the end I feel we have created a solid bound."
  derei.1011.a: "She is a very interesting person!"

  derei.1012.a: "Maybe now it is time to marry"

  derei.1013.t: "Dreaming of Her"
  derei.1013.desc: "It has now been months since [derei_wife.GetFirstName] arrived at my court. We have talked every day and spent many hours together. I cannot stop thinking about her. Several kinsmen and women have approached to ask about my intentions with her. Once it was asked if I wished to marry her, I half mindedly assented that it might be a possibility. My kin was appalled and proceeded to admonish me and instruct me to take the girl as a concubine.\n\nToday is the day. I will make my feelings clear to Âmâli. As we meet outside for our morning walk my hands are sweating and my speech is particularly dim witted. She looks at me curiously. It takes half an hour until I muster the courage. I tell her that I have been and am in love with her, and whether she has decided what to do with her life yet. She kisses me. This may be the happiest day of my life."
  derei.1013.a: "I shall marry this woman!"
  derei.1013.a.toast: "Just a few more weeks!"
  derei.1013.b: "Would concubinage dim our love? It is proper..."
  derei.1013.c: "I cannot do this, she is a peasant..."

  derei.1014.t: "Our Wedding!"
  derei.1014.desc: "Today is the day that we shall marry. Since I have announced the marriage the days have been filled with ugly looks and veiled insults by most of my court, especially towards [derei_wife.GetFirstName]. And yet, it has been the happiest weeks of our young lives. Just to walk hand in hand whenever we have the opportunity, or the occasional kiss, and especially our talks during meals, it all fills my heart, and I believe her's, with joy.\n\nI have taken back to the council, and although the main issue has been my marriage to a lowborn and how it would hurt my reputation in the [balan_lai|E], I have tried to rule the other matters as justly and diligently as I can.\n\nToday my court is in mourning, many of the more dramatic courtiers wear black. And many more stay in their quarters, or avoid me, as to not risk showing approval. Only a couple show up to witness the ceremony, as I take Âmâli's hand and am asked if I agree to become her husband.\n\n#help This is the end of Derei's content for now! #!"
  derei.1014.a: "Yes, of course, yes!"
  derei.1014.b: "I cannot do this!"