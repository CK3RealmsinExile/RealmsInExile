l_english:

 skorgrim_dourhand.0100.t: "The Words of the Watcher"
 skorgrim_dourhand.0100.desc: "Within the bounds of [GetTitleByKey('c_zillinakhur').GetNameNoTier], news reaches me of a crumbling scroll discovered among the ruins of an ancient library. Its surface is cracked and dim with age, yet the runes are still legible. Written upon it is the account of [khathza_the_watcher.GetFirstNameNicknamed]. It describes the wrath of [king|E] [naugladur.GetFirstName] of the [firebeards|E] following the betrayal of [elu_thingol|E] of [GetTitleByKey('k_doriath').GetNameNoTier] after the reshaping of the [nauglamir|E] by [dwarven|E] craftsmen to hold a [silmaril|E]. Khathzâ recounts his role as an envoy to [elu_thingol.GetFirstName] and one of only two Dwarves to survive the treachery.\n\nAfter returning to [nogrod|E], Khathzâ went on to teach all who would listen the ways of the [GetFaithByKey('faith_firebeards').GetAdherentNamePlural], declaring that those who rely on the judgment of others are destined to fail.\n\nHis words strike deep. The treachery he endured feels little different from the ridicule I suffer, dismissed, restrained, and left to falter while my liege looks on. Perhaps I was meant to hear this tale, to remember, as Khathzâ taught, that the memory of past betrayals is the only safeguard against future ones."
 skorgrim_dourhand.0100.a: "He spoke truth — I will heed his words."
 skorgrim_dourhand.0100.b: "Old grudges lead only to ruin."

 skorgrim_dourhand.0101.t: "An Interesting Pact"
 skorgrim_dourhand.0101.desc: "The [dwarves|E] of the [bluemountains|E] are a stubborn, prideful lot, yet even the sturdiest stone has its fissures. [skorgrim_dourhand.GetName] harbors a hunger for the lost glory of [nogrod|E] that outweighs his loyalty to his kin. It is a weakness we can exploit.\n\nI have prepared a scroll for the [GetScriptedCharacterByHistoryID('lineofdourhand17').GetDynasty.GetName] Dwarf, couched in promises of immortality and prestige that far surpasses his current station. In truth, these are but gilded shackles. In exchange, I shall demand the [Concept('sevenringsofdwarves', 'Ring of the Firebeards')|E] and the [Concept('sevenringsofdwarves', 'Ring of the Broadbeams')|E]. Should he succeed, two more of the [sevenringsofdwarvesshort|E] will return to the shadow of my master [sauroncharacter|E]. Should he fail, he will learn that the wrath of [angmar|E] is far more certain than any Dwarven treasure.\n\nOur emissary stands ready to depart for the [eredluin|E]. Shall we cast this hook into the dark, or is this exiled prince beneath our notice?"
 skorgrim_dourhand.0101.a: "Send the offer. Let greed be his undoing."
 skorgrim_dourhand.0101.b: "He is unworthy of our attention. Burn the scroll."

 skorgrim_dourhand.0102.t: "A Dark Offer"
 skorgrim_dourhand.0102.desc: "An emissary from [angmar|E] has arrived bearing a letter sealed by the [witchkingshort|E] himself. The messenger claims this is a pact of mutual benefit. He suggests I have no reason for concern, yet a shadow of dread hangs over his words.\n\nUpon reading the scroll, the true nature of the offer becomes clear. The Witch-King promises immortality and boundless riches in exchange for delivering the [Concept('sevenringsofdwarves', 'Ring of the Firebeards')|E] and the [Concept('sevenringsofdwarves', 'Ring of the Broadbeams')|E] to him.\n\nWhile such an alliance could provide the means to rebuild [nogrod|E], the risks are grave. To accept the deal and fail to deliver both Rings would surely invite a terrible end, just as rejecting the Lord of Angmar might bring his wrath down upon us. I could even attempt to keep the Rings for myself, though he is not a master who suffers betrayal lightly.\n\nShould we betray our kin for the sake of power, or risk the fury of the Witch-King? The emissary awaits our reply."
 skorgrim_dourhand.0102.a: "The deal is struck. Inform the Witch-King that I agree to the pact."
 skorgrim_dourhand.0102.b: "This is a foul offer. I must inform Dwálin V."
 skorgrim_dourhand.0102.b.effects: "#V You#!, #V [skorgrim_dourhand.GetFirstName]#!, will travel to [GetTitleByKey('c_manakhrrukul').GetNameNoTier]."

 skorgrim_dourhand.0103.t: "A Warning To Dwálin V"
 skorgrim_dourhand.0103.desc: "The cold winds of [angmar|E] followed me from the ruins of [nogrod|E]. My mind is a storm of shadows, haunted by the Witch-king's hollow promise of unrivaled power and the restoration of my people. It was a gift I could not accept, for the cost was the betrayal of my liege and [dwarffather|E], [dwalin_V.GetNameRegnal].\n\nI stand now in the grand hall of [GetTitleByKey('c_manakhrrukul').GetNameNoTier], my breath coming in ragged gasps as the court looks on with pity. The words tumble out in a frantic rush; I tell Dwálin of the dark pact and the shadow that now seeks the [Concept('sevenringsofdwarves', 'Ring of the Broadbeams')|E].\n\nAs I speak, the Ring upon his hand shimmers with an icy brilliance, as if it knows it has been marked. "My lord, he will come for the Ring! You must act now!" I cry, my terror finally breaking through. A heavy silence falls over the hall; the secret is out, and our safety has vanished with it."
 skorgrim_dourhand.0103.a: "I have done my duty. Dwálin will know what to do."
 skorgrim_dourhand.0103.a.tt: "Dwálin V will now contemplate his response to the threat of Angmar"

 skorgrim_dourhand.0104.t: "A Warning From Skorgrím"
 skorgrim_dourhand.0104.desc: "Since [skorgrim_dourhand.GetName] departed on his mission to rebuild [nogrod|E], the ancient home of the [firebeards|E], little word has reached my halls. Now, without prior summons, he has arrived at my court requesting an urgent audience, claiming he bears information of the utmost importance.\n\nHe appears deeply shaken. After several frantic, unintelligible mutterings, he finally finds his voice. He recounts a harrowing tale: days ago, an emissary from [angmar|E] arrived with a dark proposal. The [witchkingshort|E] offered him unrivaled power in exchange for the betrayal of his kin and the delivery of the [Concept('sevenringsofdwarves', 'Ring of the Broadbeams')|E]. As he speaks, I glance down at the heirloom that has graced the hands of my ancestors for generations. The Ring seems to shimmer with a sudden, cold light, as if sensing the shadow of its pursuer.\n\n"My lord, he will come for the Ring! You must act now!" Skorgrím cries, his voice thick with dread. A heavy silence falls over the throne room as the weight of his warning sinks in."
 skorgrim_dourhand.0104.a: "The Witch-King shall never lay hands upon it!"
 skorgrim_dourhand.0104.b: "Peace, Skorgrím. We are safe within these halls."

 skorgrim_dourhand.0105.t: "A Reward For Loyalty"
 skorgrim_dourhand.0105.desc: "The echo of [skorgrim_dourhand.GetFirstName]'s warning still rings through the vault of my throne room. It is no secret that he hungers for prestige, yet he has chosen to bring this shadow to light rather than seize the dark power offered to him. By rejecting the [witchkingshort|E]'s gilded trap, he may have saved a priceless heirloom of the [broadbeams|E] and perhaps even the very lives of my kin.\n\nSuch a deed cannot go unremarked. If I am to keep him from the shadow's reach, I must offer him a purpose that rivals the lies of [angmar|E]. Shall I provide the coin to see his dreams of a restored [nogrod|E] realised, or bind our fates together in a more formal accord?"
 skorgrim_dourhand.0105.a: "I shall fund the restoration of Nogrod."
 skorgrim_dourhand.0105.b: "We shall stand together against the shadow."
 skorgrim_alliance_effect_tooltip: "You enter a defensive alliance with [skorgrim_dourhand.GetName]"
 skorgrim_dourhand.0105.c: "He has earned my favour and my future support."
 skorgrim_dourhand.0105.d: "The safety of our people is reward enough."

 skorgrim_dourhand.0106.t: "A King's Gratitude"
 skorgrim_dourhand.0106.desc: "After hearing my report, [dwalin_V.GetNameRegnal] has acknowledged the threat posed by the [witchkingshort|E]. He understands that I chose to bring this information to him rather than accept the power and immortality promised by the messenger from [angmar|E]. In doing so, I have prioritised my standing here in the [bluemountains|E] over a dangerous and uncertain pact.\n\nThe King has announced to the court that my actions deserve a practical reward. By offering his formal support to my cause, he has validated my position and provided the resources I need to continue my work. It is a tangible gain that carries far more weight in these halls than the empty promises of a sorcerer."
 skorgrim_dourhand.0106.a: "This is only the beginning of my restoration."

 skorgrim_dourhand.0107.t: "Preparing The Strike"
 skorgrim_dourhand.0107.desc: "The pact with the [witchkingshort|E] is signed. Now comes the dangerous task of actually delivering the Rings. I must decide which of the two Kings to target first: my own liege, [dwalin_V.GetNameRegnal], or the younger [GetScriptedCharacterByHistoryID('lineofuri67').GetNameRegnal] of the [firebeards|E].\n\nDwálin is the most logical choice for a swift strike simply because I am already within his court; proximity gives me opportunities that distance does not. However, moving against my own liege is a massive risk. On the other hand, the Firebeard King is far less experienced and likely more susceptible to deception, though his halls are further away.\n\nI cannot afford to hesitate. The Witch-King does not tolerate failure, and if I do not produce at least one of the [Concept('sevenringsofdwarves', 'Seven')|E] soon, his wrath will be the end of me. Which King shall be the first to lose their prized heirloom?"
 skorgrim_dourhand.0107.a: "Focus on [dwalin_V.GetFirstNameRegnal]. He is close, and I know his halls well."
 skorgrim_dourhand.0107.b: "Target [fror_II.GetFirstNameRegnal]. His inexperience is his undoing."
 skorgrim_broadbeam_choice_of_plan: "You will begin planning the theft of the [Concept('sevenringsofdwarves', 'Ring of the Broadbeams')|E] from your liege"
 skorgrim_firebeard_choice_of_plan: "You will begin planning the theft of the [Concept('sevenringsofdwarves', 'Ring of the Firebeards')|E] from the Firebeards"

 skorgrim_dourhand.0108.t: "Method of Acquisition"
 skorgrim_dourhand.0108.desc: "I have identified my target, but the method of seizure remains. I must decide how to pry the [Concept('sevenringsofdwarves', 'Seven')|E] from their finger.\n\nThe first option is a diplomatic ambush. I can invite the King to a private council under the pretext of discussing the restoration of [nogrod|E]. Once he is separated from his main guard, my men will seize him and take the Ring by force. It is quiet and efficient, provided the trap isn't suspected.\n\nAlternatively, I can take the Ring by conquest. Declaring open war is far riskier and more costly, but it allows me to demonstrate my military strength and claim the prize through right of conquest. There will be no questions of 'treachery' when the Ring is taken from a fallen foe."
 skorgrim_dourhand.0108.a: "Lure them into a trap with a 'meeting'."
 skorgrim_dourhand.0108.b: "I will take it by force. Prepare for war."
 skorgrim_dourhand_meeting: "You will unlock a [decision|E] to stage a treacherous ambush when Hosting them as an Honored Guest"
 skorgrim_dourhand_war: "You will unlock a [decision|E] to declare an Artifact War for the Ring of Power"