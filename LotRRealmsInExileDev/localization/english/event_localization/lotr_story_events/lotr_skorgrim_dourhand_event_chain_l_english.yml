l_english:

 skorgrim_dourhand.0100.t: "The Words of the Watcher"
 skorgrim_dourhand.0100.desc: "Within the bounds of [GetTitleByKey('c_zillinakhur').GetNameNoTier], news reaches me of a crumbling scroll discovered among the ruins of an ancient library. Its surface is cracked and dim with age, yet the runes are still legible. Written upon it is the account of [khathza_the_watcher.GetFirstNameNicknamed]. It describes the wrath of [king|E] [naugladur.GetFirstName] of the [firebeards|E] following the betrayal of [elu_thingol|E] of [GetTitleByKey('k_doriath').GetNameNoTier] after the reshaping of the [nauglamir|E] by [dwarven|E] craftsmen to hold a [silmaril|E]. Khathzâ recounts his role as an envoy to [elu_thingol.GetFirstName] and one of only two Dwarves to survive the treachery.\n\nAfter returning to [nogrod|E], Khathzâ went on to teach all who would listen the ways of the [GetFaithByKey('faith_firebeards').GetAdherentNamePlural], declaring that those who rely on the judgment of others are destined to fail.\n\nHis words strike deep. The treachery he endured feels little different from the ridicule I suffer, dismissed, restrained, and left to falter while my liege looks on. Perhaps I was meant to hear this tale, to remember, as Khathzâ taught, that the memory of past betrayals is the only safeguard against future ones."
 skorgrim_dourhand.0100.a: "He spoke truth — I will heed his words."
 skorgrim_dourhand.0100.b: "Old grudges lead only to ruin."

 skorgrim_dourhand.0101.t: "An interesting pact"
 skorgrim_dourhand.0101.desc: "WIP"
 skorgrim_dourhand.0101.a: "Send the offer"
 skorgrim_dourhand.0101.b: "It's not worthy"

 skorgrim_dourhand.0102.t: "A Dark Offer"
 skorgrim_dourhand.0102.desc: "An emissary from [angmar|E] has just arrived with a letter signed by the [witchkingshort|E]! The messenger states that it is a pact, and that I don't have to be worried about. However, something about this seems obscure.\n\nOnce I've read the letter, I figure out the reason of all of this. He promisses immortality and riches in exchange for both the rings of [broadbeams|E] and [firebeards|E].\n\nWhile the pact may be an oportunity to rebuild Nogrod, this plan could end badly if I accept the deal but don't get both rings, just as it could if I reject it, since doing business with the Witch-King might not be the best option. I could even keep the Rings for myself, but he won't be happy... \n\nShould we betray our kin for power, or face the rage of the [witchkingshort|E]? The emissary awaits our reply."
 skorgrim_dourhand.0102.a: "Proceed with the plan"
 skorgrim_dourhand.0102.b: "This has gone too far. Let's warn Dwálin V"

 skorgrim_dourhand.0104.t: "A warning from Skorgrim"
 skorgrim_dourhand.0104.desc: "After Skorgrim went on his mission to rebuild Nogrod, the ancient home of the [firebeards|E], little was known about him. but today he has requested an audience with me, claiming that he has important information.\n\nHe seems very nervous, and after a few seconds, he finally says something understandable. He claims that a few days ago an emissary from Angmar came with an offer: to betray his clan in exchange for power, specifically to obtain Ring of the Broadbeams.\n\nAt that moment, I look at my hand and see the ring that for generations has been the Broadbeams' heirloom, now shining, as if he wanted to tell me something.\n\n"My lord, he will come for the ring, you must act now!" - he said with fear. A moment of silence came shortly after that."
 skorgrim_dourhand.0104.a: "The Witch-King won't have the ring!"
 skorgrim_dourhand.0104.b: "We are safe here, my friend"