l_english:
 lotr_war_declared_flavor.valinor_invasion: "The cries of the oppressed have reached the Undying Lands, and the Valar have turned their gaze back to Middle-earth. I am Eönwë, Herald of the Elder King, and I lead the Host of the West to cast down your shadow! Your reign of darkness ends now, for the light of Valinor shall endure no further insolence!"
 lotr_war_declared_flavor.pharazon_invasion: "Did you think the Golden King was a mere memory? I have returned from the depths of time to reclaim the dominion that is rightfully mine! Your 'peace' is but a stay of execution. I shall build a throne of gold upon the ruins of your soft laws and show this world what a true master looks like!"
 lotr_war_declared_flavor.amav_invasion: "The legends did not lie, though you were too foolish to heed them. I, Amav, have returned to walk these lands once more! I care nothing for your petty titles or your 'right' to rule. I am the storm of myth made flesh, and I have come to take what is mine by ancient right!"