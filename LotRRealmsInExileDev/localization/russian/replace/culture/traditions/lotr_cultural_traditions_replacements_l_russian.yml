 tradition_nubian_warrior_queens_name: "Королевы-воительницы"
 tradition_nubian_warrior_queens_desc: "$e_shayn$ и всё местное население хорошо помнят великих Королев-воительниц, которые некогда давали отпор захватчикам и создавали наше королевство. Возможно, наши соседи и полагаются на превосходство мужчин, но мы ведем род от матерей, и все эти чужеземные смельчаки разбегаются, едва заслышав боевой клич могучих женщин-$ambason$."

 tradition_mountaineer_ruralism_desc: "За долгие годы, что прошли пришествия [daen|E] в земли будущих [Concept( 'gondor', 'Гондора' )|E] и Харондора, представители этой культуры в совершенстве овладели умением перемещаться по пересеченной гористой местности и адаптировались к жизни в горах."

 culture_parameter_elephant_pens_building_bonuses: "Цепочки [Concept( 'buildings', 'зданий' )|E] #V $building_type_elephant_pens_01$#! И #V $building_type_mumakil_pen_01$#! предоставляют дополнительные бонусы [Concept( 'counties', 'графствам' )|E] этой [Concept( 'culture', 'культуры' )|E]"

 unlock_voluntary_laampdom_name: "[GetCultureTradition('tradition_swords_for_hire').GetName], [GetCultureTradition('tradition_horse_lords').GetName], [GetCultureTradition('tradition_ep3_audacious_cadets').GetName], [GetCultureTradition('tradition_caravaneers').GetName], [GetCultureTradition('tradition_diasporic').GetName], [GetCultureTradition('tradition_devoted_horsemanship').GetName], [GetCultureTradition('tradition_variag_horse_lords').GetName], [GetCultureTradition('tradition_dune_sea_nomads').GetName], [GetCultureTradition('tradition_warriors_of_rhun').GetName], [GetCultureTradition('tradition_roving_bands').GetName], [GetCultureTradition('tradition_wanderers_of_the_wild').GetName], [GetCultureTradition('tradition_ancient_wanderers').GetName], или [GetCultureTradition('tradition_fp1_coastal_warriors').GetName]; или [GetCulturePillar('heritage_orc').GetName] или [GetCulturePillar('heritage_goblin').GetName]"