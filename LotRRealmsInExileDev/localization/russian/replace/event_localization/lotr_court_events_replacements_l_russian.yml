 court.1000.desc.hashishiyah:0 "проводит дни, сидя на крыльце и покуривая [ROOT.Char.Custom('GetPipeWeedName')]." # LOTR
 
 
 court.8020.desc:0 "Занимаясь придворными делами, я слышу, как [Select_CString(couture_spouse.IsFemale, 'моя', 'мой' )] [couture_spouse.GetWifeHusband] [couture_spouse.GetTitledFirstName] кричит на удивление разгневанным тоном. Похоже, [couture_guest.GetTitledFirstName] [Select_CString(couture_guest.IsFemale, 'вывела', 'вывел' )] [couture_spouse.GetHerHis] из себя. \n\nПодойдя ближе, я слышу голос [Select_CString(couture_guest.IsFemale, 'моей гостьи', 'моего гостя' )], буквально источающий насмешку и самоуверенность: «Эта так называемая #EMP мода#! — просто позор. При любом уважаемом #EMP [couture_guest.GetCulture.GetCollectiveNounNoTooltip|l]ом#! дворе такое станут носить только слуги и дети».\n\n[Select_CString(couture_spouse.IsFemale, 'Моя', 'Мой' )] [couture_spouse.GetWifeHusband] краснеет и кричит в ответ: «С меня #EMP хватит#!, хоть вас и [Select_CString(ROOT.Char.IsFemale, 'пригласила', 'пригласил' )] [ROOT.Char.GetTitleAsNameNoTooltip|l]!» — чему немало удивляется [couture_guest.GetFirstNameNoTooltip]. \n\nОтведя меня в сторону, [couture_spouse.GetFirstNameNoTooltip] жалуется: «[Select_CString(couture_guest.IsFemale, 'Эта неблагодарная', 'Этот неблагодарный' )] [couture_guest.Custom2('InsultNoun', SCOPE.sC('couture_spouse'))] постоянно над нами насмехается. Вчера мои слуги услышали, как [Select_CString(couture_guest.IsFemale, 'она назвала', 'он назвал' )] нас #EMP пережитками прошлого!#!»"
 court.8020.d:0 "Пережитки прошлого? #EMP ПЕРЕЖИТКИ ПРОШЛОГО?!#!"
 
  #A Massive Problem
 hold_court.6230.t:0 "#EMP Гигантская#! проблема"
 hold_court.6230.desc:0 "«Ми[ROOT.Char.GetLadyLord], минутку вашего внимания, если позволите...» — говорит [6230_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U]. «[6230_province.GetName] страдает от весьма и весьма #EMP крупной#! проблемы вот уже несколько недель...»\n\n«Понимаете, #EMP совершенно сошедшее с ума#! стадо мумакил разбушевалось в регионе, оставляя за собой лишь разрушение и, нередко, смерть! Угрожающее трубление звучит и днём и ночью – я слышу его даже сейчас!» [6230_vassal.GetSheHe] пытается нелицеприятным образом имитировать эти #EMP оглушающие звуки#!. «Прошу вас, ми[ROOT.Char.GetLadyLord], отправьте кого-нибудь на помощь!»"
 hold_court.6230.a:0 "Возьмите немного золота на восстановление."
 hold_court.6230.b:0 "Я отправлю кого нибудь, чтобы остановить чудовищ."
 hold_court.6230.b.success:0 "Ваши охотники ловят диких Мумакил"
 hold_court.6230.b.success.tt:0 "Домашние Мумакил"
 hold_court.6230.b.failure:0 "Мумакил продолжают своё разрушительное шествие"
 hold_court.6230.b.failure.tt:0 "Мумакил в ярости"
 hold_court.6230.c:0 "Мумакил, кони — всё одно... [m_horse.GetFirstNameNoTooltip], разберись уже!"
 hold_court.6230.c.success:0 "Ваш $master_of_horse_court_position$ ловит Мумакил"
 hold_court.6230.d:0 "Вас точно направляет $hinduism_good_god_ganesh$."
 hold_court.6230.e:0 "У меня нет времени на эту чушь."
 hold_court.6230.f:0 "Убить всех гадких тварей."