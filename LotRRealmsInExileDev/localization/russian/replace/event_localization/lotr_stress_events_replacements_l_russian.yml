 fogging_hard_memories_modifier:0 "Густое облако дыма" # LOTR
 fogging_hard_memories_modifier_desc:0 "Этого персонажа постоянно окружает густое облако дыма, источник которого – [CHARACTER.Custom('GetPipeWeedName')]." # LOTR
 tragic_stoner_modifier:0 "Хронический кашель" # LOTR
 tragic_stoner_modifier_desc:0 "[CHARACTER.Custom('GetPipeWeedName')] оседает в лёгких этого персонажа из-за регулярного курения, вызываю регулярные приступы кашля." # LOTR
 stress_threshold_special.1001.hashishiyah:0 "Никак не могу отделаться от этой боли. Нужно чем-то её заглушить..." # LOTR
 stress_trait_ongoing.0506.desc:0 "\n\n[ROOT.Char.Custom('GetPipeWeedName')] поможет хотя бы на время облегчить боль. Вопрос лишь в том, покурить мне в одиночестве, или обзавестись приятной компанией. [medication_friend.GetTitledFirstName] [Select_CString(medication_friend.IsFemale, 'спрашивала', 'спрашивал' )] не нужно ли мне сегодня дружеское плечо..." # LOTR
 hashish_alone_modifier:0 "Курение в одиночестве" # LOTR
 hashish_alone_modifier_desc:0 "Этот персонаж курит [ROOT.Char.Custom('GetPipeWeedName')] в больших количествах и так справляется с болью. За персонажем всегда тянется облако дыма." # LOTR
 hashish_with_friend_modifier:0 "Курение в компании" # LOTR
 hashish_with_friend_modifier_desc:0 "Этот персонаж вечерами курит [ROOT.Char.Custom('GetPipeWeedName')] в компании хорошего друга. Вместе они постоянно пускают кольца дыма." # LOTR
 stress_trait_ongoing.0511.a_flavour:0 "Вы выбрасываете трубку и мешочек с травами" # LOTR
 stress_trait_ongoing.0511.b_flavour:0 "Когда вы остаётесь наедине, вы вновь спокойно зажигаете трубку." # LOTR
 stress_trait_ongoing_0516.desc:0 "«—и вот почему эта встреча так важна».\n\nВстреча? Ах, да, точно, [important_guest.GetTitledFirstName], встреча. По поводу... Чего-то там. О чём мы #EMP вообще#! говорили? [important_guest.GetSheHe|U] судя по виду [Select_CString(important_guest.IsFemale, 'настроена', 'настроен' )] серьёзно, о чём бы ни была речь.\n\nЯ тянусь за трубкой, затягиваюсь плотным дымом и выдуваю очередное дымное кольцо. [important_guest.GetFirstNameNoTooltip] с недоумением пережидает затянувшуюся паузу и мне становится очевидно, что мне следует уделять больше внимания нашей беседе." # LOTR
 stress_trait_ongoing.0516.a.tt_fail:0 "Ваши постоянные отвлечения становятся причиной обиды" # LOTR
 stress_trait_ongoing.0516.c:0 "Расслабьтесь, [important_guest.GetFirstNameNoTooltip]. Возьмите вот, лучше, трубочку!" # LOTR
 stress_trait_ongoing.0516.c_flavour:0 "Вы достаёте [ROOT.Char.Custom('GetPipeWeedName')] из мешочка и готовы поделиться" # LOTR