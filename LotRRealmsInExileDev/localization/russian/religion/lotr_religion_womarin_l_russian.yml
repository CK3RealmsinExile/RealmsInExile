l_russian: 
 womarin_religion: "Утумкодурск"
 womarin_religion_adj: "Утумкодур"
 womarin_religion_desc: "Поклонение владыкам драконов дальнего востока уходит корнями в почитание Золотой Матери Небес (соэласи: Утумкодур) и её возможных детей и прочих потомков. Адепты этих верований не пытались утвердить божественный мандат на сотворение мира, но вместо этого описывали Утумкодур как божественную прародительницу и защитницу народа вомо. Утумкодур со своей стороны не возражала против роли божественного защитника, считая, что любовь и почитание её «детей» не менее ценно, чем золото и драгоценные камни. В то же время, она отличалась некоторой ревнивостью."
 womarin_religion_adherent: "Утумкодурист"
 womarin_religion_adherent_plural: "Утумкодири"
 
 ### Vulmaw ### 
 faith_nlkum_kadir: "Кадирск"
 faith_nlkum_kadir_adj: "Вольница Нлкум Кадира"
 faith_nlkum_kadir_adherent: "Последователь Кадира"
 faith_nlkum_kadir_adherent_plural: "Освобождённые Кадира"
 faith_nlkum_kadir_desc: "Среди пиратов Крайнего Юга нередко говорят об учениях двух драконов: «Нлкума», позолоченного солнечного дракона и «Кадира» морского дракона свободы, которые научили кадири жить вдали от организованного общества. Драконы направили народ в великое путешествие из земель их прежних поработителей.\n\nОсвобождённые Кадира следуют учениям, что передал им великодушный морской дракон. Они грабят тех, кого хотят, и отдают богатство тем, кому хотят. Они противятся любым попыткам ограничить свободу и продолжают свой вольный путь. Но самые мудрые из них не забывают и поучений более жёсткого Нлкума, ведь только помня о порядке кадири могут контролировать свой флот и вместе противостоять тем, кто жаждет их подчинить."
 
 