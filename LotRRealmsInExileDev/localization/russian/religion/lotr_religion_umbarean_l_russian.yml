l_russian: 
 umbarean_religion: "Умбарск"
 umbarean_religion_adj: "Умбарцы"
 umbarean_religion_desc: "Умбарцы почитают широкий спектр богов, святых и героев, которые столь же разнообразы, сколь и наследие самого народа. Их традиции и ритуалы уходят корнями в верования харадрим, гондорцев и чёрных нуменорцев."
 umbarean_religion_adherent: "Умбарец"
 umbarean_religion_adherent_plural: "Умбарцы"

 ### ACTIVE FAITHS ###

 # Cassimiri King's Men
 faith_kings_men_castamir: "Новокоролевск"
 faith_kings_men_castamir_adj: "Люди Короля"
 faith_kings_men_castamir_adherent: "Человек Короля"
 faith_kings_men_castamir_adherent_plural: "Люди Короля"
 faith_kings_men_castamir_desc: "Новые [kingsmen|E] — одна из самых необычайных групп, возникших в [Concept( 'umbar', 'Умбаре' )|E] после ухода [Concept( 'gondor', 'Гондора' )|E]. Новые Люди Короля появились в конце [Concept( 'thirdage', 'Третьей Эпохи' )|E], когда династия Кассимири установила контроль над городом Умбар.\n\nНовые Люди Короля являют собой смешение [Concept( 'numenorean', 'нуменорской' )|E] религиозной структуры в том виде, в которой её интерпретировали [dunedain|E] и [Concept( 'adunaic', 'адунай' )|E], а также местных культов [haradrim|El]. This unique blend means that in Umbar, a priest-king rules over all, and to challenge him is heresy, as he is the interpreter of the divine and the conduit of their power. This also allows for the kings to easily shift the religion to reflect either its more Númenórean or Haradrim facets to appease whichever subjects are the most riotous, giving the religion great and well needed flexibility."

 # Corsairs
 faith_corsair: "Azrîyamanoi Creed" # The Spirits of the Sea
 faith_corsair_adj: "Azrîyamanoi"
 faith_corsair_adherent: "Azrîyala"
 faith_corsair_adherent_plural: "Azrîyalai"
 faith_corsair_old: "Old Azrîyamanoi Creed"
 faith_corsair_old_adj: "Old Azrîyamanoi"
 faith_corsair_old_adherent: "Old Azrîyala"
 faith_corsair_old_adherent_plural: "Old Azrîyalai"
 faith_corsair_desc: "Среди суеверных моряков побережья Умбара ходит поверье о двух могучих духах великого моря, известное как Азрийаманой. Малициам — повелитель глубин. Суровый повелитель, капризный и своевольный. Может показаться, что его действия хаотичны: в одну минуту он ваш дорогой друг, а в другую — ваш злейший враг. Его супруга Юнинэз, повелительница тихих вод, является силой, сдерживающей его темперамент, но по сути остается духом более слабым. Именно к ней обращаются моряки, делая свои подношения, а корсары традиционно оборудуют корабли святилищами, посвященными обоим великим духам: Малициаму и Юнинэз.\n\nСамо верование местных нуменорцев (а в последствии Черных нуменорцев и дунэдайн) происходит из искаженного слияния страха харадрим перед богом моря (Малициамом) и нуменорского поклонения Майар, Улмо, Оссэ и Уинен."

 # Mardrukan Batan an-Izindi–Haradrim Mix
 faith_kolir: "Veneration of the Kôlir"
 faith_kolir_adj: "Kôlirî"
 faith_kolir_adherent: "Kôliran"
 faith_kolir_adherent_plural: "Kôlirai"
 faith_kolir_desc: "The Veneration of the [kolirgods|E] is a strange faith which arose in Mardrûak during the chaos of the later Third Age, arising as a mix between the folkloric worship of the Haradrim and the [bellakari|E] [Glossary('Batân an-Izindi','batan_an_izindi_gloss')], which gained popularity amongst the Bellakarean Adûnai remnants of Mardrûak following the retreat of authority.\n\nThe Kôlirî worship a pantheon of deities known as the Kôlir, who have inhabited the world since the beginning and live in the [uttermostwest|E]. From time to time they come among men, and their lives and deeds shape the course of history. These are worthy of praise and emulation."

 # Castamir's Exiles
 faith_castamiri_creed: "Creed of Castamir" 
 faith_castamiri_creed_adj: "Castamiri"
 faith_castamiri_creed_adherent: "Royalist"
 faith_castamiri_creed_adherent_plural: "Royalists"
 faith_castamiri_creed_desc: "Arising out of their long exile, the Castamiri Creed was developed by the dynasty of the same name. Pulling upon ancient Numenorean traditions of divine kingship, they incorporated many traditions and ceremonies from their indigenous Haradron subjects. The creed is simple, yet quite effictive as a result. The King, descended from the Gods and Heroes of Old, is their intermediary, crowned by them and entrusted with rule over the world of mortals in their stead. To challenge the rightful king was heresy, and to aid him was righteousness.\n\nThe followers of the Creed claim continuity with the ancient traditions of Numenor and of pre-kinstrife Gondor, but their syncretism with native Haradron traditions has resulted in many viewing such claims with skepticism."

 ### NON-ACTIVE FAITH ###
 faith_creed_of_men: "Zâur an-Anî" #Juke note: Check Bellakar source doc. Someone originally wrote this loc as a melkor cult, but I think we can reflavor it into a mixed haradrim-adunaic faith with very little melkoric influence in Umbar ~TA 1000
 faith_creed_of_men_adj: "Zâur an-Anî"
 faith_creed_of_men_adherent: "Анис"
 faith_creed_of_men_adherent_plural: "Anîhin"
 faith_creed_of_men_desc: creed_of_man_desc:0 "В самых мрачных уголках старой империи Нуменора продолжает ходить легенда. Согласно ей, человечеству, на его рассвете, угрожал уничтожением Пожиратель, но Тёмный Властелин пришёл на выручку и научил их, как пленить Пожирателя, подчинив его своей воле. Тёмным Властелином был ни кто иной как Мулкхэр, получивший новое имя благодаря аруванай. But though the Ârûwanâi had worshipped Him, they had failed. \n\nThe Nunazhme taught that the Poganin (Heathens/Unworthy, the Númenóreans) were corrupters of Men, and that through their own hubris they had destroyed themselves. Though right to acknowledge the Lord of the Dark, they had been led astray by their craven fear of Death, the Fate of Men, to make war on the [valargods|E]. [sauroncharacter|E], the Nunazhme believed, had set this temptation before the Poganin to test their worthiness. They failed the test. Они не прошли проверку.\n\nТеперь же защитники Заур ан-Ани проповедуют изменение мира. Близится заключительная битва, в которую истинно верующие докажут свою приверженность Тёмного Властелину и вновь воздвигнут его пришедшие в упадок храмы."
