l_russian:
  # The Long Winter
  bm_2754_rohan:  "Война Рохиррим"
  bm_2754_rohan_desc:  "Близится час разрушения. На севере Хельм Молоторукий, владыка Риддермарка, созывает совет, который может радикально изменить облик Рохана и привести к его печальному концу. Но сейчас рохиррим не смогут обратиться за помощью к своему самому надёжному союзнику.\n\nНа юге легионы харадрим и флоты корсаров тренируются с невиданной прежде решимостью. Они мечтают разорить богатые предместья Южного королевства, а значит Берену из Гондора предстоит подготовить свою державу и встретить эту угрозу. Но никто из них не ведает, что грядёт Долгая Зима. Жителям севера она не сулит ничего кроме боли и страданий.\n\nСмогут ли Гондор и Рохан выстоять перед натиском, или удача в конечном счёте отвернётся от Свободных народов?"

  bookmark_long_winter_freca:  "Лорд Фрека"
  bookmark_long_winter_freca_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_freca_desc:  "Фрека, владыка Западного Крома и Адорна сочетает в себе черты нескольких народов. Хотя родословную Фреки и можно отследить к Фреавине, королю [Concept( 'rohan', 'Рохана' )|E], он также находится в родстве с [Concept( 'dunlendings', 'дунландцами' )|E], с которыми [rohirrim|E] долгое время враждовали. Несмотря на то, что теоретически он является прямым вассалом короля Хельма, он уже давно не подчиняется королевским указам и призывам своего законного повелителя. Фрека не только разбогател, но и собрался с силами. \n\nКороль Хельм не молодеет, а наследник Фреки находится в самом расцвете сил. Так рождается заговор. У Хельма есть незамужняя дочь и он, конечно же, не откажется от предложенной Фрекой помощи..."

  bookmark_long_winter_wulf:  "Вульф"
  bookmark_long_winter_wulf_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_wulf_desc:  "Сын Фреки, Вульф — наследник богатой и могущественной державы, что раскинулась меж мирами [rohirrim|E] и  [Concept( 'dunlendings', 'дунландцев' )|E]."

  bookmark_long_winter_targg:  "Таргг"

  bookmark_long_winter_helm_hammerhand:  "Хельм «Молоторукий»"
  bookmark_long_winter_helm_hammerhand_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_helm_hammerhand_desc:  "Девятый король дома Эорла, Хельм, уже к пятнадцати годам доказал, что он — сильный правитель [rohirrim|E]. Прошло немало времени с ухода его деда, Деора, а стычки с [Concept( 'dunlendings', 'дунландцами' )|E] на западных границах только усилились. His vassals there are stretched thin, or of... questionable loyalty.\n\nAs is his custom, Helm now prepares to call another council of his vassals, to discuss the affairs of the realm. Yet this council shall prove fateful for Helm and all his children..."

  bookmark_long_winter_bountig:  "Боунтиг Медлокан"
  bookmark_long_winter_bountig_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_bountig_desc:  "Bountig Medlókan is one among a sea of many who eke out a living upon the windswept steppes of [rhun|E]. Born into low circumstance and cast to the winds by tragedy, the young Bountig now is a sellsword. He has heard word of a great raid to the west against [rohan|E], one which promises much wealth and glory to those who take the risk. Yet though he may seem an indigent mercenary, Bountig's resilience is matched by his will and vision. Beyond this petty war, there is more for him. He knows it.\n\nCan Bountig unite the squabbling tribes and clans of [rhun|E] and build a new realm to rival the splendour of [gondor|E] and Haradwaith, or shall he be another footnote in the tale of the Great Steppe?"

  # bookmark_long_winter_beren_alt_beregond:  "Капитан Берегонд"
  # bookmark_long_winter_beren_alt_beregond_desc:  "TEMP - Не готово"
  bookmark_long_winter_beren_of_gondor:  "Наместник Берен"
  bookmark_long_winter_beren_of_gondor_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_beren_of_gondor_desc:  "Beren son of Egalmoth, Lord and Steward of [gondor|E], rules with diligence and honor. He is not a man of great stature nor valor, nor is he skilled in arms, nor is his personality fiery and impudent. Yet Beren is a man who serves his people and subjects with honor, and whether he knows it or not, he shall face a mighty trial. In the south, the [haradrim|E] under the rising realm of Harwan prepare to wage war against the [southernkingdom|E] by land and sea, and in this they are aided by their [Concept('umbar','corsair')|E] vassals. This shall define the reign of Beren son of Egalmoth, and the diligence of his character.\n\nCan Beren hold off the Haradrim and corsair forces, or shall Harondor at last be wrested from Gondor's control?"

  bookmark_long_winter_witchking:  "Моргульский владыка"
  bookmark_long_winter_witchking_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_witchking_desc:  "[mordor|E] is being readied. The [witchkingshort|E] of [angmar|E], Lord of the [Concept('ninenazgul','Nine')|E], chief lieutenant and captain of [sauroncharacter|E], prepares the land for his arrival. Already he has done much; the barren wastelands of the north are under the control of the [nazgul|E], and the [Concept('nurn','Núrniags')|E] with their vast slave-populated fields feed the armies of Mordor. But there is still work to be done, both within and without, if the Black Tower is to rise once more.\n\nWill the Witch-King prepare Mordor for the [darklord|E]'s ultimate return, or will he be thwarted in his effort?"
  
  bookmark_long_winter_umbar:  "Лорд Арунару"
  bookmark_long_winter_umbar_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_umbar_desc:  "A fleet long prepared sits in anchor. Arûnarû, loyal servant of Hûssammâkir of Harwan, lord of [umbar|E], readies for a mighty war. His liege, ruler of the mightiest empire of the [haradrim|E] in many generations, prepares to unleash an assault  upon [gondor|E] to retake the contested land of Harondor. While Hûssammâkir invades from the south, Ârunarû shall take to the seas, aiming to bleed the coasts of the [southkingdom|E] dry.\n\nWill Arûnarû be able to claim the riches of Gondor for himself, or shall he be driven back into the sea?"
  
  bookmark_long_winter_harwan:  "Чак Таскрал Хуссаммакир"
  bookmark_long_winter_harwan_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_harwan_desc:  "Hûssammâkir of the House of Ayerrikä, Taskral of Harwan, is the most powerful of all the lords of [nearharad|E]. The scion of mighty men who forged a new [haradrim|E] empire, Hûssammâkir now rules at an apogee. Yet he does not sit idle. Harondor still belongs to hated [gondor|E], and for many years the Haradrim have planned to assail their northern enemy by land and sea alike. Armies have been raised, fleets prepared.\n\nShall Hûssammâkir be able to wrest Harondor from the [southkingdom|E], or shall he fall at the last hurdle?"

  bm_2754_north: "Замерзший Север"
  bm_2754_north_desc: "As the south prepares for war, the northern lands shelter against the coming chill. In Eriador, the Rangers of the North continue their long watch, harried by the rising Orcs of the Misty Mountains. Among them is Azog, a warchief with the potential to unite the squabbling tribes and bring darkness upon the north. \n\nThe Dwarves of Erebor, recently driven from the Grey Mountains by their long wars with the dragons, have found great prosperity in their home at the Lonely Mountain. However, a threat looms over the northern horizon, threating to once again deprive Durin's Folk of all their new-found riches.\n\nAs the winter arrives, only trials are on the winds for the peoples of the North."

  bookmark_long_winter_azog_of_moria:  "Азог из Мории"
  bookmark_long_winter_azog_of_moria_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_azog_of_moria_desc:  "#TOLKIENQUOTE: “'I wrote it! I killed him! I am the master!' Then Nár turned the head and saw branded on the brow in Dwarf-runes so that he could read it the name AZOG.”#!\n\nLong have the squabbling bands and tribes of the [mistymountains|E] been disarrayed, ever at war, for that is the nature of [orcs|E] - to fight until a great power unites them.\n\nBut now a new chieftain, Azog, fresh and hale and full of guile, has come to rule [moria|E], greatest of all the mansions of the [dwarves|E]. From this place, Azog readies his fighting-orcs, clad in steel and iron, for he has great ambitions.\n\nHis armies are growing, his sons are strong and hale. Soon, all the mountains shall bow at his feet. There is a new Power in the North, and his name is Azog!"

  bookmark_long_winter_arassuil:  "Chieftain Arassuil"
  bookmark_long_winter_arassuil_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_arassuil_desc:  "In the wilderness of [eriador|E], Chieftain Arassuil leads the [dunedainnorth|E] in the defence of the north against the growing threat of the [orcs|E] in the [mistymountains|E]. He is a hardy and humorless man, known for setting elaborate traps for any enemy that dares set foot into the lands that are under the protection of the Rangers.\n\nShackled by a duty to both keep [eriador|E] safe as well as the line of [isildur|E] unbroken, Chieftain Arassuil spends only very few days in the comforts of his home in the Angle of Mitheithel, instead tirelessly traversing the wilderness, tracking down evil wherever it may appear..."
  
  bookmark_long_winter_thror:  "Король Трор"
  bookmark_long_winter_thror_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
  bookmark_long_winter_thror_desc:  "Thrór, son of Dáin, son of Náin, King Under the Mountain, is among the richest rulers in all [middleearth|E]. Holder of the [arkenstone|E], Thrór only centuries prior led his people back to the lonely mountain of [erebor|E], and his friendship with the [northmen|E] of [dale|E] has brought prosperity beyond imagining to both parties. Yet Thrór's love of gold has grown strong, and foreboding whispers come from the North. \n\nThrór's father was slain by a [drake|E], and there are many that still reside in the [greymountains|E]. Shall Thrór succumb to the same fate?\n\n#N #font:TitleFont #size:20 @warning_icon! The Roads to Power DLC is required to play the story line!#!#!#!"