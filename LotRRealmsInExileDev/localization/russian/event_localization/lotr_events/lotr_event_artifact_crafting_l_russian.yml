 artifact_crafting.0001.t: "Создание артефакта для уничтожения драконов"
 artifact_crafting.0001.desc_intro: "Я стою во главе стола, передо мной чертежи, привезённые кузнецами из владения [county.GetNameNoTier].\nЧертежи, которые я [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал' )] подготовить, - жемчужина нашего арсенала, [Concept('artifact', 'артефакт')|E], убивающий драконов!\n\n"
 artifact_crafting.0001.desc_black_arrow: "Чёрная стрела!\nГоворят, что она невероятно лёгкая и невероятно острая. Кузнецы утверждают, что «она может пробить шкуру дракона, как бумагу!», хотя я надеюсь, что мне никогда не придётся проверять это утверждение, но всегда есть вероятность, что она понадобится."
 artifact_crafting.0001.desc_windlance: "Снаряд стреломёта!\nСнаряд стреломёта, великолепной баллисты, разработанной [Concept('longbeards', 'Длиннобородами')|E] и предназначенной для стрельбы мощными металлическими стрелами. Это идеальный инструмент для уничтожения атакующих драконов и защиты дома, всё, что для этого требуется, - это мощные металлические снаряды. Жемчужина моего арсенала и знак защиты моей державы."
 artifact_crafting.0001.a: "Приступим к приготовлениям!"
 artifact_crafting.0001.b: "Сейчас не время для этого."
 forged_slayer_artifact_cooldown: "Вы не сможете создать другой артефакт, убивающий драконов, в течение 20 лет"