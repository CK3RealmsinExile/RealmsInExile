 crafting_mechanic.0002.t: "Название и описание артефакта"
 crafting_mechanic.0002.a: "Гравировка артефакта"
 crafting_mechanic.tt: "Вы начинаете гравировку артефакта [custom_artifact.GetName]"

 crafting_mechanic.1001.t: "Запасы металлов"
 crafting_mechanic.1001.desc: "Я обдумываю план своего последнего ремесленного проекта, но мне не хватает нескольких важных ресурсов.\n\nПо слухам, [recipient.GetTitledFirstName] может обладать тем, что я ищу."
 crafting_mechanic.1001.mithril: "#U Митриль#! - за его легендарную прочность и легкость!"
 crafting_mechanic.1001.gold: "#U Золото#! - за неподвластную времени красоту и роскошь!"
 crafting_mechanic.1001.silver: "#U Серебро#! - за изящный блеск, подобный сиянию Луны!"
 crafting_mechanic.1001.lead: "#U Свинец#! - за его непоколебимую прочность и вес!"
 crafting_mechanic.1001.copper: "#U Медь#! - за ее яркую теплоту и простоватую элегантность!"
 crafting_mechanic.1001.tin: "#U Олово#! - за его скромное очарование и податливость!"
 crafting_mechanic.1001.iron: "#U Железо#! - за непоколебимую прочность и универсальность!"
 crafting_mechanic.1001.gems: "Я ищу драгоценные камни..."
 crafting_mechanic.1001.close: "Если подумать, то, возможно, и нет."

 crafting_mechanic.1002.t: "Запасы драгоценных камней"
 crafting_mechanic.1002.desc: "Я обдумываю план своего последнего ремесленного проекта, но мне не хватает нескольких важных ресурсов.\n\nПо слухам, [recipient.GetTitledFirstName] может обладать тем, что я ищу."
 crafting_mechanic.1002.diamond: "#U Бриллианты#! - за их редкость и бесподобный блеск!"
 crafting_mechanic.1002.ruby: "#U Рубины#! - за их яркую энергию и огненную красоту!"
 crafting_mechanic.1002.sapphire: "#U Сапфиры#! - за их безмятежную элегантность и благородство!"
 crafting_mechanic.1002.emerald: "#U Изумруды#! - за их зеленую красоту и неподвластное времени очарование!"
 crafting_mechanic.1002.amethyst: "#U Аметисты#! - для создания мистической ауры и успокаивающего присутствия!"
 crafting_mechanic.1002.onyx: "#U Оникс#! - за его темную силу и заземляющую природу!"
 crafting_mechanic.1002.peridot: "#U Хризолиты#! - за их веселый зеленый оттенок и природную утонченность!"
 crafting_mechanic.1002.quartz: "#U Кварц#! - за его прозрачность и разносторонние свойства!"
 crafting_mechanic.1002.elven_gems: "#U Эльфийские самоцветы#! - за их сияющий свет и красоту Первой эпохи!"
 crafting_mechanic.1002.metals: "На самом деле я ищу металлы..."
 crafting_mechanic.1002.close: "$crafting_mechanic.1001.close$"

