l_russian:

 ### Nazgûl Events ###

 ### Main Events ###
 nazgul.0001.t: "Тревожные слухи"
 nazgul.0001.desc: "[Select_CString(messenger.IsFemale, 'Моя советница', 'Мой советник' )] [messenger.GetTitledFirstName] приближается ко мне, на [messenger.GetHerHis] лице обеспокоенное хмурое выражение.\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetLadyLord], я [Select_CString(messenger.IsFemale, 'пришла', 'пришёл' )] с тревожными вестями. Ваши крестьяне говорят о тёмной тени, всаднике в чёрном, спрашивающем вас по имени. Я бы ничего об этом не [Select_CString(messenger.IsFemale, 'подумала', 'подумал' )], если бы не ужас всех свидетелей».\n\nЗвучит зловеще, но в данный момент я мало что могу сделать."
 nazgul.0001.a: "Воистину тревожные вести"

 nazgul.0002.t: "Убийство при дворе"
 nazgul.0002.desc: "В мой тронный зал вбегает [messenger.GetTitledFirstName|U], заметно [Select_CString(messenger.IsFemale, 'потрясённая', 'потрясённый' )].\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetLadyLord], убийство! В замке произошло убийство! [Select_CString(victim.IsFemale, 'Ваша', 'Ваш' )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))] [victim.GetTitledFirstName] [Select_CString(victim.IsFemale, 'найдена мёртвой', 'найден мёртвым' )] в луже крови, в [victim.GetHerHis] грудь вонзён странный кинжал. На [Select_CString(victim.IsFemale, 'ней', 'нём' )] была обнаружена зловещая записка».\n\nЗаписка глас: «#italic Вы забрали нечто крайне ценное для меня. Верните его или столкнётесь с последствиями#!»\n\nСледует ли мне вернуть Кольцо его предыдущему владельцу? Стоит признаться, что оно стало дорого и мне..."
 nazgul.0002.a: "Удвоить стражу! Не впускать посторонних без моего приказа!"
 nazgul.0002.b: "Кольцо моё! Пусть глашатаи бросят вызов этому чёрному всаднику."
 nazgul.002.b.tt: "Вы бросите вызов назгул за обладание Кольцом."
 nazgul.0002.c: "Наверное, безопаснее всего будет вернуть его, вопреки моему желанию."

 nazgul.0003.t: "[Select_CString(victim.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))|U] [Select_CString(victim.IsFemale, 'подверглась', 'подвергся' )] нападению"
 nazgul.0003.desc.intro: "В мой тронный зал вбегает [messenger.GetTitledFirstName|U], запыхавшись.\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetLadyLord], какая-то тёмная фигура прокралась мимо наших стражников! В наших стенах произошло новое нападение! [Select_CString(victim.IsFemale, 'Ваша', 'Ваш' )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('victim'))] [victim.GetTitledFirstName] "
 nazgul.0003.desc.black_breath: "[Select_CString(victim.IsFemale, 'была найдена раненой', 'был найден раненым' )] в своей собственной комнате, [victim.GetSheHe] говорит, что высокий незнакомец в чёрном напал на н[victim.GetHerHis], но нападавший был спугнут стражей. [victim.GetFirstNameNoTooltip], кажется, гораздо хуже, чем при встрече: [victim.GetSheHe] [Select_CString(victim.IsFemale, 'вся', 'весь' )] в крови и дрожит».\n\n"
 nazgul.0003.desc.death: "[Select_CString(victim.IsFemale, 'найдена мёртвой', 'найден мёртвым' )] в луже крови, в [victim.GetHerHis] грудь был вонзён такой же кинжал. На [Select_CString(victim.IsFemale, 'ней', 'нём' )] была обнаружена та же записка».\n\n"
 nazgul.0003.desc.end: "Этот проклятый призрак никогда не перестанет преследовать меня?"
 nazgul.0003.a: "Удвоить стражу! Не впускать посторонних без моего приказа!"
 nazgul.0003.b: "Кольцо моё! Пусть глашатаи бросят вызов этому чёрному всаднику"

 nazgul.0051.t: "Выстраивание Мордора"
 nazgul.0051.desc: "Годы идут, колёса великих замыслов Саурона приходят в движение, и приближается время великого похода на запад. В результате Саурон больше не может выделять силы для защиты Дол Гулдура, и Кхамулу придётся справляться своими силами — по крайней мере, на данный момент."
 nazgul.0051.a: "Я польщён вашим доверием, господин."
 nazgul.0051.a.tt: "Вы больше не будете [Concept( 'tributary', 'данником' )|E] Мордора"


 ### Personality Events
 nazgul.0101.t: "Они преследуют меня по пятам"
 nazgul.0101.desc: "Какое-то время я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )], что нахожусь в безопасности, но до меня продолжают доходить слухи о нападениях на крестьян в моих землях и о придворных, исчезающих по ночам из своих постелей. Я знаю, что слуги Темного Властелина ищут меня! Они не едят, они не спят, они не умрут, если заколоть их кинжалом, как я смогу когда-нибудь избавиться от этих проклятых преследователей?!\n\nКто работает с ними при моём дворе?"
 nazgul.0101.a: "Они все тайно работают на них! Все они!"

 nazgul.0102.t: "Боль повсюду"
 nazgul.0102.desc: "Я ненавижу это Кольцо так же сильно, как люблю его, я не могу поверить в цену, которую приходится платить за его силу. Оно мучает меня, я вижу его, когда закрываю глаза, ничто не может отвлечь меня от боли.\n\n[Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] ли я быть [Select_CString(ROOT.Char.IsFemale, 'одинока', 'одинок' )] в мучительной боли и горе? Чем я [Select_CString(ROOT.Char.IsFemale, 'заслужила', 'заслужил' )] это? Они все заслужили эту боль, которая так ​​мала по сравнению с теми мучениями, которые я испытываю ежедневно!"
 nazgul.0102.a: "Боль нужно разделить, иначе она станет невыносимой."

 nazgul.0103.t: "Моя воля - закон"
 nazgul.0103.desc: "Кольцо выбрало меня [Select_CString(ROOT.Char.IsFemale, 'своей носительницей', 'своим носителем' )], и не случайно оно нашло меня. Я [Select_CString(ROOT.Char.IsFemale, 'возвысилась', 'возвысился' )] над простыми смертными и заслуживаю их верности и уважения. Законы не должны применяться к высшим существам, они предназначены для низших людей.\n\nМоё желание отныне будет законом, нравится им это или нет!"
 nazgul.0103.a: "Они подчинятся или испытают мой гнев!"

 nazgul.0104.t: "Они все заплатят"
 nazgul.0104.desc: "Разве мало того, что я [Select_CString(ROOT.Char.IsFemale, 'вынуждена', 'вынужден' )] терпеть бесконечные мучения этого Кольца? А теперь ещё и придворные пренебрегают моими приказами. Как будто у меня хватит терпения на таких малодушных шутов!\n\nКаждое оскорбление, сказанное шёпотом, будет жестоко наказано, и я #bold добьюсь#! уважениях своих подданных!"
 nazgul.0104.a: "Моё терпение иссякло."

 nazgul.0105.t: "Ни минуты покоя"
 nazgul.0105.desc: "Какое-то время я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )], что нахожусь в безопасности, но до меня доходят слухи о нападениях на крестьян в моих землях и о придворных, исчезающих по ночам из своих постелей. Я знаю, что слуги Тёмного Властелина ищут меня! Они не едят, не спят, они не умрут, если заколоть их кинжалом, как же мне избавиться от этих проклятых преследователей?!\n\nПочему они не оставят меня в покое? Что я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )], чтобы заслужить это?"
 nazgul.0105.a: "Неужели они не могут оставить меня в покое?!"

 ### Duel Events
 nazgul.0202.t: "Победа!"
 nazgul.0202.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'выиграла', 'выиграл' )]! Не могу поверить, но я [Select_CString(ROOT.Char.IsFemale, 'победила', 'победил' )]! Я [Select_CString(ROOT.Char.IsFemale, 'победила', 'победил' )] [Concept( 'ringwraith', 'Кольценосца' )|E] и [Select_CString(ROOT.Char.IsFemale, 'отправила', 'отправил' )] его обратно в логово! Никто не сможет противостоять мне!\n\nНаконец-то я смогу спокойно наслаждаться щедротами своего Кольца."
 nazgul.0202.a: "Я [Select_CString(ROOT.Char.IsFemale, 'непобедима', 'непобедим' )]! Я никогда не умру!"

 nazgul.0203.t: "Поражение!"
 nazgul.0203.desc: "Вот и всё, я [Select_CString(ROOT.Char.IsFemale, 'проиграла', 'проиграл' )] в схватке с [nazgulcharacter|El]. Я сдаюсь и предлагаю ему Кольцо. Он протягивает свою призрачную руку, чтобы снять его с моего пальца, и, взяв его, вонзает свой клинок в моё сердце с последним прощанием: «Ты [Select_CString(ROOT.Char.IsFemale, 'осмелилась', 'осмелился' )] надеть то, что никогда не предназначалось для тебя. Теперь служи [Concept( 'sauronthedarklorcharacter', 'Саурону' )|E] как призрак целую вечность».\n\nЯ чувствую, как жизнь покидает моё тело, а мой дух привязывается к земле, отринув Чертоги [Concept( 'mandoscharacter', 'Мандоса' )|E]."
 nazgul.0203.a: "[Select_CString(ROOT.Char.IsFemale, 'Заслужила', 'Заслужил' )] ли я это?"

 ### Living without the Precious event

 nazgul.0300.t: "Моя Прелесть пропала"
 nazgul.0300.desc: "Я не могу есть, не могу спать, моё драгоценное Кольцо пропало навсегда.\n\nЯ скучаю по нему каждое мгновение, ничто больше не приносит мне радости. Еда кажется мне пеплом во рту, общество других отталкивает меня, а былые удовольствия теперь кажутся бессмысленными развлечениями. Я выполняю все движения, но моё сердце не в них.\n\nОно навсегда ушло вместе с моим сокровищем, моей любовью, моей #italic Прелестью#!!"
 nazgul.0300.a: "Они украли это у нас!"

 ### Nazgul getting a ring of power

 nazgul.0500.t: "Ценность"
 nazgul.0500.desc: "Я сжимаю в руке это кольцо, доставшееся мне с таким трудом, такое драгоценное. Его самоцветы сияют, золото переливается даже при отсутствии света. Что-то внутри меня шевелится и так же быстро исчезает. Я здесь не для того, чтобы смотреть на это или держать в своих чёрных руках: оно принадлежит Тёмному властелину. Это Его драгоценная и могущественная вещь, которую забрал Его раб."
 nazgul.0500.a: "Я подношу это вам, Властелин земли."
 nazgul.0500.b: "Тёмный властелин, я буду использовать это с умом во имя твоё."

 nazgul.0501.t: "Драгоценная безделушка"
 nazgul.0501.desc: "Мой слуга и раб, [nazgul.GetName], предстаёт передо мной в моём большом зале и кланяется. Из-под своих развевающихся чёрных одежд он достаёт кольцо, и даже в полумраке моего зала оно бледно поблескивает. Он кланяется и протягивает мне это, и я беру его.\n\n«У меня есть это для вас, мой повелитель, Властелин Земли, Властелин колец. Я всегда к вашим услугам, хозяин».\n\nЯ беру кольцо в руку, и в моей голове вспыхивают воспоминания о давних временах. Звон молотов Эрегиона, изломанное и истекающее кровью тело Келебримбора, лица людей, у которых теперь нет ни воли, ни желаний, кроме моих. Я смотрю на это кольцо."
 nazgul.0501.a: "Несомненно, это пригодится."
 nazgul_returns_ring: "[sauron.GetNameNoTooltip] вернул [ring_returned.GetName]"