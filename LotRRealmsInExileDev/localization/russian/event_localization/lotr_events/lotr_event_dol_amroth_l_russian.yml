l_russian:

 ### DOL AMROTH EVENTS ###
 swan_knights_force: "Knights of the Swan"
 
 dol_amroth.0401.t: "The Order of the Swan"
 dol_amroth.0401.desc: "Silver, glimmering and gleaming silver armaments of war. Great winged helms and long cloaks of blue, a Knight of [dol_amroth|E] is a sight to behold, lance held high and chin even higher, dignity renewed.\n\nThis is what the rest of the world sees in the knights of Dor-en-Ernil, but only one in the Order itself knows the truth. Chivalry is dead, replaced by bribery and bloodlines and every other misfortune of men. If the Order of the Swan is to be reformed, then the reformer certainly has his work cut out for him.\n\nThe Amrothian Reserves will need to be expanded; the old oaths of Edhellond upheld; the Sea-ward regiments will need to be made anew again; and the ancient Order of the Tirith Aear must be reforged. Only after these things are completed can the [ROOT.Char.GetTitleAsNameNoTooltip]s of Dol Amroth reclaim their honour. A new order — that of the Silver Swan — shall rise in the old order's place."  
 dol_amroth.0401.a: "There is much work to be done."
 dol_amroth.0401.a.tt: "Unlocks a set of [decisions|E]"
 
 dol_amroth.0402.t: "The Amrothian Reserves"
 dol_amroth.0402.desc: "For years relegated to being the most humble of positions within the Order of the Swan, the Amrothian soldiery has in many ways been the group which have maintained the true spirit of the original Order the best. However, despite this, their ranks have been sadly depleted, the role viewed as lacking in honour and splendour and thus neglected.\n\nLet us work on restoring this backbone of our forces to their proper fighting strength."
 dol_amroth.0402.a: "Sound the trumpets! Let every man know of his [ROOT.Char.GetTitleAsNameNoTooltip]'s need!"
  
 dol_amroth.0403.t: "Amrothian Reserves Recruited"
 dol_amroth.0403.desc: "In response to their [ROOT.Char.GetLadyLord]'s call, the men of Dol Amroth, from commoner to noble, have proven themselves worthy of great esteem. They have put their social ranks aside to fight side by side in the Amrothian soldiery, training long and enduring great discomforts.\n\nThese soldiers form the backbone of our élite forces and let none gainsay their honour or their courage! We shall ensure they are properly honoured for their dedication and sacrifice."
 dol_amroth.0403.a: "Wonderful news! Have the men form up in the courtyard!"
 amrothian_reserves: "Amrothian Reserves" 
  
 dol_amroth.0404.t: "The Men of Edhellond"
 dol_amroth.0404.desc: "Edhellond, once-home of the Elven domain of the same name, is one of the noblest and richest governates of Dor-en-Ernil. They strive to emulate Elven tactics in warfare, in contrast with the rest of [dol_amroth|E], who maintain a firm martial tradition inherited from the days of [numenor|E]. Their ranks amongst the Order have sat empty, oaths unsaid as the rot festered within the organization. We must make anew our oaths of old.\n\nIf they could be reintegrated into the armies of the [ROOT.Char.GetTitleAsNameNoTooltip], they could serve as a powerful and innovative contingent."
 dol_amroth.0404.a: "Send our fastest rider to gather the men!"
  
 dol_amroth.0405.t: "The Arrival of the Men of Edhellond"
 dol_amroth.0405.desc: "In response to the [ROOT.Char.GetTitleAsNameNoTooltip]'s summons, the men of Edhellond have arrived, bearing their greatbows and fine horses. The Nimrodel rangers, based on traditions of the [sindarelves|E], form the largest part of their contingent, but they are accompanied by the Knights of Edhellond as well.\n\nUniquely amongst the Men of [dol_amroth|E], these soldiers make use of bow and arrow while riding horseback, allowing them to brutally harass the enemy without ever risking themselves in a charge.\n\nThe [ROOT.Char.GetTitleAsNameNoTooltip]'s armies have been much ennobled by their addition."
 dol_amroth.0405.a: "They shall serve as an example for the rest of us."
  edhellond_soldiers: "Soldiers of Edhellond"
  
 dol_amroth.0406.t: "The Sea-ward Regiments"
 dol_amroth.0406.desc: "Once the Dor-en-Ernil equal to the mighty marines of Pelargir, the Sea-ward regiments fought on the high seas and the coasts, besting corsairs and winning high honours. However, as Pelargir has risen in prominence as the heart of the Royal Navy, this guard division has dwindled to a skeleton force, maintaining a few coastal lookouts at most.\n\nIf we could expand them once more; they would once again serve us well as fearsome shock-troops."
 dol_amroth.0406.a: "Begin the training at once!"
  
 dol_amroth.0407.t: "The Sea-ward Regiments Expanded"
 dol_amroth.0407.desc: "Wielding great two-handed blades, the Sea-ward regiments are at least beginning to resemble their days of glory. Bearing heavy plate mail and mighty swords, these shining heavy infantry can break even the hardiest enemy lines. \n\nWith them regaining their strength, Dol Amroth can begin to once again project power over the seas, and our shoreline has never been better defended."
 dol_amroth.0407.a: "The corsairs don't stand a chance."
 seaward_soldiers: "Sea-ward Regiment"
  
 dol_amroth.0408.t: "Reforging the Oathkeepers of Tirith-Aear"
 dol_amroth.0408.desc: "The Tirith-Aear, or 'Sea-ward Tower' in [sindarin|E], is the great tower of Dor-en-Ernil, once built by the [elves|E] dwelling within the region. The name has also become that of the élite guard units which protect the tower, the Oathkeepers of Tirith-Aear, the best of the Sea-ward troops. Required to swear oaths of virtue and valour, these wardens should be of unimpeacheable character. But of all the classes of the old Order, this one rotted most, with the position being given on account of blood, not valour. It will require great effort to rebuild it to its former glory. \n\nWe shall begin by dismissing those of the order known to be corrupt, and then begin searching for those people worthy of this great honour."
 dol_amroth.0408.a: "Select only the finest soldiers for the honour of taking the oaths."
  
 dol_amroth.0409.t: "The Oaths Reforged"
 dol_amroth.0409.desc: "Though it has taken no small amount of political wrangling to dismiss corrupt members of the order, at last the Oathkeepers are starting to resemble a group worthy of their name. The new members take their oaths incredibly seriously, the image of knightly valour and virtue.\n\nWith them on guard, the Tirith-Aear is well guarded, and shall never fall."
 dol_amroth.0409.a: "They shall be the envy of Gondor."
 tirith_aear_soldiers: "Oathkeepers of Tirith Aear"
  
 dol_amroth.0410.t: "Reform the Royal Swan-guard"
 dol_amroth.0410.desc: "The élite of the élite, the Royal Swan Guard are tasked with defending the [ROOT.Char.GetTitleAsNameNoTooltip] of Dol Amroth at all hours of the day. In times of war, they gladly follow him into battle, and should the need arise, they would give their lives for their [ROOT.Char.GetTitleAsNameNoTooltip] without hesitation.\n\nNo longer shall politics determine appointment to this most hallowed of orders! Only those of purest heart and greatest valour shall be allowed to join its august ranks."
 dol_amroth.0410.a: "Virtue inherent, only the purest of heart shall be given the honour."
  
 dol_amroth.0411.t: "The Order of the Silver Swan"
 dol_amroth.0411.desc: "The epitome of [numenorean|E] valour, the Royal Order of the Silver Swan is an image of the nobility of Men at the height of their virtue. Of unmatched moral fibre and great skill in arms, only a select few are ever counted amongst this most hallowed order. To be offered such a chance is accounted an honour beyond price in the lands of Dol Amroth, and few refuse it, for it is both a great honour and a crushing duty. \n\nWith these handpicked warriors, paragons of valour and skill, the [ROOT.Char.GetTitleAsNameNoTooltip] has nothing to fear, for [ROOT.Char.GetSheHe] is guarded by the most capable men in all of Dor-en-Ernil."
 dol_amroth.0411.a: "Such magnificence hasn't been seen in centuries."
 royal_swan_guard_troops: "Knights of the Silver Swan"