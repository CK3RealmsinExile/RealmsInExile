l_russian:

 zantaka_event_chain.0101.t: "The Council Bends"
 #zantaka_event_chain.0101.desc: "Though the high and mighty Oligarchs of [GetTitleByKey('k_lyneria').GetNameNoTier] pride themselves on the meritocracy of their republics, the thought that they would elect a concubine of low birth to the rank that she would deserve is laughable. It would be #italic improper#! to have a council-master not born a son of one of the rich and ancient families, after all. In their eyes, one like me should stay silent, accept their orders and suffer anything for their pleasure. \n\nToday, however, that cruel and callous order comes crashing down. The Sylaara, they who had maintained order among the merchants for generations, are utterly destroyed. Overnight, the republic has fallen into anarchy as every Oligarch dreams of taking the role of council-master for themselves. Of course, I am prepared for this. For the past twelve years, I have built a network of spies, hidden from the gaze of any other, and have gathered a list of every murder, broken vow, embezzlement and illegal deal made by the oligarchs that make up the council. \n\nWhen, this morning, the council will gather to elect its new master, the way will be open for me openly denounce these crimes. Unless I receive the votes I deserve, of course..."
 zantaka_event_chain.0101.desc: "Though the high and mighty Oligarchs of [GetTitleByKey('k_lyneria').GetNameNoTier] pride themselves on the meritocracy of their republics, in truth there is no place for those of #italic low#! birth or riches among their ranks. My whole life, I have been forced to bow before lesser men and women and obey their every command, even when their idiocy could not be clearer to me. In their eyes, my only role was to stay silent, look pretty and suffer #italic anything#! for their pleasure. \n\nYet, there is some advantage to be found in being nothing to your foes. Over the past twelve years, I have been free to act within the highest spheres of power whitout any noticing my moves: all assuming I did nothing more than satisfy my master's desires. My long efforts have seen me at the head of the largest network of spies and informants in [GetTitleByKey('c_pelorna').GetNameNoTier]. So very few among the councils are free of dirt and shame, their privilge having gone to their lustful and arrogant heads. \n\nWith the Sylaara dead, the Oligarchs kept quiet with not-so-subtle blackmail and a few mercenaries purchased with the #italic borrowed#! city treasure, I am sure that tommorow's election will see me win the power I have always deserved."
 zantaka_event_chain.0101.a: "Let them try to stop me now!"

 zantaka_event_chain.0102.t: "Citizen Pride"
 #zantaka_event_chain.0102.desc: "With my rule now being established, if not popular, one would think that this would be the time for celebration. Indeed, the council knows that any attempt to remove me would bring it down with me, as their crimes would come to ligth and their reputation would plummet. In time, they will learn to bow to my will, as all servants must, but quiet hatred and words of rebellion will do for now. \n\nTo my surprise, however, it is not only the great Oligarchs that seem to detest the thought of the orphan of a tavern girl rising to power over their city. Even common citizens have taken to mocking me and resisting my rule, no matter my obvious skill as ruler. \n\nMy rule over [GetTitleByKey('c_pelorna').GetNameNoTier] seems to grow less secure by the day, every open act of defiance seemingly bringing about another. If I am to survive the coming months, years or perhaps simply weeks, I will need to put these detractors down and remind them that I am not a some arrogant concubine but their rightful master."
 zantaka_event_chain.0102.desc: "Though the opposition was fierce, the Council has ultimately agreed to allow my rise to power, officially citing my close ties with the #italic mysteriously#! dead Sylaara as the reason behind their choice. Of course, my extensive list of daming blackmail, mercenary support or gods-forbid my #italic skills as ruler#! had #italic nothing#! to do with it. Though the opposition to my rule remains fierce and hard to handle, the council found itself with no other choice than to declare me its master. \n\nTo my surprise, however, the anger at my rise goes beyond dissatisfied Oligarchs. Indeed, even the common citizens voice loud and open complaints at my rise: insulting my low birth, declaring me good for nothing but pleasing men or insisting that I should abandon politics and sell my body like my lowly mother. Beyond this trend being #italic deeply#! insulting, it is a major threat to my power. The council only pretends to listen to me out of fear of public outrage at the discovery of their secrets. If I were seen as nothing more than a lying usurper, no evidence would convince the masses of my claims, leaving the door open for it to remove me. If I am to survive the coming years or perhaps simply months, I #italic must#! put an end to this dissent."
 zantaka_event_chain.0102.a: "I will not fail now!"
 zantaka_strife_begins: "#N If, within the next 3 years, you do not either have the #italic aspiring#! level of legitimacy, the #italic established#! level of fame or #italic 100 control#! in [GetTitleByKey('c_pelorna').GetNameNoTier] #italic you will be removed from power!#!#!"

 zantaka_event_chain.0103.t: "Will of the People"
 zantaka_event_chain.0103.desc: "Though many a city council have been held in the past years of my rule, this one is different. I feel a tension in the air, as though something terrible was to happen today. I am shocked when [council_leader.GetTitledFirstName], an arrogant smile on his face, declares that the issue to be debated today is #italic my#! trial for the murder of the Sylaara. How could that incompetent slob have discovered #italic that#!! The murders were perfect! Of course, my motive would be clear but my position should protect me from such baseless accusations. Thanks to what can only be the work of some traitor among the thin ranks of my agents, [council_leader.GetTitledFirstName] has gathered enough evidence to make a serious case against me. \n\nSome among the council pretend to be shocked, others look with at me with disdain. It is clear I will not receive a fair trial, though in such circumstances even that may not have saved me. Unanimously, I am declared guilty of murder, of regicide and of treason against the city. As the guard comes to take me to the dungeons, [council_leader.GetTitledFirstName] stops them. "I will #italic take care#! of her myself." he tells them before turning to me "I had given you a hand, Zantaka, never forget that. What you would not share with me I will take...""
 zantaka_event_chain.0103.a: "I will see you dead, #italic pig#!!"

 zantaka_event_chain.0104.t: "A New Order"
 zantaka_event_chain.0104.desc: "At long last, my power over [GetTitleByKey('c_pelorna').GetNameNoTier] is secure. The council, faced with my clear skill as ruler and rising standing in proper society, now has no choice but to begrudgingly accept my rule. Those that once thought of me as an arrogant upstart to reduce to submission now find themselves forced to recognize me for the leader that I was born to be. Across the whole of [GetTitleByKey('k_lyneria').GetNameNoTier], my name is known and spoken with fear among the mighty, they who would stand to lose so much if their own victims and servants were to rise as I have. \n\nWhen I look at where I am now, even I can scarcely fathom how high I have risen. Yet, so very few have my luck or skill. The scars of my youth remain deep within me, I who was one of the lucky few to achieve the oft dreamt of "escape" of service in the courts of power. Yet even that proved little more than a gilded prison, a place of pain, torment and humiliation for the pleasure of callous masters. My struggle has been a hard one, my victory taken from the cold, dead hands of the cruel order that came before me. My dreams, once nothing more than the delusions of a poor orphaned girl, can finally come to be. The cruel masters of this world will finally know justice and #italic terror!#!"
 zantaka_event_chain.0104.a: "#italic Such is the Wrath of Vilaneem!#!"
 zantaka_reforms_begin: "Having secured your authority over [GetTitleByKey('c_pelorna').GetNameNoTier], you will now be free to bring about reform within your lands and seek to expand your power in [GetTitleByKey('k_lyneria').GetNameNoTier] at large."

 zantaka_event_chain.0105.t: "A Kingmaker's Deal"
 zantaka_event_chain.0105.desc: "After yet another tedious meeting with the city council, I am surprised to see [council_leader.GetTitledFirstName], my main rival among the Oligarchs, come see me. Before I can ask him anything, he grabs my arm and begins to talk. "Zantaka" he says, ommiting to adress me by my title "Let me speak plainly. Your position is untenable. Your fall is not a matter of #italic if#! but of #italic when#!. Yet, I may just be able to find an arragement that #italic pleases#! the both of us. My wife has recently passed away, you see and it would bring me great pleasure to have a woman of your... #italic quality#! by my side... and in my bed, of course." \n\nI almost reject this insulting proposal as soon as I hear it, yet I refrain at the last moment. Reigning in the council on my own, with nothing but enemies on all sides, is sure to be difficult, even for a woman as skilled as me. Yet, is this alliance truly worth selling my body and soul to another for? As I hesitate, [council_leader.GetTitledFirstName] leans into to me, his eyes filled the desire I see in far too many. "If my offer interests you, meet me in my chambers tonight. I trust you will live up to your #italic reputation#!...""
 zantaka_event_chain.0105.a: "No more am I in the business of sleeping with #italic pigs#!!"
 zantaka_event_chain.0105.b: "I have endured far worse to get here..."
 zantaka_marriage_no: "You refuse [council_leader.GetTitledFirstName]'s offer, hoping to secure your rule by yourself and enact your vision over [GetTitleByKey('c_pelorna').GetNameNoTier] free of any ties to the old order."
 zantaka_marriage_yes: "You submit yourself to [council_leader.GetTitledFirstName], serving as his wife and abandonning your newfound freedom to ensure your hold on power at all costs."

 zantaka_event_chain.0106.t: "The Way of Queens"
 zantaka_event_chain.0106.desc: "For the first time, I am free to look towards the future, free of the fear and worries that have long haunted my mind. I have risen higher than any could have expected, yet I remain insignificant in the greater world I have now entered. Gone are the days where all that mattered to me was one city. Even simply within the bounds of [GetTitleByKey('k_lyneria').GetNameNoTier], I rule over one of the poorest cities, surrounded on both side by the league's great powers. If I am not careful, I may still fall after so much toil. \n\nThough I have great dreams of bringing reform to these lands and end the injustices the Oligarchs impose on their people, I must still consider the cold reality of politics. As an unmarried woman, the first step in my rise to greater power would normally be to find myself a weak and easy to control husband. If I were to go down that road, the best choice would surely be [emelkyn_son.GetTitledFirstName], son of [emelkyn_ruler.GetTitledFirstName] of [GetTitleByKey('c_emelcyn').GetNameNoTier]. Yet, I have no desire to marry and to once more fall under the power of a man, even if in name only, and such pragmatic political plays would surely require me to abandon my dream of reform."
 zantaka_event_chain.0106.a: "I will defeat them all..."
 zantaka_revolt_route_tooltip: "You stay true to your revolutionary dreams, seeking to prove to the world that it was wrong to ever doubt your skill and right to rule."
 zantaka_event_chain.0106.b: "I did not get here by raging against the world..."
 zantaka_marriage_route_tooltip: "You will seek out marriage and political power in [GetTitleByKey('c_emelcyn').GetNameNoTier], abandonning your dreams of grand reform in favour of personal power."
 zantaka_league_loses_opinion: "All members of the Lynerian League lose #N 80#! [opinion|e] of you."

 zantaka_event_chain.0107.t: "A Council's Judgement"
 zantaka_event_chain.0107.desc: "As I arrive in [GetTitleByKey('c_emelcyn').GetNameNoTier], I find myself receiving a rather cold welcome from [emelkyn_ruler.GetTitledFirstName]. After the usual formalities are dealt with, I am allowed to enter into the city and to officially present myself before its council as a candidate for the marriage of [emelkyn_son.GetTitledFirstName], one of its most preeminent members. \n\nWith my reputation still greatly suffering from my origins, it would take much effort, debate and convincing for the council to be swayed to my side, if they ever are. Yet, [emelkyn_ruler.GetTitledFirstName] holds great influence over [CharYourHerHis(emelkyn_ruler)] fellow Oligarchs due to the nature of [CharYourHerHis(emelkyn_ruler)] position. Perhaps all it would take for the marriage to go through would be to win myself [CharYourHerHis(emelkyn_ruler)] favour. However, a third path is also open to me. [emelkyn_son.GetTitledFirstName] is a lustful man, burning with desire. If I could find the right opportunity, I may be able to convince him to take me as spouse no matter the wishes of the council. Though I am reluctant to follow this path, I #italic will#! have to sleep with him at some point...  "
 zantaka_event_chain.0107.a: "I will claim [emelkyn_son.GetTitledFirstName]'s heart..."
 zantaka_event_chain.0107.success.seduction: "#P You find an opportunity to attempt to seduce [emelkyn_son.GetTitledFirstName].#!"
 zantaka_event_chain.0107.failure: "#N Your attempt to marry [emelkyn_son.GetTitledFirstName] is met with failure#!"
 zantaka_event_chain.0107.b: "[emelkyn_ruler.GetTitledFirstName] will surely warm up to me with enough effort."
 zantaka_event_chain.0107.success: "#P You succeed in arranging your marriage to [emelkyn_son.GetTitledFirstName]#!"
 zantaka_event_chain.0107.c: "The council will heed my words."
 zantaka_personal_seduction: "You will attempt to find an opening to seduce [emelkyn_son.GetTitledFirstName], making him declare you as his spouse despite the wishes of the rest of his realm."
 zantaka_befriend_ruler: "You attempt to convince [emelkyn_ruler.GetTitledFirstName] to support your marriage to [emelkyn_son.GetTitledFirstName]."
 zantaka_convince_council: "You attempt to convince the council to allow your marriage to [emelkyn_son.GetTitledFirstName] on your own merits."

 zantaka_event_chain.0108.t: "Queen of Hearts"
 zantaka_event_chain.0108.desc: "After my arrival at [GetTitleByKey('c_emelcyn').GetNameNoTier], I began looking for and taking any opportunity to approach [emelkyn_son.GetTitledFirstName]. At first, I only talk to him, but quickly enough I begin to go further. Simple smiles and caresses turn into a stolen kiss away from the eyes of the council. As night comes after a long day of seduction and debates, my next move is clear. With the help of a bribed servant, I take the secret paths hidden throughout the palace all the way to my target's chambers, wearing my most alluring nightgown. It is only natural I play my best card. \n\n[emelkyn_son.GetTitledFirstName] is shocked to see me but is clearly #italic very#! pleased. "My dear, I desire you more than you can imagine." I softly tell him. "Never have I seen such an irrestible man as you, [emelkyn_son.GetTitledFirstName]. The council, cold and blind to love, would have us be seperated, but I know it is Vilaneem herself that has brought me in your arms. I see it in your eyes: you too desire me, do you not? I am yours to take. There is no desire or pleasure that I would deny you." I lean into him and kiss him with false but great passion. "Make love to me tonight, make me your wife tommorow, and every night after I will be yours." What follows, I know very well. Soon, I will see if I have myself a puppet..."
 zantaka_event_chain.0108.a: "Such are the costs of power..."
 zantaka_event_chain.0108.success_crit: "#P [emelkyn_son.GetTitledFirstName] is utterly taken by you and becomes the weak husband you searched for#!"
 zantaka_event_chain.0108.success: "#N [emelkyn_son.GetTitledFirstName] agrees to marry you after your #italic demonstration#! but remains a free agent#!"

 zantaka_event_chain.0109.t: "A Puppeteer's Play"
 zantaka_event_chain.0109.seduce: "After a rather long night that has clearly left [emelkyn_son.GetTitledFirstName] exhausted, the next part of my plan comes into motion. As planned, a servant of [emelkyn_son.GetTitledFirstName] enters his master's chambers and sees us together in a #itlaic compromising#! position. The servant quickly leaves, sure to be bringing word to [emelkyn_ruler.GetTitledFirstName] of this clear lapse in behaviour from [emelkyn_son.GetTitledFirstName]. \n\nWhen the second day of debates with the council begins, I declare that [emelkyn_son.GetTitledFirstName] had officially taken me as his wife last night, explaining what would otherwise have been #italic scandalous#! behaviour. After my more than impressive showing, [emelkyn_son.GetTitledFirstName] confirms my words, clearly desiring the privilege of enjoying the false love I showed him. The council of [GetTitleByKey('c_emelcyn').GetNameNoTier], unable to find any reasoable counter to my new husband's words, begrudgingly agrees to recognize my marriage to [emelkyn_son.GetTitledFirstName]. Despite this being a victory, it feels hollow to me. I have myself a husband, well connected, dumb, easy to control and in the perfect place to facilitate my rise, but it has a price. By day, I shall be mighty, but by night I will once more have to be a slave to another's pleasure..."
 zantaka_event_chain.0109.other: "Though [emelkyn_ruler.GetTitledFirstName] and his council strongly opposed my marriage to [emelkyn_son.GetTitledFirstName] at first, this attitude seems to have finally changed. My words and my talent have impressed them and no more to they see me as a lucky usurper. For quite possibly the first time, I have been able to convince the high courts of power that I am more than my mother or than my birth. The satisfaction of proving so many wrong is not lost to me. \n\nDespite this, however, I still must contend with the reality of being the wife of [emelkyn_son.GetTitledFirstName]. While it is most certainly far better to be a powerful and rich wife than a powerless concubine, both share a similar burden. If [emelkyn_son.GetTitledFirstName] is to truly become a loyal agent, I will have no choice but to submit myself to his pleasure, at least in part, so that he becomes reliant on me. The pains of my youth have left me with no taste for such acts, yet they have made me a master in exciting others. Even now, as I rise to be the most powerful woman [GetTitleByKey('k_lyneria').GetNameNoTier] has ever known, I remain forced to dwell on my scars. Ambition always has a price, and for me it has always been the same..."
 zantaka_event_chain.0109.a: "Power is #italic always #!worth the sacrifice!"

 zantaka_event_chain.0110.t: "A Snapped Web"
 zantaka_event_chain.0110.desc: "Despite my best efforts, [emelkyn_ruler.GetTitledFirstName] and his council have ruled out any chance of accepting my marriage to [emelkyn_son.GetTitledFirstName]. They openly declared my power to have been usurped from the Sylaara, refusing to hear my arguments and demands of recognition. By the end, it would seem that the only reason I have not been sent to some dungeon in [GetTitleByKey('c_emelcyn').GetNameNoTier] is [emelkyn_ruler.GetTitledFirstName]'s respect of diplomatic immunity. \n\nAs I leave [GetTitleByKey('c_emelcyn').GetNameNoTier], I am overtaken by the bitter taste of defeat. Perhaps, I should have been bolder in my moves, less restrained, more willing to lie and to submit to please. This humiliation is sure to not be forgotten soon, but some part of me is releived. Had I married [emelkyn_son.GetTitledFirstName], I would once more have had to serve and pleasure a man, even if in name only after some time. My mind once more turns to my dreams of old, to the reforms I had long dreamt of bringing to my people. I have no place among the Oligarchs, that much is clear. There may very well still be a road to power ahead of me, even if it will be hard and long..."
 zantaka_revolution_take_2: "You will once more go down the road of revolution and reform, seeking to rise to power in [GetTitleByKey('k_lyneria').GetNameNoTier] at the expense of the powers that wronged you."
 zantaka_event_chain.0110.a: "Perhaps this is a sign..."
 zantaka_event_chain.0110.b: "I will surely be able to find another."

 zantaka_event_chain.0111.t: "League within League"
 zantaka_event_chain.0111.desc: "At last, true power is mine. No more am I simply the master of some petty city, barely worthy of note among the greats of [GetTitleByKey('k_lyneria').GetNameNoTier]. [GetTitleByKey('c_emelcyn').GetNameNoTier], proud and #italic mighty#! is now under my rule. I had thought myself rich when I first came to power over the small town of [GetTitleByKey('c_pelorna').GetNameNoTier]. Now, I know that there is so much more to wealth than I had thought. Countless servants cater to my every need and every day I enjoy the finest luxuries the Bay of Ormal has to offer. My life is so pleasant that I can almost forget my husband [emelkyn_vassal.GetTitledFirstName]. \n\nYet, even now, I am unsatisfied: every luxury, every power and every privilege making me wish for ever more. After suffering so much to get here, do I not deserve it all? When I look at a map of my realm, I cannot help but de annoyed by the continued sovereignty of the small city state of [GetTitleByKey('c_murnak').GetNameNoTier]. Though it is larger than that backwater [GetTitleByKey('c_pelorna').GetNameNoTier], it remains a poor and minor city. Yet, its position would make it very valuable in consolidating my new realm into a coherent state. Were I to rule all of [GetTitleByKey('d_sylara').GetNameNoTier], all of [GetTitleByKey('k_lyneria').GetNameNoTier] may follow."
 zantaka_event_chain.0111.a: "I will have it #italic all!#!"
 zantaka_event_chain.0111.b: "This... this is enough."
 zantaka_sieze_murnak: "You will make a play to subdue [GetTitleByKey('c_murnak').GetNameNoTier] into your growing realm, at the risk of bringing on the wrath of the league at large."
 zantaka_no_murnak: "You content yourself with your already impressive rise, enjoying the spoils of your ascension."
 zantaka_league_opinion_loss: "All members of the Lynerian League have lost #N 50#! [opinion|e] of you."

 zantaka_event_chain.0112.t: "Games of Power"
 zantaka_event_chain.0112.desc: "It feels hard to believe that the last hurdle in the way of me achieving my dreams of unrivaled power is to subdue a city as minor as #italic [GetTitleByKey('c_murnak').GetNameNoTier]#!. Yet, the city is likely to be the last straw in the eyes of the League, its leaders already displeased by my rise, hating the thought that a lowborn street girl could rise above their ancient rule and great wealth. Despite their greed and their wishes, however, my ambition will not be quelled here: nor will it be until all of [GetTitleByKey('k_lyneria').GetNameNoTier] is mine, as it would have always been if our people truly chose the worthy as their leaders. \n\nI will need a plan to subdue [GetTitleByKey('c_murnak').GetNameNoTier], however. My newfound wealth would make it rather easy to bribe the city's council into signing a treaty of submission, yet such an endeavor would likely prove rather expensive, even for one as rich as me. Having come into the possession of [GetTitleByKey('c_emelcyn').GetNameNoTier]'s mighty navy, I could seek to enforce a blockade of the city, yet such an act of obvious power projection and dominance would be sure to rouse the ire of the League."
 zantaka_event_chain.0112.a: "A #italic hefty#! bribe should smooth out things..."
 zantaka_murnak_bribe: "You bribe the city council of [GetTitleByKey('c_murnak').GetNameNoTier] to obtain its submission."
 zantaka_event_chain.0112.b: "My navy is sure to scare them into submission..."
 zantaka_murnak_blockade: "You attempt to blockade the port of [GetTitleByKey('c_murnak').GetNameNoTier] to force its submission."
 zantaka_event_chain.0112.success: "#P You succeed in subduing [GetTitleByKey('c_murnak').GetNameNoTier]#!"
 zantaka_event_chain.0112.failure: "#N You fail to subdue [GetTitleByKey('c_murnak').GetNameNoTier]#!"

 zantaka_event_chain.0113.t: "Unending Will"
 zantaka_event_chain.0113.desc: "As expected, my efforts to see [GetTitleByKey('c_murnak').GetNameNoTier] subdued into my realm have been met with great success. [murnak_ruler.GetTitledFirstName] has seen the futility of resisting against my inevitable rise and has accepted my terms for his submission. Officially, I am know the ruler of the Tetrarchy of [GetTitleByKey('d_sylara').GetNameNoTier] in which the four cities of the realm are equal members. Of course, as the direct ruler of two cities and the influential wife of the man that rules yet another, power within this new realm is fully withing my hands. \n\nWhile the league rages and voices great complaints, the #italic willing#! submission of [GetTitleByKey('c_murnak').GetNameNoTier] keeps them powerless to act against me. In a decade or so, I am sure that this enmity will pass, the League too divided to truly act against my power. By then, I will surely have grown in influence to the point of finally bringing about the unification of the League under one absolute ruler: myself, of course. All that is left for me to do now is wait for my reputation to heal. I hear that the havens of [GetTitleByKey('d_mutayiisi_sengani').GetNameNoTier], found beyond the wilds of southern [GetTitleByKey('k_lyneria').GetNameNoTier], are as rich as our own cities. Plotting their fall is sure to keep me busy until the League bends and makes me its master..."
 zantaka_event_chain.0113.a: "None now stand that can oppose me!"

 zantaka_event_chain.0114.t: "The League Stands"
 zantaka_event_chain.0114.desc: "Perhaps better realising the nature of its position that I would have thought, [GetTitleByKey('c_murnak').GetNameNoTier] has openly refused and denounced my attempt to see it subdued into my realm. [murnak_ruler.GetTitledFirstName] has taken the issue to the wider Lynerian League, prompting a hardline response against my actions. The ever proud Oligarchs of the League have officially declared my acts a declaration of war and demanded that heavy reparations be paid as recompense for my criminal acts. \n\nIn my eyes, there is only one way to reply to this outrage. Though I had desired to be allowed to complete my rise in peace, it is clear to me that it will have to be achieved through war. Surely, I who have been able to scheme the fall of centuries old houses, turn men into little more than puppets and have ruled my realm better than any council master before me can win a war against these fat and useless Oligarchs. I will put these fools back in their place and when I will be done they will beg me to spare them and to become their master."
 zantaka_event_chain.0114.a: "I. Will. Not. Fail. HERE!"

 zantaka_event_chain.0201.t: "Mirror of Pity"
 zantaka_event_chain.0201.desc: "As I am conducting an inspection of the city port, my guards alert me that part of my colected tax paiments have been stolen. They tell me that some girl had talked to them, at first seemingly to seduce them, only for them to lower their guard while an accomplice made off with the stolen gold. This crime reminds me of the days of my youth, in a way. Clearly, whoever organized this plan knew what they were doing. Such skills could always be useful... \n\nWhen my guards innevitably catch the girl, I am told that she was the leader of these thieves. Interested, I decide to try talking to her. "What is your name, girl?" I ask her. She hesitates before answering. "Not sure why you care, my lady, but I'm [daughter.GetTitledFirstName]. I have nothing that could interest a rich woman like you, unless boys aren't your type..." "I am always in need of more agents and smart servants." I reply to her. "If you are bold and skilled enough to steal from a council master, perhaps you would be willing to go further for the right price..." The girl seems interested. I may have just found myself a new agent..."
 zantaka_event_chain.0201.a: "Let's see what she's worth..."
 zantaka_adopts_girl: "You make [daughter.GetTitledFirstName] your agent, seeking to test her worth."
 zantaka_event_chain.0201.b: "I have more important matters to attend to..."
 zantaka_no_adoption: "You abandon the idea of having [daughter.GetTitledFirstName] become your agent."

 zantaka_event_chain.0202.t: "Found Kin"
 zantaka_event_chain.0202.desc: "Over the past few months, I have gone from seeing [daughter.GetTitledFirstName] as an agent to seeing her as a close friend. It had been many long years since I had someone to talk to freely, someone that could truly understand me and my life. In [daughter.GetTitledFirstName], I have found a friend, perhaps the closest friend I have ever had. \n\nYet, some part of me feels a deeper bond with her. By my choice, I have never been a mother, always seeking any way to prevent the men that used me from forcing the pains of motherhood upon me. When I see [daughter.GetTitledFirstName], however, some part of me feels a primal motherly love towards her. \n\nI am without an heir and I have no desire to let a husband have his way with me. Perhaps, I could make my bond to [daughter.GetTitledFirstName] official by adopting her as my own daughter. This would grant me an heir without the need for a husband, yes, but even beyond that it simply feels right to do so."
 zantaka_event_chain.0202.a: "Is this what #italic hapiness#! feels like?"
 zantaka_event_chain.0202.b: "Even now, it would be wiser to seek a #italic proper#! heir..."

 zantaka_event_chain.0203.t: "Broken Treasures"
 zantaka_event_chain.0203.desc: "With the forceful passing of my new act, the monopolies that have long plagued the people of [GetTitleByKey('k_lyneria').GetNameNoTier] have been outlawed in my lands. No matter the grumblings of the Oligarchs, they have no choice but to comply. I am sure many of them will try to find some loophole or another to keep their unjust power but this struggle will only strengthen my reforms over time. \n\nThe common people now, for the first time, have access to the opportunities that were always kept from them. No longer do they need to slave away for the profit of some greedy guild or merchant: all are now free to work for their own profit and advancement. Soon, I am sure that a new generation of skilled, but long overlooked, people will come to replace the rotten politicans of the council, though I must still content myself to that horrid old guard for now."
 zantaka_event_chain.0203.a: "I delight in those fools' rage..."



 



