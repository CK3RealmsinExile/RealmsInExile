l_russian:
 court_ongoing.2001.t:0 "Фестиваль"
 
 court_ongoing.2001.spring_opening:0 "Сегодняшний день знаменует начало фестиваля Ност-на-Лотион, Рождение Цветов, когда Ариэн возвращает тепло Анара в Средиземье. Юные эльфы водят хороводы, вплетая в волосы цветы, а мы празднуем возвращение дара [Concept( 'yavannacharacter', 'Йаванны' )|E]."
 court_ongoing.2001.summer_opening:0 "Сегодняшний день знаменует начало фестиваля Тарнин Ауста, Врат Лета, когда Ариэн правит Анара ближе к Средиземью и таким образом изгоняет из его земель хлад [Concept( 'morgothcharacter', 'Моргота' )|E]. Мы с нетерпением ждём рассвета, чтобы песней поприветствовать смену сезонов."
 court_ongoing.2001.autumn_opening:0 "Сегодняшний день знаменует начало фестиваля Йавиэрэ, Дара Фруктов, когда листья опадают, а плоды на деревьях наливаются соком. Праздничные столы ломятся от спелых фруктов и сочной оленины."
 court_ongoing.2001.winter_opening:0 "Сегодняшний день знаменует начало фестиваля Турухальмэ или Сожжения Бревна, когда сугробы высоки, а очаги просят пищи. Языки пламени вздымаются над костровищами, а барды готовят свои лучшие истории."
 court_ongoing.2001.distant_opening:1 "Я прибываю ко двору персонажа [court_of_residence.GetNameNoTier] как раз вовремя, чтобы принять участие в фестивале в [court_owner.Custom('ResidenceBuilding')]. [target.GetTitledFirstName] — вот кого мне необходимо увидеть, а посему мне пришлось получить приглашение."
 court_ongoing.2001.close_opening:1 "Я принимаю участие в фестивале не только потому, что я [ROOT.Char.GetLadyLord|U] при дворе [court_owner.Custom('ResidenceBuilding')], но и потому, что мне необходимо встретиться с персонажем [target.GetTitledFirstName]."
 court_ongoing.2001.desc:1 "\n\n[target.GetSheHe|U] выглядит великолепно. Когда раздаётся музыка, приглашающая к первому танцу, наши взгляды встречаются, а вскоре встретятся и руки. Мы танцуем самозабвенно, не обращая внимания на происходящее вокруг.\n\nКогда музыка стихает и наступает момент покоя, я делаю своё предложение."
 court_ongoing.2001.a:0 "С вами я могу танцевать всю ночь напролёт, ми[target.GetLadyLord]."
 court_ongoing.2001.a.tt:0 "#F Воззвать к игривой натуре персонажа [target.GetFirstNameNoTooltip].#!"
 court_ongoing.2001.b:0 "Может удалимся от всей этой суеты и прогуляемся в саду?"
 court_ongoing.2001.b.tt:0 "#F Воззвать к задумчивой натуре персонажа [target.GetFirstNameNoTooltip].#!"
 court_ongoing.2001.c:0 "Может посидим у костра и послушаем истории барда?"
 court_ongoing.2001.c.tt:0 "#F Воззвать к любопытству персонажа [target.GetFirstNameNoTooltip].#!"

 court_ongoing.2003.opening:0 "[court_owner.Custom('ResidenceBuilding')]. Во время танцев [owner.GetTitledFirstName] подходит ко мне, предлагая провести время вместе."
 court_ongoing.2003.dance:0 "\n\nТанцуя и двигаясь по залу, заливаясь смехом как дети, мы наверняка обратили на себя десятки взглядов!"
 court_ongoing.2003.walk:0 "\n\nМы прогуливались по саду, рассуждая о вечном и переходя с темы на тему, совершенно не заметив как пролетело время!"
 court_ongoing.2003.story:0 "\n\nМы решили послушать песни бардов и провели у костра почти всю ночь. Это было очень захватывающе!"
 court_ongoing.2003.fallback:0 "\n\nНам было так хорошо вместе, что мы танцевали на протяжение почти всего праздника!"
 court_ongoing.2003.a:0 "Мы так хорошо провели время!"

 court_ongoing.2004.dance:0 "[owner.GetSheHe|U] не [Select_CString(owner.IsFemale, 'поняла', 'понял' )], что меня танцы не интересуют, поэтому после нескольких вымученных движений мне прилшось попросить [owner.GetHerHim|U] отпустить меня."
 court_ongoing.2004.walk:0 "Хотя прогулка в саду и была терпимой, [owner.GetFirstName] без умолку [Select_CString(owner.IsFemale, 'болтала', 'болтал' )] о наискучнейших вещах.\n\nМне пришлось придумать отговорку, чтобы сбежать обратно на танцы."
 court_ongoing.2004.story:0 "И хотя мне не докучало [owner.GetHerHis] присутствие, весь вечер [owner.GetSheHe] только и [Select_CString(owner.IsFemale, 'хотела', 'хотел' )] сидеть и слушать истории. Мне же это быстро наскучило, поэтому пришлось придумать отговорку и ускользнуть на танцы."
 court_ongoing.2004.fallback:0 "[owner.GetSheHe|U] [Select_CString(owner.IsFemale, 'предлагала', 'предлагал' )] различные варианты совместного времяпрепровождения на празднике, но если ты никудышный компаньон сам по себе, то и любая активность с тобой не вызовет восторга."
 court_ongoing.2004.a:0 "О чём [owner.GetSheHe] [Select_CString(owner.IsFemale, 'думала', 'думал' )]?"

 court_ongoing.2005.dance:0 "[target.GetTitledFirstName] и я провели всю ночь, танцуя, заставляя людей оборачиваться на нас, а [target.GetSheHe] [Select_CString(owner.IsFemale, 'смеялась', 'смеялся' )] от всего сердца."
 court_ongoing.2005.walk:0 "[target.GetTitledFirstName] и я прогуливались по саду, разговаривая обо всём на свете. Вскоре мы поняли, что совсем потеряли счёт времени, а вернувшись на танцы осознали, что они уже начинают стихать."
 court_ongoing.2005.story:0 "Я попросил барда исполнить наши любимые песни и мы весь вечер наслаждались гостеприимством чертогов устроителя праздника, коим был [court_of_residence.GetNameNoTier]. Этот эльф наверняка знает толк в ухаживаниях и приключениях."
 court_ongoing.2005.fallback:0 "Нам было так хорошо вместе, что мы танцевали на протяжение почти всего праздника!"
 court_ongoing.2005.a:0 "Как чудесно мы провели вечер!"

 court_ongoing.2006.dance:0 "Мне показалось, что у меня всё схвачено, когда [Select_CString(target.IsFemale, 'согласилась', 'согласился' )] потанцевать. Но несмотря на моё непринуждённое поведение, [target.GetTitledFirstName] [Select_CString(target.IsFemale, 'придумала', 'придумал' )] какую-то отговорку, чтобы оставить меня посреди танца наедине с собой."
 court_ongoing.2006.walk:0 "Мне казалось, что мы хорошо проводим время, но возможно было слишком прохладно, или роль сыграло моё излишнее многословие, но [target.GetSheHe] [Select_CString(target.IsFemale, 'придумала', 'придумал' )] какую-то отговорку и вернулась на танцы, даже не предложив мне присоединиться.\n\nКогда я вернулся в зал, [target.GetSheHe] уже [Select_CString(target.IsFemale, 'танцевала', 'танцевала' )] с остальными."
 court_ongoing.2006.story:0 "Похоже [target.GetTitledFirstName] не [Select_CString(target.IsFemale, 'оценила', 'оценил' )]  репертуар, предложенный мной барду? Даже после того, как [target.GetSheHe] [Select_CString(target.IsFemale, 'удалилась', 'удалился' )] с нелепыми отговорками, истории не прекратились, поэтому мне пришлось остаться и слушать барда в одиночестве."
 court_ongoing.2006.fallback:0 "I kept suggesting ways we could spend time at the celebrations, but [target.GetTitledFirstName] seemed completely uninterested. Did I do something wrong?"
 court_ongoing.2006.a:0 "This went poorly."
 
 court_ongoing.2011.t:0 "Secluded Meditation"
 court_ongoing.2011.desc:0 "A friend of [target.GetTitledFirstName] mentioned to me that [target.GetSheHe] often withdraws to a remote spot to meditate.\n\nThe directions were clear and I easily find the location. There, beside a babbling stream sits [target.GetFirstName], eyes closed in silent communion with [yavannacharacter|E]'s creation.\n\nThis is my chance to connect with [target.GetHerHim]."
 court_ongoing.2011.a:0 "I'll discreetly make my presence known, and let [target.GetHerHim] finish."
 court_ongoing.2011.a.tt:0 "I should give [target.GetHerHim] some space."
 court_ongoing.2011.b:0 "I'll break the ice with a joke!"
 court_ongoing.2011.b.tt:0 "I think [target.GetSheHe] would enjoy a lively conversation."
 court_ongoing.2011.c:0 "I'll sit beside [target.GetHerHim] and we'll meditate together."
 court_ongoing.2011.c.tt:0 "I think [target.GetSheHe] would enjoy some quiet company."

 court_ongoing.2013.opening:0 "While I was meditating beside a babbling stream, [owner.GetTitledFirstName] came to me."
 court_ongoing.2013.meditation:0 "\n\n[owner.GetSheHe|U] gently cleared [owner.GetHerHis] throat and sat at a distance, until I was ready to join [owner.GetHerHim]. It was very considerate of [owner.GetHerHim] to respect my need of solitude."
 court_ongoing.2013.conversation:0 "\n\n[owner.GetSheHe|U] cracked a joke, and I couldn't help but burst out laughing. Now that my concentration was gone, there was nothing else to do except enjoy [owner.GetHerHis] dazzling conversation."
 court_ongoing.2013.company:0 "\n\n[owner.GetSheHe|U] sat beside me, took my hand and looked into my eyes without a word. I could sense [owner.GetHerHis] fëa and mine attuning while we both communed with [yavannacharacter|E]'s blessing."
 court_ongoing.2013.fallback:0 "\n\n[owner.GetSheHe|U] sat beside me, and waited for me to finish my meditation."
 court_ongoing.2013.closing:0 "\n\nWe had a deep heart-to-heart about the beauty of nature and how best to experience it."
 court_ongoing.2013.a:0 "I felt [owner.GetFirstName] truly understood me."
 
 court_ongoing.2014.opening:0 "While I was meditating beside a babbling stream, [owner.GetTitledFirstName] came to me."
 court_ongoing.2014.meditation:0 "\n\n[owner.GetSheHe|U] gently cleared [owner.GetHerHis] throat and sat at a distance, waiting fo me to join him. I wish [owner.GetSheHe] had been bolder came to speak to me."
 court_ongoing.2014.conversation:0 "\n\n[owner.GetSheHe|U] cracked a joke, interrupting my meditation. I was more than a little irritated at [owner.GetHerHis] his lack of consideration for my desire to meditate in solitude."
 court_ongoing.2014.company:0 "\n\n[owner.GetSheHe|U] sat beside me, took my hand and looked into my eyes without a word. I was more than a little irritated at [owner.GetHerHis] his lack of consideration for my desire to meditate in solitude."
 court_ongoing.2014.fallback:0 "\n\n[owner.GetSheHe|U] sat beside me, took my hand and looked into my eyes without a word. I was more than a little irritated at [owner.GetHerHis] his lack of consideration for my desire to meditate in solitude."
 court_ongoing.2014.closing:0 "\n\nI made some polite conversation and escaped as soon as I could."
 court_ongoing.2014.a:0 "This was so frustrating!"

 court_ongoing.2015.meditation:0 "I softly cleared my throat and sat at a distance from [target.GetFirstName], waiting until [target.GetSheHe] was ready to speak to me.\n\nI could see [target.GetSheHe] appreciated that I didn't disturb [target.GetHerHis] meditation."
 court_ongoing.2015.conversation:0 "I cracked a joke, and [target.GetFirstName] burst out laughing. [target.GetSheHe|U] got up to join me, and we talked for hours. The rising Moon surprised us still lost in conversation."
 court_ongoing.2015.company:0 "I sat beside [target.GetFirstName], took [target.GetHerHis] hand in mine and looked into [target.GetHerHis] eyes. My fëa reached to [target.GetHersHis] and we sat together, attuned with each other and with [yavannacharacter|E]'s blessing."
 court_ongoing.2015.fallback:0 "I sat beside [target.GetFirstName], and waited for [target.GetHerHim] to finish [target.GetHerHis] meditation."
 court_ongoing.2015.closing:0 "\n\nWe had a deep heart-to-heart about the beauty of nature and how best to experience it."
 court_ongoing.2015.a:0 "I felt [target.GetFirstName] truly understood me."
 
 court_ongoing.2016.meditation:0 "I softly cleared my throat and sat at a distance from [target.GetFirstName], waiting until [target.GetSheHe] was ready to speak to me.\n\nI think [target.GetSheHe] would have preferred if I had interrupted [target.GetHerHis] meditation."
 court_ongoing.2016.conversation:0 "I cracked a joke, and [target.GetFirstName] looked up, visibly irritated. [target.GetSheHe|U] got up to join me, but excused [target.GetHerHim]self after a short while."
 court_ongoing.2016.company:0 "I sat beside [target.GetFirstName], took [target.GetHerHis] hand in mine and looked into [target.GetHerHis] eyes. [target.GetSheHe|U] looked up, visibly irritated, and excused [target.GetHerHim]self after a short while."
 court_ongoing.2016.fallback:0 "I sat beside [target.GetFirstName], took [target.GetHerHis] hand in mine and looked into [target.GetHerHis] eyes. [target.GetSheHe|U] looked up, visibly irritated, and excused [target.GetHerHim]self after a short while."
 court_ongoing.2016.closing:0 "\n\nI clearly did not think this through."
 court_ongoing.2016.a:0 "What a shambles!"