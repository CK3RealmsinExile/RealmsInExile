l_russian:
 #Generic Lines
 historical_commander_trait.reject.tt: "#F Вы будете искать вдохновение в другом месте #!"

 #Hannibal
 historical_commander_trait.0001.t: "Первый Темный властелин"
 historical_commander_trait.0001.desc: "Изучая тактики, применявшиеся в войнах древности, я с [ROOT.Char.Custom('surprised_reaction')] [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )] о том, как начиналась [Glossary('Дагор Браголлах','dagor_bragollach_gloss')]:\n\n#F Спустя годы, которые Моргот, первый Темный властелин провел в осаде в стенах своей цитадели Ангбанд, он низверг на осаждающих необъятные потоки лавы и огня из недр Тангородрима, наряду с удушающими испарениями Железных гор. И из этого пламени явились теперь уже полностью выросший Глаурунг, балроги и армии орков в количестве, которое эльфы никогда не могли себе представить. Так началась Битва Внезапного Пламени!#!"
 historical_commander_trait.0001.a: "Я уничтожу своих врагов, как это сделал Моргот!"
 historical_commander_trait.0001.b: "Темный властелин был мастером тактики рассыпного боя."
 historical_commander_trait.0001.c: "Величайшей силой Моргота была гибкость."
 historical_commander_trait.0001.d: "Тьфу! Выступить против всего Средиземья — большая глупость."
 historical_commander_trait.0001.d.good: "К счастью, Моргот не вернется. Правда ведь?"
 #Caesar
 historical_commander_trait.0002.t: "Поражение в Ирисной низине"
 historical_commander_trait.0002.desc: "Изучая тактику полководцев древности, я [Select_CString(ROOT.Char.IsFemale, 'была потрясена', 'был потрясён' )], узнав о трагическом исходе последней битвы Исильдура.\n\n#F В начале Третьей эпохи, возвращаясь домой с триумфом после падения Саурона, Исильдур и его эскорт из 200 солдат попали в засаду многотысячной орочьей орды. [Glossary( 'Дирнайт', 'dirnaith_gloss' )] разорвал бы орду орков на части, но из-за неровной местности у Исильдура не оставалось иного выбора, кроме как сформировать [Glossary( 'тангайл', 'thangail_gloss' )]. Строй держался некоторое время, пока орки не окружили храбрых дунэдайн полумесяцем. После того, как его сыновья пали в бою, Исильдуру посоветовали отступить, но он погиб от орочьей стрелы.#!"
 historical_commander_trait.0002.a: "Создание временных защитных сооружений могло бы предотвратить эту трагедию..."
 historical_commander_trait.0002.b: "Формирование стены щитов было наилучшим вариантом, учитывая обстоятельства..."
 historical_commander_trait.0002.c: "Формирование дирнайта могло бы переломить исход сражения, несмотря на местность..."
 historical_commander_trait.0002.d: "Лучше не вспоминать об этой трагической истории..."
 #Alexander
 historical_commander_trait.0003.t: "Великая армада"
 historical_commander_trait.0003.desc: "Изучая тактику древних полководцев, я не перестаю удивляться подвигам древних нуменорцев.\n\n#F В конце Второй эпохи король Ар-Фаразон построил самый впечатляющий флот, который когда-либо видел мир. Его целью было завоевать бессмертие самих Валар в Амане. Когда они окружили остров Тол-Эрессеа, а их армии высадились на холме Туна, Валар воззвали к Эру, который низверг весь флот в пучину, что навсегда изменила саму форму Арды. Тем временем на суше Ар-Фаразон и его армия были погребены под лавиной падающих камней.#!"
 historical_commander_trait.0003.a: "Самому Эру пришлось вмешаться, чтобы остановить великий флот!"
 historical_commander_trait.0003.b: "Столько лет простояли эти великолепные сооружения... И были потеряны в одно мгновение."
 historical_commander_trait.0003.c: "Величайшее из сокровищ — бессмертие. Его амбиции были более чем оправданы!"
 historical_commander_trait.0003.d: "Зачем тратить время на изучение такой ерунды?"

 #Constantine
 historical_commander_trait.0004.t: "Падение Гондолина"
 historical_commander_trait.0004.desc: "Читая рассказы о Первой эпохе, я останавливаюсь, чтобы изучить Падение [Concept('gondolin', 'Гондолина')|E].\n\n#F В течение почти семидесяти пяти лет Тургон и его народ тайно строили Гондолин. Благодаря семи вратам, преграждавщим сокрытый путь, город просуществовал 400 лет в процветании и оставался спрятанным от глаз Темного властелина. Однако предатель Маэглин, племянник Тургона, был схвачен за стенами города и под пытками выдал его местонахождение. Впоследствии войска Моргота разграбили и разрушили город.#!"
 historical_commander_trait.0004.a: "Тургон проигнорировал предупреждение Улмо! Его гордость стала его погибелью."
 historical_commander_trait.0004.b: "Семь врат для защиты сокрытого пути! Если бы не предатель..."
 historical_commander_trait.0004.c: "Изобретательность Моргота в похищении Маэглина превзошла все средства защиты."
 historical_commander_trait.0004.d: "Величайшее из предательств! В этой истории нет мудрости!"

 #Khalid ibn al-Walid
 historical_commander_trait.0005.t: "Сопротивление на реке Лун"
 historical_commander_trait.0005.desc: "Изучая тактику генералов Второй эпохи, я погружаюсь в размышления, узнав о сопротивлении эльфов на реке Лун.\n\n#F В 1695 году В.Э. Гиль-галад, верховный король нолдор-изгнанников в Средиземье, обратился за помощью к Нуменору, когда Саурон вторгся в Эриадор. Тар-Минастир послал большой флот под командованием адмирала Кирьятура, но сборы и путь заняли без малого пять лет. Тем временем эльфы Линдона доблестно сопротивлялись натиску Саурона на реке Лун, пока подкрепление нуменорцев не позволило им переломить ход сражения.#!"
 historical_commander_trait.0005.a: "[ROOT.GetCharacter.GetFaith.HighGodName] придаст нам сил в эти темные времена."
 historical_commander_trait.0005.b: "Именно их умение преодолевать броды позволяло им сопротивляться."
 historical_commander_trait.0005.c: "#EMP Сила#! столь же важна, сколь и #EMP терпение#!."
 historical_commander_trait.0005.d: "Трагическую потерю стольких жизней стоит просто забыть."

 #Bilge Khagan
 historical_commander_trait.0006.t: "Мудрый царь"
 historical_commander_trait.0006.desc: "Изучая тактику полководцев древности, я с большим интересом [Select_CString(ROOT.Char.IsFemale, 'прочла', 'прочел' )] о подвигах Бильге-хана, покорившего все четыре части света.\n\nПройдя огнем и мечом через земли басмылов и Гуачжоу, он разгромил трехсоттысячную армию танского императора Сюань-цзуна. Бильге-хан прекрасно понимал, что наша главная сила — в быстроте и мобильности!\n\nПозднее Бильге-хан со своим войском во славу Тенгри разбил киданей и татабов."
 historical_commander_trait.0006.a: "С благословения небес мы обретем победу!"
 historical_commander_trait.0006.b: "$historical_commander_trait.0005.c$"
 historical_commander_trait.0006.c: "Мобильная армия требует гибкой тактики!"
 historical_commander_trait.0006.d: "Мы не нуждаемся в дешевых фокусах!"

 #Alexander
 historical_commander_trait.0007.t: "Сунь Цзы"
 historical_commander_trait.0007.desc: "Когда я изучаю семь военных классиков, меня повергают в [ROOT.Char.Custom('surprised_reaction')] истории о битве при Боцзю, где Сунь Цзы доказал жизнеспособность своих теорий об искусстве войны.\n\n#F Считается, что в период Вёсен и Осеней войска Ву под руководством Сунь Цзы одержали победу над превосходящими их числом силами Чу, применив уложения из его трактата, который ныне повсеместно изучают как пособие по военному делу.#!"
 historical_commander_trait.0007.a: "Линия между беспорядком и порядком лежит в логистике"
 historical_commander_trait.0007.b: "Высшее искусство войны — подчинить врага без боя"
 historical_commander_trait.0007.c: "Когда ты двинешься, падай, как молния!"
 historical_commander_trait.0007.d: "Величайшая победа — это та, которая не требует сражения"