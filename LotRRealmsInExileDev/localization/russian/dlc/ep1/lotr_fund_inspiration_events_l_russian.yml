# (Metal)Smith
 fund_inspiration.0071.crafting_tools: "A new set of tools for my workshop."

 #Elven Woods
 
 fund_inspiration.6007.t: "The mysterious Elven woods,"
 fund_inspiration.6007.desc: fund_inspiration.6007.desc:0 "Моё путешествие по землям [elves|E] одновременно дурманило и сбивало с толку. И хотя мне ещё не довелось встретить ни одного из этих чарующих и таинственных созданий, я часто слышу их песни, что доносятся из крон деревьев, а также нахожу их следы.\n\nК посланию прикладываю серебряную цепочку, что мне удалось найти на обочине. Наверняка работа эльфов."
 fund_inspiration.6007.a: "Such a fine present! Я буду её носить."
 fund_inspiration.6007.b:1 "[event_spouse.GetTitledFirstNameNoTooltip] оценит этот подарок. К лицу он точно придется."
 
 #Orc Territory
 fund_inspiration.6008.t: fund_inspiration.6008.t:0 "Глубоко в землях орков,"
 fund_inspiration.6008.desc: fund_inspiration.6008.desc:0 "Не без риска для собственной жизни я сообщаю вам подробности своей экспедиции, владыка. Орки, что живут в этих землях — отвратительная порода, грязные и уродливые.\n\nСтащив эту безделицу в одном из их лагерей мне едва удалось избежать поимки.\n\nРекомендую приготовить войска на случай если эти чудовищные полчища когда нибудь подберутся к нашим границам!"
 fund_inspiration.6008.a: fund_inspiration.6008.a:0 "Возможно вы правы и нам стоит подготовиться."
 fund_inspiration.6008.b: "Pah! Эти «орки» чёрт знает где. Не могут же они в самом деле нам угрожать."

 county_chastised_beloved_adventurer_modifier: "Chastised Beloved Adventurer"
 #Adventurer decides to join the Mundburgians
 
 lotr_fund_inspiration.6514.t:  fund_inspiration.6514.t:0 "$fund_inspiration.title$ Арнальт Мундбургский"
 lotr_fund_inspiration.6514.introduction:  fund_inspiration.6514.introduction:0 "Я получаю письмо от своего посланника, скрепленное печатью со странным символом: семь концентрических кругов, пересечённых вертикальной чертой."
 lotr_fund_inspiration.6514.desc:  fund_inspiration.6514.desc:0 "\n\n«[ROOT.Char.GetLadyLord], я добрался до великолепного Минас Тирита. В одной из многочисленных местных таверн на первом уровне цитадели, мне повстречался занимательный человек: Арнальт, капитан Мундбургского эореда. Arnalt, Captain of the Mundburgian Éored. По его словам, ему приходилось заниматься многим: он был и управляющим при дворе великого короля и держал пасеку, а теперь, вот, служит с Мундбуржцами.\n\nЭоред является элитным кавалерийским подразделением, в котором преимущественно состоят предприимчивые северяне на службе Гондору. Арнальт, однако, был так впечатлён моим боевым духом, что предложил вступить в их ряды! Надеюсь, вы как никто другой понимаете, что от таких предложений не отказываются...»"
 lotr_fund_inspiration.6514.a:  fund_inspiration.6514.a:0 "Думаю, ты куда больше пригодишься в качестве моего полководца."
 lotr_fund_inspiration.6514.b:  fund_inspiration.6514.b:0 "Если останешься там, то я прикажу доставить тебя ко мне в колодках!"
 lotr_fund_inspiration.6514.b.toast_outcome.positive:  "[inspiration_owner.GetTitledFirstNameNoTooltip] is intimidated"
 lotr_fund_inspiration.6514.b.toast_outcome.positive.continue:  "The adventure continues"
 lotr_fund_inspiration.6514.b.toast_outcome.positive.flee:  fund_inspiration.6514.b.toast_outcome.positive.flee:0 "[inspiration_owner.GetSheHe|U] покидает ваш двор."
 lotr_fund_inspiration.6514.b.toast_outcome.refusal:  "[inspiration_owner.GetTitledFirstNameNoTooltip] is unimpressed"
 lotr_fund_inspiration.6514.c:  fund_inspiration.6514.c:0 "Пусть остаётся со своими новыми друзьями. У меня больше нет на него планов."
 
 #Adventurer got fleeced in Umbar

 lotr_fund_inspiration.6515.t:  fund_inspiration.6515.t:0 "$fund_inspiration.title$ Изменившее счастье"
 lotr_fund_inspiration.6515.introduction:  fund_inspiration.6515.introduction:0 "От своего посланника я получаю письмо, местами помятое и запятнанное. Кроме того, от него просто несёт пивом и дешёвым ромом."
 lotr_fund_inspiration.6515.desc:  fund_inspiration.6515.desc:0 "\n\n«О, [ROOT.Char.GetTitleAsNameNoTooltip], ваше величие и щедрость не знают границ. Мне довелось оказаться в неловкой ситуации. Погрузившись в великолепие Умбара, как вы и поручили, я решил пообщаться с местными, разузнать кое-какие слухи о возможных сокровищах, что были бы достойны вашего величия.\n\nИ хотя мне удалось узнать об одних занятных нуменорских руинах, которые я теперь и планирую посетить, я растратил всё золото, которое вы так мудро вручили мне. Клянусь вам, местные играли нечестно, поскольку ни с одной раздачей мне не повезло, а это не возможно!\n\nНе могли бы вы направить дополнительные средства на продолжение моей миссии?»"
 lotr_fund_inspiration.6515.a:  fund_inspiration.6515.a:0 "Надеюсь эта информация стоила потраченных денег. Я вышлю дополнительные средства."
 lotr_fund_inspiration.6515.b:  fund_inspiration.6515.b:0 "Деньги были не на карты, тебе придётся выиграть их обратно."
 lotr_fund_inspiration.6515.b.success:  fund_inspiration.6515.b.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] возвращает проигранные деньги"
 lotr_fund_inspiration.6515.b.failure:  fund_inspiration.6515.b.failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] проигрывает всё до последних трусов"
 lotr_fund_inspiration.6515.c:  fund_inspiration.6515.c:0 "Вернись к ним и забери мои деньги!"
 lotr_fund_inspiration.6515.c.success:  fund_inspiration.6515.c.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] возвращает ваши деньги"
 lotr_fund_inspiration.6515.c.failure:  fund_inspiration.6515.c.failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] проигрывает в схватке"
 
 #Adventurer meets Knights of Ni

 lotr_fund_inspiration.6516.t:  fund_inspiration.6516.t:0 "$fund_inspiration.title$ Эксцентричная выходка"
 lotr_fund_inspiration.6516.desc:  fund_inspiration.6516.desc:0 "\n\n«Милорд, я пишу вам из этого тёмного леса, чтобы сообщить о совершенно необычайной встрече. В чащобе мне повстречалась группа очень высоких рыцарей, с длинными усами и высокими рогатыми шлемами.\n\nОни представились Рыцарями Репы, и стали угрожать, что если я не пожертвую им немного клумб, то будут повторять «Репа» раз за разом.\n\nИ хотя прежде мне не доводилось слышать об этом загадочном рыцарском ордене, а необычная угроза застала меня врасплох, я определённо был в меньшинстве.»"
 lotr_fund_inspiration.6516.a:  fund_inspiration.6516.a:0 "Это же очевидно! Нужно найти ближайшую клумбу и нарвать немного кустарника."
 lotr_fund_inspiration.6516.b:  fund_inspiration.6516.b:0 "Всего то и нужно, что найти самое высокое дерево и срубить его селёдкой!"
 lotr_fund_inspiration.6516.c:  fund_inspiration.6516.c:0 "Вы решаете что терпеть эту ерунду не стоит, и двинулись дальше."
 lotr_fund_inspiration.6516.c.success:  fund_inspiration.6516.c.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] умудряется убраться восвояси в целости и сохранности."
 lotr_fund_inspiration.6516.c.failure:  fund_inspiration.6516.c.failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] «заРепали» до бессилия."
 
 #Adventurer gets captured and brought to Edoras
 
 lotr_fund_inspiration.6517.t:  fund_inspiration.6517.t:0 "$fund_inspiration.title$ Пленник в Эдорасе"
 lotr_fund_inspiration.6517.introduction:  fund_inspiration.6517.introduction:0 "Я получаю письмо от своего посланника, написанное в спешке на грубом куске пергамента из лошадиной кожи."
 lotr_fund_inspiration.6517.desc:  fund_inspiration.6517.desc:0 "«Ми[ROOT.Char.GetLadyLord], мне требуется ваша помощь. Пересекая равнины Рохана, отряд всадников окружил меня и приказал следовать за ними в Эдорас.\n\nИх предводитель сказал следующее: «Согласно нашим законам чужеземцам не дозволяется путешествовать по окрестным землям без дозволения Короля Рохана».\n\nУже скоро меня призовут в Медусельд, и ваша помощь мне бы очень пригодилась»."
 lotr_fund_inspiration.6517.a:  fund_inspiration.6517.a:0 "Напомни [rohanking.GetHerHim], что вы сражаетесь на одной стороне."
 lotr_fund_inspiration.6517.b:  fund_inspiration.6517.b:0 "Высылаю тебе золото. Его должно хватить, чтобы выкупить свою свободу."
 lotr_fund_inspiration.6517.c:  fund_inspiration.6517.c:0 "Напомни [rohanking.GetHerHim] кто тебя послал. Пусть убоится моего гнева!"
 lotr_fund_inspiration.6517.c.success:  fund_inspiration.6517.c.success:0 "[rohanking.GetTitledFirstNameNoTooltip] поддаётся на ваши угрозы."
 lotr_fund_inspiration.6517.c.failure:  fund_inspiration.6517.c.failure:0 "[rohanking.GetTitledFirstNameNoTooltip] приказывает казнить [inspiration_owner.GetTitledFirstNameNoTooltip]."
 
 #Adventurer assaulted by a gigantic bear
 
 lotr_fund_inspiration.6518.t:  "$fund_inspiration.title$ Barely Alive"
 lotr_fund_inspiration.6518.introduction:  "I receive a missive from my adventurer, who has been sailing up the Anduin."
 lotr_fund_inspiration.6518.desc:  fund_inspiration.6518.desc:0 "\n\n«Ми[ROOT.Char.GetTitleAsNameNoTooltip], я пишу вам, едва собравшись с мыслями.\n\nНаслаждаясь заслуженным отдыхом после долгого сплава по Андуину, недалеко от огромной скалы, которую местные называют Каррок, я услышал ужасающий рёв позади.\n\nОбернувшись, я увидел огромнейшего медведя, какого мне доводилось видеть. Раза в два больше обычного — он пёр прямо на меня»."
 lotr_fund_inspiration.6518.a:  fund_inspiration.6518.a:0 "Тебе едва удалось убежать, не так ли?"
 lotr_fund_inspiration.6518.b:  fund_inspiration.6518.b:0 "Ты сразился с гигантским медведем."
 lotr_fund_inspiration.6518.b.success:  fund_inspiration.6518.b.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] успешно отгоняет медведя"
 lotr_fund_inspiration.6518.b.failure:  fund_inspiration.6518.b.failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] получает от медведя ранение"
 lotr_fund_inspiration.6518.b.critical_failure:  fund_inspiration.6518.b.critical_failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] погибает в схватке с медведем"

 #Orc adventurer sneaks upon a Tark camp

 lotr_fund_inspiration.6519.t:  fund_inspiration.6519.t:0 "$fund_inspiration.title$ Тарки, тарки, тарки! Тарки повсюду!"
 lotr_fund_inspiration.6519.desc:  fund_inspiration.6519.desc:0 "\n\n«[ROOT.Char.GetTitleAsNameNoTooltip], это место кишит тарками, они же повсюду! И каждый из них хочет спустить с меня шкуру!»\n\n«Двоих с захода солнца мне уже удалось прикончить, а теперь я вижу кое-что интересное: слабо охраняемый лагерь тарков. Возможно там есть что-то ценное, а может какая-нибудь информация».\n\n«Я на изготовке. Можно ворваться в лагерь и перерезать глотки страже»."
 lotr_fund_inspiration.6519.a:  fund_inspiration.6519.a:0 "Убей всех и забери всё что найдёшь"
 lotr_fund_inspiration.6519.a.critical_success:  fund_inspiration.6519.a.critical_success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] настигает цель"
 lotr_fund_inspiration.6519.a.boil_skull:  fund_inspiration.6519.a.boil_skull:0 "[adventurer.GetFirstNameNoTooltip] вываривает и очищает череп: [guard.GetFirstNamePossessiveNoTooltip] будет неплохо смотреться при дворе в качестве трофея"
 artifact_guard_skull:  artifact_guard_skull:0 "Стражник [killed.GetLadyLord|U] [killed.GetTitledFirstName] был убит. [creator.GetTitledFirstName] подготовил череп и отправил его ко двору. Владельцем артефакта становится [owner.GetTitledFirstName]. Улыбка у него довольно жуткая, а отверстия глаз пусты."
 lotr_fund_inspiration.6519.a.success:  fund_inspiration.6519.a.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] распугивает стражу"
 lotr_fund_inspiration.6519.a.failure:  fund_inspiration.6519.a.failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] получает ранение от стражи"
 lotr_fund_inspiration.6519.a.critical_failure:  fund_inspiration.6519.a.critical_failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] погибает в схватке со стражниками"
 lotr_fund_inspiration.6519.b:  fund_inspiration.6519.b:0 "Нет, лучше прокрасться осторожно и найти ценности"
 lotr_fund_inspiration.6519.b.success:  fund_inspiration.6519.b.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] прокрадывается мимо стражников"
 lotr_fund_inspiration.6519.b.failure:  "[inspiration_owner.GetTitledFirstNameNoTooltip] is detected"
 lotr_fund_inspiration.6519.c:  fund_inspiration.6519.c:0 "Не нужно рисковать, шансов предоставится ещё немало"

 #Adventurer meets escaped slave in Nurn

 lotr_fund_inspiration.6520.t:  fund_inspiration.6520.t:0 "$fund_inspiration.title$ Прирождённый беглец"
 lotr_fund_inspiration.6520.desc:  fund_inspiration.6520.desc:0 "\n\n«[Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetLadyLord], в путешествиях по сельскохозяйственным равнинам моря [nurn|E] мне повстречалась группа беглых рабов».\n\n«Их лидером был бывший надсмотрщик: [slave.GetTitledFirstNameNoTooltip]. Он подаёт надежды и просит разрешение присодениться к вашему двору».\n\n«Что мне с ним делать?»"
 lotr_fund_inspiration.6520.a:  fund_inspiration.6520.a:0 "Отправьте [slave.GetHerHim] к моему двору, мне всегда пригодятся умелые придворные"
 lotr_fund_inspiration.6520.b:  fund_inspiration.6520.b:0 "Верните беглеца владельцу, за вознаграждение"
 lotr_fund_inspiration.6520.c:  fund_inspiration.6520.c:0 "Не волнуют меня беглые рабы и их владельцы"
 
 #Adventurer gets offered electrum nugget in Bellakar

 lotr_fund_inspiration.6521.t:  "$fund_inspiration.title$ Electrum Rush"
 lotr_fund_inspiration.6521.introduction:  fund_inspiration.6521.introduction:0 "Я получаю письмо от своего посланника, который в данный момент находится в Беллакаре."
 lotr_fund_inspiration.6521.desc:  fund_inspiration.6521.desc:0 "\n\n«[Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetLadyLord], мне удалось добраться до региона [bellakar|E], также известного как Золотое царство»\n\n«В одной из прокопченных комнатушек таверны, где я останавливаюсь, ко мне приближается пара местных изыскателей, которые ищут в окрестностях электрумовую руду. В городе они чтобы продать свои находки и пополнить припасы».\n\n«В окончание прекрасного вечера они подарили мне довольно крупный электрумовый самородок, с знак дружбы. Разумеется, я передаю его вам»."
 lotr_fund_inspiration.6521.a:  fund_inspiration.6521.a:0 "Конечно присылайте, в моих чертогах он будет смотреться просто прекрасно"
 lotr_fund_inspiration.6521.b:  fund_inspiration.6521.b:0 "Продайте его и используйте прибыль для продолжения странствий"
 lotr_fund_inspiration.6521.c:  fund_inspiration.6521.c:0 "Плевать мне на электрум, лучше золота пришлите"
 
 # Adventurer meets spice traders in Bozisha-Miraz

 lotr_fund_inspiration.6522.t:  fund_inspiration.6522.t:0 "$fund_inspiration.title$ Да польются специи рекой"
 lotr_fund_inspiration.6522.introduction:  fund_inspiration.6522.introduction:0 "Я получаю письмо от своего посланника. От пергамента исходит стойкий аромат экзотических специй."
 lotr_fund_inspiration.6522.desc:  fund_inspiration.6522.desc:0 "\n\n«[ROOT.Char.GetTitleAsNameNoTooltip], после долгих странствий по густым джунглям Божиша-Мираз, мне удалось достичь крупного процветающего поселения»\n\n«Здесь все торговцы богаты и горды, но больше всех пафоса – у торговцев специями. Их прилавки ломятся от разнообразия цветов и ароматов, а бесчисленные перстни на их пальцах не уступают пестротой павлиньим хвостам».\n\n«На одну из их специй я предлагаю обратить особое внимание, [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetLadyLord]: Кох-Фэй, по слухам, укрепляет рассудок и помогает навигатором ориентироваться в открытом море»."
 lotr_fund_inspiration.6522.a:  fund_inspiration.6522.a:0 "От торговой сделки с этими купцами можно неплохо выиграть"
 lotr_fund_inspiration.6522.a.success:  fund_inspiration.6522.a.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] заключает выгодную торговую сделку"
 lotr_fund_inspiration.6522.a.failure:  fund_inspiration.6522.a.failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] заключает справедливую торговую сделку"
 lotr_fund_inspiration.6522.b:  fund_inspiration.6522.b:0 "Вышлите мне ящик этого Кох-Фэя, да и себе на чашечку оставьте"
 lotr_fund_inspiration.6522.c:  fund_inspiration.6522.c:0 "Постарайтесь раздобыть эту специю, и чтоб незаметно"
 lotr_fund_inspiration.6522.c.success:  fund_inspiration.6522.c.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] похищает ящик Кох-Фэя"
 lotr_fund_inspiration.6522.c.failure:  fund_inspiration.6522.c.failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] попадается с поличным"

 # Adventurer develops an interest for herbs in Ithilien

 lotr_fund_inspiration.6523.t:  fund_inspiration.6523.t:0 "$fund_inspiration.title$ Сады Гондора"
 lotr_fund_inspiration.6523.introduction:  fund_inspiration.6523.introduction:0 "Я получаю письмо от своего посланника. При открытии из конверта выпадают сосновые иглы и засушенные травы."
 lotr_fund_inspiration.6523.desc:  fund_inspiration.6523.desc:0 "\n\n«[Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetLadyLord], ах как бы мне хотелось, чтобы вы увидели Итилиэн собственными глазами. Это дикие, но прекрасные земли».\n\n«Людей здесь днём с огнём не сыщешь, поэтому у меня быстро закончились припасы. В этой связи мне пришлось заняться охотой. Я готовлю на костре и широко использую местные травы, которыми окрестные леса просто изобилуют».\n\n«Мне также удалось отыскать невероятно полезное растение: «Королевский лист». Поговаривают, что он помогает исцелять не только тело, но и разум»." 'Kingsfoil', as I believe it is called.'"
 lotr_fund_inspiration.6523.a:  fund_inspiration.6523.a:0 "Купите себе припасов и перестаньте тратить время"
 lotr_fund_inspiration.6523.b:  fund_inspiration.6523.b:0 "Торопиться некуда, ваши новые навыки наверняка пригодятся"
 lotr_fund_inspiration.6523.c:  fund_inspiration.6523.c:0 "Отправьте-ка мне этих травок, думаю придворному врачу они пригодятся"
 
 # Adventurer discovers Edhellond

 lotr_fund_inspiration.6524.t:  "$fund_inspiration.title$ Elves Where?"
 lotr_fund_inspiration.6524.introduction:  fund_inspiration.6524.introduction:0 "Я получаю письмо от моего посланника, а из складок бумаги выпадает несколько крупиц серебристого песка."
 lotr_fund_inspiration.6524.desc:  fund_inspiration.6524.desc:0 "\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetTitleAsNameNoTooltip|l], мне удалось добраться до побережья Бухты Бельфалас, что в прибрежных землях [Concept( 'gondor', 'Гондора' )|E]. Местные жители указали мне на загадочное место, заброшенное, но почитаемое окрестным населением».\n\n«Нечасто простому путнику удаётся посетить древнюю эльфийскую гавань Эдэллонд, а ощущения мои трудно передать словами. Её невероятно утончённая архитектура, представленная элегантными текущими строениями сохранилась в едва ли не первозданном виде, однако неясно за счёт чего: мастерства ли давно покинувших эти места [sindarelves|E] или бережливого отношения [Concept( 'gondorians', 'гондорцев' )|E]».\n\n«На стенах нередко присутствуют гравировки, в которых запечатлены ландшафты, труд корабелов или моряков. Быть может стоит здесь задержаться и изучить их?»"
 lotr_fund_inspiration.6524.a:  fund_inspiration.6524.a:0 "Обыщите это место в поисках карты местности, быть может здесь есть и другие секреты"
 lotr_fund_inspiration.6524.a.success:  fund_inspiration.6524.a.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] находит фреску с указаниями не местонахождение забытых руин"
 lotr_fund_inspiration.6524.a.failure:  fund_inspiration.6524.a.failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] не находит в городе ничего полезного" 
 lotr_fund_inspiration.6524.b:  fund_inspiration.6524.b:0 "Постарайтесь узнать что нибудь о секретах кораблестроения"
 lotr_fund_inspiration.6524.c:  fund_inspiration.6524.c:0 "Да там уже сто лет как всё разграбили, собирайтесь в путь"
 
 # Adventurer goes on a pubcrawl in Dorwinion
 
 lotr_fund_inspiration.6525.t:  "$fund_inspiration.title$ Strong Vintage"
 lotr_fund_inspiration.6525.introduction:  fund_inspiration.6525.introduction:0 "Я получаю письмо от своего посланника, которое, судя по запаху, запятнано дорогущим вином."
 lotr_fund_inspiration.6525.desc:  fund_inspiration.6525.desc:0 "\n\n«Ми[ROOT.Char.GetLadyLord], вам наверняка не раз доводилось слышать о знаменитых винах [Concept( 'dorwinion', 'Дорвиниона' )|E]. Его дегустируют по всему северу и высоко ценят при дворах [Concept( 'dale', 'Дэйла')|E], [Concept( 'erebor', 'Эребора' )|E] и [Concept( 'mirkwood', 'Лихолесья' )|E]».\n\n«Поговаривают, что даже [Concept( 'elves', 'эльфам' )|E] оно бьёт в голову. И как ваш посланник, я не мог не проверить эти расхожие слухи».\n\n«После ночи дегустаций в ряде лучших местных питейных заведений, я очнулся с осознанием двух абсолютных истин: все эти слухи есть ни что иное как чистая правда, а денег у меня больше нет»."
 lotr_fund_inspiration.6525.a:  fund_inspiration.6525.a:0 "Придётся восстановить картину произошедшего и вернуть утраченные средства"
 lotr_fund_inspiration.6525.a.success:  fund_inspiration.6525.a.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] находит свой потерянный кошель"
 lotr_fund_inspiration.6525.a.failure:  fund_inspiration.6525.a.failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] не может отыскать деньги" 
 lotr_fund_inspiration.6525.b:  fund_inspiration.6525.b:0 "Следующей ночью вы ограбили постояльцев таверны"
 lotr_fund_inspiration.6525.b.success:  fund_inspiration.6525.b.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] возмещает утраченные средства"
 lotr_fund_inspiration.6525.b.failure:  "[inspiration_owner.GetTitledFirstNameNoTooltip] gets caught" 
 lotr_fund_inspiration.6525.c:  fund_inspiration.6525.c:0 "И знать ничего не хочу. Вот вам ещё деньги и в этот раз не пропейте!"
 
 # Adventurer is attacked by giant spiders in Mirkwood
 
 lotr_fund_inspiration.6526.t:  "$fund_inspiration.title$ Arachnophobia"
 lotr_fund_inspiration.6526.introduction:  fund_inspiration.6526.introduction:0 "От посланника приходит письмо, местами покрытое толстым слоем паутины."
 lotr_fund_inspiration.6526.desc:  fund_inspiration.6526.desc:0 "\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetTitleAsNameNoTooltip|l], я достиг бескрайних и мрачных лесов [Concept( 'mirkwood', 'Лихолесья' )|E]. Им нет ни конца ни края, а двуногих опасности здесь поджидают на каждом шагу».\n\n«Но хуже всего – гигантские пауки. Здесь всё кишит этими отвратительными тварями, их коварные сети расставлены для глупых и невнимательных».\n\n«Пишу я вам постольку, что повстречал самого чудовищного из таких вот пауков»."
 lotr_fund_inspiration.6526.a:  fund_inspiration.6526.a:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] должно быть проскакивает мимо паука"
 lotr_fund_inspiration.6526.a.success:  fund_inspiration.6526.a.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] обводит паука вокруг пальца"
 lotr_fund_inspiration.6526.a.failure:  "[inspiration_owner.GetTitledFirstNameNoTooltip] is detected" 
 lotr_fund_inspiration.6526.b:  fund_inspiration.6526.b:0 "Наверняка мой посланник сразил чудовище?"
 lotr_fund_inspiration.6526.b.success:  fund_inspiration.6526.b.success:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] убивает паука"
 lotr_fund_inspiration.6526.b.failure:  "[inspiration_owner.GetTitledFirstNameNoTooltip] was wounded"
 lotr_fund_inspiration.6526.b.critical_failure:  fund_inspiration.6526.b.critical_failure:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] становится ужином паука"
 lotr_fund_inspiration.6526.c:  fund_inspiration.6526.c:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] прячется в зарослях и ждёт, пока паук отправится восвояси"
 
 # Adventurer visits the Market of Dale 
 
 lotr_fund_inspiration.6527.t:  "$fund_inspiration.title$ Market Day"
 lotr_fund_inspiration.6527.introduction:  fund_inspiration.6527.introduction:0 "Я получаю письмо, скреплённое печатью с луком и звёздами Дэйла."
 lotr_fund_inspiration.6527.desc:  fund_inspiration.6527.desc:0 "\n\n«Ми[ROOT.Char.GetLadyLord], мне удалось добраться до города [dale|E], а также посетить его ярмарку. Совершив обход достопримечательностей, я выбираю то, что могло бы вас заинтересовать:»\n\n«Заводная деревянная игрушка со знаменитой ярмарки игрушек Дэйла, утончённая брошь гномьей работы с клеймом кузнецов [Concept( 'erebor', 'Эребора' )|E], или один из множества сыров на продаже в Гильдии Сыроваров»\n\n«Если что-то из перечисленного вас заинтересует – пожалуйста направьте средства на приобретение. По торговому законодательству гномов, которое здесь применяется, в течение двух недель вы можете вернуть товар и получить деньги назад."
 lotr_fund_inspiration.6527.a:  fund_inspiration.6527.a:0 "Будь я ребёнком – непременно прикупил бы такую"
 lotr_fund_inspiration.6527.b:  fund_inspiration.6527.b:0 "Привезите мне эту брошь. Меня всегда восхищала гномья работа"
 lotr_fund_inspiration.6527.c:  fund_inspiration.6527.c:0 "Прикуплю ка я сыр, будем хранить его в своих погребах"
 lotr_fund_inspiration.6527.d:  fund_inspiration.6527.d:0 "Я что, по-твоему, купаюсь в деньгах? А ну за работу!"
 lotr_fund_inspiration.6527.d_tt:  fund_inspiration.6528.a_tt:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] продолжает своё путешествие"
 
 # Elven adventurer loses track of time in Caras Galadhon
 
 lotr_fund_inspiration.6528.t:  fund_inspiration.6528.t:0 "$fund_inspiration.title$ Время замерло"
 lotr_fund_inspiration.6528.introduction:  fund_inspiration.6528.introduction:0 "Я получаю письмо от моего посланника, который везёт лист Мэллорна из [Concept( 'lothlorien', 'Лотлориэна' )|E]."
 lotr_fund_inspiration.6528.desc:  fund_inspiration.6528.desc:0 "\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetTitleAsNameNoTooltip|l], я стою у города Карас Галадон, сердца эльфийских земель [Concept( 'middleearth', 'Средиземья' )|E]. Это поистине стоящее зрелище, а время здесь, кажется, течёт ощутимо медленнее, чем во внешнем мире. Мне с трудом верится, что прошло уже три месяца!»'\n\n«Мне повстречался учёный, который предложил вместе изучить древние свитки в поисках забытых реликвий, а также охотничий отряд, любезно пригласивший меня присоединиться к их охоте. Чьё приглашение мне принять, ми[ROOT.Char.GetLadyLord]?»"
 lotr_fund_inspiration.6528.a:  fund_inspiration.6528.a:0 "Ты и без того уже долго прохлаждаешься! Пора в путь!"
 lotr_fund_inspiration.6528.a_tt:  fund_inspiration.6528.a_tt:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] продолжает своё путешествие"
 lotr_fund_inspiration.6528.b:  fund_inspiration.6528.b:0 "Отправляйся с учёным и привези что-нибудь полезное"
 lotr_fund_inspiration.6528.c:  fund_inspiration.6528.c:0 "Славная охота наверняка поможет собраться с мыслями для предстоящего пути"
 
 #Evil adventurer is rightly scared of Galadriel

 lotr_fund_inspiration.6529.t:  fund_inspiration.6513.t:0 "$fund_inspiration.title$ Ведьма Золотого Леса"
 lotr_fund_inspiration.6529.desc:  fund_inspiration.6513.desc:0 "\n\n«Я достиг опушки проклятого Золотого Леса, мой [ROOT.Char.GetTitleAsNameNoTooltip]. Местные говорят, что живым отсюда ещё никто не возвращался. Я конечно не трус, но опасаюсь, что с магией Королевы Ведьм мне не справиться.\n\nПожалуйста, позвольте мне вернуться ко двору, где живым я пригожусь больше, чем мёртвым»."
 lotr_fund_inspiration.6529.a:  fund_inspiration.6513.a:0 "Думаю, живым от тебя будет больше пользы..."
 lotr_fund_inspiration.6529.a.tt:  fund_inspiration.6513.a.tt:0 "[inspiration_owner.GetTitledFirstName] получит ваше разрешение вернуться домой."
 lotr_fund_inspiration.6529.b:  fund_inspiration.6513.b:0 "Хорошо, но лучше бы изучить окрестные земли, чтобы деньги не пропадали зря!"
 lotr_fund_inspiration.6529.b.tt:  fund_inspiration.6513.b.tt:0 "[inspiration_owner.GetTitledFirstName] исследует окрестности Лориэна."
 lotr_fund_inspiration.6529.c:  fund_inspiration.6513.c:0 "Плевать мне на ведьм, исследование нужно продолжать!"
 lotr_fund_inspiration.6529.c.tt:  fund_inspiration.6513.c.tt:0 "[inspiration_owner.GetTitledFirstName] попытается проникнуть в лес."
 
 # Attack of the Drake hehe
 
 lotr_fund_inspiration.6530.t:  "$fund_inspiration.title$ A Unexpected Visitor"
 lotr_fund_inspiration.6530.desc:  "\n\n'While we where traversing the [greymountains|E], suddenly the cliffs echoed with a terrible roar, as if a spawn of the very Angband was coming for us.\n\nAnd then it appeared.. A Drake of the frozen north had come for us and was swiftly coming down the mountain to end our lives and turn us into its morning snack.'"
 lotr_fund_inspiration.6530.a:  "Fly you fools!"
 lotr_fund_inspiration.6530.a.success:  "[inspiration_owner.GetTitledFirstName] successfully escaped the Drake without being harmed"
 lotr_fund_inspiration.6530.a.failure:  "[inspiration_owner.GetTitledFirstName] escaped successfully but not quite unharmed"
 lotr_fund_inspiration.6530.b:  "Stand and fight!"
 lotr_fund_inspiration.6530.b.success:  "[inspiration_owner.GetTitledFirstName] successfully managed to slay the Drake"
 lotr_fund_inspiration.6530.b.failure:  "[inspiration_owner.GetTitledFirstName] managed to fend of the Drake but not without getting harmed"
 lotr_fund_inspiration.6530.b.critical_failure:  "[inspiration_owner.GetTitledFirstName] was burned alive by the Drake"
 
 #Adventurer mistakes fat lizard for a drake in the Grey Mountains

 lotr_fund_inspiration.6531.t:  "$fund_inspiration.title$ The Largest Drake Ever"
 lotr_fund_inspiration.6531.introduction:  "I receive a letter from my adventurer, who has been hiking through the frozen [greymountains|E]."
 lotr_fund_inspiration.6531.desc:  "\n\n'My [ROOT.Char.GetTitleAsNameNoTooltip], I send you a royal gift: the hide from the largest of the fearsome drakes that roam the north.\n\nIt sprang on me with a vicious roar, its teeth like giant knives aiming for my throat. But my lightning-quick reflexes allowed me to plunge my sword into its belly and slay it.\n\nI have not yet fully recovered from the dreadful experience, and will need some peace and quiet before I can start again on my adventures.'"
 lotr_fund_inspiration.6531.a:  "How...nice. Many thanks"
 lotr_fund_inspiration.6531.a.tt:  "You allow [inspiration_owner.GetTitledFirstName] to rest awhile."
 lotr_fund_inspiration.6531.b:  "You'd better find something better than this, and fast!"
 lotr_fund_inspiration.6531.b.tt:  "You order [inspiration_owner.GetTitledFirstName] back on the trail immediately."
 lotr_fund_inspiration.6531.b.success:  "[inspiration_owner.GetTitledFirstName] is scared enough to start exploring again"
 lotr_fund_inspiration.6531.b.failure:  "[inspiration_owner.GetTitledFirstName] is not impressed"
 
 #Adventurer in the Barrow Downs

 lotr_fund_inspiration.6532.t:  "$fund_inspiration.title$ The Barrow-Downs"
 lotr_fund_inspiration.6532.introduction:  "I receive a letter from my adventurer, who has been roaming the no-man's lands of Cardolan."
 lotr_fund_inspiration.6532.desc:  "\n\n'My [ROOT.Char.GetTitleAsNameNoTooltip], I have reached a series of hills that the locals call "Barrow-Downs". Though it looks perfectly ordinary in the sun, my heart warns me against it.\n\nNight fell as I arrived in front of the entrance to the largest mound. You can probably guess what I did...'"
 lotr_fund_inspiration.6532.a:  "[inspiration_owner.GetSheHe|U]'d better have searched it thoroughly!"
 lotr_fund_inspiration.6532.a.success:  "[inspiration_owner.GetTitledFirstName] searched the barrow without incident"
 lotr_fund_inspiration.6532.a.failure:  "[inspiration_owner.GetTitledFirstName] was terrified by what he found, and fled"
 lotr_fund_inspiration.6532.a.dead:  "[inspiration_owner.GetTitledFirstName] was never seen again"
 lotr_fund_inspiration.6532.b:  "I hope [inspiration_owner.GetSheHe] didn't do anything foolish"
 
 #Overground adventurer lost underground

 lotr_fund_inspiration.6533.t:  "$fund_inspiration.title$ Alone In The Dark"
 lotr_fund_inspiration.6533.introduction:  "I receive a letter from my adventurer, smudged with clay, written in a shaky hand."
 lotr_fund_inspiration.6533.desc:  "\n\n'I have been wandering underground for what feels like an eternity. I have lost any sense of time and am at a loss, in front of yet another cross-roads in these endless halls. I hear nothing but the sound of my footsteps and the distant echo of a war-drum. I am utterly lost, and the oil in my lantern is almost gone. Will I ever find a way out?'\n\nIn a steadier hand, a note says 'I finally made it out, you can probably guess how I did it.'"
 lotr_fund_inspiration.6533.a:  "You forged ahead, followed your nose"
 lotr_fund_inspiration.6533.a.success:  "[inspiration_owner.GetTitledFirstName] found [inspiration_owner.GetHerHis] way out"
 lotr_fund_inspiration.6533.a.success.gem:  "[inspiration_owner.GetTitledFirstName] found a precious gem on their way"
 lotr_fund_inspiration.6533.a.failure:  "[inspiration_owner.GetTitledFirstName] followed the road into a dead-end"
 lotr_fund_inspiration.6533.b:  "You turned around and went back"
 lotr_fund_inspiration.6533.b.success:  "[inspiration_owner.GetTitledFirstName] retraces [inspiration_owner.GetHerHis] steps succesfully"
 lotr_fund_inspiration.6533.b.failure:  "[inspiration_owner.GetTitledFirstName] got lost on the way back"

 #Adventurer wants to read books in Imladris
 
 lotr_fund_inspiration.6534.t:  "$fund_inspiration.title$ The Last Homely House"
 lotr_fund_inspiration.6534.introduction:  "I receive a letter from my adventurer, bearing the seal of Imladris."
 lotr_fund_inspiration.6534.desc:  "'My [ROOT.Char.GetLadyLord], I have arrived in [rivendell|E], and already I am taken by wonder. It is called 'The Last Homely House East of the Sea', and for good reason. The libraries are vast, the feasts are grand, the views are impeccable; any weariness that one might have melts away insantly! I know I must depart soon, but the libraries contain such an abundance of material that I fear by hastily leaving I might miss something of value that might aid in my adventure.\n\nI humbly request that you let me stay a while longer here so I may better explore the collection of lore the place has; some of these scrolls even date back hundreds of years, surely they must have some valuable insight!'"
 lotr_fund_inspiration.6534.a:  "You've tarried long enough, it's time to get going."
 lotr_fund_inspiration.6534.a_tt:  fund_inspiration.6528.a_tt:0 "[inspiration_owner.GetTitledFirstNameNoTooltip] продолжает своё путешествие"
 lotr_fund_inspiration.6534.b:  "Very well, you may stay a while if it is of use."
 
 #Adventurer discovers "pesto" in TH

 lotr_fund_inspiration.6535.t:  "$fund_inspiration.title$ Delicious Rahatân"
 lotr_fund_inspiration.6535.introduction:  "I receive a letter from my adventurer, who has been exploring the far-off Thâni-Hazâd."
 lotr_fund_inspiration.6535.desc:  "\n\n'My [ROOT.Char.GetTitleAsNameNoTooltip], I have a delicious discovery to share with you! During my latest stop in a local inn I tasted the most delightful local sauce. It is named rahatân by the nobles here, and maldina in ancient recipes written in [quenya|E], but the locals call it pês-to.\n\nTo make it you need to grind in a mortar garlic, olive oil, hard cheese, nuts and a good handful of leaves of kingsfoil, that the wise know as Athelas. It goes with everything and you must absolutely try it!'"
 lotr_fund_inspiration.6535.a:  "My cook will prepare some for [food_taster.GetTitledFirstName]."
 lotr_fund_inspiration.6535.a.success:  "[food_taster.GetTitledFirstName] loves it"
 lotr_fund_inspiration.6535.a.failure:  "[food_taster.GetTitledFirstName] finds out [food_taster.GetSheHe] is allergic to nuts"
 lotr_fund_inspiration.6535.b:  "Have my cooks whip some for our next banquet"
 lotr_fund_inspiration.6535.c:  "I distrust foreign food, ours is good enough"
 
 #Adventurer meets Blacklock Mercenaries in Yellow Mountains, by Stella_SAX
 
 lotr_fund_inspiration.6536.t:  "$fund_inspiration.title$ Mercenary Axes"
 lotr_fund_inspiration.6536.introduction:  "I receive a letter from my adventurer, who has been exploring the Yellow Mountains."
 lotr_fund_inspiration.6536.desc:  "\n\n'My [ROOT.Char.GetTitleAsNameNoTooltip], I am writing to you from a [blacklocks|E] mercenary camp which I stumbled upon while traveling through this unpleasant land.\nThey seem to be looking for work, and are willing to offer their services for a reasonable fee.'"
 lotr_fund_inspiration.6536.a:  "Hire a company for me, will you ?"
 lotr_fund_inspiration.6536.b:  "Employ them for your protection, and get on with your adventure!"
 lotr_fund_inspiration.6536.c:  "Just ask them for directions and keep going, we don't have any avalaible funds."

 #Adventurer reports on the abuse of incense in Khy, by Brice Undrerhill
 
 lotr_fund_inspiration.6537.t:  "$fund_inspiration.title$ Incense Nonsense"
 lotr_fund_inspiration.6537.introduction:  "I receive a scented letter from my adventurer, who has been exploring the solar empire of Khy."
 lotr_fund_inspiration.6537.desc:  "\n\n'My [ROOT.Char.GetTitleAsNameNoTooltip], I have to tell you of a most unusual custom of the people in these parts.'\n\n'Incense is used abundantly in the daily devotions of all, as the fumes rise to their beloved sun. But while the poor use lower quality perfumes and sometimes even burn common herbs, the nobility has it burning at all times in their homes and palaces to demonstrate their piety.'\n\n'You can usually smell a noble before you can see them, it gives a new meaning  to the saying "An air of nobility"'"
 lotr_fund_inspiration.6537.a:  "Maybe I too should have a scented court?"
 lotr_fund_inspiration.6537.a.success:  "Your court smells delightedly exotic"
 lotr_fund_inspiration.6537.a.failure:  "Your courtiers hate the smell"
 lotr_fund_inspiration.6537.b:  "What an outlandish custom! I like our own smells better"

