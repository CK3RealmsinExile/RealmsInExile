 fund_inspiration.9004.desc_adventurer_tired_of_westlands: fund_inspiration.9004.desc_adventurer_scared_of_lorien:0 "\n\nКогда [inspiration_owner.GetSheHe] возвращается ко двору, [inspiration_owner.GetSheHe] целует сперва пол, а затем и мою обувь. «[ROOT.Char.GetLadyLord|U], я навеки в долгу перед вами за то, что вы позволили мне вернуться к цивилизации... вдали от этих мрачных и неприятных земель, именуемых Европой»."
 fund_inspiration.9004.desc_adventurer_scared_of_lorien: fund_inspiration.9004.desc_adventurer_scared_of_lorien:0 "\n\nКогда [inspiration_owner.GetSheHe] возвращается ко двору, [inspiration_owner.GetSheHe] целует сперва пол, а затем и мою обувь. «Ми[ROOT.Char.GetLadyLord], я всю жизнь буду у вас в долгу. Спасибо, что разрешили мне вернуться в цивилизацию... Подальше от этих проклятых эльфов и их Чародейки»."