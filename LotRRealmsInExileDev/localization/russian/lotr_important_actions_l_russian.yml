l_russian:

  action_defensive_ally_available: "@alliance_icon! Вы можете призвать оборонительного союзника"
  action_defensive_ally_available_label: "@alliance_icon! Вы можете призвать на войну оборонительных союзников"
  action_defensive_ally_available_desc: "Вы можете призвать [Concept( 'ally', 'союзника' )|E]: [recipient.GetUIName] присоединится к вашим [Concept( 'wars', 'войнам' )|E].\n\n[recipient.GetSheHe|U] может послать на войну @soldier_icon![recipient.GetMilitaryStrengthText] [Concept( 'soldiers', 'солдат' )|E], которые окажут помощь вашему войску.$CALL_TO_WAR_HELP$"
  action_defensive_ally_available_click: "#I Нажмите, чтобы призвать союзника#!"

  action_join_suzerain_in_offensive_war: "@alliance_icon! Предложить повелителю помощь в войне"
  action_join_suzerain_in_offensive_war_label: "@alliance_icon! Вы поможете своему повелителю в войне"
  action_join_suzerain_in_offensive_war_desc: "@alliance_icon! Предложите военную помощь [Concept( 'ally', 'союзнику' )|E], своему [Concept( 'liege', 'сюзерену' )|E], защитнику вашей [Concept('faith', 'конфессии')|E] в [Concept( 'holy_war', 'священной войне' )|E], или помогите своему вассалу подавить крестьянский [revolt|E]"
  action_join_suzerain_in_offensive_war_click: "@alliance_icon! #I Нажмите, чтобы присоединиться к повелителю#!"

  action_join_temporary_tributary_in_defensive_war: "@alliance_icon! Вы присоединяетесь к войне"
  action_join_temporary_tributary_in_defensive_war_label: "@alliance_icon! Помочь персонажу [recipient.GetUINameNoTooltip]"
  action_join_temporary_tributary_in_defensive_war_desc: "@alliance_icon! "Вы можете присоединиться к оборонительным [Concept( 'wars', 'войнам' )|E]своего [Concept( 'tributary', 'данника' )|E]: [recipient.GetUIName].\n\n[recipient.GetSheHe|U] может послать на войну @soldier_icon![recipient.GetMilitaryStrengthText] [Concept( 'soldiers', 'солдат' )|E], которые доступны в данный момент."
  action_join_temporary_tributary_in_defensive_war_click: "@alliance_icon! #I Нажмите, чтобы присоединиться в качестве союзника#!"
  action_join_temporary_tributary_in_defensive_war_combined_group_label: "@alliance_icon! Помочь данникам в войне"
  action_join_temporary_tributary_in_defensive_war_combined_group_description: "Вы можете использовать свои войска для защиты [Concept('tributaries', 'данников')|E]\n\n#Weak Помощь [Concept('tributaries', 'данникам')|E] позволит им продержаться дольше, что в свою очередь обеспечит вам долгосрочный приток ресурсов в перспективе.#!"
  action_join_temporary_tributary_in_defensive_war_combined_group_name: "@alliance_icon! Можно прийти на помощь данникам"
  action_join_temporary_tributary_in_defensive_war_combined_label: "$action_join_temporary_tributary_in_defensive_war_label$"

