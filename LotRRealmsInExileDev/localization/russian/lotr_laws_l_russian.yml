 camp_purpose_rangers_effects: "$EFFECT_LIST_BULLET$Разнообразные [ranger_task_contracts|E] находятся чаще\n$EFFECT_LIST_BULLET$[task_contracts|E] определённых типов ([prowess|E], [intrigue|E] и [martial|E] находятся чаще\n$EFFECT_LIST_BULLET$Разблокируются следующие [camp_buildings|E]:\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_ranger_gear').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_reserve_provisions').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('supply_tent_reserve_water').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('camp_perimeter_extra_watch').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('baggage_train_ransom_cages').GetName]#!\n$BULLET_WITH_TAB$#high [GetDomicileBuilding('proving_grounds_martial_study').GetName]#!\n$EFFECT_LIST_BULLET$Становятся доступны некоторые уникальные [officers|E]:\n$BULLET_WITH_TAB$[GetCourtPositionType('person_haggler_camp_officer').GetName()] #weak (Разблокируется через $baggage_train_ransom_cages_domicile_building$)#\n\n#B Персонажи с [Concept( 'alignment_neutral', 'нейтральной' )|E] [Concept( 'alignment', 'приверженностью' )|E] не подходят для этих целей #!\n\n#WEAK Они зовут нас «Следопытами» — разведчики, стражи границ, налётчики, партизаны — мы способны достичь очень многого.#!"
